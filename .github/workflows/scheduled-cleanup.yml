---
name: Scheduled Cleanup

on:
  schedule:
    - cron: '0 3 * * *'  # Elke nacht om 3:00 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'List stale environments without deleting'
        type: boolean
        default: false

env:
  ZAD_PROJECT: regel-k4c

jobs:
  cleanup-stale-previews:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      packages: write
      actions: write

    steps:
      - name: Cleanup stale ZAD deployments and GitHub environments
        uses: RijksICTGilde/zad-actions/scheduled-cleanup@v4
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          environment-pattern: '^pr[0-9]+$'
          pr-number-pattern: 's/^pr//'
          delete-github-env: true
          delete-github-deployments: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ inputs.dry-run || false }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}

      - name: Cleanup stale container images
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ORG: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          # Get open PR numbers to avoid deleting active preview images
          OPEN_PRS=$(gh pr list --repo "${ORG}/regelrecht" --state open --json number --jq '.[].number') || { echo 'Failed to list open PRs, skipping cleanup'; exit 0; }

          for PACKAGE in regelrecht-editor regelrecht-admin regelrecht-harvester-worker regelrecht-enrich-worker regelrecht-lawmaking regelrecht-landing regelrecht-docs; do
            echo "Checking stale images for $PACKAGE..."
            gh api --paginate \
              "/orgs/${ORG}/packages/container/${PACKAGE}/versions" \
              --jq '.[] | select(.metadata.container.tags | length > 0) | {id, tags: .metadata.container.tags}' \
              2>/dev/null | jq -r 'select(.tags | any(startswith("pr-"))) | "\(.id) \(.tags | map(select(startswith("pr-"))) | .[0])"' \
              2>/dev/null | while read -r VERSION_ID TAG; do
                PR_NUM=$(echo "$TAG" | sed 's/pr-//')
                if ! echo "$OPEN_PRS" | grep -qw "$PR_NUM"; then
                  if [ "$DRY_RUN" = "true" ]; then
                    echo "[dry-run] Would delete stale $PACKAGE:$TAG (version $VERSION_ID)"
                  else
                    echo "Deleting stale $PACKAGE:$TAG (version $VERSION_ID)"
                    gh api --method DELETE \
                      "/orgs/${ORG}/packages/container/${PACKAGE}/versions/${VERSION_ID}" \
                      2>/dev/null || true
                  fi
                fi
              done
          done
