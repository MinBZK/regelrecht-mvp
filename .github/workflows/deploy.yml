---
name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: minbzk/regelrecht-mvp
  IMAGE_NAME_ADMIN: minbzk/regelrecht-admin
  IMAGE_NAME_HARVESTER_WORKER: minbzk/regelrecht-harvester-worker
  IMAGE_NAME_ENRICH_WORKER: minbzk/regelrecht-enrich-worker
  IMAGE_NAME_GRAFANA: minbzk/regelrecht-grafana
  IMAGE_NAME_LAWMAKING: minbzk/regelrecht-lawmaking
  ZAD_PROJECT: regel-k4c
  ZAD_COMPONENT: editor

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      harvester-worker: ${{ steps.filter.outputs.harvester-worker }}
      enrich-worker: ${{ steps.filter.outputs.enrich-worker }}
      grafana: ${{ steps.filter.outputs.grafana }}
      lawmaking: ${{ steps.filter.outputs.lawmaking }}
      backend: ${{ steps.backend.outputs.result }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            admin:
              - 'packages/admin/**'
              - 'packages/pipeline/migrations/**'
              - 'packages/pipeline/src/db.rs'
            harvester-worker:
              - 'packages/pipeline/**'
              - 'packages/harvester/**'
              - 'packages/corpus/**'
            enrich-worker:
              - 'packages/pipeline/**'
              - 'packages/corpus/**'
              - '.claude/skills/law-*/**'
            grafana:
              - 'packages/grafana/**'
            lawmaking:
              - 'frontend-lawmaking/**'

      - name: Determine backend changes
        id: backend
        run: |
          if [[ "${{ steps.filter.outputs.admin }}" == "true" || "${{ steps.filter.outputs.harvester-worker }}" == "true" || "${{ steps.filter.outputs.enrich-worker }}" == "true" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  build-admin:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.admin == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: packages/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  build-harvester-worker:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event.action != 'closed' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        needs.changes.outputs.harvester-worker == 'true'
      )
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_HARVESTER_WORKER }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: packages/pipeline/Dockerfile.harvester-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=harvester-worker
          cache-to: type=gha,mode=max,scope=harvester-worker

  build-enrich-worker:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event.action != 'closed' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        needs.changes.outputs.enrich-worker == 'true'
      )
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENRICH_WORKER }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: packages/pipeline/Dockerfile.enrich-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=enrich-worker
          cache-to: type=gha,mode=max,scope=enrich-worker

  build-grafana:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.changes.outputs.grafana == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GRAFANA }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: ./packages/grafana
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=grafana
          cache-to: type=gha,mode=max,scope=grafana

  build-lawmaking:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.lawmaking == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LAWMAKING }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: frontend-lawmaking/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lawmaking
          cache-to: type=gha,mode=max,scope=lawmaking
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build, build-admin, build-harvester-worker, build-enrich-worker, build-lawmaking, changes]
    if: >-
      always() &&
      github.event_name == 'pull_request' && github.event.action != 'closed' &&
      needs.build.result == 'success'
    permissions:
      pull-requests: write
    environment:
      name: pr${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy admin to ZAD (Preview)
        if: needs.changes.outputs.backend == 'true' && needs.build-admin.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          component: harvester-admin
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}:sha-${{ steps.sha.outputs.short }}
          clone-from: regelrecht
          force-clone: false
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Deploy harvester-worker to ZAD (Preview)
        if: needs.changes.outputs.backend == 'true' && needs.build-harvester-worker.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          component: harvester-worker
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_HARVESTER_WORKER }}:sha-${{ steps.sha.outputs.short }}
          clone-from: regelrecht
          force-clone: false
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Deploy enrich-worker to ZAD (Preview)
        if: needs.changes.outputs.backend == 'true' && needs.build-enrich-worker.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          component: enrichworker
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENRICH_WORKER }}:sha-${{ steps.sha.outputs.short }}
          clone-from: regelrecht
          force-clone: false
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Deploy editor to ZAD (Preview)
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          component: ${{ env.ZAD_COMPONENT }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          clone-from: regelrecht
          force-clone: false
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-header: '## Preview Deployment — editor'

      - name: Deploy lawmaking to ZAD (Preview)
        if: needs.changes.outputs.lawmaking == 'true' && needs.build-lawmaking.result == 'success'
        continue-on-error: true
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          component: lawmaking
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LAWMAKING }}:sha-${{ steps.sha.outputs.short }}
          clone-from: regelrecht
          force-clone: false
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-header: '## Preview Deployment — lawmaking'

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, build-admin, build-harvester-worker, build-enrich-worker, build-grafana, build-lawmaking]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      !cancelled() &&
      needs.build.result == 'success'
    permissions: {}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy admin to ZAD (Production)
        if: needs.build-admin.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: harvester-admin
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}:sha-${{ steps.sha.outputs.short }}

      - name: Deploy editor to ZAD (Production)
        if: needs.build.result == 'success'
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: ${{ env.ZAD_COMPONENT }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}

      - name: Deploy harvester-worker to ZAD (Production)
        if: needs.build-harvester-worker.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: harvester-worker
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_HARVESTER_WORKER }}:sha-${{ steps.sha.outputs.short }}

      - name: Deploy enrich-worker to ZAD (Production)
        if: needs.build-enrich-worker.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: enrichworker
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENRICH_WORKER }}:sha-${{ steps.sha.outputs.short }}

      - name: Deploy grafana to ZAD (Production)
        if: needs.build-grafana.result == 'success'
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: grafana
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GRAFANA }}:sha-${{ steps.sha.outputs.short }}

      - name: Deploy lawmaking to ZAD (Production)
        if: needs.build-lawmaking.result == 'success'
        continue-on-error: true
        uses: RijksICTGilde/zad-actions/deploy@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: regelrecht
          component: lawmaking
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LAWMAKING }}:sha-${{ steps.sha.outputs.short }}

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Cleanup ZAD Deployment
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          delete-github-env: true
          delete-github-deployments: true
          delete-container: true
          container-org: ${{ github.repository_owner }}
          container-name: ${{ github.event.repository.name }}
          container-tag: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Cleanup admin container image
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          delete-container: true
          container-org: ${{ github.repository_owner }}
          container-name: regelrecht-admin
          container-tag: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Cleanup harvester-worker container image
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          delete-container: true
          container-org: ${{ github.repository_owner }}
          container-name: regelrecht-harvester-worker
          container-tag: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Cleanup enrich-worker container image
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          delete-container: true
          container-org: ${{ github.repository_owner }}
          container-name: regelrecht-enrich-worker
          container-tag: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Cleanup lawmaking container image
        uses: RijksICTGilde/zad-actions/cleanup@v3
        with:
          api-key: ${{ secrets.RIG_API_KEY }}
          project-id: ${{ env.ZAD_PROJECT }}
          deployment-name: pr${{ github.event.pull_request.number }}
          delete-container: true
          container-org: ${{ github.repository_owner }}
          container-name: regelrecht-lawmaking
          container-tag: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-admin-token: ${{ secrets.ADMIN_TOKEN }}
          comment-header: '## Preview Deployment'

      - name: Prune orphaned SHA-tagged images
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          for PACKAGE in ${{ github.event.repository.name }} regelrecht-admin regelrecht-harvester-worker regelrecht-enrich-worker regelrecht-grafana regelrecht-lawmaking; do
            echo "Pruning sha-only images for $PACKAGE..."
            gh api --paginate \
              "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE}/versions" \
              --jq '.[] | select(
                (.metadata.container.tags | length == 0) or
                (.metadata.container.tags | all(startswith("sha-")))
              ) | .id' \
            2>/dev/null | while read -r VERSION_ID; do
              echo "Deleting $PACKAGE version $VERSION_ID"
              gh api --method DELETE \
                "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE}/versions/${VERSION_ID}" \
              2>/dev/null || true
            done
          done
