[package]
name = "regelrecht-editor-api"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht editor API — lightweight Axum server for the law editor frontend"
license = "EUPL-1.2"
repository = "https://github.com/MinBZK/regelrecht"

[[bin]]
name = "regelrecht-editor-api"
path = "src/main.rs"

[dependencies]
axum = "0.8"
regelrecht-auth = { path = "../auth" }
regelrecht-corpus = { path = "../corpus", features = ["github"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }
tower-sessions = "0.14"
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres"] }
tower-sessions-memory-store = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["serde"] }
time = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"

[features]
default = ["pipeline"]
pipeline = []

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
