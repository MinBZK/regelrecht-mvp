<!DOCTYPE html>
<html lang="nl" data-scheme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RegelRecht - Admin</title>
  <script src="./redirect.js"></script>
  <link rel="stylesheet" href="css/admin.css">
  <script type="module" src="./main.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <rr-page header-sticky>
    <div slot="header">
      <rr-top-navigation-bar
        title="RegelRecht admin"
        no-logo
        no-menu
        utility-no-language-switch
        utility-account-label="Admin"
      >
      </rr-top-navigation-bar>

      <rr-toolbar size="md">
        <rr-toolbar-start-area>
          <rr-toolbar-item>
            <rr-tab-bar id="tabs" size="md">
              <!-- Rendered by app.js -->
            </rr-tab-bar>
          </rr-toolbar-item>
        </rr-toolbar-start-area>
        <rr-toolbar-center-area>
          <rr-toolbar-item id="filters">
            <!-- Rendered by app.js -->
          </rr-toolbar-item>
          <rr-toolbar-item id="harvest-form-container" style="display:none">
            <div id="harvest-form" class="harvest-form">
              <rr-text-field id="harvest-bwb-id" size="md" placeholder="BWB ID (e.g. BWBR0018451)"></rr-text-field>
              <rr-button id="harvest-btn" variant="accent-filled" size="md">Harvest</rr-button>
            </div>
          </rr-toolbar-item>
        </rr-toolbar-center-area>
        <rr-toolbar-end-area>
          <rr-toolbar-item id="pagination-container">
            <!-- Rendered by app.js -->
          </rr-toolbar-item>
        </rr-toolbar-end-area>
      </rr-toolbar>
    </div>

    <rr-simple-section>
      <div class="table-container">
        <table class="data-table">
          <thead id="table-head">
            <!-- Rendered by app.js -->
          </thead>
          <tbody id="table-body">
            <!-- Rendered by app.js -->
          </tbody>
        </table>
      </div>
    </rr-simple-section>

    <!-- Job Detail Panel (slide-in from right) -->
    <div id="detail-backdrop" class="detail-backdrop" hidden></div>
    <aside id="detail-panel" class="detail-panel" hidden>
      <div class="detail-panel__header">
        <h2 class="detail-panel__title">Job Details</h2>
        <button id="detail-close" class="detail-panel__close" title="Close">&times;</button>
      </div>
      <div id="detail-body" class="detail-panel__body">
        <!-- Rendered by app.js -->
      </div>
    </aside>
  </rr-page>
</body>
</html>
