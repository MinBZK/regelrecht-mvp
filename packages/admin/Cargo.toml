[package]
name = "regelrecht-admin"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht admin UI for viewing pipeline database"
license = "MIT"
repository = "https://github.com/MinBZK/regelrecht-mvp"

[lib]
name = "regelrecht_admin"
path = "src/lib.rs"

[[bin]]
name = "regelrecht-admin"
path = "src/main.rs"

[dependencies]
axum = "0.8"
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono"] }
regelrecht-pipeline = { path = "../pipeline" }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
openidconnect = "4.0"
tower-sessions = "0.14"
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
tower = "0.5"
urlencoding = "2"
base64 = "0.22"
time = "0.3"
prometheus-client = "0.24"
strum = "0.28"

[dev-dependencies]
tower-sessions-memory-store = "0.14"
wiremock = "0.6"
rsa = "0.9"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
testcontainers = "0.24"
testcontainers-modules = { version = "0.12", features = ["postgres"] }
http-body-util = "0.1"
pretty_assertions = "1"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
