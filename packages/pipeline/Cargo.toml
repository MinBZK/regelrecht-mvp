[package]
name = "regelrecht-pipeline"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht pipeline - Job queue and law status tracking for the processing pipeline"
license = "MIT"
repository = "https://github.com/MinBZK/regelrecht-mvp"
homepage = "https://github.com/MinBZK/regelrecht-mvp"
keywords = ["law", "legal", "pipeline", "dutch", "regelrecht"]
categories = ["database"]

[[bin]]
name = "regelrecht-harvest-worker"
path = "src/bin/harvest_worker.rs"

[[bin]]
name = "regelrecht-enrich-worker"
path = "src/bin/enrich_worker.rs"

[dependencies]
regelrecht-corpus = { path = "../corpus" }
regelrecht-harvester = { path = "../harvester" }
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json", "migrate"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "process", "time", "fs", "net", "io-util"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
strum = { version = "0.28", features = ["derive"] }
reqwest = { version = "0.13", default-features = false, features = ["blocking"] }
sha2 = "0.10"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
testcontainers = "0.24"
testcontainers-modules = { version = "0.12", features = ["postgres"] }
pretty_assertions = "1.4"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "process", "time", "fs"] }
tempfile = "3"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
