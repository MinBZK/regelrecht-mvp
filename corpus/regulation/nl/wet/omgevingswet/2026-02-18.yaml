  - number: 3.15.5
    text: |-
      Bij omgevingsplan, omgevingsverordening of algemene maatregel van bestuur wordt bepaald welk bestuursorgaan een
      programma kan vaststellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.15
  - number: 3.16.1
    text: |-
      In een programma wordt aangegeven welke ruimte er, gelet op de omgevingswaarde of de andere doelstelling, in een
      daarbij aangegeven gebied en periode beschikbaar is voor activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.16
  - number: 3.16.2
    text: 'Bij omgevingsplan, omgevingsverordening of algemene maatregel van bestuur wordt bepaald:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.16
  - number: 3.16.2.a
    text: hoe de omgevingswaarde of de andere doelstelling bij de uitoefening van taken en bevoegdheden wordt betrokken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.16
  - number: 3.16.2.b
    text: |-
      in voorkomende gevallen, welke daarop betrekking hebbende bepalingen op grond van [artikel 2.22][ref1],
      [2.24, eerste lid][ref2], [5.18][ref3], [5.19, eerste lid][ref4], of [5.30][ref5], of welke in het omgevingsplan
      gestelde regels over het verlenen of weigeren van een omgevingsvergunning voor een omgevingsplanactiviteit geheel
      of gedeeltelijk buiten toepassing blijven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
