        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.2
        afdeling: '13.6'
  - number: 13.24.b
    text: |-
      de onder a bedoelde activiteit is toegelaten anders dan op grond van een projectbesluit of een omgevingsvergunning
      voor een buitenplanse omgevingsplanactiviteit van provinciaal of nationaal belang,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.24
  - number: 13.24.c
    text: de financiële bijdrage niet anderszins is verzekerd, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.24
  - number: 13.24.d
    text: |-
      het niet gaat om kosten waarop [afdeling 13.6][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.24
    references:
