      technisch beheerregister opgenomen, waarin de voor het behoud van het waterkerend vermogen kenmerkende gegevens van
      de constructie en de feitelijke toestand nader zijn omschreven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.39
