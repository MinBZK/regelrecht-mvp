  - number: 3.19.1
    text: 'Het bestuursorgaan dat daarvoor in het programma is aangewezen, kan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.19
  - number: 3.19.1.a
    text: |-
      in dat programma opgenomen maatregelen, activiteiten of ontwikkelingen ambtshalve wijzigen of vervangen of laten
      vervallen, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.19
  - number: 3.19.1.b
    text: maatregelen, activiteiten of ontwikkelingen aan het programma toevoegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.19
  - number: 3.19.2
    text: |-
      De bestuursorganen, bedoeld in [artikel 3.18, eerste lid][ref1], kunnen verzoeken om een wijziging van het
      programma. Bij dat verzoek wordt aannemelijk gemaakt dat is voldaan aan het in het eerste lid opgenomen vereiste.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 3.19.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op een programma als bedoeld in
      [artikel 3.9, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
