    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.12
  - number: 4.12.2
    text: |-
      Bij het aanwijzen van gevallen worden de grenzen van [artikel 2.3, derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 4.13.1
    text: |-
      Op grond van [artikel 4.3][ref1] kunnen gevallen worden aangewezen waarin het bestuursorgaan dat bevoegd is te
      beslissen op de aanvraag om een omgevingsvergunning het bevoegd gezag is. Het gaat om gevallen waarin activiteiten
      worden verricht waarvoor een omgevingsvergunning is vereist in combinatie met activiteiten waarvoor regels gelden
      als bedoeld in artikel 4.3.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.13.2
    text: 'In ieder geval worden aangewezen milieubelastende activiteiten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13
  - number: 4.13.2.a
    text: met betrekking tot een ippc-installatie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13
  - number: 4.13.2.b
    text: waarop de Seveso-richtlijn van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13
  - number: 4.13a.1
    text: |-
      Een bestuursorgaan dat bij of krachtens deze paragraaf als bevoegd gezag is aangewezen, kan die bevoegdheid aan een
      ander bestuursorgaan overdragen, als dat bestuursorgaan daarmee instemt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13a
  - number: 4.13a.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de toepassing van het eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.13a
  - number: 4.14.1
    text: |-
      De gemeenteraad kan voor een locatie een voorbereidingsbesluit nemen met het oog op de voorbereiding van in het
      omgevingsplan te stellen regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.2
    text: Het voorbereidingsbesluit wijzigt het omgevingsplan met voorbeschermingsregels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.3
    text: |-
      Voorbeschermingsregels strekken ertoe te voorkomen dat de locatie minder geschikt wordt voor de verwezenlijking van
      het doel van de regels, bedoeld in het eerste lid, en kunnen alleen inhouden:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.3.a
    text: |-
      een verbod of een verbod om zonder voorafgaande melding of zonder omgevingsvergunning daarbij aangewezen
      activiteiten te verrichten die op grond van het omgevingsplan zijn toegestaan, maar nog niet plaatsvinden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.3.b
    text: |-
      de aanwijzing van onderwerpen waarvoor het bevoegd gezag maatwerkvoorschriften kan stellen of voorschriften aan een
      omgevingsvergunning kan verbinden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.3.c
    text: |-
      de aanwijzing van bestuursorganen of andere instanties die in de gelegenheid worden gesteld om aan het bevoegd
      gezag advies uit te brengen over een aanvraag om een besluit op grond van voorbeschermingsregels als bedoeld onder
      a of b,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.3.d
    text: |-
      het buiten toepassing verklaren van in het omgevingsplan gestelde regels die in strijd zijn met
      voorbeschermingsregels als bedoeld onder a of b.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.4
    text: |-
      De voorbeschermingsregels in het omgevingsplan vervallen na een jaar en zes maanden, of, als binnen die termijn
      het besluit tot vaststelling of wijziging van het omgevingsplan waarvan de regels, bedoeld in het eerste lid, deel
      uitmaken is bekendgemaakt, op het tijdstip waarop dat besluit in werking treedt of is vernietigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.14.5
    text: |-
      De gemeenteraad kan de bevoegdheid, bedoeld in het eerste lid, delegeren aan het college van burgemeester en
      wethouders.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.14
  - number: 4.15.1
    text: |-
      Provinciale staten kunnen, met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1], voor een locatie
      een voorbereidingsbesluit nemen met het oog op de voorbereiding van in de omgevingsverordening te stellen regels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 4.15.2
    text: Het voorbereidingsbesluit wijzigt de omgevingsverordening met voorbeschermingsregels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.15
  - number: 4.15.3
    text: |-
      [Artikel 4.14, derde en vierde lid][ref1], is van overeenkomstige toepassing, waarbij in artikel 4.14, derde lid,
      onder a en d, en vierde lid, in plaats van «omgevingsplan» steeds «omgevingsverordening» wordt gelezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.15.4
    text: Provinciale staten kunnen de bevoegdheid, bedoeld in het eerste lid, delegeren aan gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.15
  - number: 4.16.1
    text: |-
      Provinciale staten kunnen, met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1], voor een locatie
      een voorbereidingsbesluit nemen met het oog op de voorbereiding van een projectbesluit, een instructieregel als
      bedoeld in [artikel 2.22][ref2] of een instructie als bedoeld in [artikel 2.33, eerste lid][ref3], gericht op het
      stellen van regels in het omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 4.16.2
    text: |-
      Onze Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties,
      kan, met inachtneming van de grenzen van [artikel 2.3, derde lid][ref1], voor een locatie een voorbereidingsbesluit
      nemen met het oog op de voorbereiding van een projectbesluit, een instructieregel als bedoeld in
      [artikel 2.24, eerste lid][ref2], of een instructie als bedoeld in [artikel 2.34, eerste lid][ref3], gericht op het
      stellen van regels in het omgevingsplan. Als op grond van [artikel 5.44, tweede lid][ref4], geen overeenstemming
      is vereist voor een projectbesluit, is geen overeenstemming als bedoeld in de eerste zin vereist voor een
      voorbereidingsbesluit met het oog op de voorbereiding van dat projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.16.3
    text: Het voorbereidingsbesluit wijzigt het omgevingsplan met voorbeschermingsregels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.16
  - number: 4.16.4
    text: |-
      De [artikelen 4.14, derde lid][ref1], en [4.15, vierde lid][ref2], zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.16.5
    text: |-
      De voorbeschermingsregels in het omgevingsplan vervallen na een jaar en zes maanden of, als binnen die termijn het
      projectbesluit, de instructieregel of de instructie is bekendgemaakt, op het tijdstip waarop het projectbesluit of
      het overeenkomstig de instructieregel of de instructie gewijzigde omgevingsplan in werking treedt of is vernietigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.16
  - number: '4.17'
    text: |-
      Het omgevingsplan wordt in ieder geval vijf jaar na het onherroepelijk worden van een omgevingsvergunning
      voor een voortdurende buitenplanse omgevingsplanactiviteit, waaraan geen termijn is verbonden als bedoeld in
      [artikel 5.36, eerste lid][ref1], met die vergunning in overeenstemming gebracht als het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 4.17.a
    text: een omgevingsplanactiviteit bestaande uit het in stand houden van een bouwwerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.17
  - number: 4.17.b
    text: |-
      een omgevingsplanactiviteit, anders dan onder a, die niet in overeenstemming is met een aan een locatie gegeven
      functie-aanduiding.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.17
  - number: '4.18'
    text: |-
      In het omgevingsplan kunnen locaties worden aangewezen waar de daar aanwezige bouwwerken moeten worden
      gemoderniseerd of worden vervangen door gelijksoortige bebouwing. Zolang deze modernisering of vervanging niet is
      verwezenlijkt, wordt het gebruik van die bouwwerken aangemerkt als afwijkend van de toegedeelde functie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.18
  - number: '4.19'
    text: |-
      Als in het omgevingsplan regels worden opgenomen over het uiterlijk van bouwwerken en de toepassing daarvan uitleg
      behoeft, stelt de gemeenteraad beleidsregels vast voor de beoordeling of een bouwwerk aan die regels voldoet. Deze
      beleidsregels zijn zoveel mogelijk toegesneden op de te onderscheiden bouwwerken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19
  - number: 4.19a.1
    text: |-
      In een omgevingsplan worden geen regels gesteld die het uitvoeren van een project waarvoor een projectbesluit is
      vastgesteld door een bestuursorgaan van de provincie of het Rijk belemmeren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
  - number: 4.19a.2
    text: |-
      In een omgevingsplan worden geen regels gesteld die in strijd zijn met regels die daarin zijn opgenomen op grond
      van een voorbereidingsbesluit van een bestuursorgaan van de provincie of het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
  - number: 4.19a.3
    text: |-
      In een projectbesluit wordt een termijn gesteld voor de toepassing van het eerste lid. Als het bestuursorgaan dat
      het projectbesluit heeft vastgesteld dat nodig acht voor de uitvoering van het project, kan de termijn eenmaal
      worden verlengd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
  - number: 4.19a.4
    text: |-
      Het eerste lid is niet van toepassing voor zover een instructieregel als bedoeld in [artikel 2.24][ref1] of een
      instructie als bedoeld in [artikel 2.34][ref2] het stellen van dergelijke regels vergt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 4.19a.5
    text: |-
      Het eerste lid is niet van toepassing voor zover het projectbesluit is vastgesteld door een bestuursorgaan
      van de provincie en een instructieregel als bedoeld in [artikel 2.22][ref1] of een instructie als bedoeld in
      [artikel 2.33][ref2] het stellen van dergelijke regels vergt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
    references:
