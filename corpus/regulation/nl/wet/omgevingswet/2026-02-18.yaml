  - number: 20.18.1
    text: |-
      Het Planbureau voor de Leefomgeving brengt ten minste eenmaal in de vier jaar een wetenschappelijk rapport uit,
      waarin de ontwikkeling van de kwaliteit van bij ministeriële regeling aangewezen onderdelen of aspecten van de
      fysieke leefomgeving wordt beschreven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.18
  - number: 20.18.2
    text: |-
      Onze Minister van Onderwijs, Cultuur en Wetenschap brengt ten minste eenmaal in de vier jaar een wetenschappelijk
      rapport uit, waarin de ontwikkeling van de staat van cultureel erfgoed en werelderfgoed wordt beschreven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.18
  - number: 20.18.3
    text: |-
      Onze Minister voor Natuur en Stikstof bevordert het onderzoek en wetenschappelijk werk, bedoeld in artikel 10,
      eerste lid, van de vogelrichtlijn en artikel 18, eerste lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.18
  - number: 20.19.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat zendt elke twaalf jaar aan beide kamers der Staten-Generaal
      een verslag over de doeltreffendheid en de effecten van de omgevingswaarden voor de veiligheid van primaire
      waterkeringen, bedoeld in [artikel 2.15, eerste lid, onder d][ref1], en van andere parameters voor de veiligheid
      van primaire waterkeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 20.19.2
    text: De eerstvolgende toezending van het verslag vindt plaats voor 1 januari 2037.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.19
  - number: '20.20'
    text: 'Er is een digitaal stelsel Omgevingswet. Dit stelsel heeft als doel:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.20
  - number: 20.20.a
    text: het beschikbaar stellen van informatie over de fysieke leefomgeving,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.20
  - number: 20.20.b
    text: |-
      het faciliteren van het elektronisch verkeer als bedoeld in [artikel 16.1][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.1
        afdeling: '16.1'
  - number: 20.20.c
    text: het bevorderen van een doelmatige en doeltreffende uitoefening van taken en bevoegdheden op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.20
  - number: 20.21.1
    text: 'Er is een landelijke voorziening. Deze voorziet in ieder geval in:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
  - number: 20.21.1.a
    text: |-
      het elektronisch ontsluiten van de informatie, bedoeld in [artikel 20.26, eerste lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.4
        afdeling: '20.5'
  - number: 20.21.1.b
    text: |-
      het elektronisch kunnen indienen van een aanvraag om een besluit, doen van een melding, verstrekken van gegevens en
      bescheiden om te voldoen aan een andere informatieverplichting dan een melding en verzenden van een ander bericht
      als bedoeld in [artikel 16.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.1
        afdeling: '16.1'
  - number: 20.21.2
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties beheert de landelijke voorziening. Bij ministeriële
      regeling kan aan een rechtspersoon een uitsluitend recht worden verleend voor het in opdracht van die minister
      verrichten van werkzaamheden in het kader van het beheer van de landelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
  - number: 20.21.3
    text: |-
      Bij algemene maatregel van bestuur kunnen bestuursorganen of rechtspersonen worden aangewezen die zorg dragen voor
      de inrichting, instandhouding, werking en beveiliging van bij de maatregel aangewezen onderdelen van de landelijke
      voorziening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
  - number: 20.21.4
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld over de inrichting, instandhouding, werking en
      beveiliging van de landelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.21
  - number: 20.22.1
    text: |-
      Bij algemene maatregel van bestuur kan een andere functionaliteit dan bedoeld in [artikel 20.21, eerste lid][ref1],
      worden aangewezen waarin de landelijke voorziening voorziet, voor zover die bijdraagt aan het bereiken van de
      doelen, bedoeld in [artikel 20.20][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.1
        afdeling: '20.5'
  - number: 20.22.2
    text: |-
      Bij de maatregel kunnen nadere regels worden gesteld over de aangewezen functionaliteit. Daartoe behoren in ieder
      geval regels over het verplicht of onverplicht gebruiken van die functionaliteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.22
  - number: '20.23'
    text: |-
      Informatie die niet kan worden verstrekt op grond van [artikel 5.1 van de Wet open overheid][ref1] wordt niet via
      de landelijke voorziening aan een ieder beschikbaar gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.23
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 20.24.1
    text: |-
      Bij algemene maatregel van bestuur worden, met inachtneming van [artikel 20.25][ref1], regels gesteld over het
      beheer van in de landelijke voorziening opgenomen informatie. In ieder geval wordt bepaald wie verantwoordelijk is
      voor het beheer van de via de voorziening ingediende aanvragen, meldingen, gegevens en bescheiden om te voldoen aan
      andere informatieverplichtingen dan meldingen en andere berichten als bedoeld in [artikel 16.1][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.3
        afdeling: '20.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.1
        afdeling: '16.1'
  - number: 20.24.2
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld die uitvoeringstechnische of administratieve
      voorschriften bevatten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.24
  - number: 20.25.1
    text: 'Bij algemene maatregel van bestuur wordt bepaald:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.25.1.a
    text: welke persoonsgegevens worden verwerkt in de landelijke voorziening,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.25.1.b
    text: |-
      welk bestuursorgaan hiervoor verwerkingsverantwoordelijke als bedoeld in artikel 4 van de Algemene verordening
      gegevensbescherming is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.25.1.c
    text: aan wie deze persoonsgegevens worden verstrekt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.25.1.d
    text: hoe lang deze persoonsgegevens bewaard blijven in de landelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.25.2
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld die uitvoeringstechnische of administratieve
      voorschriften bevatten. Daartoe kunnen regels behoren over de wijze van verstrekking van persoonsgegevens.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.25
  - number: 20.26.1
    text: |-
      Bij algemene maatregel van bestuur kan informatie worden aangewezen die beschikbaar wordt gesteld voor ontsluiting
      via de landelijke voorziening, bedoeld in [artikel 20.21][ref1]. Daarbij wordt bepaald door en aan welke
      bestuursorganen of rechtspersonen die informatie beschikbaar wordt gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
  - number: 20.26.2
    text: |-
      Tot de informatie behoort in ieder geval informatie uit besluiten en andere rechtsfiguren op grond van deze wet die
      bij ministeriële regeling zijn aangeduid als omgevingsdocument.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.26
  - number: 20.26.3
    text: |-
      Bij de maatregel wordt bepaald door welk van die bestuursorganen of rechtspersonen wordt bepaald voor welke
      onderdelen van de informatie een beperking als bedoeld in [artikel 20.23][ref1] geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
  - number: 20.26.4
    text: De informatie voldoet aan de bij ministeriële regeling te stellen regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.26
  - number: 20.26.5
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld over het beschikbaar stellen, waaronder de wijze van
      beschikbaar stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.26
  - number: '20.27'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld in het belang van de borging en beoordeling van de
      kwaliteit van de informatie, bedoeld in [artikel 20.26, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.4
        afdeling: '20.5'
  - number: 20.28.1
    text: |-
      Het bevoegd gezag en de andere bestuursorganen die zijn betrokken bij een via de landelijke voorziening ingediende
      aanvraag om een besluit, een gedane melding, verstrekte gegevens en bescheiden om te voldoen aan een andere
      informatieverplichting dan een melding of een ander bericht als bedoeld in [artikel 16.1][ref1], maken gebruik van
      de landelijke voorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.1
        afdeling: '16.1'
  - number: 20.28.2
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld over het beschikbaar stellen van een elektronisch
      formulier voor het elektronisch verkeer, bedoeld in [artikel 16.1][ref1]. Daarbij kan worden bepaald welk
      bestuursorgaan het formulier vaststelt en kan worden bepaald welk bestuursorgaan de daarvoor benodigde informatie
      levert.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.1
        afdeling: '16.1'
  - number: 20.28.3
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld over de vaststelling en levering, bedoeld in het
      tweede lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.28
  - number: '20.29'
    text: |-
      Bij ministeriële regeling wordt een systeembeschrijving van de landelijke voorziening, bedoeld in
      [artikel 20.21][ref1], vastgesteld. De systeembeschrijving bevat in ieder geval een beschrijving van de wijze
      waarop elektronische informatie-uitwisseling op grond van deze afdeling plaatsvindt tussen de landelijke
      voorziening en bestuursorganen en rechtspersonen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.29
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
  - number: '20.30'
    text: |-
      Bij ministeriële regeling kunnen regels die uitvoeringstechnische of administratieve voorschriften bevatten, worden
      gesteld:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.30
  - number: 20.30.a
    text: over de afhandeling van terugmeldingen van mogelijke onjuistheid van informatie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.30
  - number: 20.30.b
    text: |-
      over de wijze van beschikbaar stellen van informatie uit besluiten en andere rechtsfiguren op grond van deze wet
      die niet is aangewezen op grond van [artikel 20.26, eerste lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.4
        afdeling: '20.5'
  - number: 20.30.c
    text: |-
      ter uitvoering van deze afdeling, voor zover de [artikelen 20.21 tot en met 20.29][ref1] daarin niet voorzien.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
  - number: '22.1'
    text: |-
      In deze afdeling wordt onder het tijdelijke deel van het omgevingsplan verstaan het deel van het omgevingsplan dat
      bestaat uit:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.1
  - number: 22.1.a
    text: |-
      de besluiten, bedoeld in [artikel 4.6, eerste lid, van de Invoeringswet Omgevingswet][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0043660#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.1
    references:
      - id: ref1
        bwb_id: BWBR0043660
        artikel: '4'
  - number: 22.1.b
    text: |-
      de kaarten, bedoeld in [artikel 3.5, tweede lid, van de Aanvullingswet bodem Omgevingswet][ref1], en de besluiten,
      bedoeld in artikel 3.5, derde lid, van die wet,


      [ref1]: https://wetten.overheid.nl/BWBR0043277#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.1
    references:
      - id: ref1
        bwb_id: BWBR0043277
        artikel: '3'
  - number: 22.1.c
    text: |-
      de regels waarvoor op grond van [artikel 22.2, eerste lid][ref1], is bepaald dat ze tijdelijk deel uitmaken van
      het omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
        hoofdstuk: '22'
        paragraaf: 22.1.1
        afdeling: '22.1'
  - number: 22.2.1
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat regels die voor de inwerkingtreding van deze wet bij
      of krachtens de wet waren gesteld of daaraan gelijkwaardige regels al dan niet tijdelijk deel uitmaken van het
      omgevingsplan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.2
  - number: 22.2.2
    text: Bij een besluit tot vaststelling of wijziging van een omgevingsplan kunnen die regels worden gewijzigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.2
  - number: '22.3'
    text: |-
      Een omgevingsplan als bedoeld in [artikel 2.4][ref1] wordt niet eerder dan de dag waarop deze wet in werking
      treedt, bekendgemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '22.4'
    text: |-
      Aan de verplichting tot vaststelling van een omgevingsplan, bedoeld in [artikel 2.4][ref1], wordt uiterlijk op een
      bij koninklijk besluit te bepalen tijdstip voldaan. Tot dat tijdstip zijn [artikel 122 van de Gemeentewet][ref2]
      en de [artikelen 28][ref3] en [34, eerste lid, tweede zin, van de Wet algemene regels herindeling][ref4]
      niet van toepassing. Vanaf dat tijdstip worden regels over de fysieke leefomgeving waarvoor dat op grond van
      [artikel 2.7, eerste lid][ref5], is bepaald, alleen nog in het omgevingsplan opgenomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0005416#Artikel122
      [ref3]: https://wetten.overheid.nl/BWBR0003718#Artikel28
      [ref4]: https://wetten.overheid.nl/BWBR0003718#Artikel34
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0005416
        artikel: '122'
      - id: ref3
        bwb_id: BWBR0003718
        artikel: '28'
      - id: ref4
        bwb_id: BWBR0003718
        artikel: '34'
      - id: ref5
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 22.5.1
    text: |-
      Uiterlijk tot een bij koninklijk besluit te bepalen tijdstip geldt voor het tijdelijke deel van het omgevingsplan
      niet de verplichting op grond van [artikel 4.2, eerste lid][ref1], dat de regels zijn gesteld met het oog op een
      evenwichtige toedeling van functies aan locaties,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 22.5.2
    text: |-
      Uiterlijk tot een bij koninklijk besluit te bepalen tijdstip geldt niet de verplichting op grond van
      [artikel 4.17][ref1] over het in overeenstemming brengen van het omgevingsplan met omgevingsvergunningen voor een
      buitenplanse omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.1
        afdeling: '4.3'
  - number: 22.5.3
    text: Het in het eerste en tweede lid bedoelde tijdstip kan voor verschillende gevallen verschillend worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.5
  - number: 22.5.4
    text: |-
      Bij algemene maatregel van bestuur kunnen, zo nodig in afwijking van het eerste of tweede lid, nadere regels worden
      gesteld met het oog op een goede uitvoering van de verplichtingen, bedoeld in die leden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.5
  - number: 22.5.5
    text: |-
      Voor het tijdelijke deel van het omgevingsplan, bedoeld in [artikel 22.1, onder a][ref1], geldt niet de
      verplichting van [artikel 19 van de Bekendmakingswet][ref2] tot het in geconsolideerde vorm beschikbaar stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
        hoofdstuk: '22'
        paragraaf: 22.1.1
        afdeling: '22.1'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '19'
  - number: 22.6.1
    text: |-
      Bij de vaststelling van een omgevingsplan kunnen de voor een locatie
      geldende regels die zijn opgenomen in een besluit als bedoeld in
      [artikel 4.6, eerste lid, onder a, b, c, g, h, i, j, k, l of m, van de Invoeringswet Omgevingswet][ref1] alleen
      alle tegelijk komen te vervallen.


      [ref1]: https://wetten.overheid.nl/BWBR0043660#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.6
    references:
      - id: ref1
        bwb_id: BWBR0043660
        artikel: '4'
  - number: 22.6.2
    text: |-
      Bij of krachtens algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin, in afwijking van
      het eerste lid, tot een bij koninklijk besluit te bepalen tijdstip de regels, bedoeld in het eerste lid, ook
      gedeeltelijk voor een locatie kunnen komen te vervallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.6
  - number: 22.6.3
    text: |-
      Uiterlijk op een bij koninklijk besluit te bepalen tijdstip zijn alle regels van het omgevingsplan opgenomen in het
      niet-tijdelijke deel van dat plan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.6
  - number: '22.7'
    text: |-
      Bij het beroep tegen een omgevingsplan kunnen geen beroepsgronden worden aangevoerd die betrekking hebben op regels
      die uitvoering geven aan een onherroepelijk besluit tot aanwijzing van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.7
  - number: 22.7.a
    text: een monument of archeologisch monument als gemeentelijk monument of provinciaal monument,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.7
  - number: 22.7.b
    text: een gemeentelijk of provinciaal beschermd stads- of dorpsgezicht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.7
  - number: '22.8'
    text: |-
      Voor zover op grond van een bepaling in een gemeentelijke verordening een vergunning of ontheffing is vereist voor
      een geval waarin regels over de fysieke leefomgeving op grond van [artikel 2.7, eerste lid][ref1], alleen in het
      omgevingsplan mogen worden opgenomen, geldt een zodanige bepaling als een verbod om zonder omgevingsvergunning een
      activiteit te verrichten als bedoeld in [artikel 5.1, eerste lid, aanhef en onder a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: '22.9'
    text: |-
      Op een in het tijdelijke deel van het omgevingsplan aangewezen onderdeel als bedoeld in
      [artikel 3.4 van de Wet ruimtelijke ordening][ref1] waarvan verwezenlijking in de naaste toekomst nodig wordt
      geacht blijft het oude recht van toepassing, uiterlijk tot vijf jaar na de dag met ingang waarvan die aanwijzing
      geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0020449#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.9
    machine_readable:
      execution:
        parameters:
          - name: datum_aanwijzing
            type: date
            required: true
            description: Datum met ingang waarvan de aanwijzing geldt
          - name: datum_toets
            type: date
            required: true
            description: Datum waarop wordt getoetst of het oude recht nog van toepassing is
        output:
          - name: uiterste_datum_oud_recht
            type: date
            description: Uiterste datum waarop het oude recht van toepassing is
          - name: oud_recht_van_toepassing
            type: boolean
            description: Of het oude recht nog van toepassing is
        actions:
          - output: uiterste_datum_oud_recht
            value:
              operation: DATE_ADD
              date: $datum_aanwijzing
              years: 5
          - output: oud_recht_van_toepassing
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_toets
              value: $uiterste_datum_oud_recht
    references:
      - id: ref1
        bwb_id: BWBR0020449
        artikel: '3'
  - number: '22.10'
    text: |-
      In het tijdelijke deel van het omgevingsplan opgenomen regels als bedoeld in
      [artikel 3.6, eerste lid, onder c, van de Wet ruimtelijke ordening][ref1] gelden als regels als bedoeld in
      [artikel 5.21, tweede lid, onder a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0020449#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.10
    references:
      - id: ref1
        bwb_id: BWBR0020449
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: '22.11'
    text: |-
      Een in het tijdelijke deel van het omgevingsplan opgenomen bevoegdheid tot het stellen van nadere eisen als
      bedoeld in [artikel 3.6, eerste lid, onder d, van de Wet ruimtelijke ordening][ref1] over in dat deel van het plan
      omschreven onderwerpen of onderdelen geldt als een bevoegdheid tot het stellen van maatwerkvoorschriften in het
      omgevingsplan over daarbij aangewezen onderwerpen als bedoeld in [artikel 4.5, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0020449#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.11
    references:
      - id: ref1
        bwb_id: BWBR0020449
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.2
        afdeling: '4.1'
  - number: '22.12'
    text: |-
      Als in het tijdelijke deel van een omgevingsplan op grond van [artikel 3.6a van de Wet ruimtelijke ordening][ref1]
      is uitgesloten dat van dat plan voor een bepaalde termijn kan worden afgeweken met een omgevingsvergunning, geldt
      die bepaling als een verbod om voor een termijn van ten hoogste tien jaar een activiteit te verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0020449#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.12
    references:
      - id: ref1
        bwb_id: BWBR0020449
        artikel: '3'
  - number: 22.13.1
    text: |-
      Een omgevingsvergunning die wordt verleend op grond van een regel in het tijdelijke deel als bedoeld in
      [artikel 22.1, aanhef en onder a][ref1], van het omgevingsplan geldt niet als schadeveroorzakend besluit als
      bedoeld in [artikel 15.1, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
        hoofdstuk: '22'
        paragraaf: 22.1.1
        afdeling: '22.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 22.13.2
    text: 'Een onherroepelijk besluit tot aanwijzing van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.13
  - number: 22.13.2.a
    text: een monument of archeologisch monument als gemeentelijk monument of provinciaal monument,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.13
  - number: 22.13.2.b
    text: een gemeentelijk of provinciaal beschermd stads- of dorpsgezicht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.13
  - number: 22.13.2.c
    text: een rijksbeschermd stads- of dorpsgezicht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.13
  - number: 22.14.1
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat regels die voor de inwerkingtreding van deze wet bij of
      krachtens een andere wet waren gesteld of daaraan gelijkwaardige regels al dan niet tijdelijk deel uitmaken van
      de waterschapsverordening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.14
  - number: 22.14.2
    text: Bij een besluit tot vaststelling of wijziging van een waterschapsverordening kunnen die regels worden gewijzigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.14
  - number: '22.15'
    text: |-
      Aan de verplichting tot vaststelling van een waterschapsverordening, bedoeld in [artikel 2.5][ref1],
      wordt uiterlijk op een bij koninklijk besluit te bepalen tijdstip voldaan. Tot dat tijdstip is
      [artikel 59 van de Waterschapswet][ref2] niet van toepassing. Vanaf dat tijdstip worden regels over de
      fysieke leefomgeving waarvoor dat op grond van [artikel 2.7, eerste lid][ref3], is bepaald, alleen nog in de
      waterschapsverordening opgenomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0005108#Artikel59
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0005108
        artikel: '59'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 22.16.1
    text: |-
      Uiterlijk tot een bij koninklijk besluit te bepalen tijdstip hoeft een projectbesluit niet te voldoen aan
      [artikel 5.52, eerste lid][ref1]. Voor zover een projectbesluit in strijd is met het omgevingsplan, geldt het als
      een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 22.16.2
    text: |-
      Voor zover een projectbesluit geldt als een omgevingsvergunning voor een omgevingsplanactiviteit, hoeft
      het omgevingsplan niet eerder dan op een bij koninklijk besluit te bepalen tijdstip met die vergunning in
      overeenstemming te zijn gebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.16
  - number: 22.16.3
    text: |-
      In het omgevingsplan worden geen regels gesteld die in strijd zijn met een projectbesluit als bedoeld in het eerste
      lid. De [artikelen 4.19a, derde tot en met vijfde lid][ref1], en [5.53a, tweede tot en met vierde lid][ref2], zijn
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.1
        afdeling: '4.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: '22.17'
    text: Deze afdeling vervalt op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.17
  - number: 22.18.1
    text: |-
      Het college van burgemeester en wethouders stelt uiterlijk op 18 juli 2039 een programma vast, gericht op het
      reduceren van geluid van wegen in beheer bij de gemeente en van lokale spoorwegen, voor zover deze niet zijn
      aangewezen op grond van [artikel 2.13a, eerste lid, aanhef en onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.18
    machine_readable:
      execution:
        parameters:
          - name: datum_vaststelling
            type: date
            required: true
            description: Datum waarop het programma wordt vastgesteld
        output:
          - name: uiterste_datum
            type: date
            description: Uiterste datum voor vaststelling van het geluidreductieprogramma
          - name: tijdig_vastgesteld
            type: boolean
            description: Of het programma tijdig is vastgesteld
        actions:
          - output: uiterste_datum
            value: '2039-07-18'
          - output: tijdig_vastgesteld
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_vaststelling
              value: $uiterste_datum
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
  - number: 22.18.2
    text: |-
      Het algemeen bestuur van een waterschap stelt uiterlijk op 18 juli 2039 een programma vast, gericht op het
      reduceren van geluid van wegen in beheer bij het waterschap.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.18
  - number: 22.18.3
    text: |-
      Gedeputeerde staten stellen uiterlijk op 18 juli 2039 een programma vast, gericht op het reduceren van geluid
      van wegen in beheer bij de provincie en van lokale spoorwegen, voor zover deze zijn aangewezen op grond van
      [artikel 2.13a, eerste lid, aanhef en onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
  - number: 22.18.4
    text: |-
      De [artikelen 2.25, eerste lid, aanhef en onder a, onder 1°][ref1], [16.27][ref2], [16.77b, tweede lid][ref3],
      en [16.139][ref4] zijn van overeenkomstige toepassing, met dien verstande dat in artikel 16.27, tweede lid, voor
      «die wijziging niet ziet op een in dat programma opgenomen beschrijving van een activiteit als gevolg waarvan de
      activiteit is toegestaan» wordt gelezen «die wijziging niet ziet op een in dat programma opgenomen maatregelkeuze
      voor een locatie».


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.3.4
        afdeling: '16.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        afdeling: '16.14'
  - number: '22.19'
    text: Deze afdeling vervalt op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.19
  - number: 22.21.1
    text: |-
      Onze Minister van Landbouw, Visserij, Voedselzekerheid en Natuur draagt uit een oogpunt van
      rechtszekerheid tezamen met gedeputeerde staten van de provincies zorg voor het legaliseren van de
      projecten met een geringe stikstofdepositie op Natura 2000-gebieden die voldeden aan de voorwaarden van
      [artikel 2.12 van het Besluit natuurbescherming][ref1], zoals dat luidde op 28 mei 2019.


      [ref1]: https://wetten.overheid.nl/BWBR0038662#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
    references:
      - id: ref1
        bwb_id: BWBR0038662
        artikel: '2'
  - number: 22.21.2
    text: |-
      Onze Minister van Landbouw, Visserij, Voedselzekerheid en Natuur stelt voor 1 mei 2026 een programma vast met
      maatregelen om de in het eerste lid bedoelde projecten te legaliseren. Het programma bevat primair gerichte
      maatregelen voor het verminderen van stikstofemissie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
    machine_readable:
      execution:
        parameters:
          - name: datum_vaststelling_programma
            type: date
            required: true
            description: Datum waarop het legalisatieprogramma wordt vastgesteld
        output:
          - name: uiterste_datum_vaststelling
            type: date
            description: Uiterste datum voor vaststelling van het legalisatieprogramma
          - name: tijdig_vastgesteld
            type: boolean
            description: Of het programma tijdig is vastgesteld
        actions:
          - output: uiterste_datum_vaststelling
            value: '2026-05-01'
          - output: tijdig_vastgesteld
            value:
              operation: LESS_THAN
              subject: $datum_vaststelling_programma
              value: $uiterste_datum_vaststelling
  - number: 22.21.3
    text: |-
      Maatregelen om de gevolgen van de projecten ongedaan te maken, te beperken of te compenseren, worden
      alleen in het programma opgenomen voor zover zij niet zijn opgenomen in het programma, bedoeld in
      [artikel 3.9, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 22.21.4
    text: De in het programma opgenomen maatregelen worden uitgevoerd voor 1 maart 2028.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
    machine_readable:
      execution:
        parameters:
          - name: datum_uitvoering_maatregelen
            type: date
            required: true
            description: Datum waarop de maatregelen zijn uitgevoerd
        output:
          - name: uiterste_uitvoeringsdatum
            type: date
            description: Uiterste datum voor uitvoering van de maatregelen
          - name: tijdig_uitgevoerd
            type: boolean
            description: Of de maatregelen tijdig zijn uitgevoerd
        actions:
          - output: uiterste_uitvoeringsdatum
            value: '2028-03-01'
          - output: tijdig_uitgevoerd
            value:
              operation: LESS_THAN
              subject: $datum_uitvoering_maatregelen
              value: $uiterste_uitvoeringsdatum
  - number: 22.21.5
    text: |-
      Onze Minister van Landbouw, Visserij, Voedselzekerheid en Natuur zendt uiterlijk 1 juli 2027 aan de Staten-Generaal
      een verslag over de doeltreffendheid en de effecten van de krachtens het tweede lid in het programma opgenomen
      maatregelen in de praktijk en of aanpassing van het programma benodigd is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
    machine_readable:
      execution:
        parameters:
          - name: datum_verzending_verslag
            type: date
            required: true
            description: Datum waarop het verslag aan de Staten-Generaal wordt gezonden
        output:
          - name: uiterste_verzenddatum
            type: date
            description: Uiterste datum voor verzending van het verslag
          - name: tijdig_verzonden
            type: boolean
            description: Of het verslag tijdig is verzonden
        actions:
          - output: uiterste_verzenddatum
            value: '2027-07-01'
          - output: tijdig_verzonden
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_verzending_verslag
              value: $uiterste_verzenddatum
  - number: 22.21.6
    text: |-
      In het programma opgenomen compenserende maatregelen als bedoeld in artikel 6, vierde lid, van de habitatrichtlijn
      waarborgen dat de algehele samenhang van het Natura 2000-netwerk bewaard blijft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
  - number: 22.21.7
    text: |-
      De [artikelen 2.25, eerste lid, aanhef en onder a, onder 1°][ref1], [3.12][ref2],
      [3.18, eerste en tweede lid][ref3], [3.19, eerste en tweede lid][ref4], [16.27][ref5], [16.77b, tweede lid][ref6],
      en [16.139][ref7] zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref6]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref7]: https://wetten.overheid.nl/BWBR0037885#Artikel16
