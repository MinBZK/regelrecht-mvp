        bwb_id: BWBR0005537
        artikel: '4'
  - number: 15.5.a
    text: |-
      de aanvrager overeenkomstig [artikel 2, eerste lid, van Boek 7 van het Burgerlijk Wetboek][ref1] tot koop is
      overgegaan van een tot woning bestemde onroerende zaak na de vaststelling of wijziging van het omgevingsplan,


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.5
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '2'
  - number: 15.5.b
    text: |-
      op de aanvraag om schadevergoeding [artikel 15.1, tweede lid][ref1], of [15.4, eerste lid][ref2], van toepassing
      is, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.5
    references:
