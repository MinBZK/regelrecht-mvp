        artikel: 257ba
  - number: '18.16'
    text: |-
      Als de ernst van een overtreding of de omstandigheden waaronder zij is begaan daartoe aanleiding geven, legt het
      bevoegd gezag de gedraging voor aan het openbaar ministerie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16
  - number: 18.16a.1
    text: |-
      Onverminderd [artikel 18.1][ref1] en [artikel 117 van het Wetboek van Strafvordering][ref2] kan Onze Minister voor
      Natuur en Stikstof voor dieren, eieren, planten, hout of producten daarvan die in strijd met het bepaalde bij of
      krachtens deze wet binnen het grondgebied van Nederland zijn gebracht, onverwijld maatregelen treffen op kosten van
      de eigenaar, vervoerder, verhandelaar, importeur of diens gemachtigde.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0001903#Artikel117
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
      - id: ref2
        bwb_id: BWBR0001903
        artikel: '117'
  - number: 18.16a.2
    text: 'De maatregelen zijn:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.a
    text: een besluit tot het terugzenden naar het land van uitvoer of herkomst of tot het opleggen van een plicht daartoe,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.b
    text: |-
      een besluit tot het brengen van dieren, eieren, planten of van de producten daarvan naar enige plaats buiten
      Nederland die daarvoor naar het oordeel van Onze Minister voor Natuur en Stikstof geschikt is en in overeenstemming
      is met de doeleinden van het cites-verdrag, of tot het opleggen van een plicht daartoe,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.c
    text: een besluit tot het opleggen van een verbod op het vervoeren, be- of verwerken of het verhandelen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.d
    text: een besluit tot het in bewaring nemen of het opleggen van een plicht daartoe,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.e
    text: |-
      een besluit tot het opleggen van een plicht om houders of vermoedelijke houders van deze situatie onverwijld en op
      doeltreffende wijze op de hoogte te stellen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.f
    text: |-
      een besluit tot het opleggen van een plicht om de betrokken dieren, eieren, planten of producten daarvan of het
      betrokken hout of producten daarvan die zijn verhandeld op te halen of centraal op te slaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.2.g
    text: |-
      een besluit tot het opleggen van een plicht tot het identificeren en registreren van de betrokken dieren, eieren,
      planten of producten daarvan, of het betrokken hout of producten daarvan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16a.3
    text: |-
      Onze Minister voor Natuur en Stikstof kan beslissen dat levende dieren, behorend tot een in het wild levende soort
      die van nature in Nederland voorkomt, waarvan kan worden aangenomen dat zij zich in de natuur kunnen handhaven, op
      kosten van de eigenaar of van degene die deze dieren onder zich heeft, in hun natuurlijke leefomgeving in vrijheid
      worden gesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16a
  - number: 18.16b.1
    text: |-
      Aan een in [artikel 18.16a][ref1] bedoeld besluit kunnen voorschriften worden verbonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.5
        afdeling: '18.1'
  - number: 18.16b.2
    text: |-
      Het is verboden te handelen in strijd met een besluit als bedoeld in [artikel 18.16a][ref1] of een voorschrift als
      bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.5
        afdeling: '18.1'
  - number: 18.16b.3
    text: |-
      Als niet tot terugzending of tot invrijheidstelling in de natuurlijke leefomgeving wordt besloten, kunnen de kosten
      van verzorging, huisvesting of opslag binnen Nederland geheel of gedeeltelijk in rekening worden gebracht bij de
      eigenaar, vervoerder, verhandelaar, importeur of diens gemachtigde. Bij ministeriële regeling kunnen nadere regels
      worden gesteld over het in rekening brengen van de kosten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16b
  - number: 18.16b.4
    text: |-
      Tot de in [artikel 18.16a, eerste en derde lid][ref1], bedoelde kosten kunnen ook behoren de kosten van bewaring in
      verband met het transport naar de plaats van bestemming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.5
        afdeling: '18.1'
  - number: 18.16b.5
    text: |-
      Bij gebreke van volledige betaling binnen de door hem gestelde termijn kan Onze Minister voor Natuur en Stikstof
      dat wat op grond van [artikel 18.16a][ref1] of dit artikel is verschuldigd, invorderen bij dwangbevel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.16b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.5
        afdeling: '18.1'
  - number: 18.17.1
    text: |-
      Onverminderd het recht van andere staten om overeenkomstig het VN-Zeerechtverdrag tot rechtsvervolging over te
      gaan, is de Nederlandse strafwet van toepassing op een ieder die in of boven de exclusieve economische zone in
      strijd handelt met een bij of krachtens deze wet gesteld voorschrift.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.17
  - number: 18.17.2
    text: |-
      Bij de opsporing en vervolging van strafbare feiten als bedoeld in het eerste lid wordt afdeling 7 van Deel XII van
      het VN-Zeerechtverdrag in acht genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.17
  - number: 18.18.1
    text: |-
      Deze afdeling is van toepassing op het verrichten van werkzaamheden voor de uitoefening van bevoegdheden door
      het bevoegd gezag in het kader van de uitvoeringstaak, bedoeld in het tweede lid, en de handhavingstaak, bedoeld
      in [artikel 18.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
  - number: 18.18.2
    text: 'De uitvoeringstaak omvat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
  - number: 18.18.2.a
    text: |-
      het stellen van maatwerkvoorschriften en het verbinden van voorschriften aan een omgevingsvergunning, bedoeld in
      [artikel 4.5][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.2
        afdeling: '4.1'
  - number: 18.18.2.b
    text: |-
      het beoordelen van en beslissen op een aanvraag om een omgevingsvergunning, bedoeld in de [paragrafen 5.1.2][ref1]
      en [5.1.3][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 18.18.2.c
    text: |-
      de toepassing van [paragraaf 5.1.5][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 18.18.2.d
    text: |-
      het uitbrengen van advies, bedoeld in de [artikelen 16.15 tot en met 16.19][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 18.19.1
    text: |-
      Bij algemene maatregel van bestuur worden in het belang van een doelmatige uitoefening van de uitvoeringstaak en de
      handhavingstaak regels gesteld over:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.1.a
    text: de strategische en programmatische uitoefening van deze taken door de betrokken bestuursorganen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.1.b
    text: 'de onderlinge afstemming van de uitoefening van deze taken en de daarmee samenhangende werkzaamheden door:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.1.b.1°
    text: de betrokken bestuursorganen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.1.b.2°
    text: de onder hun gezag werkzame toezichthouders,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.1.b.3°
    text: de instanties die zijn belast met de strafrechtelijke handhaving van het bepaalde bij of krachtens deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.19.2
    text: |-
      De regels worden in ieder geval gesteld ter uitvoering van de richtlijn industriële emissies en de Seveso-
      richtlijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.19
  - number: 18.20.1
    text: |-
      De betrokken bestuursorganen dragen zorg voor een goede kwaliteit van de uitoefening van de uitvoeringstaak en
      de handhavingstaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.20
  - number: 18.20.2
    text: Provinciale staten kunnen regels stellen over de uitoefening van deze taken door gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.20
  - number: 18.20.3
    text: |-
      De gemeenteraad kan regels stellen over de uitoefening van deze taken door het college van burgemeester en
      wethouders.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.20
  - number: 18.21.1
    text: |-
      Gedeputeerde staten en de colleges van burgemeester en wethouders van de gemeenten die behoren tot een of meer
      regio’s als bedoeld in [artikel 8 van de Wet veiligheidsregio’s][ref1] of tot een kring van bij regeling van Onze
      Minister van Infrastructuur en Waterstaat en Onze Minister van Justitie en Veiligheid aangewezen gemeenten, stellen
      voor een doelmatige en doeltreffende uitoefening van de uitvoeringstaak en de handhavingstaak voor die regio,
      regio’s of kring een omgevingsdienst in.


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.21
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '8'
  - number: 18.21.2
    text: |-
      Een omgevingsdienst wordt ingesteld als een openbaar lichaam als bedoeld in [artikel 8, eerste lid][ref1], in
      verbinding met [artikel 52][ref2] of [74 van de Wet gemeenschappelijke regelingen][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0003740#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0003740#Artikel52
      [ref3]: https://wetten.overheid.nl/BWBR0003740#Artikel74
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.21
    references:
      - id: ref1
        bwb_id: BWBR0003740
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0003740
        artikel: '52'
      - id: ref3
        bwb_id: BWBR0003740
        artikel: '74'
  - number: 18.21.3
    text: |-
      Het werkgebied van een omgevingsdienst komt overeen met het werkgebied van een of meer regio’s als bedoeld in
      [artikel 8 van de Wet veiligheidsregio’s][ref1] of met het grondgebied van een kring van aangewezen gemeenten.


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.21
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '8'
  - number: 18.22.1
    text: |-
      Bij algemene maatregel van bestuur wordt vastgesteld welke tot de uitvoeringstaak en de handhavingstaak behorende
      of daarmee samenhangende werkzaamheden in ieder geval aan een omgevingsdienst worden opgedragen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.22
  - number: 18.22.2
    text: |-
      Bij de maatregel worden omgevingsdiensten aangewezen waaraan met uitsluiting van andere omgevingsdiensten de
      uitoefening van de uitvoeringstaak en de handhavingstaak wordt opgedragen voor activiteiten:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.22
  - number: 18.22.2.a
    text: met betrekking tot installaties als bedoeld in bijlage I, categorie 4, bij de richtlijn industriële emissies, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.22
  - number: 18.22.2.b
    text: waarop de Seveso-richtlijn van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.22
  - number: 18.23.1
    text: |-
      Om een goede kwaliteit van de uitoefening van de uitvoeringstaak en de handhavingstaak door de omgevingsdiensten
      te waarborgen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.23
  - number: 18.23.1.a
    text: |-
      stelt de gemeenteraad regels over de uitoefening van deze taken of de daarmee samenhangende werkzaamheden, bedoeld
      in [artikel 18.22, eerste lid][ref1], die in opdracht van het college van burgemeester en wethouders worden
      uitgevoerd,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.23.1.b
    text: |-
      stellen provinciale staten regels over de uitoefening van deze taken of de daarmee samenhangende werkzaamheden,
      bedoeld in [artikel 18.22, eerste lid][ref1], die in opdracht van gedeputeerde staten worden uitgevoerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.23.2
    text: |-
      Per omgevingsdienst en voor de op grond van [artikel 18.22, tweede lid][ref1], aangewezen omgevingsdiensten worden
      uniforme regels vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.24.1
    text: >-
      In opdracht van Onze Ministers die het aangaat wordt elke
      twee jaar onderzoek gedaan naar de doeltreffendheid van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.24
  - number: 18.24.1.a
    text: |-
      de wijze waarop de verplichting, bedoeld in [artikel 18.20, eerste lid][ref1], wordt nageleefd, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.24.1.b
    text: |-
      de regels, bedoeld in de [artikelen 18.20, tweede en derde lid][ref1], en [18.23, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.24.2
    text: |-
      Als naar het oordeel van Onze Ministers die het aangaat uit het onderzoek blijkt dat de wijze van naleving van die
      verplichting of die regels onvoldoende doeltreffend is, kunnen bij algemene maatregel van bestuur regels worden
      gesteld die voor deze regels in de plaats komen of die deze aanvullen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.24
  - number: 18.25.1
    text: |-
      De bij de uitvoeringstaak en de handhavingstaak betrokken bestuursorganen verstrekken de gegevens waarover zij
      beschikken in verband met de werkzaamheden, bedoeld in [artikel 18.22, eerste lid][ref1], aan elkaar en, voor zover
      die gegevens noodzakelijk zijn voor de strafrechtelijke handhaving van het bepaalde bij of krachtens deze wet, aan
      de instanties die met de strafrechtelijke handhaving zijn belast.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.25.2
    text: |-
      Bij algemene maatregel van bestuur kunnen andere bestuursorganen en instanties worden aangewezen, die op verzoek
      gegevens waarover zij in verband met de werkzaamheden, bedoeld in [artikel 18.22, eerste lid][ref1], beschikken,
      verstrekken aan de in het eerste lid bedoelde:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.3.3
        afdeling: '18.3'
  - number: 18.25.2.a
    text: |-
      bestuursorganen, voor zover die gegevens noodzakelijk zijn voor de uitoefening van de uitvoeringstaak en de
      handhavingstaak,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.2.b
    text: |-
      instanties, voor zover die gegevens noodzakelijk zijn voor de strafrechtelijke handhaving van het bepaalde bij of
      krachtens deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3
    text: 'Bij algemene maatregel van bestuur worden regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.a
    text: de wijze waarop gegevens overeenkomstig het eerste lid kunnen worden verstrekt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.b
    text: |-
      de verwerking van persoonsgegevens, bedoeld in artikel 4, onder 2°, van de algemene verordening
      gegevensbescherming, voor zover die gegevens noodzakelijk zijn voor de strafrechtelijke handhaving van het bepaalde
      bij of krachtens deze wet, door:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.b.1°
    text: de betrokken bestuursorganen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.b.2°
    text: de onder hun gezag werkzame toezichthouders, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.b.3°
    text: de op grond van het tweede lid aangewezen bestuursorganen en instanties,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25.3.c
    text: de verdeling van de kosten verbonden aan het uitvoeren van het bepaalde bij of krachtens dit artikel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25
  - number: 18.25a.1
    text: |-
      Bij algemene maatregel van bestuur kunnen met het oog op de verduurzaming van het energiegebruik andere
      rechtspersonen of natuurlijke personen die handelen in de uitoefening van beroep of bedrijf worden aangewezen die
      op verzoek gegevens over het energiegebruik van eindafnemers verstrekken aan het bevoegd gezag, voor zover die
      gegevens noodzakelijk zijn voor de uitoefening van de uitvoeringstaak en de handhavingstaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25a
  - number: 18.25a.2
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld over de gevallen waarin in ieder geval voldaan is
      aan de verplichting, bedoeld in het eerste lid, tot het verstrekken van gegevens en de wijzen waarop gegevens als
      bedoeld in het eerste lid worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.25a
  - number: 18.26.1
    text: |-
      Gedeputeerde staten dragen binnen de provincie zorg voor de coördinatie van een onderling afgestemde uitoefening
      van de uitvoeringstaak en de handhavingstaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.26
  - number: 18.26.2
    text: |-
      Onze Minister die het aangaat en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties dragen zorg voor
      de coördinatie van de uitoefening van de uitvoeringstaak en de handhavingstaak, voor zover die afstemming van
      bovenprovinciaal belang is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.26
  - number: '18.27'
    text: |-
      Gedeputeerde staten stellen binnen de provincie een of meer overlegorganen in, waarin regelmatig overleg
      plaatsvindt over de kwaliteit, doeltreffendheid en doelmatigheid van de uitoefening van de uitvoeringstaak en de
      handhavingstaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.27
  - number: 19.0.1
    text: |-
      Bij regels als bedoeld in [paragraaf 4.1.1][ref1] kunnen onderwerpen worden aangewezen waarvoor het daarbij
      aangewezen bestuursorgaan bij besluit kan bepalen dat zich een in die regels aangegeven bijzondere omstandigheid in
      de fysieke leefomgeving voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.0
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 19.0.2
    text: |-
      Bij het besluit wordt bepaald welke regels in verband met de bijzondere omstandigheid op een bepaalde
      locatie of voor een bepaalde periode gelden. Bij het besluit kan worden afgeweken van regels als bedoeld in
      [paragraaf 4.1.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.0
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 19.1.1
    text: 'In deze afdeling wordt onder het voorkomen van de nadelige gevolgen van een ongewoon voorval ook verstaan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.1.a
    text: het zoveel mogelijk beperken of ongedaan maken van die gevolgen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.1.b
    text: het voorkomen dat het voorval verergert, voortduurt of zich herhaalt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.1.c
    text: het wegnemen van de oorzaak van het voorval.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.2
    text: 'In deze afdeling wordt onder de veroorzaker verstaan de natuurlijke persoon of rechtspersoon:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.2.a
    text: die de activiteit waardoor het ongewoon voorval is veroorzaakt, verricht of heeft verricht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.2.b
    text: |-
      die houder is van een omgevingsvergunning of een andere vorm van publiekrechtelijke toestemming voor het verrichten
      van die activiteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.2.c
    text: |-
      die van de activiteit een melding als bedoeld in [artikel 4.4, eerste lid][ref1], heeft gedaan,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.2
        afdeling: '4.1'
  - number: 19.1.2.d
    text: |-
      aan wie op het tijdstip van het voorval over die activiteit een doorslaggevende economische zeggenschap was
      overgedragen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
  - number: 19.1.3
    text: |-
      Deze afdeling is niet van toepassing op ongewone voorvallen waarop de [Kernenergiewet][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0002402
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.1
    references:
      - id: ref1
        bwb_id: BWBR0002402
  - number: 19.2.1
    text: 'In deze afdeling wordt onder bevoegd gezag verstaan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.2
  - number: 19.2.1.a
    text: |-
      het bestuursorgaan waarbij op grond van [artikel 18.2][ref1] de bestuursrechtelijke handhavingstaak berust of dat
      op grond van [artikel 18.3][ref2] of [18.4][ref3] bevoegd is tot oplegging van een last onder bestuursdwang, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
  - number: 19.2.1.b
    text: 'voor zover het ongewoon voorval betrekking heeft op luchtverontreiniging: de commissaris van de Koning.'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.2
  - number: 19.2.2
    text: |-
      Als bij een ongewoon voorval meer bevoegde bestuursorganen zijn betrokken, stemmen deze bestuursorganen de nodige
      maatregelen om de nadelige gevolgen van een ongewoon voorval te voorkomen op elkaar af. In spoedeisende gevallen
      kan van afstemming worden afgezien, mits zo spoedig mogelijk na het treffen van de eerst noodzakelijke maatregelen
      afstemming plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.2
  - number: 19.3.1
    text: |-
      Het bevoegd gezag dat wordt geïnformeerd over een ongewoon voorval, geeft van dat voorval, de daarover verstrekte
      gegevens en de getroffen of voorgenomen maatregelen onverwijld kennis aan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.3.1.a
    text: |-
      de burgemeester van de gemeente waarin dat voorval zich voordoet, of als de nadelige gevolgen van dat voorval
      gemeenteoverstijgend zijn, aan de voorzitter van de veiligheidsregio waarin dat voorval zich voordoet,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.3.1.b
    text: |-
      de beheerder van een oppervlaktewaterlichaam of een zuiveringtechnisch werk, als het voorval verontreiniging van
      een oppervlaktewaterlichaam veroorzaakt of de doelmatige werking van een zuiveringtechnisch werk belemmert,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.3.1.c
    text: de Inspectie Leefomgeving en Transport, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.3.1.d
    text: andere bestuursorganen of overheidsdiensten, die belang hebben bij een onverwijlde kennisgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.3.2
    text: |-
      Het bevoegd gezag kan de veroorzaker verplichten aanvullende informatie te verstrekken over het voorval, de
      getroffen maatregelen en de gevolgen van die maatregelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.3
  - number: 19.4.1
    text: |-
      Het bevoegd gezag verplicht de veroorzaker tot het treffen van de maatregelen die redelijkerwijs van hem kunnen
      worden verlangd om de nadelige gevolgen van het ongewoon voorval te voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.4
  - number: 19.4.2
    text: |-
      Het bevoegd gezag kan aanwijzingen geven over het verrichten van de activiteit of het treffen van maatregelen,
      waaronder de aanwijzing om de activiteit waardoor het ongewoon voorval is veroorzaakt, onmiddellijk stil te leggen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.4
  - number: 19.4.3
    text: |-
      [Artikel 5:31 van de Algemene wet bestuursrecht][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.4
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 19.4.4
    text: |-
      Als een ongewoon voorval de doelmatige werking van een zuiveringtechnisch werk belemmert of dreigt te belemmeren,
      kan het bestuur waarbij de zuiveringstaak, bedoeld in [artikel 2.17, eerste lid, onder a, onder 2°][ref1],
      berust het bevoegd gezag verzoeken de veroorzaker van het voorval te verplichten tot het treffen van de nodige
      maatregelen of de veroorzaker de nodige aanwijzigen te geven om de nadelige gevolgen voor de werking van het
      zuiveringtechnische werk te beperken of weg te nemen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 19.4.5
    text: |-
      Het bevoegd gezag geeft onverwijld uitvoering aan dit verzoek, voor zover dat niet in strijd is met het belang van
      de bescherming van het milieu.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.4
  - number: 19.5.1
    text: |-
      Als niet onmiddellijk of tijdig kan worden vastgesteld door wie of waardoor het ongewoon voorval is veroorzaakt,
      kan het bevoegd gezag of, als niet onmiddellijk of tijdig kan worden vastgesteld welk bestuursorgaan bevoegd
      is, het college van burgemeester en wethouders van de gemeente waarin het voorval zich voordoet, preventieve of
      herstelmaatregelen treffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.5
  - number: 19.5.2
    text: |-
      Een beslissing tot het treffen van maatregelen wordt op schrift gesteld en geldt als een beschikking. De
      beschikking wordt onmiddellijk aan de veroorzaker gezonden, zodra die bekend is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.5
  - number: 19.5.3
    text: |-
      Als het college van burgemeester en wethouders van de gemeente waarin het voorval zich voordoet, toepassing geeft
      aan het eerste lid, zijn de [artikelen 19.3, tweede lid][ref1], [19.4][ref2] en [19.6][ref3] van toepassing, zodra
      bekend is wie de veroorzaker is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 19.6.1
    text: |-
      Als het bevoegd gezag maatregelen treft of laat treffen door derden, verhaalt het de kosten van die maatregelen op
      de veroorzaker.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.6
  - number: 19.6.2
    text: |-
      De [artikelen 5:10, tweede lid][ref1], en [5:25 van de Algemene wet bestuursrecht][ref2] zijn van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.6
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 19.7.1
    text: |-
      Het bevoegd gezag ziet erop toe dat de nodige gegevens worden verzameld om het ongewoon voorval te analyseren en de
      oorzaak ervan te achterhalen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.7
  - number: 19.7.2
    text: |-
      Om herhaling te voorkomen wijzigt het bevoegd gezag zo nodig de voorschriften van de omgevingsvergunning, stelt
      het, als voor de activiteit regels gelden als bedoeld in [artikel 4.1][ref1] of [4.3][ref2], maatwerkvoorschriften
      of doet het, als het daarvoor niet zelf bevoegd is, daarop gerichte aanbevelingen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 19.8.1
    text: |-
      Bevoegd gezag voor een archeologische toevalsvondst van algemeen belang is het college van burgemeester en
      wethouders van de gemeente waar de vondst zich voordoet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.8
  - number: 19.8.2
    text: |-
      Bevoegd gezag voor een archeologische toevalsvondst van algemeen belang die zich voordoet in een gebied dat niet
      gemeentelijk is ingedeeld, is Onze Minister van Onderwijs, Cultuur en Wetenschap.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.8
  - number: 19.8.3
    text: |-
      In afwijking van het eerste lid kunnen de taken en bevoegdheden, bedoeld in [artikel 19.9][ref1], worden
      uitgeoefend door Onze Minister van Onderwijs, Cultuur en Wetenschap als een archeologische toevalsvondst van
      algemeen belang, van nationaal belang is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.2'
  - number: 19.8.4
    text: |-
      Het college van burgemeester en wethouders van de gemeente waar zich een archeologische toevalsvondst van algemeen
      belang voordoet en Onze Minister van Onderwijs, Cultuur en Wetenschap stellen elkaar onverwijld in kennis van de
      bij een melding als bedoeld in [artikel 5.10 van de Erfgoedwet][ref1] van een archeologische toevalsvondst van
      algemeen belang verstrekte gegevens en de bij die vondst getroffen of voorgenomen maatregelen.


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.8
    references:
      - id: ref1
        bwb_id: BWBR0037521
        artikel: '5'
  - number: '19.9'
    text: |-
      De [artikelen 19.3, tweede lid][ref1], [19.4, eerste tot en met derde lid,][ref2] en [19.7, tweede lid][ref3], zijn
      van overeenkomstige toepassing op een archeologische toevalsvondst van algemeen belang.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 19.9a.1
    text: 'Deze afdeling is van toepassing als naar het oordeel van het bevoegd gezag:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
    machine_readable:
      execution:
        parameters:
          - name: redelijk_vermoeden_verontreiniging
            type: boolean
            required: true
            description: >-
              Of er ten minste een redelijk vermoeden bestaat
              van een toevalsvondst van verontreiniging op of
              in de bodem
          - name: onmiddellijke_beschermingsmaatregelen_noodzakelijk
            type: boolean
            required: true
            description: >-
              Of onmiddellijk tijdelijke
              beschermingsmaatregelen noodzakelijk zijn om
              onaanvaardbare gezondheidsrisico's te voorkomen
        output:
          - name: afdeling_van_toepassing
            type: boolean
            description: Of deze afdeling (toevalsvondst bodemverontreiniging) van toepassing is
        actions:
          - output: afdeling_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $redelijk_vermoeden_verontreiniging
                  value: true
                - operation: EQUALS
                  subject: $onmiddellijke_beschermingsmaatregelen_noodzakelijk
                  value: true
  - number: 19.9a.1.a
    text: ten minste een redelijk vermoeden bestaat van een toevalsvondst van verontreiniging op of in de bodem, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
  - number: 19.9a.1.b
    text: |-
      onmiddellijk tijdelijke beschermingsmaatregelen, met inbegrip van onderzoek naar de aard en omvang van de risico’s
      voor de gezondheid, noodzakelijk zijn om onaanvaardbare risico’s voor de gezondheid als gevolg van directe of
      indirecte blootstelling aan verontreiniging op of in de bodem te voorkomen of te beperken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
  - number: 19.9a.2
    text: |-
      Van onaanvaardbare risico’s voor de gezondheid is in ieder geval sprake bij directe blootstelling aan concentraties
      van stoffen die de op grond van [artikel 2.24][ref1] vastgestelde, ten hoogste toelaatbare concentraties
      overschrijden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 19.9a.3
    text: |-
      Van indirecte blootstelling is in ieder geval sprake bij aanzienlijke bedreiging van de kwaliteit van
      drinkwatervoorraden wanneer aangetroffen verontreiniging het grondwater kan bereiken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
  - number: 19.9a.4
    text: Tijdelijke beschermingsmaatregelen strekken niet tot het ongedaan maken van de aangetroffen verontreiniging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9a
  - number: 19.9b.1
    text: |-
      Bevoegd gezag voor een toevalsvondst van verontreiniging op of in de bodem is het college van burgemeester en
      wethouders van de gemeente waar de vondst zich voordoet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9b
  - number: 19.9b.2
    text: |-
      [Artikel 19.2, tweede lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 19.9b.3
    text: |-
      [Artikel 19.3][ref1] is van overeenkomstige toepassing, waarbij voor «veroorzaker» wordt gelezen: eigenaar of
      erfpachter.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 19.9c.1
    text: |-
      Het bevoegd gezag verplicht de eigenaar of erfpachter tot het onmiddellijk treffen van tijdelijke
      beschermingsmaatregelen, op de locatie waar de verontreiniging zich bevindt of waar de directe gevolgen van
      blootstelling aan de verontreiniging zich voordoen, die redelijkerwijs van hem kunnen worden gevraagd om
      onaanvaardbare risico’s voor de gezondheid als gevolg van de blootstelling te voorkomen of te beperken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9c
  - number: 19.9c.2
    text: |-
      [Artikel 19.4, tweede tot en met vijfde lid][ref1], is van overeenkomstige toepassing, waarbij voor «veroorzaker»
      telkens wordt gelezen: eigenaar of erfpachter.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 19.9c.3
    text: |-
      Als de eigenaar of erfpachter niet of niet tijdig de vereiste tijdelijke beschermingsmaatregelen treft, kan het
      bevoegd gezag die maatregelen treffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9c
  - number: 19.9c.4
    text: |-
      Een beslissing tot het treffen van tijdelijke beschermingsmaatregelen wordt op schrift gesteld en geldt als een
      beschikking. De beschikking wordt onmiddellijk aan de eigenaar of erfpachter gezonden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9c
  - number: 19.9d.1
    text: |-
      Als het bevoegd gezag tijdelijke beschermingsmaatregelen treft of laat treffen door derden, kan het de kosten van
      die maatregelen verhalen op de eigenaar of erfpachter onverminderd [artikel 13.3a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9d
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.2'
  - number: 19.9d.2
    text: |-
      De [artikelen 5:10, tweede lid][ref1], en [5:25 van de Algemene wet bestuursrecht][ref2] zijn van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.9d
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 19.10.1
    text: 'Bij ministeriële regeling worden alarmeringswaarden vastgesteld voor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.10
  - number: 19.10.1.a
    text: concentraties van verontreinigende stoffen in de buitenlucht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.10
  - number: 19.10.1.b
    text: hoogwaterstanden die een gevaar voor primaire waterkeringen kunnen opleveren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.10
  - number: 19.10.2
    text: |-
      De commissaris van de Koning informeert of waarschuwt onverwijld het publiek bij een overschrijding of dreigende
      overschrijding van een alarmeringswaarde voor concentraties van verontreinigende stoffen in de buitenlucht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.10
  - number: 19.10.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat informeert of waarschuwt onverwijld de betrokken beheerders
      van primaire waterkeringen en gedeputeerde staten bij een overschrijding of dreigende overschrijding van een
      alarmeringswaarde voor hoogwaterstanden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.10
  - number: 19.11.1
    text: |-
      Bij ministeriële regeling worden regels gesteld over het geven van informatie of waarschuwingen bij een
      overschrijding of dreigende overschrijding van een alarmeringswaarde en als de buitenlucht wordt verontreinigd of
      dreigt te worden verontreinigd door stoffen waarvoor geen alarmeringswaarden zijn vastgesteld, aan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.1.a
    text: het publiek,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.1.b
    text: bijzonder gevoelige bevolkingsgroepen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.1.c
    text: de beheerders van primaire waterkeringen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.1.d
    text: gedeputeerde staten, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.1.e
    text: overige bestuursorganen of andere instanties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.2
    text: 'Bij de regeling worden regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.2.a
    text: de inhoud van de te verstrekken informatie en de te geven waarschuwingen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.2.b
    text: hoe die informatie wordt verstrekt en die waarschuwingen worden gegeven, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.11.2.c
    text: hoe uitvoering wordt gegeven aan artikel 24 van de richtlijn luchtkwaliteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.11
  - number: 19.12.1
    text: |-
      Bij overschrijding van alarmeringswaarden voor luchtkwaliteit of bij verontreiniging van de buitenlucht door
      stoffen waarvoor geen alarmeringswaarden zijn vastgesteld, kan de commissaris van de Koning, met het oog op het
      beschermen van de volksgezondheid of de gezondheid van bijzonder gevoelige bevolkingsgroepen, bij besluit regels
      stellen over het gebruik van installaties of brandstoffen en over andere verontreinigende activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.12
  - number: 19.12.2
    text: |-
      Deze regels kunnen in ieder geval inhouden een verbod om een installatie in werking te hebben of een brandstof
      te gebruiken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.12
  - number: 19.12.3
    text: |-
      Een besluit vervalt achtenveertig uur nadat het in werking is getreden. Deze termijn kan door gedeputeerde staten
      telkens voor ten hoogste achtenveertig uur worden verlengd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.12
    machine_readable:
      execution:
        parameters:
          - name: datum_inwerkingtreding
            type: date
            required: true
            description: Datum en tijdstip waarop het besluit in werking is getreden
          - name: aantal_verlengingen
            type: number
            required: false
            description: Aantal keren dat de termijn is verlengd door gedeputeerde staten
        output:
          - name: verval_na_uren
            type: number
            description: Aantal uren na inwerkingtreding waarop het besluit vervalt
        actions:
          - output: basis_uren
            value: 48
          - output: verlenging_uren
            value:
              operation: MULTIPLY
              values:
                - $aantal_verlengingen
                - 48
          - output: verval_na_uren
            value:
              operation: ADD
              values:
                - $basis_uren
                - $verlenging_uren
  - number: 19.12.4
    text: |-
      Een besluit als bedoeld in het eerste lid en een besluit tot verlenging als bedoeld in het derde lid worden op een
      bij algemene maatregel van bestuur te bepalen wijze bekendgemaakt. De besluiten treden in werking onmiddellijk na
      de bekendmaking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.12
  - number: 19.13.1
    text: |-
      In deze afdeling wordt onder gevaar voor waterstaatswerken verstaan: omstandigheid waardoor de goede staat van
      een waterstaatswerk onmiddellijk wordt aangetast of dreigt te worden aangetast of dit werk ernstig beschadigd of
      onbruikbaar wordt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.13
  - number: 19.13.2
    text: |-
      Deze afdeling is niet van toepassing op gevaren die het gevolg zijn van een ongeval als bedoeld in de
      [Wet bestrijding maritieme ongevallen][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037162
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.13
    references:
      - id: ref1
        bwb_id: BWBR0037162
  - number: 19.14.1
    text: |-
      De beheerder zorgt voor het houden van oefeningen om doeltreffend te kunnen optreden bij gevaar voor
      waterstaatswerken. Hij stelt voor de waterstaatswerken een calamiteitenplan vast, dat voldoet aan bij algemene
      maatregel van bestuur gestelde regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.14
  - number: 19.14.2
    text: |-
      Het calamiteitenplan wordt afgestemd op de voor het betrokken gebied vastgestelde crisisplannen,
      bedoeld in [artikel 16 van de Wet veiligheidsregio’s][ref1], en rampbestrijdingsplannen, bedoeld in
      [artikel 17 van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0027466#Artikel17
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.14
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0027466
        artikel: '17'
  - number: 19.14.3
    text: |-
      De besturen van de veiligheidsregio’s waarin de waterstaatswerken liggen, worden in de gelegenheid gesteld hun
      zienswijze over het ontwerp van het calamiteitenplan naar voren te brengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.14
  - number: 19.15.1
    text: |-
      De beheerder is bij gevaar voor waterstaatswerken, zolang de daardoor ontstane situatie dit vergt, bevoegd de
      maatregelen te treffen die hij nodig oordeelt, zo nodig in afwijking van wettelijke voorschriften, met uitzondering
      van de Grondwet of internationaalrechtelijke verplichtingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.15.2
    text: |-
      Als het waterschapsbestuur gebruikmaakt van deze bevoegdheid, meldt het dit onverwijld aan gedeputeerde staten of,
      als van deze bevoegdheid gebruik is gemaakt in verband met gevaar voor een primaire waterkering, aan Onze Minister
      van Infrastructuur en Waterstaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.15.3
    text: |-
      De beheerder brengt, zodra de feitelijke omstandigheden dat toelaten, het waterstaatswerk weer zoveel mogelijk in
      overeenstemming met de in de legger voorgeschreven staat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.15.4
    text: |-
      De beheerder zorgt voor een evaluatie van de toepassing van het eerste en derde lid en zendt een verslag van deze
      evaluatie ter kennisneming aan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.15.4.a
    text: |-
      gedeputeerde staten of, als de evaluatie betrekking heeft op een primaire waterkering, Onze Minister van
      Infrastructuur en Waterstaat,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.15.4.b
    text: de besturen van de veiligheidsregio’s waarin de waterstaatswerken zijn gelegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.15
  - number: 19.16.1
    text: |-
      Gedeputeerde staten kunnen, als naar hun oordeel een waterschapsbestuur niet of niet voldoende optreedt bij gevaar
      voor waterstaatswerken, aan dat bestuur een instructie geven als bedoeld in [artikel 2.33][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 19.16.2
    text: |-
      Als dit vanwege spoedeisende omstandigheden nodig is, kan de commissaris van de Koning die instructie geven, zolang
      het gevaar voortduurt en gedeputeerde staten van die bevoegdheid geen gebruik maken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
  - number: 19.16.3
    text: |-
      Op een instructie als bedoeld in het eerste en tweede lid is [artikel 2.36, eerste lid, aanhef en onder a][ref1],
      van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.3
        afdeling: '2.5'
  - number: 19.16.4
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan aan het waterschapsbestuur een instructie geven als bedoeld in
      [artikel 2.34][ref1] als naar zijn oordeel:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 19.16.4.a
    text: |-
      gedeputeerde staten of de commissaris van de Koning ten onrechte niet of niet voldoende gebruikmaken van de
      bevoegdheid, bedoeld in het eerste of tweede lid, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
  - number: 19.16.4.b
    text: het waterschapsbestuur niet of niet voldoende optreedt bij gevaar voor een primaire waterkering.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
  - number: 19.16.5
    text: |-
      Op een instructie als bedoeld in het vierde lid is [artikel 2.36, tweede lid, aanhef en onder a][ref1], van
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.3
        afdeling: '2.5'
  - number: 19.17.1
    text: |-
      Onverminderd de [artikelen 7, eerste lid][ref1], en
      [8, eerste lid, van de Coördinatiewet uitzonderingstoestanden][ref2] kan, als buitengewone omstandigheden dit
      noodzakelijk maken, bij koninklijk besluit, op voordracht van Onze Minister-President, [artikel 19.18][ref3] of
      [19.19][ref4] in werking worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0007981#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0007981#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
    references:
      - id: ref1
        bwb_id: BWBR0007981
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0007981
        artikel: '8'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.5'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.5'
  - number: 19.17.2
    text: |-
      Wanneer het in het eerste lid bedoelde besluit is genomen, wordt onverwijld een voorstel van wet aan de Tweede
      Kamer der Staten-Generaal gezonden over het voortduren van de werking van de bij dat besluit in werking gestelde
      regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
  - number: 19.17.3
    text: |-
      De regels die op grond van het eerste lid in werking zijn gesteld, worden bij koninklijk besluit, op voordracht van
      Onze Minister-President, onverwijld buiten werking gesteld:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
  - number: 19.17.3.a
    text: als het voorstel van wet door een van beide kamers der Staten-Generaal wordt verworpen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
  - number: 19.17.3.b
    text: zodra de omstandigheden dit toelaten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
  - number: 19.17.4
    text: |-
      Een besluit als bedoeld in het eerste en derde lid wordt op de daarin te bepalen wijze bekendgemaakt en treedt in
      werking onmiddellijk na de bekendmaking. Het besluit wordt in ieder geval geplaatst in het Staatsblad.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.17
  - number: 19.18.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties stelt in overeenstemming met Onze andere Ministers die
      het aangaat, bij ministeriële regeling vast aan welke projecten bij schaarste aan arbeidskrachten, geldmiddelen of
      materialen uitvoering kan worden gegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.18
  - number: 19.18.2
    text: |-
      Bij de regeling kunnen regels worden gesteld over, en zo nodig in afwijking van, het bepaalde bij of krachtens de
      [hoofdstukken 4][ref1] en [5][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '5'
  - number: 19.18.3
    text: |-
      Bij de regeling kan worden bepaald dat het verboden is een project uit te voeren zonder toestemming van Onze
      Minister van Binnenlandse Zaken en Koninkrijksrelaties en, voor zover van toepassing, van Onze andere Ministers die
      het aangaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.18
  - number: '19.19'
    text: |-
      Onze Minister van Defensie stelt bij regeling vast welke voor de uitoefening van defensietaken vereiste
      activiteiten worden verricht, waarbij voor zover noodzakelijk de bij of krachtens deze wet gestelde regels over het
      verrichten van die activiteiten buiten toepassing blijven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel19.19
  - number: 20.1.1
    text: |-
      Voor elke vastgestelde omgevingswaarde en alarmeringswaarde wordt de staat of kwaliteit van de fysieke
      leefomgeving, de belasting door activiteiten of de concentratie of depositie van stoffen in de fysieke leefomgeving
      door monitoring bewaakt. Daarbij wordt beoordeeld of aan die omgevingswaarde of alarmeringswaarde wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.1
  - number: 20.1.2
    text: |-
      Voor een op grond van [paragraaf 3.2.4][ref1] opgesteld programma worden de voortgang, uitvoering en het doelbereik
      van het programma door monitoring bewaakt. Daarbij wordt specifiek aandacht geschonken aan de eisen die in
      [artikel 3.17][ref2] aan het programma worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 20.1.3
    text: |-
      Bij omgevingsplan en, met inachtneming van de grenzen van [artikel 2.3][ref1], bij omgevingsverordening of
      algemene maatregel van bestuur kunnen andere parameters dan omgevingswaarden voor de staat of kwaliteit van de
      fysieke leefomgeving, de belasting door activiteiten of de concentratie of depositie van stoffen in de fysieke
      leefomgeving worden aangewezen die door monitoring worden bewaakt en dienen als referentiepunt voor de beoordeling
      daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 20.1.4
    text: |-
      Bij algemene maatregel van bestuur kunnen onderdelen van de natuur worden aangewezen waarvan de staat van
      instandhouding door monitoring wordt bewaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.1
  - number: 20.2.1
    text: |-
      Bij het omgevingsplan, de omgevingsverordening of de algemene maatregel van bestuur tot vaststelling van een
      omgevingswaarde, aanwijzing van een programma als bedoeld in [artikel 3.15, tweede, derde of vierde lid][ref1],
      of aanwijzing van een andere parameter of onderdeel van de natuur worden de methode van monitoring en het
      bestuursorgaan dat of de andere instantie die met de uitvoering van de monitoring is belast aangewezen. Voor een in
      deze wet vastgestelde omgevingswaarde vindt de aanwijzing plaats bij algemene maatregel van bestuur.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 20.2.2
    text: Bij ministeriële regeling wordt voor alarmeringswaarden de methode van monitoring aangewezen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is voor alarmeringswaarden belast met de uitvoering van de
      monitoring.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.4
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat een of meer daarbij aangewezen bestuursorganen een
      monitoringsprogramma vaststellen. Daarbij kan worden bepaald dat het monitoringsprogramma de methode van monitoring
      en de wijze van verstrekking van voor de monitoring relevante gegevens bevat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.5
    text: |-
      Bij het omgevingsplan, de omgevingsverordening of de algemene maatregel van bestuur tot aanwijzing van een
      programma als bedoeld in [artikel 3.15, tweede, derde of vierde lid][ref1], wordt ook de frequentie van de
      monitoring bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 20.2.6
    text: |-
      In afwijking van het eerste lid worden voor geluidproductieplafonds als omgevingswaarden de methode van monitoring
      en het bestuursorgaan dat of de andere instantie die met de uitvoering van de monitoring is belast aangewezen bij
      algemene maatregel van bestuur.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.7
    text: |-
      Bij het omgevingsplan, de omgevingsverordening, de algemene maatregel van bestuur of de ministeriële regeling
      kunnen regels worden gesteld over het verzamelen en verstrekken van voor de monitoring relevante gegevens door
      daarbij aangewezen bestuursorganen aan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.7.a
    text: |-
      de op grond van het eerste en zesde lid aangewezen bestuursorganen of andere instanties die met de uitvoering zijn
      belast,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.7.b
    text: Onze Minister van Infrastructuur en Waterstaat,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.7.c
    text: de bevoegde autoriteiten van andere staten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.2.7.d
    text: de Europese Commissie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.2
  - number: 20.3.1
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld over de uitvoering van de monitoring voor
      omgevingswaarden als bedoeld in de [artikelen 2.11a][ref1], [2.12a, eerste lid][ref2], [2.13, eerste lid][ref3],
      en [2.13a, eerste lid][ref4], en [paragraaf 2.3.4][ref5], alarmeringswaarden, op grond van
      [artikel 20.1, derde of vierde lid][ref6], bij algemene maatregel van bestuur aangewezen andere parameters of
      onderdelen van de natuur en, met inachtneming van de grenzen van [artikel 2.3, derde lid][ref7], omgevingswaarden
      als bedoeld in de [artikelen 2.11][ref8] en [2.12][ref9].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk2
