        artikel: 232d
      - id: ref11
        bwb_id: BWBR0005645
        artikel: 232e
      - id: ref12
        bwb_id: BWBR0005645
        artikel: 232f
      - id: ref13
        bwb_id: BWBR0005645
        artikel: 232h
  - number: 13.10.2
    text: De omgeslagen kosten worden geheven bij wege van aanslag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
  - number: 13.10.3
    text: |-
      Als de over een eigenaar omgeslagen kosten geringer zijn dan een bij provinciale verordening vast te stellen
      bedrag, worden deze kosten niet geheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
  - number: 13.10.4
    text: |-
      Als voor eenzelfde onroerende zaak twee of meer eigenaren kostenplichtig zijn en het derde lid op geen van hen van
      toepassing is, kan de belastingaanslag op naam van een van hen worden gesteld. In dat geval kan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
  - number: 13.10.4.a
    text: |-
      de ontvanger de aanslag op de gehele onroerende zaak verhalen op degene op wiens naam de belastingaanslag is
      gesteld, zonder rekening te houden met de rechten van de overige kostenplichtigen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
  - number: 13.10.4.b
    text: |-
      de kostenplichtige die de belastingaanslag heeft voldaan, wat hij meer heeft voldaan dan overeenkomt met zijn
      kostenplicht verhalen op de overige kostenplichtigen naar evenredigheid van ieders kostenplicht, tenzij bij
      overeenkomst een afwijkende regeling is getroffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
  - number: 13.10.5
    text: |-
      Bezwaar en beroep als bedoeld in [hoofdstuk V, afdeling 1][ref1] of
      [afdeling 2, van de Algemene wet inzake rijksbelastingen][ref2], kunnen niet de hoogte van de omgeslagen kosten
      betreffen.


      [ref1]: https://wetten.overheid.nl/BWBR0002320#Afdeling1
      [ref2]: https://wetten.overheid.nl/BWBR0002320#Afdeling2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
    references:
      - id: ref1
        bwb_id: BWBR0002320
        afdeling: '1'
      - id: ref2
        bwb_id: BWBR0002320
        afdeling: '2'
  - number: 13.10.6
    text: |-
      [Artikel 17, tweede lid, tweede zin, van de Invorderingswet 1990][ref1] blijft buiten toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004770#Artikel17
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
    references:
      - id: ref1
        bwb_id: BWBR0004770
        artikel: '17'
  - number: 13.11.1
    text: |-
      Op degene die bij algemene maatregel van bestuur aan te wijzen bouwactiviteiten of activiteiten met het oog op het
      gebruik op grond van een nieuw toegedeelde functie verricht, verhaalt het bestuursorgaan de kosten die het vanwege
      bij die maatregel aangewezen kostensoorten maakt, voor zover:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.11
  - number: 13.11.1.a
    text: de kostensoorten toerekenbaar zijn aan het kostenverhaalsgebied, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.11
  - number: 13.11.1.b
    text: de kosten proportioneel zijn in verhouding tot het profijt dat het kostenverhaalsgebied van de kostensoorten heeft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.11
  - number: 13.11.2
    text: |-
      Bij algemene maatregel van bestuur wordt bepaald in welke gevallen het bestuursorgaan kan besluiten om de kosten
      niet te verhalen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.11
  - number: '13.12'
    text: |-
      Het is verboden een op grond van [artikel 13.11, eerste lid][ref1], aangewezen activiteit te verrichten, voordat de
      op grond van deze afdeling verschuldigde kosten zijn betaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.13.1
    text: |-
      De rechtspersoon waarvan het bestuursorgaan een orgaan is, kan met degene die kosten is verschuldigd een
      overeenkomst aangaan over kostenverhaal.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.13
  - number: 13.13.2
    text: |-
      Bij de overeenkomst kan worden bepaald dat de betaling geheel of gedeeltelijk na aanvang van de activiteit
      plaatsvindt, mits aan de overeenkomst voorwaarden worden verbonden over het stellen van aanvullende zekerheden voor
      de betaling. In dat geval geldt het verbod, bedoeld in [artikel 13.12][ref1], niet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.13.3
    text: |-
      [Paragraaf 13.6.3][ref1] is niet van toepassing voor zover het verhalen van kosten als bedoeld in
      [artikel 13.11, eerste lid][ref2], is verzekerd vanwege een overeenkomst als bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.14.1
    text: 'In het omgevingsplan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.a
    text: |-
      worden kostenverhaalsgebieden aangewezen waarvoor de kosten, bedoeld in [artikel 13.11, eerste lid][ref1], worden
      gemaakt,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.14.1.b
    text: |-
      wordt per kostenverhaalsgebied bepaald welke kostensoorten waarvan het gebied ten dele profijt heeft, naar
      evenredigheid aan dat kostenverhaalsgebied worden toegerekend,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.c
    text: wordt per kostenverhaalsgebied een raming van de kosten opgenomen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.d
    text: wordt per kostenverhaalsgebied een raming van de opbrengsten van alle daarin gelegen gronden opgenomen, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.e
    text: 'worden per kostenverhaalsgebied regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.e.1°
    text: de verdeling van de kosten over de activiteiten, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.1.e.2°
    text: de eindafrekening van de kosten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.2
    text: |-
      Als de te verhalen kosten, verminderd met de door het bestuursorgaan ontvangen of te ontvangen bijdragen en
      subsidies van derden, hoger zijn dan de opbrengsten van de gronden binnen het kostenverhaalsgebied, kan het
      bestuursorgaan die kosten slechts verhalen tot ten hoogste het bedrag van die opbrengsten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.3
    text: 'Het eerste en tweede lid zijn van overeenkomstige toepassing op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.3.a
    text: |-
      een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit, voor zover sprake is van een activiteit die
      in strijd is met een in het omgevingsplan aan een locatie toegedeelde functie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.14.3.b
    text: een projectbesluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.14
  - number: 13.15.1
    text: |-
      Als voor een kostenverhaalsgebied in een omgevingsplan geen tijdvak voor de uitvoering van de werken, werkzaamheden
      en maatregelen en de activiteiten is vastgesteld, is [artikel 13.14, eerste lid][ref1], van overeenkomstige
      toepassing, met dien verstande dat:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.15.1.a
    text: |-
      de in [artikel 13.14, eerste lid, onder c][ref1], bedoelde raming kan inhouden dat alleen het maximum van de
      globaal te verhalen kosten als geheel per kostenverhaalsgebied wordt opgenomen, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.15.1.b
    text: |-
      [artikel 13.14, onder d][ref1], buiten toepassing kan blijven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.15.2
    text: 'Bij toepassing van het eerste lid:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
  - number: 13.15.2.a
    text: |-
      houdt de verdeling, bedoeld in [artikel 13.14, eerste lid, onder e][ref1], onder 1o, ook in dat per activiteit het
      maximum van de te verhalen kosten wordt opgenomen, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.15.2.b
    text: |-
      is [artikel 13.14, tweede lid][ref1], niet van toepassing en geldt in plaats daarvan dat de kosten worden verhaald
      tot ten hoogste het bedrag van de waardevermeerdering van de locatie waar de activiteit wordt verricht, die
      optreedt of zal optreden als gevolg van de activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.15.3
    text: |-
      Bij het op grond van [artikel 13.11, eerste lid][ref1], aanhef, bij algemene maatregel van bestuur aanwijzen van
      kostensoorten kan onderscheid worden gemaakt tussen kostenverhaalsgebieden waarvoor wel een tijdvak en die waarvoor
      geen tijdvak voor de uitvoering van de werken, werkzaamheden en maatregelen en de activiteiten is opgenomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: '13.16'
    text: |-
      De verschuldigde geldsom wordt berekend door de kosten over de activiteiten te verdelen naar rato van de
      opbrengsten van de gronden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.16
  - number: 13.17.1
    text: |-
      De opbrengsten, bedoeld in [artikel 13.14, tweede lid][ref1], de waardevermeerdering,
      bedoeld in [artikel 13.15, tweede lid][ref2], en de inbrengwaarde van de gronden, bedoeld in
      [artikel 13.18, tweede lid, onder a][ref3], worden geraamd op basis van objectief bepaalbare maatstaven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.17.2
    text: Bij algemene maatregel van bestuur worden nadere regels gesteld over de in het eerste lid bedoelde ramingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.17
  - number: 13.18.1
    text: |-
      Als er geen overeenkomst is aangegaan, wordt de verschuldigde geldsom door het college van burgemeesters en
      wethouders, gedeputeerde staten of Onze Minister die het aangaat bij beschikking vastgesteld volgens hetgeen
      daarover is bepaald in of op grond van deze wet en in het omgevingsplan, de omgevingsvergunning, bedoeld in
      [artikel 13.14, derde lid, onder a][ref1], of het projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.18.2
    text: |-
      Als toepassing is gegeven aan [artikel 13.14][ref1] worden in mindering gebracht:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.18.2.a
    text: de inbrengwaarde van de gronden waarop de aanvraag betrekking heeft, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.18
  - number: 13.18.2.b
    text: |-
      de kosten die door de aanvrager zijn gemaakt, voor zover die kosten gelijk zijn aan of lager zijn dan de raming van
      de kosten in het omgevingsplan, de omgevingsvergunning, bedoeld in [artikel 13.14, derde lid, onder a][ref1], of
      het projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.18.3
    text: |-
      Als toepassing is gegeven aan [artikel 13.15][ref1], bevat de beschikking een raming van de kosten en van de
      waardevermeerdering waarop de verschuldigde geldsom is gebaseerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.19.1
    text: |-
      Bij de beschikking kan worden bepaald dat de betaling geheel of gedeeltelijk na aanvang van de activiteit
      plaatsvindt, mits aan de beschikking voorschriften worden verbonden over het stellen van aanvullende zekerheden
      voor de betaling van de verschuldigde geldsom. Het verbod, bedoeld in [artikel 13.12][ref1], geldt dan niet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.19.2
    text: Bij het uitblijven van betaling kan het bestuursorgaan de verschuldigde geldsom invorderen bij dwangbevel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.19
  - number: 13.20.1
    text: |-
      De regeling voor de eindafrekening, bedoeld in [artikel 13.14, eerste lid, onder e, onder 2][ref1], leidt er niet
      toe dat er een aanvullende geldsom is verschuldigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.20.2
    text: |-
      Als een opnieuw berekende geldsom meer dan vijf procent lager is dan de op grond van de beschikking betaalde
      geldsom, betaalt het bestuursorgaan binnen vier weken na de eindafrekening het verschil, voor zover het groter is
      dan vijf procent, naar evenredigheid terug met rente.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
  - number: 13.20.3
    text: |-
      Als toepassing is gegeven aan [artikel 13.15][ref1] en de opnieuw berekende geldsom is gebaseerd op
      andere kosten dan de kosten waarop de bij beschikking vastgestelde verschuldigde geldsom op grond van
      [artikel 13.18, derde lid][ref2], is gebaseerd, vindt geen terugbetaling plaats voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.20.3.a
    text: |-
      de kosten vanwege de in [artikel 13.11, eerste lid][ref1], bedoelde kostensoorten zijn gemaakt, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.20.3.b
    text: |-
      het maximum, bedoeld in [artikel 13.15, eerste lid, onder a][ref1], niet wordt overschreden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.20.4
    text: |-
      Op verzoek van een belanghebbende heeft eindafrekening van een locatie plaats als dat verzoek ten minste vijf jaar
      na betaling van de verschuldigde geldsom wordt gedaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
  - number: 13.20.5
    text: De eindafrekeningen, bedoeld in het vierde lid, kunnen jaarlijks op hetzelfde tijdstip plaatshebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
  - number: 13.20.6
    text: |-
      Bij algemene maatregel van bestuur worden nadere regels gesteld over een eindafrekening als bedoeld in het derde
      lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.20
  - number: '13.21'
    text: |-
      Bij regeling van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties worden regels gesteld over de hoogte
      en de begrenzing van een of meer van de kostensoorten. Daarbij kan onderscheid worden gemaakt naar het type locatie
      en de aard en omvang van de activiteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.21
  - number: 13.22.1
    text: |-
      Het college van burgemeester en wethouders, gedeputeerde staten of Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties kunnen in een overeenkomst over bij algemene maatregel van bestuur aangewezen activiteiten
      bepalingen opnemen over financiële bijdragen voor ontwikkelingen van een gebied op basis van een omgevingsvisie
      of programma.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.22
  - number: 13.22.2
    text: |-
      Op de overeenkomst is [artikel 16.138][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        afdeling: '16.13'
  - number: 13.23.1
    text: |-
      Bij algemene maatregel van bestuur kunnen categorieën ontwikkelingen ter verbetering van de kwaliteit van de
      fysieke leefomgeving worden aangewezen waarvoor in een omgevingsplan kan worden bepaald dat een financiële bijdrage
      wordt verhaald op degene die een activiteit als bedoeld in [artikel 13.11][ref1] verricht, voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.1
        afdeling: '13.6'
  - number: 13.23.1.a
    text: er een functionele samenhang tussen de activiteit en de beoogde ontwikkelingen is, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.1.b
    text: de bekostiging van de ontwikkelingen niet anderszins is verzekerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.2
    text: |-
      Het omgevingsplan bepaalt dat financiële bijdragen alleen worden besteed aan ontwikkelingen waarvoor die bijdragen
      zijn verhaald en voorziet erin dat periodiek aan het publiek verantwoording wordt afgelegd over de besteding van de
      verhaalde financiële bijdragen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.3
    text: 'Het bedrag dat ten hoogste aan financiële bijdragen kan worden verhaald is in ieder geval niet hoger dan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.3.a
    text: |-
      de opbrengsten, bedoeld in [artikel 13.14, tweede lid][ref1], van de gronden waarop de activiteiten worden
      verricht, verminderd met de inbrengwaarde, bedoeld in [artikel 13.18, tweede lid, onder a][ref2], als het gaat om
      activiteiten waarvoor een kostenverhaalsgebied met tijdvak is aangewezen, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.5'
  - number: 13.23.3.b
    text: |-
      de waardevermeerdering, bedoeld in [artikel 13.15, tweede lid, onder b][ref1], als het gaat om activiteiten
      waarvoor een kostenverhaalsgebied zonder tijdvak is aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.23.4
    text: 'Bij algemene maatregel van bestuur kunnen regels worden gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.4.a
    text: de maximale hoogte van de financiële bijdrage, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.4.b
    text: de eindafrekening van financiële bijdragen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: 13.23.5
    text: |-
      In een omgevingsvisie of programma kan voor de locatie waar de activiteit wordt verricht een onderbouwing van de
      functionele samenhang, bedoeld in het eerste lid, onder a, worden vastgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.23
  - number: '13.24'
    text: |-
      Een financiële bijdrage als bedoeld in [artikel 13.23][ref1] wordt vastgesteld bij de beschikking, bedoeld in
      [artikel 13.18, eerste lid][ref2], volgens hetgeen daarover in het omgevingsplan is bepaald, voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
