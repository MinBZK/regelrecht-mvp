  - number: 3.18.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op een programma als bedoeld in de
      [artikelen 3.8, derde lid][ref1], en [3.9, derde en vierde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.18
