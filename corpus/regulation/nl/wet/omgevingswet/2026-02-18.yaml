  - number: 2.23.4
    text: Bij de regels kan een termijn worden gesteld waarbinnen uitvoering moet zijn gegeven aan de regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.23
  - number: 2.23.5
    text: |-
      Bij de regels wordt bepaald in welke gevallen en onder welke voorwaarden van de regels kan worden afgeweken als de
      toepassing van de regels niet toereikend is voor, of in de weg staat aan, het bereiken van de doelen van de wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.23
  - number: 2.24.1
    text: |-
