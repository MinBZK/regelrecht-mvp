    text: |-
      Bij algemene maatregel van bestuur worden met het oog op een doelmatig waterbeheer voor wateractiviteiten gevallen
      aangewezen waarin het dagelijks bestuur van het waterschap, gedeputeerde staten of Onze Minister van Infrastructuur
      en Waterstaat op de aanvraag beslissen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.9
  - number: 5.9a
    text: De korpschef beslist op de aanvraag om een omgevingsvergunning voor een jachtgeweeractiviteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.9a
  - number: 5.10.1
    text: |-
      Bij algemene maatregel van bestuur worden voor de volgende activiteiten gevallen aangewezen waarin gedeputeerde
      staten op de aanvraag beslissen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.a
    text: omgevingsplanactiviteiten van provinciaal belang,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.b
    text: 'ontgrondingsactiviteiten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.b.1°
    text: in het winterbed van een tot de rijkswateren behorende rivier,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.b.2°
    text: buiten de rijkswateren,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.c
    text: 'milieubelastende activiteiten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.c.1°
    text: met betrekking tot een ippc-installatie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.c.2°
    text: met betrekking tot een andere milieubelastende installatie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.c.3°
    text: waarop de Seveso-richtlijn van toepassing is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.c.4°
    text: die gevolgen hebben of kunnen hebben voor het grondwater,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.d
    text: 'beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.d.1°
    text: burgerluchthavens van regionale betekenis,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.d.2°
    text: lokale spoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.e
    text: Natura 2000-activiteiten en flora- en fauna-activiteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
  - number: 5.10.1.f
    text: |-
      activiteiten als bedoeld in [artikel 5.4][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.10.2
    text: |-
      Bij de aanwijzing van gevallen worden de grenzen van [artikel 2.3, tweede lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.10.3
    text: |-
      In afwijking van het eerste lid, aanhef en onder d, aanhef en onder 2°, worden, als op grond van
      [artikel 20, derde lid, van de Wet personenvervoer 2000 ][ref1]een gebied is aangewezen, bij algemene maatregel
      van bestuur gevallen aangewezen waarin het dagelijks bestuur van het openbaar lichaam, bedoeld in laatstbedoeld
      lid, beslist op de aanvraag om een omgevingsvergunning voor een beperkingengebiedactiviteit met betrekking tot een
      lokale spoorweg in dat gebied.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 5.11.1
    text: |-
      Bij algemene maatregel van bestuur worden voor de volgende activiteiten gevallen aangewezen waarin een van Onze
      daarbij aangewezen Ministers op de aanvraag beslist:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.a
    text: omgevingsplanactiviteiten van nationaal belang,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.b
    text: rijksmonumentenactiviteiten met betrekking tot een archeologisch monument,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.c
    text: |-
      ontgrondingsactiviteiten in de rijkswateren, met uitzondering van de gevallen, bedoeld in
      [artikel 5.10, eerste lid, onder b, onder 1°][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11.1.d
    text: 'milieubelastende activiteiten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.d.1°
    text: met betrekking tot een mijnbouwwerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.d.2°
    text: waarbij nationale veiligheidsbelangen of andere vitale nationale belangen zijn betrokken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.d.3°
    text: als het gaat om het op of in de bodem brengen van meststoffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.e
    text: mijnbouwlocatieactiviteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.f
    text: 'beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.f.1°
    text: wegen in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.f.2°
    text: andere luchthavens dan burgerluchthavens van regionale betekenis,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.f.3°
    text: hoofdspoorwegen en bijzondere spoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.f.4°
    text: mijnbouwinstallaties in een waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.g
    text: Natura 2000-activiteiten en flora- en fauna-activiteiten van nationaal belang,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.h
    text: 'activiteiten die niet vallen onder de onderdelen a tot en met g en die geheel of in hoofdzaak plaatsvinden in:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.h.1°
    text: de territoriale zee voor zover gelegen buiten het provinciaal en gemeentelijk ingedeelde gebied,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.h.2°
    text: de exclusieve economische zone,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.1.i
    text: een valkeniersactiviteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
  - number: 5.11.2
    text: |-
      Bij de aanwijzing van gevallen worden de grenzen van [artikel 2.3, derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.11.3
    text: |-
      In afwijking van de [artikelen 5.8][ref1], [5.10][ref2] en [5.13][ref3] en van het eerste lid kan Onze Minister van
      Infrastructuur en Waterstaat in andere gevallen dan bedoeld in het eerste lid, onder d, onder 2°, beslissen op een
      aanvraag om een omgevingsvergunning als dat nodig is voor nationale veiligheidsbelangen of andere vitale nationale
      belangen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.12.1
    text: |-
      Op de aanvraag om een omgevingsvergunning die betrekking heeft op meer dan een activiteit wordt
      beslist door een bestuursorgaan dat op grond van [artikel 5.8][ref1], [5.9][ref2], [5.10][ref3] of
      [5.11, eerste lid, aanhef en onder a tot en met h][ref4], voor ten minste een van die activiteiten bevoegd zou zijn
      op een aanvraag te beslissen. Hierbij worden de volgende leden in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.12.2
    text: |-
      Als het college van burgemeester en wethouders een bestuursorgaan is als bedoeld in het eerste lid, beslist het
      college op de aanvraag, tenzij bij algemene maatregel van bestuur een ander van de betrokken bestuursorganen wordt
      aangewezen. Bij die aanwijzing worden de grenzen van [artikel 2.3][ref1] in acht genomen. Bij die maatregel kan,
      in afwijking van het eerste lid en met inachtneming van de grenzen van artikel 2.3, ook een ander bestuursorgaan
      dan een van de betrokken bestuursorganen worden aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.12.3
    text: |-
      In andere gevallen dan bedoeld in het tweede lid, wordt op de aanvraag beslist door het betrokken bestuursorgaan
      dat bij algemene maatregel van bestuur wordt aangewezen. Bij die maatregel kan, in afwijking van het eerste lid
      en met inachtneming van de grenzen van [artikel 2.3][ref1], ook een ander bestuursorgaan dan een van de betrokken
      bestuursorganen worden aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.12.4
    text: |-
      In afwijking van het eerste tot en met derde lid en van [artikel 5.13][ref1] kan Onze Minister van Infrastructuur
      en Waterstaat op de aanvraag beslissen als dat nodig is voor nationale veiligheidsbelangen of andere vitale
      nationale belangen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.13.1
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin gedeputeerde staten of Onze Minister
      die het aangaat beslissen op elke aanvraag om een omgevingsvergunning die betrekking heeft op een locatie waarvoor
      een door hen eerder verleende omgevingsvergunning geldt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.13
  - number: 5.13.2
    text: |-
      Het eerste lid is niet van toepassing als de aanvraag om een omgevingsvergunning betrekking heeft op een activiteit
      als bedoeld in [artikel 5.9][ref1] of [5.9a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.14'
    text: |-
      Als een aanvraag om een omgevingsvergunning betrekking heeft op een activiteit die op het grondgebied van meer
      dan een gemeente, waterschap of provincie plaatsvindt, wordt op die aanvraag beslist door het daarvoor op grond
      van [artikel 5.8][ref1], [5.9][ref2], [5.10][ref3], [5.12][ref4] of [5.13][ref5] aangewezen bestuursorgaan van de
      gemeente, het waterschap of de provincie waar de activiteit in hoofdzaak zal worden verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref5
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.15'
    text: |-
      Het bestuursorgaan dat bevoegd is om op een aanvraag om een omgevingsvergunning te beslissen, is ook bevoegd tot
      toepassing van [paragraaf 5.1.5][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.16.1
    text: |-
      Een bestuursorgaan dat bevoegd is om op een aanvraag om een omgevingsvergunning te beslissen of bevoegd is tot
      toepassing van [paragraaf 5.1.5][ref1], kan die bevoegdheid aan een ander bestuursorgaan overdragen, als dat
      bestuursorgaan daarmee instemt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.16.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de toepassing van het eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.16
  - number: 5.18.1
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over het verlenen of weigeren van een omgevingsvergunning
      voor een activiteit als bedoeld in [artikel 5.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: activiteit_type
            type: string
            required: true
        input:
          - name: voldoet_aan_beoordelingsregels
            type: boolean
            source: {}
        output:
          - name: omgevingsvergunning_verleend
            type: boolean
        actions:
          - output: omgevingsvergunning_verleend
            value: $voldoet_aan_beoordelingsregels
  - number: 5.18.2
    text: Daarbij kunnen regels worden gesteld over de motivering van de beslissing tot het verlenen of weigeren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.18
  - number: 5.18.3
    text: |-
      [Artikel 2.32, tweede tot en met zesde lid][ref1], is van overeenkomstige toepassing op die regels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 5.19.1
    text: |-
      Bij omgevingsverordening kunnen regels worden gesteld over het verlenen of weigeren van een omgevingsvergunning
      voor een milieubelastende activiteit, tenzij het gaat om een op grond van [artikel 5.26, vierde lid][ref1],
      aangewezen geval.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.19.2
    text: |-
      Bij het stellen van de regels worden de grenzen van [artikel 2.3, tweede lid][ref1], in acht genomen.
      [Artikel 2.32, eerste, vijfde en zesde lid][ref2], is van overeenkomstige toepassing op die regels, waarbij een
      verzoek als bedoeld in artikel 2.32, eerste lid, ook door Onze Minister die het aangaat kan worden gedaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 5.20.1
    text: |-
      Voor een bouwactiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.20.1.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.20
  - number: 5.20.1.b
    text: het beschermen van de gezondheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.20
  - number: 5.20.1.c
    text: duurzaamheid en bruikbaarheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.20
  - number: 5.20.2
    text: |-
      De regels strekken ertoe dat de omgevingsvergunning alleen wordt verleend als aannemelijk is dat wordt voldaan
      aan de regels over bouwactiviteiten, bedoeld in [artikel 4.3, eerste lid, aanhef en onder a][ref1], of daarover
      gestelde maatwerkregels, voor zover die regels betrekking hebben op de kwaliteit van bouwwerken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 5.21.1
    text: |-
      Voor een omgevingsplanactiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op de
      doelen van de wet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.21.2
    text: 'De regels strekken er in ieder geval toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
  - number: 5.21.2.a
    text: de omgevingsvergunning wordt verleend met toepassing van daarvoor in het omgevingsplan gestelde regels,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
  - number: 5.21.2.b
    text: de omgevingsvergunning ook kan worden verleend met het oog op een evenwichtige toedeling van functies aan locaties,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
  - number: 5.21.2.c
    text: |-
      op de beslissing of de omgevingsvergunning in een geval als bedoeld onder b kan worden verleend als het gaat
      om een omgevingsplanactiviteit anders dan van provinciaal of nationaal belang geheel en als het gaat om een
      omgevingsplanactiviteit van provinciaal of nationaal belang gedeeltelijk van overeenkomstige toepassing zijn:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
  - number: 5.21.2.c.1°
    text: |-
      de op grond van de [artikelen 2.22][ref1] en [2.24][ref2] gestelde regels over omgevingsplannen,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 5.21.2.c.2°
    text: |-
      de op grond van de [artikelen 2.33][ref1] en [2.34][ref2] gegeven instructies over omgevingsplannen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 5.21.3
    text: |-
      De regels, bedoeld in het tweede lid, aanhef en onder c, onder 1°, strekken er ook toe dat als in een op grond van
      [artikel 2.22][ref1] gestelde regel toepassing is gegeven aan [artikel 2.32, eerste lid][ref2], een verzoek als
      bedoeld in laatstbedoeld lid ook kan worden gedaan door Onze Minister die het aangaat.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 5.21.4
    text: Van het tweede lid kan worden afgeweken voor een omgevingsplanactiviteit die betrekking heeft op een maatwerkregel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.21
  - number: '5.22'
    text: |-
      Voor een rijksmonumentenactiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op het
      behoud van cultureel erfgoed en in dat kader tot:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.22.a
    text: het voorkomen van ontsiering, beschadiging, sloop of verplaatsing van monumenten en archeologische monumenten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.22
  - number: 5.22.b
    text: |-
      het bevorderen van het gebruik van monumenten, zo nodig door wijziging van die monumenten, rekening houdend met de
      monumentale waarden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.22
  - number: 5.22.c
    text: het conserveren en in stand houden van archeologische monumenten, bij voorkeur in situ.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.22
  - number: '5.23'
    text: |-
      Voor een ontgrondingsactiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op de
      doelen van de wet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.24.1
    text: |-
      Voor een wateractiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.24.1.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.24.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.24.1.c
    text: het vervullen van maatschappelijke functies door watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.24.1.d
    text: het beschermen van de doelmatige werking van een zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.24.2
    text: |-
      Op het stellen van de regels voor lozingsactiviteiten op een oppervlaktewaterlichaam en lozingsactiviteiten op een
      zuiveringtechnisch werk is [artikel 4.23, tweede lid][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: 5.24.3
    text: |-
      Voor een stortingsactiviteit op zee worden de regels ook gesteld ter uitvoering van het Londen-protocol en het
      Ospar-verdrag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.24.4
    text: |-
      In afwijking van het eerste lid worden de regels voor een beperkingengebiedactiviteit met betrekking tot een
      waterstaatswerk, voor zover die plaatsvindt buiten het provinciaal en gemeentelijk ingedeelde gebied, gesteld met
      het oog op de doelen van de wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.24
  - number: 5.26.1
    text: |-
      Voor een milieubelastende activiteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op het
      waarborgen van de veiligheid, het beschermen van de gezondheid en het beschermen van het milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.26.2
    text: |-
      Op het stellen van deze regels is [artikel 4.22][ref1], tweede lid, van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: 5.26.3
    text: |-
      Ook strekken deze regels ertoe dat op de beslissing of de omgevingsvergunning kan worden verleend van toepassing
      zijn de op grond van [artikel 5.19, eerste lid][ref1], in de omgevingsverordening gestelde regels over het verlenen
      of weigeren van een omgevingsvergunning voor een milieubelastende activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.26.4
    text: |-
      In afwijking van het tweede lid strekken de regels voor daartoe bij algemene maatregel van bestuur aangewezen
      gevallen van milieubelastende activiteiten er alleen toe dat de beoordeling of sprake is van aanzienlijke
      milieueffecten, bedoeld in [artikel 16.43, tweede lid][ref1], plaatsvindt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 5.27.1
    text: |-
      Voor een mijnbouwlocatieactiviteit worden de regels, bedoeld in [artikel 5.18][ref1], gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.27.1.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.27
  - number: 5.27.1.b
    text: een evenwichtige toedeling van functies aan locaties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.27
  - number: 5.27.2
    text: |-
      Op het stellen van deze regels is [artikel 4.24, tweede lid, en derde lid, aanhef en onder b][ref1], van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: '5.28'
    text: 'Voor een beperkingengebiedactiviteit met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.28
  - number: 5.28.a
    text: een weg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.28
  - number: 5.28.b
    text: een luchthaven,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.28
  - number: 5.28.c
    text: een spoorweg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.28
  - number: 5.28.d
    text: een mijnbouwinstallatie in een waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.28
  - number: 5.29.1
    text: |-
      Voor een Natura 2000-activiteit en een flora- en fauna-activiteit worden de regels, bedoeld in
      [artikel 5.18][ref1], gesteld met het oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.29
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.29.2
    text: |-
      Deze regels strekken in ieder geval tot uitvoering van artikel 6, tweede, derde en vierde lid, en artikel 16 van de
      habitatrichtlijn en artikel 9 van de vogelrichtlijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.29
  - number: 5.29.3
    text: |-
      De regels kunnen ertoe strekken dat de omgevingsvergunning alleen wordt verleend als geregistreerde
      stikstofdepositieruimte aan de Natura 2000-activiteit wordt toegedeeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.29
  - number: 5.29a
    text: |-
      Voor een jachtgeweeractiviteit of een valkeniersactiviteit worden de regels, bedoeld in [artikel 5.18][ref1],
      gesteld met het oog op de natuurbescherming of de veiligheid.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.29a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: '5.30'
    text: |-
      Voor zover de aanvraag betrekking heeft op een activiteit als bedoeld in [artikel 5.3][ref1] of [5.4][ref2],
      kan de omgevingsvergunning alleen worden verleend of geweigerd op de gronden die zijn bepaald in de
      waterschapsverordening respectievelijk de omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.31.1
    text: |-
      Het bevoegd gezag kan de omgevingsvergunning weigeren in het geval en onder de voorwaarden, bedoeld in
      [artikel 3 van de Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref1], voor zover de
      aanvraag betrekking heeft op:


      [ref1]: https://wetten.overheid.nl/BWBR0013798#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0013798
        artikel: '3'
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: AFWIJZING
        parameters:
          - name: activiteit_type
            type: string
            required: true
            description: Het type activiteit waarvoor de omgevingsvergunning is aangevraagd
            source: {}
          - name: bibob_weigering_van_toepassing
            type: boolean
            required: true
            description: Of het geval en de voorwaarden bedoeld in artikel 3 Wet Bibob van toepassing zijn
            source: {}
        output:
          - name: bibob_activiteit_in_scope
            type: boolean
            description: Of de activiteit binnen de reikwijdte van de Bibob-weigeringsgrond valt
          - name: mag_weigeren_op_grond_van_bibob
            type: boolean
            description: Of het bevoegd gezag de omgevingsvergunning kan weigeren op grond van Bibob
        actions:
          - output: bibob_activiteit_in_scope
            value:
              operation: IN
              subject: $activiteit_type
              values:
                - bouwactiviteit
                - omgevingsplanactiviteit
                - milieubelastende_activiteit
                - activiteit_artikel_5_3
          - output: mag_weigeren_op_grond_van_bibob
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $bibob_activiteit_in_scope
                  value: true
                - operation: EQUALS
                  subject: $bibob_weigering_van_toepassing
                  value: true
  - number: 5.31.1.a
    text: een bouwactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
  - number: 5.31.1.b
    text: een omgevingsplanactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
  - number: 5.31.1.c
    text: een milieubelastende activiteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
  - number: 5.31.1.d
    text: |-
      een activiteit als bedoeld in [artikel 5.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.31.2
    text: |-
      Voor de toepassing van het eerste lid wordt onder betrokkene als bedoeld in
      [artikel 3 van de Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref1] ook verstaan degene
      die op grond van feiten en omstandigheden redelijkerwijs met de aanvrager van de omgevingsvergunning kan worden
      gelijkgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0013798#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0013798
        artikel: '3'
  - number: 5.31.3
    text: |-
      Voordat toepassing wordt gegeven aan het eerste lid, kan het bevoegd gezag het bureau, bedoeld in
      [artikel 8 van de Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref1], vragen om een advies
      als bedoeld in [artikel 9 van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0013798#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0013798#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0013798
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0013798
        artikel: '9'
  - number: '5.32'
    text: |-
      Het bevoegd gezag kan een omgevingsvergunning weigeren als naar zijn oordeel sprake is van bijzondere
      omstandigheden waardoor het verlenen van de vergunning zou leiden tot ernstige nadelige of mogelijk ernstige
      nadelige gevolgen voor de gezondheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.32
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: AFWIJZING
        parameters:
          - name: bijzondere_omstandigheden
            type: boolean
            required: true
            description: Of naar het oordeel van het bevoegd gezag sprake is van bijzondere omstandigheden
            source: {}
          - name: ernstige_nadelige_gevolgen_gezondheid
            type: boolean
            required: true
            description: >-
              Of het verlenen van de vergunning zou leiden tot
              ernstige nadelige of mogelijk ernstige nadelige
              gevolgen voor de gezondheid
            source: {}
        output:
          - name: mag_weigeren_gezondheid
            type: boolean
            description: Of het bevoegd gezag de omgevingsvergunning kan weigeren op grond van gezondheidsrisico
        actions:
          - output: mag_weigeren_gezondheid
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $bijzondere_omstandigheden
                  value: true
                - operation: EQUALS
                  subject: $ernstige_nadelige_gevolgen_gezondheid
                  value: true
  - number: '5.33'
    text: |-
      Voor zover de aanvraag betrekking heeft op een activiteit waarvoor de beslissing op de aanvraag op grond van
      [artikel 16.16][ref1] instemming van een ander bestuursorgaan behoeft, wordt de omgevingsvergunning verleend of
      geweigerd met inachtneming van het besluit over de instemming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 5.33a.1
    text: |-
      Voor zover de aanvraag betrekking heeft op meer dan een activiteit wordt als er een bij of krachtens deze paragraaf
      gestelde regel is op grond waarvan voor een deel van die activiteiten de omgevingsvergunning moet worden geweigerd,
      de vergunning alleen geweigerd voor die activiteiten en voor de overige activiteiten verleend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.33a
  - number: 5.33a.2
    text: |-
      In afwijking van het eerste lid wordt de omgevingsvergunning in haar geheel geweigerd op verzoek of met instemming
      van de aanvrager.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.33a
  - number: 5.34.1
    text: |-
      Aan een omgevingsvergunning worden de voorschriften verbonden die nodig zijn voor de regels, bedoeld in de
      [artikelen 5.18][ref1], [5.19][ref2], [5.30][ref3] en [5.31][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.34.2
    text: |-
      Onverminderd de [artikelen 13.5, eerste tot en met vijfde lid][ref1], en [13.6][ref2] worden bij of krachtens
      algemene maatregel van bestuur voor daarbij aangewezen activiteiten regels gesteld over de toepassing van het
      eerste lid. Daarbij worden in ieder geval regels gesteld over:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.3'
  - number: 5.34.2.a
    text: |-
      voorschriften die strekken tot toepassing van andere technieken dan die waarover bij de aanvraag gegevens of
      bescheiden zijn verstrekt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
  - number: 5.34.2.b
    text: |-
      voorschriften die, ook al houden deze verband met regels als bedoeld in het eerste lid, niet aan de
      omgevingsvergunning kunnen worden verbonden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
  - number: 5.34.3
    text: 'Regels over het verbinden van voorschriften aan een omgevingsvergunning kunnen ook worden gesteld bij:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
  - number: 5.34.3.a
    text: omgevingsplan, voor zover het gaat om een omgevingsvergunning voor een omgevingsplanactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
  - number: 5.34.3.b
    text: |-
      waterschapsverordening, voor zover het gaat om een omgevingsvergunning voor een activiteit als bedoeld in
      [artikel 5.3][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.34.3.c
    text: 'omgevingsverordening, voor zover het gaat om een omgevingsvergunning voor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
  - number: 5.34.3.c.1°
    text: |-
      een milieubelastende activiteit, tenzij het gaat om een op grond van [artikel 5.26, vierde lid][ref1], aangewezen
      geval,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.34.3.c.2°
    text: |-
      een activiteit als bedoeld in [artikel 5.4][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.34.4
    text: |-
      Bij het stellen van regels als bedoeld in het derde lid, aanhef en onder c, worden de grenzen van
      [artikel 2.3, tweede lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.36.1
    text: |-
      In een omgevingsvergunning voor een voortdurende activiteit kan worden bepaald dat die vergunning geldt voor een
      daarbij gestelde termijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36.2
    text: |-
      In een omgevingsvergunning voor een aflopende activiteit kan worden bepaald dat de vergunninghouder na afloop van
      een bij de vergunning gestelde termijn, de voor de verlening van de vergunning bestaande toestand heeft hersteld of
      een andere, in de omgevingsvergunning omschreven, toestand heeft gerealiseerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36.3
    text: |-
      In een omgevingsvergunning kan worden bepaald dat daarbij aangewezen voorschriften nadat de vergunning haar gelding
      heeft verloren, tijdens een daarbij gestelde termijn van kracht blijven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36.4
    text: |-
      Bij algemene maatregel van bestuur worden gevallen aangewezen waarin een termijn als bedoeld in het eerste of
      tweede lid wordt gesteld. Bij de maatregel kunnen over die termijn worden geregeld:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36.4.a
    text: de maximale duur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36.4.b
    text: de gevallen waarin verlenging mogelijk is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36
  - number: 5.36a.1
    text: |-
      In een omgevingsvergunning voor een bouwactiviteit voor een seizoensgebonden bouwwerk of voor een
      omgevingsplanactiviteit bestaande uit een bouwactiviteit voor een seizoensgebonden bouwwerk:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36a
  - number: 5.36a.1.a
    text: |-
      kan worden bepaald dat het bouwwerk op grond van die vergunning gedurende opeenvolgende kalenderjaren kan worden
      gebouwd en gesloopt, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36a
  - number: 5.36a.1.b
    text: |-
      wordt bepaald binnen welke opeenvolgende tijdvakken van een kalenderjaar het bouwen en slopen van het bouwwerk
      plaatsvindt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36a
  - number: 5.36a.2
    text: |-
      Een omgevingsvergunning voor een bouwactiviteit voor een drijvend bouwwerk of voor een omgevingsplanactiviteit
      bestaande uit een bouwactiviteit voor een drijvend bouwwerk omvat ook de toestemming om het bouwwerk in verband met
      werkzaamheden te verplaatsen en op dezelfde locatie terug te plaatsen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36a
  - number: 5.36a.3
    text: |-
      In een omgevingsvergunning voor een bouwactiviteit voor een drijvend bouwwerk of voor een omgevingsplanactiviteit
      bestaande uit een bouwactiviteit voor een drijvend bouwwerk kan worden bepaald dat het bouwwerk op grond van die
      vergunning ook in andere gevallen dan bedoeld in het tweede lid kan worden verplaatst en op dezelfde locatie kan
      worden teruggeplaatst.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36a
  - number: 5.36b
    text: |-
      Als het verbod, bedoeld in [artikel 5.1, eerste lid][ref1], om zonder omgevingsvergunning een stortingsactiviteit
      op zee te verrichten door een wijziging van bijlage 4 bij het Londen-protocol van toepassing wordt op een
      activiteit waarvoor al een omgevingsvergunning voor een lozingsactiviteit op een oppervlaktewaterlichaam
      of voor een beperkingengebiedactiviteit met betrekking tot een waterstaatswerk als bedoeld in
      [artikel 5.1, tweede lid][ref2], is verleend, geldt die omgevingsvergunning als omgevingsvergunning voor een
      stortingsactiviteit op zee, mits in die bijlage bij het Londen-protocol is bepaald dat voor die activiteit een
      vergunning kan worden verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.36b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.37.1
    text: |-
      Een omgevingsvergunning geldt voor degene die de activiteit verricht waarop zij betrekking heeft. Diegene is
      vergunninghouder en draagt zorg voor de naleving van de vergunningvoorschriften.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.37
  - number: 5.37.2
    text: |-
      Als een aangevraagde of verleende omgevingsvergunning zal gaan gelden voor een ander dan de aanvrager of de
      vergunninghouder, informeert de aanvrager respectievelijk de vergunninghouder ten minste vier weken van tevoren
      het bevoegd gezag daarover. Bij ministeriële regeling worden regels gesteld over de gegevens die daarbij worden
      verstrekt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.37
  - number: 5.37.3
    text: |-
      In afwijking van het eerste lid, eerste zin, kan het bevoegd gezag in de omgevingsvergunning bepalen dat deze
      alleen geldt voor degene aan wie zij is verleend, als de persoon van de vergunninghouder van belang is voor de
      toepassing van de regels over het verlenen of weigeren van de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.37
  - number: 5.37a.1
    text: |-
      In afwijking van [artikel 5.37, eerste lid][ref1], kan het bevoegd gezag in de omgevingsvergunning bepalen dat een
      vergunninghouder alleen zorg draagt voor de naleving van de vergunningvoorschriften voor de activiteit die of het
      deel van de activiteit dat hij verricht, voor zover de activiteit of het deel van de activiteit te onderscheiden
      is, tenzij het gaat om een bij algemene maatregel van bestuur aangewezen geval.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.37a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.37a.2
    text: Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld over de toepassing van het eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.37a
  - number: 5.38.1
    text: 'Voor zover een omgevingsvergunning betrekking heeft op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.1.a
    text: een stortingsactiviteit op zee,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.1.b
    text: |-
      een milieubelastende activiteit, tenzij het gaat om een op grond van [artikel 5.26, vierde lid][ref1], aangewezen
      geval,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.38.1.c
    text: 'een lozingsactiviteit op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.1.c.1°
    text: een oppervlaktewaterlichaam,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.1.c.2°
    text: een zuiveringtechnisch werk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.2
    text: |-
      Onder ontwikkelingen van de technische mogelijkheden tot het beschermen van het milieu wordt ook verstaan de
      vaststelling van nieuwe of herziene conclusies over beste beschikbare technieken, bedoeld in artikel 13, vijfde en
      zevende lid, van de richtlijn industriële emissies.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: 5.38.3
    text: |-
      Bij algemene maatregel van bestuur worden met het oog op het beschermen van het milieu regels gesteld over de wijze
      waarop het eerste lid wordt toegepast voor daarbij aangewezen activiteiten. Bij de maatregel kan worden bepaald dat
      daarbij gestelde regels alleen gelden in daarbij aangewezen gevallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.38
  - number: '5.39'
    text: 'Het bevoegd gezag wijzigt de voorschriften van een omgevingsvergunning of trekt een omgevingsvergunning in:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.39
  - number: 5.39.a
    text: in gevallen of op gronden die bij algemene maatregel van bestuur worden bepaald,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.39
  - number: 5.39.b
    text: |-
      voor een activiteit als bedoeld in [artikel 5.3][ref1] of [5.4][ref2]: in gevallen of op gronden die in de
      waterschapsverordening respectievelijk de omgevingsverordening zijn bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.39
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.40.1
    text: 'Het bevoegd gezag kan de voorschriften van een omgevingsvergunning wijzigen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.40
  - number: 5.40.1.a
    text: in gevallen of op gronden die bij algemene maatregel van bestuur worden bepaald,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.40
  - number: 5.40.1.b
    text: |-
      voor een activiteit als bedoeld in [artikel 5.31, eerste lid][ref1]:
      als het gaat om het wegnemen of beperken van gevaar, bedoeld in
      [artikel 3, zevende lid, van de Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref2], waarbij
      artikel 5.31, tweede en derde lid, van overeenkomstige toepassing is,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0013798#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.40
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0013798
        artikel: '3'
  - number: 5.40.1.c
    text: |-
      voor een activiteit als bedoeld in [artikel 5.3][ref1] of [5.4][ref2]: in gevallen of op gronden die in de
      waterschapsverordening respectievelijk de omgevingsverordening zijn bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.40
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.40.2
    text: |-
      In andere gevallen dan bedoeld in [artikel 18.10][ref1] kan het bevoegd gezag een omgevingsvergunning intrekken:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.40
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.3
        afdeling: '18.1'
    machine_readable:
      untranslatables:
        - construct: >-
            decision_type INTREKKING
          reason: >-
            Intrekking van een omgevingsvergunning is
            een eigenstandig bestuursrechtelijk
            rechtshandeling, maar het schema kent geen
            decision_type INTREKKING
          suggestion: >-
            Add INTREKKING to decision_type enum in
            schema
      execution:
        produces:
          legal_character: BESCHIKKING
        parameters:
          - name: intrekking_op_grond_van_artikel_18_10
            type: boolean
            required: true
            description: Of de intrekking valt onder artikel 18.10
            source: {}
          - name: intrekkingsgrond
            type: string
            required: true
            description: >-
              De grond voor intrekking: amvb_gronden,
              geen_gebruik, verzoek_vergunninghouder, bibob,
              samenhangende_vergunning_ingetrokken,
