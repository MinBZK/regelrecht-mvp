        afdeling: '15.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.5.c
    text: de schade bestaat uit waardevermindering van de onroerende zaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.5
  - number: '15.6'
    text: |-
      Bij schade die wordt veroorzaakt door wijziging van een of meer regels in een omgevingsplan of in een
      omgevingsverordening gesteld met het oog op een evenwichtige toedeling van functies aan locaties, die ertoe
      strekt dat het verrichten van bepaalde activiteiten niet meer is toegestaan, heeft de aanvrager het risico van het
      ontstaan van schade als bedoeld in [artikel 4:126, tweede lid, onder a, van de Algemene wet bestuursrecht][ref1],
      aanvaard als:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.6
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
    machine_readable:
      execution:
        parameters:
          - name: datum_kennisgeving_voornemen
            type: date
            required: true
            description: Datum waarop het bevoegd gezag kennis heeft gegeven van het voornemen tot wijziging
          - name: datum_wijziging_regel
            type: date
            required: true
            description: Datum waarop de regel is gewijzigd
          - name: activiteit_verricht_3_jaar_voor_kennisgeving
            type: boolean
            required: true
            description: Of gedurende 3 jaar voorafgaand aan de kennisgeving een activiteit is verricht
          - name: activiteit_verricht_na_kennisgeving
            type: boolean
            required: true
            description: Of na de kennisgeving tot de wijziging een activiteit is verricht of voorbereidingen zijn getroffen
        output:
          - name: risico_aanvaard
            type: boolean
            description: Of de aanvrager het risico van schade heeft aanvaard (passieve risicoaanvaarding)
        actions:
          - output: kennisgeving_minimaal_1_jaar_voor_wijziging
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_kennisgeving_voornemen
              value:
                operation: DATE_ADD
                date: $datum_wijziging_regel
                years: -1
          - output: risico_aanvaard
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $kennisgeving_minimaal_1_jaar_voor_wijziging
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $activiteit_verricht_3_jaar_voor_kennisgeving
                    value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $activiteit_verricht_na_kennisgeving
                    value: true
  - number: 15.6.a
    text: |-
      het bevoegd gezag ten minste een jaar voorafgaand aan de wijziging van die regel, van het voornemen daartoe kennis
      heeft gegeven op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze,


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.6
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 15.6.b
    text: |-
      gedurende drie jaar onmiddellijk voorafgaand aan die kennisgeving, geen activiteit is verricht die in
      overeenstemming is met de regels in het omgevingsplan of de omgevingsverordening die van toepassing waren, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.6
  - number: 15.6.c
    text: |-
      vanaf het tijdstip van die kennisgeving tot het tijdstip van de wijziging van die regel, geen activiteit is
      verricht die in overeenstemming is met de regels in het omgevingsplan of de omgevingsverordening die van toepassing
      waren of de voor een activiteit op die locatie benodigde voorbereidingen niet zijn getroffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.6
  - number: 15.7.1
    text: |-
      Bij een aanvraag om vergoeding van schade die bestaat uit waardevermindering van een onroerende zaak die
      wordt veroorzaakt door een besluit op grond waarvan een of meer activiteiten is of zijn toegestaan buiten
      de locatie waar de onroerende zaak is gelegen of door een maatregel die buiten die locatie wordt getroffen,
      wordt een deel ter grootte van vier procent van de waarde van de onroerende zaak onmiddellijk voor het
      ontstaan van de schade aangemerkt als behorend tot het normale maatschappelijke risico als bedoeld in
      [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.7
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
    machine_readable:
      execution:
        parameters:
          - name: waarde_onroerende_zaak
            type: number
            required: true
            description: Waarde van de onroerende zaak onmiddellijk voor het ontstaan van de schade (in eurocenten)
          - name: waardevermindering
            type: number
            required: true
            description: Waardevermindering van de onroerende zaak (in eurocenten)
        output:
          - name: normaal_maatschappelijk_risico
            type: number
            description: Deel dat als normaal maatschappelijk risico wordt aangemerkt (in eurocenten)
          - name: vergoedbare_schade
            type: number
            description: Schade die voor vergoeding in aanmerking komt (in eurocenten)
        actions:
          - output: normaal_maatschappelijk_risico
            value:
              operation: MULTIPLY
              values:
                - $waarde_onroerende_zaak
                - 0.04
          - output: vergoedbare_schade
            value:
              operation: IF
              cases:
                - when:
                    operation: GREATER_THAN
                    subject: $waardevermindering
                    value: $normaal_maatschappelijk_risico
                  then:
                    operation: SUBTRACT
                    values:
                      - $waardevermindering
                      - $normaal_maatschappelijk_risico
              default: 0
  - number: 15.7.2
    text: |-
      Als de aanvraag om schadevergoeding betrekking heeft op verschillende besluiten met onderlinge samenhang
      daartussen, past het bevoegd gezag het eerste lid toe op de schade voortvloeiend uit die besluiten gezamenlijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.7
  - number: 15.7.3
    text: |-
      Het bevoegd gezag kan bij de behandeling van een aanvraag om schadevergoeding het eerste lid buiten toepassing
      laten als dat lid van toepassing is geweest bij de beslissing op een eerder ingediende aanvraag om vergoeding van
      schade die bestaat uit waardevermindering van de onroerende zaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.7
  - number: 15.7.4
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin de schade wordt geacht niet uit te gaan
      boven het normale maatschappelijke risico.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.7
  - number: 15.8.1
    text: |-
      Als de aanvraag om schadevergoeding betrekking heeft op een besluit van de gemeenteraad, het
      algemeen bestuur van een waterschap of provinciale staten of op een algemene maatregel van bestuur
      of ministeriële regeling, wordt als bestuursorgaan dat de schadevergoeding toekent als bedoeld in
      [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1], aangemerkt het college van burgemeester en
      wethouders, het dagelijks bestuur van het waterschap, het college van gedeputeerde staten respectievelijk Onze
      Minister die het aangaat, tenzij het tweede lid op die aanvraag van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.8
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 15.8.2
    text: |-
      Als de aanvraag om schadevergoeding betrekking heeft op een besluit ter uitvoering van een projectbesluit, is het
      bestuursorgaan dat het projectbesluit heeft vastgesteld, het bestuursorgaan dat de schadevergoeding toekent.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.8
  - number: 15.8.3
    text: |-
      Een bestuursorgaan kan de bevoegdheid om te beslissen op een aanvraag om schadevergoeding overdragen aan een ander
      bestuursorgaan, als dat bestuursorgaan daarmee instemt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.8
  - number: 15.8.4
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de toepassing van het derde lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.8
  - number: 15.9.1
    text: |-
      Bij algemene maatregel van bestuur kunnen bestuursorganen of andere instanties worden aangewezen die, in daarbij
      aangewezen gevallen, in de gelegenheid worden gesteld om aan het bevoegd gezag advies uit te brengen over een
      aanvraag om schadevergoeding.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.9
  - number: 15.9.2
    text: 'Bij algemene maatregel van bestuur kunnen regels worden gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.9
  - number: 15.9.2.a
    text: de wijze van beoordeling van een aanvraag om schadevergoeding,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.9
  - number: 15.9.2.b
    text: de totstandkoming van een beslissing op de aanvraag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.9
  - number: '15.10'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld over een in een omgevingsplan,
      waterschapsverordening of omgevingsverordening op te nemen verplichting tot het verstrekken van informatie en
      tot de kennisgeving daarvan, met het oog op de indiening van een aanvraag om schadevergoeding als bedoeld in
      [artikel 15.4][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: '15.11'
    text: |-
      [Artikel 10.1][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
  - number: '15.12'
    text: |-
      Schade als gevolg van een gedoogplicht als bedoeld in de [afdelingen 10.2][ref1] en [10.3][ref2] wordt vergoed door
      de initiatiefnemer van de activiteit of het werk van algemeen belang waarvoor de gedoogplicht geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.2'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.3'
  - number: 15.13.1
    text: |-
      Schade die een rechtstreeks en noodzakelijk gevolg is van een gedoogplicht als bedoeld in [afdeling 10.2][ref1]
      wordt aan de rechthebbende die de schade lijdt vergoed:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.13.1.a
    text: als die schade uitgaat boven het normale maatschappelijke risico, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
  - number: 15.13.1.b
    text: voor zover de rechthebbende in vergelijking met anderen onevenredig zwaar wordt getroffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
  - number: 15.13.2
    text: |-
      Onverminderd het eerste lid wordt schade als gevolg van een gedoogplicht als bedoeld in
      [artikel 10.3, vierde lid][ref1], alleen vergoed voor zover die het gevolg is van de verlegging van een waterkering
      of van andere maatregelen, gericht op het vergroten van de afvoer- of bergingscapaciteit van watersystemen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.13.3
    text: |-
      De [artikelen 4:126, tweede en derde lid][ref1], en
      [4:129, aanhef en onder a en b, van de Algemene wet bestuursrecht][ref2] en de [artikelen 15.2][ref3] en
      [15.5, aanhef en onder c][ref4], zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.13.4
    text: |-
      Dit artikel is niet van toepassing op schade als gevolg van een gedoogplicht als bedoeld in
      [artikel 10.3, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.14.1
    text: |-
      Schade die een rechtstreeks en noodzakelijk gevolg is van een gedoogplicht als bedoeld in [afdeling 10.3][ref1] of
      [artikel 10.3, derde lid][ref2], wordt aan de rechthebbende die de schade lijdt volledig vergoed.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.14.2
    text: |-
      Het eerste lid is niet van toepassing op schade als gevolg van een gedoogplicht als bedoeld in
      [artikel 10.17, eerste lid, en tweede lid, onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: '15.15'
    text: |-
      Op een vordering tot schadevergoeding als bedoeld in deze afdeling is de civiele rechter bevoegd binnen wiens
      rechtsgebied de onroerende zaak geheel of in hoofdzaak is gelegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.15
  - number: 15.16.1
    text: |-
      Degene die een vordering kan doen tot vergoeding van schade kan eerst aan gedeputeerde staten van de provincie
      waarin de onroerende zaak geheel of grotendeels is gelegen verzoeken om een onderzoek in te stellen als de schade
      het gevolg is van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.16
  - number: 15.16.1.a
    text: |-
      het onttrekken van grondwater, bedoeld in [artikel 10.3, derde lid, onder a][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.16.1.b
    text: |-
      het in de bodem brengen van water, bedoeld in [artikel 10.3, derde lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 15.16.2
    text: |-
      Als een onroerende zaak is gelegen in een gebied waarin de grondwaterstand invloed ondergaat van meer dan een
      onttrekking en uit het onderzoek niet of niet binnen redelijke termijn blijkt door welke onttrekking de schade
      aan die onroerende zaak wordt veroorzaakt, kennen gedeputeerde staten de rechthebbende op zijn verzoek een
      schadevergoeding toe. De rechthebbende draagt in dat geval de rechten die hij vanwege de door hem geleden schade
      tegenover derden heeft over aan de provincie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.16
  - number: '15.17'
    text: |-
      De eigenaar van een zaak die in een onteigeningsbeschikking voor onteigening is aangewezen, heeft recht op
      schadeloosstelling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.17
  - number: '15.18'
    text: |-
      Schade die een eigenaar rechtstreeks en noodzakelijk lijdt door een onteigening op grond van deze wet wordt
      volledig vergoed.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.18
  - number: '15.19'
    text: |-
      Bij onteigening van een krachtens huurkoop verkochte zaak wordt uit het bedrag van de werkelijke waarde van de
      zaak aan de huurverkoper een schadeloosstelling toegekend vanwege de aanspraken uit de huurkoopovereenkomst die
      hij verliest.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.19
  - number: '15.20'
    text: |-
      Bij het vaststellen van de schadeloosstelling wordt uitgegaan van de dag waarop de onteigeningsakte is ingeschreven
      in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.20
  - number: 15.21.1
    text: |-
      Bij het vaststellen van de schadeloosstelling blijven veranderingen die kennelijk tot stand zijn gebracht om de
      schadeloosstelling te verhogen, buiten beschouwing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.21
  - number: 15.21.2
    text: |-
      Bij het vaststellen van de schadeloosstelling blijven veranderingen die tot stand zijn gebracht na de
      terinzagelegging van de ontwerponteigeningsbeschikking, buiten beschouwing, tenzij het normale of noodzakelijke
      veranderingen betreft die aansluiten bij de aard en het gebruik van de onroerende zaak op het tijdstip van de
      terinzagelegging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.21
  - number: 15.22.1
    text: De werkelijke waarde van de onteigende zaak wordt vergoed.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.22
  - number: 15.22.2
    text: |-
      Bij het bepalen van de werkelijke waarde wordt uitgegaan van de prijs die tot stand zou zijn gekomen bij een
      veronderstelde vrije koop in het economische verkeer tussen de onteigende als redelijk handelende verkoper en de
      onteigenaar als redelijk handelende koper.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.22
  - number: 15.22.3
    text: In bijzondere gevallen wordt de werkelijke waarde naar een andere maatstaf bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.22
  - number: '15.23'
    text: |-
      Bij het vaststellen van de schadeloosstelling wordt geen rekening gehouden met voordelen of nadelen die zijn
      ontstaan door:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.23
  - number: 15.23.a
    text: de verwezenlijking van het onteigeningsbelang waarvoor wordt onteigend, voor zover dat een overheidswerk betreft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.23
  - number: 15.23.b
    text: overheidswerken die in verband staan met de verwezenlijking van het onteigeningsbelang waarvoor wordt onteigend,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.23
  - number: 15.23.c
    text: de plannen voor de werken, bedoeld onder a en b.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.23
  - number: '15.24'
    text: 'Bij het bepalen van de prijs van de onteigende zaak wordt rekening gehouden met:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.24
  - number: 15.24.a
    text: |-
      ter plaatse geldende voorschriften en gebruiken over baten en lasten, die uit de exploitatie van de zaak of van een
      complex van als één geheel in exploitatie te brengen of gebrachte zaken waarvan zij deel uitmaakt, naar verwachting
      zullen voortvloeien, en over de omslag van deze baten en lasten, voor zover een redelijk handelende verkoper en
      koper hiermee rekening plegen te houden, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.24
  - number: 15.24.b
    text: |-
      alle functies die in het omgevingsplan zijn toegedeeld aan locaties van zaken die deel uitmaken van het complex,
      waarbij elke functie de waardering van alle zaken binnen het complex beïnvloedt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.24
  - number: 15.25.1
    text: |-
      Bij het bepalen van de werkelijke waarde van de onteigende zaak wordt de prijs van de onteigende zaak verminderd
      of vermeerderd met voordelen of nadelen als gevolg van functies die voor het eerst of opnieuw tot verwezenlijking
      komen, of verwezenlijkt blijven, door de verwezenlijking van het onteigeningsbelang waarvoor wordt onteigend, voor
      zover deze voordelen of nadelen ook na toepassing van [artikel 15.24][ref1] redelijkerwijze niet of niet geheel ten
      bate of ten laste van de onteigende behoren te blijven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 15.25.2
    text: |-
      Een vermeerdering van de prijs op grond van het eerste lid wordt verminderd met de vergoeding die in verband
      daarmee op grond van [artikel 15.1, eerste lid, onder d, f, k of l][ref1], is toegekend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: '15.26'
    text: |-
      Onder een schadeloosstelling is de wettelijke rente daarvan begrepen. De wettelijke rente wordt gerekend vanaf de
      dag waarop de rechtbank de schadeloosstelling heeft vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.26
  - number: 15.27.1
    text: 'Ook recht op schadeloosstelling hebben:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.a
    text: erfpachters,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.b
    text: opstallers,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.c
    text: eigenaren van een heersend erf,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.d
    text: rechthebbenden op rechten van gebruik en bewoning,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.e
    text: |-
      rechthebbenden op rechten als bedoeld in
      [artikel 150, vijfde lid, van de Overgangswet Nieuw Burgerlijk Wetboek][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0002565#Artikel150
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
    references:
      - id: ref1
        bwb_id: BWBR0002565
        artikel: '150'
  - number: 15.27.1.f
    text: bezitters,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.g
    text: huurkopers,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.h
    text: huurders, waaronder ook onderhuurders aan wie bevoegdelijk is onderverhuurd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.i
    text: pachters, waaronder ook onderpachters aan wie bevoegdelijk is onderverpacht, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
  - number: 15.27.1.j
    text: |-
      schuldeisers die de nakoming van een verplichting als bedoeld in
      [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1] kunnen vorderen.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: 15.27.2
    text: |-
      De [artikelen 15.17 tot en met 15.26][ref1] zijn overeenkomstige toepassing op het vaststellen van de
      schadeloosstelling voor deze rechthebbenden, tenzij in de [artikelen 15.28 tot en met 15.35][ref2] anders is
      bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 15.28.1
    text: |-
      Bij het vaststellen van de schadeloosstelling voor de huurder wordt rekening gehouden met de kans dat de
      huurverhouding zonder de onteigening zou hebben voortgeduurd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.28
  - number: 15.28.2
    text: |-
      Als de huurovereenkomst is aangegaan na de terinzagelegging van de ontwerponteigeningsbeschikking, heeft de huurder
      geen recht op schadeloosstelling. De huurder heeft dan een vordering tot schadevergoeding tegen de verhuurder,
      tenzij zij anders zijn overeengekomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.28
  - number: 15.29.1
    text: |-
      Op het vaststellen van de schadeloosstelling voor de pachter is
      [artikel 377, vierde tot en met zevende lid, van Boek 7 van het Burgerlijk Wetboek][ref1] van overeenkomstige
      toepassing. Voor de toepassing van het zevende lid van dat artikel geldt de terinzagelegging van de
      ontwerponteigeningsbeschikking als peildatum.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel377
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.29
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '377'
  - number: 15.29.2
    text: |-
      Als de pachtovereenkomst na de terinzagelegging van de ontwerponteigeningsbeschikking is aangegaan, heeft de
      pachter geen recht op schadeloosstelling. De pachter heeft dan een vordering tot schadevergoeding tegen de
      verpachter, tenzij zij anders zijn overeengekomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.29
  - number: 15.30.1
    text: |-
      De hypotheekhouder en de ingeschreven beslaglegger hebben geen recht op afzonderlijke
      schadeloosstelling. Alleen wanneer zij een verweerschrift hebben ingediend in de procedure
      tot vaststelling van de schadeloosstelling, kunnen zij zich tegenover de onteigenaar beroepen
      op hun rechten krachtens [artikel 229 van Boek 3 van het Burgerlijk Wetboek][ref1] en
      [artikel 507a van het Wetboek van Burgerlijke Rechtsvordering][ref2]. Zij oefenen die rechten uit op het
      bedrag van de werkelijke waarde en de waardevermindering van het overblijvende, zoals dat bedrag toekomt aan de
      hypotheekgever, de beslagene en de beperkt gerechtigde, wier recht niet tegen hen kan worden ingeroepen.


      [ref1]: https://wetten.overheid.nl/BWBR0005291#Artikel229
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel507a
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.30
    references:
      - id: ref1
        bwb_id: BWBR0005291
        artikel: '229'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: 507a
  - number: 15.30.2
    text: |-
      Als alle in het eerste lid vermelde belanghebbenden overeenstemming hebben bereikt over de verdeling, bepaalt de
      rechter wat aan ieder van hen moet worden betaald. Wanneer geen overeenstemming is bereikt, worden de bedragen
      in hun geheel toegewezen aan de hypotheekhouder, hoogste in rang, die een verweerschrift heeft ingediend of, als
      geen hypotheekhouder een verweerschrift heeft ingediend, aan de daarvoor door de eerst ingeschreven beslaglegger
      aangewezen notaris of deurwaarder, en vindt verdeling plaats met toepassing van de regels voor de verdeling
      van de opbrengst, bedoeld in het [Tweede Boek, tweede titel, derde afdeling][ref1], respectievelijk in het
      [Tweede Boek, derde titel, vijfde afdeling, van het Wetboek van Burgerlijke Rechtsvordering][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0001827#AfdelingDerde
      [ref2]: https://wetten.overheid.nl/BWBR0001827#AfdelingVijfde
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.30
    references:
      - id: ref1
        bwb_id: BWBR0001827
        afdeling: Derde
      - id: ref2
        bwb_id: BWBR0001827
        afdeling: Vijfde
  - number: 15.30.3
    text: |-
      Voor de toepassing van het tweede lid hoeft de beslaglegger geen verweerschrift
      in te dienen, als hij aan de onteigenaar bij exploot meedeelt zijn rechten uit
      [artikel 507a van het Wetboek van Burgerlijke Rechtsvordering][ref1] te bepalen tot het deel van de in het eerste
      lid bedoelde bedragen, dat voor de beslagene is bestemd.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel507a
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.30
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 507a
  - number: 15.31.1
    text: |-
      Op de voorlopige schadeloosstelling, bedoeld in [artikel 15.43][ref1], en de verhogingen daarvan is
      [artikel 15.30][ref2] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.2
        afdeling: '15.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 15.31.2
    text: |-
      Bij de verdeling tussen de belanghebbenden onderling oefenen de hypotheekhouder en de beslagleggers hun rechten
      op de voorlopige schadeloosstelling en de verhogingen daarvan uit voor zover zij kunnen worden beschouwd als een
      voorschot op het in [artikel 15.30, eerste lid, derde zin][ref1], bedoelde bedrag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 15.31.3
    text: |-
      Op verzoek van elk van de belanghebbenden kan de rechter-commissaris in een rangregeling bepalen dat deze niet
      zal worden gesloten voordat de beschikking waarbij de schadeloosstelling is vastgesteld, kracht van gewijsde heeft
      gekregen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.31
  - number: 15.31.4
    text: |-
      Als de verrekening, bedoeld in [artikel 15.45][ref1], tot gevolg heeft dat een belanghebbende wordt veroordeeld het
      te veel ontvangen bedrag aan de onteigenaar terug te betalen, kan elk van de belanghebbenden bij de rangregeling
      binnen een jaar nadat de beschikking waarin de rechtbank de schadeloosstelling heeft vastgesteld, kracht van
      gewijsde heeft gekregen, heropening van een gesloten rangregeling vragen en kan de rechter-commissaris hen die
      teveel hebben ontvangen bij bevelschrift gelasten dit terug te betalen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.2
        afdeling: '15.3'
  - number: 15.32.1
    text: |-
      Bij het vaststellen van de schadeloosstelling vanwege het vervallen van een erfdienstbaarheid of een recht als
      bedoeld in [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1] wordt rekening gehouden met dat wat te
      verwachten is over de wijziging of de opheffing op grond van de [artikelen 78][ref2] en [79 van Boek 5][ref3], of
      de [artikelen 258][ref4] en [259 van Boek 6 van dat wetboek][ref5] en de daaraan te verbinden voorwaarden.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
      [ref2]: https://wetten.overheid.nl/BWBR0005288#Artikel78
      [ref3]: https://wetten.overheid.nl/BWBR0005288#Artikel79
      [ref4]: https://wetten.overheid.nl/BWBR0005289#Artikel258
      [ref5]: https://wetten.overheid.nl/BWBR0005289#Artikel259
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.32
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
      - id: ref2
        bwb_id: BWBR0005288
        artikel: '78'
      - id: ref3
        bwb_id: BWBR0005288
        artikel: '79'
      - id: ref4
        bwb_id: BWBR0005289
        artikel: '258'
      - id: ref5
        bwb_id: BWBR0005289
        artikel: '259'
  - number: 15.32.2
    text: |-
      Ook wordt rekening gehouden met de mogelijkheid de erfdienstbaarheid of het recht, bedoeld in
      [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1], door een andere erfdienstbaarheid of een ander recht
      te vervangen.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.32
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: 15.32.3
    text: |-
      [Artikel 15.23][ref1] is niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.32
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: '15.33'
    text: |-
      De vruchtgebruiker kan zich tegenover de onteigenaar op grond van
      [artikel 213 van Boek 3 van het Burgerlijk Wetboek][ref1] alleen beroepen op verkrijging van een vruchtgebruik op
      de vordering tot schadeloosstelling voor de hoofdgerechtigde wanneer hij een verweerschrift heeft ingediend in de
      procedure tot vaststelling van de schadeloosstelling.


      [ref1]: https://wetten.overheid.nl/BWBR0005291#Artikel213
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.33
    references:
      - id: ref1
        bwb_id: BWBR0005291
        artikel: '213'
  - number: '15.34'
    text: |-
      Bij onteigening van zaken die zijn vermaakt onder een voorwaarde laat degene aan wie het vermaakte tot de
      vervulling van de voorwaarde toekomt, de schadeloosstelling in een van de schuldregisters voor geldleningen ten
      laste van het Rijk inschrijven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.34
  - number: '15.35'
    text: |-
      Bij onteigening van een krachtens huurkoop verkochte zaak komt aan de huurkoper toe wat overblijft nadat uit het
      bedrag van de werkelijke waarde van de zaak aan de huurverkoper een schadeloosstelling is toegekend vanwege de
      aanspraken uit de huurkoopovereenkomst die hij verliest.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.35
  - number: '15.36'
    text: |-
      Het [Wetboek van Burgerlijke Rechtsvordering][ref1] is van toepassing op het verzoek tot het vaststellen van de
      schadeloosstelling en de behandeling van dat verzoek, tenzij de aard van de vaststelling van schadeloosstelling in
      onteigeningszaken zich hiertegen verzet.


      [ref1]: https://wetten.overheid.nl/BWBR0001827
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.36
    references:
      - id: ref1
        bwb_id: BWBR0001827
  - number: '15.37'
    text: |-
      Onverminderd de eisen die [artikel 30a, derde lid, van het Wetboek van Burgerlijke Rechtsvordering][ref1] stelt
      aan een verzoekschrift voor een verzoekprocedure, vermeldt het verzoekschrift de schadeloosstelling die door de
      onteigenaar aan elk van de belanghebbenden wordt aangeboden.


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel30a
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.37
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: 30a
  - number: 15.38.1
    text: |-
      Als een in het verzoekschrift genoemde eigenaar, beklemde meier, huurkoper of erfpachter met een eeuwigdurende
      erfpacht buiten het Koninkrijk woont, geen bekende woonplaats heeft of is overleden, is het de gevolmachtigde of
      bewindvoerder, als die binnen het Koninkrijk bekend is, toegestaan verweer te voeren. Als ook deze onbekend is,
      wordt een daarvoor op verzoek en op kosten van de onteigenaar te benoemen derde, die binnen het rechtsgebied van de
      rechtbank woont, toegestaan verweer te voeren. De benoemde kan het loon en de gemaakte onkosten bij de onteigenaar
      in rekening brengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.38
  - number: 15.38.2
    text: |-
      Als de eigenaar, beklemde meier, huurkoper of erfpachter met een eeuwigdurende erfpacht die buiten het Koninkrijk
      woont of geen bekende woonplaats heeft, zelf verschijnt, neemt hij verder zelf deel aan de procedure.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.38
  - number: 15.38.3
    text: |-
      Het tweede lid is van overeenkomstige toepassing op de erfgenaam van de overleden verweerder, mits de erfgenaam een
      verklaring van erfrecht overlegt. Zijn er meer erfgenamen, dan is vereist dat zij gezamenlijk verschijnen of dat
      een van hen namens allen verschijnt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.38
  - number: '15.39'
    text: |-
      De rechtbank benoemt een oneven aantal deskundigen om over de schadeloosstelling een schriftelijk bericht uit te
      brengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.39
  - number: 15.40.1
    text: Het onderzoek ter plaatse wordt gehouden in aanwezigheid van een rechter vergezeld van de griffier.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.40
  - number: 15.40.2
    text: |-
      De griffier deelt aan de belanghebbenden onverwijld de tijd en de plaats van het onderzoek ter plaatse mede en
      nodigt hen uit daarbij aanwezig te zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.40
  - number: 15.40.3
    text: |-
      De griffier draagt ervoor zorg dat van de tijd en de plaats van het onderzoek ter plaatse kennis wordt gegeven in
      een of meer dag-, nieuws- of huis-aan-huisbladen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.40
  - number: 15.40.4
    text: |-
      De griffier maakt van het onderzoek ter plaatse een proces-verbaal op dat door de rechter en door hem wordt
      ondertekend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.40
  - number: 15.41.1
    text: |-
      Belanghebbenden die niet zijn opgeroepen kunnen bij het onderzoek ter plaatse aanwezig zijn om ook hun schade te
      laten begroten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.41
  - number: 15.41.2
    text: |-
      De rechter draagt de onteigenaar op om binnen vier weken aan de belanghebbenden die bij het onderzoek ter plaatse
      bekend worden en die niet in het verzoekschrift staan een aanbod tot schadeloosstelling te doen, mits de rechten
      van die belanghebbenden niet worden betwist.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.41
  - number: '15.42'
    text: |-
      De deskundigen maken op basis van het onderzoek ter plaatse en op basis van andere beschikbare informatie een
      deskundigenbericht op. Het deskundigenbericht bevat een begroting van de schadeloosstelling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.42
  - number: 15.43.1
    text: |-
      De rechtbank stelt zo spoedig mogelijk de voorlopige schadeloosstelling voor elke belanghebbende vast. Die
      schadeloosstelling is gelijk aan het aanbod dat is gedaan bij het verzoekschrift, tenzij de rechtbank aanleiding
      ziet de voorlopige schadeloosstelling vast te stellen op een ander bedrag of toe te wijzen aan een andere
      belanghebbende.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.43
  - number: 15.43.2
    text: |-
      De rechtbank kan bepalen dat de voorlopige schadeloosstelling wordt geconsigneerd volgens de
      [Wet op de consignatie van gelden][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003338
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.43
    references:
      - id: ref1
        bwb_id: BWBR0003338
  - number: 15.44.1
    text: |-
      Onverwijld nadat het deskundigenbericht is ingeleverd, bepaalt de rechtbank het tijdstip waarop een mondelinge
      behandeling zal plaatsvinden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.44
  - number: 15.44.2
    text: De rechtbank beveelt daarbij de oproeping van de onteigenaar en de belanghebbenden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.44
  - number: 15.45.1
    text: |-
      De eindbeschikking waarbij de rechtbank de schadeloosstelling vaststelt, houdt ook een veroordeling in tot
      verrekening van de door de rechter vastgestelde schadeloosstelling met de door de belanghebbende ontvangen
      voorlopige schadeloosstelling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.45
  - number: 15.45.2
    text: |-
      De rechtbank kan bepalen dat het te verrekenen bedrag wordt geconsigneerd volgens de
      [Wet op de consignatie van gelden][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003338
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.45
    references:
      - id: ref1
        bwb_id: BWBR0003338
  - number: 15.46.1
    text: De kosten van de schadeloosstellingsprocedure komen voor rekening van de onteigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.46
  - number: 15.46.2
    text: |-
      Als een belanghebbende, die het aan hem in het verzoekschrift gedane aanbod of het aan hem gedane aanbod als
      bedoeld in [artikel 15.41, tweede lid][ref1], niet heeft aanvaard, niet meer wordt toegewezen dan hem werd
      aangeboden, of wanneer de rechtbank daarvoor aanleiding ziet in de omstandigheden van de procedure, kan de
      rechtbank de betrokkene veroordelen om de kosten van de procedure of van een door haar naar billijkheid te bepalen
      gedeelte van die kosten te betalen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.2
        afdeling: '15.3'
  - number: 15.46.3
    text: |-
      Als de som van de kosten waarin een belanghebbende is veroordeeld, hoger is dan die van de aan hem toegekende
      schadeloosstelling, kan de rechtbank de betrokkene veroordelen tot betaling van het verschil van die sommen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.46
  - number: 15.46.4
    text: |-
      Onder de kosten van de schadeloosstellingsprocedure vallen ook kosten van rechtsbijstand en van andere deskundige
      bijstand, die naar het oordeel van de rechtbank redelijkerwijs door belanghebbenden zijn gemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.46
  - number: 15.46.5
    text: |-
      De kosten van de kennisgeving, bedoeld in [artikel 15.40, derde lid][ref1], komen voor rekening van de onteigenaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.2
        afdeling: '15.3'
  - number: '15.47'
    text: |-
      Als de belanghebbende bij de rechtbank geen bedenkingen heeft ingebracht tegen de onteigeningsbeschikking als
      bedoeld in [artikel 16.97][ref1], veroordeelt de rechtbank de onteigenaar ook in de kosten die de belanghebbende
      redelijkerwijs heeft gemaakt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.47
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.2
        afdeling: '16.9'
  - number: 15.47.a
    text: |-
      door een derde beroepsmatig verleende rechtsbijstand of andere deskundige bijstand in verband met het overleg over
      de minnelijke verwerving, bedoeld in [artikel 11.7, eerste lid][ref1], en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.47
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 15.47.b
    text: |-
      door een derde beroepsmatig verleende rechtsbijstand of andere deskundige bijstand in verband met het naar voren
      brengen van een zienswijze en de behartiging van de belangen van de belanghebbende bij de behandeling daarvan bij
      de voorbereiding van de onteigeningsbeschikking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.47
  - number: '15.48'
    text: Tegen de uitspraak van de rechtbank staat alleen beroep in cassatie open.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.48
  - number: '15.49'
    text: |-
      Als degene aan wie de schadeloosstelling is toegewezen weigert haar te ontvangen en daarom bij deurwaardersexploot
      in gebreke is gesteld, kan de onteigenaar tien dagen na de ingebrekestelling overgaan tot consignatie in
      overeenstemming met de [Wet op de consignatie van gelden][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003338
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.49
    references:
      - id: ref1
        bwb_id: BWBR0003338
  - number: '15.50'
    text: |-
      Als onder de onteigenaar beslag op de schadeloosstelling of de voorlopige schadeloosstelling is gelegd, laat hij
      het bedrag dat hij zonder het beslag aan de beslagene had moeten uitbetalen consigneren in overeenstemming met de
      [Wet op de consignatie van gelden][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003338
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.50
    references:
      - id: ref1
        bwb_id: BWBR0003338
  - number: 15.51.1
    text: |-
      Als het verzoek tot het opmaken van de onteigeningsakte niet binnen de in [artikel 11.15][ref1] bedoelde termijn is
      gedaan, is de onteigenende partij schadeplichtig en hebben de belanghebbenden de keuze een vaste schadeloosstelling
      of volledige schadevergoeding te vorderen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.51
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.4'
  - number: 15.51.2
    text: |-
      De vaste schadeloosstelling bedraagt tien procent van de voor elk van de door de rechtbank bij beschikking
      vastgestelde of vermelde schadeloosstellingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.51
  - number: 15.51.3
    text: |-
      Als volledige schadevergoeding wordt gevorderd, worden onder de schade ook begrepen de redelijkerwijs gemaakte
      kosten van rechtsbijstand en andere deskundige bijstand, en de wettelijke rente over het bedrag van de
      schadevergoeding vanaf de dag waarop de rechtbank de schadeloosstelling heeft vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.51
  - number: 15.51.4
    text: |-
      Tot kennisneming van de vordering is de rechtbank bevoegd, waarbij het verzoek om de schadeloosstelling, bedoeld in
      [artikel 11.14][ref1], te bepalen is ingediend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.51
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.3'
  - number: 15.52.1
    text: |-
      De vervreemder kan vorderen dat de gemeente, de provincie of de Staat hem de schade zal vergoeden die hij als
      gevolg van de overdracht van een onroerende zaak of van een beperkt recht aan de gemeente, de provincie of de
      Staat op grond van [afdeling 9.2][ref1] mocht hebben geleden, voor zover na de overdracht de functie waarvoor het
      voorkeursrecht is gevestigd:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '9'
        afdeling: '9.2'
  - number: 15.52.1.a
    text: |-
      op grond van [artikel 9.1, eerste lid, onder a of b][ref1], niet is verwezenlijkt en bij een onherroepelijk
      omgevingsplan een functie is toegedeeld waarmee de vestiging van het voorkeursrecht in dat geval zou zijn
      uitgesloten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 15.52.1.b
    text: |-
      op grond van [artikel 9.1, eerste lid, onder c][ref1], niet uiterlijk op de laatste dag van de geldingsduur van
      dat voorkeursrecht is toegedeeld in een omgevingsplan of is toegedacht in een gemeentelijke omgevingsvisie, een
      provinciale omgevingsvisie respectievelijk de nationale omgevingsvisie of in een programma, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 15.52.1.c
    text: |-
      op grond van [artikel 9.1, tweede lid][ref1], niet uiterlijk op de laatste dag van de geldingsduur van dat
      voorkeursrecht is opgenomen in een voorkeursrechtbeschikking op grond van artikel 9.1, eerste lid, onder a, b of c.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 15.52.2
    text: |-
      Ten aanzien van een vordering tot schadevergoeding als bedoeld in het eerste lid is de burgerlijke rechter bevoegd
      binnen wiens rechtsgebied de onroerende zaak waarop het voorkeursrecht rustte geheel of grotendeels ligt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.52
  - number: 15.53.1
    text: |-
      Gedeputeerde staten verlenen op verzoek van een belanghebbende een tegemoetkoming in schade, geleden in hun
      provincie, aangericht door van nature in het wild levende dieren van bij algemene maatregel van bestuur aangewezen
      soorten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.53
  - number: 15.53.2
    text: |-
      Een tegemoetkoming wordt alleen verleend voor zover een belanghebbende schade lijdt of zal lijden die
      redelijkerwijs niet of niet geheel voor zijn rekening behoort te blijven. Een tegemoetkoming wordt naar billijkheid
      bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.53
  - number: 15.53.3
    text: |-
      Op grond van het eerste lid worden de soorten aangewezen die op grond van [artikel 5.1, tweede lid][ref1], worden
      beschermd tegen flora- en fauna-activiteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.53
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 16.1.1
    text: |-
      Een elektronische aanvraag om een besluit of een melding op grond van deze wet wordt in bij algemene maatregel van
      bestuur aangewezen gevallen ingediend of gedaan via de landelijke voorziening, bedoeld in [artikel 20.21][ref1],
      tenzij bij die maatregel anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        paragraaf: 20.5.2
        afdeling: '20.5'
  - number: 16.1.2
    text: |-
      Het elektronisch voldoen aan een andere informatieverplichting dan een melding of het elektronisch verzenden van
      een ander bericht op grond van deze wet kan in bij algemene maatregel van bestuur aangewezen gevallen plaatsvinden
      op de bij die maatregel aangegeven wijze.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.1
  - number: 16.1.3
    text: |-
      Bij de maatregel kunnen in afwijking van de [artikelen 2:7, tweede lid][ref1], en
      [2:8 van de Algemene wet bestuursrecht][ref2] gevallen worden aangewezen waarin het verkeer, bedoeld in het eerste
      en tweede lid, alleen elektronisch kan plaatsvinden.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.1
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '2'
  - number: '16.2'
    text: |-
      Ter uitvoering van [artikel 19 van de Bekendmakingswet][ref1] rust op een bestuursorgaan dat met toepassing van
      [artikel 4.16][ref2], [5.52][ref3] of [16.21][ref4] een omgevingsplan wijzigt ook de verplichting om deze wijziging
      te verwerken in een nieuwe geconsolideerde versie van het omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.2
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.5.1
    text: |-
      Bij het nemen van een besluit op grond van deze wet kan in ieder geval gebruik worden gemaakt van rapporten met
      gegevens, onderzoeken of inventarisaties die bij het ontwerpbesluit of, bij het ontbreken daarvan, bij de aanvraag
      zijn gebruikt en die bij de vaststelling van het besluit niet ouder zijn dan twee jaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.5
    machine_readable:
      execution:
        parameters:
          - name: datum_rapport
            type: date
            required: true
            description: Datum van het rapport/onderzoek/inventarisatie
          - name: datum_vaststelling_besluit
            type: date
            required: true
            description: Datum van vaststelling van het besluit
        output:
          - name: rapport_bruikbaar
            type: boolean
            description: Of het rapport kan worden gebruikt (niet ouder dan twee jaar)
        actions:
          - output: uiterste_rapportdatum
            value:
              operation: DATE_ADD
              date: $datum_vaststelling_besluit
              years: -2
          - output: rapport_bruikbaar
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $datum_rapport
              value: $uiterste_rapportdatum
  - number: 16.5.2
    text: |-
      Bij het nemen van besluit op grond van deze wet kan ook gebruik worden gemaakt van gegevens uit rapporten die bij
      de vaststelling van het besluit ouder zijn dan twee jaar als wordt onderbouwd dat de gegevens nog actueel zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.5
  - number: 16.5.3
    text: |-
      Het eerste lid is niet van toepassing op besluiten die betrekking hebben op een Natura 2000-activiteit of flora- en
      fauna-activiteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.5
  - number: '16.6'
    text: |-
      Bij ministeriële regeling kunnen regels worden gesteld over de meet- en rekenmethoden en uitgangspunten aan de hand
      waarvan op het moment van het nemen van een besluit de gevolgen van dat besluit worden beoordeeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.6
  - number: 16.7.1
    text: |-
      [Afdeling 3.5 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.5'
  - number: 16.7.1.a
    text: |-
      de beslissingen op aanvragen om een omgevingsvergunning of wijziging van de voorschriften van een
      omgevingsvergunning voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
  - number: 16.7.1.a.1°
    text: |-
      een of meer op grond van [artikel 5.7, tweede lid][ref1], aangewezen wateractiviteiten, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 16.7.1.a.2°
    text: |-
      een of meer andere activiteiten als bedoeld in de [artikelen 5.1][ref1] en [5.4][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 16.7.1.b
    text: |-
      de beslissingen op aanvragen om een omgevingsvergunning of wijziging van de voorschriften van een
      omgevingsvergunning voor een milieubelastende activiteit en voor een wateractiviteit waarvoor op grond van
      [artikel 5.7, vierde lid][ref1], de verplichting geldt deze gelijktijdig in te dienen, of de beslissingen tot
      ambtshalve wijziging van die voorschriften,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 16.7.1.c
    text: |-
      de besluiten ter uitvoering van een projectbesluit waarvoor dat op grond van
      [artikel 5.45, eerste of tweede lid][ref1], is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 16.7.2
    text: |-
      Bij algemene maatregel van bestuur wordt voor de gevallen, bedoeld in het eerste lid, onder a en b, het
      coördinerend bestuursorgaan, bedoeld in [artikel 3:21, eerste lid, van de Algemene wet bestuursrecht][ref1],
      aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.7.3
    text: |-
      De [artikelen 3:21, derde lid][ref1], en [3:23, eerste en derde lid, van de Algemene wet bestuursrecht][ref2] zijn
      niet van toepassing op de gevallen, bedoeld in het eerste lid, onder a en b.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.8.1
    text: |-
      In een coördinatiebesluit als bedoeld in [artikel 3:20, onder b, van de Algemene wet bestuursrecht][ref1] kan,
      met het oog op de doelen van de wet en voor het optimaliseren van gebruiksruimte in een gebied, worden bepaald dat
      [afdeling 3.5 van die wet][ref2] van toepassing is op de voorbereiding van:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.8
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.5'
  - number: 16.8.1.a
    text: een omgevingsplan, waterschapsverordening of omgevingsverordening,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.8
  - number: 16.8.1.b
    text: een programma, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.8
  - number: 16.8.1.c
    text: een projectbesluit of een omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.8
  - number: 16.8.2
    text: |-
      [Artikel 3:28 van de Algemene wet bestuursrecht][ref1] is niet van toepassing op besluiten waartegen geen beroep
      kan worden ingesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.8
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: '16.9'
    text: 'Deze paragraaf is:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.9
  - number: 16.9.a
    text: |-
      van toepassing op de beslissingen op aanvragen om een omgevingsvergunning, bedoeld in
      [artikel 16.7, eerste lid, onder b][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.9.b
    text: |-
      van overeenkomstige toepassing op de beslissingen op aanvragen om wijziging van de voorschriften van
      een omgevingsvergunning of de beslissingen tot ambtshalve wijziging van die voorschriften, bedoeld in
      [artikel 16.7, eerste lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.10.1
    text: |-
      Als maar één van de aanvragen om een omgevingsvergunning, bedoeld in [artikel 16.7, eerste lid, onder b][ref1],
      is ingediend, laat het bevoegd gezag die aanvraag buiten behandeling, nadat de aanvrager eerst in de gelegenheid is
      gesteld de ontbrekende aanvraag in te dienen binnen een door het bevoegd gezag gestelde termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.10.2
    text: |-
      Als van beide aanvragen om een omgevingsvergunning, bedoeld in [artikel 16.7, eerste lid, onder b][ref1], er
      één buiten behandeling wordt gelaten, laat het bevoegd gezag voor de andere aanvraag ook die aanvraag buiten
      behandeling.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: '16.11'
    text: |-
      De bestuursorganen die bevoegd gezag zijn met betrekking tot elk van de aanvragen, bedoeld in
      [artikel 16.7, eerste lid, onder b][ref1], brengen aan elkaar een advies uit met het oog op de samenhang tussen de
      beslissingen op beide aanvragen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.12.1
    text: |-
      Als in de omgevingsvergunning voor de wateractiviteit met toepassing van [artikel 5.36, eerste lid][ref1], een
      termijn voor de gelding van de vergunning wordt gesteld, kan in de omgevingsvergunning voor de milieubelastende
      activiteit een gelijke termijn worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 16.12.2
    text: |-
      Als in de omgevingsvergunning voor de milieubelastende activiteit met toepassing van
      [artikel 5.36, eerste lid][ref1], een termijn voor de gelding van de vergunning wordt gesteld, wordt in de
      omgevingsvergunning voor de wateractiviteit een gelijke termijn gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 16.13.1
    text: |-
      Als gedeputeerde staten of Onze Minister die het aangaat het bevoegd gezag zijn voor de aanvraag om de
      omgevingsvergunning voor de milieubelastende activiteit, kunnen gedeputeerde staten respectievelijk Onze
      Minister die het aangaat, als dat vanwege de samenhang tussen de beslissingen op de beide aanvragen met het oog
      op het beschermen van het milieu geboden is, aan het bevoegd gezag voor de aanvraag om de omgevingsvergunning
      voor de wateractiviteit een instructie geven over de inhoud van die beslissing. Op de instructie zijn de
      [artikelen 2.33][ref1] en [2.34][ref2] van overeenkomstige toepassing, waarbij kan worden afgeweken van regels als
      bedoeld in de [artikelen 2.22][ref3] en [2.23][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 16.13.2
    text: |-
      De instructie wordt gegeven binnen acht weken na de dag waarop het ontwerpbesluit voor de
      beslissing op de aanvraag om de omgevingsvergunning voor de wateractiviteit overeenkomstig
      [artikel 3:11, eerste lid, van de Algemene wet bestuursrecht][ref1] ter inzage is gelegd en daarvan kennis is
      gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.13
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
    machine_readable:
      execution:
        parameters:
          - name: datum_terinzagelegging
            type: date
            required: true
            description: Datum waarop het ontwerpbesluit ter inzage is gelegd
        output:
          - name: uiterste_datum_instructie
            type: date
            description: Uiterste datum voor het geven van de instructie
        actions:
          - output: uiterste_datum_instructie
            value:
              operation: DATE_ADD
              date: $datum_terinzagelegging
              weeks: 8
  - number: 16.13.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing als het college van burgemeester en wethouders bevoegd
      gezag is voor de aanvraag om de omgevingsvergunning voor de milieubelastende activiteit, met dien verstande dat
      gedeputeerde staten op verzoek van het college van burgemeester en wethouders met overeenkomstige toepassing van
      [artikel 2.33][ref1] een instructie kunnen geven aan het bevoegd gezag voor de aanvraag om de omgevingsvergunning
      voor de wateractiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 16.14.1
    text: |-
      Als het college van burgemeester en wethouders het bevoegd gezag is voor de aanvraag om de omgevingsvergunning
      voor de milieubelastende activiteit, kunnen gedeputeerde staten, als dat vanwege de samenhang tussen de
      beslissingen op de beide aanvragen met het oog op het beschermen van het milieu geboden is, aan het college van
      burgemeester en wethouders, op verzoek van het bevoegd gezag voor de aanvraag om de omgevingsvergunning voor de
      wateractiviteit, een instructie geven over de inhoud van die beslissing. Op de instructie is [artikel 2.33][ref1]
      van overeenkomstige toepassing, waarbij kan worden afgeweken van regels als bedoeld in de [artikelen 2.22][ref2]
      en [2.23][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 16.14.2
    text: |-
      De instructie wordt gegeven binnen acht weken na de dag waarop het ontwerpbesluit op de
      aanvraag om de omgevingsvergunning voor de milieubelastende activiteit overeenkomstig
      [artikel 3:11, eerste lid, van de Algemene wet bestuursrecht][ref1] ter inzage is gelegd en daarvan kennis is
      gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.14
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.14a
    text: |-
      Als [afdeling 3.5 van de Algemene wet bestuursrecht][ref1] wordt toegepast op de voorbereiding van een
      omgevingsplan en de beslissing op een aanvraag om een omgevingsvergunning en de beslissing op die aanvraag wordt
      genomen gelijktijdig met of na de vaststelling van dat omgevingsplan, wordt bij de beslissing uitgegaan van de
      regels in dat omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.14a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.5'
  - number: 16.15.1
    text: |-
      Bij algemene maatregel van bestuur worden bestuursorganen of andere instanties aangewezen die, in daarbij
      aangewezen gevallen, in de gelegenheid worden gesteld om aan het bevoegd gezag of een ander bestuursorgaan advies
      uit te brengen over een aanvraag om een besluit op grond van deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15
  - number: 16.15.2
    text: |-
      Bij een omgevingsplan, waterschapsverordening of omgevingsverordening kunnen bestuursorganen of andere instanties
      worden aangewezen die in de gelegenheid worden gesteld om aan het bevoegd gezag advies uit de brengen over
      een aanvraag om een omgevingsvergunning voor een omgevingsplanactiviteit of een activiteit als bedoeld in
      [artikel 5.3][ref1] of [5.4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 16.15.3
    text: 'Een bestuursorgaan of andere instantie wordt als adviseur aangewezen als dat wenselijk is vanwege:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15
  - number: 16.15.3.a
    text: de deskundigheid van het bestuursorgaan of de instantie, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15
  - number: 16.15.3.b
    text: |-
      de door het bestuursorgaan te behartigen belangen, gelet op de aan dat bestuursorgaan toegedeelde taken voor de
      fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15
  - number: 16.15a
    text: |-
      Op grond van [artikel 16.15, eerste lid][ref1], worden in ieder geval als adviseur aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.15a.a
    text: |-
      een bestuursorgaan dat zijn bevoegdheid met toepassing van [artikel 5.16][ref1] heeft overgedragen aan een ander
      bestuursorgaan, voor zover de aanvraag betrekking heeft op de activiteit of activiteiten die bepalend zijn geweest
      voor de aanwijzing van dat bestuursorgaan als bevoegd gezag,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.15a.b
    text: 'de gemeenteraad als het gaat om:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
  - number: 16.15a.b.1°
    text: |-
      een aanvraag om een omgevingsvergunning voor in door de gemeenteraad aangewezen gevallen van een buitenplanse
      omgevingsplanactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
  - number: 16.15a.b.2°
    text: |-
      een verzoek om een beslissing over instemming voor in door de gemeenteraad aangewezen gevallen over een voorgenomen
      beslissing op een aanvraag als bedoeld onder 1°, als die beslissing op grond van [artikel 16.16][ref1] instemming
      van het college van burgemeester en wethouders behoeft,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.15a.c
    text: |-
      de gemeentelijke commissie, bedoeld in [artikel 17.9][ref1], als het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel17
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '17'
        hoofdstuk: '17'
        paragraaf: 17.2.2
        afdeling: '17.2'
  - number: 16.15a.c.1°
    text: een aanvraag om een omgevingsvergunning voor een rijksmonumentenactiviteit met betrekking tot een monument,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
  - number: 16.15a.c.2°
    text: |-
      een aanvraag om een omgevingsvergunning voor een andere activiteit, in door de gemeenteraad aangewezen gevallen of
      als het college van burgemeester en wethouders daartoe aanleiding ziet,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
  - number: 16.15a.d
    text: |-
      gedeputeerde staten als het gaat om een aanvraag om een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, in door hen aangewezen gevallen van een belang als bedoeld in
      [artikel 2.3, tweede lid, onder a][ref1], dat is aangegeven in een door een bestuursorgaan van de provincie
      openbaar gemaakt document.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 16.15b
    text: |-
      In een geval als bedoeld in [artikel 16.15a, onder b][ref1], worden de bij of krachtens deze wet gestelde regels
      over het beslissen op de aanvraag om de omgevingsvergunning of het verlenen of onthouden van instemming met
      inachtneming van het advies van de gemeenteraad toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.15b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.16.1
    text: |-
      Als een aanvraag om een besluit op grond van deze wet betrekking heeft op een bij algemene maatregel van bestuur
      aangewezen geval, behoeft de voorgenomen beslissing op de aanvraag instemming van het bestuursorgaan dat op grond
      van [artikel 16.15][ref1] in de gelegenheid is gesteld advies uit te brengen. Bij de aanwijzing kan worden bepaald
      dat alleen een voorgenomen beslissing tot het toewijzen van de aanvraag instemming behoeft.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.16.2
    text: |-
      Bij de maatregel worden gevallen aangewezen waarin instemming van het aangewezen bestuursorgaan wenselijk is
      vanwege:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
  - number: 16.16.2.a
    text: de bijzondere deskundigheid van het bestuursorgaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
  - number: 16.16.2.b
    text: |-
      door het bestuursorgaan te behartigen zwaarwegende belangen, gelet op de aan dat bestuursorgaan toegedeelde taken
      voor de fysieke leefomgeving, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
  - number: 16.16.2.c
    text: door het provinciebestuur te behartigen provinciale belangen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
  - number: 16.16.3
    text: |-
      Bij de maatregel kan worden bepaald dat het aangewezen bestuursorgaan gevallen kan aanwijzen waarin instemming niet
      is vereist.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
  - number: 16.16.4
    text: |-
      Het aangewezen bestuursorgaan kan bij het op grond van [artikel 16.15][ref1] uitgebrachte advies bepalen dat
      instemming niet is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.16.5
    text: |-
      In afwijking van [artikel 10:3, tweede lid, aanhef en onder c, van de Algemene wet bestuursrecht][ref1] kan het
      aangewezen bestuursorgaan mandaat verlenen om te beslissen over de instemming.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.16
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '10'
  - number: 16.17.1
    text: Bij algemene maatregel van bestuur worden gronden aangewezen voor het verlenen of onthouden van instemming.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.17
  - number: 16.17.2
    text: |-
      [Artikel 10:27 van de Algemene wet bestuursrecht][ref1] is niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.17
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '10'
  - number: 16.18.1
    text: |-
      Het besluit over instemming als bedoeld in [artikel 16.16][ref1] wordt binnen vier weken na indiening van het
      verzoek om instemming bekendgemaakt door toezending aan het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
    machine_readable:
      execution:
        parameters:
          - name: datum_indiening_verzoek
            type: date
            required: true
            description: Datum van indiening van het verzoek om instemming
        output:
          - name: uiterste_datum_bekendmaking
            type: date
            description: Uiterste datum voor bekendmaking van het instemmingsbesluit
        actions:
          - output: uiterste_datum_bekendmaking
            value:
              operation: DATE_ADD
              date: $datum_indiening_verzoek
              weeks: 4
  - number: 16.18.2
    text: |-
      [Artikel 10:31, tweede tot en met vierde lid, van de Algemene wet bestuursrecht][ref1] is niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.18
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '10'
  - number: 16.19.1
    text: |-
      De [artikelen 16.15 tot en met 16.18][ref1] en de op grond van de [artikelen 16.15 tot en met 16.17][ref2] gestelde
      regels zijn van overeenkomstige toepassing op een ambtshalve besluit tot wijziging of intrekking van een eerder op
      aanvraag genomen besluit voor zover die artikelen en regels op de aanvraag om dat eerdere besluit van toepassing
      zijn geweest.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.19.2
    text: |-
      Daarbij wordt voor een ambtshalve besluit als bedoeld in het eerste lid een voorgenomen ambtshalve besluit tot
      wijziging of intrekking van het eerdere besluit gelijkgesteld met een aanvraag om dat besluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.19
  - number: 16.20.1
    text: |-
      De [artikelen 16.15 tot en met 16.19][ref1] en de op grond van de [artikelen 16.15 tot en met 16.17][ref2] gestelde
      regels zijn van overeenkomstige toepassing op het uitbrengen van advies over het ontwerp van een projectbesluit en
      het verlenen van instemming met een voorgenomen projectbesluit, voor zover daarin wordt bepaald dat het geldt als
      omgevingsvergunning als bedoeld in [artikel 5.52, tweede lid, onder a][ref3], waarbij geen instemming is vereist
      als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 16.20.1.a
    text: |-
      een projectbesluit wordt vastgesteld door Onze Minister die het aangaat en dat projectbesluit geldt als een besluit
      waarmee een ander bestuursorgaan oorspronkelijk op grond van [artikel 16.16][ref1] zou moeten instemmen, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.20.1.b
    text: |-
      een projectbesluit wordt vastgesteld door gedeputeerde staten en het projectbesluit geldt als een besluit waarmee
      een ander bestuursorgaan, met uitzondering van een bestuursorgaan van het Rijk, oorspronkelijk op grond van
      [artikel 16.16][ref1] zou moeten instemmen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.20.2
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarbij de [artikelen 16.15][ref1] en
      [16.19][ref2] en de op grond van artikel 16.15 gestelde regels niet van overeenkomstige toepassing zijn op
      het uitbrengen van advies over het ontwerp van een projectbesluit dat wordt vastgesteld door Onze Minister die
      het aangaat en een ander bestuursorgaan van het Rijk oorspronkelijk op grond van artikel 16.15 of 16.19 in de
      gelegenheid zou moeten worden gesteld om te adviseren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.20.3
    text: |-
      De [artikelen 16.15 tot en met 16.19][ref1] zijn van overeenkomstige toepassing op het uitbrengen van advies over
      het ontwerp van een projectbesluit en het verlenen van instemming met een voorgenomen projectbesluit, voor zover
      daarin wordt bepaald dat het geldt als een besluit als bedoeld in [artikel 5.52, tweede lid, onder b][ref2]. Bij
      algemene maatregel van bestuur kunnen gevallen worden aangewezen waarbij instemming niet is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 16.21.1
    text: |-
      Gedeputeerde staten kunnen besluiten dat een onderdeel van een besluit tot vaststelling of wijziging van een
      omgevingsplan geen deel daarvan uitmaakt als:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.1.a
    text: |-
      zij over het onderdeel een zienswijze naar voren hebben gebracht en die zienswijze niet volledig in het
      omgevingsplan is overgenomen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.1.b
    text: |-
      in het onderdeel wijzigingen zijn aangebracht ten opzichte van het ontwerp, anders dan op grond van een zienswijze
      van gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.2
    text: 'Gedeputeerde staten kunnen alleen gebruik maken van die bevoegdheid voor zover:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.2.a
    text: dat nodig is met het oog op een evenwichtige toedeling van functies aan locaties, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.2.b
    text: |-
      er sprake is van strijd met een belang als bedoeld in [artikel 2.3, tweede lid, onder a][ref1], dat is aangegeven
      in een door een bestuursorgaan van de provincie openbaar gemaakt document.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 16.21.3
    text: |-
      Gedeputeerde staten vermelden in de motivering van het besluit de daaraan ten grondslag liggende feiten,
      omstandigheden en overwegingen die het provinciebestuur beletten het betrokken belang met inzet van andere aan hen
      toekomende bevoegdheden te beschermen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
  - number: 16.21.4
    text: |-
      Het besluit wordt bekendgemaakt binnen vier weken nadat het besluit tot vaststelling of wijziging van het
      omgevingsplan is bekendgemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.21
    machine_readable:
      execution:
        parameters:
          - name: datum_bekendmaking_omgevingsplan
            type: date
            required: true
            description: Datum waarop het besluit tot vaststelling of wijziging van het omgevingsplan is bekendgemaakt
        output:
          - name: uiterste_datum_bekendmaking_reactieve_interventie
            type: date
            description: Uiterste datum voor bekendmaking van het reactieve interventie-besluit
        actions:
          - output: uiterste_datum_bekendmaking_reactieve_interventie
            value:
              operation: DATE_ADD
              date: $datum_bekendmaking_omgevingsplan
              weeks: 4
  - number: '16.22'
    text: |-
      Deze paragraaf is van toepassing als bij of krachtens deze wet is bepaald dat
      [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.22
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.23.1
    text: Zienswijzen kunnen naar voren worden gebracht door een ieder.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.23
  - number: 16.23.2
    text: |-
      In afwijking van het eerste lid kunnen zienswijzen over een gedoogplichtbeschikking alleen naar voren worden
      gebracht door belanghebbenden en door de besturen van de gemeenten, de waterschappen en de provincies waarin de
      onroerende zaak gelegen is of naastgelegen gemeenten, waterschappen en provincies.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.23
  - number: 16.23.3
    text: |-
      In afwijking van het eerste lid kunnen zienswijzen over een onteigeningsbeschikking naar voren worden gebracht
      door belanghebbenden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.23
  - number: 16.24.1
    text: |-
      Tenzij het gaat om een bij algemene maatregel van bestuur aangewezen geval of besluit, zijn de
      [paragrafen 16.3.1a tot en met 16.3.9][ref1] en de [artikelen 16.40, eerste lid][ref2], [16.50, eerste lid][ref3],
      [16.70][ref4] en [16.71][ref5] van overeenkomstige toepassing op een wijziging of intrekking van de daarin genoemde
      besluiten of andere rechtsfiguren of documenten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '16'
        paragraaf: 16.3.3
        afdeling: '16.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.6.1
        afdeling: '16.6'
      - id: ref5
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.6.2
        afdeling: '16.6'
  - number: 16.24.2
    text: |-
      Een bestuursorgaan kan [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] buiten toepassing laten als het gaat
      om een wijziging die alleen ziet op het herstel van een kennelijke verschrijving.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.24
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.24a
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van
      een besluit tot vaststelling van geluidproductieplafonds als omgevingswaarden als bedoeld in de
      [artikelen 2.12a, eerste lid][ref2], [2.13a, eerste lid][ref3], en [2.15, tweede lid][ref4], in bij algemene
      maatregel van bestuur aangewezen gevallen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.24a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref4
