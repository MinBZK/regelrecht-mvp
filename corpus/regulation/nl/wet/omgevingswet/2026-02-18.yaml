  - number: 20.3.2
    text: 'Daarbij kunnen in ieder geval regels worden gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.a
    text: |-
      het meten of berekenen, waaronder de frequentie daarvan, de verhouding tussen het meten en berekenen en de
      monitoringspunten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.b
    text: de verificatie en beoordeling van gelijkwaardigheid van te gebruiken methoden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.c
    text: de beoordeling van de resultaten en de daarbij te gebruiken methoden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.d
    text: de vaststelling van ontwikkelingen of trends,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.e
    text: de inrichting en het beheer van landelijke of regionale meetnetten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.f
    text: de kwaliteitsborging en de coördinatie daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.2.g
    text: de wijze van opslag van gegevens.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
  - number: 20.3.3
    text: De regels worden voor primaire waterkeringen steeds na ten hoogste twaalf jaar herzien.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.3
    machine_readable:
      execution:
        parameters:
          - name: datum_laatste_herziening
            type: date
            required: true
            description: Datum van de laatste herziening van de regels
        output:
          - name: uiterste_herzieningsdatum
            type: date
            description: Uiterste datum voor de volgende herziening
        actions:
          - output: uiterste_herzieningsdatum
            value:
              operation: DATE_ADD
              date: $datum_laatste_herziening
              years: 12
