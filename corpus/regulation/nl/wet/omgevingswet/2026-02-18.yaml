        bwb_id: BWBR0005645
        artikel: 228b
      - id: ref5
        bwb_id: BWBR0005645
        artikel: 228c
      - id: ref6
        bwb_id: BWBR0005645
        artikel: '232'
      - id: ref7
        bwb_id: BWBR0005645
        artikel: 232aa
      - id: ref8
        bwb_id: BWBR0005645
        artikel: 232b
      - id: ref9
        bwb_id: BWBR0005645
        artikel: 232c
      - id: ref10
