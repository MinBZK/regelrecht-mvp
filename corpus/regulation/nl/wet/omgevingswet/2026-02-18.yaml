        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: '16.25'
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van de aanwijzing
      van zwemlocaties.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.25
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.25a.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een aanwijzing van
      een Natura 2000-gebied of een bijzonder nationaal natuurgebied.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.25a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.25a.2
    text: |-
      Een bestuursorgaan kan [afdeling 3.4 van de Algemene wet bestuursrecht][ref1], voor zover niet in strijd met
      internationaalrechtelijke verplichtingen, buiten toepassing laten bij de voorbereiding van een aanwijzing als
      bedoeld in het eerste lid, als het gaat om een wijziging van ondergeschikte aard die niet leidt tot grotere
      nadelige gevolgen voor het milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.25a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: '16.26'
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      omgevingsvisie.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.26
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.27.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een programma als
      bedoeld in de [paragrafen 3.2.2 tot en met 3.2.4][ref2] en de documenten die voor het opstellen van een programma
      afzonderlijk worden vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.27
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 16.27.2
    text: |-
      Een bestuursorgaan kan [afdeling 3.4 van de Algemene wet bestuursrecht][ref1], voor zover niet in strijd met
      internationaalrechtelijke verplichtingen, buiten toepassing laten bij de voorbereiding van een programma of
      document als bedoeld in het eerste lid, als het gaat om een wijziging van ondergeschikte aard die niet leidt tot
      grotere nadelige gevolgen voor het milieu en die wijziging niet ziet op een in dat programma opgenomen beschrijving
      van een activiteit als gevolg waarvan de activiteit is toegestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.27
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.28.1
    text: 'Onze Minister van Infrastructuur en Waterstaat legt ter inzage:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: 16.28.1.a
    text: |-
      een tijdschema en werkprogramma voor het opstellen van een stroomgebiedsbeheerplan, ten minste drie jaar voor het
      begin van de periode waarop het plan betrekking heeft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: 16.28.1.b
    text: |-
      een tussentijds overzicht van belangrijke waterbeheerkwesties die zijn geconstateerd in de stroomgebiedsdistricten
      Rijn, Maas, Schelde en Eems, ten minste twee jaar voor het begin van de periode waarop het stroomgebiedsbeheerplan
      betrekking heeft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: 16.28.1.c
    text: |-
      het ontwerp van een stroomgebiedsbeheerplan, ten minste een jaar voor het begin van de periode waarop het plan
      betrekking heeft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: 16.28.1.d
    text: |-
      het ontwerp van een overstromingsrisicobeheerplan, ten minste een jaar voor het begin van de periode waarop het
      plan betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: 16.28.2
    text: |-
      Voor documenten als bedoeld in het eerste lid, onder a en b, en het ontwerp, bedoeld in het eerste lid, onder c en
      d, bedraagt de termijn voor het naar voren brengen van zienswijzen zes maanden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.28
  - number: '16.29'
    text: |-
      Van het voornemen om een omgevingsplan vast te stellen wordt kennisgegeven op de in
      [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.29
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 16.30.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.30
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.30.2
    text: |-
      In afwijking van [artikel 3:1, eerste lid, aanhef en onder b, van de Algemene wet bestuursrecht][ref1] zijn de
      [artikelen 3:43 tot en met 3:45][ref2] en [afdeling 3.7 van die wet][ref3] van toepassing op een omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.7
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.30
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0005537
        afdeling: '3.7'
  - number: '16.31'
    text: |-
      Zienswijzen kunnen geen betrekking hebben op het deel van het ontwerp van een omgevingsplan dat zijn grondslag
      vindt in een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.31
  - number: '16.32'
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      waterschapsverordening en een omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.32
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.32a
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een peilbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.32a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.32b
    text: |-
      Het bestuursorgaan geeft kennis van de terinzagelegging van de voorkeursrechtbeschikking en de op de beschikking
      betrekking hebbende stukken op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze. De ten behoeve van
      de terinzagelegging aan te wijzen locatie, bedoeld in [artikel 13, eerste lid, van de Bekendmakingswet][ref2], is
      gelegen binnen de gemeente of gemeenten waarin de onroerende zaak ligt.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.32b
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '13'
  - number: 16.32c.1
    text: |-
      Als bezwaar aanhangig is tegen een voorkeursrechtbeschikking van het college van burgemeester en wethouders en die
      beschikking vervalt omdat voor de onroerende zaak een voorkeursrechtbeschikking van de gemeenteraad in werking is
      getreden, wordt het bezwaar geacht te zijn gericht tegen de voorkeursrechtbeschikking van de gemeenteraad.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.32c
  - number: 16.32c.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing als het bezwaar is gericht tegen een voorkeursrechtbeschikking
      van gedeputeerde staten en die beschikking vervalt omdat voor de onroerende zaak een voorkeursrechtbeschikking van
      provinciale staten in werking is getreden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.32c
  - number: 16.33.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      gedoogplichtbeschikking.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.33.2
    text: |-
      De verplichting tot gedogen gaat niet eerder in dan vier dagen na de dag waarop de gedoogplichtbeschikking is
      bekendgemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33
    machine_readable:
      execution:
        parameters:
          - name: datum_bekendmaking
            type: date
            required: true
            description: Datum waarop de gedoogplichtbeschikking is bekendgemaakt
        output:
          - name: datum_ingang_gedoogplicht
            type: date
            description: Vroegste datum waarop de verplichting tot gedogen ingaat
        actions:
          - output: datum_ingang_gedoogplicht
            value:
              operation: DATE_ADD
              date: $datum_bekendmaking
              days: 4
  - number: 16.33.3
    text: |-
      Het eerste lid is niet van toepassing op de voorbereiding van een gedoogplichtbeschikking als bedoeld in de
      [artikelen 10.16][ref1] en [10.17, eerste lid, en tweede lid, onder a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 16.33.4
    text: |-
      Het eerste en tweede lid zijn niet van toepassing op de voorbereiding van een gedoogplichtbeschikking als bedoeld
      in de [artikelen 10.19][ref1], [10.19a][ref2] en [10.21a][ref3] vanwege spoedeisende omstandigheden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 16.33a
    text: |-
      [Artikel 3:20, aanhef en onder b, van de Algemene wet bestuursrecht][ref1] en [artikel 16.87][ref2] zijn niet van
      toepassing op een gedoogplichtbeschikking.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.3
        afdeling: '16.7'
  - number: 16.33b
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      onteigeningsbeschikking.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33b
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.33c
    text: |-
      Als een belanghebbende is overleden, buiten het Koninkrijk woont of geen bekende woonplaats heeft, wordt het
      ontwerp van de onteigeningsbeschikking ook toegezonden aan de erfgenaam, gevolmachtigde of bewindvoerder van de
      belanghebbende, tenzij er redelijkerwijs geen erfgenaam, gevolmachtigde of bewindvoerder bekend kan zijn voor het
      bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33c
  - number: 16.33d.1
    text: |-
      De terinzagelegging van de ontwerponteigeningsbeschikking vindt plaats binnen de gemeente of gemeenten waarin de
      onroerende zaak ligt. De kosten van de terinzagelegging en de kennisgeving komen voor rekening van de onteigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
  - number: 16.33d.2
    text: 'Bij de bekendmaking en de kennisgeving van de onteigeningsbeschikking vermeldt het bestuursorgaan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
  - number: 16.33d.2.a
    text: welke rechtbank het zal verzoeken de onteigeningsbeschikking te bekrachtigen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
  - number: 16.33d.2.b
    text: |-
      dat belanghebbenden binnen zes weken na de dag waarop de beschikking ter inzage is gelegd, bij die rechtbank
      schriftelijk bedenkingen kunnen inbrengen tegen de beschikking,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
    machine_readable:
      execution:
        parameters:
          - name: datum_terinzagelegging
            type: date
            required: true
            description: Datum waarop de onteigeningsbeschikking ter inzage is gelegd
        output:
          - name: uiterste_datum_bedenkingen
            type: date
            description: Uiterste datum voor het inbrengen van bedenkingen bij de rechtbank
        actions:
          - output: uiterste_datum_bedenkingen
            value:
              operation: DATE_ADD
              date: $datum_terinzagelegging
              weeks: 6
  - number: 16.33d.2.c
    text: |-
      dat de beschikking in werking treedt met ingang van de dag na die waarop de uitspraak waarbij zij is bekrachtigd,
      op de voorgeschreven wijze is bekendgemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
  - number: 16.33d.3
    text: |-
      Als een belanghebbende is overleden, buiten het Koninkrijk woont of geen bekende woonplaats heeft, wordt de
      onteigeningsbeschikking ook gezonden aan de erfgenaam, gevolmachtigde of bewindvoerder van de belanghebbende,
      tenzij er redelijkerwijs geen erfgenaam, gevolmachtigde of bewindvoerder bekend kan zijn voor het bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33d
  - number: 16.33e
    text: |-
      Een onteigeningsbeschikking treedt in werking met ingang van de dag na die waarop de uitspraak waarbij zij is
      bekrachtigd, ter inzage is gelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33e
  - number: 16.33f.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      inrichtingsbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33f
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.33f.2
    text: |-
      In het inrichtingsbesluit wordt aangegeven hoe de in [artikel 12.11][ref1] bedoelde openbare lichamen en
      rechtspersonen, voor zover deze de eigendom, het beheer of het onderhoud hadden voorafgaand aan de landinrichting,
      bij de voorbereiding van het ontwerp van het inrichtingsbesluit zijn betrokken en wat de resultaten daarvan zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33f
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.2
        afdeling: '12.2'
  - number: 16.33g.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      besluit tot het tijdelijk in gebruik geven van tot een herverkavelingsblok behorende percelen als bedoeld in
      [artikel 12.21, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33g
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 16.33g.2
    text: |-
      Tegelijk met de kennisgeving, bedoeld in [artikel 3:12, eerste lid, van de Algemene wet bestuursrecht][ref1], geven
      gedeputeerde staten kennis van de terinzagelegging en van de zakelijke inhoud van het ontwerpbesluit aan de bij hen
      bekende belanghebbenden, waaronder in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33g
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.33g.2.a
    text: |-
      zij die met betrekking tot de percelen, bedoeld in [artikel 12.21, eerste lid][ref1], voorkomen op de lijst
      van rechthebbenden, bedoeld in [artikel 12.22][ref2], die deel uitmaakt van het voor het desbetreffende
      herverkavelingsblok in voorbereiding zijnde of vastgestelde ruilbesluit,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33g
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 16.33g.2.b
    text: |-
      zij die in overeenstemming met [artikel 16.125, eerste of tweede lid][ref1], een pachtovereenkomst met betrekking
      tot de percelen, bedoeld in [artikel 12.21, eerste lid][ref2], ter registratie hebben ingezonden, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33g
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 16.33g.2.c
    text: |-
      de wederpartij, bedoeld in [artikel 16.125, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33g
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.33h.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een ruilbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.33h.2
    text: |-
      In het ruilbesluit wordt aangegeven hoe de eigenaren en gebruikers bij de voorbereiding van het ontwerp van het
      ruilbesluit zijn betrokken en wat de resultaten daarvan zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
  - number: 16.33h.3
    text: |-
      Tegelijk met de kennisgeving, bedoeld in [artikel 3:12, eerste lid, van de Algemene wet bestuursrecht][ref1], geven
      gedeputeerde staten kennis van de terinzagelegging en van de zakelijke inhoud van het ontwerpbesluit aan de bij hen
      bekende belanghebbenden, onder wie in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.33h.3.a
    text: |-
      zij die voorkomen op de lijst van rechthebbenden, bedoeld in [artikel 12.22][ref1], die deel uitmaakt van het
      ontwerpbesluit,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 16.33h.3.b
    text: |-
      zij die op grond van [artikel 16.125, eerste of tweede lid][ref1], een pachtovereenkomst ter registratie hebben
      ingezonden,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.33h.3.c
    text: |-
      de wederpartij, bedoeld in [artikel 16.125, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.33i.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een besluit
      geldelijke regelingen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33i
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.33i.2
    text: |-
      Tegelijk met de kennisgeving, bedoeld in [artikel 3:12, eerste lid, van de Algemene wet bestuursrecht][ref1], geven
      gedeputeerde staten kennis van de terinzagelegging en van de zakelijke inhoud van het ontwerpbesluit aan de bij hen
      bekende belanghebbenden.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33i
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.33j
    text: |-
      Als bij gelijktijdige terinzagelegging van het ontwerp van het ruilbesluit en het ontwerp van het besluit
      geldelijke regelingen op grond van [artikel 12.38, derde lid][ref1], zienswijzen naar voren zijn gebracht, stellen
      gedeputeerde staten het besluit geldelijke regelingen vast nadat het ruilbesluit onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33j
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.3
        afdeling: '12.4'
  - number: 16.33k.1
    text: |-
      Als na toepassing van [artikel 16.33j][ref1] het onherroepelijke ruilbesluit anders luidt dan het ter inzage
      gelegde ontwerp, stellen gedeputeerde staten een gewijzigd ontwerp op van het besluit geldelijke regelingen, waarin
      de geldelijke gevolgen van de wijzigingen in het ruilbesluit worden opgenomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33k
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.3.9
        afdeling: '16.3'
  - number: 16.33k.2
    text: |-
      [Artikel 16.33i][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33k
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.3.9
        afdeling: '16.3'
  - number: 16.33l
    text: |-
      Voor zover het beroep tegen het inrichtingsbesluit betrekking had op de toedeling van eigendom,
      [bedoeld in 12.8, eerste lid, onder a, c en d][ref1], en die toedeling betrekking had op onroerende zaken buiten
      het herverkavelingsblok, doen gedeputeerde staten van de uitspraak in beroep mededeling door toezending, voor
      inschrijving in de openbare registers, aan de Dienst voor het kadaster en de openbare registers:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33l
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 16.33l.a
    text: |-
      als door de uitspraak de eigendom aan een ander wordt toegedeeld dan in de in [artikel 16.124, eerste lid][ref1],
      bedoelde akte is vermeld,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33l
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.1
        afdeling: '16.12'
  - number: 16.33l.b
    text: |-
      als de in [artikel 16.136][ref1] bedoelde herverkavelingsakte is ingeschreven in de openbare registers en door de
      uitspraak de eigendom aan een ander wordt toegedeeld dan in de herverkavelingsakte is vermeld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.33l
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.34.1
    text: |-
      Deze paragraaf gaat over de milieueffectrapportage voor plannen en programma’s als bedoeld in artikel 2, onder a,
      van de smb-richtlijn, waarvan de vaststelling is geregeld in wettelijke of bestuursrechtelijke bepalingen en waarin
      het voor de vaststelling van die plannen en programma’s bevoegde bestuursorgaan en de procedure voor de opstelling
      ervan is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.34
  - number: 16.34.2
    text: |-
      In deze paragraaf wordt onder een plan of programma in ieder geval verstaan een omgevingsvisie, een programma, een
      omgevingsplan en een voorkeursbeslissing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.34
  - number: '16.35'
    text: 'Deze paragraaf is niet van toepassing op plannen of programma’s die:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.35
  - number: 16.35.a
    text: |-
      alleen bestemd zijn voor nationale defensie of noodzakelijk zijn vanwege een noodtoestand als bedoeld in de
      [Coördinatiewet uitzonderingstoestanden][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0007981
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.35
    references:
      - id: ref1
        bwb_id: BWBR0007981
  - number: 16.35.b
    text: betrekking hebben op de begroting of de financiën van een gemeente, een waterschap, een provincie of het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.35
  - number: 16.36.1
    text: |-
      Het bevoegd gezag voor een plan of programma maakt bij de voorbereiding daarvan een milieueffectrapport
      als dat plan of programma het kader vormt voor te nemen besluiten voor projecten als bedoeld in
      [artikel 16.43, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.36.2
    text: |-
      Het bevoegd gezag voor een plan of programma maakt bij de voorbereiding daarvan een milieueffectrapport als bij de
      voorbereiding van dat plan of programma op grond van [artikel 16.53c][ref1] een passende beoordeling moet worden
      gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        afdeling: 16.4a
  - number: 16.36.3
    text: |-
      Voor een plan of programma als bedoeld in het eerste of tweede lid dat het gebruik bepaalt van kleine gebieden
      op lokaal niveau of voor kleine wijzigingen van een plan of programma als bedoeld in het eerste of tweede lid
      maakt het bevoegd gezag een milieueffectrapport als dat plan of programma of de wijzigingen daarvan aanzienlijke
      milieueffecten kunnen hebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
  - number: 16.36.4
    text: |-
      Voor een plan of programma dat het kader vormt voor te nemen besluiten voor andere projecten dan bedoeld in het
      eerste lid maakt het bevoegd gezag een milieueffectrapport als dat plan of programma aanzienlijke milieueffecten
      kan hebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
  - number: 16.36.5
    text: |-
      Het bevoegd gezag beoordeelt of sprake is van aanzienlijke milieueffecten als bedoeld in het derde en vierde lid,
      tenzij het zonder een voorafgaande beoordeling een milieueffectrapport maakt. Het bevoegd gezag houdt bij het
      besluit over de beoordeling van de milieueffecten rekening met de criteria van bijlage II bij de smb-richtlijn. Het
      bevoegd gezag raadpleegt daarvoor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
  - number: 16.36.5.a
    text: |-
      de bestuursorganen en instanties die op grond van een wettelijk voorschrift adviseren over de besluiten, bedoeld in
      [artikel 16.43, eerste lid][ref1], waarvoor het plan of programma het kader vormt, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.36.5.b
    text: |-
      Onze Minister van Infrastructuur en Waterstaat, Onze Minister voor Natuur en Stikstof, Onze Minister van Onderwijs,
      Cultuur en Wetenschap of in plaats van de betrokken minister een door hem aangewezen bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
  - number: 16.36.6
    text: Bij algemene maatregel van bestuur worden regels gesteld over de toepassing van het derde lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.36
  - number: '16.37'
    text: 'Om overlapping van milieueffectrapporten te voorkomen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.a
    text: 'stemt het bevoegd gezag het milieueffectrapport, waaronder het detailniveau daarvan, af op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.a.1°
    text: de mate van gedetailleerdheid van het plan of programma,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.a.2°
    text: de fase van het besluitvormingsproces waarin het plan of programma zich bevindt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.a.3°
    text: |-
      als het plan of programma deel uitmaakt van een rangorde van plannen of programma’s, in het bijzonder op de plaats
      die het plan of programma inneemt in die rangorde,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.b
    text: 'kan het bevoegd gezag gebruikmaken van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.b.1°
    text: andere milieueffectrapporten als die voldoen aan de bij of krachtens deze paragraaf gestelde eisen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.37.b.2°
    text: |-
      relevante informatie over de milieueffecten van het plan of programma die op grond van verordeningen, richtlijnen
      en besluiten als bedoeld in artikel 288 van het Verdrag betreffende de werking van de Europese Unie is verkregen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.37
  - number: 16.38.1
    text: |-
      Over de reikwijdte en het detailniveau van de informatie in het milieueffectrapport raadpleegt het bevoegd gezag de
      bestuursorganen en instanties, bedoeld in [artikel 16.36, vijfde lid, onder a en b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
  - number: 16.38.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de procedure voor de raadpleging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.38
  - number: 16.39.1
    text: |-
      Het bevoegd gezag stelt de Commissie voor de milieueffectrapportage in de gelegenheid om over het
      milieueffectrapport te adviseren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.39
  - number: 16.39.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de procedure voor de advisering.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.39
  - number: 16.40.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een plan of
      programma als bedoeld in [artikel 16.36][ref2] waarvoor een milieueffectrapport moet worden gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
  - number: 16.40.2
    text: |-
      Een milieueffectrapport dat is opgenomen in een plan of programma wordt in dat plan of programma als zodanig
      herkenbaar weergegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
  - number: 16.40.3
    text: 'Als het milieueffectrapport niet is opgenomen in het ontwerp van een plan of programma:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
  - number: 16.40.3.a
    text: |-
      wordt bij de terinzagelegging, bedoeld in [artikel 3:11 van de Algemene wet bestuursrecht][ref1], ook het
      milieueffectrapport ter inzage gelegd,


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.40.3.b
    text: |-
      wordt bij de kennisgeving, bedoeld in [artikel 3:12 van de Algemene wet bestuursrecht][ref1], ook kennisgegeven
      van het milieueffectrapport, en


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.40.3.c
    text: |-
      kan een zienswijze als bedoeld in [artikel 3:15 van de Algemene wet bestuursrecht][ref1] ook betrekking hebben op
      het milieueffectrapport.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.40.4
    text: |-
      Het bevoegd gezag stelt het plan of programma niet eerder vast dan twee weken na afloop van de termijn, bedoeld in
      [artikel 3:16, eerste lid, van de Algemene wet bestuursrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.40
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: '16.41'
    text: |-
      Het bevoegd gezag stelt een plan of programma niet vast als het milieueffectrapport redelijkerwijs niet aan het
      plan of programma ten grondslag kan worden gelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.41
  - number: '16.42'
    text: Bij algemene maatregel van bestuur worden regels gesteld over de inhoud van het milieueffectrapport.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.42
  - number: 16.42a
    text: 'Bij algemene maatregel van bestuur worden regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.42a
  - number: 16.42a.a
    text: de monitoring van de mogelijk aanzienlijke milieueffecten van de uitvoering van het plan of programma, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.42a
  - number: 16.42a.b
    text: het treffen van passende herstellende maatregelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.42a
  - number: 16.42b
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over een plan of programma waarvoor een
      milieueffectrapport moet worden gemaakt en dat mogelijk aanzienlijke grensoverschrijdende milieueffecten heeft, met
      inbegrip van de situatie dat Nederland deze grensoverschrijdende milieueffecten ondervindt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.42b
  - number: 16.43.1
    text: 'Bij algemene maatregel van bestuur worden de projecten en de daarvoor benodigde besluiten aangewezen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.1.a
    text: |-
      die aanzienlijke milieueffecten kunnen hebben en waarvoor bij de voorbereiding van het besluit een
      milieueffectrapport moet worden gemaakt, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.1.b
    text: |-
      waarvoor moet worden beoordeeld of die aanzienlijke milieueffecten kunnen hebben, en, als dat het geval is,
      waarvoor bij de voorbereiding van het besluit een milieueffectrapport moet worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.2
    text: |-
      Het bevoegd gezag beoordeelt of sprake is van aanzienlijke milieueffecten als bedoeld in het eerste lid,
      onder b, tenzij degene die voornemens is het project uit te voeren bij de voorbereiding van het besluit een
      milieueffectrapport maakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.3
    text: 'Bij de beoordeling houdt het bevoegd gezag rekening met:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.3.a
    text: de relevante criteria van bijlage III bij de mer-richtlijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.3.b
    text: |-
      voor zover relevant: de resultaten van eerder uitgevoerde controles of andere beoordelingen van milieueffecten
      die op grond van verordeningen, richtlijnen en besluiten als bedoeld in artikel 288 van het Verdrag betreffende de
      werking van de Europese Unie zijn verkregen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.4
    text: 'Bij de maatregel kan worden bepaald dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.4.a
    text: de aanwijzing van een project of besluit alleen geldt in daarbij aangewezen gevallen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.4.b
    text: |-
      een omgevingsvisie, programma of onderdeel van een omgevingsplan als een te nemen besluit voor een project wordt
      aangemerkt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.43.5
    text: Degene die voornemens is het project uit te voeren maakt het milieueffectrapport.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.43
  - number: 16.44.1
    text: |-
      Het bevoegd gezag kan op verzoek of ambtshalve ontheffing verlenen van de verplichtingen op grond van deze
      paragraaf voor een project of deel daarvan dat alleen is bestemd voor defensie of voor een project dat alleen
      noodzakelijk is vanwege een noodtoestand als bedoeld in de [Coördinatiewet uitzonderingstoestanden][ref1] als
      toepassing van de verplichtingen nadelige gevolgen heeft voor defensie of het bestrijden van de noodtoestand.


      [ref1]: https://wetten.overheid.nl/BWBR0007981
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.44
    references:
      - id: ref1
        bwb_id: BWBR0007981
  - number: 16.44.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan op verzoek van degene die voornemens is het project uit te
      voeren ontheffing verlenen van de verplichtingen op grond van deze paragraaf als de toepassing daarvan nadelige
      gevolgen heeft voor het doel van het project en aan de doelstellingen van de mer-richtlijn wordt voldaan, tenzij
      het project aanzienlijke grensoverschrijdende effecten kan hebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.44
  - number: 16.44.3
    text: |-
      Als toepassing wordt gegeven aan het tweede lid, beoordeelt Onze Minister van Infrastructuur en Waterstaat of een
      andere vorm van beoordeling van de milieueffecten geschikt is. Als een andere beoordeling van de milieueffecten
      moet worden uitgevoerd, is [artikel 16.49, eerste en derde lid][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.44
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.44.4
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld over het verstrekken van gegevens en bescheiden bij
      een verzoek om ontheffing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.44
  - number: 16.45.1
    text: |-
      Degene die voornemens is een project als bedoeld in [artikel 16.43, eerste lid, aanhef en onder b][ref1], uit te
      voeren, deelt dat voornemen zo spoedig mogelijk mee aan het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.45.2
    text: |-
      Het eerste lid is niet van toepassing als degene die voornemens is het project uit te voeren bij de voorbereiding
      van het besluit een milieueffectrapport maakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.45
  - number: 16.45.3
    text: Bij algemene maatregel van bestuur worden regels gesteld over de inhoud van de mededeling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.45
  - number: 16.46.1
    text: |-
      Op verzoek van degene die voornemens is het project uit te voeren brengt het bevoegd gezag advies uit over de
      reikwijdte en het detailniveau van de informatie voor het milieueffectrapport.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.46
  - number: 16.46.2
    text: |-
      Het bevoegd gezag raadpleegt voor het advies de bestuursorganen en instanties, bedoeld in
      [artikel 16.36, vijfde lid, onder a en b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
  - number: 16.46.3
    text: Bij algemene maatregel van bestuur worden regels gesteld over de procedure voor de advisering en de raadpleging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.46
  - number: 16.47.1
    text: |-
      Het bevoegd gezag kan de Commissie voor de milieueffectrapportage in de gelegenheid stellen advies uit te brengen
      over het milieueffectrapport.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.47
  - number: 16.47.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de procedure voor de advisering.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.47
  - number: '16.48'
    text: |-
      Degene die het milieueffectrapport zou moeten maken, kan gebruik maken van een ander milieueffectrapport als
      dat voldoet aan de bij of krachtens deze afdeling gestelde eisen en het project in dat milieueffectrapport is
      beschreven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.48
  - number: 16.49.1
    text: |-
      Bij de aanvraag om een besluit als bedoeld in [artikel 16.43, eerste lid][ref1], waarvoor een milieueffectrapport
      moet worden gemaakt, wordt een milieueffectrapport gevoegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.49.2
    text: |-
      Bij de aanvraag om een besluit waarop [artikel 16.43, tweede lid][ref1], van toepassing is, wordt de mededeling
      van het voornemen, bedoeld in [artikel 16.45][ref2], gevoegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.49.3
    text: |-
      Als niet wordt voldaan aan het eerste of tweede lid, wordt de aanvraag buiten behandeling gelaten nadat de
      aanvrager eerst in de gelegenheid is gesteld binnen een door het bevoegd gezag gestelde termijn de aanvraag aan te
      vullen. Een besluit om de aanvraag niet te behandelen wordt aan de aanvrager bekendgemaakt binnen vier weken nadat
      de aanvraag is aangevuld of nadat de daarvoor gestelde termijn ongebruikt is verstreken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.49
  - number: 16.49.4
    text: |-
      Als het bevoegd gezag overeenkomstig [artikel 16.43, tweede lid][ref1], na de aanvraag beslist of er een
      milieueffectrapport moet worden gemaakt, houdt het de beslissing op de aanvraag aan zolang die beslissing
      niet is genomen, tenzij het gaat om een aanvraag om een omgevingsvergunning voor een op grond van
      [artikel 5.26, vierde lid][ref2], aangewezen geval. Als het bevoegd gezag beslist dat een milieueffectrapport
      gemaakt moet worden, wordt de aanvraag afgewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 16.49.5
    text: |-
      Als het milieueffectrapport niet voldoet aan de op grond van [artikel 16.52][ref1] gestelde regels, wijst het
      bevoegd gezag de aanvraag af nadat de aanvrager in de gelegenheid is gesteld binnen een door het bevoegd gezag
      gestelde termijn het milieueffectrapport aan te vullen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.50.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een besluit als
      bedoeld in [artikel 16.43, eerste lid][ref2], waarvoor een milieueffectrapport moet worden gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.50
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.50.2
    text: |-
      [Artikel 16.40, tweede, derde en vierde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
  - number: 16.51.1
    text: |-
      Het bevoegd gezag stelt een besluit niet vast als het milieueffectrapport redelijkerwijs niet aan het project ten
      grondslag kan worden gelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.51
  - number: 16.51.2
    text: |-
      [Artikel 16.5][ref1] is niet van toepassing op het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.51
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.1.2
        afdeling: '16.1'
  - number: 16.52.1
    text: Bij algemene maatregel van bestuur worden regels gesteld over de inhoud van het milieueffectrapport.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.52
  - number: 16.52.2
    text: |-
      Bij de maatregel worden ten aanzien van de in het milieueffectrapport op te nemen onderwerpen in ieder geval regels
      gesteld over:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.52
  - number: 16.52.2.a
    text: de beschrijving van het project, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.52
  - number: 16.52.2.b
    text: de beschrijving van de redelijke alternatieven voor het project.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.52
  - number: 16.52.3
    text: |-
      Als voor het project in een plan of programma als bedoeld in [artikel 16.36, eerste of tweede lid][ref1], een
      locatie, waaronder een tracé, is aangewezen, en voor dat plan of programma een milieueffectrapport is gemaakt,
      zijn de op grond van het tweede lid, aanhef en onder b, gestelde regels niet van toepassing voor zover het gaat om
      alternatieven voor die locatie of dat tracé.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.1
        afdeling: '16.4'
  - number: 16.53.1
    text: |-
      Bij het nemen van een besluit als bedoeld in [artikel 16.43, eerste lid][ref1], houdt het bevoegd gezag rekening
      met alle gevolgen die het project, waarop het besluit betrekking heeft, voor het milieu kan hebben.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.4.2
        afdeling: '16.4'
  - number: 16.53.2
    text: 'Het bevoegd gezag kan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53
  - number: 16.53.2.a
    text: |-
      aan een besluit, ongeacht de beperkingen die in de wettelijke regeling waarop het besluit berust, zijn gesteld,
      de voorschriften verbinden, die nodig zijn voor het beschermen van het milieu, waaronder voorschriften over
      monitoring,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53
  - number: 16.53.2.b
    text: |-
      beslissen dat het project niet wordt uitgevoerd als het uitvoeren van dat project kan leiden tot ontoelaatbare
      gevolgen voor het milieu.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53
  - number: 16.53.3
    text: |-
      Een besluit dat op grond van een andere wettelijke regeling wordt genomen, wordt als toepassing aan het tweede lid
      wordt gegeven, geacht op grond van die regeling te worden genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53
  - number: 16.53a
    text: 'Bij algemene maatregel van bestuur worden regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53a
  - number: 16.53a.a
    text: de monitoring van de mogelijk aanzienlijke milieueffecten van de uitvoering van het project, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53a
  - number: 16.53a.b
    text: het treffen van passende herstellende maatregelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53a
  - number: 16.53b
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over een project waarvoor een milieueffectrapport moet
      worden gemaakt en dat mogelijk aanzienlijke grensoverschrijdende milieueffecten heeft, met inbegrip van de situatie
      dat Nederland deze grensoverschrijdende milieueffecten ondervindt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53b
  - number: 16.53c.1
    text: |-
      Voor een plan of een project als bedoeld in artikel 6, derde lid, van de habitatrichtlijn maakt het bestuursorgaan
      dat het plan vaststelt, de aanvrager van de betrokken omgevingsvergunning, of het bevoegd gezag voor het
      projectbesluit een passende beoordeling als bedoeld in artikel 6, derde lid, van die richtlijn, van de gevolgen
      voor het Natura 2000-gebied.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53c
  - number: 16.53c.2
    text: 'In afwijking van het eerste lid hoeft geen passende beoordeling te worden gemaakt, als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53c
  - number: 16.53c.2.a
    text: het plan of het project een herhaling of voortzetting is van een ander plan of project, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53c
  - number: 16.53c.2.b
    text: het plan deel uitmaakt van een ander plan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.53c
  - number: 16.54.1
    text: |-
      De aanvraag om een omgevingsvergunning wordt ingediend bij het college van burgemeester en wethouders van de
      gemeente waar de activiteit of activiteiten geheel of in hoofdzaak zullen worden verricht. Als de aanvraag
      betrekking heeft op een of meer wateractiviteiten, kan de aanvraag in plaats van bij het college ook worden
      ingediend bij het dagelijks bestuur van het waterschap waar de activiteit of activiteiten geheel of in hoofdzaak
      zullen worden verricht. Als een ander bestuursorgaan dan het college of het dagelijks bestuur het bevoegd gezag is,
      kan de aanvraag ook bij dat bestuursorgaan worden ingediend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54
  - number: 16.54.2
    text: |-
      In afwijking van het eerste lid wordt de aanvraag om een omgevingsvergunning voor een jachtgeweeractiviteit
      ingediend bij de korpschef.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54
  - number: 16.54.3
    text: |-
      Dit artikel is van overeenkomstige toepassing op een aanvraag om wijziging van de voorschriften van een
      omgevingsvergunning of om intrekking van een omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54
  - number: 16.54a.1
    text: |-
      Als gebruik wordt gemaakt van de mogelijkheid, bedoeld in [artikel 16.54, eerste lid][ref1], om de aanvraag in te
      dienen bij het college van burgemeester en wethouders van de gemeente of het dagelijks bestuur van het waterschap
      terwijl een ander bestuursorgaan het bevoegd gezag is, wordt voor de toepassing van deze afdeling als de dag van
      ontvangst aangemerkt de dag van ontvangst bij het college of het dagelijks bestuur.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.1
        afdeling: '16.5'
  - number: 16.54a.2
    text: |-
      Het bestuursorgaan waarbij de aanvraag is ingediend, zendt de aanvrager onverwijld een bewijs
      van ontvangst, waarin de dag van ontvangst van de aanvraag wordt vermeld. In afwijking van
      [artikel 14, eerste lid, aanhef en onder b, van de Dienstenwet][ref1], geeft dit bestuursorgaan ten aanzien van het
      bewijs van ontvangst ook uitvoering aan de in dat artikelonderdeel gestelde verplichting berichten te verzenden via
      het centraal loket, bedoeld in die wet. [Artikel 29 van de Dienstenwet][ref2] is niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0026759#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0026759#Artikel29
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
    references:
      - id: ref1
        bwb_id: BWBR0026759
        artikel: '14'
      - id: ref2
        bwb_id: BWBR0026759
        artikel: '29'
  - number: 16.54a.3
    text: |-
      Het bestuursorgaan dat het bevoegd gezag is, deelt de aanvrager dit na ontvangst van de aanvraag zo spoedig
      mogelijk mee. In de mededeling wordt ook vermeld:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
  - number: 16.54a.3.a
    text: de procedure ter voorbereiding van het besluit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
  - number: 16.54a.3.b
    text: de beslistermijn die van toepassing is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
  - number: 16.54a.3.c
    text: de tegen het besluit openstaande rechtsmiddelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.54a
  - number: 16.55.1
    text: |-
      Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld over de wijze van indienen van de aanvraag
      om een omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.55.2
    text: Bij ministeriële regeling worden regels gesteld over de door de aanvrager te verstrekken gegevens en bescheiden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.55.3
    text: |-
      Voor een aanvraag om een omgevingsvergunning voor een activiteit als bedoeld in [artikel 5.3][ref1] of [5.4][ref2]
      kunnen in de waterschapsverordening respectievelijk de omgevingsverordening ook regels worden gesteld over de door
      de aanvrager te verstrekken gegevens en bescheiden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 16.55.4
    text: |-
      Voor een aanvraag om een omgevingsvergunning voor een omgevingsplanactiviteit kunnen in het omgevingsplan ook
      regels worden gesteld over de door de aanvrager te verstrekken gegevens en bescheiden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.55.5
    text: |-
      De gegevens en bescheiden, bedoeld in het tweede tot en met vierde lid, behoeven niet te worden verstrekt voor
      zover het bevoegd gezag al over die gegevens of bescheiden beschikt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.55.6
    text: |-
      Op grond van het tweede lid worden in ieder geval regels gesteld over het bij de aanvraag verstrekken van gegevens
      over participatie van en overleg met derden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.55.7
    text: |-
      De gemeenteraad kan gevallen van activiteiten aanwijzen waarin participatie van en overleg met derden verplicht is
      voordat een aanvraag om een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit waarvoor het college
      van burgemeester en wethouders bevoegd gezag is, kan worden ingediend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.55
  - number: 16.56.1
    text: |-
      De vergunninghouder verschaft op verzoek van het bevoegd gezag aan dat bevoegd gezag gegevens en bescheiden die
      nodig zijn voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.56
  - number: 16.56.1.a
    text: |-
      het met toepassing van [artikel 5.38][ref1] bezien of de voorschriften van de vergunning nog toereikend zijn
      gezien de ontwikkelingen van de technische mogelijkheden tot het beschermen van het milieu en de ontwikkelingen met
      betrekking tot de kwaliteit van het milieu,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.56
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 16.56.1.b
    text: |-
      het naar aanleiding van de toepassing van [artikel 5.38][ref1] wijzigen van de voorschriften van een
      omgevingsvergunning, bedoeld in [artikel 5.42, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.56
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 16.56.2
    text: |-
      [Artikel 16.55, vijfde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.56
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.1
        afdeling: '16.5'
  - number: '16.57'
    text: |-
      Het bevoegd gezag geeft bij toepassing van [titel 4.1][ref1] of
      [afdeling 3.4 van de Algemene wet bestuursrecht][ref2] ook onverwijld kennis van de aanvraag om een
      omgevingsvergunning op de in [artikel 12 van de Bekendmakingswet][ref3] bepaalde wijze. Daarbij wordt de dag van
      ontvangst van de aanvraag vermeld.


      [ref1]: https://wetten.overheid.nl/BWBR0005537
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref3]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.57
    references:
      - id: ref1
        bwb_id: BWBR0005537
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref3
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 16.58.1
    text: |-
      Voor zover de aanvraag om een omgevingsvergunning betrekking heeft op een rijksmonumentenactiviteit
      en het rijksmonument of voorbeschermde rijksmonument een kerkelijk monument is als bedoeld in
      [artikel 1.1 van de Erfgoedwet][ref1], neemt het bevoegd gezag pas een beslissing na overleg met de eigenaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.58
    references:
      - id: ref1
        bwb_id: BWBR0037521
        artikel: '1'
  - number: 16.58.2
    text: |-
      Voor zover het gaat om een beslissing waarbij wezenlijke belangen van het belijden van de godsdienst of
      levensovertuiging in dat monument in het geding zijn, beslist het bevoegd gezag alleen in overeenstemming met de
      eigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.58
  - number: '16.61'
    text: |-
      Als een beslissing op de aanvraag om een omgevingsvergunning wordt aangehouden,
      wordt voor de toepassing van [artikel 16.64, eerste lid][ref1], van deze wet of
      [artikel 3:18, eerste lid, van de Algemene wet bestuursrecht][ref2] in plaats van de dag van ontvangst van de
      aanvraag uitgegaan van de dag waarop de aanhouding eindigt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.61
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.2
        afdeling: '16.5'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.62.1
    text: |-
      Deze paragraaf is van toepassing op de voorbereiding van de beslissing op een aanvraag om een omgevingsvergunning,
      tenzij [paragraaf 16.5.3][ref1] daarop van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.62
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '16'
        paragraaf: 16.5.3
        afdeling: '16.5'
  - number: 16.62.2
    text: |-
      Deze paragraaf is van overeenkomstige toepassing op de voorbereiding van de beslissing op een aanvraag om
      wijziging van de voorschriften van een omgevingsvergunning of om intrekking van een omgevingsvergunning, tenzij
      [paragraaf 16.5.3][ref1] daarop van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.62
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '16'
        paragraaf: 16.5.3
        afdeling: '16.5'
  - number: 16.62.3
    text: |-
      Op de voorbereiding van de beslissing op een aanvraag om een omgevingsvergunning of op een wijziging of intrekking
      daarvan kan het bevoegd gezag [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] niet bij besluit van
      toepassing verklaren, tenzij het gaat om een beslissing als bedoeld in [artikel 16.65, vierde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.62
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.3
        afdeling: '16.5'
  - number: 16.64.1
    text: |-
      Het bevoegd gezag beslist op de aanvraag om een omgevingsvergunning binnen acht weken of, als de voorgenomen
      beslissing op de aanvraag instemming als bedoeld in [artikel 16.16][ref1] behoeft, binnen twaalf weken na
      ontvangst van de aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
    machine_readable:
      # Combineert lid 1 (8/12 weken basistermijn) met lid 2 (eenmaal 6 weken verlenging)
      overrides:
        - law: algemene_wet_bestuursrecht
          article: '4:13'
          output: beslistermijn_weken
      execution:
        parameters:
          - name: datum_ontvangst_aanvraag
            type: date
            required: true
            description: Datum van ontvangst van de aanvraag om een omgevingsvergunning
          - name: instemming_vereist
            type: boolean
            required: true
            description: Of de voorgenomen beslissing instemming als bedoeld in artikel 16.16 behoeft
          - name: is_verlengd
            type: boolean
            required: false
            description: Of de beslistermijn is verlengd (eenmaal met ten hoogste 6 weken)
        output:
          - name: beslistermijn_weken
            type: number
            description: >-
              Totale beslistermijn in weken (overrides
              AWB art 4:13)
          - name: uiterste_beslisdatum
            type: date
            description: >-
              Uiterste datum waarop het bevoegd gezag
              moet beslissen
        actions:
          - output: basis_termijn_weken
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $instemming_vereist
                    value: true
                  then: 12
              default: 8
          - output: verlenging_weken
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_verlengd
                    value: true
                  then: 6
              default: 0
          - output: beslistermijn_weken
            value:
              operation: ADD
              values:
                - $basis_termijn_weken
                - $verlenging_weken
          - output: uiterste_beslisdatum
            value:
              operation: DATE_ADD
              date: $datum_ontvangst_aanvraag
              weeks: $beslistermijn_weken
  - number: 16.64.2
    text: |-
      Het bevoegd gezag kan de beslistermijnen, bedoeld in het eerste lid, eenmaal met ten hoogste zes weken verlengen.
      Dit besluit wordt bekendgemaakt binnen de beslistermijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64
  - number: 16.64.3
    text: |-
      Tegelijkertijd met of zo spoedig mogelijk na de bekendmaking van de beslissing op de
      aanvraag om een omgevingsvergunning geeft het bevoegd gezag kennis van dat besluit op de in
      [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 16.64.4
    text: |-
      Met toepassing van [artikel 28, eerste lid, laatste zinsnede, van de Dienstenwet][ref1] is
      [paragraaf 4.1.3.3 van de Algemene wet bestuursrecht][ref2] niet van toepassing op de voorbereiding van de
      beslissing op de aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0026759#Artikel28
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Paragraaf4.1.3.3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64
    references:
      - id: ref1
        bwb_id: BWBR0026759
        artikel: '28'
      - id: ref2
        bwb_id: BWBR0005537
        paragraaf: 4.1.3.3
  - number: 16.64a.1
    text: |-
      Als het bevoegd gezag naar aanleiding van de aanvraag om een omgevingsvergunning van oordeel is dat geen
      omgevingsvergunning nodig is, wordt dat vermeld in de kennisgeving, bedoeld in [artikel 16.64, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.2
        afdeling: '16.5'
  - number: 16.64a.2
    text: |-
      Als het gaat om een besluit tot verlening van een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, wordt dat vermeld in de kennisgeving, bedoeld in [artikel 16.64, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.64a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.2
        afdeling: '16.5'
  - number: 16.65.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van de beslissing op
      de aanvraag om een omgevingsvergunning:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.65.1.a
    text: |-
      als de aanvraag geheel of gedeeltelijk betrekking heeft op bij algemene maatregel van bestuur aangewezen gevallen
      van activiteiten, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.1.b
    text: op verzoek of met instemming van de aanvrager.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.2
    text: 'Deze paragraaf is van overeenkomstige toepassing op de voorbereiding van de beslissing:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.2.a
    text: |-
      op een aanvraag om wijziging van de voorschriften van een omgevingsvergunning of om intrekking van een
      omgevingsvergunning,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.2.b
    text: |-
      tot ambtshalve wijziging van de voorschriften van een omgevingsvergunning of tot ambtshalve intrekking van een
      omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.3
    text: |-
      Bij algemene maatregel van bestuur, bedoeld in het eerste lid, aanhef en onder a, worden in ieder geval aangewezen
      gevallen van activiteiten ter uitvoering van het verdrag van Aarhus.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.4
    text: |-
      Het bevoegd gezag kan [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] bij besluit van toepassing
      verklaren op de voorbereiding van de beslissing op een aanvraag om een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.65.4.a
    text: als het gaat om een activiteit die aanzienlijke gevolgen heeft of kan hebben voor de fysieke leefomgeving, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.4.b
    text: waartegen naar verwachting verschillende belanghebbenden bedenkingen zullen hebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.65.5
    text: |-
      Als toepassing wordt gegeven aan het vierde lid, stelt het bevoegd gezag, voorafgaand aan het nemen van het
      besluit, de aanvrager in de gelegenheid zijn zienswijze daarover naar voren te brengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.65
  - number: 16.66.1
    text: |-
      Bij de toepassing van [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] op de voorbereiding van de beslissing
      op de aanvraag om een omgevingsvergunning worden de volgende leden en [artikel 16.67][ref2] in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.66
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.3
        afdeling: '16.5'
  - number: 16.66.2
    text: |-
      Als een ander bestuursorgaan als bedoeld in [artikel 16.54, eerste lid, derde zin][ref1], het bevoegd gezag
      is, ligt het ontwerpbesluit, met de daarop betrekking hebbende stukken die redelijkerwijs nodig zijn voor een
      beoordeling van het ontwerpbesluit, ook ter inzage in de gemeente waar de activiteit of activiteiten geheel of in
      hoofdzaak zullen worden verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.66
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.1
        afdeling: '16.5'
  - number: 16.66.3
    text: |-
      De in [artikel 3:18, tweede lid, van de Algemene wet bestuursrecht][ref1] bedoelde redelijke
      termijn bedraagt ten hoogste zes weken. De termijn waarbinnen op de aanvraag wordt beslist, kan ten
      hoogste eenmaal worden verlengd. De verlenging en de duur daarvan worden, met inachtneming van de in
      [artikel 3:18, tweede lid, van de Algemene wet bestuursrecht][ref2] bedoelde termijn van acht weken, gemotiveerd
      aan de aanvrager meegedeeld. [Artikel 31, vierde lid, van de Dienstenwet][ref3] is niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0026759#Artikel31
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.66
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0026759
        artikel: '31'
  - number: 16.66.4
    text: |-
      Als het bevoegd gezag naar aanleiding van de aanvraag om een omgevingsvergunning van oordeel is dat geen
      omgevingsvergunning nodig is, wordt dat vermeld in de kennisgeving, bedoeld in [artikel 3:12][ref1] of
      [3:44 van de Algemene wet bestuursrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.66
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.66.5
    text: |-
      Als het gaat om een ontwerpbesluit of besluit tot verlening van een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, wordt dat vermeld in de kennisgeving, bedoeld in [artikel 3:12][ref1] of
      [3:44 van de Algemene wet bestuursrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.66
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.67.1
    text: |-
      Het bevoegd gezag stelt op verzoek van de aanvrager, voordat het stukken ter inzage legt die niet door de
      aanvrager zijn ingebracht, hem in de gelegenheid die stukken in te zien met het oog op toepassing van de
      [artikelen 19.3 tot en met 19.5 van de Wet milieubeheer][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.67
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
  - number: 16.67.2
    text: |-
      Tot deze stukken behoren niet de verslagen, bedoeld in [artikel 3:17 van de Algemene wet bestuursrecht][ref1],
      en de afschriften van zienswijzen, die door anderen dan betrokken bestuursorganen naar voren zijn gebracht
      overeenkomstig [artikel 3:15 van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.67
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: '16.68'
    text: |-
      Het bevoegd gezag kan op een aanvraag om een omgevingsvergunning voor een activiteit die op grond
      van [artikel 16.65][ref1] is aangewezen, [afdeling 3.4 van de Algemene wet bestuursrecht][ref2] en
      [artikel 3:44 van die wet][ref3] buiten toepassing laten als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.68
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.5.3
        afdeling: '16.5'
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.68.a
    text: |-
      de aanvraag betrekking heeft op een activiteit waarvan de uitvoering door een bijzondere omstandigheid op korte
      termijn nodig is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.68
  - number: 16.68.b
    text: nationale veiligheidsbelangen dat vereisen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.68
  - number: 16.68.c
    text: de uitvoering van een internationaalrechtelijke verplichting dat vereist.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.68
  - number: '16.70'
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van een
      voorkeursbeslissing voor:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.70
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.70.a
    text: een projectbesluit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.70
  - number: 16.70.b
    text: |-
      het opnemen van regels in het omgevingsplan als bedoeld in [artikel 5.55][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.70
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.4
        afdeling: '5.2'
  - number: 16.71.1
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.71
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.71.1.a
    text: een projectbesluit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.71
  - number: 16.71.1.b
    text: |-
      een besluit tot het buiten toepassing laten van regels als bedoeld in [artikel 5.53, derde of vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.71
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 16.71.2
    text: |-
      In afwijking van [artikel 3:1, eerste lid, aanhef en onder b, van de Algemene wet bestuursrecht][ref1] zijn de
      [afdelingen 3.6][ref2] en [3.7 van die wet][ref3] van toepassing op een besluit als bedoeld in het eerste lid,
      onder a of b.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.6
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.7
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.71
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.6'
      - id: ref3
        bwb_id: BWBR0005537
        afdeling: '3.7'
  - number: 16.71.3
    text: |-
      Bij de bekendmaking van een projectbesluit of van een besluit tot uitvoering van een projectbesluit wordt de
      bijzondere regeling over het aanvoeren van gronden van het beroep, bedoeld in [artikel 16.86][ref1], vermeld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.71
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.3
        afdeling: '16.7'
  - number: 16.72.1
    text: |-
      Een door het dagelijks bestuur van het waterschap genomen projectbesluit behoeft de goedkeuring van gedeputeerde
      staten van de provincie waar dat besluit wordt uitgevoerd. Als het project in meer dan een provincie ligt,
      beslissen gedeputeerde staten van de provincie waar het project in hoofdzaak zal worden uitgevoerd over de
      goedkeuring.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.72
  - number: 16.72.2
    text: |-
      Op de goedkeuring van een projectbesluit is
      [artikel 10:31, tweede tot en met vierde lid, van de Algemene wet bestuursrecht][ref1] niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.72
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '10'
  - number: '16.73'
    text: |-
      [Artikel 16.71][ref1] is niet van toepassing op de afwijzing van een aanvraag om een projectbesluit vast te
      stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.73
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.6.2
        afdeling: '16.6'
  - number: 16.75.1
    text: |-
      De beslissing op een aanvraag om een beschikking als bedoeld in [artikel 13.18, eerste lid][ref1], wordt
      aangehouden als voor de in de aanvraag bedoelde te verrichten activiteit het omgevingsplan, de omgevingsvergunning
      voor een buitenplanse omgevingsplanactiviteit, voor zover sprake is van een activiteit die in strijd is met een in
      het omgevingsplan aan een locatie toegedeelde functie, of het projectbesluit nog niet onherroepelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.75
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 16.75.2
    text: De aanhouding duurt totdat het betrokken besluit onherroepelijk is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.75
  - number: 16.75.3
    text: 'In afwijking van het eerste lid kan het bevoegd gezag de beschikking geven als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.75
  - number: 16.75.3.a
    text: |-
      een ingesteld beroep tegen de in het eerste lid bedoelde besluiten geen gevolgen kan hebben voor de beoordeling van
      de kostenverhaalplichtige activiteit of van de aan de omgevingsvergunning voor een omgevingsplanactiviteit voor die
      activiteit te verbinden voorschriften, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.75
  - number: 16.75.3.b
    text: |-
      de gevolgen, bedoeld onder a, volgens het bestuursorgaan niet opwegen tegen het belang dat met het geven van de
      beschikking is gediend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.75
  - number: '16.76'
    text: |-
      Voordat het bestuursorgaan een beschikking als bedoeld in [artikel 13.18, eerste lid][ref1], geeft, stelt het de
      aanvrager in de gelegenheid zijn zienswijze naar voren te brengen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.76
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: '16.77'
    text: |-
      Als een beslissing op een aanvraag om een besluit op grond van deze wet of een besluit tot wijziging daarvan niet
      kan worden genomen dan nadat is voldaan aan een internationaalrechtelijke verplichting, wordt de termijn voor het
      nemen van dat besluit opgeschort tot de voor die verplichting geldende procedure is afgerond.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77
  - number: 16.77a
    text: |-
      Als een beslissing op een aanvraag om een omgevingsvergunning voor een Natura 2000-activiteit niet kan worden
      genomen dan nadat de aanvrager de aanvraag heeft aangevuld met gegevens die nodig zijn om te beoordelen of is
      voldaan aan artikel 6, vierde lid, van de habitatrichtlijn, wordt de termijn voor het nemen van dat besluit
      opgeschort tot de dag waarop de aanvraag is aangevuld of de daarvoor gestelde termijn ongebruikt is verstreken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77a
  - number: 16.77aa
    text: |-
      Als toepassing wordt gegeven aan [artikel 13.20, vijfde lid][ref1], wordt op een verzoek om een
      eindafrekening uiterlijk beslist op een in het omgevingsplan, de omgevingsvergunning, bedoeld in
      [artikel 13.14, derde lid, onder a][ref2], of het projectbesluit bepaald tijdstip.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77aa
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 16.77b.1
    text: |-
      Een omgevingsplan wordt niet eerder bekendgemaakt dan nadat twee weken zijn verstreken sinds de dag waarop het
      omgevingsplan is vastgesteld, tenzij:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77b
  - number: 16.77b.1.a
    text: gedeputeerde staten over het ontwerp van het omgevingsplan geen zienswijzen naar voren hebben gebracht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77b
  - number: 16.77b.1.b
    text: ten opzichte van het ontwerp van het omgevingsplan geen wijzigingen zijn aangebracht, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77b
  - number: 16.77b.1.c
    text: gedeputeerde staten hebben bepaald dat het omgevingsplan eerder ter inzage mag worden gelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77b
  - number: 16.77b.2
    text: |-
      [Artikel 3:42 van de Algemene wet bestuursrecht][ref1] is van overeenkomstige toepassing op een omgevingsvisie en
      een programma als bedoeld in de [paragrafen 3.2.2 tot en met 3.2.4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.77b
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 16.78.1
    text: |-
      Een omgevingsplan treedt in werking met ingang van de dag waarop vier weken zijn verstreken sinds de dag waarop het
      besluit is bekendgemaakt, tenzij bij het besluit een later tijdstip is bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78
  - number: 16.78.2
    text: |-
      Een besluit als bedoeld in [artikel 16.21][ref1] treedt tegelijk in werking met het omgevingsplan waarop het
      betrekking heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.78.3
    text: |-
      Een projectbesluit treedt in werking met ingang van de dag waarop vier weken zijn verstreken sinds de dag
      waarop het besluit is bekendgemaakt. Als eerdere inwerkingtreding volgens het bevoegd gezag vanwege spoedeisende
      omstandigheden nodig is, kan het bevoegd gezag bepalen dat het projectbesluit eerder in werking treedt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78
  - number: 16.78.4
    text: |-
      In afwijking van het derde lid treedt een projectbesluit van het dagelijks bestuur van het waterschap in werking
      met ingang van de dag waarop vier weken zijn verstreken sinds de dag waarop het besluit over goedkeuring is
      bekendgemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78
  - number: 16.78.5
    text: |-
      Een besluit tot vaststelling van geluidproductieplafonds als omgevingswaarden als bedoeld in de
      [artikelen 2.12a, eerste lid][ref1], [2.13a, eerste lid][ref2], en [2.15, tweede lid][ref3], treedt in werking met
      ingang van de dag waarop vier weken zijn verstreken sinds de dag waarop het besluit is bekendgemaakt. Als eerdere
      inwerkingtreding volgens het bevoegd gezag vanwege spoedeisende omstandigheden nodig is, kan het bevoegd gezag
      bepalen dat het besluit eerder in werking treedt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 16.78a.1
    text: |-
      In afwijking van [artikel 3:41, eerste lid, van de Algemene wet bestuursrecht][ref1], wordt een omgevingsvergunning
      voor een jachtgeweeractiviteit aan degene aan wie zij wordt verleend, in persoon uitgereikt. De eerste volzin is
      niet van toepassing in bij algemene maatregel van bestuur aangewezen gevallen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.78a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.79.1
    text: 'Een omgevingsvergunning treedt in werking met ingang van de dag na de dag waarop:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.1.a
    text: het besluit is bekendgemaakt, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.1.b
    text: |-
      als het besluit is voorbereid met toepassing van [afdeling 3.4 van de Algemene wet bestuursrecht][ref1]: het
      besluit overeenkomstig [artikel 3:44, eerste lid, onder a, van die wet][ref2] ter inzage is gelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.79.2
    text: |-
      In afwijking van het eerste lid bepaalt het bevoegd gezag in de omgevingsvergunning dat die in werking treedt met
      ingang van de dag waarop vier weken zijn verstreken sinds de dag van bekendmaking of terinzagelegging als naar
      zijn oordeel:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.2.a
    text: |-
      het verrichten van de activiteit die de omgevingsvergunning mogelijk maakt binnen die vier weken kan leiden tot een
      wijziging van een bestaande toestand die niet kan worden hersteld, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.2.b
    text: de regels over het verlenen van de omgevingsvergunning ertoe strekken die bestaande toestand te beschermen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.3
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen van activiteiten worden aangewezen, waarin het bevoegd gezag in
      ieder geval toepassing geeft aan het tweede lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.4
    text: |-
      Als binnen de termijn, bedoeld in het tweede lid, bij de bevoegde rechter een verzoek om voorlopige voorziening is
      gedaan, treedt de omgevingsvergunning niet in werking voordat op het verzoek is beslist. Belanghebbenden die door
      de opschorting rechtstreeks in hun belang worden getroffen, kunnen de voorzieningenrechter verzoeken de opschorting
      op te heffen of te wijzigen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.5
    text: |-
      Als het eerder in werking treden van een omgevingsvergunning volgens het bevoegd gezag vanwege spoedeisende
      omstandigheden nodig is, kan het in afwijking van het tweede lid bepalen dat het besluit eerder in werking treedt
      en het vierde lid niet van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: 16.79.6
    text: |-
      Dit artikel is van overeenkomstige toepassing op een besluit tot wijziging van de voorschriften van een
      omgevingsvergunning of tot intrekking van een omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.79
  - number: '16.80'
    text: |-
      Onverminderd [artikel 16.79][ref1] treedt een omgevingsvergunning voor een bouwactiviteit of een
      omgevingsplanactiviteit bestaande uit een bouwactiviteit of het in stand houden van een bouwwerk, als die
      activiteit ook is aan te merken als het oprichten of wijzigen van een inrichting waarvoor een vergunning als
      bedoeld in [artikel 15, aanhef en onder b, van de Kernenergiewet][ref2] is vereist, niet eerder in werking dan
      nadat laatstbedoelde vergunning in werking is getreden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.80
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
      - id: ref2
        bwb_id: BWBR0002402
        artikel: '15'
  - number: '16.82'
    text: |-
      Bij algemene maatregel van bestuur kunnen, als dat nodig is in het belang van een doelmatige uitvoering
      en handhaving, gevallen worden aangewezen waarin een omgevingsvergunning voor een bouwactiviteit of een
      omgevingsplanactiviteit bestaande uit een bouwactiviteit of het in stand houden van een bouwwerk, onverminderd
      [artikel 16.79][ref1], niet eerder in werking treedt dan nadat een omgevingsvergunning voor een andere activiteit
      in werking is getreden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
  - number: 16.82a.1
    text: |-
      Nadat een voorkeursrechtbeschikking is bekendgemaakt, kan de beschikking binnen vier dagen worden ingeschreven in
      de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82a
  - number: 16.82a.2
    text: Het voorkeursrecht gaat in op het tijdstip waarop de beschikking is ingeschreven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82a
  - number: 16.82b.1
    text: |-
      De bekendmaking van een inrichtingsbesluit vindt plaats met toepassing van
      [artikel 3:42, tweede lid, van de Algemene wet bestuursrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82b
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.82b.2
    text: |-
      Als het inrichtingsbesluit voorziet in de toedeling van eigendom, bedoeld in
      [artikel 12.8, eerste lid, onder a, c of d][ref1], of in de toedeling van beheer en onderhoud, bedoeld in
      artikel 12.8, eerste lid, onder b, c of d, wordt het inrichtingsbesluit ook toegezonden of uitgereikt aan de
      belanghebbenden tot wie het is gericht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 16.82c.1
    text: |-
      Een besluit tot het tijdelijk in gebruik geven als bedoeld in [artikel 12.21, eerste lid][ref1], en een ruilbesluit
      treden in werking met ingang van de dag waarop:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 16.82c.1.a
    text: de beroepstermijn is verstreken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82c
  - number: 16.82c.1.b
    text: |-
      als beroep is ingesteld: op het beroep is beslist en, voor zover het beroep een ruilbesluit betreft, de termijn
      voor het instellen van beroep in cassatie is verstreken, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82c
  - number: 16.82c.1.c
    text: |-
      als beroep in cassatie is ingesteld: op het beroep in cassatie is beslist en, als de Hoge Raad het geding heeft
      verwezen, de rechter waarnaar is verwezen, uitspraak heeft gedaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82c
  - number: 16.82c.2
    text: |-
      Een besluit geldelijke regelingen treedt in werking met ingang van de dag waarop de beroepstermijn is verstreken
      of, als beroep is ingesteld, waarop op het beroep is beslist.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.82c
  - number: '16.83'
    text: |-
      Als tegen een besluit dat is voorbereid met toepassing van [afdeling 3.4 van de Algemene wet bestuursrecht][ref1]
      beroep aanhangig is, kan die afdeling, voor zover niet in strijd met internationaalrechtelijke verplichtingen,
      buiten toepassing worden gelaten op de voorbereiding van een besluit tot wijziging van dat besluit, als het gaat om
      een wijziging van ondergeschikte aard.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.83
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 16.84.1
    text: |-
      Als nadat toepassing is gegeven aan [artikel 16.7, eerste lid, aanhef en onder b][ref1], alleen beroep is
      ingesteld tegen de beslissing op de aanvraag om één van de omgevingsvergunningen, heeft het beroep ook betrekking
      op de beslissing op de aanvraag om de andere omgevingsvergunning, voor zover het beroep betrekking heeft op de
      samenhang tussen beide omgevingsvergunningen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.84
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.84.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op het beroep tegen beslissingen op een aanvraag om wijziging van
      de voorschriften van een omgevingsvergunning en tegen beslissingen tot ambtshalve wijziging van die voorschriften
      als bedoeld in [artikel 16.7, eerste lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.84
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.85.1
    text: |-
      Voor de mogelijkheid van beroep wordt een besluit tot het verlenen van een ontheffing op grond van
      [artikel 2.32][ref1] geacht deel uit te maken van het besluit waarover de regel waarvan ontheffing is verzocht,
      is gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.85
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 16.85.2
    text: 'Voor de mogelijkheid van beroep wordt:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.85
  - number: 16.85.2.a
    text: |-
      een instructie, gegeven op grond van [artikel 2.33][ref1] of [2.34][ref2], en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.85
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 16.85.2.b
    text: |-
      een besluit over instemming op grond van [artikel 16.16][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.85
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 16.86.1
    text: |-
      Bij het beroep tegen een projectbesluit en tegen besluiten ter uitvoering van een projectbesluit kunnen geen
      gronden worden aangevoerd na afloop van de termijn voor het instellen van beroep.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.86
  - number: 16.86.2
    text: |-
      Bij het beroep tegen een besluit tot uitvoering van een projectbesluit kunnen geen gronden worden aangevoerd die
      betrekking hebben op het projectbesluit waarop dat besluit berust.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.86
  - number: 16.86.3
    text: |-
      In afwijking van [artikel 6:6 van de Algemene wet bestuursrecht][ref1] wordt het beroep tegen een projectbesluit
      of tegen een besluit ter uitvoering van een projectbesluit niet-ontvankelijk verklaard als niet is voldaan aan
      [artikel 6:5, eerste lid, onder d, van die wet][ref2], tenzij bij de bekendmaking van het besluit niet is voldaan
      aan [artikel 16.71, derde lid][ref3], en redelijkerwijs niet kan worden geoordeeld dat de indiener van het
      beroepschrift in verzuim is geweest.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.86
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.6.2
        afdeling: '16.6'
  - number: 16.87.1
    text: |-
      Op beroepen tegen een projectbesluit of tegen een besluit over goedkeuring als bedoeld in [artikel 16.72][ref1]
      beslist de Afdeling bestuursrechtspraak van de Raad van State binnen zes maanden na ontvangst van het
      verweerschrift.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.6.2
        afdeling: '16.6'
  - number: 16.87.2
    text: |-
      In bijzondere omstandigheden kan de Afdeling de in het eerste lid genoemde termijn met ten hoogste drie maanden
      verlengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87
  - number: 16.87.3
    text: |-
      Op beroepen tegen een besluit ter uitvoering van een projectbesluit waarop op grond van [artikel 16.][ref1]7
      [afdeling 3.5 van de Algemene wet bestuursrecht][ref2] van toepassing is, beslist de Afdeling binnen zes maanden na
      ontvangst van de verweerschriften.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.5'
  - number: 16.87a.1
    text: |-
      Tegen een besluit dat alleen betrekking heeft op de weigering van een omgevingsvergunning voor een
      jachtgeweeractiviteit of op de intrekking van een vergunning op de in het tweede lid genoemde gronden, staat
      administratief beroep open bij Onze Minister van Justitie en Veiligheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87a
  - number: 16.87a.2
    text: 'De gronden, bedoeld in het eerste lid, zijn:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87a
  - number: 16.87a.2.a
    text: |-
      de vergunninghouder heeft misbruik gemaakt van wapens of munitie of van de bevoegdheid om wapens of munitie
      voorhanden te hebben, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87a
  - number: 16.87a.2.b
    text: |-
      er zijn andere aanwijzingen dat aan de vergunninghouder het voorhanden hebben van wapens of munitie niet of niet
      langer kan worden toevertrouwd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.87a
  - number: 16.88.1
    text: |-
      Tegen een besluit tot het tijdelijk in gebruik geven als bedoeld in [artikel 12.21, eerste lid][ref1], een
      ruilbesluit en een besluit geldelijke regelingen kunnen belanghebbenden door indiening van een verzoek als bedoeld
      in [artikel 261 van het Wetboek van Burgerlijke rechtsvordering][ref2] in beroep komen bij de rechtbank binnen het
      rechtsgebied waarvan gedeputeerde staten hun zetel hebben. De [artikelen 6:2][ref3], [6:7 tot en met 6:20][ref4] en
      [6:22 van de Algemene wet bestuursrecht][ref5] zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0001827#Artikel261
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref5]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0001827
        artikel: '261'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref4
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref5
        bwb_id: BWBR0005537
        artikel: '6'
  - number: 16.88.2
    text: Het verzoekschrift wordt door de belanghebbende of zijn gemachtigde ondertekend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.88.3
    text: |-
      Zodra het verzoekschrift is ingediend, zendt de griffier een afschrift daarvan aan gedeputeerde staten. Bij beroep
      tegen een ruilbesluit of een besluit geldelijke regelingen zenden gedeputeerde staten onverwijld aan de griffier:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.88.3.a
    text: |-
      een lijst van de belanghebbenden voor wie het ruilbesluit of het besluit geldelijke regelingen wordt gewijzigd als
      het beroep gegrond is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.88.3.b
    text: |-
      een afschrift van de stukken waarop het ruilbesluit of het besluit geldelijke regelingen voor de indiener van het
      beroep is gebaseerd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.88.3.c
    text: |-
      een afschrift van de over het ruilbesluit of het besluit geldelijke regelingen naar voren gebrachte zienswijzen,
      voor zover samenhangend met het beroep, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.88.3.d
    text: |-
      afschriften van de overige op het ruilbesluit of het besluit geldelijke regelingen betrekking hebbende bescheiden
      die van belang zijn voor de beoordeling van het beroep.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.88
  - number: 16.89.1
    text: |-
      De rechtbank beslist over de wijze waarop het ruilbesluit of het besluit geldelijke regelingen wordt gewijzigd
      na oproeping van de verzoeker, gedeputeerde staten en de belanghebbenden voor wie het ruilbesluit of het besluit
      geldelijke regelingen wordt gewijzigd als het beroep gegrond is. Belanghebbenden en gedeputeerde staten kunnen bij
      gemachtigde verschijnen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.89
  - number: 16.89.2
    text: Beroepen tegen het ruilbesluit en het besluit geldelijke regelingen worden gezamenlijk behandeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.89
  - number: 16.90.1
    text: |-
      Tegen een beschikking van de rechtbank over een besluit tot het tijdelijk in gebruik geven als bedoeld in
      [artikel 12.21, eerste lid][ref1], kan geen hoger beroep of beroep in cassatie worden ingesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.90
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 16.90.2
    text: |-
      Tegen een beschikking van de rechtbank over het ruilbesluit of het besluit geldelijke
      regelingen kan geen hoger beroep worden ingesteld. Voor de belanghebbende die voor de rechtbank
      is verschenen en voor gedeputeerde staten staat beroep in cassatie open op grond van de
      [artikelen 426 tot en met 429 van het Wetboek van Burgerlijke Rechtsvordering][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001827#Artikel426
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.90
    references:
      - id: ref1
        bwb_id: BWBR0001827
        artikel: '426'
  - number: 16.90.3
    text: |-
      De griffier van de rechtbank of, in geval van cassatie, de griffier van de Hoge Raad zendt een afschrift van de
      beschikking aan de belanghebbenden die zijn opgeroepen in verband met het beroep tegen het ruilbesluit of het
      besluit geldelijke regelingen en ook aan gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.90
  - number: 16.90.4
    text: |-
      Zodra het afschrift van de beschikking van de rechtbank door gedeputeerde staten is ontvangen en die beschikking
      in kracht van gewijsde is gegaan, wijzigen gedeputeerde staten zo nodig het ruilbesluit of het besluit geldelijke
      regelingen op grond van die beschikking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.90
  - number: 16.92.1
    text: |-
      Als beroep aanhangig is tegen een voorkeursrechtbeschikking van het college van burgemeester en wethouders en die
      beschikking vervalt omdat voor de onroerende zaak een voorkeursrechtbeschikking van de gemeenteraad in werking is
      getreden, wordt het beroep geacht te zijn gericht tegen de voorkeursrechtbeschikking van de gemeenteraad.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.92
  - number: 16.92.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing als het beroep gericht is tegen een voorkeursrechtbeschikking
      van gedeputeerde staten en die beschikking vervalt omdat voor de onroerende zaak een voorkeursrechtbeschikking van
      provinciale staten in werking is getreden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.92
  - number: 16.93.1
    text: Het bestuursorgaan dat een onteigeningsbeschikking heeft gegeven, verzoekt de bestuursrechter deze te bekrachtigen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.2
    text: 'Het verzoekschrift wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.2.a
    text: de naam en het adres van het bestuursorgaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.2.b
    text: de dagtekening,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.2.c
    text: een omschrijving van de onteigeningsbeschikking waarop het verzoek betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.3
    text: 'Bij het verzoekschrift worden overgelegd:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.3.a
    text: een afschrift van de onteigeningsbeschikking,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.93.3.b
    text: |-
      de op de onteigeningsbeschikking betrekking hebbende stukken die redelijkerwijs nodig zijn voor de behandeling van
      het verzoek.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.93
  - number: 16.94.1
    text: |-
      Het verzoek wordt ingediend bij de rechtbank binnen het rechtsgebied waarvan de voor onteigening aangewezen
      onroerende zaken liggen. Als de onroerende zaken in het rechtsgebied van meer dan een rechtbank liggen, is bevoegd
      de rechtbank binnen het rechtsgebied waarvan het bestuursorgaan zijn zetel heeft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.94
  - number: 16.94.2
    text: |-
      De [artikelen 6:14, eerste lid][ref1], en [6:15, eerste en derde lid, van de Algemene wet bestuursrecht][ref2] zijn
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.94
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '6'
  - number: '16.95'
    text: |-
      Het verzoek kan niet-ontvankelijk worden verklaard als niet is voldaan aan
      [artikel 16.93, tweede en derde lid][ref1], mits de verzoeker de gelegenheid heeft gehad het verzuim te herstellen
      binnen een hem daartoe gestelde termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.95
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.1
        afdeling: '16.9'
  - number: 16.96.1
    text: De termijn voor het indienen van een verzoekschrift bedraagt zes weken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.96
  - number: 16.96.2
    text: |-
      De termijn begint met ingang van de dag na die waarop de onteigeningsbeschikking overeenkomstig
      [artikel 3:44, eerste lid, onder a, van de Algemene wet bestuursrecht][ref1] ter inzage is gelegd en hiervan kennis
      is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.96
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.96.3
    text: |-
      De [artikelen 6:9 tot en met 6:11 van de Algemene wet bestuursrecht][ref1] zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.96
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
  - number: 16.97.1
    text: |-
      Belanghebbenden kunnen bij de rechtbank schriftelijk bedenkingen inbrengen tegen de onteigeningsbeschikking. Als
      belanghebbenden worden in ieder geval aangemerkt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.a
    text: eigenaren,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.b
    text: erfpachters,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.c
    text: opstallers,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.d
    text: eigenaren van een heersend erf,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.e
    text: rechthebbenden op rechten van gebruik en bewoning,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.f
    text: |-
      rechthebbenden op rechten als bedoeld in
      [artikel 150, vijfde lid, van de Overgangswet Nieuw Burgerlijk Wetboek][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0002565#Artikel150
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
    references:
      - id: ref1
