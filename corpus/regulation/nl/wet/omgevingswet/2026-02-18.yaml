    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.12
  - number: 4.12.1.f
    text: |-
      Natura 2000-activiteiten en activiteiten met mogelijke verslechterende of significant verstorende gevolgen voor een
      Natura 2000-gebied of een bijzonder nationaal natuurgebied,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.12
