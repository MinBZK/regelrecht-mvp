        artikel: '6'
  - number: 16.117.2.b
    text: |-
      de [titels 8.1 tot en met 8.3 van de Algemene wet bestuursrecht][ref1], met uitzondering van de
      [artikelen 8:1 tot en met 8:10][ref2], [8:41, tweede lid][ref3], [8:74][ref4] en [8:75][ref5], en


      [ref1]: https://wetten.overheid.nl/BWBR0005537
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref5]: https://wetten.overheid.nl/BWBR0005537#Artikel8
