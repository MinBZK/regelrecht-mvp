        artikel: '150'
  - number: 16.97.1.g
    text: bezitters,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.h
    text: huurkopers,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.i
    text: huurders, waaronder ook onderhuurders aan wie bevoegdelijk is onderverhuurd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.j
    text: pachters, waaronder ook onderpachters aan wie bevoegdelijk is onderverpacht, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
  - number: 16.97.1.k
    text: |-
      schuldeisers die de nakoming van een verplichting als bedoeld in
      [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1] kunnen vorderen.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: 16.97.2
    text: |-
      De [artikelen 6:5, eerste en derde lid][ref1], en [6:6 van de Algemene wet bestuursrecht][ref2] zijn van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.97
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '6'
  - number: 16.98.1
    text: De termijn voor het inbrengen van bedenkingen bedraagt zes weken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.98
  - number: 16.98.2
    text: |-
      De termijn begint met ingang van de dag na die waarop de onteigeningsbeschikking overeenkomstig
      [artikel 3:44, eerste lid, onder a, van de Algemene wet bestuursrecht][ref1] ter inzage is gelegd en hiervan kennis
      is gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.98
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.98.3
    text: |-
      [Artikel 6:9 van de Algemene wet bestuursrecht][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.98
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
  - number: 16.98.4
    text: |-
      De rechtbank laat na afloop van de termijn ingebrachte bedenkingen niet op grond daarvan buiten beschouwing als
      redelijkerwijs niet kan worden geoordeeld dat de belanghebbende in verzuim is geweest.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.98
  - number: 16.99.1
    text: |-
      Binnen vier weken nadat de rechtbank de bedenkingen aan het bestuursorgaan heeft verzonden, dient dit een reactie
      daarop in bij de rechtbank.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.99
  - number: 16.99.2
    text: De rechtbank kan deze termijn verlengen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.99
  - number: 16.100.1
    text: |-
      De rechtbank kan belanghebbenden die bedenkingen hebben ingebracht tegen de onteigeningsbeschikking in de
      gelegenheid stellen schriftelijk te repliceren. In dat geval wordt het bestuursorgaan in de gelegenheid gesteld
      schriftelijk te dupliceren. De rechtbank stelt de termijnen voor repliek en dupliek vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.100
  - number: 16.100.2
    text: |-
      De rechtbank stelt andere partijen in de gelegenheid om ten minste eenmaal een schriftelijke uiteenzetting over de
      zaak te geven. De rechtbank stelt hiervoor een termijn vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.100
  - number: 16.101.1
    text: De rechtbank kan, als de zaak spoedeisend is, bepalen dat deze versneld wordt behandeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
  - number: 16.101.2
    text: 'In dat geval kan de rechtbank:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
  - number: 16.101.2.a
    text: |-
      de in [artikel 16.99][ref1] bedoelde termijn verkorten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.2
        afdeling: '16.9'
  - number: 16.101.2.b
    text: |-
      [artikel 16.100, tweede lid][ref1], geheel of gedeeltelijk buiten toepassing laten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.2
        afdeling: '16.9'
  - number: 16.101.2.c
    text: |-
      [artikel 8:47, derde lid, van de Algemene wet bestuursrecht][ref1] geheel of gedeeltelijk buiten toepassing laten,


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.101.2.d
    text: |-
      in afwijking van [artikel 16.113][ref1] de in
      [artikel 8:47, vijfde lid, van de Algemene wet bestuursrecht ][ref2]bedoelde termijn verkorten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.6
        afdeling: '16.9'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.101.2.e
    text: |-
      in afwijking van [artikel 16.113][ref1] de in
      [artikel 8:58, eerste lid, van de Algemene wet bestuursrecht ][ref2]bedoelde termijn verkorten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.6
        afdeling: '16.9'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.101.3
    text: |-
      Als de rechtbank bepaalt dat de zaak versneld wordt behandeld, bepaalt zij ook zo spoedig mogelijk het tijdstip
      waarop de zitting zal plaatsvinden en doet zij daarvan onverwijld mededeling aan partijen. In afwijking van
      [artikel 16.113][ref1] is [artikel 8:56 van de Algemene wet bestuursrecht][ref2] niet van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.6
        afdeling: '16.9'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '16.102'
    text: |-
      Blijkt aan de rechtbank bij de behandeling dat de zaak niet voldoende spoedeisend is om een versnelde behandeling
      te rechtvaardigen of dat de zaak een gewone behandeling vordert, dan bepaalt zij dat de zaak verder op de gewone
      wijze wordt behandeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.102
  - number: 16.103.1
    text: |-
      Totdat partijen zijn uitgenodigd om op een zitting van de rechtbank te verschijnen, kan de rechtbank het onderzoek
      sluiten, als voortzetting van het onderzoek niet nodig is, omdat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.103
  - number: 16.103.1.a
    text: het verzoek kennelijk niet-ontvankelijk is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.103
  - number: 16.103.1.b
    text: het verzoek moet worden afgewezen omdat de onteigeningsbeschikking kennelijk niet kan worden bekrachtigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.103
  - number: 16.103.2
    text: |-
      In de uitspraak na toepassing van het eerste lid worden partijen gewezen op [artikel 16.104][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.103
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.4
        afdeling: '16.9'
  - number: 16.104.1
    text: Tegen de uitspraak kan het bestuursorgaan verzet doen bij de rechtbank.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.104
  - number: 16.104.2
    text: |-
      De [artikelen 6:4, derde lid][ref1], [6:5 tot en met 6:9][ref2], [6:11][ref3], [6:14][ref4], [6:15][ref5],
      [6:17][ref6], [6:21][ref7] en [8:55, vierde tot en met tiende lid, van de Algemene wet bestuursrecht][ref8] zijn
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref5]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref6]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref7]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref8]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.104
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref4
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref5
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref6
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref7
        bwb_id: BWBR0005537
        artikel: '6'
      - id: ref8
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.105.1
    text: |-
      Als er geen bedenkingen tegen de onteigeningsbeschikking zijn ingebracht, doet de rechtbank binnen zes maanden na
      afloop van de termijn, bedoeld in [artikel 16.98, eerste lid][ref1], uitspraak op het verzoek tot bekrachtiging.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.105
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.2
        afdeling: '16.9'
  - number: 16.105.2
    text: |-
      Als er bedenkingen tegen de onteigeningsbeschikking zijn ingebracht, doet de rechtbank binnen zes maanden na
      ontvangst van de reactie op de bedenkingen, bedoeld in [artikel 16.99, eerste lid][ref1], uitspraak op het verzoek
      tot bekrachtiging.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.105
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.2
        afdeling: '16.9'
  - number: 16.105.3
    text: |-
      Als krachtens [artikel 16.113][ref1][artikel 8:51a][ref2] of [8:51d van de Algemene wet bestuursrecht][ref3] wordt
      toegepast, doet de rechtbank in afwijking van het eerste of tweede lid:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.105
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.6
        afdeling: '16.9'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '8'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.105.3.a
    text: binnen zes maanden na ontvangst van de reactie op de bedenkingen een tussenuitspraak, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.105
  - number: 16.105.3.b
    text: binnen zes maanden na verzending van de tussenuitspraak een einduitspraak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.105
  - number: 16.106.1
    text: |-
      De rechtbank doet uitspraak op grondslag van het verzoekschrift, de basistoets, bedoeld in [artikel 16.107][ref1],
      de bedenkingen die tegen de onteigeningsbeschikking zijn ingebracht, de overgelegde stukken, het verhandelde
      tijdens het vooronderzoek en het onderzoek ter zitting.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.106
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.5
        afdeling: '16.9'
  - number: 16.106.2
    text: De rechtbank vult ambtshalve de rechtsgronden van de bedenkingen aan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.106
  - number: 16.106.3
    text: De rechtbank kan ambtshalve de feiten van de bedenkingen aanvullen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.106
  - number: '16.107'
    text: |-
      Ongeacht of tegen de onteigeningsbeschikking bedenkingen zijn ingebracht, wijst de rechtbank het verzoek in ieder
      geval af als:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.107
  - number: 16.107.a
    text: de onteigeningsbeschikking niet volgens de wettelijke vormvoorschriften is voorbereid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.107
  - number: 16.107.b
    text: |-
      het onteigeningsbelang, bedoeld in [artikel 11.5, onder a][ref1], ontbreekt,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.107
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 16.107.c
    text: |-
      de noodzaak, bedoeld in [artikel 11.5, onder b][ref1], ontbreekt, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.107
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 16.107.d
    text: |-
      de urgentie, bedoeld in [artikel 11.5, onder c][ref1], ontbreekt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.107
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 16.108.1
    text: 'De uitspraak strekt tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.108.1.a
    text: onbevoegdverklaring van de rechtbank,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.108.1.b
    text: niet-ontvankelijkverklaring van het verzoek,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.108.1.c
    text: afwijzing van het verzoek, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.108.1.d
    text: toewijzing van het verzoek.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.108.2
    text: |-
      Als de rechtbank het verzoek geheel of gedeeltelijk toewijst, bekrachtigt zij de onteigeningsbeschikking geheel
      of gedeeltelijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.108
  - number: 16.109.1
    text: 'De schriftelijke uitspraak vermeldt:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.a
    text: de namen van partijen en van hun vertegenwoordigers of gemachtigden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.b
    text: de gronden van de beslissing,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.c
    text: de beslissing,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.d
    text: de naam van de rechter of de namen van de rechters,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.e
    text: de dag waarop de beslissing is uitgesproken, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.1.f
    text: door wie, binnen welke termijn en bij welke bestuursrechter welk rechtsmiddel kan worden aangewend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.109.2
    text: |-
      De uitspraak wordt ondertekend door de voorzitter en de griffier. Bij verhindering van de voorzitter of de griffier
      wordt dit in de uitspraak vermeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.109
  - number: 16.110.1
    text: De uitspraak houdt ook in dat van het bestuursorgaan een griffierecht wordt geheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.110
  - number: 16.110.2
    text: |-
      Het griffierecht bedraagt het tarief, genoemd in
      [artikel 8:41, tweede lid, onder c, van de Algemene wet bestuursrecht][ref1], vermeerderd met het tarief, genoemd
      in artikel 8:41, tweede lid, onder b, van die wet, voor elk bedenkingengeschrift dat door een belanghebbende bij de
      rechtbank tegen de onteigeningsbeschikking is ingebracht.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.110
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '16.111'
    text: |-
      De uitspraak houdt ook in dat het bestuursorgaan wordt veroordeeld in de kosten die een belanghebbende die een
      bedenking tegen de onteigeningsbeschikking heeft ingebracht, in verband met de behandeling van het verzoek naar
      aard en omvang redelijkerwijs heeft moeten maken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.111
  - number: '16.112'
    text: |-
      De uitspraak houdt ook in dat het bestuursorgaan wordt veroordeeld in de kosten die de belanghebbende die een
      bedenking tegen de onteigeningsbeschikking heeft ingebracht, naar aard en omvang redelijkerwijs heeft moeten maken
      voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.112
  - number: 16.112.a
    text: |-
      door een derde beroepsmatig verleende rechtsbijstand of andere deskundige bijstand voor het overleg over de
      minnelijke verwerving, bedoeld in [artikel 11.7, eerste lid][ref1], en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.112
    references:
