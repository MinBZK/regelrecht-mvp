  - number: '23.7'
    text: |-
      De gemeente kan geen rechtshandelingen naar burgerlijk recht verrichten over onderwerpen waarover regels als
      bedoeld in [artikel 4.21][ref1] zijn gesteld of over onderwerpen met betrekking tot het bouwen die geregeld zijn
      op grond van [hoofdstuk 5][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '5'
  - number: '23.8'
    text: |-
      De Staat is eigenaar van op de zeebodem in de exclusieve economische zone of in de ondergrond daarvan aanwezige
      vaste stoffen, met inbegrip van de delfstoffen, voor zover die delfstoffen op een diepte van minder dan honderd
      meter onder de zeebodem aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.8
  - number: '23.9'
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties zendt, in overeenstemming met Onze Ministers die het
      aangaat, binnen vijf jaar na de inwerkingtreding van deze wet en vervolgens na vijf jaar aan beide kamers der
      Staten-Generaal een verslag over de doeltreffendheid en de effecten van deze wet in de praktijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.9
    machine_readable:
      execution:
        parameters:
          - name: datum_inwerkingtreding_wet
            type: date
            required: true
            description: Datum van inwerkingtreding van de Omgevingswet
        output:
          - name: eerste_evaluatiedatum
            type: date
            description: Uiterste datum voor het eerste evaluatieverslag
          - name: tweede_evaluatiedatum
            type: date
            description: Uiterste datum voor het tweede evaluatieverslag
        actions:
          - output: eerste_evaluatiedatum
            value:
              operation: DATE_ADD
              date: $datum_inwerkingtreding_wet
              years: 5
          - output: tweede_evaluatiedatum
            value:
              operation: DATE_ADD
              date: $datum_inwerkingtreding_wet
              years: 10
  - number: 23.10.1
    text: |-
      De artikelen van deze wet treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.10
  - number: 23.10.2
    text: |-
      De voordracht voor een koninklijk besluit als bedoeld in het eerste lid wordt niet eerder gedaan dan vier weken
      nadat het ontwerp aan beide kamers der Staten-Generaal is overgelegd. Indien een der kamers der Staten-Generaal
      besluit niet in te stemmen met het ontwerp, wordt er geen voordracht gedaan en kan niet eerder dan zes weken na het
      besluit van die kamer der Staten-Generaal een nieuw ontwerp aan beide kamers der Staten-Generaal worden overgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.10
    machine_readable:
      execution:
        parameters:
          - name: datum_overlegging_ontwerp
            type: date
            required: true
            description: Datum waarop het ontwerp aan beide kamers is overgelegd
          - name: kamer_niet_ingestemd
            type: boolean
            required: false
            description: Of een der kamers besluit niet in te stemmen
          - name: datum_besluit_niet_instemmen
            type: date
            required: false
            description: Datum van het besluit van de kamer om niet in te stemmen
        output:
          - name: vroegste_voordracht_datum
            type: date
            description: Vroegste datum waarop de voordracht kan worden gedaan
          - name: vroegste_nieuw_ontwerp_datum
            type: date
            description: Vroegste datum waarop een nieuw ontwerp kan worden overgelegd (bij niet-instemming)
        actions:
          - output: vroegste_voordracht_datum
            value:
              operation: DATE_ADD
              date: $datum_overlegging_ontwerp
              weeks: 4
          - output: vroegste_nieuw_ontwerp_datum
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $kamer_niet_ingestemd
                    value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_besluit_niet_instemmen
                    weeks: 6
              default: null
  - number: '23.11'
    text: 'Deze wet wordt aangehaald als: Omgevingswet.'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.11
