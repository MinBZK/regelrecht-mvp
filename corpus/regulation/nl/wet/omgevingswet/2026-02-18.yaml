---
$schema: https://raw.githubusercontent.com/MinBZK/regelrecht/refs/tags/schema-v0.5.1/schema/v0.5.1/schema.json
$id: omgevingswet
regulatory_layer: WET
publication_date: '2026-01-22'
valid_from: '2026-02-18'
bwb_id: BWBR0037885
url: https://wetten.overheid.nl/BWBR0037885/2026-02-18
preamble:
  text: |-
    Wij Willem-Alexander, bij de gratie Gods, Koning der Nederlanden, Prins van Oranje-Nassau, enz. enz. enz.

    Allen, die deze zullen zien of horen lezen, saluut! doen te weten:

    Alzo Wij in overweging genomen hebben dat het wenselijk is om, mede gelet op internationaalrechtelijke
    verplichtingen en artikel 21 van de Grondwet, met het oog op duurzame ontwikkeling, samenhangende, doelmatige en
    vereenvoudigde regels te stellen over het beschermen en benutten van de fysieke leefomgeving;

    Zo is het, dat Wij, de Afdeling advisering van de Raad van State gehoord, en met gemeen overleg der Staten-
    Generaal, hebben goedgevonden en verstaan, gelijk Wij goedvinden en verstaan bij deze:
  url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#ArtikelAanhef
articles:
  - number: 1.1.1
    text: De bijlage bij deze wet bevat begripsbepalingen voor de toepassing van deze wet en de daarop berustende bepalingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.1
  - number: 1.1.2
    text: |-
      Begripsbepalingen die zijn opgenomen in een bijlage bij een algemene maatregel van bestuur op grond van deze
      wet zijn ook van toepassing op een ministeriële regeling op grond van deze wet, tenzij in die regeling anders is
      bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.1
  - number: 1.2.1
    text: 'Deze wet gaat over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.1.a
    text: de fysieke leefomgeving, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.1.b
    text: activiteiten die gevolgen hebben of kunnen hebben voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2
    text: 'De fysieke leefomgeving omvat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.a
    text: bouwwerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.b
    text: infrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.c
    text: watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.d
    text: water,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.e
    text: bodem,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.f
    text: lucht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.g
    text: landschappen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.h
    text: natuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.i
    text: cultureel erfgoed,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.2.j
    text: werelderfgoed.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.3
    text: 'Als gevolgen voor de fysieke leefomgeving worden in ieder geval aangemerkt gevolgen die kunnen voortvloeien uit:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.3.a
    text: het wijzigen van onderdelen van de fysieke leefomgeving of het gebruik daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.3.b
    text: het gebruik van natuurlijke hulpbronnen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.3.c
    text: activiteiten waardoor emissies, hinder of risico’s worden veroorzaakt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.3.d
    text: het nalaten van activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: 1.2.4
    text: |-
      Als gevolgen voor de fysieke leefomgeving worden ook aangemerkt gevolgen voor de mens, voor zover deze wordt of kan
      worden beïnvloed door of via onderdelen van de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.2
  - number: '1.3'
    text: |-
      Deze wet is, met het oog op duurzame ontwikkeling, de bewoonbaarheid van het land en de bescherming en verbetering
      van het leefmilieu, gericht op het in onderlinge samenhang:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.3
  - number: 1.3.a
    text: |-
      bereiken en in stand houden van een veilige en gezonde fysieke leefomgeving en een goede omgevingskwaliteit, ook
      vanwege de intrinsieke waarde van de natuur, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.3
  - number: 1.3.b
    text: |-
      doelmatig beheren, gebruiken en ontwikkelen van de fysieke leefomgeving ter vervulling van maatschappelijke
      behoeften.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.3
  - number: '1.4'
    text: |-
      Deze wet is niet van toepassing op onderwerpen met betrekking tot de fysieke leefomgeving of onderdelen daarvan,
      die bij of krachtens een andere wet uitputtend zijn geregeld, tenzij uit de bepalingen van deze wet anders blijkt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.4
  - number: 1.5.1
    text: |-
      Deze wet is van toepassing in de exclusieve economische zone, met uitzondering van
      [artikel 5.1, eerste lid, aanhef en onder a en b, en tweede lid, aanhef en onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 1.5.2
    text: |-
      Een op grond van deze wet bij algemene maatregel van bestuur of ministeriële regeling gestelde regel is van
      toepassing in de exclusieve economische zone als dat bij die regel is bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.5
  - number: 1.5.3
    text: |-
      Een bij of krachtens deze wet gestelde regel over stortingsactiviteiten op zee is ook van toepassing op in
      Nederland geregistreerde vaartuigen en luchtvaartuigen die zich buiten Nederland en de exclusieve economische zone
      bevinden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.5
  - number: 1.5.4
    text: |-
      Een bij of krachtens deze wet gestelde regel over het vangen, doden of verwerken van walvissen is ook van
      toepassing op in Nederland geregistreerde vaartuigen die zich buiten Nederland en de exclusieve economische zone
      bevinden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.5
  - number: '1.6'
    text: Een ieder draagt voldoende zorg voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.6
  - number: '1.7'
    text: |-
      Een ieder die weet of redelijkerwijs kan vermoeden dat zijn activiteit nadelige gevolgen kan hebben voor de fysieke
      leefomgeving, is verplicht:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7
  - number: 1.7.a
    text: alle maatregelen te nemen die redelijkerwijs van hem kunnen worden gevraagd om die gevolgen te voorkomen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7
  - number: 1.7.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7
  - number: 1.7.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van hem kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7
  - number: 1.7a.1
    text: |-
      Het is verboden een activiteit te verrichten of na te laten als door het verrichten of nalaten daarvan aanzienlijke
      nadelige gevolgen voor de fysieke leefomgeving ontstaan of dreigen te ontstaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7a
    machine_readable:
      execution:
        parameters:
          - name: activiteit_verricht_of_nagelaten
            type: boolean
            required: true
            description: Of een activiteit wordt verricht of nagelaten
            source: {}
          - name: aanzienlijke_nadelige_gevolgen
            type: boolean
            required: true
            description: >-
              Of door het verrichten of nalaten aanzienlijke nadelige
              gevolgen voor de fysieke leefomgeving ontstaan of dreigen
              te ontstaan
            source: {}
        output:
          - name: verboden
            type: boolean
            description: Of de activiteit verboden is op grond van artikel 1.7a lid 1
        actions:
          - output: verboden
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $activiteit_verricht_of_nagelaten
                  value: true
                - operation: EQUALS
                  subject: $aanzienlijke_nadelige_gevolgen
                  value: true
  - number: 1.7a.2
    text: |-
      Bij algemene maatregel van bestuur wordt de toepassing van het eerste lid uitgewerkt of begrensd. De uitwerking of
      begrenzing strekt in ieder geval ter uitvoering van de richtlijn milieustrafrecht en heeft betrekking op:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7a
    machine_readable:
      open_terms:
        - id: uitwerking_aanzienlijke_nadelige_gevolgen
          type: string
          required: true
          delegated_to: regering
          delegation_type: AMVB
          legal_basis: artikel 1.7a lid 2 Omgevingswet
  - number: 1.7a.2.a
    text: de omvang van de nadelige gevolgen voor de fysieke leefomgeving,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7a
  - number: 1.7a.2.b
    text: de gevallen waarin het eerste lid van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.7a
  - number: 1.8.1
    text: |-
      Aan de verplichtingen, bedoeld in de [artikelen 1.6][ref1] en [1.7][ref2], wordt in ieder geval voldaan, voor zover
      bij wettelijk voorschrift of besluit specifieke regels zijn gesteld met het oog op de doelen van de wet, en die
      regels worden nageleefd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '1'
        hoofdstuk: '1'
        afdeling: '1.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '1'
        hoofdstuk: '1'
        afdeling: '1.3'
    machine_readable:
      execution:
        parameters:
          - name: specifieke_regels_gesteld
            type: boolean
            required: true
            description: >-
              Of bij wettelijk voorschrift of besluit specifieke
              regels zijn gesteld met het oog op de doelen van de wet
            source: {}
          - name: specifieke_regels_nageleefd
            type: boolean
            required: true
            description: Of die specifieke regels worden nageleefd
            source: {}
        output:
          - name: zorgplicht_voldaan
            type: boolean
            description: Of in ieder geval aan de verplichtingen van artikelen 1.6 en 1.7 is voldaan
        actions:
          - output: zorgplicht_voldaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $specifieke_regels_gesteld
                  value: true
                - operation: EQUALS
                  subject: $specifieke_regels_nageleefd
                  value: true
  - number: 1.8.2
    text: |-
      [Artikel 1.7a][ref1] is niet van toepassing voor zover bij wettelijk voorschrift of besluit specifieke regels zijn
      gesteld met het oog op de doelen van de wet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel1.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '1'
        hoofdstuk: '1'
        afdeling: '1.3'
  - number: 2.1.1
    text: |-
      Een bestuursorgaan van een gemeente, een provincie of het Rijk of, met inachtneming van de [Waterschapswet][ref1],
      van een waterschap oefent zijn taken en bevoegdheden op grond van deze wet uit met het oog op de doelen van de wet,
      tenzij daarover specifieke regels zijn gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0005108
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
    references:
      - id: ref1
        bwb_id: BWBR0005108
  - number: 2.1.2
    text: |-
      Het bestuursorgaan houdt daarbij rekening met de samenhang van de relevante onderdelen en aspecten van de fysieke
      leefomgeving en van de rechtstreeks daarbij betrokken belangen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3
    text: |-
      Bij de op grond van deze wet gestelde regels kan de toepassing van het eerste en tweede lid worden uitgewerkt of
      begrensd. Deze uitwerking of begrenzing kan in ieder geval betrekking hebben op:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.b
    text: het beschermen van de gezondheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.c
    text: het beschermen van het milieu,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.d
    text: het duurzaam veiligstellen van de openbare drinkwatervoorziening,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.e
    text: het beschermen van landschappelijke of stedenbouwkundige waarden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.f
    text: het behoud van cultureel erfgoed,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.g
    text: het behoud van de uitzonderlijke universele waarde van werelderfgoed,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.h
    text: de natuurbescherming,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.i
    text: het tegengaan van klimaatverandering,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.j
    text: de kwaliteit van bouwwerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.k
    text: een evenwichtige toedeling van functies aan locaties,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.l
    text: het behoeden van de staat en werking van infrastructuur voor nadelige gevolgen van activiteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.m
    text: het beheer van infrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.n
    text: het beheer van watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.o
    text: het beheer van geobiologische en geothermische systemen en ecosystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.p
    text: het beheer van natuurlijke hulpbronnen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.q
    text: het beheer van natuurgebieden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.r
    text: het gebruik van bouwwerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.3.s
    text: het bevorderen van de toegankelijkheid van de openbare buitenruimte voor personen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.1.4
    text: |-
      Onverminderd het derde lid wordt bij het stellen van regels met het oog op een evenwichtige toedeling van functies
      aan locaties in ieder geval rekening gehouden met het belang van het beschermen van de gezondheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.1
  - number: 2.2.1
    text: |-
      Een bestuursorgaan houdt bij de uitoefening van zijn taken en bevoegdheden op grond van deze wet rekening met de
      taken en bevoegdheden van andere bestuursorganen en stemt zonodig met deze andere bestuursorganen af.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.2
  - number: 2.2.2
    text: |-
      Bestuursorganen kunnen taken en bevoegdheden gezamenlijk uitoefenen. Daarbij wordt niet voorzien in een overdracht
      van taken of bevoegdheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.2
  - number: 2.2.3
    text: |-
      Een bestuursorgaan treedt bij de uitoefening van zijn taken en bevoegdheden slechts in de taken en bevoegdheden van
      een ander bestuursorgaan voor zover dat nodig is voor de uitoefening van zijn eigen taken en bevoegdheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.2
  - number: 2.3.1
    text: |-
      De uitoefening van de taken en bevoegdheden op grond van deze wet wordt overgelaten aan de bestuursorganen van een
      gemeente, tenzij daarover andere regels zijn gesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: 2.3.2
    text: |-
      Een bestuursorgaan van een provincie oefent een taak of bevoegdheid, als dat bij de regeling daarvan is bepaald,
      alleen uit als dat nodig is:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
    machine_readable:
      execution:
        parameters:
          - name: bij_regeling_bepaald
            type: boolean
            required: true
            description: Of bij de regeling van de taak of bevoegdheid is bepaald dat de provincie deze uitoefent
            source: {}
          - name: provinciaal_belang
            type: boolean
            required: true
            description: Of er sprake is van een provinciaal belang
            source: {}
          - name: gemeentebestuur_onvoldoende
            type: boolean
            required: true
            description: >-
              Of het belang niet op doelmatige en doeltreffende
              wijze door het gemeentebestuur kan worden behartigd
            source: {}
          - name: doelmatige_uitoefening_nodig
            type: boolean
            required: true
            description: >-
              Of uitoefening nodig is voor doelmatige en
              doeltreffende uitoefening van taken/bevoegdheden of
              uitvoering internationaalrechtelijke verplichting
            source: {}
        output:
          - name: provincie_mag_uitoefenen
            type: boolean
            description: Of het bestuursorgaan van de provincie de taak of bevoegdheid mag uitoefenen
        actions:
          - output: provincie_mag_uitoefenen
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $bij_regeling_bepaald
                  value: true
                - operation: OR
                  conditions:
                    - operation: AND
                      conditions:
                        - operation: EQUALS
                          subject: $provinciaal_belang
                          value: true
                        - operation: EQUALS
                          subject: $gemeentebestuur_onvoldoende
                          value: true
                    - operation: EQUALS
                      subject: $doelmatige_uitoefening_nodig
                      value: true
  - number: 2.3.2.a
    text: |-
      met het oog op een provinciaal belang en dat belang niet op een doelmatige en doeltreffende wijze door het
      gemeentebestuur kan worden behartigd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: 2.3.2.b
    text: |-
      voor een doelmatige en doeltreffende uitoefening van de taken en bevoegdheden op grond van deze wet of de
      uitvoering van een internationaalrechtelijke verplichting.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: 2.3.3
    text: |-
      Een bestuursorgaan van het Rijk oefent een taak of bevoegdheid, als dat bij de regeling daarvan is bepaald, alleen
      uit als dat nodig is:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
    machine_readable:
      execution:
        parameters:
          - name: bij_regeling_bepaald
            type: boolean
            required: true
            description: Of bij de regeling van de taak of bevoegdheid is bepaald dat het Rijk deze uitoefent
            source: {}
          - name: nationaal_belang
            type: boolean
            required: true
            description: Of er sprake is van een nationaal belang
            source: {}
          - name: provincie_gemeente_onvoldoende
            type: boolean
            required: true
            description: >-
              Of het belang niet op doelmatige en doeltreffende
              wijze door het provinciebestuur of gemeentebestuur
              kan worden behartigd
            source: {}
          - name: doelmatige_uitoefening_nodig
            type: boolean
            required: true
            description: >-
              Of uitoefening nodig is voor doelmatige en
              doeltreffende uitoefening van taken/bevoegdheden of
              uitvoering internationaalrechtelijke verplichting
            source: {}
        output:
          - name: rijk_mag_uitoefenen
            type: boolean
            description: Of het bestuursorgaan van het Rijk de taak of bevoegdheid mag uitoefenen
        actions:
          - output: rijk_mag_uitoefenen
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $bij_regeling_bepaald
                  value: true
                - operation: OR
                  conditions:
                    - operation: AND
                      conditions:
                        - operation: EQUALS
                          subject: $nationaal_belang
                          value: true
                        - operation: EQUALS
                          subject: $provincie_gemeente_onvoldoende
                          value: true
                    - operation: EQUALS
                      subject: $doelmatige_uitoefening_nodig
                      value: true
  - number: 2.3.3.a
    text: |-
      met het oog op een nationaal belang en dat belang niet op een doelmatige en doeltreffende wijze door het
      provinciebestuur of gemeentebestuur kan worden behartigd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: 2.3.3.b
    text: |-
      voor een doelmatige en doeltreffende uitoefening van de taken en bevoegdheden op grond van deze wet of de
      uitvoering van een internationaalrechtelijke verplichting.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: 2.3.4
    text: |-
      Bestuursorganen van het Rijk oefenen ook de taken en bevoegdheden uit voor het niet provinciaal en gemeentelijk
      ingedeelde gebied.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.3
  - number: '2.4'
    text: |-
      De gemeenteraad stelt voor het gehele grondgebied van de gemeente één omgevingsplan vast waarin regels over de
      fysieke leefomgeving worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.4
  - number: '2.5'
    text: |-
      Het algemeen bestuur van het waterschap stelt één waterschapsverordening vast waarin regels over de fysieke
      leefomgeving worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.5
  - number: '2.6'
    text: |-
      Provinciale staten stellen één omgevingsverordening vast waarin regels over de fysieke leefomgeving worden
      opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.6
  - number: 2.7.1
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin regels over de fysieke leefomgeving
      alleen in het omgevingsplan, de waterschapsverordening of de omgevingsverordening mogen worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.7
  - number: 2.7.2
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin regels over de fysieke leefomgeving
      niet in het omgevingsplan, de waterschapsverordening of de omgevingsverordening mogen worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.7
  - number: '2.8'
    text: |-
      De gemeenteraad, het algemeen bestuur van een waterschap of provinciale staten kunnen de bevoegdheid tot het
      vaststellen van delen van het omgevingsplan, de waterschapsverordening of de omgevingsverordening delegeren aan
      het college van burgemeester en wethouders, het dagelijks bestuur van het waterschap respectievelijk gedeputeerde
      staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.8
  - number: 2.9.1
    text: Op grond van deze afdeling worden omgevingswaarden vastgesteld met het oog op de doelen van de wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.9.2
    text: 'Een omgevingswaarde bepaalt voor de fysieke leefomgeving of een onderdeel daarvan:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.9.2.a
    text: de gewenste staat of kwaliteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.9.2.b
    text: de toelaatbare belasting door activiteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.9.2.c
    text: de toelaatbare concentratie of depositie van stoffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.9.3
    text: Een omgevingswaarde wordt uitgedrukt in meetbare of berekenbare eenheden of anderszins in objectieve termen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.9
  - number: 2.10.1
    text: 'Bij de vaststelling van een omgevingswaarde wordt bepaald:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.10.1.a
    text: |-
      of deze waarde een resultaatverplichting, inspanningsverplichting of andere, daarbij te omschrijven verplichting
      met zich brengt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.10.1.b
    text: de locaties waarop de omgevingswaarde van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.10.2
    text: |-
      Bij de vaststelling van een omgevingswaarde kan een termijn worden gesteld waarbinnen aan de verplichting, bedoeld
      in het eerste lid, onder a, moet zijn voldaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.10.3
    text: |-
      Bij de vaststelling van een omgevingswaarde wordt onderbouwd welke taken en bevoegdheden op grond van deze of een
      andere wet in ieder geval worden ingezet om de omgevingswaarde te verwezenlijken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.10.4
    text: |-
      In afwijking van het eerste lid, aanhef en onder a, en het tweede lid kunnen bij algemene maatregel van bestuur
      regels worden gesteld over de aard en de termijn als de omgevingswaarde een geluidproductieplafond is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.10
  - number: 2.11.1
    text: Bij omgevingsplan kunnen omgevingswaarden worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.11
  - number: 2.11.2
    text: |-
      Bij omgevingsplan kunnen geen omgevingswaarden worden vastgesteld in aanvulling op of in afwijking van
      omgevingswaarden die bij omgevingsverordening, bij algemene maatregel van bestuur, bij besluit als bedoeld in
      [artikel 2.12a, eerste lid][ref1], [2.13a, eerste lid][ref2], of [2.15, tweede lid][ref3], of in deze wet zijn
      vastgesteld, tenzij bij de omgevingsverordening, de maatregel, het besluit of, als omgevingswaarden in deze wet
      zijn vastgesteld, bij algemene maatregel van bestuur anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 2.11a
    text: |-
      Bij omgevingsplan worden in ieder geval als omgevingswaarden geluidproductieplafonds vastgesteld rondom
      industrieterreinen waar bij algemene maatregel van bestuur aangewezen activiteiten kunnen worden verricht die in
      aanzienlijke mate geluid kunnen veroorzaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.11a
  - number: 2.12.1
    text: |-
      Bij omgevingsverordening kunnen, met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1],
      omgevingswaarden worden vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.12.2
    text: |-
      Bij omgevingsverordening kunnen geen omgevingswaarden worden vastgesteld in aanvulling op of in
      afwijking van omgevingswaarden die bij algemene maatregel van bestuur, bij besluit als bedoeld in
      [artikel 2.15, tweede lid][ref1], of in deze wet zijn vastgesteld, tenzij bij de maatregel, het besluit of, als
      omgevingswaarden in deze wet zijn vastgesteld, bij algemene maatregel van bestuur anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 2.12a.1
    text: |-
      Bij omgevingsverordening kunnen, met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1],
      industrieterreinen worden aangewezen waarvoor provinciale staten bij besluit als omgevingswaarden
      geluidproductieplafonds vaststellen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.12a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.12a.2
    text: |-
      Provinciale staten kunnen de bevoegdheid tot het bij besluit als omgevingswaarden vaststellen van
      geluidproductieplafonds delegeren aan gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.12a
  - number: 2.13.1
    text: |-
      Bij omgevingsverordening worden met het oog op het waarborgen van de veiligheid en het voorkomen of beperken van
      wateroverlast in ieder geval omgevingswaarden vastgesteld voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13
  - number: 2.13.1.a
    text: |-
      de veiligheid van bij de verordening aangewezen andere dan primaire waterkeringen, voor zover die niet bij het Rijk
      in beheer zijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13
  - number: 2.13.1.b
    text: |-
      de gemiddelde kans op overstroming per jaar van bij de verordening aangewezen gebieden met het oog op de bergings-
      en afvoercapaciteit waarop regionale wateren moeten zijn ingericht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13
  - number: 2.13.2
    text: |-
      Bij of krachtens de verordening worden voor de toepassing van het eerste lid, onder a, voor daarbij aan te
      geven locaties nadere regels gesteld over de vaststelling van het waterkerend vermogen van de daar bedoelde
      waterkeringen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13
  - number: 2.13a.1
    text: |-
      Provinciale staten stellen bij besluit als omgevingswaarden geluidproductieplafonds vast aan weerszijden van bij
      omgevingsverordening aangewezen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13a
  - number: 2.13a.1.a
    text: wegen in beheer bij de provincie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13a
  - number: 2.13a.1.b
    text: |-
      lokale spoorwegen, voor zover gelegen buiten de gebieden die op grond van
      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] zijn aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13a
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 2.13a.2
    text: Provinciale staten kunnen deze bevoegdheid delegeren aan gedeputeerde staten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.13a
  - number: '2.14'
    text: |-
      Bij algemene maatregel van bestuur kunnen, met inachtneming van de grenzen van [artikel 2.3, derde lid][ref1],
      omgevingswaarden worden vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.15.1
    text: |-
      Bij algemene maatregel van bestuur worden met het oog op het waarborgen van de veiligheid, het beschermen van de
      gezondheid, het beschermen van het milieu en het beheer van natuurlijke hulpbronnen in ieder geval omgevingswaarden
      vastgesteld voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.1.a
    text: |-
      de kwaliteit van de buitenlucht, waaronder de concentraties van verontreinigende stoffen in de buitenlucht, ook
      in verband met de blootstelling van de mens aan die stoffen, ter uitvoering van de richtlijn luchtkwaliteit en de
      richtlijn gevaarlijke stoffen in de lucht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.1.b
    text: |-
      de chemische en ecologische kwaliteit van oppervlaktewaterlichamen en de chemische kwaliteit en kwantitatieve
      toestand van grondwaterlichamen, ter uitvoering van de kaderrichtlijn water, de grondwaterrichtlijn en de richtlijn
      prioritaire stoffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.1.c
    text: de kwaliteit van zwemwater, ter uitvoering van de zwemwaterrichtlijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.1.d
    text: de veiligheid van primaire waterkeringen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.1.e
    text: de veiligheid van andere dan primaire waterkeringen, voor zover die in beheer zijn bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt bij besluit als omgevingswaarden geluidproductieplafonds vast
      aan weerszijden van bij ministeriële regeling aangewezen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.2.a
    text: wegen in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.2.b
    text: hoofdspoorwegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.3
    text: |-
      Als uitgangspunt voor het vaststellen van de omgevingswaarden, bedoeld in het eerste lid, aanhef en onder d, geldt
      ten minste een beschermingsniveau waarmee in 2050 de kans om te overlijden als gevolg van een overstroming achter
      de primaire waterkering niet groter is dan 1 op 100.000 per jaar. Een hoger beschermingsniveau wordt geboden op
      plaatsen waar sprake kan zijn van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.3.a
    text: grote groepen dodelijke slachtoffers,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.3.b
    text: substantiële economische schade, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.3.c
    text: ernstige schade door uitval van vitale en kwetsbare infrastructuur van nationaal belang.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.4
    text: 'Voor de toepassing van het eerste lid, aanhef en onder d, worden bij ministeriële regeling:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.4.a
    text: |-
      voor daarbij aan te geven locaties nadere regels gesteld over het bepalen van de overstromingskans of de faalkans
      van de primaire waterkering, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.4.b
    text: de locaties begrensd waarop de omgevingswaarden van toepassing zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.5
    text: 'Voor de toepassing van het eerste lid, aanhef en onder e, worden bij ministeriële regeling:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.5.a
    text: |-
      voor daarbij aan te geven locaties nadere regels gesteld over het bepalen van de hydraulische belasting en de
      sterkte van de andere dan primaire waterkeringen, voor zover die in beheer zijn bij het Rijk, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.5.b
    text: de locaties begrensd waarop de omgevingswaarden van toepassing zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15.6
    text: |-
      De nadere regels, bedoeld in het vierde lid, onder a, worden voor primaire waterkeringen steeds na ten hoogste
      twaalf jaar herzien.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15
  - number: 2.15a.1
    text: |-
      Het percentage van het areaal van de voor stikstof gevoelige habitats in Natura 2000-gebieden waarop de depositie
      van stikstof niet groter is dan de hoeveelheid in mol per hectare per jaar waarboven verslechtering van de
      kwaliteit van die habitats niet op voorhand is uit te sluiten, bedraagt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
    machine_readable:
      execution:
        parameters:
          - name: peiljaar
            type: number
            required: true
            description: Het jaar waarvoor de omgevingswaarde wordt getoetst
            source: {}
          - name: percentage_areaal_onder_kdw
            type: number
            required: true
            description: >-
              Het percentage van het areaal van stikstofgevoelige
              habitats waarop de depositie niet groter is dan de
              kritische depositiewaarde
            source: {}
        output:
          - name: minimaal_vereist_percentage
            type: number
            description: Het minimaal vereiste percentage voor het betreffende peiljaar
          - name: voldoet_aan_omgevingswaarde
            type: boolean
            description: Of aan de omgevingswaarde voor het betreffende peiljaar wordt voldaan
        actions:
          - output: minimaal_vereist_percentage
            value:
              operation: IF
              cases:
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $peiljaar
                    value: 2025
                  then: 40
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $peiljaar
                    value: 2030
                  then: 50
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $peiljaar
                    value: 2035
                  then: 74
              default: 74
          - output: voldoet_aan_omgevingswaarde
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $percentage_areaal_onder_kdw
              value: $minimaal_vereist_percentage
  - number: 2.15a.1.a
    text: 'in 2025: ten minste 40%;'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.15a.1.b
    text: 'in 2030: ten minste 50%;'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.15a.1.c
    text: 'in 2035: ten minste 74%.'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.15a.2
    text: De in het eerste lid bedoelde omgevingswaarden zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.15a.3
    text: In ieder geval in 2028 wordt bezien of met het programma kan worden voldaan aan de omgevingswaarde voor 2035.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.15a.4
    text: |-
      Uiterlijk in 2033 en vervolgens steeds uiterlijk twee jaar voor het verstrijken van de termijn waarbinnen aan
      de omgevingswaarde, bedoeld in het eerste lid, onder c, moet zijn voldaan, dient de regering een voorstel van
      wet in tot wijziging van het eerste lid ten behoeve van de vaststelling van de omgevingswaarde voor de volgende
      periode, zodat de depositie op termijn wordt verminderd tot een niveau dat nodig is voor een gunstige staat van
      instandhouding van de betrokken natuurlijke habitats en soorten op landelijk niveau.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.15a
  - number: 2.16.1
    text: |-
      Bij het gemeentebestuur berusten, naast de elders in deze wet en op grond van andere wetten aan dat bestuur
      toegedeelde taken voor de fysieke leefomgeving, de volgende taken:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.1.a
    text: 'op het gebied van het beheer van watersystemen en waterketenbeheer:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.1.a.1°
    text: |-
      de doelmatige inzameling van afvloeiend hemelwater, voor zover de houder het afvloeiend hemelwater redelijkerwijs
      niet op of in de bodem of een oppervlaktewaterlichaam kan brengen, en het transport en de verwerking daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.1.a.2°
    text: |-
      het treffen van maatregelen in het openbaar gemeentelijke gebied om structureel nadelige gevolgen van de
      grondwaterstand voor de op grond van deze wet aan de fysieke leefomgeving toegedeelde functies zoveel mogelijk
      te voorkomen of te beperken, voor zover het treffen van die maatregelen doelmatig is en niet op grond van
      [artikel 2.17][ref1], [2.18][ref2] of [2.19][ref3] tot de taak van een waterschap, een provincie of het Rijk
      behoort,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
