        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 16.112.b
    text: |-
      door een derde beroepsmatig verleende rechtsbijstand of andere deskundige bijstand in verband met het naar voren
      brengen van een zienswijze en de behandeling daarvan bij de voorbereiding van de onteigeningsbeschikking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.112
  - number: 16.113.1
    text: |-
      Op een verzoek tot bekrachtiging van de onteigeningsbeschikking en de behandeling daarvan zijn
      de [artikelen 6:9][ref1], [6:14][ref2], [6:17][ref3], [6:22][ref4], [8:10 tot en met 8:12][ref5],
      [8:15 tot en met 8:28][ref6], [8:29 tot en met 8:40a][ref7], [8:41a][ref8], [8:44 tot en met 8:51d][ref9],
      [8:56 tot en met 8:68][ref10], [8:76][ref11], [8:78][ref12], [8:79][ref13], [8:80a][ref14] en
      [8:80b van de Algemene wet bestuursrecht][ref15] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
