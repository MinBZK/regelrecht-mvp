    text: |-
      Bij een regel op grond van [artikel 2.22][ref1] kan worden bepaald dat gedeputeerde staten, op verzoek van een
      bestuursorgaan van een gemeente of waterschap, ontheffing kunnen verlenen van die regel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.32
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
  - number: 2.32.2
    text: |-
      Bij een regel op grond van [artikel 2.24, eerste lid][ref1], kan worden bepaald dat Onze Minister die het aangaat,
      op verzoek van een bestuursorgaan van een gemeente, waterschap of provincie, ontheffing kan verlenen van die regel.
      Bij de regel kan worden bepaald dat voor het besluit tot het verlenen van een ontheffing overeenstemming is vereist
      met Onze Minister die het aangaat of Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.32
    references:
