        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.16.1.a.3°
    text: de inzameling en het transport van stedelijk afvalwater,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.1.a.4°
    text: |-
      het beheer van watersystemen, voor zover toegedeeld bij omgevingsverordening als bedoeld in
      [artikel 2.18, tweede lid][ref1], of bij ministeriële regeling als bedoeld in [artikel 2.20, derde lid][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.2
        afdeling: '2.4'
  - number: 2.16.1.a.5°
    text: |-
      de zuivering van stedelijk afvalwater, in gevallen waarin toepassing is gegeven aan
      [artikel 2.17, derde lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.16.1.b
    text: |-
      het behoeden van de staat en werking van openbare wegen, voor zover niet in beheer bij een waterschap, een
      provincie of het Rijk, voor nadelige gevolgen van activiteiten op of rond die wegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.1.c
    text: |-
      de beheersing van geluid afkomstig van wegen in beheer bij de gemeente, lokale spoorwegen, voor zover deze niet
      zijn aangewezen op grond van [artikel 2.13a, eerste lid, aanhef en onder b][ref1], en industrieterreinen, voor
      zover deze niet zijn aangewezen op grond van [artikel 2.12a, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
  - number: 2.16.2
    text: |-
      Op grond van het eerste lid, onder a, onder 3°, wordt stedelijk afvalwater ingezameld en getransporteerd naar een
      zuiveringtechnisch werk als dat vrijkomt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.2.a
    text: |-
      op de percelen, gelegen binnen een bebouwde kom van waaruit stedelijk afvalwater met een vervuilingswaarde van ten
      minste tweeduizend inwonerequivalenten als bedoeld in de richtlijn stedelijk afvalwater wordt geloosd, door middel
      van een openbaar vuilwaterriool,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.2.b
    text: op andere percelen, voor zover dit doelmatig kan worden uitgevoerd door middel van een openbaar vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.16.3
    text: |-
      In plaats van een openbaar vuilwaterriool en een zuiveringtechnisch werk kunnen andere passende systemen in beheer
      bij een gemeente, een waterschap of een rechtspersoon die door een gemeente of waterschap met het beheer is belast,
      worden toegepast, als daarmee hetzelfde niveau van het beschermen van het milieu wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.16
  - number: 2.17.1
    text: |-
      Bij het waterschapsbestuur berusten, naast de elders in deze wet en op grond van andere wetten aan dat bestuur
      toegedeelde taken voor de fysieke leefomgeving, de volgende taken:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.1.a
    text: 'op het gebied van het beheer van watersystemen en het waterketenbeheer:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.1.a.1°
    text: |-
      het beheer van watersystemen, voor zover aan het waterschap toegedeeld bij provinciale verordening als bedoeld in
      [artikel 2.18, tweede lid][ref1], of bij ministeriële regeling als bedoeld in [artikel 2.20, derde lid][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.2
        afdeling: '2.4'
  - number: 2.17.1.a.2°
    text: de zuivering van stedelijk afvalwater, gebracht in een openbaar vuilwaterriool, in een zuiveringtechnisch werk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.1.b
    text: |-
      het behoeden van de staat en werking van openbare wegen voor nadelige gevolgen van activiteiten op of rond die
      wegen, voor zover het beheer van die wegen bij provinciale verordening is toegedeeld aan het waterschap,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.1.c
    text: de beheersing van geluid afkomstig van wegen als bedoeld onder b.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.2
    text: Het waterschapsbestuur kan een andere rechtspersoon belasten met de exploitatie van een zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.17.3
    text: |-
      Het waterschapsbestuur en het gemeentebestuur kunnen, in afwijking van het eerste lid, bij gezamenlijk besluit
      bepalen dat de zuiveringstaak, bedoeld in het eerste lid, onder a, onder 2°, tot de taak van de gemeente behoort,
      als dat doelmatiger is voor de zuivering van het stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.17
  - number: 2.18.1
    text: |-
      Bij het provinciebestuur berusten, naast de elders in deze wet en op grond van andere wetten aan dat bestuur
      toegedeelde taken voor de fysieke leefomgeving, de volgende taken:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.a
    text: |-
      met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1]: de gebiedsgerichte coördinatie van de
      uitoefening van taken en bevoegdheden door gemeenten en waterschappen,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.18.1.b
    text: het voorkomen of beperken van geluid in stiltegebieden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.c
    text: |-
      het beschermen van de kwaliteit van het grondwater in grondwaterbeschermingsgebieden, in verband met de winning
      daarvan voor de bereiding van voor menselijke consumptie bestemd water,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.d
    text: 'op het gebied van het beheer van watersystemen en het zwemwaterbeheer:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.d.1°
    text: |-
      het beheer van watersystemen, voor zover dat aan de provincie is toegedeeld bij omgevingsverordening als bedoeld in
      het tweede lid of bij ministeriële regeling als bedoeld in [artikel 2.20, derde lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.2
        afdeling: '2.4'
  - number: 2.18.1.d.2°
    text: |-
      het houden van toezicht op het beheer van watersystemen voor zover dat is toegedeeld aan de waterschappen, met
      uitzondering van het beheer van primaire waterkeringen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.d.3°
    text: |-
      het beheer van de zwemwaterkwaliteit, in ieder geval door het nemen van beheersmaatregelen als bedoeld in
      artikel 2, zevende lid, van de zwemwaterrichtlijn, voor zover deze taak niet op grond van [artikel 2.16][ref1],
      [2.17][ref2] of [2.19][ref3] berust bij een gemeente, een waterschap of het Rijk,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.18.1.e
    text: |-
      het behoeden van de staat en werking van de volgende infrastructuur voor nadelige gevolgen van activiteiten op of
      rond die infrastructuur:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.e.1°
    text: burgerluchthavens van regionale betekenis,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.e.2°
    text: lokale spoorweginfrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.e.3°
    text: wegen in beheer bij de provincie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.f
    text: |-
      de beheersing van geluid afkomstig van wegen en lokale spoorwegen die zijn aangewezen op grond van
      [artikel 2.13a, eerste lid][ref1], en van industrieterreinen als toepassing is gegeven aan [artikel 2.12a][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
  - number: 2.18.1.g
    text: 'op het gebied van natuur:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.g.1°
    text: |-
      het behoud of herstel van dier- en plantensoorten die van nature in Nederland in het wild voorkomen, van hun
      biotopen en habitats, en van in Nederland voorkomende typen natuurlijke habitats, in overeenstemming met de
      internationaalrechtelijke verplichtingen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.g.2°
    text: 'het zorg dragen voor het treffen van maatregelen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.g.2°.i
    text: |-
      voor Natura 2000-gebieden, in overeenstemming met de vogelrichtlijn en de habitatrichtlijn, met uitzondering van
      Natura 2000-gebieden of gedeelten daarvan in bij algemene maatregel van bestuur aangewezen gevallen, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.g.2°.ii
    text: |-
      voor bijzondere nationale natuurgebieden, die nodig zijn voor het bereiken van de instandhoudingsdoelstellingen
      voor de onderscheiden gebieden, in bij algemene maatregel van bestuur aangewezen gevallen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.1.g.3°
    text: |-
      de preventie en beheersing van de introductie en verspreiding van invasieve uitheemse soorten, in bij algemene
      maatregel van bestuur aangewezen gevallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.2
    text: |-
      Bij provinciale verordening wordt, met inachtneming van [artikel 2, tweede lid, van de Waterschapswet][ref1], het
      beheer van regionale wateren toegedeeld aan waterschappen. Bij omgevingsverordening kan:


      [ref1]: https://wetten.overheid.nl/BWBR0005108#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0005108
        artikel: '2'
  - number: 2.18.2.a
    text: het beheer van regionale wateren worden toegedeeld aan andere openbare lichamen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.2.b
    text: het beheer van vaarwegen worden toegedeeld aan waterschappen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
  - number: 2.18.3
    text: |-
      In afwijking van het eerste lid berust de taak, bedoeld in het eerste lid, onder e, aanhef en onder 2°, in gebieden
      die op grond van [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] zijn aangewezen bij het dagelijks
      bestuur van het openbaar lichaam, bedoeld in laatstbedoeld lid.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 2.19.1
    text: |-
      Bij Onze Minister die het aangaat berusten, naast de elders in deze wet en op grond van andere wetten aan het Rijk
      toegedeelde taken voor de fysieke leefomgeving, de in het tweede tot en met vijfde lid genoemde taken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.2
    text: 'De volgende taken voor watersystemen berusten bij Onze Minister van Infrastructuur en Waterstaat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.2.a
    text: het beheer van rijkswateren,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.2.b
    text: |-
      het voorkomen of tegengaan van landwaartse verplaatsing van de kustlijn, voor zover dat volgens die minister
      nodig is om te voldoen aan een omgevingswaarde voor de veiligheid van primaire waterkeringen als bedoeld in
      [artikel 2.15, eerste lid, onder d][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 2.19.2.c
    text: het houden van toezicht op het beheer van primaire waterkeringen door een waterschap of een ander openbaar lichaam,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.2.d
    text: |-
      het tot stand brengen en beschikbaar stellen van technische leidraden voor het ontwerp en het beheer van primaire
      waterkeringen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3
    text: 'De volgende taken voor infrastructuur en andere voorzieningen berusten bij Onze daarbij genoemde Minister:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.a
    text: |-
      bij Onze Minister van Infrastructuur en Waterstaat: het behoeden van de staat en werking van de volgende
      infrastructuur voor nadelige gevolgen van activiteiten op of rond die infrastructuur:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.a.1°
    text: de luchthaven Schiphol en overige burgerluchthavens van nationale betekenis,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.a.2°
    text: hoofdspoorweginfrastructuur en bijzondere spoorweginfrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.a.3°
    text: wegen in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.a.4°
    text: communicatie-, navigatie- en radarapparatuur buiten luchthavens als bedoeld onder 1°,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.b
    text: |-
      bij Onze Minister van Infrastructuur en Waterstaat: de beheersing van geluid afkomstig van wegen in beheer bij het
      Rijk en hoofdspoorwegen die zijn aangewezen op grond van [artikel 2.15, tweede lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 2.19.3.c
    text: |-
      bij Onze Minister van Defensie: het behoeden van de staat en werking van de volgende infrastructuur of andere
      voorzieningen voor defensie en de nationale veiligheid voor nadelige gevolgen van activiteiten op of rond die
      infrastructuur of andere voorzieningen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.c.1°
    text: militaire luchthavens,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.c.2°
    text: laagvliegroutes voor jacht- en transportvliegtuigen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.c.3°
    text: militaire terreinen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.c.4°
    text: munitieopslagplaatsen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.3.c.5°
    text: radarstations en zend- en ontvangstinstallaties buiten militaire luchthavens.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.4
    text: |-
      Bij Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties berust de taak van het houden van toezicht op de
      uitoefening van taken door een waterschap voor het digitaal stelsel, bedoeld in [afdeling 20.5][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '20'
        afdeling: '20.5'
  - number: 2.19.5
    text: 'De volgende taken op het gebied van natuur berusten bij Onze daarbij genoemde Minister:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.a
    text: 'bij Onze Minister voor Natuur en Stikstof:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.a.1°
    text: |-
      het zorg dragen voor het nemen van maatregelen als bedoeld in [artikel 2.18, eerste lid, onder g, onder 2°][ref1],
      tweede streep, voor bijzondere nationale natuurgebieden, behalve in de gevallen die zijn aangewezen bij algemene
      maatregel van bestuur als bedoeld in laatstgenoemd artikelonderdeel,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.19.5.a.2°
    text: |-
      het voor zover mogelijk opstellen van een kwantificering van de instandhoudingsdoelstellingen voor de in Natura
      2000-gebieden en bijzondere nationale natuurgebieden te beschermen habitats en soorten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.a.3°
    text: |-
      het opstellen van rode lijsten die inzicht geven in met uitroeiing bedreigde of speciaal gevaar lopende dier- en
      plantensoorten die van nature in Nederland voorkomen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.a.4°
    text: |-
      de preventie en beheersing van de introductie en verspreiding van invasieve uitheemse soorten, met uitzondering van
      de gevallen die zijn aangewezen op grond van [artikel 2.18, eerste lid, onder g, onder 3°][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.19.5.b
    text: |-
      bij Onze bij algemene maatregel van bestuur aangewezen Minister: het zorg dragen voor het nemen van maatregelen
      als bedoeld in [artikel 2.18, eerste lid, onder g, onder 2°, eerste streep][ref1], voor Natura 2000-gebieden of
      gedeelten daarvan:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.19.5.b.1°
    text: die een oppervlaktewaterlichaam zijn dat in beheer is bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.b.2°
    text: die voor militaire doeleinden worden gebruikt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.19.5.b.3°
    text: |-
      die in beheer zijn bij een van Onze andere Ministers dan Onze Minister voor Natuur en Stikstof, of eigendom zijn
      van de Staat der Nederlanden, in bij algemene maatregel van bestuur aangewezen gevallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.19
  - number: 2.20.1
    text: |-
      Bij algemene maatregel van bestuur worden voor de toepassing van deze wet, met inachtneming van de grenzen van
      [artikel 2.3, derde lid][ref1], de waterkeringen en oppervlaktewaterlichamen of onderdelen daarvan aangewezen die
      behoren tot de rijkswateren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.20.2
    text: |-
      Bij ministeriële regeling worden de waterkeringen en oppervlaktewaterlichamen of onderdelen daarvan die behoren tot
      de rijkswateren geometrisch begrensd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.20
  - number: 2.20.3
    text: |-
      Bij ministeriële regeling kunnen rijkswateren worden aangewezen waarvan het beheer, in afwijking van het eerste
      lid, geheel of gedeeltelijk berust bij daarbij aangegeven niet tot het Rijk behorende openbare lichamen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.20
  - number: 2.21.1
    text: |-
      Bij ministeriële regeling kunnen voor de toepassing van deze wet, met inachtneming van de grenzen van
      [artikel 2.3, derde lid][ref1], andere locaties dan bedoeld in [artikel 2.20][ref2] worden aangewezen en
      geometrisch begrensd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.2
        afdeling: '2.4'
  - number: 2.21.2
    text: 'Op grond van het eerste lid worden in ieder geval de volgende locaties aangewezen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21
  - number: 2.21.2.a
    text: |-
      de Nederlandse delen van de stroomgebiedsdistricten Rijn, Maas, Schelde en Eems, met inbegrip van de toedeling van
      grondwaterlichamen aan die stroomgebiedsdistricten, bedoeld in de kaderrichtlijn water,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21
  - number: 2.21.2.b
    text: |-
      de zones en agglomeraties, bedoeld in de richtlijn omgevingslawaai, de richtlijn luchtkwaliteit en de richtlijn
      gevaarlijke stoffen in de lucht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21
  - number: 2.21a.1
    text: |-
      Op grond van [artikel 2.21, eerste lid][ref1], worden in ieder geval aangewezen en geometrisch begrensd de
      beperkingengebieden met betrekking tot:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.2
        afdeling: '2.4'
  - number: 2.21a.1.a
    text: wegen in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: 2.21a.1.b
    text: waterstaatswerken in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: 2.21a.1.c
    text: hoofdspoorweginfrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: 2.21a.1.d
    text: installaties in een waterstaatswerk, anders dan mijnbouwinstallaties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: 2.21a.2
    text: |-
      Zolang geen toepassing is gegeven aan het eerste lid, bestaan de beperkingengebieden uit de locatie van het werk
      of object waarvoor het beperkingengebied wordt aangewezen en de locaties die binnen een bij algemene maatregel van
      bestuur bepaalde afstand rond dat werk of object liggen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: 2.21a.3
    text: |-
      Het beperkingengebied met betrekking tot een mijnbouwinstallatie in een waterstaatswerk bestaat uit de
      mijnbouwinstallatie en de locaties die binnen een bij algemene maatregel van bestuur, in overeenstemming met
      artikel 2, onder 26, van de richtlijn offshore veiligheid, bepaalde afstand rond die installatie liggen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.21a
  - number: '2.22'
    text: |-
      Bij omgevingsverordening kunnen, met inachtneming van de grenzen van [artikel 2.3, tweede lid][ref1], regels
      worden gesteld over de uitoefening van taken of bevoegdheden door bestuursorganen om te voldoen aan bij
      omgevingsverordening vastgestelde omgevingswaarden of voor het bereiken van andere doelstellingen voor de fysieke
      leefomgeving.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.22
    references:
      - id: ref1
