      De gemeenteraad stelt een commissie in die in ieder geval tot taak heeft te adviseren over de aanvragen om een
      omgevingsvergunning voor een rijksmonumentenactiviteit met betrekking tot een monument. Binnen deze commissie zijn
      enkele leden deskundig op het gebied van de monumentenzorg, die in ieder geval worden betrokken bij de advisering
      over een rijksmonumentenactiviteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
  - number: 17.9.2
    text: |-
      Naast de gevallen waarin de commissie op grond van [artikel 16.15, eerste of tweede lid][ref1], als adviseur wordt
      aangewezen, kan het college van burgemeester en wethouders de commissie advies vragen over het ontwikkelen van
      beleid voor de kwaliteit van de fysieke leefomgeving.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 17.9.3
    text: |-
      De commissie baseert haar advies, voor zover van toepassing, op de omgevingsvisie, het omgevingsplan en de
      beleidsregels, bedoeld in [artikel 4.19][ref1]. Bij een advies over een rijksmonumentenactiviteit neemt de
      commissie de uitgangspunten, bedoeld in [artikel 5.22][ref2], in acht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.1
        afdeling: '4.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 17.9.4
    text: De adviezen van de commissie zijn deugdelijk gemotiveerd en worden schriftelijk openbaar gemaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
  - number: 17.9.5
    text: |-
      De door de commissie gehouden vergaderingen zijn openbaar. Een vergadering of een gedeelte daarvan is niet openbaar
      in gevallen als bedoeld in [artikel 5.1, eerste lid, van de Wet open overheid][ref1] en in gevallen waarin het
      belang van openbaarheid niet opweegt tegen de in artikel 5.1, tweede lid, van die wet genoemde belangen.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 17.9.6
    text: De commissie zendt de gemeenteraad elk jaar een verslag over de door haar verrichte werkzaamheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.9
  - number: 17.10.1
    text: Er is een Stichting Advisering Bestuursrechtspraak voor Milieu en Ruimtelijke Ordening.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.10
  - number: 17.10.2
    text: |-
      De stichting heeft tot taak aan de bestuursrechter op diens verzoek op onpartijdige en onafhankelijke wijze
      deskundigenbericht uit te brengen over:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.10
  - number: 17.10.2.a
    text: beroepen tegen besluiten op grond van deze wet,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.10
  - number: 17.10.2.b
    text: |-
      beroepen tegen besluiten op grond van andere wetten, als het gaat om een onderwerp dat samenhangt met de fysieke
      leefomgeving of activiteiten met gevolgen voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.10
  - number: 17.10.3
    text: |-
      De personen die deel uitmaken van de organen van de stichting en het personeel van de stichting vervullen geen
      functies en betrekkingen waarvan de uitoefening ongewenst is in verband met de handhaving van de onpartijdigheid en
      onafhankelijkheid van de stichting of het vertrouwen daarin.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel17.10
  - number: '18.1'
    text: 'De bestuursrechtelijke handhavingstaak omvat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.1
  - number: 18.1.a
    text: |-
      het houden van toezicht op de naleving van het bepaalde bij of krachtens deze wet, met inbegrip van het verzamelen
      en registreren van gegevens die hiervoor van belang zijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.1
  - number: 18.1.b
    text: het behandelen van klachten over de naleving van het bepaalde bij of krachtens deze wet, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.1
  - number: 18.1.c
    text: |-
      het opleggen en ten uitvoer leggen van een bestuurlijke sanctie vanwege enig handelen of nalaten in strijd met het
      bepaalde bij of krachtens deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.1
  - number: 18.2.1
    text: |-
      Als sprake is van een activiteit waarvoor op grond van [paragraaf 4.1.1][ref1] algemene regels zijn gesteld, berust
      de bestuursrechtelijke handhavingstaak bij het op grond van [paragraaf 4.1.3][ref2] voor die activiteit bevoegde
      gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 18.2.2
    text: |-
      Als sprake is van een activiteit waarvoor een omgevingsvergunning is vereist, berust de bestuursrechtelijke
      handhavingstaak bij het op grond van [paragraaf 5.1.2][ref1] voor die omgevingsvergunning bevoegde gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 18.2.3
    text: |-
      Voor zover een projectbesluit geldt als omgevingsvergunning voor activiteiten ter uitvoering van het projectbesluit
      als bedoeld in [artikel 5.52, tweede lid, onder a][ref1], berust de bestuursrechtelijke handhavingstaak bij het
      bestuursorgaan dat het projectbesluit heeft vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 18.2.4
    text: |-
      Voor een gedoogplicht als bedoeld in [hoofdstuk 10][ref1] berust de bestuursrechtelijke handhavingstaak alleen bij
      een bestuursorgaan voor zover bij algemene maatregel van bestuur die taak aan dat bestuursorgaan is opgedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
  - number: 18.2.5
    text: |-
      In de overige gevallen berust de bestuursrechtelijke handhavingstaak bij het college van burgemeester en
      wethouders.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
  - number: 18.2.6
    text: |-
      Bij algemene maatregel van bestuur kan, met inachtneming van de grenzen van [artikel 2.3][ref1], de
      bestuursrechtelijke handhavingstaak aan een ander bestuursorgaan worden opgedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 18.3.1
    text: |-
      In bij algemene maatregel van bestuur aangewezen gevallen berust de bestuursrechtelijke handhavingstaak ook
      bij het bestuursorgaan dat op grond van [artikel 16.16, eerste lid][ref1], heeft beslist over instemming met de
      voorgenomen beslissing op de aanvraag om een omgevingsvergunning voor een activiteit, of dat op grond van artikel
      16.16, derde of vierde lid, heeft bepaald dat instemming niet is vereist, voor zover het gaat om de naleving van de
      voorschriften van de omgevingsvergunning voor die activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 18.3.2
    text: |-
      Bij algemene maatregel van bestuur kan de bestuursrechtelijke handhavingstaak met het oog op een doelmatige
      uitoefening daarvan ook in andere gevallen worden opgedragen aan een bestuursorgaan dat die taak naast het bij
      of krachtens [artikel 18.2][ref1] aangewezen bestuursorgaan uitoefent. Het opdragen van de bestuursrechtelijke
      handhavingstaak kan daarbij worden beperkt tot een te onderscheiden activiteit of deel van een activiteit waarop de
      regel die of het besluit dat wordt gehandhaafd betrekking heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
  - number: '18.4'
    text: |-
      Onze Minister die het aangaat is bevoegd tot oplegging van een last onder bestuursdwang ter handhaving van het
      bepaalde bij of krachtens deze wet voor zover bij hem de bestuursrechtelijke handhavingstaak daarvan berust.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.4
  - number: 18.4a
    text: |-
      Het bestuursorgaan dat een besluit neemt tot het opleggen van een last onder bestuursdwang of een last onder
      dwangsom gericht op naleving van een bij of krachtens deze wet gestelde regel kan daarbij bepalen dat het besluit
      ook geldt voor de rechtsopvolgers van degene aan wie de last wordt opgelegd. In dat geval kan het bestuursorgaan
      het besluit tegen de rechtsopvolgers ten uitvoer leggen en de kosten van die tenuitvoerlegging of een verbeurde
      dwangsom bij die rechtsopvolgers invorderen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.4a
  - number: '18.5'
    text: |-
      Als een beschikking tot oplegging van een bestuurlijke sanctie is gegeven en vervolgens een ander bestuursorgaan
      daartoe bevoegd wordt, blijft het bestuursorgaan dat de beschikking heeft gegeven bevoegd totdat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5.a
    text: de beschikking onherroepelijk is geworden en ten uitvoer is gelegd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5.b
    text: de beschikking is ingetrokken, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5.c
    text: 'als de beschikking gaat om de oplegging van een last onder dwangsom:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5.c.1°
    text: de dwangsom is ingevorderd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5.c.2°
    text: de bij de beschikking opgelegde last onder dwangsom is opgeheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5
  - number: 18.5a
    text: |-
      Voor zover op grond van deze paragraaf taken of bevoegdheden die gaan over mijnbouw berusten bij Onze Minister
      van Economische Zaken en Klimaat, worden deze uitgeoefend door het bestuursorgaan dat daartoe op grond van
      [hoofdstuk 8 van de Mijnbouwwet][ref1] bevoegd is.


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.5a
    references:
      - id: ref1
        bwb_id: BWBR0014168
        hoofdstuk: '8'
  - number: 18.6.1
    text: |-
      Met het toezicht op de naleving van het bepaalde bij of krachtens deze wet zijn belast de personen die daartoe
      bij besluit van het college van burgemeester en wethouders, het dagelijks bestuur van een waterschap, gedeputeerde
      staten, Onze Minister die het aangaat of andere met de uitvoering van deze wet belaste bestuursorganen zijn
      aangewezen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6
  - number: 18.6.2
    text: |-
      Van een besluit tot aanwijzing van toezichthouders wordt mededeling gedaan door plaatsing in het gemeenteblad, het
      waterschapsblad, het provinciaal blad of de Staatscourant.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6
  - number: 18.6a.1
    text: |-
      Onze Minister die het aangaat kan en gedeputeerde staten kunnen bepalen dat in de door hen aangewezen gevallen de
      bij een omgevingsdienst werkzame toezichthouders mede bevoegd zijn buiten het werkgebied van die omgevingsdienst.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
  - number: 18.6a.2
    text: |-
      Onze Minister die het aangaat kan bepalen dat bij zijn besluit aangewezen toezichthouders met uitsluiting van
      andere toezichthouders zijn belast met het toezicht op de naleving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
  - number: 18.6a.3
    text: |-
      Een door Onze Minister van Infrastructuur en Waterstaat aangewezen toezichthouder verricht uit eigen beweging
      of op verzoek van gedeputeerde staten of het dagelijks bestuur van een openbaar lichaam als bedoeld in
      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] toezicht op de naleving van:


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 18.6a.3.a
    text: |-
      bij algemene maatregel van bestuur over een beperkingengebiedactiviteit met betrekking tot een lokale spoorweg
      gestelde regels als bedoeld in [artikel 4.3, derde lid, aanhef en onder c, onder 2°][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 18.6a.3.b
    text: |-
      het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder f][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een lokale spoorweg te verrichten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 18.6a.3.c
    text: |-
      het verbod, bedoeld in [artikel 5.5, eerste lid, aanhef en onder f][ref1], om te handelen in strijd met een
      voorschrift van een omgevingsvergunning als bedoeld onder b.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 18.6a.4
    text: |-
      [Artikel 42, zevende, achtste en negende lid, van de Wet lokaal spoor][ref1] is van overeenkomstige toepassing op
      het toezicht, bedoeld in het derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0034363#Artikel42
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.6a
    references:
      - id: ref1
        bwb_id: BWBR0034363
        artikel: '42'
  - number: 18.7.1
    text: |-
      Een krachtens [artikel 18.6][ref1] aangewezen toezichthouder is bevoegd met medeneming van de benodigde apparatuur
      een woning te betreden zonder toestemming van de bewoner, voor zover hem deze bevoegdheid in het besluit tot
      aanwijzing is toegekend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.2
        afdeling: '18.1'
  - number: 18.7.2
    text: |-
      De in het eerste lid bedoelde bevoegdheid wordt in een besluit tot aanwijzing alleen toegekend voor zover het
      toezicht op de naleving van een bij of krachtens deze wet gesteld voorschrift dit vereist, gelet op de door dat
      voorschrift beschermde belangen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.7
  - number: '18.8'
    text: |-
      De ambtenaren van de rijksbelastingdienst, bevoegd inzake douane, geven geen toestemming tot vertrek van een
      vaartuig of luchtvaartuig uit Nederland als zij ernstige redenen hebben om te vermoeden dat in strijd zal worden
      gehandeld met [artikel 5.1, eerste lid, aanhef en onder d][ref1], of [5.5, eerste lid, aanhef en onder c][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: '18.9'
    text: |-
      Onze Minister die het aangaat en de toezichthouders nemen bij de toepassing van [artikel 18.4][ref1]
      respectievelijk bij de uitoefening van het toezicht op de naleving van het bepaalde bij of krachtens deze wet,
      afdeling 7 van Deel XII van het VN-Zeerechtverdrag in acht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
  - number: 18.10.1
    text: |-
      Het bevoegd gezag kan een beschikking geheel of gedeeltelijk intrekken als in strijd met die beschikking of met de
      voor de activiteit waarvoor de beschikking is gegeven, geldende regels is of wordt gehandeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
  - number: 18.10.2
    text: |-
      Een beschikking die betrekking heeft op het beheer van gevaarlijke afvalstoffen of van andere afvalstoffen die van
      elders afkomstig zijn, kan, voor zover die beschikking betrekking heeft op het beheer van afvalstoffen, ook worden
      ingetrokken als in strijd is of wordt gehandeld met de op grond van [hoofdstuk 10 van de Wet milieubeheer][ref1]
      voor dat beheer geldende voorschriften.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
    references:
      - id: ref1
        bwb_id: BWBR0003245
        hoofdstuk: '10'
  - number: 18.10.3
    text: |-
      Voordat het bevoegd gezag toepassing geeft aan het eerste of tweede lid, biedt het de overtreder de gelegenheid
      binnen een bepaalde termijn zijn handelen alsnog in overeenstemming te brengen met die beschikking of die regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
  - number: 18.10.4
    text: 'Het bevoegd gezag kan een beschikking ook geheel of gedeeltelijk intrekken:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
  - number: 18.10.4.a
    text: als de beschikking is gegeven op basis van een onjuiste of onvolledige opgave van gegevens,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
  - number: 18.10.4.b
    text: |-
      in gevallen als bedoeld in [artikel 5.37, tweede lid][ref1]: als de activiteit wordt verricht door een ander dan
      degene aan wie de omgevingsvergunning is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 18.11.1
    text: |-
      Het bevoegd gezag kan een bestuurlijke boete opleggen bij overtreding van de op grond van
      [artikel 4.3, eerste lid, aanhef en onder b, en vierde lid][ref1], in verbinding met het eerste lid, aanhef en
      onder b, gestelde regels ter uitvoering van de artikelen 5 en 7 tot en met 12 van de Seveso-richtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 18.11.2
    text: |-
      De bestuurlijke boete bedraagt ten hoogste het bedrag dat is vastgesteld voor de zesde categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref1], of, als dat meer is, ten hoogste tien procent
      van de omzet van de onderneming in het boekjaar voorafgaande aan het boekjaar waarin de bestuurlijke boete wordt
      opgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.11
    machine_readable:
      execution:
        parameters:
          - name: omzet_voorgaand_boekjaar
            type: number
            required: true
            description: Omzet van de onderneming in het voorgaande boekjaar (in eurocent)
        input:
          - name: max_boete_zesde_categorie
            type: number
            description: Maximum boete zesde categorie art. 23 lid 4 Wetboek van Strafrecht (in eurocent)
            source:
              regulation: wetboek_van_strafrecht
              output: boetecategorie_bedrag
              parameters:
                categorie: '6'
        output:
          - name: maximale_boete
            type: number
            description: Maximale bestuurlijke boete (in eurocent)
        actions:
          - output: tien_procent_omzet
            value:
              operation: MULTIPLY
              values:
                - $omzet_voorgaand_boekjaar
                - 0.10
          - output: maximale_boete
            value:
              operation: MAX
              values:
                - $max_boete_zesde_categorie
                - $tien_procent_omzet
    references:
      - id: ref1
        bwb_id: BWBR0001854
        artikel: '23'
