        artikel: '8'
      - id: ref4
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '16.118'
    text: |-
      Geen hoger beroep kan worden ingesteld door een belanghebbende aan wie redelijkerwijs kan worden verweten dat hij
      geen bedenkingen tegen de onteigeningsbeschikking heeft ingebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.118
  - number: '16.119'
    text: |-
      In afwijking van [artikel 8:114, eerste lid, van de Algemene wet bestuursrecht][ref1] houdt de uitspraak ook in
      dat het bestuursorgaan aan de belanghebbende die een hogerberoepschrift heeft ingediend, het door hem betaalde
      griffierecht vergoedt als het hoger beroep ongegrond wordt verklaard.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.119
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: '16.120'
    text: |-
      De uitspraak houdt ook in dat het bestuursorgaan wordt veroordeeld in de kosten die een belanghebbende in verband
      met de behandeling van het hoger beroep naar aard en omvang redelijkerwijs heeft moeten maken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.120
  - number: '16.121'
    text: |-
      De hogerberoepsrechter doet uitspraak binnen zes maanden na afloop van de termijn waarbinnen andere partijen dan de
      indiener van het hogerberoepschrift een schriftelijke uiteenzetting over het hoger beroep konden geven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.121
  - number: 16.122.1
    text: |-
      De rechtbank benoemt een of meer deskundigen die zo spoedig mogelijk aan de rechtbank advies uitbrengen over de
      prijs, bedoeld in de [artikelen 9.16, eerste lid][ref1], en [9.18, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.122
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 16.122.2
    text: |-
      De rechtbank oordeelt over de prijs met overeenkomstige toepassing van de [artikelen 15.21 tot en met 15.25][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.122
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 16.123.1
    text: |-
      De rechtbank doet binnen zes maanden na ontvangst van het verzoek, bedoeld in [artikel 9.16, eerste lid][ref1], bij
      beschikking uitspraak over het verzoek.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.123
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 16.123.2
    text: |-
      De rechtbank doet binnen zes maanden na ontvangst van het verzoek, bedoeld in [artikel 9.18, eerste lid][ref1], bij
      beschikking uitspraak over het verzoek en bij toewijzing daarvan ook over de prijs. Zij beoordeelt of het redelijk
      is dat vervreemding aan de gemeente, de provincie of de Staat vanwege bijzondere persoonlijke omstandigheden van de
      vervreemder achterwege zou blijven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.123
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 16.123.3
    text: Tegen beschikkingen als bedoeld in het eerste en het tweede lid staat alleen beroep in cassatie open.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.123
  - number: 16.123.4
    text: |-
      De kosten van de gerechtelijke procedure, het deskundigenadvies en de redelijkerwijs door de vervreemder voor
      rechtsbijstand en andere deskundige bijstand gemaakte kosten komen ten laste van de verzoeker. Als de rechtbank
      daarvoor aanleiding ziet in de omstandigheden van het geval, kan zij besluiten dat de kosten gedeeltelijk of geheel
      worden gecompenseerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.123
  - number: 16.123.5
    text: |-
      Bij tussentijdse beëindiging van de gerechtelijke procedure, bedoeld in [artikel 9.17][ref1], beslist de rechtbank
      bij beschikking over de toedeling van de kosten, bedoeld in het vierde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.123
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 16.124.1
    text: |-
      Voor zover de toedeling van eigendom in een inrichtingsbesluit, bedoeld in
      [artikel 12.8, eerste lid, onder a, c en d][ref1], betrekking heeft op onroerende zaken die buiten een
      herverkavelingsblok liggen, maakt een door gedeputeerde staten aan te wijzen notaris een akte voor de toedeling op.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.124
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 16.124.2
    text: |-
      De akte wordt opgemaakt op een door gedeputeerde staten te bepalen tijdstip dat ligt na bekendmaking van het
      inrichtingsbesluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.124
  - number: 16.124.3
    text: |-
      De akte wordt ondertekend door de voorzitter van gedeputeerde staten en de secretaris, bedoeld in
      [artikel 97 van de Provinciewet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Artikel97
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.124
    references:
      - id: ref1
        bwb_id: BWBR0005645
        artikel: '97'
  - number: 16.124.4
    text: |-
      Door de inschrijving van de akte in de openbare registers gaat de daarin omschreven eigendom over volgens de in de
      akte neergelegde toedeling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.124
  - number: 16.124.5
    text: |-
      Als op grond van [artikel 8:81 van de Algemene wet bestuursrecht][ref1] een voorlopige voorziening is getroffen,
      is het eerste lid niet van toepassing zolang de werking van het inrichtingsbesluit door de uitspraak van de
      voorzieningenrechter is opgeschort.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.124
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.125.1
    text: |-
      Gedeputeerde staten bepalen tot welk tijdstip bestaande pachtovereenkomsten bij hen ter registratie kunnen worden
      ingezonden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.125
  - number: 16.125.2
    text: |-
      Gedeputeerde staten bepalen tot welk tijdstip pachtovereenkomsten ter registratie kunnen worden ingezonden die na
      het tijdstip, bedoeld in het eerste lid, zijn aangegaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.125
  - number: 16.125.3
    text: Van de registratie wordt door gedeputeerde staten een bewijs afgegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.125
  - number: 16.125.4
    text: |-
      Gedeputeerde staten bevestigen aan de wederpartij van degene die een pachtovereenkomst ter registratie heeft
      ingezonden, de ontvangst van de pachtovereenkomst.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.125
  - number: '16.126'
    text: |-
      De wederpartij kan zijn bedenkingen tegen de registratie van de pachtovereenkomst schriftelijk inbrengen
      bij gedeputeerde staten binnen twee weken na de dagtekening van de ontvangstbevestiging, bedoeld in
      [artikel 16.125, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.126
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.127.1
    text: |-
      Als bedenkingen kenbaar zijn gemaakt, stellen gedeputeerde staten partijen hiervan bij aangetekende brief in
      kennis.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
  - number: 16.127.2
    text: |-
      Gedeputeerde staten delen daarbij mee dat binnen twee weken na de dagtekening van die brief aan gedeputeerde staten
      wordt gezonden:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
  - number: 16.127.2.a
    text: een door beide partijen gewaarmerkte akte waaruit blijkt dat overeenstemming is verkregen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
  - number: 16.127.2.b
    text: |-
      een door de griffier van de rechtbank gewaarmerkt afschrift van het verzoekschrift waarbij de meest gerede partij
      de beslissing van de pachtkamer van de rechtbank binnen het rechtsgebied waarvan de onroerende zaak geheel of
      grotendeels ligt, heeft verzocht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
  - number: 16.127.3
    text: |-
      Als gedeputeerde staten van mening zijn dat ten onrechte
      [artikel 318, eerste lid, van Boek 7 van het Burgerlijk Wetboek][ref1] niet in acht is genomen bij de ter
      registratie ingezonden pachtovereenkomst, dragen zij zo nodig partijen bij aangetekende brief op de beslissing
      van de grondkamer in te roepen en binnen vier weken na de dagtekening van die brief een door de secretaris van de
      grondkamer gewaarmerkt afschrift van het verzoekschrift in te zenden.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel318
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '318'
  - number: 16.127.4
    text: |-
      Als gedeputeerde staten van mening zijn dat [artikel 317, eerste lid, van Boek 7 van het Burgerlijk Wetboek][ref1]
      niet in acht is genomen bij de ter registratie ingezonden pachtovereenkomst, dragen zij zo nodig partijen bij
      aangetekende brief op de beslissing van de pachtkamer van de rechtbank in te roepen en binnen vier weken na de
      dagtekening van die brief een door de griffier van de rechtbank gewaarmerkt afschrift van het verzoekschrift in
      te zenden.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel317
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '317'
  - number: 16.127.5
    text: |-
      De grondkamer en de pachtkamer van de rechtbank en in beroep de Centrale Grondkamer en de pachtkamer van het
      gerechtshof Arnhem-Leeuwarden behandelen de verzoeken en vorderingen, bedoeld in het tweede tot en met vierde lid,
      vóór alle andere zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.127
  - number: '16.128'
    text: |-
      Als aan [artikel 16.127][ref1] geen gevolg is gegeven, hoeft in het ruilbesluit met het bestaan van de
      pachtovereenkomst geen rekening te worden gehouden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.128
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: '16.129'
    text: |-
      Zodra het ruilbesluit onherroepelijk is, doen gedeputeerde staten hiervan mededeling door toezending van het
      ruilbesluit aan de Dienst voor het kadaster en de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.129
  - number: '16.130'
    text: |-
      Gedeputeerde staten delen zo spoedig mogelijk nadat het ruilbesluit onherroepelijk is geworden, aan de grondkamer
      mee welke pachtverhoudingen gehandhaafd, opgeheven of nieuw gevestigd zijn, onder vermelding van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.130
  - number: 16.130.a
    text: de namen en woonplaatsen van partijen in de pachtverhouding,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.130
  - number: 16.130.b
    text: de onroerende zaken waarop deze betrekking hebben, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.130
  - number: 16.130.c
    text: |-
      hetgeen in het ruilbesluit is bepaald over de uit de gevestigde pachtverhoudingen voortvloeiende
      pachtovereenkomsten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.130
  - number: 16.131.1
    text: |-
      De grondkamer ontwerpt de pachtovereenkomsten die uit de nieuw gevestigde pachtverhoudingen voortvloeien en neemt
      daarin de in [artikel 12.28][ref1] bedoelde bepalingen over de geldingsduur van die pachtovereenkomsten op.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.131
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 16.131.2
    text: |-
      Als een overeenkomst die geldt voor een kortere dan de wettelijke duur op grond van [artikel 12.28][ref1] voor
      verlenging vatbaar zal zijn, tekent de grondkamer dit aan op de ontwerppachtovereenkomst.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.131
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 16.131.3
    text: |-
      De grondkamer zendt de ontwerppachtovereenkomst aan hen die daarbij partij zullen zijn en stelt hen in de
      gelegenheid binnen vier weken na toezending de ondertekende overeenkomst aan de grondkamer te zenden. Betrokkenen
      kunnen de door hen overeengekomen pachtprijs en bijzondere bepalingen in de overeenkomst opnemen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.131
  - number: 16.131.4
    text: |-
      Op de in het derde lid bedoelde pachtovereenkomsten is [titel 5 van Boek 7 van het Burgerlijk Wetboek][ref1]
      van toepassing, waarbij de grondkamer niet treedt in de beoordeling van de bepalingen van de overeenkomst die
      voortvloeien uit de pachtverhouding zoals deze door het ruilbesluit is komen vast te staan.


      [ref1]: https://wetten.overheid.nl/BWBR0005290
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.131
    references:
      - id: ref1
        bwb_id: BWBR0005290
  - number: 16.132.1
    text: |-
      Als partijen niet binnen de in [artikel 16.131, derde lid][ref1], gestelde termijn tot inzending van de
      ondertekende pachtovereenkomst bij de grondkamer zijn overgegaan, maakt de grondkamer een akte in drievoud op,
      gelijkluidend aan de aan partijen gezonden ontwerppachtovereenkomst, en bepaalt daarin de pachtprijs.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.132
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.132.2
    text: De grondkamer ondertekent de akte en zendt een exemplaar daarvan aan elke partij.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.132
  - number: 16.132.3
    text: |-
      De akte heeft dezelfde kracht als een tussen partijen gesloten, door de grondkamer goedgekeurde of ter registratie
      aangeboden pachtovereenkomst.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.132
  - number: 16.133.1
    text: De opmaking en ondertekening van de akte door de grondkamer is een beschikking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.133
  - number: 16.133.2
    text: Partijen kunnen tegen de beschikking beroep instellen bij de Centrale Grondkamer.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.133
  - number: 16.133.3
    text: |-
      De termijn voor het indienen van een beroepschrift bedraagt vier weken. De termijn vangt aan met ingang van de dag
      na die waarop de in [artikel 16.132, tweede lid][ref1], bedoelde exemplaren van de akte zijn verzonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.133
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.133.4
    text: |-
      Bij de beslissing op een beroep kan de Centrale Grondkamer de akte wijzigen, met uitzondering van bepalingen die
      voortvloeien uit de pachtverhouding zoals deze door het ruilbesluit is komen vast te staan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.133
  - number: 16.134.1
    text: |-
      Als een bestaande pachtovereenkomst in een gehandhaafde pachtverhouding moet worden gewijzigd of vervangen als
      gevolg van de herverkaveling, verzoekt de grondkamer partijen binnen vier weken een nieuwe overeenkomst ter
      goedkeuring of registratie aan de grondkamer te zenden. De grondkamer doet dat verzoek zo spoedig mogelijk na de
      mededeling van gedeputeerde staten, bedoeld in [artikel 16.130][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.134
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.134.2
    text: |-
      De nieuwe overeenkomst eindigt op hetzelfde tijdstip als waarop de overeenkomst waarvoor zij in de plaats treedt,
      zou zijn geëindigd. Als laatstbedoelde overeenkomst voor de wettelijke duur gold, tekent de grondkamer voor zover
      van toepassing op de nieuwe overeenkomst aan dat deze voor verlenging vatbaar is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.134
  - number: 16.134.3
    text: |-
      Als niet binnen de in het eerste lid bedoelde termijn een overeenkomst ter goedkeuring of registratie is
      aangeboden, maakt de grondkamer een akte in drievoud op, inhoudende een gewijzigde of nieuwe pachtovereenkomst
      waarin de gevolgen van de herverkaveling voor de gehandhaafde pachtverhouding worden verwerkt. De
      [artikelen 16.132, tweede lid][ref1], en [16.133][ref2] zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.134
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.135.1
    text: |-
      Pachtovereenkomsten die op grond van deze afdeling tot stand komen, treden in werking op het tijdstip waarop de
      in [artikel 16.136][ref1] bedoelde herverkavelingsakte in de openbare registers wordt ingeschreven. Op hetzelfde
      tijdstip eindigen de pachtovereenkomsten waarvoor de eerstgenoemde pachtovereenkomsten in de plaats treden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.135
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.135.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op de rechtsverhoudingen geregeld bij een akte als bedoeld in
      [artikel 16.132][ref1] of [16.134, derde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.135
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.136.1
    text: |-
      Zodra het ruilbesluit onherroepelijk is, maakt een door gedeputeerde staten aan te wijzen notaris de
      herverkavelingsakte op.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
  - number: 16.136.2
    text: 'In de herverkavelingsakte worden opgenomen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
  - number: 16.136.2.a
    text: |-
      een verbeelding van het herverkavelingsblok met aanwijzing van de kavels, en, voor zover deze liggen binnen het
      herverkavelingsblok, de wegen, waterstaatswerken, gebieden en elementen waarvan de eigendom, het beheer of het
      onderhoud op grond van [12.8, eerste lid][ref1], zijn toegedeeld,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 16.136.2.b
    text: |-
      de in [artikel 12.8][ref1] bedoelde toedeling van eigendom voor zover deze betrekking heeft op onroerende zaken die
      binnen het herverkavelingsblok liggen,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 16.136.2.c
    text: de hypotheken en de beslagen, die door de inschrijving van de herverkavelingsakte vervallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
  - number: 16.136.3
    text: |-
      De kavels, wegen, waterstaatswerken en gebieden die op de in het tweede lid bedoelde verbeelding zijn afgebeeld en
      die daarop zijn voorzien van een nummer, worden in de herverkavelingsakte aangeduid met het nummer waarmee zij op
      die verbeelding voorkomen. [Artikel 20, eerste lid, van de Kadasterwet][ref1] is niet van toepassing voor zover het
      betreft het vermelden van de aard en de plaatselijke aanduiding, als die er is, van onroerende zaken.


      [ref1]: https://wetten.overheid.nl/BWBR0004541#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
    references:
      - id: ref1
        bwb_id: BWBR0004541
        artikel: '20'
  - number: 16.136.4
    text: |-
      De [artikelen 18, eerste en vijfde lid][ref1], en
      [24, tweede lid, onder b, en vierde lid, tweede zin, van de Kadasterwet][ref2] zijn van overeenkomstige toepassing
      op de herverkavelingsakte.


      [ref1]: https://wetten.overheid.nl/BWBR0004541#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0004541#Artikel24
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.136
    references:
      - id: ref1
        bwb_id: BWBR0004541
        artikel: '18'
      - id: ref2
        bwb_id: BWBR0004541
        artikel: '24'
  - number: 16.137.1
    text: |-
      De herverkavelingsakte wordt ondertekend door de voorzitter van gedeputeerde staten en de secretaris, bedoeld in
      [artikel 97 van de Provinciewet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Artikel97
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.137
    references:
      - id: ref1
        bwb_id: BWBR0005645
        artikel: '97'
  - number: 16.137.2
    text: |-
      De herverkavelingsakte geldt als titel voor de daarin omschreven rechten. Door de inschrijving in de openbare
      registers gaat de eigendom van de daarin omschreven onroerende zaken over en worden de beperkte rechten verkregen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.137
  - number: 16.137.3
    text: |-
      Op grond van de herverkavelingsakte wordt in de openbare registers bij elke hypothecaire inschrijving of bij
      elke inschrijving van een beslag aangetekend dat de hypotheek of het beslag in het vervolg zal rusten op de in
      de herverkavelingsakte aangewezen kavels of gedeelten daarvan, of op de rechten waaraan die kavels of gedeelten
      daarvan zijn onderworpen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.137
  - number: 16.137.4
    text: |-
      De bewaarder van het kadaster en de openbare registers tekent ambtshalve de door de inschrijving van de
      herverkavelingsakte niet meer bestaande inschrijvingen van de in [artikel 16.136, tweede lid, onder c][ref1],
      bedoelde hypotheken en beslagen aan in de basisregistratie kadaster.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.137
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 16.137.5
    text: |-
      De bewaarder van het kadaster en de openbare registers zendt zo spoedig mogelijk aan elke eigenaar en elke beperkt
      gerechtigde van de onroerende zaak een kennisgeving van het resultaat van het bijhouden van de basisregistratie
      kadaster die op grond van de inschrijving van de herverkavelingsakte plaatsvindt. Hij vermeldt de dag van de
      verzending, de in de basisregistratie kadaster vermelde gegevens over de rechten, de rechthebbenden, bedoeld in
      de [Kadasterwet][ref1], en de grootte en de kadastrale aanduiding van de onroerende zaak waarop de kennisgeving
      betrekking heeft. [Artikel 56b van de Kadasterwet][ref2] is niet van toepassing op het bijhouden, bedoeld in de
      eerste zin.


      [ref1]: https://wetten.overheid.nl/BWBR0004541
      [ref2]: https://wetten.overheid.nl/BWBR0004541#Artikel56b
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.137
    references:
      - id: ref1
        bwb_id: BWBR0004541
      - id: ref2
        bwb_id: BWBR0004541
        artikel: 56b
  - number: '16.138'
    text: |-
      Van de terinzagelegging van een overeenkomst als bedoeld in [artikel 13.13, eerste lid][ref1],
      wordt binnen twee weken na het aangaan daarvan door het bevoegd gezag kennisgegeven op de in
      [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.138
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.2
        afdeling: '13.6'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 16.139.1
    text: |-
      Bij algemene maatregel van bestuur kunnen, voor zover daarin niet bij deze wet, bij de
      [Algemene wet bestuursrecht][ref1] of bij of krachtens de [Bekendmakingswet][ref2] is voorzien, regels worden
