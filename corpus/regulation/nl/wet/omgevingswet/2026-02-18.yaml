  - number: 5.41.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op een verzoek van Onze Minister van Justitie en
      Veiligheid tot intrekking van een omgevingsvergunning voor een jachtgeweeractiviteit op de grond, bedoeld in
      [artikel 5.42, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.41
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.42.1
    text: |-
      Als voor een activiteit als bedoeld in [artikel 5.1][ref1] toepassing wordt gegeven aan
      [artikel 5.39, onder a][ref2], of [5.40, eerste lid, onder a, of tweede lid, onder a][ref3], worden bij algemene
      maatregel van bestuur gevallen of gronden met hetzelfde oogmerk bepaald als het oogmerk waarmee op grond van
      [artikel 5.18][ref4] regels over die activiteit worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref3
