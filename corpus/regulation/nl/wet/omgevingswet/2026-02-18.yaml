  - number: 20.5.1
    text: |-
      Onze Minister die het aangaat is voor de toepassing van deze wet voor omgevingswaarden als bedoeld in
      [artikel 2.13][ref1] en [paragraaf 2.3.4][ref2] bevoegd tot toetsing van:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.3
        afdeling: '2.3'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 20.5.1.a
    text: |-
      de nauwkeurigheid van een meetmethode of een andere methode waarmee op grond van [artikel 20.2][ref1] of
      [20.3][ref2] de staat of kwaliteit van de fysieke leefomgeving of het effect van activiteiten, maatregelen of
      andere in [artikel 3.17][ref3] genoemde elementen worden gemeten of berekend,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 20.5.1.b
    text: de nauwkeurigheid van de toepassing van een onder a bedoelde methode.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.5
  - number: 20.5.2
    text: |-
      Die minister kan bepalen dat bij de toetsing verkregen resultaten over de staat of kwaliteit van de fysieke
      leefomgeving voor de toepassing van deze wet in de plaats treden van eerdere of op een andere manier verkregen
      resultaten van monitoring. Hij informeert in dat geval het betrokken bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.5
  - number: 20.6.1
    text: |-
      Bij omgevingsverordening respectievelijk algemene maatregel van bestuur kunnen, met inachtneming van de grenzen van
      [artikel 2.3][ref1], regels worden gesteld over:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 20.6.1.a
    text: |-
      het door daarbij genoemde bestuursorganen, rechtspersonen of natuurlijke personen die handelen in de uitoefening
      van beroep of bedrijf:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.1.a.1°
    text: bijhouden, verzamelen of berekenen van daarbij aangewezen gegevens,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.1.a.2°
    text: |-
      verstrekken van die gegevens aan bestuursorganen of andere instanties, bevoegde autoriteiten van andere staten of
      de Europese Commissie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.1.b
    text: de toetsing van de kwaliteit van de gegevens, bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.2
    text: |-
      Bij de verordening of maatregel kan worden bepaald dat een daarbij aangegeven bestuursorgaan
      op verzoek kan besluiten dat daarbij aangewezen gegevens, waarvan de geheimhouding op grond van
      [artikel 5.1 van de Wet open overheid][ref1] gerechtvaardigd is, niet worden verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 20.6.3
    text: 'Bij omgevingsverordening respectievelijk ministeriële regeling kunnen nadere regels worden gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.3.a
    text: de uitvoering van het eerste lid en de bekostiging daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.3.b
    text: de toe te passen berekeningsmethodiek.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
  - number: 20.6.4
    text: |-
      Het eerste tot en met derde lid is niet van toepassing voor zover bij of krachtens de
      [artikelen 20.1 tot en met 20.5][ref1] wordt voorzien in de in die leden geregelde onderwerpen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
