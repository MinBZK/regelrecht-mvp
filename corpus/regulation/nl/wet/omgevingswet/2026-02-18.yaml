        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 4.19a.6
    text: |-
      Op het stellen van regels als bedoeld in [artikel 4.2, tweede lid][ref1], is
      [artikel 5.53a, tweede en vierde lid][ref2], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19a
