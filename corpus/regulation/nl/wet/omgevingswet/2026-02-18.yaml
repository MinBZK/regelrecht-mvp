  - number: 5.41.1
    text: |-
      Het bevoegd gezag wijzigt de voorschriften van een omgevingsvergunning voor een activiteit of trekt de
      omgevingsvergunning voor een activiteit in met toepassing van [artikel 5.39][ref1] of [5.40][ref2], op verzoek
      van het bestuursorgaan dat op grond van [artikel 16.16, eerste lid][ref3], heeft beslist over instemming met de
      voorgenomen beslissing op de aanvraag om de omgevingsvergunning voor die activiteit of dat op grond van artikel
      16.16, derde of vierde lid, heeft bepaald dat instemming niet is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
