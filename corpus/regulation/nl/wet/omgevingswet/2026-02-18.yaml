  - number: 3.15.4
    text: |-
      Bij algemene maatregel van bestuur kunnen programma’s als bedoeld in [artikel 3.16][ref1] worden aangewezen,
      die betrekking hebben op omgevingswaarden van het Rijk als bedoeld in [paragraaf 2.3.4][ref2] of een andere
      doelstelling voor de fysieke leefomgeving waarvoor een regel als bedoeld in [artikel 2.24, eerste lid][ref3], of
