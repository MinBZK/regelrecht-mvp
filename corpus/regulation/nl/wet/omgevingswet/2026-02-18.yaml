        afdeling: '5.2'
  - number: 4.19b.1
    text: |-
      Een aanvraag om een wijziging van het omgevingsplan vast te stellen kan worden afgewezen in het geval en onder de
      voorwaarden, bedoeld in [artikel 3 van de Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref1],
      als die wijziging het voor de aanvrager mogelijk maakt om een activiteit te verrichten zonder omgevingsvergunning
      voor een omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0013798#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.19b
    references:
      - id: ref1
