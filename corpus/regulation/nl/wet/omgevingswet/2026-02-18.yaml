  - number: 3.17.1
    text: 'Het programma bevat in ieder geval een beschrijving van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.a
    text: het gebied waarvoor het programma geldt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.b
    text: de periode waarop het programma betrekking heeft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.c
    text: de omgevingswaarde of de andere doelstelling waarvoor het programma wordt vastgesteld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.d
    text: de toestand van het onderdeel van de fysieke leefomgeving waarvoor het programma wordt vastgesteld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.e
    text: |-
      de verwachte ontwikkelingen in het gebied die naar verwachting gevolgen hebben voor het voldoen aan de
      omgevingswaarde of het bereiken van de andere doelstelling,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.f
    text: |-
      de activiteiten die naar verwachting tijdens de periode waarop het programma betrekking heeft in het gebied zullen
      worden verricht, die naar verwachting effect hebben op:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.f.1°
    text: het voldoen aan de omgevingswaarde of het bereiken van de andere doelstelling, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.f.2°
    text: |-
      de wijze waarop de ruimte die, gelet op de omgevingswaarde of de andere doelstelling, beschikbaar is voor
      activiteiten wordt bepaald en verdeeld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.g
    text: |-
      de gevolgen van de ontwikkelingen, bedoeld onder e, en de activiteiten, bedoeld onder f, voor dat onderdeel van de
      fysieke leefomgeving,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.1.h
    text: |-
      de maatregelen die bijdragen aan het voldoen aan de omgevingswaarde of het bereiken van de andere doelstelling, de
      verwachte gevolgen daarvan voor dat onderdeel van de fysieke leefomgeving en de termijn waarbinnen deze maatregelen
      worden uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.17.2
    text: |-
      Voor zover de maatregelen, bedoeld in het eerste lid, onder h, het wijzigen van de voorschriften van een
      omgevingsvergunning of het intrekken van een omgevingsvergunning omvatten, kan het programma ook een beschrijving
      bevatten van het moment waarop en de voorwaarden waaronder daaraan uitvoering kan of moet worden gegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.17
  - number: 3.18.1
    text: |-
      De bestuursorganen die daarvoor in het programma zijn aangewezen, zorgen voor de uitvoering van de daarin opgenomen
      maatregelen binnen de daarbij aangegeven termijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.18
  - number: 3.18.2
    text: 'De uitvoeringsplicht geldt alleen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.18
  - number: 3.18.2.a
    text: voor zover uit het programma blijkt dat die bestuursorganen met het opnemen van de maatregelen hebben ingestemd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.18
  - number: 3.18.2.b
    text: |-
      als deze volgt uit regels en instructies als bedoeld in de
      [artikelen 2.23, eerste lid, onder b, en tweede lid][ref1], [2.25, eerste lid, onder b, en tweede lid][ref2],
      [2.33][ref3] en [2.34][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
