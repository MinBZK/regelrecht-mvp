      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] een gebied is aangewezen, op grond van
      [artikel 4.3][ref2] gevallen aangewezen waarin het dagelijks bestuur van het openbaar lichaam, bedoeld in
