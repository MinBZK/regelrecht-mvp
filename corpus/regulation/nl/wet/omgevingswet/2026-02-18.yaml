        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 5.7.3
    text: |-
      Een omgevingsvergunning voor een activiteit waarbij de locatie van ondergeschikt belang is, wordt, in bij algemene
      maatregel van bestuur aangewezen gevallen, los aangevraagd van de omgevingsvergunning voor andere activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: 5.7.4
    text: |-
      Een omgevingsvergunning voor een milieubelastende activiteit en een omgevingsvergunning voor een wateractiviteit,
      met uitzondering van een als wateractiviteit aan te merken beperkingengebiedactiviteit, worden gelijktijdig
      aangevraagd als:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: 5.7.4.a
    text: die activiteiten betrekking hebben op dezelfde ippc-installatie, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: 5.7.4.b
    text: op die activiteiten de Seveso-richtlijn van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: 5.7.5
    text: |-
      Dit artikel is van overeenkomstige toepassing op aanvragen om wijziging van de voorschriften van een
      omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: '5.8'
    text: |-
