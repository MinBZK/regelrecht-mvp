    text: |-
      Het bestuursorgaan dat een programma heeft vastgesteld, wijzigt dat programma als volgens dat bestuursorgaan uit de
      monitoring, bedoeld in [artikel 20.1, eerste en tweede lid][ref1], blijkt dat [artikel 3.16, tweede lid][ref2],
      niet langer in redelijkheid op dat programma van toepassing kan zijn.


