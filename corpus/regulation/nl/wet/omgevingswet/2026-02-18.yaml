        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.6.3
        afdeling: '13.6'
  - number: 13.24.a
    text: |-
      met degene die de activiteit verricht geen overeenkomst over kostenverhaal als bedoeld in
      [artikel 13.13, eerste lid][ref1], is gesloten,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.24
    references:
