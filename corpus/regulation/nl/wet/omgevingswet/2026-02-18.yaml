    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.6
  - number: 5.7.1
    text: |-
      Een aanvraag om een omgevingsvergunning kan naar keuze van de aanvrager op een of meer activiteiten betrekking
      hebben.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
  - number: 5.7.2
    text: |-
      Met het oog op een doelmatig waterbeheer wordt een omgevingsvergunning voor wateractiviteiten, in bij algemene
      maatregel van bestuur aangewezen gevallen, los aangevraagd van de omgevingsvergunning voor andere activiteiten als
      bedoeld in de [artikelen 5.1][ref1] en [5.4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
