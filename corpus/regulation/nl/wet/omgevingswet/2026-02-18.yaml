      De bestuurlijke boete bedraagt ten hoogste het bedrag dat is vastgesteld voor de tweede categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001854#Artikel23
