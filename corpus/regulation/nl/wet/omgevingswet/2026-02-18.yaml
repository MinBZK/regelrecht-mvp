  - number: 18.12.3
    text: |-
      Als de overtreding een bedreiging van de leefbaarheid of een gevaar voor de gezondheid of veiligheid veroorzaakt,
      kan het bevoegd gezag de boete verhogen tot ten hoogste het bedrag dat is vastgesteld voor de vierde categorie,
      bedoeld in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.12
    machine_readable:
      execution:
        parameters:
          - name: is_bedreiging_leefbaarheid_of_gevaar
            type: boolean
            required: true
            description: >-
              Of de overtreding een bedreiging van de
              leefbaarheid of gevaar voor
              gezondheid/veiligheid veroorzaakt
        input:
          - name: max_boete_tweede_categorie
            type: number
            description: Maximum boete tweede categorie (standaard maximum art. 18.12.2)
            source:
              regulation: wetboek_van_strafrecht
              output: boetecategorie_bedrag
              parameters:
                categorie: '2'
          - name: max_boete_vierde_categorie
            type: number
            description: Maximum boete vierde categorie (verhoogd maximum)
            source:
              regulation: wetboek_van_strafrecht
              output: boetecategorie_bedrag
              parameters:
                categorie: '4'
        output:
          - name: maximale_boete
            type: number
            description: Maximale bestuurlijke boete (in eurocent)
        actions:
          - output: maximale_boete
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_bedreiging_leefbaarheid_of_gevaar
                    value: true
                  then: $max_boete_vierde_categorie
              default: $max_boete_tweede_categorie
    references:
      - id: ref1
        bwb_id: BWBR0001854
        artikel: '23'
