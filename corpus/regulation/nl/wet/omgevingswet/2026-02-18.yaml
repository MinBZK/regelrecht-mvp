      omgevingswaarden, omgevingsvergunningen voor een omgevingsplanactiviteit en omgevingsvergunningen als bedoeld in
      [artikel 5.3][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.23
