  - number: 4.21.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over bouwactiviteiten, sloopactiviteiten en het gebruik en het in stand
      houden van bouwwerken worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.21.1.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.1.b
    text: het beschermen van de gezondheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.1.c
    text: duurzaamheid en bruikbaarheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.2
    text: 'De regels strekken er in ieder geval toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.2.a
    text: de minimumkwaliteit van bestaande en te bouwen bouwwerken is gewaarborgd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.2.b
    text: een brandveilig gebruik van bouwwerken is gewaarborgd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.2.c
    text: de veiligheid en de gezondheid in de directe omgeving van het bouwen en slopen is gewaarborgd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.21.2.d
    text: |-
      de toegankelijkheid van nieuw te realiseren bouwwerken en de directe omgeving daarvan voor mensen met een
      functiebeperking is gewaarborgd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.21
  - number: 4.22.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over milieubelastende activiteiten worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.22.1.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.1.b
    text: het beschermen van de gezondheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.1.c
    text: |-
      het beschermen van het milieu, waaronder het beschermen en verbeteren van de kwaliteit van lucht, bodem en de
      chemische en ecologische kwaliteit van watersystemen, het zuinig gebruik van energie en grondstoffen en een
      doelmatig beheer van afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2
    text: 'De regels strekken er in ieder geval toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.a
    text: alle passende preventieve maatregelen tegen verontreiniging worden getroffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.b
    text: alle passende preventieve maatregelen ter bescherming van de gezondheid worden getroffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.c
    text: de beste beschikbare technieken worden toegepast,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.d
    text: geen significante verontreiniging wordt veroorzaakt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.e
    text: het ontstaan van afvalstoffen zoveel mogelijk wordt voorkomen en de ontstane afvalstoffen doelmatig worden beheerd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.f
    text: energie doelmatig wordt gebruikt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.g
    text: maatregelen worden getroffen om ongevallen te voorkomen en de gevolgen daarvan te beperken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.22.2.h
    text: |-
      bij de definitieve beëindiging van activiteiten maatregelen worden getroffen om significante nadelige gevolgen voor
      het milieu te voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.22
  - number: 4.23.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over lozingsactiviteiten op een oppervlaktewaterlichaam,
      lozingsactiviteiten op een zuiveringtechnisch werk, wateronttrekkingsactiviteiten en beperkingengebiedactiviteiten
      met betrekking tot een waterstaatswerk of een installatie, niet zijnde een mijnbouwinstallatie, in een
      waterstaatswerk, worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.23.1.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.1.c
    text: het vervullen van maatschappelijke functies door watersystemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.1.d
    text: het beschermen van de doelmatige werking van een zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.2
    text: |-
      De regels over lozingsactiviteiten op een oppervlaktewaterlichaam en lozingsactiviteiten op een zuiveringtechnisch
      werk strekken er in ieder geval toe dat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.2.a
    text: alle passende preventieve maatregelen tegen verontreiniging worden getroffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.2.b
    text: de beste beschikbare technieken worden toegepast,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.2.c
    text: geen significante verontreiniging wordt veroorzaakt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.23.3
    text: |-
      In afwijking van het eerste lid worden de regels over beperkingengebiedactiviteiten met betrekking tot een
      waterstaatswerk, voor zover die plaatsvinden buiten het provinciaal en gemeentelijk ingedeelde gebied, gesteld met
      het oog op de doelen van de wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.23
  - number: 4.24.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over mijnbouwlocatieactiviteiten worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.24.1.a
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.1.b
    text: een evenwichtige toedeling van functies aan locaties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.2
    text: 'De regels strekken er in ieder geval toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.2.a
    text: de belangen van de scheepvaart en van de veiligheid van de scheepvaart zijn gewaarborgd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.2.b
    text: |-
      de belangen van de uitoefening van defensietaken en van het veilig kunnen verrichten van daarop betrekking hebbende
      activiteiten zijn gewaarborgd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.2.c
    text: |-
      de belangen van de elektriciteitsopwekking met behulp van wind in een windpark en van de veiligheid van het
      windpark zijn gewaarborgd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.3
    text: 'De regels strekken er ook toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
  - number: 4.24.3.a
    text: |-
      geen mijnbouwinstallaties voor het opsporen of winnen van delfstoffen worden toegestaan in het op grond van
      [artikel 2.44, eerste lid][ref1], aangewezen Natura 2000-gebied Noordzeekustzone,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.6.3
        afdeling: '2.6'
  - number: 4.24.3.b
    text: |-
      in de territoriale zee ten noorden van het op grond van [artikel 2.44, eerste lid][ref1], aangewezen Natura 2000-
      gebied Noordzeekustzone nieuwe mijnbouwinstallaties voor het opsporen of winnen van delfstoffen alleen worden
      toegestaan voor zover medegebruik van bestaande mijnbouwinstallaties niet mogelijk is en zichthinder veroorzaakt
      door die nieuwe mijnbouwinstallaties wordt geminimaliseerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.6.3
        afdeling: '2.6'
  - number: 4.25.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over beperkingengebiedactiviteiten met betrekking tot een weg worden
      gesteld met het oog op het behoeden van de staat en werking van een weg voor nadelige gevolgen van activiteiten op
      of rond die weg, waartoe ook het belang van verruiming of wijziging van die weg kan behoren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.25.2
    text: De regels strekken er in ieder geval toe dat het doelmatig en veilig gebruik van wegen wordt verzekerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.25
  - number: 4.26.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over beperkingengebiedactiviteiten met betrekking tot een installatie in
      een waterstaatswerk worden, voor zover het gaat om een mijnbouwinstallatie, gesteld met het oog op het behoeden van
      de staat en werking van die mijnbouwinstallatie voor nadelige gevolgen van activiteiten op of rond die installatie.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.26
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.26.2
    text: |-
      De regels strekken er in ieder geval toe dat nadelige gevolgen voor het veilig en doelmatig gebruik van
      mijnbouwinstallaties in een waterstaatswerk worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.26
  - number: 4.27.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het gelegenheid bieden tot zwemmen en baden worden gesteld met het
      oog op het waarborgen van de veiligheid en het beschermen van de gezondheid van de gebruikers.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.27.2
    text: |-
      De regels strekken er in ieder geval toe dat het risico op significante nadelige gevolgen voor de veiligheid en
      gezondheid van de gebruikers wordt beheerst, met inachtneming van de eigen verantwoordelijkheid van de gebruikers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.27
  - number: 4.28.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over activiteiten die cultureel erfgoed betreffen, worden gesteld met
      het oog op het behoud van cultureel erfgoed.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.28.2
    text: |-
      De regels strekken er in ieder geval toe dat beschadiging of vernieling van cultureel erfgoed wordt voorkomen, en
      dat het, voor zover het gaat om monumenten, in stand wordt gehouden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.28
  - number: 4.29.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over activiteiten die werelderfgoed betreffen, worden gesteld met het
      oog op het behoud van de uitzonderlijke universele waarde van werelderfgoed.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.29
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.29.2
    text: De regels strekken er in ieder geval toe dat beschadiging of vernieling van werelderfgoed wordt voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.29
  - number: 4.30.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over Natura 2000-activiteiten en activiteiten met mogelijke
      verslechterende of significant verstorende gevolgen voor een Natura 2000-gebied of een bijzonder nationaal
      natuurgebied worden gesteld met het oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.30.2
    text: |-
      De regels strekken er in ieder geval toe dat mogelijke verslechterende of significant verstorende gevolgen voor het
      betrokken gebied worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.30
  - number: 4.31.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over de uitoefening van de jacht, activiteiten om populaties van in het
      wild levende dieren te beheren of schade door dieren te bestrijden, worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.31.1.a
    text: de natuurbescherming,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.1.b
    text: goed jachthouderschap,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.1.c
    text: het voorkomen en bestrijden van schade door dieren,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.1.d
    text: het waarborgen van de veiligheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.2
    text: 'De regels strekken er in ieder geval toe:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.2.a
    text: |-
      dat de uitoefening van de jacht en activiteiten als bedoeld in het eerste lid plaatsvinden in overeenstemming met
      een faunabeheerplan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.31.2.b
    text: |-
      te bepalen in welke periode de uitoefening van de jacht op dieren van een bepaalde soort is toegestaan, van welke
      middelen bij de uitoefening van de jacht gebruik kan worden gemaakt en onder welke omstandigheden de uitoefening
      van de jacht is verboden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.31
  - number: 4.32.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het gebruik, het onder zich hebben, het verhandelen en het binnen of
      buiten het grondgebied van Nederland brengen van middelen of installaties en het toepassen van methoden om dieren
      te vangen of te doden worden gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.32.1.a
    text: de natuurbescherming,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.1.b
    text: het waarborgen van de veiligheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.1.c
    text: het beschermen van de gezondheid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.1.d
    text: het beschermen van het milieu.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.2
    text: 'De regels strekken er in ieder geval toe dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.2.a
    text: |-
      degene die een geweer, vogel of eendenkooi gebruikt over de vereiste deskundigheid beschikt en met gunstig gevolg
      een examen heeft afgelegd dat door Onze Minister voor Natuur en Stikstof is erkend of door hem als gelijkwaardig
      aan door hem erkende examens is aangemerkt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.2.b
    text: |-
      degene die een geweer gebruikt, is gedekt door een verzekering voor de burgerrechtelijke aansprakelijkheid voor
      schade waartoe het gebruik van het geweer aanleiding kan geven,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.32.2.c
    text: |-
      degene aan wie een omgevingsvergunning voor een jachtgeweeractiviteit is verleend, aan een faunabeheereenheid
      gegevens verstrekt over de door hem gedode dieren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.32
  - number: 4.33.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het vangen, doden of verwerken van walvissen worden gesteld met het
      oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.33.2
    text: |-
      De regels strekken er in ieder geval toe dat mogelijke nadelige gevolgen voor de staat van instandhouding van de
      walvisstand worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.33
  - number: 4.34.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over activiteiten die de introductie of verspreiding van invasieve
      uitheemse soorten tot gevolg hebben of kunnen hebben worden gesteld met het oog op de natuurbescherming, het
      beschermen van de gezondheid of het beschermen van het milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.34.2
    text: |-
      De regels strekken er in ieder geval toe nadelige gevolgen voor de biologische diversiteit te voorkomen of te
      beperken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.34
  - number: 4.35.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het vellen en beheren van houtopstanden worden gesteld met het oog
      op de instandhouding van het bosareaal, de natuurbescherming of het beschermen van landschappelijke waarden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.35
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.35.2
    text: |-
      De regels strekken er in ieder geval toe dat na het vellen of het anders tenietgaan van een houtopstand,
      herbeplanting plaatsvindt op bosbouwkundig verantwoorde wijze.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.35
  - number: 4.36.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het verhandelen, het om een andere reden dan verkoop onder zich
      hebben of het binnen of buiten het grondgebied van Nederland brengen van dieren, planten en producten daarvan
      worden gesteld met het oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.36.2
    text: |-
      De regels strekken er in ieder geval toe dat de activiteiten geen risico opleveren voor de staat van instandhouding
      van de betrokken soort.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.36
  - number: 4.36.3
    text: |-
      De regels kunnen ertoe strekken daarbij aangewezen rechtspersoonlijkheid bezittende organisaties te belasten met de
      taak om merken, merktekens of ringen voor vogels, planten of producten daarvan uit te reiken in overeenstemming met
      daarbij gestelde regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.36
  - number: 4.37.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het verhandelen van hout en houtproducten als bedoeld in de Europese
      flegt-regelgeving of de Europese houtregelgeving worden gesteld met het oog op de natuurbescherming, het beschermen
      van het milieu, het tegengaan van klimaatverandering of het beheer van natuurlijke hulpbronnen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.37.2
    text: De regels strekken alleen ter uitvoering van de Europese flegt-regelgeving en de Europese houtregelgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.37
  - number: 4.37a
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over het verhandelen van ontbossingsvrije grondstoffen en producten als
      bedoeld in de Europese ontbossingsregelgeving worden gesteld met het oog op de natuurbescherming, het beschermen
      van het milieu, het tegengaan van klimaatverandering of het beheer van natuurlijke hulpbronnen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.37a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.38.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over flora- en fauna-activiteiten worden gesteld met het oog op de
      natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.38.2
    text: |-
      De regels strekken er in ieder geval toe dat mogelijke nadelige gevolgen voor de staat van instandhouding van van
      nature in het wild voorkomende dier- of plantensoorten worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.38
  - number: 4.39.1
    text: |-
      De in [artikel 4.3][ref1] bedoelde regels over landinrichtingsactiviteiten worden gesteld met het oog op een
      doelmatige uitvoering van een inrichtingsprogramma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.39
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.39.2
    text: |-
      De regels strekken er in ieder geval toe dat de uitvoering van een inrichtingsprogramma niet ernstig wordt
      belemmerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.39
  - number: 5.1.1
    text: 'Het is verboden zonder omgevingsvergunning de volgende activiteiten te verrichten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
    machine_readable:
      execution:
        parameters:
          - name: activiteit_type
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
          - name: heeft_omgevingsvergunning
            type: boolean
            required: true
            description: Of de initiatiefnemer een omgevingsvergunning heeft
            source: {}
        output:
          - name: vergunningplichtig_lid_1
            type: boolean
            description: Of de activiteit vergunningplichtig is op grond van lid 1
          - name: verboden_zonder_vergunning
            type: boolean
            description: Of het verrichten van de activiteit verboden is (vergunningplichtig en geen vergunning)
        actions:
          - output: vergunningplichtig_lid_1
            value:
              operation: IN
              subject: $activiteit_type
              values:
                - omgevingsplanactiviteit
                - rijksmonumentenactiviteit
                - ontgrondingsactiviteit
                - stortingsactiviteit_op_zee
                - natura_2000_activiteit
                - jachtgeweeractiviteit
                - valkeniersactiviteit
          - output: verboden_zonder_vergunning
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $vergunningplichtig_lid_1
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $heeft_omgevingsvergunning
                    value: true
  - number: 5.1.1.a
    text: een omgevingsplanactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.b
    text: een rijksmonumentenactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.c
    text: een ontgrondingsactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.d
    text: een stortingsactiviteit op zee,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.e
    text: een Natura 2000-activiteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.f
    text: een jachtgeweeractiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.1.g
    text: een valkeniersactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2
    text: 'Het is verboden zonder omgevingsvergunning de volgende activiteiten te verrichten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
    machine_readable:
      execution:
        parameters:
          - name: activiteit_type
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
          - name: heeft_omgevingsvergunning
            type: boolean
            required: true
            description: Of de initiatiefnemer een omgevingsvergunning heeft
            source: {}
        output:
          - name: vergunningplichtig_lid_2
            type: boolean
            description: Of de activiteit vergunningplichtig is op grond van lid 2
          - name: verboden_zonder_vergunning
            type: boolean
            description: Of het verrichten van de activiteit verboden is (vergunningplichtig en geen vergunning)
        actions:
          - output: vergunningplichtig_lid_2
            value:
              operation: IN
              subject: $activiteit_type
              values:
                - bouwactiviteit
                - milieubelastende_activiteit
                - lozingsactiviteit_op_oppervlaktewaterlichaam
                - lozingsactiviteit_op_zuiveringtechnisch_werk
                - wateronttrekkingsactiviteit
                - mijnbouwlocatieactiviteit
                - beperkingengebiedactiviteit
                - flora_en_fauna_activiteit
          - output: verboden_zonder_vergunning
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $vergunningplichtig_lid_2
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $heeft_omgevingsvergunning
                    value: true
  - number: 5.1.2.a
    text: een bouwactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.b
    text: een milieubelastende activiteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.c
    text: 'een lozingsactiviteit op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.c.1°
    text: een oppervlaktewaterlichaam,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.c.2°
    text: een zuiveringtechnisch werk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.d
    text: een wateronttrekkingsactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.e
    text: een mijnbouwlocatieactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.f
    text: 'een beperkingengebiedactiviteit met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.f.1°
    text: een weg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.f.2°
    text: een waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.1
  - number: 5.1.2.f.3°
    text: een luchthaven,
