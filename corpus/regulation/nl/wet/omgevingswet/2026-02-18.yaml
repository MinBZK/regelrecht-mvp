    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.7
  - number: 20.7a
    text: |-
      De op grond van [artikel 20.2, zevende lid][ref1], of [artikel 20.6, eerste lid][ref2], te verzamelen of
      verstrekken gegevens kunnen voor de verduurzaming van de energievoorziening van gebouwen betrekking hebben op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
  - number: 20.7a.a
    text: |-
      de naam en het adres van de eigenaar van een onroerende zaak of de gerechtigde tot een appartementsrecht, als dat
      niet ook de bewoner of gebruiker is, volgens de basisregistratie kadaster, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.7a
  - number: 20.7a.b
    text: |-
      de aansluiting en toekomstige aansluiting van een gebouw op een energievoorziening
      als bedoeld in [artikel 10, zesde lid, onder a en b, van de Gaswet][ref1],
