        afdeling: '19.4'
  - number: 15.1.2
    text: |-
      Als voor een activiteit een omgevingsvergunning is vereist op grond van een regel als bedoeld in het eerste lid,
      onder d tot en met f, of op grond van [artikel 5.1][ref1], geldt alleen het besluit tot het verlenen, wijzigen,
      intrekken of weigeren van de omgevingsvergunning voor die activiteit als schadeveroorzakend besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 15.1.3
    text: |-
      Als op grond van [artikel 5.52, eerste lid][ref1], een omgevingsplan wordt gewijzigd, geldt alleen het
      projectbesluit als schadeveroorzakend besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: '15.2'
    text: |-
      Voor de toepassing van deze afdeling heeft de vergoeding van schade als bedoeld in
      [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1] geen betrekking op immateriële schade.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 15.3.1
    text: |-
      Als voor een activiteit een omgevingsvergunning is vereist, wordt de schade die bestaat uit waardevermindering van
      een onroerende zaak bepaald aan de hand van een vergelijking van de waarde van de onroerende zaak onmiddellijk voor
      en na het tijdstip waarop het bevoegd gezag heeft kennisgegeven van het besluit tot het verlenen of wijzigen van
      de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.3
  - number: 15.3.2
    text: |-
      Dit artikel is alleen van toepassing op schade die wordt veroorzaakt door een regel op grond waarvan een activiteit
      is toegestaan buiten de locatie waar de onroerende zaak is gelegen of door een maatregel die buiten die locatie
      wordt getroffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.3
  - number: 15.4.1
    text: |-
      Als voor een activiteit die is toegestaan op grond van een regel als bedoeld in
      [artikel 15.1, eerste lid, onder d tot en met h][ref1], geen omgevingsvergunning is vereist, kan een aanvraag om
      schadevergoeding worden ingediend als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.4.1.a
    text: |-
      degene die de activiteit gaat verrichten aan het bevoegd gezag informatie over die activiteit heeft verstrekt en
      het bevoegd gezag kennis heeft gegeven van die informatie, volgens de regels die daarvoor gelden, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: 15.4.1.b
    text: met de activiteit is begonnen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: 15.4.2
    text: |-
      De schade die bestaat uit waardevermindering van een onroerende zaak wordt bepaald aan de hand van een vergelijking
      van de waarde van de onroerende zaak:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: 15.4.2.a
    text: onmiddellijk voor en na het tijdstip waarop de kennisgeving, bedoeld in het eerste lid, onder a, is gedaan, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: 15.4.2.b
    text: |-
      als de informatie, bedoeld in het eerste lid, onder a, niet is verstrekt: onmiddellijk voor en na het tijdstip
      waarop met de activiteit is begonnen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: 15.4.3
    text: |-
      Als een kennisgeving als bedoeld in het eerste lid, onder a, is gedaan, wordt voor de toepassing van
      [artikel 4:131, eerste lid, van de Algemene wet bestuursrecht][ref1] de dag na die waarop de kennisgeving is
      gedaan, gelijkgesteld met de dag na die waarop de benadeelde bekend is geworden met de schade en met het voor de
      schadeveroorzakende gebeurtenis verantwoordelijke bestuursorgaan.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
  - number: 15.4.4
    text: |-
      Dit artikel is alleen van toepassing op schade die wordt veroorzaakt door een regel op grond waarvan een activiteit
      is toegestaan buiten de locatie waar de onroerende zaak is gelegen of door een maatregel die buiten die locatie
      wordt getroffen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.4
  - number: '15.5'
    text: |-
      De aanvrager heeft het risico van het ontstaan van schade als bedoeld in
      [artikel 4:126, tweede lid, onder a, van de Algemene wet bestuursrecht][ref1] in ieder geval niet aanvaard als:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel15.5
    references:
