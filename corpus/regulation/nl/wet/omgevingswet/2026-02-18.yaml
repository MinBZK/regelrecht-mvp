  - number: 17.2.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat of Onze Minister die het aangaat benoemt en ontslaat de voorzitter
      en leden van een adviesorgaan. De voorzitter en leden kunnen voorts zelf ontslag nemen door schriftelijke
      kennisgeving aan de betrokken minister.
