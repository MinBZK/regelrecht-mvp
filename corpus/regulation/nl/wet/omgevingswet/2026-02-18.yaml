      maatregel van bestuur aangewezen regels, gesteld op grond van [artikel 4.3, tweede lid, onder a of b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 18.15a.2
    text: |-
      De bestuurlijke boete bedraagt ten hoogste het bedrag dat is bepaald voor de eerste categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref1], per overtreding begaan door een natuurlijke
      persoon, en ten hoogste het bedrag dat is bepaald voor de tweede categorie, bedoeld in artikel 23, vierde lid, van
      dat wetboek per overtreding, per overtreding begaan door een rechtspersoon of een vennootschap.


      [ref1]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.15a
    machine_readable:
      execution:
        parameters:
          - name: is_natuurlijk_persoon
            type: boolean
            required: true
            description: Of de overtreder een natuurlijk persoon is (false = rechtspersoon of vennootschap)
        input:
          - name: max_boete_eerste_categorie
            type: number
            description: Maximum boete eerste categorie art. 23 lid 4 Wetboek van Strafrecht
            source:
              regulation: wetboek_van_strafrecht
              output: boetecategorie_bedrag
              parameters:
                categorie: '1'
          - name: max_boete_tweede_categorie
            type: number
            description: Maximum boete tweede categorie art. 23 lid 4 Wetboek van Strafrecht
            source:
              regulation: wetboek_van_strafrecht
              output: boetecategorie_bedrag
              parameters:
                categorie: '2'
        output:
          - name: maximale_boete_per_overtreding
            type: number
            description: Maximale bestuurlijke boete per overtreding (in eurocent)
        actions:
          - output: maximale_boete_per_overtreding
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_natuurlijk_persoon
                    value: true
                  then: $max_boete_eerste_categorie
              default: $max_boete_tweede_categorie
    references:
      - id: ref1
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 18.15a.3
    text: |-
      Bij algemene maatregel van bestuur worden nadere regels gesteld over de maximumhoogte van de bestuurlijke boete die
      voor een overtreding of voor categorieën van overtredingen kan worden opgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.15a
  - number: 18.15a.4
    text: |-
      Voor overtredingen als bedoeld in het eerste lid kan geen bestuurlijke strafbeschikking worden opgelegd op grond
      van [artikel 257ba van het Wetboek van Strafvordering][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001903#Artikel257ba
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel18.15a
    references:
