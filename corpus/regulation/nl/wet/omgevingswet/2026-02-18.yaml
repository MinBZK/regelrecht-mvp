        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.42.2
    text: |-
      Als geval als bedoeld in [artikel 5.39, onder a][ref1], waarin het bevoegd gezag de voorschriften van
      een omgevingsvergunning wijzigt, wordt in ieder geval aangewezen het geval waarin uit toepassing van
      [artikel 5.38][ref2] is gebleken dat de nadelige gevolgen die de desbetreffende activiteit voor het milieu
      veroorzaakt:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.42.2.a
    text: |-
      gezien de ontwikkelingen van de technische mogelijkheden tot het beschermen van het milieu, verder kunnen worden
      beperkt, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
  - number: 5.42.2.b
    text: gezien de ontwikkelingen met betrekking tot de kwaliteit van het milieu, verder moeten worden beperkt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
  - number: 5.42.3
    text: |-
      Als geval als bedoeld in [artikel 5.39, onder a][ref1], waarin het bevoegd gezag de omgevingsvergunning voor een
      jachtgeweeractiviteit intrekt, wordt in ieder geval aangewezen het geval waarin de vergunninghouder misbruik heeft
      gemaakt van wapens of munitie of van de bevoegdheid die voorhanden te hebben, of waarin er andere aanwijzingen zijn
      dat aan hem het voorhanden hebben van wapens of munitie niet langer kan worden toevertrouwd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.42.4
    text: |-
      Als geval als bedoeld in [artikel 5.40, eerste lid, onder a, of tweede lid, onder a][ref1], wordt in ieder
      geval aangewezen het geval waarin de voorschriften van de omgevingsvergunning kunnen worden gewijzigd of de
      omgevingsvergunning kan worden ingetrokken, met het oog op het treffen van passende preventieve maatregelen ter
      bescherming van de gezondheid, bedoeld in [artikel 4.22, tweede lid, onder b][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: 5.43.1
    text: |-
      Als voor een of meer activiteiten verschillende omgevingsvergunningen van kracht zijn, kan het bevoegd gezag, in
      het belang van een doelmatige uitvoering en handhaving, ambtshalve een omgevingsvergunning verlenen die de eerder
      verleende omgevingsvergunningen vervangt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
  - number: 5.43.2
    text: |-
      Als de omgevingsvergunningen niet door hetzelfde bevoegd gezag zijn verleend, kan het eerste lid worden toegepast
      door elk van de betrokken bestuursorganen, als de andere betrokken bestuursorganen toepassing hebben gegeven aan
      [artikel 5.16][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.43.3
    text: 'Het eerste lid kan ook worden toegepast tegelijk met:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
  - number: 5.43.3.a
    text: |-
      het beslissen op een aanvraag om een nieuwe omgevingsvergunning, waarbij dit in afwijking van het eerste lid ook
      geldt als slechts één omgevingsvergunning van kracht is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
  - number: 5.43.3.b
    text: |-
      het wijzigen van de voorschriften van een van kracht zijnde omgevingsvergunning of het intrekken van een van kracht
      zijnde omgevingsvergunning met toepassing van [artikel 5.39][ref1] of [5.40][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.43.4
    text: |-
      Een met toepassing van dit artikel verleende omgevingsvergunning schorst met ingang van de dag waarop zij in
      werking treedt, en daarna, in de periode waarin deze vergunning nog niet onherroepelijk is, zolang zij in werking
      blijft, de werking van de omgevingsvergunningen die zij vervangt. Deze omgevingsvergunningen vervallen op de dag
      waarop de met toepassing van dit artikel verleende omgevingsvergunning onherroepelijk wordt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.43
  - number: 5.44.1
    text: |-
      Voor het uitvoeren van een project en het in werking hebben of in stand houden daarvan kan een projectbesluit
      worden vastgesteld. Een projectbesluit wordt vastgesteld door het dagelijks bestuur van het waterschap of
      gedeputeerde staten of door Onze Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse
      Zaken en Koninkrijksrelaties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44
  - number: 5.44.2
    text: |-
      Overeenstemming als bedoeld in het eerste lid is niet vereist voor een besluit tot uitwerking van een
      projectbesluit als bedoeld in [artikel 5.54][ref1] en voor een besluit tot wijziging van een projectbesluit.
      Bij regeling van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties, in overeenstemming met Onze
      Minister die het aangaat, kunnen categorieën projecten worden aangewezen waarvoor geen overeenstemming is
      vereist voor de vaststelling van een projectbesluit. Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties,
      in overeenstemming met Onze Minister die het aangaat, kan daarnaast ook in andere gevallen bepalen dat geen
      overeenstemming is vereist voor het vaststellen van een projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: 5.44.3
    text: |-
      Bij het vaststellen van een projectbesluit door gedeputeerde staten of Onze Minister die het aangaat, worden de
      grenzen van [artikel 2.3][ref1] in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 5.44.4
    text: |-
      Het dagelijks bestuur van het waterschap kan een projectbesluit alleen vaststellen met het oog op de taken, bedoeld
      in [artikel 2.17, eerste lid, aanhef en onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 5.44a.1
    text: |-
      Gedeputeerde staten van de provincie waar het project in hoofdzaak wordt uitgevoerd, zijn bevoegd om het
      projectbesluit vast te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44a
  - number: 5.44a.2
    text: |-
      Het dagelijks bestuur van het waterschap waar het project in hoofdzaak wordt uitgevoerd, is bevoegd om het
      projectbesluit vast te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44a
  - number: 5.44a.3
    text: |-
      Als gedeputeerde staten van een of meer provincies en het dagelijks bestuur van een of meer waterschappen
      gezamenlijk een project willen uitvoeren, zijn gedeputeerde staten van de provincie waar het project geheel of in
      hoofdzaak wordt uitgevoerd bevoegd om het projectbesluit vast te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44a
  - number: 5.44a.4
    text: |-
      Als Onze Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties, en gedeputeerde staten van een of meer provincies of het dagelijks bestuur van een of meer
      waterschappen gezamenlijk een project willen uitvoeren, is Onze Minister die het aangaat, in overeenstemming met
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties, bevoegd om het projectbesluit vast te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44a
  - number: 5.44b.1
    text: |-
      Onze Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties,
      kan de bevoegdheid om een projectbesluit vast te stellen overdragen aan gedeputeerde staten van de provincie waar
      het project geheel of in hoofdzaak wordt uitgevoerd, als deze daarmee instemmen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44b
  - number: 5.44b.2
    text: Bij algemene maatregel van bestuur kunnen regels worden gesteld over de toepassing van het eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.44b
  - number: 5.45.1
    text: |-
      Het bevoegd gezag voor het projectbesluit kan bepalen dat [artikel 16.7][ref1] van toepassing is op de coördinatie
      van de besluiten ter uitvoering van het projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 5.45.2
    text: |-
      [Artikel 16.7][ref1] is van toepassing op de coördinatie van besluiten ter uitvoering van projectbesluiten als
      bedoeld in [artikel 5.46][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 5.45.3
    text: Als het coördinerend bestuursorgaan treedt het bevoegd gezag voor het projectbesluit op.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
  - number: 5.45.4
    text: 'In afwijking van het derde lid treden als het coördinerend bestuursorgaan op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
  - number: 5.45.4.a
    text: >-
      gedeputeerde staten: als het dagelijks bestuur van het
      waterschap bevoegd is om het projectbesluit vast te stellen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
  - number: 5.45.4.b
    text: |-
      Onze Minister die het aangaat: als hij op grond van [artikel 5.44, eerste lid][ref1], of op grond van
      [artikel 5.44a, vierde lid][ref2], bevoegd is om het projectbesluit in overeenstemming met Onze Minister van
      Binnenlandse Zaken en Koninkrijksrelaties vast te stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 5.45a.1
    text: |-
      Als gedeputeerde staten als het coördinerend bestuursorgaan voor de besluiten ter uitvoering van een projectbesluit
      optreden, kunnen zij in plaats van het oorspronkelijk bevoegde bestuursorgaan voorzien in het nemen van een
      besluit, als dat bestuursorgaan geen bestuursorgaan van het Rijk is en:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.1.a
    text: dat bestuursorgaan een besluit niet of niet tijdig heeft genomen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.1.b
    text: het besluit van dat bestuursorgaan de uitvoering van het projectbesluit belemmert.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.2
    text: |-
      Als Onze Minister die het aangaat als het coördinerend bestuursorgaan voor de besluiten ter uitvoering van een
      projectbesluit optreedt, kan hij in plaats van het oorspronkelijk bevoegde bestuursorgaan voorzien in het nemen van
      een besluit, als:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.2.a
    text: dat bestuursorgaan een besluit niet of niet tijdig heeft genomen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.2.b
    text: het besluit van dat bestuursorgaan de uitvoering van het projectbesluit belemmert.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.3
    text: |-
      Bij de toepassing van het eerste of tweede lid treedt het besluit van het coördinerend bestuursorgaan in de plaats
      van het besluit dat het oorspronkelijk bevoegde bestuursorgaan had moeten nemen of heeft genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.45a.4
    text: |-
      Als het oorspronkelijk bevoegde bestuursorgaan voor het in behandeling nemen van een aanvraag om een besluit
      waarvoor toepassing is gegeven aan het eerste of tweede lid rechten heeft geheven, stort dat bestuursorgaan de
      ontvangen rechten in de kas van de provincie waartoe het coördinerend bestuursorgaan behoort respectievelijk in de
      kas van het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.45a
  - number: 5.46.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties, stelt voor werken met een nationaal belang in ieder geval een projectbesluit vast voor de
      volgende projecten:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.a
    text: de aanleg van een autoweg of autosnelweg, spoorweg of vaarweg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.b
    text: 'een wijziging van een autoweg of autosnelweg, die bestaat uit:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.b.1°
    text: de ombouw van een weg tot autosnelweg, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.b.2°
    text: |-
      de uitbreiding van een weg met een of meer rijstroken, als het uit te breiden weggedeelte twee knooppunten of
      aansluitingen met elkaar verbindt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.c
    text: 'een wijziging van een spoorweg die bestaat uit:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.c.1°
    text: |-
      een uitbreiding van die spoorweg met een of meer sporen, als het uit te breiden spoorweggedeelte twee aansluitingen
      met elkaar verbindt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.c.2°
    text: de aanleg van spoorwegbouwkundige bouwwerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.c.3°
    text: de aanleg van een verbindingsboog, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.c.4°
    text: een geheel van onderling samenhangende maatregelen voor die spoorweg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.d
    text: het opnieuw in gebruik nemen van een al aangelegde spoorweg van vijf kilometer of meer,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.e
    text: |-
      een wijziging van een vaarweg die bestaat uit een vergroting of verdieping waardoor het ruimteoppervlak van de
      vaarweg met ten minste twintig procent toeneemt of de vaarweg blijvend wordt verdiept waarbij meer dan vijf miljoen
      kubieke meter grond wordt verzet,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.1.f
    text: de aanleg, verlegging of versterking van primaire waterkeringen die in beheer zijn bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.46.2
    text: |-
      Het dagelijks bestuur van het waterschap stelt in ieder geval een projectbesluit vast voor de aanleg, verlegging of
      versterking van primaire waterkeringen die niet onder het eerste lid, aanhef en onder f, vallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.46
  - number: 5.47.1
    text: |-
      Het bevoegd gezag geeft kennis van zijn voornemen om een verkenning uit te voeren naar een mogelijk bestaande of
      toekomstige opgave in de fysieke leefomgeving en om:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.1.a
    text: een projectbesluit vast te stellen zonder daaraan voorafgaande voorkeursbeslissing, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.1.b
    text: een projectbesluit vast te stellen en ter voorbereiding daarvan een voorkeursbeslissing te nemen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.2
    text: |-
      Bij algemene maatregel van bestuur of bij besluit van het bevoegd gezag kan worden bepaald wanneer een
      voorkeursbeslissing in ieder geval wordt genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.3
    text: |-
      Bij het voornemen stelt het bevoegd gezag met het oog op de verkenning een ieder in de gelegenheid, binnen een
      door hem te stellen termijn, mogelijke oplossingen voor de opgave voor te dragen. Het bevoegd gezag geeft daarbij
      uitgangspunten aan voor het redelijkerwijs in beschouwing nemen van die oplossingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.4
    text: |-
      Uiterlijk bij aanvang van de verkenning geeft het bevoegd gezag, onverminderd het derde lid, kennis van de wijze
      waarop burgers, bedrijven, maatschappelijke organisaties en bestuursorganen zullen worden betrokken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.47.5
    text: Bij of krachtens algemene maatregel van bestuur worden nadere regels gesteld over het bepaalde in het vierde lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.47
  - number: 5.48.1
    text: 'Bij de verkenning vergaart het bevoegd gezag de nodige kennis en inzichten over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
  - number: 5.48.1.a
    text: de aard van de opgave,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
  - number: 5.48.1.b
    text: de voor de fysieke leefomgeving relevante ontwikkelingen, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
  - number: 5.48.1.c
    text: de mogelijke oplossingen voor die opgave.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
  - number: 5.48.2
    text: |-
      Degene die een mogelijke oplossing als bedoeld in [artikel 5.47, derde lid][ref1], heeft voorgedragen, kan daarbij
      verzoeken dat het bevoegd gezag daarover advies vraagt aan een onafhankelijke deskundige. Het bevoegd gezag kan ook
      ambtshalve een onafhankelijke deskundige verzoeken te adviseren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
  - number: 5.48.3
    text: |-
      Het bevoegd gezag beslist of de voorgedragen mogelijke oplossingen redelijkerwijs in beschouwing moeten worden
      genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.48
  - number: '5.49'
    text: 'De voorkeursbeslissing houdt in:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.49
  - number: 5.49.a
    text: het uitvoeren van een project,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.49
  - number: 5.49.b
    text: een oplossing zonder project,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.49
  - number: 5.49.c
    text: een combinatie van de onderdelen a of b met de uitvoering van andere projecten, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.49
  - number: 5.49.d
    text: het niet uitwerken van een oplossing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.49
  - number: '5.50'
    text: |-
      Deze paragraaf is niet van toepassing op een uitwerking van een projectbesluit als bedoeld in [artikel 5.54][ref1]
      of een wijziging van een projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
  - number: '5.51'
    text: |-
      In het projectbesluit wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties en bestuursorganen
      bij de voorbereiding zijn betrokken en wat de resultaten zijn van de uitgevoerde verkenning, waarbij in ieder geval
      wordt ingegaan op de door derden voorgedragen mogelijke oplossingen en de daarover door deskundigen uitgebrachte
      adviezen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.51
  - number: 5.52.1
    text: |-
      Het projectbesluit wijzigt het omgevingsplan met regels die nodig zijn voor het uitvoeren en in werking hebben of
      in stand houden van het project.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.52
  - number: 5.52.2
    text: 'Voor zover dat uitdrukkelijk in het projectbesluit is bepaald, geldt het projectbesluit:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.52
  - number: 5.52.2.a
    text: als omgevingsvergunning voor activiteiten ter uitvoering van het projectbesluit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.52
  - number: 5.52.2.b
    text: als een bij algemene maatregel van bestuur aangewezen besluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.52
  - number: 5.52.3
    text: Bij de maatregel kunnen regels worden aangewezen die van toepassing zijn op het daarin aangewezen besluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.52
  - number: 5.53.1
    text: |-
      Voor de toepassing van [artikel 5.52, eerste lid][ref1], zijn de [artikelen 4.1][ref2] en [4.2, eerste lid][ref3],
      en de [paragrafen 4.1.2][ref4] en [4.3.1][ref5] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref4
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.2
        afdeling: '4.1'
      - id: ref5
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.3.1
        afdeling: '4.3'
  - number: 5.53.2
    text: |-
      Voor de toepassing van [artikel 5.52, tweede lid, onder a][ref1], zijn de [paragrafen 5.1.3 tot en met 5.1.5][ref2]
      en de op grond daarvan gestelde regels van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.53.3
    text: |-
      Als de uitvoering van een projectbesluit, vastgesteld door gedeputeerde staten, onevenredig wordt belemmerd
      door regels die bij of krachtens een andere regeling van een gemeente dan een omgevingsplan of bij of krachtens
      een regeling van een waterschap zijn vastgesteld, kunnen die regels bij het projectbesluit of bij besluit van
      gedeputeerde staten om dringende redenen buiten toepassing worden gelaten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53
  - number: 5.53.4
    text: |-
      Als de uitvoering van een projectbesluit, vastgesteld door Onze Minister die het aangaat, in overeenstemming
      met Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties, onevenredig wordt belemmerd door regels die
      bij of krachtens een andere regeling van een gemeente dan een omgevingsplan of bij of krachtens een regeling van
      een provincie of waterschap zijn vastgesteld, kunnen die regels bij het projectbesluit of bij besluit van Onze
      Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties,
      respectievelijk Onze Minister die het aangaat, om dringende redenen buiten toepassing worden gelaten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53
  - number: 5.53a.1
    text: |-
      [Artikel 4.19a, eerste, tweede, vierde en vijfde lid][ref1], is van overeenkomstige toepassing op een
      projectbesluit dat wordt vastgesteld door het dagelijks bestuur van een waterschap.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.1
        afdeling: '4.3'
  - number: 5.53a.2
    text: |-
      In een projectbesluit of een voorbereidingsbesluit dat wordt vastgesteld door gedeputeerde staten worden geen
      regels gesteld die:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
  - number: 5.53a.2.a
    text: |-
      het uitvoeren van een project belemmeren waarvoor een projectbesluit is vastgesteld door een bestuursorgaan van het
      Rijk, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
  - number: 5.53a.2.b
    text: |-
      in strijd zijn met regels die in het omgevingsplan zijn opgenomen op grond van een voorbereidingsbesluit van een
      bestuursorgaan van het Rijk.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
  - number: 5.53a.3
    text: |-
      In een projectbesluit van het Rijk wordt een termijn gesteld voor de toepassing van het tweede lid. Als het
      bestuursorgaan het nodig acht voor de uitvoering van het project, kan de termijn eenmaal worden verlengd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
  - number: 5.53a.4
    text: |-
      Het tweede lid, aanhef en onder a, is niet van toepassing voor zover een instructieregel als bedoeld in
      [artikel 2.24][ref1] of een instructie als bedoeld in [artikel 2.34][ref2] het stellen van dergelijke regels vergt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.53a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 5.54.1
    text: |-
      Bij een projectbesluit kan worden bepaald dat het besluit met inachtneming van de daarbij gestelde randvoorwaarden
      door het bevoegd gezag kan worden uitgewerkt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.54
  - number: 5.54.2
    text: |-
      Deze uitwerking maakt deel uit van het projectbesluit en kan, zolang de uitwerking nog niet is verwezenlijkt,
      worden vervangen door een nieuwe uitwerking.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.54
  - number: '5.55'
    text: |-
      Als het opnemen van regels in het omgevingsplan die gericht zijn op het uitvoeren en in werking hebben of
      in stand houden van een project van publiek belang wordt voorbereid met overeenkomstige toepassing van de
      [artikelen 5.45, eerste en derde lid][ref1], [5.47][ref2], [5.48][ref3], [5.49][ref4] en [5.51][ref5], is
      [artikel 16.87][ref6] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref6]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel5.55
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
      - id: ref5
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.3
        afdeling: '5.2'
      - id: ref6
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.3
        afdeling: '16.7'
  - number: 8.1.1
    text: Binnen een provincie zijn er een of meer faunabeheereenheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.1
  - number: 8.1.2
    text: |-
      Een faunabeheereenheid stelt voor haar werkgebied een faunabeheerplan vast. Het faunabeheerplan behoeft de
      goedkeuring van gedeputeerde staten van de provincie waarin het werkgebied van de faunabeheereenheid is gelegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.1
  - number: 8.1.3
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over faunabeheereenheden en faunabeheerplannen. De regels
      strekken ter waarborging van een transparante, samenhangende en regionaal ingebedde uitvoering van het duurzaam
      beheer van populaties van in het wild levende dieren, uitvoering van schadebestrijding door grondgebruikers en
      uitoefening van de jacht door jachthouders. De regels gaan in ieder geval over de rechtsvorm en de samenstelling
      van het bestuur van een faunabeheereenheid. Bij omgevingsverordening worden nadere regels gesteld over
      faunabeheereenheden en faunabeheerplannen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.1
  - number: 8.1.4
    text: |-
      Voor de uitvoering van de regels van de algemene maatregel van bestuur en van de omgevingsverordening, bedoeld in
      het derde lid, zijn gedeputeerde staten het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.1
  - number: 8.1.5
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin Onze Minister voor Natuur en Stikstof
      beslist over de goedkeuring van een faunabeheerplan, bevoegd is tot het stellen van nadere regels als bedoeld
      in het derde lid, vierde zin, of het bevoegd gezag, bedoeld in het vierde lid, is. Hierbij worden de grenzen van
      [artikel 2.3, derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 8.2.1
    text: |-
      Jachthouders aan wie een omgevingsvergunning voor een jachtgeweeractiviteit is verleend, organiseren zich met
      anderen in een wildbeheereenheid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.2
    text: Een wildbeheereenheid heeft de rechtsvorm van een vereniging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.3
    text: |-
      Een wildbeheereenheid geeft uitvoering aan het faunabeheerplan, bedoeld in [artikel 8.1, tweede lid][ref1],
      en bevordert dat het duurzaam beheer van populaties van in het wild levende dieren, de bestrijding van
      schadeveroorzakende dieren en de jacht worden uitgevoerd in samenwerking met, en ten dienste van, grondgebruikers
      of terreinbeheerders.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
        hoofdstuk: '8'
  - number: 8.2.4
    text: Ook grondgebruikers en terreinbeheerders kunnen lid worden van de vereniging.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.5
    text: |-
      Bij omgevingsverordening worden regels gesteld over wildbeheereenheden. Deze regels hebben in ieder geval
      betrekking op:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.5.a
    text: de omvang en begrenzing van het gebied waarover zich de zorg van de wildbeheereenheid kan uitstrekken, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.5.b
    text: de gevallen waarin en voorwaarden waaronder jachthouders zijn uitgezonderd van het eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
  - number: 8.2.6
    text: |-
      Bij algemene maatregel van bestuur kunnen gevallen worden aangewezen waarin Onze Minister voor Natuur en
      Stikstof bevoegd is tot het stellen van regels als bedoeld in het vijfde lid. Hierbij worden de grenzen van
      [artikel 2.3, derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 8.3.1
    text: 'Gerechtigd tot het uitoefenen van de jacht in een jachtveld zijn, elkaar uitsluitend:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.1.a
    text: de eigenaar van de grond,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.1.b
    text: |-
      de erfpachter of vruchtgebruiker van de grond, tenzij de eigenaar zich bij het vestigen van het erfpachtrecht of
      het recht op vruchtgebruik het jachtrecht heeft voorbehouden en tenzij het jachtrecht ten tijde van het vestigen
      van het erfpachtrecht of het recht op vruchtgebruik al was verhuurd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
    machine_readable:
      execution:
        parameters:
          - name: is_erfpachter_of_vruchtgebruiker
            type: boolean
            required: true
            description: Of de persoon erfpachter of vruchtgebruiker is
          - name: eigenaar_heeft_jachtrecht_voorbehouden
            type: boolean
            required: true
            description: Of de eigenaar zich het jachtrecht heeft voorbehouden bij vestiging
          - name: jachtrecht_was_al_verhuurd
            type: boolean
            required: true
            description: Of het jachtrecht ten tijde van vestiging al was verhuurd
        output:
          - name: gerechtigd_tot_jacht
            type: boolean
            description: Of de erfpachter/vruchtgebruiker gerechtigd is tot de jacht
        actions:
          - output: gerechtigd_tot_jacht
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_erfpachter_of_vruchtgebruiker
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $eigenaar_heeft_jachtrecht_voorbehouden
                    value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $jachtrecht_was_al_verhuurd
                    value: true
  - number: 8.3.1.c
    text: |-
      de pachter van de grond, tenzij de verpachter bij het aangaan van de pachtovereenkomst niet tot het uitoefenen van
      de jacht gerechtigd was of zich het recht tot de uitoefening van de jacht heeft voorbehouden en tenzij ten tijde
      van het aangaan van de pachtovereenkomst het jachtrecht al was verhuurd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
    machine_readable:
      execution:
        parameters:
          - name: is_pachter
            type: boolean
            required: true
            description: Of de persoon pachter van de grond is
          - name: verpachter_was_gerechtigd
            type: boolean
            required: true
            description: Of de verpachter bij het aangaan van de pachtovereenkomst gerechtigd was tot de jacht
          - name: verpachter_heeft_jachtrecht_voorbehouden
            type: boolean
            required: true
            description: Of de verpachter zich het recht tot uitoefening van de jacht heeft voorbehouden
          - name: jachtrecht_was_al_verhuurd
            type: boolean
            required: true
            description: Of het jachtrecht ten tijde van het aangaan van de pachtovereenkomst al was verhuurd
        output:
          - name: pachter_gerechtigd_tot_jacht
            type: boolean
            description: Of de pachter gerechtigd is tot de jacht
        actions:
          - output: pachter_gerechtigd_tot_jacht
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_pachter
                  value: true
                - operation: EQUALS
                  subject: $verpachter_was_gerechtigd
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $verpachter_heeft_jachtrecht_voorbehouden
                    value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $jachtrecht_was_al_verhuurd
                    value: true
  - number: 8.3.1.d
    text: |-
      degene die het jachtrecht bij schriftelijke en gedagtekende overeenkomst voor een periode van ten minste zes
      jaar en ten hoogste twaalf jaar heeft gehuurd van de ten tijde van het aangaan van de huurovereenkomst tot de
      uitoefening van de jacht gerechtigde:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
    machine_readable:
      execution:
        parameters:
          - name: huurperiode_jaren
            type: number
            required: true
            description: Duur van de huurovereenkomst in jaren
          - name: is_schriftelijk_en_gedagtekend
            type: boolean
            required: true
            description: Of de overeenkomst schriftelijk en gedagtekend is
          - name: verhuurder_was_gerechtigd
            type: boolean
            required: true
            description: >-
              Of de verhuurder ten tijde van het aangaan van de
              huurovereenkomst gerechtigd was tot de uitoefening
              van de jacht
        output:
          - name: geldig_jachtrecht_huur
            type: boolean
            description: Of de huur van het jachtrecht geldig is
        actions:
          - output: geldig_jachtrecht_huur
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_schriftelijk_en_gedagtekend
                  value: true
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $huurperiode_jaren
                  value: 6
                - operation: LESS_THAN_OR_EQUAL
                  subject: $huurperiode_jaren
                  value: 12
                - operation: EQUALS
                  subject: $verhuurder_was_gerechtigd
                  value: true
  - number: 8.3.1.d.1°
    text: |-
      eigenaar, erfpachter, vruchtgebruiker of pachter van de grond, met toestemming van de grondgebruiker als de
      verhuurder niet ook grondgebruiker is, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.1.d.2°
    text: |-
      huurder van het jachtrecht, met toestemming van de eigenaar, erfpachter, vruchtgebruiker of pachter die het
      jachtrecht aan deze huurder heeft verhuurd en mits het jachtrecht in zijn geheel wordt weder verhuurd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.2
    text: |-
      In de huurovereenkomst, bedoeld in het eerste lid, onder d, kan niet worden afgeweken van
      [artikel 226, eerste, tweede en derde lid, van Boek 7 van het Burgerlijk Wetboek][ref1]. Zij bevat geen beding van
      optie of verlenging.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel226
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '226'
  - number: 8.3.3
    text: |-
      Bij algemene maatregel van bestuur kan worden geregeld in welke gevallen het is toegestaan dat de periode, bedoeld
      in het eerste lid, onder d, korter is dan zes jaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.4
    text: 'De jacht is alleen toegestaan op dieren van de volgende soorten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.4.a
    text: 'klein wild: fazanten (Phasianus colchicus), hazen (Lepus Europaeus),'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.4.b
    text: 'waterwild: wilde eenden (Anas platyrhynchos),'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.3.4.c
    text: 'overig wild: houtduiven (Columba palumbus), konijnen (Oryctolagus cuniculus).'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.3
  - number: 8.4.1
    text: |-
      Degene die schade heeft geleden als gevolg van het gebruik van een geweer ter uitvoering van deze wet heeft
      tegenover de verzekeraar door wie de burgerrechtelijke aansprakelijkheid voor die schade is gedekt, een eigen
      recht op schadevergoeding tot het beloop van een bij algemene maatregel van bestuur te bepalen maximumbedrag. Het
      tenietgaan van zijn schuld aan de verzekerde bevrijdt de verzekeraar niet tegenover de benadeelde, tenzij deze
      schadeloos is gesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.4
  - number: 8.4.2
    text: |-
      Geen uit de bepalingen van het Burgerlijk Wetboek over de verzekeringsovereenkomst of uit deze overeenkomst zelf
      voortvloeiende nietigheid of voortvloeiend verweer of verval kan door een verzekeraar aan een benadeelde worden
      tegengeworpen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.4
  - number: 8.4.3
    text: |-
      De verzekeraar die de schade van een benadeelde geheel of ten dele vergoedt, hoewel de aansprakelijkheid voor
      die schade niet door een met hem gesloten overeenkomst was gedekt, heeft voor het bedrag van de schadevergoeding
      verhaal op degene die voor de schade aansprakelijk is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.4
  - number: 8.4.4
    text: |-
      Als de overeenkomst een beding inhoudt dat de verzekerde persoonlijk voor een deel in de vergoeding van de schade
      zal bijdragen, blijft de verzekeraar toch tegenover de benadeelde gehouden tot betaling van de schadeloosstelling
      die op grond van de overeenkomst ten laste van de verzekerde blijft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.4
  - number: 8.5.1
    text: |-
      Het is ieder ander dan de kooiker van een eendenkooi, waarvoor op 31 maart 1977 een recht van afpaling gold, of
      degene die handelt met toestemming van die kooiker, verboden binnen de afpalingkring van die kooi activiteiten te
      verrichten waardoor eenden binnen de afpalingkring kunnen worden verontrust.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 8.5.2
    text: |-
      Het verbod, bedoeld in het eerste lid, is, als redelijkerwijs niet kan worden gevergd dat de activiteiten niet, op
      andere wijze of op een ander tijdstip worden verricht, niet van toepassing op activiteiten verricht:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 8.5.2.a
    text: ter uitvoering van openbare werken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 8.5.2.b
    text: bij het gebruik en onderhoud van dat wat door die werken is tot stand gebracht, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 8.5.2.c
    text: ter uitoefening van een beroep of bedrijf.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 8.5.3
    text: |-
      Degene die activiteiten als bedoeld in het tweede lid verricht, vergoedt de schade die daaruit voor het gebruik van
      de eendenkooi voortvloeit aan de kooiker, tenzij anders met de kooiker is overeengekomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel8.5
  - number: 9.1.1
    text: |-
      De gemeenteraad, provinciale staten of Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties kunnen bij
      voorkeursrechtbeschikking op een onroerende zaak een gemeentelijk, provinciaal of nationaal voorkeursrecht
      vestigen, voor zover die zaak deel uitmaakt van een locatie waaraan:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.1.a
    text: in het omgevingsplan een niet-agrarische functie is toegedeeld en waarvan het gebruik afwijkt van die functie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.1.b
    text: |-
      in een gemeentelijke, een provinciale respectievelijk de nationale omgevingsvisie of in een programma een niet-
      agrarische functie of moderniseringslocatie is toegedacht en waarvan het gebruik afwijkt van die functie en de
      functie niet is toegedeeld in een omgevingsplan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.1.c
    text: |-
      in de voorkeursrechtbeschikking een niet-agrarische functie of moderniseringslocatie wordt toegedacht en waarvan
      het gebruik afwijkt van die functie en de functie niet is toegedacht in een gemeentelijke, een provinciale
      respectievelijk de nationale omgevingsvisie of een programma en niet is toegedeeld in een omgevingsplan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.2
    text: |-
      Voorafgaand aan de vestiging van een voorkeursrecht op grond van het eerste lid kunnen het college van burgemeester
      en wethouders en gedeputeerde staten bij voorkeursrechtbeschikking op een onroerende zaak een gemeentelijk of
      provinciaal voorkeursrecht vestigen, voor zover die zaak deel uitmaakt van een locatie waaraan in die beschikking
      een niet-agrarische functie of moderniseringslocatie wordt toegedacht en waarvan het gebruik afwijkt van die
      functie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.3
    text: Een provinciaal voorkeursrecht kan alleen worden gevestigd met het oog op een provinciaal belang.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.1.4
    text: Een nationaal voorkeursrecht kan alleen worden gevestigd met het oog op een nationaal belang.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.1
  - number: 9.2.1
    text: |-
      Op een onroerende zaak waarop een provinciaal voorkeursrecht is gevestigd, kan geen gemeentelijk voorkeursrecht
      worden gevestigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.2
  - number: 9.2.2
    text: |-
      Op een onroerende zaak waarop een nationaal voorkeursrecht is gevestigd, kan geen gemeentelijk of provinciaal
      voorkeursrecht worden gevestigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.2
  - number: 9.2.3
    text: |-
      Een gemeentelijk voorkeursrecht vervalt op het tijdstip waarop voor de onroerende zaak een provinciaal of nationaal
      voorkeursrecht ingaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.2
  - number: 9.2.4
    text: |-
      In afwijking van het derde lid blijft een gemeentelijk voorkeursrecht buiten toepassing gedurende de tijd dat op de
      onroerende zaak een door gedeputeerde staten op grond van [artikel 9.1, tweede lid][ref1], gevestigd voorkeursrecht
      rust.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.2.5
    text: |-
      Een provinciaal voorkeursrecht vervalt op het tijdstip waarop voor de onroerende zaak een nationaal voorkeursrecht
      ingaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.2
  - number: 9.3.1
    text: |-
      Op een onroerende zaak kan niet binnen twee jaar na de intrekking of het vervallen van een voorkeursrecht door
      hetzelfde bestuursorgaan opnieuw een voorkeursrecht worden gevestigd op dezelfde grondslag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.3
    machine_readable:
      execution:
        parameters:
          - name: datum_intrekking_of_verval
            type: date
            required: true
            description: Datum van intrekking of vervallen van het voorkeursrecht
          - name: datum_nieuw_verzoek
            type: date
            required: true
            description: Datum waarop nieuw voorkeursrecht wordt verzocht
          - name: zelfde_bestuursorgaan
            type: boolean
            required: true
            description: Of het dezelfde bestuursorgaan betreft
          - name: zelfde_grondslag
            type: boolean
            required: true
            description: Of het dezelfde grondslag betreft
        output:
          - name: hervestiging_toegestaan
            type: boolean
            description: Of hervestiging van het voorkeursrecht is toegestaan
        actions:
          - output: einde_wachtperiode
            value:
              operation: DATE_ADD
              date: $datum_intrekking_of_verval
              years: 2
          - output: hervestiging_toegestaan
            value:
              operation: NOT
              value:
                operation: AND
                conditions:
                  - operation: EQUALS
                    subject: $zelfde_bestuursorgaan
                    value: true
                  - operation: EQUALS
                    subject: $zelfde_grondslag
                    value: true
                  - operation: LESS_THAN
                    subject: $datum_nieuw_verzoek
                    value: $einde_wachtperiode
  - number: 9.3.2
    text: |-
      Het eerste lid is niet van toepassing op een voorkeursrecht dat niet in de openbare registers is ingeschreven
      binnen de in [artikel 16.82a][ref1] bedoelde termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
  - number: 9.4.1
    text: 'Een voorkeursrecht vervalt:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    machine_readable:
      execution:
        parameters:
          - name: grondslag
            type: string
            required: true
            description: >-
              Grondslag van het voorkeursrecht:
              art_9_1_lid_1_a (omgevingsplan),
              art_9_1_lid_1_b (omgevingsvisie/programma),
              art_9_1_lid_1_c (voorkeursrechtbeschikking),
              art_9_1_lid_2 (voorlopig)
          - name: datum_ingang
            type: date
            required: true
            description: Datum waarop het voorkeursrecht is ingegaan
          - name: is_verlengd
            type: boolean
            required: false
            description: Of de termijn is verlengd (alleen relevant bij grondslag art_9_1_lid_1_a)
          - name: functie_toegedeeld_voor_verval
            type: boolean
            required: false
            description: Of de functie tijdig is toegedeeld/toegedacht
          - name: datum_ingang_lid_1_voorkeursrecht
            type: date
            required: false
            description: Datum waarop een lid 1 voorkeursrecht ingaat (bij grondslag art_9_1_lid_2)
        output:
          - name: vervaldatum
            type: date
            description: Datum waarop het voorkeursrecht vervalt
        actions:
          - output: vervaldatum
            value:
              operation: IF
              cases:
                - when:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $grondslag
                        value: art_9_1_lid_1_c
                      - operation: NOT
                        value:
                          operation: EQUALS
                          subject: $functie_toegedeeld_voor_verval
                          value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_ingang
                    years: 3
                - when:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $grondslag
                        value: art_9_1_lid_1_b
                      - operation: NOT
                        value:
                          operation: EQUALS
                          subject: $functie_toegedeeld_voor_verval
                          value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_ingang
                    years: 3
                - when:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $grondslag
                        value: art_9_1_lid_1_a
                      - operation: EQUALS
                        subject: $is_verlengd
                        value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_ingang
                    years: 10
                - when:
                    operation: EQUALS
                    subject: $grondslag
                    value: art_9_1_lid_1_a
                  then:
                    operation: DATE_ADD
                    date: $datum_ingang
                    years: 5
                - when:
                    operation: EQUALS
                    subject: $grondslag
                    value: art_9_1_lid_2
                  then:
                    operation: DATE_ADD
                    date: $datum_ingang
                    months: 3
              default: null
  - number: 9.4.1.a
    text: |-
      bij een voorkeursrecht als bedoeld in [artikel 9.1, eerste lid, onder c][ref1]: drie jaar na het ingaan ervan,
      tenzij voor dat tijdstip de functie waarvoor het voorkeursrecht is gevestigd, is toegedacht in een omgevingsvisie
      of een programma of is toegedeeld in het omgevingsplan,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.4.1.b
    text: |-
      bij een voorkeursrecht als bedoeld in [artikel 9.1, eerste lid, onder b][ref1]: drie jaar na het ingaan ervan,
      tenzij voor dat tijdstip de functie waarvoor het voorkeursrecht is gevestigd, is toegedeeld in het omgevingsplan,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.4.1.c
    text: |-
      bij een voorkeursrecht als bedoeld in [artikel 9.1, eerste lid, onder a][ref1]: vijf jaar na het ingaan ervan of,
      als die termijn met toepassing van het tweede lid is verlengd, aan het einde van de verlengde termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.4.2
    text: |-
      Een bestuursorgaan dat een voorkeursrecht als bedoeld in [artikel 9.1, eerste lid, onder a][ref1], heeft gevestigd,
      kan besluiten de termijn, bedoeld in het eerste lid, onder c, eenmaal met ten hoogste vijf jaar te verlengen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.4.3
    text: |-
      Een voorkeursrecht als bedoeld in [artikel 9.1, tweede lid][ref1], vervalt drie maanden na het ingaan ervan of, als
      dat eerder is, op het tijdstip dat een voorkeursrecht als bedoeld in artikel 9.1, eerste lid, ingaat.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.4.4
    text: |-
      Als een omgevingsplan wordt vernietigd, blijft een voorkeursrecht dat is gebaseerd op dat omgevingsplan gelden tot
      twee jaar na de vernietiging, tenzij het voorkeursrecht eerder wordt ingetrokken. Als binnen die termijn in het
      omgevingsplan de grondslag voor het voorkeursrecht wordt hersteld, heeft het voorkeursrecht de geldingsduur die het
      direct voorafgaand aan de vernietiging had.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.4
  - number: 9.5.1
    text: |-
      Als een voorkeursrecht niet meer voldoet aan de eisen gesteld in [artikel 9.1, eerste en tweede lid][ref1], of als
      de voorkeursrechtbeschikking niet binnen de in [artikel 16.82a][ref2] genoemde termijn in de openbare registers is
      ingeschreven, trekt het bestuursorgaan dat het gevestigd heeft het voorkeursrecht onverwijld in.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
  - number: 9.5.2
    text: |-
      Het bestuursorgaan draagt er zorg voor dat een ingetrokken of vervallen voorkeursrecht of een voorkeursrecht
      waarvan de voorkeursrechtbeschikking is vernietigd, onverwijld wordt doorgehaald in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.5
  - number: 9.5.3
    text: |-
      Het bestuursorgaan doet van de intrekking of het vervallen van een voorkeursrecht of van de vernietiging van een
      voorkeursrechtbeschikking mededeling aan de eigenaren van en de beperkt gerechtigden op de onroerende zaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.5
  - number: '9.6'
    text: 'Als bevoegd gezag als bedoeld in deze afdeling worden aangewezen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.6
  - number: 9.6.a
    text: het college van burgemeester en wethouders voor een gemeentelijk voorkeursrecht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.6
  - number: 9.6.b
    text: gedeputeerde staten voor een provinciaal voorkeursrecht,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.6
  - number: 9.6.c
    text: Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties voor een nationaal voorkeursrecht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.6
  - number: '9.7'
    text: |-
      Een vervreemder gaat niet over tot vervreemding dan nadat hij de rechtspersoon op wiens naam het voorkeursrecht is
      gevestigd in overeenstemming met [paragraaf 9.2.3][ref1] in de gelegenheid heeft gesteld het goed te verkrijgen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: '9.8'
    text: |-
      [Artikel 9.7][ref1] is niet van toepassing op vervreemding:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.8.a
    text: |-
      aan de echtgenoot of de geregistreerd partner, aan bloed- of aanverwanten in de rechte lijn of in de zijlijn tot in
      de tweede graad of aan een pleegkind dat duurzaam als een eigen kind is onderhouden en opgevoed,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
  - number: 9.8.b
    text: |-
      vanwege de verdeling van een gemeenschap als bedoeld in [artikel 166 van Boek 3 van het Burgerlijk Wetboek][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0005291#Artikel166
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0005291
        artikel: '166'
  - number: 9.8.c
    text: vanwege een uiterste wilsbeschikking,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
  - number: 9.8.d
    text: |-
      vanwege een overeenkomst met een gemeente, een waterschap, een provincie, de Staat of een door Onze Minister
      van Binnenlandse Zaken en Koninkrijksrelaties aan te wijzen publiekrechtelijk lichaam of in het algemeen belang
      werkzame rechtspersoon,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
  - number: 9.8.e
    text: |-
      vanwege een verkoop op grond van een wettelijke bepaling, een rechterlijk bevel of een executoriale
      verkoop, waarbij geldt dat de voorzieningenrechter bij een onderhandse executoriale verkoop als bedoeld in
      [artikel 268, tweede lid, van Boek 3 van het Burgerlijk Wetboek][ref1] niet beslist over het verzoek tot
      onderhandse verkoop zolang de rechtspersoon op wiens naam het voorkeursrecht is gevestigd niet in de gelegenheid is
      gesteld om, gelet op het gunstiger bod, een bod te doen, of


      [ref1]: https://wetten.overheid.nl/BWBR0005291#Artikel268
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0005291
        artikel: '268'
  - number: 9.8.f
    text: |-
      vanwege een overeenkomst over een onroerende zaak waarop een voorkeursrecht is gevestigd als bedoeld in
      [artikel 9.1, eerste lid, onder c, of tweede lid][ref1], aangegaan met een pachter die op die zaak op
      het tijdstip van inwerkingtreding van de voorkeursrechtbeschikking een voorkeursrecht had als bedoeld in
      [artikel 378 van Boek 7 van het Burgerlijk Wetboek][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0005290#Artikel378
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0005290
        artikel: '378'
  - number: 9.9.1
    text: |-
      [Artikel 9.7][ref1] is niet van toepassing op de vervreemding vanwege een overeenkomst over de onroerende zaak of
      een overeenkomst die een plicht bevat voor de vervreemder over de onroerende zaak, voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.9.1.a
    text: |-
      de vervreemding plaatsvindt aan een in die overeenkomst bij naam genoemde partij en tegen een in die overeenkomst
      bepaalde of volgens die overeenkomst bepaalbare prijs,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
  - number: 9.9.1.b
    text: de overeenkomst is ingeschreven in de openbare registers voordat de voorkeursrechtbeschikking is bekendgemaakt, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
  - number: 9.9.1.c
    text: |-
      de vervreemding plaatsvindt binnen zes maanden na de dag van inschrijving van de overeenkomst in de openbare
      registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
    machine_readable:
      execution:
        parameters:
          - name: datum_inschrijving_overeenkomst
            type: date
            required: true
            description: Datum van inschrijving van de overeenkomst in de openbare registers
          - name: datum_vervreemding
            type: date
            required: true
            description: Datum van de voorgenomen vervreemding
        output:
          - name: vervreemding_binnen_termijn
            type: boolean
            description: Of de vervreemding binnen zes maanden na inschrijving plaatsvindt
        actions:
          - output: uiterste_vervreemdingsdatum
            value:
              operation: DATE_ADD
              date: $datum_inschrijving_overeenkomst
              months: 6
          - output: vervreemding_binnen_termijn
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_vervreemding
              value: $uiterste_vervreemdingsdatum
  - number: 9.9.2
    text: |-
      Een overeenkomst als bedoeld in het eerste lid kan worden ingeschreven in de openbare registers als deze is vervat
      in een akte.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
  - number: 9.9.3
    text: |-
      Het eerste lid is gedurende een periode van drie jaar eenmaal van toepassing op een vervreemding vanwege
      een overeenkomst over een bepaalde onroerende zaak of een gedeelte daarvan en op de daarin met name genoemde
      vervreemder of de verkrijger waarmee de overeenkomst is gesloten. Deze periode begint op de dag en het tijdstip van
      eerste inschrijving van de overeenkomst in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.9
  - number: '9.10'
    text: |-
      [Artikel 9.7][ref1] is niet van toepassing op de vervreemding als het bevoegd gezag daartoe op verzoek van de
      vervreemder op grond van door die vervreemder aannemelijk gemaakte gewichtige redenen heeft besloten. Het bevoegd
      gezag kan daarbij beperkingen opleggen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.12.1
    text: |-
      Als de vervreemder het voornemen heeft tot vervreemding over te gaan en [artikel 9.7][ref1] van toepassing is,
      nodigt hij het bevoegd gezag uit in onderhandeling te treden over vervreemding aan de gemeente, de provincie of de
      Staat tegen nader overeen te komen voorwaarden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.12.2
    text: |-
      Als de voorgenomen vervreemding betrekking heeft op onroerende zaken waarop voor een deel een
      voorkeursrecht is gevestigd maar die een samenhangend geheel vormen, kan de vervreemder, onverminderd
      [afdeling 11 van titel 5 van Boek 7 van het Burgerlijk Wetboek][ref1], als voorwaarde stellen dat dit geheel van
      onroerende zaken in de vervreemding wordt betrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Afdeling11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.12
    references:
      - id: ref1
        bwb_id: BWBR0005290
        afdeling: '11'
  - number: 9.12.3
    text: |-
      Als de onroerende zaken als onderdeel van een onderneming worden geëxploiteerd, kan de vervreemder als voorwaarde
      stellen dat de onderneming in de vervreemding wordt betrokken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.12
  - number: 9.12.4
    text: |-
      Als [artikel 9.2, derde of vijfde lid][ref1], van toepassing is en er al een uitnodiging tot onderhandeling aan het
      college van burgemeester en wethouders of gedeputeerde staten is gedaan, wordt die uitnodiging aangemerkt als een
      uitnodiging aan gedeputeerde staten of Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: '9.13'
    text: |-
      Het bevoegd gezag beslist binnen zes weken na ontvangst van de uitnodiging of de gemeente, de provincie
      respectievelijk de Staat in beginsel bereid is het goed tegen nader overeen te komen voorwaarden te kopen of op
      grond van een andere titel te verkrijgen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.13
  - number: 9.14.1
    text: |-
      De vervreemder mag, nadat hij de uitnodiging heeft gedaan, overgaan tot vervreemding van het in de uitnodiging
      vermelde goed aan derden gedurende een periode van drie jaar:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
  - number: 9.14.1.a
    text: |-
      vanaf de dag waarop het bevoegd gezag heeft beslist dat het niet bereid is het goed te kopen of op grond van een
      andere titel te verkrijgen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
  - number: 9.14.1.b
    text: |-
      na afloop van de in [artikel 9.13][ref1] bedoelde termijn als het bevoegd gezag binnen die termijn geen beslissing
      heeft genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: 9.14.2
    text: |-
      In afwijking van het eerste lid geldt voor een voorkeursrecht dat ten minste gedurende een periode van vijf jaar is
      gebaseerd op een omgevingsplan en waarvoor de uitnodiging is gedaan, dat dit vervalt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
  - number: 9.14.2.a
    text: |-
      met ingang van de dag na die waarop het bevoegd gezag heeft beslist dat het niet bereid is het goed te kopen of op
      grond van een andere titel te verkrijgen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
  - number: 9.14.2.b
    text: |-
      na afloop van de in [artikel 9.13][ref1] genoemde termijn als het bevoegd gezag binnen die termijn geen beslissing
      heeft genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: '9.15'
    text: |-
      Deze paragraaf is van toepassing op een goed waarvoor een uitnodiging als bedoeld in
      [artikel 9.12, eerste lid][ref1], is gedaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: 9.16.1
    text: |-
      Als het bevoegd gezag in beginsel bereid is het goed te kopen of op grond van een andere titel te verkrijgen en er
      tussen de vervreemder en het bevoegd gezag wordt onderhandeld over de vervreemdingsvoorwaarden, kan de vervreemder
      het bevoegd gezag verzoeken om binnen vier weken na dat verzoek de rechtbank te verzoeken een oordeel over de prijs
      te geven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.16
    machine_readable:
      execution:
        parameters:
          - name: datum_verzoek_vervreemder
            type: date
            required: true
            description: Datum waarop de vervreemder het verzoek aan het bevoegd gezag doet
        output:
          - name: uiterste_datum_verzoek_rechtbank
            type: date
            description: Uiterste datum waarop het bevoegd gezag de rechtbank moet verzoeken
        actions:
          - output: uiterste_datum_verzoek_rechtbank
            value:
              operation: DATE_ADD
              date: $datum_verzoek_vervreemder
              weeks: 4
  - number: 9.16.2
    text: |-
      Bij het verzoek van het bevoegd gezag aan de rechtbank wordt een afschrift van het verzoek van de vervreemder
      gevoegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.16
  - number: 9.17.1
    text: 'De vervreemder mag tot vervreemding aan derden overgaan gedurende een periode van drie jaar vanaf het moment dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
  - number: 9.17.1.a
    text: |-
      de termijn, bedoeld in [artikel 9.16, eerste lid][ref1], is verstreken zonder dat het bevoegd gezag een verzoek bij
      de rechtbank heeft ingediend,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.17.1.b
    text: de gerechtelijke procedure tussentijds is beëindigd door het intrekken van het verzoek door het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
  - number: 9.17.2
    text: |-
      Een voorkeursrecht dat ten minste gedurende een periode van vijf jaar is gebaseerd op een omgevingsplan en waarvoor
      het goed waarop het betrekking heeft is aangeboden aan het bevoegd gezag, vervalt met ingang van de dag nadat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
  - number: 9.17.2.a
    text: |-
      de termijn, bedoeld in [artikel 9.16, eerste lid][ref1], is verstreken zonder dat het bevoegd gezag een verzoek bij
      de rechtbank heeft ingediend, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.17.2.b
    text: de gerechtelijke procedure tussentijds is beëindigd door intrekking van het verzoek door het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.17
  - number: 9.18.1
    text: |-
      De vervreemder kan de rechtbank verzoeken te bepalen dat de rechtspersoon op wiens naam het voorkeursrecht is
      gevestigd, vanwege bijzondere persoonlijke omstandigheden van de vervreemder gehouden is medewerking te verlenen
      aan de overdracht van het goed tegen een door de rechtbank vast te stellen prijs.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.18
  - number: 9.18.2
    text: 'Het verzoek wordt ingediend binnen twee maanden na de dag waarop:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.18
    machine_readable:
      execution:
        parameters:
          - name: datum_gebeurtenis
            type: date
            required: true
            description: Datum van de beslissing, termijnoverschrijding of ontvangst intrekking
        output:
          - name: uiterste_indieningsdatum
            type: date
            description: Uiterste datum voor indiening van het verzoek bij de rechtbank
        actions:
          - output: uiterste_indieningsdatum
            value:
              operation: DATE_ADD
              date: $datum_gebeurtenis
              months: 2
  - number: 9.18.2.a
    text: het bevoegd gezag heeft beslist geen verzoek in te dienen als bedoeld in artikel 9.16, eerste lid,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.18
  - number: 9.18.2.b
    text: |-
      de termijn, bedoeld in [artikel 9.16, eerste lid][ref1], is overschreden zonder dat het bevoegd gezag een
      beslissing heeft genomen, of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.18.2.c
    text: de intrekking van het verzoek bij de griffie is ontvangen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.18
  - number: '9.19'
    text: |-
      De vervreemder mag tot vervreemding aan derden overgaan gedurende een periode van drie jaar na het onherroepelijk
      worden van de rechterlijke beschikking waarbij het verzoek, bedoeld in [artikel 9.18, eerste lid][ref1], is
      afgewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.20.1
    text: |-
      Het bevoegd gezag verleent medewerking aan de totstandkoming van een notariële akte tot levering van het goed tegen
      betaling aan de vervreemder van de in de beschikking, bedoeld in [artikel 16.123, eerste lid][ref1], bepaalde prijs
      als de vervreemder binnen een periode van drie maanden na de dag van het onherroepelijk worden van de beschikking
      schriftelijk aan het bevoegd gezag verzoekt om die medewerking.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        afdeling: '16.11'
    machine_readable:
      execution:
        parameters:
          - name: datum_onherroepelijk
            type: date
            required: true
            description: Datum waarop de beschikking onherroepelijk is geworden
        output:
          - name: uiterste_datum_verzoek_medewerking
            type: date
            description: Uiterste datum voor het verzoek om medewerking aan de notariële akte
        actions:
          - output: uiterste_datum_verzoek_medewerking
            value:
              operation: DATE_ADD
              date: $datum_onherroepelijk
              months: 3
  - number: 9.20.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing als sprake is van een beschikking als bedoeld in
      [artikel 16.123, tweede lid][ref1], voor zover bij die beschikking het verzoek is toegewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        afdeling: '16.11'
  - number: 9.20.3
    text: |-
      Het bevoegd gezag dat het voorkeursrecht heeft gevestigd, draagt er zorg voor dat na levering van de onroerende
      zaak het voorkeursrecht, voor zover het ziet op die zaak, wordt doorgehaald in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.20
  - number: 9.21.1
    text: |-
      Inschrijving in de openbare registers van een akte tot vervreemding anders dan aan een gemeente, een provincie
      of de Staat vindt alleen plaats als op of bij het in te schrijven stuk een notariële verklaring is opgenomen, die
      inhoudt dat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.21
  - number: 9.21.1.a
    text: op de onroerende zaak geen voorkeursrecht is gevestigd, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.21
  - number: 9.21.1.b
    text: de vervreemding niet in strijd is met dit hoofdstuk en de daarop rustende bepalingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.21
  - number: 9.21.2
    text: |-
      Voor de toepassing van het eerste lid wordt met de daar bedoelde notariële verklaring gelijkgesteld een
      verklaring van een persoon als bedoeld in [artikel 91 van de Overgangswet nieuw Burgerlijk Wetboek][ref1], die in
      overeenstemming met het daar bepaalde een onderhandse akte tot levering heeft opgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0002565#Artikel91
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.21
    references:
      - id: ref1
        bwb_id: BWBR0002565
        artikel: '91'
  - number: 9.22.1
    text: |-
      Een gemeente, een provincie of de Staat kan de nietigheid inroepen van rechtshandelingen die zijn verricht met de
      kennelijke strekking afbreuk te doen aan een op haar of zijn naam gevestigd voorkeursrecht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.22
  - number: 9.22.2
    text: |-
      Een verzoek tot nietigverklaring wordt gedaan bij de rechtbank binnen het rechtsgebied waar de onroerende zaak
      geheel of grotendeels ligt binnen acht weken nadat de gemeente, de provincie of de Staat een afschrift heeft
      ontvangen van de akte waarin de rechtshandeling is vervat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.22
    machine_readable:
      execution:
        parameters:
          - name: datum_ontvangst_afschrift
            type: date
            required: true
            description: Datum waarop het afschrift van de akte is ontvangen
        output:
          - name: uiterste_datum_verzoek_nietigverklaring
            type: date
            description: Uiterste datum voor indiening verzoek tot nietigverklaring
        actions:
          - output: uiterste_datum_verzoek_nietigverklaring
            value:
              operation: DATE_ADD
              date: $datum_ontvangst_afschrift
              weeks: 8
  - number: 9.22.3
    text: |-
      Het verzoek tot nietigverklaring is niet-ontvankelijk als de indiener schriftelijk heeft ingestemd met de
      rechtshandeling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel9.22
  - number: '10.1'
    text: |-
      In dit hoofdstuk en de daarop berustende bepalingen wordt verstaan onder: - *initiatiefnemer:* degene onder wiens
      verantwoordelijkheid een werk van algemeen belang waarvoor een gedoogplicht is opgelegd, tot stand wordt gebracht
      of wordt opgeruimd;
        - *rechthebbende:* degene die enig recht heeft op de onroerende zaak waarin, waarop, waarboven of waaronder: a.
      activiteiten als bedoeld in [afdeling 10.2][ref1] worden verricht, of b. een werk van algemeen belang tot stand
      wordt gebracht of wordt opgeruimd;
        - *tot stand brengen:* aanleggen, in stand houden, wijzigen, verplaatsen of uitvoeren;
        - *werk van algemeen belang:* werk of activiteit als bedoeld in [paragraaf 10.3.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.2'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 10.1a
    text: |-
      Voor activiteiten als bedoeld in de [afdelingen 10.2][ref1] en [10.3][ref2] en de activiteiten, genoemd in de
      gedoogplichtbeschikking, heeft de initiatiefnemer of diens gemachtigde toegang tot de onroerende zaak voor zover
      dat redelijkerwijs voor de uitvoering daarvan nodig is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.1a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.2'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        afdeling: '10.3'
  - number: 10.2.1
    text: 'Een rechthebbende gedoogt voor wegen en waterstaatswerken:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
  - number: 10.2.1.a
    text: |-
      het door of namens de beheerder verrichten van onderhouds- en herstelwerkzaamheden aan de weg of het
      waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
  - number: 10.2.1.b
    text: |-
      het door of namens de beheerder aanbrengen en in stand houden van meetmiddelen, seinen, merken, verkeerstekens of
      andere tekens, als dat volgens de beheerder nodig is voor de functievervulling van de weg of het waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
  - number: 10.2.1.c
    text: |-
      graaf- of meetwerkzaamheden voor het maken van ontwerpen voor het aanleggen, onderhouden of wijzigen van de weg of
      het waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
  - number: 10.2.1.d
    text: |-
      het door of namens de beheerder aanleggen en in stand houden van elektrische geleidingen, voor zover dat niet
      plaatsvindt in afgesloten tuinen en erven die een geheel vormen met bewoonde percelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
  - number: 10.2.2
    text: |-
      Een rechthebbende gedoogt voor waterstaatswerken het door of namens het bevoegd gezag op grond van de
      [Scheepvaartverkeerswet][ref1] aanbrengen en in stand houden van verkeerstekens.


      [ref1]: https://wetten.overheid.nl/BWBR0004364
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.2
    references:
      - id: ref1
        bwb_id: BWBR0004364
  - number: 10.3.1
    text: |-
      Een rechthebbende gedoogt bij gronden, gelegen aan of in een oppervlaktewaterlichaam waarvan het onderhoud wordt
      verricht door of namens de beheerder: het ontvangen op die gronden van specie of maaisel, dat vanwege regulier
      onderhoud van dat oppervlaktewaterlichaam wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.2
    text: |-
      Voor de toepassing van het eerste lid worden gronden die zijn gescheiden van het oppervlaktewaterlichaam vanwege
      een weg of door een grondstrook die te smal is om het maaisel of de specie te ontvangen, aangemerkt als gronden
      gelegen aan een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.3
    text: >-
      Een rechthebbende gedoogt bij gronden waar het grondwater
      invloed ondervindt van een wateractiviteit bestaande uit:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.3.a
    text: het onttrekken van grondwater door een daarvoor bestemde voorziening, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.3.b
    text: het in de bodem brengen van water, ter aanvulling van het grondwater, in samenhang met dat onttrekken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.4
    text: |-
      Een rechthebbende gedoogt bij gronden, gelegen in of deel uitmakend van een oppervlaktewaterlichaam of
      bergingsgebied: wateroverlast en overstromingen door de afvoer of tijdelijke berging van oppervlaktewater.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.5
    text: |-
      Een rechthebbende gedoogt maatregelen, in het kader van het beschermen van de kwaliteit van grondwaterlichamen,
      opgenomen in:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: 10.3.5.a
    text: |-
      een regionaal waterprogramma als bedoeld in [artikel 3.8][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 10.3.5.b
    text: |-
      een programma van een waterschap als bedoeld in [artikel 3.7][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 10.3.5.c
    text: een programma van het college van burgemeester en wethouders.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.3
  - number: '10.4'
    text: |-
      Bij activiteiten als bedoeld in de [artikelen 10.2][ref1] en [10.3, eerste lid][ref2], informeert de beheerder de
      rechthebbende ten minste achtenveertig uur van tevoren schriftelijk over de voorgenomen activiteiten, tenzij dit
      door het spoedeisende karakter van die activiteiten niet mogelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.4
    machine_readable:
      execution:
        parameters:
          - name: datum_voorgenomen_activiteit
            type: date
            required: true
            description: Datum van de voorgenomen activiteit
          - name: is_spoedeisend
            type: boolean
            required: true
            description: Of de activiteit een spoedeisend karakter heeft
        output:
          - name: informatieplicht_van_toepassing
            type: boolean
            description: Of de 48-uursinformatieplicht van toepassing is
          - name: uiterste_informeerdatum
            type: date
            description: Uiterste datum waarop de rechthebbende geïnformeerd moet worden
        actions:
          - output: informatieplicht_van_toepassing
            value:
              operation: NOT
              value:
                operation: EQUALS
                subject: $is_spoedeisend
                value: true
          - output: uiterste_informeerdatum
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $informatieplicht_van_toepassing
                    value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_voorgenomen_activiteit
                    days: -2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 10.5.1
    text: |-
      De met de inspectie van watersystemen of onderdelen daarvan belaste personen, werkzaam onder verantwoordelijkheid
      van de beheerder, zijn bevoegd, met medeneming van de benodigde apparatuur, elke plaats te betreden met
      uitzondering van woningen zonder toestemming van de bewoner.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.5
  - number: 10.5.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat of het dagelijks bestuur van een waterschap is bevoegd tot het
      geven van een machtiging als bedoeld in [artikel 3, tweede lid, van de Algemene wet op het binnentreden][ref1]
      tot het zonder toestemming van de bewoner binnentreden in een woning door een daartoe bij besluit van Onze Minister
      van Infrastructuur en Waterstaat of dat bestuur aangewezen persoon, voor zover die woning deel uitmaakt van een
      waterstaatswerk of daarmee rechtstreeks in verbinding staat.


      [ref1]: https://wetten.overheid.nl/BWBR0006763#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.5
    references:
      - id: ref1
        bwb_id: BWBR0006763
        artikel: '3'
  - number: 10.5.3
    text: |-
      De [artikelen 5:13][ref1], [5:15, tweede en derde lid][ref2], [5:16][ref3] en
      [5:20, eerste en tweede lid, van de Algemene wet bestuursrecht][ref4] zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.5
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '5'
      - id: ref3
        bwb_id: BWBR0005537
        artikel: '5'
      - id: ref4
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 10.5.4
    text: |-
      Onze Minister van Infrastructuur en Waterstaat of het dagelijks bestuur van een waterschap zijn bevoegd tot
      overeenkomstige toepassing van [artikel 5:20, derde lid, van de Algemene wet bestuursrecht][ref1] ten aanzien van
      de in het eerste lid bedoelde personen.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.5
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 10.6.1
    text: |-
      Een rechthebbende op een onroerende zaak waar maatregelen als bedoeld in
      [artikel 8.49, eerste en tweede lid, van de Wet milieubeheer][ref1] voor een gesloten stortplaats worden
      getroffen, gedoogt dat activiteiten worden verricht vanwege die maatregelen.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.6
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '8'
  - number: 10.6.2
    text: |-
      Een rechthebbende op een onroerende zaak waar een beroepshalve of bedrijfsmatig verrichte activiteit, ongeacht het
      openbare of particuliere, winstgevende of niet-winstgevende karakter daarvan, wordt verricht of waar sprake is van
      milieuschade of een onmiddellijke dreiging daarvan, gedoogt dat preventieve of herstelmaatregelen als bedoeld in
      [titel 17.2 van de Wet milieubeheer][ref1] worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0003245
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.6
    references:
      - id: ref1
        bwb_id: BWBR0003245
  - number: '10.7'
    text: |-
      De exploitant van een luchthaven als bedoeld in [artikel 8.1b van de Wet luchtvaart][ref1] gedoogt op de luchthaven
      elektronische, meteorologische en andere hulpmiddelen, bestemd voor de uitoefening van de taken, toegedeeld aan
      de LVNL, bedoeld in [artikel 1.1, eerste lid, van die wet][ref2], en het Koninklijk Nederlands Meteorologisch
      Instituut, voor de luchtverkeersbeveiliging en de luchtvaartmeteorologische dienstverlening.


      [ref1]: https://wetten.overheid.nl/BWBR0005555#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0005555#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.7
    references:
      - id: ref1
        bwb_id: BWBR0005555
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0005555
        artikel: '1'
  - number: 10.8.1
    text: |-
      Een rechthebbende op infrastructuur, anders dan hoofdspoorwegen, waarvan het beheer bij of krachtens de wet is
      opgedragen aan, of dat in beheer is bij, een openbaar lichaam gedoogt aanraking, doorsnijding of overbrugging van
      die infrastructuur door hoofdspoorwegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.8
  - number: 10.8.2
    text: |-
      Het eerste lid geldt ook voor de rechthebbenden op de onder of naast de hoofdspoorweg gelegen grond, de daarin
      gelegen werken en de daarop gelegen opstallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.8
  - number: 10.8.3
    text: |-
      Een rechthebbende gedoogt het beheer van lokale spoorweginfrastructuur voor zover dit voor de goede uitvoering van
      dat beheer nodig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.8
  - number: '10.9'
    text: |-
      Een rechthebbende gedoogt dat de houder van een vergunning voor het opsporen van CO-opslagcomplexen,
      het opsporen of winnen van delfstoffen of aardwarmte of het opslaan van stoffen als bedoeld in
      [artikel 1 van de Mijnbouwwet][ref1], in de ondergrond CO-opslagcomplexen opspoort, delfstoffen of aardwarmte
      opspoort of wint respectievelijk stoffen opslaat volgens de voor die activiteiten geldende regels, voor zover die
      activiteiten plaatsvinden op een diepte van meer dan honderd meter beneden de oppervlakte.


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0014168
        artikel: '1'
    machine_readable:
      execution:
        parameters:
          - name: diepte_meter
            type: number
            required: true
            description: Diepte van de activiteit beneden de oppervlakte in meters
        output:
          - name: gedoogplicht_van_toepassing
            type: boolean
            description: Of de gedoogplicht van toepassing is (diepte meer dan 100 meter)
        actions:
          - output: gedoogplicht_van_toepassing
            value:
              operation: GREATER_THAN
              subject: $diepte_meter
              value: 100
  - number: '10.10'
    text: |-
      Een rechthebbende op een onroerende zaak waarin of waarop tekens met voorlichting ter uitvoering van de
      zwemwaterrichtlijn worden geplaatst, gedoogt het aanbrengen en in stand houden van die tekens.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10
  - number: 10.10a.1
    text: |-
      Een rechthebbende gedoogt dat tijdelijke beschermingsmaatregelen als bedoeld in [artikel 19.9c][ref1] worden
      uitgevoerd ter voorkoming of beperking van onaanvaardbare risico’s voor de gezondheid als gevolg van blootstelling
      aan verontreiniging van de bodem.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: 19.2a
  - number: 10.10a.2
    text: |-
      [Artikel 5:27 van de Algemene wet bestuursrecht][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '5'
  - number: 10.10b.1
    text: |-
      Een rechthebbende op een onroerende zaak waarvoor door het provinciebestuur of een van Onze Ministers
      ter uitvoering van de taak, bedoeld in [artikel 2.18, eerste lid, onder g, onder 2°][ref1], en
      [artikel 2.19, vijfde lid, onder a, onder 1°, en onder b][ref2], feitelijke handelingen worden verricht die nodig
      zijn gelet op de instandhoudingsdoelstellingen voor een Natura 2000-gebied of een bijzonder nationaal natuurgebied,
      gedoogt het treffen van deze maatregelen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 10.10b.2
    text: |-
      Het bevoegd gezag informeert een rechthebbende als bedoeld in het eerste lid ten minste vier weken van tevoren
      schriftelijk over de voorgenomen maatregelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10b
    machine_readable:
      execution:
        parameters:
          - name: datum_voorgenomen_maatregel
            type: date
            required: true
            description: Datum van de voorgenomen maatregel
        output:
          - name: uiterste_informeerdatum
            type: date
            description: Uiterste datum waarop de rechthebbende geïnformeerd moet worden
        actions:
          - output: uiterste_informeerdatum
            value:
              operation: DATE_ADD
              date: $datum_voorgenomen_maatregel
              weeks: -4
  - number: 10.10b.3
    text: |-
      In afwijking van het tweede lid kan het informeren mondeling plaatsvinden en geldt de termijn niet, als dit nodig
      is vanwege het spoedeisende karakter van de maatregel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10b
  - number: 10.10c
    text: |-
      Een rechthebbende gedoogt dat terreinen worden betreden of daarop graafwerkzaamheden of meetwerkzaamheden worden
      verricht of tekens worden aangebracht, als gedeputeerde staten van de provincie waarin die terreinen geheel of
      grotendeels liggen dat voor de voorbereiding van landinrichting als bedoeld in [artikel 12.3, eerste lid][ref1],
      nodig achten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.2
        afdeling: '12.1'
  - number: 10.10d.1
    text: |-
      Een rechthebbende gedoogt dat binnen het in te richten gebied meetwerkzaamheden of waarnemingen worden verricht of
      tekens worden aangebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10d
  - number: 10.10d.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op degene aan wie op grond van [artikel 12.21, eerste lid][ref1],
      percelen tijdelijk in gebruik zijn gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10d
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 10.10e.1
    text: |-
      Een rechthebbende gedoogt dat de werkzaamheden ten aanzien van wegen, waterstaatswerken, gebieden van belang
      uit een oogpunt van natuurbescherming of landschapsbehoud of van elementen van landschappelijke, recreatieve,
      aardkundige of natuurwetenschappelijke waarde, of cultureel erfgoed, of andere voorzieningen van openbaar nut,
      genoemd in een instructie als bedoeld in [artikel 12.18][ref1], worden verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.3.2
        afdeling: '12.3'
  - number: 10.10e.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op degene aan wie op grond van [artikel 12.21, eerste lid][ref1],
      percelen tijdelijk in gebruik zijn gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 10.10f.1
    text: 'Binnen een herverkavelingsblok gedoogt een rechthebbende dat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10f
  - number: 10.10f.1.a
    text: |-
      houtgewas wordt geplant of gekapt, of zoden, aarde, baggerspecie en andere grond aan zijn terreinen worden
      onttrokken of daarop worden neergelegd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10f
  - number: 10.10f.1.b
    text: werkzaamheden worden verricht voor de ontsluiting, waterbeheersing, inrichting en profielopbouw van de percelen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10f
  - number: 10.10f.1.c
    text: |-
      bouwwerken worden gesloopt, gebouwd of verplaatst als gedeputeerde staten dat nodig achten voor de uitvoering van
      het inrichtingsprogramma.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10f
  - number: 10.10f.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op degene aan wie op grond van [artikel 12.21, eerste lid][ref1],
      percelen tijdelijk in gebruik zijn gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10f
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 10.10g
    text: |-
      Een rechthebbende van een perceel dat op grond van [artikel 12.21, derde lid][ref1], tijdelijk in gebruik
      is gegeven aan een openbaar lichaam of rechtspersoon gedoogt dat dit lichaam of deze rechtspersoon daarop de
      werkzaamheden verricht die hij nodig acht voor de uitvoering van het inrichtingsprogramma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10g
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.1
        afdeling: '12.4'
  - number: 10.10h.1
    text: |-
      Als voor een beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving waarvoor kan worden
      onteigend, graafwerkzaamheden, meetwerkzaamheden of het aanbrengen van tekens door het bevoegd gezag, bedoeld in
      [artikel 11.4][ref1], nodig worden geacht, gedoogt de rechthebbende dit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 10.10h.2
    text: |-
      [Artikel 10.4][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 10.10i.1
    text: |-
      Een rechthebbende gedoogt dat gasleidingen van een transmissie- of distributiesysteem als bedoeld in
      [artikel 1.1 van de Energiewet][ref1], met inbegrip van bijbehorende hulpmiddelen en installaties, die op grond van
      een overeenkomst of gedoogplichtbeschikking in, op, onder of boven een onroerende zaak aanwezig zijn, ook worden
      gebruikt voor het transport van waterstofgas door de door de Minister voor Klimaat en Energie aangewezen beheerder
      van het landelijk transportnet voor waterstofgas als bedoeld in artikel 1.1 van de Energiewet.


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10i
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '1'
  - number: 10.10i.2
    text: |-
      De gedoogplicht, bedoeld in het eerste lid, laat de rechten en verplichtingen die zijn verbonden aan een
      overeenkomst of gedoogplichtbeschikking als bedoeld in dat lid voor het overige onverlet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10i
  - number: 10.10j.1
    text: |-
      Een rechthebbende gedoogt het uitvoeren van meetwerkzaamheden of graafwerkzaamheden, het aanbrengen van tekens
      in, boven of op een onroerende zaak, of het verrichten van onderzoek met gebruikmaking van de daarvoor benodigde
      hulpmiddelen als die activiteiten nodig zijn voor het maken van een ontwerp voor de aanleg, instandhouding,
      wijziging, verplaatsing of opruiming van een werk van algemeen belang als bedoeld in de [artikelen 10.13][ref1],
      [10.14][ref2] of [10.15][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10j
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 10.10j.2
    text: |-
      De initiatiefnemer informeert de rechthebbende, bedoeld in het eerste lid, ten minste vier dagen van tevoren
      schriftelijk over de voorgenomen activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.10j
    machine_readable:
      execution:
        parameters:
          - name: datum_voorgenomen_activiteit
            type: date
            required: true
            description: Datum van de voorgenomen activiteit
        output:
          - name: uiterste_informeerdatum
            type: date
            description: Uiterste datum waarop de rechthebbende geïnformeerd moet worden
        actions:
          - output: uiterste_informeerdatum
            value:
              operation: DATE_ADD
              date: $datum_voorgenomen_activiteit
              days: -4
  - number: '10.11'
    text: 'Een gedoogplicht op grond van deze afdeling kan worden opgelegd als voor een werk van algemeen belang:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.11
    machine_readable:
      execution:
        parameters:
          - name: gebruik_onroerende_zaak_nodig
            type: boolean
            required: true
            description: Of voor het werk gebruik moet worden gemaakt van een onroerende zaak
          - name: geen_overeenstemming_bereikt
            type: boolean
            required: true
            description: Of ondanks redelijke poging geen schriftelijke overeenstemming is bereikt
          - name: gebruik_niet_meer_dan_nodig
            type: boolean
            required: true
            description: Of het gebruik niet meer zal worden belemmerd dan redelijkerwijs nodig
          - name: belangen_vorderen_geen_onteigening
            type: boolean
            required: true
            description: Of de belangen van de rechthebbende redelijkerwijs onteigening niet vorderen
        output:
          - name: gedoogplicht_kan_worden_opgelegd
            type: boolean
            description: Of een gedoogplicht kan worden opgelegd
        actions:
          - output: gedoogplicht_kan_worden_opgelegd
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $gebruik_onroerende_zaak_nodig
                  value: true
                - operation: EQUALS
                  subject: $geen_overeenstemming_bereikt
                  value: true
                - operation: EQUALS
                  subject: $gebruik_niet_meer_dan_nodig
                  value: true
                - operation: EQUALS
                  subject: $belangen_vorderen_geen_onteigening
                  value: true
  - number: 10.11.a
    text: voor bepaalde of onbepaalde tijd gebruik moet worden gemaakt van een onroerende zaak,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.11
  - number: 10.11.b
    text: |-
      met de rechthebbende op de onroerende zaak ondanks een redelijke poging daartoe geen schriftelijke overeenstemming
      is bereikt over het gebruik daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.11
  - number: 10.11.c
    text: het gebruik van de onroerende zaak niet meer zal worden belemmerd dan redelijkerwijs nodig is, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.11
  - number: 10.11.d
    text: de belangen van de rechthebbende redelijkerwijs onteigening niet vorderen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.11
  - number: '10.12'
    text: |-
      Het opleggen van een gedoogplicht op grond van deze afdeling geschiedt op aanvraag van de initiatiefnemer of
      ambtshalve, als de initiatiefnemer op grond van deze wet zelf bevoegd is om voor het werk van algemeen belang een
      gedoogplicht op te leggen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.12
  - number: 10.13.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan aan een rechthebbende een gedoogplicht opleggen voor het tot
      stand brengen of opruimen van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
  - number: 10.13.1.a
    text: een werk voor hoofdspoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
  - number: 10.13.1.b
    text: |-
      infrastructuur nodig voor de productie en distributie van drinkwater als bedoeld in
      [artikel 7, eerste lid, onder b][ref1], in samenhang met [artikel 1, eerste lid, van de Drinkwaterwet][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0026338#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0026338#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
    references:
      - id: ref1
        bwb_id: BWBR0026338
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0026338
        artikel: '1'
  - number: 10.13.1.c
    text: |-
      een werk ter uitvoering van een projectbesluit waarop [artikel 5.46, eerste lid][ref1], van toepassing is,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 10.13.1.d
    text: een werk voor het transport van afvalwater, uitgevoerd door een waterschap,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
  - number: 10.13.1.e
    text: een werk voor het transport van afvalwater, hemelwater of grondwater, uitgevoerd door een gemeente,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
  - number: 10.13.1.f
    text: lokale spoorweginfrastructuur.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
  - number: 10.13.2
    text: |-
      Het dagelijks bestuur van een waterschap kan aan een rechthebbende een gedoogplicht opleggen voor het tot stand
      brengen of opruimen van een werk ter uitvoering van een projectbesluit waarop [artikel 5.46, tweede lid][ref1], van
      toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 10.13a.1
    text: |-
      Het bevoegd gezag voor de aanvraag om een omgevingsvergunning voor een milieubelastende activiteit die betrekking
      heeft op een stortplaats kan aan een rechthebbende een gedoogplicht opleggen voor het verrichten van onderzoek
      op die stortplaats of in de onmiddellijke omgeving daarvan en voor het aanbrengen, aanwezig zijn, onderhouden,
      gebruiken en verwijderen van de voor dat onderzoek benodigde middelen als dat nodig is in het belang van de
      bescherming van de bodem.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
  - number: 10.13a.2
    text: 'Het eerste lid is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
  - number: 10.13a.2.a
    text: |-
      het storten van afvalstoffen als het gaat om het begraven van stoffelijke resten of het op of in de bodem
      verspreiden van as, afkomstig van de verbranding van stoffelijke resten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
  - number: 10.13a.2.b
    text: stortplaatsen waar alleen baggerspecie wordt gestort,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
  - number: 10.13a.2.c
    text: stortplaatsen waar het storten van afvalstoffen is beëindigd voor 1 maart 1995,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
  - number: 10.13a.2.d
    text: |-
      stortplaatsen waar op of na 1 maart 1995 alleen afvalstoffen zijn of worden gestort voor het aanbrengen van een
      bovenafdichting op die stortplaats, als de gestorte hoeveelheid ten hoogste 0,3 m3 afvalstof per m2 stortoppervlak
      bedraagt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13a
    machine_readable:
      execution:
        parameters:
          - name: gestorte_hoeveelheid_m3
            type: number
            required: true
            description: Totale hoeveelheid gestorte afvalstoffen in m3
          - name: stortoppervlak_m2
            type: number
            required: true
            description: Stortoppervlak in m2
        output:
          - name: onder_drempel
            type: boolean
            description: Of de gestorte hoeveelheid ten hoogste 0,3 m3 per m2 bedraagt
        actions:
          - output: hoeveelheid_per_m2
            value:
              operation: DIVIDE
              values:
                - $gestorte_hoeveelheid_m3
                - $stortoppervlak_m2
          - output: onder_drempel
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $hoeveelheid_per_m2
              value: 0.3
  - number: 10.13b
    text: 'Het college van burgemeester en wethouders kan aan een rechthebbende een gedoogplicht opleggen voor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13b
  - number: 10.13b.a
    text: |-
      het verrichten van onderzoek naar verontreiniging van de bodem voor het vaststellen van de doeltreffendheid
      en effecten van maatregelen ter uitvoering van regels over milieubelastende activiteiten op grond van
      [artikel 4.1][ref1] of [4.3][ref2], of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 10.13b.b
    text: |-
      de uitvoering van maatregelen uit een nazorgplan als bedoeld in [artikel 39d][ref1] of
      [39e van de Wet bodembescherming][ref2] of van maatregelen in het kader van nazorg krachtens
      [artikel 39b van die wet][ref3], zoals die artikelen luidden voor het tijdstip van inwerkingtreding van
      [artikel 3.1 van de Aanvullingswet bodem Omgevingswet][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0003994#Artikel39d
      [ref2]: https://wetten.overheid.nl/BWBR0003994#Artikel39e
      [ref3]: https://wetten.overheid.nl/BWBR0003994#Artikel39b
      [ref4]: https://wetten.overheid.nl/BWBR0043277#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.13b
    references:
      - id: ref1
        bwb_id: BWBR0003994
        artikel: 39d
      - id: ref2
        bwb_id: BWBR0003994
        artikel: 39e
      - id: ref3
        bwb_id: BWBR0003994
        artikel: 39b
      - id: ref4
        bwb_id: BWBR0043277
        artikel: '3'
  - number: 10.14.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan, na overleg met Onze Minister van Economische Zaken en Klimaat,
      aan een rechthebbende een gedoogplicht opleggen voor het tot stand brengen of opruimen van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
  - number: 10.14.1.a
    text: een mijnbouwwerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
  - number: 10.14.1.b
    text: |-
      werken bestemd voor het opsporen van CO-opslagcomplexen als bedoeld in [artikel 1 van de Mijnbouwwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0014168
        artikel: '1'
  - number: 10.14.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan, na overleg met Onze Minister voor Klimaat en Energie, aan een
      rechthebbende een gedoogplicht opleggen voor het tot stand brengen of opruimen van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
  - number: 10.14.2.a
    text: |-
      een systeem dat wordt beheerd door een transmissie- of distributiesysteembeheerder als bedoeld in
      [artikel 1.1 van de Energiewet][ref1] of door een transmissiesysteembeheerder voor elektriciteit op zee als bedoeld
      in artikel 1.1 van die wet;


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '1'
  - number: 10.14.2.b
    text: |-
      een windpark als bedoeld in [artikel 6.1, eerste lid, onderdeel a][ref1], of
      [6.2, eerste lid, onderdeel a, van de Energiewet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0050714#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0050714
        artikel: '6'
  - number: 10.14.2.c
    text: |-
      een inrichting waarvoor een vergunning is verleend op grond van [artikel 15, onder b, van de Kernenergiewet][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 10.14.2.d
    text: |-
      een werk voor de levering van warmte als bedoeld in [artikel 38 van de Warmtewet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0033729#Artikel38
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0033729
        artikel: '38'
  - number: 10.14.2.e
    text: |-
      het landelijk transportnet voor waterstofgas als bedoeld in [artikel 1.1 van de Energiewet][ref1] waarvoor door de
      Minister voor Klimaat en Energie een beheerder is aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '1'
  - number: '10.15'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan, na overleg met Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties, aan een rechthebbende een gedoogplicht opleggen voor het tot stand brengen of opruimen van
      werken voor grenswateren als bedoeld in [artikel 1 van de Uitvoeringswet Nederlands-Duits Grensverdrag][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0002412#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.15
    references:
      - id: ref1
        bwb_id: BWBR0002412
        artikel: '1'
  - number: 10.16.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan aan een rechthebbende een gedoogplicht opleggen voor het
      verrichten van onderzoek op een locatie in verband met een omgevingsvergunning voor een ontgrondingsactiviteit of
      een aanvraag om een dergelijke vergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.16
  - number: 10.16.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan op verzoek van de aanvrager of houder van een
      omgevingsvergunning voor een ontgrondingsactiviteit aan een rechthebbende een gedoogplicht opleggen voor het
      verrichten van onderzoek en voor het aanbrengen, in stand houden, onderhouden, gebruiken en verwijderen van de voor
      dat onderzoek benodigde middelen als dat voor de ontgrondingsactiviteit nodig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.16
  - number: 10.16.3
    text: |-
      De bevoegdheden, bedoeld in het eerste en tweede lid, berusten bij gedeputeerde staten als zij bevoegd gezag zijn
      voor de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.16
  - number: 10.17.1
    text: |-
      De beheerder kan aan een rechthebbende een gedoogplicht opleggen voor het verrichten van onderzoek dat nodig is
      voor de aanvraag of wijziging van een omgevingsvergunning voor een wateractiviteit of om te voldoen aan een andere
      in het kader van het waterbeheer op grond van deze wet, een waterschapsverordening of omgevingsverordening op hem
      rustende plicht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.17
  - number: 10.17.2
    text: |-
      De beheerder kan, voor zover dat voor de vervulling van zijn taken redelijkerwijs nodig is, aan een rechthebbende
      een gedoogplicht opleggen voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.17
  - number: 10.17.2.a
    text: |-
      het op of in gronden verrichten van onderzoek en daarmee verband houdende activiteiten in verband met een
      waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.17
  - number: 10.17.2.b
    text: de aanleg of wijziging van een waterstaatswerk en de daarmee verband houdende activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.17
  - number: '10.18'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan aan een rechthebbende een gedoogplicht opleggen als door een
      gemeente, een provincie, het Rijk of een openbaar lichaam voor het bepalen van de mate van luchtverontreiniging
      gebruik moet worden gemaakt van onroerende zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.18
  - number: 10.19.1
    text: |-
      Onze Minister van Onderwijs, Cultuur en Wetenschap kan aan een rechthebbende een gedoogplicht opleggen voor het in
      het belang van een archeologisch onderzoek betreden van terreinen, het daarop verrichten van metingen of het daarin
      doen van opgravingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.19
  - number: 10.19.2
    text: |-
      Het bestuursorgaan dat is belast met de voorbereiding of uitvoering van een omgevingsplan of een
      omgevingsvergunning voor een omgevingsplanactiviteit kan aan een rechthebbende een gedoogplicht opleggen als
      bedoeld in het eerste lid, voor zover dat onderzoek dient ter voorbereiding of uitvoering van het omgevingsplan of
      de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.19
  - number: 10.19.3
    text: |-
      [Artikel 10.11, aanhef en onder d][ref1], is niet van toepassing op de beslissing tot het opleggen van een
      gedoogplicht als bedoeld in dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.1
        afdeling: '10.3'
  - number: 10.19a
    text: |-
      Onze Minister van Defensie kan aan een rechthebbende een gedoogplicht opleggen voor het tot stand brengen of
      opruimen van werken voor de uitoefening van defensietaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.19a
  - number: 10.21.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan aan een rechthebbende een gedoogplicht opleggen voor het
      tot stand brengen of opruimen van een werk van algemeen belang dat geen werk of activiteit is als bedoeld in de
      [artikelen 10.13 tot en met 10.19a][ref1], als het belang van de openbare veiligheid, het belang van het beschermen
      van de fysieke leefomgeving, zwaarwegende economische belangen of zwaarwegende andere maatschappelijke belangen
      dit rechtvaardigen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 10.21.2
    text: |-
      Als de oplegging van een gedoogplicht een belang dient waarvoor de zorg niet bij Onze Minister van Infrastructuur
      en Waterstaat berust, beslist Onze Minister van Infrastructuur en Waterstaat in overeenstemming met Onze Minister
      die het aangaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.21
  - number: 10.21a
    text: |-
      Het college van burgemeester en wethouders kan voor het voorkomen, beperken of ongedaan maken van een
      verontreiniging of aantasting van de bodem aan een rechthebbende een gedoogplicht opleggen voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.21a
  - number: 10.21a.a
    text: het verrichten van onderzoek door de veroorzaker naar de aard en omvang van die verontreiniging of aantasting,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.21a
  - number: 10.21a.b
    text: |-
      het treffen van maatregelen door de veroorzaker voor het voorkomen, beperken of ongedaan maken van die
      verontreiniging of aantasting van de bodem en de directe gevolgen daarvan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.21a
  - number: 10.22.1
    text: 'Een gedoogplichtbeschikking bevat in ieder geval een beschrijving van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.1.a
    text: de onroerende zaak waarop de beschikking betrekking heeft,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.1.b
    text: het werk van algemeen belang waarvoor de beschikking geldt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.1.c
    text: de te verrichten activiteiten en de voorbereiding daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.1.d
    text: de plichten van de rechthebbende,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.1.e
    text: de rechten en plichten van de initiatiefnemer.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.2
    text: |-
      De gedoogplichtbeschikking vermeldt of er voor bepaalde of onbepaalde tijd gebruik wordt gemaakt van de onroerende
      zaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.3
    text: |-
      Als dat voor de instandhouding van het werk van algemeen belang nodig is, kan in de gedoogplichtbeschikking een
      gebied rondom het werk worden vastgesteld waarin in de beschikking te noemen activiteiten niet zijn toegestaan
      zonder voorafgaande toestemming van de initiatiefnemer.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.22.4
    text: Aan een gedoogplichtbeschikking kunnen voorschriften worden verbonden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.22
  - number: 10.23.1
    text: |-
      Op verzoek van de rechthebbende kan de gedoogplichtbeschikking worden gewijzigd als het gaat om de locatie van het
      werk van algemeen belang binnen de desbetreffende onroerende zaak.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.23
  - number: 10.23.2
    text: |-
      Het eerste lid is alleen van toepassing als de rechthebbende over de wijziging van de locatie ondanks een redelijke
      poging daartoe geen overeenstemming heeft bereikt met de initiatiefnemer.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.23
  - number: 10.23.3
    text: |-
      Het verzoek wordt in ieder geval afgewezen als het werk van algemeen belang redelijkerwijs niet op een andere
      locatie tot stand kan worden gebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.23
  - number: '10.24'
    text: |-
      Degene op wie een gedoogplicht op grond van [paragraaf 10.3.2][ref1] rust, gedoogt dat de initiatiefnemer bomen
      en beplantingen rooit, inkort of snoeit voor zover die bomen en beplantingen hinderlijk zijn voor het tot stand
      brengen of opruimen van het werk van algemeen belang.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: '10.25'
    text: |-
      De in de gedoogplichtbeschikking opgenomen rechten en plichten van de rechthebbende en van de initiatiefnemer
      rusten ook op hun rechtsopvolgers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.25
  - number: 10.27.1
    text: |-
      Als de gedoogplichtbeschikking voor een werk van algemeen belang is ingetrokken, ruimt de initiatiefnemer dat werk
      op, tenzij met degene op wie de gedoogplicht rustte anders is overeengekomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.27
  - number: 10.27.2
    text: |-
      Bij de opruiming wordt de onroerende zaak zoveel als mogelijk teruggebracht in de staat van voor de aanleg van het
      werk van algemeen belang, voor zover niet anders is overeengekomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.27
  - number: 10.27.3
    text: |-
      [Artikel 10.25][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.4
        afdeling: '10.3'
  - number: '10.28'
    text: |-
      [Artikel 20, tweede lid, van Boek 5 van het Burgerlijk Wetboek][ref1] is van overeenkomstige toepassing op
      werken van algemeen belang die met toepassing van een gedoogplichtbeschikking worden aangelegd, in stand gehouden,
      gewijzigd of verplaatst.


      [ref1]: https://wetten.overheid.nl/BWBR0005288#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.28
    references:
      - id: ref1
        bwb_id: BWBR0005288
        artikel: '20'
  - number: 10.29.1
    text: |-
      Gedeputeerde staten kunnen of Onze Minister voor Natuur en Stikstof kan besluiten dat de personen of de groepen
      van personen die ter uitvoering van een omgevingsvergunning voor een flora- en fauna-activiteit om de omvang te
      beperken van de populatie van dieren, toegang hebben tot de gronden waar de dieren aanwezig zijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.29
  - number: 10.29.2
    text: |-
      Onze Minister voor Natuur en Stikstof en gedeputeerde staten kunnen besluiten dat personen of groepen van personen
      die ter uitvoering van de taak, bedoeld in respectievelijk [artikel 2.19, vijfde lid, onder a, onder 4°][ref1], en
      [artikel 2.18, eerste lid, onder g, onder 1° of 3°][ref2], zijn belast met de bestrijding van dieren of planten
      van uitheemse soorten of van verwilderde dieren, of de terugdringing van de aantallen aanwezige dieren en planten
      van die soorten, toegang hebben tot de gronden waar de dieren of de planten aanwezig zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.29
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 10.29.3
    text: |-
      Een rechthebbende gedoogt de aanwezigheid op zijn gronden van personen of groepen van personen als bedoeld in het
      eerste en tweede lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.29
  - number: 10.29.4
    text: |-
      Het bevoegd gezag informeert een rechthebbende als bedoeld in het derde lid ten minste achtenveertig uur van te
      voren schriftelijk over de voorgenomen maatregelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.29
  - number: 10.29.5
    text: |-
      In afwijking van het vierde lid kan het informeren mondeling plaatsvinden en geldt de termijn niet, als dit nodig
      is vanwege het spoedeisende karakter van de maatregel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel10.29
  - number: '11.1'
    text: |-
      Onteigening van onroerende zaken in het algemeen belang als bedoeld in [artikel 14 van de Grondwet][ref1] kan
      op grond van dit hoofdstuk plaatsvinden in het algemeen belang van het ontwikkelen, gebruiken of beheren van de
      fysieke leefomgeving.


      [ref1]: https://wetten.overheid.nl/BWBR0001840#Artikel14
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0001840
        artikel: '14'
  - number: 11.2.1
    text: Onteigening kan plaatsvinden op naam van een onteigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2
    text: 'Onteigenaar kunnen zijn:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2.a
    text: een gemeente,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2.b
    text: een waterschap,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2.c
    text: een provincie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2.d
    text: de Staat,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.2.2.e
    text: |-
      een andere rechtspersoon met volledige rechtsbevoegdheid waaraan de verwezenlijking van de beoogde vorm van
      ontwikkeling, gebruik of beheer van de fysieke leefomgeving is toegestaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.2
  - number: 11.3.1
    text: De onteigeningsbeschikking wijst de te onteigenen onroerende zaken aan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
  - number: 11.3.2
    text: 'Op verzoek van de eigenaar neemt het bevoegd gezag in de onteigeningsbeschikking ook ter onteigening op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
  - number: 11.3.2.a
    text: een volledig gebouw, als de onteigenaar het voornemen heeft alleen een gedeelte van het gebouw te onteigenen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
  - number: 11.3.2.b
    text: 'volledige erven:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
  - number: 11.3.2.b.1°
    text: |-
      als de onteigenaar het voornemen heeft alleen een gedeelte van een erf te onteigenen en daardoor 25% of minder van
      de omvang overblijft of als het erf daardoor kleiner wordt dan 10 are, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
    machine_readable:
      execution:
        parameters:
          - name: totale_omvang_erf_are
            type: number
            required: true
            description: Totale omvang van het erf in are
          - name: te_onteigenen_omvang_are
            type: number
            required: true
            description: Omvang van het te onteigenen gedeelte in are
        output:
          - name: eigenaar_kan_volledig_erf_eisen
            type: boolean
            description: Of de eigenaar opname van het volledige erf in de onteigening kan eisen
        actions:
          - output: overblijvend_omvang_are
            value:
              operation: SUBTRACT
              values:
                - $totale_omvang_erf_are
                - $te_onteigenen_omvang_are
          - output: overblijvend_percentage
            value:
              operation: MULTIPLY
              values:
                - operation: DIVIDE
                  values:
                    - $overblijvend_omvang_are
                    - $totale_omvang_erf_are
                - 100
          - output: eigenaar_kan_volledig_erf_eisen
            value:
              operation: OR
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $overblijvend_percentage
                  value: 25
                - operation: LESS_THAN
                  subject: $overblijvend_omvang_are
                  value: 10
  - number: 11.3.2.b.2°
    text: als het overgebleven erf niet onmiddellijk grenst aan een ander erf van dezelfde eigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.3
  - number: 11.4.1
    text: 'Een onteigeningsbeschikking kan worden gegeven door:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.1.a
    text: de gemeenteraad van de gemeente waarin de onroerende zaak ligt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.1.b
    text: het algemeen bestuur van het waterschap waarin de onroerende zaak ligt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.1.c
    text: provinciale staten van de provincie waarin de onroerende zaak ligt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.1.d
    text: Onze Minister die het aangaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.2
    text: |-
      Het algemeen bestuur van een waterschap kan alleen een onteigeningsbeschikking geven met het oog op de taken,
      bedoeld in [artikel 2.17, eerste lid, aanhef en onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 11.4.3
    text: 'Provinciale staten kunnen alleen een onteigeningsbeschikking geven als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.3.a
    text: het onteigeningsbelang een provinciaal belang betreft, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.3.b
    text: dat doelmatig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.4
    text: 'Onze Minister die het aangaat kan alleen een onteigeningsbeschikking geven als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.4.a
    text: het onteigeningsbelang een nationaal belang betreft, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: 11.4.4.b
    text: dat doelmatig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.4
  - number: '11.5'
    text: 'Een onteigeningsbeschikking kan alleen worden gegeven:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.5
    machine_readable:
      execution:
        parameters:
          - name: in_belang_fysieke_leefomgeving
            type: boolean
            required: true
            description: >-
              Of de onteigening in het belang is van het
              ontwikkelen, gebruiken of beheren van de fysieke
              leefomgeving
          - name: onteigening_noodzakelijk
            type: boolean
            required: true
            description: Of onteigening noodzakelijk is
          - name: onteigening_urgent
            type: boolean
            required: true
            description: Of onteigening urgent is
        output:
          - name: onteigeningsbeschikking_toegestaan
            type: boolean
            description: Of een onteigeningsbeschikking kan worden gegeven
        actions:
          - output: onteigeningsbeschikking_toegestaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $in_belang_fysieke_leefomgeving
                  value: true
                - operation: EQUALS
                  subject: $onteigening_noodzakelijk
                  value: true
                - operation: EQUALS
                  subject: $onteigening_urgent
                  value: true
  - number: 11.5.a
    text: in het belang van het ontwikkelen, gebruiken of beheren van de fysieke leefomgeving,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.5
  - number: 11.5.b
    text: als onteigening noodzakelijk is, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.5
  - number: 11.5.c
    text: als onteigening urgent is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.5
  - number: '11.6'
    text: |-
      Van een onteigeningsbelang is alleen sprake als de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke
      leefomgeving:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.6
  - number: 11.6.a
    text: |-
      onder uitsluiting van de bestaande vorm van ontwikkeling, gebruik of beheer, mogelijk is gemaakt in een vastgesteld
      omgevingsplan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.6
  - number: 11.6.b
    text: mogelijk is gemaakt in een verleende omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.6
  - number: 11.6.c
    text: mogelijk is gemaakt door een vastgesteld projectbesluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.6
  - number: 11.7.1
    text: 'De noodzaak tot onteigening ontbreekt in ieder geval als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.1.a
    text: |-
      de onteigenaar geen redelijke poging heeft gedaan tot minnelijke verwerving van de onroerende zaak vrij van rechten
      en lasten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.1.b
    text: |-
      de onteigenaar geen redelijke poging heeft gedaan om overeenstemming te bereiken over het vervallen van zakelijke
      of persoonlijke rechten op de onroerende zaak,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.1.c
    text: |-
      aannemelijk is dat op afzienbare termijn alsnog overeenstemming kan worden bereikt over de minnelijke verwerving
      van de onroerende zaak vrij van rechten en lasten en die overeenstemming zal leiden tot een spoedige levering
      daarvan, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.1.d
    text: |-
      aannemelijk is dat op afzienbare termijn alsnog overeenstemming kan worden bereikt over het vervallen van zakelijke
      of persoonlijke rechten op de onroerende zaak en die overeenstemming zal leiden tot het spoedig vervallen van die
      rechten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.2
    text: 'De noodzaak tot onteigening ontbreekt ook als de eigenaar van of een beperkt gerechtigde op de onroerende zaak:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.2.a
    text: |-
      aantoont bereid en in staat te zijn om de verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of beheer
      van de fysieke leefomgeving op zich te nemen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.2.b
    text: daarvoor concrete en op uitvoering gerichte voornemens heeft en die aan het bevoegd gezag kenbaar heeft gemaakt, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.2.c
    text: |-
      de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving zal verwezenlijken op de door het
      bevoegd gezag beoogde wijze.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.3
    text: 'Het tweede lid is niet van toepassing als het gaat om een onroerende zaak waarvoor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
  - number: 11.7.3.a
    text: |-
      niet eerder een onteigeningsbeschikking is gegeven vanwege het ontbreken van de noodzaak tot onteigening, bedoeld
      in [artikel 11.5, onder b][ref1], in samenhang met dat lid, en binnen drie jaar na het kenbaar maken, bedoeld
      in dat lid, onder b, vanwege oorzaken die de eigenaar of beperkt gerechtigde had kunnen voorkomen geen begin is
      gemaakt met de verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving,
      of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.7.3.b
    text: |-
      in de bekrachtigingsprocedure of in hoger beroep het verzoek tot bekrachtiging van de onteigeningsbeschikking is
      afgewezen respectievelijk de onteigeningsbeschikking is vernietigd vanwege het kennelijk ontbreken van de noodzaak
      tot onteigening, bedoeld in [artikel 11.5, onder b][ref1], in samenhang met dat lid, en binnen drie jaar na die
      uitspraak vanwege oorzaken die de eigenaar of beperkt gerechtigde had kunnen voorkomen geen begin is gemaakt met de
      verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: '11.8'
    text: |-
      Als het onteigeningsbelang verband houdt met de handhaving van de openbare orde rond een gebouw als bedoeld in
      [artikel 13b, tweede lid, van de Woningwet][ref1], die is verstoord door gedragingen in of in de onmiddellijke
      nabijheid van dat gebouw, ontbreekt de noodzaak tot onteigening, tenzij de uitoefening van de bevoegdheden, bedoeld
      in artikel 13b, tweede lid, van die wet, geen uitzicht heeft geboden op een duurzaam herstel van of duurzame
      voorkoming van ernstige verstoring van de openbare orde rond dat gebouw.


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel13b
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.8
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 13b
  - number: '11.9'
    text: |-
      Als het onteigeningsbelang verband houdt met de handhaving van de [artikelen 2][ref1], [2a][ref2],
      [3][ref3], [10a, eerste lid, aanhef en onder 3°][ref4], [10c, eerste lid, aanhef en onder 3°][ref5], en
      [11a van de Opiumwet][ref6] in een gebouw als bedoeld in [artikel 13b, tweede lid, van de Woningwet][ref7],
      ontbreekt de noodzaak tot onteigening, tenzij de uitoefening van de bevoegdheden, bedoeld in artikel 13b, tweede
      lid, van de Woningwet, geen uitzicht heeft geboden op het duurzaam achterwege blijven van een overtreding van
      artikel 2, 2a, 3, 10a, eerste lid, aanhef en onder 3°, 10c, eerste lid, aanhef en onder 3°, of 11a van de Opiumwet
      in het gebouw.


      [ref1]: https://wetten.overheid.nl/BWBR0001941#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0001941#Artikel2a
      [ref3]: https://wetten.overheid.nl/BWBR0001941#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0001941#Artikel10a
      [ref5]: https://wetten.overheid.nl/BWBR0001941#Artikel10c
      [ref6]: https://wetten.overheid.nl/BWBR0001941#Artikel11a
      [ref7]: https://wetten.overheid.nl/BWBR0005181#Artikel13b
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0001941
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0001941
        artikel: 2a
      - id: ref3
        bwb_id: BWBR0001941
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0001941
        artikel: 10a
      - id: ref5
        bwb_id: BWBR0001941
        artikel: 10c
      - id: ref6
        bwb_id: BWBR0001941
        artikel: 11a
      - id: ref7
        bwb_id: BWBR0005181
        artikel: 13b
  - number: '11.10'
    text: |-
      Als het onteigeningsbelang verband houdt met het opheffen van een overtreding als bedoeld in
      [artikel 17 van de Woningwet][ref1] in een gebouw of op een open erf of een terrein als bedoeld in dat
      artikel, ontbreekt de noodzaak tot onteigening, tenzij de uitoefening van de bevoegdheden, bedoeld in
      [artikel 13b, tweede lid, van die wet][ref2], geen uitzicht heeft geboden op het duurzaam achterwege blijven van
      een zodanige overtreding.


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0005181#Artikel13b
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.10
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: '17'
      - id: ref2
        bwb_id: BWBR0005181
        artikel: 13b
  - number: '11.11'
    text: |-
      De urgentie ontbreekt in ieder geval als niet aannemelijk is dat binnen drie jaar na het inschrijven van de
      onteigeningsakte een begin wordt gemaakt met de verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of
      beheer van de fysieke leefomgeving waarvoor onteigening nodig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.11
    machine_readable:
      execution:
        parameters:
          - name: datum_inschrijving_akte
            type: date
            required: true
            description: Datum van inschrijving van de onteigeningsakte
        output:
          - name: uiterste_aanvangsdatum
            type: date
            description: Uiterste datum waarop een begin moet zijn gemaakt met de verwezenlijking
        actions:
          - output: uiterste_aanvangsdatum
            value:
              operation: DATE_ADD
              date: $datum_inschrijving_akte
              years: 3
  - number: '11.12'
    text: |-
      De onteigeningsbeschikking vervalt als de onteigenaar niet uiterlijk binnen twaalf maanden na het onherroepelijk
      worden van die beschikking de rechtbank binnen het rechtsgebied waarvan de te onteigenen onroerende zaak geheel of
      grotendeels ligt, verzoekt om de schadeloosstelling vast te stellen volgens [afdeling 15.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '15'
        afdeling: '15.3'
    machine_readable:
      execution:
        parameters:
          - name: datum_onherroepelijk
            type: date
            required: true
            description: Datum waarop de onteigeningsbeschikking onherroepelijk is geworden
        output:
          - name: uiterste_datum_verzoek_schadeloosstelling
            type: date
            description: Uiterste datum waarop de onteigenaar de rechtbank moet verzoeken
        actions:
          - output: uiterste_datum_verzoek_schadeloosstelling
            value:
              operation: DATE_ADD
              date: $datum_onherroepelijk
              months: 12
  - number: '11.13'
    text: |-
      [Artikel 3:20, aanhef en onder b, van de Algemene wet bestuursrecht][ref1] en [artikel 5.45, eerste lid][ref2],
      zijn niet van toepassing op een onteigeningsbeschikking.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.13
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: '11.14'
    text: |-
      Nadat de onteigeningsbeschikking is bekendgemaakt, kan de onteigenaar de rechtbank binnen het rechtsgebied waarvan
      de te onteigenen onroerende zaak geheel of grotendeels ligt, verzoeken de schadeloosstelling vast te stellen
      volgens [afdeling 15.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: '11.15'
    text: |-
      Uiterlijk binnen twee maanden nadat aan alle voorwaarden, bedoeld in [artikel 11.16, eerste lid][ref1], is voldaan,
      verzoekt de onteigenaar een notaris de onteigeningsakte te verlijden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel11
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.4'
    machine_readable:
      execution:
        parameters:
          - name: datum_voorwaarden_vervuld
            type: date
            required: true
            description: Datum waarop aan alle voorwaarden van artikel 11.16 lid 1 is voldaan
        output:
          - name: uiterste_datum_verzoek_notaris
            type: date
            description: Uiterste datum waarop de onteigenaar de notaris moet verzoeken
        actions:
          - output: uiterste_datum_verzoek_notaris
            value:
              operation: DATE_ADD
              date: $datum_voorwaarden_vervuld
              months: 2
  - number: 11.16.1
    text: 'Een onteigeningsakte kan alleen worden verleden als:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.1.a
    text: de onteigeningsbeschikking onherroepelijk is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.1.b
    text: het besluit ter uitvoering waarvan de onteigening nodig is onherroepelijk is, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.1.c
    text: |-
      de voorlopige schadeloosstelling, bedoeld in [artikel 15.43][ref1], of de overeengekomen schadeloosstelling die is
      opgenomen in een proces-verbaal, is betaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.2
        afdeling: '15.3'
  - number: 11.16.2
    text: 'De onherroepelijkheid van de onteigeningsbeschikking wordt aangetoond door het overleggen van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.2.a
    text: de uitspraak in hoger beroep tegen een uitspraak op een verzoek tot bekrachtiging, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.2.b
    text: |-
      een verklaring van de griffier van de Afdeling bestuursrechtspraak van de Raad van State waaruit blijkt dat tegen
      de uitspraak op het verzoek tot bekrachtiging binnen de beroepstermijn geen hoger beroep is ingesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.3
    text: |-
      De onherroepelijkheid van het besluit ter uitvoering waarvan de onteigening nodig is, wordt aangetoond door het
      overleggen van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.3.a
    text: de uitspraak tegen dat besluit door de Afdeling bestuursrechtspraak van de Raad van State,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.3.b
    text: |-
      een verklaring van de griffier van de rechtbank of een verklaring van de griffier van de Afdeling
      bestuursrechtspraak van de Raad van State waaruit blijkt dat tegen dat besluit binnen de beroepstermijn geen beroep
      is ingesteld, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.3.c
    text: |-
      een verklaring van de griffier van de Afdeling bestuursrechtspraak van de Raad van State waaruit blijkt dat tegen
      de uitspraak op het beroep tegen het besluit binnen de beroepstermijn geen hoger beroep is ingesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.4
    text: |-
      De betaling van de voorlopige schadeloosstelling of de overeengekomen schadeloosstelling wordt aangetoond door het
      overleggen van een betalingsbewijs. Als betalingsbewijs geldt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.4.a
    text: |-
      een bewijs dat de som van de voorlopige schadeloosstelling of de overeengekomen schadeloosstelling is
      overgeschreven op een rekening die de tot ontvangst gerechtigde aanhoudt bij een financiële onderneming die in
      Nederland op grond van de Wet op het financieel toezicht het bedrijf van bank mag uitoefenen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
  - number: 11.16.4.b
    text: |-
      een consignatiebewijs als bedoeld in [artikel 6, eerste lid, van de Wet op de consignatie van gelden][ref1], als
      niet genoegzaam bekend is wie tot ontvangst gerechtigd is of consignatie heeft plaatsgevonden op grond van de
      [artikelen 15.49][ref2] en [15.50][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0003338#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.16
    references:
      - id: ref1
        bwb_id: BWBR0003338
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.3
        afdeling: '15.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.3
        afdeling: '15.3'
  - number: '11.17'
    text: Een onteigeningsakte wordt ondertekend door de onteigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.17
  - number: 11.18.1
    text: |-
      Met het inschrijven van een door een notaris verleden onteigeningsakte in de openbare registers verkrijgt de
      onteigenaar de eigendom vrij van alle lasten en rechten die met betrekking tot de zaak bestaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.18
  - number: 11.18.2
    text: |-
      De bewaarder van het kadaster en de openbare registers tekent ambtshalve de door de inschrijving van de
      onteigeningsakte niet meer bestaande inschrijvingen van hypotheken en beslagen aan in de basisregistratie kadaster
      en in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.18
  - number: 11.18.3
    text: |-
      Erfdienstbaarheden kunnen op de onteigende zaak gevestigd blijven. Zij worden daarvoor in de onteigeningsakte
      opgenomen. Als zij niet door vestiging zijn ontstaan, worden de kadastrale aanduiding van het heersende erf en een
      omschrijving van de erfdienstbaarheid in de onteigeningsakte opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.18
  - number: '11.19'
    text: |-
      Waterschaps- en soortgelijke lasten en alle belastingen waarmee de onteigende zaak is bezwaard of die daarover
      worden betaald, gaan met ingang van de dag waarop de onteigeningsakte in de openbare registers is ingeschreven over
      op de onteigenaar.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.19
  - number: 11.20.1
    text: |-
      Op verzoek van de onteigenaar kan de voorzieningenrechter bij een in executoriale vorm afgegeven bevelschrift de
      nodige bevelen geven om de onteigenaar in het bezit van de onteigende onroerende zaak te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.20
  - number: 11.20.2
    text: |-
      Bij zijn verzoek overlegt de onteigenaar een afschrift van de onteigeningsakte en een bewijs van inschrijving
      daarvan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.20
  - number: 11.20.3
    text: Tegen een bevelschrift als bedoeld in het eerste lid staat geen hogere voorziening open.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.20
  - number: 11.21.1
    text: |-
      De onteigenaar biedt aan de onteigende de mogelijkheid het onteigende teruggeleverd te krijgen als vanwege oorzaken
      die de onteigenaar had kunnen voorkomen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.1.a
    text: |-
      met de verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving waarvoor
      werd onteigend niet binnen drie jaar nadat de onteigeningsakte is ingeschreven in de openbare registers een begin
      is gemaakt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.1.b
    text: de werkzaamheden meer dan drie jaar zijn gestaakt, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.1.c
    text: |-
      op een andere manier kan worden aangetoond dat de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke
      leefomgeving waarvoor werd onteigend blijkbaar niet zal worden verwezenlijkt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.2
    text: |-
      Het onteigende wordt teruggeleverd in de toestand waarin het zich dan bevindt. De onteigende is gehouden om de
      schadeloosstelling terug te geven in evenredigheid tot de terugontvangen waarde.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.3
    text: |-
      Als de onteigende te kennen geeft geen gebruik te maken van het aanbod tot teruglevering, bedoeld in het eerste
      lid, kan hij een door de rechtbank binnen het rechtsgebied waarvan de te onteigenen onroerende zaak geheel of
      grotendeels ligt naar billijkheid te bepalen schadeloosstelling boven de al ontvangen schadeloosstelling vorderen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.4
    text: |-
      Als de onteigenaar niet binnen drie maanden na afloop van de in het eerste lid bedoelde termijn van drie jaar een
      aanbod tot teruglevering heeft gedaan, kan de onteigende naar keuze:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.4.a
    text: |-
      bij de rechter het onteigende terugvorderen in de toestand waarin het zich bevindt, waarbij hij gehouden is om de
      schadeloosstelling terug te geven in evenredigheid tot de terugontvangen waarde, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.4.b
    text: |-
      een door de rechter naar billijkheid te bepalen schadeloosstelling boven de al ontvangen schadeloosstelling
      vorderen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: 11.21.5
    text: |-
      Van de verwezenlijking van de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving waarvoor
      werd onteigend, is ook sprake bij niet-ingrijpende aanpassingen of aanpassingen van geringe omvang van de beoogde
      vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving of aanpassingen van die vorm die passen binnen
      het kader ter uitvoering waarvan tot onteigening is overgegaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel11.21
  - number: '12.1'
    text: 'In dit hoofdstuk en de daarop berustende bepalingen wordt verstaan onder *rechthebbende*:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.1
  - number: 12.1.a
    text: eigenaar en degene aan wie een beperkt recht toebehoort waaraan een onroerende zaak is onderworpen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.1
  - number: 12.1.b
    text: huurder van een onroerende zaak, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.1
  - number: 12.1.c
    text: |-
      schuldeiser van een verbintenis die ten aanzien van een onroerende zaak een verplichting als bedoeld in
      [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1] inhoudt.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.1
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: '12.2'
    text: |-
      Dit hoofdstuk en de daarop berustende bepalingen die eigenaren betreffen, zijn van overeenkomstige toepassing op
      opstallers, erfpachters, beklemde meiers, vruchtgebruikers, houders van een recht van gebruik of bewoning van een
      onroerende zaak, en appartementseigenaren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.2
  - number: 12.3.1
    text: |-
      Landinrichting strekt tot verbetering van de inrichting van het landelijk gebied in overeenstemming met de functies
      die aan de betrokken locaties zijn toegedeeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.2
    text: 'Bij landinrichting kunnen de volgende maatregelen en voorzieningen worden getroffen:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.2.a
    text: het wijzigen van het stelsel van wegen of waterstaatswerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.2.b
    text: |-
      aanleg, ontwikkeling, behoud, beheer of herstel van gebieden van belang uit een oogpunt van natuurbescherming of
      landschapsbehoud of van elementen van landschappelijke, recreatieve, aardkundige of natuurwetenschappelijke waarde,
      of cultureel erfgoed, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.2.c
    text: andere maatregelen of voorzieningen van openbaar nut.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.3
    text: |-
      Bij landinrichting kan worden voorzien in de toedeling van eigendom, het beheer en het onderhoud van voorzieningen
      van openbaar nut.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
  - number: 12.3.4
    text: |-
      Herverkaveling kan deel uitmaken van landinrichting, waarbij korting als bedoeld in [artikel 12.29][ref1] kan
      worden toegepast als het nodig is de eigendom van onroerende zaken te verwerven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.4.1
    text: |-
      Bevoegdheden over landinrichting kunnen worden uitgeoefend door gedeputeerde staten van de provincie waarin het in
      te richten gebied geheel of grotendeels ligt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.4
  - number: 12.4.2
    text: |-
      [Artikel 3, eerste lid, onderdeel r, van de Kadasterwet][ref1] is van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0004541#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.4
    references:
      - id: ref1
        bwb_id: BWBR0004541
        artikel: '3'
  - number: '12.5'
    text: |-
      Zonder toestemming van Onze Minister van Defensie wordt geen wijziging gebracht in de staat en werking van locaties
      die ook een functie voor de landsverdediging vervullen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.5
  - number: '12.6'
    text: |-
      Als herverkaveling deel uitmaakt van de landinrichting, wordt een zo nauwkeurig mogelijke raming gemaakt van de
      kosten daarvan en van het aandeel van die kosten dat ten laste zal worden gebracht van de gezamenlijke eigenaren in
      het te herverkavelen blok.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.6
  - number: '12.7'
    text: 'Een inrichtingsbesluit wordt gelijktijdig met het inrichtingsprogramma vastgesteld, als bij de landinrichting:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.7
  - number: 12.7.a
    text: eigendom, beheer of onderhoud van voorzieningen van openbaar nut worden toegedeeld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.7
  - number: 12.7.b
    text: herverkaveling of korting wordt toegepast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.7
  - number: 12.8.1
    text: 'Een inrichtingsbesluit voorziet, voor zover van toepassing, in:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.1.a
    text: de toedeling van eigendom van wegen of waterstaatswerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.1.b
    text: de toedeling van het beheer en het onderhoud van openbare wegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.1.c
    text: |-
      de toedeling van eigendom, het beheer en het onderhoud van gebieden van belang uit een oogpunt van
      natuurbescherming of landschapsbehoud of van elementen van landschappelijke, recreatieve, aardkundige of
      natuurwetenschappelijke waarde, of cultureel erfgoed, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.1.d
    text: de toedeling van eigendom, het beheer en het onderhoud van andere voorzieningen van openbaar nut.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.2
    text: |-
      Als herverkaveling deel uitmaakt van de landinrichting, bevat het inrichtingsbesluit een verbeelding waarop de
      begrenzing van het herverkavelingsblok zo nauwkeurig mogelijk is aangegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.8.3
    text: |-
      Als het nodig is om de eigendom van onroerende zaken te verwerven voor de verwezenlijking van maatregelen en
      voorzieningen van openbaar nut, bevat het inrichtingsbesluit een aanduiding van die maatregelen en voorzieningen en
      bepaalt het dat daarvoor korting kan worden toegepast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.8
  - number: 12.9.1
    text: |-
      In afwijking van de [artikelen 8][ref1] en [9 van de Wegenwet][ref2] kan in een inrichtingsbesluit worden bepaald
      dat een openbare weg aan het openbaar verkeer wordt onttrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0001948#Artikel9
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.9
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0001948
        artikel: '9'
  - number: 12.9.2
    text: |-
      In afwijking van de [artikelen 4][ref1] en [5 van de Wegenwet][ref2] kan in een inrichtingsbesluit worden bepaald
      dat een weg voor het openbaar verkeer wordt opengesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0001948#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.9
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0001948
        artikel: '5'
  - number: 12.9.3
    text: |-
      De onttrekking aan en openstelling voor het openbaar verkeer gaan in op een tijdstip dat in het inrichtingsbesluit
      wordt bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.9
  - number: 12.10.1
    text: 'Bij landinrichting wordt geen wijziging gebracht in de rechten en de gebruikstoestand van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.10
  - number: 12.10.1.a
    text: |-
      begraafplaatsen, crematoria en bewaarplaatsen als bedoeld in de [artikelen 23][ref1], [49][ref2] en
      [62, eerste lid, onder c, van de Wet op de lijkbezorging][ref3],


      [ref1]: https://wetten.overheid.nl/BWBR0005009#Artikel23
      [ref2]: https://wetten.overheid.nl/BWBR0005009#Artikel49
      [ref3]: https://wetten.overheid.nl/BWBR0005009#Artikel62
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.10
    references:
      - id: ref1
        bwb_id: BWBR0005009
        artikel: '23'
      - id: ref2
        bwb_id: BWBR0005009
        artikel: '49'
      - id: ref3
        bwb_id: BWBR0005009
        artikel: '62'
  - number: 12.10.1.b
    text: |-
      gesloten begraafplaatsen en graven of grafkelders als bedoeld in [artikel 85 van de Wet op de lijkbezorging][ref1],
      binnen de termijnen, bedoeld in [artikel 46, tweede en derde lid, van die wet][ref2] en anders dan op de wijze,
      omschreven in artikel 46, derde lid, van die wet.


      [ref1]: https://wetten.overheid.nl/BWBR0005009#Artikel85
      [ref2]: https://wetten.overheid.nl/BWBR0005009#Artikel46
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.10
    references:
      - id: ref1
        bwb_id: BWBR0005009
        artikel: '85'
      - id: ref2
        bwb_id: BWBR0005009
        artikel: '46'
  - number: 12.10.2
    text: Zonder toestemming van de eigenaar wordt geen wijziging gebracht in zijn rechten ten aanzien van gebouwen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.10
  - number: 12.11.1
    text: |-
      De toedeling van eigendom van wegen of waterstaatswerken, bedoeld in [artikel 12.8, eerste lid, onder a][ref1],
      vindt plaats aan de betrokken openbare lichamen of andere rechtspersonen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 12.11.2
    text: |-
      De toedeling van het beheer en het onderhoud van openbare wegen, bedoeld in
      [artikel 12.8, eerste lid, onder b][ref1], vindt plaats aan de betrokken openbare lichamen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 12.11.3
    text: |-
      In afwijking van het tweede lid kan het onderhoud van openbare wegen worden toegedeeld aan andere rechtspersonen
      dan openbare lichamen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.11
  - number: 12.12.1
    text: |-
      De toedeling van eigendom van openbare wegen of waterstaatswerken of het beheer of het onderhoud van openbare wegen
      aan een rechtspersoon, niet zijnde een openbaar lichaam, vindt alleen plaats als overeenstemming is bereikt met de
      betrokken rechtspersoon, tenzij de eigendom, het beheer of het onderhoud voorafgaand aan de landinrichting bij die
      rechtspersoon berustte.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: 12.12.2
    text: |-
      De toedeling van eigendom van openbare wegen of waterstaatswerken en van het beheer of het onderhoud van openbare
      wegen aan openbare lichamen vindt plaats zonder geldelijke verrekening, tenzij dit tot onredelijke gevolgen voor
      het betrokken openbaar lichaam zou leiden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: 12.12.3
    text: 'Toestemming van Onze Minister die het aangaat is vereist voor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: 12.12.3.a
    text: de onttrekking van de eigendom van openbare wegen of waterstaatswerken aan het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: 12.12.3.b
    text: de onttrekking van het beheer en het onderhoud van openbare wegen aan het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: 12.12.3.c
    text: |-
      de toedeling van eigendom, het beheer of het onderhoud van openbare wegen aan het Rijk, tenzij de eigendom, het
      beheer of het onderhoud voorafgaand aan de landinrichting bij het Rijk berustte.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.12
  - number: '12.13'
    text: |-
      De eigendom, het beheer en het onderhoud van de gebieden en voorzieningen van openbaar nut, bedoeld in
      [artikel 12.8, eerste lid, onder c en d][ref1], worden toegedeeld aan:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 12.13.a
    text: de provincie, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.13
  - number: 12.13.b
    text: |-
      een ander openbaar lichaam of een andere rechtspersoon dan de provincie, als dit lichaam of deze rechtspersoon
      daarmee instemt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.13
  - number: 12.14.1
    text: |-
      Voor zover het beheer of het onderhoud van openbare wegen voorafgaand aan de landinrichting niet berustte bij het
      betrokken openbaar lichaam of de betrokken rechtspersoon, gaan het beheer en het onderhoud over op het tijdstip van
      bekendmaking van het inrichtingsbesluit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.14
  - number: 12.14.2
    text: |-
      Het beheer of het onderhoud gaan over op een later, door gedeputeerde staten te bepalen, tijdstip dan bedoeld in
      het eerste lid als:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.14
  - number: 12.14.2.a
    text: aan bestaande wegen werkzaamheden tot verbetering daarvan worden uitgevoerd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.14
  - number: 12.14.2.b
    text: het nieuwe wegen betreft.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.14
  - number: 12.15.1
    text: |-
      Vanaf het tijdstip waarop op grond van [artikel 12.18][ref1] een instructie is gegeven tot de uitvoering van
      werkzaamheden tot verbetering van bestaande wegen tot het tijdstip, bedoeld in [artikel 12.14][ref2], tweede lid,
      berusten het beheer of het onderhoud van de betrokken wegen bij gedeputeerde staten van de provincie waarin deze
      wegen geheel of grotendeels liggen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.3.2
        afdeling: '12.3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.2
        afdeling: '12.2'
  - number: 12.15.2
    text: |-
      Het beheer en het onderhoud van nieuwe openbare wegen berusten tot het tijdstip, bedoeld in
      [artikel 12.14, tweede lid][ref1], bij gedeputeerde staten van de provincie waarin deze wegen geheel of grotendeels
      liggen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.2
        afdeling: '12.2'
  - number: '12.16'
    text: Gedeputeerde staten voeren het inrichtingsprogramma en, voor zover van toepassing, het inrichtingsbesluit uit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.16
  - number: 12.17.1
    text: Het inrichtingsprogramma of het inrichtingsbesluit kan in delen worden uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.17
  - number: 12.17.2
    text: |-
      Gedeputeerde staten kunnen bepalen bepaalde maatregelen of voorzieningen als bedoeld in
      [artikel 12.3, tweede lid][ref1], alleen uit te voeren als zij met een ander openbaar lichaam dan het Rijk
      overeenstemming hebben bereikt over de geldelijke bijdrage van het openbaar lichaam in de kosten van de maatregelen
      of voorzieningen en over de voorwaarden waaronder de bijdrage wordt betaald.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.2
        afdeling: '12.1'
  - number: 12.18.1
    text: |-
      Gedeputeerde staten van de provincie waar de werkzaamheden, vermeld in het inrichtingsprogramma, in hoofdzaak
      worden verricht, kunnen een instructie geven aan bestuursorganen van openbare lichamen anders dan het Rijk, waarbij
      het beheer of onderhoud van wegen, waterstaatswerken, gebieden van belang uit een oogpunt van natuurbescherming
      of landschapsbehoud of van elementen van landschappelijke, recreatieve, aardkundige of natuurwetenschappelijke
      waarde, of cultureel erfgoed, of andere voorzieningen van openbaar nut, berust of vermoedelijk komt te berusten.
      Bij de instructie kan worden bepaald dat deze bestuursorganen werkzaamheden verrichten ten aanzien van deze wegen,
      waterstaatswerken, gebieden, elementen of andere voorzieningen van openbaar nut.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.18
  - number: 12.18.2
    text: Bij de instructie kan een termijn worden gesteld waarbinnen uitvoering moet zijn gegeven aan de instructie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.18
  - number: 12.18.3
    text: |-
      Onze Minister die het aangaat beslist over de uitvoering van werkzaamheden ten aanzien van de wegen,
      waterstaatswerken, gebieden en voorzieningen van openbaar nut, bedoeld in [artikel 12.8, eerste lid][ref1], waarvan
      het beheer of het onderhoud vermoedelijk bij het Rijk komt te berusten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: '12.19'
    text: |-
      Met het verrichten van werkzaamheden als bedoeld in [artikel 10.10f, eerste lid][ref1], wordt niet begonnen dan
      nadat gedeputeerde staten een beschrijving van de betrokken onroerende zaak hebben gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: '12.20'
    text: |-
      Voor de toepassing van deze afdeling zijn gedeputeerde staten van de provincie waarin het herverkavelingsblok
      geheel of grotendeels ligt het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.20
  - number: 12.21.1
    text: Percelen of delen van percelen die tot een herverkavelingsblok behoren, kunnen tijdelijk in gebruik worden gegeven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.21
  - number: 12.21.2
    text: |-
      Op het tijdelijk in gebruik geven van percelen zijn de voor pacht geldende wettelijke bepalingen niet van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.21
  - number: 12.21.3
    text: |-
      Ook percelen die na toepassing van [artikel 12.29, aanhef en onder c of d][ref1], aan openbare lichamen en
      rechtspersonen worden toegewezen, kunnen aan hen tijdelijk in gebruik worden gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.22.1
    text: Voor elk herverkavelingsblok wordt een ruilbesluit vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.22
  - number: 12.22.2
    text: 'Het ruilbesluit bevat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.22
  - number: 12.22.2.a
    text: een lijst van rechthebbenden, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.22
  - number: 12.22.2.b
    text: bepalingen over kavels en rechten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.22
  - number: 12.23.1
    text: |-
      De lijst van rechthebbenden vermeldt voor de percelen binnen het herverkavelingsblok zo volledig mogelijk voor alle
      rechthebbenden de aard en de omvang van het door hen ingebrachte recht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.23.2
    text: De lijst van rechthebbenden wordt opgemaakt aan de hand van de openbare registers en de basisregistratie kadaster.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.23.3
    text: |-
      Nadat het ruilbesluit onherroepelijk is geworden, worden alleen degenen die voorkomen op de lijst van
      rechthebbenden of hun rechtverkrijgenden als rechthebbende erkend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.23.4
    text: 'Rechtverkrijgende is:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.23.4.a
    text: |-
      degene die een onroerende zaak of een beperkt recht verkrijgt en waarvan de verkrijging blijkt uit in de openbare
      registers ingeschreven stukken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.23.4.b
    text: |-
      degene die schuldeiser wordt van een verbintenis die ten aanzien van een onroerende zaak een verplichting als
      bedoeld in [artikel 252 van Boek 6 van het Burgerlijk Wetboek][ref1] inhoudt en waarvan dit blijkt uit in de
      openbare registers ingeschreven stukken,


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: 12.23.4.c
    text: degene die onder algemene titel een recht van huur verkrijgt dat is vermeld op de lijst van rechthebbenden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.23
  - number: 12.24.1
    text: 'De bepalingen over kavels en rechten in het ruilbesluit omvatten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.1.a
    text: de kavelindeling,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.1.b
    text: de toewijzing van rechten op kavels aan eigenaren,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.1.c
    text: |-
      de begrenzing van de eigendom van de openbare wegen of waterstaatswerken, gebieden, elementen en de andere
      voorzieningen van openbaar nut, bedoeld in [artikel 12.8, eerste lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 12.24.1.d
    text: |-
      de te handhaven, op te heffen en te vestigen pachtverhoudingen, onder vermelding van de in
      [artikel 12.28, derde lid][ref1], bedoelde bepalingen over de duur en verlengbaarheid van de pachtovereenkomst,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.24.1.e
    text: |-
      de in [artikel 12.35][ref1] bedoelde regeling, opheffing of vestiging van de beperkte rechten, het recht van huur
      en de lasten die voor de onroerende zaken bestaan, en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.24.1.f
    text: de bepalingen over de ingebruikneming van de kavels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.2
    text: De toewijzing heeft alleen betrekking op de kavels binnen het herverkavelingsblok.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.3
    text: |-
      In afwijking van het tweede lid kunnen in het ruilbesluit met toestemming van rechthebbenden op niet in het
      herverkavelingsblok liggende onroerende zaken, regelingen worden opgenomen over grenswijzigingen, burenrechten
      en erfdienstbaarheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: 12.24.4
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de bepalingen over kavels en rechten, bedoeld in het
      eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.24
  - number: '12.25'
    text: |-
      Bij de kavelindeling wordt elke kavel zo gevormd dat deze uitweg heeft op een openbare weg en zo mogelijk daaraan
      grenst.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.25
  - number: 12.26.1
    text: |-
      Bij de toewijzing van rechten op kavels heeft elke eigenaar aanspraak op verkrijging van een recht van dezelfde
      aard als hij had op de in een herverkavelingsblok liggende onroerende zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.26
  - number: 12.26.2
    text: |-
      Voor zover het belang van de landinrichting zich hiertegen niet verzet, wordt aan elke eigenaar een recht
      toegewezen voor onroerende zaken van gelijke hoedanigheid en met gelijkwaardige gebruiksmogelijkheden als de
      onroerende zaken die door hem zijn ingebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.26
  - number: 12.26.3
    text: |-
      Bij regeling van Onze Minister voor Natuur en Stikstof worden nadere regels gesteld over de in het tweede lid
      bedoelde gelijke hoedanigheid en gelijkwaardige gebruiksmogelijkheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.26
  - number: 12.27.1
    text: |-
      Bij de toewijzing van rechten op kavels heeft elke pachter aanspraak op verkrijging van een recht van dezelfde aard
      als hij had op de in een herverkavelingsblok liggende onroerende zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.27
  - number: 12.27.2
    text: |-
      De [artikelen 12.26, tweede en derde lid][ref1], [12.30][ref2], [12.31][ref3] en [12.33][ref4] zijn van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.27.3
    text: |-
      De aanspraak bestaat alleen als de pachtovereenkomst op grond van [artikel 16.125, eerste lid][ref1], aan het
      bevoegd gezag ter registratie is toegezonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 12.28.1
    text: In het ruilbesluit blijven bestaande pachtverhoudingen zoveel mogelijk in stand.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.28
  - number: 12.28.2
    text: |-
      Als het belang van de herverkaveling dat dringend eist, kan bij het ruilbesluit een bestaande pachtverhouding
      worden opgeheven en een nieuwe pachtverhouding worden gevestigd waarbij aan een verpachter een pachter uit de in
      [artikel 12.27, eerste lid][ref1], bedoelde pachters wordt toegewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.28.3
    text: |-
      In een geval als bedoeld in het tweede lid voorziet het ruilbesluit erin dat de pachter en de verpachter zoveel
      mogelijk dezelfde aanspraken houden als zij aan de opgeheven pachtverhouding konden ontlenen. Het ruilbesluit
      bepaalt tot welk tijdstip de uit een nieuw gevestigde pachtverhouding voortvloeiende pachtovereenkomst zal gelden
      en of deze overeenkomst, als deze voor kortere dan de wettelijke duur zal gelden, voor verlenging vatbaar is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.28
  - number: '12.29'
    text: |-
      Als herverkaveling deel uitmaakt van de landinrichting, wordt bij elk herverkavelingsblok de totale oppervlakte van
      alle bij de herverkaveling betrokken percelen tot een maximum van vijf procent verminderd met de oppervlakte van
      alle in het herverkavelingsblok opgenomen percelen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.29
  - number: 12.29.a
    text: |-
      die in het belang van de herverkaveling nodig is voor het tot stand brengen of verbeteren van openbare wegen en
      waterstaatswerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.29
  - number: 12.29.b
    text: |-
      die nodig is voor de aanleg van voorzieningen die met de openbare wegen en waterstaatswerken, bedoeld onder a,
      samenhangen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.29
  - number: 12.29.c
    text: |-
      die nodig is voor de verwezenlijking van maatregelen en voorzieningen voor gebieden die van belang zijn uit een
      oogpunt van natuurbescherming of landschapsbehoud, en voor elementen van landschappelijke, recreatieve, aardkundige
      of natuurwetenschappelijke waarde, of cultureel erfgoed,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.29
  - number: 12.29.d
    text: die bestemd is voor andere maatregelen en voorzieningen van openbaar nut.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.29
  - number: 12.30.1
    text: |-
      Bij de toewijzing van rechten op kavels heeft elke eigenaar aanspraak op een oppervlakte in kavels die
      gelijk is aan de oppervlakte van de door hem ingebrachte percelen. Deze oppervlakte wordt verminderd met het
      percentage waarmee de totale oppervlakte van alle in het herverkavelingsblok opgenomen percelen op grond van
      [artikel 12.29][ref1] is verminderd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.30.2
    text: |-
      De totale oppervlakte, bedoeld in het eerste lid, tweede zin, is de oppervlakte van alle in het herverkavelingsblok
      opgenomen percelen, verminderd met de oppervlakte van de onroerende zaken die in een onteigeningsbeschikking voor
      onteigening zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.30
  - number: 12.30.3
    text: |-
      Het bevoegd gezag kan van het eerste lid afwijken als toepassing van dat lid in de weg zou staan aan de
      totstandkoming van een behoorlijke herverkaveling. Als geen overeenstemming is bereikt met de eigenaar en degene
      die op de onroerende zaak een recht van hypotheek of grondrente heeft, kan deze afwijking ten hoogste vijf procent
      bedragen van de oppervlakte waarop de eigenaar op grond van het eerste lid aanspraak heeft. De toepassing van
      deze afwijking in samenhang met de toepassing van [artikel 12.29][ref1] leidt niet tot een toewijzing van een
      oppervlakte die meer dan vijf procent kleiner is dan de oppervlakte van de door de eigenaar ingebrachte kavels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: '12.31'
    text: |-
      In het ruilbesluit kan worden bepaald dat een eigenaar, in afwijking van [artikel 12.30, eerste lid][ref1], een
      algehele vergoeding in geld ontvangt als de oppervlakte van zijn in een herverkavelingsblok liggende onroerende
      zaken zo gering is dat toepassing van artikel 12.30 zou leiden tot de vorming van een niet behoorlijk te
      exploiteren kavel en hij geen redelijk belang heeft bij de verkrijging van een dergelijke kavel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: '12.32'
    text: |-
      Toedeling van percelen voor voorzieningen van openbaar nut, voor zover daarin is voorzien door toepassing van
      korting op grond van [artikel 12.29, aanhef en onder c of d][ref1], vindt plaats tegen betaling van een tussen
      gedeputeerde staten en een ander openbaar lichaam of een andere rechtspersoon overeengekomen bedrag, dat niet
      minder bedraagt dan de werkelijke waarde van het perceel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.32
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: '12.33'
    text: |-
      In afwijking van [artikel 12.30, eerste lid][ref1], ontvangt de eigenaar van onroerende zaken die zijn opgenomen
      in de toedeling, bedoeld in [artikel 12.8, eerste lid, onder c of d][ref2], voor die zaken op aanvraag een algehele
      vergoeding in geld voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.2.1
        afdeling: '12.2'
  - number: 12.33.a
    text: |-
      die toedeling gebeurt met toepassing van [artikel 12.29, aanhef en onder c of d][ref1], en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.33.b
    text: vergoeding in geld bijdraagt aan de verwezenlijking van het inrichtingsprogramma.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.33
  - number: '12.34'
    text: |-
      Als de toedeling, bedoeld in [artikel 12.32][ref1], een perceel betreft waarvoor de eigenaar of pachter een beroep
      heeft gedaan op artikel 12.33, vindt de toedeling aan het openbaar lichaam of de andere rechtspersoon in afwijking
      van [artikel 12.33][ref2] plaats tegen betaling van een bedrag dat gelijk is aan de in artikel 12.33 bedoelde
      vergoeding, of tegen de werkelijke waarde van het perceel, als die waarde hoger is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.34
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.35.1
    text: |-
      Voor zover onroerende zaken in de bepalingen over rechten en kavels zijn opgenomen, worden de niet onder
      [artikel 12.26][ref1] begrepen beperkte rechten, het recht van huur en de lasten die voor die onroerende
      zaken bestaan, in de bepalingen over rechten en kavels geregeld of opgeheven onder regeling van de geldelijke
      gevolgen daarvan in het besluit geldelijke regelingen. Ruilverkavelings-, herinrichtings-, reconstructie- en
      landinrichtingsrenten worden afgekocht volgens de daarvoor geldende wettelijke bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.35
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.35.2
    text: |-
      In het belang van de herverkaveling kan in de bepalingen over kavels en rechten worden bepaald dat beperkte rechten
      worden gevestigd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.35
  - number: 12.35.3
    text: |-
      Hypotheken gaan met behoud van hun rang over op de kavels of gedeelten van kavels die in de plaats van de
      onroerende zaak waarop zij rusten worden toegewezen. In gevallen als bedoeld in de [artikelen 12.31][ref1] en
      [12.33][ref2] waarin een algehele vergoeding in geld wordt toegekend, oefenen de hypotheekhouder en degene die op
      de zaak een recht van grondrente had, hun rechten uit op de wijze, omschreven in [artikel 15.30][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.35
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.3.1
        afdeling: '15.3'
  - number: 12.35.4
    text: |-
      Conservatoire en executoriale beslagen gaan over op de kavels of gedeelten van kavels die in de plaats van de
      onroerende zaak waarop zij zijn gelegd worden toegewezen en op de geldsommen die in de plaats van kavels of voor
      onderbedeling worden toegekend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.35
  - number: '12.36'
    text: Voor het herverkavelingsblok wordt een besluit geldelijke regelingen vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.36
  - number: 12.37.1
    text: 'Het besluit geldelijke regelingen bevat:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
  - number: 12.37.1.a
    text: |-
      de uitkomst van de schatting, bedoeld in [artikel 12.38, eerste lid, aanhef en onder a][ref1], en de zo nauwkeurig
      mogelijke opgave van de daaruit op grond van [artikel 13.9, tweede lid][ref2], voortvloeiende kosten voor de
      eigenaren,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.3
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.5'
  - number: 12.37.1.b
    text: |-
      de uitkomst van de schatting, bedoeld in [artikel 12.38, eerste lid, aanhef en onder b][ref1], en de zo nauwkeurig
      mogelijke opgave van de daarmee verband houdende geldelijke verrekeningen,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.3
        afdeling: '12.4'
  - number: 12.37.1.c
    text: 'een opgave van de geldelijke verrekening voor de eigenaren als gevolg van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
  - number: 12.37.1.c.1°
    text: |-
      toepassing van de [artikelen 12.31][ref1], [12.33][ref2] en [12.39][ref3],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.3
        afdeling: '12.4'
  - number: 12.37.1.c.2°
    text: |-
      toepassing van [artikel 12.35][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.37.1.c.3°
    text: |-
      toe te kennen schadevergoedingen, anders dan die bedoeld in [afdeling 15.2][ref1] vanwege een gedoogplicht als
      bedoeld in de [artikelen 10.10c tot en met 10.10g][ref2], en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '15'
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 12.37.1.c.4°
    text: de overige zaken, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
  - number: 12.37.1.d
    text: |-
      een opgave van de geldelijke verrekeningen voor de pachters als gevolg van de toepassing van [artikel 12.27][ref1]
      in samenhang met de [artikelen 12.31][ref2] en [12.33][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 12.37.2
    text: |-
      In verband met de verrekening, bedoeld in het eerste lid, onder c, onder 1°, stellen gedeputeerde staten de
      agrarische verkeerswaarde van de percelen vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
  - number: 12.37.3
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de toepassing van het eerste lid en over het
      vaststellen van de agrarische verkeerswaarde, bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.37
  - number: 12.38.1
    text: 'Gedeputeerde staten schatten:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.a
    text: de waardeverandering van de onroerende zaken als gevolg van de landinrichting voor elke eigenaar,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.b
    text: 'de geldelijke verrekeningen tussen de oude en de nieuwe eigenaar bij overgang van onroerende zaken, van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.b.1°
    text: de waardeverandering als gevolg van een landinrichtingsactiviteit,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.b.2°
    text: de waarde van gebouwen, werken en beplantingen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.b.3°
    text: de andere dan de agrarische waarde,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.1.b.4°
    text: de overige zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: 12.38.2
    text: |-
      De schatting vindt plaats volgens de regels, bedoeld in de [artikelen 12.24, vierde lid][ref1], en
      [12.37, derde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.3
        afdeling: '12.4'
  - number: 12.38.3
    text: |-
      Het ontwerp van het besluit geldelijke regelingen wordt opgesteld met inachtneming van het onherroepelijk geworden
      ruilbesluit, tenzij gedeputeerde staten bepalen dat het ontwerp van het ruilbesluit en het ontwerp van het besluit
      geldelijke regelingen gelijktijdig ter inzage worden gelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.38
  - number: '12.39'
    text: |-
      Het verschil in oppervlakte, hoedanigheid of gebruiksmogelijkheden tussen de ingebrachte en de na toepassing van
      de [artikelen 12.29 tot en met 12.31][ref1] en [12.33][ref2] toegedeelde kavels wordt met de eigenaren in geld
      verrekend.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.39
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: '12.40'
    text: |-
      Als een landinrichtingsactiviteit leidt tot een waardevermeerdering van een onroerende zaak, wordt die
      waardevermeerdering alleen vergoed als voor die landinrichtingsactiviteit een maatwerkvoorschrift is gesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.40
  - number: '12.41'
    text: |-
      Zodra de beroepstermijn voor een besluit geldelijke regelingen is verstreken, of, als beroep is ingesteld, op het
      beroep is beslist, geldt het besluit als titel voor de daarin omschreven vorderingen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.41
  - number: '12.42'
    text: |-
      Wanneer cassatie als bedoeld in [artikel 16.82c][ref1] leidt tot een vermindering van de schuldplichtigheid van een
      of meer belanghebbenden, worden de geldelijke gevolgen daarvan door de provincie gedragen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.7.2
        afdeling: '16.7'
  - number: '12.43'
    text: |-
      Door inschrijving van de uitspraak in beroep, bedoeld in [artikel 16.33l][ref1], in de openbare registers wordt
      de in die uitspraak omschreven eigendom verkregen door de in die uitspraak genoemde openbare lichamen of andere
      rechtspersonen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.43
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.3.9
        afdeling: '16.3'
  - number: 12.44.1
    text: |-
      Een kavelruilovereenkomst is een overeenkomst waarbij drie of meer eigenaren zich verbinden bepaalde, hun
      toebehorende onroerende zaken samen te voegen, de aldus gegeven massa op een bepaalde wijze te verkavelen en onder
      elkaar bij notariële kavelruilakte te verdelen, die schriftelijk wordt aangegaan en in de openbare registers wordt
      ingeschreven. [Titel 7 van Boek 3 van het Burgerlijk Wetboek][ref1] is niet van toepassing op de bedoelde massa.


      [ref1]: https://wetten.overheid.nl/BWBR0005291
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.44
    references:
      - id: ref1
        bwb_id: BWBR0005291
  - number: 12.44.2
    text: |-
      Aan een kavelruilovereenkomst kunnen ook partijen deelnemen die tegen inbreng van een geldsom onroerende zaken
      bedingen of tegen inbreng van onroerende zaken een geldsom bedingen. Overeenkomsten waaraan drie partijen
      deelnemen, worden alleen als kavelruil aangemerkt als alle partijen onroerende zaken inbrengen en ten hoogste een
      van hen daartegen alleen een geldsom bedingt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.44
  - number: 12.44.3
    text: |-
      Als een kavelruilovereenkomst onroerende zaken omvat waarop hypotheken, conservatoire beslagen of executoriale
      beslagen rusten, is de overeenkomst alleen rechtsgeldig als zij ook door de hypotheekhouders of beslagleggers is
      medeondertekend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.44
  - number: 12.44.4
    text: |-
      Een kavelruilakte wordt ondertekend door hen die daarvoor bij de kavelruilovereenkomst bevoegd worden verklaard en
      wordt ingeschreven in de openbare registers.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.44
  - number: 12.45.1
    text: |-
      Een kavelruilovereenkomst bindt ook degenen die de deelnemende partijen na het tijdstip van inschrijving onder
      bijzondere titel opvolgen in hun rechten op de betrokken onroerende zaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.45
  - number: 12.45.2
    text: |-
      Als na de inschrijving komt vast te staan dat een of meer van de partijen bij de kavelruilovereenkomst geen
      eigenaar waren, maar wel in de basisregistratie kadaster als zodanig stonden vermeld, wordt de overeenkomst geacht
      rechtsgeldig tot stand te zijn gekomen en treedt de werkelijke eigenaar in de rechten en plichten die de in zijn
      plaats opgetreden partij onbevoegd heeft verworven en op zich heeft genomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.45
  - number: 12.45.3
    text: |-
      In afwijking van [artikel 50 van Boek 7 van het Burgerlijk Wetboek][ref1] is [artikel 3 van dat boek][ref2] niet
      van overeenkomstige toepassing op de ingeschreven kavelruilovereenkomst.


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel50
      [ref2]: https://wetten.overheid.nl/BWBR0005290#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.45
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '50'
      - id: ref2
        bwb_id: BWBR0005290
        artikel: '3'
  - number: 12.46.1
    text: |-
      In een kavelruilovereenkomst kunnen de [artikelen 12.35, tweede, derde en vierde lid][ref1],
      [16.136, tweede en derde lid][ref2], en [16.137, derde en vierde lid][ref3], van overeenkomstige toepassing worden
      verklaard.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.12.2
        afdeling: '16.12'
  - number: 12.46.2
    text: |-
      In de kavelruilakte wordt vermeld welke van de in het eerste lid genoemde bepalingen van overeenkomstige toepassing
      zijn verklaard.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.46
  - number: 12.47.1
    text: |-
      Een kavelruil landelijk gebied is een kavelruilovereenkomst die strekt tot verbetering van een gebied in
      overeenstemming met de functies die aan de betrokken locaties zijn toegedeeld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2
    text: 'De kavelruilovereenkomst voor kavelruil landelijk gebied heeft geen betrekking op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.a
    text: 'kavels die deel uitmaken van een ruimtelijk aaneengesloten of functioneel verbonden samenstel van kavels:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.a.1°
    text: |-
      dat in gebruik is voor wonen, met inbegrip van verblijfsrecreatie, niet-agrarische bedrijvigheid en sociaal-
      culturele voorzieningen, stedelijk groen en infrastructuur,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.a.2°
    text: |-
      waar op grond van de functies die aan de betrokken locaties zijn toegedeeld een gebruik als bedoeld onder 1°
      mogelijk is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.a.3°
    text: |-
      waarvoor volgens een ontwerpbesluit tot vaststelling van een omgevingsplan of een projectbesluit een gebruik als
      bedoeld onder 1° mogelijk zal worden gemaakt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.b
    text: |-
      kavels waar ontgronding plaatsvindt, tenzij die volgens de voorschriften die zijn verbonden aan de
      omgevingsvergunning voor de ontgrondingsactiviteit na de ontgronding geschikt worden gemaakt voor
      landbouwdoeleinden, kleinschalige recreatie of de ontwikkeling van natuur, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.2.c
    text: de beperkte rechten met betrekking tot de kavels, bedoeld onder a en b.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 12.47.3
    text: |-
      Een bedrijfsverplaatsing, waarbij de gronden van het achtergelaten bedrijf worden gebruikt om onroerende
      zaken samen te voegen en de gegeven massa op een bepaalde wijze te verkavelen, kan worden opgenomen in een
      kavelruilovereenkomst voor kavelruil landelijk gebied.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel12.47
  - number: 13.1.1
    text: |-
      Onze Minister die het aangaat kan ter dekking van de kosten voor het door hem in behandeling nemen van een aanvraag
      om een besluit, voor onderzoeken of verrichtingen die op verzoek van betrokkenen plaatsvinden en voor de afgifte
      van een document, ringen, merken of merktekens voor dieren op grond van deze wet rechten heffen van de aanvrager of
      van degene ten behoeve van wie die aanvraag wordt gedaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.2
    text: |-
      Onze Minister die het aangaat kan ter dekking van de kosten voor de uitvoering van controles of verificaties op
      grond van Europese cites-regelgeving, Europese flegt-regelgeving of Europese houtregelgeving, rechten heffen van de
      eigenaar, vervoerder, verhandelaar, importeur of diens gemachtigde.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.3
    text: De tarieven worden zodanig vastgesteld dat de geraamde baten van de rechten niet uitgaan boven de geraamde kosten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
    machine_readable:
      execution:
        parameters:
          - name: geraamde_baten
            type: number
            required: true
            description: Geraamde baten van de te heffen rechten
          - name: geraamde_kosten
            type: number
            required: true
            description: Geraamde kosten voor de dienstverlening
        output:
          - name: tarieven_toegestaan
            type: boolean
            description: Of de tarieven voldoen aan het kostendekking-plafond
        actions:
          - output: tarieven_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $geraamde_baten
              value: $geraamde_kosten
  - number: 13.1.4
    text: |-
      De bevoegdheid, bedoeld in het eerste lid, berust voor omgevingsvergunningen voor jachtgeweeractiviteiten bij de
      korpschef.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.5
    text: |-
      Onze Minister voor Natuur en Stikstof kan bij regeling bepalen dat de bevoegdheid om rechten te heffen voor de
      afgifte van ringen, merken of merktekens, bedoeld in het eerste lid, berust bij organisaties die zijn aangewezen op
      grond van [artikel 4.36, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: 13.1.6
    text: 'Bij ministeriële regeling worden:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.6.a
    text: |-
      de besluiten, documenten, ringen, merken of merktekens voor dieren, en onderzoeken of verrichtingen aangewezen
      waarvoor rechten worden geheven,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.6.b
    text: de tarieven voor te heffen rechten vastgesteld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1.6.c
    text: regels gesteld over hoe die rechten worden geheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1
  - number: 13.1a.1
    text: |-
      Een gemeente, waterschap of provincie kan rechten heffen voor het in behandeling nemen van een aanvraag
      om een omgevingsvergunning, wijziging van voorschriften van een omgevingsvergunning of intrekking van een
      omgevingsvergunning. Een provincie kan ook rechten heffen voor het in behandeling nemen van een verzoek om
      tegemoetkoming in schade aangericht door in het wild levende dieren als bedoeld in [artikel 15.53][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.5'
  - number: 13.1a.2
    text: 'Als rechten door een bestuursorgaan van de gemeente worden geheven:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
  - number: 13.1a.2.a
    text: |-
      is [hoofdstuk XV, paragrafen 1][ref1] en [4, van de Gemeentewet][ref2] van toepassing, met dien verstande dat de
      rechten worden aangemerkt als gemeentelijke belastingen, en


      [ref1]: https://wetten.overheid.nl/BWBR0005416#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0005416#Paragraaf4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005416
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0005416
        paragraaf: '4'
  - number: 13.1a.2.b
    text: |-
      is [artikel 229b van de Gemeentewet][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005416#Artikel229b
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005416
        artikel: 229b
  - number: 13.1a.3
    text: 'Als rechten door een bestuursorgaan van het waterschap worden geheven:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
  - number: 13.1a.3.a
    text: |-
      zijn de [artikelen 110][ref1], [111][ref2] en [115a][ref3] en [hoofdstuk XVIII van de Waterschapswet][ref4] van
      toepassing, met dien verstande dat de rechten worden aangemerkt als waterschapsbelastingen, en


      [ref1]: https://wetten.overheid.nl/BWBR0005108#Artikel110
      [ref2]: https://wetten.overheid.nl/BWBR0005108#Artikel111
      [ref3]: https://wetten.overheid.nl/BWBR0005108#Artikel115a
      [ref4]: https://wetten.overheid.nl/BWBR0005108#HoofdstukXVIII
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005108
        artikel: '110'
      - id: ref2
        bwb_id: BWBR0005108
        artikel: '111'
      - id: ref3
        bwb_id: BWBR0005108
        artikel: 115a
      - id: ref4
        bwb_id: BWBR0005108
        hoofdstuk: XVIII
  - number: 13.1a.3.b
    text: |-
      is [artikel 115, derde lid, van de Waterschapswet][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005108#Artikel115
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005108
        artikel: '115'
  - number: 13.1a.4
    text: 'Als rechten door een bestuursorgaan van de provincie worden geheven:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
  - number: 13.1a.4.a
    text: |-
      is [hoofdstuk XV, paragrafen 1][ref1] en [3, van de Provinciewet][ref2] van toepassing, met dien verstande dat de
      rechten worden aangemerkt als provinciale belastingen, en


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Paragraaf1
      [ref2]: https://wetten.overheid.nl/BWBR0005645#Paragraaf3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005645
        paragraaf: '1'
      - id: ref2
        bwb_id: BWBR0005645
        paragraaf: '3'
  - number: 13.1a.4.b
    text: |-
      is [artikel 225 van de Provinciewet][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Artikel225
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.1a
    references:
      - id: ref1
        bwb_id: BWBR0005645
        artikel: '225'
  - number: '13.2'
    text: |-
      Bij algemene maatregel van bestuur kunnen regels worden gesteld over de berekening en de bedragen van de op grond
      van:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2
  - number: 13.2.a
    text: |-
      de [artikelen 228a][ref1] en [229, eerste lid, onder b, van de Gemeentewet][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0005416#Artikel228a
      [ref2]: https://wetten.overheid.nl/BWBR0005416#Artikel229
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2
    references:
      - id: ref1
        bwb_id: BWBR0005416
        artikel: 228a
      - id: ref2
        bwb_id: BWBR0005416
        artikel: '229'
  - number: 13.2.b
    text: |-
      [artikel 115, eerste lid, onder b en c, van de Waterschapswet][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0005108#Artikel115
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2
    references:
      - id: ref1
        bwb_id: BWBR0005108
        artikel: '115'
  - number: 13.2.c
    text: |-
      [artikel 223, eerste lid, onder b, van de Provinciewet][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Artikel223
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2
    references:
      - id: ref1
        bwb_id: BWBR0005645
        artikel: '223'
  - number: 13.2.d
    text: |-
      de [artikelen 13.1][ref1] en [13.1a][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.2a.1
    text: |-
      Een bestuursorgaan waarvan op grond van [artikel 16.16, eerste lid][ref1], instemming is vereist voor een
      voorgenomen beslissing op een aanvraag om een besluit, kan het bevoegd gezag verplichten tot betaling van een
      geldsom voor het uitbrengen van advies en het in behandeling nemen van het verzoek om instemming als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 13.2a.1.a
    text: |-
      het bestuursorgaan bevoegd gezag voor de aanvraag zou zijn als die alleen betrekking zou hebben op de activiteit
      waarvoor instemming is vereist, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
  - number: 13.2a.1.b
    text: het bestuursorgaan in het geval, bedoeld onder a, rechten kan heffen voor het in behandeling nemen van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
  - number: 13.2a.2
    text: |-
      Het bestuursorgaan kan een verplichting tot betaling van een geldsom ook opleggen als het verzoek om instemming
      achterwege blijft omdat:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
  - number: 13.2a.2.a
    text: |-
      het gaat om een door het bestuursorgaan aangewezen geval als bedoeld in [artikel 16.16, derde lid][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 13.2a.2.b
    text: |-
      het bestuursorgaan bij het uitbrengen van het advies met toepassing van [artikel 16.16, vierde lid][ref1], heeft
      bepaald dat instemming niet is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.3
        afdeling: '16.2'
  - number: 13.2a.3
    text: |-
      De geldsom is gelijk aan de rechten die het bestuursorgaan in het geval, bedoeld in het eerste lid, onder a, als
      bevoegd gezag zou heffen voor het in behandeling nemen van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.2a
  - number: 13.3.1
    text: |-
      Als een bestuursorgaan bij de uitoefening van een taak of bevoegdheid op grond van deze wet extra kosten heeft
      gemaakt als gevolg van een verzoek om een besluit of maatregel als bedoeld in [artikel 15.1, eerste lid][ref1],
      een instructie of instructieregel die gaat over een in die instructie of instructieregel aangegeven locatie of
      een besluit over instemming van een ander bestuursorgaan, en over de toedeling van die kosten geen overeenstemming
      is bereikt, kan het bij dat bestuursorgaan verzoeken om de door hem gemaakte kosten geheel of gedeeltelijk
      te vergoeden voor zover die kosten zijn gemaakt in verband met de behartiging van een belang van dat andere
      bestuursorgaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 13.3.2
    text: 'De vergoeding kan worden toegekend voor zover:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3
  - number: 13.3.2.a
    text: |-
      de kosten redelijkerwijs niet voor rekening behoren te blijven van de rechtspersoon waartoe het bestuursorgaan
      behoort,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3
  - number: 13.3.2.b
    text: de vergoeding niet voldoende op een andere manier is verzekerd, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3
  - number: 13.3.2.c
    text: de vergoeding niet op grond van een wettelijk voorschrift is uitgesloten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3
  - number: 13.3a.1
    text: |-
      De Staat of een provincie, gemeente of waterschap kan in bij algemene maatregel van bestuur aangewezen gevallen
      de voor rekening van die rechtspersoon komende kosten die het gevolg zijn van verontreiniging, aantasting,
      verstoring of beschadiging van daarbij aangewezen onderdelen van de fysieke leefomgeving verhalen op degene door
      wiens onrechtmatige daad de verontreiniging, aantasting, verstoring of beschadiging is veroorzaakt of op degene
      die anders op grond van burgerlijk recht buiten overeenkomst aansprakelijk is voor de gevolgen daarvan. Bij de
      maatregel kunnen regels worden gesteld over de verhaalbare kostensoorten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.2
    text: |-
      Als sprake is van ongerechtvaardigde verrijking, kan een rechtspersoon als bedoeld in het eerste lid de voor
      rekening van die rechtspersoon komende kosten verhalen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.3
    text: |-
      In gevallen waarin de veroorzaker van de verontreiniging, aantasting, verstoring of beschadiging niet op grond
      van een onrechtmatige daad aansprakelijk is, kunnen de in het eerste lid bedoelde kosten toch worden verhaald als
      de veroorzaker:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.3.a
    text: |-
      op het moment dat hij de verontreiniging, aantasting, verstoring of beschadiging veroorzaakte, de ernstige gevaren
      van de activiteit kende of behoorde te kennen, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.3.b
    text: |-
      vanwege deze ernstige gevaren ernstig verwijtbaar activiteiten die de ernstige verontreiniging, aantasting,
      verstoring of beschadiging hebben veroorzaakt, niet heeft nagelaten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.4
    text: |-
      Als de activiteit bij het uitoefenen van beroep of bedrijf is verricht, moet daarbij als het gaat om de ernstige
      verwijtbaarheid in het bijzonder in aanmerking worden genomen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.4.a
    text: |-
      de op het moment van de verontreiniging, aantasting, verstoring of beschadiging gebruikelijke bedrijfsvoering met
      betrekking tot die activiteit, en
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3a.4.b
    text: |-
      de op het moment van de verontreiniging, aantasting, verstoring of beschadiging bestaande en voor de veroorzaker
      redelijkerwijs toepasbare alternatieven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3a
  - number: 13.3b.1
    text: |-
      De kosten in verband met schade, toegebracht aan een waterstaatswerk of een zuiveringtechnisch werk in beheer
      bij het Rijk of bij een provincie, gemeente of waterschap, waarvoor een eigenaar of gebruiker van een vaartuig
      aansprakelijk is, worden door de beheerder geraamd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3b
  - number: 13.3b.2
    text: |-
      Als het geraamde bedrag niet aan de beheerder wordt betaald of geen financiële zekerheid wordt gesteld voor
      betaling daarvan binnen een redelijke termijn, is hij bevoegd, zo nodig met behulp van de sterke arm, het
      voortzetten van de reis, het ondernemen van de terugtocht of het aanvangen van een nieuwe reis te beletten, ook als
      het vaartuig inmiddels buiten zijn ambtsgebied is gebracht.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3b
  - number: 13.3b.3
    text: |-
      Als blijkt dat de werkelijke kosten minder bedragen dan het betaalde bedrag, wordt het overschot, vermeerderd met
      de wettelijke rente, uitgekeerd aan degene die heeft betaald. De wettelijke rente wordt berekend vanaf de dag van
      betaling.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3b
  - number: 13.3c.1
    text: |-
      De rechtspersoon waartoe het bestuursorgaan behoort dat vergoeding van schade als bedoeld
      in [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1] in samenhang met
      [artikel 15.1, eerste lid][ref2], toekent, kan met degene die de activiteit verricht overeenkomen dat de door
      het bestuursorgaan toe te kennen schadevergoeding en de daarmee samenhangende kosten geheel of gedeeltelijk voor
      rekening komen van degene die de activiteit verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3c
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 13.3c.2
    text: |-
      Degene die de activiteit verricht en met wie een overeenkomst als bedoeld in het eerste lid is gesloten, is
      belanghebbende bij het besluit tot toekenning van de schadevergoeding.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3c
  - number: 13.3d
    text: |-
      Als een bestuursorgaan schadevergoeding heeft betaald als gevolg van een besluit als bedoeld in
      [artikel 15.1][ref1] dat op aanvraag is genomen of een regel als bedoeld in artikel 15.1, eerste lid, onder d
      tot en met h, waarbij een activiteit is toegestaan, kan het bestuursorgaan dat bevoegd is om te beslissen op de
      aanvraag om schadevergoeding in bij algemene maatregel van bestuur aan te wijzen gevallen de schadevergoeding bij
      beschikking geheel of gedeeltelijk in rekening brengen bij de aanvrager van dat besluit of degene die de toegestane
      activiteit verricht, tenzij:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3d
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 13.3d.a
    text: de schadevergoeding redelijkerwijze voor rekening behoort te blijven van het bestuursorgaan, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3d
  - number: 13.3d.b
    text: de schadevergoeding voldoende op een andere manier is verzekerd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3d
  - number: 13.3e.1
    text: |-
      De rechthebbende ontvangt van de initiatiefnemer een redelijke gebruiksvergoeding voor zover die vergoeding niet is
      inbegrepen in de vergoeding van de schade, bedoeld in [artikel 15.14, eerste lid][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.2'
  - number: 13.3e.1.a
    text: |-
      bij een gedoogplicht als bedoeld in [artikel 10.14][ref1], tenzij de initiatiefnemer is:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 13.3e.1.a.1°
    text: |-
      een transmissie- of distributiesysteembeheerder als bedoeld in [artikel 1.1 van de Energiewet][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '1'
  - number: 13.3e.1.a.2°
    text: |-
      een netbeheerder als bedoeld [artikel 1, eerste lid, van de Warmtewet][ref1], of


      [ref1]: https://wetten.overheid.nl/BWBR0033729#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0033729
        artikel: '1'
  - number: 13.3e.1.a.3°
    text: |-
      de door de Minister voor Klimaat en Energie aangewezen beheerder van het landelijk transportnet voor waterstofgas
      als bedoeld in [artikel 1.1 van de Energiewet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0050714#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0050714
        artikel: '1'
  - number: 13.3e.1.b
    text: |-
      bij een gedoogplicht als bedoeld in [artikel 10.21][ref1], tenzij de initiatiefnemer een bestuursorgaan is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.3.2
        afdeling: '10.3'
  - number: 13.3e.2
    text: |-
      Bij ministeriële regeling worden regels gesteld over de toepassing van het eerste lid, waaronder over de hoogte van
      de gebruiksvergoeding.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
  - number: 13.3e.3
    text: |-
      Op een vordering tot gebruiksvergoeding is de civiele rechter bevoegd binnen wiens rechtsgebied de onroerende zaak
      geheel of in hoofdzaak is gelegen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
  - number: 13.3e.4
    text: |-
      [Artikel 10.1][ref1] is van overeenkomstige toepassing op dit artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.3e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
  - number: 13.4.1
    text: |-
      Bij provinciale verordening kan als belasting een heffing worden ingesteld ter
      bestrijding van de kosten die zijn gemaakt voor de vergoeding van schade als bedoeld in
      [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1] in samenhang met
      [artikel 15.1, eerste lid][ref2], vanwege regels in een omgevingsverordening over het beschermen van de kwaliteit
      van het grondwater in grondwaterbeschermingsgebieden voor de bereiding van voor menselijke consumptie bestemd
      water, voor zover de schade is veroorzaakt door:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 13.4.1.a
    text: |-
      een regel in een omgevingsverordening als bedoeld in [artikel 4.1, eerste lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 13.4.1.b
    text: |-
      een omgevingsvergunning als bedoeld in [artikel 5.1, eerste lid, aanhef en onder a][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 13.4.1.c
    text: |-
      een omgevingsvergunning als bedoeld in [artikel 5.1, tweede lid, aanhef en onder b][ref1], als toepassing is
      gegeven aan [artikel 5.43][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 13.4.1.d
    text: |-
      het wijzigen van voorschriften van een omgevingsvergunning ter uitvoering van een verzoek als bedoeld in
      [artikel 5.41][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 13.4.1.e
    text: |-
      het wijzigen van voorschriften van een omgevingsvergunning op grond van [artikel 5.39, aanhef en onder a][ref1], in
      samenhang met [artikel 5.42, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 13.4.2
    text: |-
      De heffing wordt geheven van de houder van een omgevingsvergunning voor een wateronttrekkingsactiviteit,
      als het gaat om het onttrekken van grondwater door een daarvoor bestemde voorziening, als bedoeld in
      [artikel 5.1, tweede lid, onder d][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 13.4.3
    text: De grondslag van de heffing is de onttrokken hoeveelheid grondwater.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
  - number: 13.4.4
    text: |-
      Tot het instellen van een heffing wordt overgegaan binnen een jaar nadat een besluit waarbij de schadevergoeding,
      bedoeld in het eerste lid, is toegekend, in werking is getreden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
  - number: 13.4.5
    text: |-
      De heffing wordt jaarlijks geheven gedurende een termijn van ten hoogste tien jaar. In de provinciale verordening
      kan worden bepaald dat de heffing op verzoek van de heffingplichtige voor de op het tijdstip van indiening van
      het verzoek nog niet aangevangen jaren waarover de heffing wordt geheven, ineens kan worden voldaan volgens in de
      verordening te stellen regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4
  - number: 13.4a.1
    text: |-
      Bij provinciale verordening kan als belasting een heffing worden ingesteld ter bestrijding van de kosten die zijn
      gemaakt voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.1.a
    text: |-
      de vergoeding van schade als bedoeld in [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1]
      in samenhang met [artikel 15.1, eerste lid][ref2], die wordt veroorzaakt door een omgevingsvergunning voor een
      ontgrondingsactiviteit als bedoeld in [artikel 5.1, eerste lid, aanhef en onder c][ref3],


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 13.4a.1.b
    text: |-
      onderzoek naar het verband tussen een ontgrondingsactiviteit waarvoor een omgevingsvergunning is verleend en schade
      aan onroerende zaken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.1.c
    text: de bepaling van de omvang van de schade, bedoeld onder b.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.2
    text: |-
      De heffing wordt geheven van de houder van een omgevingsvergunning voor een ontgrondingsactiviteit als bedoeld in
      [artikel 5.1, eerste lid, aanhef en onder c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 13.4a.3
    text: |-
      De grondslag van de heffing is de hoeveelheid te winnen vaste stoffen, gemeten in profiel van ontgraving, die is
      toegestaan op grond van de omgevingsvergunning. Een heffing kan slechts eenmaal worden geheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.4
    text: |-
      Als de omgevingsvergunning wordt vernietigd of ingetrokken of de daaraan verbonden voorschriften worden gewijzigd
      in die zin dat de toegestane te winnen hoeveelheid vaste stoffen wordt verminderd, vindt op verzoek van de
      heffingplichtige teruggaaf van de heffing plaats.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.5
    text: 'Bij algemene maatregel van bestuur worden regels gesteld over:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.5.a
    text: de hoeveelheid te winnen vaste stoffen waarbij geen heffing is verschuldigd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.5.b
    text: de hoogte van het bedrag waarbij geen teruggave van de heffing plaatsvindt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4a.5.c
    text: de wijze van heffing.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4a
  - number: 13.4b.1
    text: |-
      Bij provinciale verordening kan als belasting een heffing worden ingesteld op het onttrekken van grondwater ter
      bestrijding van kosten die door de provincie zijn gemaakt voor:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.1.a
    text: |-
      maatregelen die direct verband houden met het voorkomen en tegengaan van nadelige gevolgen van het onttrekken van
      grondwater en het in de bodem brengen van water, ter aanvulling van het grondwater,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.1.b
    text: |-
      noodzakelijke onderzoeken voor het grondwaterbeleid en de vaststelling van schade als bedoeld in
      [artikel 15.13, eerste lid][ref1], in samenhang met [artikel 10.3, derde lid][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 13.4b.1.c
    text: |-
      het houden van een register met gegevens over het onttrekken van grondwater en het in de bodem brengen van water,
      ter aanvulling van het grondwater,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.1.d
    text: |-
      de vergoeding van schade als bedoeld in [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1] in
      samenhang met [artikel 15.1, eerste lid, onder f][ref2], die voortvloeit uit het onttrekken van grondwater of het
      in de bodem brengen van water, ter aanvulling van het grondwater, en waarvoor gedeputeerde staten het bevoegd gezag
      zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 13.4b.2
    text: 'De heffing wordt geheven van degenen die bij de verordening zijn aangewezen. Daartoe behoren:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.2.a
    text: |-
      de houder van een omgevingsvergunning voor een wateronttrekkingsactiviteit als bedoeld in
      [artikel 5.1, tweede lid, aanhef en onder d][ref1], als het gaat om het onttrekken van grondwater door een daarvoor
      bestemde voorziening, of van een omgevingsvergunning voor een activiteit als bedoeld in [artikel 5.3][ref2] of
      [5.4][ref3], als het gaat om het onttrekken van grondwater door een daarvoor bestemde voorziening,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.1
        afdeling: '5.1'
  - number: 13.4b.2.b
    text: degene die voor de onttrekking van grondwater de op grond van deze wet voorgeschreven melding heeft gedaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.2.c
    text: 'in andere gevallen dan bedoeld onder a of b: degene voor wie de onttrekking van grondwater plaatsvindt.'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.3
    text: |-
      De grondslag van de heffing is de onttrokken hoeveelheid water. Als op grond van vergunningvoorschriften water in
      de bodem wordt gebracht, wordt voor het vaststellen van de grondslag de in de bodem gebrachte hoeveelheid water in
      mindering gebracht op de onttrokken hoeveelheid volgens de bij de verordening te stellen regels.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.4b.4
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat het bij de maatregel aan te geven onttrekken van
      grondwater is vrijgesteld van de heffing. Bij de maatregel kunnen regels worden gesteld over de kosten van
      noodzakelijke onderzoeken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.4b
  - number: 13.5.1
    text: |-
      Bij algemene maatregel van bestuur worden gevallen aangewezen waarin aan een omgevingsvergunning die betrekking
      heeft op een activiteit die significante nadelige gevolgen voor de fysieke leefomgeving kan hebben, het voorschrift
      wordt of kan worden verbonden dat degene die de activiteit verricht, financiële zekerheid stelt:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.1.a
    text: voor het nakomen van verplichtingen die op grond van de omgevingsvergunning voor diegene gelden, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.1.b
    text: ter dekking van zijn aansprakelijkheid voor schade aan de fysieke leefomgeving als gevolg van die activiteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.2
    text: |-
      Als degene die de activiteit verricht een openbaar lichaam is, wordt geen voorschrift over financiële zekerheid aan
      een omgevingsvergunning verbonden, tenzij bij algemene maatregel van bestuur anders is bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.3
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de toepassing van het eerste lid. In ieder geval
      worden regels gesteld over:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.3.a
    text: de vorm waarin financiële zekerheid wordt gesteld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.3.b
    text: de hoogte van het bedrag waarvoor financiële zekerheid wordt gesteld,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.3.c
    text: hoe lang de financiële zekerheid in stand wordt gehouden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.4
    text: |-
      Als een voorschrift als bedoeld in het eerste lid aan een omgevingsvergunning is verbonden en de verplichting niet
      wordt nageleefd of schade is ontstaan, kan het bevoegd gezag de kosten of een deel van de kosten die zijn gemaakt
      om naleving af te dwingen of de schade te herstellen verhalen op de gestelde financiële zekerheid. Het bevoegd
      gezag kan het te verhalen bedrag invorderen bij dwangbevel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: 13.5.5
    text: |-
      Aan een besluit tot gehele of gedeeltelijke intrekking van een omgevingsvergunning als bedoeld in het eerste lid
      kan een voorschrift als bedoeld in het eerste lid worden verbonden. Bij dat besluit kan worden bepaald dat een
      voorschrift als bedoeld in het eerste lid gedurende een in het besluit te bepalen termijn blijft gelden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.5
  - number: '13.6'
    text: |-
      Onverminderd [artikel 13.5][ref1] kan aan een omgevingsvergunning voor een ontgrondingsactiviteit het voorschrift
      worden verbonden dat:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.3'
  - number: 13.6.a
    text: |-
      in plaats van de plicht, bedoeld in [artikel 5.36, tweede lid][ref1], tot het herstellen of realiseren van een
      toestand een bepaald bedrag ineens of in gedeelten wordt betaald,


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 13.6.b
    text: de kosten van het beheer van onroerende zaken die zijn ontgrond geheel of gedeeltelijk worden betaald, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.6
  - number: 13.6.c
    text: |-
      de kosten voor de aanpassing van de inrichting van de omgeving van de ontgronde onroerende zaken en van het beheer
      van de aangepaste omgeving, voor zover zij het gevolg zijn van de ontgronding, geheel of gedeeltelijk worden
      betaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.6
  - number: 13.7.1
    text: |-
      De kosten van de Commissie voor de milieueffectrapportage en het bureau van de commissie worden gedekt uit door de
      commissie vast te stellen en in rekening te brengen tarieven voor de uit te brengen adviezen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.7
  - number: 13.7.2
    text: |-
      De tarieven hebben een rechtstreeks verband met de adviezen, belopen niet meer dan nodig is ter dekking van de voor
      de adviezen gemaakte kosten en behoeven de goedkeuring van Onze Minister van Infrastructuur en Waterstaat.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.7
  - number: 13.7.3
    text: |-
      De [artikelen 10:28 tot en met 10:31 van de Algemene wet bestuursrecht][ref1] zijn van overeenkomstige toepassing
      op de goedkeuring.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel10
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.7
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '10'
  - number: 13.7a
    text: |-
      [Artikel 12.2][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
  - number: '13.8'
    text: |-
      De kosten van landinrichting als bedoeld in [artikel 12.3][ref1] worden gedragen door de provincie, voor zover
      zij niet op grond van de [artikelen 13.9][ref2] en [13.10][ref3] worden gedragen door andere openbare lichamen
      of eigenaren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.2
        afdeling: '12.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.5'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.5'
  - number: 13.9.1
    text: |-
      Ten laste van andere openbare lichamen dan de provincie komen de kosten waartoe zij zich op grond van
      [12.17, tweede lid][ref1], of op een andere manier bij overeenkomst hebben verplicht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.3.1
        afdeling: '12.3'
  - number: 13.9.2
    text: |-
      Ten laste van de eigenaren van de in een herverkaveling betrokken onroerende zaken gezamenlijk komen de kosten van
      herverkaveling die zijn gemaakt voor het herverkavelingsblok.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.9.3
    text: 'Op de kosten die ten laste van de eigenaren komen, worden in mindering gebracht:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.9.3.a
    text: kosten van herverkaveling die door een subsidie of andere overheidsbijdrage worden gedekt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.9.3.b
    text: kosten van herverkaveling waarvan de betaling bij overeenkomst is verzekerd,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.9.3.c
    text: |-
      bedragen die op grond van [artikel 12.32][ref1] door een openbaar lichaam of andere rechtspersonen zijn betaald
      voor de toewijzing van percelen voor voorzieningen van openbaar nut met uitzondering van bedragen die zijn betaald
      als algehele vergoeding in geld als bedoeld in [artikel 12.33][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.4.2
        afdeling: '12.4'
  - number: 13.9.4
    text: |-
      De kosten die ten laste van de eigenaren gezamenlijk komen, worden over de eigenaren omgeslagen zoals bepaald in
      het besluit geldelijke regelingen. Elke eigenaar is schuldplichtig voor de over hem omgeslagen kosten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.9.5
    text: |-
      Nadat de beroepstermijn voor het besluit geldelijke regelingen is verstreken, of, als beroep is ingesteld, op het
      beroep is beslist, worden de kosten die over de eigenaren worden omgeslagen gecorrigeerd met een door gedeputeerde
      staten vastgestelde correctiefactor. Deze factor is het quotiënt van de definitieve kosten en de kosten die
      oorspronkelijk in het besluit geldelijke regelingen waren opgenomen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.9
  - number: 13.10.1
    text: |-
      Op de heffing en de invordering van de over de eigenaren omgeslagen kosten zijn de [artikelen 227][ref1],
      [227a][ref2], [228][ref3], [228b][ref4], [228c][ref5], [232][ref6], [232aa][ref7], [232b][ref8], [232c][ref9],
      [232d][ref10], [232e][ref11], [232f][ref12] en [232h van de Provinciewet][ref13] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0005645#Artikel227
      [ref2]: https://wetten.overheid.nl/BWBR0005645#Artikel227a
      [ref3]: https://wetten.overheid.nl/BWBR0005645#Artikel228
      [ref4]: https://wetten.overheid.nl/BWBR0005645#Artikel228b
      [ref5]: https://wetten.overheid.nl/BWBR0005645#Artikel228c
      [ref6]: https://wetten.overheid.nl/BWBR0005645#Artikel232
      [ref7]: https://wetten.overheid.nl/BWBR0005645#Artikel232aa
      [ref8]: https://wetten.overheid.nl/BWBR0005645#Artikel232b
      [ref9]: https://wetten.overheid.nl/BWBR0005645#Artikel232c
      [ref10]: https://wetten.overheid.nl/BWBR0005645#Artikel232d
      [ref11]: https://wetten.overheid.nl/BWBR0005645#Artikel232e
      [ref12]: https://wetten.overheid.nl/BWBR0005645#Artikel232f
      [ref13]: https://wetten.overheid.nl/BWBR0005645#Artikel232h
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel13.10
    references:
