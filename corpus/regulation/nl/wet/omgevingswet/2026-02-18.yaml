    text: |-
      de [artikelen 8:104, tweede lid, aanhef en onder a, b en c, en derde lid][ref1], [8:105][ref2], [8:107][ref3] en
      [8:109 tot en met 8:118 van de Algemene wet bestuursrecht][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.117
