  - number: 22.21.8
    text: |-
      Het programma wordt niet eerder vastgesteld dan vier weken nadat het ontwerp aan beide Kamers der Staten-Generaal
      is overgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21
  - number: 22.21a
    text: |-
      In het in [artikel 22.21][ref1] bedoelde programma wordt ook beschreven hoe voor een legale status kan worden
      gezorgd voor andere projecten waarvoor degene die het project heeft gerealiseerd, als gevolg van onrechtmatig
      overheidshandelen niet beschikt over een toereikende omgevingsvergunning voor een Natura 2000-activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.21a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
        hoofdstuk: '22'
        afdeling: '22.4'
  - number: '22.22'
    text: Deze afdeling vervalt op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel22.22
  - number: '23.1'
    text: |-
      Voor zover deze wet niet in een andere grondslag voor het stellen van regels voorziet, kunnen bij of krachtens
      algemene maatregel van bestuur regels worden gesteld ter uitvoering van internationaalrechtelijke verplichtingen
      die betrekking hebben op of samenhangen met onderwerpen waarop deze wet van toepassing is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.1
  - number: '23.2'
    text: |-
      Een wijziging van een verordening, richtlijn of besluit als bedoeld in artikel 288 van het Verdrag betreffende de
      werking van de Europese Unie waarnaar bij of krachtens deze wet wordt verwezen, gaat voor de toepassing van deze
      wet en de daarop berustende bepalingen gelden met ingang van de dag waarop aan de betrokken wijziging uitvoering
      moet zijn gegeven, tenzij bij ministerieel besluit, dat in de Staatscourant wordt bekendgemaakt, een ander tijdstip
      wordt vastgesteld.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.2
  - number: 23.3.1
    text: |-
      Bij algemene maatregel van bestuur kan, met inachtneming van internationaalrechtelijke verplichtingen, bij wijze
      van experiment worden afgeweken van het bepaalde bij of krachtens:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.1.a
    text: deze wet,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.1.b
    text: |-
      de [Energiewet][ref1], voor zover dat geen gevolgen heeft voor de opbrengst van de energiebelasting, bedoeld in
      [artikel 1 van de Wet belastingen op milieugrondslag][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0050714
      [ref2]: https://wetten.overheid.nl/BWBR0007168#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0050714
      - id: ref2
        bwb_id: BWBR0007168
        artikel: '1'
  - number: 23.3.1.c
    text: |-
      de [Huisvestingswet 2014][ref1],

      [ref1]: https://wetten.overheid.nl/BWBR0035303
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0035303
  - number: 23.3.1.d
    text: |-
      de [Leegstandwet][ref1],

      [ref1]: https://wetten.overheid.nl/BWBR0003403
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0003403
  - number: 23.3.1.e
    text: |-
      de [Warmtewet][ref1],

      [ref1]: https://wetten.overheid.nl/BWBR0033729
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0033729
  - number: 23.3.1.f
    text: |-
      de [Wet milieubeheer][ref1].

      [ref1]: https://wetten.overheid.nl/BWBR0003245
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0003245
  - number: 23.3.2
    text: |-
      Een experiment wordt alleen aangewezen als dit beoogt bij te dragen aan het nastreven van de doelen, bedoeld in
      [artikel 1.3, aanhef en onder a][ref1], waaronder de verbetering van de kwaliteit van de fysieke leefomgeving, de
      te volgen procedures of de besluitvorming daarover.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel1
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '1'
        hoofdstuk: '1'
        afdeling: '1.2'
  - number: 23.3.3
    text: 'Bij de maatregel wordt in ieder geval bepaald:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.a
    text: wat het doel van het experiment is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.b
    text: wat de beoogde gevolgen voor de fysieke leefomgeving zijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.c
    text: welk bestuursorgaan verantwoordelijk is voor de uitvoering van het experiment,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.d
    text: |-
      wat de tijdsduur van het experiment is, waarbij geldt dat het experiment niet langer duurt dan nodig is voor het
      doel van het experiment,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.e
    text: van welke regels kan worden afgeweken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.f
    text: welke afwijkingen voor bij de maatregel aan te wijzen gevallen zijn toegestaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.g
    text: voor welk gebied of voor welke besluiten die afwijkingen zijn toegestaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.h
    text: |-
      hoe lang die afwijkingen ten hoogste, met een maximum van tien jaar als het gaat om omgevingswaarden, zijn
      toegestaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.i
    text: welke afwijkingen na afloop van het experiment toegestaan blijven,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.3.j
    text: |-
      hoe de evaluatie van het experiment wordt uitgevoerd en hoe vaak tussentijds wordt gemonitord met het oog op de
      doelen, bedoeld in het tweede lid, en de beoogde gevolgen voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.4
    text: |-
      Afwijkingen als bedoeld in het derde lid, onder i, zijn alleen toegestaan als het gaat om afwijkingen die onderdeel
      zijn van het experiment en wanneer het in overeenstemming brengen met de regelgeving na afloop van het experiment
      onevenredig is in verhouding tot het te beschermen belang van de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.5
    text: |-
      Als uit de monitoring en evaluatie, bedoeld in het derde lid, onder j, blijkt dat het experiment niet bijdraagt aan
      de doelen, bedoeld in het tweede lid, treft degene die het experiment uitvoert maatregelen gericht op het bereiken
      van die doelen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.6
    text: |-
      Het verantwoordelijke bestuursorgaan, bedoeld in het derde lid, onder c, kan aanwijzingen geven tot het treffen van
      maatregelen. [Artikel 19.4, derde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
        hoofdstuk: '19'
        afdeling: '19.1'
  - number: 23.3.7
    text: |-
      Als de te nemen maatregelen niet toereikend zijn, kan Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties
      besluiten om het experiment te beëindigen. Aan dat besluit kunnen voorschriften worden verbonden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
  - number: 23.3.8
    text: |-
      Als de evaluatie van een experiment aanleiding geeft tot het aanpassen van regelgeving, kan Onze Minister van
      Binnenlandse Zaken en Koninkrijksrelaties, in afwijking van de maatregel waarbij de tijdsduur van het experiment is
      bepaald, een besluit nemen om die tijdsduur met ten hoogste vijf jaar te verlengen met het oog op het aanpassen van
      die regelgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.3
    machine_readable:
      execution:
        parameters:
          - name: oorspronkelijke_einddatum
            type: date
            required: true
            description: Oorspronkelijke einddatum van het experiment
          - name: verlengingsjaren
            type: number
            required: true
            description: Aantal jaren verlenging
        output:
          - name: verlengde_einddatum
            type: date
            description: Einddatum na verlenging
          - name: verlenging_toegestaan
            type: boolean
            description: Of de verlenging is toegestaan (max 5 jaar)
        actions:
          - output: verlenging_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $verlengingsjaren
              value: 5
          - output: verlengde_einddatum
            value:
              operation: DATE_ADD
              date: $oorspronkelijke_einddatum
              years: $verlengingsjaren
  - number: 23.4.1
    text: |-
      Een ieder wordt langs elektronische weg in de gelegenheid gesteld gedurende een periode van ten minste vier weken
      opmerkingen te maken over het ontwerp van een algemene maatregel van bestuur of ministeriële regeling op grond van
      deze wet.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
    machine_readable:
      execution:
        parameters:
          - name: startdatum_inspraak
            type: date
            required: true
            description: Startdatum van de inspraakperiode
          - name: einddatum_inspraak
            type: date
            required: true
            description: Einddatum van de inspraakperiode
        output:
          - name: minimale_einddatum
            type: date
            description: Minimale einddatum van de inspraakperiode (4 weken na start)
          - name: voldoet_aan_minimumtermijn
            type: boolean
            description: Of de inspraakperiode ten minste vier weken bedraagt
        actions:
          - output: minimale_einddatum
            value:
              operation: DATE_ADD
              date: $startdatum_inspraak
              weeks: 4
          - output: voldoet_aan_minimumtermijn
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $einddatum_inspraak
              value: $minimale_einddatum
  - number: 23.4.2
    text: Het eerste lid is niet van toepassing als op andere wijze aan artikel 8 van het verdrag van Aarhus is voldaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
  - number: 23.4.3
    text: 'Van het eerste lid kan worden afgeweken als het ontwerp:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
  - number: 23.4.3.a
    text: wijzigingen bevat van ondergeschikte betekenis,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
  - number: 23.4.3.b
    text: alleen strekt tot uitvoering van internationaalrechtelijke verplichtingen, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
  - number: 23.4.3.c
    text: een voorziening treft die onmiddellijk nodig is.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.4
  - number: 23.5.1
    text: |-
      De voordracht voor een algemene maatregel van bestuur op grond van de [hoofdstukken 2][ref1], [3][ref2],
      [4][ref3] en [5][ref4], [afdeling 13.6][ref5], de [hoofdstukken 16][ref6], [17][ref7], [18][ref8], [19][ref9] en
      [20][ref10] en [artikel 23.3][ref11] wordt niet eerder gedaan dan vier weken nadat het ontwerp aan beide kamers der
      Staten-Generaal is overgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk5
      [ref5]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk13
      [ref6]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk16
      [ref7]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk17
      [ref8]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk18
      [ref9]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk19
      [ref10]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk20
      [ref11]: https://wetten.overheid.nl/BWBR0037885#Artikel23
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '3'
      - id: ref3
        bwb_id: BWBR0037885
        hoofdstuk: '4'
      - id: ref4
        bwb_id: BWBR0037885
        hoofdstuk: '5'
      - id: ref5
        bwb_id: BWBR0037885
        hoofdstuk: '13'
        afdeling: '13.6'
      - id: ref6
        bwb_id: BWBR0037885
        hoofdstuk: '16'
      - id: ref7
        bwb_id: BWBR0037885
        hoofdstuk: '17'
      - id: ref8
        bwb_id: BWBR0037885
        hoofdstuk: '18'
      - id: ref9
        bwb_id: BWBR0037885
        hoofdstuk: '19'
      - id: ref10
        bwb_id: BWBR0037885
        hoofdstuk: '20'
      - id: ref11
        bwb_id: BWBR0037885
        artikel: '23'
        hoofdstuk: '23'
        afdeling: '23.2'
    machine_readable:
      execution:
        parameters:
          - name: datum_overlegging_ontwerp
            type: date
            required: true
            description: Datum waarop het ontwerp aan beide kamers der Staten-Generaal is overgelegd
        output:
          - name: vroegste_voordracht_datum
            type: date
            description: Vroegste datum waarop de voordracht kan worden gedaan
        actions:
          - output: vroegste_voordracht_datum
            value:
              operation: DATE_ADD
              date: $datum_overlegging_ontwerp
              weeks: 4
  - number: 23.5.2
    text: |-
      Als het ontwerp van een algemene maatregel van bestuur omgevingswaarden bevat kan binnen de termijn, bedoeld in
      het eerste lid, een der kamers de wens te kennen geven dat die omgevingswaarden bij wet worden vastgesteld. In dat
      geval wordt een daartoe strekkend voorstel van wet zo spoedig mogelijk ingediend.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5
  - number: 23.5.3
    text: |-
      Het eerste en tweede lid zijn niet van toepassing als het ontwerp wijzigingen van ondergeschikte betekenis bevat
      die niet leiden tot andere of grotere nadelige gevolgen voor de fysieke leefomgeving of als het ontwerp alleen
      strekt tot uitvoering van internationaalrechtelijke verplichtingen. Als dat het geval is, geeft Onze Minister die
      het aangaat daarvan kennis aan beide kamers der Staten-Generaal.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5
  - number: 23.5.4
    text: |-
      Van de inwerkingtreding van een algemene maatregel van bestuur en de publicatie van het advies van de Afdeling
      advisering van de Raad van State en het uitgebrachte nader rapport van een algemene maatregel van bestuur waarbij
      toepassing is gegeven aan het eerste lid, geeft Onze Minister die het aangaat kennis aan beide kamers der Staten-
      Generaal.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5
  - number: 23.5a.1
    text: |-
      Onze Minister voor Natuur en Stikstof zendt een voorstel voor een lijst van Natura 2000-gebieden, geheel of
      gedeeltelijk gelegen in de exclusieve economische zone, of een voorstel tot wijziging daarvan, als bedoeld in
      artikel 4, eerste lid, van de habitatrichtlijn niet eerder aan de Europese Commissie dan vier weken nadat het
      ontwerp van dat voorstel aan beide kamers der Staten-Generaal is overgelegd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5a
  - number: 23.5a.2
    text: |-
      Een besluit over de aanwijzing van een Natura 2000-gebied dat geheel of gedeeltelijk is gelegen in de exclusieve
      economische zone als bedoeld in [artikel 2.44, eerste lid][ref1], wordt niet eerder genomen dan vier weken nadat
      het ontwerp van dat besluit aan beide kamers der Staten-Generaal is overgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.5a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.6.3
        afdeling: '2.6'
  - number: '23.6'
    text: |-
      Bij een algemene maatregel van bestuur waarop [artikel 23.5][ref1] van toepassing is, wordt in de nota van
      toelichting gemotiveerd op welke wijze rekening is gehouden met het voorzorgsbeginsel, het beginsel van preventief
      handelen, het beginsel dat milieuaantastingen bij voorrang aan de bron dienen te worden bestreden en het beginsel
      dat de vervuiler betaalt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel23
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '23'
        hoofdstuk: '23'
        afdeling: '23.3'
  - number: 23.6a.1
    text: |-
      Als een voorziening onmiddellijk is geboden, kunnen met het oog op het beschermen van de bodem, in afwijking van
      [artikel 4.3][ref1], bij ministeriële regeling regels worden gesteld over milieubelastende activiteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.6a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 23.6a.2
    text: |-
      De regeling vervalt twaalf maanden nadat zij in werking is getreden of, als binnen die termijn een algemene
      maatregel van bestuur ter vervanging van de regeling in werking is getreden, op laatstbedoeld tijdstip. De termijn
      kan bij ministeriële regeling eenmaal met ten hoogste zes maanden worden verlengd.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel23.6a
    machine_readable:
      execution:
        parameters:
          - name: datum_inwerkingtreding_regeling
            type: date
            required: true
            description: Datum waarop de ministeriële regeling in werking is getreden
          - name: is_verlengd
            type: boolean
            required: false
            description: Of de termijn eenmaal is verlengd
          - name: amvb_in_werking_getreden
            type: boolean
            required: false
            description: Of een vervangende AMvB binnen de termijn in werking is getreden
          - name: datum_inwerkingtreding_amvb
            type: date
            required: false
            description: Datum van inwerkingtreding van de vervangende AMvB
        output:
          - name: vervaldatum
            type: date
            description: Datum waarop de regeling vervalt
        actions:
          - output: basis_vervaldatum
            value:
              operation: DATE_ADD
              date: $datum_inwerkingtreding_regeling
              months: 12
          - output: verlengde_vervaldatum
            value:
              operation: DATE_ADD
              date: $datum_inwerkingtreding_regeling
              months: 18
          - output: vervaldatum
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $amvb_in_werking_getreden
                    value: true
                  then: $datum_inwerkingtreding_amvb
                - when:
                    operation: EQUALS
                    subject: $is_verlengd
                    value: true
                  then: $verlengde_vervaldatum
              default: $basis_vervaldatum
  - number: 23.6b.1
    text: |-
      Als een voorziening onmiddellijk nodig is, kunnen in afwijking van de [artikelen 2.24][ref1] en [5.18][ref2],
      regels als bedoeld in [artikel 2.25, eerste lid, onder a, onder 13°][ref3], en regels als bedoeld in
      [artikel 5.18][ref4] voor een Natura 2000-activiteit die stikstofdepositie veroorzaakt, bij ministeriële regeling
      worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
