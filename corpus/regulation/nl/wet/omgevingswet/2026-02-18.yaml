        hoofdstuk: '20'
        afdeling: '20.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
  - number: 20.8.1.b
    text: |-
      de wijze van actieve verstrekking van informatie als uit de monitoring blijkt dat aannemelijk is dat niet wordt
      voldaan of niet zal worden voldaan aan een omgevingswaarde of andere parameter.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.8
  - number: 20.8.2
    text: |-
      De regels strekken er mede toe dat de resultaten en gegevens, bedoeld in het eerste lid, onder a, zoveel mogelijk
      beschikbaar worden gesteld langs elektronische weg, in een open en machinaal leesbaar formaat, samen met de
      metadata. Het formaat en de metadata voldoen voor zover mogelijk aan formele open standaarden, overeenkomstig
      artikel 5, eerste lid, van de richtlijn hergebruik van overheidsinformatie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.8
  - number: 20.8.3
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld die uitvoeringstechnische of administratieve
      voorschriften bevatten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel20.8
  - number: 20.9.1
    text: |-
