  - number: 16.113.2
    text: |-
      [Artikel 6:19 van de Algemene wet bestuursrecht][ref1] is alleen van toepassing als toepassing is gegeven aan de
      [artikelen 8:51a tot en met 8:51d van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.113
