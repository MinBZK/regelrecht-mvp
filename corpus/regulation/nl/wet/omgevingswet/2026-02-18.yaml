  - number: 16.114.1
    text: |-
      Het bestuursorgaan legt de uitspraak van de rechtbank op een verzoek als bedoeld in [artikel 16.93][ref1] en de
      beschikking waarop de uitspraak betrekking heeft ter inzage.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.114
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.1
        afdeling: '16.9'
  - number: 16.114.2
    text: De termijn van terinzagelegging bedraagt ten minste zes weken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.114
  - number: 16.115.1
    text: 'Voorafgaand aan de terinzagelegging geeft het bestuursorgaan kennis van de uitspraak door middel van:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.115
  - number: 16.115.1.a
    text: |-
      toezending van de uitspraak aan de belanghebbenden aan wie de onteigeningsbeschikking op grond van
      [artikel 3:41 van de Algemene wet bestuursrecht][ref1] is bekendgemaakt, en


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.115
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 16.115.1.b
    text: |-
      kennisgeving op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.115
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 16.115.2
    text: Bij de toezending vermeldt het bestuursorgaan waar en wanneer de uitspraak ter inzage zal liggen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.115
  - number: 16.116.1
    text: |-
      Van de indiener van een verzoek om een uitspraak op het verzoek tot bekrachtiging van een onteigeningsbeschikking
      te herzien wordt een griffierecht geheven.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.116
  - number: 16.116.2
    text: 'Het griffierecht bedraagt:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.116
  - number: 16.116.2.a
    text: |-
      het tarief, bedoeld in [artikel 8:41, eerste lid, onder b, van de Algemene wet bestuursrecht][ref1], als het
      verzoek is ingediend door een natuurlijke persoon,


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.116
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.116.2.b
    text: |-
      het tarief, bedoeld in [artikel 8:41, eerste lid, onder c, van de Algemene wet bestuursrecht][ref1], als het
      verzoek anders dan door een natuurlijke persoon is ingediend.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel8
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.116
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '8'
  - number: 16.117.1
    text: |-
      Een belanghebbende en het bestuursorgaan kunnen hoger beroep instellen tegen een uitspraak van de rechtbank op een
      verzoek als bedoeld in [artikel 16.93][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.117
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.9.1
        afdeling: '16.9'
  - number: 16.117.2
    text: 'Voor zover in deze afdeling niet anders is bepaald, zijn op het hoger beroep van overeenkomstige toepassing:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.117
  - number: 16.117.2.a
    text: |-
      [afdeling 6.2 van de Algemene wet bestuursrecht][ref1], met uitzondering van de [artikelen 6:12][ref2],
      [6:13][ref3], [6:20][ref4] en [6:24][ref5],


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling6.2
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref4]: https://wetten.overheid.nl/BWBR0005537#Artikel6
      [ref5]: https://wetten.overheid.nl/BWBR0005537#Artikel6
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel16.117
