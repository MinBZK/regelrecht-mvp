    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan de toegang tot een waterstaatswerk of een weg in beheer bij het
      Rijk beperken of verbieden door dat ter plaatse, of op een andere geschikte wijze, bekend te maken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.40
  - number: 2.40.2
    text: Het eerste lid is niet van toepassing op het gebruik door het openbaar verkeer.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.40
  - number: 2.41.1
    text: |-
      Het waterschapsbestuur of het bevoegde bestuursorgaan van een ander openbaar lichaam waarbij op grond van
      [artikel 2.18, tweede lid][ref1], watersystemen in beheer zijn, stelt een of meer peilbesluiten vast voor de
      bij omgevingsverordening aangewezen oppervlaktewaterlichamen, grondwaterlichamen of onderdelen daarvan die deel
      uitmaken van die watersystemen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.41
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 2.41.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt een of meer peilbesluiten vast voor bij algemene maatregel
      van bestuur aangewezen oppervlaktewaterlichamen, grondwaterlichamen of onderdelen daarvan, die behoren tot de
      rijkswateren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.41
  - number: 2.41.3
    text: |-
      Een peilbesluit voorziet in de vaststelling van waterstanden of bandbreedten waarbinnen waterstanden kunnen
      variëren, die gedurende daarbij aangegeven perioden of omstandigheden zoveel mogelijk in stand worden gehouden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.41
  - number: 2.42.1
    text: |-
      Bij algemene maatregel van bestuur wordt de rangorde van maatschappelijke en ecologische behoeften vastgesteld, die
      bij waterschaarste of dreigende waterschaarste bepalend is voor de verdeling van het beschikbare oppervlaktewater.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.42
  - number: 2.42.2
    text: |-
      Bij of krachtens de maatregel en, als dat bij de maatregel is bepaald, bij omgevingsverordening kunnen nadere
      regels over de rangorde worden gesteld. Bij die regels kan de rangorde van overeenkomstige toepassing worden
      verklaard op het beschikbare grondwater.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.42
  - number: 2.43.1
    text: |-
      Het college van burgemeester en wethouders, het dagelijks bestuur van het waterschap, gedeputeerde staten en
      Onze Minister van Infrastructuur en Waterstaat bepalen bij besluit of, en zo ja, welke maatregelen aan een gebouw
      worden getroffen ter beperking van het geluid in het gebouw. De eerste zin is alleen van toepassing in bij algemene
      maatregel van bestuur aangewezen gevallen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.43
  - number: 2.43.2
    text: Het besluit wordt ingetrokken in gevallen of op gronden die bij algemene maatregel van bestuur worden bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.43
  - number: 2.44.1
    text: |-
      Onze Minister voor Natuur en Stikstof wijst ter uitvoering van de vogelrichtlijn of de habitatrichtlijn Natura
      2000-gebieden aan en stelt daarbij instandhoudingsdoelstellingen voor die gebieden vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.44
  - number: 2.44.2
    text: |-
      Onze Minister voor Natuur en Stikstof kan ter uitvoering van de vogelrichtlijn of de habitatrichtlijn bijzondere
      nationale natuurgebieden aanwijzen en instandhoudingsdoelstellingen voor die gebieden vaststellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.44
  - number: 2.44.3
    text: Onze Minister voor Natuur en Stikstof kan nationale parken aanwijzen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.44
  - number: 2.44.4
    text: Bij omgevingsverordening worden de gebieden aangewezen die behoren tot het natuurnetwerk Nederland.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.44
  - number: 2.44.5
    text: |-
      Bij omgevingsverordening kunnen gebieden, met uitzondering van Natura 2000-gebieden of gebieden als bedoeld in het
      vierde lid, worden aangewezen als bijzondere provinciale natuurgebieden en bijzondere provinciale landschappen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.44
  - number: 2.45.1
    text: Gedeputeerde staten kunnen de toegang tot een Natura 2000-gebied geheel of gedeeltelijk beperken of verbieden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.45
  - number: 2.45.2
    text: |-
      De bevoegdheid, bedoeld in het eerste lid, berust bij Onze Minister voor Natuur en Stikstof als een Natura 2000-
      gebied geheel of gedeeltelijk wordt beheerd door een van Onze andere Ministers dan Onze Minister voor Natuur en
      Stikstof.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.45
  - number: 2.45.3
    text: |-
      Onze Minister voor Natuur en Stikstof kan de toegang tot een bijzonder nationaal natuurgebied geheel of
      gedeeltelijk beperken of verbieden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.45
  - number: 2.45.4
    text: |-
      De bevoegdheid, bedoeld in het derde lid, berust bij gedeputeerde staten in gevallen waarin dat bij algemene
      maatregel van bestuur is bepaald.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.45
  - number: 2.46.1
    text: |-
      Onze Minister voor Natuur en Stikstof of een door hem aangewezen bestuursorgaan, kan stikstofdepositieruimte
      registreren die beschikbaar is voor toedeling aan Natura 2000-activiteiten die stikstofdepositie veroorzaken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.46
  - number: 2.46.2
    text: |-
      Stikstofdepositieruimte wordt alleen geregistreerd als aanvullende maatregelen zijn getroffen ten opzichte van de
      in het beheerplan voor het desbetreffende Natura 2000-gebied opgenomen maatregelen, die de belasting van de natuur
      door stikstof verminderen of de staat van instandhouding verbeteren.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.46
  - number: 2.46.3
    text: |-
      Het bestuursorgaan dat bevoegd is te beslissen op een aanvraag om een omgevingsvergunning voor een Natura 2000-
      activiteit die stikstofdepositie veroorzaakt, kan geregistreerde stikstofdepositieruimte toedelen aan een Natura
      2000-activiteit.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.46
  - number: 2.46.4
    text: |-
      Stikstofdepositieruimte wordt alleen toegedeeld als zij voor elke locatie van de voor stikstof gevoelige habitats
      in het Natura 2000-gebied waarop door de Natura 2000-activiteit stikstofdepositie zal worden veroorzaakt, gelijk is
      aan of groter is dan de door de activiteit te veroorzaken toename van de stikstofdepositie.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.46
  - number: 3.1.1
    text: De gemeenteraad stelt een gemeentelijke omgevingsvisie vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.1
  - number: 3.1.2
    text: Provinciale staten stellen een provinciale omgevingsvisie vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.1
  - number: 3.1.3
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties stelt, in overeenstemming met Onze Ministers die het
      aangaat, een nationale omgevingsvisie vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.1
  - number: '3.2'
    text: |-
      Een omgevingsvisie bevat, mede voor de uitoefening van de taken en bevoegdheden, bedoeld in
      [artikel 2.1, eerste lid][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.2.a
    text: een beschrijving van de hoofdlijnen van de kwaliteit van de fysieke leefomgeving,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.2
  - number: 3.2.b
    text: |-
      de hoofdlijnen van de voorgenomen ontwikkeling, het gebruik, het beheer, de bescherming en het behoud van het
      grondgebied,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.2
  - number: 3.2.c
    text: de hoofdzaken van het voor de fysieke leefomgeving te voeren integrale beleid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.2
  - number: '3.3'
    text: |-
      In een omgevingsvisie wordt rekening gehouden met het voorzorgsbeginsel, het beginsel van preventief handelen,
      het beginsel dat milieuaantastingen bij voorrang aan de bron dienen te worden bestreden en het beginsel dat de
      vervuiler betaalt.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.3
  - number: '3.4'
    text: |-
      Het college van burgemeester en wethouders, het algemeen bestuur van het waterschap, gedeputeerde staten en Onze
      Minister die het aangaat kunnen programma’s vaststellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.4
  - number: '3.5'
    text: |-
      Een programma bevat, mede voor de uitoefening van de taken en bevoegdheden, bedoeld in
      [artikel 2.1, eerste lid][ref1], voor een of meer onderdelen van de fysieke leefomgeving:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.5.a
    text: |-
      een uitwerking van het te voeren beleid voor de ontwikkeling, het gebruik, het beheer, de bescherming of het behoud
      daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.5
  - number: 3.5.b
    text: |-
      maatregelen om aan een of meer omgevingswaarden te voldoen of een of meer andere doelstellingen voor de fysieke
      leefomgeving te bereiken.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.5
  - number: 3.6.1
    text: |-
      Het college van burgemeester en wethouders van een gemeente, gelegen in een door Onze Minister van Infrastructuur
      en Waterstaat aangewezen agglomeratie als bedoeld in artikel 3, onder k, van de richtlijn omgevingslawaai, stelt
      een actieplan als bedoeld in artikel 8 van die richtlijn vast voor de volgende geluidbronnen:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
  - number: 3.6.1.a
    text: wegen en daarin gelegen spoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
  - number: 3.6.1.b
    text: andere spoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
  - number: 3.6.1.c
    text: luchthavens,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
  - number: 3.6.1.d
    text: |-
      een activiteit of een samenstel van activiteiten, waarvoor een regel als bedoeld in [artikel 2.22][ref1] of
      [2.24, eerste lid][ref2], of [paragraaf 4.1.1][ref3] voor het geluid is gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref3
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 3.6.2
    text: |-
      Het actieplan wordt vastgesteld aan de hand van de voor die geluidbronnen op grond van [artikel 20.17][ref1]
      vastgestelde geluidbelastingkaarten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.3'
  - number: '3.7'
    text: |-
      Het algemeen bestuur van het waterschap stelt voor de watersystemen die bij het waterschap in beheer
      zijn een waterbeheerprogramma vast, waarbij het rekening houdt met het regionale waterprogramma voor die
      watersystemen, voor zover het gaat om de onderdelen die uitvoering geven aan de richtlijnen, genoemd in
      [artikel 3.8, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 3.8.1
    text: |-
      Gedeputeerde staten stellen ter uitvoering van de richtlijn omgevingslawaai, overeenkomstig [artikel 3.6][ref1],
      een actieplan vast voor de volgende geluidbronnen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 3.8.1.a
    text: 'belangrijke wegen als bedoeld in artikel 3, onder n, van die richtlijn, als het gaat om wegen die:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
  - number: 3.8.1.a.1°
    text: in beheer zijn bij de provincie, of
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
  - number: 3.8.1.a.2°
    text: |-
      in beheer zijn bij een gemeente of waterschap en zijn gelegen buiten een agglomeratie als bedoeld in
      [artikel 3.6, eerste lid][ref1],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 3.8.1.b
    text: |-
      belangrijke spoorwegen als bedoeld in artikel 3, onder o, van die richtlijn, voor zover het niet gaat om spoorwegen
      als bedoeld in de [artikelen 3.6, eerste lid, onder b][ref1], en [3.9, eerste lid, onder b, onder 2°][ref2],


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 3.8.1.c
    text: |-
      burgerluchthavens van regionale betekenis, als het gaat om belangrijke luchthavens als bedoeld in artikel 3, onder
      p, van die richtlijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
  - number: 3.8.2
    text: |-
      Gedeputeerde staten stellen ter uitvoering van de grondwaterrichtlijn, de kaderrichtlijn water, de richtlijn
      overstromingsrisico’s, de zwemwaterrichtlijn en andere Europese richtlijnen over water regionale waterprogramma’s
      vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
  - number: 3.8.3
    text: |-
      Gedeputeerde staten van de provincie waarin een Natura 2000-gebied ligt of, als dat gebied in meer dan een
      provincie ligt, gedeputeerde staten van de provincie waarin dat gebied grotendeels ligt, stellen voor dat gebied
      een beheerplan vast.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.8
  - number: 3.9.1
    text: 'Onze Minister van Infrastructuur en Waterstaat stelt de volgende programma’s vast:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.1.a
    text: een nationaal nec-programma als bedoeld in artikel 6 van de nec-richtlijn,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.1.b
    text: |-
      ter uitvoering van de richtlijn omgevingslawaai, overeenkomstig [artikel 3.6][ref1], een actieplan voor de volgende
      geluidbronnen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: 3.9.1.b.1°
    text: wegen in beheer bij het Rijk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.1.b.2°
    text: hoofdspoorwegen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.1.b.3°
    text: |-
      de luchthaven Schiphol en de overige burgerluchthavens van nationale betekenis, als het gaat om belangrijke
      luchthavens als bedoeld in artikel 3, onder p, van die richtlijn.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt, in overeenstemming met Onze Ministers die het aangaat, de
      volgende programma’s vast:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2.a
    text: |-
      de stroomgebiedsbeheerplannen, bedoeld in artikel 13 van de kaderrichtlijn water, voor de Nederlandse delen van de
      stroomgebiedsdistricten Rijn, Maas, Schelde en Eems,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2.b
    text: |-
      de overstromingsrisicobeheerplannen, bedoeld in de artikelen 7 en 8 van de richtlijn overstromingsrisico’s, voor de
      stroomgebiedsdistricten, genoemd onder a,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2.c
    text: |-
      een programma van maatregelen mariene strategie als bedoeld in artikel 5, tweede lid, onder b, van de
      kaderrichtlijn mariene strategie,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2.d
    text: een maritiem ruimtelijk plan als bedoeld in artikel 4 van de kaderrichtlijn maritieme ruimtelijke planning,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.2.e
    text: een nationaal waterprogramma.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.3
    text: |-
      Het beheerplan voor een Natura 2000-gebied dat geheel of gedeeltelijk wordt beheerd door een van Onze andere
      Ministers dan Onze Minister voor Natuur en Stikstof of dat eigendom is van de Staat der Nederlanden, wordt in
      afwijking van [artikel 3.8, derde lid][ref1], voor dat gebied of dat gedeelte vastgesteld door Onze Minister bij
      wie op grond van [artikel 2.19, vijfde lid, onder b][ref2], de taak berust om zorg te dragen voor het treffen van
      maatregelen voor Natura 2000-gebieden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 3.9.4
    text: 'Onze Minister voor Natuur en Stikstof stelt een programma vast voor:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.9.4.a
    text: |-
      het verminderen van de depositie van stikstof op voor stikstof gevoelige habitats in Natura 2000-gebieden om te
      voldoen aan de omgevingswaarden, bedoeld in [artikel 2.15a, eerste lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.3.4
        afdeling: '2.3'
  - number: 3.9.4.b
    text: |-
      het bereiken van de instandhoudingsdoelstellingen voor die habitats, waarbij die Minister rekening houdt met de
      vereisten op economisch, sociaal en cultureel gebied en met de regionale en lokale bijzonderheden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.9
  - number: 3.10.1
    text: |-
      Als aannemelijk is dat niet wordt voldaan of niet zal worden voldaan aan een omgevingswaarde, stelt het college
      van burgemeester en wethouders van de gemeente waar dat het geval is een programma vast, gericht op het voldoen aan
      die omgevingswaarde.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
  - number: 3.10.2
    text: 'In afwijking van het eerste lid:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
  - number: 3.10.2.a
    text: |-
      stelt het algemeen bestuur van het waterschap of Onze Minister van Infrastructuur en Waterstaat het programma vast
      als de omgevingswaarde betrekking heeft op een watersysteem dat bij het waterschap of het Rijk in beheer is,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
  - number: 3.10.2.b
    text: |-
      kan, met inachtneming van de grenzen van [artikel 2.3, tweede en derde lid][ref1], bij algemene maatregel van
      bestuur of omgevingsverordening:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.10.2.b.1°
    text: een ander bestuursorgaan worden aangewezen dat het programma vaststelt,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
  - number: 3.10.2.b.2°
    text: |-
      worden bepaald dat in plaats van de plicht, bedoeld in het eerste lid, een daarbij aangewezen bestuursorgaan of
      andere instantie maatregelen treft, gericht op het voldoen aan de omgevingswaarde.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.10
  - number: 3.11.1
    text: |-
      Het bestuursorgaan dat een programma als bedoeld in deze paragraaf heeft vastgesteld, wijzigt dat programma
      als uit de monitoring, bedoeld in [artikel 20.1, eerste lid][ref1], blijkt dat met dat programma niet aan de
      omgevingswaarde kan worden voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
        hoofdstuk: '20'
        afdeling: '20.1'
  - number: 3.11.2
    text: Het programma wordt zo gewijzigd dat binnen een passende termijn aan de omgevingswaarde wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.11
  - number: '3.12'
    text: |-
      Bij algemene maatregel van bestuur kan worden bepaald dat de in de programma’s opgenomen maatregelen of de
      maatregelen, bedoeld in [artikel 3.10, tweede lid, onder b, onder 2°][ref1], uitgevoerd moeten worden of
      operationeel moeten zijn volgens de daarbij te stellen regels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.2
        afdeling: '3.2'
  - number: '3.13'
    text: |-
      Bij algemene maatregel van bestuur kunnen bestuursorganen worden verplicht om programma’s als bedoeld in deze
      paragraaf gezamenlijk vast te stellen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.13
  - number: '3.14'
    text: |-
      Het college van burgemeester en wethouders kan ter invulling van de taak, bedoeld in
      [artikel 2.16, eerste lid, onder a, onder 1° tot en met 3°][ref1], een gemeentelijk rioleringsprogramma
      vaststellen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.4.1
        afdeling: '2.4'
  - number: 3.14a
    text: |-
      Als gedeputeerde staten met betrekking tot een gebied overgaan tot landinrichting als bedoeld in
      [artikel 12.3, eerste lid][ref1], stellen zij een programma vast dat is gericht op de verbetering van de inrichting
      van het gebied. Het inrichtingsprogramma kan in ieder geval de maatregelen en voorzieningen, bedoeld in artikel
      12.3, bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.14a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.2
        afdeling: '12.1'
  - number: 3.15.1
    text: Deze paragraaf is van toepassing op programma’s als bedoeld in het tweede tot en met vierde lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.15
  - number: 3.15.2
    text: |-
      Bij omgevingsplan kunnen programma’s als bedoeld in [artikel 3.16][ref1] worden aangewezen, die betrekking
      hebben op omgevingswaarden van de gemeente als bedoeld in [paragraaf 2.3.2][ref2] of een andere doelstelling
      voor de fysieke leefomgeving waarvoor in dat omgevingsplan een regel over het verlenen of weigeren van een
      omgevingsvergunning voor een omgevingsplanactiviteit is gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel3.15
    references:
