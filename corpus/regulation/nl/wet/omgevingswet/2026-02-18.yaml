  - number: 2.39.1
    text: |-
      De beheerder van waterstaatswerken stelt een legger vast, waarin is omschreven waaraan die waterstaatswerken naar
      ligging, vorm, afmeting en constructie moeten voldoen.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel2.39
