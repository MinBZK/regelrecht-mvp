        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 4.1.1
    text: |-
      Bij omgevingsplan, waterschapsverordening en omgevingsverordening kunnen met het oog op de doelen van de wet regels
      worden gesteld over activiteiten die gevolgen hebben of kunnen hebben voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.1
  - number: 4.1.2
    text: |-
      Bij ministeriële regeling kunnen meet- en rekenvoorschriften worden gesteld over activiteiten als bedoeld in het
      eerste lid.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.1
  - number: 4.1.3
    text: |-
      Bij het stellen van de regels in de omgevingsverordening en de ministeriële regeling worden de grenzen van
      [artikel 2.3, tweede en derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 4.2.1
    text: |-
      Het omgevingsplan bevat voor het gehele grondgebied van de gemeente in ieder geval de regels die nodig zijn met het
      oog op een evenwichtige toedeling van functies aan locaties.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.2
  - number: 4.2.2
    text: |-
      Bij omgevingsverordening kunnen alleen regels worden gesteld over activiteiten die gevolgen hebben of kunnen hebben
      voor de fysieke leefomgeving met het oog op een evenwichtige toedeling van functies aan locaties, als het onderwerp
      van zorg niet doelmatig en doeltreffend met een regel als bedoeld in [artikel 2.22][ref1] of een instructie als
      bedoeld in [artikel 2.33, eerste lid][ref2], kan worden behartigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.1
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.5.2
        afdeling: '2.5'
  - number: 4.3.1
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de volgende activiteiten die gevolgen hebben of
      kunnen hebben voor de fysieke leefomgeving:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.a
    text: bouwactiviteiten, sloopactiviteiten en het gebruik en het in stand houden van bouwwerken,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.b
    text: milieubelastende activiteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.c
    text: 'lozingsactiviteiten op:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.c.1°
    text: een oppervlaktewaterlichaam,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.c.2°
    text: een zuiveringtechnisch werk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.d
    text: wateronttrekkingsactiviteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.e
    text: mijnbouwlocatieactiviteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.f
    text: 'beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.f.1°
    text: een weg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.f.2°
    text: een waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.f.3°
    text: een installatie in een waterstaatswerk,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.g
    text: het gelegenheid bieden tot zwemmen of baden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.h
    text: activiteiten die cultureel erfgoed betreffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.i
    text: activiteiten die werelderfgoed betreffen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.j
    text: |-
      Natura 2000-activiteiten en activiteiten met mogelijke verslechterende of significant verstorende gevolgen voor een
      Natura 2000-gebied of een bijzonder nationaal natuurgebied,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.k
    text: |-
      de uitoefening van de jacht en activiteiten om populaties van in het wild levende dieren te beheren of om schade
      door dieren te bestrijden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.l
    text: |-
      het gebruik en het onder zich hebben van middelen of installaties en het toepassen van methoden om dieren te vangen
      of te doden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.m
    text: het vangen, doden en verwerken van walvissen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.n
    text: activiteiten die de introductie of verspreiding van invasieve uitheemse soorten tot gevolg hebben of kunnen hebben,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.o
    text: het vellen en beheren van houtopstanden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.1.p
    text: landinrichtingsactiviteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.2
    text: |-
      Bij algemene maatregel van bestuur worden regels gesteld over de volgende activiteiten met dieren, planten, stoffen
      of zaken waarvan de daaraan voorafgaande verkrijging of productie gevolgen heeft of kan hebben voor de fysieke
      leefomgeving:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.2.a
    text: |-
      het verhandelen, het om een andere reden dan verkoop onder zich hebben en het binnen of buiten het grondgebied van
      Nederland brengen van dieren, planten of producten daarvan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.2.b
    text: het verhandelen en het binnen het grondgebied van Nederland brengen van hout of houtproducten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.2.c
    text: |-
      het verhandelen en het binnen of buiten het grondgebied van Nederland brengen van middelen of installaties om
      dieren te vangen of te doden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3
    text: |-
      Bij algemene maatregel van bestuur kunnen met het oog op de doelen van de wet regels worden gesteld over de
      volgende activiteiten die gevolgen hebben of kunnen hebben voor de fysieke leefomgeving:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.a
    text: ontgrondingsactiviteiten,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.b
    text: stortingsactiviteiten op zee,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.c
    text: 'beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.c.1°
    text: een luchthaven,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.c.2°
    text: een hoofdspoorweg, lokale spoorweg of bijzondere spoorweg,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.3.d
    text: flora- en fauna-activiteiten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.4
    text: |-
      De regels kunnen bij ministeriële regeling worden gesteld als deze uitvoeringstechnische, administratieve en meet-
      of rekenvoorschriften inhouden.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
  - number: 4.3.5
    text: |-
      Bij het stellen van de regels worden de grenzen van [artikel 2.3, derde lid][ref1], in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 4.4.1
    text: |-
      Regels als bedoeld in [paragraaf 4.1.1][ref1] kunnen inhouden een verbod om zonder voorafgaande melding aan het
      bevoegd gezag een activiteit te verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.4.2
    text: |-
      De regels in het omgevingsplan, de waterschapsverordening of de omgevingsverordening kunnen inhouden een verbod om
      een activiteit zonder omgevingsvergunning te verrichten.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.4
  - number: 4.5.1
    text: |-
      Bij regels als bedoeld in [paragraaf 4.1.1][ref1] kunnen onderwerpen worden aangewezen waarvoor het
      bevoegd gezag maatwerkvoorschriften kan stellen of voorschriften aan een omgevingsvergunning kan verbinden.
      [Paragraaf 4.3.2][ref2] is van overeenkomstige toepassing op het stellen van maatwerkvoorschriften op grond van
      regels als bedoeld in [artikel 4.3][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.5.2
    text: |-
      De maatwerkvoorschriften of vergunningvoorschriften kunnen afwijken van regels als bedoeld in
      [paragraaf 4.1.1][ref1] als dat bij die regels is bepaald. Daarbij kan worden bepaald in welke mate of hoe lang kan
      worden afgeweken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.5.3
    text: |-
      Bij regels als bedoeld in [paragraaf 4.1.1][ref1] kan ook worden bepaald dat een maatwerkvoorschrift niet kan
      worden gesteld als over een onderwerp een voorschrift aan een omgevingsvergunning kan worden verbonden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.6.1
    text: |-
      Bij regels als bedoeld in [artikel 4.1][ref1] die in de omgevingsverordening zijn opgenomen kan worden bepaald dat
      in het omgevingsplan of de waterschapsverordening over daarbij aangewezen onderwerpen maatwerkregels kunnen worden
      gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.6.2
    text: |-
      Bij regels als bedoeld in [artikel 4.3][ref1] kan worden bepaald dat in het omgevingsplan, de omgevingsverordening
      of de waterschapsverordening over daarbij aangewezen onderwerpen maatwerkregels kunnen worden gesteld.
      [Paragraaf 4.3.2][ref2] is van overeenkomstige toepassing op het stellen van maatwerkregels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.3.2
        afdeling: '4.3'
  - number: 4.6.3
    text: |-
      De maatwerkregels kunnen afwijken van de in de omgevingsverordening gestelde regels of van regels als bedoeld in
      [artikel 4.3][ref1], als dat bij die regels is bepaald. Daarbij kan worden bepaald in welke mate of hoe lang kan
      worden afgeweken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.7.1
    text: |-
      Als regels als bedoeld in [paragraaf 4.1.1][ref1] voorschrijven dat een maatregel moet worden getroffen, kan
      op aanvraag toestemming worden verleend om, in plaats daarvan, een gelijkwaardige maatregel te treffen. Met de
      gelijkwaardige maatregel wordt ten minste hetzelfde resultaat bereikt als met de voorgeschreven maatregel is
      beoogd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.7.2
    text: |-
      Bij regels als bedoeld in [paragraaf 4.1.1][ref1] kan het treffen van een gelijkwaardige maatregel worden
      toegestaan zonder voorafgaande toestemming, al dan niet gekoppeld aan een verbod om de maatregel te treffen zonder
      voorafgaande melding aan het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.7.3
    text: |-
      Bij regels als bedoeld in [paragraaf 4.1.1][ref1] kunnen nadere regels worden gesteld over de toepassing van het
      eerste en tweede lid, of kan het treffen van een gelijkwaardige maatregel worden uitgesloten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.8.1
    text: |-
      Voor het omgevingsplan is het college van burgemeester en wethouders, voor de waterschapsverordening is het
      dagelijks bestuur van het waterschap en voor de omgevingsverordening zijn gedeputeerde staten:
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.8
  - number: 4.8.1.a
    text: het bevoegd gezag waaraan een melding wordt gedaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.8
  - number: 4.8.1.b
    text: het bevoegd gezag dat een maatwerkvoorschrift kan stellen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.8
  - number: 4.8.1.c
    text: het bevoegd gezag dat beslist op een aanvraag om toestemming tot het treffen van een gelijkwaardige maatregel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.8
  - number: 4.8.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op de bij ministeriële regeling gestelde meet- en
      rekenvoorschriften, bedoeld in [artikel 4.1, tweede lid][ref1], voor zover die betrekking hebben op
      activiteiten waarover regels zijn gesteld in respectievelijk het omgevingsplan, de waterschapsverordening en de
      omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: '4.9'
    text: |-
      Tenzij op grond van de [artikelen 4.10 tot en met 4.13][ref1] anders is bepaald, wordt op grond van
      [artikel 4.3][ref2] het college van burgemeester en wethouders aangewezen als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.9.a
    text: het bevoegd gezag waaraan een melding wordt gedaan,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.9
  - number: 4.9.b
    text: het bevoegd gezag dat een maatwerkvoorschrift kan stellen,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.9
  - number: 4.9.c
    text: het bevoegd gezag dat beslist op een aanvraag om toestemming tot het treffen van een gelijkwaardige maatregel.
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.9
  - number: '4.10'
    text: |-
      Op grond van [artikel 4.3][ref1] worden met het oog op een doelmatig waterbeheer voor wateractiviteiten gevallen
      aangewezen waarin het dagelijks bestuur van het waterschap, gedeputeerde staten of Onze Minister van Infrastructuur
      en Waterstaat het bevoegd gezag is.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.11.1
    text: |-
      Op grond van [artikel 4.3][ref1] worden voor de volgende activiteiten gevallen aangewezen waarin gedeputeerde
      staten het bevoegd gezag zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.1
        afdeling: '4.1'
  - number: 4.11.1.a
    text: het gelegenheid bieden tot zwemmen en baden,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.11
  - number: 4.11.1.b
    text: milieubelastende activiteiten die gevolgen hebben of kunnen hebben voor het grondwater,
    url: https://wetten.overheid.nl/BWBR0037885/2026-02-18#Artikel4.11
