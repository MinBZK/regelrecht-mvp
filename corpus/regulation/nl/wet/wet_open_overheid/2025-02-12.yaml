  # Hoofdstuk 1 - Rechten
  - number: '1.1'
    text: |-
      Eenieder heeft recht op toegang tot publieke informatie zonder daartoe een belang te hoeven stellen, behoudens bij
      deze wet gestelde beperkingen.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel1.1

  # Hoofdstuk 2 - Algemene bepalingen
  - number: '2.1'
    text: |-
      In deze wet en de daarop berustende bepalingen wordt verstaan onder:

      a. document: een door een orgaan, persoon of college als bedoeld in artikel 2.2, eerste lid, opgemaakt of ontvangen
      schriftelijk stuk of ander geheel van vastgelegde gegevens dat naar zijn aard verband houdt met de publieke taak van
      dat orgaan, die persoon of dat college;

      b. milieu-informatie: hetgeen daaronder wordt verstaan in artikel 19.1a van de Wet milieubeheer;

      c. Onze Minister: Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties;

      d. publieke informatie: informatie neergelegd in documenten die berusten bij een orgaan, persoon of college als
      bedoeld in artikel 2.2, eerste lid, of informatie die krachtens artikel 2.3 door een bestuursorgaan kan worden
      gevorderd.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel2.1
    machine_readable:
      definitions:
        verantwoordelijke_autoriteit: Minister van Binnenlandse Zaken en Koninkrijksrelaties
      execution:
        actions:
          - output: wet_naam
            value: Wet open overheid
          - output: bevoegd_gezag
            value: Minister van Binnenlandse Zaken en Koninkrijksrelaties

  - number: '2.2'
    text: |-
      1. Deze wet is van toepassing op:
      a. bestuursorganen;
      b. de Kamers en de verenigde vergadering der Staten-Generaal;
      c. de Raad voor de rechtspraak en het College van afgevaardigden;
      d. de Raad van State, tenzij de Raad het koninklijk gezag uitoefent, en met uitzondering van de Afdeling
      bestuursrechtspraak;
      e. de Algemene Rekenkamer;
      f. de Nationale ombudsman en de substituut-ombudsmannen als bedoeld in artikel 9, eerste lid, van de Wet Nationale
      ombudsman, en ombudsmannen en ombudscommissies als bedoeld in artikel 9:17, onderdeel b, van de Algemene wet
      bestuursrecht.

      2. Voor de toepassing van deze wet worden de organen, personen en colleges, bedoeld in het eerste lid, onderdelen b
      tot en met f, die op grond van de Algemene wet bestuursrecht geen bestuursorgaan zijn, gelijk gesteld met een
      bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel2.2

  - number: '2.4'
    text: |-
      1. Een bestuursorgaan draagt er zorg voor dat de documenten die het ontvangt, vervaardigt of anderszins onder zich
      heeft, zich in goede, geordende en toegankelijke staat bevinden.

      2. Een bestuursorgaan draagt er zoveel mogelijk zorg voor dat de informatie die het overeenkomstig deze wet verstrekt,
      actueel, nauwkeurig en vergelijkbaar is.

      3. Indien een bestuursorgaan overeenkomstig deze wet informatie openbaar maakt, geschiedt dat op zodanige wijze dat de
      belanghebbende en belangstellende burger zoveel mogelijk wordt bereikt en op de volgende algemeen toegankelijke wijze:
      a. in elektronische vorm, in een machinaal leesbaar open formaat, samen met de metadata, overeenkomstig artikel 5,
      eerste lid, van de Richtlijn 2003/98/EG van het Europees Parlement en de Raad van 17 november 2003 inzake het
      hergebruik van overheidsinformatie (PbEG 2003 L 345), zoals deze is gewijzigd bij Richtlijn 2013/37/EU van het
      Europees Parlement en de Raad van 26 juni 2013 tot wijziging van Richtlijn 2003/98/EG inzake het hergebruik van
      overheidsinformatie (PbEU 2013 L 175);
      b. of, indien verstrekking in een machinaal leesbaar open formaat redelijkerwijs niet gevergd kan worden, in andere
      elektronisch doorzoekbare vorm;
      c. of, indien elektronische verschaffing redelijkerwijs niet gevergd kan worden, door verstrekking van een kopie van
      de letterlijke inhoud ervan in andere vorm te verstrekken;
      d. of, indien verstrekking van een kopie of de letterlijke inhoud redelijkerwijs niet gevergd kan worden, door een
      uittreksel of een samenvatting van de inhoud te geven, inlichtingen daaruit te verschaffen of door terinzagelegging.

      4. Een bestuursorgaan is niet verantwoordelijk voor de juistheid of de volledigheid van door derden opgestelde
      informatie.

      5. Indien het bestuursorgaan kennis draagt van de onjuistheid of onvolledigheid van de verstrekte informatie, doet het
      hiervan mededeling.

      6. Indien het bestuursorgaan informatie verstrekt, verstrekt het zo nodig, en voor zover deze informatie voorhanden
      is, tevens informatie over de methoden die zijn gebruikt bij het samenstellen van de informatie.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel2.4

  - number: '2.5'
    text: |-
      Bij de toepassing van deze wet wordt uitgegaan van het algemeen belang van openbaarheid van publieke informatie voor
      de democratische samenleving.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel2.5

  # Hoofdstuk 3 - Openbaarmaking uit eigen beweging
  - number: '3.1'
    text: |-
      1. Het bestuursorgaan dat het rechtstreeks aangaat, maakt bij de uitvoering van zijn taak uit eigen beweging de bij
      het bestuursorgaan berustende informatie neergelegd in documenten voor eenieder openbaar, indien dit zonder
      onevenredige inspanning of kosten redelijkerwijs mogelijk is, behoudens voor zover de artikelen 5.1, eerste, tweede en
      vijfde lid, en 5.2 aan openbaarmaking in de weg staan of met de openbaarmaking geen redelijk belang wordt gediend.
      Deze informatie betreft in ieder geval informatie over het beleid, inclusief de voorbereiding, uitvoering, naleving,
      handhaving en evaluatie.

      2. Het bestuursorgaan doet bij een gedeeltelijke niet-openbaarmaking hiervan mededeling gelijktijdig met de
      openbaarmaking.

      3. Documenten als bedoeld in het eerste lid worden niet openbaar gemaakt dan nadat belanghebbenden die naar
      verwachting bedenkingen zullen hebben tegen openbaarmaking, in de gelegenheid zijn gesteld binnen een door het
      bestuursorgaan gestelde termijn hun zienswijze naar voren te brengen.

      4. Het bestuursorgaan deelt een belanghebbende mede dat toepassing wordt gegeven aan het eerste lid, onder vermelding
      van het tijdstip van openbaarmaking en de openbaar te maken documenten. De mededeling wordt gelijkgesteld met een
      besluit.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.1

  - number: '3.3'
    text: |-
      1. Een bestuursorgaan maakt in ieder geval uit eigen beweging openbaar:
      a. wetten en andere algemeen verbindende voorschriften;
      b. overige besluiten van algemene strekking;
      c. [dit onderdeel is nog niet in werking getreden];
      d. inzicht in zijn organisatie en werkwijze, waaronder de taken en bevoegdheden van de organisatieonderdelen;
      e. de bereikbaarheid van het bestuursorgaan en zijn organisatieonderdelen en de wijze waarop een verzoek om informatie
      kan worden ingediend.

      2. Behoudens voor zover de artikelen 5.1, eerste, tweede en vijfde lid, en 5.2 daaraan in de weg staan, maakt het
      bestuursorgaan voorts uit eigen beweging openbaar:
      a. [dit onderdeel is nog niet in werking getreden];
      b. vergaderstukken en verslagen van de Kamers en de verenigde vergadering der Staten-Generaal en hun commissies,
      tenzij deze betrekking hebben op door de regering vertrouwelijk aan de Staten-Generaal verstrekte informatie;
      c. [dit onderdeel is nog niet in werking getreden];
      d. [dit onderdeel is nog niet in werking getreden];
      e. [dit onderdeel is nog niet in werking getreden];
      f. [dit onderdeel is nog niet in werking getreden];
      g. [dit onderdeel is nog niet in werking getreden];
      h. [dit onderdeel is nog niet in werking getreden];
      i. [dit onderdeel is nog niet in werking getreden];
      j. [dit onderdeel is nog niet in werking getreden];
      k. [dit onderdeel is nog niet in werking getreden];
      l. [dit onderdeel is nog niet in werking getreden].

      3. Op voordracht van Onze Minister kan bij algemene maatregel van bestuur worden bepaald dat:
      a. het bestuursorgaan andere categorieen van informatie uit eigen beweging openbaar maakt overeenkomstig het eerste of
      tweede lid; en
      b. categorieen van beschikkingen worden aangewezen die in afwijking van het tweede lid, onderdeel k, uit eigen
      beweging openbaar gemaakt worden.

      4. De openbaarmaking, bedoeld in het eerste en tweede lid, geschiedt zo spoedig mogelijk, doch uiterlijk binnen twee
      weken na vaststelling of ontvangst van de informatie.

      5. In afwijking van het vierde lid:
      a. worden de ontwerpen en de bijbehorende adviesaanvragen, bedoeld in het eerste lid, onderdeel c, alsmede de daarop
      betrekking hebbende adviezen, bedoeld in het tweede lid, onderdeel e, onder 1, door het bestuursorgaan dat het advies
      heeft gevraagd openbaar gemaakt uiterlijk gelijktijdig met de indiening van het voorstel van wet bij de
      Staten-Generaal dan wel de bekendmaking van het algemeen verbindend voorschrift of besluit, indien het bestuursorgaan
      in zijn adviesaanvraag heeft gemotiveerd dat eerdere openbaarmaking afbreuk zou doen aan een met de wet, het
      voorschrift of het besluit beoogde doel;
      b. worden in geval van voorstellen van algemene begrotingswetten en de stukken betreffende de verantwoording van de
      ontvangsten en de uitgaven van het Rijk als bedoeld in artikel 105, eerste, tweede en derde lid, van de Grondwet, de
      daarbij behorende toelichtende stukken, alsmede in geval van een op het in artikel 65 van de Grondwet bedoelde
      tijdstip ingediende voorstel van wet voor zover dat voorstel betrekking heeft op het heffen van belasting, de versies
      waarover een adviesaanvraag wordt gedaan, de op die versies betrekking hebbende adviezen als bedoeld in het tweede
      lid, onderdeel e, en de op die versies betrekking hebbende onderzoeken als bedoeld in het tweede lid, onderdeel j,
      openbaar gemaakt gelijktijdig met de indiening van het voorstel van wet of de stukken bij de Staten-Generaal;
      c. worden vergaderstukken als bedoeld in het tweede lid, onderdelen b en c, openbaar gemaakt, gelijktijdig met de
      verspreiding aan de deelnemers van de betreffende vergadering;
      d. worden agenda's als bedoeld in het tweede lid, onderdeel d, openbaar gemaakt, uiterlijk bij aanvang van de
      betreffende vergadering;
      e. wordt de inhoud van een schriftelijk verzoek als bedoeld in het tweede lid, onderdeel i, openbaar gemaakt met de
      beslissing op dat verzoek;
      f. geschiedt de openbaarmaking van onderzoeken als bedoeld in het tweede lid, onderdeel j, onder 1, uiterlijk binnen
      vier weken na ontvangst van het onderzoek;
      g. geschiedt de openbaarmaking van een beschikking houdende een herstelsanctie die niet in het tweede lid, onderdeel
      k, onder 6, is uitgezonderd, uiterlijk twee weken nadat de beschikking onherroepelijk is geworden;
      h. worden ingekomen documenten als bedoeld in het tweede lid, niet openbaar gemaakt dan nadat belanghebbenden die naar
      verwachting bedenkingen zullen hebben tegen openbaarmaking, in de gelegenheid zijn gesteld binnen twee weken hun
      zienswijze naar voren te brengen;
      i. worden documenten als bedoeld in het tweede lid, waarbij gedurende de voorbereiding ervan of na toepassing van
      onderdeel h is gebleken dat een belanghebbende naar verwachting bezwaar heeft tegen een voorgeschreven openbaarmaking,
      openbaar gemaakt na twee weken na vaststelling, onderscheidenlijk het verstrijken van de op grond van onderdeel h
      gestelde termijn om een zienswijze naar voren te brengen.

      6. De openbaarmaking, bedoeld in het tweede lid, onderdeel e, geschiedt:
      a. voor een adviesaanvraag aan een adviescollege of -commissie door het bestuursorgaan dat het advies heeft gevraagd;
      b. voor een advies van een adviescollege of -commissie door dat adviescollege of die commissie, behoudens de gevallen,
      bedoeld in het vijfde lid, onderdelen a en b;
      c. voor een advies van een andere externe partij door het bestuursorgaan dat het advies heeft ontvangen.

      7. Het bestuursorgaan deelt een belanghebbende mede dat toepassing wordt gegeven aan het vijfde lid, onderdeel i,
      onder vermelding van het tijdstip van openbaarmaking en de openbaar te maken documenten. De mededeling wordt
      gelijkgesteld met een besluit.

      8. Het bestuursorgaan doet mededeling van een gedeeltelijke niet-openbaarmaking gelijktijdig met de openbaarmaking.
      Van een gehele niet-openbaarmaking doet het bestuursorgaan mededeling op de wijze en het tijdstip waarop het
      niet-openbaar gemaakte stuk openbaar zou zijn gemaakt.

      9. Onze Minister kan bij ministeriele regeling nadere regels stellen over de wijze waarop in dit artikel genoemde
      documenten actief openbaar worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.3

  - number: 3.3a
    text: |-
      1. Een bestuursorgaan kan in plaats van door openbaarmaking overeenkomstig artikel 3.3, tweede lid, onderdeel k, de
      informatie over beschikkingen inzake subsidies aan anderen dan natuurlijke personen openbaar maken in een voor
      personen elektronisch raadpleegbaar overzicht, waarbij, voor zover de informatie in de beschikking is opgenomen en de
      artikelen 5.1, eerste, tweede en vijfde lid, en 5.2 niet aan openbaarmaking in de weg staan, in ieder geval openbaar
      wordt gemaakt:
      a. de grondslag van de subsidie;
      b. de ontvanger;
      c. de activiteiten waarvoor de subsidie wordt verstrekt, alsmede in de beschikking opgenomen doelvoorschriften;
      d. de hoogte van verleningen, vaststellingen en wijzigingen;
      e. de intrekkingen;
      f. de dagtekening van de beschikking.

      2. Een bestuursorgaan kan in plaats van door openbaarmaking overeenkomstig artikel 3.3, tweede lid, onderdeel k, de
      informatie over andere beschikkingen dan beschikkingen inzake subsidies openbaar maken in een voor personen
      elektronisch raadpleegbaar overzicht, waarbij, voor zover de informatie in de beschikking is opgenomen en de artikelen
      5.1, eerste, tweede en vijfde lid, en 5.2 niet aan openbaarmaking in de weg staan, in ieder geval openbaar wordt
      gemaakt:
      a. de grondslag van de beschikking;
      b. het rechtsgevolg van de beschikking, inclusief in de beschikking opgenomen voorschriften;
      c. de duur van de beschikking;
      d. de geadresseerde, voor zover de bescherming van de persoonlijke levenssfeer hieraan niet in de weg staat;
      e. de dagtekening van de beschikking.

      3. Een bestuursorgaan kan in plaats van door openbaarmaking overeenkomstig artikel 3.3, tweede lid, onderdeel l, de
      informatie over schriftelijke oordelen in klachtprocedures openbaar maken in een voor personen elektronisch
      raadpleegbaar overzicht, waarbij, voor zover de informatie in het oordeel is opgenomen en de artikelen 5.1, eerste,
      tweede en vijfde lid, en 5.2 niet aan openbaarmaking in de weg staan, in ieder geval openbaar wordt gemaakt:
      a. de datum van ontvangst van de klacht;
      b. het betrokken organisatieonderdeel;
      c. de functiebenaming van de ambtenaar over wie is geklaagd;
      d. de omschrijving van de gedraging waartegen de klacht gericht is;
      e. de bevindingen;
      f. het oordeel;
      g. de conclusies;
      h. de dagtekening van het oordeel.

      4. Een bestuursorgaan kan in het overzicht, bedoeld in het derde lid, vergelijkbare klachten betreffende een
      organisatieonderdeel gecombineerd weergeven, indien ook het oordeel en de conclusies vergelijkbaar zijn. Voor iedere
      gecombineerde weergave wordt in plaats van de informatie, bedoeld in het derde lid, onderdelen a en h, het aantal
      verzonden oordelen per maand vermeld.

      5. Een overzicht als bedoeld in dit artikel wordt ten minste iedere twee weken bijgewerkt.

      6. Onze Minister kan bij ministeriele regeling nadere regels stellen over de wijze waarop in dit artikel genoemde
      overzichten actief openbaar worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.3a

  - number: 3.3b
    text: |-
      De openbaarmaking van de in de artikelen 3.3 en 3.3a genoemde documenten geschiedt elektronisch op een algemeen
      toegankelijke wijze door middel van een door Onze Minister in stand gehouden digitale infrastructuur. Deze
      infrastructuur is beschikbaar voor de openbaarmaking van andere documenten.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.3b

  - number: '3.4'
    text: |-
      In afwijking van de artikelen 5.1 en 5.2 kan een bestuursorgaan informatie uit eigen beweging openbaar maken, wanneer
      een ander zwaarwegend algemeen belang, daaronder begrepen het belang van openbare veiligheid, de volksgezondheid of
      het milieu of de bescherming van de democratische rechtsorde, dat in een concreet geval vergt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.4

  - number: '3.5'
    text: |-
      Een bestuursorgaan besteedt in de jaarlijkse begroting dan wel de jaarlijkse begroting van het openbaar lichaam of de
      rechtspersoon waarvan het bestuursorgaan deel uit maakt, aandacht aan de beleidsvoornemens inzake de uitvoering van
      deze wet en doet in de jaarlijkse verantwoording verslag van de uitvoering ervan, mede in relatie tot de
      beleidsvoornemens.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel3.5

  # Hoofdstuk 4 - Openbaarmaking op verzoek
  - number: '4.1'
    text: |-
      1. Eenieder kan een verzoek om publieke informatie richten tot een bestuursorgaan of een onder verantwoordelijkheid
      van een bestuursorgaan werkzame instelling, dienst of bedrijf. In het laatste geval beslist het verantwoordelijke
      bestuursorgaan op het verzoek.

      2. Een verzoek kan mondeling of schriftelijk worden ingediend en kan elektronisch worden verzonden op de door het
      bestuursorgaan aangegeven wijze.

      3. De verzoeker behoeft bij zijn verzoek geen belang te stellen.

      4. De verzoeker vermeldt bij zijn verzoek de aangelegenheid of het daarop betrekking hebbende document, waarover hij
      informatie wenst te ontvangen.

      5. Indien een verzoek te algemeen geformuleerd is, verzoekt het bestuursorgaan binnen twee weken na ontvangst van het
      verzoek de verzoeker om het verzoek te preciseren en is het de verzoeker daarbij behulpzaam.

      6. Het bestuursorgaan kan besluiten een verzoek niet te behandelen, indien de verzoeker niet meewerkt aan een verzoek
      tot precisering als bedoeld het vijfde lid. In afwijking van artikel 4:5, vierde lid, van de Algemene wet
      bestuursrecht wordt het besluit om het verzoek niet te behandelen aan de verzoeker bekendgemaakt binnen twee weken
      nadat het verzoek is gepreciseerd of nadat de daarvoor gestelde termijn ongebruikt is verstreken.

      7. Een verzoek om informatie wordt ingewilligd met inachtneming van het bepaalde in hoofdstuk 5.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.1

  - number: 4.1a
    text: |-
      Het bestuursorgaan waarborgt het behoud van de documenten waarop een door hem ontvangen verzoek betrekking heeft.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.1a

  - number: '4.2'
    text: |-
      1. Voor zover het verzoek betrekking heeft op informatie die berust bij een ander bestuursorgaan dan dat waarbij het
      verzoek is ingediend, wordt de verzoeker zo nodig naar dat bestuursorgaan verwezen. Is het verzoek schriftelijk
      gedaan, dan wordt het voor zover betrekking hebbend op informatie die bij een ander bestuursorgaan berust, onverwijld
      doorgezonden aan dat bestuursorgaan, onder mededeling van de doorzending aan de verzoeker.

      2. Indien het verzoek betrekking heeft op informatie die op grond van enig wettelijk voorschrift bij het
      bestuursorgaan had behoren te berusten, vordert het bestuursorgaan de gevraagde informatie van degene die over de
      informatie beschikt. Degene die over de gevraagde informatie beschikt, verstrekt deze per omgaande aan het
      bestuursorgaan.

      3. Voor zover een verzoek als bedoeld in artikel 4.1, eerste lid, dat is gericht aan een der Kamers of de verenigde
      vergadering der Staten-Generaal, betrekking heeft op informatie die door de regering vertrouwelijk aan de
      Staten-Generaal is verstrekt, zendt de Kamer of de verenigde vergadering het verzoek ter behandeling door aan Onze
      Minister of Onze Ministers die deze informatie vertrouwelijk heeft of hebben verstrekt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.2

  - number: 4.2a
    text: |-
      Indien een voldoende gespecificeerd verzoek zodanig omvangrijk is dat niet binnen de termijn van artikel 4.4, eerste
      lid, kan worden beslist, treedt het bestuursorgaan voor het einde van die termijn in overleg met de verzoeker over de
      prioritering van de afhandeling van het verzoek. Het bestuursorgaan verstrekt de gevraagde documenten zo veel mogelijk
      in de door de verzoeker gewenste volgorde.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.2a

  - number: '4.3'
    text: |-
      1. De beslissing op een verzoek om informatie wordt mondeling of schriftelijk genomen.

      2. Het bestuursorgaan besluit in ieder geval schriftelijk op een verzoek om informatie, indien:
      a. het schriftelijke verzoek geheel of gedeeltelijk wordt afgewezen;
      b. de verzoeker bij gehele of gedeeltelijke afwijzing van het mondelinge verzoek verzoekt om een schriftelijk besluit;
      c. de gevraagde informatie slechts wordt verstrekt aan de verzoeker overeenkomstig artikel 5.5, artikel 5.6 of artikel
      5.7 en aan de verstrekking voorwaarden worden verbonden; of
      d. de gevraagde informatie betrekking heeft op of afkomstig is van derden, tenzij deze hebben verklaard aan een
      schriftelijk besluit geen behoefte te hebben.

      3. Bij de afwijzing van een mondeling verzoek, wordt de verzoeker gewezen op de mogelijkheid van een schriftelijk
      besluit.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.3

  - number: '4.4'
    text: |-
      1. Het bestuursorgaan beslist op het verzoek om informatie zo spoedig mogelijk, doch uiterlijk binnen vier weken
      gerekend vanaf de dag na die waarop het verzoek is ontvangen.

      2. Het bestuursorgaan kan de beslissing voor ten hoogste twee weken verdagen, indien de omvang of de gecompliceerdheid
      van de informatie een verlenging rechtvaardigt. Van de verdaging wordt voor de afloop van de eerste termijn
      schriftelijk gemotiveerd mededeling gedaan aan de verzoeker.

      3. Onverminderd artikel 4:15 van de Algemene wet bestuursrecht wordt de termijn voor het geven van een beschikking
      opgeschort gerekend vanaf de dag na die waarop het bestuursorgaan de verzoeker meedeelt dat toepassing is gegeven aan
      artikel 4:8 van de Algemene wet bestuursrecht, tot en met de dag waarop door de belanghebbende of belanghebbenden een
      zienswijze naar voren is gebracht of de daarvoor gestelde termijn ongebruikt is verstreken.

      4. Indien de opschorting, bedoeld in het derde lid, eindigt, doet het bestuursorgaan daarvan zo spoedig mogelijk
      mededeling aan de verzoeker, onder vermelding van de termijn binnen welke de beschikking alsnog moet worden gegeven.

      5. Indien het bestuursorgaan heeft besloten informatie te verstrekken, wordt de informatie verstrekt tegelijk met de
      bekendmaking van het besluit, tenzij naar verwachting een belanghebbende bezwaar daartegen heeft, in welk geval de
      informatie wordt verstrekt twee weken nadat de beslissing is bekendgemaakt. Indien wordt verzocht om een voorlopige
      voorziening als bedoeld in artikel 8:81 van de Algemene wet bestuursrecht, wordt de openbaarmaking opgeschort totdat
      de voorzieningenrechter uitspraak heeft gedaan of het verzoek is ingetrokken.

      6. Indien het bestuursorgaan heeft besloten informatie te verstrekken die rechtstreeks betrekking heeft op een derde
      of die van een derde afkomstig is, deelt het bestuursorgaan dit besluit gelijktijdig mede aan deze derde.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.4
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: verzoek_ontvangst_datum
            type: date
            required: true
          - name: is_verdaagd
            type: boolean
            required: true
          - name: heeft_derde_belanghebbende
            type: boolean
            required: true
        output:
          - name: beslistermijn_weken
            type: number
          - name: uiterste_beslisdatum
            type: date
          - name: openbaarmaking_datum
            type: date
        actions:
          - output: beslistermijn_weken
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_verdaagd
                    value: true
                  then: 6
              default: 4
          - output: uiterste_beslisdatum
            value:
              operation: DATE_ADD
              date: $verzoek_ontvangst_datum
              weeks: $beslistermijn_weken
          - output: openbaarmaking_datum
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $heeft_derde_belanghebbende
                    value: true
                  then:
                    operation: DATE_ADD
                    date: $uiterste_beslisdatum
                    weeks: 2
              default: $uiterste_beslisdatum

  - number: '4.5'
    text: |-
      1. Het bestuursorgaan verstrekt de informatie in de door verzoeker verzochte vorm of, indien dit redelijkerwijs niet
      gevergd kan worden, met inachtneming van het bepaalde in artikel 2.4, derde lid.

      2. Indien de informatie reeds in een voor de verzoeker gemakkelijk toegankelijke vorm voor het publiek beschikbaar is,
      wijst het bestuursorgaan de verzoeker daarop.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.5

  - number: '4.6'
    text: |-
      Indien de verzoeker kennelijk een ander doel heeft dan het verkrijgen van publieke informatie of indien het verzoek
      evident geen bestuurlijke aangelegenheid betreft, kan het bestuursorgaan binnen twee weken na ontvangst van het
      verzoek, dan wel onverwijld nadat is gebleken dat de verzoeker kennelijk een ander doel heeft dan het verkrijgen van
      publieke informatie, besluiten het verzoek niet te behandelen.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.6

  - number: '4.7'
    text: |-
      Ter beantwoording van vragen over de beschikbaarheid van publieke informatie wijst het bestuursorgaan een of meer
      contactpersonen aan.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel4.7

  # Hoofdstuk 5 - Uitzonderingen
  - number: '5.1'
    text: |-
      1. Het openbaar maken van informatie ingevolge deze wet blijft achterwege voor zover dit:
      a. de eenheid van de Kroon in gevaar zou kunnen brengen;
      b. de veiligheid van de Staat zou kunnen schaden;
      c. bedrijfs- en fabricagegegevens betreft die door natuurlijke personen of rechtspersonen vertrouwelijk aan de
      overheid zijn meegedeeld;
      d. persoonsgegevens betreft als bedoeld in paragraaf 3.1 onderscheidenlijk paragraaf 3.2 van de Uitvoeringswet
      Algemene verordening gegevensbescherming, tenzij de betrokkene uitdrukkelijk toestemming heeft gegeven voor de
      openbaarmaking van deze persoonsgegevens of deze persoonsgegevens kennelijk door de betrokkene openbaar zijn gemaakt;
      e. nummers betreft die dienen ter identificatie van personen die bij wet of algemene maatregel van bestuur zijn
      voorgeschreven als bedoeld in artikel 46 van de Uitvoeringswet Algemene verordening gegevensbescherming, tenzij de
      verstrekking kennelijk geen inbreuk op de levenssfeer maakt.

      2. Het openbaar maken van informatie blijft eveneens achterwege voor zover het belang daarvan niet opweegt tegen de
      volgende belangen:
      a. de betrekkingen van Nederland met andere landen en staten en met internationale organisaties;
      b. de economische of financiele belangen van de Staat, andere publiekrechtelijke lichamen of bestuursorganen, in geval
      van milieu-informatie slechts voor zover de informatie betrekking heeft op handelingen met een vertrouwelijk karakter;
      c. de opsporing en vervolging van strafbare feiten;
      d. de inspectie, controle en toezicht door bestuursorganen;
      e. de eerbiediging van de persoonlijke levenssfeer;
      f. de bescherming van andere dan in het eerste lid, onderdeel c, genoemde concurrentiegevoelige bedrijfs- en
      fabricagegegevens;
      g. de bescherming van het milieu waarop deze informatie betrekking heeft;
      h. de beveiliging van personen en bedrijven en het voorkomen van sabotage;
      i. het goed functioneren van de Staat, andere publiekrechtelijke lichamen of bestuursorganen.

      3. Indien een verzoek tot openbaarmaking op een van de in het tweede lid genoemde gronden wordt afgewezen, bevat het
      besluit hiervoor een uitdrukkelijke motivering.

      4. Openbaarmaking kan tijdelijk achterwege blijven, indien het belang van de geadresseerde van de informatie om als
      eerste kennis te nemen van de informatie dit kennelijk vereist. Het bestuursorgaan doet mededeling aan de verzoeker
      van de termijn waarbinnen de openbaarmaking alsnog zal geschieden.

      5. In uitzonderlijke gevallen kan openbaarmaking van andere informatie dan milieu-informatie voorts achterwege blijven
      indien openbaarmaking onevenredige benadeling toebrengt aan een ander belang dan genoemd in het eerste of tweede lid
      en het algemeen belang van openbaarheid niet tegen deze benadeling opweegt. Het bestuursorgaan baseert een beslissing
      tot achterwege laten van de openbaarmaking van enige informatie op deze grond ten aanzien van dezelfde informatie niet
      tevens op een van de in het eerste of tweede lid genoemde gronden.

      6. Het openbaar maken van informatie blijft in afwijking van het eerste lid, onderdeel c, in geval van
      milieu-informatie eveneens achterwege voor zover daardoor het in het eerste lid, onderdeel c, genoemde belang ernstig
      geschaad wordt en het algemeen belang van openbaarheid van informatie niet opweegt tegen deze schade.

      7. Het eerste en tweede lid zijn niet van toepassing op milieu-informatie die betrekking heeft op emissies in het
      milieu.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.1
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: raakt_eenheid_kroon
            type: boolean
            required: true
          - name: raakt_veiligheid_staat
            type: boolean
            required: true
          - name: bevat_vertrouwelijke_bedrijfsgegevens
            type: boolean
            required: true
          - name: bevat_bijzondere_persoonsgegevens
            type: boolean
            required: true
          - name: bevat_identificatienummers
            type: boolean
            required: true
          - name: betrokkene_heeft_toestemming
            type: boolean
            required: true
          - name: is_milieu_informatie
            type: boolean
            required: true
          - name: betreft_emissies
            type: boolean
            required: true
          - name: raakt_internationale_betrekkingen
            type: boolean
            required: true
          - name: raakt_economische_belangen
            type: boolean
            required: true
          - name: raakt_opsporing_vervolging
            type: boolean
            required: true
          - name: raakt_inspectie_toezicht
            type: boolean
            required: true
          - name: raakt_persoonlijke_levenssfeer
            type: boolean
            required: true
          - name: raakt_concurrentiegevoelige_gegevens
            type: boolean
            required: true
          - name: raakt_milieubescherming
            type: boolean
            required: true
          - name: raakt_beveiliging_personen
            type: boolean
            required: true
          - name: raakt_goed_functioneren_staat
            type: boolean
            required: true
          - name: belang_openbaarheid_weegt_zwaarder
            type: boolean
            required: true
        output:
          - name: heeft_absolute_weigeringsgrond
            type: boolean
          - name: heeft_relatieve_weigeringsgrond
            type: boolean
          - name: openbaarmaking_toegestaan
            type: boolean
        actions:
          - output: heeft_absolute_weigeringsgrond
            value:
              operation: IF
              cases:
                - when:
                    operation: AND
                    conditions:
                      - $is_milieu_informatie
                      - $betreft_emissies
                  then: false
              default:
                operation: OR
                conditions:
                  - $raakt_eenheid_kroon
                  - $raakt_veiligheid_staat
                  - $bevat_vertrouwelijke_bedrijfsgegevens
                  - operation: AND
                    conditions:
                      - $bevat_bijzondere_persoonsgegevens
                      - operation: NOT
                        value:
                          operation: EQUALS
                          subject: $betrokkene_heeft_toestemming
                          value: true
                  - $bevat_identificatienummers
          - output: heeft_relatieve_weigeringsgrond
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value: $belang_openbaarheid_weegt_zwaarder
                - operation: OR
                  conditions:
                    - $raakt_internationale_betrekkingen
                    - $raakt_economische_belangen
                    - $raakt_opsporing_vervolging
                    - $raakt_inspectie_toezicht
                    - $raakt_persoonlijke_levenssfeer
                    - $raakt_concurrentiegevoelige_gegevens
                    - $raakt_milieubescherming
                    - $raakt_beveiliging_personen
                    - $raakt_goed_functioneren_staat
          - output: openbaarmaking_toegestaan
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value: $heeft_absolute_weigeringsgrond
                - operation: NOT
                  value: $heeft_relatieve_weigeringsgrond

  - number: '5.2'
    text: |-
      1. In geval van een verzoek om informatie uit documenten, opgesteld ten behoeve van intern beraad, wordt geen
      informatie verstrekt over daarin opgenomen persoonlijke beleidsopvattingen. Onder persoonlijke beleidsopvattingen
      worden verstaan ambtelijke adviezen, visies, standpunten en overwegingen ten behoeve van intern beraad, niet zijnde
      feiten, prognoses, beleidsalternatieven, de gevolgen van een bepaald beleidsalternatief of andere onderdelen met een
      overwegend objectief karakter.

      2. Het bestuursorgaan kan over persoonlijke beleidsopvattingen met het oog op een goede en democratische
      bestuursvoering informatie verstrekken in niet tot personen herleidbare vorm. Indien degene die deze opvattingen heeft
      geuit of zich erachter heeft gesteld, daarmee heeft ingestemd, kan de informatie in tot personen herleidbare vorm
      worden verstrekt.

      3. Onverminderd het eerste en tweede lid wordt uit documenten opgesteld ten behoeve van formele bestuurlijke
      besluitvorming door een minister, een commissaris van de Koning, Gedeputeerde Staten, een gedeputeerde, het college
      van burgemeester en wethouders, een burgemeester, een wethouder, het dagelijks bestuur van een waterschap of een lid
      van dat bestuur, informatie verstrekt over persoonlijke beleidsopvattingen in niet tot personen herleidbare vorm,
      tenzij het kunnen voeren van intern beraad onevenredig wordt geschaad.

      4. In afwijking van het eerste lid wordt bij milieu-informatie het belang van de bescherming van de persoonlijke
      beleidsopvattingen afgewogen tegen het belang van openbaarmaking. Informatie over persoonlijke beleidsopvattingen kan
      worden verstrekt in niet tot personen herleidbare vorm. Indien degene die deze opvattingen heeft geuit of zich
      erachter heeft gesteld, daarmee heeft ingestemd, kan de informatie in tot personen herleidbare vorm worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.2

  - number: '5.3'
    text: |-
      Bij een verzoek om informatie die ouder is dan vijf jaar motiveert het bestuursorgaan bij een weigering van die
      informatie waarom de in artikel 5.1, tweede of vijfde lid, of artikel 5.2 bedoelde belangen ondanks het tijdsverloop
      zwaarder wegen dan het algemeen belang van openbaarheid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.3
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: informatie_datum
            type: date
            required: true
        output:
          - name: informatie_leeftijd_jaren
            type: number
          - name: verzwaarde_motiveringsplicht
            type: boolean
        actions:
          - output: informatie_leeftijd_jaren
            value:
              operation: AGE
              date_of_birth: $informatie_datum
              reference_date: $referencedate
          - output: verzwaarde_motiveringsplicht
            value:
              operation: GREATER_THAN
              subject: $informatie_leeftijd_jaren
              value: 5

  - number: '5.4'
    text: |-
      In afwijking van de artikelen 5.1 en 5.2 is informatie die berust bij de formateur of de informateur, dan wel
      informatie die door een bestuursorgaan aan de formateur of de informateur is gezonden niet openbaar totdat de formatie
      is afgerond.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.4

  - number: 5.4a
    text: |-
      1. In afwijking van de artikelen 5.1 en 5.2 is niet openbaar de informatie betreffende de ondersteuning van
      individuele leden van de Eerste Kamer of de Tweede Kamer der Staten-Generaal, provinciale staten of de gemeenteraad
      door ambtenaren werkzaam bij de Eerste Kamer of de Tweede Kamer, de griffie van provinciale staten of de griffie van
      de gemeenteraad.

      2. In afwijking van artikel 5.2, eerste lid, wordt met betrekking tot informatie die aan individuele Kamerleden wordt
      verstrekt onder persoonlijke beleidsopvattingen verstaan ambtelijke adviezen, visies, standpunten en overwegingen ten
      behoeve van intern beraad.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.4a

  - number: '5.5'
    text: |-
      1. Onverminderd het elders bij wet bepaalde, verstrekt een bestuursorgaan iedere natuurlijke of rechtspersoon op diens
      verzoek de op de verzoeker betrekking hebbende in documenten neergelegde informatie, tenzij een in artikel 5.1, eerste
      lid, onderdelen a, b en c, alsmede d en e, voor zover betrekking hebbend op derden, genoemd belang aan de orde is of
      een in artikel 5.1, tweede of vijfde lid, of artikel 5.2 genoemd belang zwaarder weegt dan het belang van de verzoeker
      bij toegang tot op hem betrekking hebbende informatie. De verzoeker vermeldt bij zijn verzoek de aangelegenheid of het
      daarop betrekking hebbende document, waarover hij informatie wenst te ontvangen.

      2. Het eerste lid is van overeenkomstige toepassing op een verzoek met betrekking tot gegevens ten aanzien van een
      overleden echtgenoot, geregistreerd partner, kind of ouder van de verzoeker, tenzij een schriftelijke wilsverklaring
      van de overledene aan de verstrekking in de weg staat.

      3. Het bestuursorgaan draagt zorg voor een deugdelijke vaststelling van de identiteit van de verzoeker.

      4. Het bestuursorgaan kan aan de verstrekking voorwaarden verbinden ter bescherming van een van de belangen, genoemd
      in de artikelen 5.1 en 5.2, tenzij de gevraagde informatie met toepassing van de artikelen 5.1 en 5.2 openbaar voor
      eenieder zou zijn.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.5

  - number: '5.6'
    text: |-
      1. Het bestuursorgaan kan, in geval informatie ingevolge de artikelen 5.1 en 5.2 niet openbaar gemaakt kan worden,
      besluiten de informatie uitsluitend aan de verzoeker te verstrekken, indien er klemmende redenen zijn om de verzoeker
      niettegenstaande de toepasselijke uitzonderingsgrond of -gronden de gevraagde informatie niet te onthouden.

      2. Het eerste lid vindt slechts toepassing voor zover dit niet in strijd is met een toepasselijke geheimhoudingsplicht.

      3. Het bestuursorgaan kan aan de verstrekking voorwaarden verbinden ter bescherming van een van de belangen, genoemd
      in de artikelen 5.1 en 5.2.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.6

  - number: '5.7'
    text: |-
      1. Een bestuursorgaan kan ten behoeve van historisch, statistisch, wetenschappelijk of journalistiek onderzoek toegang
      bieden tot informatie:
      a. die ingevolge de artikelen 5.1 en 5.2 niet openbaar gemaakt kan worden; of
      b. waarvan de vaststelling of deze informatie ingevolge de artikelen 5.1 en 5.2 openbaar gemaakt kan worden een
      onevenredige inspanning vergt.

      2. Het bestuursorgaan kan aan het verlenen van toegang voorwaarden verbinden.

      3. De toegang tot informatie overeenkomstig het eerste lid wordt in ieder geval verleend onder de voorwaarde dat
      degene aan wie toegang wordt verleend, de verkregen informatie niet verder verspreidt zonder voorafgaand besluit van
      het bestuursorgaan waarin de informatie met toepassing van de artikelen 5.1 en 5.2 openbaar gemaakt wordt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel5.7

  # Hoofdstuk 6 - Digitale informatiehuishouding
  - number: '6.1'
    text: |-
      Het bestuursorgaan treft maatregelen ten behoeve van het duurzaam toegankelijk maken van de digitale documenten,
      bedoeld in artikel 2.4, eerste lid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel6.1

  - number: '6.2'
    text: |-
      1. Onze Minister, in overeenstemming met Onze Minister van Onderwijs, Cultuur en Wetenschap, zendt een meerjarenplan
      naar de Staten-Generaal over de wijze waarop bestuursorganen hun digitale overheidsinformatie duurzaam toegankelijk
      maken.

      2. Het meerjarenplan bevat langetermijndoelen voor de verbetering van de wijze waarop digitale documenten worden
      vervaardigd, geordend, bewaard, vernietigd en ontsloten alsmede de stappen die daartoe op korte termijn worden gezet.

      3. Het meerjarenplan voorziet in stappen waarmee wordt bereikt dat eenieder zo veel mogelijk inzicht kan hebben in de
      aanwezigheid van publieke informatie bij een orgaan, persoon of college als bedoeld in artikel 2.2, eerste lid.

      4. Onze Minister, in overeenstemming met Onze Minister van Onderwijs, Cultuur en Wetenschap, vult het meerjarenplan
      aan met de nodige maatregelen tot de digitale overheidsinformatie voldoende duurzaam toegankelijk is.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel6.2

  # Hoofdstuk 7 - Het adviescollege openbaarheid en informatiehuishouding
  - number: '7.1'
    text: |-
      1. Er is een Adviescollege openbaarheid en informatiehuishouding.

      2. Het college bestaat uit een voorzitter en ten hoogste vier andere leden.

      3. De benoeming van de leden bij koninklijk besluit geschiedt op voordracht van Onze Minister, in overeenstemming met
      Onze Minister van Onderwijs, Cultuur en Wetenschap.

      4. De artikelen 13, 16 en 19 van de Kaderwet zelfstandige bestuursorganen zijn van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel7.1

  - number: '7.2'
    text: |-
      1. Het college adviseert de regering en de beide Kamers der Staten-Generaal gevraagd en ongevraagd over de uitvoering
      van de regels over openbaarmaking van publieke informatie.

      2. Het college adviseert Onze Minister periodiek over aanpassing van het meerjarenplan. Het college rapporteert in
      zijn advies in elk geval over de stand van de informatiehuishouding in het bestuur, de voortgang van de uitvoering van
      het meerjarenplan en de toegang tot de publieke informatie.

      3. Het college wordt om advies gevraagd over voorstellen van wet en ontwerpen van algemene maatregelen van bestuur die
      geheel of voor een belangrijk deel betrekking hebben op de openbaarmaking en de ontsluiting van publieke informatie.

      4. Het college adviseert het betrokken bestuursorgaan naar aanleiding van bij het college ingediende klachten van
      journalisten, wetenschappers of andere naar het oordeel van het college in aanmerking komende groepen met een
      beroepsmatig belang bij het gebruik van publieke informatie over de wijze waarop dat bestuursorgaan publieke
      informatie openbaar maakt.

      5. Het college bevordert de toepassing van deze wet, onder meer door:
      a. het geven van voorlichting aan bestuursorganen en anderen;
      b. het opleiden van personen werkzaam bij organen belast met de uitvoering van openbaarmaking van publieke informatie;
      c. het monitoren en onderzoeken van en rapporteren over de openbaarmaking van publieke informatie in algemene zin of
      door specifieke organen in het bijzonder;
      d. het publiceren van richtsnoeren ter bevordering van de openbaarmaking uit eigen beweging en de ontsluiting van
      informatie.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel7.2

  - number: '7.3'
    text: |-
      1. Alvorens een advies als bedoeld in artikel 7.2, vierde lid, uit te brengen, bemiddelt het college tussen het
      bestuursorgaan en de klager. Het bestuursorgaan werkt aan de bemiddeling mee.

      2. Indien de klacht mede betrekking heeft op een besluit op grond van deze wet waartegen bezwaar open staat, wordt de
      termijn voor het indienen van bezwaar, bedoeld in artikel 6:7 van de Algemene wet bestuursrecht, opgeschort tot het
      college advies heeft uitgebracht, dan wel aan de klager en het bestuursorgaan heeft bericht dat geen advies zal worden
      uitgebracht. De opschorting van de bezwaartermijn vangt aan met ingang van de dag nadat de klager de klacht aan het
      college heeft gezonden.

      3. Indien de klager bezwaar maakt tegen het besluit, bedoeld in het tweede lid, beslist het bestuursorgaan in
      afwijking van artikel 7:10, eerste lid, van de Algemene wet bestuursrecht binnen twee weken nadat het college advies
      heeft uitgebracht, dan wel aan de klager en het bestuursorgaan heeft bericht dat geen advies zal worden uitgebracht.

      4. Bij algemene maatregel van bestuur kunnen nadere regels worden gesteld over de wijze waarop klachten worden
      ingediend en het college tussen het bestuursorgaan en de klager bemiddelt als bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel7.3

  - number: '7.4'
    text: |-
      Een bestuursorgaan verstrekt desgevraagd het college alle gegevens die het nodig heeft voor zijn taak.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel7.4

  - number: '7.5'
    text: |-
      1. De leden van het college alsmede de ambtenaren van zijn bureau zijn tot geheimhouding verplicht voor zover zij
      krachtens deze wet beschikken over documenten die door het bestuursorgaan waarvan zij afkomstig zijn niet openbaar
      zijn gemaakt.

      2. Voor zover een aan het college gericht verzoek op grond van deze wet betrekking heeft op door een bestuursorgaan
      aan het college verstrekte informatie, zendt het college het verzoek ter behandeling door aan het bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel7.5

  # Hoofdstuk 8 - Overige bepalingen
  - number: '8.1'
    text: |-
      1. Overtreding van een voorwaarde die op grond van artikel 5.5, vierde lid, 5.6, derde lid, of artikel 5.7, tweede of
      derde lid, aan een verstrekking is verbonden, wordt gestraft met gevangenisstraf van ten hoogste een jaar of geldboete
      van de vierde categorie.

      2. Het in het eerste lid strafbaar gestelde feit is een misdrijf.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.1

  - number: '8.2'
    text: |-
      Paragraaf 4.1.3.2 van de Algemene wet bestuursrecht is niet van toepassing op besluiten op grond van deze wet en op
      beslissingen op bezwaar tegen deze besluiten.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.2
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        output:
          - name: dwangsom_van_toepassing
            type: boolean
        actions:
          - output: dwangsom_van_toepassing
            value: false

  - number: '8.4'
    text: |-
      1. In geval van een gegrond beroep tegen het niet tijdig nemen van een besluit op grond van deze wet of een beslissing
      op bezwaar tegen een dergelijk besluit, waarbij nog geen besluit is bekendgemaakt, bepaalt de bestuursrechter, indien
      de omvang van het verzoek hiertoe aanleiding geeft, in afwijking van artikel 8:55d, eerste lid, van de Algemene wet
      bestuursrecht de termijn waarbinnen het bestuursorgaan alsnog een besluit bekendmaakt.

      2. Indien de bestuursrechter oordeelt dat het niet tijdig nemen van een besluit kennelijk het gevolg is van de wijze
      van indiening van het verzoek en nog geen besluit is bekendgemaakt, bepaalt de bestuursrechter, indien het verzoek
      hiertoe aanleiding geeft, in afwijking van artikel 8:55d, eerste lid, van de Algemene wet bestuursrecht een langere
      termijn waarbinnen het bestuursorgaan alsnog een besluit bekendmaakt.

      3. De bestuursrechter kan artikel 8:74, eerste lid, van de Algemene wet bestuursrecht buiten toepassing laten en een
      proceskostenveroordeling op grond van artikel 8:75, eerste lid, van de Algemene wet bestuursrecht achterwege laten,
      indien de indiener van het beroepschrift, gelet op de omvang van het verzoek, onvoldoende heeft meegewerkt aan het
      bereiken van overeenstemming over:
      a. een opschorting van de beslistermijn als bedoeld in artikel 4:15, tweede lid, onderdeel a, van de Algemene wet
      bestuursrecht; of
      b. verder uitstel van de beslistermijn, bedoeld in artikel 7:10, vierde lid, onderdeel a of b, van de Algemene wet
      bestuursrecht.

      4. De bestuursrechter kan eveneens artikel 8:74, eerste lid, van de Algemene wet bestuursrecht buiten toepassing laten
      en een proceskostenveroordeling op grond van artikel 8:75, eerste lid, van de Algemene wet bestuursrecht achterwege
      laten, indien hij oordeelt dat het niet tijdig nemen van een besluit kennelijk het gevolg is van de wijze van
      indiening van het verzoek.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.4

  - number: '8.5'
    text: |-
      Het bestuursorgaan is bevoegd tot oplegging van een last onder dwangsom ter handhaving van artikel 4.2, tweede lid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.5

  - number: '8.6'
    text: |-
      1. De openbaarmaking van informatie op grond van deze wet is kosteloos.

      2. Voor de vervaardiging van kopieen van documenten kan een bestuursorgaan een redelijke vergoeding vragen, die de
      kostprijs van de verstrekte informatiedragers niet overstijgt.

      3. Op voordracht van Onze Minister kunnen bij of krachtens algemene maatregel van bestuur regels worden gesteld met
      betrekking tot het tweede lid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.6

  - number: '8.7'
    text: |-
      Op voordracht van Onze Minister kunnen bij of krachtens algemene maatregel van bestuur regels worden gesteld over de
      wijze waarop een bestuursorgaan de uitvoering van deze wet organiseert.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.7

  - number: '8.8'
    text: |-
      De artikelen 3.1, 3.3, 4.1, 5.1, eerste, tweede en vijfde lid, en 5.2 zijn niet van toepassing op informatie waarvoor
      een bepaling geldt die is opgenomen in de bijlage bij deze wet.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.8

  - number: '8.9'
    text: |-
      1. Onze Minister zendt binnen vijf jaar na de inwerkingtreding van deze wet aan de Staten-Generaal een verslag over de
      doeltreffendheid en de effecten van deze wet in de praktijk.

      2. In deze evaluatie wordt in ieder geval aandacht besteed aan de vraag of het noodzakelijk is om een
      Informatiecommissaris in te stellen.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel8.9

  # Hoofdstuk 10 - Slotbepalingen
  - number: '10.1'
    text: |-
      De Wet openbaarheid van bestuur wordt ingetrokken.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.1

  - number: '10.2'
    text: |-
      1. Documenten die voor de inwerkingtreding van deze wet zijn opgesteld, worden niet openbaar gemaakt op grond van
      artikel 3.1, eerste lid, of artikel 3.3, eerste of tweede lid, tenzij het bestuursorgaan dat redelijkerwijs mogelijk
      acht.

      2. Het eerste lid is niet van toepassing op documenten die voor de datum van inwerkingtreding van deze wet zijn
      opgesteld en waarvan de aktieve openbaarmaking reeds op grond van de Wet openbaarheid van bestuur plaatsvond.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2

  - number: 10.2a
    text: |-
      Voor documenten die voor de inwerkingtreding van deze wet zijn opgesteld en waarop een verzoek betrekking heeft, zijn
      de bepalingen van deze wet van toepassing, tenzij toepassing daarvan onredelijk bezwarend is voor het betrokken
      bestuursorgaan.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2a

  - number: 10.2b
    text: |-
      De bepalingen van deze wet zijn niet van toepassing op adviezen van de Afdeling advisering van de Raad van State die
      voor de inwerkingtreding van deze wet zijn uitgebracht.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2b

  - number: 10.2c
    text: |-
      De bepalingen van deze wet zijn niet van toepassing op documenten waarop artikel 8.8 van toepassing is die voor de
      inwerkingtreding van deze wet zijn opgesteld.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2c

  - number: 10.2d
    text: |-
      Artikel 10.2b laat onverlet de bepalingen van de Rijkswet Koninkrijksgeschillen.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2d

  - number: 10.2f
    text: |-
      Hoofdstuk 6 van deze wet vervalt op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2f

  - number: 10.2g
    text: |-
      Artikel 10.2e vervalt.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.2g

  - number: '10.3'
    text: |-
      Deze wet treedt in werking op een bij koninklijk besluit te bepalen tijdstip.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.3

  - number: '10.4'
    text: |-
      Deze wet wordt aangehaald als: Wet open overheid.
    url: https://wetten.overheid.nl/BWBR0045754/2025-02-12#Artikel10.4
