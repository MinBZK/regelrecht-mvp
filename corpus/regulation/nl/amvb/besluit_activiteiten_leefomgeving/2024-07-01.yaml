        bwb_id: BWBR0030111
  - number: 15.33.2.b
    text: |-
      water dat voldoet aan de kwaliteitseisen, bedoeld in [artikel 15.34][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.33
