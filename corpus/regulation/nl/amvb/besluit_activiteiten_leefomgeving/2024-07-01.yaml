        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: '11.123'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 11.113][ref1] of [11.114][ref2], wordt onverwijld geïnformeerd over een
      ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.123
    references:
