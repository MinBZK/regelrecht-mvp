        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.1
        afdeling: '18.1'
  - number: 18.11.1.a
    text: |-
      het door een onderneming of rechtspersoon laten reizen van een werknemer tussen de woon- of verblijfplaats van de
      werknemer en de locatie waar de arbeid pleegt te worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.11.1.b
    text: |-
      het door een onderneming of rechtspersoon laten reizen van een werknemer in het kader van de dienstbetrekking, met
      uitzondering van woon-werkmobiliteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.11.2
    text: 'Onder de aanwijzing valt niet het laten reizen van een werknemer:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.11.2.a
    text: buiten Nederland, voor zover de reizen van de werknemer niet in Nederland beginnen of eindigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.11.2.b
    text: |-
      door een onderneming of rechtspersoon die geen financiële vergoeding, fiets, bromfiets, motorvoertuig,
      vervoersbewijs voor openbaar vervoer of andere mobiliteitsvoorziening beschikbaar stelt voor zakelijke mobiliteit
      of woon-werkmobiliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.11.2.c
    text: |-
      door een in Nederland gevestigde onderneming of rechtspersoon die op 1 januari van het kalenderjaar, bedoeld in
      [artikel 18.15, eerste lid][ref1], in totaal minder dan 100 werknemers heeft;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
    machine_readable:
      definitions:
        drempel_werknemers: 100
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: aantal_werknemers
            type: number
            required: true
            description: Totaal aantal werknemers op 1 januari van het kalenderjaar
            source: {}
          - name: gevestigd_in_nederland
            type: boolean
            required: true
            description: Of de onderneming of rechtspersoon in Nederland is gevestigd
            source: {}
        output:
          - name: onder_werknemersdrempel
            type: boolean
            description: Of de onderneming minder dan 100 werknemers heeft
          - name: uitzondering_van_toepassing
            type: boolean
            description: Of deze uitzondering op de aanwijzing van toepassing is
        actions:
          - output: onder_werknemersdrempel
            value:
              operation: LESS_THAN
              subject: $aantal_werknemers
              value: $drempel_werknemers
          - output: uitzondering_van_toepassing
            value:
              operation: AND
              conditions:
                - $gevestigd_in_nederland
                - $onder_werknemersdrempel
    references:
      - id: ref1
        bwb_id: BWBR0041330
