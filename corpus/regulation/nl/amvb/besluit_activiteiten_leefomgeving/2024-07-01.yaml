      beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg of bijzondere spoorweg te verrichten, geldt voor
      de activiteiten, bedoeld in [artikel 9.43][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
    references:
