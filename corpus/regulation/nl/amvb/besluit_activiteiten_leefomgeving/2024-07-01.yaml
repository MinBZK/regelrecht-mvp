        artikel: '8'
      - id: ref3
        bwb_id: BWBR0041278
        afdeling: '8.3'
  - number: 6.7.5.e
    text: |-
      als het gaat om een beperkingengebiedactiviteit met betrekking tot een mijnbouwinstallatie:
      [artikel 8.2 van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 6.7.6
    text: |-
      Bij het stellen van een maatwerkvoorschrift over een ontgrondingsactiviteit wordt rekening gehouden met de gronden,
      bedoeld in [artikel 8.76, tweede lid, onder a en b, van het Besluit kwaliteit leefomgeving][ref1]. Op het stellen
      van dat maatwerkvoorschrift zijn de beoordelingsregels in artikel 8.76, eerste en derde lid, van dat besluit en
      [afdeling 8.3 van het Omgevingsbesluit][ref2] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Afdeling8.3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0041278
        afdeling: '8.3'
  - number: '6.8'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.8
  - number: 6.8.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.8
  - number: 6.8.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.8
  - number: 6.8.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.8
  - number: 6.8.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.8
  - number: '6.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in deze afdeling, worden die ondertekend
      en voorzien van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.9
  - number: 6.9.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.9
  - number: 6.9.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.9
  - number: 6.9.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.9
  - number: 6.9.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.9
  - number: 6.10.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 6.8][ref1] en [6.9][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in deze afdeling.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.10.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.10
  - number: 6.11.1
    text: |-
      Op verzoek van het bevoegd gezag, bedoeld in [artikel 6.3][ref1], worden over lozingsactiviteiten als bedoeld
      in [artikel 6.1][ref2] de gegevens en bescheiden verstrekt die nodig zijn om te bezien of de algemene regels en
      maatwerkvoorschriften voor de activiteit toereikend zijn, gezien de ontwikkelingen van de technische mogelijkheden
      tot het beschermen van de chemische en ecologische kwaliteit van watersystemen en de ontwikkelingen met betrekking
      tot die kwaliteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.11.2
    text: |-
      Gegevens en bescheiden worden verstrekt voor zover degene die de activiteit verricht er redelijkerwijs de
      beschikking over kan krijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.11
  - number: '6.12'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 6.3][ref1] of [6.4][ref2], wordt onverwijld geïnformeerd over een ongewoon
      voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.12
    machine_readable:
      execution:
        produces:
          legal_character: INFORMATIEF
        input:
          - name: is_ongewoon_voorval
            type: boolean
            required: true
            description: Of sprake is van een ongewoon voorval
            source: {}
          - name: onverwijld_geinformeerd
            type: boolean
            required: true
            description: Of het bevoegd gezag onverwijld is geïnformeerd
            source: {}
        output:
          - name: meldplicht_van_toepassing
            type: boolean
            description: Of de meldplicht bij ongewoon voorval van toepassing is
          - name: voldaan_aan_meldplicht
            type: boolean
            description: Of aan de meldplicht is voldaan
        actions:
          - output: meldplicht_van_toepassing
            value: $is_ongewoon_voorval
          - output: voldaan_aan_meldplicht
            value:
              operation: IF
              cases:
                - when:
                    operation: NOT
                    value: $is_ongewoon_voorval
                  then: true
              default: $onverwijld_geinformeerd
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: '6.13'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [artikel 6.3][ref1] of [6.4][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.13.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.13
  - number: 6.13.b
    text: |-
      gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.13
  - number: 6.13.c
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '6.14'
    text: |-
      Met een maatwerkvoorschrift worden de [artikelen 6.12][ref1] en [6.13][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.15.1
    text: |-
      Met het oog op het belang van wijziging van een waterstaatswerk in beheer bij het Rijk worden bouwwerken, werken
      die geen bouwwerken zijn of andere objecten, waarvoor geen omgevingsvergunning voor een beperkingengebiedactiviteit
      met betrekking tot dat waterstaatswerk is vereist, verplaatst of verlegd als die een belemmering vormen voor de
      voorbereiding of uitvoering van de wijziging van dat waterstaatswerk door of namens de waterbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.15
  - number: 6.15.2
    text: |-
      Als, ondanks een redelijke poging daartoe, met de rechthebbende op het bouwwerk, het werk dat geen bouwwerk is of
      het andere object geen schriftelijke overeenstemming is bereikt over de termijn waarop dat bouwwerk, werk of object
      wordt verplaatst of verlegd, stelt het bevoegd gezag die termijn bij maatwerkvoorschrift vast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.15
  - number: 6.16.1
    text: |-
      Deze paragraaf is van toepassing op de volgende beperkingengebiedactiviteiten met betrekking tot een
      waterstaatswerk in beheer bij het Rijk:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.1.a
    text: het bouwen, in stand houden of slopen van bouwwerken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.1.b
    text: het aanleggen, plaatsen, in stand houden, veranderen of verwijderen van werken die geen bouwwerken zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.1.c
    text: het plaatsen, in stand houden of verwijderen van andere objecten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.2
    text: |-
      Deze paragraaf is ook van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het
      brengen van stoffen, water of warmte, afkomstig van het bouwen, reinigen, conserveren of slopen van bouwwerken, op
      een oppervlaktewaterlichaam in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.3
    text: 'Het eerste en tweede lid gelden niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.16.3.a
    text: |-
      een instroomvoorziening als bedoeld in [artikel 6.34, tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.3
        afdeling: '6.2'
  - number: 6.16.3.b
    text: |-
      een uitstroomvoorziening als bedoeld in de [artikelen 6.39, tweede lid][ref1], en [6.53, tweede lid][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.4
        afdeling: '6.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.7
        afdeling: '6.2'
  - number: 6.16.3.c
    text: |-
      een installatie voor het kweken van consumptievis, het kweken of houden van ongewervelde waterdieren, het telen van
      waterplanten of het invangen van mosselzaad als bedoeld in [artikel 6.49][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.6
        afdeling: '6.2'
  - number: 6.16.3.d
