  - number: 4.74.5
    text: |-
      Voor een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie die voor 12 november 2019 in gebruik
      is genomen en waar injectie van droog adsorbent wordt toegepast voor de verwijdering van waterstoffluoride en
      zoutzuur, kunnen met een maatwerkregel of maatwerkvoorschrift de halfuur- of daggemiddelde emissiegrenswaarden,
      bedoeld in [artikel 4.73, eerste lid][ref1], worden verhoogd, tot ten hoogste 1 mg/Nm3 voor waterstoffluoride en 8
      mg/Nm3 voor zoutzuur.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.74
