        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.4.2
    text: 'Onder de aanwijzing vallen niet:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.4
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: nominaal_thermisch_ingangsvermogen_kw
            type: number
            required: true
            description: Het nominaal thermisch ingangsvermogen van de stookinstallatie in kW
            source: {}
          - name: is_verbranden_bedrijfs_of_gevaarlijke_afvalstoffen
            type: boolean
            required: true
            description: Of het gaat om het verbranden van bedrijfsafvalstoffen of gevaarlijke afvalstoffen
            source: {}
          - name: is_verbranden_dierlijke_meststoffen
            type: boolean
            required: true
            description: Of het gaat om het verbranden van dierlijke meststoffen
            source: {}
          - name: is_stookinstallatie_bij_huishouden
            type: boolean
            required: true
            description: Of het een stookinstallatie bij een huishouden betreft
            source: {}
          - name: valt_onder_eu_verordening_2016_1628
            type: boolean
            required: true
            description: Of de stookinstallatie valt onder Verordening (EU) 2016/1628
            source: {}
        output:
          - name: is_milieubelastende_activiteit_stookinstallatie
            type: boolean
            description: Of het exploiteren van de stookinstallatie een aangewezen milieubelastende activiteit is
        actions:
          - output: is_milieubelastende_activiteit_stookinstallatie
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN
                  subject: $nominaal_thermisch_ingangsvermogen_kw
                  value: 100
                - operation: NOT
                  value:
                    operation: OR
                    conditions:
                      - $is_verbranden_bedrijfs_of_gevaarlijke_afvalstoffen
                      - $is_verbranden_dierlijke_meststoffen
                      - $is_stookinstallatie_bij_huishouden
                      - $valt_onder_eu_verordening_2016_1628
