    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.27
    references:
      - id: ref1
        bwb_id: BWBR0036791
  - number: '4.28'
    text: |-
      Het intern noodplan, bedoeld in [artikel 4.22, eerste lid][ref1], is opgesteld en ingevoerd binnen twee jaar nadat
      artikel 4.22 van toepassing is geworden op de Seveso-inrichting, tenzij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.28
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.28.a
    text: |-
      dat artikel van toepassing is geworden omdat de Seveso-inrichting in werking wordt gesteld of omdat de hoeveelheid
      gevaarlijke stoffen die aanwezig is, wijzigt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.28
