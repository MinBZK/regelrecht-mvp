  - number: '9.34'
    text: |-
      Uiterlijk binnen twee maanden na afloop van de activiteit worden revisietekeningen met x-, y- en z-coördinaten en
      maatvoering vanuit vaste punten verstrekt aan het bevoegd gezag, bedoeld in [afdeling 9.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.35.1
    text: |-
      Met het oog op het veilig en doelmatig gebruik van een hoofdspoorweg of bijzondere spoorweg wordt, als bij het
      bouwen van een bouwwerk, het aanleggen, plaatsen of veranderen van een werk dat geen bouwwerk is of het plaatsen
      van een ander object grondwater wordt onttrokken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.35
  - number: 9.35.1.a
    text: de grondwaterstand niet verder verlaagd dan 1 m onder de gemiddelde laagste freatische grondwaterstand; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.35
  - number: 9.35.1.b
    text: niet langer dan een half jaar grondwater onttrokken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.35
  - number: 9.35.2
    text: Bij het verrichten van graafwerkzaamheden wordt niet dieper gegraven dan 1,20 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.35
  - number: 9.36.1
    text: |-
      Met het oog op het veilig en doelmatig gebruik van een hoofdspoorweg of bijzondere spoorweg wordt, als bij het
      bouwen van een bouwwerk, het aanleggen, plaatsen of veranderen van een werk dat geen bouwwerk is of het plaatsen
      van een ander object hijswerkzaamheden worden verricht, de kraan geaard met een weerstand van minder dan 10 ohm.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.36.2
    text: De kabelbelasting is niet meer dan 20% van de gegarandeerde breuklast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.36.3
    text: 'Tijdens de hijswerkzaamheden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.36.3.a
    text: wordt een afstand van 5 m aangehouden tot de buitenkant van spanningvoerende delen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.36.3.b
    text: |-
      wordt een afstand van 1,5 m aangehouden tot de buitenkant van spanningvoerende delen, als de hijswerkzaamheden
      worden begeleid door een procescontractaannemer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.36.4
    text: Er worden geen lasten verplaatst boven spoorlijnen die in dienst zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.36
  - number: 9.37.1
    text: |-
      Deze paragraaf is van toepassing op het verrichten van werkzaamheden, het bouwen, in stand houden of slopen van
      bouwwerken, het aanleggen, plaatsen, in stand houden, veranderen of verwijderen van werken die geen bouwwerken
      zijn en het plaatsen, in stand houden of verwijderen van andere objecten, op perrons en stations in het
      beperkingengebied met betrekking tot een hoofdspoorweg of bijzondere spoorweg, anders dan activiteiten als bedoeld
      in [artikel 9.30][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.37
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.37.2
    text: |-
      Het eerste lid geldt niet voor activiteiten die worden verricht door of namens de spoorwegbeheerder in het kader
      van het aanleggen, het wijzigen of het beheren van een hoofdspoorweg of bijzondere spoorweg of de regeling van het
      verkeer over die spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.37
  - number: '9.38'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg of bijzondere spoorweg te verrichten, geldt voor
      de activiteiten, bedoeld in [artikel 9.37][ref2], voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.38
    references:
