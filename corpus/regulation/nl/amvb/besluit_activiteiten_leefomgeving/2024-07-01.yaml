  - number: 4.400.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met oplosmiddelen wordt polyesterhars verwerkt boven
      een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.400
  - number: 4.400.2
    text: |-
      Apparatuur die wordt gebruikt bij het verwerken van polyesterhars wordt gereinigd boven een aaneengesloten
      bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.400
  - number: 4.401.1
    text: |-
      Met het oog op het voorkomen of het tot een aanvaardbaar niveau beperken van geurhinder wordt de emissie van
      styreen beperkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.a
    text: harsen worden toegepast met additieven die verdamping van styreen bij het uitdampen beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.b
    text: harsen worden toegepast met een verlaagd styreengehalte;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.c
    text: harsen worden toegepast waarin styreen deels is vervangen door dicyclopentadieen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.d
    text: spuittechnieken worden toegepast zonder persluchtondersteuning;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.e
    text: een lagedruk polyesterharssysteem wordt toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.f
    text: naar een gesloten malsysteem wordt overgeschakeld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.g
    text: naar een vacuümfoliesysteem wordt overgeschakeld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.h
    text: emmers en vaten worden afgedekt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.i
    text: een gesloten leidingsysteem voor oplosmiddelen en hars wordt toegepast; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.401.2.j
    text: |-
      cryocondensatie, thermische of katalytische naverbranding, een bioreactor of een zuurstofradicaalgenerator wordt
      toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.401
  - number: 4.402.1
    text: Deze paragraaf is van toepassing op het maken en bewerken van levensmiddelen of voeder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
  - number: 4.402.2
    text: 'Deze paragraaf is niet van toepassing als de activiteit, bedoeld in het eerste lid, wordt verricht:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
  - number: 4.402.2.a
    text: in een ippc-installatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
  - number: 4.402.2.b
    text: tijdens het slachten van dieren en het uitsnijden van vlees of vis;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
  - number: 4.402.2.c
    text: tijdens de extractie van plantaardige oliën of veredeling van vetten; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
  - number: 4.402.2.d
    text: bij de productie van voedingsmiddelen voor landbouwhuisdieren of dieren die worden gehouden voor hun pels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.402
