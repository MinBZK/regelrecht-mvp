        afdeling: '7.2'
  - number: '7.56'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de Noordzee worden bij het kweken van consumptievis,
      het kweken of houden van ongewervelde waterdieren of het telen van waterplanten geen stoffen aan de Noordzee
      toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.56
  - number: '7.57'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 7.54, tweede lid][ref1], is [paragraaf 5.3.1][ref2]
      over PRTR van overeenkomstige toepassing, als het gaat om het exploiteren van een PRTR-installatie voor intensieve
      aquacultuur met een productiecapaciteit van 1.000 ton vis of schelpdieren per jaar of meer.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.57
