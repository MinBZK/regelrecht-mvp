  - number: 4.702.1
    text: Met het oog op het waarborgen van de veiligheid wordt voorkomen dat kogels buiten de schietbaan kunnen komen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.702
  - number: 4.702.2
    text: |-
      De schietbaan voldoet aan tabel 4.702.
            Tabel 4.702 Constructie schietbaan


                    *Deel of kenmerk van de schietbaan*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot en met .22,*
                    *– schoudervuurwapens met een kaliber tot en met .22, of*
                    *– randvuurmunitie tot en met .22 Long Rifle*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot .50,*
                    *– overige vuurwapens met pistoolmunitie met een kaliber tot .50, of*
                    *– historische vuistvuurwapens*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber van .45 tot .50,*
                    *– overige vuurwapens met pistoolmunitie met een kaliber van .45 tot .50,*
                    *– schoudervuurwapens met een kaliber tot .50, of*
                    *– historische schoudervuurwapens*


                    Constructie van afscherming om uittreden kogels aan bovenkant tegen te gaan


                    50 mm beton, 100 mm gasbeton of 5 mm staalplaat


                    100 mm beton, 150 mm gasbeton of 8 mm staalplaat


                    200 mm beton of gasbeton of 12 mm staalplaat, als dit wordt toegepast op minder dan 100 m van het
      wapen, of 150 mm beton of gasbeton of 10 mm staalplaat, als dit wordt toegepast op 100 m of meer van het wapen


                    Plaatsing afscherming om uittreden van kogels aan bovenkant tegen te gaan


                    Schoten afgevuurd in de richting van de baanas onder een hoek met de horizontaal van 45 graden voor
      vuistvuurwapens en 20 graden bij schoudervuurwapens worden door de afscherming opgevangen.
                    Ricochets onder een hoek tot 21 graden met de bodem worden door de afscherming opgevangen.


                    Afscherming om uittreden van kogels aan de zijkant van de schietbaan tegen te gaan


                    100 mm metselwerk of kalkzandsteen of 75 mm beton of aarden wal en ten minste 40 graden, aansluitend
      op de kogelvanger


                    200 mm metselwerk of kalkzandsteen of 100 mm beton of aarden wal en ten minste 40 graden, aansluitend
      op de kogelvanger


                    200 mm metselwerk of kalkzandsteen of 200 mm beton of aarden wal en ten minste 40 graden, aansluitend
      op de kogelvanger


                    Bescherming van stenen, betonnen of stalen afschermingen op minder dan 20 m van de schietpunten


                    Aan kant van schutter: vurenhout van 20 mm of cementvezelplaat van 25 mm op regels van 25 mm


                    Aan kant van schutter: vurenhout van 25 mm of cementvezelplaat van 50 mm op regels van 30 mm


                    Aan kant van schutter: vurenhout van 25 mm of cementvezelplaat van 50 mm op regels van 30 mm


                    Bescherming overige aanschietbare harde delen


                    Vurenhout van 20 mm op regels van 25 mm


                    Vurenhout van 25 mm op regels van 30 mm


                    Vurenhout van 25 mm op regels van 30 mm


                    Onverharde bodem of vloer tussen de standplaats van de schutter en de kogelvanger


                    Vlak zand of met gras begroeid vlak, zonder harde bestanddelen met afmetingen groter dan 5 mm


                    Verharde bodem of vloer tussen de standplaats van de schutter en de kogelvanger


                    Harde ondergrond met een zachte afwerklaag van hout, zandcement, kunststof of fijn asfalt, ten minste
      25 mm dik
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.702
  - number: '4.703'
    text: |-
      Een zandkogelvanger voldoet aan tabel 4.703.
          Tabel 4.703 Constructie kogelvanger


                  *Deel of kenmerk van de kogelvanger*


                  *Bij het schieten met:*
                  *– vuistvuurwapens met een kaliber tot en met .22,*
                  *– schoudervuurwapens met een kaliber tot en met .22, of*
                  *– randvuurmunitie tot en met .22 Long Rifle*


                  *Bij het schieten met:*
                  *– vuistvuurwapens met een kaliber tot .50,*
                  *– overige vuurwapens met pistoolmunitie met een kaliber tot .50, of*
                  *– historische vuistvuurwapens*


                  *Bij het schieten met:*
                  *– schoudervuurwapens met een kaliber tot .50, of*
                  *– historische schoudervuurwapens*


                  Zandkogelvanger


                  Helling ten minste 34 graden met horizontaal, nabij hoogst mogelijke inslag 0,75 m diepte


                  Helling ten minste 34 graden met horizontaal, nabij hoogst mogelijke inslag 1,0 m diepte


                  Helling ten minste 34 graden met horizontaal, nabij hoogst mogelijke inslag 1,2 m diepte
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.703
  - number: 4.704.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem met kogelresten, kruit en patroonhulzen wordt
      geschoten boven een aaneengesloten bodemvoorziening, als bij het schieten hulzen van verschoten munitie vrijkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.704
  - number: 4.704.2
    text: |-
      Een kogelvanger heeft een overkapping tegen inregenen, en is, met uitzondering van een zandkogelvanger, opgesteld
      boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.704
  - number: '4.705'
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een schietbaan die ligt in de buitenlucht waar met
      hagelgeweren op kleiduiven wordt geschoten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.705
  - number: 4.706.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.705][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.706
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.61'
  - number: 4.706.2
    text: |-
      Een melding bevat gegevens en bescheiden over de omvang en ligging van het gebied waarin hagel afkomstig uit
      vuurwapens tijdens het schieten kan neerkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.706
  - number: 4.706.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.706
  - number: 4.706.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.706
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.707'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.705][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.707
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.61'
  - number: 4.707.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.707
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.707.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.707
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.708.1
    text: |-
      Met het oog op het waarborgen van de veiligheid heeft de schietbaan een gebied in de vorm van een cirkelsector die
      voldoet aan tabel 4.708, waarin hagel afkomstig uit vuurwapens kan neerkomen tijdens het schieten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.708
  - number: 4.708.2
    text: In het gebied zijn tijdens het schieten geen personen aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.708
  - number: 4.708.3
    text: |-
      Het gebied ligt binnen de afgebakende begrenzing van de locatie waarop de activiteit wordt verricht.
            Tabel 4.708 Constructie schietbaan


                    *Eigenschap van gebied waarin hagel afkomstig van vuurwapens kan neerkomen tijdens schieten*


                    *Baan met meerdere in halve cirkel gelegen schietposten (skeetbaan)*


                    *Baan met een of twee rijen naast elkaar gelegen schietposten (trapbaan)*


                    *Baan met doelen die onder 1,0 m hoogte blijven (hazenbaan)*


                    *Baan met overige opstellingen van schietposten en doelen*


                    Middelpunt


                    Post 8 (middelpunt halve cirkel)


                    15 m midden achter voorste rij schietposten


                    10 m achter middelste schietpost


                    10 m achter midden van de achterste schietpost(en)


                    Hoek van de cirkelsector


                    158 graden


                    63 graden


                    Zichthoek op doel vanuit middelpunt tot doelgebied + 20 graden


                    90 graden


                    Lengte van de sector


                    225 m


                    240 m


                    200 m


                    260 m
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.708
  - number: 4.709.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt geschoten boven een aaneengesloten
      bodemvoorziening als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.709
  - number: 4.709.1.a
    text: op de kleiduivenbaan met loodhagelpatronen of zinkhagelpatronen wordt geschoten; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.709
  - number: 4.709.1.b
    text: |-
      kleiduiven worden gebruikt of voorhanden zijn die stoffen bevatten in een hogere concentratie dan aangegeven in
      tabel 4.709.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.709
  - number: 4.709.2
    text: |-
      Langs deze aaneengesloten bodemvoorziening zijn vangnetten of schermen aangebracht als delen van patronen of
      kleiduiven hierbuiten kunnen komen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.709
  - number: 4.709.3
    text: |-
      Het gehalte aan polycyclische aromatische koolwaterstoffen wordt berekend als de som van naftaleen, antraceen,
      fenantreen, fluoranteen, benzo(a)antraceen, chryseen, benzo(a)pyreen, benzo(ghi)peryleen, benzo(k)fluoranteen en
      indeno(1,2,3-cd)pyreen.
            Tabel 4.709 Concentratie stoffen


