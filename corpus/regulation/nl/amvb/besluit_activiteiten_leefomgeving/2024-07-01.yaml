  - number: 4.487.1
    text: |-
      CNG wordt getankt in een brandstofreservoir dat is bevestigd aan een voertuig, vaartuig of werktuig en dat is
      bedoeld voor de aandrijving daarvan en de berging van CNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.487
  - number: 4.487.2
    text: Gasflessen en wisselreservoirs worden niet getankt met CNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.487
  - number: 4.487a
    text: |-
      De [artikelen 4.484, eerste lid][ref1], en [4.485][ref2] zijn niet van toepassing op het tanken van voertuigen,
      vaartuigen of werktuigen met CNG dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die
      activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding
      van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.487a
