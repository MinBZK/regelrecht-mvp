  - number: '4.246'
    text: Deze paragraaf is van toepassing op het etsen en beitsen van metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.246
  - number: 4.247.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.246][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.247
    references:
