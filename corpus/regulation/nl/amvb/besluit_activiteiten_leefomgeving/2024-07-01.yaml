  - number: 4.73a
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee [artikel 4.73][ref1] wordt versoepeld, wordt alleen gesteld over
      de emissiegrenswaarden voor stikstofoxiden, ammoniak, koolmonoxide, waterstoffluoride, zoutzuur en de som van
      dioxinen en furanen, bedoeld in tabel 4.73.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73a
