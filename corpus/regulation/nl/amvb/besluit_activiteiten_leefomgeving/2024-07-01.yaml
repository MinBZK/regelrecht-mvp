      varkens of intensieve aquacultuur, bedoeld in bijlage I, onder 7, bij de PRTR-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.10
  - number: 5.11.1
    text: |-
      Bij het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], [6.1][ref2] of [7.1][ref3], kan een aanvraag worden
      ingediend om aan Onze Minister van Infrastructuur en Waterstaat geen informatie te verstrekken over bepaalde in het
      PRTR-verslag opgenomen gegevens voor opname in het PRTR.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk6
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 5.11.2
    text: |-
      [Artikel 5.1 van de Wet open overheid][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 5.11.3
    text: De aanvraag wordt gelijktijdig met het indienen van het PRTR-verslag ingediend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.11
  - number: 5.11.4
    text: |-
      In een aanvraag om geheimhouding wordt de naam aangegeven van de groep verontreinigende stoffen, bedoeld in
      [bijlage VI][ref1], waarvan de geheim te houden verontreinigende stof deel uitmaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.12.1
    text: 'Er is een meet- en registratiesysteem aanwezig, waarmee:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.12.1.a
    text: volledige, consistente en geloofwaardige gegevens worden verkregen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.12.1.b
    text: |-
      met gepaste frequentie informatie kan worden verzameld die nodig is om te bepalen welke emissie en welke
      overbrengingen van verontreinigende stoffen onder de rapportageplicht vallen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.12.1.c
    text: |-
      informatie kan worden verkregen over de totaliteit van de emissie en overbrengingen van verontreinigende stoffen
      van alle opzettelijke, accidentele, routinematige en niet-routinematige activiteiten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.12.1.d
    text: de beste beschikbare informatie kan worden verkregen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.12.2
    text: 'Onder meet- en registratiesysteem wordt verstaan: de voor de gegevensinzameling gebruikte methodiek.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.12
  - number: 5.13.1
    text: Op het meten van PM is NTA 8029 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.13
  - number: 5.13.2
    text: |-
      De zin beginnend met «Bedrijven mogen» en eindigend met «resultaat leiden» in hoofdstuk 1 *Onderwerp en
      toepassingsgebied* in de NTA 8029 is niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.13
  - number: '5.14'
    text: |-
      Met een maatwerkregel of een maatwerkvoorschrift wordt niet van de [artikelen 5.8 tot en met 5.13][ref1] afgeweken.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.3.1
        afdeling: '5.3'
  - number: 5.15.1
    text: |-
      Alle maatregelen ter verduurzaming van het energiegebruik met een terugverdientijd van ten hoogste vijf jaar worden
      getroffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
    machine_readable:
      definitions:
        maximale_terugverdientijd_jaren: 5
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: terugverdientijd_maatregel
            type: number
            required: true
            description: De terugverdientijd van de energieverduurzamingsmaatregel in jaren
            source: {}
        output:
          - name: maatregel_verplicht
            type: boolean
            description: Of de maatregel verplicht moet worden getroffen (terugverdientijd ten hoogste vijf jaar)
        actions:
          - output: maatregel_verplicht
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $terugverdientijd_maatregel
              value: $maximale_terugverdientijd_jaren
  - number: 5.15.2
    text: 'Onder de in het eerste lid bedoelde maatregelen worden verstaan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.2.a
    text: energiebesparende maatregelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.2.b
    text: |-
      maatregelen voor het jaarlijks produceren van hernieuwbare energie op de locatie waarop de milieubelastende
      activiteit wordt verricht tot ten hoogste het jaarlijkse energiegebruik van de energiedrager van de
      milieubelastende activiteit waarvoor jaarlijks hernieuwbare energie geproduceerd wordt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.2.c
    text: maatregelen voor het vervangen van een energiedrager die leiden tot een lagere emissie van kooldioxide.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.3
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.3.a
    text: |-
      als het energiegebruik van de milieubelastende activiteit in enig kalenderjaar kleiner is dan 50.000 kWh
      elektriciteit en 25.000 m3 aardgasequivalenten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
    machine_readable:
      definitions:
        drempel_elektriciteit_kwh: 50000
        drempel_gas_m3: 25000
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: elektriciteitsverbruik_kwh
            type: number
            required: true
            description: Jaarlijks elektriciteitsverbruik van de milieubelastende activiteit in kWh
            source: {}
          - name: gasverbruik_m3_aeq
            type: number
            required: true
            description: Jaarlijks gasverbruik van de milieubelastende activiteit in m3 aardgasequivalenten
            source: {}
        output:
          - name: onder_elektriciteitsdrempel
            type: boolean
            description: Of het elektriciteitsverbruik onder de drempel van 50.000 kWh ligt
          - name: onder_gasdrempel
            type: boolean
            description: Of het gasverbruik onder de drempel van 25.000 m3 aardgasequivalenten ligt
          - name: uitzondering_van_toepassing
            type: boolean
            description: Of de uitzondering van toepassing is (beide drempels niet overschreden)
        actions:
          - output: onder_elektriciteitsdrempel
            value:
              operation: LESS_THAN
              subject: $elektriciteitsverbruik_kwh
              value: $drempel_elektriciteit_kwh
          - output: onder_gasdrempel
            value:
              operation: LESS_THAN
              subject: $gasverbruik_m3_aeq
              value: $drempel_gas_m3
          - output: uitzondering_van_toepassing
            value:
              operation: AND
              conditions:
                - $onder_elektriciteitsdrempel
                - $onder_gasdrempel
  - number: 5.15.3.b
    text: |-
      op maatregelen ter verduurzaming van het energiegebruik aan een gebruiksfunctie als bedoeld in
      [artikel 3.84 van het Besluit bouwwerken leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '3'
  - number: 5.15.3.c
    text: |-
      als voor het energiegebruik van de milieubelastende activiteit alleen gebruik wordt gemaakt van hernieuwbare
      energie die wordt geproduceerd op de locatie waarop de milieubelastende activiteit wordt verricht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.3.d
    text: |-
      als het gaat om een milieubelastende activiteit als bedoeld in [artikel 3.3a, eerste lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.0
        afdeling: '3.2'
  - number: 5.15.4
    text: |-
      Aan het eerste lid is in ieder geval voldaan als alle van toepassing zijnde bij ministeriële regeling vastgestelde
      maatregelen ter verduurzaming van het energiegebruik zijn getroffen, tenzij [artikel 5.15b][ref1] van toepassing
      is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
  - number: 5.15.5
    text: |-
      Op het berekenen van de terugverdientijd, de emissie van kooldioxide en de aardgasequivalenten zijn de bij
      ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15.6
    text: |-
      Onder de in het eerste lid bedoelde maatregelen worden niet verstaan maatregelen voor het gebruik van rie-biomassa
      voor de productie van elektriciteit en laagwaardige warmte met een temperatuur van ten hoogste 100 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15
  - number: 5.15a.1
    text: |-
      Als [artikel 5.15, eerste lid][ref1], van toepassing is, worden uiterlijk op 1 december 2023 en daarna eenmaal per
      vier jaar aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2], de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15a
    machine_readable:
      definitions:
        eerste_deadline: '2023-12-01'
        interval_jaren: 4
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: peildatum
            type: date
            required: true
            description: De datum waarop wordt getoetst of rapportage vereist is
        input:
          - name: artikel_5_15_1_van_toepassing
            type: boolean
            required: true
            description: Of artikel 5.15, eerste lid, van toepassing is
            source: {}
          - name: datum_laatste_rapportage
            type: date
            required: true
            description: Datum van de laatste rapportage
            source: {}
        output:
          - name: rapportageplicht_actief
            type: boolean
            description: Of de rapportageplicht op basis van artikel 5.15 actief is
          - name: rapportage_vereist
            type: boolean
            description: Of een rapportage op de peildatum vereist is
        actions:
          - output: rapportageplicht_actief
            value: $artikel_5_15_1_van_toepassing
          - output: rapportage_vereist
            value:
              operation: AND
              conditions:
                - $rapportageplicht_actief
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $peildatum
                  value: $eerste_deadline
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
