  - number: 7.61e.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 7.61f][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61e
