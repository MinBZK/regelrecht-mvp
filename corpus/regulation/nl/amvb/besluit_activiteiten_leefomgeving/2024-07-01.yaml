      In afwijking van [artikel 3.14][ref1] zijn de regels over een windturbine, bedoeld in [paragraaf 4.30][ref2], niet
      van toepassing als de activiteit als vergunningplichtig is aangewezen in [artikel 3.13][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
