        paragraaf: '4.2'
  - number: 4.25.2
    text: |-
      Als ten aanzien van het veiligheidsrapport toepassing is gegeven aan
      [artikel 19.3, eerste lid, eerste zin, van de Wet milieubeheer][ref1], wordt een aangepast veiligheidsrapport
      verstrekt, dat ten minste algemene gegevens en bescheiden over risico’s van zware ongevallen en de mogelijke
      gevolgen voor de gezondheid en het milieu bij een zwaar ongeval bevat.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.25
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
  - number: 4.25.3
    text: |-
      Wanneer een aangepast veiligheidsrapport is verstrekt waaruit de beschrijving van bepaalde stoffen is weggelaten,
      worden die stoffen niet vermeld op de lijst, bedoeld in [artikel 4.5, eerste lid, onder c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.25
    references:
