    text: |-
      het aanleggen of in stand houden van een zandbanket op het strand dat hoger is dan 6 m boven NAP of, kustdwars,
      breder is dan 25 m, gemeten boven op het banket vanaf het duinfront;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.28
  - number: 7.28.2.b
    text: het verplaatsen van meer dan 20 m3 per strekkende meter zand op het strand, anders dan bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.28
  - number: 7.28.2.c
    text: |-
      het gecombineerd binnen een kalenderjaar verrichten van de activiteiten, bedoeld onder a en b, die elk voor zich
      onder de in die onderdelen genoemde maatvoering blijven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.28
  - number: 7.29.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 7.26, eerste lid][ref1], te verrichten zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.2
        afdeling: '7.2'
  - number: 7.29.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.29.2.a
    text: de maximale oppervlakte en het maximale volume van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.29.2.b
    text: een situatietekening op een schaal van ten minste 1:10.000, waarop de activiteit is aangegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.29.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.29.4
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.29.4.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 7.28][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.2
        afdeling: '7.2'
  - number: 7.29.4.b
    text: op het ontgraven, verplaatsen of toepassen van ten hoogste 5 m3 grond of baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.29
  - number: 7.30.1
    text: |-
      Ten minste vier weken voor het begin van een activiteit als bedoeld in [artikel 7.26, eerste lid][ref1], worden aan
      het bevoegd gezag, bedoeld in [artikel 7.3][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.2
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.30.1.a
    text: de verwachte datum van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
  - number: 7.30.1.b
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
  - number: 7.30.2
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
  - number: 7.30.2.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 7.28][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.2
        afdeling: '7.2'
  - number: 7.30.2.b
    text: op het ontgraven, verplaatsen of toepassen van ten hoogste 5 m3 grond of baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.30
  - number: '7.31'
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 7.27, eerste lid, onder f][ref1],
      worden aan het bevoegd gezag, bedoeld in [artikel 7.3][ref2], ook gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.2
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.31.a
    text: de naam, het type en registratiegegevens van de vaartuigen of drijvende werktuigen die worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
  - number: 7.31.b
    text: |-
      een kaart op een schaal van ten minste 1:5.000, met daarop de locatie van de ontgronding, de locaties van
      buisleidingen, kabels, oevers, vaste werken of bekende of te verwachten archeologische monumenten en de coördinaten
      ervan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
  - number: 7.31.c
    text: |-
      gegevens waaruit is afgeleid dat er binnen 500 m rond de ontgronding geen bekende of te verwachten archeologische
      monumenten zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
  - number: 7.31.d
    text: de manier van ontgronden, de maximale oppervlakte en maximale diepte van de ontgronding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
  - number: 7.31.e
    text: |-
      de verwachte hoeveelheid en het soort stoffen die met de ontgronding zullen worden gewonnen en de bestemming van
      die stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.31
  - number: '7.32'
    text: |-
      Als bij het verrichten van de activiteit waarnemingen worden gedaan waarvan redelijkerwijs vermoed kan worden dat
      die van belang zijn voor de archeologische monumentenzorg, wordt Onze Minister van Onderwijs, Cultuur en Wetenschap
      daarover zo spoedig mogelijk geïnformeerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.32
  - number: '7.33'
    text: |-
      Deze paragraaf is van toepassing op beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk die
      bestaan uit het aanleggen, in stand houden of verwijderen van windparken in de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.33
  - number: 7.34.1
    text: |-
      Het is verboden een windpark als bedoeld in [artikel 7.33][ref1] aan te leggen zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.34.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
  - number: 7.34.2.a
    text: het ontwerp van de turbines en andere installaties die deel uitmaken van het windpark;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
  - number: 7.34.2.b
    text: het tracé van de windparkexportkabel en de kabels die deel uitmaken van het windpark;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
  - number: 7.34.2.c
    text: |-
      een verklaring van een onafhankelijke deskundige dat het ontwerp van de windturbines en andere installaties die
      deel uitmaken van het windpark voldoet aan [artikel 7.39][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.34.2.d
    text: |-
      een beschrijving van de veiligheidsvoorzieningen die worden aangebracht en de plaatsing daarvan aan de windturbines
      en andere installaties in overeenstemming met [artikel 7.40][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.34.2.e
    text: |-
      de plannen, bedoeld in de [artikelen 7.38][ref1] en [7.44][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.34.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.34
  - number: 7.35.1
    text: |-
      Uiterlijk drie maanden na het aanbrengen van de funderingen van het windpark worden gegevens over de feitelijke
      positie van de funderingen en van de andere voorzieningen die deel uitmaken van het windpark verstrekt aan het
      bevoegd gezag, bedoeld in [artikel 7.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.35
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.35.2
    text: |-
      Uiterlijk drie maanden na het aanleggen van een windparkexportkabel worden aan het bevoegd gezag gegevens verstrekt
      over de feitelijke ligging van de windparkexportkabel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.35
  - number: 7.35.3
    text: |-
      Uiterlijk drie maanden nadat een windpark of windparkexportkabel is verwijderd, worden aan het bevoegd gezag de
      gegevens verstrekt waaruit dit blijkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.35
  - number: '7.36'
    text: |-
      Ten minste vier weken voor het onderhouden van een windpark worden aan het bevoegd gezag, bedoeld in
      [artikel 7.3][ref1], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.36
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.36.a
    text: de registratiegegevens van de vaartuigen of drijvende werktuigen die worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.36
  - number: 7.36.b
    text: de verwachte datum van het begin van het onderhoud; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.36
  - number: 7.36.c
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.36
  - number: '7.37'
    text: |-
      Als bij het verrichten van de activiteit waarnemingen worden gedaan waarvan redelijkerwijs kan worden vermoed dat
      die van belang zijn voor de archeologische monumentenzorg, wordt Onze Minister van Onderwijs, Cultuur en Wetenschap
      daarover zo spoedig mogelijk geïnformeerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.37
  - number: 7.38.1
    text: |-
      Met het oog op de veiligheid op de Noordzee wordt een windpark of een windparkexportkabel aangelegd, onderhouden en
      verwijderd volgens een uitvoeringsplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.38.2
    text: 'Het uitvoeringsplan bevat in ieder geval de volgende gegevens:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.38.2.a
    text: een omschrijving van de werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.38.2.b
    text: een tijdschema voor het verrichten van de werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.38.2.c
    text: de registratiegegevens van de vaartuigen die worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.38.2.d
    text: een beschrijving van de maatregelen die worden getroffen om het scheepvaartverkeer te waarschuwen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.38
  - number: 7.39.1
    text: |-
      Met het oog op de veiligheid op de Noordzee zijn windturbines en andere installaties die deel uitmaken van een
      windpark voldoende sterk om de krachten die worden verwacht als gevolg van windsterkte, golfslag, zeestroming en
      gebruik van de turbines te weerstaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.39
  - number: 7.39.2
    text: |-
      De sterkte van de windturbines en andere installaties blijkt uit een verklaring die is opgesteld door een
      onafhankelijke deskundige. De deskundige toetst aan een in de praktijk beproefd stelsel van normen die betrekking
      hebben op het ontwerp van installaties van een windpark.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.39
  - number: 7.40.1
    text: |-
      Met het oog op het veilige gebruik van de Noordzee door luchtvaartverkeer en scheepvaartverkeer heeft een windpark
      herkenningstekens en bakens.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.40
  - number: 7.40.2
    text: |-
      De herkenningstekens en bakens voldoen aan de International Association of Marine Aids to Navigation and Lighthouse
      Authorities Recommendation O-139 Marking of Man-Made Offshore Structures, en de Civil Aviation Authority Policy and
      Guidelines on Wind Turbines.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.40
  - number: 7.40.3
    text: |-
      Het windpark heeft controlesystemen, waarschuwingssystemen en besturingssystemen, met inbegrip van een
      noodvoorziening voor het kunnen bedienen en bewaken van het windpark, zowel ter plaatse als vanaf de wal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.40
  - number: 7.41.1
    text: |-
      Met het oog op de veiligheid op de Noordzee wordt zorg gedragen voor een goede staat van onderhoud van het windpark
      en worden daarvoor periodiek de turbines, andere installaties en veiligheidsvoorzieningen onderzocht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.41
  - number: 7.41.2
    text: |-
      Als een deel van het windpark een gebrek vertoont waardoor de veiligheid in het geding is, worden passende
      maatregelen getroffen. Bij direct gevaar voor de veiligheid van personen wordt het windpark of het deel van het
      windpark onverwijld buiten werking gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.41
  - number: '7.42'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 7.3][ref1], wordt onverwijld geïnformeerd over een gebrek als bedoeld in
      [artikel 7.41, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.43.1
    text: 'Met het oog op de vervulling van maatschappelijke functies door de Noordzee ligt een windparkexportkabel:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.43
  - number: 7.43.1.a
    text: |-
      op een diepte van ten minste 3 m in de zeebodem voor zover de windparkexportkabel zich binnen een afstand van 3
      km vanaf de laagwaterlijn, bedoeld in [artikel 1 van de Wet grenzen Nederlandse territoriale zee][ref1], of de
      basislijn, bedoeld in [artikel 2 van die wet][ref2], bevindt;


      [ref1]: https://wetten.overheid.nl/BWBR0003748#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0003748#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.43
    references:
      - id: ref1
        bwb_id: BWBR0003748
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0003748
        artikel: '2'
  - number: 7.43.1.b
    text: |-
      op een diepte van ten minste 1 m in de zeebodem voor zover de windparkexportkabel zich bevindt op 3 km of meer van
      de lijn, bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.43
  - number: 7.43.1.c
    text: |-
      bij kruising van een vaargeul ten minste 1 m beneden de door de beheerder van de vaargeul vastgestelde
      onderhoudsdiepte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.43
  - number: 7.43.2
    text: De ligging van een windparkexportkabel wordt periodiek onderzocht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.43
  - number: 7.44.1
    text: |-
      Met het oog op de veiligheid op de Noordzee en het beschermen van het milieu is een plan opgesteld dat een
      beschrijving bevat van de maatregelen die worden getroffen als zich een ongewoon voorval voordoet in, of in de
      directe omgeving van een windpark, dat een gevaar oplevert voor dat windpark.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.44
  - number: 7.44.2
    text: 'Het plan bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.44
  - number: 7.44.2.a
    text: een vermelding van de materialen die worden ingezet;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.44
  - number: 7.44.2.b
    text: de naam en het adres van degene die de maatregelen treft; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.44
  - number: 7.44.2.c
    text: de naam en het adres van degene die toezicht houdt op de maatregelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.44
  - number: 7.45.1
    text: |-
      Met het oog op de vervulling van maatschappelijke functies door de Noordzee wordt een windpark dat of een
      windparkexportkabel die niet meer in gebruik is, verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.45
  - number: 7.45.2
    text: |-
      Materiaal dat ter plaatse of in de directe omgeving is terechtgekomen bij het aanleggen, onderhouden, gebruiken of
      verwijderen van het windpark, wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.45
  - number: '7.46'
    text: |-
      Deze paragraaf is van toepassing op beperkingengebiedactiviteiten met betrekking tot een installatie in de
      Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.46
  - number: 7.47.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een mijnbouwinstallatie te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 7.46][ref2], die worden verricht in het beperkingengebied met betrekking tot die installatie,
      voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
