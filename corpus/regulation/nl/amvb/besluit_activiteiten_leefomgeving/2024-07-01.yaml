                    Staalplaat 10 mm
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.690
  - number: 4.691.1
    text: Met het oog op het waarborgen van de veiligheid is in het gebouw een kogelvanger aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.691
  - number: 4.691.2
    text: |-
      De kogelvanger voldoet aan tabel 4.691.
            Tabel 4.691 Kogelvanger


                    *Deel of kenmerk van de kogelvanger*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot en met .22,*
                    *– schoudervuur-wapens met een kaliber tot en met .22, of*
                    *– randvuurmunitie tot en met .22 Long Rifle*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot .45,*
                    *– overige vuurwapens met pistoolmunitie met een kaliber tot .45, of*
                    *– historische vuistvuurwapens*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot .50,*
                    *– schoudervuurwapens met een kaliber tot .50,*
                    *– overige vuurwapens met pistoolmunitie met een kaliber tot .50, of*
                    *– historische schoudervuurwapens*


                    Zandkogelvanger


                    Helling 34 graden met horizontaal, nabij plafond 0,75 m diepte


                    Helling 34 graden met horizontaal, nabij plafond 1,0 m diepte


                    Helling 34 graden met horizontaal, nabij plafond 1,2 m diepte


                    Stalen kogelvanger


                    Staalplaat trefvlak 5 mm dik


                    Staalplaat trefvlak 12 mm dik


                    Kunststof kogelvanger


                    Diepte 0,30 m


                    Diepte 0,50 m


                    Diepte 0,90 m
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.691
  - number: 4.692.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met kogelresten, kruit en patroonhulzen wordt
      geschoten boven een aaneengesloten bodemvoorziening als bij het schieten hulzen van verschoten munitie vrijkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.692
  - number: 4.692.2
    text: Een kogelvanger is opgesteld boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.692
  - number: '4.693'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.693
  - number: 4.694.1
    text: Voor de emissie in de lucht is de emissiegrenswaarde van totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.694
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: totaal_stof_mg_per_nm3
            type: number
            required: true
            description: Concentratie totaal stof in mg/Nm3 bij de schietbaan
            source: {}
        output:
          - name: voldoet_emissiegrenswaarde_stof_schietbaan
            type: boolean
            description: Of de stofemissie bij de schietbaan voldoet aan de grenswaarde van 5 mg/Nm3
        actions:
          - output: voldoet_emissiegrenswaarde_stof_schietbaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totaal_stof_mg_per_nm3
              value: 5
  - number: 4.694.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.694
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: totaal_stof_kg_per_jaar
            type: number
            required: true
            description: Jaarlijkse emissie van totaal stof in kg/jaar bij de schietbaan
            source: {}
        output:
          - name: vrijstelling_stofgrenswaarde_schietbaan
            type: boolean
            description: Of de emissiegrenswaarde voor stof niet van toepassing is vanwege lage jaaremissie
        actions:
          - output: vrijstelling_stofgrenswaarde_schietbaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totaal_stof_kg_per_jaar
              value: 100
  - number: 4.694.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de afgezogen emissies door een geschikte filtrerende afscheider
      worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.694
  - number: 4.695.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.695
  - number: 4.695.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.695
  - number: 4.696.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.696
  - number: 4.696.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.694, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.696
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.59'
  - number: 4.697.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.697
  - number: 4.697.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.697
  - number: 4.697.3
    text: De meetonzekerheid wordt bepaald op basis van het 95% betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.697
  - number: 4.697.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.695][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.697
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.59'
  - number: '4.698'
    text: Met het oog op het beschermen van de gezondheid worden emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.698
  - number: 4.699.1
    text: Deze paragraaf is van toepassing op het exploiteren van een schietbaan die ligt in de buitenlucht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.699
  - number: 4.699.2
    text: Deze paragraaf is niet van toepassing op het exploiteren van een kleiduivenbaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.699
  - number: 4.700.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.699][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.700
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.60'
  - number: 4.700.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.700
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.701'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.699][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.701
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.60'
  - number: 4.701.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.701
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.701.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.701
