  - number: 15.37.2
    text: |-
      Er wordt op de parameters, bedoeld in [tabel 15.34][ref1], bemonsterd op locaties waar redelijkerwijs kan worden
      aangenomen dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.37
    references:
