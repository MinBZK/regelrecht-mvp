      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.422'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.421, eerste lid, onder b][ref1], gaat gelden, wordt
      het bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.422
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.29'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.423.1
    text: |-
      Een installatie voor het regelen van aardgasdruk en het meten van de hoeveelheid of kwaliteit van aardgas is zo
      ontworpen en geïnstalleerd dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.a
    text: de installatie op een veilige wijze kan functioneren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.b
    text: |-
      alle relevante onderdelen overzichtelijk zijn en onder alle omstandigheden bereikbaar zijn voor bediening, controle
      en onderhoud;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.c
    text: de installatie geheel of gedeeltelijk op eenvoudige wijze uit bedrijf kan worden genomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.d
    text: er een afsluiter is aan de uitlaatzijde van de installatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.e
    text: er geen bodemverzakking of corrosie kan ontstaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.f
    text: er geen ontoelaatbare spanningen ontstaan op componenten van de installatie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.1.g
    text: ongeautoriseerde of onbedoelde bediening wordt voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.423.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de installatie voldoet aan de voorschriften 8.1.1 tot en met
      8.3.3 en 10.1 tot en met 10.4 van NEN 1059.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.423
  - number: 4.424.1
    text: |-
      Met een drukbeheerssysteem wordt ervoor zorg gedragen dat de druk in het systeem stroomafwaarts onder normale
      bedrijfsomstandigheden binnen de operationele grenzen blijft en onder abnormale bedrijfsomstandigheden onder de
      toegelaten grens blijft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.424
  - number: 4.424.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als het drukbeheerssysteem voldoet aan de voorschriften 9.1 tot en
      met 9.7.2 van NEN 1059.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.424
  - number: 4.425.1
    text: |-
      Een installatie voor het regelen van aardgasdruk en het meten van de hoeveelheid of kwaliteit van aardgas wordt zo
      onderhouden dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425
  - number: 4.425.1.a
    text: de installatie op een veilige wijze kan functioneren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425
  - number: 4.425.1.b
    text: |-
      alle apparatuur in een goede mechanische toestand verkeert en niet lekt, op de juiste druk is afgesteld en is
      beschermd tegen vuil, vloeistoffen, bevriezing en andere nadelige invloeden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425
  - number: 4.425.1.c
    text: alle relevante onderdelen onder alle omstandigheden goed bereikbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425
  - number: 4.425.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als het onderhoud wordt verricht volgens voorschrift 12.3 van NEN
      1059.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425
  - number: 4.425a.1
    text: |-
      De [artikelen 4.421, eerste lid, aanhef en onder a][ref1], en [4.422][ref2] zijn niet van toepassing op het regelen
      van aardgasdruk en het meten van de hoeveelheid of kwaliteit van aardgas dat voor de inwerkingtreding van dit
      besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals
      deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.29'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.29'
  - number: 4.425a.2
    text: |-
      [Artikel 4.421][ref1] is niet van toepassing als op grond van een omgevingsvergunning een afwijkende afstand geldt
      voor een installatie:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.29'
  - number: 4.425a.2.a
    text: |-
      waarop tot 1 januari 2008 het [Besluit voorzieningen en installaties milieubeheer][ref1] van toepassing was en
      waarvoor de vergunning is verleend voor 1 december 2001; of


      [ref1]: https://wetten.overheid.nl/BWBR0012897
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425a
    references:
      - id: ref1
        bwb_id: BWBR0012897
  - number: 4.425a.2.b
    text: waarvoor de vergunning is verleend voor 1 januari 2008.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425a
  - number: 4.425a.3
    text: Voor een installatie als bedoeld in het tweede lid gelden de afstanden in de vergunning.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.425a
  - number: '4.426'
    text: Deze paragraaf is van toepassing op het opwekken van elektriciteit met een windturbine.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.426
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_activiteit
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
        output:
          - name: paragraaf_4_30_van_toepassing
            type: boolean
            description: Of paragraaf 4.30 (windturbines) van toepassing is
        actions:
          - output: paragraaf_4_30_van_toepassing
            value:
              operation: EQUALS
              subject: $type_activiteit
              value: opwekken_elektriciteit_windturbine
  - number: 4.427.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.426][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.30'
  - number: 4.427.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.2.a
    text: het vermogen van de windturbine in kilowatt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.2.b
    text: de diameter van de rotor in centimeters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.2.c
    text: de hoogte van de mast in meters; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.2.d
    text: |-
      de berekende afstand in meters tot waar het plaatsgebonden risico ten hoogste 1 op de 100.000 en 1 op de 1.000.000
      per jaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.427.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.427.5
    text: Op het berekenen van de afstanden zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.427
  - number: 4.428.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt een windturbine ten minste eenmaal per jaar beoordeeld door
      een deskundige op het gebied van windturbines op de beveiligingen, onderhoud en reparaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.428
  - number: 4.428.2
    text: |-
      Na constatering of vermoeden van een gebrek, waardoor de veiligheid in het geding is, wordt de windturbine
      onverwijld buiten gebruik gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.428
  - number: 4.428.3
    text: |-
      Een buiten gebruik gestelde windturbine wordt pas in gebruik genomen als alle geconstateerde gebreken zijn
      hersteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.428
  - number: '4.429'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt onverwijld geïnformeerd over het buiten gebruik stellen
      van een windturbine.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.429
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.430.1
    text: 'Een windturbine is ontworpen volgens:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430
  - number: 4.430.1.a
    text: NEN-EN-IEC 61400-1, als het gaat om een windturbine met een rotordiameter van meer dan 16 m; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430
  - number: 4.430.1.b
    text: NEN-EN-IEC 61400-2, als het gaat om een windturbine met een rotordiameter van ten hoogste 16 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430
  - number: 4.430.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als voor de windturbine een certificaat is verstrekt waaruit blijkt
      dat de windturbine is ontworpen volgens het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430
  - number: 4.430.3
    text: |-
      Het certificaat is verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor
      NEN-EN-IEC 61400-22.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430
  - number: 4.430a.1
    text: |-
      [Artikel 4.430, eerste lid][ref1], is niet van toepassing op een windturbine waarvoor voor 1 december 2001 een
      vergunning is verleend op grond van [artikel 8.1 van de Wet milieubeheer][ref2] en die voldoet aan de voorschriften
      die aan die vergunning zijn verbonden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.30'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '8'
  - number: 4.430a.2
    text: |-
      Een windturbine die is opgericht voor 1 januari 2017 of die een windturbine vervangt die is opgericht voor
      1 januari 2017, kan in afwijking van [artikel 4.430, eerste lid][ref1], ook zijn ontworpen volgens de door de
      Stichting Nederlands Normalisatie-instituut uitgegeven voornorm NVN 11400-0.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.30'
  - number: 4.430b
    text: |-
      Deze paragraaf is van toepassing op het opwekken van elektriciteit met een windturbine als de activiteit als
      vergunningplichtig is aangewezen in [artikel 3.13][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 4.430c.1
    text: |-
      Met het oog op het voorkomen of het beperken van geluidhinder is het geluid door het opwekken van elektriciteit met
      een windturbine of windpark op een geluidgevoelig gebouw ten hoogste 47 L en 41 L.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430c
  - number: 4.430c.2
    text: |-
      Op de begrippen L en L zijn de begripsbepalingen, bedoeld in
      [bijlage I bij het Besluit kwaliteit leefomgeving][ref1], van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 4.430d.1
    text: 'De volgende gegevens worden geregistreerd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430d
  - number: 4.430d.1.a
    text: |-
      de emissieterm L, zijnde het jaargemiddelde geluidvermogen per octaafband dat door de turbine wordt uitgestraald,
      gebaseerd op de effectieve werking gedurende het afgelopen kalenderjaar; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430d
  - number: 4.430d.1.b
    text: de voor de duur van een handhavingsmeting benodigde gegevens ter bepaling van de windsnelheid op ashoogte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430d
  - number: 4.430d.2
    text: De gegevens worden gedurende vijf jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430d
  - number: 4.430d.3
    text: De parameters worden geregistreerd volgens de bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430d
  - number: 4.430e
    text: |-
      Op het bepalen van het geluid L of L, bedoeld in [artikel 4.430c][ref1], zijn de bij ministeriële regels gestelde
      regels van toepassing


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430e
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.30a
  - number: 4.430f
    text: |-
      Voor de toepassing van deze paragraaf wordt verstaan onder: - *slagschaduwgevoelig gebouw:* slagschaduwgevoelig
      gebouw als bedoeld in [bijlage I bij het Besluit kwaliteit leefomgeving][ref1];
        - *verblijfsruimte:* verblijfsruimte als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref2];
        - *woonschip:* drijvend bouwwerk met een woonfunctie op een locatie die in het omgevingsplan is aangewezen als een
      ligplaats voor een woonschip;
        - *woonwagen:* woonwagen als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
      [ref2]: https://wetten.overheid.nl/BWBR0041297
      [ref3]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430f
    references:
      - id: ref1
        bwb_id: BWBR0041313
      - id: ref2
        bwb_id: BWBR0041297
      - id: ref3
        bwb_id: BWBR0041297
  - number: 4.430g.1
    text: |-
      Deze paragraaf is van toepassing op het opwekken van elektriciteit met een windturbine als de activiteit als
      vergunningplichtig is aangewezen in [artikel 3.13][ref1] en:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430g
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.4
        afdeling: '3.2'
  - number: 4.430g.1.a
    text: |-
      slagschaduw veroorzaakt in een verblijfsruimte van een slagschaduwgevoelig gebouw dat op een locatie is toegelaten
      op grond van een omgevingsplan of een omgevingsvergunning voor een omgevingsplanactiviteit; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430g
  - number: 4.430g.1.b
    text: lichtschittering veroorzaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430g
  - number: 4.430g.2
    text: |-
      Deze paragraaf is niet van toepassing op slagschaduw door een windturbine in een verblijfsruimte van
      een slagschaduwgevoelig gebouw dat op een locatie is toegelaten op grond van een omgevingsplan of een
      omgevingsvergunning voor een omgevingsplanactiviteit voor een duur van niet meer dan tien jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430g
  - number: 4.430h.1
    text: |-
      In afwijking van [artikel 4.430g, tweede lid][ref1], is deze paragraaf ook van toepassing op slagschaduw door een
      windturbine in een verblijfsruimte van een slagschaduwgevoelig gebouw, dat is toegelaten voor een duur van niet
      meer dan tien jaar:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.30b
  - number: 4.430h.1.a
    text: |-
      in het tijdelijke deel van het omgevingsplan, bedoeld in [artikel 22.1, onder a, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
  - number: 4.430h.1.b
    text: in een omgevingsvergunning voor een omgevingsplanactiviteit die is aangevraagd voor de inwerkingtreding van de wet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
  - number: 4.430h.2
    text: |-
      In afwijking van [artikel 4.430g, eerste lid][ref1], is deze paragraaf niet van toepassing op slagschaduw door
      een windturbine in een verblijfsruimte van een slagschaduwgevoelig gebouw dat nog niet aanwezig is maar mag worden
      gebouwd op grond van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.30b
  - number: 4.430h.2.a
    text: |-
      het tijdelijke deel van het omgevingsplan, bedoeld in [artikel 22.1, onder a, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
  - number: 4.430h.2.b
    text: een omgevingsvergunning voor een omgevingsplanactiviteit die is aangevraagd voor de inwerkingtreding van de wet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430h
  - number: 4.430i.1
    text: |-
      Met het oog op het voorkomen of beperken van slagschaduw is de windturbine voorzien van een automatische
      stilstandvoorziening die de windturbine afschakelt als gemiddeld meer dan zeventien dagen per jaar gedurende
      meer dan twintig minuten per dag slagschaduw kan optreden in een verblijfsruimte van een slagschaduwgevoelig
      gebouw en voor zover de afstand tussen de windturbine en een slagschaduwgevoelig gebouw minder dan twaalf maal de
      rotordiameter bedraagt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430i
  - number: 4.430i.2
    text: 'De afstand wordt gemeten van een punt op ashoogte van de windturbine:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430i
  - number: 4.430i.2.a
    text: tot de gevel van een slagschaduwgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430i
  - number: 4.430i.2.b
    text: tot de begrenzing van de locatie voor het plaatsen van een woonschip of woonwagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430i
  - number: 4.430j
    text: |-
      [Artikel 4.430i][ref1] is niet van toepassing op slagschaduw door een windturbine in een slagschaduwgevoelig gebouw
      dat een functionele binding heeft met de windturbine.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430j
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.30b
  - number: 4.430k
    text: |-
      Bij een agrarische activiteit is [artikel 4.430i][ref1] niet van toepassing op slagschaduw door een windturbine in
      een verblijfsruimte van een slagschaduwgevoelig gebouw dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.430k
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.30b
  - number: 4.430k.a
    text: |-
      op grond van het tijdelijke deel van het omgevingsplan, bedoeld in [artikel 22.1, onder a, van de wet][ref1],
      of een voor de inwerkingtreding van de wet aangevraagde omgevingsvergunning behoort of heeft behoord tot die
      agrarische activiteit en door een derde mag worden bewoond; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
