  - number: 4.41.1
    text: |-
      De emissieconcentratie van zwaveldioxide, stikstofoxiden, koolmonoxide en totaal stof van een grote
      stookinstallatie wordt continu gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.2
    text: |-
      In afwijking van het eerste lid wordt de emissieconcentratie van zwaveldioxide, stikstofoxiden, koolmonoxide en
      totaal stof van een stookinstallatie met een nominaal thermisch ingangsvermogen van minder dan 100 MW periodiek
      gemeten, ten minste om de zes maanden, als uit de geregistreerde emissierelevante parameters met voldoende mate
      van zekerheid blijkt dat de rookgasreiniging of andere emissiereductietechnieken continu in bedrijf zijn en de
      emissiegrenswaarden die van toepassing zijn niet worden overschreden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.3
    text: |-
      Als een grote stookinstallatie met aardgas wordt gestookt, wordt de emissieconcentratie van totaal stof ten minste
      eenmaal per zes maanden gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.4
    text: |-
      De meting van zwaveldioxide is niet verplicht en de emissieconcentratie daarvan wordt bepaald aan de hand van de
      gehalten in de brandstoffen die worden ingezet, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.4.a
    text: een grote stookinstallatie met aardgas wordt gestookt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.4.b
    text: een grote stookinstallatie met olie wordt gestookt en er geen uitrusting voor de ontzwaveling van afgas is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41.4.c
    text: |-
      een grote stookinstallatie met rie-biomassa wordt gestookt en kan worden aangetoond dat de emissie in geen geval
      hoger is dan de toepasselijke emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41
  - number: 4.41a.1
    text: 'De emissieconcentratie van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41a
  - number: 4.41a.1.a
    text: kwik wordt periodiek ten minste om de zes maanden gemeten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41a
  - number: 4.41a.1.b
    text: |-
      ammoniak, zoutzuur, waterstoffluoride, formaldehyde en totaal organische koolstof wordt ten minste eenmaal per
      jaar gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41a
  - number: 4.41a.2
    text: |-
      In afwijking van het eerste lid, onder b, wordt de emissieconcentratie van zoutzuur periodiek ten minste om de zes
      maanden gemeten, als met biomassa wordt gestookt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41a
  - number: 4.41a.3
    text: |-
      Als procesbrandstoffen gechloreerde componenten bevatten, wordt de emissieconcentratie van dioxinen en furanen om
      de zes maanden gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41a
  - number: 4.41b.1
    text: |-
      De emissieconcentraties in afvalwater afkomstig van de reiniging van afgassen, bedoeld in [artikel 4.39b][ref1],
      worden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.41b.1.a
    text: ten minste maandelijks gemeten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41b
  - number: 4.41b.1.b
    text: voor onopgeloste stoffen gemeten in een steekmonster en voor andere stoffen in een etmaalmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41b
  - number: 4.41b.2
    text: |-
      Het debiet, de zuurgraad en de temperatuur van afvalwater afkomstig van de reiniging van afgassen, bedoeld in
      [artikel 4.39b][ref1], worden continu gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.41b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: '4.42'
    text: |-
      Een continue meting als bedoeld in [artikel 4.41][ref1] omvat ook de meting van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.42.a
    text: het zuurstofgehalte;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.42
  - number: 4.42.b
    text: de temperatuur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.42
  - number: 4.42.c
    text: de druk; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.42
  - number: 4.42.d
    text: |-
      het waterdampgehalte van het afgas, met uitzondering van het afgas dat als monster wordt gebruikt, als dat wordt
      gedroogd voordat de emissies in de lucht worden geanalyseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.42
  - number: '4.43'
    text: |-
      De resultaten van de metingen die zijn verricht, worden omgerekend tot een massaconcentratie bij het
      genormaliseerde zuurstofgehalte als bedoeld in [4.32, vierde lid][ref1], volgens de formule: waarbij wordt
      verstaan onder: E: de berekende emissieconcentratie bij het genormaliseerde zuurstofgehalte; E: de gemeten
      emissieconcentratie; O: het genormaliseerde zuurstofgehalte; O: het gemeten zuurstofgehalte.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.44.1
    text: 'Als continu wordt gemeten, wordt in ieder geval voldaan aan de emissiegrenswaarde, als in een kalenderjaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.1.a
    text: geen gevalideerd maandgemiddelde hoger is dan de emissiegrenswaarde;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.1.b
    text: geen gevalideerd daggemiddelde 110% hoger is dan de emissiegrenswaarde; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.1.c
    text: 95% van alle gevalideerde uurgemiddelden over een jaar niet hoger is dan 200% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.2
    text: 'Voor de toepassing van het eerste lid worden niet meegerekend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.2.a
    text: |-
      meetuitkomsten die zijn verkregen tijdens periodes waarin een grote stookinstallatie op grond van de
      [artikelen 4.57][ref1] en [4.60][ref2] in werking kan zijn;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.44.2.b
    text: meetuitkomsten die zijn verkregen tijdens storingen in de apparatuur die een emissiereductie bewerkstelligt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.2.c
    text: meetuitkomsten die zijn verkregen tijdens periodes van opstarten en stilleggen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.3
    text: |-
      De periodes van opstarten en stilleggen worden bepaald in overeenstemming met het uitvoeringsbesluit van de
      Commissie van 7 mei 2012 betreffende de vaststelling van opstart- en stilleggingsperioden voor de toepassing van de
      richtlijn industriële emissies (PbEU 2012, L 123).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44.4
    text: |-
      Als periodiek wordt gemeten wordt in ieder geval voldaan aan de emissiegrenswaarde, als geen enkele gevalideerde
      meetuitkomst hoger is dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44
  - number: 4.44a
    text: |-
      Aan de emissiegrenswaarden, bedoeld in [tabel 4.39b][ref1], wordt voldaan, als alle gemeten daggemiddelden in een
      jaar niet hoger zijn dan de emissiegrenswaarde.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.44a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.45.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht wordt de grote stookinstallatie geheel of gedeeltelijk
      buiten gebruik gesteld of met een weinig vervuilende brandstof in gebruik gehouden als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.45
  - number: 4.45.1.a
    text: de afgasreinigingsapparatuur is uitgevallen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.45
  - number: 4.45.1.b
    text: deze apparatuur niet na uiterlijk 24 uur weer normaal functioneert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.45
  - number: 4.45.2
    text: |-
      Een grote stookinstallatie kan als gevolg van storingen als bedoeld in het eerste lid nog uiterlijk 120 uur in
      een jaar in bedrijf zijn zonder dat de afgasreinigingsapparatuur functioneert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.45
  - number: '4.46'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee [artikel 4.45][ref1] wordt versoepeld, bevat een verlenging van de
      periode, bedoeld in artikel 4.45, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.46
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.46.a
    text: het absoluut noodzakelijk is om de energievoorziening in stand te houden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.46
  - number: 4.46.b
    text: |-
      de grote stookinstallatie anders voor die periode zou worden vervangen door een stookinstallatie die over het
      geheel genomen hogere emissies zou veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.46
  - number: '4.47'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt uiterlijk 48 uur na het uitvallen van de
      afgasreinigingsapparatuur en het niet na uiterlijk 24 uur weer normaal functioneren van deze apparatuur daarover
      geïnformeerd, waarbij de stookinstallatie geheel of gedeeltelijk buiten gebruik wordt gesteld of met een weinig
      vervuilende brandstof in bedrijf wordt gehouden als bedoeld in [artikel 4.45][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.47
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.48.1
    text: |-
      Een periodieke meting bestaat uit ten minste drie deelmetingen van een half uur. Als het meettechnisch niet
      mogelijk is om de deelmeting in die tijd te verrichten, kan de deelmeting ten hoogste twee uur duren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.48
  - number: 4.48.2
    text: |-
      Het resultaat van de continue meting of periodieke meting zijn de gevalideerde meetresultaten. Dat zijn de
      meetresultaten van de uurgemiddelden of de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet
      meer is dan het percentage van de emissiegrenswaarde, bedoeld in tabel 4.48.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.48
  - number: 4.48.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.48
  - number: 4.48.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.40][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.48 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Koolmonoxide


                    10


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.48
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.49.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste twee weken voordat een periodieke meting wordt
      verricht, geïnformeerd over de datum en het tijdstip van die meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.49
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.49.2
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de periodieke meting zou worden verricht, geïnformeerd over het
      niet doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.49
  - number: 4.50.1
    text: Geautomatiseerde meetsystemen worden ten minste eenmaal per jaar met parallelmetingen gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.50
  - number: 4.50.2
    text: |-
      Een parallelmeting die wordt verricht voor de verificatie van de meetapparatuur voor continue metingen duurt ten
      minste een half uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.50
  - number: 4.50.3
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.40][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.50
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.51.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt geïnformeerd over de resultaten van de controle, bedoeld
      in [artikel 4.50, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.51.2
    text: |-
      Het bevoegd gezag wordt ten minste twee weken voordat een parallelmeting wordt verricht, geïnformeerd over de datum
      en het tijdstip van die meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.51
  - number: 4.51.3
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de parallelmeting zou worden verricht, geïnformeerd over het niet
      doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.51
  - number: 4.52.1
    text: |-
      De metingen van een dag worden als ongeldig beschouwd als in een dag meer dan drie uurgemiddelden ongeldig zijn
      door storing of onderhoud van het continu werkende meetsysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.52
    machine_readable:
      definitions:
        max_ongeldige_uurgemiddelden_per_dag: 3
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: aantal_ongeldige_uurgemiddelden
            type: number
            required: true
            description: Aantal ongeldige uurgemiddelden op een dag door storing of onderhoud van het meetsysteem
            source: {}
        output:
          - name: meting_dag_ongeldig
            type: boolean
            description: Of de metingen van de dag als ongeldig worden beschouwd
        actions:
          - output: meting_dag_ongeldig
            value:
              operation: GREATER_THAN
              subject: $aantal_ongeldige_uurgemiddelden
              value: $max_ongeldige_uurgemiddelden_per_dag
  - number: 4.52.2
    text: |-
      Als per jaar de metingen van meer dan tien dagen ongeldig zijn, worden passende maatregelen getroffen om de
      betrouwbaarheid van het continu werkende meetsysteem te verbeteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.52
    machine_readable:
      definitions:
        max_ongeldige_dagen_per_jaar: 10
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: aantal_ongeldige_dagen_per_jaar
            type: number
            required: true
            description: Aantal dagen per jaar waarop metingen ongeldig zijn
            source: {}
        output:
          - name: maatregelen_vereist
            type: boolean
            description: Of passende maatregelen moeten worden getroffen om betrouwbaarheid te verbeteren
        actions:
          - output: maatregelen_vereist
            value:
              operation: GREATER_THAN
              subject: $aantal_ongeldige_dagen_per_jaar
              value: $max_ongeldige_dagen_per_jaar
  - number: 4.53.1
    text: Op de bekwaamheid van een laboratorium is NEN-EN-ISO/IEC 17025 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.53
  - number: 4.53.2
    text: Op richtlijnen voor Predictive Emission Monitoring Systems is NVN-CEN TS 17198 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.53
  - number: 4.53.3
    text: |-
      De [Regeling brandstoffen luchtverontreiniging][ref1] is van overeenkomstige toepassing op de vaststelling van het
      zwavelgehalte van een brandstof.


      [ref1]: https://wetten.overheid.nl/BWBR0029916
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.53
    references:
      - id: ref1
        bwb_id: BWBR0029916
  - number: 4.54.1
    text: |-
      De emissiegrenswaarden, bedoeld in de [artikelen 4.34][ref1], [4.36][ref2], [4.38][ref3], [4.39][ref4] en
      [4.39a][ref5], gelden niet voor gasturbines, gasmotoren en dieselmotoren die:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.54
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.54.1.a
    text: |-
      zijn bedoeld voor noodgevallen volgens de omgevingsvergunning voor een milieubelastende activiteit die daarvoor
      geldt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.54
    machine_readable:
      definitions:
        max_bedrijfsuren_noodgeval: 500
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: is_noodgeval_installatie
            type: boolean
            required: true
            description: >-
              Of de gasturbine, gasmotor of dieselmotor
              bedoeld is voor noodgevallen volgens
              de omgevingsvergunning
            source: {}
          - name: bedrijfsuren_per_jaar
            type: number
            required: true
            description: Aantal uur per jaar dat de installatie in werking is (excl. inwerkingstelling en stillegging)
            source: {}
        output:
          - name: emissiegrenswaarden_niet_van_toepassing
            type: boolean
            description: Of de emissiegrenswaarden (art. 4.34, 4.36, 4.38, 4.39, 4.39a) niet van toepassing zijn
        actions:
          - output: emissiegrenswaarden_niet_van_toepassing
            value:
              operation: AND
              conditions:
                - $is_noodgeval_installatie
                - operation: LESS_THAN
                  subject: $bedrijfsuren_per_jaar
                  value: $max_bedrijfsuren_noodgeval
  - number: 4.54.1.b
    text: |-
      minder dan 500 uur per jaar geheel of gedeeltelijk in werking zijn en emissies in de lucht veroorzaken, met
      uitzondering van de tijd die nodig is voor de inwerkingstelling en stillegging.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.54
  - number: 4.54.2
    text: Het aantal uur dat de installaties in werking zijn, wordt geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.54
  - number: 4.55.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht zijn bij gelijktijdig gebruik van verschillende
      soorten brandstof in een grote stookinstallatie de emissiegrenswaarden voor zwaveldioxide, stikstofoxiden en totaal
      stof de gewogen gemiddelden van de emissiegrenswaarden die voor elk van de brandstoffen afzonderlijk van toepassing
      zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.55
    machine_readable:
      execution:
        produces:
          legal_character: INFORMATIEF
        input:
          - name: gebruikt_meerdere_brandstoffen
            type: boolean
            required: true
            description: Of gelijktijdig verschillende soorten brandstof worden gebruikt
            source: {}
        output:
          - name: gewogen_gemiddelde_vereist
            type: boolean
            description: Of gewogen gemiddelden van emissiegrenswaarden moeten worden berekend
        actions:
          - output: gewogen_gemiddelde_vereist
            value: $gebruikt_meerdere_brandstoffen
  - number: 4.55.2
    text: |-
      Een gewogen gemiddelde wordt per tijdseenheid berekend naar het aandeel van elk van de brandstoffen in de
      energetische inhoud van de toegevoerde brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.55
  - number: '4.56'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee voor een bestaande grote stookinstallatie de emissiegrenswaarde
      voor zwaveldioxide, bedoeld in [artikel 4.55, eerste lid][ref1], wordt verhoogd, bevat een emissiegrenswaarde van
      niet meer dan 500 mg/Nm3, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.56
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.56.a
    text: de stookinstallatie deel uitmaakt van een raffinaderij; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.56
  - number: 4.56.b
    text: |-
      de stookinstallatie zelf destillatieresiduen of omzettingsresiduen afkomstig van het raffineren van ruwe aardolie,
      alleen of in combinatie met andere brandstoffen, verbruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.56
  - number: '4.57'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht kan een grote stookinstallatie waar normaal
      laagzwavelige brandstof wordt verstookt, 240 uur in werking blijven, als door een onderbreking van de voorziening
      met laagzwavelige brandstof als gevolg van een ernstig tekort aan die brandstoffen niet kan worden voldaan aan de
      emissiegrenswaarden, bedoeld in [artikel 4.34][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.57
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: '4.58'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt onverwijld geïnformeerd over een onderbreking van de
      voorziening met laagzwavelige brandstof als bedoeld in [artikel 4.57][ref2], waardoor niet kan worden voldaan aan
      de emissiegrenswaarden, bedoeld in [artikel 4.34][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: '4.59'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee [artikel 4.57][ref1] wordt versoepeld, bevat een verlenging van
      niet meer dan zes maanden als de omstandigheid, bedoeld in artikel 4.57, voortduurt en emissiegrenswaarden daardoor
      niet in acht kunnen worden genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: '4.60'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht bij onvoorziene omstandigheden zijn de
      emissiegrenswaarden, bedoeld in de [artikelen 4.34][ref1], [4.36][ref2], [4.38][ref3] en [4.39][ref4], ten hoogste
      240 uur per incident niet van toepassing, als een grote stookinstallatie die normaal met gasvormige brandstof wordt
      gestookt, met een andere brandstof wordt gestookt wanneer door weersomstandigheden of storingen in de gastoevoer
      geen gas kan worden geleverd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.60
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: '4.61'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt onverwijld geïnformeerd over het stoken met een andere
      brandstof dan een gasvormige brandstof, bedoeld in [artikel 4.60][ref2], als door weersomstandigheden of storingen
      in de gastoevoer geen gas kan worden geleverd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.61
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.62.1
    text: |-
      Met het oog op het zuinig gebruik van energie en grondstoffen is het netto elektrisch rendement van een grote
      stookinstallatie die met steenkool of een combinatie van steenkool en een andere brandstof wordt gestookt ten
      minste 40%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
    machine_readable:
      definitions:
        minimum_rendement_procent: 40
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: wordt_gestookt_met_steenkool
            type: boolean
            required: true
            description: Of de stookinstallatie met steenkool of combinatie van steenkool en andere brandstof wordt gestookt
            source: {}
          - name: netto_elektrisch_rendement_procent
            type: number
            required: true
            description: Het netto elektrisch rendement van de stookinstallatie in procenten
            source: {}
        output:
          - name: voldoet_rendement_steenkool
            type: boolean
            description: Of wordt voldaan aan het minimale netto elektrisch rendement van 40%
        actions:
          - output: voldoet_rendement_steenkool
            value:
              operation: IF
              cases:
                - when: $wordt_gestookt_met_steenkool
                  then:
                    operation: GREATER_THAN_OR_EQUAL
                    subject: $netto_elektrisch_rendement_procent
                    value: $minimum_rendement_procent
              default: true
  - number: 4.62.2
    text: |-
      Het netto elektrisch rendement wordt bepaald over de laatste vijf jaar dat de stookinstallatie in gebruik is of,
      als dat gebruik korter is dan vijf jaar, over de periode dat de stookinstallatie elektriciteit heeft geleverd aan
      het landelijk hoogspanningsnet, bedoeld in [artikel 1, eerste lid, onder j, van de Elektriciteitswet 1998][ref1],
      waarbij deze periode ten minste een jaar is.


      [ref1]: https://wetten.overheid.nl/BWBR0009755#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
    references:
      - id: ref1
        bwb_id: BWBR0009755
        artikel: '1'
  - number: 4.62.3
    text: |-
      Het netto elektrisch rendement wordt bepaald door de aan het landelijk hoogspanningsnet geleverde elektriciteit te
      delen door de energie-inhoud van de ingezette brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
  - number: 4.62.4
    text: 'Bij levering aan een warmtenet wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
  - number: 4.62.4.a
    text: |-
      de energie-inhoud van de ingezette brandstoffen gecorrigeerd voor de energie-inhoud van de brandstoffen die
      aanvullend worden gebruikt in verband met de warmtelevering; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
  - number: 4.62.4.b
    text: |-
      de aan het landelijk hoogspanningsnet geleverde elektriciteit verhoogd met de elektriciteitsderving door de
      warmtelevering.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62
  - number: 4.62a.1
    text: |-
      Een grote stookinstallatie en de terreinen die daarbij horen worden zodanig geëxploiteerd dat het vrijkomen van
      verontreinigende stoffen van rookgasreiniging op of in de bodem, het oppervlaktewater of het grondwater wordt
      voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.62a.2
    text: 'Er is opvangcapaciteit voor de opvang van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.62a.2.a
    text: wegvloeiend hemelwater dat is verontreinigd met afvalwater van rookgasreiniging;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.62a.2.b
    text: afvalwater van rookgasreiniging als gevolg van overlopen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.62a.2.c
    text: water afkomstig van brandbestrijding dat is verontreinigd met afvalwater van rookgasreiniging.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.62a.3
    text: |-
      De opvangcapaciteit is zodanig dat het afvalwater van rookgasreiniging, voordat het wordt geloosd, kan worden
      behandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.62a
  - number: 4.63.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een afvalverbrandingsinstallatie of een
      afvalmeeverbrandingsinstallatie waar vaste of vloeibare afvalstoffen worden verbrand of meeverbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: is_afvalverbrandingsinstallatie
            type: boolean
            required: true
            description: Of het een afvalverbrandingsinstallatie betreft
            source: {}
          - name: is_afvalmeeverbrandingsinstallatie
            type: boolean
            required: true
            description: Of het een afvalmeeverbrandingsinstallatie betreft
            source: {}
          - name: verbrandt_vaste_of_vloeibare_afvalstoffen
            type: boolean
            required: true
            description: Of er vaste of vloeibare afvalstoffen worden verbrand of meeverbrand
            source: {}
        output:
          - name: paragraaf_4_4_van_toepassing
            type: boolean
            description: Of paragraaf 4.4 (afvalverbranding) van toepassing is
        actions:
          - output: paragraaf_4_4_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: OR
                  conditions:
                    - $is_afvalverbrandingsinstallatie
                    - $is_afvalmeeverbrandingsinstallatie
                - $verbrandt_vaste_of_vloeibare_afvalstoffen
  - number: 4.63.2
    text: 'Een afvalverbrandingsinstallatie en een afvalmeeverbrandingsinstallatie omvatten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.a
    text: |-
      verbrandingsstraten of meeverbrandingsstraten en voorzieningen voor ontvangst, opslag en voorbehandeling van de
      afvalstoffen op de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.b
    text: systemen voor de toevoer van afvalstoffen, brandstof en lucht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.c
    text: ketels;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.d
    text: voorzieningen voor de behandeling van afgassen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.e
    text: voorzieningen voor de behandeling of opslag van afvalverbrandingsresiduen en afvalwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.f
    text: schoorstenen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.2.g
    text: |-
      apparatuur en systemen voor de regeling van het verbrandingsproces of meeverbrandingsproces en voor de registratie
      en monitoring van de omstandigheden van verbranding of meeverbranding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.3
    text: |-
      Als voor de thermische behandeling van afvalstoffen andere processen dan oxidatie worden gebruikt, omvat de
      afvalverbrandingsinstallatie of de afvalmeeverbrandingsinstallatie het proces voor thermische behandeling en ook
      het daaropvolgende verbrandingsproces.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.a
    text: |-
      een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie waarin alleen de volgende afvalstoffen
      thermisch worden behandeld of producten van thermische behandeling van alleen de volgende afvalstoffen worden
      verbrand:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.a.1°
    text: rie-biomassa;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.a.2°
    text: radioactieve afvalstoffen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.a.3°
    text: |-
      afvalstoffen die zijn ontstaan bij de exploratie en exploitatie van oliebronnen en gasbronnen vanaf een installatie
      in zee en die aan boord van die installatie worden verbrand;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.b
    text: |-
      een experimentele afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie voor onderzoek, ontwikkeling en
      tests om het thermisch behandelingsproces te verbeteren, waarin per kalenderjaar minder dan 50 ton afvalstoffen
      wordt verwerkt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.c
    text: |-
      een vaste technische eenheid voor vergassing of pyrolyse, als de gassen die het resultaat zijn van deze thermische
      behandeling van afvalstoffen voordat ze worden verbrand zo worden gereinigd dat bij de verbranding ervan niet meer
      emissies ontstaan dan bij de verbranding van aardgas; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: 4.63.4.d
    text: |-
      stookinstallaties bij een veehouderij met een totaal nominaal thermisch ingangsvermogen van ten hoogste 5 MW, die
      als brandstof alleen onverwerkte mest van gevogelte als bedoeld in artikel 9, onder a, van de verordening dierlijke
      bijproducten gebruiken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.63
  - number: '4.64'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.63][ref1], wordt voldaan aan de regels over het
      eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: '4.65'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de regels in deze paragraaf niet versoepeld, met uitzondering
      van de [artikelen 4.73][ref1] en [4.96][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.65
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: '4.66'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem, een oppervlaktewaterlichaam en de lucht wordt bij
      het vervoer van de verbrandingsoven naar het opslagterrein en de tussentijdse opslag op dat terrein voorkomen dat
      verbrandingsresiduen in de bodem, een oppervlaktewaterlichaam en de lucht terechtkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.66
  - number: 4.67.1
    text: |-
      Een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie en de terreinen die daarbij horen worden zo
      geëxploiteerd dat het ongeoorloofd en per ongeluk vrijkomen van verontreinigende stoffen op of in de bodem en op
      een oppervlaktewaterlichaam wordt voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.67.2
    text: 'Er is opvangcapaciteit voor de opvang van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.67.2.a
    text: wegvloeiend verontreinigd hemelwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.67.2.b
    text: verontreinigd water dat is overgelopen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.67.2.c
    text: verontreinigd water afkomstig van brandbestrijding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.67.3
    text: Het afvalwater kan worden behandeld voordat het wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.67
  - number: 4.68.1
    text: |-
      Voor het afvalwater afkomstig van het reinigen van afgassen dat wordt geloosd op een oppervlaktewaterlichaam zijn
      de emissiegrenswaarden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.68.1.a
    text: de waarden, bedoeld in tabel 4.68, gemeten in een steekmonster;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.68.1.b
    text: voor onopgeloste stoffen 30 mg/l, gemeten in een steekmonster; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.68.1.c
    text: voor totaal organisch koolstof 40 mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.68.2
    text: De zuurgraad van het afvalwater is ten minste pH 6,5 en ten hoogste pH 11, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.68.3
    text: |-
      Als meer dan twintig steekmonsters per jaar worden genomen, gelden de emissiegrenswaarden voor 95% van die
      steekmonsters, met uitzondering van de emissiegrenswaarden voor dioxinen en furanen.
            Tabel 4.68 Emissiegrenswaarden


