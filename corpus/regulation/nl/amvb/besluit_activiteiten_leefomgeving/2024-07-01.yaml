      - id: ref5
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.13.1.a
    text: |-
      waarin activiteiten als milieubelastende activiteiten, lozingsactiviteiten op een oppervlaktewaterlichaam of
      lozingsactiviteiten op een zuiveringtechnisch werk worden aangewezen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
  - number: 2.13.1.b
    text: over meldingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
  - number: 2.13.2
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan worden afgeweken van [afdeling 2.7][ref1] en de
      [hoofdstukken 3 tot en met 5][ref2], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
    references:
