  - number: 7.1.1.e
    text: ontgrondingsactiviteiten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.1.1.f
    text: mijnbouwlocatieactiviteiten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.1.1.g
    text: wateronttrekkingsactiviteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.1.2
    text: 'Dit hoofdstuk gaat niet over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.1.2.a
    text: |-
      lozingsactiviteiten aan boord van vaartuigen of luchtvaartuigen in zee, voor zover die activiteiten samenhangen met
      of voortvloeien uit het normale gebruik van het vaartuig of luchtvaartuig en dat gebruik niet als doel heeft het
      zich ontdoen van stoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.1.2.b
    text: |-
      activiteiten aan boord van vaartuigen of drijvende werktuigen die in gebruik zijn voor het uitoefenen van
      defensietaken, ongeacht hun nationaliteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.1
  - number: 7.2.1
    text: |-
      De regels in dit hoofdstuk over beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk,
      lozingsactiviteiten op een oppervlaktewaterlichaam en stortingsactiviteiten op zee zijn gesteld met het oog op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.1.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.1.c
    text: het vervullen van maatschappelijke functies door watersystemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.2
    text: |-
      In afwijking van het eerste lid zijn de regels over beperkingengebiedactiviteiten met betrekking tot een
      waterstaatswerk, voor zover die plaatsvinden buiten het provinciaal en gemeentelijk ingedeelde gebied, gesteld met
      het oog op de doelen van de [wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 7.2.3
    text: |-
      De regels in dit hoofdstuk over beperkingengebiedactiviteiten met betrekking tot een installatie in een
      waterstaatswerk zijn gesteld met het oog op het waarborgen van de veiligheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.4
    text: 'De regels in dit hoofdstuk over mijnbouwlocatieactiviteiten zijn gesteld met het oog op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.4.a
    text: het waarborgen van de veiligheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.4.b
    text: een evenwichtige toedeling van functies aan locaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
  - number: 7.2.5
    text: |-
      De regels in dit hoofdstuk over ontgrondingsactiviteiten zijn gesteld met het oog op de doelen van de [wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: '7.3'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een waterstaatswerk, een beperkingengebiedactiviteit
      met betrekking tot een andere installatie dan een mijnbouwinstallatie in een waterstaatswerk, een
      stortingsactiviteit op zee, een lozingsactiviteit op een oppervlaktewaterlichaam, een ontgrondingsactiviteit en een
      wateronttrekkingsactiviteit is Onze Minister van Infrastructuur en Waterstaat het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.3
  - number: 7.3.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.3
  - number: 7.3.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.3
  - number: 7.3.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.3
  - number: '7.4'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een mijnbouwinstallatie in een waterstaatswerk en een
      mijnbouwlocatieactiviteit is Onze Minister van Economische Zaken en Klimaat het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.4
  - number: 7.4.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.4
  - number: 7.4.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.4
  - number: 7.4.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.4
  - number: '7.5'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.5
  - number: 7.6.1
    text: |-
      Degene die een activiteit als bedoeld in [artikel 7.1, eerste lid][ref1], verricht en weet of redelijkerwijs kan
      vermoeden dat die activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 7.2][ref2], is
      verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.6.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten als dat redelijkerwijs van
      diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.2
    text: >-
      Voor beperkingengebiedactiviteiten met betrekking
      tot een waterstaatswerk houdt deze plicht in
      ieder geval in dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.2.a
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 7.6.2.b
    text: nadelige gevolgen voor de ecologische toestand van het oppervlaktewaterlichaam zo veel mogelijk worden voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.2.c
    text: |-
      na beëindiging van een activiteit het deel van het waterstaatswerk dat is gebruikt zo veel mogelijk in de
      oorspronkelijke staat wordt teruggebracht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.2.d
    text: het waterstaatswerk tijdens het verrichten van de activiteit bereikbaar blijft voor het bevoegd gezag; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.2.e
    text: het gebruikte materiaal en materieel op tijd wordt verwijderd als overstroming of wegslag hiervan dreigt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.3
    text: |-
      Voor beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk dat de functie vaarweg heeft, houdt deze
      plicht, in aanvulling op het tweede lid, in ieder geval in dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.3.a
    text: de veilige en vlotte doorvaart van de scheepvaart niet wordt belemmerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.3.b
    text: de zichtlijnen voor de scheepvaart niet worden gehinderd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.3.c
    text: geen hinder voor navigatieapparatuur wordt veroorzaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.4
    text: |-
      Voor beperkingengebiedactiviteiten met betrekking tot een installatie in een waterstaatswerk houdt deze plicht in
      ieder geval in dat nadelige gevolgen voor het veilig en doelmatig gebruik van installaties in een waterstaatswerk
      worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5
    text: 'Voor lozingsactiviteiten op een oppervlaktewaterlichaam houdt deze plicht in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.a
    text: alle passende preventieve maatregelen tegen milieuverontreiniging worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.b
    text: de beste beschikbare technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.c
    text: geen significante verontreiniging wordt veroorzaakt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.d
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 7.6.5.e
    text: lozingen op een oppervlaktewaterlichaam doelmatig kunnen worden bemonsterd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.f
    text: metingen representatief zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.5.g
    text: meetresultaten op geschikte wijze worden geregistreerd, verwerkt en gepresenteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.6
    text: 'Voor mijnbouwlocatieactiviteiten houdt deze plicht in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.6.a
    text: het belang van de scheepvaartveiligheid is gewaarborgd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.6.b
    text: |-
      de belangen van het uitoefenen van defensietaken en van het veilig kunnen verrichten van de daarop betrekking
      hebbende activiteiten zijn gewaarborgd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.7
    text: |-
      Voor mijnbouwlocatieactiviteiten die bestaan uit het gebruiken van een locatie voor het plaatsen van een
      mijnbouwinstallatie houdt deze plicht in ieder geval ook in dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.7.a
    text: het belang van de elektriciteitsopwekking met behulp van wind in een windpark is gewaarborgd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.7.b
    text: zichthinder veroorzaakt door nieuwe mijnbouwinstallaties wordt geminimaliseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.6.8
    text: |-
      Voor wateronttrekkingsactiviteiten houdt deze plicht in ieder geval in dat nadelige gevolgen voor de ecologische
      toestand van het oppervlaktewaterlichaam zo veel mogelijk worden voorkomen of beperkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.6
  - number: 7.7.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in dit hoofdstuk worden verbonden, over
      de [artikelen 7.6][ref2], [7.12][ref3] en [7.13][ref4] en [afdeling 7.2][ref5], met uitzondering van bepalingen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref5
        bwb_id: BWBR0041330
        hoofdstuk: '7'
        afdeling: '7.2'
  - number: 7.7.1.a
    text: |-
      waarin het toepassingsbereik van een paragraaf voor beperkingengebiedactiviteiten, stortingsactiviteiten,
      lozingsactiviteiten, ontgrondingsactiviteiten of mijnbouwlocatieactiviteiten wordt bepaald; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.1.b
    text: over meldingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.2
    text: |-
      Met een maatwerkvoorschrift of vergunningvoorschrift kan worden afgeweken van de [artikelen 7.12][ref1] en
      [7.13][ref2] en [afdeling 7.2][ref3], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '7'
        afdeling: '7.2'
  - number: 7.7.3
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan voor een lozingsactiviteit op een
      oppervlaktewaterlichaam voor een periode van ten hoogste negen maanden ook worden afgeweken van
      [artikel 7.6, vijfde lid, onder a en b][ref1], voor het testen of gebruiken van een nieuwe techniek die, als zij
      commercieel zou worden ontwikkeld:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.7.3.a
    text: een hoger of ten minste hetzelfde beschermingsniveau voor het milieu kan opleveren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.3.b
    text: grotere kostenbesparingen kan opleveren dan de voor de die activiteit bestaande beste beschikbare technieken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.4
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in dit hoofdstuk kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.5
    text: |-
      De volgende beoordelingsregels en bepalingen over vergunningvoorschriften zijn van overeenkomstige toepassing op
      het stellen van een maatwerkvoorschrift:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
  - number: 7.7.5.a
    text: |-
      als het gaat om een beperkingengebiedactiviteit met betrekking tot een waterstaatswerk:
      [artikel 8.84 van het Besluit kwaliteit leefomgeving][ref1] en afdeling 8.3 van het Omgevingsbesluit;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 7.7.5.b
    text: |-
      als het gaat om een beperkingengebiedactiviteit met betrekking tot een installatie in een waterstaatswerk:
      [artikel 8.2 van het Besluit kwaliteit leefomgeving][ref1] en [afdeling 8.3 van het Omgevingsbesluit][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Afdeling8.3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0041278
        afdeling: '8.3'
  - number: 7.7.5.c
    text: |-
      als het gaat om een lozingsactiviteit op een oppervlaktewaterlichaam: de
      [artikelen 8.26, tweede tot en met vierde lid][ref1], [8.27][ref2], [8.28][ref3],
      [8.30][ref4], [8.31][ref5], [8.33][ref6], [8.84][ref7], [8.88][ref8], [8.92][ref9]
      en [8.98 tot en met 8.100 van het Besluit kwaliteit leefomgeving][ref10] en
      [afdeling 8.3 van het Omgevingsbesluit][ref11];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref9]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref10]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref11]: https://wetten.overheid.nl/BWBR0041278#Afdeling8.3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
