        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.41'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.41'
  - number: 4.529.1
    text: |-
      Deze paragraaf is van toepassing op het met een handpomp of elektrische pomp tanken van vaartuigen of drijvende
      werktuigen, als niet meer dan 25 m3 vloeibare brandstoffen per jaar wordt getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.529
  - number: 4.529.2
    text: Als vloeibare brandstoffen worden getankt, is deze paragraaf ook van toepassing op het daarnaast tanken met ureum.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.529
  - number: 4.530.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.529][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.530
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.42'
  - number: 4.530.2
    text: |-
      Een melding bevat de coördinaten van de tankzuil waarmee brandstoffen van ADR-klasse 3, met uitzondering van
      gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger, worden getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.530
  - number: 4.530.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.530
  - number: 4.530.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.530
    references:
