  - number: 6.56j.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een installatie te verrichten, geldt voor de activiteiten, bedoeld
      in [artikel 6.56i][ref2], die worden verricht in het beperkingengebied met betrekking tot die installatie, voor
      zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56j
