  - number: '10.1'
    text: |-
      Dit hoofdstuk gaat over beperkingengebiedactiviteiten met betrekking tot een luchthaven die zijn aangewezen in
      dit hoofdstuk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.1
  - number: '10.2'
    text: |-
      De regels in [afdeling 10.2][ref1] over beperkingengebiedactiviteiten met betrekking tot een luchthaven zijn
      gesteld met het oog op het behoeden van de staat en werking van luchthavens voor nadelige gevolgen van activiteiten
      op of rond die luchthavens, waartoe ook het belang van verruiming of wijziging van die luchthavens behoort.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: '10.3'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een burgerluchthaven van regionale betekenis zijn
      gedeputeerde staten van de provincie waarbinnen de activiteit geheel of in hoofdzaak wordt verricht het bevoegd
      gezag dat een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.3
  - number: '10.4'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot de luchthaven Schiphol, een overige burgerluchthaven van
      nationale betekenis en een buitenlandse burgerluchthaven is Onze Minister van Infrastructuur en Waterstaat het
      bevoegd gezag dat een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.4
  - number: '10.5'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een militaire luchthaven is Onze Minister van Defensie het
      bevoegd gezag dat een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.5
  - number: '10.6'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.6
  - number: '10.7'
    text: |-
      Degene die een beperkingengebiedactiviteit met betrekking tot een luchthaven verricht en weet of redelijkerwijs
      kan vermoeden dat die activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 10.2][ref1],
      is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
  - number: 10.7.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.7
  - number: 10.7.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.7
  - number: 10.7.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.7
  - number: '10.8'
    text: |-
      Een maatwerkregel kan in een omgevingsverordening worden gesteld over [artikel 10.7][ref1], als het gaat om
      beperkingengebiedactiviteiten met betrekking tot een burgerluchthaven van regionale betekenis.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
  - number: 10.9.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in dit hoofdstuk worden verbonden,
      over [artikel 10.7][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
  - number: 10.9.2
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in dit hoofdstuk kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.9
  - number: '10.10'
    text: |-
      Als beperkingengebiedactiviteiten met betrekking tot een luchthaven als bedoeld in [artikel 10.1][ref1]
      worden aangewezen het plaatsen en aanleggen van objecten in strijd met een regel in het
      [Luchthavenindelingbesluit Schiphol][ref2], een luchthavenbesluit of een besluit beperkingengebied buitenlandse
      luchthaven als bedoeld in [artikel 8a.54 van de Wet luchtvaart][ref3] over de maximale hoogte van objecten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0014329
      [ref3]: https://wetten.overheid.nl/BWBR0005555#Artikel8a
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.10
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
        input:
          - name: hoogte_object_meter
            type: number
            required: true
            description: De hoogte van het te plaatsen of aan te leggen object in meters
            source: {}
          - name: maximale_hoogte_meter
            type: number
            required: true
            description: >-
              De maximale hoogte op grond van het
              Luchthavenindelingbesluit,
              luchthavenbesluit of besluit
              beperkingengebied
            source: {}
        output:
          - name: in_strijd_met_hoogtebeperking
            type: boolean
            description: Of het object in strijd is met de maximale hoogte
          - name: aangewezen_als_beperkingengebiedactiviteit
            type: boolean
            description: Of de activiteit is aangewezen als beperkingengebiedactiviteit
        actions:
          - output: in_strijd_met_hoogtebeperking
            value:
              operation: GREATER_THAN
              subject: $hoogte_object_meter
              value: $maximale_hoogte_meter
          - output: aangewezen_als_beperkingengebiedactiviteit
            value: $in_strijd_met_hoogtebeperking
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.1'
      - id: ref2
        bwb_id: BWBR0014329
      - id: ref3
        bwb_id: BWBR0005555
        artikel: 8a
  - number: 10.11.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een luchthaven te verrichten, geldt voor de activiteiten, bedoeld
      in [artikel 10.10][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 10.11.2
    text: 'Het verbod geldt niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.11
  - number: 10.11.2.a
    text: het bouwen van een bouwwerk dat voldoet aan de daarvoor geldende hoogtebeperking in het omgevingsplan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.11
  - number: 10.11.2.b
    text: activiteiten waarvoor een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit is vereist.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel10.11
  - number: 11.1.1
    text: |-
      Deze afdeling gaat over activiteiten die verslechterende of significant verstorende gevolgen voor een Natura 2000-
      gebied of een bijzonder nationaal natuurgebied kunnen hebben.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.1
  - number: 11.1.2
    text: |-
      Deze afdeling gaat niet over activiteiten die onderwerp zijn van het gemeenschappelijk visserijbeleid, bedoeld
      in artikel 38 van het Verdrag betreffende de werking van de Europese Unie, voor zover zij worden verricht in de
      exclusieve economische zone.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.1
  - number: '11.2'
    text: |-
      De regels in [paragraaf 11.1.2][ref1] zijn gesteld met het oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: '11.3'
    text: |-
      Tenzij in [artikel 11.4][ref1] anders is bepaald, zijn gedeputeerde staten van de provincie waarbinnen de
      activiteit geheel of in hoofdzaak wordt verricht het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.3.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.3
  - number: 11.3.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.3
  - number: 11.4.1
    text: |-
      Voor een Natura 2000-activiteit van nationaal belang als bedoeld in [artikel 4.12 van het Omgevingsbesluit][ref1]
      en voor een in het tweede lid van dat artikel aangewezen activiteit die verslechterende of significant verstorende
      gevolgen voor een Natura 2000-gebied kan hebben is Onze Minister voor Natuur en Stikstof het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.4
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.4.1.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.4
  - number: 11.4.1.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.4
  - number: 11.4.2
    text: |-
      Onze Minister voor Natuur en Stikstof is ook het bevoegd gezag dat een maatwerkvoorschrift kan stellen of dat
      beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen voor een activiteit met mogelijke
      verslechterende of significant verstorende gevolgen voor een bijzonder nationaal natuurgebied.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.4
  - number: '11.5'
    text: |-
      Aan deze afdeling wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.5
  - number: 11.6.1
    text: |-
      Degene die een activiteit als bedoeld in [artikel 11.1, eerste lid][ref1], verricht en weet of redelijkerwijs
      kan vermoeden dat die activiteit nadelige gevolgen kan hebben voor het belang, bedoeld in [artikel 11.2][ref2],
      is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.6.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2
    text: 'De plicht, bedoeld in het eerste lid, houdt in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.a
    text: |-
      voorafgaand aan het verrichten van activiteiten in, of in de directe nabijheid van een Natura 2000-gebied of een
      bijzonder nationaal natuurgebied kennis wordt genomen van de informatie in het aanwijzingsbesluit van het gebied
      over de leefgebieden voor vogelsoorten, natuurlijke habitats en habitats van soorten waarvoor het gebied is
      aangewezen en de daarvoor geldende instandhoudingsdoelstellingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.b
    text: |-
      wordt nagegaan of op voorhand op grond van objectieve gegevens verslechterende of significant verstorende gevolgen
      kunnen worden uitgesloten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.c
    text: |-
      als die gevolgen niet kunnen worden uitgesloten: wordt nagegaan welke gevolgen de activiteit kan hebben voor de
      leefgebieden, natuurlijke habitats en habitats van soorten, gelet op de instandhoudingsdoelstellingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.d
    text: |-
      alle passende preventieve maatregelen worden getroffen om verslechterende of significant verstorende gevolgen,
      gelet op de instandhoudingsdoelstellingen, voor het betrokken gebied te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.e
    text: |-
      tijdens en na het verrichten van de activiteit wordt nagegaan of de getroffen maatregelen de beoogde effecten
      hebben; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.6.2.f
    text: |-
      het verrichten van de activiteit wordt gestaakt, of, als staken van de activiteit redelijkerwijs niet meer mogelijk
      is, passende herstelmaatregelen worden getroffen als zich, ondanks de getroffen maatregelen, verslechterende
      of significant verstorende gevolgen voordoen voor de leefgebieden, natuurlijke habitats of habitats van soorten
      waarvoor het gebied is aangewezen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.6
  - number: 11.7.1
    text: |-
      Een maatwerkregel kan in de omgevingsverordening worden gesteld over de [artikelen 11.6][ref1], [11.12][ref2],
      [11.13][ref3] en [11.14][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.7.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van de [artikelen 11.13][ref1] en [11.14][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.7.3
    text: Een maatwerkregel kan worden gesteld met het oog op natuurbescherming.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.7
  - number: '11.8'
    text: |-
      Een maatwerkregel wordt niet gesteld over een activiteit waarvoor Onze Minister voor Natuur en Stikstof een
      bevoegdheid als bedoeld in [artikel 11.4][ref1] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.9.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in deze afdeling worden verbonden, over
      de [artikelen 11.6][ref2], [11.12][ref3], [11.13][ref4] en [11.14][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.9.2
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan worden afgeweken van de [artikelen 11.13][ref1] en
      [11.14][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.9.3
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in deze afdeling kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.9
  - number: 11.9.4
    text: |-
      Op het stellen van een maatwerkvoorschrift over een Natura 2000-activiteit zijn de beoordelingsregels en de
      bepalingen over vergunningvoorschriften in [paragraaf 8.6.1 van het Besluit kwaliteit leefomgeving][ref1] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Paragraaf8.6.1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0041313
        paragraaf: 8.6.1
  - number: '11.10'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [artikel 11.3][ref1] of
      [11.4][ref2], worden die ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.10.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.10
  - number: 11.10.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.10
  - number: 11.10.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.10
  - number: 11.10.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.10
  - number: 11.11.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in
      [artikel 11.10][ref1], wijzigen, worden de daardoor gewijzigde gegevens verstrekt aan het bevoegd gezag, bedoeld
      in [artikel 11.3][ref2] of [11.4][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.11.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de daardoor gewijzigde
      gegevens verstrekt aan het bevoegd gezag, bedoeld in [artikel 11.3][ref1] of [11.4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.12.1
    text: |-
      Op verzoek van het bevoegd gezag, bedoeld in [artikel 11.3][ref1] of [11.4][ref2], worden over een activiteit die
      wordt verricht of is voorgenomen en die verslechterende of significant verstorende gevolgen voor een Natura 2000-
      gebied of een bijzonder nationaal natuurgebied kan hebben, de gegevens en bescheiden verstrekt die nodig zijn om te
      bezien of de algemene regels, maatwerkregels en maatwerkvoorschriften voor de activiteit toereikend zijn gelet op
      de instandhoudingsdoelstellingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.12.2
    text: |-
      Gegevens en bescheiden worden verstrekt voor zover degene die de activiteit verricht er redelijkerwijs de
      beschikking over kan krijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.12
  - number: '11.13'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 11.3][ref1] of [11.4][ref2], wordt onverwijld geïnformeerd over een
      ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.13
    references:
