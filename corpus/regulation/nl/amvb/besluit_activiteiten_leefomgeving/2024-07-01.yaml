      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 4.1213.1
    text: |-
      Met het oog op het beperken van emissie in de lucht wordt bij het op of in de bodem brengen van zuiveringsslib
      voldaan aan het BBT-document emissiearm aanwenden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1213
  - number: 4.1213.2
    text: |-
      Het eerste lid is niet van toepassing op het brengen van steekvast zuiveringsslib op landbouwgronden waar het
      hellingspercentage minder dan 7% is en waarop gras wordt geteeld of waarop alleen fruit wordt geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1213
  - number: 4.1213a
    text: |-
      [Artikel 4.1212b][ref1] wordt tot en met 31 december 2025 niet met een maatwerkregel of maatwerkvoorschrift
      versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1213a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.117'
  - number: 4.1213b
    text: |-
      Het treffen van een gelijkwaardige maatregel is tot en met 31 december 2025 uitgesloten voor
      [artikel 4.1212b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1213b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.117'
  - number: '4.1214'
    text: Deze paragraaf is van toepassing op het vernietigen van de zode van gras op weidegronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1214
  - number: 4.1215.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt de zode van gras op weidegronden niet
      vernietigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2
    text: 'Het eerste lid is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2.a
    text: weidegronden die liggen op kleigronden of veengronden, in de periode van 1 februari tot en met 15 september;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2.b
    text: 'weidegronden die liggen op zandgronden of lössgronden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2.b.1°
    text: |-
      in de periode van 1 februari tot en met 10 mei als aansluitend op het vernietigen van de zode van gras de teelt van
      een relatief stikstofbehoeftig gewas als bedoeld in [bijlage IVb][ref1] bij dit besluit begint;


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1215.2.b.2°
    text: |-
      in de periode van 11 mei tot en met 31 mei als aansluitend op het vernietigen van de zode van gras de teelt van
      gras begint; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2.b.3°
    text: |-
      in de periode van 1 juni tot en met 31 augustus als aansluitend op het vernietigen van de zode van gras de teelt
      van gras begint; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.2.c
    text: |-
      weidegronden die liggen op kleigronden in de periode van 1 november tot en met 31 december als na het vernietigen
      van de zode van gras het planten of zaaien van een ander gewas dan gras begint.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.3
    text: |-
      Het eerste lid is niet van toepassing als de zode van gras in de periode van 1 juni tot en met 15 juli wordt
      vernietigd en aansluitend uiterlijk op 16 juli de teelt van Japanse haver, Tagetes erecta of Tagetes patula begint
      die wordt ingezet voor aaltjesbeheersing in een vervolgteelt uiterlijk in het volgende kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.4
    text: |-
      Japanse haver, Tagetes erecta of Tagetes patula wordt niet verwijderd in de periode tussen het moment van inzaaien
      en 23 oktober van dat jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: 4.1215.5
    text: |-
      Het eerste lid is niet van toepassing op weidegronden in de periode van 16 september tot en met 30 november als
      aansluitend op het vernietigen van de zode van gras tulp, krokus, iris of muscari wordt geplant.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1215
  - number: '4.1216'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt voorafgaand aan het vernietigen van de zode van gras,
      bedoeld in [artikel 4.1215, tweede lid, onder b, onder 3°][ref2], geïnformeerd over de datum waarop deze wordt
      vernietigd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1216
