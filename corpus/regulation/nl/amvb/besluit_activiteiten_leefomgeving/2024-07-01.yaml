  - number: '1.3'
    text: |-
      Met een erkenning, certificaat, keuring of norm als bedoeld in dit besluit wordt gelijkgesteld een erkenning,
      certificaat, keuring of norm, afgegeven, uitgevoerd of goedgekeurd door een daartoe bevoegde onafhankelijke
      instelling in een andere lidstaat van de Europese Unie of in een staat die geen lidstaat van de Europese Unie is en
      partij is bij een verdrag dat Nederland bindt, met een beschermingsniveau dat ten minste gelijkwaardig is aan het
      niveau dat met de nationale eisen wordt nagestreefd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel1.3
  - number: '2.1'
    text: |-
      De [hoofdstukken 2 tot en met 5][ref1] gaan over milieubelastende activiteiten die zijn aangewezen in
      [hoofdstuk 3][ref2] en lozingsactiviteiten op een oppervlaktewaterlichaam en lozingsactiviteiten op een
      zuiveringtechnisch werk die daarbij worden verricht, of die zijn aangewezen in hoofdstuk 3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.2.1
    text: |-
      De regels in de [hoofdstukken 2 tot en met 5][ref1] over milieubelastende activiteiten zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
  - number: 2.2.1.a
    text: het waarborgen van de veiligheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.b
    text: het beschermen van de gezondheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c
    text: 'het beschermen van het milieu, voor zover het gaat om:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.1°
    text: het beschermen tegen milieuverontreiniging;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.2°
    text: |-
      het beschermen en verbeteren van de kwaliteit van lucht, bodem en de chemische en ecologische kwaliteit van
      watersystemen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.3°
    text: het doelmatig gebruik van energie en grondstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.4°
    text: een doelmatig beheer van afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.5°
    text: het voorkomen of beperken van geluidhinder, trillinghinder, lichthinder en geurhinder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.6°
    text: |-
      het beperken van de kans op en het voorkomen van ongewone voorvallen en de nadelige gevolgen daarvan, bedoeld in
      [artikel 19.1, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 2.2.1.c.7°
    text: het beschermen van de doelmatige werking van voorzieningen voor het beheer van afvalwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.8°
    text: het voorkomen en beperken van overstromingen, wateroverlast en waterschaarste; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.1.c.9°
    text: het vervullen van maatschappelijke functies door watersystemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.2
    text: |-
      De regels in de [hoofdstukken 2 tot en met 5][ref1] over lozingsactiviteiten op een oppervlaktewaterlichaam en
      lozingsactiviteiten op een zuiveringtechnisch werk zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
  - number: 2.2.2.a
    text: het voorkomen en beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.2.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.2.c
    text: het vervullen van maatschappelijke functies door watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: 2.2.2.d
    text: het beschermen van de doelmatige werking van het zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.2
  - number: '2.3'
    text: |-
      Tenzij in de [artikelen 2.5 tot en met 2.9][ref1] anders is bepaald, is voor een milieubelastende activiteit
      het college van burgemeester en wethouders van de gemeente waarbinnen de activiteit geheel of in hoofdzaak wordt
      verricht het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.3.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.3
  - number: 2.3.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.3
  - number: 2.3.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.3
  - number: '2.4'
    text: |-
      Voor een lozingsactiviteit op een oppervlaktewaterlichaam in beheer bij een waterschap en een lozingsactiviteit
      op een zuiveringtechnisch werk is het dagelijks bestuur van het waterschap waarbinnen de activiteit geheel of in
      hoofdzaak wordt verricht het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.4
  - number: 2.4.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.4
  - number: 2.4.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.4
  - number: 2.4.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.4
  - number: '2.5'
    text: |-
      Voor het aanleggen en het gebruiken van een open bodemenergiesysteem, bedoeld in [paragraaf 3.2.6][ref1], zijn
      gedeputeerde staten van de provincie waarbinnen de activiteit geheel of in hoofdzaak wordt verricht het bevoegd
      gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        paragraaf: 3.2.6
        afdeling: '3.2'
  - number: 2.5.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.5
  - number: 2.5.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.5
  - number: 2.5.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.5
  - number: 2.6.1
    text: |-
      Voor een lozingsactiviteit op een oppervlaktewaterlichaam in beheer bij het Rijk en het exploiteren van een
      buisleiding met gevaarlijke stoffen, bedoeld in [paragraaf 3.4.3][ref1], is Onze Minister van Infrastructuur en
      Waterstaat het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        paragraaf: 3.4.3
        afdeling: '3.4'
  - number: 2.6.1.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.1.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.1.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is ook het bevoegd gezag voor een milieubelastende activiteit die
      geheel of in hoofdzaak wordt verricht:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.2.a
    text: in de territoriale zee die buiten een gemeente of provincie ligt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.2.b
    text: in de exclusieve economische zone;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
  - number: 2.6.2.c
    text: |-
      op een locatie als bedoeld in [artikel 5.28, onder b, van het Besluit kwaliteit leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 2.6.2.d
    text: |-
      op een militair terrein of een terrein met een militair object als bedoeld in
      [artikel 5.150, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.6
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '2.7'
    text: |-
      Voor het aanleggen en het exploiteren van een mijnbouwwerk, bedoeld in [paragraaf 3.10.1][ref1], is Onze Minister
      van Economische Zaken en Klimaat het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
