  - number: '11.120'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.120
  - number: 11.120.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.120
  - number: 11.120.b
