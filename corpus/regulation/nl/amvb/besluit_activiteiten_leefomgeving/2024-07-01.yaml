    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.15'
  - number: '4.261'
    text: Met het oog op het beschermen van de gezondheid worden de afgezogen emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.261
  - number: '4.262'
    text: Deze paragraaf is van toepassing op het lassen van metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.262
  - number: 4.263.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.262][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.263
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.16'
  - number: 4.263.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.263
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.264.1
    text: 'In deze paragraaf wordt onder klasse III verstaan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.1.a
    text: |-
      lassen met beklede elektroden van alle materialen met uitzondering van roestvast staal, berylliumlegeringen en
      vanadiumlegeringen en met uitzondering van geverfde materialen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.1.b
    text: MAG-lassen met gevulde draad van alle materialen met uitzondering van roestvast staal en geverfde materialen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.1.c
    text: |-
      MIG/MAG-lassen met massieve draad van alle materialen met uitzondering van koperlegeringen, berylliumlegeringen en
      vanadiumlegeringen en met uitzondering van geverfde materialen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.2
    text: |-
      In deze paragraaf wordt onder klasse IV verstaan: het lassen van geverfde materialen, met uitzondering van
      loodmenie, met behulp van een van de volgende technieken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.2.a
    text: |-
      TIG-lassen, met uitzondering van het lassen van aluminium, plasmalassen, druklassen, autogeenlassen, en onder
      poeder lassen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.2.b
    text: het lassen met beklede elektroden, MAG-lassen met gevulde draad en MIG/MAG-lassen met massieve draad.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3
    text: 'In deze paragraaf wordt onder klasse V, VI en VII verstaan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.a
    text: 'het lassen met beklede elektroden, van de materialen: roestvast staal, vanadiumlegeringen en berylliumlegeringen;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.b
    text: 'MAG-lassen met gevulde draad van het materiaal: roestvast staal;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.c
    text: het lassen met gelegeerde elektrode of met gelegeerde gevulde draad;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.d
    text: |-
      MIG-lassen met gevulde draad of massieve draad van de materialen: koperlegeringen, berylliumlegeringen en
      vanadiumlegeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.e
    text: 'het lassen met gevulde draad van de materialen: ongelegeerd en gelegeerd staal; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: 4.264.3.f
    text: 'het lassen van het materiaal: geverfd staal met loodmenie.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.264
  - number: '4.265'
    text: |-
      Met het oog op het beperken van emissies in de lucht en het voorkomen of beperken van geluidhinder worden metalen
      in een gesloten ruimte gelast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.265
  - number: '4.266'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.266
  - number: 4.267.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.267, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.267
  - number: 4.267.2
    text: |-
      Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.267, niet overschrijdt.
