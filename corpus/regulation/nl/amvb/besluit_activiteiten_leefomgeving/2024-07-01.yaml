    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.938
  - number: '4.939'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een mobiele bovengrondse opslagtank en de
      daarop aangesloten leidingen na verplaatsing visueel gecontroleerd op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.939.a
    text: morsingen en lekkages;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.939.b
    text: beschadigingen en vervormingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.939.c
    text: functioneren van de lekdetectie, als die aanwezig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.939.d
    text: functioneren van de anti-hevelbeveiliging, als die aanwezig is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.939.e
    text: functioneren van de kiep-kantelvoorziening, als die aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.939
  - number: 4.940.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van de vloeistofdichte
      bodemvoorziening die zich onder het aansluitpunt van een bovengrondse opslagtank bevindt waarin gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger of oliën of vetten die geen vloeibare gevaarlijke afvalstoffen
      van ADR-klasse 3 zijn worden opgeslagen, geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.940
  - number: 4.940.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.940
  - number: '4.941'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941
  - number: 4.941.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941
  - number: 4.941.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941
  - number: 4.941a.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941a
  - number: 4.941a.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941a
  - number: 4.941a.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941a
  - number: 4.941b
    text: |-
      Tot 1 januari 2023 zijn de [artikelen 4.929][ref1] en [4.938][ref2] niet van toepassing op het opslaan van
      vloeistoffen van ADR-klasse 8, verpakkingsgroep II of III, zonder bijkomend gevaar als bedoeld in de ADR in een
      opslagtank die is geïnstalleerd voor 1 januari 2008.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.941b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: '4.942'
    text: |-
      Deze paragraaf is van toepassing op het in een tankcontainer of een verpakking die als opslagtank wordt gebruikt en
      een inhoud heeft van meer dan 250 l, opslaan van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.942.a
    text: gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.942.b
    text: vloeistoffen van ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.942.c
    text: vloeistoffen van ADR-klasse 8, verpakkingsgroep II of III;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.942.d
    text: vloeistoffen van ADR-klasse 9, die het aquatisch milieu verontreinigen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.942.e
    text: oliën of vetten die niet van ADR-klasse 3 zijn of pekel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.942
  - number: 4.943.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.942][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.943
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.95'
  - number: 4.943.2
    text: |-
      Een melding bevat een aanduiding van de stoffen die worden opgeslagen en de hoeveelheid die ten hoogste wordt
      opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.943
  - number: 4.943.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.943
  - number: 4.943.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.943
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.944'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.942][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.944
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.95'
  - number: 4.944.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.944
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.944.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.944
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.945'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem voldoet een tankcontainer die als opslagtank wordt
      gebruikt aan hoofdstuk 6.8 van de ADR en een verpakking die als opslagtank wordt gebruikt aan hoofdstuk 6.5 van
      de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.945
  - number: '4.946'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt een tankcontainer of verpakking zich boven of
      in een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.946
  - number: 4.947.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt het aansluitpunt van een vulleiding of
      leegzuigleiding van een tankcontainer of verpakking zich:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947
  - number: 4.947.1.a
    text: boven een vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947
  - number: 4.947.1.b
    text: |-
      boven of in een vulpuntmorsbak die een inhoud heeft van ten minste 5 l als die op de tankcontainer of verpakking is
      geplaatst of ten minste 65 l in andere gevallen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947
  - number: 4.947.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider, als in de tankcontainer of verpakking gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, oliën of vetten worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947
  - number: 4.947.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarde voor olie, bedoeld in
      [artikel 4.957][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.95'
  - number: 4.947a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.947, eerste lid, onder a][ref1], niet aangesloten op het vuilwaterriool,
      als in de tankcontainer of verpakking vloeistoffen worden opgeslagen van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.95'
  - number: 4.947a.a
    text: ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947a
  - number: 4.947a.b
    text: ADR-klasse 8, verpakkingsgroep II of III; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947a
  - number: 4.947a.c
    text: ADR-klasse 9, die het aquatisch milieu verontreinigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.947a
  - number: 4.948.1
    text: |-
      Met voorzieningen en maatregelen is gewaarborgd dat overvullen van een tankcontainer of verpakking niet mogelijk
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.948
  - number: 4.948.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als bij het vullen van een tankcontainer of verpakking vanuit een
      tankwagen gebruik wordt gemaakt van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.948
  - number: 4.948.2.a
    text: |-
      een vulpistool met een automatisch afslagmechanisme dat ervoor zorgt dat het vullen stopt als de tankcontainer of
      verpakking vol is of als het vulpistool valt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.948
  - number: 4.948.2.b
    text: |-
      een aangekoppelde slang met een vaste aansluiting en een automatisch afslagmechanisme dat ervoor zorgt dat het
      vullen stopt als de tankcontainer of verpakking vol is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.948
  - number: 4.948.3
    text: |-
      Aan het eerste lid wordt in ieder geval ook voldaan als de tankcontainer of verpakking een overvulbeveiliging heeft
      die is geïnstalleerd door een onderneming met een certificaat voor BRL SIKB 7800, verstrekt door een certificatie-
      instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.948
  - number: '4.949'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt voorkomen dat een tankcontainer of verpakking
      kan leegstromen bij een breuk in een leiding of het falen van de installatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.949
  - number: '4.950'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem is een leiding die is aangesloten op een
      tankcontainer of verpakking vast aangelegd en zichtbaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.950
  - number: '4.951'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem is in een aansluiting op een tankcontainer of
      verpakking zo dicht mogelijk bij de wand van de tankcontainer of verpakking een afsluiter geplaatst, die zo is
      uitgevoerd dat duidelijk zichtbaar is of de afsluiter is geopend of gesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.951
  - number: '4.955'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een tankcontainer of verpakking en de daarop
      aangesloten leidingen na verplaatsing visueel gecontroleerd op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.955.a
    text: morsingen en lekkages;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.955.b
    text: beschadigingen en vervormingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.955.c
    text: functioneren van de lekdetectie, als die aanwezig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.955.d
    text: functioneren van de anti-hevelbeveiliging, als die aanwezig is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.955.e
    text: functioneren van de kiep-kantelvoorziening, als die aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.955
  - number: 4.956.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van de vloeistofdichte
      bodemvoorziening die zich onder het aansluitpunt van een tankcontainer of verpakking bevindt waarin gasolie, diesel
      of huisbrandolie met een vlampunt van 55 °C of hoger of oliën of vetten, die geen vloeibare gevaarlijke stoffen van
      ADR-klasse 3 zijn, worden opgeslagen, geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.956
  - number: 4.956.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.956
  - number: '4.957'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957
  - number: 4.957.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957
  - number: 4.957.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957
  - number: 4.957a.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957a
  - number: 4.957a.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957a
  - number: 4.957a.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.957a
  - number: 4.958.1
    text: |-
      Deze paragraaf is van toepassing op het opslaan van vloeibare gevaarlijke stoffen van ADR-klasse 3 in een
      ondergrondse opslagtank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.958
  - number: 4.958.2
    text: |-
      Deze paragraaf is niet van toepassing op het opslaan van gasolie, diesel of huisbrandolie met een vlampunt van 55
      °C of hoger.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.958
  - number: 4.959.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.958][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.959.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
  - number: 4.959.2.a
    text: |-
      de coördinaten van het vulpunt van de ondergrondse opslagtank waarin vloeibare brandstoffen worden opgeslagen voor
      het tanken van vaartuigen of drijvende werktuigen vanaf de wal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
  - number: 4.959.2.b
    text: |-
      de coördinaten van het vulpunt van de ondergrondse opslagtank waarin organische oplosmiddelen van ADR-klasse 3
      worden opgeslagen en de opstelplaats van de tankwagens voor het vullen en legen van de opslagtank; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
  - number: 4.959.2.c
    text: een aanduiding van de stoffen die worden opgeslagen en de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
  - number: 4.959.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
  - number: 4.959.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.959
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.960.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in
      [artikel 4.966, eerste of tweede lid][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.960.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.960.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
  - number: 4.960.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
  - number: 4.960.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
  - number: 4.960.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.960
  - number: '4.961'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.958][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.961
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.961.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.961
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.961.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.961
