  - number: 6.56j.1.a
    text: het zich bevinden in dat beperkingengebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56j
  - number: 6.56j.1.b
    text: |-
      het aanwezig hebben van een object, anders dan voor het verrichten van een milieubelastende activiteit met
      betrekking tot een mijnbouwwerk als bedoeld in [artikel 3.320][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56j
    references:
