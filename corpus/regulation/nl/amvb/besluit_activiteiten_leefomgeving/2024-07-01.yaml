  - number: 4.834.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op de uitbreiding van een dierenverblijf of de vervanging van
      een dierenverblijf.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
  - number: 4.835.1
    text: |-
      Deze paragraaf is van toepassing op het opslaan van vaste mest, champost of dikke fractie met een totaal volume van
      meer dan 3 m3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.835
  - number: 4.835.2
    text: |-
      Deze paragraaf is niet van toepassing op het opslaan van vaste mest, champost of dikke fractie korter dan twee
      weken op één plek.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.835
  - number: 4.836.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.835][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.836
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.83'
  - number: 4.836.2
    text: Een melding bevat het totaal volume van de opslagcapaciteit in kubieke meters bij een opslag van meer dan 600 m3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.836
  - number: 4.836.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.836
  - number: 4.836.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.836
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.837'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.835][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.837
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.83'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.838.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt vaste mest, champost of dikke fractie, met
      uitzondering van gedroogde pluimveemest, opgeslagen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.1.a
    text: op een aaneengesloten bodemvoorziening, waarbij de vloeistoffen die vrijkomen worden opgevangen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.1.b
    text: |-
      op een voldoende dikke absorberende laag als de opslag op een locatie niet meer dan zes maanden duurt en tegen
      inregenen is beschermd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.2
    text: 'Gedroogde pluimveemest wordt opgeslagen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.2.a
    text: |-
      in een gebouw waar de pluimveemest wordt beschermd tegen weersinvloeden en met een aaneengesloten bodemvoorziening
      en voldoende ventilatie om condensvorming te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.2.b
    text: in een afgedekte container als de pluimveemest ten minste elke twee weken wordt afgevoerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.838.2.c
    text: |-
      op een voldoende dikke absorberende laag als de opslag op een locatie niet meer dan zes maanden duurt en tegen
      inregenen is beschermd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.838
  - number: 4.839.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater worden vrijkomende vloeistoffen afkomstig van het opslaan van
      vaste mest, champost of dikke fractie gelijkmatig verspreid over landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.839
  - number: 4.839.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden of
      geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.839
  - number: '4.840'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.840
  - number: 4.840.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.840
  - number: 4.840.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.840
  - number: 4.840.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.840
  - number: '4.841'
    text: Deze paragraaf is van toepassing op het opslaan van kuilvoer of vaste bijvoedermiddelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.841
  - number: 4.842.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.841][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.842
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.84'
  - number: 4.842.2
    text: |-
      Het is verboden het afvalwater afkomstig van de activiteit, bedoeld in [artikel 4.841][ref1], te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.842
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.84'
  - number: 4.842.3
    text: De melding, bedoeld in het tweede lid, bevat de locaties van de lozingspunten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.842
  - number: 4.842.4
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.842
  - number: 4.842.5
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.842
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.843'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.841][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.843
    references:
