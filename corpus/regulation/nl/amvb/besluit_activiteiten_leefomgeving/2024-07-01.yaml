  - number: '4.463'
    text: |-
      In afwijking van [tabel 4.462][ref1] is het reductiepercentage voor bestaande oplosmiddeleninstallaties bij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
