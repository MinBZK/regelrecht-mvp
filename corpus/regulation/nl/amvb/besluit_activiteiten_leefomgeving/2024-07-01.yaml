    text: |-
      Voor het afvalwater, bedoeld in [artikel 7.61f][ref1], dat wordt geloosd op een oppervlaktewaterlichaam, zijn de
      emissiegrenswaarden de waarden, bedoeld in tabel 7.61g, gemeten in een steekmonster.
