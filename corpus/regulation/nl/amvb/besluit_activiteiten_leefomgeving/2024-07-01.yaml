      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.74.1
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee een emissiegrenswaarde voor koolmonoxide als bedoeld in
      [artikel 4.73, eerste lid][ref1], wordt verhoogd, bevat een emissiegrenswaarde voor koolmonoxide van niet meer dan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.74
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.74.1.a
    text: 50 mg/Nm3 in een daggemiddelde, naast het tienminutengemiddelde; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.74
  - number: 4.74.1.b
    text: 100 mg/Nm3 in een uurgemiddelde als de wervelbedtechnologie wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.74
  - number: 4.74.2
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee een halfuur- of daggemiddelde emissiegrenswaarde voor
      stikstofoxiden als bedoeld in [artikel 4.73, eerste lid][ref1], wordt verhoogd, bevat een halfuur- en daggemiddelde
      emissiegrenswaarde voor stikstofoxiden van niet meer dan 150 mg/Nm3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.74
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.74.3
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee een halfuur- of daggemiddelde emissiegrenswaarde voor ammoniak als
      bedoeld in [artikel 4.73, eerste lid][ref1], wordt verhoogd, bevat een halfuur- en daggemiddelde emissiegrenswaarde
      voor ammoniak van niet meer dan 10 mg/Nm3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
