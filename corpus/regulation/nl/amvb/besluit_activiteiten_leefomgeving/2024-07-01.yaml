        artikel: '8'
      - id: ref10
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref11
        bwb_id: BWBR0041278
        afdeling: '8.3'
  - number: 6.7.5.c
    text: |-
      als het gaat om een mijnbouwlocatieactiviteit: [artikel 8.5 van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 6.7.5.d
    text: |-
      als het gaat om een wateronttrekkingsactiviteit: de [artikelen 8.84][ref1] en
      [8.89 van het Besluit kwaliteit leefomgeving][ref2] en [afdeling 8.3 van het Omgevingsbesluit][ref3]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Afdeling8.3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.7
    references:
      - id: ref1
