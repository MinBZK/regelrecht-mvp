    text: elektrisch;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.2°
    text: elektrisch in combinatie met benzine, diesel of waterstof;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.3°
    text: LPG;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.4°
    text: CNG;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.5°
    text: LNG;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.6°
    text: benzine;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.7°
    text: biobrandstof; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.c.8°
    text: diesel; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.d
    text: het aantal kilometers dat de onderneming of rechtspersoon de werknemers heeft laten reizen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.2
    text: |-
      In de gegevens, bedoeld in het eerste lid, aanhef en onder b tot en met d, wordt onderscheid gemaakt tussen woon-
      werkmobiliteit en zakelijke mobiliteit. Ten behoeve van het verstrekken van die gegevens worden persoonsgegevens
      verwerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.3
    text: |-
      Als het gaat om woon-werkmobiliteit kan, in afwijking van het eerste lid, aanhef en onder d, bij gebruik van
      meer dan een reismodaliteit worden volstaan met het verzamelen en verstrekken van gegevens over de reismodaliteit
      waarmee de werknemer de meeste reizigerskilometers heeft afgelegd, waarbij de reizigerskilometers die de werknemer
      als gevolg van andere reismodaliteiten heeft afgelegd, bij de eerstbedoelde reizigerskilometers worden opgeteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.4
    text: |-
      De gegevens worden verstrekt met gebruikmaking van een elektronische voorziening die door Onze Minister van
      Infrastructuur en Waterstaat beschikbaar wordt gesteld. De gegevens gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.5
    text: |-
      Het eerste lid, aanhef en onder b tot en met d, is niet van toepassing als in het kalenderjaar, bedoeld in
      het eerste lid, en het daaraan voorafgaande kalenderjaar de emissie in de lucht van kooldioxide door woon-
      werkmobiliteit en zakelijke mobiliteit in kalenderjaargemiddelde niet hoger is dan 3 g per reizigerskilometer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
    machine_readable:
      definitions:
        drempel_co2_g_per_km: 3
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: co2_emissie_huidig_jaar_g_per_km
            type: number
            required: true
            description: >-
              Emissie van kooldioxide in
              kalenderjaargemiddelde in het huidige
              kalenderjaar in g per
              reizigerskilometer
            source: {}
          - name: co2_emissie_vorig_jaar_g_per_km
            type: number
            required: true
            description: >-
              Emissie van kooldioxide in
              kalenderjaargemiddelde in het
              voorafgaande kalenderjaar in g per
              reizigerskilometer
            source: {}
        output:
          - name: huidig_jaar_onder_drempel
            type: boolean
            description: Of de CO2-emissie in het huidige jaar niet hoger is dan 3 g per reizigerskilometer
          - name: vorig_jaar_onder_drempel
            type: boolean
            description: Of de CO2-emissie in het vorige jaar niet hoger is dan 3 g per reizigerskilometer
          - name: uitzondering_van_toepassing
            type: boolean
            description: Of de uitzondering op de rapportageplicht van toepassing is
        actions:
          - output: huidig_jaar_onder_drempel
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $co2_emissie_huidig_jaar_g_per_km
              value: $drempel_co2_g_per_km
          - output: vorig_jaar_onder_drempel
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $co2_emissie_vorig_jaar_g_per_km
              value: $drempel_co2_g_per_km
          - output: uitzondering_van_toepassing
            value:
              operation: AND
              conditions:
                - $huidig_jaar_onder_drempel
                - $vorig_jaar_onder_drempel
