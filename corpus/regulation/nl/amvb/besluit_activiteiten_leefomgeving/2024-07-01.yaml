        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: '11.16'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt niet, als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.16.a
    text: |-
      het verrichten van de activiteit op grond van een andere wet is toegestaan en toepassing is gegeven aan artikel 6,
      derde lid, of in voorkomend geval artikel 6, vierde lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.16
  - number: 11.16.b
    text: |-
      de activiteit onderwerp is van het gemeenschappelijk visserijbeleid, bedoeld in artikel 38 van het Verdrag
      betreffende de werking van de Europese Unie, en plaatsvindt in de exclusieve economische zone.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.16
  - number: 11.18.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt niet voor een Natura 2000-activiteit in
      gevallen aangewezen in een programma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.18.2
    text: 'Het programma:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.18.2.a
    text: |-
      heeft geheel of ook betrekking op de inrichting, het beheer of het gebruik van een Natura 2000-gebied en bevat
      maatregelen om de instandhoudingsdoelstellingen voor dat gebied te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.18.2.b
    text: 'heeft tot doel, ook met het oog op een evenwichtige en duurzame economische ontwikkeling:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.18.2.b.1°
    text: |-
      de belasting van natuurwaarden van Natura 2000-gebieden door bepaalde schadelijke factoren te verminderen en de
      instandhoudingsdoelstellingen te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.18.2.b.2°
    text: |-
      het beheer, de bescherming, het behoud of het herstel van de van nature in Nederland in het wild voorkomende
      soorten dieren of planten of de in Nederland voorkomende natuurlijke habitats of habitats van soorten of het
      verbeteren van de staat van instandhouding van die soorten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.18.2.c
    text: |-
      wordt vastgesteld door of gezamenlijk met het bestuursorgaan dat, als geen toepassing wordt gegeven aan het eerste
      lid, bevoegd is te beslissen op aanvragen om omgevingsvergunningen voor de betrokken Natura 2000-activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.18
  - number: 11.19.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt niet voor een Natura 2000-activiteit in
      gevallen aangewezen in een omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.19.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt in gevallen aangewezen in een
      omgevingsverordening niet voor zover het gaat om gevolgen die samenhangen met een bij de omgevingsverordening
      bepaalde factor die een daarbij bepaalde drempel niet overschrijdt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.20.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt niet voor een Natura 2000-activiteit van
      nationaal belang als bedoeld in [artikel 4.12 van het Omgevingsbesluit][ref2] of als dat in het algemeen belang
      geboden is, in gevallen aangewezen bij ministeriële regeling.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.20.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, aanhef en onder e, van de wet][ref1], om zonder
      omgevingsvergunning een Natura 2000-activiteit te verrichten, geldt voor een Natura 2000-activiteit van nationaal
      belang als bedoeld in [artikel 4.12 van het Omgevingsbesluit][ref2] of als dat in het algemeen belang geboden is,
      in gevallen aangewezen bij ministeriële regeling niet voor zover het gaat om gevolgen die samenhangen met een bij
      de ministeriële regeling bepaalde factor die een daarbij bepaalde drempel niet overschrijdt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.20
    references:
