  - number: 4.505.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in [artikel 4.507][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: 4.505.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.505.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
  - number: 4.505.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
  - number: 4.505.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
  - number: 4.505.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.505
  - number: '4.506'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 4.518 tot en met 4.521][ref1] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.506
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: '4.507'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.502][ref1], met uitzondering van het tanken van gasolie, diesel of huisbrandolie met een vlampunt van
      55 °C of hoger, voldaan aan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.507
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: 4.507.a
    text: PGS 28 als vanuit een ondergrondse opslagtank wordt getankt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.507
  - number: 4.507.b
    text: PGS 30 als vanuit een bovengrondse opslagtank wordt getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.507
  - number: 4.508.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen en ureum wordt getankt
      boven een vloeistofdichte bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.508
  - number: 4.508.2
    text: De tankzuil en het vulpistool bevinden zich ook boven een vloeistofdichte bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.508
  - number: 4.508.3
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.508
  - number: '4.509'
    text: |-
      Een vloeistofdichte bodemvoorziening en het vloeistofdichte deel van het vuilwaterriool worden aangelegd door een
      onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7700.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.509
  - number: '4.510'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen kan in afwijking van
      [artikel 4.508][ref1] worden getankt boven een geomembraanbaksysteem, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.510
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: 4.510.a
    text: het tankstation binnen de bebouwde kom ligt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.510
  - number: 4.510.b
    text: de tankzuilen in een rij parallel aan de naastgelegen weg staan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.510
  - number: 4.510.c
    text: alleen aan de wegzijde of aan de openbare weg wordt getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.510
  - number: 4.511.1
    text: |-
      Een geomembraanbaksysteem wordt voorafgaand aan het verrichten van de activiteit, bedoeld in [artikel 4.502][ref1],
      en vervolgens ten minste eenmaal per zes jaar beoordeeld en goedgekeurd door een inspectie-instantie met een
      erkenning bodemkwaliteit voor AS SIKB 6700.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.511
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: 4.511.2
    text: |-
      Als een geomembraanbaksysteem wordt gerepareerd, wordt het gerepareerde deel opnieuw beoordeeld en goedgekeurd
      volgens het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.511
  - number: 4.512.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen en ureum wordt bij het
      tanken met een elektrische pomp gebruik gemaakt van een vulpistool of een slang die is aangekoppeld via een vaste
      aansluiting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.512
  - number: 4.512.2
    text: 'Het vulpistool heeft een automatisch afslagmechanisme dat afslaat als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.512
  - number: 4.512.2.a
    text: de brandstoftank vol is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.512
  - number: 4.512.2.b
    text: het vulpistool valt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.512
  - number: 4.512.3
    text: |-
      De slang die is aangekoppeld via een vaste aansluiting heeft een automatisch afslagmechanisme dat afslaat als de
      brandstoftank vol is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.512
  - number: 4.513.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen wordt door of onder direct
      toezicht van personeel getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.513
  - number: 4.513.2
    text: |-
      Er kan in afwezigheid van personeel met een vulpistool worden getankt, als er een noodstopvoorziening aanwezig is
      die voor iedereen zichtbaar en bereikbaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.513
  - number: 4.514.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van een vloeistofdichte
      bodemvoorziening bij het tanken van vloeibare brandstoffen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.514
  - number: 4.514.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.514
  - number: '4.515'
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater wordt het afvalwater
      dat wordt geloosd in een vuilwaterriool voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.515
  - number: 4.515.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.515
  - number: 4.515.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.515
  - number: '4.517'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.517
  - number: 4.517.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.517
  - number: 4.517.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.517
  - number: 4.517.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.517
  - number: 4.518.1
    text: |-
      Met het oog op het verminderen van de hoeveelheid benzinedamp die in de atmosfeer wordt uitgestoten wordt via een
      fase II-benzinedampterugwinningssysteem getankt, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.518
  - number: 4.518.1.a
    text: |-
      de jaarlijkse hoeveelheid benzine die uit mobiele benzinetanks aan een benzinestation wordt geleverd meer dan
      500 m3/jaar is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.518
  - number: 4.518.1.b
    text: |-
      de jaarlijkse hoeveelheid benzine die uit mobiele benzinetanks aan een benzinestation wordt geleverd meer dan
      100 m3/jaar is en de tankzuil ligt onder gebouwen met een woonfunctie of een kantoorfunctie als bedoeld in
      [bijlage I bij het Besluit bouwwerken leefomgeving][ref1] die permanent in gebruik zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.518
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 4.518.2
    text: |-
      Het eerste lid is niet van toepassing op tankstations die alleen worden gebruikt in verband met het maken en
      afleveren van nieuwe motorvoertuigen voor het wegverkeer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.518
  - number: 4.518.3
    text: |-
      Bij het tankstation wordt duidelijk kenbaar gemaakt dat een fase II-benzinedampterugwinningssysteem is
      geïnstalleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.518
  - number: 4.519.1
    text: |-
      Met het oog op het verminderen van de hoeveelheid benzinedamp die in de atmosfeer wordt uitgestoten heeft een fase
      II-benzinedampterugwinningssysteem:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.1.a
    text: een afvangrendement van benzinedamp van 85%;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.1.b
    text: een damp/benzineverhouding van ten minste 0,95 en niet meer dan 1,05; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.1.c
    text: |-
      een keurmerk waaruit blijkt dat het is goedgekeurd door een inspectie-instantie met een accreditatie volgens NEN-
      EN-ISO/IEC 17020 voor NEN-EN 16321-1 en NEN-EN-16321-2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.2
    text: |-
      De damp/benzineverhouding is de verhouding tussen het volume van benzinedamp bij atmosferische druk die door een
      fase II-benzinedampterugwinningssysteem loopt en het volume van de geleverde benzine.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.3
    text: |-
      Het fase II-benzinedampterugwinningssysteem wordt ten minste eenmaal per jaar door een onafhankelijke inspectie-
      instantie gecontroleerd volgens NEN-EN 16321-2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.4
    text: |-
      Als een automatisch bewakingssysteem is geïnstalleerd, wordt, in afwijking van het derde lid, ten minste eenmaal
      per drie jaar gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.5
    text: 'Een automatisch bewakingssysteem is in staat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.5.a
    text: |-
      storingen van het automatisch bewakingssysteem en in het functioneren van het fase II-
      benzinedampterugwinningssysteem op te sporen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.5.b
    text: deze storingen te melden aan degene die de activiteit verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.5.c
    text: de toevoer van benzine naar de tankzuil automatisch te stoppen als de storing niet binnen zeven dagen is verholpen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: 4.519.6
    text: |-
      Onder het afvangrendement, bedoeld in het eerste lid, onder a, wordt verstaan: de hoeveelheid benzinedamp die door
      het fase II-benzinedampterugwinningssysteem is afgevangen, vergeleken met de hoeveelheid benzinedamp die in de
      atmosfeer zou zijn uitgestoten zonder een dergelijk systeem, uitgedrukt als percentage.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.519
  - number: '4.520'
    text: |-
      [Artikel 4.518, eerste lid][ref1], is niet van toepassing tot het moment waarop de infrastructuur van een
      tankstation sterk wordt gewijzigd of vernieuwd, voor een tankstation:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.520
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.40'
  - number: 4.520.a
    text: dat is opgericht voor 1 januari 2012;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.520
  - number: 4.520.b
    text: |-
      waar de jaarlijkse hoeveelheid benzine die uit mobiele benzinetanks aan het benzinestation wordt geleverd ten
      hoogste 3.000 m3/jaar is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.520
  - number: 4.520.c
    text: waar motorvoertuigen voor het wegverkeer met benzine worden getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.520
  - number: '4.521'
    text: |-
      Tot het moment waarop de infrastructuur van een tankstation sterk wordt gewijzigd of vernieuwd wordt eenmaal per
      drie jaar gecontroleerd volgens testprocedure NEN-EN 16321-2 voor een tankstation:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.521
  - number: 4.521.a
    text: dat is opgericht voor 1 januari 2012; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.521
  - number: 4.521.b
    text: |-
      waar de jaarlijkse hoeveelheid benzine die uit mobiele benzinetanks aan het benzinestation wordt geleverd ten
      hoogste 3.000 m3/jaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.521
  - number: '4.522'
    text: Deze paragraaf is van toepassing op het opslaan van vloeibare brandstoffen in een bunkerstation.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.522
  - number: 4.523.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.522][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.523
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.41'
  - number: 4.523.2
    text: |-
      Een melding bevat de coördinaten van het vulpunt van een bunkerstation en de zijden van een bunkerstation waarin
      brandstoffen van ADR-klasse 3, met uitzondering van gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of
      hoger, worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.523
  - number: 4.523.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.523
  - number: 4.523.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.523
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.524.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het vulpunt van een bunkerstation en de zijden
      van een bunkerstation waarin brandstoffen van ADR-klasse 3, met uitzondering van gasolie, diesel of huisbrandolie
      met een vlampunt van 55 °C of hoger, worden opgeslagen tot de begrenzing van de locatie waarop de activiteit,
      bedoeld in [hoofdstuk 3][ref1], wordt verricht ten minste 20 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.524.2
    text: |-
      Als een bunkerstation waarin alleen gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger wordt
      opgeslagen, ligt aan een doorgaande vaarroute, is de afstand vanaf de zijde van dat bunkerstation, die aan die
      vaarroute grenst, tot de begrenzing van de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1], wordt
      verricht ten minste 20 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.524.3
    text: |-
      De afstand geldt tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan
      of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, als inachtneming van de
      afstand, bedoeld in het eerste of tweede lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.3.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.4
    text: 'Het derde lid is niet van toepassing op kwetsbare gebouwen en kwetsbare locaties:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
  - number: 4.524.4.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.524
    references:
