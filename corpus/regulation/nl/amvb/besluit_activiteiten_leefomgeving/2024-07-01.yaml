        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref8
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref9
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref10
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref11
        bwb_id: BWBR0041278
        afdeling: '8.3'
  - number: '2.14'
    text: |-
      Een maatwerkregel waarmee wordt afgeweken van een bepaling over een melding uit [hoofdstuk 4][ref1] kan alleen
      inhouden een aanvullend verbod om zonder voorafgaande melding aan het bevoegd gezag een activiteit te verrichten en
      kan worden gesteld vanwege:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 2.14.a
    text: |-
      uitoefening van taken op het gebied van het beheer van watersystemen en het waterketenbeheer, bedoeld in
      [artikel 2.16, eerste lid, onder a, van de wet][ref1], en een evenwichtige toedeling van functies aan locaties als
      bedoeld in [artikel 4.2, eerste lid, van de wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 2.14.b
    text: |-
      uitoefening van taken op het gebied van het beheer van watersystemen en het waterketenbeheer, bedoeld in
      [artikel 2.17, eerste lid, onder a, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 2.14.c
    text: |-
      uitoefening van taken op het gebied van het voorkomen of beperken van geluidhinder, het beschermen
      van de kwaliteit van het grondwater, het beheer van watersystemen en het zwemwaterbeheer, bedoeld in
      [artikel 2.18, eerste lid, onder b, c en d, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 2.15.1
    text: |-
      In afwijking van de bepalingen in [hoofdstuk 3][ref1] waarin vergunningplichtige gevallen van milieubelastende
      activiteiten, lozingsactiviteiten op een oppervlaktewaterlichaam of lozingsactiviteiten op een zuiveringtechnisch
      werk worden aangewezen, kan een aanvullend verbod worden gesteld om een activiteit zonder omgevingsvergunning te
      verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.15.2
    text: 'Het aanvullende verbod kan worden opgenomen in:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.15
  - number: 2.15.2.a
    text: |-
      het omgevingsplan, vanwege uitoefening van taken op het gebied van het beheer van watersystemen en het
      waterketenbeheer, bedoeld in [artikel 2.16, eerste lid, onder a, van de wet][ref1], en een evenwichtige toedeling
      van functies aan locaties als bedoeld in [artikel 4.2, eerste lid, van de wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 2.15.2.b
    text: |-
      de waterschapsverordening, vanwege uitoefening van taken op het gebied van het beheer van watersystemen en het
      waterketenbeheer, bedoeld in [artikel 2.17, eerste lid, onder a, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 2.15.2.c
    text: |-
      de omgevingsverordening, vanwege uitoefening van taken op het gebied van het voorkomen of beperken van
      geluidhinder, het beschermen van de kwaliteit van het grondwater, het beheer van watersystemen en het
      zwemwaterbeheer, bedoeld in [artikel 2.18, eerste lid, onder b, c en d, van de wet][ref1], of de zorg voor een
      gesloten stortplaats, bedoeld in [artikel 8.49 van de Wet milieubeheer][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '8'
  - number: '2.16'
    text: |-
      In afwijking van [artikel 2.15, eerste lid][ref1], kan in de omgevingsverordening worden bepaald dat geen
      omgevingsvergunning als bedoeld in [artikel 3.19, eerste lid][ref2], is vereist:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.6
        afdeling: '3.2'
  - number: 2.16.a
    text: met het oog op doelmatig gebruik van bodemenergie of doelmatig waterbeheer; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.16
  - number: 2.16.b
    text: als de hoeveelheid grondwater die wordt onttrokken niet meer is dan 10 m3/u.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.16
  - number: '2.17'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.17
  - number: 2.17.a
    text: |-
      de aanduiding van de activiteit, bedoeld in [hoofdstuk 4][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 2.17.b
    text: |-
      de naam en het adres van degene die de activiteit, bedoeld in [hoofdstuk 3][ref1], verricht;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.17.c
    text: |-
      het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit, bedoeld in
      [hoofdstuk 3][ref1], wordt verricht; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.17.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.17
  - number: '2.18'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], worden die
      ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.18.a
    text: |-
      de aanduiding van de activiteit, bedoeld in [hoofdstuk 3][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.18.b
    text: |-
      als het gaat om een activiteit als bedoeld in [hoofdstuk 4][ref1]: de aanduiding van die activiteit;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 2.18.c
    text: |-
      de naam en het adres van degene die de activiteit, bedoeld in [hoofdstuk 3][ref1], verricht;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.18.d
    text: |-
      het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit, bedoeld in
      [hoofdstuk 3][ref1], wordt verricht; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.18.e
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.18
  - number: 2.19.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 2.17][ref1] en [2.18][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.6'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.19.2
    text: |-
      Ten minste vier weken voordat de activiteit, bedoeld in [hoofdstuk 3][ref1], door een ander zal gaan worden
      verricht, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.20.1
    text: |-
      Op verzoek van het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], worden de gegevens en bescheiden verstrekt
      die nodig zijn om te bezien of de algemene regels en de maatwerkvoorschriften voor de activiteit toereikend zijn
      gezien de ontwikkelingen van de technische mogelijkheden tot het beschermen van het milieu en de ontwikkelingen met
      betrekking tot de kwaliteit van het milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.20.2
    text: |-
      Gegevens en bescheiden worden verstrekt voor zover degene die de activiteit verricht er redelijkerwijs de
      beschikking over kan krijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.20
  - number: '2.21'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt onverwijld geïnformeerd over een ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '2.22'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 2.22.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.22
  - number: 2.22.b
    text: informatie over de vrijgekomen stoffen en hun eigenschappen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.22
  - number: 2.22.c
    text: |-
      andere gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen
      inschatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.22
  - number: 2.22.d
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '2.23'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 2.21][ref1] en [2.22][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.7'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.7'
  - number: 3.1.1
    text: |-
      Het lozen van stoffen, water of warmte op een oppervlaktewaterlichaam afkomstig van een milieubelastende
      activiteit als bedoeld in dit hoofdstuk is een lozingsactiviteit op een oppervlaktewaterlichaam als bedoeld in
      [artikel 2.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.1.2
    text: |-
      Het lozen van stoffen, water of warmte op een zuiveringtechnisch werk afkomstig van een milieubelastende
      activiteit als bedoeld in dit hoofdstuk is een lozingsactiviteit op een zuiveringtechnisch werk als bedoeld in
      [artikel 2.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.2.1
    text: |-
      Als in [hoofdstuk 4][ref1] is bepaald dat het te lozen afvalwater wordt geloosd of kan worden geloosd in een
      vuilwaterriool, kan ook worden geloosd op een zuiveringtechnisch werk.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 3.2.2
    text: |-
      De bepalingen in [hoofdstuk 4][ref1] over afvalwater dat in een vuilwaterriool wordt geloosd of kan worden geloosd,
      zijn van overeenkomstige toepassing op het lozen op een zuiveringtechnisch werk.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: '3.3'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      lozingsactiviteit op een zuiveringtechnisch werk te verrichten, geldt voor het lozen van afvalwater afkomstig
      van een milieubelastende activiteit als bedoeld in dit hoofdstuk op een zuiveringtechnisch werk, voor zover
      voor die milieubelastende activiteit het verbod, bedoeld in artikel 5.1, tweede lid, van de wet, geldt om zonder
      omgevingsvergunning een milieubelastende activiteit te verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 3.3a.1
    text: |-
      Als milieubelastende activiteiten als bedoeld in [artikel 2.1][ref1] worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.3a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.3a.1.a
    text: 'het gebruiken van energie als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.3a
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: energiegebruik_kwh_per_jaar
            type: number
            required: true
            description: Het energiegebruik in elektriciteit in kWh per kalenderjaar
            source: {}
          - name: energiegebruik_m3_aardgasequivalenten_per_jaar
            type: number
            required: true
            description: Het energiegebruik in m3 aardgasequivalenten per kalenderjaar
            source: {}
          - name: op_locatie_met_gebouw
            type: boolean
            required: true
            description: Of het energiegebruik wordt verricht op dezelfde locatie als een gebouw of op het gebouwerf
            source: {}
          - name: is_woonfunctie
            type: boolean
            required: true
            description: Of het energiegebruik ten behoeve van een woonfunctie is
            source: {}
          - name: aangewezen_in_afdelingen_3_3_tot_3_11
            type: boolean
            required: true
            description: Of de activiteit is aangewezen in de afdelingen 3.3 tot en met 3.11
            source: {}
        output:
          - name: is_milieubelastende_activiteit_energiegebruik
            type: boolean
            description: Of het energiegebruik een aangewezen milieubelastende activiteit is
        actions:
          - output: is_milieubelastende_activiteit_energiegebruik
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_woonfunctie
                    value: true
                  then: false
                - when:
                    operation: EQUALS
                    subject: $aangewezen_in_afdelingen_3_3_tot_3_11
                    value: true
                  then: false
              default:
                operation: AND
                conditions:
                  - $op_locatie_met_gebouw
                  - operation: OR
                    conditions:
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $energiegebruik_kwh_per_jaar
                        value: 50000
                      - operation: GREATER_THAN_OR_EQUAL
