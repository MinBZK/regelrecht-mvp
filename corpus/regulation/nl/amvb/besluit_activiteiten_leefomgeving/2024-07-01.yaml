        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.103.1.a
    text: |-
      het exploiteren van een ippc-installatie voor het behandelen van het oppervlak van metalen of kunststoffen door een
      elektrolytisch of chemisch procedé, bedoeld in categorie 2.6 van bijlage I bij de richtlijn industriële emissies,
      als het oppervlak van metalen wordt behandeld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.1.b
    text: het verwerken van metalen door smeden met hamers, smelten, legeren, gieten, walsen, trekken of klinken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.1.c
    text: het op metaal aanbrengen van anorganische deklagen, conversielagen of deklagen van gesmolten metaal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.1.d
    text: het behandelen van het oppervlak van metalen door een elektrolytisch of chemisch procedé;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.1.e
    text: het harden en gloeien van metalen en het diffunderen van stoffen in het metaaloppervlak; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.1.f
    text: het maken van producten van metaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.2
    text: |-
      De aanwijzing omvat ook andere milieubelastende activiteiten die worden verricht op dezelfde locatie die de
      activiteiten, bedoeld in het eerste lid, functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.3
    text: |-
      Onder de aanwijzing vallen niet activiteiten, bedoeld in het eerste lid, als deze deel uitmaken van een activiteit
      als bedoeld in paragraaf 3.3.6.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.4
    text: |-
      Onder de aanwijzing vallen ook niet de activiteiten, bedoeld in het eerste lid, onder b tot en met f, als deze
      alleen worden verricht:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.4.a
    text: |-
      tijdens het verrichten van een bouwactiviteit of sloopactiviteit of het aanleggen, wijzigen of verwijderen van
      een weg;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.4.b
    text: bij een huishouden of bij het uitoefenen van beroep of bedrijf aan huis;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.4.c
    text: voor educatieve doelen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
  - number: 3.103.4.d
    text: |-
      tijdens het maken, onderhouden, repareren en behandelen van de scheepshuid van vaartuigen of drijvende werktuigen,
      bedoeld in [paragraaf 3.4.11][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
