  - number: 4.659.1
    text: |-
      Een eenmalige meting als bedoeld in [artikel 4.656][ref1] bestaat uit drie deelmetingen van ten minste vijftien
      minuten en ten hoogste een half uur. Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de
      meetmethode of de representatieve wijze van bemonsteren.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.659
    references:
      - id: ref1
