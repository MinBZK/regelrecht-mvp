        hoofdstuk: '4'
        paragraaf: '4.38'
  - number: '4.490'
    text: |-
      Gasvormige waterstof wordt getankt in een brandstofreservoir dat is bevestigd aan een voertuig of werktuig en dat
      is bedoeld voor de aandrijving daarvan en de berging van gasvormige waterstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.490
  - number: 4.491.1
    text: |-
      Deze paragraaf is van toepassing op het met een handpomp of een elektrische pomp tanken van voertuigen, vliegtuigen
      of werktuigen met vloeibare brandstoffen, als totaal niet meer dan 25 m3 vloeibare brandstoffen per jaar wordt
      getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.491
  - number: 4.491.2
    text: Als vloeibare brandstoffen worden getankt, is deze paragraaf ook van toepassing op het daarnaast tanken van ureum.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.491
  - number: 4.491.3
    text: Deze paragraaf is niet van toepassing op het tanken van drijvende werktuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.491
  - number: 4.492.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.491][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.492
