        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: '11.118'
    text: |-
      Een maatwerkregel wordt niet gesteld over een activiteit waarvoor Onze Minister voor Natuur en Stikstof een
      bevoegdheid als bedoeld in [artikel 11.114][ref1] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.118
    references:
