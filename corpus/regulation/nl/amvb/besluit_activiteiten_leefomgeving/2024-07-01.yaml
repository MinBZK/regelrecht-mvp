  - number: 4.29.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een stookinstallatie, met een totaal nominaal thermisch
      ingangsvermogen van 50 MW of meer, met uitzondering van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
    machine_readable:
      definitions:
        drempelwaarde_thermisch_vermogen_mw: 50
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: nominaal_thermisch_ingangsvermogen_mw
            type: number
            required: true
            description: Totaal nominaal thermisch ingangsvermogen van de stookinstallatie in MW
            source: {}
          - name: is_drooginstallatie_direct_contact
            type: boolean
            required: true
            description: Of het een stookinstallatie is voor drogen/behandelen door direct contact met verbrandingsgas
            source: {}
          - name: is_afgaszuivering_niet_autonoom
            type: boolean
            required: true
            description: >-
              Of het technische voorzieningen voor
              zuivering van afgassen betreft die niet
              als autonome stookinstallatie worden
              geexploiteerd
            source: {}
          - name: is_uitgezonderde_activiteit
            type: boolean
            required: true
            description: >-
              Of de activiteit valt onder een van de
              overige uitzonderingen (katalysatoren,
              zwavelwaterstof, reactoren, cokesovens,
              windverhitters, etc.)
            source: {}
        output:
          - name: paragraaf_4_3_van_toepassing
            type: boolean
            description: Of paragraaf 4.3 (grote stookinstallaties) van toepassing is
        actions:
          - output: paragraaf_4_3_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $nominaal_thermisch_ingangsvermogen_mw
                  value: $drempelwaarde_thermisch_vermogen_mw
                - operation: NOT
                  value: $is_drooginstallatie_direct_contact
                - operation: NOT
                  value: $is_afgaszuivering_niet_autonoom
                - operation: NOT
                  value: $is_uitgezonderde_activiteit
  - number: 4.29.1.a
    text: |-
      een stookinstallatie voor het drogen of behandelen van voorwerpen of materialen door direct contact met
      verbrandingsgas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.b
    text: |-
      technische voorzieningen voor de zuivering van afgassen door verbranding die niet als autonome stookinstallatie
      worden geëxploiteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.c
    text: het regenereren van katalysatoren voor het katalytisch kraakproces;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.d
    text: het omzetten van zwavelwaterstof in zwavel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.e
    text: reactoren die in de chemische industrie worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.f
    text: cokesovens;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.g
    text: windverhitters van hoogovens;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.h
    text: technische voorzieningen die bij de voortstuwing van een voertuig, schip of vliegtuig worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.i
    text: gasturbines en gasmotoren die op offshoreplatforms worden gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.1.j
    text: |-
      afvalverbrandingsinstallaties of afvalmeeverbrandingsinstallaties als bedoeld in [paragraaf 4.4][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.29.2
    text: |-
      Voor de toepassing van deze paragraaf worden twee of meer stookinstallaties met een nominaal thermisch
      ingangsvermogen van ten minste 15 MW als één stookinstallatie aangemerkt en worden de nominale thermische
      ingangsvermogens opgeteld als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.2.a
    text: de afgassen van die stookinstallaties via een schoorsteen worden afgevoerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.2.b
    text: de afgassen op technisch en economisch aanvaardbare wijze via een schoorsteen kunnen worden afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.3
    text: 'In deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.3.a
    text: |-
      *grote stookinstallatie:* stookinstallatie als bedoeld in het eerste lid, ongeacht het type brandstof dat wordt
      toegepast; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: 4.29.3.b
    text: |-
      *bestaande grote stookinstallatie:* grote stookinstallatie die op 30 oktober 1999, volgens de regelgeving die
      toen gold, in bedrijf was of waarvoor een vergunning was verleend en die uiterlijk op 30 oktober 2000 in bedrijf
      is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.29
  - number: '4.30'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.29][ref1], wordt voldaan aan de regels over het
      eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: '4.31'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de regels in deze paragraaf niet versoepeld, met uitzondering
      van de [artikelen 4.34][ref1], [4.36][ref2], [4.45][ref3], [4.55][ref4] en [4.57][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.31
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.32.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht zijn de emissiegrenswaarden in de
      [artikelen 4.34][ref1], [4.36][ref2], [4.38][ref3], [4.39][ref4] en [4.39a][ref5] van toepassing op de emissies
      in de lucht afkomstig van alle gemeenschappelijke schoorstenen in relatie tot het totale nominale thermische
      ingangsvermogen van de gehele grote stookinstallatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.3'
  - number: 4.32.2
    text: |-
      Bij een uitbreiding van een bestaande grote stookinstallatie zijn de emissiegrenswaarden voor grote
      stookinstallaties van toepassing op de emissies afkomstig van het uitgebreide gedeelte van de bestaande grote
      stookinstallatie waarop de wijziging betrekking heeft. De emissiegrenswaarden worden vastgesteld op grond van het
      totale nominale thermische ingangsvermogen van de gehele grote stookinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
  - number: 4.32.3
    text: |-
      Bij een wijziging van een bestaande grote stookinstallatie die gevolgen kan hebben voor het milieu en
      die betrekking heeft op een gedeelte van een bestaande grote stookinstallatie met een nominaal thermisch
      ingangsvermogen van 50 MW of meer, zijn de emissiegrenswaarden voor grote stookinstallaties van toepassing op de
      emissies afkomstig van het gedeelte van de bestaande grote stookinstallatie dat is gewijzigd in verhouding tot het
      totale nominale thermische ingangsvermogen van de gehele grote stookinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
  - number: 4.32.4
    text: 'Alle emissiegrenswaarden zijn betrokken op een volumegehalte aan zuurstof van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
    machine_readable:
      execution:
        produces:
          legal_character: INFORMATIEF
        input:
          - name: type_stookinstallatie
            type: string
            required: true
            description: 'Type grote stookinstallatie:
              vaste_brandstoffen,
              gasturbine_gasmotor, overig'
            source: {}
        output:
          - name: referentie_zuurstofgehalte_procent
            type: number
            description: Het referentie-volumegehalte aan zuurstof in procent waartegen emissiegrenswaarden worden betrokken
        actions:
          - output: referentie_zuurstofgehalte_procent
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $type_stookinstallatie
                    value: vaste_brandstoffen
                  then: 6
                - when:
                    operation: EQUALS
                    subject: $type_stookinstallatie
                    value: gasturbine_gasmotor
                  then: 15
              default: 3
  - number: 4.32.4.a
    text: 6% in afgas, als het gaat om een grote stookinstallatie voor vaste brandstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
  - number: 4.32.4.b
    text: 15% in afgas, als het gaat om een gasturbine of een gasmotor; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
  - number: 4.32.4.c
    text: 3% in afgas, als het gaat om een andere grote stookinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.32
  - number: '4.33'
    text: |-
      Met het oog op het beschermen van de gezondheid en het milieu worden afgassen op een gecontroleerde wijze afgevoerd
      door een schoorsteen waarvan de hoogte op berekeningen is gebaseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.33
  - number: '4.34'
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden voor zwaveldioxide de waarden, bedoeld in tabel 4.34,
      gemeten in een continue of periodieke meting.
          Tabel 4.34 Emissiegrenswaarden zwaveldioxide


                  *Type brandstof*


                  *Emissiegrenswaarde in mg/Nm3*


                  Vaste of vloeibare brandstoffen: vaste biomassa


                  60


                  Vloeibare brandstoffen: gasturbine of dieselmotor


                  60


                  Vaste of vloeibare brandstoffen: bestaande grote stookinstallatie, anders dan gasturbine of dieselmotor


                  150


                  Vaste of vloeibare brandstoffen: overig


                  80


                  Gasvormige brandstoffen: vloeibaar gemaakt gas


                  5


                  Gasvormige brandstoffen: cokesovengas of hoogovengas in gasmotor of gasturbine


                  60


                  Gasvormige brandstoffen: cokesovengas in andere stookinstallatie


                  220


                  Gasvormige brandstoffen: hoogovengas in andere stookinstallatie


                  150


                  Gasvormige brandstoffen: andere gasvormige brandstoffen


                  35
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.34
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_brandstof_so2
            type: string
            required: true
            description: >-
              Type brandstof:
              vaste_biomassa,
              vloeibaar_gasturbine_diesel,
              vast_vloeibaar_bestaand,
              vast_vloeibaar_overig, gas_lpg,
              gas_cokesoven_gasmotor_turbine,
              gas_cokesoven_ander,
              gas_hoogovengas_ander, gas_overig
            source: {}
          - name: gemeten_so2_concentratie
            type: number
            required: true
            description: Gemeten concentratie zwaveldioxide in mg/Nm3
            source: {}
        output:
          - name: emissiegrenswaarde_so2
            type: number
            description: Toepasselijke emissiegrenswaarde voor zwaveldioxide in mg/Nm3
          - name: voldoet_emissiegrenswaarde_so2
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor zwaveldioxide
        actions:
          - output: emissiegrenswaarde_so2
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: vaste_biomassa
                  then: 60
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: vloeibaar_gasturbine_diesel
                  then: 60
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: vast_vloeibaar_bestaand
                  then: 150
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: vast_vloeibaar_overig
                  then: 80
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: gas_lpg
                  then: 5
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: gas_cokesoven_gasmotor_turbine
                  then: 60
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: gas_cokesoven_ander
                  then: 220
                - when:
                    operation: EQUALS
                    subject: $type_brandstof_so2
                    value: gas_hoogovengas_ander
                  then: 150
              default: 35
          - output: voldoet_emissiegrenswaarde_so2
            value:
              operation: LESS_THAN_OR_EQUAL
