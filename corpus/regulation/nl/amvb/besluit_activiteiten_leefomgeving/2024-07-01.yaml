  - number: '4.564'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt graffiti verwijderd boven een aaneengesloten
      bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.564
  - number: '4.565'
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater wordt alleen het
      naspoelwater afkomstig van het verwijderen van graffiti geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.565
  - number: 4.566.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen naspoelwater afkomstig van het verwijderen
      van graffiti geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.566
  - number: 4.566.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.566
  - number: '4.567'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.567
  - number: 4.567.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.567
  - number: 4.567.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.567
  - number: 4.567.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.567
  - number: '4.568'
    text: Deze paragraaf is van toepassing op het exploiteren van een natte koeltoren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.568
  - number: 4.569.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.568][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.569
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.46'
  - number: 4.569.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.569
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.570.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt onderzoek verricht naar de risico’s van de natte koeltoren
      voor de omgeving door legionellabesmetting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2
    text: 'Bij het onderzoek worden in ieder geval betrokken:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a
    text: 'het risico op vermeerdering van legionellabacteriën in de koeltoren door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a.1°
    text: de aard en de kwaliteit van het water dat wordt gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a.2°
    text: de temperatuur van het water;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a.3°
    text: de verblijfstijd van het water;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a.4°
    text: de stilstand van het water; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.a.5°
    text: de aanwezigheid van biofilm en sediment;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.b
    text: de bedrijfsvoering van de natte koeltoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.c
    text: de effectiviteit van het waterbehandelingsprogramma voor legionellabacteriën en biofilmvorming; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.570.2.d
    text: de risico’s voor de omgeving, bepaald volgens de risicocategorie-indeling in tabel 4.570.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.570
  - number: 4.571.1
    text: 'Met het oog op het waarborgen van de veiligheid is een legionella-beheersplan opgesteld dat het volgende bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.a
    text: een tekening of schema met de actuele indeling van de natte koeltoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.b
    text: een beschrijving van de juiste en veilige werking van de natte koeltoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.c
    text: |-
      een beschrijving van controles die worden verricht aan de natte koeltoren en controles op de aanwezigheid van
      legionella;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.d
    text: |-
      een aanduiding van de waarden van de fysische, chemische en microbiologische parameters en de concentratie aan
      legionellabacteriën in de natte koeltoren bij het bereiken waarvan maatregelen ter verbetering worden getroffen en
      een beschrijving van die maatregelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.e
    text: een beschrijving van de maatregelen die worden getroffen bij calamiteiten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f
    text: 'een beschrijving van de maatregelen die zijn gericht op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f.1°
    text: het zoveel mogelijk beperken van het ontstaan en verspreiden van waternevel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f.2°
    text: het zoveel mogelijk vermijden dat water in leidingen, reservoirs en appendages stil staat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f.3°
    text: het schoonhouden van de natte koeltoren en het water dat zich daarin bevindt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f.4°
    text: |-
      het zoveel mogelijk beperken van de vermeerdering van legionellabacteriën door toepassing van
      waterbehandelingstechnieken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.1.f.5°
    text: het waarborgen volgens de processpecificaties van een juiste en veilige werking van de natte koeltoren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: 4.571.2
    text: Het legionella-beheersplan wordt uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.571
  - number: '4.572'
    text: 'Er wordt een logboek bijgehouden waarin gegevens worden vastgelegd over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.572
  - number: 4.572.a
    text: de onderhoudswerkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.572
  - number: 4.572.b
    text: de wijzigingen in de natte koeltoren of het onderhoud;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.572
  - number: 4.572.c
    text: de uitkomsten van controles die zijn verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.572
  - number: 4.572.d
    text: bijzonderheden over de werking van de natte koeltoren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.572
  - number: 4.573.1
    text: Deze paragraaf is van toepassing op het demonteren van autowrakken of wrakken van tweewielige motorvoertuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.573
  - number: 4.573.2
    text: |-
      Als autowrakken of wrakken van tweewielige motorvoertuigen worden gedemonteerd, is deze paragraaf ook van
      toepassing op het daarnaast opslaan van deze wrakken of gedemonteerde onderdelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.573
  - number: 4.574.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.573][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.574
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.574.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.574
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.575'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.573][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.575
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.575.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.575
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.575.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.575
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.576.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met motorolie, remolie, koelvloeistof, remvloeistof
      en vloeibare brandstoffen worden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.1.a
    text: |-
      autowrakken of wrakken van tweewielige motorvoertuigen voor demontage opgeslagen boven een aaneengesloten
      bodemvoorziening en een lekbak;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.1.b
    text: vloeistoffen afgetapt boven een aaneengesloten bodemvoorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.1.c
    text: onderdelen die vloeistof bevatten gedemonteerd boven een aaneengesloten bodemvoorziening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.1.d
    text: gedemonteerde onderdelen die vloeistof bevatten opgeslagen boven een aaneengesloten bodemvoorziening en een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.2
    text: |-
      Als wrakken bij ontvangst worden geïnspecteerd op lekkage en uit de inspectie blijkt dat er geen vloeibare
      bodembedreigende stoffen lekken, kunnen deze worden opgeslagen boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.3
    text: |-
      Als gedemonteerde onderdelen die vloeistof bevatten worden geïnspecteerd op lekkage en uit de inspectie blijkt
      dat er geen vloeibare bodembedreigende stoffen lekken, kunnen deze worden opgeslagen boven een aaneengesloten
      bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.576.4
    text: |-
      Als uit de gedemonteerde onderdelen bodembedreigende stoffen kunnen uitlogen, is de aaneengesloten bodemvoorziening
      tegen inregenen beschermd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.576
  - number: 4.577.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het demonteren van
      autowrakken of wrakken van tweewielige motorvoertuigen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.577
  - number: 4.577.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.577
  - number: '4.578'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.578
  - number: 4.578.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.578
  - number: 4.578.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.578
  - number: 4.579.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.579
  - number: 4.579.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.579
  - number: 4.579.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.579
  - number: '4.580'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.580
  - number: 4.580.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.580
  - number: 4.580.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.580
  - number: 4.580.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.580
  - number: '4.581'
    text: |-
      Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt bij het ontsteken van airbags en
      gordelspanners de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.581
  - number: 4.582.1
    text: |-
      Voor de emissie in de lucht bij het ontsteken van airbags en gordelspanners is de emissiegrenswaarde voor totaal
      stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.582
  - number: 4.582.2
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.582
  - number: 4.582.2.a
    text: de emissie van totaal stof niet meer is dan 100 kg/jaar; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.582
  - number: 4.582.2.b
    text: minder dan 5.000 autowrakken per jaar worden gedemonteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.582
  - number: 4.582.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de afgezogen emissies door een geschikte filtrerende afscheider
      worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.582
  - number: 4.583.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.583
  - number: 4.583.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.583
  - number: 4.584.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.584
  - number: 4.584.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.582, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.584
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.585.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.585
  - number: 4.585.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.585
  - number: 4.585.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.585
  - number: 4.585.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.583][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.585
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: '4.586'
    text: |-
      Met het oog op het beschermen van de gezondheid worden bij het ontsteken van airbags en gordelspanners emissies
      bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.586
  - number: 4.587.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden autowrakken en wrakken van tweewielige motorvoertuigen
      zo spoedig mogelijk, maar uiterlijk twee weken na ontvangst van de wrakken, ontdaan van de volgende stoffen en
      materialen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.a
    text: motorolie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.b
    text: transmissieolie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.c
    text: versnellingsbakolie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.d
    text: olie uit het differentieel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.e
    text: hydraulische olie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.f
    text: remvloeistoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.g
    text: koelvloeistoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.h
    text: ruitensproeiervloeistoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.i
    text: airconditioningsvloeistoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.j
    text: vloeibare brandstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.k
    text: tank voor tot vloeistof verdichte of gecomprimeerde gassen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.l
    text: bodembedreigende vloeistoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.m
    text: accu;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.n
    text: oliefilter;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.o
    text: condensatoren met PCB of PCT;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.p
    text: batterijen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.1.q
    text: |-
      ontplofbare onderdelen, als deze niet zijn geneutraliseerd, met uitzondering van elektrische airbags en
      gordelspanners.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.587.2
    text: |-
      Als dat nodig is voor het opnieuw als product gebruiken van gedemonteerde onderdelen, kan worden afgezien van het
      aftappen van de oliën uit de onderdelen, bedoeld in het eerste lid, en kan het oliefilter worden teruggeplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.587
  - number: 4.588.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden autowrakken ontdaan van de volgende stoffen en
      materialen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.1.a
    text: |-
      banden, glas en grote kunststofonderdelen, als deze materialen tijdens het shredderproces niet zo worden gescheiden
      dat ze kunnen worden gerecycled;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.1.b
    text: |-
      metalen onderdelen die koper, aluminium of magnesium bevatten, als deze metalen niet tijdens het shredderproces
      worden gescheiden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.1.c
    text: katalysatoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.1.d
    text: onderdelen waarvan is aangegeven dat deze lood, kwik, cadmium of zeswaardig chroom bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.1.e
    text: elektrische airbags en gordelspanners, als deze niet zijn geneutraliseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.2
    text: |-
      Een autowrak wordt niet zo geplet of mechanisch verkleind dat de identiteit of de inhoud daarvan niet meer
      herkenbaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.588.3
    text: |-
      Wrakken van tweewielige motorvoertuigen worden ontdaan van onderdelen waarvan is aangegeven dat deze lood,
      kwik, cadmium of zeswaardig chroom bevatten en van elektrische airbags en gordelspanners, als deze niet zijn
      geneutraliseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.588
  - number: 4.589.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden afgetapte of gedemonteerde stoffen en materialen als
      bedoeld in [artikel 4.587, eerste lid][ref1], afzonderlijk opgeslagen als dat nodig is voor het voorbereiden voor
      hergebruik, recycling of andere nuttige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.589
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.589.2
    text: |-
      Afgetapte of gedemonteerde stoffen en materialen als bedoeld in [artikel 4.588, eerste lid][ref1], worden zo
      opgeslagen dat de mogelijkheden voor het voorbereiden voor hergebruik, recycling of andere nuttige toepassing niet
      worden geschaad.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.589
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.589.3
    text: |-
      Stoffen en materialen die niet geschikt zijn voor het voorbereiden voor hergebruik, maar waarvoor wel een andere
      mogelijkheid van nuttige toepassing bestaat, worden gescheiden gehouden en gescheiden afgevoerd naar een locatie
      met een milieuhygiënisch verantwoorde en doelmatige verwerkingsmogelijkheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.589
  - number: 4.590.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden autowrakken of wrakken van tweewielige motorvoertuigen
      die nog niet zijn ontdaan van de stoffen en materialen, bedoeld in [artikel 4.587, eerste lid][ref1], niet
      gestapeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.590
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.590.2
    text: |-
      Autowrakken die zijn ontdaan van de stoffen en materialen, bedoeld in [artikel 4.587, eerste lid][ref1], maar nog
      niet van de stoffen en materialen, bedoeld in [artikel 4.588, eerste lid][ref2], worden niet meer dan twee hoog,
      met een hoogte van niet meer dan 4,5 m, gestapeld of worden zo in stellingen gestapeld dat deze gemakkelijk kunnen
      worden geïnspecteerd en gedemonteerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.590
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.591.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden autowrakken die zijn ontdaan van de stoffen en
      materialen, bedoeld in de [artikelen 4.587, eerste lid][ref1], en [4.588, eerste lid][ref2], rechtstreeks afgevoerd
      naar een locatie met een shredderinstallatie die de autowrakken scheidt in metaalschroot dat direct te recyclen is
      en shredderafvalstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.591
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.591.2
    text: |-
      Autowrakken die zijn ontdaan van de stoffen en materialen, bedoeld in de [artikelen 4.587, eerste lid][ref1], en
      [4.588, eerste lid][ref2], kunnen op een andere locatie worden opgeslagen, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.591
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.591.2.a
    text: |-
      op die locatie geen demontageactiviteiten of activiteiten met de autowrakken worden verricht die ertoe leiden dat
      de identiteit of de inhoud van de autowrakken niet meer herkenbaar is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.591
  - number: 4.591.2.b
    text: de autowrakken na opslag op de opslaglocatie naar een locatie als bedoeld in het eerste lid worden gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.591
  - number: 4.591.3
    text: |-
      Autowrakken die zijn ontdaan van de stoffen en materialen, bedoeld in [artikel 4.587, eerste lid][ref1], kunnen,
      voordat ze worden afgevoerd volgens het eerste lid, ter beschikking worden gesteld aan een instelling voor
      oefendoeleinden en opleidingsdoeleinden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.591
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.592.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt bij de ontvangst van een autowrak met een kenteken dat
      is verstrekt door een in een andere lidstaat van de Europese Unie daarvoor aangewezen instantie, op verzoek van
      degene die zich van dat autowrak ontdoet, een certificaat van vernietiging als bedoeld in artikel 5, derde lid, van
      de richtlijn autowrakken afgegeven. Hierin worden in ieder geval de volgende gegevens opgenomen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.a
    text: de naam, het adres en de handtekening van degene die het certificaat van vernietiging afgeeft;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.b
    text: de datum van afgifte van het certificaat van vernietiging;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.c
    text: het kenteken van het autowrak, met inbegrip van de kenletters van het land;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.d
    text: de categorie van voertuigen waartoe het autowrak behoort en het merk en het model van het autowrak;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.e
    text: het voertuigidentificatienummer van het autowrak; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.1.f
    text: de naam, het adres, de nationaliteit en de handtekening van de eigenaar of houder van het afgegeven autowrak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.2
    text: Bij het certificaat van vernietiging wordt het kentekenbewijs dat bij het autowrak hoort gevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: 4.592.3
    text: |-
      Als het kentekenbewijs dat bij het autowrak hoort niet aanwezig is, wordt dat op het certificaat van vernietiging
      aangegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.592
  - number: '4.593'
    text: |-
      Deze paragraaf is van toepassing op het opslaan van autowrakken na demontage op een andere locatie dan die waarop
      de wrakken zijn gedemonteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.593
  - number: 4.594.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.593][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.594
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.48'
  - number: 4.594.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.594
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.595.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden geen demontageactiviteiten of activiteiten met de
      autowrakken verricht die ertoe leiden dat de identiteit of de inhoud van de autowrakken niet meer herkenbaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.595
  - number: 4.595.2
    text: Er worden niet meer dan 50 autowrakken opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.595
  - number: 4.595.3
    text: |-
      Als de activiteit plaatsvindt aan een kade en de autowrakken via de kade worden vervoerd, worden niet meer dan 400
      autowrakken opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.595
  - number: 4.595.4
    text: |-
      De autowrakken worden na opslag op de opslaglocatie gebracht naar een locatie met een shredderinstallatie die de
      autowrakken scheidt in metaalschroot dat direct te recyclen is en shredderafvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.595
  - number: '4.596'
    text: 'Deze paragraaf is van toepassing op het in een zuiveringtechnisch werk:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.596
  - number: 4.596.a
    text: |-
      in de waterlijn ontvangen en behandelen van stedelijk afvalwater met een vervuilingswaarde van ten minste 2.000
      inwonerequivalenten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.596
  - number: 4.596.b
    text: indikken en mechanisch ontwateren van het vrijkomende slib.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.596
  - number: 4.597.1
    text: |-
      Het is verboden het afvalwater afkomstig van een activiteit als bedoeld in [artikel 4.596][ref1] te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.597.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.2.a
    text: de locaties van de lozingspunten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.2.b
    text: de ontwerpcapaciteit van het zuiveringtechnisch werk in inwonerequivalenten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.2.c
    text: het gemiddelde lozingsdebiet in kubieke meters per dag;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.2.d
    text: de maximale hydraulische aanvoer in kubieke meters per uur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.2.e
    text: |-
      de resultaten van de immissietoets voor fosforverbindingen en stikstofverbindingen, verricht volgens het Handboek
      Immissietoets.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
  - number: 4.597.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.597
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.598'
    text: |-
      Bij het verrichten van een activiteit als bedoeld in [artikel 4.596][ref1] wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.598
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.598.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.598
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.598.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.598
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.599.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de bodem bevindt het bovengrondse gedeelte van
      het zuiveringtechnisch werk, waar slib wordt ontwaterd en opgeslagen en waar leidingwerk met primair slib is, zich
      boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.599
  - number: 4.599.2
    text: |-
      Het ondergrondse gedeelte van het zuiveringtechnisch werk, waar slib wordt ontwaterd en opgeslagen en waar
      leidingwerk met primair slib is, en het gedeelte van de waterlijn vanaf het ontvangstwerk tot de selector of
      beluchtingstank zijn lekdicht uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.599
  - number: '4.600'
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de bodem met zware metalen, PAK’s en tolueen
      voldoen het ontwerpproces en het aanlegproces van bassins, tanks en leidingen in de waterlijn vanaf het
      ontvangstwerk tot de selector of de beluchtingstank aan:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.600
  - number: 4.600.a
    text: CUR/PBV-Aanbeveling 51, met uitzondering van de paragrafen 4.1, 5.1, 6.1.1 en 6.1.2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.600
  - number: 4.600.b
    text: CUR/PBV-Aanbeveling 65, met uitzondering van paragraaf 5.2.1.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.600
  - number: 4.601.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de bodem met zware metalen, PAK’s en tolueen
      wordt de lekdichtheid van de bedrijfsonderdelen van een zuiveringtechnisch werk gecontroleerd met geo-elektrische
      metingen met een meetfrequentie van eenmaal per zes jaar volgens AS SIKB 6700 door een inspectie-instantie met een
      erkenning bodemkwaliteit voor AS SIKB 6700.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.601
  - number: 4.601.2
    text: |-
      In plaats van door geo-elektrische metingen kan ook op lekdichtheid worden gecontroleerd met een
      grondwatermonitoringssysteem dat bestaat uit:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.601
  - number: 4.601.2.a
    text: een horizontaal monitoringssysteem, bij een zuiveringtechnisch werk aangelegd op of na 1 januari 2012; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.601
  - number: 4.601.2.b
    text: verticale peilbuizen, bij een zuiveringtechnisch werk aangelegd voor 1 januari 2012.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.601
  - number: 4.602.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de bodem liggen de horizontale en verticale
      peilbuizen van een grondwatersysteem niet meer dan 30 m van elkaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.602
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_peilbuizen_m
            type: number
            required: true
            description: De afstand in meters tussen de horizontale en verticale peilbuizen van het grondwatersysteem
            source: {}
        output:
          - name: voldoet_maximale_afstand_peilbuizen
            type: boolean
            description: Of de afstand tussen peilbuizen niet meer dan 30 m bedraagt
        actions:
          - output: voldoet_maximale_afstand_peilbuizen
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $afstand_peilbuizen_m
              value: 30
  - number: 4.602.2
    text: |-
      Als binnen een afstand van 60 m, gemeten van hart tot hart, meerdere bassins of tanks zijn geplaatst, wordt een
      extra horizontale of verticale peilbuis geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.602
  - number: 4.602.3
    text: |-
      Als bassins of tanks zijn geplaatst op meer dan 60 m van elkaar, gemeten van hart tot hart, wordt om de 30 m een
      horizontale of een verticale peilbuis geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.602
  - number: 4.602.4
    text: Een verticale peilbuis en de plaatsing van een verticale peilbuis voldoen aan NEN 5766.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.602
  - number: 4.602.5
    text: |-
      Horizontale peilbuizen en verticale peilbuizen worden benedenstrooms ten opzichte van de stroming van het
      grondwater geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.602
  - number: 4.603.1
    text: |-
      De achtergrondwaarden aan chemische zuurstofverbruik en ammoniumstikstof worden vastgesteld in het grondwater van
      een peilbuis die bovenstrooms is geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.2
    text: |-
      Eenmaal per kalenderjaar wordt een gefiltreerd monster, dat is genomen uit het horizontaal monitoringssysteem of
      uit de peilbuizen, geanalyseerd op CZV en N-NH4. Tussen opeenvolgende monsternames ligt ten minste elf maanden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.3
    text: |-
      Als de gemeten waarden meer dan 50% hoger zijn dan de achtergrondwaarden, wordt na uiterlijk twee maanden een nieuw
      grondwatermonster uit het monitoringssysteem en een grondwatermonster uit een bovenstrooms geplaatste peilbuis
      geanalyseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gemeten_waarde
            type: number
            required: true
            description: De gemeten waarde van CZV of N-NH4 in het grondwatermonster
            source: {}
          - name: achtergrondwaarde
            type: number
            required: true
            description: De vastgestelde achtergrondwaarde van CZV of N-NH4
            source: {}
        output:
          - name: herbemonstering_vereist
            type: boolean
            description: >-
              Of herbemonstering binnen twee maanden
              vereist is omdat gemeten waarden meer
              dan 50% hoger zijn dan
              achtergrondwaarden
        actions:
          - output: herbemonstering_vereist
            value:
              operation: GREATER_THAN
              subject: $gemeten_waarde
              value:
                operation: MULTIPLY
                values:
                  - $achtergrondwaarde
                  - 1.5
  - number: 4.603.4
    text: |-
      Als de gemeten waarden tijdens drie opeenvolgende waarnemingen gemiddeld meer dan 50% hoger zijn dan de
      achtergrondwaarden, wordt de meetfrequentie verhoogd naar twee monsters per jaar voor de peilbuis. Tussen
      opeenvolgende monsternames liggen ten minste vijf maanden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.5
    text: |-
      Als de gemeten waarden tijdens drie opeenvolgende waarnemingen gemiddeld meer dan 50% hoger zijn dan de
      achtergrondwaarden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.5.a
    text: worden de monsters die daarna worden genomen geanalyseerd op de stoffen, bedoeld in NEN 5740; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.5.b
    text: wordt een herstelplan opgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.6
    text: 'Er worden peilbuizen geplaatst en grondwatermonsters genomen door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.6.a
    text: een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.6.b
    text: een certificatie-instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: 4.603.7
    text: De grondwatermonsters worden geanalyseerd door een laboratorium met een erkenning bodemkwaliteit voor AS SIKB 3000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.603
  - number: '4.604'
    text: |-
      Ten minste eenmaal per twee kalenderjaren worden uiterlijk twee maanden na de laatste bemonsteringen de resultaten
      van de analyse, bedoeld in [artikel 4.603, tweede lid][ref1], verstrekt aan het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.604
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.605'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt geïnformeerd over meetwaarden die meer dan 50% hoger zijn
      dan de achtergrondwaarde, bedoeld in [artikel 4.603, vijfde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.605
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.606.1
    text: |-
      Met het oog op het beperken van verontreiniging van een oppervlaktewaterlichaam wordt een zuiveringtechnisch werk
      zo geëxploiteerd en onderhouden dat onder normale weersomstandigheden de doelmatige werking ervan is gewaarborgd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.606
  - number: 4.606.2
    text: |-
      Het lozingspunt is zo gekozen dat de nadelige gevolgen voor een oppervlaktewaterlichaam waarop wordt geloosd zo
      klein mogelijk zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.606
  - number: 4.607.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen gezuiverde afvalwater afkomstig van de
      behandeling van stedelijk afvalwater geloosd op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.607
  - number: 4.607.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd op een oppervlaktewaterlichaam of via die
      andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.607
  - number: 4.608.1
    text: 'Voor het afvalwater dat wordt geloosd op een oppervlaktewaterlichaam, zijn de emissiegrenswaarden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.608
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: bzv_mg_per_l
            type: number
            required: true
            description: Biochemisch zuurstofverbruik zonder nitrificatie in mg/l (etmaalmonster)
            source: {}
          - name: czv_mg_per_l
            type: number
            required: true
            description: Chemisch zuurstofverbruik in mg/l (etmaalmonster)
            source: {}
          - name: onopgeloste_stoffen_mg_per_l
            type: number
            required: true
            description: Onopgeloste stoffen in mg/l (etmaalmonster)
            source: {}
          - name: ontwerpcapaciteit_ie
            type: number
            required: true
            description: Ontwerpcapaciteit van het zuiveringtechnisch werk in inwonerequivalenten
            source: {}
          - name: fosfor_mg_per_l
            type: number
            required: false
            description: Som van fosforverbindingen in mg/l (jaargemiddelde, bij capaciteit >= 2000 ie)
            source: {}
          - name: stikstof_mg_per_l
            type: number
            required: false
            description: Som van stikstofverbindingen in mg/l (jaargemiddelde, bij capaciteit >= 2000 ie)
            source: {}
        output:
          - name: voldoet_emissiegrenswaarden_afvalwater
            type: boolean
            description: Of het geloosde afvalwater voldoet aan emissiegrenswaarden uit tabel 4.608a en 4.608b
        actions:
          - output: voldoet_emissiegrenswaarden_afvalwater
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $bzv_mg_per_l
                  value: 20
                - operation: LESS_THAN_OR_EQUAL
                  subject: $czv_mg_per_l
                  value: 125
                - operation: LESS_THAN_OR_EQUAL
                  subject: $onopgeloste_stoffen_mg_per_l
                  value: 30
                - operation: IF
                  cases:
                    - when:
                        operation: LESS_THAN
                        subject: $ontwerpcapaciteit_ie
                        value: 2000
                      then: true
                    - when:
                        operation: LESS_THAN
                        subject: $ontwerpcapaciteit_ie
                        value: 100000
                      then:
                        operation: AND
                        conditions:
                          - operation: LESS_THAN_OR_EQUAL
                            subject: $fosfor_mg_per_l
                            value: 2.0
                          - operation: IF
                            cases:
                              - when:
                                  operation: LESS_THAN
                                  subject: $ontwerpcapaciteit_ie
                                  value: 20000
                                then:
                                  operation: LESS_THAN_OR_EQUAL
                                  subject: $stikstof_mg_per_l
                                  value: 15
                            default:
                              operation: LESS_THAN_OR_EQUAL
                              subject: $stikstof_mg_per_l
                              value: 10
                  default:
                    operation: AND
                    conditions:
                      - operation: LESS_THAN_OR_EQUAL
                        subject: $fosfor_mg_per_l
                        value: 1.0
                      - operation: LESS_THAN_OR_EQUAL
                        subject: $stikstof_mg_per_l
                        value: 10
  - number: 4.608.1.a
    text: |-
      de waarden, bedoeld in de tweede kolom van tabel 4.608a, gemeten in een tijdproportioneel of volumeproportioneel
      etmaalmonster; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.608
  - number: 4.608.1.b
    text: |-
      afhankelijk van de ontwerpcapaciteit van het zuiveringtechnisch werk de waarden, bedoeld in tabel 4.608b, gemeten
      in een voortschrijdend jaargemiddelde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.608
  - number: 4.608.2
    text: |-
      Afhankelijk van het aantal monsters dat per jaar wordt genomen, zijn voor het aantal monsters, bedoeld in de
      tweede kolom van tabel 4.608c, de emissiegrenswaarden niet de waarden, bedoeld in de tweede kolom van tabel 4.608a,
      maar de waarden, bedoeld in de derde kolom van die tabel, gemeten in een tijdproportioneel of volumeproportioneel
      etmaalmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.608
  - number: 4.608.3
    text: |-
      Monsters met extreme concentraties die het gevolg zijn van ongebruikelijke situaties zoals zware regenval worden
      buiten beschouwing gelaten.
