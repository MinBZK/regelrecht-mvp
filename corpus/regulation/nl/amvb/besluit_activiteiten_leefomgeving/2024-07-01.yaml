    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1037.1
    text: |-
      Met het oog op het waarborgen van de veiligheid zijn tussen de deuropening van de bewaarplaats of
      bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik en de toegangsdeur, bedoeld in
      [artikel 4.1036, vierde of vijfde lid][ref1], bouwkundige voorzieningen aangebracht om brandoverslag te voorkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1037
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1037.2
    text: |-
      Het eerste lid is niet van toepassing als de toegangsdeur visueel kan worden waargenomen en als aan de afstanden,
      bedoeld in de [tabellen 4.1036a][ref1] en 4.1036b, wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1037
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1037.3
    text: |-
      De bouwkundige voorzieningen zijn gemaakt van metselwerk, beton of cellenbeton en hebben een brandwerendheid van
      ten minste 60 minuten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1037
  - number: 4.1037.4
    text: |-
      Als de toegangsdeuren van bewaarplaatsen of bufferbewaarplaatsen voor vuurwerk of pyrotechnische artikelen voor
      theatergebruik of ruimten voor verkoop aan particulieren naast elkaar zijn gelegen, worden die toegangsdeuren van
      elkaar gescheiden door een bouwkundige constructie die ten minste 300 mm uitsteekt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1037
  - number: 4.1038.1
    text: |-
      Met het oog op het waarborgen van de veiligheid hebben een bewaarplaats en een bufferbewaarplaats voor vuurwerk van
      categorie F4:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.a
    text: geen vloeren en wanden met scheuren of kieren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.b
    text: |-
      wanden die glad zijn afgewerkt zonder horizontale lijsten of randen en vloeren die zijn afgewerkt met een deklaag
      die weinig aan slijtage onderhevig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.c
    text: bij de ingang een aardingsmogelijkheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.d
    text: |-
      een beveiliging tegen blikseminslag met een bliksemafleidingsinstallatie volgens NEN-EN-IEC 62305, delen 1 tot en
      met 4, die eenmaal per jaar wordt gecontroleerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.e
    text: |-
      een leiding voor het aarden van werktuigen, die is verbonden aan een aardelektrode volgens NEN-EN-IEC 62305, delen
      1 tot en met 4, die niet wordt toegepast voor de bliksemafleidingsinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.f
    text: |-
      op de gevel een stralingsbelasting als gevolg van een brand buiten de bewaarplaats of bufferbewaarplaats van ten
      hoogste 15 kW/m2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.1.g
    text: |-
      een vonkvrije vloer met een weerstand van ten hoogste 10.000.000 Ohm als het gaat om een bewaarplaats en 1.000.000
      Ohm als het gaat om een bufferbewaarplaats.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.2
    text: De weerstand van een vloer wordt ten minste eenmaal per zes maanden gemeten door een onafhankelijke deskundige.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3
    text: 'Een bewaarplaats en een bufferbewaarplaats als bedoeld in het eerste lid:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.a
    text: hebben ventilatieopeningen die zijn afgeschermd met vlamkerende roosters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.b
    text: hebben ventilatieopeningen waarvan de totale oppervlakte niet minder is dan 0,5% van de vloeroppervlakte;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: oppervlakte_ventilatieopeningen_m2
            type: number
            required: true
            description: Totale oppervlakte van ventilatieopeningen in m2
            source: {}
          - name: vloeroppervlakte_m2
            type: number
            required: true
            description: Vloeroppervlakte van de bewaarplaats in m2
            source: {}
        output:
          - name: voldoet_ventilatie_vuurwerkopslag
            type: boolean
            description: Of de ventilatieopeningen ten minste 0,5% van de vloeroppervlakte beslaan
        actions:
          - output: voldoet_ventilatie_vuurwerkopslag
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $oppervlakte_ventilatieopeningen_m2
              value:
                operation: MULTIPLY
                values:
                  - $vloeroppervlakte_m2
                  - 0.005
  - number: 4.1038.3.c
    text: 'hebben ventilatie-installaties en afzuiginstallaties:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.c.1°
    text: waarin geen stoffen kunnen ophopen met gevaar voor brand of explosie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.c.2°
    text: waarvan de weerstand, gemeten tussen elk deel van die installaties en de aardleiding, niet meer is dan 1 Ohm; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.c.3°
    text: die eenmaal per jaar worden gecontroleerd door een onafhankelijke deskundige;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.d
    text: 'hebben een elektrische installatie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.d.1°
    text: met een permanent karakter en vaste leidingen die buiten handbereik zijn geplaatst en tegen stoten zijn beschermd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.d.2°
    text: waarvan een bovengrondse leiding ligt op een afstand van ten minste 15 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.d.3°
    text: |-
      met schakelinrichtingen, verdeelinrichtingen en contactdozen die zich buiten de bewaarplaats en bufferbewaarplaats
      bevinden op een schakelbord met een hoofdschakelaar waarmee de gehele installatie kan worden uitgeschakeld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.d.4°
    text: |-
      die is verdeeld in groepen die kunnen worden ingeschakeld en uitgeschakeld met behulp van groepschakelaars op het
      schakelbord; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
  - number: 4.1038.3.e
    text: |-
      hebben een centrale verwarming die gebruik maakt van water onder lage druk en een warmtebron die is gelegen op ten
      minste 15 m van de bewaarplaats of bufferbewaarplaats, of een elektrische verwarming met afgesloten radiatoren die
      een oppervlaktetemperatuur hebben van ten hoogste 100 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1038
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: oppervlaktetemperatuur_celsius
            type: number
            required: true
            description: Oppervlaktetemperatuur van de elektrische radiatoren in graden Celsius
            source: {}
        output:
          - name: voldoet_max_oppervlaktetemperatuur
            type: boolean
            description: Of de oppervlaktetemperatuur van radiatoren ten hoogste 100 graden Celsius is
        actions:
          - output: voldoet_max_oppervlaktetemperatuur
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $oppervlaktetemperatuur_celsius
              value: 100
  - number: 4.1039.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden in een bewaarplaats en een bufferbewaarplaats voor vuurwerk
      van categorie F4:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.a
    text: |-
      alleen elektrische ontstekingsmiddelen opgeslagen die zijn verpakt in een omhulsel waardoor elektromagnetische
      straling niet tot de inhoud kan doordringen, tenzij de ruimte afdoende is beschermd tegen elektromagnetische
      straling;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.b
    text: |-
      elektrische ontstekingsmiddelen kortgesloten en verpakt in metaal en niet blootgesteld aan hogere elektrische
      veldsterkten of aan grotere vermogensdichtheden dan die waarin zij zijn beproefd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.c
    text: werktafels gebruikt met een geaarde dekplaat van geleidend vonkvrij materiaal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.d
    text: |-
      werktuigen die tijdens het gebruik statische elektriciteit kunnen opwekken, geaard, waarbij de weerstand tussen elk
      deel en de aardleiding niet meer is dan 1 Ohm;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.e
    text: |-
      werktuigen gebruikt die, waar nodig, afschermplaten of kappen hebben, waarvan de plaatdikte is afgestemd op de
      mogelijk optredende hittewerking, drukwerking of scherfwerking; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.1.f
    text: |-
      automatische werktuigen voor het bewerken van gevulde pyrotechnische artikelen gebruikt met een schakelaar die het
      werktuig stopt als die wordt losgelaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.2
    text: Werktuigen worden voor elke bewerking en ten minste eenmaal per maand gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.3
    text: |-
      Wanneer aan een werktuig een gebrek is geconstateerd of wordt vermoed, wordt dit onmiddellijk verwijderd of voor
      gebruik geblokkeerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.4
    text: |-
      Een werktuig wordt gerepareerd in een ruimte waarin zich geen vuurwerk of pyrotechnische artikelen voor
      theatergebruik bevinden en wordt voor reparatie schoongemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
  - number: 4.1039.5
    text: |-
      Een ruimte wordt ontruimd als binnen 15 m daarvan werkzaamheden worden verricht waarbij open vuur wordt gebruikt of
      vonkvorming kan optreden. Die afstand is 25 m als bij de werkzaamheden een explosief gasmengsel kan ontstaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1039
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_tot_werkzaamheden_m
            type: number
            required: true
            description: Afstand in meters tot werkzaamheden met open vuur of vonkvorming
            source: {}
          - name: explosief_gasmengsel_mogelijk
            type: boolean
            required: true
            description: Of bij de werkzaamheden een explosief gasmengsel kan ontstaan
            source: {}
        output:
          - name: ontruiming_vereist
            type: boolean
            description: Of de ruimte ontruimd moet worden vanwege nabije werkzaamheden
        actions:
          - output: ontruiming_vereist
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $explosief_gasmengsel_mogelijk
                    value: true
                  then:
                    operation: LESS_THAN
                    subject: $afstand_tot_werkzaamheden_m
                    value: 25
              default:
                operation: LESS_THAN
                subject: $afstand_tot_werkzaamheden_m
                value: 15
  - number: 4.1040.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden op een locatie voor het opslaan, herverpakken of bewerken
      van vuurwerk van categorie F4:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.a
    text: binnen 15 m van een bewaarplaats geen verbrandingsmotoren gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.b
    text: |-
      transportmiddelen gebruikt met rubberbanden, die worden aangedreven door handkracht of elektriciteit en die
      periodiek worden gecontroleerd op gebreken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.c
    text: 'rolbanen, hijsapparatuur en transportkettingen gebruikt die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.c.1°
    text: zijn geaard;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.c.2°
    text: een schakelaar hebben om de werking te stoppen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.c.3°
    text: middelen hebben om te voorkomen dat er vuurwerk of pyrotechnische artikelen voor theatergebruik af vallen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.1.c.4°
    text: regelmatig worden gecontroleerd op gebreken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.2
    text: 'Mechanische transportmiddelen hebben:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.2.a
    text: |-
      gegevens over het gewicht van het transportmiddel, het vermogen dat ten hoogste kan worden geladen, het vermogen
      dat ten hoogste kan worden geheven, de snelheid die ten hoogste kan worden gereden, de kleinste draaicirkel,
      de vrije hefhoogte, de telescoop-hefhoogte, de voorwaartse en achterwaartse helling van de vork en het
      bedieningsvoorschrift, die voor de bestuurder vanaf de zitplaats zichtbaar zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.2.b
    text: |-
      een draagbaar blustoestel, met een inhoud van ten minste 6 kg ABC-bluspoeder, dat onmiddellijk bereikbaar is voor
      de bestuurder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3
    text: 'Mechanische transportmiddelen die in een bufferbewaarplaats worden gebruikt, hebben:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.a
    text: |-
      een hoofdschakelaar met een afneembare bedieningssleutel die alleen kan worden uitgenomen als die hoofdschakelaar
      op uit staat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.b
    text: |-
      bekabeling die is beschermd tegen beschadiging en waarbij voor alle doorvoeringen en invoeringen wartels zijn
      gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.c
    text: lampen die met een metalen rooster zijn beschermd tegen mechanische beschadigingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.d
    text: |-
      hoofdschakelaars, contactsloten, bedieningsschakelaars en smeltveiligheden, die verhoogd zijn beveiligd en drukvast
      zijn uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.e
    text: smeltveiligheden in een aparte kast waarvan de patronen alleen in spanningsloze toestand kunnen worden vervangen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.f
    text: |-
      stofdichte motoren die tegen overbelasting zijn beveiligd en een drukvast huis of omhulsel hebben en worden
      geventileerd door kokers met een labyrinth-afdichting;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.g
    text: een voorziening voor het afvoeren van statische elektriciteit zonder vonkvorming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.h
    text: aandrijving met elektriciteit, verkregen uit accumulatoren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1040.3.i
    text: |-
      batterijen die in een stevige, drukvaste, gesloten maar niet luchtdichte kast zijn opgesteld op een plaats met een
      zeer kleine kans op een mechanische beschadiging, waarbij de deksel van de kast die is gevuld met kooldioxide of
      samengeperste lucht aan de kant van de aansluitklemmen bestaat uit een niet-geleidend materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1040
  - number: 4.1041.1
    text: |-
      Met het oog op het waarborgen van de veiligheid liggen een bewaarplaats en een bufferbewaarplaats voor vuurwerk of
      pyrotechnische artikelen voor theatergebruik op de begane grond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.2
    text: |-
      De locatie waarop de activiteit, bedoeld in [artikel 4.1029][ref1], wordt verricht, heeft brandslanghaspels,
      waarbij de gecorrigeerde loopafstand, bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref2],
      tussen een brandslanghaspel en elk punt op de vloer van de locatie niet groter is dan de lengte van de brandslang,
      vermeerderd met 5 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
      - id: ref2
        bwb_id: BWBR0041297
  - number: 4.1041.3
    text: |-
      Een brandslanghaspel heeft een lengte van ten hoogste 30 m, een statische druk van ten minste 100 kPa en een
      capaciteit van ten minste 1,3 m3/u, bij gelijktijdig gebruik van twee brandslanghaspels die zijn aangesloten op
      dezelfde voorziening voor leidingwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.4
    text: |-
      Een brandslanghaspel is voor onmiddellijk gebruik beschikbaar, kan onbelemmerd worden bereikt en wordt ten minste
      eenmaal per jaar gecontroleerd door een ter zake deskundige.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.5
    text: 'In een bewaarplaats en een bufferbewaarplaats voor vuurwerk van categorie F4:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.5.a
    text: is een draagbaar blustoestel met een inhoud van ten minste 12 kg ABC-bluspoeder aanwezig;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.5.b
    text: bevat het ABC-bluspoeder ten minste 40% ammoniumfosfaat; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
  - number: 4.1041.5.c
    text: |-
      is de loopafstand, bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref1], vanaf elk punt in de
      ruimte tot een blustoestel ten hoogste 20 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1041
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 4.1042.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand die in voorwaartse richting wordt gemeten als
      aangegeven in figuur 4.1042, vanaf het midden van de deuropening van een bewaarplaats en een bufferbewaarplaats
      voor vuurwerk op een locatie voor het opslaan van ten hoogste 10.000 kg vuurwerk van categorie F1, F2 of F3:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, ten minste 8 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1042.1.b
    text: |-
      tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die op grond
      van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten,
      ten minste de afstand, bedoeld onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      niet de activiteit, bedoeld in [artikel 4.1029][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1042.2
    text: |-
      Het eerste lid, aanhef en onder b, is van overeenkomstige toepassing als inachtneming van de afstand, bedoeld in
      het eerste lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.2.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.3
    text: |-
      Het eerste lid, aanhef en onder b, en tweede lid zijn niet van toepassing op beperkt kwetsbare en kwetsbare
      gebouwen en beperkt kwetsbare en kwetsbare locaties die een functionele binding hebben met de activiteit, bedoeld
      in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1042.4
    text: |-
      Het eerste en tweede lid zijn, buiten het vrijwaringsgebied dat wordt begrensd door de afstand, bedoeld in het
      eerste lid, en de breedte van de bewaarplaats of bufferbewaarplaats voor vuurwerk en dat is aangegeven in figuur
      4.1042, niet van toepassing als een scheidingsconstructie die voldoet aan [artikel 4.1044][ref1] aanwezig is tussen
      de bewaarplaats of bufferbewaarplaats voor vuurwerk en:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1042.4.a
    text: de begrenzing van de locatie waarop de activiteit wordt verricht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.4.b
    text: beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
  - number: 4.1042.5
    text: |-
      [Artikel 5.22 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand,
      bedoeld in het eerste lid, aanhef en onder b, en tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1042
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1043'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.1042, tweede lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1043
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.1044'
    text: |-
      De scheidingsconstructie, bedoeld in [artikel 4.1042, vierde lid][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1044
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1044.a
    text: heeft een brandwerendheid van ten minste 60 minuten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1044
  - number: 4.1044.b
    text: heeft geen opening, raam of deur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1044
  - number: 4.1044.c
    text: is gemaakt van metselwerk, beton of cellenbeton.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1044
  - number: 4.1045.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden in een bewaarplaats en een bufferbewaarplaats voor
      vuurwerk of pyrotechnische artikelen voor theatergebruik geen andere goederen opgeslagen en worden daarin geen
      werkzaamheden verricht die niet rechtstreeks samenhangen met het opslaan van vuurwerk of pyrotechnische artikelen
      voor theatergebruik.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.2
    text: 'Het vuurwerk en de pyrotechnische artikelen voor theatergebruik zijn:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.2.a
    text: |-
      met inbegrip van het verpakkingsmateriaal opgeslagen op een afstand van ten minste 30 cm van apparatuur,
      installaties en leidingen die warmte kunnen ontwikkelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.2.b
    text: onbelemmerd bereikbaar, waarbij er in de ruimte een gangpad van ten minste 75 cm breed is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.2.c
    text: zo gestapeld dat het verpakkingsmateriaal zijn functie en beschermende werking behoudt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.2.d
    text: |-
      opgeslagen volgens het uitgangspuntendocument voor brandbeveiligingsinstallaties, bedoeld in
      [artikel 4.1047, derde lid, onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1045.3
    text: |-
      Boven een bewaarplaats of bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik
      bevinden zich geen beperkt kwetsbare, kwetsbare of zeer kwetsbare gebouwen. Dit geldt niet als op de locatie ten
      hoogste 10.000 kg vuurwerk van categorie F1, F2 of F3 en geen pyrotechnische artikelen voor theatergebruik worden
      opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.4
    text: |-
      Vuurwerk wordt niet gelost op een moment dat binnen een afstand van 25 m een opslagtank wordt gevuld met vloeibare
      gevaarlijke stoffen van ADR-klasse 3 of brandbare gassen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1045.5
    text: |-
      Rondom een bewaarplaats en een bufferbewaarplaats voor vuurwerk van categorie F4 is op een afstand van ten minste
      15 m een deugdelijke afrastering van metaalvlechtwerk met een hoogte van ten minste 2 m aanwezig. Binnen die
      afstand ligt geen transformatorgebouw of schakelgebouw. De toegang in de afrastering is afgesloten en wordt alleen
      geopend voor werkzaamheden of controles in de bewaarplaats of bufferbewaarplaats voor vuurwerk van categorie F4.
      Tussen die bewaarplaats en bufferbewaarplaats en de afrastering bevindt zich geen brandbaar materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1045
  - number: 4.1046.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is in een ruimte voor verkoop aan particulieren alleen vuurwerk
      aanwezig dat op grond van [artikel 2.1.1 van het Vuurwerkbesluit][ref1] is aangewezen als vuurwerk dat ter
      beschikking mag worden gesteld voor particulier gebruik.


      [ref1]: https://wetten.overheid.nl/BWBR0013360#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
    references:
      - id: ref1
        bwb_id: BWBR0013360
        artikel: '2'
  - number: 4.1046.2
    text: |-
      Tijdens de openingstijden is in een ruimte voor verkoop aan particulieren ten hoogste 500 kg vuurwerk aanwezig.
      Het vuurwerk is niet bereikbaar voor particulieren. Buiten de openingstijden is in een ruimte voor verkoop aan
      particulieren geen vuurwerk aanwezig, met uitzondering van ten hoogste 200 kg vuurwerk van categorie F1 of fop- en
      schertsvuurwerk als bedoeld in [artikel 1.1.1, eerste lid, van het Vuurwerkbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0013360#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
    references:
      - id: ref1
        bwb_id: BWBR0013360
        artikel: '1'
  - number: 4.1046.3
    text: In een brandcompartiment is ten hoogste een ruimte aanwezig voor verkoop aan particulieren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
  - number: 4.1046.4
    text: 'Een ruimte voor verkoop aan particulieren:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
  - number: 4.1046.4.a
    text: |-
      bevat geen licht ontvlambare stoffen, zeer licht ontvlambare stoffen of drukhouders, met uitzondering van
      brandblusmiddelen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
  - number: 4.1046.4.b
    text: |-
      ligt op een afstand van meer dan 5 m tot licht ontvlambare stoffen of zeer licht ontvlambare stoffen en
      drukhouders, met uitzondering van brandblusmiddelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
  - number: 4.1046.5
    text: |-
      Voor het bepalen van het gewicht wordt uitgegaan van het vuurwerk met omhulsel en verpakking en met de
      transportverpakking, bedoeld in de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1046
  - number: 4.1047.1
    text: |-
      Met het oog op het waarborgen van de veiligheid hebben een bewaarplaats en een bufferbewaarplaats voor vuurwerk
      of pyrotechnische artikelen voor theatergebruik en een ruimte voor verkoop aan particulieren een automatische
      sprinklerinstallatie. In de directe nabijheid van die plaatsen en ruimten is een brandmeldinstallatie aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.2
    text: |-
      Een automatische sprinklerinstallatie in een bewaarplaats en een bufferbewaarplaats voor vuurwerk van categorie F4
      heeft een automatische doormelding naar de centrale meldkamer van de brandweer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.3
    text: 'Een automatische sprinklerinstallatie en een brandmeldinstallatie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.3.a
    text: |-
      zijn ontworpen, aangelegd, opgeleverd en onderhouden volgens een uitgangspuntendocument voor
      brandbeveiligingsinstallaties, waarin alle bouwkundige, organisatorische en installatietechnische eisen voor de
      met sprinklers te beveiligen ruimten en locaties worden beschreven, dat voldoet aan Memorandum 60 van het Centrum
      voor Criminaliteitspreventie en Veiligheid en dat is beoordeeld en goedgekeurd door een inspectie-instantie
      met een accreditatie volgens NEN-EN-ISO/IEC 17020 als type A voor CCV-inspectieschema Uitgangspuntendocument
      Brandbeveiliging Vuurwerk van dat centrum; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.3.b
    text: |-
      wordt door een inspectie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17020 als type A voor CCV-
      inspectieschema Brandbeveiliging Vuurwerk van het Centrum voor Criminaliteitspreventie en Veiligheid eenmaal
      per jaar beoordeeld op functioneren en onderhoud volgens het goedgekeurde uitgangspuntendocument voor
      brandbeveiligingsinstallaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.4
    text: |-
      Het uitgangspuntendocument voor brandbeveiligingsinstallaties en de rapporten met bevindingen van de beoordelingen
      zijn op de locatie voor het opslaan van vuurwerk en pyrotechnische artikelen voor theatergebruik aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047.5
    text: |-
      Eenmaal per vijf jaar wordt het uitgangspuntendocument voor brandbeveiligingsinstallaties door een inspectie-
      instantie als bedoeld in het derde lid, onder a, beoordeeld op de gebruikte uitgangspunten en normen in relatie tot
      de beste beschikbare technieken en wijzigingen in de activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047
  - number: 4.1047a
    text: |-
      De [artikelen 4.1042, eerste lid, aanhef en onder a][ref1], en [4.1043][ref2] zijn niet van toepassing op het
      opslaan, herverpakken en bewerken van vuurwerk of pyrotechnische artikelen voor theatergebruik dat voor de
      inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1047a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: '4.1048'
    text: |-
      Deze paragraaf is van toepassing op het opslaan van ontplofbare stoffen van ADR-klasse 1 door een ander dan de
      Nederlandse of een bondgenootschappelijke krijgsmacht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1048
  - number: 4.1049.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1048][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
  - number: 4.1049.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
  - number: 4.1049.2.a
    text: |-
      de coördinaten van het brandcompartiment voor het opslaan van zwart kruit of rookzwak kruit en de opslagplaats voor
      het opslaan van meer dan 10.000 munitiepatronen of hagelpatronen voor vuurwapens; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
  - number: 4.1049.2.b
    text: het type ontplofbare stoffen en de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
  - number: 4.1049.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
  - number: 4.1049.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1049
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1050.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden zwart kruit en rookzwak kruit in een brandcompartiment
      opgeslagen in een vak waarvan de wanden bestaan uit ten minste 105 mm dik metselwerk en de horizontale verdeling
      uit ten minste 70 mm dik beton.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1050
  - number: 4.1050.2
    text: In een vak als bedoeld in het eerste lid is ten hoogste 250 g zwart kruit of 1 kg rookzwak kruit opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1050
  - number: 4.1050.3
    text: |-
      Tussen de voorzijde van een vak als bedoeld in het eerste lid en de voorzijde van daarin opgeslagen zwart kruit of
      rookzwak kruit is ten minste 10 cm vrije ruimte en aan de voorzijde van een vak is ten minste 1 m vrije ruimte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1050
  - number: 4.1050.4
    text: |-
      De toegang tot een brandcompartiment bestaat uit een zelfsluitende en naar buiten draaiende deur die als
      drukontlasting kan dienen en die een brandwerendheid heeft van ten minste 60 minuten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1050
  - number: 4.1050.5
    text: |-
      Noodsignalen van ADR-klasse 1.3 of 1.4 worden opgeslagen in een brandcompartiment of in een kast met een
      brandwerendheid van ten minste 60 minuten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1050
  - number: 4.1051.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het brandcompartiment voor het opslaan van
      zwart kruit of rookzwak kruit:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, ten minste 8 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1051.1.b
    text: |-
      tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die op grond
      van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten,
      ten minste de afstand, bedoeld onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      niet de activiteit, bedoeld in [artikel 4.1048][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
  - number: 4.1051.2
    text: |-
      De afstand vanaf de opslagplaats voor het opslaan van meer dan 10.000 munitiepatronen of hagelpatronen voor
      vuurwapens:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.2.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, is ten minste 8 m, tenzij de munitiepatronen of hagelpatronen voor vuurwapens in een
      brandcompartiment zijn opgeslagen; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1051.2.b
    text: |-
      tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die op grond
      van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, is
      ten minste de afstand, bedoeld onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      niet de activiteit, bedoeld in [artikel 4.1048][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
  - number: 4.1051.3
    text: |-
      Het eerste lid, aanhef en onder b, en het tweede lid, aanhef en onder b, zijn van overeenkomstige toepassing als
      inachtneming van de afstand, bedoeld in het eerste lid, aanhef en onder a, en tweede lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.3.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
  - number: 4.1051.4
    text: |-
      Het eerste lid, aanhef en onder b, tweede lid, aanhef en onder b, en derde lid zijn niet van toepassing op beperkt
      kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die een functionele binding hebben met
      de activiteit, bedoeld in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1051.5
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, aanhef en onder b, tweede lid, aanhef en onder b, en derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1051
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1052'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.1051, derde lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1052
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1052a
    text: |-
      De [artikelen 4.1051, eerste lid, aanhef en onder a, en tweede lid, aanhef en onder a][ref1], en [4.1052][ref2]
      zijn niet van toepassing op het opslaan van ontplofbare stoffen van ADR-klasse 1 door een ander dan de Nederlandse
      of een bondgenootschappelijke krijgsmacht dat voor de inwerkingtreding van dit besluit al rechtmatig werd
      verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de
      inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1052a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.103'
  - number: '4.1053'
    text: 'Deze paragraaf is van toepassing op het opslaan van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1053
  - number: 4.1053.a
    text: |-
      goederen, ingedeeld in de stuifklassen S1 tot en met S5 in [bijlage IV][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1053
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1053.b
    text: |-
      goederen, ingedeeld als lekkende goederen in [bijlage IVA][ref1], deel A;


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1053
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1053.c
    text: |-
      goederen, ingedeeld als uitlogende goederen in [bijlage IVA][ref1], deel B; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1053
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1053.d
    text: |-
      goederen, ingedeeld als vermestende goederen in [bijlage IVA][ref1], deel C.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1053
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1054.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1053][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1054
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1054.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1054
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1055'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1053][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1055
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1055.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1], tenzij het gaat om het opslaan van goederen, ingedeeld
      in [bijlage IVA][ref2], deel C; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1055
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0041330
  - number: 4.1055.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1055
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.1056'
    text: |-
      Met het oog op het beperken van de hoeveelheid afvalwater wordt het water dat eerder met de opgeslagen goederen in
      contact is geweest, gebruikt voor het bevochtigen van opgeslagen stuifgevoelige goederen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1056
  - number: 4.1058.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het opslaan van
      lekkende, uitlogende of vermestende goederen, ingedeeld in [bijlage IVA][ref1], deel A, B of C, geloosd in een
      vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1058
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1058.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1058
  - number: 4.1059.1
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, zijn de emissiegrenswaarden de waarden, bedoeld in
      tabel 4.1059, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1059
  - number: 4.1059.2
    text: |-
      Als uit de goederen, bedoeld in [artikel 4.1058][ref1], alleen olie kan lekken, kan, in afwijking van het
      eerste lid, het afvalwater afkomstig van die opslag voor vermenging met ander afvalwater worden geleid door een
      slibvangput en olieafscheider:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1059
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1059.2.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1059
  - number: 4.1059.2.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1059
  - number: 4.1061.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.3.a
    text: 'voor onopgeloste stoffen: NEN-EN 872;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.3.b
    text: 'voor olie: NEN-EN-ISO 9377-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.3.c
    text: |-
      voor arseen, chroom, koper, lood, nikkel en zink: NEN 6966 of NEN-EN-ISO 17294-2 of NEN-EN-ISO 11885, waarbij de
      elementen worden ontsloten volgens NEN-EN-ISO 15587-1 of NEN-EN-ISO 15587-2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: 4.1061.3.d
    text: 'voor polycyclische aromatische koolwaterstoffen: NEN-EN-ISO 17993.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1061
  - number: '4.1062'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1062
  - number: 4.1062.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1062
  - number: 4.1062.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1062
  - number: 4.1062.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1062
  - number: 4.1063.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met bodembedreigende stoffen worden lekkende
      goederen, ingedeeld in [bijlage IVA][ref1], deel A, boven een vloeistofdichte bodemvoorziening opgeslagen. Opslag
      boven een lekbak is ook toegestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1063
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1063.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1063
  - number: 4.1063.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarden, bedoeld in
      [artikel 4.1059][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1063
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1063.4
    text: |-
      Dit artikel is niet van toepassing op het opslaan van autowrakken of wrakken van tweewielige motorvoertuigen of
      gedemonteerde onderdelen daarvan, bedoeld in [artikel 4.576][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1063
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.1064.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met bodembedreigende stoffen worden uitlogende
      goederen, ingedeeld in [bijlage IVA][ref1], deel B, opgeslagen boven een:


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.1064.1.a
    text: vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
  - number: 4.1064.1.b
    text: aaneengesloten bodemvoorziening die tegen inregenen is beschermd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
  - number: 4.1064.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
  - number: 4.1064.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarden, bedoeld in
      [artikel 4.1059][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1064.4
    text: |-
      Dit artikel is niet van toepassing op het opslaan van autowrakken of wrakken van tweewielige motorvoertuigen of
      gedemonteerde onderdelen daarvan, bedoeld in [artikel 4.576][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.47'
  - number: 4.1064a
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met bodembedreigende stoffen worden vermestende
      goederen, ingedeeld in [bijlage IVA][ref1], deel C, opgeslagen boven een aaneengesloten bodemvoorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1064a
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '4.1065'
    text: |-
      Met het oog op het beperken van emissies in de lucht worden goederen, ingedeeld in de stuifklassen S1 tot en met
      S4, opgeslagen en gemengd in een gesloten ruimte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1065
  - number: '4.1066'
    text: 'Met het oog op het voorkomen van verontreiniging van de lucht vindt geen overslag plaats van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1066
  - number: 4.1066.a
    text: goederen, ingedeeld in de stuifklassen S1 en S2, bij een windsnelheid van meer dan 8 m/s;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1066
  - number: 4.1066.b
    text: goederen, ingedeeld in de stuifklasse S3, bij een windsnelheid van meer dan 14 m/s; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1066
  - number: 4.1066.c
    text: goederen, ingedeeld in de stuifklassen S4 en S5, bij een windsnelheid van meer dan 20 m/s.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1066
  - number: 4.1067.1
    text: |-
      Voor de emissie in de lucht bij het opslaan en mengen van goederen, ingedeeld in de stuifklassen S1 tot en met S4,
      in een gesloten ruimte is de emissiegrenswaarde voor totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1067
  - number: 4.1067.2
    text: |-
      Voor de emissie in de lucht bij pneumatisch transport uit een container, bulktransportwagen of ander
      transportmiddel van goederen, ingedeeld in de stuifklassen S1 en S2, is de emissiegrenswaarde voor totaal stof 10
      mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1067
  - number: 4.1067.3
    text: Het eerste en tweede lid zijn niet van toepassing als de emissie de ondergrens van 100 kg/jaar niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1067
  - number: 4.1068.1
    text: |-
      Aan [artikel 4.1067, eerste lid][ref1], wordt bij het opslaan en het mengen van goederen, ingedeeld in de
      stuifklassen S1 tot en met S4, in ieder geval voldaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1068.1.a
    text: de ruimte op onderdruk wordt gehouden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.1.b
    text: de lucht door een geschikte filtrerende afscheider wordt gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.2
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij het vullen van een opslagruimte met goederen, ingedeeld
      in de stuifklassen S1 en S2, in ieder geval voldaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1068.2.a
    text: het overstortpunt wordt afgezogen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.2.b
    text: de afgezogen lucht door een geschikte filtrerende afscheider wordt gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.3
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij continu mechanisch transport in ieder geval voldaan als
      goederen, ingedeeld in de stuifklassen S1 tot en met S4, worden getransporteerd:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1068.3.a
    text: 'in een gesloten systeem, waarbij de inlaatzijde en afwerpzijde:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.3.a.1°
    text: windreductieschermen of sproeiers hebben; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.3.a.2°
    text: continu worden afgezogen en het afgezogen stof wordt teruggevoerd in de productstroom; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1068.3.b
    text: in een open systeem met bevochtiging of afscherming tegen windinvloeden van de inlaatzijde en afwerpzijde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1068
  - number: 4.1069.1
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij het laden en lossen met storttrechters in ieder geval
      voldaan als de trechters afzuiging hebben.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1069.2
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij het laden en lossen met grijpers in ieder geval voldaan
      als wordt geladen en gelost met grijpers die van de bovenkant zijn afgesloten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1069.3
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij het laden en lossen van lichters in ieder geval voldaan
      als de lichterbelader een stortkoker heeft die reikt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1069.3.a
    text: tot op de bodem van het ruim; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
  - number: 4.1069.3.b
    text: tot op het materiaal dat al is gestort.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
  - number: 4.1069.4
    text: |-
      Aan [artikel 4.1067, eerste en tweede lid][ref1], wordt bij het laden en lossen met pneumatische elevatoren in
      ieder geval voldaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1069.4.a
    text: de weegbunkers en overstortpunten gesloten zijn uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
  - number: 4.1069.4.b
    text: het neergeslagen stof in de overstortpunten regelmatig wordt verwijderd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
  - number: 4.1069.4.c
    text: de stortschoen afzuiging heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1069
  - number: 4.1070.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1070
  - number: 4.1070.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1070
  - number: 4.1071.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1071
  - number: 4.1071.2
    text: |-
      Het eerste lid is niet van toepassing als bij het opslaan en mengen van goederen, ingedeeld in de stuifklassen S1
      tot en met S4, de maatregelen, bedoeld in de [artikelen 4.1068][ref1] en [4.1069][ref2], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1071
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1071.3
    text: |-
      Het eerste lid is niet van toepassing als bij pneumatisch transport van goederen, ingedeeld in de stuifklassen S1
      tot en met S4, de maatregelen, bedoeld in de [artikelen 4.1068][ref1] en [4.1069][ref2], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1071
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: 4.1072.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1072
  - number: 4.1072.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1072
  - number: 4.1072.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1072
  - number: 4.1072.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.1070][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1072
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
  - number: '4.1073'
    text: |-
      Met het oog op het beschermen van de gezondheid worden bij het opslaan en mengen van goederen, ingedeeld in de
      stuifklassen S1 tot en met S4, emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073
  - number: 4.1073a.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden goederen die afvalstoffen zijn niet langer dan drie
      jaar opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073a
  - number: 4.1073a.2
    text: |-
      In afwijking van het eerste lid worden vermestende goederen en de volgende afvalstoffen niet langer dan een jaar
      opgeslagen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073a
  - number: 4.1073a.2.a
    text: gewolmaniseerd hout;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073a
  - number: 4.1073a.2.b
    text: vliegas van verbranding van afvalstoffen in een roosteroven of wervelbedoven; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073a
  - number: 4.1073a.2.c
    text: filterkoek van ontgiften, neutraliseren en ontwateren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1073a
  - number: 4.1074.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een benzineterminal met een benzineopslagtank of een
      benzineoverslaginstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1074
  - number: 4.1074.2
    text: |-
      In deze paragraaf wordt onder benzine verstaan: benzine als bedoeld in artikel 2, onder a, van de richtlijn opslag
      en distributie benzine.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1074
  - number: 4.1075.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1074][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1075
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
  - number: 4.1075.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1075
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1076'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1074][ref1], wordt voldaan aan de regels over het
      eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1076
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: '4.1077'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de regels in deze paragraaf niet versoepeld, met uitzondering
      van [artikel 4.1082][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1077
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
  - number: 4.1078.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht met benzinedamp worden de buitenwand en het uitwendige
      dak van een bovengrondse benzineopslagtank geschilderd in een kleur waarvan de totale stralingshittereflectie ten
      minste 70% is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1078
  - number: 4.1078.2
    text: Er wordt geschilderd bij de periodieke onderhoudsbeurt van de bovengrondse benzineopslagtank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1078
  - number: 4.1078.3
    text: |-
      Het eerste en tweede lid zijn niet van toepassing als een benzineopslagtank is verbonden met een
      benzinedampterugwinningseenheid die voldoet aan de eisen voor een benzineoverslaginstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1078
  - number: 4.1079.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht met benzinedamp heeft een benzineopslagtank met een
      uitwendig drijvend dak een primaire afdichting die de ringvormige ruimte tussen de wand van de benzineopslagtank en
      de buitenste rand van het drijvende dak afdicht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1079
  - number: 4.1079.2
    text: Boven de primaire afsluiting is een secundaire afdichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1079
  - number: 4.1079.3
    text: |-
      Door de primaire en secundaire afdichtingen wordt in vergelijking met een soortgelijke benzineopslagtank met vast
      dak zonder dampbeheersingsvoorzieningen ten minste 95% van de damp vastgehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1079
  - number: 4.1080.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht met benzinedamp is een benzineopslagtank die onderdeel
      is van een benzineterminal:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1080
  - number: 4.1080.1.a
    text: |-
      een benzineopslagtank met een vast dak die volgens de eisen aan een benzineoverslaginstallatie met de
      benzinedampterugwinningseenheid is verbonden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1080
  - number: 4.1080.1.b
    text: |-
      een benzineopslagtank met een uitwendig of inwendig drijvend dak die een primaire en secundaire afdichting als
      bedoeld in [artikel 4.1079][ref1] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1080
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
  - number: 4.1080.2
    text: |-
      Het eerste lid is niet van toepassing als voorlopige dampopslag als bedoeld in [artikel 4.1081, vierde lid][ref1],
      is toegestaan op een benzineopslagtank met een vast dak van benzineterminals.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1080
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
  - number: 4.1081.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden bij een benzineoverslaginstallatie tijdens
      het vullen van een mobiele benzinetank, met uitzondering van het vullen van een tankwagen langs de bovenzijde,
      verplaatsingsdampen via een dampdichte leiding teruggevoerd naar een benzinedampterugwinningseenheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1081
  - number: 4.1081.2
    text: |-
      Als dampterugwinning onveilig of technisch niet mogelijk is door de hoeveelheden retourdamp, kan een
      benzinedampterugwinningseenheid worden vervangen door een dampverbrandingseenheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1081
  - number: 4.1081.3
    text: |-
      Als een mobiele benzinetank langs de bovenzijde wordt gevuld, wordt het uiteinde van de vularm onderin de mobiele
      benzinetank gehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1081
  - number: 4.1081.4
    text: |-
      Als op een benzineterminal het benzinedebiet minder is dan 25.000 ton/jaar, kan directe dampterugwinning op de
      benzineterminal worden vervangen door voorlopige dampopslag in een benzineopslagtank met een vast dak op een
      benzineterminal voor latere overbrenging naar en terugwinning op een andere benzineterminal, daaronder niet
      begrepen de overbrenging van damp van de ene naar de andere benzineopslagtank op een benzineterminal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1081
  - number: 4.1081.5
    text: |-
      Het benzinedebiet is de grootste totale jaarlijkse hoeveelheid benzine, gemeten in de drie voorafgaande jaren, die
      van een benzineopslagtank van een benzineterminal is overgeslagen in een mobiele benzinetank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1081
  - number: '4.1082'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht is bij een benzineoverslaginstallatie de gemiddelde
      concentratie dampen in de afvoer van een benzinedampterugwinningseenheid of een dampverbrandingseenheid,
      gecorrigeerd voor de verdunning tijdens de behandeling, lager dan 0,15 g/Nm3 voor een uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1082
  - number: '4.1083'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee de concentratie dampen, bedoeld in [artikel 4.1082][ref1], wordt
      verhoogd, bevat een concentratie die lager is dan 35 g/Nm3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1083
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.105'
  - number: '4.1084'
    text: De nauwkeurigheid van de meting bij de benzineoverslaginstallatie is ten minste 95% van de gemeten waarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1084
  - number: 4.1085.1
    text: |-
      Concentratiedampen bij een benzineoverslaginstallatie worden ten minste zeven uur achtereenvolgens met normaal
      debiet gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1085
  - number: 4.1085.2
    text: Er wordt continu of periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1085
  - number: 4.1085.3
    text: Een periodieke meting wordt ten minste vier keer per uur verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1085
  - number: '4.1086'
    text: |-
      Het totaal aan meetfouten als gevolg van de gebruikte apparatuur, het kalibratiegas en het toegepaste procedé bij
      een benzineoverslaginstallatie is niet meer dan 10% van de gemeten waarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1086
  - number: '4.1087'
    text: |-
      De apparatuur die wordt gebruikt bij het meten bij een benzineoverslaginstallatie kan concentraties meten die lager
      zijn dan 3 g/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1087
  - number: 4.1088.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden aansluitingen en leidingen van een
      benzineoverslaginstallatie regelmatig op lekken gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1088
  - number: 4.1088.2
    text: Als er een damplek is, worden geen tankwagens gevuld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1088
  - number: 4.1088.3
    text: Er is op het benzinelaadportaal een mechanisme aanwezig dat het vullen onderbreekt, als er een damplek is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1088
  - number: '4.1089'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht is het normale laaddebiet van benzine per vularm op
      een benzinelaadportaal bij een benzineoverslaginstallatie niet meer dan 2.500 l/m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1089
  - number: '4.1090'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht geeft het dampopvangsysteem van het benzinelaadportaal
      bij een benzineoverslaginstallatie, met inbegrip van de benzinedampterugwinningseenheid, een tegendruk van ten
      hoogste 55 millibar aan de voertuigzijde van de dampopvangadapter bij piekbelasting van een benzineterminal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1090
  - number: 4.1091.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht kan een tankwagen bij een benzineoverslaginstallatie
      alleen langs de onderzijde worden gevuld als het vultoelatingssignaal is gegeven door de gecombineerde aardings-
      en overloopbedieningseenheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1091
  - number: 4.1091.2
    text: |-
      Als een tankwagen langs de onderzijde wordt gevuld, is de dampopvangslang met de tankwagen verbonden en stroomt de
      verplaatste damp vrij van de tankwagen naar de dampopvangvoorziening van de benzineterminal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1091
  - number: 4.1091.3
    text: |-
      Bij overloop of onderbreking van de aarding van een tankwagen sluit de bedieningseenheid van het benzinelaadportaal
      de vulcontroleklep aan het benzinelaadportaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1091
  - number: '4.1092'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden bij een benzineoverslaginstallatie dampen
      die worden opgeslagen in een benzineopslagtank met vast dak voor voorlopige dampopslag via een dampdichte leiding
      teruggevoerd naar de mobiele benzinetank van waaruit de benzine wordt geleverd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1092
  - number: '4.1093'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht heeft een benzineterminal met een
      benzineoverslaginstallatie voor het vullen van tankwagens ten minste een benzinelaadportaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1093
  - number: 4.1094.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht heeft de vularm van het benzinelaadportaal bij een
      benzineoverslaginstallatie een vrouwelijke vloeistofaansluiting die kan worden gekoppeld aan een mannelijke API
      1004-adapter van 101,6 mm op de tankwagen, volgens API 1004.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1094
  - number: 4.1094.2
    text: |-
      De dampopvangslang van het benzinelaadportaal heeft een vrouwelijke nok-groef-dampopvangaansluiting die kan worden
      gekoppeld aan een mannelijke nok-groef-adapter van 101,6 mm op de tankwagen, volgens API 1004.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1094
  - number: 4.1095.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht heeft een benzinelaadportaal bij een
      benzineoverslaginstallatie een overloopdetectiebedieningseenheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1095
  - number: 4.1095.2
    text: |-
      Als een benzinelaadportaal wordt verbonden met een tankwagen, geeft de overloopdetectiebedieningseenheid een
      faalveilig vultoelatingssignaal wanneer de compartimentsoverloopsensoren geen hoog peil signaleren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1095
  - number: 4.1096.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht is de bedieningseenheid van het benzinelaadportaal bij
      een benzineoverslaginstallatie via een kabel waaraan een contrasteker is bevestigd, verbonden met de steker op de
      tankwagen via een standaard 10-pens elektrische contactdoos.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1096
  - number: 4.1096.2
    text: |-
      De bedieningseenheid van een vulportaal is geschikt voor tweedraads thermistorsensoren, tweedraads optische
      sensoren, vijfdraads optische sensoren of gelijkwaardige sensoren op een tankwagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1096
  - number: 4.1097.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht is het benzinelaadportaal bij een
      benzineoverslaginstallatie via de gemeenschappelijke retourdraad van de overloopsensoren verbonden met een
      tankwagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1097
  - number: 4.1097.2
    text: De retourdraad is via het chassis van een tankwagen verbonden met pen 10 van de steker.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1097
  - number: 4.1097.3
    text: Pen 10 van de contrasteker is verbonden met de omsluiting van de bedieningseenheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1097
  - number: 4.1097.4
    text: De omsluiting is verbonden met de aarding van het benzinelaadportaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1097
  - number: '4.1098'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht wordt bij het ontwerp van de
      vloeistoflaadvoorzieningen en dampopvangvoorzieningen aan een benzinelaadportaal bij een benzineoverslaginstallatie
      uitgegaan van een verbindingssysteem dat voldoet aan de volgende eisen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.a
    text: de hoogte van de hartlijn van de vloeistofadapters is tussen 0,7 en 1 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.b
    text: als de vloeistofadapters ongeladen zijn, is de hartlijn niet meer dan 1,4 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.c
    text: als de vloeistofadapters geladen zijn, is de hartlijn ten minste 0,5 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.d
    text: de horizontale afstand tussen de vloeistofadapters is ten minste 0,25 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.e
    text: de vloeistofadapters bevinden zich op een lengte van niet meer dan 2,5 m;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.f
    text: 'de dampopvangadapter bevindt zich bij voorkeur rechts van de vloeistofadapters op een hoogte van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.f.1°
    text: niet meer dan 1,5 m als de vloeistofadapter ongeladen is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.f.2°
    text: ten minste 0,5 m als de vloeistofadapter geladen is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.g
    text: 'de aarding of overloopdetectie bevindt zich rechts van de vloeistofopvangadapters en dampopvangadapters op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.g.1°
    text: niet meer dan 1,5 m als de vloeistofadapter ongeladen is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.g.2°
    text: ten minste 0,5 m als de vloeistofadapter geladen is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: 4.1098.h
    text: het systeem bevindt zich in zijn geheel aan een zijde van de tankwagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1098
  - number: '4.1099'
    text: |-
      Deze paragraaf is van toepassing op het tegelijkertijd voor minder dan 24 uur opstellen van niet meer
      dan drie voertuigen, opleggers of aanhangers die zijn geladen met gevaarlijke stoffen als bedoeld in
      [artikel 3.27, eerste lid, onder a, b of c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1099
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.9
        afdeling: '3.2'
  - number: 4.1100.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1099][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1100
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.106'
  - number: 4.1100.2
    text: Een melding bevat de coördinaten van de opstelplaats van de voertuigen, opleggers of aanhangers.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1100
  - number: 4.1100.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1100
  - number: 4.1100.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1100
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1101.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf de opstelplaats van voertuigen, opleggers of
      aanhangers tot de begrenzing van de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1], wordt verricht
      ten minste 20 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1101.2
    text: |-
      Het eerste lid is niet van toepassing op het opstellen van voertuigen, opleggers of aanhangers voor het verrichten
      van formaliteiten, laden of lossen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3
    text: |-
      De afstand geldt tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan
      of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, als inachtneming van de
      afstand, bedoeld in het eerste lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.3.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.4
    text: 'Het derde lid is niet van toepassing op kwetsbare gebouwen en kwetsbare locaties:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
  - number: 4.1101.4.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1101.4.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1101.5
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1101
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1102'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.1101, derde lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1102
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.106'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1103.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is een voertuig, oplegger of aanhanger niet geladen met gevaarlijke
      stoffen van ADR-klasse 1 of ADR-klasse 6.2, verpakkingsgroep I, met uitzondering van de classificatiecodes I3 en
      I4.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1103
  - number: 4.1103.2
    text: |-
      Het eerste lid is niet van toepassing op het opstellen van voertuigen, opleggers of aanhangers voor het verrichten
      van formaliteiten, laden of lossen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1103
  - number: 4.1103a
    text: |-
      De [artikelen 4.1101, eerste lid][ref1], en [4.1102][ref2] zijn niet van toepassing op het tegelijkertijd voor
      minder dan 24 uur opstellen van niet meer dan drie voertuigen, opleggers of aanhangers die zijn geladen met
      gevaarlijke stoffen als bedoeld in [artikel 3.27, eerste lid, onder a, b of c][ref3], dat voor de inwerkingtreding
      van dit besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet verschilt van de
      activiteit zoals deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1103a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.106'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.106'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.9
        afdeling: '3.2'
  - number: '4.1104'
    text: Deze paragraaf is van toepassing op het laden en lossen van vaartuigen of drijvende werktuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1104
  - number: 4.1105.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1104][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1105
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.107'
  - number: 4.1105.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1105
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1106.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam met stoffen bij het laden en
      lossen van een vaartuig of drijvend werktuig wordt de afstand tot de wal of tot een ander vaartuig of drijvend
      werktuig zo klein mogelijk gehouden of overbrugd door een ponton of een morsklep.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1106
  - number: 4.1106.2
    text: Goederen waaruit stoffen kunnen lekken, worden opgesteld boven een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1106
  - number: '4.1107'
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam bij het opslaan van goederen op
      een vaartuig of drijvend werktuig worden goederen waaruit:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1107
  - number: 4.1107.a
    text: stoffen kunnen lekken of uitlogen, benedendeks opgeslagen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1107
  - number: 4.1107.b
    text: stoffen kunnen lekken, opgesteld boven een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1107
  - number: '4.1108'
    text: Deze paragraaf is van toepassing op het exploiteren van een buisleiding met gevaarlijke stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1108
  - number: 4.1109.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1108][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1109
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
  - number: 4.1109.2
    text: Een melding bevat de coördinaten van de buisleiding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1109
  - number: 4.1109.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1109
  - number: 4.1110.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is voor de buisleiding preventiebeleid opgesteld dat invulling
      geeft aan [artikel 2.11, tweede lid, onder e][ref1], en dat evenredig is aan de gevaren van ongewone voorvallen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1110
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.4'
  - number: 4.1110.2
    text: |-
      Het preventiebeleid bevat de algemene doelen van en beginselen voor het handelen van degene die de activiteit
      verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1110
  - number: 4.1110.3
    text: |-
      Bij een wijziging die voor de risico's van een ongewoon voorval aanzienlijke gevolgen kan hebben, wordt het beleid
      herzien.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1110
  - number: 4.1110.4
    text: |-
      Het beleid wordt ook herzien bij een verandering in het veiligheidsinzicht of een verandering van de beste
      beschikbare technieken voor het aanleggen, beheren en onderhouden van buisleidingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1110
  - number: 4.1111.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt het preventiebeleid, bedoeld in
      [artikel 4.1110, eerste lid][ref1], uitgevoerd met passende middelen en een veiligheidsbeheerssysteem dat een
      beschrijving bevat van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
  - number: 4.1111.1.a
    text: |-
      de buisleiding en de buisleidingcomponenten, de kwalitatieve beoordeling daarvan en de wijze waarop degene die de
      activiteit verricht de wijzigingen bijhoudt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.b
    text: |-
      de criteria, normen, richtlijnen en overige relevante documenten en de veiligheidsindicatoren en milieu-indicatoren
      die worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.c
    text: de risico-inventarisatie en risico-evaluatie voor elke fase van de buisleiding en de risico's voor de omgeving;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.d
    text: |-
      de technische en organisatorische maatregelen die verband houden met de geïnventariseerde risico’s voor de
      omgeving;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.e
    text: de taken en bevoegdheden van het personeel voor de veiligheid van mens en milieu;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.f
    text: |-
      de organisatie, het toezicht, de procedures en middelen ter uitvoering van het beleid bij normaal bedrijf,
      onderhoud en bij verhoogde risico's;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.g
    text: |-
      de wijze waarop aandacht wordt besteed aan de onderlinge beïnvloeding tussen de buisleiding en andere ondergrondse
      infrastructuur, hoe hierover wordt gecommuniceerd en welke activiteiten daaruit voortvloeien;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.h
    text: het identificeren van aannemelijke ongewone voorvallen en het opstellen, organiseren en beoefenen van noodplannen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.i
    text: |-
      de wijze waarop afwijkingen en veranderingen in technische, procedurele en organisatorische aspecten worden
      geconstateerd, beoordeeld, verbeterd en in de bedrijfsvoering worden verwerkt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.j
    text: |-
      het meten en evalueren van de prestaties voor de veiligheid van mens en milieu en de wijze waarop de prestaties
      worden geanalyseerd, bewaakt en bijgehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.k
    text: |-
      de wijze waarop aantekeningen worden gemaakt van de getroffen maatregelen, controles en onderzoeken, de resultaten
      daarvan en de daaruit voortvloeiende aanpassingen van het beleid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.1.l
    text: de tekeningen of beschrijvingen waaruit de registratiegegevens van de buisleidingen blijken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.2
    text: De aantekeningen, bedoeld in het eerste lid, onder k, worden ten minste vijf jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.3
    text: |-
      Bij een wijziging die voor de risico's van een ongewoon voorval aanzienlijke gevolgen kan hebben, wordt het
      veiligheidsbeheerssysteem herzien.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1111.4
    text: |-
      Het veiligheidsbeheerssysteem wordt ook herzien bij een verandering in het veiligheidsinzicht of een verandering
      van de beste beschikbare technieken voor het aanleggen, beheren en onderhouden van buisleidingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1111
  - number: 4.1112.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is het plaatsgebonden risico van een buisleiding voor kwetsbare en
      zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan of een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit zijn toegelaten, ten hoogste 1 op de 1.000.000 per jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1112
  - number: 4.1112.2
    text: |-
      Het eerste lid is niet van toepassing binnen drie jaar nadat een kwetsbaar of zeer kwetsbaar gebouw of kwetsbare
      locatie in gebruik is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1112
  - number: 4.1112.3
    text: Op het berekenen van het plaatsgebonden risico zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1112
  - number: 4.1113.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is het plaatsgebonden risico van het aanleggen of vervangen van
      een buisleiding op een afstand van 5 m gemeten vanuit het hart van de buisleiding ten hoogste 1 op de 1.000.000
      per jaar. De afstand is 4 m voor een buisleiding voor aardgas, met een druk van 1.600 tot en met 4.000 kPa.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1113
  - number: 4.1113.2
    text: |-
      Het eerste lid is niet van toepassing als de overschrijding wordt veroorzaakt door een risicoverhogend bouwwerk
      dat op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit wordt
      toegelaten in de directe omgeving van een buisleiding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1113
  - number: 4.1113.3
    text: Op het berekenen van het plaatsgebonden risico zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1113
  - number: '4.1114'
    text: |-
      Een buisleiding wordt niet geëxploiteerd als niet wordt voldaan aan [artikel 4.1110][ref1], [4.1111][ref2],
      [4.1112][ref3] of [4.1113][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1114
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.108'
  - number: 4.1115.1
    text: 'Op basis van actuele en authentieke gegevens zijn de resultaten van de berekeningen voorhanden van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.1.a
    text: de afstand vanaf de buisleiding tot waar het plaatsgebonden risico ten hoogste 1 op de 1.000.000 per jaar is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.1.b
    text: |-
      de afstand voor het brandaandachtsgebied, explosieaandachtsgebied en gifwolkaandachtsgebied, bedoeld in
      [artikel 5.12 van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1115.2
    text: 'De volgende gegevens zijn voorhanden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.a
    text: |-
      de uitwendige of inwendige diameter van de buisleiding in millimeters, als door de buisleiding zuurstof of stikstof
      wordt vervoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.b
    text: de gevaarlijke stof die maatgevend is voor de risico’s voor de omgeving;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.c
    text: de maximale werkdruk in kilopascal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.d
    text: de wanddikte van de buisleiding in millimeters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.e
    text: de ligging van de bovenkant van de buisleiding ten opzichte van het maaiveld in centimeters; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.2.f
    text: de materiaalsoort van de buisleiding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: 4.1115.3
    text: |-
      Op het berekenen van het brandaandachtsgebied, explosieaandachtsgebied en gifwolkaandachtsgebied zijn de bij
      ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1115
  - number: '4.1116'
    text: 'Deze paragraaf is van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1116
  - number: 4.1116.a
    text: |-
      het aanleggen, aanpassen, testen, onderhouden, repareren en buiten gebruik stellen van een boorgat met een
      verplaatsbaar mijnbouwwerk; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1116
  - number: 4.1116.b
    text: het stimuleren van een voorkomen via een boorgat met een verplaatsbaar mijnbouwwerk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1116
  - number: 4.1117.1
    text: |-
      Ten minste vier weken voor het begin van een activiteit als bedoeld in [artikel 4.1116][ref1] worden aan het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.109'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1117.1.a
    text: het verplaatsbaar mijnbouwwerk waarmee de activiteit wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.1.b
    text: de geplande begindatum en einddatum van de werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.1.c
    text: 'de locatie van elk boorgat, bestaande uit:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.1.c.1°
    text: |-
      de aanduiding of het is gelegen in een deel van een oppervlaktewaterlichaam dat is ingedeeld als provinciaal
      gebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.1.c.2°
    text: de coördinaten voor boorgaten aan de zeezijde en aan de landzijde van het provinciaal ingedeeld gebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.1.d
    text: |-
      het aantal transportbewegingen in de perioden van 7.00 tot 19.00 uur, van 19.00 tot 23.00 uur en van 23.00 tot
      7.00 uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.2
    text: |-
      Als op een afstand van ten hoogste 300 m van het hart van de boorinstallatie een geluidgevoelig gebouw ligt, worden
      ten minste vier weken voor het begin van de activiteit aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], de
      resultaten van een akoestisch onderzoek verstrekt, waarmee met geluidmetingen of geluidberekeningen is aangetoond
      dat aan de geluidniveaus uit [tabel 4.1121a][ref2] of bij maatwerkvoorschrift vastgestelde geluidniveaus kan worden
      voldaan en waarbij is aangegeven welke voorzieningen worden getroffen om te voorkomen dat de geldende geluidniveaus
      worden overschreden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.109'
  - number: 4.1117.3
    text: Op het meten en berekenen van de geluidniveaus zijn de bij de ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1117.4
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig de gegevens
      en bescheiden, bedoeld in het eerste en tweede lid, worden de gewijzigde gegevens en bescheiden verstrekt aan het
      bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1117
  - number: 4.1119.1
    text: |-
      Het is verboden gecontroleerd af te fakkelen of af te blazen zonder dit ten minste 48 uur voor het begin ervan
      te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1119
  - number: 4.1119.2
    text: |-
      Een melding bevat informatie over het verwachte tijdstip van het begin van het affakkelen of afblazen en de
      verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1119
  - number: '4.1120'
    text: |-
      Bij het verrichten van een activiteit als bedoeld in [artikel 4.1116][ref1] op land wordt voldaan aan de regels
      over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1120
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.109'
  - number: 4.1120.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1120
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.1120.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1120
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.1121.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem tot aan de formatie waarin zich delfstoffen
      bevinden met koolwaterstoffen of hulpstoffen, zijn het boorgat en de boortorenfundatie die op land worden gebruikt
      vloeistofdicht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121
  - number: 4.1121.2
    text: |-
      Andere onderdelen van een verplaatsbaar mijnbouwwerk die op land worden gebruikt bevinden zich boven een
      aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121
  - number: 4.1121a.1
    text: |-
      Het langtijdgemiddelde beoordelingsniveau L van het geluid en het maximaal geluidniveau L veroorzaakt door het
      verplaatsbare mijnbouwwerk, zijn niet meer dan de waarden, bedoeld in tabel 4.1121a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.2
    text: |-
      Het maximale geluidniveau L is niet van toepassing op het laden en lossen, transportbewegingen, pipehandling en het
      verbranden van gas of aardgas in de openlucht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.3
    text: |-
      De activiteiten, bedoeld in het tweede lid, worden verricht tussen 07:00 en 19:00 uur, tenzij dit redelijkerwijs
      niet mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.4
    text: 'De waarden voor geluidgevoelige ruimten binnen geluidgevoelige gebouwen gelden niet als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.4.a
    text: het geluidgevoelige gebouw nog niet aanwezig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.4.b
    text: |-
      de eigenaar van het geluidgevoelige gebouw weigert mee te werken aan het onderzoek naar het geluid door het
      verplaatsbare mijnbouwwerk in geluidgevoelige ruimten binnen het gebouw; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.4.c
    text: |-
      het geluidgevoelige gebouw geheel of gedeeltelijk ligt op een industrieterrein waarvoor geluidproductieplafonds als
      omgevingswaarden zijn vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121a.5
    text: |-
      Op het meten en berekenen van de geluidniveaus zijn de bij de ministeriële regeling gestelde regels van toepassing.
            Tabel 4.1121a Geluidniveaus


