  - number: 6.19.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 6.16, eerste lid][ref1], te verrichten zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.1
        afdeling: '6.2'
  - number: 6.19.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.2.a
    text: de maximale oppervlakte van het bouwwerk, het werk dat geen bouwwerk is of het andere object; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.2.b
    text: een situatietekening op een schaal van ten minste 1:10.000, waarop de activiteit is aangegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.4
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.4.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 6.17][ref1] of [6.18][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
