        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.35'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.35'
  - number: 4.477.1
    text: Deze paragraaf is van toepassing op het tanken van voertuigen, vaartuigen of werktuigen met LNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.477
  - number: 4.477.2
    text: |-
      Als voertuigen, vaartuigen of werktuigen met LNG worden getankt, is deze paragraaf ook van toepassing op het
      daarnaast opslaan van LNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.477
  - number: 4.478.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het tanken van voertuigen en werktuigen voldaan aan PGS
      33-1.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.478
  - number: 4.478.2
    text: Bij het tanken van vaartuigen en drijvende werktuigen wordt voldaan aan PGS 33-2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.478
  - number: 4.479.1
    text: |-
      LNG wordt getankt in een brandstofreservoir dat is bevestigd aan een voertuig, vaartuig of werktuig en dat is
      bedoeld voor de aandrijving daarvan en de berging van LNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.479
  - number: 4.479.2
    text: Gasflessen en wisselreservoirs worden niet getankt met LNG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.479
  - number: 4.479.3
    text: LNG kan worden getankt in het reservoir van een LNG-tankwagen, als de opslagtank voor LNG leeg wordt gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.479
  - number: 4.480.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt in een opslagtank voor LNG alleen LNG of vloeibare stikstof
      voor het inkoelen of inertiseren van de opslagtank opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.480
  - number: 4.480.2
    text: In een tijdelijk opgestelde opslagtank voor LNG wordt geen LNG opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.480
  - number: '4.481'
    text: |-
      Deze paragraaf is van toepassing op het tanken van voertuigen, vaartuigen of werktuigen met CNG met een installatie
      die een nominale druk heeft van ten minste 20.000 kPa.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.481
  - number: 4.482.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.481][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
    references:
