    text: |-
      het aanleggen, onderhouden, veranderen of verwijderen van watergangen of vaargeulen door of namens de
      waterbeheerder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.c
    text: |-
      het ontgronden voor het plaatsen, onderhouden, wijzigen of verwijderen van buizen, kabels, palen of daarmee
      vergelijkbare werken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.d
    text: |-
      het doen van een opgraving als bedoeld in [artikel 1.1 van de Erfgoedwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
    references:
