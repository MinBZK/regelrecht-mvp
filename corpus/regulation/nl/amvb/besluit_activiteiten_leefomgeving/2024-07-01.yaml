        artikel: '2'
  - number: 3.14b.1.b
    text: |-
      een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit in het windpark voorziet
      op grond van een besluit dat op 30 juni 2021 was vastgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.14b
  - number: 3.14b.1.c
    text: |-
      sinds 30 juni 2021 geen wijziging van kracht is geworden in de omgevingsvergunning, bedoeld onder a, of, voor zover
      dat op het windpark betrekking had, het besluit, bedoeld onder b.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.14b
  - number: 3.14b.2
    text: |-
      Het eerste lid geldt niet vanaf het tijdstip waarop met betrekking tot de windturbine of het windpark waarvan
      de windturbine deel uitmaakt, een wijziging van de omgevingsvergunning voor een milieubelastende activiteit, het
      omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit van kracht wordt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.14b
  - number: 3.14b.3
    text: |-
      Met een maatwerkvoorschrift kan voor een windpark als bedoeld in het eerste lid niet worden afgeweken van de regels
      over een windturbine, bedoeld in [paragrafen 4.30][ref1], [4.30a][ref2] en [4.30b][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
