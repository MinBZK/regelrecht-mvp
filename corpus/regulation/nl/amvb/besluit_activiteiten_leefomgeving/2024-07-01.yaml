  - number: '15.43'
    text: |-
      Uiterlijk de vijftiende dag van elke maand worden aan het bevoegd gezag, bedoeld in [artikel 15.3][ref1], de
      volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.43.a
    text: |-
      de resultaten van de metingen, bedoeld in de [artikelen 15.39][ref1] en [15.42, vijfde lid][ref2], die in de
      voorafgaande maand zijn verricht;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.43.b
    text: de datum, het tijdstip en de locatie van die metingen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.43
  - number: 15.43.c
    text: de naam en het adres van het laboratorium dat die metingen heeft verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.43
  - number: '15.44'
    text: |-
      Tot 1 januari 2025 hoeft in afwijking van [artikel 15.34][ref1] niet te worden voldaan aan de kwaliteitseisen voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.44.a
    text: ammonium;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.b
    text: fytoplankton;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.c
    text: geleidbaarheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.d
    text: hardheid totaal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.e
    text: nitraat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.f
    text: totaal fosfor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.g
    text: waterstofcarbonaat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.h
    text: Escherichia coli; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: 15.44.i
    text: intestinale enterococcen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.44
  - number: '15.45'
    text: |-
      Tot 1 januari 2025 is in afwijking van [artikel 15.36][ref1] op het onderzoeken van watermonsters van toepassing:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.45
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.45.a
    text: 'voor zuurgraad: NEN 6411;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.45
  - number: 15.45.b
    text: 'voor Legionella: NEN 6265; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.45
  - number: 15.45.c
    text: 'voor Pseudomonas aeruginosa: NEN 6573.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.45
  - number: '15.46'
    text: 'Deze paragraaf is van toepassing op het gelegenheid bieden tot zwemmen of baden in een badwaterbassin:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.46
  - number: 15.46.a
    text: waarin het water niet wordt gedesinfecteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.46
  - number: 15.46.b
    text: dat geen zwemvijver is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.46
  - number: 15.46.c
    text: dat na elke gebruiker wordt geleegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.46
  - number: '15.47'
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 15.46][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.47
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.3
        afdeling: '15.2'
  - number: 15.48.1
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit wordt een badwaterbassin gevuld en aangevuld met water dat
      voldoet aan de kwaliteitseisen voor drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0030111
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.48
    references:
      - id: ref1
        bwb_id: BWBR0030111
  - number: 15.48.2
    text: |-
      Het badwaterbassin wordt dagelijks gedesinfecteerd en nagespoeld met water dat voldoet aan de kwaliteitseisen voor
      drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0030111
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.48
    references:
      - id: ref1
        bwb_id: BWBR0030111
  - number: '15.49'
    text: 'Deze paragraaf is van toepassing op het gelegenheid bieden tot zwemmen of baden in een badwaterbassin:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.49
  - number: 15.49.a
    text: waarin het water niet wordt gedesinfecteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.49
  - number: 15.49.b
    text: dat geen zwemvijver is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.49
  - number: 15.49.c
    text: dat niet na elke gebruiker wordt geleegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.49
  - number: '15.50'
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 15.49][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.50
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: '15.51'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 15.49][ref1], wordt voldaan aan de regels over de
      risicoanalyse, het beheersplan en de registratie van incidenten, bedoeld in [afdeling 15.3][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: '15.52'
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit wordt een badwaterbassin gevuld en aangevuld met water dat
      voldoet aan de kwaliteitseisen voor drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0030111
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.52
    references:
      - id: ref1
        bwb_id: BWBR0030111
  - number: '15.53'
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit in een gevuld badwaterbassin worden maatregelen getroffen om te
      voldoen aan de kwaliteitseisen, bedoeld in tabel 15.53.
          Tabel 15.53 Kwaliteitseisen


                  *Parameter of parameter groep*


                  *Kwaliteitseis*


                  Doorzicht


                  Bodem is duidelijk zichtbaar


                  Troebelheid


                  ≤ 0,50 formazine troebelingseenheden


                  Intestinale enterococcen


                  ≤ 1 kolonievormende eenheid/100 ml


                  Legionella


                  < 100 kolonievormende eenheden/l


                  Pseudomonas aeruginosa


                  ≤ 1 kolonievormende eenheid/100 ml


                  Sporen van sulfietreducerende Clostridia


                  ≤ 1 kolonievormende eenheid/100 ml
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.53
  - number: '15.54'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 15.3][ref1], wordt onverwijld geïnformeerd over het overschrijden van de
      kwaliteitseis voor Legionella.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.54
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.55.1
    text: 'Op het onderzoeken van watermonsters is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.1.a
    text: 'voor troebelheid: NEN-EN-ISO 7027-1 of NEN-EN-ISO 7027-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.1.b
    text: 'voor intestinale enterococcen: NEN-EN-ISO 7899-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.1.c
    text: 'voor Legionella: NEN-EN-ISO 11731;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.1.d
    text: 'voor Pseudomonas aeruginosa: NEN-EN-ISO 16266; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.1.e
    text: 'voor sporen van sulfietreducerende Clostridia: NEN-ISO 6461-2.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.55.2
    text: Op doorzicht wordt visueel geïnspecteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.55
  - number: 15.56.1
    text: 'Er wordt in elk badwaterbassin bemonsterd op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.1.a
    text: troebelheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.1.b
    text: intestinale enterococcen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.1.c
    text: Pseudomonas aeruginosa; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.1.d
    text: sporen van sulfietreducerende Clostridia.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.2
    text: |-
      Er wordt bemonsterd op de parameters, bedoeld in [tabel 15.53][ref1], op locaties waar redelijkerwijs kan worden
      aangenomen dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.56.3
    text: |-
      Op doorzicht wordt geïnspecteerd in elk badwaterbassin op een locatie waarop redelijkerwijs kan worden aangenomen
      dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
  - number: 15.56.4
    text: |-
      De locaties, bedoeld in het tweede en derde lid, worden vastgelegd in het beheersplan, bedoeld in
      [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.56
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.57.1
    text: 'Er wordt dagelijks gemeten op doorzicht:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.57
  - number: 15.57.1.a
    text: binnen een half uur voor openstelling van het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.57
  - number: 15.57.1.b
    text: ten minste een keer tijdens de tweede helft van de openstelling van het badwaterbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.57
  - number: 15.57.2
    text: |-
      De momenten, bedoeld in het eerste lid, worden vastgelegd in het beheersplan, bedoeld in [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.57
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.57.3
    text: |-
      De uitkomsten van de metingen en de eventueel naar aanleiding daarvan getroffen maatregelen worden vastgelegd in
      een logboek en worden ten minste 2 jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.57
  - number: 15.58.1
    text: |-
      De metingen in dit artikel worden verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025
      voor de norm die volgens [artikel 15.51][ref1] van toepassing is op de parameter die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.58.2
    text: 'Er wordt maandelijks gemeten op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.58.2.a
    text: troebelheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.58.2.b
    text: intestinale enterococcen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.58.2.c
    text: Pseudomonas aeruginosa; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.58.2.d
    text: sporen van sulfietreducerende Clostridia.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.58.3
    text: |-
      Bij de vorming van waternevel wordt één keer per half jaar gemeten op Legionella. Deze periode kan met ten hoogste
      een maand worden verlengd als het badwaterbassin na deze verlenging wordt gesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.58
  - number: 15.59.1
    text: Tabel 15.59 bevat een indeling van parameters in de klassen I en II.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.2
    text: |-
      Het badwaterbassin wordt gesloten als uit een meting als bedoeld in [artikel 15.57][ref1] of [15.58][ref2] volgt
      dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.59.2.a
    text: niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse I; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.2.b
    text: twee keer achtereen niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse II.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.3
    text: 'In afwijking van het tweede lid kan het badwaterbassin open blijven, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.3.a
    text: |-
      bij een overschrijding van de kwaliteitseis voor doorzicht binnen 30 minuten na constatering van de overschrijding
      kan worden voldaan aan de kwaliteitseis voor doorzicht en er in die 30 minuten geen risico’s voor de gezondheid van
      de gebruikers zijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.3.b
    text: bij een overschrijding van de kwaliteitseis voor Legionella de vorming van waternevel wordt gestopt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.4
    text: |-
      Als het gaat om een overschrijding van de kwaliteitseis voor doorzicht wordt het badwaterbassin niet eerder
      heropend dan nadat uit een meting volgt dat wordt voldaan aan de kwaliteitseis voor doorzicht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
  - number: 15.59.5
    text: |-
      Als het gaat om een overschrijding van een parameter als bedoeld in [tabel 15.53][ref1], anders dan doorzicht,
      wordt het badwaterbassin niet eerder heropend dan nadat uit een meting door een laboratorium met een accreditatie
      volgens NEN-EN-ISO/IEC 17025 voor de norm die volgens [artikel 15.55][ref2] van toepassing is op de parameter die
      wordt gemeten, volgt dat wordt voldaan aan de kwaliteitseis voor die parameter.
            Tabel 15.59 Klassenindeling


                    *Parameter of parameter groep*


                    *Klassenindeling*


                    Doorzicht


                    I


                    Troebelheid


                    II


                    Intestinale enterococcen


                    II


                    Legionella


                    I


                    Pseudomonas aeruginosa


                    II


                    Sporen van sulfietreducerende Clostridia


                    II


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: '15.60'
    text: |-
      Uiterlijk de vijftiende dag van elke maand worden aan het bevoegd gezag, bedoeld in [artikel 15.3][ref1], de
      volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.60
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.60.a
    text: |-
      de resultaten van de metingen, bedoeld in de [artikelen 15.58][ref1] en [15.59, vijfde lid][ref2], die in de
      voorafgaande maand zijn verricht;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.60
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.60.b
    text: de datum, het tijdstip en de locatie van die metingen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.60
  - number: 15.60.c
    text: de naam en het adres van het laboratorium dat die metingen heeft verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.60
  - number: '15.61'
    text: |-
      Tot 1 januari 2025 hoeft in afwijking van [artikel 15.53][ref1] niet te worden voldaan aan de kwaliteitseisen voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.61
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.61.a
    text: intestinale enterococcen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.61
  - number: 15.61.b
    text: sporen van sulfietreducerende Clostridia.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.61
  - number: '15.62'
    text: |-
      Tot 1 januari 2025 is in afwijking van [artikel 15.55][ref1] op het onderzoeken van watermonsters van toepassing:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.62
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.62.a
    text: 'voor troebelheid: NEN-ISO 7027;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.62
  - number: 15.62.b
    text: 'voor Legionella: NEN 6265; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.62
  - number: 15.62.c
    text: 'voor Pseudomonas aeruginosa: NEN 6573.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.62
  - number: 15.63.1
    text: |-
      Met het oog op het voorkomen van verdrinking van de gebruikers van een badwaterbassin, het beschermen van de
      gezondheid van de gebruikers van een badwaterbassin en het in en om een badwaterbassin voorkomen van letsel van de
      gebruikers van een badwaterbassin wordt een risicoanalyse opgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.2
    text: 'De risicoanalyse gaat over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.2.a
    text: het risico van verdrinking van de gebruikers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.2.b
    text: |-
      gezondheidsrisico’s voor de gebruikers als gevolg van de kwaliteit van het water en de kwaliteit van de
      binnenlucht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.2.c
    text: het risico op letsel van de gebruikers als gevolg van technische installaties en geplaatste voorzieningen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.3
    text: 'De risicoanalyse bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.3.a
    text: |-
      een schematisch overzicht van de technische installaties die van belang kunnen zijn voor de gezondheid en de
      veiligheid van de gebruikers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.3.b
    text: een plattegrond van de omgeving van het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.3.c
    text: een omschrijving van de wijze van totstandkoming van de risicoanalyse.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.63.4
    text: De risicoanalyse is beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.63
  - number: 15.64.1
    text: |-
      Met het oog op het voorkomen van verdrinking van de gebruikers van een badwaterbassin, het beschermen van de
      gezondheid van de gebruikers van een badwaterbassin en het in en om een badwaterbassin voorkomen van letsel van de
      gebruikers van een badwaterbassin wordt een plan opgesteld om de risico’s die zijn vastgesteld in de risicoanalyse,
      bedoeld in [artikel 15.63][ref1], te beheersen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.64.2
    text: 'Het beheersplan omschrijft in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a
    text: 'de volgende maatregelen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a.1°
    text: maatregelen om het risico van verdrinking van de gebruikers te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a.2°
    text: |-
      maatregelen om gezondheidsschade als gevolg van de kwaliteit van het water of de kwaliteit van de binnenlucht te
      voorkomen of te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a.3°
    text: maatregelen om letsel te voorkomen of te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a.4°
    text: maatregelen om incidenten en de nadelige gevolgen daarvan te voorkomen of te beperken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.a.5°
    text: maatregelen om de kans op nadelige gevolgen van incidenten te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.2.b
    text: |-
      de locaties, bedoeld in de [artikelen 15.19, vijfde lid][ref1], [15.24, tweede lid][ref2],
      [15.37, vierde lid][ref3], en [15.56, vierde lid;][ref4]


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
