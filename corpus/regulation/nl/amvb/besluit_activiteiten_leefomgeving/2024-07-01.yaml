        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.1001a.4
    text: Het eerste lid is niet van toepassing als degene die de activiteit verricht een openbaar lichaam is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001a
  - number: 4.1001b
    text: |-
      Binnen acht weken na het begin van de activiteit worden aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1],
      gegevens en bescheiden verstrekt waaruit blijkt dat is voldaan aan [artikel 4.1001a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.1002.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van de vloeistofdichte
      bodemvoorziening die zich bevindt onder het aansluitpunt van een ondergrondse opslagtank waarin gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, of oliën of vetten die geen vloeibare gevaarlijke stoffen van
      ADR-klasse 3 zijn worden opgeslagen, geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1002
  - number: 4.1002.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1002
  - number: '4.1003'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003
  - number: 4.1003.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003
  - number: 4.1003.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003
  - number: 4.1003a.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003a
  - number: 4.1003a.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003a
  - number: 4.1003a.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1003a
  - number: '4.1004'
    text: |-
      Deze paragraaf is van toepassing op het opslaan van gevaarlijke stoffen in verpakking, met uitzondering van
      gevaarlijke stoffen van ADR-klasse 5.2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1004
  - number: 4.1005.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1004][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1005.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.2.a
    text: |-
      de coördinaten van de opslagplaatsen, bedoeld in [artikel 4.1008, eerste en tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1005.2.b
    text: de hoeveelheid stoffen die per ADR-klasse ten hoogste wordt opgeslagen per opslagplaats;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.2.c
    text: de hoeveelheid stoffen van verpakkingsgroep I die ten hoogste wordt opgeslagen per opslagplaats;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.2.d
    text: |-
      de hoeveelheid stoffen in de gevarenklasse acute toxiciteit, categorie 1, 2 of 3, bedoeld in bijlage I, deel 3, bij
      de CLP-verordening, die ten hoogste wordt opgeslagen per opslagplaats; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.2.e
    text: 'als stoffen van ADR-klasse 4.1, 4.2 of 4.3 worden opgeslagen: een aanduiding of deze brandbaar zijn.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
  - number: 4.1005.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1005
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1006.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in [artikel 4.1012][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1006.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.1006.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
  - number: 4.1006.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
  - number: 4.1006.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
  - number: 4.1006.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1006
  - number: '4.1007'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1004][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1007
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1007.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1007
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.1007.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1007
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.1008.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf de opslagplaats waar meer dan 2.500 kg
      gevaarlijke stoffen in verpakking, met uitzondering van gevaarlijke stoffen van ADR-klasse 2 in gasflessen, wordt
      opgeslagen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, ten minste 20 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1008.1.b
    text: |-
      tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, ten minste de afstand, bedoeld
      onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1] niet de activiteit, bedoeld in
      [artikel 4.1004][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1008.2
    text: |-
      De afstand vanaf de opslagplaats in de buitenlucht waar meer dan 1.000 l brandbare gassen van ADR-klasse 2 in
      gasflessen wordt opgeslagen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.2.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, is ten minste 15 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1008.2.b
    text: |-
      tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, is ten minste de afstand,
      bedoeld onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1] niet de activiteit,
      bedoeld in [artikel 4.1004][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1008.3
    text: |-
      Het eerste lid, aanhef en onder b, en het tweede lid, aanhef en onder b, zijn van overeenkomstige toepassing als
      inachtneming van de afstand, bedoeld in het eerste lid, aanhef en onder a, en tweede lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.c
    text: de bedrijfsvoering ernstig belemmert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.3.d
    text: ertoe leidt dat niet kan worden voldaan aan de interne afstanden vastgelegd in PGS 15.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.4
    text: |-
      Het eerste lid, aanhef en onder b, tweede lid, aanhef en onder b, en derde lid zijn niet van toepassing op
      kwetsbare gebouwen en kwetsbare locaties:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
  - number: 4.1008.4.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1008.4.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1008.5
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, aanhef en onder b, tweede lid, aanhef en onder b, en derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1008
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1009'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.1008, derde lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1009
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.1010'
    text: |-
      [Artikel 4.1008, eerste lid][ref1], is alleen van toepassing als in de opslagplaats gevaarlijke stoffen worden
      opgeslagen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1010
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1010.a
    text: van ADR-klasse 3; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1010
  - number: 4.1010.b
    text: van ADR-klasse 4.1, 4.2 of 4.3 die brandbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1010
  - number: 4.1011.1
    text: |-
      De afstand, bedoeld in [artikel 4.1008, eerste lid, onder a][ref1], is 8 m als de gevaarlijke stoffen in verpakking
      zijn opgeslagen in een brandcompartiment of als tussen de opslagplaats en de begrenzing van de locatie waarop de
      activiteit, bedoeld in de [afdelingen 3.3 tot en met 3.11][ref2], wordt verricht, een brandwerende voorziening
      aanwezig is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1011
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1011.2
    text: |-
      De afstand, bedoeld in [artikel 4.1008, tweede lid, onder a][ref1], is 7,5 m als tussen de opslagplaats en de
      begrenzing van de locatie waarop de activiteit, bedoeld in de [afdelingen 3.3 tot en met 3.11][ref2], wordt
      verricht, een brandwerende voorziening aanwezig is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1011
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.1011.3
    text: |-
      De brandwerende voorziening is ten minste 2 m hoog, strekt zich aan weerszijden van de opslagplaats ten minste 2 m
      uit en heeft een brandwerendheid van ten minste 60 minuten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1011
  - number: 4.1012.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.1004][ref1], voldaan aan PGS 15.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1012
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.98'
  - number: 4.1012.2
    text: 'Het eerste lid is niet van toepassing op het opslaan van:'
