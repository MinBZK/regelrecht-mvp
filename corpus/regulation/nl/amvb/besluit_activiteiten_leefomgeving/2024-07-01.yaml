  - number: 4.844.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden kuilvoer of vaste bijvoedermiddelen opgeslagen
      op een elementenbodemvoorziening, waarbij de vloeistoffen die vrijkomen worden opgevangen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.844
  - number: 4.844.2
    text: |-
      Het eerste lid is niet van toepassing als kuilvoer of vaste bijvoedermiddelen als veevoederbalen in plastic folie
      zijn verpakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.844
  - number: 4.845.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater worden vrijkomende vloeistoffen afkomstig van de opslag van
      kuilvoer of vaste bijvoedermiddelen gelijkmatig verspreid over landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.845
  - number: 4.845.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden of
      geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.845
  - number: '4.846'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van de bodembeschermende voorziening
      voor opslag van kuilvoer of vaste bijvoedermiddelen geloosd op of in de bodem of op een oppervlaktewaterlichaam
      als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.846
  - number: 4.846.a
    text: het niet in contact is geweest met het kuilvoer of de vaste bijvoedermiddelen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.846
  - number: 4.846.b
    text: het niet is vermengd met daaruit vloeiende vloeistoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.846
  - number: '4.847'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.847
  - number: 4.847.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.847
  - number: 4.847.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.847
  - number: 4.847.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.847
