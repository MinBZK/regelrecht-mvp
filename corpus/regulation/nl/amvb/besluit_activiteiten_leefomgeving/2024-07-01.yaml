  - number: '4.1296'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift, gesteld na 1 januari 2024, worden de emissiegrenswaarden in deze
      paragraaf niet versoepeld voor stookinstallaties waarop voor die datum een emissiegrenswaarde van toepassing was.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1296
  - number: '4.1297'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstof wordt een stookinstallatie
      die daarmee wordt gestookt gevuld en geleegd boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1297
  - number: '4.1298'
    text: |-
      Met het oog op het beperken van emissies in de lucht wordt de periode van het opstarten of stilleggen van een
      stookinstallatie zo kort mogelijk gehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1298
  - number: 4.1299.1
    text: |-
      De emissiegrenswaarden, bedoeld in de [artikelen 4.1301 tot en met 4.1305][ref1], [4.1307][ref2] en [4.1308][ref3],
      gelden niet voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1299.1.a
    text: |-
      een stookinstallatie die volgens de omgevingsvergunning voor een milieubelastende activiteit die daarvoor geldt,
      wordt gebruikt voor het onderzoeken, beproeven of demonstreren van experimentele verbrandingstechnieken of van
      technieken om de emissie van zwaveldioxide, stikstofoxiden of totaal stof te verminderen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.1.b
    text: |-
      technische voorzieningen voor het zuiveren van afgassen door verbranding die niet als autonome stookinstallatie
      worden geëxploiteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.1.c
    text: |-
      een stookinstallatie waar de gasvormige producten van het stookproces worden gebruikt voor het direct verwarmen,
      drogen of anderzijds behandelen van voorwerpen of materialen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.1.d
    text: |-
      een stookinstallatie waar de gasvormige producten van het stookproces worden gebruikt voor het direct verwarmen met
      gas van binnenruimten om de omstandigheden op de arbeidsplaats te verbeteren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.1.e
    text: een crematorium.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.2
    text: |-
      De emissiegrenswaarden, bedoeld in de [artikelen 4.1302 tot en met 4.1305][ref1], [4.1307][ref2] en [4.1308][ref3],
      gelden ook niet voor een stookinstallatie die niet meer dan 500 uur per jaar in bedrijf is, met uitzondering van
      een dieselmotor die wordt gebruikt voor het opwekken van elektriciteit als het openbare net beschikbaar is en geen
      geplande bedrijfsnoodzakelijke test wordt verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1299.3
    text: |-
      Voor het bepalen van het aantal uren dat een stookinstallatie per jaar in bedrijf is, bedoeld in het tweede lid,
      wordt het aantal uren dat een stookinstallatie in bedrijf is:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.3.a
    text: maandelijks geregistreerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.3.b
    text: |-
      halfjaarlijks geregistreerd, als de stookinstallatie ligt op een offshore oliewinningsplatform of
      gaswinningsplatform.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1299.4
    text: |-
      Bij tijdelijke of definitieve vervanging van een installatie als bedoeld in het tweede lid, is de totale
      gezamenlijke bedrijfstijd van de installaties in het jaar van vervanging niet meer dan 500 uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1299
  - number: 4.1300.1
    text: |-
      De emissies van stikstofoxiden, zwaveldioxide, totaal stof en onverbrande koolwaterstoffen worden omgerekend naar
      een volumegehalte aan zuurstof van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: 4.1300.1.a
    text: 15% in afgas, als het gaat om een dieselmotor, een gasturbine of een gasmotor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: 4.1300.1.b
    text: 6% in afgas, als het gaat om een stookinstallatie voor vaste brandstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: 4.1300.1.c
    text: 3% in afgas, als het gaat om een andere stookinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: 4.1300.2
    text: De emissies van stikstofoxiden worden berekend als stikstofdioxide.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: 4.1300.3
    text: De emissies van onverbrande koolwaterstoffen worden berekend als koolstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1300
  - number: '4.1301'
    text: |-
      Voor de emissie in de lucht van een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste
      1 MW die niet meer dan 500 uur per jaar in bedrijf is en die wordt gestookt op een vaste brandstof, is de
      emissiegrenswaarde voor totaal stof 100 mg/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1301
  - number: '4.1302'
    text: |-
      Voor de emissie in de lucht van een stookinstallatie voor de regeneratie van glycol is de emissiegrenswaarde van
      stikstofoxiden 80 mg/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1302
  - number: 4.1303.1
    text: 'Voor de emissie in de lucht van een ketel zijn de emissiegrenswaarden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.1.a
    text: voor stikstofoxiden, zwaveldioxide en totaal stof de waarden, bedoeld in tabel 4.1303; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.1.b
    text: 'voor ammoniak:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.1.b.1°
    text: 5 mg/Nm3 bij toepassing van selectieve katalytische reductie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.1.b.2°
    text: 10 mg/Nm3 bij toepassing van selectieve niet-katalytische reductie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.2
    text: |-
      Aan het eerste lid wordt voor totaal stof bij de verbranding van vloeibare brandstof in een ketel met een nominaal
      thermisch ingangsvermogen van minder dan 1 MW in ieder geval voldaan als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.2.a
    text: |-
      het asgehalte van de brandstof in massaprocent lager is dan de toepasselijke emissiegrenswaarde gedeeld door 800;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.2.b
    text: |-
      uit de keuring, bedoeld in [artikel 4.1326][ref1], blijkt dat de concentratie van koolstofmonoxide in het rookgas
      lager is dan 100 mg/Nm3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1303.3
    text: |-
      Aan het eerste lid wordt voor totaal stof bij de verbranding van rie-biomassa of pellets gemaakt uit rie-biomassa
      in een ketel met een nominaal thermisch ingangsvermogen van minder dan 1 MW in ieder geval voldaan als de afgezogen
      stofemissies door een geschikt doekenfilter worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1303
  - number: 4.1303.4
    text: |-
      Aan het eerste lid wordt bij de verbranding van rie-biomassa of pellets gemaakt uit rie-biomassa in een ketel met
      een nominaal thermisch ingangsvermogen van ten hoogste 0,5 MW in ieder geval voldaan als Verordening (EU) 2015/1189
      van de Commissie van 28 april 2015 tot uitvoering van [Richtlijn 2009/125/EG](32009L0125) van het Europees
      Parlement en de Raad wat de eisen inzake ecologisch ontwerp voor verwarmingsketels voor vaste brandstoffen betreft
      (PbEU 2015, L 193/100) van toepassing is.
