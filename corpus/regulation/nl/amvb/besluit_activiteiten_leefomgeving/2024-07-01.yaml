      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.216
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: '4.217'
    text: |-
      Met het oog op het beschermen van de gezondheid en het voorkomen of het tot een aanvaardbaar niveau beperken van
      geurhinder worden afgezogen emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.217
  - number: '4.218'
    text: Deze paragraaf is van toepassing op het stralen van metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.218
  - number: 4.219.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.218][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.219
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: 4.219.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.219
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.220'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.218][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.220
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: 4.220.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.220
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.220.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.220
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.221.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met straalmiddelen en gebruikt straalwater worden
      metalen gestraald boven een vloeistofdichte bodemvoorziening als vloeibare straalmiddelen worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.221
  - number: 4.221.2
    text: Bij een gesloten proces worden metalen gestraald boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.221
  - number: '4.222'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vaste straalmiddelen, verfdeeltjes of
      metaaldeeltjes worden metalen gestraald boven een aaneengesloten bodemvoorziening als vaste straalmiddelen worden
      gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.222
  - number: '4.223'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van een vloeistofdichte
      bodemvoorziening niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.223
  - number: 4.224.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van stralen van metalen
      geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.224
  - number: 4.224.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.224
  - number: '4.225'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.225
  - number: 4.225.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.225
  - number: 4.225.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.225
  - number: 4.225.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.225
  - number: '4.226'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.226
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '4.227'
    text: |-
      Met het oog op het beperken van diffuse emissies in de lucht en het voorkomen of beperken van geluidhinder worden
      metalen in een gesloten ruimte gestraald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.227
  - number: 4.228.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.228, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.228
  - number: 4.228.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.228, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.228
  - number: 4.228.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de emissies door een geschikte filtrerende afscheider of een
      geschikt elektrostatisch filter worden gevoerd.
