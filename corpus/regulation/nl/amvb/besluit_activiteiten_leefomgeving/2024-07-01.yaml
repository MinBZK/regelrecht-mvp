    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, van de wet][ref1] om zonder omgevingsvergunning een
      ontgrondingsactiviteit te verrichten, geldt niet voor de activiteit, bedoeld in [artikel 6.27, tweede lid][ref2],
      voor zover het gaat om:


