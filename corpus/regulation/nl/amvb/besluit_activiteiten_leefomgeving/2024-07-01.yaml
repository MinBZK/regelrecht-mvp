  - number: 4.609.1
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee de emissiegrenswaarden, bedoeld in [artikel 4.608][ref1], worden
      verhoogd, wordt alleen gesteld als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.609.1.a
    text: |-
      als gevolg van dat maatwerk in totaal ten minste 75% van totaal fosfor en totaal stikstof wordt verwijderd in de
      zuiveringtechnische werken onder de zorg van degene die de activiteit verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
  - number: 4.609.1.b
    text: 'het zuiveringtechnisch werk:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
  - number: 4.609.1.b.1°
    text: |-
      voor 1 september 1992 in gebruik is genomen en de ontwerpcapaciteit sinds de datum dat het in gebruik werd genomen
      met niet meer dan 25% is uitgebreid; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
  - number: 4.609.1.b.2°
    text: een ontwerpcapaciteit heeft van minder dan 20.000 inwonerequivalenten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
  - number: 4.609.2
    text: |-
      De emissiegrenswaarden, bedoeld in [tabel 4.608a][ref1], worden niet versoepeld, en van de aantallen monsters,
      bedoeld in tabel 4.608c, wordt niet afgeweken.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.609
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.610.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en etmaalmonsters worden individueel
      geanalyseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4
    text: 'Op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.a
    text: 'voor onopgeloste stoffen: NEN-EN 872;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.b
    text: 'voor het biochemisch zuurstofverbruik: ISO 5815-1/2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.c
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.d
    text: 'voor nitrietstikstof en nitraatstikstof: NEN-EN-ISO 13395 of NEN-ISO 15923-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.e
    text: 'voor organisch stikstof: NEN-ISO 5663 of NEN 6646;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.f
    text: 'voor ammoniumstikstof: NEN 6646, NEN-EN-ISO 11732 of NEN-ISO 15923-1; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.610.4.g
    text: |-
      voor de som van fosforverbindingen: NEN-ISO 15681-1, NEN-ISO 15681-2 NEN-EN-ISO 15681-2, NEN-EN-ISO 11885 of NEN-
      EN-ISO 17294-2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.610
  - number: 4.611.1
    text: |-
      Het inkomende stedelijk afvalwater en het afvalwater dat wordt geloosd wordt tijdproportioneel of
      volumeproportioneel over een etmaal bemonsterd en geanalyseerd op de stoffen en parameters, bedoeld in
      [artikel 4.608][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.611
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.611.2
    text: |-
      Het aantal monsters per jaar is ten minste het aantal, bedoeld in tabel 4.611, afhankelijk van de ontwerpcapaciteit
      van het zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.611
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: ontwerpcapaciteit_ie
            type: number
            required: true
            description: Ontwerpcapaciteit van het zuiveringtechnisch werk in inwonerequivalenten
            source: {}
          - name: parameter_type
            type: string
            required: true
            description: >-
              Type parameter: 'fosfor_stikstof'
              of 'bzv_czv'
            source: {}
        output:
          - name: minimaal_aantal_monsters_per_jaar
            type: number
            description: Het minimale aantal monsters per jaar volgens tabel 4.611
        actions:
          - output: minimaal_aantal_monsters_per_jaar
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $parameter_type
                    value: fosfor_stikstof
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $ontwerpcapaciteit_ie
                          value: 5000
                        then: 12
                      - when:
                          operation: LESS_THAN
                          subject: $ontwerpcapaciteit_ie
                          value: 50000
                        then: 24
                      - when:
                          operation: LESS_THAN
                          subject: $ontwerpcapaciteit_ie
                          value: 100000
                        then: 48
                    default: 60
              default:
                operation: IF
                cases:
                  - when:
                      operation: LESS_THAN
                      subject: $ontwerpcapaciteit_ie
                      value: 50000
                    then: 12
                default: 24
  - number: 4.611.3
    text: |-
      Als de ontwerpcapaciteit minder is dan 10.000 inwonerequivalenten en in het voorafgaande jaar werd voldaan aan de
      waarden, bedoeld in [artikel 4.608][ref1], is het aantal monsters voor het biochemisch zuurstofverbruik en chemisch
      zuurstofverbruik ten minste 4.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.611
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.611.4
    text: |-
      Als uit de resultaten van een analyse blijkt dat in het inkomende stedelijk afvalwater het gehalte aan
      nitrietstikstof en nitraatstikstof in het voorafgaande jaar voortdurend lager is dan 1% ten opzichte van het
      gehalte aan organisch stikstof, kan ook alleen het gehalte aan organisch stikstof in dat afvalwater worden
      geanalyseerd.
            Tabel 4.611 Aantallen monsters


                    *Ontwerpcapaciteit zuiveringtechnisch werk*


                    *Aantal monsters per jaar*


                    *Voor de som van fosforverbindingen en de som van stikstofverbindingen*


                    *Voor het biochemisch zuurstofverbruik en chemisch zuurstofverbruik*


                    2.000 tot 5.000 inwonerequivalenten


                    12


                    12


                    5.000 tot 50.000 inwonerequivalenten


                    24


                    12


                    50.000 tot 100.000 inwonerequivalenten


                    48


                    24


                    Meer dan 100.000 inwonerequivalenten


                    60


                    24
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.611
  - number: '4.612'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift wordt [artikel 4.611][ref1] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.612
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.613.1
    text: |-
      Het totale zuiveringsrendement van een zuiveringtechnisch werk wordt berekend volgens de formule: waarbij wordt
      verstaan onder: η: zuiveringsrendement; V de hoeveelheid van de som van stikstofverbindingen en de som van
      fosforverbindingen in het stedelijk afvalwater dat wordt gezuiverd, in kilogram per joule; en V: de hoeveelheid van
      de som van stikstofverbindingen, en de som van fosforverbindingen in het stedelijk afvalwater dat na de zuivering
      wordt geloosd, in kilogram per joule.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.613
  - number: 4.613.2
    text: |-
      Vi en Ve worden berekend volgens de formules: waarbij wordt verstaan onder: r: het zuiveringtechnisch werk; n:
      het aantal zuiveringtechnische werken; d: de bemonsteringsdag; M: het aantal bemonsteringsdagen per jaar voor het
      zuiveringtechnisch werk; i: de concentratie op de bemonsteringsdag van stikstofverbindingen en fosforverbindingen
      in het stedelijk afvalwater dat door het zuiveringtechnisch werk wordt gezuiverd, in gram per kubieke meter; E: de
      na de zuivering door het zuiveringtechnisch werk op de bemonsteringsdag geloosde hoeveelheid stedelijk afvalwater,
      in kubieke meters; en e: de concentratie op de bemonsteringsdag van stikstofverbindingen en fosforverbindingen in
      het stedelijk afvalwater dat na de zuivering door het zuiveringtechnisch werk wordt geloosd, in gram per kubieke
      meter.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.613
  - number: 4.613.3
    text: |-
      Met een debietmeting wordt continu de hoeveelheid geloosd afvalwater in kubieke meters per dag bepaald, met een
      methode waarvan de onnauwkeurigheid kleiner is dan 5%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.613
  - number: '4.614'
    text: |-
      Ten minste binnen vier maanden na afloop van elk kalenderjaar worden de volgende gegevens en bescheiden verstrekt
      aan Onze Minister van Infrastructuur en Waterstaat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.614
  - number: 4.614.a
    text: een overzicht van de zuiveringtechnische werken onder de zorg van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.614
  - number: 4.614.b
    text: |-
      een overzicht van de resultaten van de bemonstering en analyse, bedoeld in [artikel 4.611][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.614
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: 4.614.c
    text: |-
      het totale zuiveringsrendement, bedoeld in [artikel 4.613][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.614
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.49'
  - number: '4.615'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.615
  - number: 4.615.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.615
  - number: 4.615.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.615
  - number: 4.615.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.615
  - number: 4.618.1
    text: Deze paragraaf is van toepassing op het ontvangen van afvalstoffen bij inzameling of afgifte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.618
  - number: 4.618.2
    text: Deze paragraaf is niet van toepassing op het ontvangen van afvalwater vanuit een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.618
  - number: 4.619.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.618][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.50'
  - number: 4.619.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
  - number: 4.619.2.a
    text: een overzicht van de in te nemen afvalstoffen en de te verrichten activiteiten met afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
  - number: 4.619.2.b
    text: per activiteit per afvalstof de opslagcapaciteit en de verwerkingscapaciteit per jaar; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
  - number: 4.619.2.c
    text: |-
      een beschrijving van de procedures van acceptatie en controle van de ontvangen afvalstoffen, bedoeld in
      [artikel 4.620][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.50'
  - number: 4.619.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.619
  - number: 4.620.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen is er een werkinstructie over de procedures van acceptatie en
      controle van de ontvangen afvalstoffen, die nodig zijn voor een doelmatig beheer van deze afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.2
    text: |-
      In de werkinstructie is onderscheid gemaakt tussen groepen van afvalstoffen waarvoor met het oog op een doelmatig
      beheer van afvalstoffen verschillende procedures voor de ontvangst worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.3
    text: 'In de werkinstructie is per onderscheiden groep van afvalstoffen in ieder geval beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.3.a
    text: het type ontdoener waarvan afvalstoffen worden aangenomen, als dit gevolgen heeft voor de acceptatie en controle;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.3.b
    text: de eisen die degene die de activiteit verricht, stelt aan de manier waarop de afvalstoffen worden aangeboden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.3.c
    text: de manier waarop de afvalstoffen worden gecontroleerd bij ontvangst; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: 4.620.3.d
    text: |-
      de manier waarop de afvalstoffen die op een milieuhygiënisch relevante manier afwijken van wat gangbaar is voor de
      categorie, worden behandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.620
  - number: '4.621'
    text: |-
      Deze paragraaf is van toepassing op het bieden van gelegenheid om grove huishoudelijke afvalstoffen af te geven op
      een daarvoor ingerichte locatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.621
  - number: 4.622.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.621][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.622
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.51'
  - number: 4.622.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.622
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.623.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen zijn op een locatie waarop gelegenheid wordt geboden om
      grove huishoudelijke afvalstoffen af te geven, als de volgende huishoudelijke afvalstoffen worden ingenomen,
      voorzieningen aanwezig voor het gescheiden achterlaten van die afvalstoffen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.a
    text: afgedankte elektrische en elektronische apparatuur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.b
    text: asbest;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.c
    text: geïmpregneerd hout;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.d
    text: gasflessen, brandblussers en overige drukhouders;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.e
    text: grond;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.f
    text: niet-geïmpregneerd hout;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.g
    text: banden van voertuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.h
    text: dakafval;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.i
    text: geëxpandeerd polystyreenschuim;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.j
    text: gemengd steenachtig materiaal, met uitzondering van asfalt en gips;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.k
    text: gips;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.l
    text: grof tuinafval;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.m
    text: harde kunststoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.n
    text: matrassen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.o
    text: metalen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.p
    text: papier en karton;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.q
    text: textiel, met uitzondering van tapijt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.1.r
    text: vlakglas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.2
    text: |-
      Op de locatie wordt duidelijk aangegeven waar de afvalstoffen, bedoeld in het eerste lid, die niet op de locatie
      worden ingenomen, kunnen worden aangeboden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.3
    text: |-
      Er wordt zoveel mogelijk voorkomen dat afvalstoffen waarvoor specifieke voorzieningen aanwezig zijn in de
      voorziening voor het restafval worden achtergelaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.623.4
    text: De voorziening voor matrassen is zo uitgevoerd dat de matrassen niet in contact komen met hemelwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.623
  - number: 4.624.1
    text: |-
      Er is een werkinstructie als bedoeld in [artikel 4.620][ref1] over de procedures van acceptatie en controle van de
      ontvangen afvalstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.624
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.50'
  - number: 4.624.2
    text: 'In de werkinstructie wordt aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.624
  - number: 4.624.2.a
    text: |-
      hoe wordt voorkomen dat afvalstoffen waarvoor specifieke voorzieningen aanwezig zijn in de voorziening voor het
      restafval worden achtergelaten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.624
  - number: 4.624.2.b
    text: |-
      hoe wordt voorkomen dat op de locatie grove huishoudelijke afvalstoffen worden afgegeven die niet worden ingenomen;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.624
  - number: 4.624.2.c
    text: |-
      hoe wordt bereikt dat zo veel mogelijk van de ingenomen afvalstoffen geschikt is en blijft voor en afgevoerd wordt
      ten behoeve van voorbereiding voor hergebruik en recycling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.624
  - number: '4.625'
    text: Deze paragraaf is van toepassing op het opslaan van verwijderd asbest of een verwijderd asbesthoudend product.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.625
  - number: 4.626.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.626][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.626
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.52'
  - number: 4.626.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.626
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.627.1
    text: |-
      Met het oog op het beschermen van de gezondheid en het voorkomen of beperken van de verspreiding van asbest, geeft
      het opslaan van asbest geen stofverspreiding die met het blote oog waarneembaar is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.627
  - number: 4.627.2
    text: |-
      Asbest is alleen aanwezig in een container en verpakt in niet-luchtdoorlatend verpakkingsmateriaal van voldoende
      dikte en sterkte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.627
  - number: 4.628.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt bij het in containers samenvoegen van asbest van
      verschillende saneringen, per container vastgelegd van welke saneringen het asbest afkomstig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.628
  - number: 4.628.2
    text: |-
      Het eerste lid is niet van toepassing op asbest dat is ingenomen bij een milieustraat als bedoeld in
      [paragraaf 3.5.6][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.628
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        paragraaf: 3.5.6
        afdeling: '3.5'
  - number: 4.628a
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt verwijderd asbest of een verwijderd asbesthoudend
      product niet langer dan een jaar opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.628a
  - number: '4.629'
    text: Deze paragraaf is van toepassing op het ingeperkt gebruik van genetisch gemodificeerde organismen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.629
  - number: 4.630.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.629][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.53'
  - number: 4.630.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
  - number: 4.630.2.a
    text: |-
      per type werkruimte als bedoeld in
      [bijlage 4 bij het Besluit genetisch gemodificeerde organismen milieubeheer 2013][ref1]: het maximale aantal
      werkruimten waarop inperkingsniveau I of II als bedoeld in [artikel 1.5, eerste lid, van dat besluit][ref2] van
      toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0035090
      [ref2]: https://wetten.overheid.nl/BWBR0035090#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
    references:
      - id: ref1
        bwb_id: BWBR0035090
      - id: ref2
        bwb_id: BWBR0035090
        artikel: '1'
  - number: 4.630.2.b
    text: |-
      per type werkruimte als bedoeld in
      [bijlage 4 bij het Besluit genetisch gemodificeerde organismen milieubeheer 2013][ref1]: het maximale aantal
      werkruimten waarop inperkingsniveau III als bedoeld in [artikel 1.5, eerste lid, van dat besluit][ref2] van
      toepassing is; en


      [ref1]: https://wetten.overheid.nl/BWBR0035090
      [ref2]: https://wetten.overheid.nl/BWBR0035090#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
    references:
      - id: ref1
        bwb_id: BWBR0035090
      - id: ref2
        bwb_id: BWBR0035090
        artikel: '1'
  - number: 4.630.2.c
    text: een plattegrond van de locatie waarop het ggo-gebied is aangegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
  - number: 4.630.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
  - number: 4.630.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.630
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.631.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 4.629][ref1], worden aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2], de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.631
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.53'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.631.1.a
    text: |-
      de namen en bereikbaarheidsgegevens van degenen die aanspreekpunt zijn voor het toezicht op en de controle van de
      veiligheid van handelingen met genetisch gemodificeerde organismen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.631
  - number: 4.631.1.b
    text: gegevens over het bestaan van biologische veiligheidscomités of subcomités.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.631
  - number: 4.631.2
    text: |-
      Ten minste vier weken voordat de gegevens en bescheiden, bedoeld in het eerste lid, wijzigen, worden de gewijzigde
      gegevens verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.631
  - number: 4.632.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 4.629][ref1], worden aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2], gegevens verstrekt over eventuele andere activiteiten die degene die
      de genetisch gemodificeerde organismen gebruikt, verricht binnen de begrenzing van de locatie, bedoeld in
      [artikel 3.249][ref3], voor zover die activiteiten de integriteit van het ggo-gebied kunnen aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.632
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.53'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.7.6
        afdeling: '3.7'
  - number: 4.632.2
    text: |-
      Ten minste vier weken voordat de gegevens en bescheiden, bedoeld in het eerste lid, wijzigen, worden de gewijzigde
      gegevens en bescheiden verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.632
  - number: 4.632.3
    text: |-
      Dit artikel is niet van toepassing op een activiteit die als vergunningplichtig is aangewezen in
      [hoofdstuk 3][ref1] of waarvoor een melding is gedaan op grond van [hoofdstuk 4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.632
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: '4.633'
    text: 'Met het oog op het voorkomen van de verspreiding van genetisch gemodificeerde organismen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.633
  - number: 4.633.a
    text: bevinden alle categorieën van fysische inperking zich in het ggo-gebied;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.633
  - number: 4.633.b
    text: is het ggo-gebied alleen toegankelijk voor bevoegde personen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.633
  - number: 4.633.c
    text: wordt de kans op het doorbreken van de integriteit van het ggo-gebied zo klein mogelijk gehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.633
  - number: '4.634'
    text: Deze paragraaf is van toepassing op het exploiteren van een crematorium.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.634
  - number: 4.635.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.634][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.635
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.54'
  - number: 4.635.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.635
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.636.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de lucht worden geen kisten verbrand die zijn bekleed met lood
      en zink.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.636
  - number: 4.636.2
    text: Metalen en kunststofonderdelen worden voor verbranding verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.636
  - number: 4.637.1
    text: |-
      Met het oog op het zo volledig mogelijk verbranden van rookgassen en het beperken van het ontstaan van
      stikstofoxiden heeft een crematieoven een naverbrandingsruimte met een naverbrander waarin de rookgassen uit de
      hoofdkamer worden naverbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
  - number: 4.637.2
    text: |-
      Het ontwerp van de crematieoven is zo, dat onder normale bedrijfsomstandigheden de verblijftijd van de afgassen in
      de naverbrandingsruimte ten minste 1,5 seconde is bij een temperatuur van ten minste 800 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verblijftijd_seconden
            type: number
            required: true
            description: Verblijftijd van de afgassen in de naverbrandingsruimte in seconden
            source: {}
          - name: temperatuur_celsius
            type: number
            required: true
            description: Temperatuur in de naverbrandingsruimte in graden Celsius
            source: {}
        output:
          - name: voldoet_naverbranding
            type: boolean
            description: Of de naverbrandingsruimte voldoet aan de eisen voor verblijftijd en temperatuur
        actions:
          - output: voldoet_naverbranding
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $verblijftijd_seconden
                  value: 1.5
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $temperatuur_celsius
                  value: 800
  - number: 4.637.3
    text: In de hoofdkamer van de oven en in de naverbrander van de verbrandingsruimte wordt een low-NO brander toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
  - number: 4.637.4
    text: In de naverbrandingsruimte worden rookgassen zo gemengd dat ze zo volledig mogelijk worden verbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
  - number: 4.637.5
    text: |-
      De temperatuur van de rookgassen in de naverbrandingsruimte wordt door een brander boven de 800 °C gehouden,
      waartoe de brander van een automatische regeling is voorzien.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
  - number: 4.637.6
    text: |-
      Het zuurstofgehalte in de naverbrandingsruimte is ten minste 6%, waarbij kortdurende onderschrijdingen van dit
      gehalte zijn toegestaan als deze onderschrijdingen nooit langer dan een minuut duren en het zuurstofgehalte boven
      de 3% blijft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.637
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: zuurstofgehalte_procent
            type: number
            required: true
            description: Zuurstofgehalte in de naverbrandingsruimte in procenten
            source: {}
          - name: duur_onderschrijding_seconden
            type: number
            required: false
            description: Duur van de onderschrijding van 6% in seconden
            source: {}
        output:
          - name: voldoet_zuurstofgehalte
            type: boolean
            description: Of het zuurstofgehalte in de naverbrandingsruimte voldoet
        actions:
          - output: voldoet_zuurstofgehalte
            value:
              operation: IF
              cases:
                - when:
                    operation: GREATER_THAN_OR_EQUAL
                    subject: $zuurstofgehalte_procent
                    value: 6
                  then: true
              default:
                operation: AND
                conditions:
                  - operation: GREATER_THAN
                    subject: $zuurstofgehalte_procent
                    value: 3
                  - operation: LESS_THAN_OR_EQUAL
                    subject: $duur_onderschrijding_seconden
                    value: 60
  - number: 4.638.1
    text: |-
      Voor de emissie in de lucht is de emissiegrenswaarde voor kwik en kwikverbindingen, berekend als Hg, 0,05 g/Nm3,
      gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.638
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: kwik_concentratie_g_per_nm3
            type: number
            required: true
            description: Concentratie kwik en kwikverbindingen (als Hg) in g/Nm3
            source: {}
        output:
          - name: voldoet_emissiegrenswaarde_kwik
            type: boolean
            description: Of de emissie van kwik voldoet aan de grenswaarde van 0,05 g/Nm3
        actions:
          - output: voldoet_emissiegrenswaarde_kwik
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $kwik_concentratie_g_per_nm3
              value: 0.05
  - number: 4.638.2
    text: |-
      Het eerste lid is niet van toepassing als de emissie van kwik en kwikverbindingen, berekend als Hg, niet meer is
      dan 0,075 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.638
  - number: 4.638.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de emissies door een adsorptiemedium en een geschikte
      filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.638
  - number: 4.638.4
    text: |-
      Bij het ontwerp, de uitvoering en het onderhoud van het adsorptiemedium en de filtrerende afscheider is rekening
      gehouden met het voorkomen van dioxinevorming en furanenvorming in het filter en het afvangen van de in de afgassen
      aanwezige dioxinen en furanen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.638
  - number: 4.639.1
    text: Op het verrichten van emissiemetingen van kwik en kwikverbindingen is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.639
  - number: 4.639.2
    text: Op het verrichten van een eenmalige meting is voor kwik en kwikverbindingen NEN-EN 13211 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.639
  - number: 4.639.3
    text: |-
      Het berekenen van een emissieconcentratie wordt betrokken op een zuurstofgehalte van 11% onder normaalcondities en
      voor droog rookgas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.639
  - number: 4.640.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor kwik en kwikverbindingen wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.640
  - number: 4.640.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregelen, bedoeld in [4.638, derde lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.640
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.54'
  - number: 4.641.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden de temperatuur en het zuurstofgehalte in de
      naverbrandingsruimte continu gemeten en geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.641
  - number: 4.641.2
    text: |-
      Uiterlijk zes maanden nadat de crematieoven voor het eerst wordt gebruikt en daarna jaarlijks wordt de oven
      gecontroleerd door een onderneming met een certificaat voor de Deelregeling voor inspectie en onderhoud van
      stookinstallaties, onderdeel van de Certificatieregeling voor het kwaliteitsmanagementsysteem ten behoeve van
      het uitvoeren van onderhoud en inspecties aan technische installaties, van de stichting SCIOS, verstrekt door een
      certificatie-instantie met een accreditatie volgens ISO/IEC 17021-1 voor die Deelregeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.641
  - number: 4.641.3
    text: 'In het crematorium is een logboek of systeem aanwezig waarin de volgende gegevens worden vastgelegd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.641
  - number: 4.641.3.a
    text: de onderhoudsresultaten en controleresultaten en de meetwaarden, bedoeld in het eerste en tweede lid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.641
  - number: 4.641.3.b
    text: |-
      de opgetreden storingen of andere onregelmatigheden die van invloed kunnen zijn op de luchtemissie, onder
      vermelding van de datum, het tijdstip en de aard van de storing en de getroffen acties om de storing ongedaan te
      maken en voor de toekomst te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.641
  - number: 4.642.1
    text: |-
      Voor de emissie in de lucht bij het exploiteren van een crematieoven voor dieren is de emissiegrenswaarde van
      totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.642
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: totaal_stof_mg_per_nm3
            type: number
            required: true
            description: Concentratie totaal stof in mg/Nm3
            source: {}
        output:
          - name: voldoet_emissiegrenswaarde_stof_crematorium
            type: boolean
            description: Of de stofemissie bij het crematorium voldoet aan de grenswaarde
        actions:
          - output: voldoet_emissiegrenswaarde_stof_crematorium
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totaal_stof_mg_per_nm3
              value: 5
  - number: 4.642.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.642
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: totaal_stof_kg_per_jaar
            type: number
            required: true
            description: Jaarlijkse emissie van totaal stof in kg/jaar
            source: {}
        output:
          - name: vrijstelling_emissiegrenswaarde_stof
            type: boolean
            description: Of de emissiegrenswaarde voor totaal stof niet van toepassing is vanwege lage jaaremissie
        actions:
          - output: vrijstelling_emissiegrenswaarde_stof
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totaal_stof_kg_per_jaar
              value: 100
  - number: 4.642.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de emissies door een geschikte filtrerende afscheider worden
      gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.642
  - number: 4.643.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.643
  - number: 4.643.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.643
  - number: 4.644.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.644
  - number: 4.644.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [4.642, derde lid][ref1], wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.644
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.54'
  - number: 4.645.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.645
  - number: 4.645.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.645
  - number: 4.645.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.645
  - number: 4.645.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.643][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.645
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.54'
  - number: '4.646'
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt het afgevangen stof uit de filtrerende afscheider
      afgegeven aan een daarvoor erkende inzamelaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.646
  - number: '4.647'
    text: 'Deze paragraaf is van toepassing op het exploiteren van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.647
  - number: 4.647.a
    text: een laboratorium; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.647
  - number: 4.647.b
    text: een praktijkruimte waar practica worden verricht voor middelbaar en hoger onderwijs.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.647
  - number: 4.648.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.647][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: 4.648.2
    text: 'Als wordt gewerkt met een biologisch agens, bevat een melding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
  - number: 4.648.2.a
    text: |-
      informatie over de groep waarin het biologisch agens is of wordt ingedeeld als gevolg van de indeling in
      risicogroepen van de richtlijn biologische agentia;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
  - number: 4.648.2.b
    text: |-
      een aanduiding of het gaat om een biologisch agens dat als ziekteverwekker is aangewezen op grond van
      [artikel 2.22, tweede lid, van de Wet dieren][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0030250#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
    references:
      - id: ref1
        bwb_id: BWBR0030250
        artikel: '2'
  - number: 4.648.2.c
    text: de ligging van de ruimten waar wordt gewerkt met het biologisch agens.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
  - number: 4.648.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
  - number: 4.648.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.648
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.649'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.647][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.649
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: 4.649.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.649
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.649.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.649
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.650'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met alcohol en zuren bevindt een laboratorium of een
      praktijkruimte zich boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.650
  - number: 4.651.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het exploiteren van
      een laboratorium of een praktijkruimte geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.651
  - number: 4.651.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.651
  - number: 4.652.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam en de doelmatige
      werking van de voorzieningen voor het beheer van afvalwater:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: 4.652.1.a
    text: is er een werkinstructie over het voorkomen van verontreiniging van afvalwater opgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: 4.652.1.b
    text: zijn voorzieningen aanwezig die zijn afgestemd op de werkzaamheden die worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: 4.652.2
    text: 'In de werkinstructie is in ieder geval beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: 4.652.2.a
    text: wat de afvalwaterstromen zijn en of ze wel of niet kunnen worden geloosd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: 4.652.2.b
    text: welke werkwijze wordt gevolgd en welke maatregelen worden getroffen om het lozen van stoffen te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.652
  - number: '4.653'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.653
  - number: 4.653.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.653
  - number: 4.653.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.653
  - number: 4.653.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.653
  - number: '4.654'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.654
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '4.655'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.655
  - number: 4.656.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.656, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.656
  - number: 4.656.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.656, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.656
  - number: 4.656.3
    text: |-
      Aan het eerste lid wordt voor stoffen die vrijkomen bij laboratoriumproeven met stoffen, ingedeeld in totaal
      stof en in de klassen sA.1, sA.2 en sA.3, in ieder geval voldaan als de emissies door een geschikte filtrerende
      afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.656
  - number: 4.656.4
    text: |-
      Aan het eerste lid wordt voor stoffen die vrijkomen bij laboratoriumproeven met waterstofchloride,
      waterstoffluoride, ammoniak en stoffen, ingedeeld in de klassen gA.1, gA.2 en gA.3, in ieder geval voldaan als de
      emissies door een geschikte gaswasser, een geschikt aerosolfilter of een geschikt mistfilter worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.656
  - number: 4.656.5
    text: |-
      Aan het eerste lid wordt voor stoffen die vrijkomen bij laboratoriumproeven met stoffen, ingedeeld in de klassen
      gO.1 en gO.2, in ieder geval voldaan als de emissies door een geschikt adsorptiefilter worden gevoerd.
