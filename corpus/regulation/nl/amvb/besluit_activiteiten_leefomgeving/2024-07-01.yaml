    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
  - number: 2.13.3.b
    text: grotere kostenbesparingen kan opleveren dan de voor die activiteit bestaande beste beschikbare technieken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
  - number: 2.13.4
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in [hoofdstuk 3][ref1] kan worden verbonden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
