  - number: '4.249'
    text: Met het oog op het beschermen van het milieu worden geen perfluoroctaansulfonaten gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.249
  - number: 4.250.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden metalen geëtst en gebeitst boven een
      aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.250
  - number: 4.250.2
    text: |-
      Een dompelbad dat zich automatisch vult, heeft een automatisch afslagmechanisme dat afslaat als het dompelbad vol
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.250
  - number: 4.251.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van etsen en beitsen van
      metalen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.251
  - number: 4.251.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.251
  - number: 4.252.1
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, zijn de emissiegrenswaarden de waarden, bedoeld in
      tabel 4.252, gemeten in een steekmonster of in een etmaalmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.252
  - number: 4.252.2
    text: |-
      De som van de vrachten, bedoeld in tabel 4.252, is de som van de vrachten van de metalen chroom, koper, nikkel,
      lood, zink, tin en zilver in het afvalwater, gemeten na het etsen of beitsen van metalen, maar voordat het
      afvalwater een zuiveringsstap heeft doorlopen.
