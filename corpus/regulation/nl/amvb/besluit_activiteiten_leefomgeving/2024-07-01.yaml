    text: Ten minste vier weken voordat de begrenzing wijzigt, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.110
  - number: 3.111.1
    text: |-
