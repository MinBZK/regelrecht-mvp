  - number: 5.39.1
    text: |-
      Deze paragraaf is van toepassing op milieubelastende activiteiten als bedoeld in [bijlage VIII][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.39.2
    text: |-
      Deze paragraaf is niet van toepassing op activiteiten waarvoor het omgevingsplan of een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit waarborgt dat het langtijdgemiddelde beoordelingsniveau L van het geluid
      op een afstand van 50 m vanaf de begrenzing van de locatie waar de activiteit wordt verricht, niet meer bedraagt
      dan 50 dB(A) over de periode van 07.00 tot 19.00 uur, 45 dB(A) over de periode van 19.00 tot 23.00 uur en 40 dB(A)
      over de periode van 23.00 tot 07.00 uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.39
  - number: '5.40'
    text: |-
      De activiteit wordt niet verricht buiten een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden
      zijn vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.40
  - number: '5.41'
    text: |-
      [Artikel 5.40][ref1] is niet van toepassing op een activiteit die wordt verricht op een op
      het tijdstip van inwerkingtreding van dit besluit aanwezig industrieterrein als bedoeld in
      [artikel 1 van de Wet geluidhinder][ref2], totdat rondom dat industrieterrein op grond van
      [artikel 2.11a van de wet][ref3] bij omgevingsplan als omgevingswaarden geluidproductieplafonds zijn
      vastgesteld, of op grond van [artikel 2.12a, eerste lid, van de wet][ref4] bij besluit als omgevingswaarden
      geluidproductieplafonds zijn vastgesteld, en dat besluit in werking is getreden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0003227#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.41
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.5
        afdeling: '5.4'
