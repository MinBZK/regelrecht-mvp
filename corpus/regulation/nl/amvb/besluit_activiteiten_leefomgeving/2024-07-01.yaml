    text: |-
      Bij een spoedreparatie van vitale ondergrondse infrastructuur worden aan het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref1], onverwijld na beëindiging van de activiteit gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1228
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1228.a
    text: de begrenzing van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1228
  - number: 4.1228.b
    text: de data waarop de activiteit is verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1228
  - number: 4.1228.c
    text: de aanleiding en het doel van de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1228
  - number: 4.1229.1
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1224][ref1], wordt voldaan aan de regels over
      voorafgaand bodemonderzoek, bedoeld in [paragraaf 5.2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1229
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
  - number: 4.1229.2
    text: |-
      Het eerste lid is niet van toepassing op het graven in de bodem in verband met een spoedreparatie van vitale
      ondergrondse infrastructuur. In dat geval is [artikel 4.1228][ref1] van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1229
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
  - number: 4.1230.1
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het
      doelmatig beheer van afvalstoffen worden bij het graven, het opslaan en het afvoeren of terugplaatsen
      van grond, partijen grond van verschillende kwaliteitsklassen, waarin de partijen op grond van
      [artikel 25d van het Besluit bodemkwaliteit][ref1] zijn ingedeeld, gescheiden gehouden.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1230.2
    text: |-
      Het gescheiden houden gebeurt door matig verontreinigde of sterk verontreinigde grond als bedoeld in
      [artikel 25d van het Besluit bodemkwaliteit][ref1] die vrijkomt bij het graven op te delen in partijen volgens de
      volgende criteria:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1230.2.a
    text: apart houden van verschillende grondsoorten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230
  - number: 4.1230.2.b
    text: |-
      apart houden van partijen met een gewogen gehalte asbest onder de interventiewaarde bodemkwaliteit en partijen met
      een gewogen gehalte asbest boven de interventiewaarde bodemkwaliteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230
  - number: 4.1230.2.c
    text: |-
      apart houden van partijen die uitsluitend zijn verontreinigd met organische verbindingen tot boven de maximale
      waarde van de kwaliteitsklasse industrie, bedoeld in [artikel 25d van dat besluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1230a.1
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt na het tijdelijk uitnemen van grond, die grond teruggebracht in hetzelfde
      ontgravingsprofiel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230a
  - number: 4.1230a.2
    text: |-
      Grond wordt na het tijdelijk uitnemen niet teruggebracht in de bodem als de grond een bewerking heeft ondergaan
      anders dan het uitzeven van bodemvreemd materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1230a
  - number: 4.1231.1
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt grond die bij het graven is vrijgekomen niet langer dan acht weken na beëindiging van
      het graven in de directe nabijheid van de ontgravingslocatie opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1231
  - number: 4.1231.2
    text: |-
      Gescheiden partijen grond als bedoeld in [artikel 4.1230][ref1] worden gescheiden opgeslagen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1231
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
  - number: '4.1232'
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt het graven uitgevoerd door een onderneming met een erkenning bodemkwaliteit voor BRL
      SIKB 7000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1232
  - number: '4.1233'
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt de activiteit begeleid door een onderneming met een erkenning bodemkwaliteit voor BRL
      SIKB 6000 als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1233
  - number: 4.1233.a
    text: een deel van de verontreinigde grond niet wordt teruggebracht in het ontgravingsprofiel, maar zal worden afgevoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1233
  - number: 4.1233.b
    text: |-
      op de locatie al een afdeklaag in de vorm van een leeflaag of een andere duurzame afdeklaag aanwezig is en de
      ontgraving dieper reikt dan deze laag; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1233
  - number: 4.1233.c
    text: |-
      sprake is van meerdere partijen die overeenkomstig [artikel 4.1230][ref1] gescheiden moeten worden gehouden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1233
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
  - number: '4.1234'
    text: |-
      Ten hoogste een week na het beëindigen van de activiteit, bedoeld in [artikel 4.1224][ref1], worden aan het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1234.a
    text: de datum van de beëindiging van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
  - number: 4.1234.b
    text: |-
      als er sprake is van begeleiding als bedoeld in [artikel 4.1233][ref1]: de resultaten van de milieukundige
      begeleiding met daarbij in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.120'
  - number: 4.1234.b.1°
    text: gegevens over de ontgraving aangeduid op een kaart en op een dwarsprofiel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
  - number: 4.1234.b.2°
    text: de bestemming van grond die niet wordt teruggeplaatst; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
  - number: 4.1234.b.3°
    text: de bijzondere omstandigheden die zich hebben voorgedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1234
  - number: 4.1235.1
    text: Deze paragraaf is van toepassing op het saneren van de bodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1235
  - number: 4.1235.2
    text: |-
      In deze paragraaf wordt verstaan onder: - *baggerspecie:* baggerspecie als bedoeld in
      [artikel 1 van het Besluit bodemkwaliteit][ref1]; en
        - *grond:* grond als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1235
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: '1'
  - number: 4.1236.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 4.1235][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.a
    text: |-
      de onderzoeken, bedoeld in [paragraaf 5.2.2][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.2
        afdeling: '5.2'
  - number: 4.1236.2.b
    text: |-
      de keuze voor een van de saneringsaanpakken, bedoeld in [artikel 4.1241][ref1] of [4.1242][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2.c
    text: |-
      bij een saneringsaanpak als bedoeld in [artikel 4.1241][ref1]: een omschrijving van de saneringsaanpak, waaronder
      in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2.c.1°
    text: |-
      het type afdeklaag, bedoeld in [artikel 4.1241][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2.c.2°
    text: de situering van de afdeklaag aangeduid op een kaart en op een dwarsprofiel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.c.3°
    text: >-
      als grond wordt herschikt: de hoeveelheid grond
      die ten hoogste wordt afgevoerd of herschikt
      in kubieke meters; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.c.4°
    text: 'als grond wordt herschikt: de situering van de herschikte grond op een kaart;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.d
    text: |-
      bij een saneringsaanpak als bedoeld in [artikel 4.1242][ref1]: een omschrijving van de saneringsaanpak, waaronder
      in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2.d.1°
    text: gegevens over de ontgraving aangeduid op een kaart en op een dwarsprofiel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.d.2°
    text: het bodemvolume in kubieke meters waarbinnen de werkzaamheden worden verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.2.d.3°
    text: |-
      de hoeveelheid af te voeren grond per kwaliteitsklasse als bedoeld in
      [artikel 25d van het Besluit bodemkwaliteit][ref1] in kubieke meters; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1236.2.d.4°
    text: |-
      een aanduiding van de waarde voor de bodemfunctieklasse, bedoeld in [artikel 4.1242][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
