        afdeling: '5.2'
  - number: '4.1240'
    text: |-
      Met het oog op het beschermen van de gezondheid en het beschermen van de kwaliteit van de bodem wordt het
      saneren van de bodem uitgevoerd volgens [artikel 4.1241][ref1] of [4.1242][ref2] of met een combinatie van beide
      aanpakken.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1240
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1241.1
    text: Dit artikel is van toepassing bij afdekken als saneringsaanpak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1241.2
    text: Er wordt een afdeklaag aangebracht die blootstelling van mensen aan verontreiniging op of in de bodem voorkomt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1241.3
    text: 'De afdeklaag bestaat uit:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1241.3.a
    text: een duurzaam aaneengesloten verhardingslaag; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1241.3.b
    text: |-
      een laag grond of baggerspecie met een minimale dikte van 1,0 meter met een kwaliteit die volgt uit
      [artikel 4.1272][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1241.4
    text: |-
      Onder een duurzaam aaneengesloten verhardingslaag wordt in ieder geval verstaan een verhardingslaag die bestaat uit
      beton, asfalt, asfaltbeton, betonplaat of bestrating met klinkers of tegels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1241.5
    text: |-
      Verontreinigde grond die is vrijgekomen, wordt alleen herschikt op het gedeelte van de locatie waar een afdeklaag
      wordt aangebracht overeenkomstig dit artikel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1241
  - number: 4.1242.1
    text: Dit artikel is van toepassing bij verwijderen van verontreiniging als saneringsaanpak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1242
  - number: 4.1242.2
    text: |-
      Verontreiniging van de bodem wordt verwijderd door de grond te ontgraven totdat de stof, die boven de
      interventiewaarde bodemkwaliteit of boven de in het omgevingsplan opgenomen waarde voor de toelaatbare kwaliteit
      van de bodem was aangetroffen, niet meer voorkomt in een concentratie hoger dan het niveau van de waarde die gelijk
      is aan de waarde voor de bodemfunctieklasse landbouw/natuur, wonen of industrie waarin de ontvangende landbodem
      volgens [artikel 5.89p van het Besluit kwaliteit leefomgeving][ref1] is ingedeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1242
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1243'
    text: |-
      Met het oog op het beschermen van de gezondheid, het voorkomen van verspreiding van verontreinigde grond, het
      behoud van gebruiksmogelijkheden van grond en de bodem en het doelmatig beheer van afvalstoffen wordt het saneren
      van de bodem verricht door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1243
  - number: '4.1244'
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt de activiteit begeleid door een onderneming met een erkenning bodemkwaliteit voor BRL
      SIKB 6000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1244
  - number: 4.1245.1
    text: |-
      Met het oog op het beschermen van de gezondheid worden bij aanwezigheid van verontreinigingen met vluchtige stoffen
      in de bodem maatregelen getroffen om te voorkomen dat er blootstelling kan plaatsvinden aan uitdamping vanuit die
      verontreiniging naar een bodemgevoelig gebouw op een bodemgevoelige locatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1245
  - number: 4.1245.2
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1245
  - number: 4.1245.2.a
    text: voldoende ventilatievoorzieningen in het gebouw worden aangebracht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1245
  - number: 4.1245.2.b
    text: een dampdichte laag wordt aangebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1245
  - number: 4.1246.1
    text: |-
      Ten hoogste vier weken na het beëindigen van de activiteit, bedoeld in [artikel 4.1235][ref1], worden aan
      het bevoegd gezag, bedoeld in [afdeling 2.2][ref2], gegevens en bescheiden verstrekt in de vorm van een
      evaluatieverslag volgens BRL SIKB 6000 dat in ieder geval de volgende gegevens bevat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1246.1.a
    text: |-
      de resultaten van de milieukundige begeleiding, bestaande uit het onderdeel processturing met daarbij in ieder
      geval een opsomming van bijzondere omstandigheden die zich hebben voorgedaan tijdens het saneren van de bodem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
  - number: 4.1246.1.b
    text: |-
      de resultaten van de milieukundige begeleiding, bestaande uit het onderdeel verificatie van het eindresultaat van
      de saneringsaanpak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
  - number: 4.1246.2
    text: |-
      Bij aanwezigheid van verontreinigingen met vluchtige stoffen in de bodem wordt ook een onderzoek overgelegd
      dat aantoont dat de kwaliteit van de binnenlucht in een bodemgevoelig gebouw op een bodemgevoelige
      locatie met de in [artikel 4.1245, tweede lid][ref1], bedoelde maatregelen voldoet aan de Toxicologische
      Toelaatbare Concentratie in Lucht (TCL) in microgram per kubieke meter lucht zoals opgenomen in
      [bijlage XIIIb bij het Besluit kwaliteit leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 4.1246.3
    text: |-
      Als er sprake is van gebruiksbeperkingen of nazorg worden ook gegevens en bescheiden bij het evaluatieverslag
      verstrekt over:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
  - number: 4.1246.3.a
    text: de gebruiksbeperkingen die wenselijk zijn ter bescherming van de gezondheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
  - number: 4.1246.3.b
    text: |-
      een voorstel voor nazorgmaatregelen als bedoeld in
      [paragraaf 5.1.4.5.2 van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Paragraaf5.1.4.5.2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1246
    references:
      - id: ref1
        bwb_id: BWBR0041313
        paragraaf: 5.1.4.5.2
  - number: 4.1247.1
    text: 'Deze paragraaf is van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1247
  - number: 4.1247.1.a
    text: |-
      het opslaan, zeven en samenvoegen van grond van de kwaliteitsklasse landbouw/natuur, wonen of industrie, bedoeld in
      [artikel 25d van het Besluit bodemkwaliteit][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1247
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1247.1.b
    text: |-
      het opslaan, zeven, mechanisch ontwateren en samenvoegen van baggerspecie van de
      kwaliteitsklasse niet verontreinigd, licht verontreinigd of matig verontreinigd, bedoeld in
      [artikel 25d van het Besluit bodemkwaliteit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1247
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1247.2
    text: |-
      Deze paragraaf is niet van toepassing op het opslaan van ten hoogste 25 m3 grond of baggerspecie door een
      natuurlijke persoon, anders dan in het uitoefenen van zijn beroep of bedrijf, voor een toepassing als bedoeld in
      [artikel 4.1266, vierde lid, onder a.][ref1]


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1247
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1247.3
    text: |-
      In deze paragraaf wordt verstaan onder: - *baggerspecie:* baggerspecie als bedoeld in
      [artikel 1 van het Besluit bodemkwaliteit][ref1];
        - *grond:* grond als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref2]; en
        - *partij:* hoeveelheid materiaal die volgens de bij of krachtens het [Besluit bodemkwaliteit][ref3] gestelde
      regels als partij wordt aangemerkt.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1247
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref3
        bwb_id: BWBR0022929
  - number: 4.1248.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 4.1247][ref1] te verrichten zonder dit ten minste vier
      weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.122'
  - number: 4.1248.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.2.a
    text: |-
      een aanduiding van de kwaliteitsklasse, bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1] van de
      opgeslagen grond;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1248.2.b
    text: |-
      een aanduiding van de kwaliteitsklasse, bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1] van de
      opgeslagen baggerspecie;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1248.2.c
    text: een aanduiding of verschillende partijen grond of verschillende partijen baggerspecie worden samengevoegd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.2.d
    text: 'als partijen worden samengevoegd: of dit gebeurt tot een partij groter dan 25 m3;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.2.e
    text: |-
      als partijen worden samengevoegd: een aanduiding van kwaliteitsklassen van de samen te voegen partijen, waarin de
      partijen op grond van [artikel 25d van het Besluit bodemkwaliteit][ref1] zijn ingedeeld;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1248.2.f
    text: 'als op een oppervlaktewaterlichaam wordt geloosd: de locaties van de lozingspunten; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.2.g
    text: 'als op een oppervlaktewaterlichaam wordt geloosd: het maximale lozingsdebiet in kubieke meters per uur.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.4
    text: |-
      In afwijking van het eerste en derde lid geldt een termijn van een week als de activiteit het eenmalig opslaan van
      één partij grond of één partij baggerspecie is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
  - number: 4.1248.5
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1248
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1249'
    text: |-
      Met het oog op het doelmatig beheer van afvalstoffen en het voorkomen of beperken van verontreiniging van een
      oppervlaktewaterlichaam wordt een administratie bijgehouden van de opgeslagen partijen grond of opgeslagen partijen
      baggerspecie, met daarin per partij geregistreerd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1249.a
    text: de herkomst;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1249.b
    text: |-
      de kwaliteitsklasse, bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1249.c
    text: de kwaliteitsverklaringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1249.d
    text: de plaats van opslag;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1249.e
    text: de hoeveelheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1249.f
    text: de aanvangsdatum van de opslag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1249
  - number: 4.1250.1
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1247][ref1], wordt voldaan aan de regels over
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref2], als het gaat om het opslaan van grond van de
      kwaliteitsklasse wonen of industrie of baggerspecie van de kwaliteitsklasse licht verontreinigd of matig
      verontreinigd, bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
      [ref3]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1250
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.122'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref3
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1250.2
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1250
  - number: 4.1250.2.a
    text: de activiteit het eenmalig opslaan van één partij grond of één partij baggerspecie is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1250
  - number: 4.1250.2.b
    text: |-
      voorafgaand aan het opslaan de kwaliteitsklasse van de bodem op de plaats van opslaan is vastgesteld
      in een milieuverklaring bodemkwaliteit die is opgesteld overeenkomstig de bepalingen in het
      [Besluit bodemkwaliteit][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1250
    references:
      - id: ref1
        bwb_id: BWBR0022929
  - number: 4.1250.2.c
    text: |-
      de grond of baggerspecie volgens [artikel 4.1272][ref1] op de plaats van opslaan mag worden toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1250
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1251.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het opslaan, zeven
      of mechanisch ontwateren van baggerspecie van de kwaliteitsklasse licht verontreinigd of matig verontreinigd,
      bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1], geloosd op een oppervlaktewaterlichaam.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1251
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1251.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd op een oppervlaktewaterlichaam of via die
      andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1251
  - number: '4.1252'
    text: |-
      Voor afvalwater dat wordt geloosd op een oppervlaktewaterlichaam zijn de emissiegrenswaarden de waarden, bedoeld in
      tabel 4.1252, gemeten in een steekmonster.
          Tabel 4.1252 Emissiegrenswaarden


                  *Stof*


                  *Emissiegrenswaarde in mg/l*


                  Onopgeloste stoffen


                  100


                  Chemisch zuurstofverbruik


                  200
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1252
  - number: 4.1253.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1253
  - number: 4.1253.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1253
  - number: 4.1253.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1253
  - number: 4.1253.3.a
    text: 'voor onopgeloste stoffen: NEN-EN 872; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1253
  - number: 4.1253.3.b
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1253
  - number: 4.1254.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of van een oppervlaktewaterlichaam met
      bodembedreigende stoffen wordt baggerspecie van de kwaliteitsklasse licht verontreinigd of matig verontreinigd,
      bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1], opgeslagen in een met folie beklede grondput
      volledig omringd door een dijklichaam:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1254
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1254.1.a
    text: waarvan het binnendijkse volume ten minste gelijk is aan de maximale inhoud van het baggerspeciedepot; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1254
  - number: 4.1254.1.b
    text: dat is bestand tegen krachten die ontstaan bij het opslaan van baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1254
  - number: 4.1254.2
    text: |-
      Folie dat voor een baggerspeciedepot wordt gebruikt, is voor gebruik bij het opslaan van baggerspecie
      gecertificeerd door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor BRL-K519,
      BRL-K537, BRL-K538, BRL-K546 of BRL-K1149.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1254
  - number: 4.1254.3
    text: |-
      Het eerste lid is niet van toepassing als de baggerspecie volgens [artikel 4.1272][ref1] op de plaats van het
      opslaan mag worden toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1254
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1255.1
    text: |-
      Met het oog op het doelmatig beheer van afvalstoffen en het voorkomen van verontreiniging van de bodem of van een
      oppervlaktewaterlichaam worden verschillende partijen grond of partijen baggerspecie niet samengevoegd tot een
      partij die groter is dan 25 m3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.2
    text: 'Het eerste lid is niet van toepassing als de partijen grond of partijen baggerspecie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.2.a
    text: |-
      in dezelfde kwaliteitsklasse als bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1] zijn ingedeeld; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1255.2.b
    text: |-
      zijn gekeurd en samengevoegd overeenkomstig BRL 9335 of BRL 7500, door een onderneming met een erkenning
      bodemkwaliteit hiervoor.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.3
    text: 'Het eerste lid is niet van toepassing als de partijen grond of partijen baggerspecie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.3.a
    text: kleiner zijn dan 100 ton; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.3.b
    text: |-
      zijn samengevoegd overeenkomstig BRL 9335 of BRL 7500, door een onderneming met een erkenning bodemkwaliteit
      hiervoor.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.4
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1255.4.a
    text: |-
      het gaat om grond van kwaliteitsklasse landbouw/natuur of baggerspecie van de kwaliteitsklasse algemeen toepasbaar,
      bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1255.4.b
    text: |-
      de partijen grond of de partijen baggerspecie zijn voorzien van een erkende kwaliteitsverklaring, overeenkomstig
      BRL 9313 of BRL 9321.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1255
  - number: 4.1256.1
    text: |-
      In het belang van het doelmatig beheer van afvalstoffen wordt een partij grond of een partij baggerspecie niet
      langer dan drie jaar opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1256
  - number: 4.1256.2
    text: |-
      In een oppervlaktewaterlichaam wordt in het belang van het doelmatig beheer van afvalstoffen en het voorkomen
      of beperken van verontreiniging van een oppervlaktewaterlichaam een partij grond of een partij baggerspecie niet
      langer dan tien jaar opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1256
  - number: 4.1257.1
    text: Deze paragraaf is van toepassing op het toepassen van bouwstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1257
  - number: 4.1257.2
    text: De regels van deze paragraaf gelden voor het toepassen van partijen afzonderlijk, tenzij anders is bepaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1257
  - number: 4.1257.3
    text: |-
      In deze paragraaf wordt verstaan onder: - *afleverbon:* afleverbon als bedoeld in
      [artikel 1 van het Besluit bodemkwaliteit][ref1];
        - *baggerspecie:* baggerspecie als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref2];
        - *grond:* grond als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref3];
        - *immobilisaat:* vormgegeven bouwstoffen die het product zijn van een methode van verwerking waarbij de
      chemische of fysische eigenschappen van een afvalstof worden gewijzigd met het primaire doel daarin aanwezige
      verontreinigende stoffen vast te leggen;
        - *partij:* hoeveelheid materiaal die volgens de bij of krachtens het [Besluit bodemkwaliteit][ref4] gestelde
      regels als partij wordt aangemerkt; en
        - *werk:* infrastructuur, waaronder bouwwerken, of het resultaat van een andere functionele toepassing van
      bouwstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref4]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1257
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref3
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref4
        bwb_id: BWBR0022929
  - number: 4.1257a
    text: Met een maatwerkvoorschrift wordt de uitvoering van een vastgesteld projectbesluit niet belemmerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1257a
  - number: 4.1258.1
    text: |-
      Als AVI-bodemassen of immobilisaten worden toegepast, worden ten minste vier weken voor het begin van de activiteit
      de volgende gegevens en bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1258.1.a
    text: |-
      de naam en het adres van degene die de werkzaamheden gaat verrichten voor zover het gaat om het in opdracht
      toepassen van bouwstoffen op of in de landbodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.b
    text: de verwachte datum van het begin van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.c
    text: de verwachte datum waarop het werk zal zijn voltooid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.d
    text: een milieuverklaring bodemkwaliteit die betrekking heeft op de toe te passen AVI-bodemassen en immobilisaten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.e
    text: |-
      de gegevens waarop de milieuverklaring bodemkwaliteit is gebaseerd, bedoeld in
      [artikel 25e van het Besluit bodemkwaliteit][ref1], of een verwijzing naar het rapport waarin deze gegevens zijn
      opgenomen;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25e
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25e
  - number: 4.1258.1.f
    text: het nummer en het type milieuverklaring bodemkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.g
    text: de naam van degene die de milieuverklaring bodemkwaliteit heeft afgegeven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.h
    text: de datum van afgifte van de milieuverklaring bodemkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.i
    text: de hoeveelheid bouwstoffen waarop de milieuverklaring bodemkwaliteit betrekking heeft, uitgedrukt in ton;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.j
    text: |-
      het adres van de locatie van herkomst van de AVI-bodemassen en immobilisaten of de kadastrale aanduiding of
      coördinaten van die locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.k
    text: |-
      als de herkomst buiten Nederland is: het nummer dat de bevoegde autoriteit heeft toegekend aan de kennisgeving,
      bedoeld in artikel 4 van [Verordening (EG) nr. 1013/2006](32006R1013) van het Europees Parlement en de Raad van de
      Europese Unie van 14 juni 2006 betreffende de overbrenging van afvalstoffen (PbEU 2006, L 190);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.l
    text: het producttype of de naam van de bouwstof;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.m
    text: de kwaliteit van de AVI-bodemassen en immobilisaten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.n
    text: de hoeveelheid AVI-bodemassen en immobilisaten in kubieke meters die in totaal in het werk zal worden toegepast; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.1.o
    text: |-
      de coördinaten van de ontvangende landbodem, tenzij het adres daarvan is vermeld, of de coördinaten van het
      ontvangende oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1258.2
    text: |-
      Het eerste lid, onder c, j, k, m, n en o, is niet van toepassing als de gegevens en bescheiden al eerder voor het
      werk zijn verstrekt en zich geen relevante wijzigingen hebben voorgedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1258
  - number: 4.1259.1
    text: 'Tijdens het aanbrengen van de bouwstoffen zijn de volgende gegevens en bescheiden beschikbaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.1.a
    text: een milieuverklaring bodemkwaliteit die betrekking heeft op de toe te passen bouwstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.1.b
    text: |-
      als deze op grond van het [Besluit bodemkwaliteit][ref1] bij de afgifte van de milieuverklaring bodemkwaliteit moet
      worden verstrekt: een afleverbon.


      [ref1]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
    references:
      - id: ref1
        bwb_id: BWBR0022929
  - number: 4.1259.2
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.2.a
    text: metselmortel of een natuursteenproduct, met uitzondering van breuksteen en steenslag, wordt toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.2.b
    text: |-
      vormgegeven bouwstoffen zonder verandering van de eigenschappen of samenstelling in ongewijzigde vorm en onder
      dezelfde omstandigheden opnieuw worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.2.c
    text: |-
      asfalt of asfaltbeton, waarvan volgens bij of krachtens het [Besluit bodemkwaliteit][ref1] gestelde regels is
      vastgesteld dat het niet teerhoudend is, opnieuw in dezelfde wegverharding wordt toegepast;


      [ref1]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
    references:
      - id: ref1
        bwb_id: BWBR0022929
  - number: 4.1259.2.d
    text: |-
      bouwstoffen die tijdelijk uit een werk zijn weggenomen, in dat werk op of nabij dezelfde locatie in ongewijzigde
      vorm en onder dezelfde omstandigheden opnieuw worden toegepast zonder dat het eigendom daarvan wordt overgedragen;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.2.e
    text: |-
      bouwstoffen worden toegepast door een natuurlijke persoon, anders dan in het uitoefenen van zijn beroep of bedrijf,
      en de in het werk toegepaste hoeveelheid bouwstoffen in totaal ten hoogste 25 m3 bedraagt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1259.3
    text: |-
      Milieuverklaringen bodemkwaliteit en afleverbonnen worden ten minste vijf jaar na het aanbrengen van de bouwstoffen
      bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1259
  - number: 4.1260.1
    text: |-
      Met het oog op het beschermen van het milieu worden bouwstoffen alleen toegepast voor het aanleggen, in stand
      houden, herstellen, veranderen of uitbreiden van een werk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1260
  - number: 4.1260.2
    text: |-
      Bouwstoffen worden, voor zover de bouwstoffen een afvalstof zijn, alleen toegepast als sprake is van een nuttige
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1260
  - number: 4.1260.3
    text: |-
      In afwijking van het eerste lid worden met het oog op het zuinig gebruik van grondstoffen, het doelmatig beheer
      van afvalstoffen en het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam geen bouwstoffen
      toegepast met het doel:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1260
  - number: 4.1260.3.a
    text: een oppervlaktewaterlichaam te verondiepen of tot landbodem te ontwikkelen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1260
  - number: 4.1260.3.b
    text: |-
      de bodem op te hogen voor het verwezenlijken van bedrijventerreinen, woningbouwlocaties, landbouwgronden,
      natuurgronden, tuinen of recreatieterreinen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1260
  - number: '4.1261'
    text: |-
      Met het oog op het zuinig gebruik van grondstoffen, het doelmatig beheer van afvalstoffen en het voorkomen
      of beperken van verontreiniging van een oppervlaktewaterlichaam worden bouwstoffen niet toegepast in een
      grotere hoeveelheid dan voor het voltooien van het werk volgens gangbare civieltechnische, bouwtechnische,
      milieuhygiënische, ecologische of esthetische maatstaven redelijkerwijs nodig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1261
  - number: 4.1262.1
    text: |-
      Met het oog op het beschermen van de bodem en het voorkomen van verontreiniging van een oppervlaktewaterlichaam
      worden bouwstoffen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1262
  - number: 4.1262.1.a
    text: niet met de bodem vermengd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1262
  - number: 4.1262.1.b
    text: zo toegepast dat ze kunnen worden verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1262
  - number: 4.1262.2
    text: |-
      Bouwstoffen worden verwijderd als het werk waarin ze zijn toegepast buiten gebruik is gesteld, tenzij het
      verwijderen van de bouwstoffen grotere nadelige gevolgen voor de fysieke leefomgeving heeft dan het niet-
      verwijderen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1262
  - number: '4.1263'
    text: |-
      Met het oog op het zuinig gebruik van grondstoffen, het doelmatig beheer van afvalstoffen en het voorkomen of
      beperken van verontreiniging van een oppervlaktewaterlichaam worden geen bouwstoffen toegepast die zijn vermengd
      met meer dan 20 gewichtsprocent grond of baggerspecie, tenzij de grond of baggerspecie als grondstof voor de
      bouwstoffen heeft gediend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1263
  - number: 4.1264.1
    text: |-
      Met het oog op het beschermen van het milieu worden alleen bouwstoffen toegepast die voldoen aan de voor
      bouwstoffen geldende kwaliteitseisen, bedoeld in [artikel 25d, eerste lid, van het Besluit bodemkwaliteit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1264
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1264.2
    text: Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste lid wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1264
  - number: 4.1265.1
    text: |-
      Deze paragraaf is van toepassing op het op of in de bodem of in een oppervlaktewaterlichaam toepassen van grond
      of baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1265
  - number: 4.1265.2
    text: De regels van deze paragraaf gelden voor het toepassen van partijen afzonderlijk, tenzij anders is bepaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1265
  - number: 4.1265.3
    text: |-
      In deze paragraaf wordt verstaan onder: - *afleverbon:* afleverbon als bedoeld in
      [artikel 1 van het Besluit bodemkwaliteit][ref1];
        - *baggerspecie:* baggerspecie als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref2];
        - *aangewezen bodembeheergebied:* bodembeheergebied dat is aangewezen bij ministeriële regeling,
