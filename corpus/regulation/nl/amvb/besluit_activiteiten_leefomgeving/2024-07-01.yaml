      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.212.2
    text: 'Op het verrichten van een eenmalige meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.212.2.a
    text: 'voor totaal stof: is NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.212.2.b
    text: 'voor zware metalen: NEN-EN 14385;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.212.2.c
    text: 'voor individuele gasvormige organische componenten: NPR-CEN/TS 13649;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.212.2.d
    text: 'voor vocht: NEN-EN 14790; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.212.2.e
    text: 'voor debiet: NEN-EN-ISO 16911-1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
  - number: 4.213.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof, bedoeld in [artikel 4.208, eerste lid][ref1], wordt
      voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.213
    references:
