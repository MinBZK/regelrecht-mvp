  - number: 4.288.1
    text: |-
      Deze paragraaf is van toepassing op het spaanloos bewerken, verspanend bewerken, thermisch bewerken en mechanisch
      afwerken van metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.288
  - number: 4.288.2
    text: |-
      Deze paragraaf is niet van toepassing op het smelten en gieten van metalen, bedoeld in [paragraaf 4.12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.288
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.289.1
    text: |-
      Het is verboden een milieubelastende activiteit als bedoeld in [artikel 4.288][ref1] te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.289
    references:
