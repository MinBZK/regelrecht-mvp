  - number: 15.33.2
    text: 'Een badwaterbassin wordt aangevuld met:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.33
  - number: 15.33.2.a
    text: |-
      water dat voldoet aan de kwaliteitseisen voor drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1];
