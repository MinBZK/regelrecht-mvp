  - number: 6.55.1.c.1°
    text: afvalwater afkomstig van een gemeentelijke voorziening voor de inzameling en het transport van afvalwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c.2°
    text: afstromend hemelwater en ander afvalwater afkomstig van een verhard oppervlak;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c.3°
    text: afvalwater afkomstig van het schoonmaken van drinkwaterleidingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c.4°
    text: afvalwater afkomstig van ontwateren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
