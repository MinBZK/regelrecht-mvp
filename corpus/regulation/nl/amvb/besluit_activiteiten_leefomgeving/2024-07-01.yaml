      activiteiten, bedoeld in het eerste lid, functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.111
  - number: 3.111.3
    text: |-
      Onder de aanwijzing valt niet een activiteit als bedoeld in [paragraaf 3.3.7][ref1].


