    text: het graven van slikgruppen om aanwas te bevorderen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.f
    text: |-
      het ontgronden voor het testen van materieel of het verrichten van onderzoek naar winbare hoeveelheden van andere
      vaste stoffen dan schelpen, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.f.1°
    text: |-
      wordt ontgrond op een afstand van ten minste 500 m van een oefen- en schietgebied dat is aangewezen bij
      ministeriële regeling, buisleidingen, kabels, oevers, andere vaste werken of objecten of bekende of te verwachten
      archeologische monumenten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.f.2°
    text: niet meer dan vijf reizen worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: 6.28.f.3°
    text: |-
      de hoeveelheid vaste stoffen die wordt ontgrond niet meer is dan 5.000 m3, in de Eems, de Dollard, het IJsselmeer,
      het Markermeer met inbegrip van het Oostvaardersdiep, het Ketelmeer, het Keteldiep, de Haringvliet, het Hollandsch
      Diep, het Grevelingenmeer, de Krammer, de Volkerak, het Zoommeer, de Oosterschelde en de Westerschelde, of 2.500 m3
      in een ander oppervlaktewaterlichaam in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.28
  - number: '6.29'
    text: |-
