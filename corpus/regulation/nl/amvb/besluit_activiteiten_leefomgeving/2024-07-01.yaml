  - number: 19.1.2
    text: |-
      Onverminderd de bij dit besluit voor een milieubelastende activiteit gestelde regels zijn op de productie van
      suspensie-PVC (s-PVC) uit vinylchloride-monomeer (VCM) de emissiegrenswaarden voor VCM in de lucht, bedoeld in
      Ospar-besluit 98/5 inzake de grenswaarden voor emissie en lozing voor de vinylchloridesector bij de productie van
      suspensie-PVC (s-PVC) uit vinylchloride-monomeer (VCM) (OSPAR 98/14/1 para B-8.2 en annex 40), van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1
  - number: 19.1a
    text: |-
      Deze paragraaf gaat over het produceren, leveren, opslaan, distribueren en gebruiken van stedelijk afvalwater dat
      is gezuiverd in overeenstemming met de Richtlijn stedelijk afvalwater voor landbouwirrigatie als bedoeld in artikel
      2, eerste lid, van de verordening hergebruik stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1a
  - number: 19.1b
    text: De regels in deze paragraaf zijn gesteld ter uitvoering van de verordening hergebruik stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1b
  - number: 19.1c.1
    text: |-
      De vergunningplicht voor het produceren en leveren van teruggewonnen water, bedoeld in artikel 6,
      eerste lid, van de verordening hergebruik stedelijk afvalwater, geldt als het verbod, bedoeld in
      [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een milieubelastende activiteit te
      verrichten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 19.1c.2
    text: |-
      In de omgevingsverordening kan worden bepaald dat geen omgevingsvergunning is vereist in gevallen als bedoeld in
      artikel 2, derde lid, van de verordening hergebruik stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1c
  - number: 19.1d.1
    text: |-
      Het is verboden te handelen in strijd met de artikelen 2, derde lid, laatste zin, 4, eerste en tweede lid, 5,
      tweede lid, 6, eerste en tweede lid, en 7, derde en vierde lid, van de verordening hergebruik stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1d
  - number: 19.1d.2
    text: |-
      Het is verboden water voor landbouwirrigatie te hergebruiken als bedoeld in artikel 2, tweede lid, van de
      verordening hergebruik stedelijk afvalwater in bij ministeriële regeling aangewezen stroomgebiedsdistricten of
      delen daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1d
  - number: 19.1d.3
    text: |-
      Het is verboden teruggewonnen water op te slaan, te distribueren of te gebruiken in strijd met het risicobeheerplan
      voor hergebruik van water, bedoeld in artikel 5, van de verordening hergebruik stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.1d
  - number: '19.2'
    text: |-
      De artikelen van dit besluit treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.2
  - number: '19.3'
    text: 'Dit besluit wordt aangehaald als: Besluit activiteiten leefomgeving.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel19.3
