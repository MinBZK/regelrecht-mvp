      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.905.4.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.905
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.905.5
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, aanhef en onder b, en derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.905
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.906'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.905, derde lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.906
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.92'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.907'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.902][ref1], voldaan aan PGS 9.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.907
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.92'
  - number: 4.908.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt een opslagtank gevuld tot ten hoogste 90% van de inhoud of
      tot de vullingsgraad die op of bij de opslagtank is aangegeven en niet mag worden overschreden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.908
  - number: 4.908.2
    text: Een buiten gebruik gestelde opslagtank wordt drukvrij en gasvrij gemaakt door een deskundig persoon.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.908
  - number: 4.909.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt binnen vier weken na het drukvrij en gasvrij maken van de
      opslagtank daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.909
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.909.2
    text: |-
      Binnen de termijn, bedoeld in het eerste lid, worden aan het bevoegd gezag gegevens en bescheiden verstrekt over
      het drukvrij en gasvrij maken van de opslagtank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.909
  - number: 4.909a
    text: |-
      De [artikelen 4.905, eerste lid, aanhef en onder a][ref1], en [4.906][ref2] zijn niet van toepassing op het opslaan
      van zuurstof, stikstof, argon, kooldioxide, helium of lachgas in een opslagtank dat voor de inwerkingtreding van
      dit besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit
      zoals deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.909a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.92'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.92'
  - number: 4.910.1
    text: |-
      Deze paragraaf is van toepassing op het opslaan van vloeibare gevaarlijke stoffen van ADR-klasse 3 in een
      bovengrondse opslagtank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.910
  - number: 4.910.2
    text: |-
      Deze paragraaf is niet van toepassing op het opslaan van gasolie, diesel of huisbrandolie met een vlampunt van 55
      °C of hoger.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.910
  - number: 4.911.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.910][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.911.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
  - number: 4.911.2.a
    text: |-
      de coördinaten van het vulpunt van een bovengrondse opslagtank waarin polyesterhars wordt opgeslagen en de
      opstelplaats van de tankwagens voor het vullen en legen van de opslagtank; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
  - number: 4.911.2.b
    text: een aanduiding van de stoffen die worden opgeslagen en de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
  - number: 4.911.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
  - number: 4.911.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.911
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.912.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in
      [artikel 4.916, eerste of tweede lid][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.912.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.912.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
  - number: 4.912.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
  - number: 4.912.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
  - number: 4.912.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.912
  - number: '4.913'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.910][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.913
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.913.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.913
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.913.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.913
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.914.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het vulpunt van een bovengrondse opslagtank
      waarin polyesterhars wordt opgeslagen en de opstelplaats van de tankwagens voor het vullen en legen van de
      opslagtank:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, ten minste 20 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.914.1.b
    text: |-
      tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die op grond
      van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten,
      ten minste de afstand, bedoeld onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      niet de activiteit, bedoeld in [artikel 4.910][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.914.2
    text: |-
      Het eerste lid, aanhef en onder b, is van overeenkomstige toepassing als inachtneming van de afstand, bedoeld in
      het eerste lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.c
    text: de bedrijfsvoering ernstig belemmert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.2.d
    text: ertoe leidt dat niet kan worden voldaan aan de interne afstanden die zijn vastgelegd in PGS 31.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.3
    text: |-
      Het eerste lid, aanhef en onder b, en tweede lid zijn niet van toepassing op beperkt kwetsbare en kwetsbare
      gebouwen en beperkt kwetsbare en kwetsbare locaties:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
  - number: 4.914.3.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.914.3.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.914.4
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, aanhef en onder b, en tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.914
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.915'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.914, tweede lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.915
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.916.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.910][ref1], voldaan aan PGS 30, als het gaat om het opslaan van vloeibare brandstoffen, met uitzondering
      van benzine.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.916
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.916.2
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.910][ref1], wordt voldaan aan PGS 31, als het gaat om
      het opslaan van benzine of andere vloeibare gevaarlijke stoffen dan vloeibare brandstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.916
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.917.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden een bovengrondse opslagtank en de daarop aangesloten
      leidingen geïnstalleerd, onderhouden en gerepareerd door een onderneming met een certificaat voor BRL SIKB 7800,
      verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.917
  - number: 4.917.2
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een bovengrondse opslagtank en de
      daarop aangesloten leidingen geïnstalleerd, onderhouden en gerepareerd door een onderneming met een erkenning
      bodemkwaliteit voor BRL SIKB 7800, als die opslagtank gedeeltelijk in de bodem of een terp ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.917
  - number: 4.917.3
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden ondergrondse leidingen geïnstalleerd,
      onderhouden en gerepareerd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.917
  - number: 4.918.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt de bovengrondse opslagtank zich boven of in
      een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.918
  - number: 4.918.2
    text: |-
      Het eerste lid is niet van toepassing als de bovengrondse opslagtank dubbelwandig is uitgevoerd met een
      elektronisch lekdetectiesysteem of lekdetectiepotsysteem dat is aangelegd door een onderneming met een certificaat
      voor BRL SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065
      voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.918
  - number: 4.918.3
    text: |-
      Een elektronisch lekdetectiesysteem wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een
      onderneming met een certificaat voor BRL SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie
      volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.918
  - number: 4.918.4
    text: |-
      Een lekdetectiepotsysteem wordt ten minste eenmaal per maand gecontroleerd. Bij het constateren van een gebrek
      wordt het systeem binnen vier weken hersteld. Van de verrichte controles wordt ten minste eenmaal per jaar een
      aantekening gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.918
  - number: 4.918.5
    text: De resultaten van beoordelingen en de aantekeningen van controles worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.918
  - number: '4.919'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt het aansluitpunt van een vulleiding of
      leegzuigleiding van een bovengrondse opslagtank zich:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.919
  - number: 4.919.a
    text: boven een vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.919
  - number: 4.919.b
    text: boven of in een vulpuntmorsbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.919
  - number: 4.919a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.919, onder a][ref1], niet aangesloten op het vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.919a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.920.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt de kathodische bescherming op een ondergrondse
      leiding van staal ten minste eenmaal per jaar beoordeeld en goedgekeurd door een inspectie-instantie met een
      accreditatie volgens NEN-EN-ISO/IEC 17020 voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.920
  - number: 4.920.2
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.920
  - number: 4.925.1
    text: |-
      [Artikel 4.914, eerste lid][ref1], is niet van toepassing op opslagtanks die zijn geïnstalleerd voor 1 januari
      2013.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.925
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: 4.925.2
    text: |-
      De [artikelen 4.914, eerste lid, aanhef en onder a][ref1], en [4.915][ref2] zijn niet van toepassing op het opslaan
      van vloeibare gevaarlijke stoffen van ADR-klasse 3 in een bovengrondse opslagtank dat voor de inwerkingtreding van
      dit besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit
      zoals deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.925
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.93'
  - number: '4.926'
    text: 'Deze paragraaf is van toepassing op het opslaan in een bovengrondse opslagtank van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.926.a
    text: gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.926.b
    text: vloeistoffen van ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.926.c
    text: vloeistoffen van ADR-klasse 8, verpakkingsgroep II of III;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.926.d
    text: vloeistoffen van ADR-klasse 9, die het aquatisch milieu verontreinigen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.926.e
    text: oliën of vetten die niet van ADR-klasse 3 zijn of pekel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.926
  - number: 4.927.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.926][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.927
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.927.2
    text: |-
      Een melding bevat een aanduiding van de stoffen die worden opgeslagen en de hoeveelheid die ten hoogste wordt
      opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.927
  - number: 4.927.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.927
  - number: 4.927.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.927
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.928'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.926][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.928
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.928.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.928
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.928.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.928
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.929.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een bovengrondse opslagtank en de daarop
      aangesloten leidingen geïnstalleerd, onderhouden en gerepareerd door een onderneming met een certificaat voor BRL
      SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die
      BRL, als op die opslagtank een ondergrondse leiding is aangesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.929
  - number: 4.929.2
    text: |-
      Een bovengrondse opslagtank en de daarop aangesloten leidingen worden geïnstalleerd, onderhouden en gerepareerd
      door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800, als die opslagtank gedeeltelijk in de
      bodem of een terp ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.929
  - number: 4.929.3
    text: |-
      Ondergrondse leidingen worden geïnstalleerd, onderhouden en gerepareerd door een onderneming met een erkenning
      bodemkwaliteit voor BRL SIKB 7800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.929
  - number: 4.930.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt de bovengrondse opslagtank zich boven of in
      een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.930
  - number: 4.930.2
    text: |-
      Het eerste lid is niet van toepassing als de bovengrondse opslagtank dubbelwandig is uitgevoerd met een
      elektronisch lekdetectiesysteem of lekdetectiepotsysteem dat is aangelegd door een onderneming met een certificaat
      voor BRL SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065
      voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.930
  - number: 4.930.3
    text: |-
      Een elektronisch lekdetectiesysteem wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een
      onderneming met een certificaat voor BRL SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie
      volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.930
  - number: 4.930.4
    text: |-
      Een lekdetectiepotsysteem wordt ten minste eenmaal per maand gecontroleerd. Bij het constateren van een gebrek
      wordt het systeem binnen vier weken hersteld. Van de verrichte controles wordt ten minste eenmaal per jaar een
      aantekening gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.930
  - number: 4.930.5
    text: De resultaten van beoordelingen en de aantekeningen van controles worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.930
  - number: 4.931.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt het aansluitpunt van een vulleiding of
      leegzuigleiding van een bovengrondse opslagtank zich:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931
  - number: 4.931.1.a
    text: boven een vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931
  - number: 4.931.1.b
    text: |-
      boven of in een vulpuntmorsbak die een inhoud heeft van ten minste 5 l als die op de opslagtank is geplaatst of ten
      minste 65 l in andere gevallen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931
  - number: 4.931.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht
      vanaf de aansluiting tot aan de slibvangput en olieafscheider, als in de bovengrondse opslagtank gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, oliën of vetten worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931
  - number: 4.931.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarde voor olie, bedoeld in
      [artikel 4.941][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.931a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.931, eerste lid, onder a][ref1], niet aangesloten op het vuilwaterriool,
      als in de bovengrondse opslagtank vloeistoffen worden opgeslagen van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.931a.a
    text: ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931a
  - number: 4.931a.b
    text: ADR-klasse 8, verpakkingsgroep II of III; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931a
  - number: 4.931a.c
    text: ADR-klasse 9, die het aquatisch milieu verontreinigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.931a
  - number: 4.932.1
    text: Met voorzieningen en maatregelen is gewaarborgd dat overvullen van een bovengrondse opslagtank niet mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.932.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als bij het vullen van een bovengrondse opslagtank vanuit een
      tankwagen gebruik wordt gemaakt van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.932.2.a
    text: |-
      een vulpistool met een automatisch afslagmechanisme dat ervoor zorgt dat het vullen stopt als de opslagtank vol is
      of als het vulpistool valt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.932.2.b
    text: |-
      een aangekoppelde slang met een vaste aansluiting en een automatisch afslagmechanisme dat ervoor zorgt dat het
      vullen stopt als de opslagtank vol is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.932.3
    text: 'Aan het eerste lid wordt in ieder geval ook voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.932.3.a
    text: |-
      wordt voldaan aan [artikel 4.929, eerste en tweede lid][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.932.3.b
    text: |-
      als de opslagtank een overvulbeveiliging heeft die is geïnstalleerd door een onderneming met een certificaat voor
      BRL SIKB 7800, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor
      die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.932
  - number: 4.933.1
    text: |-
      Voorkomen wordt dat een bovengrondse opslagtank kan leegstromen bij een breuk in een leiding of het falen van de
      installatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.933
  - number: 4.933.2
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als wordt voldaan aan [artikel 4.929, eerste en tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.933
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.94'
  - number: 4.934.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt de kathodische bescherming op een ondergrondse
      leiding van staal ten minste eenmaal per jaar beoordeeld en goedgekeurd door een inspectie-instantie met een
      accreditatie volgens NEN-EN-ISO/IEC 17020 voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.934
  - number: 4.934.2
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.934
  - number: 4.938.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een bovengrondse opslagtank en de daarop
      aangesloten leidingen beoordeeld en goedgekeurd door een onderneming met een certificaat voor BRL SIKB 7800,
      verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL, als op
      die opslagtank een ondergrondse leiding is aangesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.938
  - number: 4.938.2
    text: |-
      Een bovengrondse opslagtank en de daarop aangesloten leidingen worden beoordeeld en goedgekeurd door een inspectie-
      instantie met een erkenning bodemkwaliteit voor AS SIKB 6800, als de opslagtank gedeeltelijk in de bodem of een
      terp ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.938
  - number: 4.938.3
    text: |-
      Ondergrondse leidingen worden beoordeeld en goedgekeurd door een inspectie-instantie met een erkenning
      bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.938
  - number: 4.938.4
    text: |-
      De keuringen vinden plaats volgens de termijnen, bedoeld in tabel 4.938. Voor leidingen als bedoeld in het derde
      lid gelden de termijnen die van toepassing zijn op de bovengrondse opslagtank waarop deze zijn aangesloten.
