  - number: 4.472.1
    text: Deze paragraaf is van toepassing op het tanken van voertuigen of werktuigen met LPG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472
  - number: 4.472.2
    text: |-
      Als voertuigen of werktuigen met LPG worden getankt, is deze paragraaf ook van toepassing op het daarnaast opslaan
      van LPG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472
  - number: 4.472a.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.472][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.35'
  - number: 4.472a.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.a
    text: |-
      het aantal opslagtanks voor LPG dat aanwezig is op de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1],
      wordt verricht;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.472a.2.b
    text: 'de coördinaten van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.b.1°
    text: het vulpunt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.b.2°
    text: de bovengrondse vloeistofvoerende leiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.b.3°
    text: de aansluitpunten van die leiding en pomp;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.b.4°
    text: de bovengrondse opslagtank; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.b.5°
    text: de tankzuil;
