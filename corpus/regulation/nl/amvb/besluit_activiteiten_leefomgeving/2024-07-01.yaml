    text: |-
      Het eerste lid is niet van toepassing als bij de koude regeneratie van zand voor het gieten van metalen de
      maatregel, bedoeld in [artikel 4.208, derde lid][ref1], wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
