        afdeling: '15.3'
  - number: 15.7.3
    text: |-
      Een maatwerkvoorschrift kan worden gesteld met het oog op de belangen, bedoeld in [artikel 15.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: '15.8'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.8
  - number: 15.8.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.8
  - number: 15.8.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.8
  - number: 15.8.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.8
  - number: 15.8.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.8
  - number: '15.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [artikel 15.3][ref1], worden die
      ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.9.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.9
  - number: 15.9.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.9
  - number: 15.9.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.9
  - number: 15.9.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.9
  - number: 15.10.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 15.8][ref1] en [15.9][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in [artikel 15.3][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.10.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in [artikel 15.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: '15.11'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 15.3][ref1], wordt onverwijld geïnformeerd over een ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: '15.12'
    text: |-
      Deze paragraaf is van toepassing op het gelegenheid bieden tot zwemmen of baden in een badwaterbassin waarin het
      water wordt gedesinfecteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.12
  - number: '15.13'
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 15.12][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
  - number: '15.14'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 15.12][ref1], wordt voldaan aan de regels over de
      risicoanalyse, het beheersplan en het registreren van incidenten, bedoeld in [afdeling 15.3][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.15.1
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit wordt een badwaterbassin gevuld met water dat voldoet aan de
      kwaliteitseisen voor drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0030111
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.15
    references:
      - id: ref1
        bwb_id: BWBR0030111
  - number: 15.15.2
    text: 'Een badwaterbassin wordt aangevuld met:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.15
  - number: 15.15.2.a
    text: |-
      water dat voldoet aan de kwaliteitseisen voor drinkwater, bedoeld in [bijlage A bij het Drinkwaterbesluit][ref1];
      of


      [ref1]: https://wetten.overheid.nl/BWBR0030111
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.15
    references:
      - id: ref1
        bwb_id: BWBR0030111
  - number: 15.15.2.b
    text: |-
      water dat voldoet aan de kwaliteitseisen, bedoeld in [artikel 15.16][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
  - number: 15.16.1
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit in een gevuld badwaterbassin worden maatregelen getroffen om te
      voldoen aan de kwaliteitseisen, bedoeld in tabel 15.16.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.16
  - number: 15.16.2
    text: 'In afwijking van het eerste lid is de kwaliteitseis:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.16
  - number: 15.16.2.a
    text: |-
      voor ureum in een badwaterbassin met een zoutgehalte hoger dan 14 g/l een toename van ten hoogste 2,0 mg/l ten
      opzichte van de concentratie die is gemeten direct na het vullen van het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.16
  - number: 15.16.2.b
    text: voor kaliumpermanganaatverbruik niet van toepassing in een badwaterbassin met een zoutgehalte hoger dan 14 g/l.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.16
  - number: 15.16.3
    text: Aan het water wordt geen cyanuurzuur toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.16
  - number: 15.16.4
    text: |-
      Bij gebruik van ozon voor de waterbehandeling wordt voorkomen dat ozon in het badwaterbassin terechtkomt.
            Tabel 15.16 Kwaliteitseisen water


