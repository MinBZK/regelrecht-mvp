    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.769
  - number: '4.770'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.770
  - number: 4.770.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.770
  - number: 4.770.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.770
  - number: 4.770.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.770
  - number: '4.771'
    text: Deze paragraaf is van toepassing op het met water sorteren van biologisch geteeld fruit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.771
  - number: 4.772.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.771][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.772
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.72'
  - number: 4.772.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.772
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.773.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van de activiteit,
      bedoeld in [artikel 4.771][ref1], gelijkmatig verspreid over landbouwgronden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.773
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.72'
  - number: 4.773.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden of
      geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.773
  - number: 4.778.1
    text: Deze paragraaf is van toepassing op het op substraat telen van gewassen in de openlucht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.778
  - number: 4.778.2
    text: Deze paragraaf is niet van toepassing op het op substraat telen van gewassen op stellingen of in een gotensysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.778
  - number: 4.779.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.778][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.779
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.73'
  - number: 4.779.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.779
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.780'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bij het bemesten bij de activiteit, bedoeld in
      [artikel 4.778, eerste lid][ref1], op een doorlatende ondergrond:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.780
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.73'
  - number: 4.780.a
    text: worden alleen kunstmeststoffen gebruikt die over een langere periode de werkzame bestanddelen afgeven; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.780
  - number: 4.780.b
    text: |-
      wordt een druppelsysteem gebruikt waarbij de waterafgifte en de kunstmeststoffenafgifte zijn afgestemd op de
      behoefte van het gewas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.780
  - number: 4.781.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater en het voorkomen van verontreiniging van een
      oppervlaktewaterlichaam bij substraatteelt op een niet-doorlatende ondergrond:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: 4.781.1.a
    text: wordt het drainwater opgevangen in een opvangvoorziening en opnieuw gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: 4.781.1.b
    text: |-
      wordt na het bemesten of het bespuiten van de gewassen met gewasbeschermingsmiddelen de eerste 50 m3 drainwater en
      hemelwater per hectare teeltoppervlakte opgevangen in de opvangvoorziening en opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: 4.781.2
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: 4.781.2.a
    text: |-
      als bij het bemesten van de gewassen alleen kunstmeststoffen worden gebruikt die over een langere periode werkzame
      stoffen afgeven en de teeltoppervlakte niet meer dan 500 m2 is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: 4.781.2.b
    text: op de teelt van aardbeien op trayvelden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.781
  - number: '4.782'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater en het voorkomen van verontreiniging van een
      oppervlaktewaterlichaam bij de teelt van aardbeien op trayvelden op een niet-doorlatende ondergrond:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.782
  - number: 4.782.a
    text: wordt het drainwater opgevangen in een opvangvoorziening en opnieuw gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.782
  - number: 4.782.b
    text: |-
      wordt na het bemesten of het bespuiten van de gewassen met gewasbeschermingsmiddelen de eerste 30 m3 drainwater en
      hemelwater per hectare teeltoppervlakte opgevangen in een opvangvoorziening en opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.782
  - number: '4.783'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt drainwater afkomstig van substraatteelt op een niet-
      doorlatende ondergrond en hemelwater afkomstig uit een opvangvoorziening niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.783
  - number: '4.784'
    text: |-
      Deze paragraaf is van toepassing op het op substraat telen van gewassen op stellingen of in een gotensysteem in
      de openlucht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.784
  - number: 4.785.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.784][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.785
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.74'
  - number: 4.785.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.785
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.786'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het drainwater afkomstig van de activiteit, bedoeld in
      [artikel 4.784][ref1], opgevangen en opnieuw gebruikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.786
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.74'
  - number: '4.787'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt drainwater afkomstig van de activiteit, bedoeld in
      [artikel 4.784][ref1], niet geloosd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.787
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.74'
  - number: '4.788'
    text: Deze paragraaf is van toepassing op het gebruiken van assimilatiebelichting in een kas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.788
  - number: 4.789.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.788][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.789
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.75'
  - number: 4.789.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.789
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.790.1
    text: |-
      Met het oog op het beperken van lichthinder bij het gebruik van assimilatiebelichting met een verlichtingssterkte
      van 15.000 lux of meer is de lichtuitstraling van zonsondergang tot zonsopgang verminderd door:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verlichtingssterkte_lux
            type: number
            required: true
            description: Verlichtingssterkte van de assimilatiebelichting in lux
            source: {}
          - name: lichtvermindering_bovenzijde_procent
            type: number
            required: true
            description: Lichtvermindering aan de bovenzijde van de kas in procenten
            source: {}
          - name: lichtvermindering_gevel_procent
            type: number
            required: true
            description: Lichtvermindering aan de gevel op 10 m afstand in procenten
            source: {}
        output:
          - name: voldoet_lichtreductie_hoge_intensiteit
            type: boolean
            description: Of de lichtreductie voldoet bij assimilatiebelichting van 15.000 lux of meer
        actions:
          - output: voldoet_lichtreductie_hoge_intensiteit
            value:
              operation: IF
              cases:
                - when:
                    operation: GREATER_THAN_OR_EQUAL
                    subject: $verlichtingssterkte_lux
                    value: 15000
                  then:
                    operation: AND
                    conditions:
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $lichtvermindering_bovenzijde_procent
                        value: 98
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $lichtvermindering_gevel_procent
                        value: 95
              default: true
  - number: 4.790.1.a
    text: |-
      de bovenzijde van de kas te voorzien van een lichtscherminstallatie waardoor de lichtvermindering ten minste 98%
      is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.1.b
    text: |-
      de gevel van de kas zo af te schermen dat op een afstand van 10 m van de gevel de lichtvermindering ten minste 95%
      is en de in de kas gebruikte lampen niet zichtbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.2
    text: |-
      Bij het gebruik van assimilatiebelichting met een verlichtingssterkte van minder dan 15.000 lux is de
      lichtuitstraling verminderd door:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.2.a
    text: 'de bovenzijde van de kas te voorzien van een lichtscherminstallatie waardoor de lichtvermindering:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.2.a.1°
    text: ten minste 98% is tijdens de donkerteperiode; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.2.a.2°
    text: ten minste 74% tijdens de nanacht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.2.b
    text: |-
      de gevel van de kas van zonsondergang tot zonsopgang zo af te schermen dat op een afstand van 10 m van de gevel de
      lichtvermindering ten minste 95% is en de in de kas gebruikte lampen niet zichtbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.3
    text: |-
      De donkerteperiode is de periode van 1 november tot 1 april van 18.00 tot 24.00 uur en van 1 april tot 1 mei en van
      1 september tot 1 november van het tijdstip van een half uur na zonsondergang tot 02.00 uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: 4.790.4
    text: |-
      De nanacht is de periode van 1 november tot 1 april van 24.00 uur tot het tijdstip van zonsopgang en van 1 april
      tot 1 mei en van 1 september tot 1 november van 02.00 uur tot het tijdstip van zonsopgang.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.790
  - number: '4.791'
    text: 'Deze paragraaf is van toepassing op het lozen van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791
  - number: 4.791.a
    text: drainwater afkomstig van het telen van gewassen op substraat in een kas; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791
  - number: 4.791.b
    text: |-
      spoelwater met gewasbeschermingsmiddelen van filters van een waterdoseringsinstallatie bij het telen van gewassen
      op substraat in een kas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791
  - number: 4.791a.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.791][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
  - number: 4.791a.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.791b.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen drainwater of spoelwater geloosd in een
      vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791b
  - number: 4.791b.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791b
  - number: 4.791c.1
    text: 'Met het oog op het doelmatig beheer van afvalwater bij het lozen van drainwater:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791c
  - number: 4.791c.1.a
    text: wordt een hemelwateropvangvoorziening van ten minste 500 m3/ha teeltoppervlakte gebruikt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791c
  - number: 4.791c.1.b
    text: wordt water gebruikt met een natriumgehalte dat niet hoger is dan dat van hemelwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791c
  - number: 4.791c.2
    text: Drainwater wordt gerecirculeerd met een recirculatiesysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791c
  - number: 4.791c.3
    text: |-
      Het eerste en tweede zijn niet van toepassing als bij het lozen van drainwater de hoeveelheid toegediende totaal
      stikstof, bedoeld in [artikel 4.791e][ref1], niet meer is dan 25 kg/ha teeltoppervlakte per kalenderjaar of als in
      een kas de totale teeltoppervlakte voor het telen van gewassen op substraat kleiner is dan 2.500 m2.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
    machine_readable:
      definitions:
        max_stikstof_kg_ha: 25
        min_teeltoppervlakte_m2: 2500
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: totaal_stikstof_kg_per_ha_per_jaar
            type: number
            required: true
            description: Hoeveelheid toegediende totaal stikstof in kg/ha teeltoppervlakte per kalenderjaar
            source: {}
          - name: teeltoppervlakte_m2
            type: number
            required: true
            description: Totale teeltoppervlakte voor substraatteelt in de kas in m2
            source: {}
        output:
          - name: vrijstelling_recirculatie_drainwater
            type: boolean
            description: Of het eerste en tweede lid niet van toepassing zijn
        actions:
          - output: vrijstelling_recirculatie_drainwater
            value:
              operation: OR
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $totaal_stikstof_kg_per_ha_per_jaar
                  value: $max_stikstof_kg_ha
                - operation: LESS_THAN
                  subject: $teeltoppervlakte_m2
                  value: $min_teeltoppervlakte_m2
  - number: 4.791d.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt drainwater of spoelwater, dat gewasbeschermingsmiddelen
      bevat, voor het lozen door een zuiveringsvoorziening geleid die ten minste 95% van de werkzame stoffen die bestaan
      uit organische verbindingen afkomstig van de gewasbeschermingsmiddelen uit het water verwijdert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791d
    machine_readable:
      definitions:
        min_zuiveringsrendement_procent: 95
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: zuiveringsrendement_procent
            type: number
            required: true
            description: Percentage werkzame stoffen dat door de zuiveringsvoorziening wordt verwijderd
            source: {}
        output:
          - name: voldoet_zuiveringsrendement_gewasbescherming
            type: boolean
            description: Of de zuiveringsvoorziening ten minste 95% van de werkzame stoffen verwijdert
        actions:
          - output: voldoet_zuiveringsrendement_gewasbescherming
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $zuiveringsrendement_procent
              value: $min_zuiveringsrendement_procent
  - number: 4.791d.2
    text: |-
      Het eerste lid is niet van toepassing als het drainwater of het spoelwater na het lozen wordt geleid door een
      zuiveringsvoorziening of een zuiveringtechnisch werk waarmee ten minste 95% van de werkzame stoffen die bestaan uit
      organische verbindingen afkomstig van de gewasbeschermingsmiddelen uit het water wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791d
  - number: 4.791d.3
    text: |-
      Het zuiveringsrendement van de zuiveringsvoorziening wordt bepaald volgens het Meetprotocol voor het testen van het
      zuiveringsrendement van zuiveringsinstallaties glastuinbouw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791d
  - number: 4.791e.1
    text: |-
      Voor het drainwater dat wordt geloosd in een vuilwaterriool, zijn de emissiegrenswaarden voor totaal stikstof per
      gewas de waarden, bedoeld in tabel 4.791e.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791e
  - number: 4.791e.2
    text: |-
      De hoeveelheid totaal stikstof wordt berekend door de hoeveelheid drainwater dat in een jaar wordt geloosd te
      vermenigvuldigen met het gehalte aan nitraatstikstof en ammoniumstikstof, dat daarin aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791e
  - number: 4.791e.3
    text: |-
      Het eerste lid is niet van toepassing als de totale teeltoppervlakte kleiner is dan 2.500 m2.
