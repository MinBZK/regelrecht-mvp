preamble:
  text: |-
    Wij Willem-Alexander, bij de gratie Gods, Koning der Nederlanden, Prins van Oranje-Nassau, enz. enz. enz.

    Op de voordracht van Onze Minister van Infrastructuur en Milieu van 30 juni 2017, nr. IenM/BSK-2017/168354,
    Hoofddirectie Bestuurlijke en Juridische Zaken, gedaan mede namens Onze Minister van Economische Zaken, Onze
    Minister van Onderwijs, Cultuur en Wetenschap en Onze Minister van Sociale Zaken en Werkgelegenheid;

    Gelet op de grondwaterrichtlijn, de kaderrichtlijn afvalstoffen, de kaderrichtlijn water, het Londen-protocol,
    de nitraatrichtlijn, het Ospar-verdrag, het PRTR-protocol, de PRTR-verordening, de richtlijn autowrakken, de
    richtlijn benzinedampterugwinning, de richtlijn duurzaam gebruik, de richtlijn geologische opslag van kooldioxide,
    de richtlijn havenontvangstvoorzieningen, de richtlijn industriële emissies, de richtlijn offshore veiligheid,
    de richtlijn opslag en distributie benzine, de richtlijn stedelijk afvalwater, de richtlijn toegang tot milieu-
    informatie, de richtlijn winningsafval, de Seveso-richtlijn, het verdrag van Aarhus, het verdrag van Granada,
    het verdrag van Valletta, het werelderfgoedverdrag, het VN-Zeerechtverdrag en de artikelen 2.24, eerste lid, 4.3,
    eerste en tweede lid, 5.1, eerste en tweede lid, en 20.6, eerste lid, van de Omgevingswet, de artikelen 6, eerste
    lid, 7, eerste lid, 16 en 20 van de Arbeidsomstandighedenwet, de artikelen 31, vierde lid, 48, zesde lid, en 49,
    eerste lid, van de Wet veiligheidsregio’s en artikel 19.3, eerste lid, van de Wet milieubeheer;

    De Afdeling advisering van de Raad van State gehoord (advies van 22 december 2017, nr. W14.17.0200/IV);

    Gezien het nader rapport van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties van 29 juni 2018,
    nr. 2018-0000524052, uitgebracht mede namens Onze Minister van Economische Zaken en Klimaat, Onze Minister van
    Infrastructuur en Waterstaat, Onze Minister van Onderwijs, Cultuur en Wetenschap en Onze Staatssecretaris van
    Sociale Zaken en Werkgelegenheid;

    Hebben goedgevonden en verstaan:
  url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#ArtikelAanhef
