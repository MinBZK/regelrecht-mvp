        artikel: 25d
  - number: 4.1276.2
    text: |-
      Op de toegepaste grond of baggerspecie wordt binnen een jaar nadat het toepassen is voltooid
      of onderbroken een aaneengesloten afdeklaag met een laagdikte van 0,5 m aangebracht en in
      stand gehouden van grond of baggerspecie die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, vijfde lid, onder d, van het Besluit bodemkwaliteit][ref1], die gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1276.2.a
    text: 'als het grond betreft: de kwaliteit voor toepassen als afdeklaag in een diepe plas geschikte grond; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
  - number: 4.1276.2.b
    text: 'als het baggerspecie betreft: de kwaliteit voor toepassen als afdeklaag in een diepe plas geschikte baggerspecie.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
  - number: 4.1276.3
    text: |-
      Als de diepe plas bij de herinrichting geheel of gedeeltelijk tot landbodem is ontwikkeld, wordt binnen een jaar na
      de beëindiging van het toepassen een aaneengesloten afdeklaag met een laagdikte van 0,5 m aangebracht en in stand
      gehouden van grond of baggerspecie die voldoet aan de kwaliteitseisen die volgens [artikel 4.1272][ref1] gelden
      voor het toepassen van grond of baggerspecie op of in de aangrenzende landbodem.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1276.4
    text: |-
      Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste, tweede of derde lid
      wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
  - number: 4.1277.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het in een diepe plas toepassen van grond of baggerspecie van een
      kwaliteit die niet voldoet aan de kwaliteitseisen, bedoeld in [artikel 4.1276][ref1], alleen worden toegestaan
      als de toe te passen grond of baggerspecie afkomstig is uit een aangewezen bodembeheergebied en ook weer binnen dat
      gebied wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1277
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1277.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het toepassen van
      grond of baggerspecie waarin een verontreinigende stof aanwezig is in een zodanige concentratie
      dat de grond of baggerspecie volgens de voor die stof geldende kwaliteitseis, bedoeld in
      [artikel 25d, tweede of derde lid, van het Besluit bodemkwaliteit][ref1], als sterk verontreinigde grond of sterk
      verontreinigde baggerspecie moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1277
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1277.2.a
    text: |-
      de toe te passen grond of baggerspecie is ontgraven uit een locatie waar de bodem diffuus sterk met de stof is
      verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1277
  - number: 4.1277.2.b
    text: |-
      de grond of baggerspecie wordt toegepast op een locatie waar de bodem al voor het toepassen diffuus sterk met de
      stof was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1277
  - number: 4.1278.1
    text: |-
      Met het oog op het beschermen van het milieu wordt, in afwijking van [artikel 4.1272, eerste en tweede lid][ref1],
      in het kader van verspreiding van baggerspecie, bedoeld in [artikel 4.1269, derde lid][ref2],
      alleen baggerspecie toegepast die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, vijfde lid, onder b, c of d, van het Besluit bodemkwaliteit][ref3], die gelden voor de kwaliteit
      voor verspreiden geschikte baggerspecie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1278
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref3
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1278.2
    text: Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste lid wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1278
  - number: 4.1279.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het verspreiden van baggerspecie van een kwaliteit die niet
      voldoet aan de kwaliteitseisen, bedoeld in [artikel 4.1278][ref1], alleen worden toegestaan als de toe te passen
      baggerspecie afkomstig is uit een aangewezen bodembeheergebied en ook weer binnen dat gebied wordt verspreid.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1279
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1279.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het verspreiden van baggerspecie
      waarin een verontreinigende stof aanwezig is in een zodanige concentratie dat baggerspecie volgens de voor die stof
      geldende kwaliteitseis, bedoeld in [artikel 25d, tweede en derde lid, van het Besluit bodemkwaliteit][ref1], als
      sterk verontreinigde baggerspecie moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1279
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1279.2.a
    text: |-
      de te verspreiden baggerspecie is ontgraven uit een locatie waar de bodem diffuus sterk met de stof is
      verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1279
  - number: 4.1279.2.b
    text: |-
      de baggerspecie wordt verspreid op een locatie waar de bodem al voor het verspreiden diffuus sterk met de stof
      was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1279
  - number: 4.1280.1
    text: |-
      Als sprake is van toepassen van tarragrond, wordt in afwijking van [artikel 4.1272, eerste lid][ref1], met
      het oog op het beschermen van het milieu alleen tarragrond toegepast die voldoet aan de kwaliteitseisen voor
      tarragrond, bedoeld in [artikel 25d, vijfde lid, onder e, van het Besluit bodemkwaliteit][ref2], die gelden voor
      de kwaliteitsklasse en de bodemfunctieklasse waarin de ontvangende landbodem is ingedeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1280
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1280.2
    text: |-
      Als sprake is van het grootschalig toepassen van tarragrond, wordt in afwijking van
      [artikel 4.1274, tweede lid, onder a][ref1], met het oog op het beschermen van het milieu
      alleen tarragrond toegepast die voldoet aan de kwaliteitseisen voor tarragrond, bedoeld in
      [artikel 25d, vijfde lid, onder a, van het Besluit bodemkwaliteit][ref2], die gelden voor de kwaliteit emissiearme
      grond en voor de kwaliteitsklasse industrie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1280
    references:
