      een milieubelastende activiteit te verrichten, geldt voor de milieubelastende activiteit, bedoeld in
      [artikel 3.9][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.3
        afdeling: '3.2'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: elektrisch_vermogen_kw
            type: number
