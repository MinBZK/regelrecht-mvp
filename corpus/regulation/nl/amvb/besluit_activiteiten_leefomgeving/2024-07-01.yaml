  - number: 11.43.1
    text: |-
      Vergunningvrije gevallen als bedoeld in [artikel 11.42][ref1] worden aangewezen in een ministeriële regeling, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
