  - number: 7.60.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      lozingsactiviteit op het oppervlaktewaterlichaam te verrichten, geldt voor de activiteit, bedoeld in
      [artikel 7.58, eerste lid][ref2], die wordt verricht in de Noordzee, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.7
        afdeling: '7.2'
  - number: 7.60.1.a
    text: |-
      het lozen van stoffen of water afkomstig van het onderhouden, repareren, schoonmaken of behandelen van de
      scheepshuid van vaartuigen of drijvende werktuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.b
    text: het lozen van meer dan 5.000 m3 water per uur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c
    text: 'het lozen van water door een uitstroomvoorziening, behalve voor het lozen van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.1°
    text: afvalwater afkomstig van een gemeentelijke voorziening voor de inzameling en het transport van afvalwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.2°
    text: afstromend hemelwater en ander afvalwater afkomstig van een verhard oppervlak;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.3°
    text: afvalwater afkomstig van het schoonmaken van drinkwaterleidingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.4°
    text: afvalwater afkomstig van ontwateren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.5°
    text: |-
      water afkomstig van een oppervlaktewaterlichaam waaraan geen stoffen of warmte zijn toegevoegd, in datzelfde
      oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.6°
    text: afvalwater afkomstig van een calamiteitenoefening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.1.c.7°
    text: afvalwater afkomstig van graven of saneringen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
  - number: 7.60.2
    text: |-
      Het verbod, bedoeld in het eerste lid, aanhef en onder a, geldt niet voor het lozen van stoffen of water afkomstig
      van het onderhouden, repareren of schoonmaken van vaartuigen of drijvende werktuigen en het behandelen van de
      scheepshuid van vaartuigen of drijvende werktuigen, bedoeld in [artikel 3.145][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
