  - number: 6.16.4
    text: |-
      Het eerste lid geldt ook niet voor het onderhouden of herstellen van een waterstaatswerk door of namens de
      waterbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.16
  - number: 6.17.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 6.16, eerste lid][ref2], die worden verricht in een beperkingengebied met betrekking tot een
      oppervlaktewaterlichaam in beheer bij het Rijk dat geen kanaal is, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.1
        afdeling: '6.2'
  - number: 6.17.1.a
    text: het boven het maaiveld aanleggen, plaatsen, in stand houden of veranderen van een verharding die geen bouwwerk is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.b
    text: |-
      het plaatsen of in stand houden van een opgaande houtbeplanting, anders dan die is omschreven in de legger, tussen
      1 oktober en 1 april;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.c
    text: |-
      het aanleggen, plaatsen, in stand houden of veranderen van een werk om oeverafslag tegen te gaan dat boven het
      oeverland uitsteekt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.d
    text: |-
      het bouwen of in stand houden van een steiger, vlonder of aanmeervoorziening en de voorzieningen die daarbij horen,
      voor zover die:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.d.1°
    text: zijn gelegen binnen de vaarweg; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.d.2°
    text: zijn gelegen buiten de vaarweg en niet alleen door een huishouden worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.e
    text: |-
      het permanent afmeren van een woonschip of een ander drijvend werk in een oppervlaktewaterlichaam voor zover dat
      bij ministeriële regeling is aangewezen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.f
    text: 'het bouwen, aanleggen, plaatsen of in stand houden van een kabel of leiding voor zover:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.f.1°
    text: |-
      daarmee vloeibare gevaarlijke stoffen als bedoeld in [artikel 3.24][ref1] worden getransporteerd;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
    references:
