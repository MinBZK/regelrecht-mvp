        afdeling: '11.3'
  - number: 11.119.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld over [artikel 11.116][ref1] en [paragraaf 11.3.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.119
