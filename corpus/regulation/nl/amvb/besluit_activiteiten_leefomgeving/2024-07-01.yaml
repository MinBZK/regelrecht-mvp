  - number: '4.965'
    text: |-
      Met het oog op het waarborgen van de veiligheid is overnachting door derden en recreatief verblijf niet toegestaan
      binnen 20 m vanaf het vulpunt van een ondergrondse opslagtank waarin vloeibare brandstoffen voor het tanken van
      vaartuigen of drijvende werktuigen vanaf de wal worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.965
  - number: 4.966.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.958][ref1], voldaan aan PGS 28, als het gaat om het opslaan van vloeibare brandstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.966
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.966.2
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.958][ref1], wordt voldaan aan PGS 31, als het gaat om
      het opslaan van andere vloeibare gevaarlijke stoffen dan vloeibare brandstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.966
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: '4.967'
    text: |-
      Met het oog op het waarborgen van de veiligheid en het voorkomen van verontreiniging van de bodem worden een
      ondergrondse opslagtank en de daarop aangesloten leidingen geïnstalleerd, onderhouden en gerepareerd door een
      onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.967
  - number: 4.968.1
    text: 'Met het oog op het voorkomen van verontreiniging van de bodem is een ondergrondse opslagtank:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.a
    text: dubbelwandig uitgevoerd met een systeem voor lekdetectie in de wand;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.b
    text: 'enkelwandig uitgevoerd en geplaatst in een ondergrondse bak die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.b.1°
    text: zich onder de opslagtank bevindt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.b.2°
    text: een systeem voor lekdetectie heeft;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.b.3°
    text: vloeistofdicht is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.b.4°
    text: |-
      een hoogte heeft van ten minste het hoogste vloeistofniveau of een inhoud van ten minste 125% van de inhoud van de
      opslagtank; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.1.c
    text: enkelwandig uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.2
    text: 'Een systeem voor lekdetectie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.2.a
    text: is aangelegd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.2.b
    text: wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een onderneming als bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.968.3
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.968
  - number: 4.969.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt bij een ondergrondse opslagtank als bedoeld in
      [artikel 4.968, eerste lid, onder c][ref1], ten minste een peilbuis geïnstalleerd. Per groep van drie ondergrondse
      opslagtanks kan ook een peilbuis worden geïnstalleerd als die opslagtanks binnen 10 m van elkaar liggen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.969.2
    text: |-
      De peilbuis wordt geïnstalleerd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000 of een
      certificatie-instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.969.3
    text: 'De positie van de peilbuis wordt bepaald aan de hand van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.969.3.a
    text: de opbouw en samenstelling van de bodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.969.3.b
    text: de stand en stromingsrichting van het grondwater; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.969.3.c
    text: de aanwezigheid en invloed van oppervlaktewaterlichamen en grondwateronttrekkingsactiviteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.969.4
    text: |-
      De peilbuis is horizontaal op een afstand van minder dan 5 m gelegen van de ondergrondse opslagtank, tenzij dat
      niet mogelijk is. Als een peilbuis op een afstand van 5 m of meer van een ondergrondse opslagtank is geplaatst, is
      de horizontale afstand tussen de ondergrondse opslagtank en de peilbuis ten hoogste 8 m en heeft de vloeistof die
      in de opslagtank wordt opgeslagen een soortelijke massa die niet meer is dan de soortelijke massa van water.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.969
  - number: 4.970.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt een geïnstalleerde peilbuis ten minste eenmaal
      per jaar bemonsterd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000 of een certificatie-
      instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.2
    text: |-
      De monsters worden onderzocht door een laboratorium met een erkenning bodemkwaliteit voor AS SIKB 3000. De
      resultaten van onderzoeken van monsters worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.3
    text: |-
      Als in de ondergrondse opslagtank vloeibare brandstoffen worden opgeslagen, worden de monsters onderzocht op
      aanwezigheid van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.3.a
    text: minerale oliecomponenten volgens NEN-EN-ISO 9377-2;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.3.b
    text: vluchtige aromaten volgens NEN-EN-ISO 15680; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.3.c
    text: |-
      methyl-tertiair-butylether en ethyl-tertiair-butylether volgens NEN-EN-ISO 15680, als in de ondergrondse opslagtank
      benzine wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: 4.970.4
    text: |-
      Als in de ondergrondse opslagtank stoffen worden opgeslagen waarvoor geen NEN, NEN-EN of ISO is vastgesteld voor
      het onderzoek naar de aanwezigheid van die stoffen, worden de monsters onderzocht volgens een methode die daarvoor
      geschikt is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.970
  - number: '4.971'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten hoogste een week nadat de resultaten van het
      onderzoek naar de aanwezigheid van methyl-tertiair-butylether en ethyl-tertiair-butylether bekend zijn geworden,
      geïnformeerd, als de geanalyseerde waarde hoger is dan 15 μg/l.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.971
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.972'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt het aansluitpunt van een vulleiding of
      leegzuigleiding van een ondergrondse opslagtank zich:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972
  - number: 4.972.a
    text: boven een vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972
  - number: 4.972.b
    text: boven of in een vulpuntmorsbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972
  - number: 4.972a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.972, onder a][ref1], niet aangesloten op het vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.972b.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden de kathodische bescherming op een ondergrondse
      opslagtank van staal en de daarop aangesloten leidingen van staal ten minste eenmaal per jaar beoordeeld en
      goedgekeurd door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972b
  - number: 4.972b.2
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.972b
  - number: 4.973.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt ten minste eenmaal per jaar een
      stroomopdrukproef verricht als een ondergrondse opslagtank van staal en de daarop aangesloten leidingen van staal
      geen kathodische bescherming hebben, tenzij beschadiging van de opslagtank of leiding door zwerfstromen niet is
      te verwachten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.973
  - number: 4.973.2
    text: |-
      De stroomopdrukproef wordt verricht door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB
      6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.973
  - number: 4.973.3
    text: De resultaten van stroomopdrukproeven worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.973
  - number: 4.974.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem vindt bij een ondergrondse opslagtank van staal
      waarin vloeibare brandstoffen worden opgeslagen ten minste eenmaal per jaar een controle plaats op de aanwezigheid
      van water en bezinksel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.974.2
    text: 'De controle op de aanwezigheid van water en bezinksel vindt ten minste eenmaal per drie jaar plaats als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.974.2.a
    text: de ondergrondse opslagtank een volledige inwendige coating heeft die voldoet aan BRL-K779; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.974.2.b
    text: |-
      de inwendige coating is aangebracht door een onderneming met een certificaat voor BRL-K790, verstrekt door een
      certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.974.3
    text: De controle wordt verricht door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.974.4
    text: De resultaten van controles worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.974
  - number: 4.975.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt water dat tijdens de controle, bedoeld in
      [artikel 4.974][ref1], is aangetroffen, zo spoedig mogelijk verwijderd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.975.2
    text: Van het verwijderde water worden de elektrische geleidbaarheid en de zuurgraad beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: 4.975.3
    text: |-
      Als bij de derde opeenvolgende meting blijkt dat de zuurgraad en de elektrische geleidbaarheid van het water niet
      voldoen aan paragraaf 3.4 van SIKB Protocol 6802, wordt een inwendige keuring verricht door een inspectie-instantie
      met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: 4.975.4
    text: |-
      Het tweede en derde lid zijn niet van toepassing als de ondergrondse opslagtank dubbelwandig is uitgevoerd met een
      systeem voor lekdetectie in de wand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: 4.975.5
    text: 'Een systeem voor lekdetectie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: 4.975.5.a
    text: is aangelegd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: 4.975.5.b
    text: wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een onderneming als bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.975
  - number: '4.976'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt voor het begin van de inwendige keuring, bedoeld in
      [artikel 4.975, derde lid][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.976
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.977.1
    text: |-
      Voor een ondergrondse opslagtank waarin vloeibare brandstoffen worden opgeslagen is financiële zekerheid gesteld
      ter dekking van aansprakelijkheid voor schade aan de bodem als gevolg van dat opslaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
  - number: 4.977.2
    text: |-
      De financiële zekerheid is € 225.000,– per ondergrondse opslagtank. Bij meer dan zes ondergrondse opslagtanks,
      waarin stoffen als bedoeld in het eerste lid of [artikel 4.1001a, eerste lid][ref1], worden opgeslagen, is de
      financiële zekerheid € 1.350.000,– in totaal.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.977.3
    text: 'De financiële zekerheid wordt in stand gehouden tot:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
  - number: 4.977.3.a
    text: |-
      vier weken nadat het rapport van het bodemonderzoek, bedoeld in [artikel 5.5][ref1], is verstrekt aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.977.3.b
    text: |-
      als de bodemkwaliteit wordt hersteld op grond van [artikel 5.6][ref1]: tot vier weken nadat het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref2], is geïnformeerd over de beëindiging van de herstelwerkzaamheden op grond van
      [artikel 5.7, tweede lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.977.4
    text: Het eerste lid is niet van toepassing als degene die de activiteit verricht een openbaar lichaam is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.977
  - number: '4.978'
    text: |-
      Binnen acht weken na het begin van de activiteit worden aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1],
      gegevens en bescheiden verstrekt waaruit blijkt dat is voldaan aan [artikel 4.977][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.978
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.981.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden bij het vullen van een ondergrondse opslagtank
      met benzine de uit die opslagtank verdreven dampen via een dampdichte leiding teruggevoerd naar het reservoir van
      de mobiele benzinetank die de benzine levert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.981
  - number: 4.981.2
    text: Het eerste lid is niet van toepassing als per jaar minder dan 100 m3 benzine wordt geleverd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.981
  - number: 4.981.3
    text: |-
      In dit artikel wordt onder benzine verstaan: benzine als bedoeld in artikel 2, onder a, van de richtlijn opslag en
      distributie benzine.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.981
  - number: 4.982.1
    text: |-
      [Artikel 4.962, eerste en tweede lid][ref1], is niet van toepassing op opslagtanks die zijn geïnstalleerd voor
      1 januari 2011.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.982
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.982.2
    text: |-
      De [artikelen 4.962, eerste lid, aanhef en onder a][ref1], [4.963, eerste lid, aanhef en onder a][ref2], en
      [4.964][ref3] zijn niet van toepassing op het opslaan van vloeibare gevaarlijke stoffen van ADR-klasse 3 in
      een ondergrondse opslagtank dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die
      activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding
      van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.982
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: '4.983'
    text: 'Deze paragraaf is van toepassing op het opslaan in een ondergrondse opslagtank van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.983.a
    text: gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.983.b
    text: vloeistoffen van ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.983.c
    text: vloeistoffen van ADR-klasse 8, verpakkingsgroep II of III;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.983.d
    text: vloeistoffen van ADR-klasse 9, die het aquatisch milieu verontreinigen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.983.e
    text: oliën of vetten die niet van ADR-klasse 3 zijn of pekel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.983
  - number: 4.984.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.983][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.984
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.984.2
    text: |-
      Een melding bevat een aanduiding van de stoffen die worden opgeslagen en de hoeveelheid die ten hoogste wordt
      opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.984
  - number: 4.984.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.984
  - number: 4.984.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.984
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.985'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.983][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.985
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.985.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.985
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.985.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.985
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.986.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een ondergrondse opslagtank en de
      daarop aangesloten leidingen geïnstalleerd, onderhouden en gerepareerd door een onderneming met een erkenning
      bodemkwaliteit voor BRL SIKB 7800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.986
  - number: 4.986.2
    text: |-
      Het eerste lid is niet van toepassing op een ondergrondse opslagtank van beton die wordt gebruikt voor het opslaan
      van pekel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.986
  - number: 4.986.3
    text: |-
      Een ondergrondse opslagtank als bedoeld in het tweede lid is gemaakt van een betonklasse die is bestand tegen de
      inwerking van pekel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.986
  - number: 4.987.1
    text: 'Met het oog op het voorkomen van verontreiniging van de bodem is een ondergrondse opslagtank:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.a
    text: dubbelwandig uitgevoerd met een systeem voor lekdetectie in de wand;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.b
    text: 'enkelwandig uitgevoerd en geplaatst in een ondergrondse bak die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.b.1°
    text: zich onder de opslagtank bevindt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.b.2°
    text: een systeem voor lekdetectie heeft;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.b.3°
    text: vloeistofdicht is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.b.4°
    text: |-
      een hoogte heeft van ten minste het hoogste vloeistofniveau of een inhoud van ten minste 125% van de inhoud van de
      opslagtank; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.1.c
    text: enkelwandig uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.2
    text: 'Een systeem voor lekdetectie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.2.a
    text: is aangelegd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.2.b
    text: wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een onderneming als bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.987.3
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.987
  - number: 4.988.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt bij een ondergrondse opslagtank als bedoeld in
      [artikel 4.987, eerste lid, onder c][ref1], ten minste een peilbuis geïnstalleerd. Per groep van drie ondergrondse
      opslagtanks kan ook een peilbuis worden geïnstalleerd als die opslagtanks binnen 10 m van elkaar liggen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.988.2
    text: |-
      De peilbuis wordt geïnstalleerd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000 of een
      certificatie-instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.988.3
    text: 'De positie van de peilbuis wordt bepaald aan de hand van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.988.3.a
    text: de opbouw en samenstelling van de bodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.988.3.b
    text: de stand en stromingsrichting van het grondwater; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.988.3.c
    text: de aanwezigheid en invloed van oppervlaktewaterlichamen en grondwateronttrekkingsactiviteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.988.4
    text: |-
      De peilbuis is horizontaal op een afstand van minder dan 5 m gelegen van de ondergrondse opslagtank, tenzij dat
      niet mogelijk is. Als een peilbuis op een afstand van 5 m of meer van een ondergrondse opslagtank is geplaatst, is
      de horizontale afstand tussen de ondergrondse opslagtank en de peilbuis ten hoogste 8 m en heeft de vloeistof die
      in de opslagtank wordt opgeslagen een soortelijke massa die niet meer is dan de soortelijke massa van water.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.988
  - number: 4.989.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt een geïnstalleerde peilbuis ten minste eenmaal
      per jaar bemonsterd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000 of een certificatie-
      instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.2
    text: |-
      De monsters worden onderzocht door een laboratorium met een erkenning bodemkwaliteit voor AS SIKB 3000. De
      resultaten van onderzoeken van monsters worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.3
    text: |-
      Als in de ondergrondse opslagtank gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger of olie die
      geen vloeibare gevaarlijke stof van ADR-klasse 3 is wordt opgeslagen, worden de monsters onderzocht op aanwezigheid
      van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.3.a
    text: minerale oliecomponenten volgens NEN-EN-ISO 9377-2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.3.b
    text: vluchtige aromaten volgens NEN-EN-ISO 15680.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.4
    text: |-
      Als in de ondergrondse opslagtank pekel wordt opgeslagen, worden de monsters onderzocht op de aanwezigheid van
      chloride volgens NEN-EN-ISO 15682.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.989.5
    text: |-
      Als in de ondergrondse opslagtank stoffen worden opgeslagen waarvoor geen NEN, NEN-EN of ISO is vastgesteld voor
      het onderzoek naar de aanwezigheid van die stoffen, worden de monsters onderzocht volgens een methode die daarvoor
      geschikt is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.989
  - number: 4.990.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevindt het aansluitpunt van een vulleiding of
      leegzuigleiding van een ondergrondse opslagtank zich:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990
  - number: 4.990.1.a
    text: boven een vloeistofdichte bodemvoorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990
  - number: 4.990.1.b
    text: boven of in een vulpuntmorsbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990
  - number: 4.990.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht
      vanaf de aansluiting tot aan de slibvangput en olieafscheider, als in de ondergrondse opslagtank gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, oliën of vetten worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990
  - number: 4.990.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarde voor olie, bedoeld in
      [artikel 4.1003][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.990a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.990, eerste lid, onder a][ref1], niet aangesloten op het vuilwaterriool,
      als in de ondergrondse opslagtank vloeistoffen worden opgeslagen van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.990a.a
    text: ADR-klasse 5.1;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990a
  - number: 4.990a.b
    text: ADR-klasse 8, verpakkingsgroep II of III; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990a
  - number: 4.990a.c
    text: ADR-klasse 9, die het aquatisch milieu verontreinigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.990a
  - number: 4.991.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden de kathodische bescherming op een ondergrondse
      opslagtank van staal en de daarop aangesloten leidingen van staal ten minste eenmaal per jaar beoordeeld en
      goedgekeurd door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.991
  - number: 4.991.2
    text: De resultaten van beoordelingen worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.991
  - number: 4.992.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt ten minste eenmaal per jaar een
      stroomopdrukproef verricht als een ondergrondse opslagtank van staal en de daarop aangesloten leidingen van staal
      geen kathodische bescherming hebben, tenzij beschadiging van de opslagtank of leidingen door zwerfstromen niet is
      te verwachten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.992
  - number: 4.992.2
    text: |-
      De stroomopdrukproef wordt verricht door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB
      6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.992
  - number: 4.992.3
    text: De resultaten van stroomopdrukproeven worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.992
  - number: 4.993.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem vindt bij een ondergrondse opslagtank van staal
      waarin vloeibare brandstoffen worden opgeslagen, ten minste eenmaal per jaar een controle plaats op de aanwezigheid
      van water en bezinksel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.993.2
    text: 'De controle op de aanwezigheid van water en bezinksel vindt ten minste eenmaal per drie jaar plaats als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.993.2.a
    text: de ondergrondse opslagtank een volledige inwendige coating heeft die voldoet aan BRL-K779; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.993.2.b
    text: |-
      de inwendige coating is aangebracht door een onderneming met een certificaat voor BRL-K790, verstrekt door een
      certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.993.3
    text: De controle wordt verricht door een inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.993.4
    text: De resultaten van controles worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.993
  - number: 4.994.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt water dat tijdens de controle, bedoeld in
      [artikel 4.993][ref1], is aangetroffen, zo spoedig mogelijk verwijderd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.994.2
    text: Van het verwijderde water worden de elektrische geleidbaarheid en de zuurgraad beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: 4.994.3
    text: |-
      Als bij de derde opeenvolgende meting blijkt dat de zuurgraad en de elektrische geleidbaarheid van het water niet
      voldoen aan paragraaf 3.4 van SIKB Protocol 6802, wordt een inwendige keuring verricht door een inspectie-instantie
      met een erkenning bodemkwaliteit voor AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: 4.994.4
    text: |-
      Het tweede en derde lid zijn niet van toepassing als de ondergrondse opslagtank dubbelwandig is uitgevoerd met een
      systeem voor lekdetectie in de wand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: 4.994.5
    text: 'Een systeem voor lekdetectie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: 4.994.5.a
    text: is aangelegd door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7800; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: 4.994.5.b
    text: wordt ten minste eenmaal per jaar beoordeeld en goedgekeurd door een onderneming als bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.994
  - number: '4.995'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt voor het begin van de inwendige keuring, bedoeld in
      [artikel 4.994, derde lid][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.995
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.996.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt een ondergrondse opslagtank van staal waarin
      afgewerkte olie wordt opgeslagen, jaarlijks geleegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.996
  - number: 4.996.2
    text: |-
      Voordat een ondergrondse opslagtank waarin afgewerkte olie is opgeslagen gebruikt gaat worden voor het opslaan van
      een andere vloeistof, wordt een keuring verricht volgens [artikel 4.997][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.996
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.97'
  - number: 4.997.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden een ondergrondse opslagtank met de daarop
      aangesloten leidingen beoordeeld en goedgekeurd door een inspectie-instantie met een erkenning bodemkwaliteit voor
      AS SIKB 6800.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.997
  - number: 4.997.2
    text: De keuringen vinden plaats volgens de termijnen, bedoeld in tabel 4.997.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.997
  - number: 4.997.3
    text: |-
      Een ondergrondse opslagtank waarin afgewerkte olie wordt opgeslagen, wordt ten minste eenmaal per vijf jaar
      beoordeeld en goedgekeurd. De eerste keuring vindt plaats binnen vijf jaar na de installatie van de opslagtank.
            Tabel 4.997 Keuringstermijnen


                    *Type opslagtank en wand*


                    *Termijn eerste keuring in jaren*


                    *Termijn volgende keuringen in jaren*


                    *Staal enkelwandig*


                    Geen volledige inwendige coating


                    15


                    15


                    Volledige inwendige coating maar voldoet niet aan BRL-K779 of niet aangebracht door een onderneming
      met een certificaat voor BRL-K790, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-
      ISO/IEC 17065 voor die BRL


                    15


                    20


                    Volledige inwendige coating die voldoet aan BRL-K779 en is aangebracht door een onderneming met een
      certificaat voor BRL-K790, verstrekt door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC
      17065 voor die BRL


                    20


                    20


                    *Staal dubbelwandig met een systeem voor lekdetectie in de wand*


                    20


                    20


                    *Kunststof enkelwandig of dubbelwandig*


                    15


                    15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.997
  - number: 4.998.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt een ondergrondse opslagtank van beton die
      wordt gebruikt voor het opslaan van pekel ten minste eenmaal per jaar leeggemaakt en aan de binnenzijde visueel
      gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.998
  - number: 4.998.2
    text: |-
      Als tijdens de controle verwering of beschadiging is geconstateerd, wordt de opslagtank gerepareerd voordat die
      weer in gebruik wordt genomen. Van de verrichte reparatie wordt een aantekening gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.998
  - number: 4.998.3
    text: |-
      Ten minste eenmaal per zes jaar worden de opslagtank en de daarop aangesloten leidingen beoordeeld en goedgekeurd
      door degene die de opslagtank heeft geïnstalleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.998
  - number: 4.998.4
    text: De resultaten van controles en de aantekeningen van reparaties worden ten minste drie jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.998
  - number: 4.999.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt de vloeistof direct verwijderd als een
      ondergrondse opslagtank is afgekeurd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.999
  - number: 4.999.2
    text: |-
      Een afgekeurde ondergrondse opslagtank met de daarop aangesloten leidingen wordt binnen acht weken na de afkeuring
      verwijderd door een onderneming met een erkenning bodemkwaliteit voor BRL-K902 of BRL-K904.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.999
  - number: 4.999.3
    text: |-
      Als verwijdering van de ondergrondse opslagtank door de ligging redelijkerwijs niet mogelijk is, wordt de
      opslagtank met de daarop aangesloten leidingen binnen acht weken na de afkeuring onklaar gemaakt door een
      onderneming met een erkenning bodemkwaliteit voor BRL-K902 of BRL-K904.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.999
  - number: '4.1000'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt onverwijld geïnformeerd over het afkeuren van een
      ondergrondse opslagtank.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1000
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1001.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste tien dagen voor het verwijderen of het onklaar
      maken van een ondergrondse opslagtank daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1001.2
    text: |-
      Ten hoogste drie maanden na het verwijderen of het onklaar maken van de ondergrondse opslagtank wordt een
      rapportage daarover verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1001a.1
    text: |-
      Voor een ondergrondse opslagtank waarin gasolie, diesel, huisbrandolie of afgewerkte olie wordt opgeslagen is
      financiële zekerheid gesteld ter dekking van aansprakelijkheid voor schade aan de bodem als gevolg van dat opslaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001a
  - number: 4.1001a.2
    text: |-
      De financiële zekerheid is € 225.000,– per ondergrondse opslagtank. Bij meer dan zes ondergrondse opslagtanks,
      waarin stoffen als bedoeld in het eerste lid of [artikel 4.977, eerste lid][ref1], worden opgeslagen, is de
      financiële zekerheid € 1.350.000,– in totaal.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
  - number: 4.1001a.3
    text: 'De financiële zekerheid wordt in stand gehouden tot:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001a
  - number: 4.1001a.3.a
    text: |-
      vier weken nadat het rapport van het bodemonderzoek, bedoeld in [artikel 5.5][ref1], is verstrekt aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1001a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1001a.3.b
    text: |-
      als de bodemkwaliteit wordt hersteld op grond van [artikel 5.6][ref1]: tot vier weken nadat het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref2], is geïnformeerd over de beëindiging van de herstelwerkzaamheden op grond van
      [artikel 5.7, tweede lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel5
