        paragraaf: 7.2.8
        afdeling: '7.2'
  - number: 7.64.1
    text: |-
      Binnen vier weken na afloop van de maand waarin de afgifte heeft plaatsgevonden, worden aan de instantie, bedoeld
      in de [artikelen 10.38, derde lid][ref1], en [10.40, eerste lid, van de Wet milieubeheer][ref2], gegevens en
      bescheiden verstrekt over de afgifte van gevaarlijke afvalstoffen die zijn afgegeven met de bedoeling om zich ervan
      te ontdoen in zee.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.64
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '10'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '10'
  - number: 7.64.2
    text: |-
      De [artikelen 5 tot en met 7 van het Besluit melden bedrijfsafvalstoffen en gevaarlijke afvalstoffen][ref1] zijn
      van overeenkomstige toepassing op het verstrekken van de gegevens en bescheiden.


      [ref1]: https://wetten.overheid.nl/BWBR0017294#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.64
    references:
      - id: ref1
        bwb_id: BWBR0017294
        artikel: '5'
  - number: '7.65'
    text: |-
      Gevaarlijke afvalstoffen worden niet in ontvangst genomen zonder omschrijving en begeleidingsbrief als bedoeld in
      [artikel 10.39 van de Wet milieubeheer][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.65
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '10'
  - number: '7.66'
    text: 'Deze paragraaf is van toepassing op de volgende mijnbouwlocatieactiviteiten in de Noordzee:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.66
  - number: 7.66.a
    text: |-
      het gebruiken van een locatie voor een mijnbouwinstallatie, met inbegrip van het voor die installatie geldende
      beperkingengebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.66
  - number: 7.66.b
    text: |-
      het gebruiken van een locatie voor een verkenningsonderzoek met gebruikmaking van kunstmatig opgewekte trillingen,
      met uitzondering van het bij dat onderzoek gebruiken van ontplofbare stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.66
  - number: 7.66a
    text: |-
      De activiteit, bedoeld in [artikel 7.66, aanhef en onder a][ref1], wordt niet verricht als het gaat om een
      mijnbouwinstallatie voor het opsporen of winnen van delfstoffen en de locatie voor die mijnbouwinstallatie,
      met uitsluiting van het voor die installatie geldende beperkingengebied, ligt in het in de territoriale zee
      gelegen deel van het op grond van [artikel 2.44, eerste lid, van de wet][ref2] aangewezen Natura 2000-gebied
      Noordzeekustzone.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.66a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: '7.67'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      mijnbouwlocatieactiviteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 7.67.a
    text: |-
      de activiteit, bedoeld in [artikel 7.66, aanhef en onder a][ref1], als het gaat om een mijnbouwinstallatie voor het
      opsporen of winnen van delfstoffen, met uitsluiting van het voor die installatie geldende beperkingengebied, in de
      territoriale zee ten noorden van het op grond van [artikel 2.44, eerste lid, van de wet][ref2] aangewezen Natura
      2000-gebied Noordzeekustzone en die mijnbouwinstallatie geheel of gedeeltelijk boven het wateroppervlak uitsteekt;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.67.b
    text: |-
      de activiteit, bedoeld in [artikel 7.66, aanhef en onder a][ref1], voor zover de mijnbouwinstallatie geheel of
      gedeeltelijk boven het wateroppervlak uitsteekt en die activiteit wordt verricht in:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
  - number: 7.67.b.1°
    text: een bij ministeriële regeling aangewezen oefen- en schietgebied;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
  - number: 7.67.b.2°
    text: een bij ministeriële regeling aangewezen drukbevaren deel van de zee; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
  - number: 7.67.b.3°
    text: |-
      een gebied dat is aangewezen in een kavelbesluit of een voorbereidingsbesluit als bedoeld in
      [artikel 3, eerste lid][ref1], respectievelijk [9, eerste lid, van de Wet windenergie op zee][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0036752#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0036752#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
    references:
      - id: ref1
        bwb_id: BWBR0036752
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0036752
        artikel: '9'
  - number: 7.67.c
    text: |-
      de activiteit, bedoeld in [artikel 7.66, aanhef en onder b][ref1], voor zover die wordt verricht in een bij
      ministeriële regeling aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
  - number: 7.67.c.1°
    text: oefen- en schietgebied;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
  - number: 7.67.c.2°
    text: aanloopgebied; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
  - number: 7.67.c.3°
    text: ankergebied in de buurt van een aanloophaven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.67
  - number: 7.68.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 7.66, aanhef en onder a][ref1], te verrichten als de
      mijnbouwinstallatie niet geheel of gedeeltelijk boven het wateroppervlak uitsteekt, zonder dit ten minste vier
      weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.68
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
  - number: 7.68.2
    text: Een melding bevat de coördinaten van de onderzeese installatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.68
  - number: 7.68.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.68
  - number: 7.69.1
    text: |-
      Ten minste 48 uur voor het begin van de activiteit, bedoeld in [artikel 7.66, aanhef en onder b][ref1], worden aan
      de inspecteur-generaal der mijnen de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
  - number: 7.69.1.a
    text: gegevens over de wijze waarop het verkenningsonderzoek wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.1.b
    text: de locatie waarop en de vaarlijnen waarlangs het verkenningsonderzoek wordt verricht, aangegeven op een kaart;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.1.c
    text: de data waarop het verkenningsonderzoek wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.1.d
    text: de namen, nationaliteit en registratiekenmerken van de vaartuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.1.e
    text: |-
      gegevens over de bekwaamheid en ervaring van de personen die contact houden met de overige scheepvaart in en om de
      onderzoekslocatie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.1.f
    text: |-
      gegevens over de radarapparatuur, navigatieapparatuur en telecommunicatieapparatuur van het vaartuig waarop de
      personen, bedoeld onder e, zich bevinden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.2
    text: |-
      Als het verkenningsonderzoek wordt verricht in de bij ministeriële regeling aangewezen drukbevaren delen van de
      zee, worden ook gegevens en bescheiden verstrekt over:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.2.a
    text: de ervaring en bekwaamheid van de personen die de persoon, bedoeld in het eerste lid, onder e, bijstaan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.2.b
    text: |-
      de radarapparatuur, navigatieapparatuur en telecommunicatieapparatuur van het vaartuig waarop die personen zich
      bevinden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.69.3
    text: |-
      Ten minste 48 uur voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens en
      bescheiden, worden de gewijzigde gegevens en bescheiden verstrekt aan de inspecteur-generaal der mijnen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.69
  - number: 7.70.1
    text: |-
      Met het oog op de veiligheid van de scheepsvaart is er aan boord van een verkenningsvaartuig een persoon die
      contact houdt met de andere scheepvaart in en om het onderzoeksgebied.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.70
  - number: 7.70.2
    text: |-
      Een verkenningsvaartuig wordt begeleid door een ander vaartuig waarmee die persoon bij de begeleiding van de andere
      scheepvaart wordt bijgestaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.70
  - number: 7.70.3
    text: |-
      Een verkenningsvaartuig dat onderzoek verricht in de bij ministeriële regeling aangewezen drukbevaren delen van de
      zee, wordt begeleid door twee andere vaartuigen waarmee die persoon bij de begeleiding van de andere scheepvaart
      wordt bijgestaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.70
  - number: '7.71'
    text: |-
      Met het oog op het voorkomen van storende geluidseffecten voor zeezoogdieren wordt bij het gebruik van kunstmatig
      opgewekte trillingen bij een verkenningsonderzoek met een laag geluidsvolume begonnen en verloopt de versterking
      van dat volume geleidelijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.71
  - number: '7.72'
    text: |-
      Bij toezicht op de activiteit, bedoeld in [artikel 7.66, aanhef en onder b][ref1], wordt voorzien in het vervoer
      van toezichthouders, bedoeld in [artikel 130, aanhef en onder a, van de Mijnbouwwet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0014168#Artikel130
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.72
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0014168
        artikel: '130'
  - number: '7.73'
    text: |-
      De [artikelen 7.66a][ref1] en [7.67, aanhef en onder a][ref2], zijn niet van toepassing op het met een
      verplaatsbaar mijnbouwwerk aanleggen, aanpassen, testen, onderhouden, repareren en buiten gebruik stellen van een
      boorgat of stimuleren van een voorkomen via een boorgat, bedoeld in [artikel 4.1116][ref3], op een locatie waarop
      zich een mijnbouwinstallatie voor het opsporen of winnen van delfstoffen bevindt die op grond van het recht zoals
      dat gold voor inwerkingtreding van dit besluit rechtmatig aanwezig is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.73
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.9
        afdeling: '7.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.109'
  - number: '8.1'
    text: Dit hoofdstuk gaat over beperkingengebiedactiviteiten met betrekking tot een weg in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.1
  - number: '8.2'
    text: |-
      De regels in dit hoofdstuk zijn gesteld met het oog op het behoeden van de staat en werking van een weg voor
      nadelige gevolgen van activiteiten op of rond die weg, waartoe ook het belang van verruiming of wijziging van die
      weg behoort.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.2
  - number: '8.3'
    text: |-
      Tenzij in [artikel 8.4][ref1] anders is bepaald, is voor een beperkingengebiedactiviteit met betrekking tot een weg
      in beheer bij het Rijk Onze Minister van Infrastructuur en Waterstaat het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.3.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.3
  - number: 8.3.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.3
  - number: 8.3.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.3
  - number: '8.4'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een weg in beheer bij het Rijk die wordt verricht op
      dezelfde locatie als een activiteit als bedoeld in [afdeling 3.3][ref1] waarvoor een door gedeputeerde staten
      verleende omgevingsvergunning geldt, zijn gedeputeerde staten het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.4
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 8.4.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.4
  - number: 8.4.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.4
  - number: 8.4.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.4
  - number: '8.5'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.5
  - number: 8.6.1
    text: |-
      Degene die een beperkingengebiedactiviteit met betrekking tot een weg in beheer bij het Rijk verricht en weet
      of redelijkerwijs kan vermoeden dat die activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in
      [artikel 8.2][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.6.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
  - number: 8.6.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
  - number: 8.6.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
  - number: 8.6.2
    text: 'Deze plicht houdt in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
  - number: 8.6.2.a
    text: het veilig en doelmatig gebruik van wegen wordt verzekerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
  - number: 8.6.2.b
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 8.7.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in dit hoofdstuk worden verbonden, over
      de [artikelen 8.6][ref2], [8.11][ref3] en [8.12][ref4] en [afdeling 8.2][ref5], met uitzondering van bepalingen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref5
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.2'
  - number: 8.7.1.a
    text: |-
      waarin het toepassingsbereik van een paragraaf voor beperkingengebiedactiviteiten met betrekking tot een weg in
      beheer bij het Rijk wordt bepaald; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
  - number: 8.7.1.b
    text: over meldingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
  - number: 8.7.2
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan worden afgeweken van de [artikelen 8.11][ref1] en
      [8.12][ref2] en [afdeling 8.2][ref3], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.2'
  - number: 8.7.3
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in dit hoofdstuk kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
  - number: 8.7.4
    text: |-
      Op het stellen van een maatwerkvoorschrift is de beoordelingsregel in
      [artikel 8.2 van het Besluit kwaliteit leefomgeving][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: '8.8'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    machine_readable:
      execution:
        produces:
          legal_character: INFORMATIEF
        input:
          - name: melding_ondertekend
            type: boolean
            required: true
            description: Of de melding is ondertekend
            source: {}
          - name: bevat_alle_vereiste_gegevens
            type: boolean
            required: true
            description: Of de melding alle wettelijk vereiste gegevens bevat
            source: {}
        output:
          - name: melding_geldig
            type: boolean
            description: Of de melding voldoet aan de formele vereisten
        actions:
          - output: melding_geldig
            value:
              operation: AND
              conditions:
                - $melding_ondertekend
                - $bevat_alle_vereiste_gegevens
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.8
  - number: 8.8.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.8
  - number: 8.8.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.8
  - number: 8.8.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.8
  - number: 8.8.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.8
  - number: '8.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 8.1][ref1], worden die
      ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.9.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.9
  - number: 8.9.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.9
  - number: 8.9.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.9
  - number: 8.9.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.9
  - number: 8.10.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 8.8][ref1] en [8.9][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in deze afdeling.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.10.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.10
  - number: '8.11'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 8.1][ref1], wordt onverwijld geïnformeerd over een ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: '8.12'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [afdeling 8.1][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.12.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.12
  - number: 8.12.b
    text: |-
      gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.12
  - number: 8.12.c
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '8.13'
    text: |-
      Met een maatwerkvoorschrift worden de [artikelen 8.11][ref1] en [8.12][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.14.1
    text: |-
      Met het oog op het belang van verruiming of wijziging van een weg in beheer bij het Rijk worden bouwwerken, werken
      die geen bouwwerken zijn of andere objecten, waarvoor geen omgevingsvergunning voor een beperkingengebiedactiviteit
      met betrekking tot die weg is vereist, verplaatst of verlegd als die een belemmering vormen voor de voorbereiding
      of uitvoering van de verruiming of wijziging van die weg door of namens de wegbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.14
  - number: 8.14.2
    text: |-
      Als, ondanks een redelijke poging daartoe, met de rechthebbende op het bouwwerk, het werk dat geen bouwwerk is of
      het andere object geen schriftelijke overeenstemming is bereikt over de termijn waarop dat bouwwerk, werk of object
      wordt verplaatst of verlegd, stelt het bevoegd gezag die termijn bij maatwerkvoorschrift vast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.14
  - number: 8.15.1
    text: |-
      Deze paragraaf is van toepassing op activiteiten in het beperkingengebied met betrekking tot een weg in beheer bij
      het Rijk als het gaat om:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.a
    text: het bouwen of in stand houden van bouwwerken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.b
    text: het aanleggen, plaatsen, in stand houden of veranderen van werken die geen bouwwerken zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.c
    text: het plaatsen of in stand houden van andere objecten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.d
    text: het plaatsen, laten staan of laten liggen van materieel, materialen of vaste substanties;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.e
    text: het verrichten van werkzaamheden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.1.f
    text: andere activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.15.2
    text: |-
      Het eerste lid geldt niet voor kabels en leidingen als bedoeld in [artikel 8.19][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.2
        afdeling: '8.2'
  - number: 8.15.3
    text: |-
      Het eerste lid geldt ook niet voor activiteiten die worden verricht door of namens de wegbeheerder in het kader van
      de aanleg, de wijziging of het beheer van een weg of de regeling van het verkeer over die weg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.15
  - number: 8.16.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een weg in beheer bij het Rijk te verrichten, geldt voor de
      activiteiten, bedoeld in [artikel 8.15][ref2], voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.1
        afdeling: '8.2'
  - number: 8.16.1.a
    text: het verrichten van werkzaamheden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.1.b
    text: 'het bouwen, aanleggen, plaatsen of in stand houden van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.1.b.1°
    text: weginfrastructuur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.1.b.2°
    text: |-
      informatieborden, met uitzondering van verkeerstekens en onderborden als bedoeld in
      [artikel 14 van de Wegenverkeerswet 1994][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0006622#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
    references:
      - id: ref1
        bwb_id: BWBR0006622
        artikel: '14'
  - number: 8.16.1.b.3°
    text: |-
      een technische installatie voor een nutsvoorziening, het telecommunicatieverkeer, het wegverkeer of het reguleren
      van het wegverkeer; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.1.b.4°
    text: |-
      het bouwen of in stand houden van andere bouwwerken, het aanleggen, plaatsen of in stand houden van andere werken
      die geen bouwwerken zijn of het plaatsen of in stand houden van andere objecten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2
    text: 'Het verbod geldt niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.a
    text: |-
      het bouwen of in stand houden van bouwwerken, het aanleggen, plaatsen of in stand houden van werken die geen
      bouwwerken zijn en het plaatsen of in stand houden van andere objecten boven en onder de weg, die kleiner zijn dan
      2 m2, niet zichtbaar zijn vanaf de weg en de draagconstructie van de weg niet aantasten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.b
    text: |-
      bestendig en regulier gebruik van buiten de verharding van de weg gelegen gebouwen en de daarbij behorende erven en
      terreinen, tenzij:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.b.1°
    text: er meer dan 30 m3 grond wordt geroerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.b.2°
    text: |-
      een bouwwerk wordt gebouwd, een werk dat geen bouwwerk is wordt aangelegd of geplaatst of een ander object wordt
      geplaatst, met een hoogte van meer dan 5 m; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.c
    text: 'activiteiten in het deel van het beperkingengebied dat hoort bij een verzorgingsplaats, tenzij het gaat om:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.c.1°
    text: het bouwen of in stand houden van een gebouw;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.c.2°
    text: het bouwen of in stand houden van een bouwwerk voor het leveren van energie aan voertuigen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.16.2.c.3°
    text: het herinrichten van de verzorgingsplaats dat nadelige gevolgen kan hebben voor de staat of werking van de weg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.16
  - number: 8.17.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 8.15, onder a tot en met e][ref1], te verrichten zonder dit
      ten minste vier weken en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.1
        afdeling: '8.2'
  - number: 8.17.2
    text: |-
      Een melding bevat de kilometrering en de ligging van het bouwwerk, van het werk dat geen bouwwerk is of van het
      andere object in x-, y- en z-coördinaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
  - number: 8.17.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
  - number: 8.17.4
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
  - number: 8.17.4.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 8.16][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.1
        afdeling: '8.2'
  - number: 8.17.4.b
    text: |-
      op het bestendig en regulier gebruik van buiten de verharding van de weg gelegen gebouwen en de daarbij behorende
      erven en terreinen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.17
  - number: 8.18.1
    text: |-
      Ten minste vier weken voor het begin van een activiteit als bedoeld in [artikel 8.15, onder a tot en met e][ref1],
      worden de volgende gegevens en bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 8.1][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.1
        afdeling: '8.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.18.1.a
    text: de verwachte datum en het verwachte tijdstip van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
  - number: 8.18.1.b
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
  - number: 8.18.2
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
  - number: 8.18.2.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 8.16][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.1
        afdeling: '8.2'
  - number: 8.18.2.b
    text: |-
      op het bestendig en regulier gebruik van buiten de verharding van de weg gelegen gebouwen en de daarbij behorende
      erven en terreinen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.18
  - number: 8.19.1
    text: |-
      Deze paragraaf is van toepassing op het bouwen, aanleggen, plaatsen, in stand houden, slopen of verwijderen van
      kabels of leidingen in de bodem in het beperkingengebied met betrekking tot een weg in beheer bij het Rijk, met
      inbegrip van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.19
  - number: 8.19.1.a
    text: het bouwen, in stand houden en slopen van bouwwerken die daarmee samenhangen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.19
  - number: 8.19.1.b
    text: |-
      het aanleggen, plaatsen, in stand houden en verwijderen van werken die geen bouwwerken zijn, die daarmee
      samenhangen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.19
  - number: 8.19.2
    text: |-
      Het eerste lid geldt niet voor activiteiten die worden verricht door of namens de wegbeheerder in het kader van de
      aanleg, de wijziging of het beheer van een weg of de regeling van het verkeer over die weg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.19
  - number: 8.20.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 8.19][ref1] te verrichten zonder dit ten minste vier weken
      en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.2.2
        afdeling: '8.2'
  - number: 8.20.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a
    text: 'voor het bouwen, aanleggen of plaatsen van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.1°
    text: een beschrijving van de soort kabel of leiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.2°
    text: een beschrijving van de wijze van aanleg van de kabel of leiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.3°
    text: |-
      de kilometrering en de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-
      coördinaten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.4°
    text: 'bij een leiding onder druk: een berekening van de erosiekrater;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.5°
    text: 'als een gestuurde boring of persing wordt gebruikt: een boorplan; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.a.6°
    text: >-
      als wordt geboord bij de fundering van een
      viaduct: een beschrijving van de invloed van
      de boring op de fundering;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.b
    text: 'voor het in stand houden van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.b.1°
    text: een beschrijving van de werkzaamheden aan de kabel of leiding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.b.2°
    text: |-
      de kilometrering en de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-
      coördinaten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.c
    text: 'voor het slopen of verwijderen van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.c.1°
    text: een beschrijving van de wijze van verwijderen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.2.c.2°
    text: |-
      de kilometrering en de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-
      coördinaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.20.4
    text: |-
      Dit artikel is niet van toepassing op het bestendig en regulier gebruik van buiten de verharding van de weg gelegen
      gebouwen met een woonfunctie en de daarbij behorende erven, tenzij de kabel of leiding de kadastrale grens van het
      perceel kruist.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.20
  - number: 8.21.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit worden de volgende gegevens en bescheiden verstrekt aan het
      bevoegd gezag, bedoeld in [afdeling 8.1][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.21.1.a
    text: de verwachte datum en het verwachte tijdstip van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.21
  - number: 8.21.1.b
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.21
  - number: 8.21.2
    text: |-
      Dit artikel is niet van toepassing op het bestendig en regulier gebruik van buiten de verharding van de weg gelegen
      gebouwen met een woonfunctie en de daarbij behorende erven, tenzij de kabel of leiding de kadastrale grens van het
      perceel kruist.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.21
  - number: '8.22'
    text: |-
      Uiterlijk binnen twee maanden na afloop van de activiteit worden revisietekeningen met x-, y- en z- coördinaten en
      maatvoering vanuit vaste punten verstrekt aan het bevoegd gezag, bedoeld in [afdeling 8.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
        afdeling: '8.1'
  - number: 8.23.1
    text: 'Met het oog op een veilig en doelmatig gebruik van de weg wordt een ontgraving:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.23.1.a
    text: beperkt tot een zo klein mogelijk profiel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.23.1.b
    text: |-
      op dezelfde dag dat deze wordt gemaakt gedicht met de uitkomende grond of aangevoerde grond met vergelijkbare
      hydrologische en texturele eigenschappen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.23.1.c
    text: niet verricht tussen een half uur voor zonsondergang en een half uur na zonsopgang.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.23.2
    text: De bekleding of verharding van de weg worden niet opgebroken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.23.3
    text: De afwatering van de weg wordt niet belemmerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.23
  - number: 8.24.1
    text: 'Met het oog op een veilig en doelmatig gebruik van de weg wordt een kabel of leiding gelegd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.a
    text: buiten de verharding van de weg;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.b
    text: |-
      op een afstand van ten minste 2,5 m van de aanwezige bomen, gemeten vanuit de as van de bomenrij als er een
      bomenrij is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.c
    text: op een afstand van ten minste 1,5 m van andere beplanting, met uitzondering van gras;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.d
    text: |-
      als de kabel of leiding parallel aan een bermsloot wordt gelegd: op een afstand van ten minste 1,5 m vanaf de
      insteek van de bermsloot;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.e
    text: |-
      als de kabel of leiding parallel aan een talud wordt gelegd: op een afstand van ten minste 1,5 m vanaf de teen van
      het talud; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.1.f
    text: |-
      als de kabel of leiding parallel aan een geleiderailconstructie wordt gelegd: op een afstand van ten minste 1,5 m
      vanaf die constructie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.2
    text: De afstanden worden gemeten tot aan de dichtstbij gelegen zijde van de kabel of leiding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.3
    text: |-
      Het vlak, gelegen onder een helling van 1:3 uit de onderkant van de verharding of de fundering, wordt niet
      doorsneden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.4
    text: |-
      In de berm van de weg is de gronddekking boven een kabel of leiding ten minste 0,8 m. De gronddekking bestaat uit
      twee lagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.24.5
    text: Als een kabel of leiding kruist met een bermsloot, is de gronddekking boven de kabel of leiding ten minste 0,8 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.24
  - number: 8.25.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de weg wordt bij een kruising van een kabel of leiding met een
      weg:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.1.a
    text: een mantelbuis gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.1.b
    text: een gestuurde boring toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.2
    text: 'Als de boring bij een kruising mislukt, wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.2.a
    text: de mantelbuis niet teruggetrokken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.2.b
    text: een nieuwe kruising gemaakt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.2.c
    text: de in het weglichaam achtergebleven mantelbuis geheel opgevuld met dämmer en aan beide zijden waterdicht afgestopt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.25.3
    text: |-
      Als een gestuurde boring onevenredige meerkosten met zich meebrengt of niet uitvoerbaar is, kan een persing worden
      toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.25
  - number: 8.26.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de weg wordt geboord of geperst volgens de Richtlijn
      Boortechnieken en open ontgraving voor kabels en leidingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.26
  - number: 8.26.2
    text: |-
      Bij het boren is controleerbaar of de inhoud van de hoeveelheid uitkomende grond ongeveer gelijk is aan de inhoud
      van de voorwaartse verplaatsing van de persbuis, waarbij rekening wordt gehouden met de uitlevering van de grond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.26
  - number: 8.26.3
    text: Bij het verwijderen van de grond aan de voorzijde van de buis wordt niet uitgeboord.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.26
  - number: 8.27.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de weg is bij een boring de afstand tussen de bovenkant van de
      verharding en de bovenkant van de leiding of kabel ten minste 2,5 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.27
  - number: 8.27.2
    text: Een boring wordt op ten minste 5 m afstand van een andere kabel of leiding verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.27
  - number: 8.28.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de weg liggen het intredepunt en het uittredepunt van een
      mantelbuis, van waaruit wordt geboord, buiten het weglichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.28
  - number: 8.28.2
    text: |-
      De lengte van een mantelbuis bestrijkt ten minste een spreidingszone onder 45° vanuit de zijkant van de
      wegconstructie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel8.28
  - number: 9.1.1
    text: 'Dit hoofdstuk gaat over beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.1.a
    text: een hoofdspoorweg;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.1.b
    text: een lokale spoorweg; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.1.c
    text: een bijzondere spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.2
    text: 'Dit hoofdstuk gaat niet over beperkingengebiedactiviteiten met betrekking tot een bijzondere spoorweg:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.2.a
    text: met een nominale spoorwijdte van minder dan 500 mm;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.2.b
    text: |-
      die een attractie of speeltoestel als bedoeld in het [Warenwetbesluit attractie- en speeltoestellen][ref1] is;


      [ref1]: https://wetten.overheid.nl/BWBR0008223
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
    references:
      - id: ref1
        bwb_id: BWBR0008223
  - number: 9.1.2.c
    text: die ligt binnen een terrein van een bedrijf dat niet vrij toegankelijk is voor het publiek; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: 9.1.2.d
    text: die is verwijderd of op een andere wijze voor gebruik ontoegankelijk is gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.1
  - number: '9.2'
    text: |-
      De regels in dit hoofdstuk zijn gesteld met het oog op het behoeden van de staat en werking van hoofdspoorwegen,
      lokale spoorwegen en bijzondere spoorwegen voor nadelige gevolgen van activiteiten op of rond die spoorwegen,
      waartoe ook het belang van verruiming of wijziging van die spoorwegen behoort.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.2
  - number: '9.3'
    text: |-
      Tenzij in [artikel 9.6][ref1] anders is bepaald, is voor een beperkingengebiedactiviteit met betrekking tot een
      lokale spoorweg binnen de gebieden die op grond van [artikel 20, derde lid, van de Wet personenvervoer 2000][ref2]
      zijn aangewezen, het dagelijks bestuur van een openbaar lichaam als bedoeld in dat artikel het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 9.3.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.3
  - number: 9.3.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.3
  - number: 9.3.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.3
  - number: '9.4'
    text: |-
      Tenzij in [artikel 9.6][ref1] anders is bepaald, zijn voor een beperkingengebiedactiviteit met betrekking tot een
      lokale spoorweg buiten de gebieden die op grond van [artikel 20, derde lid, van de Wet personenvervoer 2000][ref2]
      zijn aangewezen, gedeputeerde staten het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.4
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 9.4.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.4
  - number: 9.4.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.4
  - number: 9.4.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.4
  - number: '9.5'
    text: |-
      Tenzij in [artikel 9.6][ref1] anders is bepaald, is voor een beperkingengebiedactiviteit met betrekking tot een
      hoofdspoorweg of een bijzondere spoorweg Onze Minister van Infrastructuur en Waterstaat het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.5.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.5
  - number: 9.5.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.5
  - number: 9.5.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.5
  - number: '9.6'
    text: |-
      Voor een beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg, een lokale spoorweg of een bijzondere
      spoorweg, die wordt verricht op dezelfde locatie als een activiteit als bedoeld in [afdeling 3.3][ref1] waarvoor
      een door gedeputeerde staten verleende omgevingsvergunning geldt, zijn gedeputeerde staten het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 9.6.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.6
  - number: 9.6.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.6
  - number: 9.6.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.6
  - number: '9.7'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.7
  - number: 9.8.1
    text: |-
      Degene die een beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg, een lokale spoorweg of een
      bijzondere spoorweg verricht en weet of redelijkerwijs kan vermoeden dat die activiteit nadelige gevolgen kan
      hebben voor de belangen, bedoeld in [artikel 9.2][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.8.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2
    text: 'Deze plicht houdt in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.a
    text: het veilig en doelmatig gebruik van de spoorweg wordt verzekerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.b
    text: |-
      alle passende maatregelen worden getroffen om ongewone voorvallen en de nadelige gevolgen daarvan te voorkomen als
      bedoeld in [artikel 19.1 van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 9.8.2.c
    text: de spoorweg tijdens het verrichten van de activiteit bereikbaar blijft voor de beheerder en voor hulpdiensten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.d
    text: vluchtwegen worden vrijgehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.e
    text: objecten zo worden geplaatst dat zij niet op de spoorweg terecht kunnen komen of daaraan schade kunnen veroorzaken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.f
    text: zichtlijnen niet worden gehinderd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.8.2.g
    text: het gebruikte materiaal en materieel na beëindiging van de activiteit onverwijld wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.8
  - number: 9.9.1
    text: |-
      Een maatwerkregel kan worden gesteld over de [artikelen 9.8][ref1], [9.14][ref2] en [9.15][ref3] en in aanvulling
      op artikel 9.8, voor zover het betreft beperkingengebiedactiviteiten met betrekking tot een lokale spoorweg.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.9.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van de [artikelen 9.14][ref1] en [9.15][ref2], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.9.3
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op de belangen, bedoeld in [artikel 9.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.9.4
    text: 'Een maatwerkregel wordt gesteld in:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
  - number: 9.9.4.a
    text: |-
      het omgevingsplan voor de gebieden die op grond van [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1]
      zijn aangewezen; en


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 9.9.4.b
    text: de omgevingsverordening voor andere gebieden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.9
  - number: 9.10.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een vergunning als bedoeld in dit hoofdstuk worden verbonden, over de
      [artikelen 9.8][ref2], [9.14][ref3] en [9.15][ref4] en [afdeling 9.2][ref5], met uitzondering van bepalingen over
      meldingen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref5
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.2'
  - number: 9.10.2
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan worden afgeweken van de [artikelen 9.14][ref1] en
      [9.15][ref2] en [afdeling 9.2][ref3], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.2'
  - number: 9.10.3
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een vergunning als bedoeld in
      dit hoofdstuk kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.10
  - number: 9.10.4
    text: |-
      Op het stellen van een maatwerkvoorschrift is de beoordelingsregel in
      [artikel 8.2 van het Besluit kwaliteit leefomgeving][ref1] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: '9.11'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.11
  - number: 9.11.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.11
  - number: 9.11.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.11
  - number: 9.11.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.11
  - number: 9.11.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.11
  - number: '9.12'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [deze afdeling][ref1], worden die
      ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.12.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.12
  - number: 9.12.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.12
  - number: 9.12.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.12
  - number: 9.12.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.12
  - number: 9.13.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 9.11][ref1] en [9.12][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in [deze afdeling][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.13.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in [deze afdeling][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: '9.14'
    text: |-
      Het bevoegd gezag, bedoeld in [deze afdeling][ref1], en de spoorwegbeheerder worden onverwijld geïnformeerd over
      een ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: '9.15'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [deze afdeling][ref1], en de spoorwegbeheerder:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.15.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.15
  - number: 9.15.b
    text: gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.15
  - number: 9.15.c
    text: |-
      de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon voorval te voorkomen
      als bedoeld in [artikel 19.1 van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 9.15.d
    text: |-
      de maatregelen die zijn getroffen of worden overwogen om te voorkomen dat een zodanig voorval zich nog een keer
      kan voordoen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.15
  - number: '9.16'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 9.14][ref1] en [9.15][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.17.1
    text: |-
      Met het oog op het belang van verruiming of wijziging van een spoorweg worden bouwwerken, werken die geen
      bouwwerken zijn of andere objecten, waarvoor geen omgevingsvergunning voor een beperkingengebiedactiviteit met
      betrekking tot die spoorweg is vereist, verplaatst of verlegd als deze een belemmering vormen voor de voorbereiding
      of uitvoering van de verruiming of wijziging van die spoorweg door of namens de spoorwegbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.17
  - number: 9.17.2
    text: |-
      Als, ondanks een redelijke poging daartoe, met de rechthebbende op het bouwwerk, het werk dat geen bouwwerk is of
      het andere object geen schriftelijke overeenstemming is bereikt over de termijn waarop dat bouwwerk, werk of object
      wordt verplaatst of verlegd, stelt het bevoegd gezag deze termijn bij maatwerkvoorschrift vast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.17
  - number: 9.19.1
    text: |-
      Deze paragraaf is van toepassing op het bouwen, aanleggen, plaatsen, in stand houden, slopen of verwijderen
      van kabels en leidingen in de bodem in het beperkingengebied met betrekking tot een hoofdspoorweg of bijzondere
      spoorweg, met inbegrip van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.19
  - number: 9.19.1.a
    text: het bouwen, in stand houden en slopen van bouwwerken, die daarmee samenhangen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.19
  - number: 9.19.1.b
    text: |-
      het aanleggen, plaatsen, in stand houden en verwijderen van werken die geen bouwwerken zijn, die daarmee
      samenhangen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.19
  - number: 9.19.2
    text: |-
      Het eerste lid geldt niet voor activiteiten die worden verricht door of namens de spoorwegbeheerder in het kader
      van het aanleggen, het wijzigen of het beheren van een hoofdspoorweg of bijzondere spoorweg of de regeling van het
      verkeer over die spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.19
  - number: '9.20'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg of bijzondere spoorweg te verrichten, geldt voor
      de activiteiten, bedoeld in [artikel 9.19][ref2], voor zover het gaat om het bouwen, aanleggen, plaatsen of in
      stand houden van:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: 9.20.a
    text: elektriciteitskabels met een spanningsniveau van meer dan 1 kV in langsligging; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
  - number: 9.20.b
    text: 'beschermbuizen voor kabels of leidingen die het spoor kruisen en die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
  - number: 9.20.b.1°
    text: een diameter van meer dan 600 mm hebben;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
  - number: 9.20.b.2°
    text: op een diepte van minder dan 6 m onder het maaiveld liggen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
  - number: 9.20.b.3°
    text: anders dan met een horizontaal gestuurde boring worden aangelegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.20
  - number: 9.21.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 9.19][ref1] te verrichten zonder dit ten minste vier weken
      en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: 9.21.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a
    text: 'voor het bouwen, aanleggen of plaatsen van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.1°
    text: een beschrijving van de soort kabel of leiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.2°
    text: een beschrijving van de wijze van aanleg van de kabel of leiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.3°
    text: |-
      de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-coördinaten op de
      basisbeheerkaart;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.4°
    text: 'bij een leiding onder druk: een berekening van de erosiekrater;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.5°
    text: 'als een gestuurde boring of persing wordt gebruikt: een werkplan; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.a.6°
    text: >-
      als wordt geboord bij de fundering van een
      viaduct: een beschrijving van de invloed van
      de boring op de fundering;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.b
    text: 'voor het in stand houden van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.b.1°
    text: een beschrijving van de werkzaamheden aan de kabel of leiding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.b.2°
    text: |-
      de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-coördinaten op de
      basisbeheerkaart; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.c
    text: 'voor het slopen of verwijderen van een kabel of leiding:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.c.1°
    text: een kabelverwijderingsplan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.2.c.2°
    text: |-
      de ligging van de kabel of leiding en van objecten die daarmee samenhangen in x-, y- en z-coördinaten op de
      basisbeheerkaart.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4
    text: 'Dit artikel is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 9.20][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: 9.21.4.b
    text: |-
      op het in de beschermingszone van een beperkingengebied met betrekking tot een hoofdspoorweg of bijzondere spoorweg
      bouwen, aanleggen of plaatsen van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4.b.1°
    text: gasleidingen met een diameter van ten hoogste 110 mm en een druk van ten hoogste 4 bar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4.b.2°
    text: waterleidingen met een diameter van ten hoogste 44 mm en een druk van ten hoogste 4 bar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4.b.3°
    text: drukloze rioleringsbuizen met een diameter van ten hoogste 160 mm; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.21.4.b.4°
    text: overige kabels en leidingen met een diameter van ten hoogste 110 mm en een druk van ten hoogste 4 bar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.21
  - number: 9.22.1
    text: |-
      Ten minste vier weken en ten hoogste acht weken voor het begin van de activiteit worden de volgende gegevens en
      bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 9.1][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.22.1.a
    text: de verwachte datum en het verwachte tijdstip van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.22
  - number: 9.22.1.b
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.22
  - number: 9.22.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [artikel 9.20][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: '9.23'
    text: |-
      Uiterlijk binnen twee maanden na afloop van de activiteit worden revisietekeningen met x-, y- en z-coördinaten
      en maatvoering vanuit vaste punten op de basisbeheerkaart verstrekt aan het bevoegd gezag, bedoeld in
      [afdeling 9.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        afdeling: '9.1'
  - number: 9.24.1
    text: 'Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg wordt een ontgraving:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.24
  - number: 9.24.1.a
    text: beperkt tot een zo klein mogelijk profiel; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.24
  - number: 9.24.1.b
    text: |-
      onverwijld na de werkzaamheden gedicht met de uitkomende grond, in de oorspronkelijke volgorde, of met aangevoerde
      grond met vergelijkbare hydrologische en texturele eigenschappen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.24
  - number: 9.24.2
    text: De gedichte sleuf wordt gedurende een jaar onderhouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.24
  - number: 9.25.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg wordt een kabel of
      leiding in een sleuf, koker of goot op een diepte van ten minste 0,6 m gelegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.2
    text: Kabels en leidingen worden zoveel mogelijk geconcentreerd en gebundeld gelegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.3
    text: |-
      Als een kabel of leiding parallel aan andere kabels, leidingen of beschermbuizen wordt gelegd, wordt deze op een
      afstand van ten minste 0,2 m vanaf die kabels, leidingen of beschermbuizen gelegd, gemeten vanaf de buitenzijde van
      de kabel of leiding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.4
    text: 'Als andere kabels of leidingen worden gekruist:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.4.a
    text: wordt de kabel of leiding onder de bestaande kabels en leidingen aangelegd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.4.b
    text: |-
      wordt de kabel of leiding op een afstand van ten minste 0,2 m vanaf de bestaande kabels en leidingen gelegd,
      gemeten vanaf de buitenzijde van de kabel, leiding of beschermbuis; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.25.4.c
    text: |-
      wordt de kabel of leiding aangelegd in een beschermbuis als de afstand tot de bestaande kabels, leidingen of
      mantelbuizen minder dan 0,8 m is, waarbij de buitenzijde van de beschermbuis tot ten minste 0,8 m voorbij de
      buitenzijde van de bestaande kabels, leidingen of beschermbuizen reikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.25
  - number: 9.26.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg wordt bij een kruising
      van een kabel of leiding met een hoofdspoorweg:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: 9.26.1.a
    text: een beschermbuis gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: 9.26.1.b
    text: een horizontaal gestuurde boring toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: 9.26.2
    text: 'Als de boring bij een kruising mislukt, wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: 9.26.2.a
    text: de beschermbuis niet teruggetrokken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: 9.26.2.b
    text: |-
      de in het baanlichaam achtergebleven beschermbuis geheel opgevuld met dämmer en aan beide zijden waterdicht
      afgestopt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.26
  - number: '9.27'
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg wordt geboord volgens de
      Technische Voorschriften bij vergunningen voor kabels en leidingen langs, onder en boven de spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.27
  - number: 9.28.1
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg wordt een boring in
      zandgrond op ten minste 5 m en in andere grond op ten minste 10 m afstand van een andere kabel of leiding verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.28
  - number: 9.28.2
    text: Een boring wordt op ten minste 10 m afstand van de fundering van een viaduct verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.28
  - number: '9.29'
    text: |-
      Met het oog op een veilig en doelmatig gebruik van de hoofdspoorweg of bijzondere spoorweg liggen het intredepunt
      en het uittredepunt van een beschermbuis, van waaruit wordt geboord, buiten het beperkingengebied.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.29
  - number: 9.30.1
    text: |-
      Deze paragraaf is van toepassing op de volgende activiteiten in het beperkingengebied met betrekking tot een
      hoofdspoorweg of bijzondere spoorweg:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: 9.30.1.a
    text: het bouwen, in stand houden of slopen van bouwwerken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: 9.30.1.b
    text: het aanleggen, plaatsen, in stand houden, veranderen of verwijderen van werken die geen bouwwerken zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: 9.30.1.c
    text: het plaatsen, in stand houden of verwijderen van andere objecten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: 9.30.2
    text: 'Het eerste lid geldt niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: 9.30.2.a
    text: |-
      het bouwen, in stand houden en slopen van bouwwerken en het aanleggen, plaatsen, in stand houden en verwijderen van
      werken die geen bouwwerken zijn, die samenhangen met kabels en leidingen, bedoeld in [artikel 9.19][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: 9.30.2.b
    text: |-
      activiteiten op perrons, bedoeld in [artikel 9.37][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: 9.30.3
    text: |-
      Het eerste lid geldt ook niet voor activiteiten die worden verricht door of namens de spoorwegbeheerder in het
      kader van het aanleggen, het wijzigen of het beheren van een hoofdspoorweg of bijzondere spoorweg of de regeling
      van het verkeer over die spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.30
  - number: '9.31'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een hoofdspoorweg of bijzondere spoorweg te verrichten, geldt
      voor de activiteiten, bedoeld in [artikel 9.30][ref2], voor zover het gaat om het bouwen of in stand houden van
      bouwwerken, het aanleggen, plaatsen, in stand houden of veranderen van werken die geen bouwwerken zijn en het
      plaatsen of in stand houden van andere objecten:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.31.a
    text: in de kernzone van een beperkingengebied met betrekking tot een hoofdspoorweg of bijzondere spoorweg;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
  - number: 9.31.b
    text: |-
      in de overwegzone van een beperkingengebied met betrekking tot een hoofdspoorweg of bijzondere spoorweg, als het
      bouwwerk, werk dat geen bouwwerk is of object hoger is dan 1 m; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
  - number: 9.31.c
    text: >-
      in de beschermingszone van een
      beperkingengebied met betrekking tot een
      hoofdspoorweg of bijzondere spoorweg, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
  - number: 9.31.c.1°
    text: het bouwwerk, werk dat geen bouwwerk is of andere object niet wordt gefundeerd op staal; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
  - number: 9.31.c.2°
    text: de maaiveldbelasting groter is dan 500 kg/m2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.31
  - number: 9.32.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 9.30][ref1] te verrichten zonder dit ten minste vier weken
      en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.32.2
    text: |-
      Een melding bevat de ligging van het bouwwerk, van het werk dat geen bouwwerk is of van het andere object in x-, y-
      en z-coördinaten op de basisbeheerkaart.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.32
  - number: 9.32.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.32
  - number: 9.32.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [artikel 9.31][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.2
        afdeling: '9.2'
  - number: 9.33.1
    text: |-
      Ten minste vier weken en ten hoogste acht weken voor het begin van de activiteit worden de volgende gegevens en
      bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 9.1][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.33
    references:
      - id: ref1
