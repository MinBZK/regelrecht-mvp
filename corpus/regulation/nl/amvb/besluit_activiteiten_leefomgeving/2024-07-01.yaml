        paragraaf: '4.98'
  - number: 4.1014b
    text: |-
      De [artikelen 4.1008, eerste lid, aanhef en onder a, en tweede lid, aanhef en onder a][ref1], en [4.1009][ref2]
      zijn niet van toepassing op het opslaan van gevaarlijke stoffen in verpakking dat voor de inwerkingtreding van dit
      besluit al rechtmatig werd verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals
      deze werd verricht voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014b
