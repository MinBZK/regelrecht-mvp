    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.532
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.533'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.532, tweede lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


