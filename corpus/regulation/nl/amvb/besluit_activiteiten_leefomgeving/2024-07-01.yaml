                    Koperrook, berekend als koper


                    0,5


                    1,25
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.299
  - number: 4.300.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in [tabel 4.299][ref1], is NEN-EN 15259 van
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.300.2
    text: 'Op het verrichten van een eenmalige meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.300.2.a
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.300.2.b
    text: 'voor chroom VI-verbindingen, berekend als chroom: NEN-ISO 16740;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.300.2.c
    text: 'voor zware metalen: NEN-EN 14385;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.300.2.d
    text: 'voor vocht: NEN-EN 14790; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.300.2.e
    text: 'voor debiet: NEN-EN-ISO 16911-1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.300
  - number: 4.301.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.299][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.301
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.301.2
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.301
  - number: 4.301.2.a
    text: |-
      voor totaal stof de maatregel, bedoeld in [artikel 4.299, derde lid][ref1], wordt getroffen;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.301
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.301.2.b
    text: |-
      voor chroom VI-verbindingen, berekend als chroom, de maatregel, bedoeld in [artikel 4.299, vierde lid][ref1], wordt
      getroffen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.301
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.301.2.c
    text: |-
      voor koper en koperverbindingen, berekend als koper, de maatregel, bedoeld in [artikel 4.299, vijfde lid][ref1],
      wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.301
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.302.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.302
  - number: 4.302.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.302.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.302
  - number: 4.302.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.302
  - number: 4.302.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.300][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.302 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Totaal stof


                    30


                    Overig


                    40


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.302
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: '4.303'
    text: Met het oog op het beschermen van de gezondheid worden emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.303
  - number: 4.303a
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden afvalstoffen van verspanende metaalbewerking waarbij
      olie, smeermiddel of koelvloeistof is gebruikt gescheiden in een metaalfractie en een vloeistoffractie door ze te
      centrifugeren of 48 uur te laten uitlekken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.303a
  - number: 4.304.1
    text: Deze paragraaf is van toepassing op het mechanisch bewerken van steen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.304
  - number: 4.304.2
    text: |-
      Deze paragraaf is niet van toepassing op het mobiel breken van bouwafval en sloopafval, bedoeld in
      [afdeling 7.2 van het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Afdeling7.2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.304
    references:
      - id: ref1
        bwb_id: BWBR0041297
        afdeling: '7.2'
  - number: 4.305.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.304][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.305
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.19'
  - number: 4.305.2
    text: Een melding bevat een opsomming van de steensoorten die worden bewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.305
  - number: 4.305.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.305
  - number: 4.305.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.305
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.306'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.304][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.306
    references:
