      bedoeld in [artikel 8.76, tweede lid, onder a en b, van het Besluit kwaliteit leefomgeving][ref1]. Op het stellen
      van dat maatwerkschrift zijn de beoordelingsregels in de [artikelen 8.84][ref2] en [8.87][ref3] van dat besluit en
      [afdeling 8.3 van het Omgevingsbesluit][ref4] van overeenkomstige toepassing.


