        hoofdstuk: '2'
        afdeling: '2.7'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.11.1
    text: |-
      Degene die een milieubelastende activiteit, een lozingsactiviteit op een oppervlaktewaterlichaam of een
      lozingsactiviteit op een zuiveringtechnisch werk verricht en weet of redelijkerwijs kan vermoeden dat die
      activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 2.2][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.11.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2
    text: 'Voor milieubelastende activiteiten houdt deze plicht in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.a
    text: alle passende preventieve maatregelen tegen milieuverontreiniging worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.b
    text: alle passende preventieve maatregelen ter bescherming van de gezondheid worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.c
    text: de beste beschikbare technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.d
    text: geen significante milieuverontreiniging wordt veroorzaakt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.e
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 2.11.2.f
    text: afvalwater dat wordt geloosd en gekanaliseerde emissies van stoffen in de lucht doelmatig kunnen worden bemonsterd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.g
    text: metingen representatief zijn en monsters niet worden verdund;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.h
    text: meetresultaten op geschikte wijze worden geregistreerd, verwerkt en gepresenteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.i
    text: 'voor zover verontreiniging van de bodem ontstaat: herstel van de bodem redelijkerwijs mogelijk blijft; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.2.j
    text: |-
      afvalstoffen worden afgevoerd na beëindiging van een activiteit als bedoeld in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.11.3
    text: |-
      Voor lozingsactiviteiten op een oppervlaktewaterlichaam en lozingsactiviteiten op een zuiveringtechnisch werk houdt
      deze plicht in ieder geval in dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.a
    text: alle passende preventieve maatregelen tegen milieuverontreiniging worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.b
    text: de beste beschikbare technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.c
    text: geen significante milieuverontreiniging wordt veroorzaakt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.d
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 2.11.3.e
    text: lozingen op een oppervlaktewaterlichaam of een zuiveringtechnisch werk doelmatig kunnen worden bemonsterd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.f
    text: metingen representatief zijn en monsters niet worden verdund; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.11.3.g
    text: meetresultaten op geschikte wijze worden geregistreerd, verwerkt en gepresenteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.11
  - number: 2.12.1
    text: |-
      Een maatwerkregel kan worden gesteld over [artikel 2.11][ref1], [afdeling 2.7][ref2] en de
      [hoofdstukken 3 tot en met 5][ref3], met uitzondering van bepalingen waarin activiteiten worden aangewezen als
      milieubelastende activiteiten, lozingsactiviteiten op een oppervlaktewaterlichaam of lozingsactiviteiten op een
      zuiveringtechnisch werk.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.4'
      - id: ref2
