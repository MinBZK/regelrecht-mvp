      lozingsactiviteit op een oppervlaktewaterlichaam te verrichten, geldt voor de lozingsactiviteit, bedoeld in
      [artikel 6.53, eerste lid][ref2], voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
    references:
