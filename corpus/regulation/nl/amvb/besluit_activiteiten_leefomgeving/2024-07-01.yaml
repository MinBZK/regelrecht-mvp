        afdeling: '5.4'
  - number: '4.155'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met betonmortel wordt beton uitgewassen boven een
      aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.155
  - number: 4.156.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met ontkistingsmiddelen wordt ontkistingsmiddel
      op bekisting aangebracht boven een aaneengesloten bodemvoorziening, tenzij het aanbrengen plaatsvindt bij een
      bouwplaats.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.156
  - number: 4.156.2
    text: |-
      Betonproducten in bekisting, waaruit ontkistingsmiddelen kunnen lekken, worden opgeslagen boven een aaneengesloten
      bodemvoorziening, tenzij het opslaan plaatsvindt bij een bouwplaats.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.156
  - number: '4.157'
    text: |-
      Er worden alleen plantaardige of oplosmiddelvrije ontkistingsmiddelen gebruikt, tenzij dat redelijkerwijs niet
      mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.157
  - number: 4.158.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het uitwassen van
      beton geloosd op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.158
  - number: 4.158.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd op een oppervlaktewaterlichaam of via die
      andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.158
  - number: '4.159'
    text: |-
      Voor het afvalwater dat wordt geloosd op een oppervlaktewaterlichaam, is de emissiegrenswaarde voor onopgeloste
      stoffen 100 mg/l en voor chemisch zuurstofverbruik 200 mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.159
  - number: 4.161.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.161
  - number: 4.161.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.161
  - number: 4.161.3
    text: 'Op het analyseren van een monster is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.161
  - number: 4.161.3.a
    text: 'voor onopgeloste stoffen: NEN-EN 872; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.161
  - number: 4.161.3.b
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.161
  - number: '4.162'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.162
  - number: 4.162.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.162
  - number: 4.162.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.162
  - number: 4.162.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.162
  - number: '4.163'
    text: 'Deze paragraaf is van toepassing op het verrichten van de volgende grafische processen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.163
  - number: 4.163.a
    text: heatsetrotatieoffset;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.163
  - number: 4.163.b
    text: illustratiediepdruk;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.163
  - number: 4.163.c
    text: rotatiediepdruk;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.163
  - number: 4.163.d
    text: rotatiezeefdruk;
