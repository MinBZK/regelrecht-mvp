      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.10
  - number: 18.11.1
    text: |-
      Als milieubelastende activiteiten als bedoeld in [artikel 18.2][ref1] worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
