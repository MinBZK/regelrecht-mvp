    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.2.a
    text: de coördinaten van de tankzuil en de bufferopslag;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.2.b
    text: de waterinhoud van de bufferopslag in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.2.c
    text: de aanduiding dat het aantal personenauto’s dat per etmaal wordt getankt ten hoogste 300 of meer dan 300 bedraagt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.2.d
    text: de aanduiding dat het aantal autobussen dat per etmaal wordt getankt ten hoogste 100 of meer dan 100 bedraagt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.2.e
    text: |-
      voor zover van toepassing, de aanduiding dat vaartuigen, werktuigen of andere voertuigen dan personenauto’s of
      autobussen worden getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.482
  - number: 4.482.4
    text: |-
