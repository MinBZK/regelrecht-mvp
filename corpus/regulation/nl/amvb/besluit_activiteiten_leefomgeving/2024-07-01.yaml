  - number: 4.723e.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam en het beschermen van
      de gezondheid worden geen gewasbeschermingsmiddelen gebruikt als de windsnelheid meer is dan 5 m/s, gemeten op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723e.1.a
    text: 2 m boven de grond bij neerwaarts bespuiten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723e.1.b
    text: 1 m boven boomhoogte bij op- en zijwaarts bespuiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723e.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723e.2.a
    text: |-
      als kan worden aangetoond dat niet anders dan door het gebruik van gewasbeschermingsmiddelen bij een windsnelheid
      groter dan 5 m/s een teeltbedreigende situatie kan worden voorkomen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723e.2.b
    text: op een overkapte beddenspuit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723e
  - number: 4.723f.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam met
      gewasbeschermingsmiddelen worden binnen een teeltvrije zone gewasbeschermingsmiddelen niet druppelsgewijs gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723f
  - number: 4.723f.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723f
  - number: 4.723f.2.a
    text: bij pleksgewijze onkruidbestrijding met een afgeschermde dop; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723f
  - number: 4.723f.2.b
    text: |-
      bij het gebruik van gewasbeschermingsmiddelen op overhangend loof van niet meer dan een halve gewasrij in de
      teeltvrije zone als niet richting een oppervlaktewaterlichaam wordt gespoten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723f
  - number: 4.723g
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam met
      gewasbeschermingsmiddelen worden deze op een talud bij een oppervlaktewaterlichaam pleksgewijs en driftvrij
      gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723g
  - number: 4.723h
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam worden op
      braakliggende landbouwgronden geen gewasbeschermingsmiddelen gebruikt binnen 50 cm vanaf de insteek van een
      oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723h
  - number: 4.723i.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam met meststoffen worden
      binnen een teeltvrije zone als bedoeld in [artikel 4.723d][ref1] geen meststoffen gebruikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723i
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.64'
  - number: 4.723i.2
    text: |-
      Het eerste lid is niet van toepassing als wordt voldaan aan tabel 4.723i of als bladmeststoffen worden gebruikt en
      een emissiescherm wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723i
  - number: 4.723i.3
    text: 'Bij het gebruik van bladmeststoffen wordt bij:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723i
  - number: 4.723i.3.a
    text: |-
      op- en zijwaarts bespuiten van gewassen bij het bespuiten van de buitenste gewasrij niet richting een
      oppervlaktewaterlichaam gespoten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723i
  - number: 4.723i.3.b
    text: |-
      neerwaarts bespuiten van gewassen bij de eerste werkgang direct naast de teeltvrije zone een techniek gebruikt
      die een driftreductie bereikt van ten minste 50% ten opzichte van een referentietechniek als bedoeld in
      [tabel 4.723c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723i
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.64'
  - number: 4.723j
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam worden
      op braakliggende landbouwgronden geen meststoffen gebruikt binnen 50 cm vanaf de insteek van een
      oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723j
  - number: '4.724'
    text: |-
      Deze paragraaf is van toepassing op het behandelen van geoogste gewassen met gewasbeschermingsmiddelen in
      dompelbaden of douche-installaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.724
  - number: 4.725.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.724][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.725
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.65'
  - number: 4.725.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.725
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.726'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.724][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.726
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.65'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.727.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem is een dompelbad of douche-installatie opgesteld
      boven een lekbak of een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: 4.727.2
    text: |-
      Gedompelde of gedouchte gewassen of gebruikte verpakkingen waar gewasbeschermingsmiddelen uit kunnen lekken worden
      bewaard:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: 4.727.2.a
    text: in de douche-installatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: 4.727.2.b
    text: boven een lekbak; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: 4.727.2.c
    text: boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: 4.727.3
    text: Een buitenopslag voor gedompelde of gedouchte gewassen of gebruikte verpakkingen is tegen inregenen beschermd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.727
  - number: '4.728'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het afvalwater afkomstig van de activiteit, bedoeld in
      [artikel 4.724][ref1], niet geloosd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.728
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.65'
  - number: '4.729'
    text: |-
      Deze paragraaf is van toepassing op het reinigen van verpakkingen voor het opslaan van biologisch geteelde
      gewassen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.729
  - number: 4.730.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.729][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.66'
  - number: 4.730.2
    text: |-
      Het is verboden het afvalwater afkomstig van de activiteit, bedoeld in [artikel 4.729][ref1], te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.66'
  - number: 4.730.3
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
  - number: 4.730.3.a
    text: de lozingsroutes; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
  - number: 4.730.3.b
    text: 'als op een oppervlaktewaterlichaam wordt geloosd: de locaties van de lozingspunten.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
  - number: 4.730.4
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
  - number: 4.730.5
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.730
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.731'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van de activiteit,
      bedoeld in [artikel 4.729][ref1], geloosd op of in de bodem, op een oppervlaktewaterlichaam of in een
      vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.731
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.66'
  - number: '4.732'
    text: |-
      Voor het afvalwater dat wordt geloosd op een oppervlaktewaterlichaam, is de emissiegrenswaarde 100 mg/l voor
      onopgeloste stoffen, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.732
  - number: '4.733'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde 300 mg/l voor onopgeloste
      stoffen, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.733
  - number: 4.734.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.734
  - number: 4.734.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.734
  - number: 4.734.3
    text: Op het analyseren van een monster voor onopgeloste stoffen is NEN-EN 872 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.734
  - number: '4.735'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.735
  - number: 4.735.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.735
  - number: 4.735.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.735
  - number: 4.735.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.735
  - number: '4.736'
    text: |-
