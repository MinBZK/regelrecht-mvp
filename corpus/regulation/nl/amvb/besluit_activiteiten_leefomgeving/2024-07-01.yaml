        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.4
        afdeling: '7.2'
  - number: 7.47.3
    text: |-
      Het verbod, bedoeld in het eerste en tweede lid, geldt niet voor een vaartuig of drijvend werktuig dat in het
      beperkingengebied vaart:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.a
    text: |-
      in verband met het aanleggen, inspecteren, testen, repareren, onderhouden, veranderen of verwijderen van onderzeese
      kabels of leidingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.b
    text: om diensten te verlenen voor de installatie of om personen of goederen te vervoeren van of naar de installatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.c
    text: om de installatie te inspecteren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.d
    text: om levens of eigendommen te redden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.e
    text: gedwongen door de weersomstandigheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.f
    text: als het in nood verkeert;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.g
    text: voor de bestuursrechtelijke of strafrechtelijke handhavingstaak; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.3.h
    text: als het toestemming heeft van degene die de installatie exploiteert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.48.1
    text: |-
      Deze paragraaf is van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het
      lozen van huishoudelijk afvalwater in de Noordzee en het in samenhang daarmee lozen van afvalwater afkomstig van
      voedselbereiding met grootkeukenapparatuur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.48
  - number: 7.48.2
    text: |-
      Deze paragraaf is ook van toepassing op beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk die
      bestaan uit het bouwen of in stand houden van een uitstroomvoorziening voor het huishoudelijk afvalwater, bedoeld
      in het eerste lid, in de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.48
  - number: 7.48.3
    text: |-
      Het eerste lid geldt niet voor het maken en bewerken van levensmiddelen of voeder waarop [paragraaf 4.28][ref1] van
      toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.48
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: '7.49'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 7.48, tweede lid][ref2].


