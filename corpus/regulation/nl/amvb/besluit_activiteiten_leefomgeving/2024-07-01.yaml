      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.4
    text: 'Het eerste lid, aanhef en onder f, is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
  - number: 4.1267.4.a
    text: |-
      het toepassen van grond of baggerspecie in het kader van opvulling van een diepe plas als bedoeld in
      [artikel 4.1269, tweede lid, onder i][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.4.b
    text: |-
      het toepassen van baggerspecie in het kader van verspreiding daarvan als bedoeld in
      [artikel 4.1269, derde lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.4.c
    text: |-
      grootschalig toepassen van grond of baggerspecie als bedoeld in [artikel 4.1274, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.5
    text: |-
      Het eerste lid, onder c, f, k, l, n en o, is niet van toepassing als de gegevens en bescheiden voor de functionele
      toepassing in het kader waarvan de grond of baggerspecie wordt toegepast al eerder zijn verstrekt en zich geen
      relevante wijzigingen hebben voorgedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
  - number: 4.1267.6
    text: 'In afwijking van het eerste lid geldt een termijn van vier weken voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
  - number: 4.1267.6.a
    text: |-
      het toepassen van grond of baggerspecie die volgens BRL SIKB 7500 is bewerkt in een grondreinigingsinstallatie, als
      voor het toepassen van grond of baggerspecie die in die installatie is bewerkt voor de functionele toepassing in
      het kader waarvan de grond of baggerspecie wordt toegepast niet al eerder gegevens en bescheiden zijn verstrekt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
  - number: 4.1267.6.b
    text: |-
      het toepassen van grond in het kader van opvulling van een diepe plas als bedoeld in
      [artikel 4.1269, tweede lid, onder i][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.6.c
    text: |-
      het toepassen van baggerspecie in het kader van opvulling van een diepe plas als bedoeld in
      [artikel 4.1269, tweede lid, onder i][ref1], als de baggerspecie niet afkomstig is uit hetzelfde
      oppervlaktewaterlichaam waarin de diepe plas ligt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1267.7
    text: |-
      Als sprake is van toepassen van grond of baggerspecie die volgens BRL SIKB 7500 is bewerkt in een
      grondreinigingsinstallatie, wordt dit vermeld bij het verstrekken van de gegevens en bescheiden volgens het eerste
      lid en wordt ook aangegeven volgens welke reinigingsmethode de grond of baggerspecie is gereinigd, tenzij deze
      informatie in de milieuverklaring bodemkwaliteit is vermeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1267
  - number: 4.1268.1
    text: 'Tijdens het aanbrengen van grond of baggerspecie zijn de volgende gegevens en bescheiden beschikbaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1268
  - number: 4.1268.1.a
    text: |-
      de gegevens en bescheiden, bedoeld in de [artikelen 4.1266][ref1] en [4.1267][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1268
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1268.1.b
    text: |-
      als deze op grond van het [Besluit bodemkwaliteit][ref1] bij de afgifte van de milieuverklaring bodemkwaliteit moet
      worden verstrekt: een afleverbon.


      [ref1]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1268
    references:
      - id: ref1
        bwb_id: BWBR0022929
  - number: 4.1268.2
    text: |-
      Als op grond van [artikel 4.1267, tweede lid, onder c, d of e][ref1], of artikel 4.1267, derde lid, geen gegevens
      en bescheiden hoeven te worden verstrekt, is voor de grond of baggerspecie die wordt toegepast een milieuverklaring
      bodemkwaliteit beschikbaar, en ook een afleverbon, als deze op grond van het [Besluit bodemkwaliteit][ref2] bij de
      afgifte van de milieuverklaring bodemkwaliteit moet worden verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1268
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0022929
  - number: 4.1268.3
    text: |-
      Milieuverklaringen bodemkwaliteit en afleverbonnen worden ten minste vijf jaar na het aanbrengen van grond of
      baggerspecie bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1268
  - number: 4.1269.1
    text: 'Met het oog op het beschermen van het milieu wordt grond of baggerspecie alleen toegepast:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.1.a
    text: |-
      voor het aanleggen, in stand houden, herstellen, veranderen of uitbreiden van een werk dat als functionele
      toepassing is aangewezen in het tweede lid; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.1.b
    text: in het kader van een functionele toepassing die is aangewezen in het derde lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2
    text: 'Als functionele toepassing worden de volgende werken aangewezen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.a
    text: wegen of spoorwegen, met inbegrip van bijbehorende geluidswallen, en bouwwerken en dijken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.b
    text: |-
      ophogingen op of in de landbodem voor het verwezenlijken van bedrijventerreinen, woningbouwlocaties,
      landbouwgronden, natuurgronden, tuinen of recreatieterreinen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.c
    text: |-
      ophogingen op of in de landbodem voor het herstellen of verbeteren van de bodemgesteldheid van een terrein of het
      bevorderen van de landbouwkundige waarde, natuurwaarde of recreatieve waarde van een terrein;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.d
    text: |-
      afdeklagen op saneringslocaties, bovenafdichtingen op stortplaatsen, gesloten stortplaatsen en
      voormalige stortplaatsen en afdeklagen op grootschalig toegepaste grond of baggerspecie als bedoeld in
      [artikel 4.1274, vierde lid, onder b][ref1], of in situaties als bedoeld in [artikel 4.1276, derde lid][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1269.2.e
    text: |-
      herinrichtingen van winplaatsen of voormalige winplaatsen voor delfstoffen, met uitzondering van winplaatsen
      en voormalige winplaatsen in oppervlaktewaterlichamen, voor het verwezenlijken van bedrijventerreinen,
      woningbouwlocaties, landbouwgronden, natuurgronden, tuinen of recreatieterreinen of het stabiliseren van wanden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.f
    text: |-
      voorzieningen in oppervlaktewaterlichamen, met uitzondering van diepe plassen, voor het voorkomen of beperken van
      overstromingen of wateroverlast, het bevorderen van de natuurwaarde of recreatieve waarde daarvan, het bevorderen
      van de doorvaart van de scheepvaart of het herstellen of verbeteren van de ligging, vorm, afmeting en constructie
      van een waterstaatswerk;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.g
    text: suppleties van baggerspecie langs de kustlijn voor het herstellen of verbeteren van de kustverdediging;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.h
    text: |-
      opvullingen van oppervlaktewaterlichamen, met uitzondering van diepe plassen, tot landbodem voor het verwezenlijken
      van bedrijventerreinen, woningbouwlocaties, landbouwgronden, natuurgronden of recreatieterreinen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.2.i
    text: |-
      opvullingen van diepe plassen voor het bevorderen van de natuurwaarde of recreatieve waarde van de diepe plas,
      het ontwikkelen tot landbodem voor het verwezenlijken van bedrijventerreinen, woningbouwlocaties, landbouwgronden,
      natuurgronden of recreatieterreinen of het stabiliseren van wanden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3
    text: 'Als functionele toepassingen worden ook aangewezen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3.a
    text: |-
      de verspreiding, met inbegrip van verspreiding in een weilanddepot, van baggerspecie die in een
      oppervlaktewaterlichaam dat behoort tot de regionale wateren, is terechtgekomen door afspoeling en afkalving van
      materiaal van gronden die liggen aan of in het oppervlaktewaterlichaam:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3.a.1°
    text: voor het herstellen of verbeteren van de bodemgesteldheid van die gronden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3.a.2°
    text: op landbouwgronden tot ten hoogste 10 km afstand van de plaats van vrijkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3.b
    text: |-
      de verspreiding van baggerspecie in een oppervlaktewaterlichaam, met uitzondering van uiterwaarden, gorzen,
      slikken, stranden of platen, voor het herstellen of verbeteren van de ecologische en morfologische functies van het
      sediment; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.3.c
    text: |-
      de verspreiding van baggerspecie afkomstig uit een watergang die ligt in tot een oppervlaktewaterlichaam behorende
      uiterwaarden, gorzen, slikken, stranden of platen, voor het herstellen of verbeteren van de bodemgesteldheid van
      die gronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: 4.1269.4
    text: |-
      Grond of baggerspecie wordt, voor zover de grond of baggerspecie een afvalstof is, alleen toegepast als sprake is
      van een nuttige toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1269
  - number: '4.1270'
    text: |-
      Met het oog op het zuinig gebruik van grondstoffen, het doelmatig beheer van afvalstoffen en het voorkomen
      of beperken van verontreiniging van een oppervlaktewaterlichaam wordt grond of baggerspecie niet toegepast in
      een grotere hoeveelheid dan voor het voltooien van de functionele toepassing in het kader waarvan de grond of
      baggerspecie wordt toegepast, volgens gangbare civieltechnische, bouwtechnische, milieuhygiënische, ecologische of
      esthetische maatstaven redelijkerwijs nodig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1270
  - number: 4.1271.1
    text: 'Met het oog op het beschermen van het milieu wordt alleen grond of baggerspecie toegepast als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1271
  - number: 4.1271.1.a
    text: |-
      daarin ten hoogste 20 gewichtsprocent steenachtig materiaal of hout voorkomt en dat bodemvreemde materiaal al
      voorafgaand aan het ontgraven of bewerken in de bodem aanwezig was en vermenging daarmee redelijkerwijs niet kon
      worden voorkomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1271
  - number: 4.1271.1.b
    text: |-
      daarin alleen sporadisch ander bodemvreemd materiaal dan steenachtig materiaal of hout voorkomt en dat bodemvreemde
      materiaal al voorafgaand aan het ontgraven of bewerken in de bodem aanwezig was, voor zover redelijkerwijs niet
      kan worden gevergd dat het uit de grond of baggerspecie wordt verwijderd voordat de grond of baggerspecie wordt
      toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1271
  - number: 4.1271.2
    text: |-
      Als in grond of baggerspecie bodemvreemd materiaal voorkomt, is tijdens het toepassen van de grond of baggerspecie
      bewijs voorhanden dat het materiaal al voorafgaand aan het ontgraven of bewerken in de bodem aanwezig was.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1271
  - number: 4.1272.1
    text: |-
      Met het oog op het beschermen van het milieu wordt in het kader van functionele toepassingen als
      bedoeld in [artikel 4.1269, tweede lid, a tot en met e en g, en derde lid, onder a en c][ref1], op
      de landbodem alleen grond of baggerspecie toegepast die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, vierde lid, van het Besluit bodemkwaliteit][ref2], die gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1272.1.a
    text: de kwaliteitsklasse waarin de ontvangende landbodem volgens dat besluit is ingedeeld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
  - number: 4.1272.1.b
    text: |-
      de bodemfunctieklasse landbouw/natuur, wonen of industrie, waarin de ontvangende landbodem volgens
      [artikel 5.89p van het Besluit kwaliteit leefomgeving][ref1] is ingedeeld, of de bodemfunctieklasse landbouw/
      natuur als de ontvangende landbodem niet in de bodemfunctieklasse wonen of industrie is ingedeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1272.2
    text: |-
      Met het oog op het beschermen van het milieu wordt in het kader van een functionele toepassing als bedoeld in
      de [artikelen 4.1269, tweede lid, a, d en f tot en met h][ref1], en 4.1269, derde lid, onder b en c, in een
      oppervlaktewaterlichaam alleen grond of baggerspecie toegepast die voldoet aan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1272.2.a
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, vierde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor de
      kwaliteitsklasse waarin de ontvangende waterbodem volgens dat besluit is ingedeeld;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1272.2.b
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, tweede lid, van het Besluit bodemkwaliteit][ref1], die gelden voor
      grond van de kwaliteitsklasse industrie als sprake is van toepassen van grond in een oppervlaktewaterlichaam; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1272.2.c
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, derde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor
      baggerspecie van de kwaliteitsklasse matig verontreinigd als sprake is van toepassen van baggerspecie in een
      oppervlaktewaterlichaam.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1272.3
    text: |-
      Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste en tweede lid wordt
      voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1272
  - number: 4.1273.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het toepassen van grond of baggerspecie van een kwaliteit die niet
      voldoet aan de kwaliteitseisen, bedoeld in [artikel 4.1272, eerste of tweede lid][ref1], alleen worden toegestaan
      als de toe te passen grond of baggerspecie afkomstig is uit een aangewezen bodembeheergebied en ook weer binnen dat
      gebied wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1273
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1273.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het toepassen van
      grond of baggerspecie waarin een verontreinigende stof aanwezig is in een zodanige concentratie
      dat de grond of baggerspecie volgens de voor die stof geldende kwaliteitseis, bedoeld in
      [artikel 25d, tweede of derde lid, van het Besluit bodemkwaliteit][ref1], als sterk verontreinigde grond of sterk
      verontreinigde baggerspecie moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1273
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1273.2.a
    text: |-
      de toe te passen grond of baggerspecie is ontgraven uit een locatie waar de bodem diffuus sterk met de stof is
      verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1273
  - number: 4.1273.2.b
    text: |-
      de grond of baggerspecie wordt toegepast op een locatie waar de bodem al voor het toepassen diffuus sterk met de
      stof was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1273
  - number: 4.1274.1
    text: |-
      Grond of baggerspecie mag in afwijking van [artikel 4.1272, eerste en tweede lid][ref1], ook volgens het bepaalde
      in het tweede, derde en vierde lid van dit artikel worden toegepast als sprake is van toepassen in het kader van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1274.1.a
    text: |-
      het aanleggen van een functionele toepassing als bedoeld in [artikel 4.1269, tweede lid, onder a][ref1], als het
      een weg of spoorweg betreft, waarin ten minste 5.000 m3 grond of baggerspecie in een laagdikte van ten minste 0,5 m
      zal worden toegepast;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1274.1.b
    text: |-
      het aanleggen van een functionele toepassing als bedoeld in [artikel 4.1269, tweede lid, onder a][ref1], als het
      een bouwwerk of dijk betreft, of een functionele toepassing als bedoeld in artikel 4.1269, tweede lid, onder e of
      f, waarin ten minste 5.000 m3 grond of baggerspecie in een laagdikte van ten minste 2 m zal worden toegepast; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1274.1.c
    text: |-
      het in stand houden, herstellen, veranderen of uitbreiden van een functionele toepassing als bedoeld onder a of b,
      die is aangelegd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.1.c.1°
    text: na 1 januari 2008 als sprake is van het toepassen in een oppervlaktewaterlichaam; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.1.c.2°
    text: na 1 juli 2008 als sprake is van het toepassen op of in de landbodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.2
    text: |-
      Met het oog op het beschermen van het milieu worden alleen grond en baggerspecie toegepast van een kwaliteit die
      voldoet aan:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.2.a
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, vijfde lid, onder a, van het Besluit bodemkwaliteit][ref1], die
      gelden voor de kwaliteit emissiearme grond of de kwaliteit emissiearme baggerspecie; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1274.2.b
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, tweede en derde lid, van dat besluit][ref1], die gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1274.2.b.1°
    text: |-
      grond van de kwaliteitsklasse industrie als sprake is van het op of in de landbodem toepassen van grond of
      baggerspecie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.2.b.2°
    text: |-
      grond van de kwaliteitsklasse industrie als sprake is van het in een oppervlaktewaterlichaam toepassen van grond;
      of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.2.b.3°
    text: |-
      baggerspecie van de kwaliteitsklasse matig verontreinigd als sprake is van het in een oppervlaktewaterlichaam
      toepassen van baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.3
    text: 'In een geval als bedoeld in het eerste lid, onder a of c in samenhang met a:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.3.a
    text: |-
      wordt op de toegepaste grond of baggerspecie, met uitzondering van grond of baggerspecie die in bermen en taluds
      wordt toegepast, een aaneengesloten laag bouwstoffen aangebracht en in stand gehouden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.3.b
    text: |-
      worden in de bermen en taluds tot de dichtst bijgelegen fysieke afscheiding met een afstand van ten
      hoogste 10 m vanaf de rand van de verharding van de weg of het ballastbed van de spoorweg alleen
      grond of baggerspecie toegepast van een kwaliteit die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, tweede lid, van het Besluit bodemkwaliteit][ref1], die gelden voor grond van de kwaliteitsklasse
      industrie.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1274.4
    text: |-
      In een geval als bedoeld in het eerste lid, onder b of c in samenhang met b, wordt op de toegepaste grond of
      baggerspecie:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.4.a
    text: een aaneengesloten laag bouwstoffen aangebracht en in stand gehouden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.4.b
    text: |-
      een afdeklaag van grond of baggerspecie aangebracht en in stand gehouden met een laagdikte van ten minste 0,5
      m waarin alleen grond of baggerspecie wordt toegepast van een kwaliteit die voldoet aan de eisen die volgens
      [artikel 4.1272, eerste of tweede lid][ref1], gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1274.4.b.1°
    text: het toepassen van grond of baggerspecie op of in de aangrenzende landbodem; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.4.b.2°
    text: |-
      het toepassen van grond of baggerspecie op of in de aangrenzende waterbodem als sprake is van toepassen in een
      oppervlaktewaterlichaam en dat oppervlaktewaterlichaam niet tot landbodem wordt ontwikkeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1274.5
    text: |-
      Dit artikel is niet van toepassing op het toepassen van grond of baggerspecie in de territoriale zee of in de
      exclusieve economische zone.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1274
  - number: 4.1275.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het grootschalig toepassen van grond of baggerspecie van een
      kwaliteit die niet voldoet aan de kwaliteitseisen, bedoeld in [artikel 4.1274, tweede lid][ref1], alleen worden
      toegestaan als de toe te passen grond of baggerspecie afkomstig is uit een aangewezen bodembeheergebied en ook weer
      binnen dat gebied wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1275
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1275.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het toepassen van
      grond of baggerspecie waarin een verontreinigende stof aanwezig is in een zodanige concentratie
      dat de grond of baggerspecie volgens de voor die stof geldende kwaliteitseis, bedoeld in
      [artikel 25d, tweede of derde lid, van het Besluit bodemkwaliteit][ref1], als sterk verontreinigde grond of sterk
      verontreinigde baggerspecie moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1275
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1275.2.a
    text: |-
      de toe te passen grond of baggerspecie is ontgraven uit een locatie waar de bodem diffuus sterk met de stof is
      verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1275
  - number: 4.1275.2.b
    text: |-
      de grond of baggerspecie wordt toegepast op een locatie waar de bodem al voor het toepassen diffuus sterk met de
      stof was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1275
  - number: 4.1276.1
    text: |-
      Met het oog op het beschermen van het milieu wordt, in afwijking van [artikel 4.1272, tweede lid][ref1],
      in het kader van het toepassen van grond of baggerspecie in opvullingen van een diepe plas als bedoeld in
      [artikel 4.1269, tweede lid, onder i][ref2], alleen grond of baggerspecie toegepast die voldoet aan de
      kwaliteitseisen, bedoeld in [artikel 25d, vijfde lid, onder c, van het Besluit bodemkwaliteit][ref3], die gelden
      voor de kwaliteit voor toepassen in een diepe plas geschikte grond of de kwaliteit voor toepassen in een diepe plas
      geschikte baggerspecie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1276
    references:
