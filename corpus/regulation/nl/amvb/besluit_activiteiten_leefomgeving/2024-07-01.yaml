        afdeling: '7.2'
  - number: 7.50.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 7.48, eerste lid][ref1], te verrichten zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.5
        afdeling: '7.2'
  - number: 7.50.2
    text: 'De melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
  - number: 7.50.2.a
    text: het aantal inwonerequivalenten dat wordt geloosd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
  - number: 7.50.2.b
    text: de zuiveringsvoorziening die wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
  - number: 7.50.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
  - number: 7.50.4
    text: Dit artikel is niet van toepassing op het lozen van huishoudelijk afvalwater vanaf een pleziervaartuig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.50
  - number: 7.51.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 7.48, eerste lid][ref1], worden
      gegevens en bescheiden over de verwachte datum van het begin van de activiteit verstrekt aan het bevoegd gezag,
      bedoeld in [artikel 7.3][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.5
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.51.2
    text: Dit artikel is niet van toepassing op het lozen van huishoudelijk afvalwater vanaf een pleziervaartuig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.51
  - number: 7.52.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de Noordzee wordt het afvalwater, bedoeld in
      [artikel 7.48, eerste lid][ref1], anders dan afkomstig van een pleziervaartuig, dat wordt geloosd in de Noordzee,
      geleid via een zuiveringsvoorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.5
        afdeling: '7.2'
  - number: 7.52.2
    text: |-
      Voor dat afvalwater zijn de emissiegrenswaarden voor biochemisch zuurstofverbruik 60 mg/l en voor chemische
      zuurstofverbruik 300 mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
  - number: 7.52.3
    text: |-
      Als het afvalwater minder dan zes inwonerequivalenten bevat, kan het, in afwijking van het tweede lid, voor
      vermenging met ander afvalwater worden geleid door een septictank:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
  - number: 7.52.3.a
    text: |-
      met een nominale inhoud van 6 m3 of meer, volgens NEN-EN 12566-1, en met een hydraulisch rendement van niet meer
      dan 10 g, volgens annex B van NEN-EN 12566-1; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
  - number: 7.52.3.b
    text: die is geplaatst voor 1 januari 2009 en is afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
  - number: 7.52.4
    text: |-
      Als in samenhang met het huishoudelijke afvalwater ook afvalwater afkomstig van voedselbereiding wordt geloosd, is
      de zuiveringsvoorziening daarop berekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.52
  - number: 7.53.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.53
  - number: 7.53.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.53
  - number: 7.53.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.53
  - number: 7.53.3.a
    text: 'voor biochemisch zuurstofverbruik: ISO 5815-1/2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.53
  - number: 7.53.3.b
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.53
  - number: 7.54.1
    text: 'Deze paragraaf is van toepassing op de volgende beperkingengebiedactiviteiten in de Noordzee:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.1.a
    text: het kweken van consumptievis;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.1.b
    text: het kweken of houden van ongewervelde waterdieren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.1.c
    text: het telen van waterplanten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.1.d
    text: het invangen van mosselzaad.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.2
    text: |-
      Deze paragraaf is ook van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het in
      de Noordzee brengen van stoffen, water of warmte afkomstig van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.2.a
    text: het kweken van consumptievis;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.2.b
    text: het kweken of houden van ongewervelde dieren; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: 7.54.2.c
    text: het telen van waterplanten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.54
  - number: '7.55'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 7.54, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.55
