  - number: 4.472a.2.c
    text: |-
      het brandaandachtsgebied en explosieaandachtsgebied, bedoeld in
      [artikel 5.12 van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
    references:
