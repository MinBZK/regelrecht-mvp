  - number: 4.1013.3
    text: |-
      Als ten hoogste 5 l gevaarlijke stoffen van ADR-klasse 3 per stelling die niet breder is dan 1,35 m, niet in of
      boven een opvangbak wordt opgeslagen, gelden de hoeveelheden in tabel 4.1013, rij II, als of die in of boven een
      opvangbak zijn geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
  - number: 4.1013.4
    text: |-
      Een opvangbak waarin of waarboven gevaarlijke stoffen in verpakking worden opgeslagen, is onbrandbaar en
      productbestendig en kan ten minste 100% van de daarin of daarboven opgeslagen stoffen opvangen.
