        afdeling: '11.2'
  - number: 11.29.3
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op de belangen, bedoeld in [artikel 11.23][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.29
    references:
