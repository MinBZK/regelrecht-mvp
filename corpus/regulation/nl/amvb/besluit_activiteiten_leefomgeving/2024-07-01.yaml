    text: |-
      De regels over een windturbine, bedoeld in de [paragrafen 4.30][ref1], [4.30a][ref2] en [4.30b][ref3], zijn tot
      en met 30 juni 2025 van toepassing, als de activiteit als vergunningplichtig is aangewezen in [artikel 3.13][ref4]
      en daarvoor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
