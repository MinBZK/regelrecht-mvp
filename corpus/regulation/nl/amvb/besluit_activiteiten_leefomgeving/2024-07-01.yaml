        afdeling: '3.2'
  - number: 2.8.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.8
  - number: 2.8.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.8
  - number: 2.8.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.8
  - number: '2.9'
    text: |-
      Voor een milieubelastende activiteit is het bestuursorgaan dat bevoegd is te beslissen op
      de aanvraag om een omgevingsvergunning voor die milieubelastende activiteit, bedoeld in de
      [artikelen 4.6 tot en met 4.17 van het Omgevingsbesluit][ref1], ook het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.9
    references:
