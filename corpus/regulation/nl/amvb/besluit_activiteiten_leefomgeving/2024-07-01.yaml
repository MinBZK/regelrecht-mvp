        paragraaf: '4.35'
  - number: 4.474.1
    text: |-
      LPG wordt getankt in een brandstofreservoir dat is bevestigd aan een voertuig of werktuig en dat is bedoeld voor de
      aandrijving daarvan en de berging van LPG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.474
  - number: 4.474.2
    text: Gasflessen en wisselreservoirs worden niet getankt met LPG.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.474
  - number: 4.474.3
    text: LPG kan worden getankt in het reservoir van een LPG-tankwagen, als de opslagtank voor LPG leeg wordt gemaakt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.474
  - number: '4.475'
    text: |-
      De [artikelen 4.472c, eerste lid][ref1], en [4.472d][ref2] zijn niet van toepassing op het tanken van voertuigen
      of werktuigen met LPG dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die activiteit
      naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding van dit
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.475
    references:
