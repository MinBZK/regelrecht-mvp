        hoofdstuk: '3'
  - number: '4.531'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.529][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
