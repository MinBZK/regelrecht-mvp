    text: |-
      een flora- en fauna-activiteit als bedoeld in [artikel 11.40][ref1], met betrekking tot bij de
      omgevingsverordening aangewezen middelen, installaties, methoden of vervoermiddelen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
