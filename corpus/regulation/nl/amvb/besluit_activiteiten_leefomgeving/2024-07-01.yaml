        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.21.1.a
    text: de verwachte datum van het begin van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.21
  - number: 6.21.1.b
    text: de verwachte duur ervan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.21
  - number: 6.21.1.c
    text: |-
      als het gaat om een activiteit als bedoeld in [artikel 6.16, tweede lid][ref1]: de begrenzing van de locatie waarop
      de activiteit wordt verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
