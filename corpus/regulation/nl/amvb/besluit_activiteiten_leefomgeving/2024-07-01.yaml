  - number: 6.37b
    text: |-
      Uiterlijk op 31 januari van elk jaar of, als de activiteit, bedoeld in
      [artikel 6.34, eerste lid, onder b en c][ref1], is beëindigd, binnen een maand na het tijdstip van beëindiging,
      worden aan het bevoegd gezag, bedoeld in [artikel 6.3][ref2], de volgende gegevens verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.3
        afdeling: '6.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.37b.a
    text: de in het voorafgaande kalenderjaar gemeten hoeveelheden onttrokken grondwater en in de bodem gebracht water; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37b
  - number: 6.37b.b
    text: de kwaliteit van het in de bodem gebrachte water.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37b
  - number: 6.38.1
    text: |-
      Waterschaarste en dreigende waterschaarste zijn bijzondere omstandigheden als bedoeld in
      [artikel 19.0 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 6.38.2
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 6.3][ref1], kan voor activiteiten als bedoeld in
      [artikel 6.34, eerste lid, onder a][ref2], bij besluit als bedoeld in [artikel 19.0 van de wet][ref3] bepalen dat
      zich een bijzondere omstandigheid voordoet.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.38
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.3
        afdeling: '6.2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 6.38.3
    text: |-
      Het besluit kan in ieder geval inhouden dat activiteiten als bedoeld in het tweede lid worden beperkt of worden
      stopgezet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.38
  - number: 6.39.1
    text: |-
      Deze paragraaf is van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het lozen
      van huishoudelijk afvalwater op een oppervlaktewaterlichaam in beheer bij het Rijk en het in samenhang daarmee
      lozen van afvalwater afkomstig van voedselbereiding met grootkeukenapparatuur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.39
  - number: 6.39.2
    text: |-
      Deze paragraaf is ook van toepassing op beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk in
      beheer bij het Rijk die bestaan uit het bouwen of in stand houden van een uitstroomvoorziening voor de activiteit,
      bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.39
  - number: 6.39.3
    text: |-
      Het eerste lid geldt niet voor het maken en bewerken van levensmiddelen of voeder waarop [paragraaf 4.28][ref1] van
      toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: '6.40'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteit, bedoeld
      in [artikel 6.39, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.40
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.4
        afdeling: '6.2'
  - number: 6.41.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 6.39, eerste lid][ref1], te verrichten zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.41
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.4
        afdeling: '6.2'
  - number: 6.41.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.41
  - number: 6.41.2.a
    text: het aantal inwonerequivalenten dat wordt geloosd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.41
  - number: 6.41.2.b
    text: de zuiveringsvoorziening die wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.41
  - number: 6.41.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.41
  - number: '6.42'
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 6.39, eerste lid][ref1], worden
      gegevens en bescheiden over de verwachte datum van het begin van de activiteit verstrekt aan het bevoegd gezag,
      bedoeld in [artikel 6.3][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.4
        afdeling: '6.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.43.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam wordt het afvalwater,
      bedoeld in [artikel 6.39, eerste lid][ref1], dat wordt geloosd op een oppervlaktewaterlichaam, geleid via een
      zuiveringsvoorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.4
        afdeling: '6.2'
  - number: 6.43.2
    text: |-
      Voor dat afvalwater zijn de emissiegrenswaarden voor biochemisch zuurstofverbruik 60 mg/l en voor chemische
      zuurstofverbruik 300 mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
  - number: 6.43.3
    text: |-
      Als het afvalwater minder dan zes inwonerequivalenten bevat, kan het, in afwijking van het tweede lid, voor
      vermenging met ander afvalwater worden geleid door een septictank:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
  - number: 6.43.3.a
    text: |-
      met een nominale inhoud van 6 m3 of meer, volgens NEN-EN 12566-1, en met een hydraulisch rendement van niet meer
      dan 10 g, volgens annex B van NEN-EN 12566-1; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
  - number: 6.43.3.b
    text: die is geplaatst voor 1 januari 2009 en is afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
  - number: 6.43.4
    text: |-
      Als in samenhang met het huishoudelijke afvalwater ook afvalwater afkomstig van voedselbereiding wordt geloosd, is
      de zuiveringsvoorziening daarop berekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.43
  - number: 6.44.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.44
  - number: 6.44.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.44
  - number: 6.44.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.44
  - number: 6.44.3.a
    text: 'voor biochemisch zuurstofverbruik: ISO 5815-1/2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.44
  - number: 6.44.3.b
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.44
  - number: '6.45'
    text: |-
      Deze paragraaf is van toepassing op de volgende mijnbouwlocatieactiviteiten in een oppervlaktewaterlichaam in
      beheer bij het Rijk:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.45
  - number: 6.45.a
    text: |-
      het gebruiken van een locatie voor een mijnbouwinstallatie, met inbegrip van het voor die installatie geldende
      beperkingengebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.45
  - number: 6.45.b
    text: |-
      het gebruiken van een locatie voor een verkenningsonderzoek met gebruikmaking van kunstmatig opgewekte trillingen,
      met uitzondering van het bij dat onderzoek gebruiken van ontplofbare stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.45
  - number: '6.46'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      mijnbouwlocatieactiviteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 6.46.a
    text: |-
      de activiteit, bedoeld in [artikel 6.45, aanhef en onder a][ref1], voor zover de mijnbouwinstallatie geheel of
      gedeeltelijk boven het wateroppervlak uitsteekt en die activiteit wordt verricht in een bij ministeriële regeling
      aangewezen oefen- en schietgebied; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.46
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.5
        afdeling: '6.2'
  - number: 6.46.b
    text: |-
      de activiteit, bedoeld in [artikel 6.45, aanhef en onder b][ref1], voor zover die activiteit wordt verricht in een
      bij ministeriële regeling aangewezen oefen- en schietgebied.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.46
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.5
        afdeling: '6.2'
  - number: 6.47.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 6.45, aanhef en onder a][ref1], te verrichten als het gaat om
      een mijnbouwinstallatie die niet geheel of gedeeltelijk boven het wateroppervlak uitsteekt, zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.5
        afdeling: '6.2'
  - number: 6.47.2
    text: Een melding bevat de coördinaten van de installatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47
  - number: 6.47.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47
  - number: 6.47a.1
    text: |-
      Ten minste 48 uur voor het begin van de activiteit, bedoeld in [artikel 6.45, aanhef en onder b][ref1], worden aan
      de inspecteur-generaal der mijnen de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.5
        afdeling: '6.2'
  - number: 6.47a.1.a
    text: gegevens over de wijze waarop het verkenningsonderzoek wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.1.b
    text: de locatie waarop en de vaarlijnen waarlangs het verkenningsonderzoek wordt verricht, aangegeven op een kaart;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.1.c
    text: de data waarop het verkenningsonderzoek wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.1.d
    text: de namen, nationaliteit en registratiekenmerken van de vaartuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.1.e
    text: |-
      de gegevens over de bekwaamheid en ervaring van de personen die contact houden met de overige scheepvaart in en om
      de onderzoekslocatie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.1.f
    text: |-
      gegevens over de radarapparatuur, navigatieapparatuur en telecommunicatieapparatuur van het vaartuig waarop de
      personen, bedoeld onder e, zich bevinden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.47a.2
    text: |-
      Ten minste 48 uur voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens en
      bescheiden, worden de gewijzigde gegevens en bescheiden verstrekt aan de inspecteur-generaal der mijnen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.47a
  - number: 6.48.1
    text: |-
      Met het oog op de veiligheid van de scheepvaart is er aan boord van een verkenningsvaartuig een persoon die contact
      houdt met de andere scheepvaart in en om het onderzoeksgebied.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.48
  - number: 6.48.2
    text: |-
      Een verkenningsvaartuig wordt begeleid door een ander vaartuig waarmee die persoon bij de begeleiding van de andere
      scheepvaart wordt bijgestaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.48
  - number: 6.48a
    text: |-
      Met het oog op het voorkomen van storende geluidseffecten voor zeezoogdieren wordt bij het gebruik van kunstmatig
      opgewekte trillingen bij een verkenningsonderzoek met een laag geluidsvolume begonnen en verloopt de versterking
      van dat volume geleidelijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.48a
  - number: 6.48b
    text: |-
      Bij toezicht op de activiteit, bedoeld in [artikel 6.45, aanhef en onder b][ref1], wordt voorzien in het vervoer
      van toezichthouders als bedoeld in [artikel 130, aanhef en onder a, van de Mijnbouwwet][ref2].


