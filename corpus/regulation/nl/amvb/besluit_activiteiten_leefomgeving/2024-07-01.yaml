  - number: 4.74.4
    text: |-
      Voor een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie die voor 12 november 2019 in gebruik
      is genomen, kan met een maatwerkregel of maatwerkvoorschrift de emissiegrenswaarde voor de som van dioxinen en
      furanen, bedoeld in [artikel 4.73, eerste lid][ref1], worden verhoogd tot ten hoogste 0,06 ng/Nm3.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
