        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.670.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met oplosmiddelen wordt chemisch gereinigd met
      tetrachlooretheen boven een vloeistofdichte bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.670
  - number: 4.670.2
    text: Met andere oplosmiddelen dan tetrachlooretheen wordt chemisch gereinigd boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.670
  - number: 4.670.3
    text: De vloeistofdichte bodemvoorziening heeft geen aansluiting op het vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.670
  - number: 4.671.1
    text: |-
      Met het oog het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het chemisch reinigen
      van textiel geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.671
  - number: 4.671.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.671
  - number: '4.672'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor tetrachlooretheen 0,1
      mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.672
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: tetrachlooretheen_mg_per_l
            type: number
            required: true
            description: Concentratie tetrachlooretheen in het afvalwater in mg/l
            source: {}
        output:
          - name: voldoet_emissiegrenswaarde_tetrachlooretheen
            type: boolean
            description: Of de concentratie tetrachlooretheen niet meer dan 0,1 mg/l bedraagt
        actions:
          - output: voldoet_emissiegrenswaarde_tetrachlooretheen
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $tetrachlooretheen_mg_per_l
              value: 0.1
  - number: 4.673.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.673
  - number: 4.673.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.673
  - number: 4.673.3
    text: |-
      Op het analyseren van tetrachlooretheen is NEN-EN-ISO 10301 van toepassing, waarbij onopgeloste stoffen worden
      meegenomen in de analyse.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.673
  - number: '4.674'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.674
  - number: 4.674.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.674
  - number: 4.674.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.674
  - number: 4.674.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.674
  - number: '4.675'
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht worden alleen tetrachlooretheen of niet-gechloreerde
      alifatische koolwaterstoffen gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.675
  - number: '4.676'
    text: Deze paragraaf is van toepassing op het exploiteren van een jachthaven waar pleziervaartuigen afmeren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.676
  - number: 4.677.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.676][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.677
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
  - number: 4.677.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.677
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.678.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen ingenomen afvalwater geloosd in een
      vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.678
  - number: 4.678.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.678
  - number: '4.679'
    text: |-
      Voor het bilgewater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat bilgewater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.679
  - number: 4.679.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.679
  - number: 4.679.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.679
  - number: 4.682.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.682
  - number: 4.682.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.682
  - number: 4.682.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.682
  - number: '4.683'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.683
  - number: 4.683.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.683
  - number: 4.683.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.683
  - number: 4.683.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.683
  - number: 4.684.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden in een jachthaven van gebruikers van de jachthaven in
      ieder geval de volgende afvalstoffen ingenomen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.a
    text: afgewerkte olie en smeervet van onderhoud aan pleziervaartuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.b
    text: oliehoudende en vethoudende afvalstoffen van onderhoud aan pleziervaartuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.c
    text: afvalstoffen van reparatiewerkzaamheden en onderhoudswerkzaamheden aan pleziervaartuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.d
    text: bilgewater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.e
    text: huishoudelijk afvalwater; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.1.f
    text: de inhoud van chemische toiletten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.684.2
    text: |-
      Voor de inzameling van de afvalstoffen wordt geen aparte financiële vergoeding gevraagd aan de gebruikers van de
      jachthaven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.684
  - number: 4.685.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt bij een jachthaven die gewoonlijk wordt aangedaan door
      zeegaande pleziervaartuigen, bij de inning van het havengeld kenbaar gemaakt welk aandeel daarvan is bedoeld voor
      het in stand houden van de voorzieningen voor het in ontvangst nemen en verder beheren van afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685.2
    text: |-
      Voor een jachthaven waarin gewoonlijk zeegaande pleziervaartuigen afmeren, is een havenafvalplan voor het in
      ontvangst nemen en verder beheren van afvalstoffen opgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685.3
    text: |-
      Het havenafvalplan bevat in ieder geval de elementen die in bijlage 1 bij [Richtlijn (EU) 2019/883](32019L0883)
      van het Europees Parlement en de Raad van 17 april 2019 inzake havenontvangstvoorzieningen voor de afvalafgifte
      van schepen, tot wijziging van [Richtlijn 2010/65](32010L0065)/EU en tot intrekking van [Richtlijn 2000/59/EG]
      (32000L0059) (PbEU 2019, L 151) verplicht worden gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685.4
    text: 'Het tweede lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685.4.a
    text: de jachthaven alleen wordt aangedaan door pleziervaartuigen en wordt gekenmerkt door schaars of weinig verkeer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685.4.b
    text: |-
      de havenontvangstvoorzieningen voor de afvalafgifte van pleziervaartuigen zijn geïntegreerd in het
      afvalverwerkingssysteem dat ter uitvoering van [titel 10.4 van de Wet milieubeheer][ref1] wordt beheerd; en


      [ref1]: https://wetten.overheid.nl/BWBR0003245
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
    references:
      - id: ref1
        bwb_id: BWBR0003245
  - number: 4.685.4.c
    text: |-
      informatie over de voorzieningen voor het in ontvangst nemen en verder beheren van afvalstoffen beschikbaar wordt
      gesteld aan de gebruikers van de jachthaven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685
  - number: 4.685a.1
    text: |-
      Eenmaal in de vijf jaar wordt het havenafvalplan, bedoeld in [artikel 4.685, tweede lid][ref1], na overleg met
      betrokken partijen, verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.685a.2
    text: |-
      Bij aanzienlijke veranderingen in de exploitatie van de jachthaven wordt zo spoedig mogelijk een geactualiseerd
      havenafvalplan opgesteld. Binnen veertien dagen na het opstellen van het geactualiseerde havenafvalplan, wordt het
      verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685a
  - number: 4.685a.3
    text: |-
      Als zich geen aanzienlijke veranderingen in de exploitatie van de jachthaven voordoen, kan, na evaluatie, de
      termijn, bedoeld in het eerste lid, met ten hoogste vijf jaar worden verlengd. Binnen veertien dagen na de
      verlenging van de geldigheidsduur van het havenafvalplan wordt het bevoegd gezag hierover geïnformeerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685a
  - number: 4.685b
    text: |-
      Als [artikel 4.685, vierde lid][ref1], van toepassing is, wordt Onze Minister van Infrastructuur en Waterstaat
      hierover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.685b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
  - number: '4.686'
    text: |-
      De [artikelen 4.684][ref1], [4.685][ref2] en [4.685a][ref3] zijn niet van toepassing op een jachthaven
      die gewoonlijk wordt aangedaan door zeegaande pleziervaartuigen en die is aangewezen op grond van de
      [artikelen 6][ref4] en [6a van de Wet voorkoming verontreiniging door schepen][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0003642#Artikel6
      [ref5]: https://wetten.overheid.nl/BWBR0003642#Artikel6a
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.686
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.58'
      - id: ref4
        bwb_id: BWBR0003642
        artikel: '6'
      - id: ref5
        bwb_id: BWBR0003642
        artikel: 6a
  - number: '4.687'
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een schietbaan die ligt in een gebouw zonder open zijden en
      met een gesloten afdekking.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.687
  - number: 4.688.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.687][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.688
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.59'
  - number: 4.688.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.688
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.689'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.687][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.689
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.59'
  - number: 4.689.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.689
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.689.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.689
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.690.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt voorkomen dat afgeschoten kogels buiten het gebouw kunnen
      komen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.690
  - number: 4.690.2
    text: |-
      Het gebouw waarin de schietbaan ligt, voldoet aan tabel 4.690.
            Tabel 4.690 Constructie gebouw


                    *Deel of kenmerk van de schietbaan*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot en met .22,*
                    *– schoudervuurwapens met een kaliber tot en met .22, of*
                    *– randvuurmunitie tot en met .22 Long Rifle*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot .45,*
                    *– overige vuurwapens met pistoolmunitie met een kaliber tot .45, of*
                    *– historische vuistvuurwapens*


                    *Bij het schieten met:*
                    *– vuistvuurwapens met een kaliber tot .50,*
                    *– schoudervuurwapens met een kaliber tot .50,*
