  - number: 4.1014.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden vloeibare gevaarlijke stoffen boven een
      vloeistofdichte bodemvoorziening opgeslagen. Opslag boven een lekbak is ook toegestaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014
  - number: 4.1014.2
    text: 'Boven een elementenbodemvoorziening kunnen worden opgeslagen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014
  - number: 4.1014.2.a
    text: vloeibare gevaarlijke stoffen in een gesloten verpakking die voldoet aan de ADR; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014
  - number: 4.1014.2.b
    text: vaste gevaarlijke stoffen in verpakking.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014
  - number: 4.1014a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is de vloeistofdichte
      bodemvoorziening, bedoeld in [artikel 4.1014, eerste lid][ref1], niet aangesloten op het vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1014a
