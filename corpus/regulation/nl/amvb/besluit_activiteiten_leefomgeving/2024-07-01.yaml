    text: |-
      Er wordt gemeten of aan de emissiegrenswaarde voor lood en loodverbindingen, bedoeld in
      [artikel 4.210, eerste lid][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
