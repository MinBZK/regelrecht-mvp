  - number: '4.660'
    text: Met het oog op het beschermen van de gezondheid worden emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.660
  - number: '4.661'
    text: |-
      Met het oog op het voorkomen van het verspreiden van ziektekiemen worden bij het gericht werken met biologische
      agentia:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661
  - number: 4.661.a
    text: voorzieningen getroffen die zijn gericht op het voorkomen van het vrijkomen van het biologisch agens; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661
  - number: 4.661.b
    text: gedragsvoorschriften opgesteld en nageleefd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661
  - number: 4.661a
    text: |-
      Met het oog op het voorkomen van het verspreiden van ziektekiemen is bij het gericht werken met biologische
      agentia, ingedeeld in risicogroepen 2, 3 of 4 van de richtlijn biologische agentia, of met de ziekteverwekkers die
      zijn aangewezen op grond van [artikel 2.22, tweede lid, van de Wet dieren][ref1], een contactpersoon bereikbaar die
      kan worden benaderd door het bevoegd gezag bij een incident waarbij deze biologische agentia vrijkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0030250#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661a
    references:
      - id: ref1
        bwb_id: BWBR0030250
        artikel: '2'
  - number: 4.661b.1
    text: |-
      Ten minste vier weken voor het begin van het werken met een biologisch agens, worden aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref1], de naam en het telefoonnummer verstrekt van de contactpersoon, bedoeld in
      [artikel 4.661a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: 4.661b.2
    text: |-
      Ten minste vier weken voor de gegevens en bescheiden, bedoeld in het eerste lid, wijzigen, worden de gewijzigde
      gegevens en bescheiden verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661b
  - number: 4.661c.1
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor stofklasse gO.2,
      bedoeld in [artikel 4.656][ref1], niet van toepassing op de emissie van het exploiteren van een laboratorium
      of een praktijkruimte waar practica worden verricht voor middelbaar en hoger onderwijs van stoffen die tot de
      inwerkingtreding van dit besluit onder stofklasse gO.3 vielen, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals die werd verricht voor de inwerkingtreding van dit besluit. Tot eerstgenoemde
      datum geldt in dat geval een emissiegrenswaarde van 100 mg/Nm3 bij een ondergrens van 250 kg/jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: 4.661c.2
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor sA.3, bedoeld in
      [artikel 4.656][ref1], niet van toepassing op het exploiteren van een laboratorium of een praktijkruimte waar
      practica worden verricht voor middelbaar en hoger onderwijs, mits die activiteit naar aard en omvang niet verschilt
      van de activiteit zoals die werd verricht voor de inwerkingtreding van dit besluit. Tot eerstgenoemde datum geldt
      in dat geval een emissiegrenswaarde van 5 mg/Nm3 bij een ondergrens van 5 kg/jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.661c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: '4.662'
    text: |-
      Deze paragraaf is van toepassing op het gebruiken van een voorziening voor het landen of opstijgen van helikopters
      bij ziekenhuizen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.662
  - number: 4.663.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.662][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.663
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.56'
  - number: 4.663.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.663
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.664'
    text: |-
      Met het oog op het voorkomen of beperken van geluidhinder is het geluidsvermogensniveau van helikopters die door
      een academisch ziekenhuis worden ingezet voor het vervoer van mobiele medische teams niet hoger dan 140 dB(A).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.664
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: geluidsvermogensniveau_dba
            type: number
            required: true
            description: Geluidsvermogensniveau van de helikopter in dB(A)
            source: {}
        output:
          - name: voldoet_geluidsnorm_helikopter
            type: boolean
            description: Of het geluidsvermogensniveau niet hoger is dan 140 dB(A)
        actions:
          - output: voldoet_geluidsnorm_helikopter
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $geluidsvermogensniveau_dba
              value: 140
  - number: 4.665.1
    text: |-
      Met het oog op het voorkomen of beperken van geluidhinder wordt een voorziening voor het landen en opstijgen van
      helikopters alleen door helikopters gebruikt als dit gebruik op medische gronden bijzonder is aangewezen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
  - number: 4.665.2
    text: |-
      Bij een academisch ziekenhuis vinden naast het gebruik op medische gronden, bedoeld in het eerste lid, ten hoogste
      400 vliegbewegingen per kalenderjaar plaats als dit bijzonder is aangewezen voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: aantal_vliegbewegingen_niet_medisch
            type: number
            required: true
            description: Aantal niet-medische vliegbewegingen per kalenderjaar bij een academisch ziekenhuis
            source: {}
        output:
          - name: voldoet_max_vliegbewegingen_academisch
            type: boolean
            description: Of het aantal niet-medische vliegbewegingen niet meer dan 400 per jaar is
        actions:
          - output: voldoet_max_vliegbewegingen_academisch
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $aantal_vliegbewegingen_niet_medisch
              value: 400
  - number: 4.665.2.a
    text: onderhoud of reparatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
  - number: 4.665.2.b
    text: tankvluchten; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
  - number: 4.665.2.c
    text: opleiding en training van de piloot en van het mobiel medisch team.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
  - number: 4.665.3
    text: |-
      Bij een niet-academisch ziekenhuis vinden naast het gebruik op medische gronden, bedoeld in het eerste lid, ten
      hoogste 20 vliegbewegingen per kalenderjaar plaats als dit bijzonder is aangewezen voor de opleiding en training
      van de piloot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.665
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: aantal_vliegbewegingen_niet_medisch
            type: number
            required: true
            description: Aantal niet-medische vliegbewegingen per kalenderjaar bij een niet-academisch ziekenhuis
            source: {}
        output:
          - name: voldoet_max_vliegbewegingen_niet_academisch
            type: boolean
            description: Of het aantal niet-medische vliegbewegingen niet meer dan 20 per jaar is
        actions:
          - output: voldoet_max_vliegbewegingen_niet_academisch
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $aantal_vliegbewegingen_niet_medisch
              value: 20
  - number: 4.666.1
    text: 'De volgende gegevens worden geregistreerd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666
  - number: 4.666.1.a
    text: de reden voor het gebruik van de voorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666
  - number: 4.666.1.b
    text: het tijdstip van vertrek; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666
  - number: 4.666.1.c
    text: het tijdstip van aankomst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666
  - number: 4.666.2
    text: De registratie wordt binnen twee dagen na gebruik van de voorziening bijgewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666
  - number: 4.666a
    text: |-
      Het geluidsvermogensniveau van een helikopter die wordt ingezet door een academisch ziekenhuis dat op 1 februari
      2003 een voorziening in werking had voor het landen en opstijgen van helikopters, is tot het moment van vervanging
      van de helikopter niet hoger dan 145 dB(A).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.666a
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: geluidsvermogensniveau_dba
            type: number
            required: true
            description: Geluidsvermogensniveau van de helikopter in dB(A)
            source: {}
        output:
          - name: voldoet_overgangsrecht_geluid_helikopter
            type: boolean
            description: Of het geluidsvermogensniveau niet hoger is dan 145 dB(A) onder overgangsrecht
        actions:
          - output: voldoet_overgangsrecht_geluid_helikopter
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $geluidsvermogensniveau_dba
              value: 145
  - number: '4.667'
    text: Deze paragraaf is van toepassing op het chemisch reinigen van textiel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.667
  - number: 4.668.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.667][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.668
    references:
      - id: ref1
        bwb_id: BWBR0041330
