  - number: 11.22.2
    text: |-
      De [paragrafen 11.2.2 tot en met 11.2.4][ref1] en [11.2.8][ref2] gaan niet over activiteiten die onderwerp zijn van
      het gemeenschappelijk visserijbeleid, bedoeld in artikel 38 van het Verdrag betreffende de werking van de Europese
      Unie, voor zover zij worden verricht in de exclusieve economische zone.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.23.1
    text: |-
      De regels in de [paragrafen 11.2.2 tot en met 11.2.5][ref1] over flora- en fauna-activiteiten zijn gesteld met het
      oog op de natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.23.2
    text: |-
      De regels in de [paragrafen 11.2.6][ref1] en [11.2.7][ref2] over het handelen volgens een faunabeheerplan en de
      uitoefening van de jacht zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
