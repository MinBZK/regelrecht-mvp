        paragraaf: '4.34'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.465.4.a
    text: |-
      voor stoffen of mengsels als bedoeld in het eerste of tweede lid, voor elke activiteit afzonderlijk aan die leden;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.4.b
    text: 'voor andere stoffen of mengsels dan bedoeld onder a:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.4.b.1°
    text: |-
      voor elke activiteit afzonderlijk aan [artikel 4.447][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.465.4.b.2°
    text: aan een waarde voor de totale emissies, die niet hoger is dan bij toepassing van het onder 1° gestelde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.5
    text: |-
      Voor de vergelijking, bedoeld in het vierde lid, wordt de totale emissie van deze activiteiten bepaald en
      vergeleken met de totale emissie die zou zijn veroorzaakt als [artikel 4.447][ref1] voor elke activiteit
      afzonderlijk zou gelden.
