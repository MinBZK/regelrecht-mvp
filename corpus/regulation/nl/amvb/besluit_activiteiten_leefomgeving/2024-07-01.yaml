      bedoeld in [artikel 4.198, derde en vierde lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.200
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.11'
  - number: 4.201.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.201
  - number: 4.201.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.201.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.201
  - number: 4.201.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.201
  - number: 4.201.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.199][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.201 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Totaal stof


                    30


                    Debiet


                    20


                    Overig


                    40


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.201
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.11'
  - number: '4.202'
    text: |-
      Met het oog op het beschermen van de gezondheid en het voorkomen of het tot een aanvaardbaar niveau beperken van
      geurhinder worden afgezogen emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.202
  - number: 4.202a
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor sA.3, bedoeld in
      [artikel 4.195][ref1], niet van toepassing op het aanbrengen van anorganische deklagen op metalen, mits die
      activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding
      van dit besluit. Tot eerstgenoemde datum geldt in dat geval een emissiegrenswaarde van 5 mg/Nm3 bij een ondergrens
      van 5 kg/jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.202a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.11'
  - number: 4.203.1
    text: >-
      Deze paragraaf is van toepassing op het verrichten
      van het smeltproces of gietproces van metalen,
      dat bestaat uit:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.a
    text: het smelten en gieten van metalen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.b
    text: het maken en coaten van vormen en kernen in kleigebonden of chemisch gebonden zand voor het gieten van metalen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.c
    text: het maken van croningkernen en coldboxkernen voor het gieten van metalen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.d
    text: het uitbreken en ontzanden van gietstukken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.e
    text: de koude regeneratie van zand voor het gieten van metalen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.1.f
    text: het maken van een vorm met behulp van was, met inbegrip van het verwijderen van de was.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.2
    text: 'Deze paragraaf is niet van toepassing op het minder dan 500 kg/jaar smelten en gieten van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.2.a
    text: goud;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.2.b
    text: zilver;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.2.c
    text: platina; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.203.2.d
    text: legeringen met ten minste 30% goud, zilver of platina.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.203
  - number: 4.204.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.203][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.204
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.204.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.204
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.205'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.203][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.205
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.205.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.205
    references:
