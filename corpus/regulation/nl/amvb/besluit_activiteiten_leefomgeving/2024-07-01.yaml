      laboratorium of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7b
  - number: 5.7b.4
    text: |-
