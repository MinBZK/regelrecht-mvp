  - number: '4.534'
    text: |-
      Met het oog op het waarborgen van de veiligheid is overnachting door derden en recreatief verblijf niet toegestaan
      binnen 20 m vanaf de tankzuil waarmee brandstoffen van ADR-klasse 3, met uitzondering van gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, worden getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.534
  - number: 4.535.1
    text: |-
      Met het oog op het waarborgen van de veiligheid en het voorkomen van verontreiniging van een
      oppervlaktewaterlichaam heeft een tankzuil met een elektrische pomp een aanschakelaar en uitschakelaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.535
  - number: 4.535.2
    text: |-
      De artikelen 21, 46 en 47 van [bijlage 3.8 bij de Binnenvaartregeling][ref1] zijn van overeenkomstige toepassing op
      het tanken met een tankzuil die zich op het land bevindt.


      [ref1]: https://wetten.overheid.nl/BWBR0025958
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.535
    references:
      - id: ref1
        bwb_id: BWBR0025958
  - number: 4.536.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen of ureum wordt op land
      getankt boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.536
  - number: 4.536.2
    text: De aaneengesloten bodemvoorziening bevindt zich 1 m rondom de tankzuil en tussen de tankzuil en de kade.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.536
  - number: 4.536.3
    text: Er wordt door of onder direct toezicht van personeel getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.536
  - number: 4.537.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of een oppervlaktewaterlichaam met vloeibare
      brandstoffen of ureum wordt bij het tanken met een elektrische pomp gebruik gemaakt van een vulpistool of een slang
      die is aangekoppeld via een vaste aansluiting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.537
  - number: 4.537.2
    text: 'Een vulpistool heeft een automatisch afslagmechanisme dat afslaat als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.537
  - number: 4.537.2.a
    text: de brandstoftank vol is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.537
  - number: 4.537.2.b
    text: het vulpistool valt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.537
  - number: 4.537.3
    text: |-
      Een slang die is aangekoppeld via een vaste aansluiting heeft een automatisch afslagmechanisme dat afslaat als de
      brandstoftank vol is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.537
  - number: 4.538.1
    text: |-
      [Artikel 4.532, eerste en tweede lid][ref1], is niet van toepassing op bunkerstations en op land geplaatste vaste
      tankzuilen die zijn geïnstalleerd voor 1 januari 2011.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.538
    references:
