  - number: 11.87.2.k
    text: kennis van de jachtmethoden en van de verzorging van voor consumptie bestemde dieren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.l
    text: kennis van hetgeen een goed jager betaamt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.3
    text: |-
      Het praktisch gedeelte van het examen voor jachtgeweeractiviteiten bevat een toetsing op schietvaardigheid en
      bekwaamheid in de omgang met vuurwapens, waarbij onderscheid kan worden gemaakt al naar gelang de aard van het
      gebruik van de munitie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: '11.88'
    text: |-
      Een examen voor valkeniersactiviteiten komt alleen in aanmerking voor een erkenning als bedoeld in
      [artikel 3.71 van het Besluit kwaliteit leefomgeving][ref1], als het:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.88
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 11.88.a
    text: |-
      een theoretisch gedeelte bevat met toetsing op kennis als bedoeld in
      [artikel 11.87, tweede lid, onder a tot en met c, e, g, h en j tot en met l][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.88
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.88.b
    text: een praktisch gedeelte, waarin wordt getoetst op bekwaamheid in de omgang met roofvogels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.88
  - number: '11.89'
    text: |-
      Een examen voor het gebruik van eendenkooien komt alleen in aanmerking voor erkenning als bedoeld in
      [artikel 3.71 van het Besluit kwaliteit leefomgeving][ref1], als het een theoretisch gedeelte bevat met toetsing
      op kennis als bedoeld in [artikel 11.87, tweede lid, onder a tot en met c, e, j, k en l][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: '11.90'
    text: |-
      Een examen voor jachtgeweeractiviteiten, een examen voor valkeniersactiviteiten en een examen
      voor het gebruik van eendenkooien komen alleen in aanmerking voor een erkenning als bedoeld in
      [artikel 3.71 van het Besluit kwaliteit leefomgeving][ref1], als zij voldoen aan de bij ministeriële regeling
      gestelde nadere regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.90
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 11.90.a
    text: de wijze van toetsing van kennis, vaardigheid en bekwaamheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.90
  - number: 11.90.b
    text: de wijze van beoordeling van examenresultaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.90
  - number: 11.91.1
    text: |-
      Een examen voor jachtgeweeractiviteiten, een examen voor valkeniersactiviteiten en een examen
      voor het gebruik van eendenkooien komen alleen in aanmerking voor een erkenning als bedoeld in
      [artikel 3.72 van het Besluit kwaliteit leefomgeving][ref1], als zij worden afgenomen door een door Onze Minister
      voor Natuur en Stikstof erkende organisatie die voldoet aan de volgende eisen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 11.91.1.a
    text: zij bezit rechtspersoonlijkheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.b
    text: de bestuursleden zijn naar evenredigheid afkomstig uit de kringen van jagers en natuurbescherming-landbouw;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.c
    text: |-
      zij beschikt over een itembank met ten minste vijfhonderd meerkeuzevragen die betrekking hebben op de examens,
      waarvan de relatieve samenstelling overeenkomt met de eisen die aan het examen worden gesteld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.d
    text: |-
      zij beschikt over een beeldbank met ten minste twee afbeeldingen van elk dier van een soort dat tot het wild
      behoort dat kan worden bejaagd en ten minste een afbeelding van de dieren van andere soorten, voor het vangen
      of doden waarvan, behoudens in op grond van [artikel 5.2, eerste of tweede lid, van de wet][ref1] aangewezen
      gevallen, een omgevingsvergunning voor een flora- en fauna-activiteit is vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.91.1.e
    text: 'zij beschikt over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.e.1°
    text: een kwaliteitszorgsysteem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.e.2°
    text: |-
      een reglement waarin is vastgelegd aan welke eisen moet worden voldaan om een examen te mogen afleggen, wanneer
      examens worden afgenomen, de wijze waarop het resultaat van het examen wordt beoordeeld en wie gerechtigd is de
      examens bij te wonen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.1.e.3°
    text: een geschillenregeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.91.2
    text: |-
      Het bestuur van een organisatie die examens afneemt, verstrekt aan door Onze Minister voor Natuur en Stikstof met
      het toezicht belaste personen desgevraagd inlichtingen over de inhoud van en de wijze van afnemen van examens en
      laat desgevraagd deze personen het afleggen van examens bijwonen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.91
  - number: 11.92.1
    text: |-
      Een omgevingsvergunning voor een jachtgeweeractiviteit wordt binnen vijf dagen nadat een besluit tot intrekking
      is bekendgemaakt en binnen vijf dagen nadat een rechterlijke uitspraak waarin de bevoegdheid tot het gebruik van
      het geweer is ontzegd voor tenuitvoerlegging vatbaar is geworden, ingeleverd bij de korpschef of degene die de
      omgevingsvergunning namens de korpschef heeft verleend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.92
  - number: 11.92.2
    text: |-
      Een omgevingsvergunning voor een valkeniersactiviteit wordt binnen vijf dagen nadat een besluit tot intrekking
      is bekendgemaakt en binnen vijf dagen nadat een rechterlijke uitspraak waarin de bevoegdheid tot het gebruik van
      de roofvogel is ontzegd voor tenuitvoerlegging vatbaar is geworden, ingeleverd bij Onze Minister voor Natuur en
      Stikstof of degene die namens die Minister de omgevingsvergunning heeft verleend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.92
  - number: 11.93.1
    text: |-
      Het is verboden te handelen in strijd met de artikelen 4, eerste lid, eerste zin, tweede lid, eerste zin, derde en
      vierde lid, 5, eerste en vierde lid, eerste zin, 6, derde lid, 8, eerste lid in samenhang met het vijfde lid, en 9,
      eerste, vierde en vijfde lid, van de cites-basisverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.93
  - number: 11.93.2
    text: |-
      Het is verboden te handelen in strijd met de voorwaarden en vereisten, bedoeld in artikel 11, derde lid, van de
      cites-basisverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.93
  - number: '11.94'
    text: |-
      Dieren, planten, producten, nesten of eieren van dieren of producten van planten van soorten als bedoeld in
      artikel 1 van de vogelrichtlijn, of genoemd in bijlage IV bij de habitatrichtlijn, bijlage II bij het Verdrag van
      Bern, bijlage I bij het verdrag van Bonn of bijlage A, B, C, of D bij de cites-basisverordening worden alleen via
      bij ministeriële regeling aangewezen douanekantoren binnen of buiten het grondgebied van Nederland gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.94
  - number: '11.95'
    text: |-
      In plaats van een uitvoervergunning als bedoeld in artikel 5, eerste lid, van de cites-basisverordening wordt
      aanvaard een fytosanitair certificaat dat is afgegeven door Onze Minister voor Natuur en Stikstof of een bevoegde
      administratieve instantie van een andere lidstaat van de Europese Unie en dat voldoet aan artikel 17, tweede lid,
      van de cites-uitvoeringsverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.95
  - number: 11.96.1
    text: |-
      Gefokte vogels van soorten als bedoeld in artikel 1 van de vogelrichtlijn, die niet zijn genoemd in bijlage A, B, C
      of D bij de cites-basisverordening, of producten of eieren daarvan worden niet onder zich gehouden of verhandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.2
    text: |-
      Dieren of planten van de soorten, genoemd in bijlage A, B, C of D bij de cites-basisverordening, producten of
      eieren van deze dieren of producten van deze planten worden niet onder zich gehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.3
    text: |-
      Dieren of planten van de soorten, genoemd in bijlage C of D bij de cites-basisverordening, producten of eieren van
      deze dieren of producten van deze planten worden niet verhandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.4
    text: 'Het tweede en het derde lid gelden niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.4.a
    text: |-
      uit het wild afkomstige dieren en planten, die na 10 juni 1994 aantoonbaar overeenkomstig de op dat moment geldende
      regelgeving aan de natuur zijn onttrokken, van de soorten, genoemd in bijlage IV bij de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.4.b
    text: |-
      uit het wild afkomstige dieren en planten, die na 10 juni 1994 aantoonbaar overeenkomstig de op dat moment geldende
      regelgeving aan de natuur zijn onttrokken, van de soorten, genoemd in bijlage I of II bij het verdrag van Bern of
      bijlage I bij het verdrag van Bonn, niet zijnde soorten als bedoeld in artikel 1 van de vogelrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.96.4.c
    text: uit het wild afkomstige vogels van soorten als bedoeld in artikel 1 van de vogelrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.96
  - number: 11.97.1
    text: |-
      [Artikel 11.96, eerste, tweede en derde lid][ref1], geldt niet voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.97.1.a
    text: |-
      het onder zich hebben of verhandelen van een aantoonbaar gefokte vogel van een soort als bedoeld in artikel 1
      van de vogelrichtlijn, die niet is genoemd in bijlage A, B, C of D bij de cites-basisverordening, of producten of
      eieren daarvan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.1.b
    text: |-
      het onder zich hebben van een aantoonbaar gefokte vogel van een soort die is genoemd in bijlage A, B, C of D bij de
      cites-basisverordening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.1.c
    text: |-
      het verhandelen van een aantoonbaar gefokte vogel van een soort, genoemd in bijlage C of D bij de cites-
      basisverordening, of producten of eieren daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2
    text: |-
      Voor een aantoonbaar gefokte vogel die behoort of mede behoort tot een soort als bedoeld in artikel 1 van de
      vogelrichtlijn geldt het eerste lid alleen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2.a
    text: 'als de vogel is voorzien van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2.a.1°
    text: een gesloten pootring die voldoet aan bij ministeriële regeling gestelde regels;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2.a.2°
    text: |-
      een gesloten pootring die, of een ander merkteken dat aantoonbaar rechtmatig is afgegeven door een bevoegde
      instantie van een andere staat dan Nederland, of een door een bevoegde instantie van een andere staat dan Nederland
      erkende organisatie, in overeenstemming met de wettelijke eisen van de betreffende staat, of als het product of ei
      van een dergelijke vogel afkomstig is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2.a.3°
    text: |-
      een microchiptransponder in overeenstemming met artikel 66, tweede lid, van de cites-uitvoeringsverordening, voor
      een vogel die behoort tot een soort, genoemd in bijlage A, B, C of D bij de cites-basisverordening, tenzij Onze
      Minister voor Natuur en Stikstof een verklaring heeft afgegeven dat een microchiptransponder wegens lichamelijke
      kenmerken van de betrokken dieren aantoonbaar niet veilig kan worden aangebracht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.2.b
    text: |-
      voor een levende vogel die behoort tot een soort, genoemd in bijlage A bij de cites-basisverordening, als is
      voldaan aan [artikel 11.103][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.97.2.c
    text: |-
      voor een vogel die behoort tot een soort, genoemd in bijlage A, B, C of D bij de cites-basisverordening, als de
      vogel aantoonbaar met inachtneming van de cites-basisverordening en de cites-uitvoeringsverordening binnen het
      grondgebied van Nederland is gebracht of verkregen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3
    text: |-
      Voor een vogel die behoort tot een soort, genoemd in bijlage A, B, C of D bij de cites-basisverordening, en die
      geen soort als bedoeld in artikel 1 van de vogelrichtlijn is, geldt het eerste lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.a
    text: |-
      voor een levende gefokte vogel die behoort tot een soort, genoemd in bijlage A bij de cites-basisverordening,
      alleen als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.a.1°
    text: |-
      is voldaan aan het tweede lid, onder a, onder 1°, 2° of 3°, of als het product of ei van een dergelijke vogel
      afkomstig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.a.2°
    text: |-
      is voldaan aan [artikel 11.103][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.97.3.a.3°
    text: |-
      de vogel aantoonbaar met inachtneming van de cites-basisverordening en de cites-uitvoeringsverordening in Nederland
      is gebracht of verkregen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.b
    text: |-
      voor een dode vogel, een product of een ei van een vogel, behorend tot een soort, genoemd in bijlage A bij de
      cites-basisverordening, alleen als die vogel of dat product of ei aantoonbaar met inachtneming van de cites-
      basisverordening en de cites-uitvoeringsverordening in Nederland is gebracht of verkregen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.c
    text: 'voor een vogel die behoort tot een soort, genoemd in bijlage B, C of D bij de cites-basisverordening, alleen als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.c.1°
    text: |-
      de vogel aantoonbaar is gefokt of het product of het ei van een dergelijke vogel afkomstig is of de vogel, het
      product of het ei aantoonbaar met inachtneming van de cites-basisverordening en de cites-uitvoeringsverordening
      binnen het grondgebied van Nederland is gebracht of verkregen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.3.c.2°
    text: |-
      de vogel behoort tot een soort, genoemd in bijlage B bij de cites-basisverordening, en is voldaan aan
      [artikel 11.103][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.97.4
    text: 'Het eerste, tweede en derde lid gelden niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.4.a
    text: >-
      het onder zich hebben in het veld van een levende
      vogel van een soort, bedoeld in artikel 1 van
      de vogelrichtlijn:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.4.a.1°
    text: van het geslacht Cygnus; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.97.4.a.2°
    text: |-
      van de orde roofvogels of uilen, tenzij degene die de vogel onder zich heeft de vogel op grond van het bepaalde bij
      of krachtens de [wet][ref1] mag gebruiken voor het vangen of doden van dieren; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 11.97.4.b
    text: voor het onder zich hebben van een levende havik.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.97
  - number: 11.98.1
    text: |-
      Met een maatwerkregel wordt niet afgeweken van [artikel 11.96][ref1] voor het onder zich hebben van een levende
      havik.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.98
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.98.2
    text: |-
      Met een maatwerkvoorschrift kan alleen worden afgeweken van [artikel 11.96][ref1] voor het onder zich hebben of
      verhandelen van een levende havik, als dat maatwerkvoorschrift inhoudt dat DNA-fingerprints worden overgelegd van
      zowel de oudervogels als de jonge vogel als bewijs dat de havik in gevangenschap is gefokt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.98
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.99.1
    text: |-
      [Artikel 11.96, tweede lid][ref1], geldt niet voor het onder zich hebben van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.99.1.a
    text: |-
      een dood gewerveld dier, een ongewerveld dier of een plant, behorende tot een soort, genoemd in bijlage A bij de
      cites-basisverordening, of producten of eieren daarvan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.1.b
    text: |-
      een levend, aantoonbaar gefokt gewerveld dier dat niet een vogel is als bedoeld in
      [artikel 11.97, eerste lid, onder a of b][ref1], van een soort, genoemd in bijlage A bij de cites-
      basisverordening, of producten of eieren daarvan; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.99.1.c
    text: |-
      een dier dat niet een vogel als bedoeld in artikel 1 van de vogelrichtlijn is, of een plant van een soort, genoemd
      in bijlage B, C of D bij de cites-basisverordening, of producten of eieren daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.2
    text: 'Het eerste lid geldt alleen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.2.a
    text: 'als het dier of de plant:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.2.a.1°
    text: |-
      aantoonbaar met inachtneming van de cites-basisverordening en de cites-uitvoeringsverordening in Nederland is
      gebracht of verkregen en, als sprake is van een aal (Anguilla anguilla), is voldaan aan het bij of krachtens de
      [Visserijwet 1963][ref1] bepaalde; of


      [ref1]: https://wetten.overheid.nl/BWBR0002416
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
    references:
      - id: ref1
        bwb_id: BWBR0002416
  - number: 11.99.2.a.2°
    text: |-
      aantoonbaar in Nederland is gefokt of gekweekt en het dier ongewerveld is, of, als het een levend, gefokt gewerveld
      dier van een soort, genoemd in bijlage A bij de cites-basisverordening is, is voorzien van een microchiptransponder
      in overeenstemming met artikel 66, derde lid, van de cites-uitvoeringsverordening, tenzij Onze Minister voor
      Natuur en Stikstof een verklaring heeft afgegeven dat een microchiptransponder wegens lichamelijke kenmerken van de
      betrokken dieren aantoonbaar niet veilig kan worden aangebracht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.2.b
    text: |-
      als is voldaan aan [artikel 11.103][ref1] en desgevraagd inzage in de administratie wordt verschaft aan de met
      toezicht op de naleving van de [wet][ref2] belaste ambtenaren; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0037885
  - number: 11.99.2.c
    text: |-
      als sprake is van een levend uit het wild afkomstig dier van een soort, genoemd in bijlage B bij de cites-
      basisverordening, en over dat dier een administratie wordt bijgehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.3
    text: |-
      Het eerste lid, aanhef en onder a, geldt niet voor botten en daarvan of daarmee vervaardigde producten van de
      tijger (Panthera tigris) en hoorns en daarvan of daarmee vervaardigde producten van de soorten van de familie
      neushoorns (Rhinocerotidea).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.4
    text: |-
      Het eerste lid, aanhef en onder b, geldt niet voor dieren van soorten behorende tot de orde van de primaten
      (Primates) of de familie van de katachtigen (Felidae).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5
    text: 'Het eerste lid, aanhef en onder c, geldt niet voor levende dieren van de soorten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.a
    text: Bengaalse kat (Prionailurus bengalensis);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.b
    text: Canadese lynx (Lynx canadensis);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.c
    text: caracal (Caracal caracal);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.d
    text: poema (Puma concolor);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.e
    text: roestkat (Prionailurus rubiginosus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.f
    text: rode lynx (Lynx rufus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.g
    text: jagoearoendi of otterkat (Herpailurus yaguarondi);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.h
    text: leeuw (Panthera leo);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.i
    text: fretkat (Cryptoprocta ferox); en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.99.5.j
    text: soorten behorende tot de orde van de primaten (Primates).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.99
  - number: 11.100.1
    text: |-
      [Artikel 11.96, derde lid][ref1], geldt niet voor het verhandelen van een dier, met uitzondering van een vogel
      als bedoeld in artikel 1 van de vogelrichtlijn, of een plant van een soort, genoemd in bijlage C of D bij de cites-
      basisverordening, of producten of eieren daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.100
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.100.2
    text: 'Het eerste lid geldt alleen als het dier of de plant aantoonbaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.100
  - number: 11.100.2.a
    text: |-
      op het grondgebied van Nederland is gebracht of verkregen met inachtneming van de cites-basisverordening en de
      cites-uitvoeringsverordening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.100
  - number: 11.100.2.b
    text: in Nederland is gefokt of gekweekt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.100
  - number: 11.101.1
    text: 'Uit het wild afkomstige dieren van de volgende soorten worden niet onder zich gehouden of verhandeld:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.a
    text: boommarter (Martes martes);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.b
    text: bunzing (Mustela putorius);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.c
    text: damhert (Dama dama);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.d
    text: edelhert (Cervus elaphus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.e
    text: haas (Lepus europaeus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.f
    text: hermelijn (Mustela erminea);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.g
    text: konijn (Oryctolagus cuniculus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.h
    text: ree (Capreolus capreolus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.i
    text: steenmarter (Martes foina);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.j
    text: vos (Vulpes vulpes);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.k
    text: wezel (Mustela nivalis); of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.1.l
    text: wild zwijn (Sus scrofa).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.2
    text: |-
      Het eerste lid geldt niet voor het onder zich hebben of verhandelen van een dood dier of voor het onder zich hebben
      van een levend dier, als het dier:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.2.a
    text: |-
      aantoonbaar is verkregen in Nederland op grond van een omgevingsvergunning voor een flora- en fauna-activiteit of
      in overeenstemming met de eisen verbonden aan een aanwijzing van de flora- en fauna-activiteit als vergunningvrij
      geval; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.101.2.b
    text: |-
      een dood dier is, aantoonbaar in het wild is gestorven buiten schuld of medeweten van degene die zich het dier
      heeft toegeëigend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.101
  - number: 11.102.1
    text: Een uit het wild afkomstige vogel als bedoeld in artikel 1 van de vogelrichtlijn wordt niet geprepareerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.102
  - number: 11.102.2
    text: 'Het eerste lid is niet van toepassing op degene die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.102
  - number: 11.102.2.a
    text: |-
      aan Onze Minister voor Natuur en Stikstof binnen drie dagen na ontvangst de bij ministeriële regeling aangewezen
      gegevens verstrekt over de vogel die hem ter preparatie wordt aangeboden, op een bij die regeling bepaalde wijze;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.102
  - number: 11.102.2.b
    text: een door Onze Minister voor Natuur en Stikstof verstrekt merkteken aanbrengt op de geprepareerde vogels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.102
  - number: 11.103.1
    text: |-
      Degene die een levend gefokt dier of een levende gekweekte plant onder zich heeft, houdt een administratie bij over
      dat dier of die plant die voldoet aan bij ministeriële regeling gestelde regels, als het dier of de plant behoort
      tot:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.1.a
    text: |-
      de soorten, genoemd in bijlage IV bij de habitatrichtlijn, bijlage II bij het verdrag van Bern of bijlage I bij het
      verdrag van Bonn, met uitzondering van vogels van soorten als bedoeld in artikel 1 van de vogelrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.1.b
    text: |-
      de soorten, genoemd in bijlage A bij de cites-basisverordening, met uitzondering van de in bijlage X bij de cites-
      uitvoeringsverordening genoemde diersoorten en de hybriden daarvan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.1.c
    text: 'de diersoorten, genoemd in bijlage B bij de cites-basisverordening, met uitzondering van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.1.c.1°
    text: gefokte vogels die van een gesloten pootring zijn voorzien; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.1.c.2°
    text: |-
      de soorten, genoemd in [bijlage X][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.103.1.d
    text: |-
      de kunstmatig gekweekte hybriden van niet van een annotatie voorziene soorten, genoemd in bijlage A bij de cites-
      basisverordening, als voor die soorten een fytosanitair certificaat als bedoeld in artikel 17 van de cites-
      uitvoeringsverordening is afgegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.2
    text: |-
      Degene die een administratie als bedoeld in het eerste lid bijhoudt, verschaft op verzoek inzage in die
      administratie aan de toezichthouder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.103.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op degene die een uit het wild afkomstig levend dier
      van een soort, genoemd in bijlage B bij de cites-basisverordening, onder zich heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.103
  - number: 11.104.1
    text: |-
      Degene die een vogel van een soort als bedoeld in artikel 1 van de vogelrichtlijn of genoemd in bijlage A bij de
      cites-basisverordening fokt, voorziet de vogel van een gesloten pootring.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.104
  - number: 11.104.2
    text: |-
      Het eerste lid is niet van toepassing op vogels van de soorten, genoemd in bijlage X bij de cites-
      uitvoeringsverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.104
  - number: 11.104.3
    text: 'De pootringen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.104
  - number: 11.104.3.a
    text: zijn afgegeven door Onze Minister voor Natuur en Stikstof of een door die minister aangewezen organisatie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.104
  - number: 11.104.3.b
    text: voldoen aan bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.104
  - number: 11.105.1
    text: Het is verboden te handelen in strijd met artikel 3, eerste lid, van de zeehonden-basisverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.105
  - number: 11.105.2
    text: |-
      Het is verboden de producten, genoemd in de bijlage bij [richtlijn 83/129/EEG](31983L0129) van de Raad van 28 maart
      1983 betreffende de invoer in de Lid-Staten van huiden van bepaalde zeehondenjongen en daarvan vervaardigde
      produkten (PbEG 1983, L 91), voor handelsdoeleinden binnen Nederland te brengen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.105
  - number: 11.105.3
    text: Het tweede lid geldt niet voor producten die afkomstig zijn van de traditionele jacht van de Inuit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.105
  - number: '11.106'
    text: Het is verboden te handelen in strijd met artikel 3, eerste lid, van de wildklemverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.106
  - number: '11.107'
    text: |-
      Met een maatwerkvoorschrift kan alleen worden afgeweken van de [artikelen 11.93][ref1], [11.105][ref2] en
      [11.106][ref3], als dit in overeenstemming is met de bij of krachtens de cites-basisverordening, de Europese
      zeehondenregelgeving en de wildklemverordening gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.107
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.108.1
    text: |-
      Het is verboden te handelen in strijd met artikel 7, eerste lid, aanhef en onder a, b, c, d, e, f, g of h, van de
      invasieve-exoten-basisverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
  - number: 11.108.2
    text: |-
      Het eerste lid geldt niet voor beheersmaatregelen als bedoeld in artikel 19 van de invasieve-exoten-
      basisverordening voor activiteiten als bedoeld in artikel 7, eerste lid, onder b, d, e en f, van die verordening
      voor bij ministeriële regeling aangewezen diersoorten en onder de daarin vastgestelde voorwaarden bij:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
  - number: 11.108.2.a
    text: |-
      bevissing van de dieren in Nederlandse binnenwateren en kustwateren, de opslag, de handel, het transport, het
      houden, het gebruik of de vernietiging van de opgeviste dieren, en alle onmiddellijk daarmee samenhangende
      handelingen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
  - number: 11.108.2.b
    text: |-
      handelingen als bedoeld onder a ten aanzien van dieren die als beheersmaatregel zijn opgevist en in de handel zijn
      gebracht in andere lidstaten van de Europese Unie in overeenstemming met de in die lidstaten geldende wetgeving.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
  - number: 11.108.3
    text: |-
      Het is verboden te handelen in strijd met bij ministeriële regeling vastgestelde noodmaatregelen als bedoeld in
      artikel 10, eerste lid, van de invasieve-exoten-basisverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
  - number: 11.108.4
    text: |-
      Het eerste lid geldt niet voor de houder van dieren van de soorten Amerikaanse
      voseekhoorn (Sciurus niger), grijze eekhoorn (Sciurus carolinensis) en Pallas eekhoorn
      (Callosciurus erythraeus), als de houder op 1 januari 2017 aantoonbaar voldeed aan
      [artikel 8a, tweede en derde lid, van het Besluit vrijstelling beschermde dier- en plantensoorten][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0011853#Artikel8a
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.108
    references:
      - id: ref1
        bwb_id: BWBR0011853
        artikel: 8a
  - number: '11.109'
    text: |-
      Met een maatwerkvoorschrift kan alleen worden afgeweken van [artikel 11.108][ref1], als dit in overeenstemming is
      met de bij of krachtens de invasieve-exoten-basisverordening gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.10
        afdeling: '11.2'
  - number: 11.109a.1
    text: |-
      Planten, of delen of producten daarvan, die zich kunnen voortplanten, van de volgende soorten worden niet
      verhandeld:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109a
  - number: 11.109a.1.a
    text: Japanse duizendknoop (*Fallopia japonica*);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109a
  - number: 11.109a.1.b
    text: Sachalinse duizendknoop (*Fallopia sachalinensis*); en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109a
  - number: 11.109a.1.c
    text: bastaardduizendknoop (*Fallopia x bohemica*).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109a
  - number: 11.109a.2
    text: |-
      Het eerste lid geldt niet voor zover het verhandelen plaatsvindt in het kader van uitroeiing, bestrijding of
      beheersing van die soort, onder de bij ministeriële regeling vastgestelde voorwaarden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.109a
  - number: '11.110'
    text: |-
      Walvissen worden niet vanuit een Nederlands schip gevangen of gedood, of aan boord van een Nederlands schip
      verwerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.110
  - number: 11.111.1
    text: |-
      Deze afdeling gaat over het vellen van houtopstanden en het herbeplanten van grond na het vellen van houtopstanden
      of nadat een houtopstand op een andere manier teniet is gegaan, en over handel in en bezit van hout of
      houtproducten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2
    text: 'De afdeling gaat niet over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.a
    text: |-
      houtopstanden binnen de in het omgevingsplan aangewezen bebouwingscontour houtkap, bedoeld in
      [artikel 5.165b van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 11.111.2.b
    text: houtopstanden op erven of in tuinen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.c
    text: bomen en struiken die specifiek voor het oogsten van fruit, noten of vruchten worden geteeld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.d
    text: houtopstanden die windschermen om boomgaarden vormen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.e
    text: naaldbomen, kennelijk bedoeld om te dienen als kerstbomen, als deze niet ouder zijn dan 20 jaar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.f
    text: kweekgoed;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.g
    text: 'uit populieren of wilgen bestaande:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.g.1°
    text: wegbeplantingen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.g.2°
    text: beplantingen langs waterwegen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.g.3°
    text: eenrijige beplantingen langs landbouwgronden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.h
    text: het dunnen van een houtopstand voor de bevordering van de groei van de overblijvende houtopstand;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.i
    text: |-
      uit populieren, wilgen, essen of elzen bestaande beplantingen die kennelijk zijn bedoeld voor de productie van
      houtige biomassa, als zij:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.i.1°
    text: ten minste eens per 10 jaar worden geoogst;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.i.2°
    text: |-
      bestaan uit minstens 10.000 stoven per ha per beplantingseenheid, die bestaat uit aaneengesloten beplanting die
      niet wordt doorsneden door onbeplante stroken breder dan 2 m; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.i.3°
    text: zijn aangelegd na 1 januari 2013; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.111.2.j
    text: |-
      houtopstanden die een kleinere oppervlakte grond beslaan dan 10 a, of bestaan uit een rijbeplanting die 20 of
      minder bomen omvat, gerekend over het totaal aantal rijen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.111
  - number: 11.112.1
    text: |-
      De regels in [paragraaf 11.3.2][ref1] over het vellen en herbeplanten van houtopstanden zijn gesteld met het oog
      op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.112.1.a
    text: de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.1.b
    text: de instandhouding van het bosareaal in Nederland; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.1.c
    text: het beschermen van landschappelijke waarden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.2
    text: |-
      De regels in [paragraaf 11.3.2][ref1] over de handel in het bezit van hout of houtproducten zijn gesteld met het
      oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.112.2.a
    text: de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.2.b
    text: het beschermen van het milieu;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.2.c
    text: het tegengaan van klimaatverandering; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: 11.112.2.d
    text: het beheer van natuurlijke hulpbronnen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.112
  - number: '11.113'
    text: |-
      Tenzij in [artikel 11.114][ref1] anders is bepaald, zijn gedeputeerde staten van de provincie waarbinnen de
      activiteit geheel of in hoofdzaak wordt verricht het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.113
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: 11.113.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.113
  - number: 11.113.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.113
  - number: 11.113.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.113
  - number: '11.114'
    text: |-
      Onze Minister voor Natuur en Stikstof is het bevoegd gezag waaraan een melding wordt gedaan, dat een
      maatwerkvoorschrift kan stellen of dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te
      treffen voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.114
  - number: 11.114.a
    text: |-
      het vellen van houtopstanden en herbeplanten van de grond als deze activiteit een activiteit is als beschreven in
      [artikel 4.12, tweede lid, onder a tot en met k, van het Omgevingsbesluit][ref1], daarvan onderdeel uitmaakt of
      in samenhang daarmee wordt verricht; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.114
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.114.b
    text: |-
      het verhandelen, het om een andere reden dan verkoop onder zich hebben of het binnen of buiten het grondgebied van
      Nederland brengen van hout of houtproducten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.114
  - number: '11.115'
    text: |-
      Aan deze afdeling wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.115
  - number: '11.116'
    text: |-
      Degene die een activiteit als bedoeld in [artikel 11.111, eerste lid][ref1], verricht en weet of redelijkerwijs
      kan vermoeden dat die activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 11.112][ref2],
      is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.116
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: 11.116.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.116
  - number: 11.116.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.116
  - number: 11.116.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.116
  - number: 11.117.1
    text: |-
      Een maatwerkregel kan in de omgevingsverordening worden gesteld over de [artikelen 11.116][ref1], [11.123][ref2]
      en [11.124][ref3] en [paragraaf 11.3.2][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.117
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
      - id: ref4
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
