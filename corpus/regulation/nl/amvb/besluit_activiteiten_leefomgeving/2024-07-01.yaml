        afdeling: '5.2'
  - number: 4.290.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.291.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met olie, smeermiddel en koelvloeistof wordt metaal
      spaanloos of verspanend bewerkt, thermisch bewerkt, of afgewerkt boven een aaneengesloten bodemvoorziening, als
      daarbij olie, smeermiddel of koelvloeistof wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.291
  - number: 4.291.2
    text: |-
      Het scheiden van afvalstoffen door ze te laten uitlekken, bedoeld in [artikel 4.303a][ref1], vindt plaats boven
      een lekbak.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.291
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: '4.292'
    text: 'Met het oog op het beperken van de hoeveelheid afvalwater wordt bij het mechanisch bewerken van metalen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.292
  - number: 4.292.a
    text: droog gereinigd, tenzij dat redelijkerwijs niet mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.292
  - number: 4.292.b
    text: water dat als koelmiddel, spoelmiddel of smeermiddel wordt toegepast, zo veel mogelijk opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.292
  - number: 4.293.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van mechanisch bewerken
      van metalen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.293
  - number: 4.293.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.293
  - number: '4.294'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.294
  - number: 4.294.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.294
  - number: 4.294.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.294
  - number: 4.295.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.295
  - number: 4.295.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.295
  - number: 4.295.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.295
  - number: '4.296'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.296
  - number: 4.296.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.296
  - number: 4.296.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.296
  - number: 4.296.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.296
  - number: '4.297'
    text: |-
      Met het oog op het beperken van emissies in de lucht en het voorkomen of beperken van geluidhinder worden metalen
      in een gesloten ruimte mechanisch of thermisch bewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.297
  - number: '4.298'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.298
  - number: 4.299.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.299, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.299
  - number: 4.299.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.299, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.299
  - number: 4.299.3
    text: |-
      Aan het eerste lid wordt voor totaal stof in ieder geval voldaan als de emissies door een geschikte filtrerende
      afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.299
  - number: 4.299.4
    text: |-
      Aan het eerste lid wordt voor chroom VI-verbindingen, berekend als chroom, in ieder geval voldaan als de emissies
      afkomstig van droogverspanende bewerkingen, mechanische eindafwerking van roestvast staal en thermische bewerkingen
      door een geschikte filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.299
  - number: 4.299.5
    text: |-
      Aan het eerste lid wordt voor koper en koperverbindingen, berekend als koper, in ieder geval voldaan als de
      emissies afkomstig van het snijden van koper door een geschikte filtrerende afscheider worden gevoerd.
            Tabel 4.299 Emissiegrenswaarden


