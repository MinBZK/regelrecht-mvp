      Deze paragraaf is ook van toepassing op beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk die
      bestaan uit het bouwen of in stand houden van een uitstroomvoorziening voor de lozingsactiviteit, bedoeld in het
      eerste lid, in de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.58
  - number: '7.59'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteit, bedoeld
      in [artikel 7.58, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
