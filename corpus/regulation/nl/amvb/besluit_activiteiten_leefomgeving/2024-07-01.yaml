  - number: 4.81.3
    text: |-
      De emissie van stikstofoxide van een afvalverbrandingsinstallatie wordt, in afwijking van [artikel 4.79][ref1],
      periodiek ten minste om de zes maanden gemeten of in het eerste jaar dat een afvalverbrandingsinstallatie of
      afvalmeeverbrandingsinstallatie in werking is periodiek ten minste om de drie maanden gemeten, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.81.3.a
    text: |-
      de afvalverbrandingsinstallatie een totale verbrandingscapaciteit heeft van minder dan 6 ton afvalstoffen per uur,
      waarbij:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.3.a.1°
    text: |-
      deze totale verbrandingscapaciteit bestaat uit de gezamenlijke verbrandingscapaciteit van de ovens waaruit
      een afvalverbrandingsinstallatie of een afvalmeeverbrandingsinstallatie bestaat, met inachtneming van de
      verbrandingswaarde van de afvalstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.3.a.2°
    text: de door de fabrikant berekende verbrandingscapaciteit wordt bevestigd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.3.b
    text: |-
      een vergunning is verleend of een ontvankelijke aanvraag om een vergunning is ingediend voor 28 december 2002 en de
      afvalverbrandingsinstallatie uiterlijk op 28 december 2004 in gebruik is genomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.3.c
    text: |-
      wordt aangetoond dat emissies van stikstofoxiden niet meer zijn dan de emissiegrenswaarden, bedoeld in tabel 4.75,
      aan de hand van informatie over de kwaliteit van de afvalstoffen, de gebruikte technologieën en de resultaten van
      de monitoring van de emissies.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.4
    text: |-
      Als wordt aangetoond dat die emissie in geen geval hoger is dan de toepasselijke emissiegrenswaarde wordt het
      gehalte zoutzuur, waterstoffluoride of zwaveldioxide:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.4.a
    text: periodiek ten minste om de zes maanden gemeten; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.4.b
    text: niet gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.5
    text: |-
      Het gehalte antimoon, arseen, cadmium, chroom, kobalt, koper, lood, mangaan, nikkel, thallium en vanadium wordt
      periodiek eenmaal in de twee jaar gemeten en het gehalte dioxinen en furanen wordt jaarlijks gemeten als wordt
      aangetoond dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.5.a
    text: |-
      de emissies in de lucht onder alle omstandigheden minder zijn dan 50% van de emissiegrenswaarden die van toepassing
      zijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81.5.b
    text: |-
      de afvalstoffen die worden verbrand of meeverbrand alleen bestaan uit bepaalde gesorteerde brandbare fracties
      ongevaarlijke afvalstoffen die niet recyclebaar zijn, en daarbij aan de hand van informatie over de kwaliteit van
      die afvalstoffen en over monitoring van de emissies wordt aangetoond dat de emissies in de lucht van de stoffen,
      bedoeld in het eerste lid, onder alle omstandigheden aanmerkelijk lager liggen dan de emissiegrenswaarden die van
      toepassing zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81
  - number: 4.81a
    text: 'Van de volgende stoffen worden de emissies in de lucht periodiek ten minste om de zes maanden gemeten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81a
  - number: 4.81a.a
    text: benzo(a)pyreen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81a
  - number: 4.81a.b
    text: |-
      PBDD/F voor zover er afvalstoffen met gebromeerde vlamvertragers worden verbrand of gebromeerde verbindingen worden
      toegevoegd in de rookgasreinigingsinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.81a
  - number: '4.82'
    text: 'De verblijftijd, de minimumtemperatuur en het zuurstofgehalte van de afgassen worden vastgesteld:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.82
  - number: 4.82.a
    text: op het moment dat de afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie in werking wordt gesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.82
  - number: 4.82.b
    text: |-
      op het moment dat de afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie onder de meest ongunstige
      bedrijfsomstandigheden in werking wordt gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.82
  - number: 4.83.1
    text: |-
      De resultaten van de metingen, bedoeld in de [artikelen 4.79][ref1] en [4.81][ref2], worden omgerekend tot een
      massaconcentratie bij het genormaliseerde zuurstofgehalte, volgens de formule: waarbij wordt verstaan onder: E: de
      berekende emissieconcentratie bij het genormaliseerde zuurstofgehalte; E: de gemeten emissieconcentratie; O: het
      genormaliseerde zuurstofgehalte; en O: het gemeten zuurstofgehalte.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.83
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.83.2
    text: |-
      Als afvalstoffen worden verbrand of meeverbrand in een atmosfeer die met zuurstof is verrijkt, kunnen de
      meetresultaten worden omgerekend tot een zuurstofgehalte als wordt aangetoond dat dit de bijzondere omstandigheden
      van het geval weergeeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.83
  - number: 4.83.3
    text: |-
      Als de emissies in de lucht van stoffen waarvoor emissiegrenswaarden zijn vastgesteld, worden verminderd door
      behandeling van het afgas in een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie waarin gevaarlijke
      afvalstoffen worden behandeld, wordt alleen omgerekend naar de zuurstofgehaltes als het gemeten zuurstofgehalte
      hoger is dan het relevante genormaliseerde zuurstofgehalte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.83
  - number: 4.84.1
    text: |-
      Een periodieke meting van zoutzuur, waterstoffluoride, zwaveldioxide of stikstofoxiden bestaat uit een serie van
      ten minste drie deelmetingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.84
  - number: 4.84.2
    text: |-
      Een deelmeting duurt een half uur. Als het meettechnisch niet mogelijk is de deelmeting in die tijd te verrichten,
      kan de deelmeting ten hoogste twee uur duren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.84
  - number: 4.84.3
    text: |-
      Periodieke metingen van kwik, de som van cadmium en thallium en de som van antimoon, arseen, chroom, kobalt, lood,
      mangaan, nikkel en vanadium bestaan uit een deelmeting over een bemonsteringsperiode van ten minste een half uur en
      ten hoogste acht uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.84
  - number: 4.84.4
    text: |-
      Een periodieke meting van dioxinen en furanen bestaat uit een deelmeting over een bemonsteringsperiode van ten
      minste zes uur en ten hoogste acht uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.84
  - number: 4.84.5
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.78][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.84
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.85.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste twee weken voordat een periodieke meting wordt
      verricht, geïnformeerd over de datum en het tijdstip van die meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.85
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.85.2
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt uiterlijk op de datum dat een periodieke meting zou
      worden verricht, geïnformeerd over het niet doorgaan daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.85
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.86.1
    text: Geautomatiseerde meetsystemen worden ten minste jaarlijks met parallelmetingen gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.86
  - number: 4.86.2
    text: |-
      Een parallelmeting die wordt verricht om de meetapparatuur voor continue metingen te verifiëren duurt ten minste
      een half uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.86
  - number: 4.86.3
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens het eerste lid van toepassing is op de stof die wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.86
  - number: 4.87.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt geïnformeerd over de resultaten van de controle, bedoeld
      in [artikel 4.86, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.87
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.87.2
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste twee weken voor een parallelmeting wordt
      verricht, geïnformeerd over de datum en het tijdstip van die meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.87
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.87.3
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt uiterlijk op de datum dat een parallelmeting zou worden
      verricht, geïnformeerd over het niet doorgaan daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.87
    references:
