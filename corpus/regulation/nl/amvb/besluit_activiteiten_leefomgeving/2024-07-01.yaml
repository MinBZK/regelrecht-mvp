        paragraaf: 15.2.1
        afdeling: '15.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.64.2.c
    text: |-
      de momenten als bedoeld in [artikelen 15.20, tweede lid][ref1], [15.38, tweede lid][ref2], en
      [15.57, tweede lid][ref3]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.4
        afdeling: '15.2'
  - number: 15.64.2.d
    text: de wijze van totstandkoming van het beheersplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.64.3
    text: Het beheersplan wordt uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.64
  - number: 15.65.1
    text: |-
      Met het oog op het voorkomen van verdrinking van de gebruikers van een badwaterbassin, het beschermen van de
      gezondheid van de gebruikers van een badwaterbassin en het in en om het badwaterbassin voorkomen van letsel van de
      gebruikers van een badwaterbassin wordt een logboek bijgehouden over de uitvoering van het beheersplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.65.2
    text: 'Het logboek bevat in ieder geval een registratie van incidenten met vermelding van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.65.2.a
    text: de aanleiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.65.2.b
    text: eventuele bijzondere omstandigheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.65.2.c
    text: de geconstateerde risico’s voor de veiligheid van de gebruikers; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.65.2.d
    text: de maatregelen die zijn getroffen om herhaling te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.65
  - number: 15.66.1
    text: |-
      Tot 1 januari 2026 hoeft geen risicoanalyse als bedoeld in [artikel 15.63][ref1] te zijn opgesteld voor een
      badwaterbassin waarin gelegenheid wordt geboden tot zwemmen en baden op het tijdstip van inwerkingtreding van dit
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.66
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.66.2
    text: |-
      Tot het moment dat een risicoanalyse als bedoeld in [artikel 15.63][ref1] beschikbaar is, is voor een badwaterbassin
      waarin gelegenheid wordt geboden tot zwemmen en baden voor inwerkingtreding van dit besluit, de risicoanalyse,
      bedoeld in [artikel 2a van het Besluit hygiëne en veiligheid badinrichtingen en zwemgelegenheden][ref2] zoals dat
      luidde voor inwerkingtreding van dit besluit, beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0003716#Artikel2a
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.66
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
      - id: ref2
        bwb_id: BWBR0003716
        artikel: 2a
  - number: 15.67.1
    text: |-
      Tot 1 januari 2026 hoeft geen beheersplan als bedoeld in [artikel 15.64][ref1] te zijn opgesteld voor een
      badwaterbassin waarin gelegenheid wordt geboden tot zwemmen en baden op het tijdstip van inwerkingtreding van dit
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.67.2
    text: |-
      Tot het moment dat een beheersplan als bedoeld in [artikel 15.64][ref1] beschikbaar is, zijn voor
      een badwaterbassin waarin gelegenheid wordt geboden tot zwemmen en baden voor inwerkingtreding
      van dit besluit, het beheersplan, bedoeld in [artikel 2b][ref2], en het logboek, bedoeld in
      [artikel 2c van het Besluit hygiëne en veiligheid badinrichtingen en zwemgelegenheden][ref3] zoals dat luidde voor
      inwerkingtreding van dit besluit, beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0003716#Artikel2b
      [ref3]: https://wetten.overheid.nl/BWBR0003716#Artikel2c
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
      - id: ref2
        bwb_id: BWBR0003716
        artikel: 2b
      - id: ref3
        bwb_id: BWBR0003716
        artikel: 2c
  - number: '16.1'
    text: 'Dit hoofdstuk gaat over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.1
  - number: 16.1.a
    text: |-
      wateronttrekkingsactiviteiten voor industriële toepassingen van meer dan 150.000 m3/jaar water of voor de openbare
      drinkwatervoorziening voor zover het gaat om:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.1
    machine_readable:
      definitions:
        drempel_wateronttrekking_m3_jaar: 150000
      execution:
        produces:
          legal_character: BESCHIKKING
        input:
          - name: wateronttrekking_m3_jaar
            type: number
            required: true
            description: Jaarlijkse hoeveelheid onttrokken grondwater in m3
            source: {}
          - name: is_industriele_toepassing
            type: boolean
            required: true
            description: Of de wateronttrekking voor industriële toepassingen is
            source: {}
          - name: is_openbare_drinkwatervoorziening
            type: boolean
            required: true
            description: Of de wateronttrekking voor de openbare drinkwatervoorziening is
            source: {}
        output:
          - name: boven_drempel
            type: boolean
            description: Of de wateronttrekking meer dan 150.000 m3/jaar bedraagt
          - name: vergunningplichtig
            type: boolean
            description: Of de wateronttrekkingsactiviteit vergunningplichtig is op grond van dit hoofdstuk
        actions:
          - output: boven_drempel
            value:
              operation: GREATER_THAN
              subject: $wateronttrekking_m3_jaar
              value: $drempel_wateronttrekking_m3_jaar
          - output: vergunningplichtig
            value:
              operation: AND
              conditions:
                - operation: OR
                  conditions:
                    - $is_industriele_toepassing
                    - $is_openbare_drinkwatervoorziening
                - $boven_drempel
  - number: 16.1.a.1°
    text: het onttrekken van grondwater door een daarvoor bedoelde voorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.1
  - number: 16.1.a.2°
    text: |-
      het in de bodem brengen van water ter aanvulling van het grondwater, in samenhang met het onttrekken van grondwater
      door een daarvoor bedoelde voorziening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.1
  - number: 16.1.b
    text: ontgrondingsactiviteiten op land, in regionale wateren en in een winterbed van een rivier in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.1
  - number: 16.2.1
    text: |-
      De regels in [paragraaf 16.2.1][ref1] over wateronttrekkingsactiviteiten zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: 16.2.1.a
    text: het voorkomen en beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.2
  - number: 16.2.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.2
  - number: 16.2.1.c
    text: het vervullen van maatschappelijke functies door watersystemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.2
  - number: 16.2.2
    text: |-
      De regels in [paragraaf 16.2.2][ref1] over ontgrondingsactiviteiten zijn gesteld met het oog op de doelen van de
      [wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk16
      [ref2]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '16'
        paragraaf: 16.2.2
        afdeling: '16.2'
      - id: ref2
        bwb_id: BWBR0037885
  - number: '16.3'
    text: |-
      Deze paragraaf is van toepassing op wateronttrekkingsactiviteiten voor industriële toepassingen van meer dan
      150.000 m3/jaar water of voor de openbare drinkwatervoorziening, voor zover het gaat om:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.3
    machine_readable:
      definitions:
        drempel_wateronttrekking_m3_jaar: 150000
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: wateronttrekking_m3_jaar
            type: number
            required: true
            description: Jaarlijkse hoeveelheid onttrokken grondwater in m3
            source: {}
          - name: is_industriele_toepassing
            type: boolean
            required: true
            description: Of de wateronttrekking voor industriële toepassingen is
            source: {}
          - name: is_openbare_drinkwatervoorziening
            type: boolean
            required: true
            description: Of de wateronttrekking voor de openbare drinkwatervoorziening is
            source: {}
        output:
          - name: paragraaf_van_toepassing
            type: boolean
            description: Of deze paragraaf van toepassing is op de wateronttrekkingsactiviteit
        actions:
          - output: paragraaf_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: OR
                  conditions:
                    - operation: AND
                      conditions:
                        - $is_industriele_toepassing
                        - operation: GREATER_THAN
                          subject: $wateronttrekking_m3_jaar
                          value: $drempel_wateronttrekking_m3_jaar
                    - $is_openbare_drinkwatervoorziening
  - number: 16.3.a
    text: het onttrekken van grondwater door een daarvoor bedoelde voorziening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.3
  - number: 16.3.b
    text: |-
      het in de bodem brengen van water ter aanvulling van het grondwater, in samenhang met het onttrekken van grondwater
      door een daarvoor bedoelde voorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.3
  - number: '16.4'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      wateronttrekkingsactiviteit te verrichten, geldt voor de activiteiten, bedoeld in [artikel 16.3][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: '16.5'
    text: |-
      In de omgevingsverordening kan met het oog op het doelmatig waterbeheer worden afgeweken van de aanwijzing van de
      vergunningplichtige gevallen, bedoeld in [artikel 16.4][ref1], voor zover het gaat om wateronttrekkingsactiviteiten
      voor industriële toepassingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.1
        afdeling: '16.2'
  - number: '16.6'
    text: |-
      Deze paragraaf is van toepassing op ontgrondingsactiviteiten op land, in regionale wateren en in een winterbed van
      een rivier in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.6
  - number: '16.7'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, van de wet][ref1], om zonder omgevingsvergunning een ontgrondingsactiviteit te
      verrichten, geldt niet voor de activiteiten, bedoeld in [artikel 16.6][ref2], voor zover het gaat om het ontgronden
      voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.2
        afdeling: '16.2'
  - number: 16.7.a
    text: 'een waterput, reservoir, bassin, vijver, poel of een daarmee vergelijkbare voorziening, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.a.1°
    text: grondlagen dieper dan 3 m onder het oorspronkelijke maaiveld ongemoeid blijven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.a.2°
    text: niet meer dan 1.000 m3 wordt ontgraven; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.a.3°
    text: deze voorziening niet in open verbinding staat met een oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.b
    text: een natuurvriendelijke oever van ten hoogste 10 m uit de insteek van de watergang;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.c
    text: een ander natuurbouwproject, als grondlagen dieper dan 0,5 m onder het oorspronkelijke maaiveld ongemoeid blijven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.d
    text: |-
      een opgraving als bedoeld in [artikel 1.1 van de Erfgoedwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
    references:
      - id: ref1
        bwb_id: BWBR0037521
        artikel: '1'
  - number: 16.7.e
    text: |-
      het aanleggen, in stand houden, veranderen of verwijderen van buizen, kabels, palen of daarmee vergelijkbare
      werken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.f
    text: het bouwen, in stand houden of slopen van een bouwwerk;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.g
    text: |-
      het treffen van een maatregel uit een omgevingsplan, projectbesluit of omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, voor zover het gaat om:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.g.1°
    text: het aanleggen, veranderen of verwijderen van een waterstaatswerk door of namens de waterbeheerder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.g.2°
    text: het aanleggen, veranderen of verwijderen van een plein, weg, spoorweg of luchthaven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.h
    text: |-
      het treffen van een maatregel uit een omgevingsplan, projectbesluit of omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.h.1°
    text: de locatie van ontgronding is opgenomen in dat plan, dat besluit of die vergunning;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.h.2°
    text: grondlagen dieper dan 3 m onder het oorspronkelijke maaiveld ongemoeid blijven; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.h.3°
    text: niet meer dan 10.000 m3 grond wordt ontgraven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.i
    text: het onderhouden van een waterstaatswerk door of namens de waterbeheerder; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.j
    text: |-
      het aanleggen, onderhouden of veranderen van een watergang door een ander dan door of namens de waterbeheerder,
      als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.j.1°
    text: grondlagen dieper dan 3 m onder het oorspronkelijke maaiveld ongemoeid blijven; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.7.j.2°
    text: |-
      de watergang een bovenbreedte heeft van niet meer dan 6 m, een bodembreedte van niet meer dan 3 m, en, als een
      peilbesluit is vastgesteld, een diepte van niet meer dan 1 m onder dat peil.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.7
  - number: 16.8.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, van de wet][ref1], om zonder omgevingsvergunning een ontgrondingsactiviteit te
      verrichten, geldt niet voor de activiteiten, bedoeld in [artikel 16.6][ref2], voor zover het gaat om het ontgronden
      voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.2
        afdeling: '16.2'
  - number: 16.8.1.a
    text: |-
      het treffen van een maatregel in verband met een verontreiniging of aantasting van de bodem of oever van een
      oppervlaktewaterlichaam die is opgenomen in:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
  - number: 16.8.1.a.1°
    text: |-
      een waterbeheerprogramma als bedoeld in [artikel 3.7 van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 16.8.1.a.2°
    text: |-
      het nationaal waterprogramma, bedoeld in [artikel 3.9, tweede lid, onder d, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 16.8.1.b
    text: het treffen van een maatregel die is opgenomen in een inrichtingsprogramma.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
  - number: 16.8.2
    text: |-
      Het eerste lid geldt niet voor het ontgronden om het bodemmateriaal dat voor die maatregelen nodig is, te
      verkrijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.8
  - number: 16.9.1
    text: |-
      Er kan worden afgeweken van de aanwijzing van de vergunningvrije gevallen, bedoeld in [artikel 16.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '16'
        hoofdstuk: '16'
        paragraaf: 16.2.2
        afdeling: '16.2'
  - number: 16.9.2
    text: |-
      Een aanvullend verbod of vergunningvrij geval kan worden opgenomen in de omgevingsverordening, als dat doelmatig en
      doeltreffend is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel16.9
  - number: 17.1.1
    text: |-
      Dit hoofdstuk gaat over lozingsactiviteiten op een oppervlaktewaterlichaam dat deel uitmaakt van de binnenwateren
      als bedoeld in de [artikelen 2][ref1] en [3 van de Wet grenzen Nederlandse territoriale zee][ref2] die zijn
      aangewezen in dit hoofdstuk.


      [ref1]: https://wetten.overheid.nl/BWBR0003748#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0003748#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
    references:
      - id: ref1
        bwb_id: BWBR0003748
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0003748
        artikel: '3'
  - number: 17.1.2
    text: |-
      [Afdeling 17.3][ref1] gaat over het verstrekken van certificaten voor zuiveringsvoorzieningen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.1.3
    text: 'In dit hoofdstuk wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
  - number: 17.1.3.a
    text: |-
      *erkende certificatie-instantie:* certificatie-instantie met een erkenning als bedoeld in [artikel 17.21][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.1.3.b
    text: '*fabrikant:* degene die verantwoordelijk is voor de conformiteit van de productie;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
  - number: 17.1.3.c
    text: '*typegoedkeuring:* goedkeuring van een tot een bepaald type horende zuiveringsvoorziening;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
  - number: 17.1.3.d
    text: |-
      *pleziervaartuig:* pleziervaartuig als bedoeld in [artikel 1 van de Wet pleziervaartuigen 2016][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037546#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
    references:
      - id: ref1
        bwb_id: BWBR0037546
        artikel: '1'
  - number: 17.1.3.e
    text: '*zuiveringsvoorziening:* voorziening aan boord van een pleziervaartuig die toiletwater zuivert.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.1
  - number: '17.2'
    text: |-
      De regels in de [afdelingen 17.1][ref1] en [17.2][ref2] zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.2'
  - number: 17.2.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.2
  - number: 17.2.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.2
  - number: 17.2.c
    text: het vervullen van maatschappelijke functies door watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.2
  - number: 17.2.d
    text: het beschermen van de gezondheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.2
  - number: '17.3'
    text: |-
      Voor een lozingsactiviteit op een oppervlaktewaterlichaam in beheer bij het Rijk is Onze Minister van
      Infrastructuur en Waterstaat het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.3
  - number: 17.3.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.3
  - number: 17.3.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.3
  - number: '17.4'
    text: |-
      Voor een lozingsactiviteit op een oppervlaktewaterlichaam in beheer bij een waterschap is het dagelijks bestuur van
      het waterschap waarbinnen de activiteit wordt verricht het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.4
  - number: 17.4.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.4
  - number: 17.4.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.4
  - number: '17.5'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.5
  - number: 17.6.1
    text: |-
      Degene die een lozingsactiviteit op een oppervlaktewaterlichaam verricht en weet of redelijkerwijs kan vermoeden
      dat die nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 17.2][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.6.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten als dat redelijkerwijs van
      diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.2
    text: 'Deze plicht houdt in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.2.a
    text: alle passende preventieve maatregelen tegen verontreiniging worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.2.b
    text: de beste beschikbare technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.2.c
    text: geen significante verontreiniging wordt veroorzaakt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
  - number: 17.6.2.d
    text: |-
      alle passende maatregelen worden getroffen voor het voorkomen van ongewone voorvallen en de nadelige gevolgen
      daarvan, bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 17.7.1
    text: |-
      Een maatwerkregel kan worden gesteld over [artikel 17.6][ref1] en [afdeling 17.2][ref2], met uitzondering van
      bepalingen waarin lozingsactiviteiten op een oppervlaktewaterlichaam worden aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.2'
  - number: 17.7.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van [afdeling 17.2][ref1], tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.2'
  - number: 17.7.3
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op de belangen, bedoeld in [artikel 17.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.7.4
    text: |-
      Een maatwerkregel wordt voor lozingsactiviteiten op een oppervlaktewaterlichaam in beheer bij een waterschap
      gesteld in de waterschapsverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.7
  - number: 17.8.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in dit hoofdstuk worden verbonden, over
      de [artikelen 17.6][ref2], [17.11][ref3] en [17.12][ref4] en [afdeling 17.2][ref5], met uitzondering van bepalingen
      waarin lozingsactiviteiten worden aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref5
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.2'
  - number: 17.8.2
    text: |-
      Met een maatwerkvoorschrift of vergunningvoorschrift kan worden afgeweken van [afdeling 17.2][ref1], tenzij anders
      is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '17'
        afdeling: '17.2'
  - number: 17.8.3
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan voor een periode van ten hoogste negen maanden ook
      worden afgeweken van [artikel 17.6, tweede lid, onder a en b][ref1], voor het testen of gebruiken van een nieuwe
      techniek die, als zij commercieel zou worden ontwikkeld:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.8.3.a
    text: een hoger of ten minste hetzelfde beschermingsniveau voor het milieu kan opleveren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
  - number: 17.8.3.b
    text: grotere kostenbesparingen kan opleveren dan de voor de die activiteit bestaande beste beschikbare technieken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
  - number: 17.8.4
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in dit hoofdstuk kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
  - number: 17.8.5
    text: |-
      Op het stellen van een maatwerkvoorschrift voor een lozingsactiviteit op een
      oppervlaktewaterlichaam zijn de beoordelingsregels en de bepalingen over vergunningvoorschriften
      in de [artikelen 8.26, tweede tot en met vierde lid][ref1], [8.27][ref2], [8.28][ref3],
      [8.30][ref4], [8.31][ref5], [8.33][ref6], [8.84][ref7], [8.88][ref8], [8.92][ref9]
      en [8.98 tot en met 8.100 van het Besluit kwaliteit leefomgeving][ref10] en
      [afdeling 8.3 van het Omgevingsbesluit][ref11] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref9]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref10]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref11]: https://wetten.overheid.nl/BWBR0041278#Afdeling8.3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
