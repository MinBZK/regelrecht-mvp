        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.23.2.a
    text: de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.2.b
    text: goed jachthouderschap;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.2.c
    text: het voorkomen en bestrijden van schade door dieren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.2.d
    text: het waarborgen van de veiligheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.3
    text: |-
      De regels in [paragraaf 11.2.8][ref1] over het gebruik, het onder zich hebben, het verhandelen en het binnen of
      buiten het grondgebied van Nederland brengen van middelen of installaties en het toepassen van methoden om dieren
      te vangen of te doden zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.23.3.a
    text: de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.3.b
    text: het waarborgen van de veiligheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.3.c
    text: het beschermen van de gezondheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.3.d
    text: het beschermen van het milieu.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.4
    text: |-
      De regels in [paragraaf 11.2.9][ref1] over het verhandelen, het om een andere reden dan verkoop onder zich hebben
      of het binnen of buiten het grondgebied van Nederland brengen van dieren, planten en producten daarvan zijn gesteld
      met het oog op natuurbescherming.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.23.5
    text: |-
      De regels in [paragraaf 11.2.10][ref1] over activiteiten die de introductie of verspreiding van invasieve uitheemse
      soorten tot gevolg hebben of kunnen hebben zijn gesteld met het oog op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.10
        afdeling: '11.2'
  - number: 11.23.5.a
    text: de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.5.b
    text: het beschermen van de gezondheid; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.5.c
    text: het beschermen van het milieu.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
  - number: 11.23.6
    text: |-
      De regels in [paragraaf 11.2.11][ref1] over het vangen, doden en verwerken van walvissen zijn gesteld met het oog
      op het voorkomen van mogelijke nadelige gevolgen voor de staat van instandhouding van de walvisstand.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.11
        afdeling: '11.2'
  - number: '11.24'
    text: |-
      Tenzij in [artikel 11.25][ref1] anders is bepaald, zijn gedeputeerde staten van de provincie waarbinnen de
      activiteit geheel of in hoofdzaak wordt verricht het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.24
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.24.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.24
  - number: 11.24.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.24
  - number: 11.25.1
    text: |-
      Voor een flora- en fauna-activiteit van nationaal belang als bedoeld in
      [artikel 4.12 van het Omgevingsbesluit][ref1] is Onze Minister voor Natuur en Stikstof het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.25.1.a
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: 11.25.1.b
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: 11.25.2
    text: |-
      Onze Minister voor Natuur en Stikstof is ook het bevoegd gezag dat een maatwerkvoorschrift kan stellen of dat
      beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: 11.25.2.a
    text: een valkeniersactiviteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: 11.25.2.b
    text: |-
      het verhandelen, het om een andere reden dan verkoop onder zich hebben of het binnen of buiten het grondgebied van
      Nederland brengen van dieren, planten en producten, voor zover het niet gaat om een flora- en fauna-activiteit als
      bedoeld in [artikel 11.38][ref1], [11.39][ref2] of [11.47][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.25.2.c
    text: |-
      activiteiten die de introductie of verspreiding van invasieve uitheemse soorten tot gevolg hebben of kunnen hebben;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: 11.25.2.d
    text: het vangen, doden of verwerken van walvissen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.25
  - number: '11.26'
    text: |-
      Aan deze afdeling wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.26
  - number: 11.27.1
    text: |-
      Degene die een flora- en fauna-activiteit of een activiteit als bedoeld in
      [artikel 11.22, eerste lid, onder b tot en met g][ref1], verricht en weet of redelijkerwijs kan vermoeden dat die
      activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 11.23][ref2], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.27.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2
    text: 'Voor flora- en fauna-activiteiten houdt deze plicht in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.a
    text: |-
      voorafgaand aan het verrichten van de activiteit wordt nagegaan of er aanwijzingen zijn van de aanwezigheid op de
      locatie waar de activiteit wordt verricht of in de directe nabijheid van die locatie van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.a.1°
    text: |-
      van nature in Nederland in het wild levende vogels van soorten, genoemd in bijlage I bij de vogelrichtlijn, en niet
      in die bijlage genoemde, geregeld in Nederland voorkomende trekvogelsoorten als bedoeld in artikel 4, tweede lid,
      van die richtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.a.2°
    text: |-
      van nature in Nederland in het wild levende dieren of planten van soorten, genoemd in de bijlagen II, IV en V bij
      de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.a.3°
    text: |-
      dieren of planten van soorten, genoemd in [bijlage IX][ref1] of in de rode lijsten, bedoeld in
      [artikel 2.19, vijfde lid, onder a, onder 3°, van de wet][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 11.27.2.a.4°
    text: voor die soorten belangrijke leefgebieden of natuurlijke habitats;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.b
    text: |-
      als deze aanwijzingen er zijn: wordt vastgesteld of op voorhand op grond van objectieve gegevens nadelige
      gevolgen kunnen worden uitgesloten voor dieren van die soorten, hun nesten, hun foerageerplaatsen, hun
      voortplantingsplaatsen, hun rustplaatsen en hun eieren, of voor planten van die soorten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.c
    text: |-
      als die gevolgen niet kunnen worden uitgesloten: wordt nagegaan welke gevolgen de activiteit kan hebben voor dieren
      van die soorten, hun nesten, hun foerageerplaatsen, hun voortplantingsplaatsen, hun rustplaatsen en hun eieren, of
      voor planten van die soorten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.d
    text: alle passende preventieve maatregelen worden getroffen om die nadelige gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.e
    text: |-
      tijdens en na het verrichten van de activiteit wordt nagegaan of de getroffen maatregelen de beoogde effecten
      hebben; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.2.f
    text: |-
      het verrichten van de activiteit wordt gestaakt als de nadelige gevolgen toch niet worden voorkomen, of, als staken
      van de activiteit redelijkerwijs niet meer mogelijk is, passende herstelmaatregelen worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: 11.27.3
    text: |-
      Voor de uitoefening van de jacht en activiteiten om populaties van in het wild levende dieren te beheren of om
      schade door dieren te bestrijden houdt deze plicht in ieder geval in, dat een ieder die een in het wild levend dier
      doodt of vangt voorkomt dat het dier onnodig lijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.27
  - number: '11.28'
    text: Een ieder die een in het wild levend dier doodt of vangt, voorkomt dat het dier onnodig lijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.28
  - number: 11.29.1
    text: |-
      Een maatwerkregel kan in de omgevingsverordening worden gesteld over de [artikelen 11.27][ref1], [11.34][ref2],
      [11.35][ref3] en [11.68][ref4] en de [paragrafen 11.2.6][ref5] en [11.2.8][ref6] en [11.2.9][ref7].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
