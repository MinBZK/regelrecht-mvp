        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: '11.30'
    text: |-
      Een maatwerkregel wordt niet gesteld over een activiteit waarvoor Onze Minister voor Natuur en Stikstof een
      bevoegdheid als bedoeld in [artikel 11.25][ref1] heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.30
    references:
