  - number: 15.18.1.c
    text: 'voor zuurgraad: NEN-EN-ISO 10523;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.d
    text: 'voor bromaat: NEN-EN-ISO 15061;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.e
    text: 'voor chloraat: NEN-EN-ISO 10304-4;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.f
    text: 'voor chloride: NEN-ISO 15923-1 of NEN-EN-ISO 10304-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.g
    text: 'voor kaliumpermanganaatverbruik: NEN-EN-ISO 8467;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.h
    text: 'voor nitraat: NEN-ISO 15923-1, NEN-ISO 7890-3, NEN-EN-ISO 10304-1 of NEN-EN-ISO 13395;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.i
    text: 'voor de som van trihalomethanen, berekend als chloroform: NEN-EN-ISO 15680;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.j
    text: 'voor troebelheid: NEN-EN-ISO 7027-1 of NEN-EN-ISO 7027-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.k
    text: 'voor ureum: NEN 6494;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.l
    text: 'voor waterstofcarbonaat: NEN 6531;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.m
    text: 'voor intestinale enterococcen: NEN-EN-ISO 7899-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.n
    text: 'voor Legionella: NEN-EN-ISO 11731;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.o
    text: 'voor Pseudomonas aeruginosa: NEN-EN-ISO 16266; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.1.p
    text: 'voor sporen van sulfietreducerende Clostridia: NEN-ISO 6461-2.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.18.2
    text: Op doorzicht wordt visueel geïnspecteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.18
  - number: 15.19.1
    text: 'Er wordt in elk badwaterbassin bemonsterd op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.a
    text: vrij chloor, berekend als elementair chloor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.b
    text: gebonden chloor, berekend als elementair chloor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.c
    text: zuurgraad;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.d
    text: troebelheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.e
    text: intestinale enterococcen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.f
    text: Pseudomonas aeruginosa; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.1.g
    text: sporen van sulfietreducerende Clostridia.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2
    text: |-
      Als meerdere badwaterbassins op een circulatiesysteem aan elkaar zijn geschakeld, wordt in het badwaterbassin met
      de grootste inhoud van die badwaterbassins bemonsterd op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.a
    text: bromaat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.b
    text: chloraat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.c
    text: chloride;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.d
    text: kaliumpermanganaatverbruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.e
    text: nitraat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.f
    text: ureum;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.g
    text: waterstofcarbonaat; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.2.h
    text: de som van trihalomethanen, berekend als chloroform.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.3
    text: |-
      Er wordt op de parameters, bedoeld in het eerste en tweede lid, bemonsterd op locaties waar redelijkerwijs kan
      worden aangenomen dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt
      gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.4
    text: |-
      Op doorzicht wordt geïnspecteerd in elk badwaterbassin op een locatie waarop redelijkerwijs kan worden aangenomen
      dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
  - number: 15.19.5
    text: |-
      De locaties, bedoeld in het derde en vierde lid, worden vastgelegd in het beheersplan, bedoeld in
      [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.20.1
    text: |-
      Er wordt dagelijks gemeten op vrij chloor, berekend als elementair chloor, gebonden chloor, berekend als elementair
      chloor, zuurgraad en doorzicht:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.20
  - number: 15.20.1.a
    text: binnen een half uur voor openstelling van het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.20
  - number: 15.20.1.b
    text: ten minste een keer tijdens de tweede helft van de openstelling van het badwaterbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.20
  - number: 15.20.2
    text: |-
      De momenten, bedoeld in het eerste lid, worden vastgelegd in het beheersplan, bedoeld in [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.20.3
    text: |-
      De uitkomsten van de metingen en de eventueel naar aanleiding daarvan getroffen maatregelen worden vastgelegd in
      een logboek en worden ten minste 2 jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.20
  - number: 15.21.1
    text: |-
      De metingen in dit artikel worden verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025
      voor de norm die volgens [artikel 15.18][ref1] van toepassing is op de parameter die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
  - number: 15.21.2
    text: 'Er wordt maandelijks gemeten op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.a
    text: 'vrij chloor, berekend als elementair chloor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.b
    text: gebonden chloor, berekend als elementair chloor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.c
    text: zuurgraad;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.d
    text: doorzicht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.e
    text: troebelheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.f
    text: chloride;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.g
    text: kaliumpermanganaatverbruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.h
    text: nitraat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.i
    text: ureum;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.j
    text: waterstofcarbonaat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.k
    text: intestinale enterococcen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.l
    text: Pseudomonas aeruginosa; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.2.m
    text: sporen van sulfietreducerende Clostridia.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.3
    text: |-
      Er wordt één keer per drie maanden gemeten op de volgende stoffen, waarbij deze periode met ten hoogste zes weken
      kan worden verlengd als het badwaterbassin na deze verlenging wordt gesloten:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.3.a
    text: bromaat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.3.b
    text: chloraat; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.3.c
    text: de som van trihalomethanen, berekend als chloroform.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: 15.21.4
    text: |-
      Bij de vorming van waternevel wordt één keer per half jaar gemeten op Legionella. Deze periode van een half jaar
      kan met ten hoogste een maand worden verlengd als het badwaterbassin na deze verlenging wordt gesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.21
  - number: '15.22'
    text: |-
      Met het oog op het waarborgen van de kwaliteit van de binnenlucht worden in een gesloten ruimte bij een
      badwaterbassin maatregelen getroffen om te voldoen aan de kwaliteitseisen, bedoeld in tabel 15.22.
          Tabel 15.22 Kwaliteitseisen lucht


                  *Parameter of parametergroep*


                  *Kwaliteitseis*


                  Ozon


                  ≤ 120 μg/m3 lucht


                  Trichlooramine, berekend als elementair chloor


                  ≤ 500 μg/m3 lucht
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.22
  - number: '15.23'
    text: 'Op het onderzoeken van luchtmonsters is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.23
  - number: 15.23.a
    text: 'voor ozon: NEN-EN 14625; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.23
  - number: 15.23.b
    text: |-
      voor trichlooramine, berekend als elementair chloor: INRS 007/V01.01, waarbij de monsters ten minste 1 uur op 1,5 m
      vanaf de vloer worden genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.23
  - number: 15.24.1
    text: |-
      Bij gebruik van ozon voor de waterbehandeling wordt in elke zwemzaal bemonsterd op ozon op een locatie waar
      redelijkerwijs kan worden aangenomen dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige
      resultaat wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.24
  - number: 15.24.2
    text: |-
      Er wordt bemonsterd op trichlooramine in de zwemzaal waarvan redelijkerwijs kan worden aangenomen dat het, vanuit
      het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten, op de locatie waarop
      redelijkerwijs kan worden aangenomen dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige
      resultaat wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.24
  - number: 15.24.3
    text: |-
      De locaties, bedoeld in het eerste en tweede lid, worden vastgelegd in het beheersplan, bedoeld in
      [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.24
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.25.1
    text: |-
      De metingen in dit artikel worden verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025
      voor de norm die volgens [artikel 15.23][ref1] van toepassing is op de parameter die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
  - number: 15.25.2
    text: |-
      Er wordt één keer per drie maanden gemeten op ozon. Deze periode kan met ten hoogste zes weken worden verlengd als
      het badwaterbassin na deze verlenging wordt gesloten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.25
  - number: 15.25.3
    text: Er wordt jaarlijks gemeten op trichlooramine, berekend als elementair chloor.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.25
  - number: 15.26.1
    text: Tabel 15.26 bevat een indeling van parameters in de klassen I tot en met III.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.2
    text: |-
      Het badwaterbassin wordt gesloten als uit een meting als bedoeld in [artikel 15.20][ref1], [15.21][ref2] of
      [15.25][ref3] volgt dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.1
        afdeling: '15.2'
  - number: 15.26.2.a
    text: niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse I;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.2.b
    text: twee keer achtereen niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse II; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.2.c
    text: drie keer achtereen niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse III.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.3
    text: 'In afwijking van het tweede lid kan het badwaterbassin open blijven, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.3.a
    text: |-
      bij een overschrijding van de bovengrens voor vrij chloor, de kwaliteitseis voor gebonden chloor, zuurgraad of
      doorzicht of een onderschrijding van de ondergrens voor vrij chloor binnen 30 minuten na constatering van de
      overschrijding kan worden voldaan aan de kwaliteitseis voor die parameter en er in die 30 minuten geen risico’s
      voor de gezondheid van de gebruikers zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.3.b
    text: bij een overschrijding van de kwaliteitseis voor Legionella de vorming van waternevel wordt gestopt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.3.c
    text: bij een overschrijding van de kwaliteitseis voor ozon in de lucht de ozongenerator wordt uitgeschakeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.4
    text: |-
      Als het gaat om een overschrijding van de bovengrens voor vrij chloor, de kwaliteitseis voor gebonden chloor,
      zuurgraad of doorzicht of een onderschrijding van de ondergrens voor vrij chloor, wordt het badwaterbassin niet
      eerder heropend dan nadat uit een meting volgt dat wordt voldaan aan de kwaliteitseis voor die parameter.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.26
  - number: 15.26.5
    text: |-
      Als het gaat om een overschrijding van een parameter als bedoeld in [tabel 15.16][ref1] en [15.22][ref2], anders
      dan die, bedoeld in het vierde lid, wordt het badwaterbassin niet eerder heropend dan nadat uit een meting door
      een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die volgens [artikel 15.18][ref3]
      of [15.23][ref4] van toepassing is op de parameter die wordt gemeten, volgt dat wordt voldaan aan de kwaliteitseis
      voor die parameter.
