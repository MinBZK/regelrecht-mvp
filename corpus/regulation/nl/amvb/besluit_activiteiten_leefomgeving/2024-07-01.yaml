  - number: 4.253.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: 4.253.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: 4.253.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: 4.253.3.a
    text: |-
      voor chroom, koper, lood, nikkel, tin, zilver en zink: NEN 6966, NEN-EN-ISO 17294-2, NEN-EN-ISO 11885 of NEN 6965,
      waarbij de elementen worden ontsloten volgens NEN-EN-ISO 15587-1 of NEN-EN-ISO 15587-2;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: 4.253.3.b
    text: 'voor chroom VI: NEN-ISO 11083; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: 4.253.3.c
    text: 'voor vrij cyanide: NEN-EN-ISO 14403.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.253
  - number: '4.254'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.254
  - number: 4.254.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.254
  - number: 4.254.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.254
  - number: 4.254.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.254
  - number: '4.256'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.256
  - number: 4.257.1
    text: |-
      Voor de emissie in de lucht, zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.257, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.257
  - number: 4.257.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.257, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.257
  - number: 4.257.3
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.257
  - number: 4.257.3.a
    text: |-
      de totale oppervlakte van de aanwezige etsbaden en beitsbaden met eenzelfde werkzame badvloeistof minder is dan
      3 m2, de temperatuur van de baden niet hoger is dan 50 °C en er geen agitatie van de vloeistof in de baden is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.257
  - number: 4.257.3.b
    text: |-
      de emissies die vrijkomen bij het etsen en beitsen van metalen door een geschikte gaswasser, een geschikt
      aerosolfilter of een geschikt mistfilter worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.257
  - number: 4.258.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in [tabel 4.257][ref1], is NEN-EN 15259 van
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.15'
  - number: 4.258.2
    text: 'Op het verrichten van een eenmalige meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.a
    text: 'voor zwaveldioxide: NEN-EN 14791;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.b
    text: 'voor zoutzuur: NEN-EN 1911;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.c
    text: 'voor waterstoffluoride: NEN-ISO 15713;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.d
    text: 'voor individuele gasvormige organische componenten: NPR-CEN/TS 13649;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.e
    text: 'voor vocht: NEN-EN 14790; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.258.2.f
    text: 'voor debiet: NEN-EN-ISO 16911-1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.258
  - number: 4.259.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.257][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.259
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.15'
  - number: 4.259.2
    text: |-
      Het eerste lid is niet van toepassing als een maatregel als bedoeld in [artikel 4.257, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.259
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.15'
  - number: 4.260.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.260
  - number: 4.260.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.260.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.260
  - number: 4.260.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.260
  - number: 4.260.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.258][ref1] van toepassing is op de stof die wordt gemeten.
