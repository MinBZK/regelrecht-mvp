  - number: 4.791m.1
    text: 'Bij de teelt van gewassen worden de volgende gegevens gemeten of berekend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.a
    text: de hoeveelheid voedingswater die wordt toegediend in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.b
    text: de hoeveelheid drainagewater die wordt hergebruikt in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.c
    text: de hoeveelheid drainagewater die wordt geloosd in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.d
    text: het gehalte aan nitraatstikstof en ammoniumstikstof en totaal fosfor in het geloosde drainagewater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.e
    text: |-
      per gewas of groep van gewassen met eenzelfde bemestingsniveau: het gehalte aan totaal stikstof en totaal fosfor in
      de bodem op basis van een representatief grondmonster;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.f
    text: |-
      na elk gebruik: de hoeveelheid in kilogram per hectare toegediende meststoffen onder vermelding van de
      samenstelling van de meststof;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.g
    text: de gewassen die worden geteeld, de teeltoppervlakte en de teeltperiode per gewas; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.1.h
    text: |-
      jaarlijks: de op 1 januari aanwezige meststoffen onder vermelding van de merknaam zoals die op de verpakking is
      vermeld, de naam en het adres van de leveranciers en de hoeveelheid, uitgedrukt in kilogrammen of liters.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.2
    text: |-
      Het verbruik aan totaal stikstof en totaal fosfor wordt uitgedrukt in kilogrammen totaal stikstof en totaal fosfor
      en berekend door voor elke te onderscheiden samenstelling van de meststoffen het verbruik van totaal stikstof en
      totaal fosfor te berekenen en vervolgens de som van de uitkomsten van die berekeningen te nemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791m.3
    text: |-
      De afwijking van de nauwkeurigheid van de instrumenten die worden gebruikt voor het meten van de hoeveelheid,
      bedoeld in het eerste lid, is ten hoogste 10%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791m
  - number: 4.791n.1
    text: |-
      De hoeveelheid voedingswater en drainagewater, bedoeld in [artikel 4.791m, eerste lid, onder a, b en c][ref1],
      wordt geregistreerd per periode van vier weken, beginnend op de eerste dag van de eerste week.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791n.2
    text: |-
      Het gehalte aan nitraatstikstof en ammoniumstikstof en totaal fosfor, bedoeld in
      [artikel 4.791m, eerste lid, onder d][ref1], wordt geregistreerd per periode van dertien weken, beginnend op dag
      een van week een.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791n.3
    text: |-
      Om de behoefte van de gewassen, genoemd in [artikel 4.791l][ref1] te bepalen, wordt per gewas of groep van gewassen
      met hetzelfde bemestingsniveau:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791n.3.a
    text: |-
      ten minste eenmaal per kwartaal een representatief grondmonster genomen en de hoeveelheid totaal stikstof en totaal
      fosfor bepaald;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
  - number: 4.791n.3.b
    text: |-
      de hoeveelheid toegediende meststoffen geregistreerd onder vermelding van de samenstelling van de meststof en de
      oppervlakte die wordt bemest; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
  - number: 4.791n.3.c
    text: de hoeveelheid toegediende totaal stikstof en totaal fosfor per oppervlakte-eenheid per jaar geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
  - number: 4.791n.4
    text: De resultaten van de metingen en de registraties worden ten minste vijf jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791n
  - number: 4.791o
    text: |-
      Jaarlijks wordt uiterlijk op 30 april aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], een rapportage
      verstrekt met de volgende gegevens over het aan die datum voorafgaande kalenderjaar:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.791o.a
    text: |-
      de gegevens, bedoeld in [artikel 4.791m, eerste lid, onder c, d en g][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791o.b
    text: |-
      de toegediende hoeveelheid totaal stikstof en totaal fosfor, berekend aan de hand van de gegevens, bedoeld in
      [artikel 4.791m, eerste lid, onder f en g][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791o.c
    text: |-
      de hoeveelheid totaal stikstof en totaal fosfor in het geloosde drainagewater, berekend aan de hand van de
      gegevens, bedoeld in [artikel 4.791m, eerste lid, onder c en d][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791p
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791p
  - number: 4.791p.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791p
  - number: 4.791p.b
    text: of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of schoonwaterriool; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791p
  - number: 4.791p.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791p
  - number: 4.791pa.1
    text: |-
      [Artikel 4.791j][ref1] is niet van toepassing op het lozen van drainagewater of spoelwater op een
      oppervlaktewaterlichaam dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die
      activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding
      van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791pa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791pa.2
    text: 'Het eerste lid is van toepassing tot het tijdstip dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791pa
  - number: 4.791pa.2.a
    text: |-
      na de inwerkingtreding van dit besluit volledig kan worden geloosd op het vuilwaterriool waarop tot de
      inwerkingtreding van dit besluit gedeeltelijk werd geloosd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791pa
  - number: 4.791pa.2.b
    text: |-
      na de inwerkingtreding van dit besluit op een afstand van 40 m of minder van de milieubelastende activiteit,
      bedoeld in [artikel 4.791h][ref1], op een vuilwaterriool kan worden geloosd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791pa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791pa.3
    text: Het eerste en tweede lid zijn vanaf 1 januari 2027 niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791pa
  - number: 4.791q
    text: 'Deze paragraaf is van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791q
  - number: 4.791q.a
    text: het lozen van afvalwater uit een hemelwaterafvoersysteem van een kas; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791q
  - number: 4.791q.b
    text: |-
      het lozen van condenswater afkomstig van condensvorming aan de binnenzijde van de kas dat via condensgootjes wordt
      verzameld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791q
  - number: 4.791r.1
    text: |-
      Het is verboden het afvalwater of condenswater, bedoeld in [artikel 4.791q][ref1], te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791r
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.78'
  - number: 4.791r.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791r
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.791s.1
    text: |-
      Bij het lozen uit het hemelwaterafvoersysteem van een kas wordt, als een hemelwateropvangvoorziening aanwezig is
      die volledig is benut, het hemelwater geloosd via een overstortvoorziening, die is aangebracht voorafgaand aan
      de hemelwateropvangvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791s.2
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791s.2.a
    text: de hemelwateropvangvoorziening een inhoud heeft van ten minste 3.500 m3/ha teeltoppervlakte;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791s.2.b
    text: de kas zo is gebouwd dat condenswater niet in het hemelwaterafvoersysteem terecht kan komen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791s.2.c
    text: |-
      in de kas gewasbeschermingsmiddelen of biociden zo worden gebruikt dat deze niet in het hemelwaterafvoersysteem
      terecht kunnen komen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791s.2.d
    text: in de kas alleen biologische productiemethoden worden toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791s
  - number: 4.791t.1
    text: Condenswater wordt niet geloosd als in de kas gewasbeschermingsmiddelen of biociden worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791t
  - number: 4.791t.2
    text: Het eerste lid is niet van toepassing als alleen biologische productiemethoden worden toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791t
  - number: 4.791u
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791u
  - number: 4.791u.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791u
  - number: 4.791u.b
    text: |-
      of de punten waarop het afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791u
  - number: 4.791u.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791u
  - number: 4.792.1
    text: 'Deze paragraaf is van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.792
  - number: 4.792.1.a
    text: het lozen van proceswater bij het telen van gewassen op watercultuur in een gebouw; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.792
  - number: 4.792.1.b
    text: het lozen van ander afvalwater bij het telen van gewassen in een gebouw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.792
  - number: 4.792.2
    text: |-
      In deze paragraaf wordt onder proceswater verstaan: het water dat circuleert tijdens het telen van gewassen op
      watercultuur in een gebouw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.792
  - number: 4.792.3
    text: Deze paragraaf is niet van toepassing als het gebouw een kas is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.792
  - number: 4.793.1
    text: |-
      Het is verboden de milieubelastende activiteit en de lozingsactiviteit op een oppervlaktewaterlichaam, bedoeld in
      [artikel 4.792][ref1], te verrichten zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.793
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.79'
  - number: 4.793.2
    text: Een melding bevat de lozingsroutes.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.793
  - number: 4.793.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.793
  - number: 4.793.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.793
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.794'
    text: |-
      Met het oog op het beperken van de hoeveelheid afvalwater en de verontreiniging van het afvalwater wordt het
      proceswater opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.794
  - number: 4.795.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het telen van
      gewassen in een gebouw gelijkmatig verspreid over landbouwgronden of geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.795
  - number: 4.795.2
    text: |-
      Afvalwater afkomstig van biologische teelt of van teelt waarbij geen gewasbeschermingsmiddelen of biociden zijn
      gebruikt kan ook worden geloosd op een oppervlaktewaterlichaam als het verspreiden over landbouwgronden of lozen op
      een vuilwaterriool redelijkerwijs niet mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.795
  - number: 4.795.3
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden,
      geloosd in een vuilwaterriool of geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.795
  - number: '4.796'
    text: |-
      Voor het afvalwater, bedoeld in [artikel 4.795, tweede lid][ref1], dat wordt geloosd op een
      oppervlaktewaterlichaam, zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.796, gemeten in een
      steekmonster.
          Tabel 4.796 Emissiegrenswaarden


                  *Stof*


                  *Emissiegrenswaarde in mg/l*


                  Onopgeloste stoffen


                  100


                  Biochemisch zuurstofverbruik


                  60


                  Chemisch zuurstofverbruik


                  300


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.796
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.79'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: onopgeloste_stoffen_mg_per_l
            type: number
            required: true
            description: Onopgeloste stoffen in mg/l (steekmonster)
            source: {}
          - name: bzv_mg_per_l
            type: number
            required: true
            description: Biochemisch zuurstofverbruik in mg/l (steekmonster)
            source: {}
          - name: czv_mg_per_l
            type: number
            required: true
            description: Chemisch zuurstofverbruik in mg/l (steekmonster)
            source: {}
        output:
          - name: voldoet_emissiegrenswaarden_landbouw_oppervlaktewater
            type: boolean
            description: Of het afvalwater voldoet aan de emissiegrenswaarden uit tabel 4.796
        actions:
          - output: voldoet_emissiegrenswaarden_landbouw_oppervlaktewater
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $onopgeloste_stoffen_mg_per_l
                  value: 100
                - operation: LESS_THAN_OR_EQUAL
                  subject: $bzv_mg_per_l
                  value: 60
                - operation: LESS_THAN_OR_EQUAL
                  subject: $czv_mg_per_l
                  value: 300
  - number: '4.797'
    text: |-
      Voor het afvalwater, bedoeld in [artikel 4.795, eerste lid][ref1], dat wordt geloosd in een vuilwaterriool, is de
      emissiegrenswaarde 300 mg/l voor onopgeloste stoffen, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.797
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.79'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: onopgeloste_stoffen_mg_per_l
            type: number
            description: Onopgeloste stoffen in mg/l (steekmonster)
            source: {}
        output:
          - name: voldoet_emissiegrenswaarde_onopgeloste_stoffen_riool
            type: boolean
            description: Of de concentratie onopgeloste stoffen niet meer dan 300 mg/l bedraagt
        actions:
          - output: voldoet_emissiegrenswaarde_onopgeloste_stoffen_riool
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $onopgeloste_stoffen_mg_per_l
              value: 300
  - number: 4.798.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: 4.798.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: 4.798.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: 4.798.3.a
    text: 'voor onopgeloste stoffen: NEN-EN 872;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: 4.798.3.b
    text: 'voor het biochemisch zuurstofverbruik: ISO 5815-1/2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: 4.798.3.c
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.798
  - number: '4.799'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.799
  - number: 4.799.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.799
  - number: 4.799.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.799
  - number: 4.799.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.799
  - number: '4.800'
    text: Deze paragraaf is van toepassing op het bereiden van natriumarm gietwater waarbij brijn ontstaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.800
  - number: '4.801'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt brijn afkomstig van het bereiden van natriumarm gietwater
      waarbij brijn ontstaat, niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.801
  - number: '4.802'
    text: |-
      [Artikel 4.801][ref1] is tot en met 30 juni 2022 niet van toepassing op het lozen in de bodem bij
      het telen van gewassen in kassen als hiervoor op 31 december 2012 een ontheffing als bedoeld in
      [artikel 3.90, zevende lid, van het Activiteitenbesluit milieubeheer][ref2], zoals dat tot de inwerkingtreding van
      dit besluit gold, is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0022762#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.802
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.80'
      - id: ref2
        bwb_id: BWBR0022762
        artikel: '3'
  - number: '4.803'
    text: Deze paragraaf is van toepassing op het bereiden van drinkwater voor landbouwhuisdieren waarbij brijn ontstaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.803
  - number: '4.804'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater bij het bereiden van drinkwater voor landbouwhuisdieren waarbij
      brijn ontstaat, wordt brijn niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.804
  - number: 4.805.1
    text: Deze paragraaf is van toepassing op het houden van landbouwhuisdieren in een dierenverblijf.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.805
  - number: 4.805.2
    text: |-
      Als landbouwhuisdieren worden gehouden in een dierenverblijf, is deze paragraaf ook van toepassing op het daarnaast
      reinigen en ontsmetten van veewagens.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.805
  - number: 4.806.1
    text: |-
      De [artikelen 4.818 tot en met 4.823][ref1] zijn niet van toepassing op het houden van landbouwhuisdieren in een
      dierenverblijf voor een diercategorie als niet meer dan het volgende aantal dieren van die diercategorie wordt
      gehouden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
  - number: 4.806.1.a
    text: 10 melkkoeien van 2 jaar en ouder en kalfkoeien van 2 jaar en ouder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: diercategorie
            type: string
            required: true
            description: >-
              Diercategorie: 'melkkoeien',
              'vleeskalveren', 'gespeende_biggen',
              'varkens', 'kippen',
              'vleeskalkoenen', 'vleeseenden'
            source: {}
          - name: aantal_dieren
            type: number
            required: true
            description: Aantal dieren van de betreffende diercategorie
            source: {}
        output:
          - name: vrijstelling_huisvesting_emissie_eisen
            type: boolean
            description: Of artikelen 4.818 tot en met 4.823 niet van toepassing zijn vanwege klein aantal dieren
        actions:
          - output: vrijstelling_huisvesting_emissie_eisen
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: melkkoeien
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 10
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: vleeskalveren
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 10
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: gespeende_biggen
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 20
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: varkens
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 15
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: kippen
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 500
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: vleeskalkoenen
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 10
                - when:
                    operation: EQUALS
                    subject: $diercategorie
                    value: vleeseenden
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $aantal_dieren
                    value: 10
              default: false
  - number: 4.806.1.b
    text: 10 vleeskalveren jonger dan 1 jaar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.c
    text: 20 gespeende biggen van minder dan 25 kg;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d
    text: '15 varkens als dit zijn:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d.1°
    text: kraamzeugen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d.2°
    text: guste en dragende zeugen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d.3°
    text: vleesvarkens van 25 kg en meer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d.4°
    text: opfokberen van 25 kg en meer en jonger dan 7 maanden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.d.5°
    text: opfokzeugen van 25 kg en meer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.e
    text: 500 kippen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.f
    text: 10 vleeskalkoenen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.1.g
    text: 10 vleeseenden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.2
    text: 'In deze paragraaf wordt onder emissiepunt verstaan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.2.a
    text: het punt waar een relevante hoeveelheid emissie buiten het dierenverblijf treedt of wordt gebracht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.806.2.b
    text: |-
      bij een gedeeltelijk overdekt dierenverblijf: het punt waar een relevante hoeveelheid emissie buiten het overdekte
      gedeelte van het dierenverblijf treedt of wordt gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.806
  - number: 4.807.1
    text: |-
      De [artikelen 4.818 tot en met 4.823][ref1] zijn ook niet van toepassing op het houden van landbouwhuisdieren in
      een dierenverblijf met:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
  - number: 4.807.1.a
    text: een vrijloopstal waarin melkkoeien van twee jaar en ouder en kalfkoeien van twee jaar en ouder worden gehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
  - number: 4.807.1.b
    text: |-
      een huisvestingssysteem voor landbouwhuisdieren die worden gehouden volgens de biologische productiemethode,
      bedoeld in artikel 3, onderdeel 1, van de bio-verordening, en waarin geen melkkoeien van 2 jaar en ouder en
      kalfkoeien van 2 jaar en ouder worden gehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
  - number: 4.807.1.c
    text: |-
      een huisvestingssysteem waarin legkippen van 18 weken en ouder en ouderdieren van legkippen van
      18 weken en ouder worden gehouden in aangepaste kooien als bedoeld in [artikel 2.71][ref1] of
      [2.72 van het Besluit houders van dieren][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0035217#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0035217#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
    references:
      - id: ref1
        bwb_id: BWBR0035217
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0035217
        artikel: '2'
  - number: 4.807.1.d
    text: |-
      een huisvestingssysteem voor varkens, waarvan het leefoppervlakte in het overdekte dierenverblijf en de oppervlakte
      van de verharde uitloop ten minste de oppervlakte, bedoeld in tabel 4.807, is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
  - number: 4.807.2
    text: |-
      Een vrijloopstal is een huisvestingssysteem voor melkkoeien van 2 jaar en ouder en kalfkoeien van 2 jaar en ouder
      zonder ligboxen en met een zachte vochtdoorlatende of absorberende bodem, waarbij de totale oppervlakte ten minste
      het aantal dieren, vermenigvuldigd met 10 m2, is.
            Tabel 4.807 Uitgezonderde huisvestingssystemen varkens


                    *Diercategorie*


                    *Leefoppervlakte overdekt dierenverblijf in m2* *per varken*


                    *Leefoppervlakte verharde uitloop in m2* *per varken*


                    Vleesvarkens van 25 kg en meer, opfokberen van 25 kg en meer en jonger dan zeven maanden en
      opfokzeugen van 25 kg en meer


                    1,1


                    0,7


                    Gespeende biggen van minder dan 25 kg


                    0,5


                    n.v.t.


                    Kraamzeugen


                    6,5


                    n.v.t.


                    Guste en dragende zeugen


                    2,5


                    1,0
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.807
  - number: 4.808.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.805][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
  - number: 4.808.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.a
    text: het aantal landbouwhuisdieren per diercategorie dat ten hoogste zal worden gehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.b
    text: 'per dierenverblijf:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.b.1°
    text: het aantal landbouwhuisdieren per diercategorie dat ten hoogste zal worden gehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.b.2°
    text: een beschrijving van het huisvestingssysteem en van de aanvullende techniek; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.b.3°
    text: een beschrijving van de wijze van ventilatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.c
    text: |-
      per dierenverblijf waarin landbouwhuisdieren worden gehouden waarvoor bij ministeriële regeling een emissiefactor
      voor geur of PM is vastgesteld:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.c.1°
    text: |-
      een plattegrondtekening op schaal met de ligging van de dierenverblijven, de emissiepunten en een overzicht van
      ventilatoren met diameter;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.c.2°
    text: een doorsnedentekening met de goothoogte, de nokhoogte en de hoogte van het emissiepunt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.2.d
    text: de lozingsroutes.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
  - number: 4.808.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.808
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.809'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.805][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.809
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.810'
    text: |-
      Er wordt elke maand een registratie bijgehouden van het aantal tijdens die maand in een dierenverblijf aanwezige
      landbouwhuisdieren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.810
  - number: 4.811.1
    text: 'Met het oog op het voorkomen van verontreiniging van de bodem:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.811
  - number: 4.811.1.a
    text: heeft de vloer van een dierenverblijf een aaneengesloten bodemvoorziening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.811
  - number: 4.811.1.b
    text: worden vloeistoffen die vrijkomen opgevangen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.811
  - number: 4.811.2
    text: |-
      Het eerste lid is niet van toepassing als zich direct onder de vloer van het dierenverblijf een mestkelder bevindt
      die lekdicht is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.811
  - number: '4.812'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt het spuiwater afkomstig van een luchtwassysteem
      in een lekdichte voorziening opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.812
  - number: 4.813.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het reinigen en
      ontsmetten van dierenverblijven en veewagens gelijkmatig verspreid over landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.813
  - number: 4.813.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden of
      geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.813
  - number: '4.814'
    text: |-
      Met het oog op het beperken van de hoeveelheid afvalwater en de verontreiniging hiervan wordt bij het reinigen en
      spoelen bij het melken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.814
  - number: 4.814.a
    text: het spoelproces onderverdeeld in voorspoelen en naspoelen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.814
  - number: 4.814.b
    text: het voorspoelwater opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.814
  - number: 4.815.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen naspoelwater afkomstig van het reinigen en
      spoelen bij het melken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.815
  - number: 4.815.1.a
    text: geloosd in een vuilwaterriool; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.815
  - number: 4.815.1.b
    text: gelijkmatig verspreid over landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.815
  - number: 4.815.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool, gelijkmatig
      verspreid over landbouwgronden of geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.815
  - number: '4.816'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.816
  - number: 4.816.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.816
  - number: 4.816.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.816
  - number: 4.816.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.816
  - number: '4.817'
    text: |-
      Met het oog op het beperken van emissies in de lucht voldoet een huisvestingssysteem of aanvullende techniek aan de
      bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.817
  - number: 4.818.1
    text: |-
      Bij een huisvestingssysteem, met inbegrip van een aanvullende techniek, voor melkkoeien van twee jaar en ouder
      en kalfkoeien van twee jaar en ouder is de emissie van ammoniak, uitgedrukt in kilogram ammoniak per dierplaats
      per jaar, niet meer dan de emissiegrenswaarde, bedoeld in tabel 4.818.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
  - number: 4.818.2
    text: |-
      Als een dierenverblijf voor de huisvesting van melkkoeien van twee jaar en ouder en kalfkoeien van twee jaar en
      ouder is opgericht op of na 1 juli 2015, geldt de emissiegrenswaarde die in tabel 4.818 is opgenomen in kolom A in
      plaats van kolom B als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
  - number: 4.818.2.a
    text: |-
      de omgevingsvergunning voor het bouwen van een bouwwerk, bedoeld in
      [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], zoals die tot de inwerkingtreding van dit
      besluit gold, uiterlijk op 30 juni 2015 onherroepelijk is en het dierenverblijf uiterlijk op 30 september 2016 is
      opgericht; of


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.818.2.b
    text: |-
      een aanvraag om een omgevingsvergunning voor het bouwen van een bouwwerk als bedoeld in
      [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], zoals die tot de inwerkingtreding van dit
      besluit gold, uiterlijk op 30 juni 2015 is ingediend en:


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.818.2.b.1°
    text: |-
      de aanvraag op 30 juni 2015 voldeed aan [hoofdstuk 2 van de Regeling omgevingsrecht][ref1] zoals die tot de
      inwerkingtreding van dit besluit gold; en


      [ref1]: https://wetten.overheid.nl/BWBR0027471#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
    references:
      - id: ref1
        bwb_id: BWBR0027471
        hoofdstuk: '2'
  - number: 4.818.2.b.2°
    text: |-
      het dierenverblijf binnen vijftien maanden nadat de omgevingsvergunning voor het bouwen van een bouwwerk, bedoeld
      in [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], zoals die tot de inwerkingtreding van dit
      besluit gold, onherroepelijk is geworden, is opgericht.


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.818.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op de uitbreiding van een dierenverblijf of de
      vervanging van een dierenverblijf.
            Tabel 4.818 Emissiegrenswaarden ammoniak melkkoeien en kalfkoeien


                    *Diercategorie*


                    *Emissiegrenswaarde voor ammoniak in kilogram ammoniak per dierplaats per jaar*


                    A
                    Dierenverblijf opgericht voor 1 juli 2015


                    B
                    Dierenverblijf opgericht op of na 1 juli 2015 en voor 1 januari 2018


                    C
                    Dierenverblijf opgericht op of na 1 januari 2018


                    Melkkoeien van twee jaar en ouder en kalfkoeien van twee jaar en ouder die niet worden beweid


                    12,2


                    11,0


                    8,6


                    Melkkoeien van twee jaar en ouder en kalfkoeien van twee jaar en ouder die worden beweid


                    13,0


                    11,0


                    8,6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.818
  - number: '4.819'
    text: |-
      Bij een huisvestingssysteem, met inbegrip van een aanvullende techniek, voor vleeskalveren jonger dan een jaar is
      de emissie van ammoniak, uitgedrukt in kilogram ammoniak per dierplaats per jaar, niet meer dan 2,5 kg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.819
  - number: 4.820.1
    text: |-
      Bij een huisvestingssysteem, met inbegrip van een aanvullende techniek, voor varkens, kippen of kalkoenen is de
      emissie van ammoniak niet meer dan de emissiegrenswaarde, bedoeld in tabel 4.820.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
  - number: 4.820.2
    text: 'Als een dierenverblijf is opgericht op of na 1 juli 2015, geldt in tabel 4.820 kolom A in plaats van kolom B als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
  - number: 4.820.2.a
    text: |-
      de omgevingsvergunning voor het bouwen van een bouwwerk, bedoeld in
      [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], uiterlijk op 30 juni 2015 onherroepelijk is, en
      het dierenverblijf uiterlijk op 30 september 2016 is opgericht; of


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.820.2.b
    text: |-
      een aanvraag om een omgevingsvergunning voor het bouwen van een bouwwerk als bedoeld in
      [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], zoals die tot de inwerkingtreding van dit
      besluit gold, uiterlijk op 30 juni 2015 is ingediend en:


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.820.2.b.1°
    text: |-
      de aanvraag op 30 juni 2015 voldeed aan [hoofdstuk 2 van de Regeling omgevingsrecht][ref1] zoals die tot de
      inwerkingtreding van dit besluit gold; en


      [ref1]: https://wetten.overheid.nl/BWBR0027471#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
    references:
      - id: ref1
        bwb_id: BWBR0027471
        hoofdstuk: '2'
  - number: 4.820.2.b.2°
    text: |-
      het dierenverblijf binnen vijftien maanden nadat de omgevingsvergunning voor het bouwen van een bouwwerk, bedoeld
      in [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1], zoals die tot de inwerkingtreding van dit
      besluit gold, onherroepelijk is, is opgericht.


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.820.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op de uitbreiding van een dierenverblijf of de
      vervanging van een dierenverblijf.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.820
  - number: 4.820.4
    text: |-
      Het eerste lid is niet van toepassing op een uitloop bij een huisvestingssysteem voor kippen als de oppervlakte
      van die uitloop geen deel uitmaakt van de op grond van het [Besluit houders van dieren][ref1] vereiste bruikbare
      oppervlakte.
