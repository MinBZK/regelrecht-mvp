                    200


                    250
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.127
  - number: '4.128'
    text: |-
      Aan [artikel 4.127, eerste lid][ref1], wordt voor totaal stof in ieder geval voldaan als de emissies van de
      droogtrommel en de installatie voor de productie van asfalt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.128
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.128.a
    text: worden afgezogen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.128
  - number: 4.128.b
    text: door een geschikte filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.128
  - number: 4.129.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in [artikel 4.127][ref1], is NEN-EN 15259 van
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.129.2
    text: 'Op het verrichten van een eenmalige meting zijn van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.2.a
    text: 'voor polycyclische aromatische koolwaterstoffen: NEN-ISO 11338-1 en NEN-ISO 11338-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.2.b
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.2.c
    text: 'voor stikstofoxiden, berekend als stikstofdioxide: NEN-EN 14792;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.2.d
    text: 'voor zwaveloxiden, berekend als zwaveldioxide: NEN-EN 14791; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.2.e
    text: 'voor onverbrande koolwaterstoffen: NEN-EN 12619.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.129.3
    text: Emissies worden omgerekend tot een volumegehalte aan zuurstof van 17%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.129
  - number: 4.130.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.127][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.130
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.130.2
    text: |-
      Het eerste lid is niet van toepassing op het meten van polycyclische aromatische koolwaterstoffen als de maatregel,
      bedoeld in [artikel 4.128, eerste lid][ref1], wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.130
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.130.3
    text: |-
      Het eerste lid is niet van toepassing op het meten van totaal stof als de maatregelen, bedoeld in
      [artikel 4.128, tweede lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.130
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.131.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.131
  - number: 4.131.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.131.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.131
  - number: 4.131.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.131
  - number: 4.131.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.129][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.131
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.131.5
    text: |-
      De meting kan ook worden verricht door een onderneming met een certificaat voor de Deelregeling voor inspectie en
      onderhoud van stookinstallaties, onderdeel van de Certificatieregeling voor het kwaliteitsmanagementsysteem ten
      behoeve van het uitvoeren van onderhoud en inspectie aan technische installaties, van de stichting SCIOS, verstrekt
      door een certificatie-instantie met een accreditatie volgens ISO/IEC 17021-1 voor die Deelregeling.
            Tabel 4.131 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Debiet


                    20


                    Vluchtige organische stoffen, uitgedrukt in totaal organische koolstof


                    20


                    Overig


                    40
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.131
  - number: 4.132.1
    text: |-
      Aan de emissiegrenswaarden, bedoeld in [tabel 4.127][ref1], wordt voldaan als in geen van de metingen de emissies
      hoger zijn dan de emissiegrenswaarden in die tabel.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.132
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.132.2
    text: |-
      Als een emissie in een van de deelmetingen hoger is dan de emissiegrenswaarde, wordt de eenmalige meting uiterlijk
      drie maanden na de laatste deelmeting van de eenmalige meting herhaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.132
  - number: 4.132.3
    text: |-
      Als de hogere emissie die aanleiding was voor de herhaalde eenmalige meting opnieuw hoger is dan de
      emissiegrenswaarde, worden maatregelen getroffen om verdere overschrijding te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.132
  - number: 4.133.1
    text: |-
      Met het oog op het beperken van emissies in de lucht wordt een asfaltmenginstallatie ten minste eenmaal per
      vier jaar gekeurd op optimale verbranding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.2
    text: |-
      De keuring wordt voor de eerste keer uitgevoerd uiterlijk zes weken nadat de asfaltmenginstallatie in gebruik is
      genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.3
    text: 'De keuring omvat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.3.a
    text: de afstelling voor de verbranding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.3.b
    text: het systeem voor de toevoer van brandstof en verbrandingslucht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.3.c
    text: de afvoer van verbrandingsgassen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.4
    text: |-
      De keuring wordt verricht door een onderneming met een certificaat voor de Deelregeling voor inspectie en onderhoud
      van stookinstallaties, onderdeel van de Certificatieregeling voor het kwaliteitsmanagementsysteem ten behoeve van
      het uitvoeren van onderhoud en inspectie aan technische installaties, van de stichting SCIOS, verstrekt door een
      certificatie-instantie met een accreditatie volgens ISO/IEC 17021-1 voor die Deelregeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: 4.133.5
    text: |-
      Als uit de keuring blijkt dat de stookinstallatie onderhoud nodig heeft, wordt dat onderhoud uiterlijk twee weken
      na de keuring verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.133
  - number: '4.134'
    text: Deze paragraaf is van toepassing op het maken van betonmortel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.134
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_activiteit
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
        output:
          - name: paragraaf_4_8_van_toepassing
            type: boolean
            description: Of paragraaf 4.8 (betonmortel) van toepassing is
        actions:
          - output: paragraaf_4_8_van_toepassing
            value:
              operation: EQUALS
              subject: $type_activiteit
              value: maken_betonmortel
  - number: 4.135.1
    text: |-
      Het is verboden het afvalwater afkomstig van de activiteit, bedoeld in [artikel 4.134][ref1], te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.8'
  - number: 4.135.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
  - number: 4.135.2.a
    text: de locaties van de lozingspunten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
  - number: 4.135.2.b
    text: het maximale lozingsdebiet in kubieke meters per uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
  - number: 4.135.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
  - number: 4.135.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.135
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.136'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.134][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.136
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.8'
  - number: 4.136.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.136
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.136.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.136
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.137'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met betonmortel worden verontreinigde onderdelen en
      voorzieningen gereinigd boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.137
  - number: '4.138'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vliegas, poederkoolvliegas en gegranuleerde
      hoogovenslakken worden goederen gedoseerd en gemengd tot betonmortel boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.138
  - number: '4.139'
    text: Met het oog op het beperken van de hoeveelheid afvalwater wordt spoelwater opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.139
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_activiteit
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
        output:
          - name: paragraaf_4_9_van_toepassing
            type: boolean
            description: Of paragraaf 4.9 (producten met betonmortel) van toepassing is
        actions:
          - output: paragraaf_4_9_van_toepassing
            value:
              operation: EQUALS
              subject: $type_activiteit
              value: maken_producten_betonmortel
  - number: 4.140.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het reinigen
      van installaties en voorzieningen voor het maken van betonmortel en het inwendig reinigen van voertuigen waarin
      betonmortel is vervoerd, geloosd op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.140
  - number: 4.140.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd op een oppervlaktewaterlichaam of via die
      andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.140
  - number: 4.141.1
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater en het beperken
      van verontreiniging van een oppervlaktewaterlichaam wordt het afvalwater dat wordt geloosd op een
      oppervlaktewaterlichaam geleid door een bezinkvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.141
  - number: 4.141.2
    text: |-
      Voor dat afvalwater is de emissiegrenswaarde voor onopgeloste stoffen 100 mg/l, gemeten in een steekmonster, en is
      de zuurgraad ten hoogste pH 10, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.141
  - number: 4.143.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.143
  - number: 4.143.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.143
  - number: 4.143.3
    text: Op het analyseren van een monster is voor onopgeloste stoffen NEN-EN 872 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.143
  - number: '4.144'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.144
  - number: 4.144.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.144
  - number: 4.144.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.144
  - number: 4.144.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.144
  - number: '4.145'
    text: |-
      [Bijlage IV][ref1] bevat een indeling van goederen in de stuifklassen S1 tot en met S5.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.145
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '4.146'
    text: |-
      Met het oog op het voorkomen of het beperken van diffuse emissies in de lucht worden goederen ingedeeld in
      stuifklasse S1, in een gesloten ruimte gedoseerd en gemengd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.146
  - number: 4.147.1
    text: |-
      Voor de emissie in de lucht bij het doseren en mengen van goederen is de emissiegrenswaarde van totaal stof 5 mg/
      Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.147
  - number: 4.147.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.147
  - number: 4.147.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de lucht afkomstig van ontluchtingsopeningen door een geschikte
      filtrerende afscheider wordt gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.147
  - number: 4.148.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.148
  - number: 4.148.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.148
  - number: 4.149.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.149
  - number: 4.149.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.147, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.149
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.8'
  - number: 4.150.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.150
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: gemeten_stof_concentratie_druk
            type: number
            required: true
            description: Gemeten concentratie totaal stof bij drukproces in mg/Nm3
            source: {}
          - name: emissie_stof_kg_jaar
            type: number
            required: true
            description: Jaarlijkse emissie totaal stof in kg
            source: {}
        output:
          - name: emissiegrenswaarde_stof_druk
            type: number
            description: Emissiegrenswaarde totaal stof bij vellenoffset in mg/Nm3
          - name: toets_van_toepassing
            type: boolean
            description: Of de emissiegrenswaarde van toepassing is (niet bij minder dan 100 kg/jaar)
          - name: voldoet_emissie_stof_druk
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor totaal stof
        actions:
          - output: emissiegrenswaarde_stof_druk
            value: 5
          - output: toets_van_toepassing
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $emissie_stof_kg_jaar
              value: 100
          - output: voldoet_emissie_stof_druk
            value:
              operation: OR
              conditions:
                - operation: NOT
                  value: $toets_van_toepassing
                - operation: LESS_THAN_OR_EQUAL
                  subject: $gemeten_stof_concentratie_druk
                  value: $emissiegrenswaarde_stof_druk
  - number: 4.150.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.150
  - number: 4.150.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.150
  - number: 4.150.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.148][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.150
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.8'
  - number: '4.151'
    text: |-
      Met het oog op het beschermen van de gezondheid worden bij het doseren en mengen van goederen tot betonmortel
      emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.151
  - number: '4.152'
    text: Deze paragraaf is van toepassing op het maken van producten met betonmortel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.152
  - number: 4.153.1
    text: |-
      Het is verboden het afvalwater afkomstig van de activiteit, bedoeld in [artikel 4.152][ref1], te lozen op een
      oppervlaktewaterlichaam zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.153
    references:
