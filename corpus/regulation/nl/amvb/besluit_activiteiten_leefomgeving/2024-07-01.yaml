    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.200
  - number: 3.200.1.b
    text: het houden van landbouwhuisdieren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.200
  - number: 3.200.2
    text: 'Onder de aanwijzing, bedoeld in het eerste lid, onder b, valt niet het houden van ten hoogste:'
