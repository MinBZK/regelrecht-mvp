        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.215.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.211][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.215
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.215.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.211, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.215
    references:
