        artikel: '14'
        hoofdstuk: '14'
  - number: 15.1.1
    text: Dit hoofdstuk gaat over het gelegenheid bieden tot zwemmen of baden in een badwaterbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2
    text: 'Dit hoofdstuk gaat niet over het gelegenheid bieden tot zwemmen of baden in een badwaterbassin:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2.a
    text: bij een huishouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2.b
    text: in een badruimte of een niet-gezamenlijk gedeelte van een logiesfunctie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2.c
    text: dat ten hoogste 24 uur aaneengesloten op een locatie is opgesteld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2.d
    text: dat is bedoeld voor contact tussen mens en dier; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: 15.1.2.e
    text: aan boord van schepen die niet permanent zijn afgemeerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.1
  - number: '15.2'
    text: 'De regels in dit hoofdstuk zijn gesteld met het oog op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.2
  - number: 15.2.a
    text: het voorkomen van verdrinking van de gebruikers van een badwaterbassin;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.2
  - number: 15.2.b
    text: het beschermen van de gezondheid van de gebruikers van een badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.2
  - number: 15.2.c
    text: het in en om een badwaterbassin voorkomen van letsel van de gebruikers van het badwaterbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.2
  - number: '15.3'
    text: |-
      Voor het gelegenheid bieden tot zwemmen of baden in een badwaterbassin zijn gedeputeerde staten van de provincie
      waarbinnen de activiteit geheel of in hoofdzaak wordt verricht het bevoegd gezag:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.3
  - number: 15.3.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.3
  - number: 15.3.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.3
  - number: 15.3.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.3
  - number: '15.4'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.4
  - number: 15.5.1
    text: |-
      Degene die gelegenheid biedt tot zwemmen of baden in een badwaterbassin en weet of redelijkerwijs kan vermoeden dat
      die activiteit nadelige gevolgen kan hebben voor de belangen, bedoeld in [artikel 15.2][ref1], is verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.5.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van hem kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2
    text: 'Deze plicht houdt in ieder geval in dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2.a
    text: |-
      het risico op significante nadelige gevolgen voor de veiligheid en gezondheid van de gebruikers van een
      badwaterbassin, de ruimten die met blote voeten worden betreden, en de bijbehorende voorzieningen, wordt beheerst,
      met inachtneming van de eigen verantwoordelijkheid van de gebruikers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2.b
    text: het water in een badwaterbassin niet schadelijk is voor de gezondheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2.c
    text: de lucht in een gesloten ruimte bij een badwaterbassin niet schadelijk is voor de gezondheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2.d
    text: |-
      het water in een badwaterbassin en de lucht in een gesloten ruimte bij een badwaterbassin doelmatig kunnen worden
      bemonsterd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.5.2.e
    text: meetresultaten op geschikte wijze worden geregistreerd, verwerkt en gepresenteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.5
  - number: 15.6.1
    text: |-
      Een maatwerkregel kan worden gesteld over [artikel 15.5][ref1] en de [afdelingen 15.2][ref2] en [15.3][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.2'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.6.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van de [afdelingen 15.2][ref1] en [15.3][ref2], tenzij anders is
      bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.6.3
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op de belangen, bedoeld in [artikel 15.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
  - number: 15.6.4
    text: Een maatwerkregel wordt gesteld in de omgevingsverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.6
  - number: 15.7.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld over [artikel 15.5][ref1] en de [afdelingen 15.2][ref2] en [15.3][ref3],
      met uitzondering van bepalingen over meldingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.1'
      - id: ref2
