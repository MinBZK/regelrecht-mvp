        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.37.3
    text: |-
      Op doorzicht wordt geïnspecteerd in elk badwaterbassin op een locatie waarop redelijkerwijs kan worden aangenomen
      dat het, vanuit het oogmerk van bescherming van de gebruiker, meest ongunstige resultaat wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.37
  - number: 15.37.4
    text: |-
      De locaties, bedoeld in het tweede en derde lid, worden vastgelegd in het beheersplan, bedoeld in
      [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.37
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.38.1
    text: 'Er wordt dagelijks gemeten op doorzicht, zuurgraad en zuurstofverzadiging:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.38
  - number: 15.38.1.a
    text: binnen een half uur voor openstelling van het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.38
  - number: 15.38.1.b
    text: ten minste een keer tijdens de tweede helft van de openstelling van het badwaterbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.38
  - number: 15.38.2
    text: |-
      De momenten, bedoeld in het eerste lid, worden vastgelegd in het beheersplan, bedoeld in [artikel 15.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.38
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.38.3
    text: |-
      De uitkomsten van de metingen en de eventueel naar aanleiding daarvan getroffen maatregelen worden vastgelegd in
      een logboek en worden ten minste 2 jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.38
  - number: 15.39.1
    text: |-
      De metingen in dit artikel worden verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025
      voor de norm die volgens [artikel 15.36][ref1] van toepassing is op de parameter die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.39.2
    text: Er wordt tweewekelijks gemeten op Escherichia coli, intestinale enterococcen en Pseudomonas aeruginosa.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.39
  - number: 15.39.3
    text: |-
      Er wordt maandelijks gemeten op ammonium, fytoplankton, geleidbaarheid, hardheid totaal, nitraat, totaal fosfor
      en waterstofcarbonaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.39
  - number: 15.39.4
    text: Bij de vorming van waternevel wordt één keer per half jaar gemeten op Legionella.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.39
  - number: 15.40.1
    text: Met het oog op het waarborgen van de gezondheid van de gebruikers is de watertemperatuur ten hoogste 25 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.40
  - number: 15.40.2
    text: Het water wordt alleen technisch verwarmd als de watertemperatuur lager is dan 23 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.40
  - number: 15.40.3
    text: In afwijking van het eerste lid mag de watertemperatuur ten hoogste vijf dagen per jaar ten hoogste 28 °C zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.40
  - number: 15.40.4
    text: |-
      De watertemperatuur wordt dagelijks in de ochtend, middag en avond met een thermometer gemeten aan het
      wateroppervlak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.40
  - number: 15.41.1
    text: |-
      Met het oog op het waarborgen van de gezondheid van de gebruikers wordt de aanwezigheid van vissen, watervogels,
      ratten en slakken zoveel mogelijk beperkt door aanwezige vissen en slakken te verwijderen en maatregelen te treffen
      om watervogels en ratten op afstand te houden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.2
    text: 'Er wordt visueel geïnspecteerd op de aanwezigheid van vissen, watervogels, ratten en slakken:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.2.a
    text: in het badwaterbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.2.b
    text: in het water dat na een biologische behandeling direct wordt gebruikt om het badwaterbassin mee te vullen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.3
    text: 'Er wordt met de volgende frequentie geïnspecteerd op de aanwezigheid van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.3.a
    text: 'watervogels en ratten: dagelijks;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.3.b
    text: 'slakken: wekelijks; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.41.3.c
    text: 'vissen: maandelijks.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.41
  - number: 15.42.1
    text: Tabel 15.42 bevat een indeling van parameters in de klassen I en II.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.2
    text: |-
      Het badwaterbassin wordt gesloten als uit een meting als bedoeld in [artikel 15.38][ref1] of [15.39][ref2] volgt
      dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.42.2.a
    text: niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse I; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.2.b
    text: twee keer achtereen niet wordt voldaan aan de kwaliteitseis voor een parameter ingedeeld in klasse II.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.3
    text: 'In afwijking van het tweede lid kan het badwaterbassin open blijven, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.3.a
    text: |-
      bij een overschrijding van de kwaliteitseis voor zuurstofverzadiging, zuurgraad of doorzicht binnen 30 minuten
      na constatering van de overschrijding kan worden voldaan aan de kwaliteitseis voor die parameter en er in die 30
      minuten geen risico’s voor de gezondheid van de gebruikers zijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.3.b
    text: bij een overschrijding van de kwaliteitseis voor Legionella de vorming van waternevel wordt gestopt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.4
    text: |-
      Als het gaat om een overschrijding van de kwaliteitseis voor zuurstofverzadiging, zuurgraad of doorzicht wordt
      het badwaterbassin niet eerder heropend dan nadat uit een meting volgt dat wordt voldaan aan de kwaliteitseis voor
      die parameter.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.42
  - number: 15.42.5
    text: |-
      Als het gaat om een overschrijding van een parameter als bedoeld in [tabel 15.34][ref1], anders dan die, bedoeld
      in het vierde lid, wordt het badwaterbassin niet eerder heropend dan nadat uit een meting door een laboratorium met
      een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die volgens [artikel 15.36][ref2] van toepassing is op
      de parameter die wordt gemeten, volgt dat wordt voldaan aan de kwaliteitseis voor die parameter.
