  - number: '4.166'
    text: 'Met het oog op het beschermen van de gezondheid en het beschermen van het milieu worden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.166
  - number: 4.166.a
    text: geen hulpstoffen met chroom gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.166
  - number: 4.166.b
    text: bij zeefdruk alleen reinigingsmiddelen met een vlampunt van hoger dan 55 °C gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.166
  - number: '4.167'
    text: Met het oog op het waarborgen van de veiligheid worden oplosmiddelresten gedestilleerd in een brandcompartiment.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.167
  - number: '4.168'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met inkten, verdunningsmiddelen, reinigingsmiddelen
      en toevoegingsmiddelen worden grafische processen boven een aaneengesloten bodemvoorziening uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.168
  - number: 4.169.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam en de doelmatige
      werking van de voorzieningen voor het beheer van afvalwater:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.169.1.a
    text: is er een werkinstructie over het voorkomen van verontreiniging van afvalwater opgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.169.1.b
    text: zijn voorzieningen aanwezig die zijn afgestemd op de werkzaamheden die worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.169.2
    text: 'In de werkinstructie is in ieder geval beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.169.2.a
    text: welke werkwijze wordt gevolgd bij het reinigen van de installaties voor grafische processen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.169.2.b
    text: welke werkwijze wordt gevolgd en welke maatregelen worden getroffen om het lozen van stoffen te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.169
  - number: 4.170.1
    text: 'Met het oog op het beperken van verontreiniging van het afvalwater geldt bij zeefdrukken:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.170
  - number: 4.170.1.a
    text: dat bij het reinigen van zeefdrukramen inkt in stappen wordt verwijderd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.170
  - number: 4.170.1.b
    text: dat het verwijderen van inkt en het strippen van het sjabloon procesmatig worden gescheiden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.170
  - number: 4.170.2
    text: |-
      Aan het eerste lid, onder b, wordt in ieder geval voldaan als inkt aan de zeefdrukmachine wordt verwijderd en een
      automatische drukvormwasinstallatie of een drukvormspoelmeubel wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.170
  - number: '4.171'
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater wordt alleen het
      naspoelwater afkomstig van het polijsten, ontvetten of ontwikkelen van zeefdrukgaas of het strippen van een
      sjabloon geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.171
  - number: 4.172.1
    text: Met het oog op het doelmatig beheer van afvalwater wordt het te lozen naspoelwater geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.172
  - number: 4.172.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen naspoelwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.172
  - number: '4.173'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.173
  - number: 4.173.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.173
  - number: 4.173.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.173
  - number: 4.173.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.173
  - number: 4.174.1
    text: |-
      Voor de emissie in de lucht bij het bedrukken met vellenoffset is de emissiegrenswaarde van totaal stof 5 mg/Nm3,
      gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.174
  - number: 4.174.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.174
  - number: 4.174.3
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.174
  - number: 4.174.3.a
    text: de emissies door een geschikte filtrerende afscheider worden gevoerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.174
  - number: 4.174.3.b
    text: het gebruik van anti-smetpoeder niet meer is dan 500 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.174
  - number: 4.175.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.175
  - number: 4.175.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.175
  - number: 4.176.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.176
  - number: 4.176.2
    text: |-
      Het eerste lid is niet van toepassing als een maatregel als bedoeld in [artikel 4.174, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.176
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.10'
  - number: 4.177.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste 15 minuten en ten hoogste een half uur. Dit geldt
      niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.177
  - number: 4.177.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.177
  - number: 4.177.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.177
  - number: 4.177.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.175][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.177
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.10'
  - number: '4.178'
    text: |-
      Met het oog op het beschermen van de gezondheid en het voorkomen of het tot een aanvaardbaar niveau beperken van
      geurhinder worden emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.178
  - number: '4.179'
    text: |-
      Deze paragraaf is van toepassing op het aanbrengen van anorganische deklagen, metaallagen of conversielagen op
      metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.179
  - number: 4.180.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.179][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
