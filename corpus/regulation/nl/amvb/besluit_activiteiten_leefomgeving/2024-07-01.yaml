  - number: 4.822.1
    text: |-
      Bij een huisvestingssysteem, met inbegrip van een aanvullende techniek, in een dierenverblijf voor de
      diercategorieën, bedoeld in tabel 4.822, is de emissie van PM, uitgedrukt in gram PM per dierplaats per jaar, niet
      meer dan de emissiegrenswaarde, bedoeld in die tabel.
