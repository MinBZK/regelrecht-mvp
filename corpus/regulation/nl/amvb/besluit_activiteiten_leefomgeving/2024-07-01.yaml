  - number: 4.92.1.a
    text: stilleggingen van de afgasreinigingsapparatuur of meetapparatuur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.1.b
    text: storingen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.1.c
    text: defecten aan de afgasreinigingsapparatuur of meetapparatuur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.2
    text: |-
      Als voor de emissie in de lucht bij een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie de
      emissiegrenswaarden, bedoeld in de [artikelen 4.73][ref1], [4.75][ref2], [4.76][ref3] en [4.77][ref4] worden
      overschreden, kan de thermische behandeling van afvalstoffen niet langer dan 4 uur ononderbroken worden
      gecontinueerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
