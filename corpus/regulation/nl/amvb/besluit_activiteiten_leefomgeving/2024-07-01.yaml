    text: Ten minste vier weken voordat de begrenzing wijzigt, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.181
  - number: 3.184.1
    text: |-
      Als milieubelastende activiteit als bedoeld in [artikel 2.1][ref1] wordt aangewezen het verwerken van
      bedrijfsafvalstoffen of gevaarlijke afvalstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.184.2
    text: |-
      De aanwijzing omvat ook andere milieubelastende activiteiten die worden verricht op dezelfde locatie die dat
      verwerken functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3
    text: 'Onder de aanwijzing vallen niet:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.a
    text: het vervoeren van afvalstoffen en het inzamelen van afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.b
    text: |-
      het op of in de bodem brengen van bedrijfsafvalstoffen of gevaarlijke afvalstoffen en het verzamelen van
      winningsafvalstoffen in een winningsafvalvoorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.c
    text: het verbranden van afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.d
    text: het in de atmosfeer uitstoten van gasvormige effluenten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.e
    text: |-
      het afvangen van kooldioxide voor ondergrondse opslag, bedoeld in [paragraaf 3.2.19][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
    references:
