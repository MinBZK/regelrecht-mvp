        paragraaf: '4.37'
  - number: 4.488.1
    text: Deze paragraaf is van toepassing op het tanken van voertuigen of werktuigen met gasvormige waterstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.488
  - number: 4.488.2
    text: |-
      Als voertuigen of werktuigen met gasvormige waterstof worden getankt, is deze paragraaf ook van toepassing op het
      daarnaast opslaan van gasvormige waterstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.488
  - number: 4.488.3
    text: Deze paragraaf is niet van toepassing als de installatie een nominale druk heeft van meer dan 70.000 kPa.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.488
  - number: '4.489'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.488][ref1], voldaan aan PGS 35.


