    text: die in een kunstwerk of een vaarweg ligt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.f.3°
    text: die wordt geplaatst met een boring die lagen met verschillende stijghoogtes doorkruist; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.17
  - number: 6.17.1.g
    text: |-
