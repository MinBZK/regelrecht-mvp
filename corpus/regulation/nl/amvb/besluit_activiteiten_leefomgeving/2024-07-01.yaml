  - number: 4.1026.2
    text: Een melding bevat de hoeveelheid gassen die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1026
  - number: 4.1026.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1026
  - number: 4.1026.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1026
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1027.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in [artikel 4.1028, eerste lid][ref1],
      is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.101'
  - number: 4.1027.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.1027.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
  - number: 4.1027.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
  - number: 4.1027.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
  - number: 4.1027.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1027
  - number: 4.1028.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.1025][ref1], voldaan aan PGS 16.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1028
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.101'
  - number: 4.1028.2
    text: Bij het vullen van gasflessen is ten hoogste 300 liter gassen in gasflessen aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1028
  - number: '4.1029'
    text: |-
      Deze paragraaf is van toepassing op het opslaan, herverpakken en bewerken van vuurwerk of pyrotechnische artikelen
      voor theatergebruik.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1029
  - number: 4.1030.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 4.1029][ref1] te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1030
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1030.2
    text: |-
      Een melding bevat de coördinaten van de ruimte, bedoeld in [artikel 4.1031, tweede lid][ref1], of de bewaarplaats
      en bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1030
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1030.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1030
  - number: 4.1030.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1030
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1031.1
    text: 'Met het oog op het waarborgen van de veiligheid worden in een politiebureau:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
  - number: 4.1031.1.a
    text: |-
      ten hoogste 25 kg inbeslaggenomen vuurwerk en pyrotechnische artikelen voor theatergebruik opgeslagen, waarbij voor
      het bepalen van het gewicht wordt uitgegaan van het vuurwerk en de pyrotechnische artikelen voor theatergebruik met
      omhulsel en verpakking en met de transportverpakking, bedoeld in de ADR; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
  - number: 4.1031.1.b
    text: |-
      het vuurwerk en de pyrotechnische artikelen voor theatergebruik zo verpakt en opgeslagen dat die op grond van
      bijlage A bij de ADR alleen kunnen worden aangemerkt als ADR-klasse 1.4G of 1.4S.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
  - number: 4.1031.2
    text: |-
      De afstand vanaf het midden van de deuropening van de ruimte waar het vuurwerk en de pyrotechnische artikelen voor
      theatergebruik in een politiebureau worden opgeslagen tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen
      en beperkt kwetsbare en kwetsbare locaties die op grond van een omgevingsplan of een omgevingsvergunning voor een
      buitenplanse omgevingsplanactiviteit zijn toegelaten, is ten minste 8 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
  - number: 4.1031.3
    text: |-
      Het tweede lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1031.4
    text: |-
      [Artikel 5.22 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand,
      bedoeld in het tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1031
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1033.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden in een theater of op een andere locatie waarop
      een concert of voorstelling wordt gegeven, pyrotechnische artikelen voor theatergebruik opgeslagen in een
      brandveiligheidsopslagkast die voldoet aan PGS 32.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1033
  - number: 4.1033.2
    text: Er wordt ten hoogste 25 kg pyrotechnische artikelen voor theatergebruik opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1033
  - number: 4.1033.3
    text: |-
      Voor het bepalen van het gewicht wordt uitgegaan van de pyrotechnische artikelen voor theatergebruik met omhulsel
      en verpakking, maar zonder de transportverpakking, bedoeld in de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1033
  - number: 4.1034.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden, behalve tijdens intern transport, vuurwerk en
      pyrotechnische artikelen voor theatergebruik opgeslagen in een bewaarplaats of bufferbewaarplaats voor vuurwerk of
      pyrotechnische artikelen voor theatergebruik, tenzij [artikel 4.1031][ref1] of [4.1033][ref2] van toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.102'
  - number: 4.1034.2
    text: 'Voor de toezichthouders zijn de volgende gegevens onverwijld toegankelijk:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.2.a
    text: de ADR-klasse van het vuurwerk en de pyrotechnische artikelen voor theatergebruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.2.b
    text: de opgeslagen hoeveelheid vuurwerk en pyrotechnische artikelen voor theatergebruik in kilogrammen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.2.c
    text: |-
      gegevens over de gevoeligheid van het vuurwerk en pyrotechnische artikelen voor theatergebruik voor blusmiddelen;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.2.d
    text: gegevens over de plaatsen waar vuurwerk en pyrotechnische artikelen voor theatergebruik zijn opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.3
    text: |-
      Stoffen en voorwerpen van ADR-klasse 1 die behoren tot verschillende compatibiliteitsgroepen, zoals aangegeven in
      de ADR met de letters A tot en met J, K tot en met N of S, zijn in verschillende brandcompartimenten opgeslagen,
      tenzij die stoffen en voorwerpen gezamenlijk kunnen worden opgeslagen zonder dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.3.a
    text: de kans op een ongewilde ontsteking wordt verhoogd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.3.b
    text: de ernst van de gevolgen bij een ongewilde ontsteking wordt vergroot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.4
    text: |-
      In een bufferbewaarplaats voor vuurwerk van categorie F4 is alleen vuurwerk aanwezig dat behoort tot dezelfde
      compatibiliteitsgroep.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1034.5
    text: |-
      Het vierde lid is niet van toepassing op de kortstondige gelijktijdige aanwezigheid van bij elkaar horende
      componenten tijdens het uitpakken, uit elkaar nemen, in elkaar zetten en inpakken van vuurwerk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1034
  - number: 4.1035.1
    text: |-
      Met het oog op het waarborgen van de veiligheid zijn op een locatie voor het opslaan van ten hoogste 10.000 kg
      vuurwerk van categorie F1, F2 of F3 of pyrotechnische artikelen voor theatergebruik:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.1.a
    text: |-
      ten hoogste twee bewaarplaatsen en twee bufferbewaarplaatsen voor vuurwerk of pyrotechnische artikelen voor
      theatergebruik aanwezig; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.1.b
    text: |-
      in een bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik ten hoogste 2.000 kg
      vuurwerk van categorie F1, F2 of F3 of pyrotechnische artikelen voor theatergebruik aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.2
    text: |-
      Op een locatie voor het opslaan van meer dan 10.000 kg vuurwerk van categorie F1, F2 of F3 of pyrotechnische
      artikelen voor theatergebruik:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.2.a
    text: |-
      is in een bewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik ten hoogste 50.000 kg aan
      vuurwerk van categorie F1, F2 of F3 of pyrotechnische artikelen voor theatergebruik in verpakking aanwezig;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.2.b
    text: zijn ten hoogste twee bufferbewaarplaatsen voor vuurwerk of pyrotechnische artikelen voor theatergebruik; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.2.c
    text: |-
      is in een bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik ten hoogste 5.000 kg aan
      vuurwerk van categorie F1, F2 of F3 of pyrotechnische artikelen voor theatergebruik aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.3
    text: Op een locatie voor het opslaan van vuurwerk van categorie F4 is ten hoogste 6.000 kg NEM aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.4
    text: 'Voor het bepalen van het gewicht van vuurwerk of pyrotechnische artikelen voor theatergebruik in:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.4.a
    text: |-
      een bufferbewaarplaats als bedoeld in het eerste lid, onder b, en het tweede lid, onder c, wordt uitgegaan
      van het vuurwerk en de pyrotechnische artikelen voor theatergebruik met omhulsel en verpakking, maar zonder de
      transportverpakking, bedoeld in de ADR; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.4.b
    text: |-
      een bewaarplaats als bedoeld in het tweede lid, onder a, wordt uitgegaan van het vuurwerk en de pyrotechnische
      artikelen voor theatergebruik met omhulsel en verpakking en met de transportverpakking, bedoeld in de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
  - number: 4.1035.5
    text: |-
      Op een locatie als bedoeld in het eerste en tweede lid wordt alleen vuurwerk opgeslagen dat op grond van
      [artikel 2.1.1 van het Vuurwerkbesluit][ref1] is aangewezen als vuurwerk dat ter beschikking mag worden gesteld
      voor particulier gebruik.


      [ref1]: https://wetten.overheid.nl/BWBR0013360#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1035
    references:
      - id: ref1
        bwb_id: BWBR0013360
        artikel: '2'
  - number: 4.1036.1
    text: |-
      Met het oog op het waarborgen van de veiligheid zijn een bewaarplaats en een bufferbewaarplaats voor vuurwerk of
      pyrotechnische artikelen voor theatergebruik:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.1.a
    text: |-
      gelegen op een afstand van ten minste 8 m tot een ruimte waar gevaarlijke stoffen als bedoeld in
      [artikel 3.27, eerste lid, onder a, b of c][ref1], aanwezig zijn of kunnen zijn;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.9
        afdeling: '3.2'
  - number: 4.1036.1.b
    text: |-
      een brandcompartiment met wanden en een afdekking die geen openingen of ramen bevatten, met uitzondering van de
      ventilatieopeningen en toegangsdeur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.1.c
    text: |-
      gemaakt van metselwerk, beton of cellenbeton, waarbij doorvoeringen van leidingen en ventilatieopeningen een
      brandwerendheid hebben van ten minste 60 minuten of, als het gaat om een muur of vloer tussen bewaarplaatsen of
      bufferbewaarplaatsen, van ten minste 120 minuten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2
    text: 'Een bewaarplaats of bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.a
    text: heeft geen verwarmingstoestel dat voor de warmteoverdracht andere middelen gebruikt dan water;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.b
    text: |-
      heeft geen verwarmingstoestellen, apparatuur of installaties die een oppervlaktetemperatuur kunnen hebben van meer
      dan 100 °C;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.c
    text: heeft geen gasleiding of brandstofleiding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.d
    text: voldoet aan de in NEN-EN-IEC 60079-10-2 gestelde eisen voor zone 22, als het gaat om een bewaarplaats;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.e
    text: voldoet aan de in NEN-EN-IEC 60079-10-2 gestelde eisen voor zone 21, als het gaat om een bufferbewaarplaats; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f
    text: 'heeft een toegangsdeur die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f.1°
    text: naar buiten draait en zelfsluitend en onbelemmerd bereikbaar is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f.2°
    text: zo is gemaakt dat een doelmatige drukontlasting niet wordt belemmerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f.3°
    text: |-
      zich niet bevindt in een vluchtroute als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref1], in
      of nabij een koker voor een personenlift of in een ruimte voor verkoop aan particulieren;


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 4.1036.2.f.4°
    text: |-
      is gesloten, met uitzondering van de momenten dat vuurwerk of pyrotechnische artikelen voor theatergebruik in of
      uit de bewaarplaats of bufferbewaarplaats worden gebracht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f.5°
    text: niet bereikbaar is voor onbevoegden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.2.f.6°
    text: een oppervlakte heeft van minder dan het aantal vierkante meters, bedoeld in tabel 4.1036a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.3
    text: |-
      De scheidingsconstructie tussen de bewaarplaats of bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen
      voor theatergebruik en de ruimte voor verkoop aan particulieren heeft een brandwerendheid van ten minste 30 minuten
      en bevat naast de toegangsdeur geen openingen of ramen die kunnen worden opengezet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.4
    text: |-
      Als vanuit de deuropening van een bewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik
      de toegangsdeur van een andere bewaarplaats of van een ruimte voor verkoop aan particulieren visueel kan worden
      waargenomen, is de deuropening van die bewaarplaats gelegen op meer dan de in tabel 4.1036a bedoelde afstanden van
      de deuropening van die andere bewaarplaats en van die ruimte voor verkoop aan particulieren. Voor het bepalen van
      de toegestane hoeveelheid vuurwerk en pyrotechnische artikelen voor theatergebruik, bedoeld in tabel 4.1036a, wordt
      uitgegaan van het vuurwerk met omhulsel en verpakking en met de transportverpakking, bedoeld in de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1036
  - number: 4.1036.5
    text: |-
      Als vanuit de deuropening van een bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen voor theatergebruik
      de toegangsdeur van een andere bufferbewaarplaats, van een bewaarplaats voor vuurwerk of pyrotechnische artikelen
      voor theatergebruik of van een ruimte voor verkoop aan particulieren visueel kan worden waargenomen, is de
      deuropening van die bufferbewaarplaats gelegen op een afstand groter dan de afstanden, bedoeld in tabel 4.1036b,
      van de deuropening van die andere bufferbewaarplaats, van die bewaarplaats en van die ruimte voor verkoop
      aan particulieren. Voor het bepalen van de toegestane hoeveelheid vuurwerk en pyrotechnische artikelen voor
      theatergebruik, bedoeld in tabel 4.1036b, wordt uitgegaan van het vuurwerk en de pyrotechnische artikelen voor
      theatergebruik met omhulsel en verpakking, maar zonder de transportverpakking, bedoeld in de ADR.
