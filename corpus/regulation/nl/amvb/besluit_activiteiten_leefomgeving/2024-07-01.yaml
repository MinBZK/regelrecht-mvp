  - number: 11.131.1.c
    text: het vellen van houtopstanden voor de aanleg en het onderhoud van brandgangen op natuurterreinen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.d
    text: |-
      het vellen van houtopstanden en herbeplanten aantoonbaar wordt uitgevoerd in overeenstemming met de wijze die is
      beschreven in een bij ministeriële regeling aangewezen gedragscode; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.e
    text: 'het vellen van een houtopstand, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.e.1°
    text: |-
      het vellen is te beschouwen als een activiteit als bedoeld in
      [artikel 4.12, tweede lid, onder a tot en met k, van het Omgevingsbesluit][ref1] of als een onderdeel van die
      activiteit;


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.131.1.e.2°
    text: |-
      de houtopstand niet is aangelegd om te voldoen aan [artikel 11.129, eerste lid][ref1],
      [artikel 4.3, eerste lid, van de Wet natuurbescherming][ref2] of [artikel 3, eerste lid, van de Boswet][ref3];


