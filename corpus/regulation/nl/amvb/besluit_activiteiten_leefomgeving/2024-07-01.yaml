        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: '11.14'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [artikel 11.3][ref1] of [11.4][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.14.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.14
  - number: 11.14.b
    text: |-
      gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.14
  - number: 11.14.c
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '11.15'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 11.13][ref1] en [11.14][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
