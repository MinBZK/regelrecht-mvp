          - output: is_milieubelastende_activiteit_em_straling
            value:
              operation: GREATER_THAN
              subject: $elektrisch_vermogen_kw
              value: 4
  - number: 3.11.1
    text: |-
      Als milieubelastende activiteit als bedoeld in [artikel 2.1][ref1] wordt aangewezen het opwekken van elektriciteit
      met een windturbine met een rotordiameter van meer dan 2 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'

  - number: 3.11.2
    text: |-
      Onder de aanwijzing valt niet het opwekken van elektriciteit met een windturbine die deel uitmaakt van een windpark
      in de Noordzee als bedoeld in [paragraaf 7.2.3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.11
    references:
