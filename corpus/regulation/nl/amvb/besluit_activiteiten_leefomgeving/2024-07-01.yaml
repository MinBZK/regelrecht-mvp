                    100


                    sA.1


                    0,05


                    0,125


                    sA.2


                    0,5


                    1,25


                    sA.3


                    0,5


                    5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.195
  - number: 4.196.1
    text: |-
      Voor de emissie in de lucht bij het aanbrengen van conversielagen op metalen zijn de emissiegrenswaarden de
      waarden, bedoeld in tabel 4.196, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.196.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.196, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.196.3
    text: |-
      Aan het eerste lid wordt voor chroom VI-verbindingen, berekend als chroom, in ieder geval voldaan als de afgezogen
      emissies door een geschikte gaswasser, een geschikt aerosolfilter of een geschikt mistfilter worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.196.4
    text: 'Aan het eerste lid wordt voor zwavelzuur in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.196.4.a
    text: de temperatuur van de zwavelzuurbaden voor het zwavelzuuranodiseren minder is dan 60 °C; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.196.4.b
    text: |-
      de afgezogen emissies door een geschikte gaswasser, een geschikt aerosolfilter of een geschikt mistfilter worden
      gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.196
  - number: 4.197.1
    text: |-
      Voor de emissie in de lucht bij het aanbrengen van metaallagen op metalen zijn de emissiegrenswaarden de waarden,
      bedoeld in tabel 4.197, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.197
  - number: 4.197.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.197, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.197
  - number: 4.197.3
    text: |-
      Aan het eerste lid wordt voor chroom VI-verbindingen, cadmium en cadmiumverbindingen in ieder geval voldaan als de
      emissies door een geschikte gaswasser, een geschikt aerosolfilter of een geschikt mistfilter worden gevoerd.
            Tabel 4.197 Emissiegrenswaarden bij aanbrengen metaallagen op metalen


