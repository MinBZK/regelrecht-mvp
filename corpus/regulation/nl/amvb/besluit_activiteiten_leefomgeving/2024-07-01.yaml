  - number: 4.90.1
    text: |-
      Aan de emissiegrenswaarden voor afvalverbrandingsinstallaties voor totaal stof, totaal organische koolstof,
      zoutzuur, waterstoffluoride, ammoniak en zwaveldioxide wordt in ieder geval voldaan, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.1.a
    text: geen van de daggemiddelden hoger is dan de emissiegrenswaarde; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.1.b
    text: 97% van de halfuurgemiddelden in een kalenderjaar niet hoger is dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.2
    text: 'Aan de emissiegrenswaarden voor afvalverbrandingsinstallaties voor stikstofoxiden wordt voldaan, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.2.a
    text: geen van de daggemiddelden hoger is dan de emissiegrenswaarde;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.2.b
    text: geen van de maandgemiddelden hoger is dan de emissiegrenswaarde; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.2.c
    text: 97% van de halfuurgemiddelden in een kalenderjaar lager is dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.3
    text: >-
      Aan de emissiegrenswaarden voor
      afvalverbrandingsinstallaties voor
      koolmonoxide wordt in ieder geval voldaan,
      als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.3.a
    text: 97% van de daggemiddelden in een kalenderjaar lager is dan de emissiegrenswaarde; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.3.b
    text: 95% van alle 10-minutengemiddelden in een periode van 24 uur lager is dan die emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.4
    text: |-
      Aan de emissiegrenswaarden voor afvalmeeverbrandingsinstallaties voor totaal stof, totaal organische koolstof,
      zoutzuur, waterstoffluoride, zwaveldioxide, stikstofoxiden, ammoniak en koolmonoxide wordt in ieder geval voldaan
      als geen van de daggemiddelden hoger is dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.5
    text: |-
      Als continue metingen niet zijn vereist, wordt aan de emissiegrenswaarden voor zwaveldioxide, stikstofoxiden,
      waterstoffluoride en zoutzuur in ieder geval voldaan, als geen enkele gevalideerde meetuitkomst voor die stof hoger
      is dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.6
    text: |-
      Aan de emissiegrenswaarden voor de som van cadmium en thallium, de som van antimoon, arseen, chroom, kobalt, lood,
      mangaan, nikkel en vanadium en dioxinen en furanen wordt in ieder geval voldaan, als het gevalideerde resultaat van
      de periodieke metingen lager is dan de emissiegrenswaarde die daarbij hoort.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.7
    text: |-
      Aan de emissiegrenswaarde voor afvalverbrandingsinstallaties en afvalmeeverbrandingsinstallaties voor kwik wordt
      voldaan als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.7.a
    text: bij periodieke metingen het gevalideerde resultaat lager is dan de emissiegrenswaarde; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.90.7.b
    text: bij continue metingen geen van de daggemiddelden hoger is dan 150% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.90
  - number: 4.91.1
    text: |-
      Halfuurgemiddelden en 10-minutengemiddelden worden bepaald binnen de tijd dat de verbrandingsinstallatie
      in werking is, met uitzondering van de tijd die nodig is voor de inwerkingstelling en stillegging van de
      afvalverbrandingsinstallatie als in die tijd geen afvalstoffen worden verbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.91
  - number: 4.91.2
    text: |-
      Bij de bepaling van het daggemiddelde worden ten hoogste vijf halfuurgemiddelden door defecten of onderhoud van het
      systeem voor continue metingen buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.91
  - number: 4.91.3
    text: |-
      Per kalenderjaar worden ten hoogste tien daggemiddelden door defecten of onderhoud van het systeem voor continue
      metingen buiten beschouwing gelaten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.91
  - number: 4.92.1
    text: |-
      Het is toegestaan dat voor de emissie in de lucht bij een afvalverbrandingsinstallatie of
      afvalmeeverbrandingsinstallatie de emissiegrenswaarden, bedoeld in de [artikelen 4.73][ref1], [4.75][ref2] en
      [4.77][ref3], of de emissiegrenswaarden, berekend volgens [artikel 4.76][ref4], worden overschreden, als de
      overschrijding het rechtstreeks gevolg is van technisch onvermijdelijke:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
