    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.229
  - number: 4.230.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.228][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.230
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: 4.230.2
    text: |-
      Het eerste lid is niet van toepassing als een maatregel als bedoeld in [artikel 4.228, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.230
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: 4.231.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste 15 minuten en ten hoogste een half uur. Dit geldt
      niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.231
  - number: 4.231.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.231.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.231
  - number: 4.231.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.231
  - number: 4.231.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.229][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.231 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Totaal stof


                    30


                    Overig


                    40


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.231
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: '4.232'
    text: |-
      Met het oog op het beschermen van de gezondheid worden de emissies in de lucht bovendaks en omhoog gericht
      afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.232
  - number: 4.232a
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor sA.3, bedoeld in
      [artikel 4.228][ref1], niet van toepassing op het stralen van metalen, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding van dit besluit. Tot eerstgenoemde
      datum geldt in dat geval een emissiegrenswaarde van 5 mg/Nm3 bij een ondergrens van 5 kg/jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.232a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.13'
  - number: '4.233'
    text: Deze paragraaf is van toepassing op het schoonbranden van metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.233
  - number: 4.234.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.233][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.234
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.14'
  - number: 4.234.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.234
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.235'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van het nabehandelen van de emissie
      die vrijkomt bij het schoonbranden van metalen in een gaswasser niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.235
  - number: '4.236'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.236
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '4.237'
    text: |-
      Met het oog op het voorkomen van emissies in de lucht worden lood, geïsoleerde kabels, oliegekoelde transformatoren
      en metaaloppervlakken die zijn verontreinigd met halogeenverbindingen niet schoongebrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.237
  - number: '4.238'
    text: |-
      Met het oog op het voorkomen van emissies in de lucht worden metalen voorafgaand aan het schoonbranden vrijgemaakt
      van materialen die op andere wijze dan door schoonbranden kunnen worden verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.238
  - number: 4.239.1
    text: |-
      Voor de emissie in de lucht bij het schoonbranden van metalen zijn de emissiegrenswaarden de waarden, bedoeld in
      tabel 4.239, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.239
  - number: 4.239.2
    text: |-
      Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.239, niet overschrijdt.
            Tabel 4.239 Emissiegrenswaarden


                    *Stofklasse*


                    *Emissiegrenswaarde in mg/Nm3*


                    *Ondergrens in kg/jaar*


                    Totaal stof


                    25


                    100


                    gA.3


                    20


                    75


                    gO.2


                    50


                    250
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.239
  - number: '4.240'
    text: |-
      Aan [artikel 4.239, eerste lid][ref1], wordt in ieder geval voldaan als een elektrische oven wordt gebruikt en de
      hieruit afgezogen dampen via condensatie of absorptie worden behandeld en teruggeleid naar de oven zonder dat een
      emissie in de lucht optreedt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.240
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.14'
  - number: '4.241'
    text: |-
      Aan [artikel 4.239, eerste lid][ref1], wordt in ieder geval voldaan als een gasgestookte oven wordt gebruikt met
      een capaciteit voor het reinigen van producten van minder dan 5 ton, en:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.14'
  - number: 4.241.a
    text: 'de rookgassen uit de gasgestookte oven worden geleid door een geschikte naverbrander, die zo is ingeregeld dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.a.1°
    text: de temperatuur tot het einde van de cyclus ten minste 850 °C is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.a.2°
    text: de naverbrander op temperatuur is voordat het schoonbranden begint;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.a.3°
    text: de verblijftijd van de rookgassen ten minste twee seconden is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.a.4°
    text: de emissieconcentratie van koolmonoxide lager is dan 100 mg/Nm3;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.b
    text: de rookgassen alleen via de naverbrander uit de gasgestookte oven kunnen worden afgevoerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: 4.241.c
    text: het temperatuurverloop van de gasgestookte oven en de naverbrander continu wordt geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.241
  - number: '4.242'
    text: |-
      Aan [artikel 4.239, eerste lid][ref1], wordt in ieder geval voldaan als een gasgestookte oven wordt gebruikt met
      een capaciteit voor het reinigen van producten van ten minste 5 ton en:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.14'
  - number: 4.242.a
    text: 'de rookgassen uit de gasgestookte oven worden geleid door een geschikte naverbrander, die zo is ingeregeld dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.a.1°
    text: tot het einde van de cyclus de temperatuur ten minste 850 °C is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.a.2°
    text: de naverbrander op temperatuur is voordat het schoonbranden begint;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.a.3°
    text: de verblijftijd van de rookgassen ten minste twee seconden is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.a.4°
    text: de emissieconcentratie van koolmonoxide lager is dan 100 mg/Nm3;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.b
    text: de rookgassen alleen via de naverbrander uit de gasgestookte oven kunnen worden afgevoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.c
    text: het zuurstofpercentage in de rookgassen na de naverbrander ten minste 6% is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.d
    text: |-
      via beveiligingen is geborgd dat het schoonbranden niet kan starten als de naverbrander niet werkt en dat de
      naverbrander niet kan worden uitgeschakeld als de oven in bedrijf is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.e
    text: de maximale belading van de gasgestookte oven is vastgesteld en niet kan worden overschreden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.f
    text: |-
      de nabrandtijd van de naverbrander vast staat ingesteld op de waarde die in een controlemeting bij de maximale
      belading is vastgesteld en voldoende is om bij maximale belading alle dampen te verbranden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.g
    text: het temperatuurverloop van de gasgestookte oven en de naverbrander continu wordt geregistreerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.242.h
    text: het zuurstofgehalte en het koolmonoxidegehalte van de rookgassen continu worden gemeten en geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.242
  - number: 4.243.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, ingedeeld in de stofklassen, bedoeld in [tabel 4.239][ref1],
      is NEN-EN 15259 van toepassing.


