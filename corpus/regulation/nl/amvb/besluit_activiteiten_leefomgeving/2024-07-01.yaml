  - number: '7.62'
    text: Deze paragraaf is van toepassing op stortingsactiviteiten op zee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.62
  - number: '7.63'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, onder e, van de wet][ref1], om zonder omgevingsvergunning
      een stortingsactiviteit op zee te verrichten, geldt niet voor een stortingsactiviteit als bedoeld in
      [artikel 7.62][ref2], die wordt verricht in de Noordzee, voor zover het gaat om een activiteit die wordt verricht
      vanaf een vaartuig of drijvend werktuig dat in gebruik is voor het uitoefenen van defensietaken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.63
    references:
