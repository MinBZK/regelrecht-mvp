  - number: '7.21'
    text: 'Het afvalwater afkomstig van het reinigen of conserveren van bouwwerken wordt niet geloosd, tenzij het gaat om:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.21
  - number: 7.21.a
    text: afvalwater afkomstig van het afwassen met water; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.21
  - number: 7.21.b
    text: afvalwater afkomstig van het schoonspuiten met water onder een druk van ten hoogste 200 bar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.21
  - number: 7.22.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de Noordzee bij het reinigen of conserveren van
      bouwwerken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.1.a
    text: is een werkinstructie opgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.1.b
    text: |-
      wordt voor het deel van het bouwwerk dat boven de waterspiegel ligt een hulpconstructie voor de opvang van stoffen
      gebruikt die is afgestemd op de gebruikte techniek, de gebruikte stoffen en de stoffen die kunnen vrijkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.2
    text: 'In de werkinstructie is in ieder geval beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.2.a
    text: welke technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.2.b
    text: welke stoffen worden gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.2.c
    text: welke stoffen kunnen vrijkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3
    text: 'Als een hulpconstructie wordt gebruikt, is in de werkinstructie ook beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3.a
    text: op welke manier de vloer, de zijwanden en de bovenzijde van de hulpconstructie zijn uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3.b
    text: de omvang van het bouwwerk dat wordt gereinigd of geconserveerd en de omvang van de hulpconstructie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3.c
    text: of de constructie een afzuiging met permanente onderdruk heeft;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3.d
    text: 'als natte technieken worden gebruikt: de wijze van opvang van afvalwater; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: 7.22.3.e
    text: 'als wordt gewerkt bij een windsnelheid van meer dan 8 m/s: de aanvullende maatregelen die worden getroffen.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.22
  - number: '7.23'
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de Noordzee bij het bouwen, renoveren of slopen
      van bouwwerken is een werkinstructie opgesteld, waarin in ieder geval is beschreven:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.23
  - number: 7.23.a
    text: op welke manier wordt gebouwd, gerenoveerd of gesloopt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.23
  - number: 7.23.b
    text: |-
      welke maatregelen worden getroffen om te voorkomen dat stoffen die worden gebruikt of die kunnen vrijkomen, in de
      Noordzee terechtkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.23
  - number: '7.24'
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van de Noordzee bij het afzuigen van lucht vanuit een
      hulpconstructie is voor de emissie in de lucht de emissiegrenswaarde voor stof 10 mg/Nm3, gemeten in een eenmalige
      meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.24
  - number: '7.25'
    text: Op het meten van stof bij het afzuigen van lucht vanuit een hulpconstructie is NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.25
  - number: 7.26.1
    text: |-
      Deze paragraaf is van toepassing op de volgende beperkingengebiedactiviteiten met betrekking tot een
      waterstaatswerk:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.1.a
    text: het ontgraven of verplaatsen van grond of baggerspecie in de Noordzee; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.1.b
    text: het toepassen van grond of baggerspecie in de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.2
    text: Deze paragraaf is ook van toepassing op ontgrondingsactiviteiten die bestaan uit het ontgronden in de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.3
    text: |-
      Het eerste lid geldt niet voor het onderhouden of herstellen van een waterstaatswerk door of namens de
      waterbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.4
    text: 'In deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
  - number: 7.26.4.a
    text: |-
      *baggerspecie:* baggerspecie als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.26
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
  - number: 7.26.4.b
    text: |-
