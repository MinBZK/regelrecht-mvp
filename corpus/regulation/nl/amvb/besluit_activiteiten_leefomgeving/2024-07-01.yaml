  - number: '4.432'
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een koelinstallatie met kooldioxide, koolwaterstoffen of
      ammoniak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.432
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_activiteit
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
          - name: koelmiddel
            type: string
            required: true
            description: >-
              Type koelmiddel: kooldioxide,
              koolwaterstoffen, ammoniak
            source: {}
        output:
          - name: paragraaf_4_33_van_toepassing
            type: boolean
            description: Of paragraaf 4.33 (koelinstallaties) van toepassing is
        actions:
          - output: paragraaf_4_33_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $type_activiteit
                  value: exploiteren_koelinstallatie
                - operation: IN
                  subject: $koelmiddel
                  values:
                    - kooldioxide
                    - koolwaterstoffen
                    - ammoniak
  - number: 4.433.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.432][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.433
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.33'
  - number: 4.433.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.433
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.434.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in
      [artikel 4.436, eerste of tweede lid][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.33'
  - number: 4.434.1.a
    text: |-
      toestemming als bedoeld in [artikel 4.7 van de wet][ref1] niet vereist; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.434.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
  - number: 4.434.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
  - number: 4.434.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
  - number: 4.434.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.434
  - number: 4.435.1
    text: |-
      Een koelinstallatie met kooldioxide of koolwaterstoffen is zo ontworpen en geïnstalleerd en wordt zo beheerd en
      onderhouden dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.1.a
    text: deze op een veilige wijze kan functioneren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.1.b
    text: deze snel en veilig uit bedrijf kan worden genomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.1.c
    text: onveilige situaties worden voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.2
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.2.a
    text: |-
      bij een koelinstallatie met kooldioxide: deze is ontworpen en geïnstalleerd en wordt beheerd en onderhouden volgens
      NPR 7601, paragraaf 5.7 en de hoofdstukken 7 en 8, met uitzondering van de paragrafen 8.3 en 8.6; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.435.2.b
    text: |-
      bij een koelinstallatie met koolwaterstoffen: deze is ontworpen en geïnstalleerd en wordt beheerd en onderhouden
      volgens NPR 7600, hoofdstuk 7, met uitzondering van paragraaf 7.6, en hoofdstuk 8, met uitzondering van de
      paragrafen 8.3 en 8.6.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.435
  - number: 4.436.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is een koelinstallatie met ammoniak ontworpen en geïnstalleerd
      volgens PGS 13.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.436
  - number: 4.436.2
    text: De koelinstallatie wordt beheerd en onderhouden volgens PGS 13.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.436
  - number: 4.436.3
    text: Een koelinstallatie bij een sneeuwbaan of ijsbaan is een indirect koelsysteem als bedoeld in PGS 13.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.436
  - number: '4.437'
    text: |-
      [Artikel 4.436, derde lid][ref1], is niet van toepassing als de koelinstallatie voor 1 januari 2010 is
      geïnstalleerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.437
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.33'
