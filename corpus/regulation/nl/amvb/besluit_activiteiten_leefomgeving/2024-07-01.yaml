  - number: '4.290'
    text: |-
      Bij het verrichten van een activiteit als bedoeld in [artikel 4.288][ref1] wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
