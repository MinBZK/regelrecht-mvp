  - number: 4.1199d
    text: |-
      Het treffen van een gelijkwaardige maatregel is tot en met 31 december 2025 uitgesloten voor
      [artikel 4.1199c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199d
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.116'
  - number: 4.1200.1
    text: Deze paragraaf is van toepassing op het op of in de bodem brengen van zuiveringsslib.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1200
  - number: 4.1200.2
    text: 'In deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1200
  - number: 4.1200.2.a
    text: '*bufferstrook:* strook grond langs een oppervlaktewaterlichaam;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1200
  - number: 4.1200.2.b
    text: |-
      *perceel:* aaneengesloten, door wegen, waterwegen, sloten, houtopstanden, muren, wallen of anderszins topografisch
      begrensde oppervlakte grond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1200
  - number: '4.1201'
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem wordt zuiveringsslib alleen op landbouwgronden op of
      in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1201
  - number: '4.1202'
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem wordt alleen zuiveringsslib op of in de bodem gebracht
      dat op grond van [hoofdstuk III van het Uitvoeringsbesluit Meststoffenwet][ref1] mag worden verhandeld.


      [ref1]: https://wetten.overheid.nl/BWBR0019031#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1202
    references:
      - id: ref1
        bwb_id: BWBR0019031
        hoofdstuk: III
  - number: '4.1203'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of van een oppervlaktewaterlichaam wordt
      zuiveringsslib niet op of in de bodem gebracht als de bovenste laag van de bodem geheel of gedeeltelijk is bevroren
      of geheel of gedeeltelijk is bedekt met sneeuw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1203
  - number: '4.1204'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt zuiveringsslib niet op of in de bodem gebracht
      als de bovenste bodemlaag met water is verzadigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1204
  - number: '4.1205'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt zuiveringsslib van 1 september tot en met
      31 januari niet op of in de bodem gebracht als de bodem tegelijkertijd wordt bevloeid of beregend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1205
  - number: 4.1206.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt steekvast zuiveringsslib van 1 september tot en
      met 31 januari niet op of in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
  - number: 4.1206.2
    text: 'Het eerste lid is niet van toepassing op het brengen van steekvast zuiveringsslib op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
  - number: 4.1206.2.a
    text: grasland dat ligt op kleigronden of veengronden, in de periode van 1 september tot en met 15 september;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
  - number: 4.1206.2.b
    text: bouwland dat ligt op kleigronden of veengronden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
  - number: 4.1206.2.c
    text: |-
      bouwland dat ligt op zandgronden of lössgronden, als op die gronden bomen worden geteeld en het op of in de bodem
      brengen plaatsvindt voorafgaand aan de aanplant van de bomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
  - number: 4.1206.3
    text: |-
      Extreme weersomstandigheden in combinatie met een landbouwkundige noodzaak zijn bijzondere omstandigheden als
      bedoeld in [artikel 19.0 van de wet][ref1]. Het bevoegd gezag, bedoeld in [artikel 2.8][ref2], kan voor het op
      of in de bodem brengen van steekvast zuiveringsslib bij besluit als bedoeld in artikel 19.0 van de wet bepalen dat
      zich een bijzondere omstandigheid voordoet. Het besluit kan inhouden dat de periode om steekvast zuiveringsslib op
      of in de bodem te brengen wordt gewijzigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1206
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1207.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt vloeibaar zuiveringsslib van 1 augustus tot en
      met 15 maart niet op of in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2
    text: 'Het eerste lid is niet van toepassing op het brengen van vloeibaar zuiveringsslib op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.a
    text: grasland, in de periode van 16 februari tot en met 15 maart en in de periode van 1 augustus tot en met 31 augustus;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.b
    text: 'bouwland, in de periode van 1 augustus tot en met 15 september, als hierop:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.b.1°
    text: uiterlijk op 15 september winterkoolzaad voor zaadwinning in het volgende kalenderjaar wordt gezaaid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.b.2°
    text: |-
      uiterlijk op 15 september een groenbemester wordt ingezaaid of geplant die niet eerder dan acht weken na de datum
      van inzaaien of planten wordt vernietigd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.b.3°
    text: in het aansluitende najaar bloembollen worden geplant; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.2.c
    text: |-
      bouwland, in de periode van 16 februari tot en met 15 maart, als hierop in hetzelfde kalenderjaar een bij
      ministeriële regeling als vroege teelt aangewezen gewas wordt ingezaaid, geplant of gepoot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
  - number: 4.1207.3
    text: |-
      Extreme weersomstandigheden in combinatie met een landbouwkundige noodzaak zijn bijzondere omstandigheden als
      bedoeld in [artikel 19.0 van de wet][ref1]. Het bevoegd gezag, bedoeld in [artikel 2.8][ref2], kan voor het op
      of in de bodem brengen van vloeibaar zuiveringsslib bij besluit als bedoeld in artikel 19.0 van de wet bepalen dat
      zich een bijzondere omstandigheid voordoet. Het besluit kan inhouden dat de periode om vloeibaar zuiveringsslib op
      of in de bodem te brengen wordt gewijzigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1207a
    text: |-
      Jaarlijks worden uiterlijk de dag voorafgaand aan het gebruik van zuiveringsslib in de periode van 16 februari tot
      en met 15 maart aan het bevoegd gezag, bedoeld in [artikel 2.8][ref1] de volgende gegevens en bescheiden verstrekt
      als in dat kalenderjaar een bij ministeriële regeling als vroege teelt aangewezen wordt ingezaaid, geplant of
      gepoot:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1207a.a
    text: de begrenzing van de locatie waarop het gewas wordt ingezaaid, geplant of gepoot; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207a
  - number: 4.1207a.b
    text: welk gewas wordt ingezaaid, geplant of gepoot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207a
  - number: 4.1207b.1
    text: |-
      De gegevens en bescheiden worden verstrekt met gebruikmaking van een elektronische voorziening en een elektronisch
      formulier die door Onze Minister van Landbouw, Natuur en Voedselkwaliteit beschikbaar worden gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207b
  - number: 4.1207b.2
    text: Gegevens en bescheiden die zijn verstrekt via het elektronisch formulier gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1207b
  - number: '4.1208'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt geen zuiveringsslib op of in de bodem gebracht
      op gronden met een hellingspercentage van ten minste 7% als de bodem is aangetast door de versnelde afvoer van
      bodemmateriaal door oppervlakkig afstromend water en daarbij geulen van meer dan 30 cm diepte zijn ontstaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1208
  - number: '4.1209'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt zuiveringsslib niet op of in de bodem gebracht
      op niet-beteelde gronden met een hellingspercentage van ten minste 7%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1209
  - number: '4.1210'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt zuiveringsslib niet op bouwland gebracht met
      een hellingspercentage van ten minste 18%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1210
  - number: 4.1211.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem wordt aansluitend op de teelt van mais op zandgronden
      of lössgronden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1211
  - number: 4.1211.1.a
    text: |-
      uiterlijk op 1 oktober gras, winterrogge, bladkool, bladrammenas, wintertarwe, wintergerst, triticale of Japanse
      haver geteeld; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1211
  - number: 4.1211.1.b
    text: |-
      uiterlijk op 31 oktober spelt, triticale, wintergerst, winterrogge of wintertarwe als hoofdteelt in het volgende
      jaar geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1211
  - number: 4.1211.2
    text: |-
      Het eerste lid, onder a, is niet van toepassing als uiterlijk op 31 oktober spelt, triticale, wintergerst,
      winterrogge of wintertarwe wordt geteeld aansluitend op de teelt van mais, niet zijnde snijmais.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1211
  - number: 4.1211.3
    text: |-
      Het gewas dat aansluitend op mais wordt geteeld, wordt niet voor 1 februari van het volgende kalenderjaar
      vernietigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1211
  - number: '4.1212'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 2.8][ref1], wordt uiterlijk op 1 oktober geïnformeerd als een gewas als
      bedoeld in [artikel 4.1211, eerste lid, onder b, of tweede lid][ref2], wordt geteeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.117'
  - number: 4.1212a.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem wordt zuiveringsslib uitsluitend op of in de bodem
      gebracht als op landbouwgrond op zandgronden of lössgronden per aaneengesloten periode van vier kalenderjaren,
      gerekend vanaf 1 januari 2023, ten minste in één kalenderjaar en uiterlijk in het vierde kalenderjaar, op de
      desbetreffende grond één van de bij ministeriële regeling als rustgewas aangewezen gewassen wordt geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212a
  - number: 4.1212a.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212a
  - number: 4.1212a.2.a
    text: voor de teelt van gewassen die meer dan vier jaar onafgebroken op een perceel staan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212a
  - number: 4.1212a.2.b
    text: voor de teelt van gewassen overeenkomstig de voorschriften die zijn gesteld bij of krachtens de bio-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212a
  - number: 4.1212b.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam wordt op landbouwgrond
      gelegen in een bufferstrook geen zuiveringsslib op of in de bodem gebracht. De breedte van de bufferstrook voldoet
      aan tabel 4.1212b.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
  - number: 4.1212b.2
    text: |-
      De breedte van de bufferstrook wordt vanaf de insteek van het oppervlaktewaterlichaam en over de grond gemeten. In
      afwijking hiervan wordt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
  - number: 4.1212b.2.a
    text: |-
      bij een oppervlaktewaterlichaam met een flauw talud dat over de grond gemeten vanaf de waterlijn tot aan de insteek
      ten minste 200 cm breed is en dat een helling heeft die niet steiler is dan 1:3 de bufferstrook gemeten vanaf
      100 cm vanaf de waterlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
  - number: 4.1212b.2.b
    text: bij een oppervlaktewaterlichaam zonder talud de bufferstrook gemeten vanaf de waterlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
  - number: 4.1212b.3
    text: |-
      In afwijking van het eerste lid is de breedte van de bufferstrook gelijk aan de breedte van de teeltvrije zone,
      bedoeld in [artikel 4.723i][ref1], als die teeltvrije zone breder is dan de in dit artikel voorgeschreven breedte
      van de bufferstrook.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.64'
  - number: 4.1212b.4
    text: |-
      In dit artikel wordt onder landbouwgrond verstaan: grond die de landbouwer, bedoeld in
      [artikel 1, eerste lid, onder gg, van de Meststoffenwet][ref1], in eigendom, in pacht of in gebruik heeft en voor
      het beheer waarvan hij rechtstreeks verantwoordelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0004054#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1212b
    references:
      - id: ref1
        bwb_id: BWBR0004054
        artikel: '1'
  - number: 4.1212b.5
    text: |-
      Voor de toepassing van dit artikel wordt in uiterwaarden en buitendijkse gebieden onder oppervlaktewaterlichaam
      verstaan: beddingen waarin op het moment van het op of in de bodem brengen van zuiveringsslib aan het aardoppervlak
      en de openlucht grenzend water voorkomt.
