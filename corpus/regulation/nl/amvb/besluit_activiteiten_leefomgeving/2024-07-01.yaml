  - number: 4.963.2.d
    text: ertoe leidt dat niet kan worden voldaan aan de interne afstanden die zijn vastgelegd in PGS 31.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.963
