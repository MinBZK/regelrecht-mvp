        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.43.1.a
    text: |-
      Onze Minister voor Natuur en Stikstof bevoegd gezag als bedoeld in [artikel 11.25, eerste lid][ref1], is; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
