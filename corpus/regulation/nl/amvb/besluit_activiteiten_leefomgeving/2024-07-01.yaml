      als de bodem is verontreinigd met vluchtige stoffen: een omschrijving van de maatregelen om uitdamping van
      vluchtige stoffen tegen te gaan, bedoeld in [artikel 4.1245][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
  - number: 4.1236.2.f
    text: 'als afvalwater wordt geloosd: de lozingsroutes.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1236.3
    text: |-
      Ten minste een week voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1236
  - number: 4.1237.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 4.1235][ref1], worden aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1237
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1237.1.a
    text: de begrenzing van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1237
  - number: 4.1237.1.b
    text: de verwachte datum van het begin van de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1237
  - number: 4.1237.2
    text: |-
      Onverwijld na het wijzigen van de gegevens, bedoeld in het eerste lid, worden de gewijzigde gegevens verstrekt aan
      het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1237
  - number: 4.1238.1
    text: |-
      Ten minste een week voor het begin van de activiteit, bedoeld in [artikel 4.1235][ref1], worden aan het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1238
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.121'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1238.1.a
    text: de naam en het adres van degene die de werkzaamheden gaat verrichten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1238
  - number: 4.1238.1.b
    text: de naam en het adres van de onderneming die de milieukundige begeleiding gaat verrichten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1238
  - number: 4.1238.1.c
    text: de naam van de natuurlijke persoon die de milieukundige begeleiding gaat verrichten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1238
  - number: 4.1238.2
    text: |-
      Onverwijld na het wijzigen van de gegevens, bedoeld in het eerste lid, worden de gewijzigde gegevens verstrekt aan
      het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1238
  - number: '4.1239'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1235][ref1], wordt voldaan aan de regels over het
      voorafgaand bodemonderzoek, bedoeld in [paragraaf 5.2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1239
    references:
