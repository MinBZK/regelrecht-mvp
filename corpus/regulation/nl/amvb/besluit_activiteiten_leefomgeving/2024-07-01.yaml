        afdeling: '8.3'
  - number: '17.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in de [artikelen 17.3][ref1] en
      [17.4][ref2], worden die ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.9.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.9
  - number: 17.9.b
    text: de naam en het adres van degene die de activiteit verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.9
  - number: 17.9.c
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.9
  - number: 17.10.1
    text: |-
      Voordat de naam of het adres, bedoeld in [artikel 17.9, onder b][ref1], wijzigen, worden die gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in de [artikelen 17.3][ref2] en [17.4][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.10.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in de [artikelen 17.3][ref1] en [17.4][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.11.1
    text: |-
      Op verzoek van het bevoegd gezag, bedoeld in de [artikelen 17.3][ref1] en [17.4][ref2], worden de gegevens en
      bescheiden verstrekt die nodig zijn om te bezien of de algemene regels en maatwerkvoorschriften voor de activiteit
      toereikend zijn, gezien de ontwikkelingen van de technische mogelijkheden tot het beschermen van de chemische en
      ecologische kwaliteit van watersystemen en de ontwikkelingen met betrekking tot die watersystemen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.11.2
    text: |-
      Gegevens en bescheiden worden verstrekt voor zover degene die de activiteit verricht er redelijkerwijs de
      beschikking over kan krijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.11
  - number: '17.12'
    text: |-
      Het bevoegd gezag, bedoeld in de [artikelen 17.3][ref1] en [17.4][ref2], wordt onverwijld geïnformeerd over een
      ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: '17.13'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in de
      [artikelen 17.3][ref1] en [17.4][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.13.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.13
  - number: 17.13.b
    text: informatie over de vrijgekomen stoffen en hun eigenschappen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.13
  - number: 17.13.c
    text: |-
      andere gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen
      inschatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.13
  - number: 17.13.d
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '17.14'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 17.12][ref1] en [17.13][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: '17.15'
    text: |-
      Als lozingsactiviteit op een oppervlaktewaterlichaam als bedoeld in [artikel 17.1][ref1] wordt aangewezen het lozen
      van huishoudelijk afvalwater afkomstig van een pleziervaartuig.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.16.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam wordt vanaf een
      pleziervaartuig geen toiletwater geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16
  - number: 17.16.2
    text: 'In afwijking van het eerste lid kan toiletwater vanaf een pleziervaartuig worden geloosd als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16
  - number: 17.16.2.a
    text: |-
      het toiletwater wordt geleid door een zuiveringsvoorziening met een certificaat van typegoedkeuring, verstrekt door
      een erkende certificatie-instantie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16
  - number: 17.16.2.b
    text: het toilet zodanig is geconstrueerd dat via dat toilet alleen urine en spoelwater kunnen worden geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16
  - number: 17.16a.1
    text: 'Op een zuiveringsvoorziening met een certificaat van typegoedkeuring zijn de volgende gegevens zichtbaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.16a.1.a
    text: het handelsmerk of de handelsnaam van de fabrikant;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.16a.1.b
    text: de naam en het serienummer van de zuiveringsvoorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.16a.1.c
    text: het bouwjaar van de zuiveringsvoorziening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.16a.1.d
    text: de naam van de certificatie-instantie en het nummer van het verleende certificaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.16a.2
    text: Bij de zuiveringsvoorziening is een kopie van het certificaat van typegoedkeuring aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.16a
  - number: 17.17.1
    text: |-
      Als lozingsactiviteit op een oppervlaktewaterlichaam als bedoeld in [artikel 17.1][ref1] wordt aangewezen het lozen
      van stoffen of afvalwater afkomstig van een vaartuig.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.1'
  - number: 17.17.2
    text: 'Onder de aanwijzing valt niet:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.17
  - number: 17.17.2.a
    text: het lozen van huishoudelijk afvalwater afkomstig van een pleziervaartuig; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.17
  - number: 17.17.2.b
    text: |-
      het lozen van scheepsafvalstoffen of delen van de lading vanaf een schip afkomstig van een schip als bedoeld in
      [artikel 1, eerste lid, van het Scheepsafvalstoffenbesluit Rijn- en binnenvaart][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0012019#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.17
    references:
      - id: ref1
        bwb_id: BWBR0012019
        artikel: '1'
  - number: '17.18'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      lozingsactiviteit op een oppervlaktewaterlichaam te verrichten, geldt voor de activiteit, bedoeld in
      [artikel 17.17][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        paragraaf: 17.2.2
        afdeling: '17.2'
  - number: '17.19'
    text: Deze afdeling gaat over het verstrekken van certificaten voor zuiveringsvoorzieningen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.19
  - number: '17.20'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan op aanvraag een erkenning verlenen aan een certificatie-
      instantie voor het verstrekken van certificaten voor zuiveringsvoorzieningen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.20
  - number: '17.21'
    text: 'Onze Minister van Infrastructuur en Waterstaat verleent de erkenning als de certificatie-instantie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.21
  - number: 17.21.a
    text: is geaccrediteerd volgens NEN-EN-ISO/IEC 17065; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.21
  - number: 17.21.b
    text: |-
      in staat is op deskundige en onafhankelijke wijze te beoordelen of de zuiveringsvoorziening voldoet aan de
      grenswaarden, bedoeld in [artikel 17.25, eerste lid, onder a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: '17.22'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat houdt een lijst bij van erkende certificatie-instanties en stelt
      die beschikbaar via een aangewezen website. Het besluit tot aanwijzing van de website wordt in de Staatscourant
      gepubliceerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.22
  - number: '17.23'
    text: 'Onze Minister van Infrastructuur en Waterstaat kan een erkenning intrekken:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.23
  - number: 17.23.a
    text: |-
      als de certificatie-instantie niet meer voldoet aan [artikel 17.21][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.23.b
    text: |-
      als blijkt dat de erkenning is verleend op grond van onjuiste gegevens en bescheiden en de erkenning niet zou zijn
      verleend als de juiste gegevens en bescheiden op het moment van verlening bekend zouden zijn geweest; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.23
  - number: 17.23.c
    text: op verzoek van de erkende certificatie-instantie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.23
  - number: '17.24'
    text: |-
      Een erkende certificatie-instantie stelt een procedure vast waarmee aan een fabrikant van zuiveringsvoorzieningen
      in ieder geval wordt gevraagd gegevens en bescheiden te verstrekken over:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.24
  - number: 17.24.a
    text: het ontwerp, de kenmerken en de prestaties van de zuiveringsvoorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.24
  - number: 17.24.b
    text: de onderdelen en de afstellingen die van invloed zijn op de effectiviteit van de toiletwaterzuivering; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.24
  - number: 17.24.c
    text: wijzigingen in de gegevens en bescheiden, bedoeld onder a en b.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.24
  - number: 17.25.1
    text: >-
      De erkende certificatie-instantie verstrekt een
      certificaat van typegoedkeuring voor een
      zuiveringsvoorziening als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
  - number: 17.25.1.a
    text: |-
      het toiletwater nadat het door de zuiveringsvoorziening is geleid niet de grenswaarden, bedoeld in tabel 17.25,
      overschrijdt, vastgesteld met een meting volgens [artikel 17.26][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.25.1.b
    text: |-
      tijdens het testen van de zuiveringsvoorziening niet is gebleken dat aan het gebruik ervan significante risico’s
      voor de gezondheid, de veiligheid of het milieu zijn verbonden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
  - number: 17.25.1.c
    text: |-
      de zuiveringsvoorziening overeenstemt met de gegevens en bescheiden, bedoeld in [artikel 17.24][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.25.1.d
    text: via de zuiveringsvoorziening geen toiletwater kan worden geloosd als deze is uitgeschakeld of niet in bedrijf is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
  - number: 17.25.2
    text: |-
      De erkende certificatie-instantie neemt in het certificaat voorwaarden op met betrekking tot het functioneren van
      de zuiveringsvoorziening BBT die moeten zijn vervuld voordat een zuiveringsvoorziening voldoet aan de grenswaarden,
      bedoeld in tabel 17.25.
            Tabel 17.25 Grenswaarden


                    *Stof*


                    *Grenswaarden in eenheden/100 ml*


                    Intestinale enterokokken


                    330


                    Escherichia coli


                    900
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.25
  - number: 17.26.1
    text: 'De erkende certificatie-instantie meet als volgt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: 17.26.1.a
    text: |-
      de test wordt verricht en het door de zuiveringsvoorziening geleide toiletwater wordt bemonsterd volgens
      [bijlage XI][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 17.26.1.b
    text: |-
      het bemonsterde toiletwater wordt op intestinale enterokokken geanalyseerd volgens NEN-EN-ISO 7899-1 of NEN-EN-ISO
      7899-2 en op Escherichia coli geanalyseerd volgens NEN-EN-ISO 9308-3 of NEN-EN-ISO 9308-1.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: 17.26.2
    text: |-
      Bij het beoordelen of aan de grenswaarden, bedoeld in [artikel 17.25, eerste lid][ref1], wordt voldaan, wordt
      gebruik gemaakt van de 90-percentielwaarde van de gemeten bacterietelling per gegevensreeks.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.26.3
    text: |-
      Bij een normale waarschijnlijkheidsverdeling van log van de gemeten waarden wordt de 90-percentielwaarde als volgt
      afgeleid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: 17.26.3.a
    text: |-
      neem de log-waarde van alle bacterietellingen in de te beoordelen gegevensreeks, en als het resultaat een nulwaarde
      is, neem dan de log-waarde van de minimum detectielimiet van de gebruikte analytische methode;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: 17.26.3.b
    text: bepaal het rekenkundig gemiddelde van de log-waarden (μ); en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: 17.26.3.c
    text: |-
      bepaal de standaardafwijking van de log-waarden (σ); waarbij het hoogste 90-percentielpunt van de
      waarschijnlijkheidsverdeling van de gegevens wordt berekend met de volgende vergelijking: hoogste 90-percentiel =
      antilog (μ + 1,282 σ).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.26
  - number: '17.27'
    text: 'Een certificaat van typegoedkeuring kan door de erkende certificatie-instantie worden ingetrokken als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.27
  - number: 17.27.a
    text: |-
      blijkt dat het certificaat is verstrekt op grond van onjuiste gegevens en bescheiden en het niet zou zijn verstrekt
      als de juiste gegevens en bescheiden op het moment van verstrekking bekend zouden zijn geweest;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.27
  - number: 17.27.b
    text: het certificaat om een andere reden ten onrechte is verstrekt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.27
  - number: 17.27.c
    text: in het certificaat onbevoegd wijzigingen zijn aangebracht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.27
  - number: 17.27.d
    text: |-
      na verstrekking blijkt dat er significante risico’s zijn verbonden aan het gebruik van de zuiveringsvoorziening
      voor de gezondheid, de veiligheid of het milieu.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.27
  - number: '17.28'
    text: |-
      De erkende certificatie-instantie kan de meting, bedoeld in [artikel 17.26, eerste lid][ref1], laten verrichten
      door een laboratorium of andere instantie:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel17
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.28
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '17'
        hoofdstuk: '17'
        afdeling: '17.3'
  - number: 17.28.a
    text: met een accreditatie volgens NEN-EN-ISO/IEC 17025; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.28
  - number: 17.28.b
    text: die geen fabrikant is van zuiveringsvoorzieningen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel17.28
  - number: '18.1'
    text: |-
      Voor toepassing van deze afdeling wordt verstaan onder: - *bromfiets:* bromfiets als bedoeld in
      [artikel 1, eerste lid, van de Wegenverkeerswet 1994][ref1];
        - *hoofdnederzetting:* hoofdnederzetting als bedoeld in [artikel 1 van de Handelsregisterwet 2007][ref2];
        - *hoofdvestiging:* hoofdvestiging als bedoeld in [artikel 1 van de Handelsregisterwet 2007][ref3];
        - *nevenvestiging:* nevenvestiging als bedoeld in [artikel 1 van de Handelsregisterwet 2007][ref4];
        - *onderneming:* onderneming als bedoeld in [artikel 5 van de Handelsregisterwet 2007][ref5];
        - *rechtspersoon:* rechtspersoon als bedoeld in [artikel 6 van de Handelsregisterwet 2007][ref6] of, als het gaat
      om de Staat, een ministerie of dienstonderdeel als bedoeld in dat artikel;
        - *reismodaliteit:* wijze waarop een onderneming of rechtspersoon een werknemer heeft laten reizen;
        - *reizigerskilometer:* verplaatsing van een werknemer over een afstand van 1 km;
        - *werknemer:* degene die krachtens arbeidsovereenkomst, anders dan een uitzendovereenkomst
      als bedoeld in [artikel 7:690 van het Burgerlijk Wetboek][ref7] met een beding als bedoeld in
      [artikel 7:691, tweede lid, van dat wetboek][ref8] of publiekrechtelijke aanstelling is gehouden tot het verrichten
      van ten minste 20 uur betaalde arbeid per maand voor een onderneming of rechtspersoon;
        - *woon-werkmobiliteit:* woon-werkmobiliteit als bedoeld in [artikel 18.11, eerste lid, onder a][ref9];
        - *zakelijke mobiliteit:* zakelijke mobiliteit als bedoeld in [artikel 18.11, eerste lid, onder b][ref10].


      [ref1]: https://wetten.overheid.nl/BWBR0006622#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0021777#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0021777#Artikel1
      [ref4]: https://wetten.overheid.nl/BWBR0021777#Artikel1
      [ref5]: https://wetten.overheid.nl/BWBR0021777#Artikel5
      [ref6]: https://wetten.overheid.nl/BWBR0021777#Artikel6
      [ref7]: https://wetten.overheid.nl/BWBR0005290#Artikel690
      [ref8]: https://wetten.overheid.nl/BWBR0005290#Artikel691
      [ref9]: https://wetten.overheid.nl/BWBR0041330#Artikel18
      [ref10]: https://wetten.overheid.nl/BWBR0041330#Artikel18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.1
    references:
      - id: ref1
        bwb_id: BWBR0006622
        artikel: '1'
      - id: ref2
