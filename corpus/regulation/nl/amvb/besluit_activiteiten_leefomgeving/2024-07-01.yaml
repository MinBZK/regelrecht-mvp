        paragraaf: '4.4'
  - number: 4.92.4.b
    text: is de halfuurgemiddelde emissiegrenswaarde van totaal stof 150 mg/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.5
    text: |-
      Bij een defect van de afgasreinigingsapparatuur wordt de activiteit zo spoedig mogelijk verminderd of stilgelegd
      totdat normale werking opnieuw mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: '4.93'
    text: |-
      Met het oog op het beperken van emissies in de lucht wordt bij het exploiteren van een afvalverbrandingsinstallatie
      en een afvalmeeverbrandingsinstallatie een automatisch systeem gebruikt dat de toevoer van afvalstoffen voorkomt
      als uit continue metingen blijkt dat een emissie in de lucht als gevolg van storingen of defecten aan de
      afgasreinigingsapparatuur hoger is dan een emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.93
  - number: '4.94'
    text: |-
      Als dit technisch mogelijk is, wordt de warmte die door het proces van thermische behandeling in een
      afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie wordt opgewekt, teruggewonnen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.94
  - number: 4.95.1
    text: |-
      Met het oog op het zuinig gebruik van energie en grondstoffen is het netto elektrisch rendement van een
      afvalmeeverbrandingsinstallatie met een totaal nominaal thermisch ingangsvermogen van 300 MW of meer die met
      steenkool of een combinatie van steenkool en een andere brandstof wordt gestookt en die niet is bedoeld voor het
      drogen of het behandelen van voorwerpen of materialen door direct contact met verbrandingsgas ten minste 40%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
  - number: 4.95.2
    text: |-
      Het netto elektrisch rendement wordt bepaald over de laatste vijf jaar dat de afvalmeeverbrandingsinstallatie
      in gebruik is of, als dat gebruik korter is dan vijf jaar, over de periode dat de
      afvalmeeverbrandingsinstallatie elektriciteit heeft geleverd aan het landelijk hoogspanningsnet, bedoeld in
      [artikel 1, eerste lid, onder j, van de Elektriciteitswet 1998][ref1], waarbij deze periode ten minste een jaar is.


      [ref1]: https://wetten.overheid.nl/BWBR0009755#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
    references:
      - id: ref1
        bwb_id: BWBR0009755
        artikel: '1'
  - number: 4.95.3
    text: |-
      Het netto elektrisch rendement wordt bepaald door de aan het landelijk hoogspanningsnet, geleverde elektriciteit te
      delen door de energie-inhoud van de ingezette brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
  - number: 4.95.4
    text: 'Bij levering aan een warmtenet wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
  - number: 4.95.4.a
    text: |-
      de energie-inhoud van de ingezette brandstoffen gecorrigeerd voor de energie-inhoud van de brandstoffen die worden
      gebruikt in verband met de warmteproductie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
  - number: 4.95.4.b
    text: |-
      de aan het landelijk hoogspanningsnet geleverde elektriciteit verhoogd met de elektriciteitsderving door de
      warmtelevering.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.95
  - number: 4.96.1
    text: 'Met het oog op een doelmatig beheer van afvalstoffen worden afvalstoffen alleen in ontvangst genomen als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.a
    text: |-
      de massa van de afvalstoffen is vastgesteld en geregistreerd, zo mogelijk per categorie als bedoeld in de bijlage
      bij de afvalbeschikking;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.b
    text: |-
      van de gevaarlijke afvalstoffen representatieve monsters zijn genomen, zo mogelijk voordat de lading wordt gelost
      en die monsters zijn geanalyseerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c
    text: |-
      degene waarvan de gevaarlijke afvalstoffen in ontvangst worden genomen de volgende gegevens heeft verstrekt en
      daarvan de gegevens, bedoeld onder 1° en 2°, zijn gecontroleerd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c.1°
    text: |-
      de begeleidingsbrieven, bedoeld in [artikel 10.39, eerste lid, onder b, van de Wet milieubeheer][ref1], en, voor
      zover van toepassing, het vervoersdocument voor grensoverschrijdende afvaloverbrengingen, bedoeld in bijlage IB
      bij Verordening (EG) nr. 1013/2006 van het Europees Parlement en de Raad van de Europese Unie van 14 juni 2006
      betreffende de overbrenging van afvalstoffen (PbEU 2006, L 190);


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '10'
  - number: 4.96.1.c.2°
    text: |-
      de gegevens die bij of krachtens de [Wet vervoer gevaarlijke stoffen][ref1] zijn vereist;


      [ref1]: https://wetten.overheid.nl/BWBR0007606
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
    references:
      - id: ref1
        bwb_id: BWBR0007606
  - number: 4.96.1.c.3°
    text: de gegevens over de gevaarlijke eigenschappen van de gevaarlijke afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c.4°
    text: de gegevens over de stoffen waarmee de gevaarlijke afvalstoffen niet mogen worden gemengd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c.5°
    text: de gegevens over de bij de behandeling van de gevaarlijke afvalstoffen te treffen voorzorgsmaatregelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c.6°
    text: de fysische, en als dat mogelijk is, chemische samenstelling van de afvalstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.1.c.7°
    text: |-
      alle overige gegevens die nodig zijn voor de beoordeling van de geschiktheid van die stoffen voor het beoogde
      verbrandingsproces.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.2
    text: |-
      De monsters, bedoeld in het eerste lid, onder b, worden ten minste een maand na het thermisch behandelen van de
      partij waaruit de monsters zijn genomen bewaard. De fysische en chemische samenstelling blijft ongewijzigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96.3
    text: |-
      De gegevens, bedoeld in het eerste lid, onder a en c, worden ten minste vijf jaar na het thermisch behandelen van
      de partij waarop de gegevens betrekking hebben bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96
  - number: 4.96a
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee [artikel 4.96][ref1] wordt versoepeld, wordt alleen gesteld voor
      een ippc-installatie waarin alleen afvalstoffen thermisch worden behandeld die afkomstig zijn van die installatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.96a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: '4.97'
    text: |-
      Voordat de methoden van verwijdering of recycling van de residuen worden vastgesteld, worden passende tests
      uitgevoerd om na te gaan wat de fysische en chemische eigenschappen en het verontreinigend vermogen van de residuen
      zijn. Die tests hebben betrekking op de totale oplosbare fractie en de oplosbare fractie zware metalen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.97
  - number: 4.98.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen bij een afvalverbrandingsinstallatie worden
      afvalverbrandingsresiduen gerecycled als dat mogelijk is en dat de voorkeur heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.2
    text: |-
      Een afvalverbrandingsinstallatie wordt zo geëxploiteerd dat een niveau van thermische behandeling wordt bereikt
      waardoor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.2.a
    text: |-
      de totale hoeveelheid organische koolstof in de slakken en de bodemas minder is dan 3% van het droge gewicht van
      het materiaal; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.2.b
    text: het gloeiverlies van de slakken en de bodemas minder is dan 5% van het droge gewicht van het materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.3
    text: |-
      Voor de toepassing van het tweede lid worden de slakken en de bodemas viermaal per jaar bemonsterd en geanalyseerd.
      De bemonstering wordt verricht volgens NEN-EN 14899 en de analyse wordt voor onderdeel a verricht volgens NEN-EN
      15619 of NEN-EN 15935 en voor onderdeel b volgens NEN-EN 13137 of NEN-EN 15936.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.4
    text: |-
      Een afvalverbrandingsinstallatie is zo uitgerust en gebouwd en wordt zo geëxploiteerd dat, zelfs in de meest
      ongunstige omstandigheden, het bij het proces ontstane gas, na de laatste toevoer van verbrandingslucht, twee
      seconden op beheerste en homogene wijze wordt verhit tot een temperatuur, gemeten dichtbij de binnenwand of op een
      ander representatief punt van de verbrandingskamer, van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.4.a
    text: ten minste 850 °C; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.4.b
    text: |-
      ten minste 1.100 °C als gevaarlijke afvalstoffen met een gehalte dat hoger is dan 1% gehalogeneerde organische
      verbindingen, uitgedrukt in chloor, thermisch worden behandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.5
    text: |-
      Bij het exploiteren van een afvalverbrandingsinstallatie wordt een automatisch systeem gebruikt dat de toevoer van
      afvalstoffen voorkomt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.5.a
    text: totdat bij het in werking stellen de temperatuur die op grond van het vierde lid is vereist, is bereikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.98.5.b
    text: als de vereiste temperatuur niet blijft gehandhaafd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.98
  - number: 4.99.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt elke verbrandingskamer van de
      afvalverbrandingsinstallatie uitgerust met ten minste een hulpbrander die automatisch wordt ingeschakeld als de
      temperatuur van de verbrandingsgassen, na de laatste toevoer van verbrandingslucht, tot onder de temperatuur zakt
      die op grond van [artikel 4.98, derde lid][ref1], is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.99
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.99.2
    text: |-
      De hulpbrander wordt ook tijdens de inwerkingstelling en de stillegging van de afvalverbrandingsinstallatie
      gebruikt om ervoor te zorgen dat de temperatuur die op grond van [artikel 4.98, derde lid][ref1], is vereist
      tijdens deze inwerkingstelling en stillegging steeds wordt gehandhaafd zolang de verbrandingskamer onverbrande
      afvalstoffen bevat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.99
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
  - number: 4.99.3
    text: |-
      Naar de hulpbrander worden geen brandstoffen toegevoerd die hogere emissies kunnen veroorzaken dan de emissies bij
      het stoken van gasolie voor de scheepvaart, bedoeld in [Richtlijn 2016/802](32016L0802) van het Europees Parlement
      en de Raad van 11 mei 2016 betreffende een vermindering van het zwavelgehalte van bepaalde vloeibare brandstoffen
      (PbEU 2016, L 132).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.99
  - number: 4.100.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen bij een afvalmeeverbrandingsinstallatie worden
      afvalverbrandingsresiduen gerecycled als dat mogelijk is en dat de voorkeur heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.100
  - number: 4.100.2
    text: |-
      Een afvalmeeverbrandingsinstallatie is zo ontworpen, uitgerust en gebouwd en wordt zo geëxploiteerd dat, zelfs
      in de meest ongunstige omstandigheden, het door de meeverbranding van afvalstoffen ontstane gas, twee seconden op
      beheerste en homogene wijze wordt verhit tot een temperatuur, van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.100
    machine_readable:
      definitions:
        min_temperatuur_standaard: 850
        min_temperatuur_gevaarlijk: 1100
        drempel_gehalogeneerd_procent: 1
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: verbrandingstemperatuur_celsius
            type: number
            required: true
            description: Temperatuur waartoe het gas wordt verhit in graden Celsius
            source: {}
          - name: gehalte_gehalogeneerde_stoffen_procent
            type: number
            required: true
            description: Gehalte gehalogeneerde organische stoffen uitgedrukt in chloor in procent
            source: {}
        output:
          - name: vereiste_temperatuur_celsius
            type: number
            description: De minimaal vereiste verbrandingstemperatuur in graden Celsius
          - name: voldoet_verbrandingstemperatuur
            type: boolean
            description: Of de verbrandingstemperatuur voldoet aan de vereiste minimumtemperatuur
        actions:
          - output: vereiste_temperatuur_celsius
            value:
              operation: IF
              cases:
                - when:
                    operation: GREATER_THAN
                    subject: $gehalte_gehalogeneerde_stoffen_procent
                    value: $drempel_gehalogeneerd_procent
                  then: $min_temperatuur_gevaarlijk
              default: $min_temperatuur_standaard
          - output: voldoet_verbrandingstemperatuur
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $verbrandingstemperatuur_celsius
              value: $vereiste_temperatuur_celsius
  - number: 4.100.2.a
    text: ten minste 850 °C; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.100
  - number: 4.100.2.b
    text: |-
      ten minste 1.100 °C als gevaarlijke afvalstoffen met een gehalte dat hoger is dan 1% gehalogeneerde organische
      stoffen, uitgedrukt in chloor, worden meeverbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.100
  - number: 4.100.3
    text: |-
      Er wordt een automatisch systeem gebruikt dat de toevoer van afvalstoffen voorkomt totdat bij het in werking
      stellen de temperatuur is bereikt die op grond van het tweede lid is vereist of als de vereiste temperatuur niet
      blijft gehandhaafd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.100
  - number: '4.101'
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in de [artikelen 4.98][ref1],
      [4.99][ref2] en [4.100][ref3], is toestemming als bedoeld in [artikel 4.7 van de wet][ref4] niet vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.101
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 4.102.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen is het beheer van een afvalverbrandingsinstallatie of een
      afvalmeeverbrandingsinstallatie in handen van een natuurlijk persoon die bekwaam is deze te beheren en wordt de
      installatie doelmatig geëxploiteerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2
    text: |-
      Een doelmatige exploitatie omvat ten minste operationele procedures, managementsystemen en technische voorzieningen
      die:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.a
    text: waarborgen dat de procescondities zijn afgestemd op de afvalstoffen die worden verbrand;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.b
    text: voor zover mogelijk de opstart- en afstookperiodes tot een minimum beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.c
    text: bedrijfsvoering buiten de ontwerpwaarden voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.d
    text: de emissies tijdens storingen en andere periodes met verhoogde emissies tot een minimum beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.e
    text: het nuttig gebruik van hulpstoffen en reagentia in de rookgasreiniging waarborgen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.f
    text: de hoeveelheden residuen en afvalstoffen en afvalwater uit de rookgasreiniging tot een minimum beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.g
    text: waarborgen dat vervuilde afvalwaterstromen voor reiniging niet worden verdund;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.h
    text: |-
      waarborgen dat slakken, bodemassen en rookgasreinigingsresiduen, voor zover haalbaar, nuttig hergebruikt kunnen
      worden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: 4.102.2.i
    text: |-
      diffuse emissies van geur, stof en vluchtige organische stoffen ten gevolge van transport, opslag en behandeling
      van afvalstoffen tot een minimum beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.102
  - number: '4.103'
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen wordt infectieus ziekenhuisafval rechtstreeks en in gesloten
      verpakking in de oven van een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie geplaatst, zonder
      voorafgaande vermenging met andere categorieën van afvalstoffen volgens de bijlage bij de afvalbeschikking.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.103
  - number: '4.104'
    text: Deze paragraaf is van toepassing op het maken van titaandioxide.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.104
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: type_activiteit
            type: string
            required: true
            description: Het type activiteit dat wordt verricht
            source: {}
        output:
          - name: paragraaf_4_5_van_toepassing
            type: boolean
            description: Of paragraaf 4.5 (titaandioxide) van toepassing is
        actions:
          - output: paragraaf_4_5_van_toepassing
            value:
              operation: EQUALS
              subject: $type_activiteit
              value: maken_titaandioxide
  - number: '4.105'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt jaarlijks voor 1 maart geïnformeerd over de omvang van de
      productie van titaandioxide over het daaraan voorafgaande kalenderjaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.105
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.106'
    text: Met een maatwerkregel of maatwerkvoorschrift worden de regels in deze paragraaf niet versoepeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.106
  - number: '4.107'
    text: 'De volgende afvalstoffen worden niet geloosd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.a
    text: vaste afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.b
    text: |-
      moederlogen afkomstig uit de filtratiefase na de hydrolyse van de oplossing van titanylsulfaat van een installatie
      die het sulfaatproces toepast, waaronder in ieder geval:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.b.1°
    text: |-
      zure afvalstoffen die met deze logen zijn gecombineerd en die gemiddeld meer dan 0,5% vrij zwavelzuur en
      verschillende zware metalen bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.b.2°
    text: de moederlogen die zijn verdund tot ze 0,5% of minder vrij zwavelzuur bevatten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.c
    text: |-
      afvalstoffen afkomstig van een ippc-installatie waarin het chlorideproces wordt toegepast en die meer dan 0,5% vrij
      zoutzuur en verschillende zware metalen bevatten, waaronder in ieder geval de afvalstoffen die zijn verdund tot ze
      0,5% of minder vrij zoutzuur bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: 4.107.d
    text: |-
      filterzouten, slibvormige afvalstoffen en vloeibare afvalstoffen die vrijkomen bij de behandeling door concentratie
      of neutralisatie van de afvalstoffen, bedoeld onder b en c, en die verschillende zware metalen bevatten, met
      uitzondering van geneutraliseerde en gefilterde of gedecanteerde afvalstoffen die alleen sporen van zware metalen
      bevatten en die een zuurgraad van meer dan pH 5,5 hebben, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.107
  - number: '4.108'
    text: |-
      Voor het afvalwater afkomstig van een installatie waarin het sulfaatproces wordt toegepast dat wordt geloosd op een
      oppervlaktewaterlichaam zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.108.
          Tabel 4.108 Emissiegrenswaarden


                  *Stof*


                  *Emissiegrenswaarde kalenderjaargemiddelde in kg/ton geproduceerde titaandioxide*


                  Sulfaat


                  100


                  Onopgeloste stoffen


                  2,5


                  IJzerverbindingen


                  0,6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.108
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: sulfaat_kg_per_ton
            type: number
            required: true
            description: Gemeten emissie sulfaat in kg per ton geproduceerde titaandioxide (kalenderjaargemiddelde)
            source: {}
          - name: onopgeloste_stoffen_kg_per_ton
            type: number
            required: true
            description: >-
              Gemeten emissie onopgeloste stoffen in
              kg per ton geproduceerde titaandioxide
              (kalenderjaargemiddelde)
            source: {}
          - name: ijzerverbindingen_kg_per_ton
            type: number
            required: true
            description: Gemeten emissie ijzerverbindingen in kg per ton geproduceerde titaandioxide (kalenderjaargemiddelde)
            source: {}
        output:
          - name: voldoet_sulfaat_tio2
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor sulfaat (max 100 kg/ton)
          - name: voldoet_onopgeloste_stoffen_tio2
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor onopgeloste stoffen (max 2,5 kg/ton)
          - name: voldoet_ijzer_tio2
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor ijzerverbindingen (max 0,6 kg/ton)
          - name: voldoet_emissies_sulfaatproces
            type: boolean
            description: Of wordt voldaan aan alle emissiegrenswaarden voor het sulfaatproces
        actions:
          - output: voldoet_sulfaat_tio2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $sulfaat_kg_per_ton
              value: 100
          - output: voldoet_onopgeloste_stoffen_tio2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $onopgeloste_stoffen_kg_per_ton
              value: 2.5
          - output: voldoet_ijzer_tio2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $ijzerverbindingen_kg_per_ton
              value: 0.6
          - output: voldoet_emissies_sulfaatproces
            value:
              operation: AND
              conditions:
                - $voldoet_sulfaat_tio2
                - $voldoet_onopgeloste_stoffen_tio2
                - $voldoet_ijzer_tio2
  - number: 4.109.1
    text: |-
      Voor het afvalwater afkomstig van een installatie waarin het chlorideproces wordt toegepast dat wordt geloosd op
      een oppervlaktewaterlichaam, zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.109.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.109
  - number: 4.109.2
    text: |-
      Als natuurlijk rutiel, synthetisch rutiel of slakken worden gebruikt, gelden de voor die grondstoffen bedoelde
      emissiegrenswaarden naar evenredigheid van de hoeveelheden waarin deze stoffen worden gebruikt.
            Tabel 4.109 Emissiegrenswaarden


                    *Stof*


                    *Emissiegrenswaarde kalenderjaargemiddelde in kg/ton geproduceerde titaandioxide*


                    Chloride bij gebruik van natuurlijk rutiel


                    130


                    Chloride bij gebruik van synthetisch rutiel


                    228


                    Chloride bij gebruik van slakken


                    330


                    Chloride bij gebruik van slakken voor emissies in zout water


                    450
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.109
  - number: 4.110.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: emissie_so2_so3_mg_nm3
            type: number
            required: true
            description: Gemeten emissie van SO2 en SO3 in de lucht uitgedrukt als SO2-equivalent in mg/Nm3
            source: {}
        output:
          - name: voldoet_emissie_so2_tio2
            type: boolean
            description: Of wordt voldaan aan de emissiegrenswaarde voor SO2/SO3 bij titaandioxideproductie
        actions:
          - output: voldoet_emissie_so2_tio2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $emissie_so2_so3_mg_nm3
              value: 6
  - number: 4.110.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.3
    text: Op het ontsluiten van een monster is NEN-EN-ISO 15587-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4.a
    text: 'voor de zuurgraad: NEN-EN-ISO 10523;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4.b
    text: 'voor onopgeloste stoffen: NEN-EN 872;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4.c
    text: 'voor ijzerverbindingen: NEN-EN-ISO 17294-2;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4.d
    text: 'voor sulfaat: NEN-ISO 22743; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: 4.110.4.e
    text: 'voor chloride: NEN-EN-ISO 15682.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.110
  - number: '4.111'
    text: |-
      Het afvalwater wordt ten minste elke zes maanden bemonsterd door een met het debiet evenredige steekproef over een
      periode van 24 uur, en geanalyseerd op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.111
  - number: 4.111.a
    text: de zuurgraad;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.111
  - number: 4.111.b
    text: sulfaat, bij het sulfaatproces; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.111
  - number: 4.111.c
    text: chloride, bij het chlorideproces.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.111
  - number: '4.112'
    text: |-
      Met het oog op het beschermen van de kwaliteit van de lucht wordt de emissie van zuurdruppels in de lucht
      voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.112
  - number: '4.113'
    text: |-
      Voor de emissie in de lucht bij het maken van titaandioxide via het chlorideproces en sulfaatproces zijn de
      emissiegrenswaarden voor titaandioxide de waarden, bedoeld in tabel 4.113, gemeten in een continue, periodieke of
      eenmalige meting.
          Tabel 4.113 Emissiegrenswaarden titaandioxide


                  *Stof*


                  *Emissiegrenswaarde in kalenderjaargemiddelde in kg/ton geproduceerde titaandioxide*


                  *Emissiegrenswaarde in uurgemiddelde in mg/Nm3*


                  Totaal stof, waarbij massastroom ten minste 200 g/uur


                  0,2


                  5


                  Totaal stof, waarbij massastroom minder dan 200 g/uur


                  0,2


                  20


                  Gasvormig zwaveldioxide en zwaveltrioxide


                  1,7


                  50
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.113
  - number: '4.114'
    text: |-
      Voor de emissie in de lucht bij het maken van titaandioxide via het chlorideproces zijn de emissiegrenswaarden de
      waarden, bedoeld in tabel 4.114, gemeten in een continue, periodieke of eenmalige meting.
          Tabel 4.114 Emissiegrenswaarden titaandioxide bij chlorideproces


                  *Stof*


                  *Emissiegrenswaarde in kalenderjaargemiddelde in kg/ton geproduceerde titaandioxide*


                  *Emissiegrenswaarde in daggemiddelde in mg/Nm3*


                  *Emissiegrenswaarde in momentane waarde in mg/Nm3*


                  Zoutzuur


                  0,1


                  10


                  Chloor


                  3


                  40
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.114
  - number: 4.115.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in [tabellen 4.113][ref1] en [4.114][ref2], is NEN-EN
      15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
  - number: 4.115.2
    text: 'Op het verrichten van een periodieke meting en parallelmeting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.a
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.b
    text: 'voor zoutzuur en chloor: NEN-EN 1911;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.c
    text: 'voor zwaveldioxide en zwaveltrioxide: NEN-EN 14791;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.d
    text: 'voor zuurstof: NEN-EN 14789;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.e
    text: 'voor waterdamp: NEN-EN 14790; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.2.f
    text: 'voor debiet: NEN-EN-ISO 16911-1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.3
    text: 'Op het verrichten van een continue meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.3.a
    text: 'voor totaal stof: NEN-EN 13284-2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.115.3.b
    text: 'voor de kwaliteitsborging: NEN-EN 14181.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.115
  - number: 4.116.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in de [artikelen 4.113][ref1] en [4.114][ref2], wordt
      voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
  - number: 4.116.2
    text: 'De meting van de emissies omvat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.a
    text: |-
      een continue meting van de emissieconcentratie van totaal stof afkomstig uit puntbronnen met een massastroom van
      ten minste 200 g/u;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.b
    text: |-
      een eenmalige meting van de emissieconcentratie van totaal stof afkomstig uit puntbronnen met een massastroom van
      minder dan 200 g/u;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.c
    text: |-
      als het sulfaatproces wordt gebruikt: een continue meting van de emissieconcentratie van gasvormig zwaveldioxide en
      zwaveltrioxide afkomstig van de ontsluiting en roosting uit installaties voor de concentratie van afvalzuren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.d
    text: 'als het chlorideproces wordt gebruikt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.d.1°
    text: een eenmalige meting van de emissieconcentratie van gasvormig zwaveldioxide en zwaveltrioxide;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.d.2°
    text: een continue meting van de emissieconcentratie van chloor afkomstig uit de voornaamste bronnen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.116.2.d.3°
    text: om het jaar een periodieke meting van de emissieconcentratie van zoutzuur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.116
  - number: 4.117.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
  - number: 4.117.2
    text: |-
      Een periodieke meting bestaat uit ten minste drie deelmetingen van een half uur. Als het meettechnisch niet
      mogelijk is om de deelmeting in die tijd te verrichten, kan de deelmeting ten hoogste twee uur duren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
  - number: 4.117.3
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.117.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
  - number: 4.117.4
    text: |-
      Het resultaat van de periodieke meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de uurgemiddelden of de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het
      percentage van de emissiegrenswaarde, bedoeld in tabel 4.117.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
  - number: 4.117.5
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
  - number: 4.117.6
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.115][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.117 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Debiet


                    20


                    Overig


                    40


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.117
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
  - number: 4.118.1
    text: Geautomatiseerde meetsystemen worden jaarlijks met parallelmetingen gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.118
  - number: 4.118.2
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens het eerste lid van toepassing is op de stof die wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.118
  - number: '4.119'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten hoogste vier weken na de controle, bedoeld in
      [artikel 4.118, eerste lid][ref2], geïnformeerd over de resultaten daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.119
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.5'
  - number: '4.120'
    text: |-
      Deze paragraaf is van toepassing op het maken van zwavel in een olieraffinaderij volgens het Clausproces of
      modificaties van het Clausproces.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.120
  - number: 4.121.1
    text: |-
      De omzettingsgraad van geconcentreerd waterstofsulfide van een installatie die zwavel produceert is per maand
      gemiddeld ten minste 99,8%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.121
  - number: 4.121.2
    text: |-
      Voor een bestaande installatie die zwavel produceert waarvoor op 1 januari 2016 een omgevingsvergunning voor het
      oprichten, het veranderen of het veranderen van de werking of het in werking hebben van een inrichting op grond van
      [artikel 2.1 van de Wet algemene bepalingen omgevingsrecht][ref1] in werking was en onherroepelijk was waarin een
      lagere omzettingsgraad is vastgelegd, geldt de in die omgevingsvergunning opgenomen lagere omzettingsgraad.


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.121
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 4.121.3
    text: |-
      Het tweede lid is niet van toepassing op een bestaande installatie die zwavel produceert waarvan de
      verwerkingscapaciteit van de totale installatie met meer dan 50% wordt verhoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.121
  - number: '4.122'
    text: Deze paragraaf is van toepassing op het maken van asfalt of asfaltproducten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.122
  - number: '4.123'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.122][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.123
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.7'
  - number: 4.123.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.123
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.123.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.123
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.124'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met bitumen worden asfalt en asfaltproducten gemaakt
      boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.124
  - number: 4.125.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het maken van asfalt
      of asfaltproducten geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.125
  - number: 4.125.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.125
  - number: '4.126'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.126
  - number: 4.126.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.126
  - number: 4.126.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.126
  - number: 4.126.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.126
  - number: 4.127.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.127, gemeten in een
      eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.127
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: gemeten_stof_concentratie_asfalt
            type: number
            required: true
            description: Gemeten concentratie totaal stof bij asfaltproductie in mg/Nm3
            source: {}
          - name: emissiegrenswaarde_stof_asfalt
            type: number
            required: true
            description: Emissiegrenswaarde uit tabel 4.127 in mg/Nm3
            source: {}
