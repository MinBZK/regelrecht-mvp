  - number: 4.366.1
    text: |-
      Met het oog op een doelmatig beheer van afvalstoffen worden autowrakken en wrakken van tweewielige motorvoertuigen
      met de daarin aanwezige materialen of onderdelen niet verwijderd of nuttig toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.366
  - number: 4.366.2
    text: 'Het eerste lid is niet van toepassing op:'
