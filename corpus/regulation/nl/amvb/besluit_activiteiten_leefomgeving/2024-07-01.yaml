        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.21.1
    text: |-
      Een Natura 2000-activiteit wordt in een programma, een omgevingsverordening of een ministeriële regeling op grond
      van [artikel 11.18][ref1], [11.19][ref2] of [11.20][ref3] alleen als vergunningvrij geval aangewezen als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: 11.21.1.a
    text: |-
      op voorhand op grond van objectieve gegevens met zekerheid kan worden uitgesloten dat die activiteit afzonderlijk
      of in combinatie met andere plannen of projecten significante gevolgen voor een Natura 2000-gebied kan hebben;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
  - number: 11.21.1.b
    text: |-
      een passende beoordeling als bedoeld in [artikel 8.74b van het Besluit kwaliteit leefomgeving][ref1] is
      uitgevoerd, waaruit de zekerheid is verkregen dat die activiteit de natuurlijke kenmerken van het Natura 2000-
      gebied niet zal aantasten; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.21.1.c
    text: |-
      voor zover het een aanwijzing in een omgevingsverordening of ministeriële regeling betreft: de activiteit,
      met inachtneming van [artikel 8.74b, tweede en derde lid, van het Besluit kwaliteit leefomgeving][ref1], kan
      worden gerechtvaardigd op grond van dwingende redenen van groot openbaar belang, het ontbreken van alternatieve
      oplossingen en het treffen van compenserende maatregelen die waarborgen dat de algehele samenhang van Natura 2000
      bewaard blijft.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.21.2
    text: |-
      Aan [artikel 11.19, tweede lid][ref1], of [11.20, tweede lid][ref2], wordt alleen toepassing gegeven, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: 11.21.2.a
    text: |-
      op voorhand op grond van objectieve gegevens met zekerheid kan worden uitgesloten dat de Natura 2000-activiteit
      afzonderlijk of in combinatie met andere plannen of projecten door de betrokken factor significante gevolgen voor
      een Natura 2000-gebied kan hebben; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
  - number: 11.21.2.b
    text: |-
      een passende beoordeling als bedoeld in [artikel 8.74b][ref1] is uitgevoerd, waaruit de zekerheid is verkregen
      dat de Natura 2000-activiteit door de betrokken factor de natuurlijke kenmerken van het Natura 2000-gebied niet
      zal aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.22.1
    text: 'Deze afdeling gaat over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
  - number: 11.22.1.a
    text: |-
      flora- en fauna-activiteiten, waarover regels zijn gesteld in de [artikelen 11.27][ref1] en [11.28][ref2] en de
      [paragrafen 11.2.2 tot en met 11.2.5][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
