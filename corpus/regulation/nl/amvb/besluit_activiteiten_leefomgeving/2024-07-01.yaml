        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1280.3
    text: |-
      Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste en tweede lid wordt
      voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1280
  - number: 4.1280.4
    text: Tarragrond wordt alleen op de landbodem toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1280
  - number: 4.1280.5
    text: |-
      Tarragrond die is ontstaan bij het schoonmaken van aardappelen die zijn behandeld met chloorprofam wordt niet
      toegepast in een gebied dat op grond van [artikel 7.6 van het Besluit kwaliteit leefomgeving][ref1] is aangewezen
      als onderdeel van het natuurnetwerk Nederland.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1280
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
  - number: 4.1281.1
    text: |-
      Deze paragraaf is van toepassing op het op of in de bodem of in een oppervlaktewaterlichaam toepassen van mijnsteen
      of vermengde mijnsteen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1281
  - number: 4.1281.2
    text: De regels van deze paragraaf gelden voor het toepassen van partijen afzonderlijk, tenzij anders is bepaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1281
  - number: 4.1281.3
    text: |-
      In deze paragraaf wordt verstaan onder: - *afleverbon:* afleverbon als bedoeld in
      [artikel 1 van het Besluit bodemkwaliteit][ref1];
        - *baggerspecie:* baggerspecie als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref2];
        - *aangewezen bodembeheergebied:* bodembeheergebied dat is aangewezen bij ministeriële regeling,
      in het omgevingsplan of in de waterschapsverordening op grond van [artikel 5.89o][ref3] of
      [6.3 van het Besluit kwaliteit leefomgeving][ref4];
        - *grond:* grond als bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref5]; en
        - *partij:* hoeveelheid materiaal die volgens de bij of krachtens het [Besluit bodemkwaliteit][ref6] gestelde
      regels als partij wordt aangemerkt.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel6
      [ref5]: https://wetten.overheid.nl/BWBR0022929#Artikel1
      [ref6]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1281
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '6'
      - id: ref5
        bwb_id: BWBR0022929
        artikel: '1'
      - id: ref6
        bwb_id: BWBR0022929
  - number: 4.1282.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 4.1281][ref1], te verrichten zonder dit ten minste een week
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1282.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.2.a
    text: |-
      een aanduiding van de functionele toepassing, bedoeld in [artikel 4.1285][ref1], in het kader waarvan in de
      mijnsteen of vermengde mijnsteen wordt toegepast, en een onderbouwing van de functionaliteit van het werk;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1282.2.b
    text: |-
      de dimensionering van de functionele toepassing in het kader waarvan de mijnsteen of vermengde mijnsteen wordt
      toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.2.c
    text: |-
      de hoeveelheid mijnsteen of vermengde mijnsteen in kubieke meters die in totaal in het kader van de functionele
      toepassing wordt toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.2.d
    text: |-
      de verwachte datum waarop voor het eerst mijnsteen of vermengde mijnsteen in het kader van de functionele
      toepassing wordt toegepast;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.2.e
    text: |-
      de coördinaten van de ontvangende landbodem, tenzij het adres daarvan is vermeld, of de coördinaten van het
      ontvangende oppervlaktewaterlichaam; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.2.f
    text: |-
      als gebruik wordt gemaakt van de mogelijkheid toe te passen in het kader van grootschalig toepassen als bedoeld in
      [artikel 4.1290, eerste lid][ref1]: de vermelding daarvan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1282.3
    text: |-
      Ten minste een week of ten minste vier weken als het gaat om het toepassen, bedoeld in het zesde lid, voordat de
      activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens, wordt een melding gedaan, met dien
      verstande dat een vermelding als bedoeld in het eerste lid, onder f, dat gebruik wordt gemaakt van de mogelijkheid
      van grootschalig toepassen volgens [artikel 4.1290, eerste lid][ref1], niet kan worden gewijzigd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1282.4
    text: 'Het eerste lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.4.a
    text: |-
      de mijnsteen of vermengde mijnsteen wordt toegepast door een natuurlijke persoon, anders dan in het uitoefenen van
      zijn beroep of bedrijf, en in het werk ten hoogste 25 m3 mijnsteen of vermengde mijnsteen in totaal in het kader
      van de functionele toepassing wordt toegepast; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.4.b
    text: |-
      de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1282.5
    text: |-
      Dit artikel is niet van toepassing als voor het werk waarin de mijnsteen of vermengde mijnsteen wordt toegepast, al
      eerder een melding is gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
  - number: 4.1282.6
    text: |-
      In afwijking van het eerste lid geldt een termijn van vier weken voor het grootschalig toepassen van mijnsteen of
      vermengde mijnsteen, bedoeld in [artikel 4.1290][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1282
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1283.1
    text: |-
      Ten minste een week voor het begin van de activiteit, bedoeld in [artikel 4.1281][ref1], worden de volgende
      gegevens en bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1283.1.a
    text: |-
      de naam en het adres van degene die de werkzaamheden gaat verrichten voor zover het gaat om het in opdracht
      toepassen van mijnsteen of vermengde mijnsteen op of in de landbodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.b
    text: de verwachte datum van het begin van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.c
    text: |-
      de verwachte datum waarop de functionele toepassing in het kader waarvan de mijnsteen of vermengde mijnsteen wordt
      toegepast, zal zijn voltooid of beëindigd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.d
    text: een milieuverklaring bodemkwaliteit die betrekking heeft op de toe te passen mijnsteen of vermengde mijnsteen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.e
    text: |-
      de gegevens waarop de milieuverklaring bodemkwaliteit is gebaseerd, bedoeld in
      [artikel 25e van het Besluit bodemkwaliteit][ref1], of een verwijzing naar het rapport waarin deze gegevens zijn
      opgenomen;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25e
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25e
  - number: 4.1283.1.f
    text: een milieuverklaring bodemkwaliteit die betrekking heeft op de ontvangende bodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.g
    text: het nummer en het type milieuverklaring bodemkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.h
    text: de naam van degene die de milieuverklaring bodemkwaliteit heeft afgegeven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.i
    text: de datum van afgifte van de milieuverklaring bodemkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.j
    text: |-
      voor zover het gaat om een milieuverklaring bodemkwaliteit als bedoeld onder d: de hoeveelheid mijnsteen of
      vermengde mijnsteen waarop de milieuverklaring bodemkwaliteit betrekking heeft, uitgedrukt in ton;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.k
    text: |-
      het adres van de locatie van herkomst van de mijnsteen of vermengde mijnsteen of de kadastrale aanduiding of
      coördinaten van die locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.l
    text: de kwaliteit van de mijnsteen of vermengde mijnsteen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.1.m
    text: |-
      de kwaliteitsklasse van de aangrenzende landbodem als sprake is van het toepassen van mijnsteen of vermengde
      mijnsteen in een afdeklaag op een grootschalige toepassing, bedoeld in [artikel 4.1290, vierde lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1283.1.n
    text: |-
      als voor de functionele toepassing waarin de mijnsteen of vermengde mijnsteen wordt toegepast eerder een melding
      als bedoeld in [artikel 4.1282][ref1] is gedaan: het kenmerk van die eerdere melding.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1283.2
    text: |-
      Het eerste lid is niet van toepassing als in het kader van de functionele toepassing in totaal ten hoogste 25 m3
      mijnsteen of vermengde mijnsteen wordt toegepast door een natuurlijke persoon, anders dan in het uitoefenen van
      zijn beroep of bedrijf.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1283.3
    text: |-
      Het eerste lid, aanhef en onder f, is niet van toepassing op grootschalig toepassen van mijnsteen of vermengde
      mijnsteen als bedoeld in [artikel 4.1290][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1283.4
    text: |-
      Het eerste lid, onder b, d, e en f, is niet van toepassing als de gegevens en bescheiden voor de functionele
      toepassing in het kader waarvan de mijnsteen of vermengde mijnsteen wordt toegepast al eerder zijn verstrekt en
      zich geen relevante wijzigingen hebben voorgedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1283
  - number: 4.1284.1
    text: 'Tijdens het aanbrengen van mijnsteen of vermengde mijnsteen zijn de volgende gegevens en bescheiden beschikbaar:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1284
  - number: 4.1284.1.a
    text: |-
      de gegevens en bescheiden, bedoeld in de [artikelen 4.1282][ref1] en [4.1283][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1284
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1284.1.b
    text: |-
      als deze op grond van het [Besluit bodemkwaliteit][ref1] bij de afgifte van de milieuverklaring bodemkwaliteit moet
      worden verstrekt: een afleverbon.


      [ref1]: https://wetten.overheid.nl/BWBR0022929
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1284
    references:
      - id: ref1
        bwb_id: BWBR0022929
  - number: 4.1284.2
    text: |-
      Milieuverklaringen bodemkwaliteit en afleverbonnen worden ten minste vijf jaar na het aanbrengen van de mijnsteen
      of vermengde mijnsteen bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1284
  - number: 4.1285.1
    text: |-
      Met het oog op het beschermen van het milieu wordt mijnsteen of vermengde mijnsteen alleen toegepast in een bij
      ministeriële regeling aangewezen toepassingsgebied voor het aanleggen, in stand houden, herstellen, veranderen of
      uitbreiden van een functionele toepassing die is aangewezen in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2
    text: 'Als functionele toepassing worden aangewezen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2.a
    text: bouwwerken, dijken, wegen of spoorwegen, met inbegrip van daartoe behorende geluidswallen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2.b
    text: |-
      ophogingen op of in de landbodem voor het verwezenlijken van bedrijventerreinen, woningbouwlocaties, natuurgronden,
      tuinen of recreatieterreinen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2.c
    text: |-
      ophogingen op of in de landbodem voor het herstellen of verbeteren van de bodemgesteldheid van een terrein of het
      bevorderen van de natuurwaarde of recreatieve waarde van een terrein;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2.d
    text: |-
      afdeklagen op grootschalig toegepaste mijnsteen of vermengde mijnsteen als bedoeld in
      [artikel 4.1290, vierde lid, onder c][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1285.2.e
    text: |-
      herinrichtingen van winplaatsen of voormalige winplaatsen voor delfstoffen, met uitzondering van winplaatsen
      en voormalige winplaatsen in oppervlaktewaterlichamen, voor het verwezenlijken van bedrijventerreinen,
      woningbouwlocaties, natuurgronden, tuinen of recreatieterreinen of het stabiliseren van wanden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.2.f
    text: |-
      voorzieningen in oppervlaktewaterlichamen, met uitzondering van diepe plassen, voor het voorkomen of beperken van
      overstromingen of wateroverlast, het bevorderen van de natuurwaarde of recreatieve waarde daarvan, het bevorderen
      van de doorvaart van de scheepvaart of het herstellen of verbeteren van de ligging, vorm, afmeting en constructie
      van een waterstaatswerk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: 4.1285.3
    text: |-
      Mijnsteen of vermengde mijnsteen wordt, voor zover de mijnsteen of vermengde mijnsteen een afvalstof is, alleen
      toegepast als sprake is van een nuttige toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1285
  - number: '4.1286'
    text: |-
      Met het oog op het zuinig gebruik van grondstoffen, het doelmatig beheer van afvalstoffen en het voorkomen of
      beperken van verontreiniging van een oppervlaktewaterlichaam worden mijnsteen of vermengde mijnsteen niet toegepast
      in een grotere hoeveelheid dan voor het voltooien van de functionele toepassing in het kader waarvan de mijnsteen
      of vermengde mijnsteen wordt toegepast, volgens gangbare civieltechnische, bouwtechnische, milieuhygiënische,
      ecologische of esthetische maatstaven redelijkerwijs nodig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1286
  - number: 4.1287.1
    text: 'Met het oog op het beschermen van het milieu worden alleen mijnsteen of vermengde mijnsteen toegepast, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1287
  - number: 4.1287.1.a
    text: |-
      daarin ten hoogste 20 gewichtsprocent steenachtig materiaal, met uitzondering van mijnsteen, of hout voorkomt en
      dat bodemvreemde materiaal al voorafgaand aan het ontgraven of bewerken in de bodem aanwezig was en vermenging
      daarmee redelijkerwijs niet kon worden voorkomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1287
  - number: 4.1287.1.b
    text: |-
      daarin alleen sporadisch ander bodemvreemd materiaal dan steenachtig materiaal of hout voorkomt en dat bodemvreemde
      materiaal al voorafgaand aan het ontgraven of bewerken in de bodem aanwezig was, voor zover redelijkerwijs niet kan
      worden gevergd dat het uit de mijnsteen of vermengde mijnsteen wordt verwijderd voordat de mijnsteen of vermengde
      mijnsteen wordt toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1287
  - number: 4.1287.2
    text: |-
      Als in mijnsteen of vermengde mijnsteen bodemvreemd materiaal voorkomt, is tijdens het toepassen van de mijnsteen
      of vermengde mijnsteen bewijs voorhanden dat het materiaal al voorafgaand aan het ontgraven of bewerken in de
      vermengde mijnsteen aanwezig was.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1287
  - number: 4.1288.1
    text: |-
      Met het oog op het beschermen van het milieu wordt op de landbodem alleen mijnsteen
      of vermengde mijnsteen toegepast die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, vierde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1288.1.a
    text: de kwaliteitsklasse waarin de ontvangende landbodem volgens dat besluit is ingedeeld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
  - number: 4.1288.1.b
    text: |-
      de bodemfunctieklasse landbouw/natuur, wonen of industrie, waarin de ontvangende landbodem volgens
      [artikel 5.89p van het Besluit kwaliteit leefomgeving][ref1] is ingedeeld, of de bodemfunctieklasse landbouw/
      natuur als de ontvangende landbodem niet in de bodemfunctieklasse wonen of industrie is ingedeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.1288.2
    text: |-
      Met het oog op het beschermen van het milieu wordt in een oppervlaktewaterlichaam alleen mijnsteen of vermengde
      mijnsteen toegepast die voldoet aan:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
  - number: 4.1288.2.a
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, vierde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor de
      kwaliteitsklasse waarin de ontvangende waterbodem volgens dat besluit is ingedeeld;


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1288.2.b
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, tweede lid, van het Besluit bodemkwaliteit][ref1], die gelden
      voor grond van de kwaliteitsklasse industrie als sprake is van toepassen van vermengde mijnsteen en het gaat om
      mijnsteen vermengd met grond, in een oppervlaktewaterlichaam; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1288.2.c
    text: |-
      de kwaliteitseisen, bedoeld in [artikel 25d, derde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor
      baggerspecie van de kwaliteitsklasse matig verontreinigd als sprake is van toepassen van vermengde mijnsteen en het
      gaat om mijnsteen vermengd met baggerspecie, in een oppervlaktewaterlichaam.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1288.3
    text: |-
      Met een milieuverklaring bodemkwaliteit wordt aangetoond dat aan het bepaalde in het eerste en tweede lid wordt
      voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1288
  - number: 4.1289.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het toepassen van mijnsteen of vermengde mijnsteen van een
      kwaliteit die niet voldoet aan de kwaliteitseisen, bedoeld in [artikel 4.1288, eerste of tweede lid][ref1],
      alleen worden toegestaan als de toe te passen mijnsteen of vermengde mijnsteen afkomstig is uit een aangewezen
      bodembeheergebied en ook weer binnen dat gebied wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1289
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1289.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het toepassen van
      mijnsteen of vermengde mijnsteen waarin een verontreinigende stof aanwezig is in een zodanige concentratie
      dat de mijnsteen of vermengde mijnsteen volgens de voor die stof geldende kwaliteitseis, bedoeld in
      [artikel 25d, tweede of derde lid, van het Besluit bodemkwaliteit][ref1], als sterk verontreinigde mijnsteen of
      sterk verontreinigde vermengde mijnsteen moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1289
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1289.2.a
    text: |-
      de toe te passen mijnsteen of vermengde mijnsteen is ontgraven uit een locatie waar de bodem diffuus sterk met de
      stof is verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1289
  - number: 4.1289.2.b
    text: |-
      de mijnsteen of vermengde mijnsteen wordt toegepast op een locatie waar de bodem al voor het toepassen diffuus
      sterk met de stof was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1289
  - number: 4.1290.1
    text: |-
      Mijnsteen of vermengde mijnsteen mag in afwijking van [artikel 4.1288, eerste en tweede lid][ref1], ook volgens
      het bepaalde in het tweede, derde en vierde lid van dit artikel worden toegepast als sprake is van toepassen voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1290.1.a
    text: |-
      een weg of spoorweg als bedoeld in [artikel 4.1285, tweede lid, onder a][ref1], waarin bij het aanleggen ten
      minste 5.000 m3 mijnsteen of vermengde mijnsteen in een laagdikte van ten minste 0,5 m zal worden toegepast;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1290.1.b
    text: |-
      een ander functionele toepassing als bedoeld in [artikel 4.1285, tweede lid, onder a][ref1], of een functionele
      toepassing als bedoeld in artikel 4.1285, tweede lid, onder d of e, waarin bij het aanleggen ten minste 5.000 m3
      mijnsteen of vermengde mijnsteen in een laagdikte van ten minste 2 m zal worden toegepast; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1290.1.c
    text: |-
      het in stand houden, herstellen, veranderen of uitbreiden van een functionele toepassing als bedoeld onder a of b,
      die is aangelegd na 1 juli 2008.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.2
    text: |-
      Met het oog op het beschermen van het milieu worden alleen mijnsteen of vermengde
      mijnsteen toegepast van een kwaliteit die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, zesde lid, van het Besluit bodemkwaliteit][ref1], die gelden voor de kwaliteit «emissiearme
      mijnsteen» of de kwaliteit «emissiearme vermengde mijnsteen», en de kwaliteitseisen, bedoeld in artikel 25d, tweede
      en derde lid, van het Besluit bodemkwaliteit, die gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1290.2.a
    text: |-
      grond van de kwaliteitsklasse industrie als sprake is van het op of in de landbodem toepassen van mijnsteen of
      vermengde mijnsteen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.2.b
    text: |-
      grond van de kwaliteitsklasse industrie als sprake is van het in een oppervlaktewaterlichaam toepassen van
      vermengde mijnsteen, als het gaat om mijnsteen vermengd met grond; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.2.c
    text: |-
      baggerspecie van de kwaliteitsklasse matig verontreinigd als sprake is van het in een oppervlaktewaterlichaam
      toepassen van vermengde mijnsteen, als het gaat om mijnsteen vermengd met baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.3
    text: 'In een geval als bedoeld in het eerste lid, onder a of c in samenhang met a:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.3.a
    text: |-
      wordt op de toegepaste mijnsteen of vermengde mijnsteen, met uitzondering van mijnsteen of vermengde mijnsteen die
      in bermen en taluds wordt toegepast, een aaneengesloten laag bouwstoffen aangebracht en in stand gehouden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.3.b
    text: |-
      worden in de bermen en taluds tot de dichtst bijgelegen fysieke afscheiding met een afstand van ten
      hoogste 10 m vanaf de rand van de verharding van de weg of het ballastbed van de spoorweg alleen mijnsteen
      of vermengde mijnsteen toegepast van een kwaliteit die voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 25d, tweede lid, van het Besluit bodemkwaliteit][ref1], die gelden voor grond van de kwaliteitsklasse
      industrie.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1290.4
    text: |-
      In een geval als bedoeld in het eerste lid, onder b of c in samenhang met b, wordt op de toegepaste mijnsteen of
      vermengde mijnsteen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.4.a
    text: een aaneengesloten laag bouwstoffen aangebracht en in stand gehouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.4.b
    text: |-
      een afdeklaag van grond of baggerspecie aangebracht en in stand gehouden met een laagdikte van ten minste 0,5
      m, waarin alleen grond of baggerspecie worden toegepast van een kwaliteit die voldoet aan de kwaliteitseisen die
      volgens [artikel 4.1272, eerste of tweede lid][ref1], gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.124'
  - number: 4.1290.4.b.1°
    text: het toepassen van grond of baggerspecie op of in de aangrenzende landbodem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.4.b.2°
    text: |-
      het toepassen van grond of baggerspecie op de aangrenzende waterbodem als sprake is van toepassen in een
      oppervlaktewaterlichaam en dat oppervlaktewaterlichaam niet tot landbodem wordt ontwikkeld; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.4.c
    text: |-
      een afdeklaag van mijnsteen of vermengde mijnsteen aangebracht en in stand gehouden met een laagdikte van ten
      minste 0,5 m, waarin alleen mijnsteen of vermengde mijnsteen worden toegepast van een kwaliteit die voldoet aan de
      kwaliteitseisen die volgens [artikel 4.1288, eerste en tweede lid][ref1], gelden voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1290.4.c.1°
    text: het toepassen van mijnsteen of vermengde mijnsteen op of in de aangrenzende landbodem; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1290.4.c.2°
    text: |-
      het toepassen van mijnsteen of vermengde mijnsteen op of in de aangrenzende waterbodem als sprake is van toepassen
      in een oppervlaktewaterlichaam en dat oppervlaktewaterlichaam niet tot landbodem wordt ontwikkeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1290
  - number: 4.1291.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan het grootschalig toepassen van mijnsteen
      of vermengde mijnsteen van een kwaliteit die niet voldoet aan de kwaliteitseisen, bedoeld in
      [artikel 4.1288, eerste en tweede lid][ref1], alleen worden toegestaan als de toe te passen mijnsteen of vermengde
      mijnsteen afkomstig is uit een aangewezen bodembeheergebied en ook weer binnen dat gebied wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1291
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.125'
  - number: 4.1291.2
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift als bedoeld in het eerste lid kan het toepassen van
      mijnsteen of vermengde mijnsteen waarin een verontreinigende stof aanwezig is in een zodanige concentratie
      dat de mijnsteen of vermengde mijnsteen volgens de voor die stof geldende kwaliteitseis, bedoeld in
      [artikel 25d, tweede, derde of vierde lid, van het Besluit bodemkwaliteit][ref1], als sterk verontreinigde
      mijnsteen of sterk verontreinigde vermengde mijnsteen moet worden aangemerkt, alleen worden toegestaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1291
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 4.1291.2.a
    text: |-
      de toe te passen mijnsteen of vermengde mijnsteen is ontgraven uit een locatie waar de bodem diffuus sterk met de
      stof is verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1291
  - number: 4.1291.2.b
    text: |-
      de mijnsteen of vermengde mijnsteen wordt toegepast op een locatie waar de bodem al voor het toepassen diffuus
      sterk met de stof was verontreinigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1291
  - number: 4.1292.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een stookinstallatie waarin de volgende stoffen worden
      gestookt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.a
    text: aardgas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.b
    text: propaangas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.c
    text: butaangas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.d
    text: vergistingsgas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.e
    text: biodiesel die voldoet aan NEN-EN 14214;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.f
    text: lichte olie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.g
    text: halfzware olie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.h
    text: gasolie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.1.i
    text: |-
      rie-biomassa en pellets gemaakt uit rie-biomassa, als wordt gestookt in een stookinstallatie met een nominaal
      thermisch ingangsvermogen van minder dan 15 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.2
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.2.a
    text: |-
      stookinstallaties waarop [paragraaf 4.3][ref1], [4.4][ref2] of [4.7][ref3] van toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
    references:
      - id: ref1
