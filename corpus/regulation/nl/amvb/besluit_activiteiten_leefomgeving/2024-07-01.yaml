        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.472a.2.d
    text: de hoeveelheid LPG die ten hoogste wordt opgeslagen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.2.e
    text: een inschatting van de doorzet van LPG in kubieke meters per jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472a
  - number: 4.472a.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
