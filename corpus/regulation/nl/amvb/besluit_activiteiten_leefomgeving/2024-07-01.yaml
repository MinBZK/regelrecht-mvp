  - number: 3.14b.4
    text: |-
      Als op 30 juni 2022 een maatwerkvoorschrift van kracht was op grond van een besluit krachtens
      [artikel 3.14a, tweede lid of derde lid, van het Activiteitenbesluit milieubeheer][ref1] waarin normen met een
      andere waarde voor geluidhinder waren vastgesteld, voldoet het geluid door het opwekken van elektriciteit met een
      windturbine of windpark aan de normen met die andere waarde.


