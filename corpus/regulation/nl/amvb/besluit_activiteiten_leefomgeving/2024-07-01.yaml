  - number: 11.29.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van de [artikelen 11.34][ref1], [11.35][ref2] en [11.68][ref3] en de
      [paragrafen 11.2.6][ref4], [11.2.8][ref5] en [11.2.9][ref6], tenzij anders is bepaald.


