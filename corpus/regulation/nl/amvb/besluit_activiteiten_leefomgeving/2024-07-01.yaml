        paragraaf: '4.118'
  - number: 4.1217.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem worden op gronden die zijn beteeld met gewassen als
      bedoeld in [artikel 4.1215, tweede lid, onder a en b, onder 1° en 2°][ref1], alleen stikstofhoudende meststoffen
      gebracht als de hoeveelheid stikstof, rekening houdend met de minerale stikstof en met de toevoer van stikstof door
      netto-mineralisatie van de organische stikstof in die gronden, onvoldoende is om te voldoen aan de behoefte van
      het gewas.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1217
    references:
