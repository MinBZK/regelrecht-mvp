    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.402][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.404
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: 4.404.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.404
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.404.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.404
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.405'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met alcohol en zuren worden levensmiddelen of wordt
      voeder gemaakt of bewerkt boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.405
  - number: 4.406.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het maken of
      bewerken van levensmiddelen of voeder geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.406
  - number: 4.406.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.406
  - number: 4.407.1
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater wordt vethoudend
      afvalwater dat wordt geloosd in een vuilwaterriool voor vermenging met ander afvalwater geleid door:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.407
  - number: 4.407.1.a
    text: een vetafscheider en slibvangput volgens NEN-EN 1825-1 en NEN-EN 1825-2;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.407
  - number: 4.407.1.b
    text: |-
      een vetafscheider en slibvangput die zijn geplaatst voor 14 september 2004 en zijn afgestemd op de hoeveelheid
      afvalwater die wordt geloosd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.407
  - number: 4.407.1.c
    text: |-
      een flocculatieafscheider die is geplaatst voor 1 januari 2013 en is afgestemd op de hoeveelheid afvalwater die
      wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.407
  - number: 4.407.2
    text: Dit afvalwater wordt niet door een biologische zuivering geleid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.407
  - number: '4.408'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.408
  - number: 4.408.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.408
  - number: 4.408.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.408
  - number: 4.408.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.408
  - number: '4.409'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.409
  - number: '4.410'
    text: |-
      [Bijlage IV][ref1] bevat een indeling van goederen in de stuifklassen S1 tot en met S5.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.410
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.411.1
    text: |-
      Voor de emissie in de lucht bij het drogen, malen, branden of roosteren van voedingsmiddelen, dranken of
      grondstoffen of goederen, ingedeeld in de stuifklassen S1, S2, S3 of S4, is de emissiegrenswaarde van totaal stof 5
      mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.411
  - number: 4.411.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.411
  - number: 4.411.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de afgezogen emissies door een geschikte filtrerende afscheider
      worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.411
  - number: 4.412.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.412
  - number: 4.412.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.412
  - number: 4.413.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.413
  - number: 4.413.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.411, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.413
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: 4.414.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.414
  - number: 4.414.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.414
  - number: 4.414.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.414
  - number: 4.414.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.412][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.414
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: '4.415'
    text: Met het oog op het beschermen van de gezondheid worden emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.415
  - number: '4.416'
    text: |-
      [Artikel 4.406][ref1] is niet van toepassing op het lozen op een oppervlaktewaterlichaam van afvalwater afkomstig
      van het maken of bewerken van levensmiddelen of voeder dat voor de inwerkingtreding van dit besluit al rechtmatig
      werd verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht
      voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.416
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.28'
  - number: '4.418'
    text: |-
      Deze paragraaf is van toepassing op het regelen van aardgasdruk en het meten van de hoeveelheid of kwaliteit van
      aardgas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.418
  - number: 4.419.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.418][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.29'
  - number: 4.419.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
  - number: 4.419.2.a
    text: |-
      de coördinaten van de installatie voor het regelen van aardgasdruk en de installatie voor het meten van de
      hoeveelheid of kwaliteit van aardgas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
  - number: 4.419.2.b
    text: |-
      de ontwerpcapaciteit in normaal kubieke meters per uur en de werkdruk in kilopascal aan de inlaatzijde van de
      installaties; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
  - number: 4.419.2.c
    text: de opstelling van de installaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
  - number: 4.419.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
  - number: 4.419.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.419
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.420'
    text: |-
      Met het oog op het waarborgen van de veiligheid is een bedrijfsnoodplan of een veiligheidsbeheerssysteem ingevoerd
      met gegevens en bescheiden over:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.420.a
    text: het gebouw, de technische installaties, de locaties van gevaarlijke stoffen en de beschikbare hulpmiddelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.420.b
    text: de interne organisatie en taken en verantwoordelijkheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.420.c
    text: de actieplannen en maatregelen gebaseerd op mogelijke calamiteiten en incidenten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.420.d
    text: de interne en externe meldingsstructuur bij calamiteiten en incidenten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.420.e
    text: het beheer van het bedrijfsnoodplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.420
  - number: 4.421.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand van de installatie voor het regelen van aardgasdruk
      en de installatie voor het meten van de hoeveelheid of kwaliteit van aardgas:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.a
    text: |-
      tot de begrenzing van de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1], wordt verricht ten minste de
      afstand, bedoeld in de vijfde kolom van tabel 4.421; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.421.1.b
    text: |-
      tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties of tot beperkt kwetsbare gebouwen en beperkt
      kwetsbare locaties die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit zijn toegelaten, ten minste de afstand, bedoeld in de zesde en zevende kolom van tabel
      4.421, als inachtneming van de afstand, bedoeld onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.1°
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.1°.i
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.1°.ii
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.1°.iii
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.2°
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.1.b.3°
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.2
    text: |-
      De afstand is ten minste de helft van de afstand, bedoeld in het eerste lid, als het gaat om een ondergronds of
      semi-ondergronds opgestelde installatie en het gasvoerende deel geheel ondergronds ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.3
    text: |-
      Het eerste lid, onder b, is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en
      kwetsbare locaties:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
  - number: 4.421.3.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.421.3.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.421
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.421.4
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, onder b.
