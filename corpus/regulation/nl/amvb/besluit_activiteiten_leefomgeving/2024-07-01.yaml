        afdeling: '6.2'
  - number: 6.20.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.20
  - number: 6.20.4
    text: |-
      Dit artikel is niet van toepassing op reinigingswerkzaamheden die periodiek worden verricht en waarbij alleen
      vuilafzetting wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.20
  - number: 6.21.1
    text: |-
      Ten minste vier weken voor het begin van een activiteit als bedoeld in [artikel 6.16][ref1] worden aan het bevoegd
      gezag, bedoeld in [artikel 6.3][ref2], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.21
    references:
