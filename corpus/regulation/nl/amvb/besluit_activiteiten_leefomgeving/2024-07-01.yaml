  - number: 4.1013.2.a
    text: |-
      geen woonfunctie, bijeenkomstfunctie, onderwijsfunctie, celfunctie, gezondheidszorgfunctie of logiesfunctie ligt,
      gelden de hoeveelheden, bedoeld in het eerste lid, onder b, per brandcompartiment;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
  - number: 4.1013.2.b
    text: |-
      een woonfunctie, bijeenkomstfunctie, onderwijsfunctie, celfunctie, gezondheidszorgfunctie of logiesfunctie ligt die
      een functionele binding heeft met de activiteit, bedoeld in [hoofdstuk 3][ref1], gelden de hoeveelheden, bedoeld in
      het eerste lid, onder b, per brandcompartiment; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
