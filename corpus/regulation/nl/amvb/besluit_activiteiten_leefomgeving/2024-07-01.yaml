  - number: 6.55.1.b
    text: het lozen van meer dan 5.000 m3 water per uur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c
    text: 'het lozen van water door een uitstroomvoorziening, behalve voor het lozen van:'
