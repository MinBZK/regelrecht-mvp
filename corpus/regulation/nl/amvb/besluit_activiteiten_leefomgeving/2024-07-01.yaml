  - number: 4.190.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: 4.190.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: 4.190.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: 4.190.3.a
    text: 'voor chroom VI: NEN-ISO 11083;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: 4.190.3.b
    text: |-
      voor chroom, koper, lood, nikkel, tin, zilver en zink: NEN 6966, NEN-EN-ISO 17294-2, NEN-EN-ISO 11885 of NEN 6965,
      waarbij elementen worden ontsloten volgens NEN-EN-ISO 15587-1 of NEN-EN-ISO 15587-2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: 4.190.3.c
    text: 'voor vrij cyanide: NEN-EN-ISO 14403.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.190
  - number: '4.191'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.191
  - number: 4.191.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.191
  - number: 4.191.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.191
  - number: 4.191.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.191
  - number: '4.192'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.192
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.193.1
    text: |-
      Met het oog op het voorkomen of beperken van diffuse emissies in de lucht worden anorganische deklagen op metalen
      in een gesloten ruimte aangebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.193
  - number: 4.193.2
    text: |-
      Bij het aanbrengen van anorganische deklagen op metalen wordt geschoopeerd in een gesloten ruimte waar onderdruk
      heerst en afzuiging is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.193
  - number: '4.194'
    text: |-
      Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt bij het aanbrengen van metaallagen
      op metalen de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.194
  - number: 4.195.1
    text: |-
      Voor de emissie in de lucht bij het aanbrengen van anorganische deklagen op metalen zijn de emissiegrenswaarden de
      waarden, bedoeld in tabel 4.195, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.195
  - number: 4.195.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.195, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.195
  - number: 4.195.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de emissies door een geschikte filtrerende afscheider worden
      gevoerd.
            Tabel 4.195 Emissiegrenswaarden bij aanbrengen anorganische deklagen


