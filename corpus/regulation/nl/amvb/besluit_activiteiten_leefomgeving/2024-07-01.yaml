    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37
  - number: 6.37.2.b
    text: beregening, bevloeiing of veedrenking, als de hoeveelheid te onttrekken grondwater minder is dan 60 m3/u; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37
  - number: 6.37.2.c
    text: in andere gevallen, als de hoeveelheid te onttrekken grondwater minder is dan 10 m3/u.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37
  - number: 6.37a.1
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 6.34, eerste lid, onder b en c][ref1], wordt de in elk
      kwartaal onttrokken hoeveelheid grondwater of in de bodem gebracht water gemeten met een nauwkeurigheid van ten
      minste 95%.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.3
        afdeling: '6.2'
  - number: 6.37a.2
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 6.34, eerste lid, onder c][ref1], wordt de kwaliteit van
      het in de bodem te brengen water gemeten en geanalyseerd volgens de in tabel 6.37a opgenomen parameters met de in
      die tabel aangegeven frequentie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.37a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.3
        afdeling: '6.2'
  - number: 6.37a.3
    text: |-
      De analyse van de monsters vindt plaats volgens de op grond van
      [artikel 14, tweede lid, aanhef en onder b, van het Drinkwaterbesluit][ref1] gestelde regels.
