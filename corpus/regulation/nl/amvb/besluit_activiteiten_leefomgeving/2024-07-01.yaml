  - number: 4.287a
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor stofklasse gO.2,
      bedoeld in [artikel 4.280][ref1], niet van toepassing op emissie door het solderen van metalen van stoffen die
      tot de inwerkingtreding van dit besluit onder stofklasse gO.3 vielen, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding van dit besluit. Tot eerstgenoemde
      datum geldt in dat geval voor deze stofklassen een emissiegrenswaarde van 100 mg/Nm3 bij een ondergrens van 250
      kg/jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.287a
