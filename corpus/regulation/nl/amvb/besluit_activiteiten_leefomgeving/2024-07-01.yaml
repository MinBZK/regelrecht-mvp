    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.443.1
    text: |-
      Voor het berekenen van de oppervlakte van de andere toegevoegde delen of de totale oppervlakte dat in de
      oplosmiddeleninstallatie wordt gecoat, wordt gebruik gemaakt van computergesteund ontwerp of een andere
      gelijkwaardige methode.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.443
  - number: 4.443.2
    text: |-
      De oppervlakte van de producten, bedoeld in [tabel 4.438b][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.443
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.443.2.a
    text: |-
      de berekende oppervlakte van het totale elektroforetische coatingvlak en de oppervlakte van delen die eventueel in
      latere fasen van het coatingproces worden toegevoegd en met dezelfde coating worden bekleed; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.443
  - number: 4.443.2.b
    text: de totale oppervlakte van het product dat in de oplosmiddeleninstallatie is gecoat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.443
  - number: 4.443.3
    text: |-
      Voor de coating van de producten, bedoeld in [tabel 4.438b][ref1], hebben de totale emissiegrenswaarden betrekking
      op alle procesfasen in dezelfde oplosmiddeleninstallatie vanaf elektroforetische coating of een ander coatingproces
      tot en met het uiteindelijk in de was zetten en polijsten van de toplaag, en de oplosmiddelen die bij het reinigen
      van procesapparatuur worden gebruikt, met inbegrip van spuitcabines en andere vaste apparatuur, zowel tijdens als
      buiten de productiefase.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.443
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.444.1
    text: |-
      De oppervlakte van het elektroforetisch coatingvlak, bedoeld in [artikel 4.443][ref1], wordt berekend volgens
      de formule: waarbij wordt verstaan onder: A: oppervlakte; m: gewicht product zonder coating; h: gemiddelde dikte
      metaalplaat; ρ: dichtheid metaalplaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.444
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.444.2
    text: Deze formule wordt ook gebruikt voor onderdelen van metaalplaat die niet gecoat zijn met elektroforese.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.444
  - number: 4.445.1
    text: |-
      Als een bestaande installatie een belangrijke wijziging ondergaat of na de wijziging voor het eerst onder het
      toepassingsbereik van deze paragraaf valt, wordt als nieuwe oplosmiddeleninstallatie aangemerkt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.1.a
    text: het deel dat verandert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.1.b
    text: het deel waarvan de werking verandert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.2
    text: |-
      Onder belangrijke wijziging wordt verstaan: een wijziging in de massa organische oplosmiddelen die in een
      oplosmiddeleninstallatie gemiddeld op een dag ten hoogste als input wordt gebruikt en leidt tot een emissie van
      vluchtige organische stoffen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.2.a
    text: |-
      van meer dan 25%, voor een oplosmiddeleninstallatie waarin activiteiten worden verricht die vallen binnen de
      laagste drempelwaarde interval van de nummers 1, 3, 4, 5, 8, 10, 13, 16 of 17 van [tabel 4.438a][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.445.2.b
    text: |-
      van meer dan 25%, voor een oplosmiddeleninstallatie waarin activiteiten worden verricht die minder dan 10 ton/jaar
      verbruiken en vallen onder de nummers 2, 6, 7, 9, 11, 12, 14, 15, 18, 19 of 20 van [tabel 4.438a][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.445.2.c
    text: van meer dan 10%, voor een oplosmiddeleninstallatie die niet onder a of b valt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.3
    text: |-
      De massa organische oplosmiddelen, bedoeld in het tweede lid, is de oplosmiddeleninput als de
      oplosmiddeleninstallatie bij de ontwerpoutput in andere omstandigheden dan opstarten, stilleggen en onderhoud
      functioneert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: 4.445.4
    text: |-
      Het eerste lid is niet van toepassing als de totale emissies van de oplosmiddeleninstallatie niet hoger zijn dan
      het geval zou zijn als het deel dat de wijziging heeft ondergaan als een nieuwe oplosmiddeleninstallatie zou zijn
      aangemerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.445
  - number: '4.446'
    text: |-
      Bij het opstarten en stilleggen van de oplosmiddeleninstallatie worden voorzorgsmaatregelen getroffen om de
      emissies van vluchtige organische stoffen tot een minimum te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.446
  - number: 4.447.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden, de diffuse emissiegrenswaarden en de totale
      emissiegrenswaarden de waarden, bedoeld in de [tabellen 4.438a][ref1] en 4.438b, gemeten in een continue of
      periodieke meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.447
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.447.2
    text: |-
      De totale emissiegrenswaarden zijn niet van toepassing als voor een activiteit als bedoeld in de
      [tabellen 4.438a][ref1] en 4.438b aan de emissiegrenswaarden en de diffuse emissiegrenswaarden wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.447
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.447.3
    text: |-
      De emissiegrenswaarden en de diffuse emissiegrenswaarden zijn niet van toepassing als voor een activiteit als
      bedoeld in de [tabellen 4.438a][ref1] en 4.438b aan de totale emissiegrenswaarden wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.447
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.447.4
    text: |-
      Het eerste lid is niet van toepassing als voor een activiteit wordt voldaan aan een reductieprogramma als
      bedoeld in [artikel 4.462][ref1] waarmee de emissies in dezelfde mate worden beperkt als door toepassing van de
      emissiegrenswaarden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.447
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.448.1
    text: |-
      In afwijking van [tabel 4.438a][ref1] is de emissiegrenswaarde bij het impregneren van hout niet van toepassing op
      het impregneren met creosoot.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.448
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.448.2
    text: |-
      In afwijking van [tabel 4.438a][ref1] geldt de emissiegrenswaarde bij oppervlaktereiniging niet in milligram
      koolstof per kubieke meter, maar in massa van de verbindingen in milligram per kubieke meter.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.448
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.449.1
    text: |-
      In afwijking van [tabel 4.438a][ref1] is de emissiegrenswaarde 150 mg C/Nm3 bij het maken van geneesmiddelen, het
      bandlakken, het aanbrengen van een lijmlaag of de bewerking van rubber, als technieken worden gebruikt waarbij
      oplosmiddelenhergebruik mogelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.449
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.449.2
    text: |-
      In afwijking van [tabel 4.438a][ref1] is de gecombineerde emissiegrenswaarde 150 mg C/Nm3 voor het coating- en
      droogproces bij andere coatingprocessen als bedoeld bij nummer 8 in tabel 4.438a met een ondergrens van 15 ton/
      jaar, als genitrogeneerde oplosmiddelen worden gebruikt met technieken waarbij oplosmiddelenhergebruik mogelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.449
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.450.1
    text: |-
      De emissiegrenswaarden, bedoeld in [tabel 4.438a][ref1], voor andere coatingprocessen als bedoeld bij nummer 8 in
      die tabel zijn van toepassing op coatingprocessen en droogprocessen waarbij de vrijkomende vluchtige organische
      stoffen beheerst worden afgevangen en uitgestoten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.450
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.450.2
    text: |-
      Aan de emissiegrenswaarden voor andere coatingprocessen als bedoeld bij nummer 8 in [tabel 4.438a][ref1] hoeft
      niet te worden voldaan als vrijkomende vluchtige organische stoffen niet beheerst kunnen worden afgevangen en
      uitgestoten omdat dit technisch en economisch niet mogelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.450
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: '4.451'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee de emissiegrenswaarden of de diffuse emissiegrenswaarde, bedoeld
      in [artikel 4.447][ref1], worden verhoogd, wordt alleen gesteld:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.451
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.451.a
    text: |-
      als wordt aangetoond dat het voldoen aan de diffuse emissiegrenswaarde technisch niet mogelijk en niet
      kostenefficiënt is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.451
  - number: 4.451.b
    text: |-
      voor andere coatingprocessen als bedoeld bij nummer 8 in [tabel 4.438a][ref1], als daarbij de vrijkomende vluchtige
      organische stoffen niet beheerst kunnen worden afgevangen en uitgestoten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.451
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: '4.452'
    text: |-
      In afwijking van [tabel 4.438a][ref1] is de diffuse emissiegrenswaarde voor een bestaande oplosmiddeleninstallatie
      bij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.452
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.452.a
    text: 'illustratiediepdruk: 15%;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.452
  - number: 4.452.b
    text: 'bandlakken: 10%; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.452
  - number: 4.452.c
    text: 'het maken van geneesmiddelen: 15%.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.452
  - number: '4.453'
    text: |-
      De diffuse emissiegrenswaarde, bedoeld in [tabel 4.438a][ref1], is niet van toepassing op oplosmiddelen die als
      bestanddeel van een mengsel in een gesloten container worden verkocht, bij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.453
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.453.a
    text: het maken van coatingmengsels, lak, inkt en kleefstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.453
  - number: 4.453.b
    text: de bewerking van rubber; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.453
  - number: 4.453.c
    text: het maken van geneesmiddelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.453
  - number: 4.454.1
    text: |-
      De resten van oplosmiddelen in het eindproduct bij heatsetrotatie-offdruk zijn geen onderdeel van de diffuse
      emissie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.454
  - number: 4.454.2
    text: |-
      De diffuse emissiegrenswaarde bij overige oppervlaktereiniging is niet van toepassing als wordt aangetoond dat het
      gemiddelde gehalte aan organische oplosmiddelen van het reinigingsmateriaal dat al in de oplosmiddeleninstallatie
      wordt gebruikt ten hoogste 30 gewichtsprocenten is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.454
  - number: 4.454.3
    text: |-
      Aan de diffuse emissiegrenswaarde hoeft niet te worden voldaan bij andere coatingprocessen als bedoeld bij nummer
      8 in [tabel 4.438a][ref1], als vrijkomende vluchtige organische stoffen niet beheerst kunnen worden afgevangen en
      uitgestoten omdat dit technisch niet mogelijk is of niet kostenefficiënt is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.454
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: '4.455'
    text: |-
      In afwijking van [tabel 4.438a][ref1] is de totale emissiegrenswaarde voor een bestaande oplosmiddeleninstallatie
      bij het maken van geneesmiddelen 15% van de oplosmiddeleninput.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.455
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.456.1
    text: |-
      Er wordt continu gemeten of een afgaskanaal waarop nabehandelingsapparatuur is aangesloten en die aan
      de uitlaatzijde gemiddeld in totaal meer dan 10 kg organische koolstof per uur uitstoot, voldoet aan de
      emissiegrenswaarden, met uitzondering van de diffuse-emissiegrenswaarden, en de totale emissiegrenswaarden, bedoeld
      in [artikel 4.447][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.456
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.456.2
    text: |-
      In een oplosmiddeleninstallatie die voor totaal organische koolstof gemiddeld minder dan 10 kg/u uitwerpt, wordt
      om de drie jaar de hoeveelheid totaal organische koolstof gemeten. Tijdens elke meting worden ten minste drie
      meetresultaten geregistreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.456
  - number: 4.456.3
    text: |-
      Het eerste en tweede lid zijn niet van toepassing als nabehandelingsapparatuur niet nodig is om te voldoen aan de
      emissiegrenswaarden of het reductieplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.456
  - number: 4.456.4
    text: |-
      Het voldoen aan de emissiegrenswaarde voor de coating van voertuigen en het overspuiten van voertuigen, bedoeld in
      punt 6 van [tabel 4.438a][ref1], wordt aangetoond op basis van metingen die om de vijftien minuten worden verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.456
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: '4.457'
    text: |-
      Bij een continue meting wordt aan de emissiegrenswaarden, met uitzondering van de diffuse-emissiegrenswaarden, en
      de totale emissiegrenswaarden, bedoeld in [tabel 4.438a][ref1], voldaan, als onder normale bedrijfsomstandigheden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.457
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.457.a
    text: |-
      het 24-uursgemiddelde voor een bepaalde stof niet hoger is dan de emissiegrenswaarde voor die stof, waarbij
      het 24-uursgemiddelde wordt berekend van alle geldige metingen tijdens een periode van 24 uur waarin een
      oplosmiddeleninstallatie onder normale omstandigheden in bedrijf is, met uitzondering van het opstarten en
      stilleggen van de installatie en het onderhoud van de apparatuur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.457
  - number: 4.457.b
    text: geen van de uurgemiddelden hoger is dan anderhalf maal de emissiegrenswaarden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.457
  - number: '4.458'
    text: |-
      Bij een periodieke meting wordt aan de emissiegrenswaarden, met uitzondering van de diffuse-emissiegrenswaarden, en
      de totale emissiegrenswaarden, bedoeld in [tabel 4.438a][ref1], voldaan als bij die meting:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.458
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.458.a
    text: het gemiddelde van alle meetresultaten onder normale omstandigheden niet hoger is dan de emissiegrenswaarden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.458
  - number: 4.458.b
    text: geen van de uurgemiddelden onder normale omstandigheden hoger is dan anderhalf maal de emissiegrenswaarden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.458
  - number: '4.459'
    text: |-
      Op basis van de totale massa organische koolstof die wordt uitgestoten, wordt bepaald of aan de
      emissiegrenswaarden, met uitzondering van de diffuse-emissiegrenswaarden, en de totale emissiegrenswaarden wordt
      voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.459
  - number: 4.460.1
    text: |-
      Gasvolumes mogen worden toegevoegd om de afgassen af te koelen of te verdunnen als dit technisch gerechtvaardigd
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.460
  - number: 4.460.2
    text: |-
      De toegevoegde gasvolumes worden niet betrokken bij het vaststellen van de massaconcentratie van de
      verontreinigende stof in het afgas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.460
  - number: '4.461'
    text: |-
      Het referentiepunt voor de emissiebeperking in een reductieprogramma komt zo goed mogelijk overeen met de emissie
      die het resultaat zou zijn als er geen beperkende maatregelen zouden worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.461
  - number: 4.462.1
    text: |-
      Aan eenzelfde mate van emissiebeperking als bedoeld in [artikel 4.447, vierde lid][ref1], wordt, bij een
      oplosmiddeleninstallatie waar voor het product een constant gehalte aan vaste stof kan worden aangenomen, in ieder
      geval voldaan als de feitelijke emissie kleiner is dan of gelijk is aan de beoogde emissie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.462
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.462.2
    text: De feitelijke emissie wordt bepaald aan de hand van de oplosmiddelenboekhouding.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.462
  - number: 4.462.3
    text: |-
      De beoogde emissie wordt berekend door de jaarlijkse referentie-emissie voor een activiteit waarbij de ondergrens
      wordt overschreden, te vermenigvuldigen met het reductiepercentage, bedoeld in tabel 4.462.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.462
  - number: 4.462.4
    text: |-
      De jaarlijkse referentie-emissie voor een activiteit wordt berekend door de totale massa aan vaste stof
      in de hoeveelheid coating, inkt, lak of kleefstof die per jaar wordt gebruikt, te vermenigvuldigen met de
      vermenigvuldigingsfactor, bedoeld in tabel 4.462.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.462
  - number: 4.462.5
    text: |-
      Onder vaste stof wordt in dit artikel verstaan: elk materiaal in coating, inkt, lak en kleefstof dat vast wordt als
      het water of de vluchtige organische stoffen zijn verdampt.
