  - number: 4.431d
    text: 'Met het oog op een doelmatig beheer van afvalstoffen worden afvalstoffen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.431d
    machine_readable:
      definitions:
        max_opslag_nuttige_toepassing_jaar: 3
        max_opslag_verwijdering_jaar: 1
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: doel_opslag
            type: string
            required: true
            description: >-
              Doel van de opslag:
              nuttige_toepassing of verwijdering
            source: {}
          - name: opslagduur_jaar
            type: number
            required: true
            description: Duur van de opslag van afvalstoffen in jaren
            source: {}
        output:
          - name: maximale_opslagduur_jaar
            type: number
            description: De maximaal toegestane opslagduur in jaren
          - name: voldoet_opslagduur
            type: boolean
            description: Of de opslagduur voldoet aan het wettelijk maximum
        actions:
          - output: maximale_opslagduur_jaar
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $doel_opslag
                    value: nuttige_toepassing
                  then: $max_opslag_nuttige_toepassing_jaar
              default: $max_opslag_verwijdering_jaar
          - output: voldoet_opslagduur
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $opslagduur_jaar
              value: $maximale_opslagduur_jaar
