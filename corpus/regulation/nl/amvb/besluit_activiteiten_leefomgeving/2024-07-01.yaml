  - number: 9.41.1
    text: |-
      Met het oog op het veilig en doelmatig gebruik van een hoofdspoorweg of bijzondere spoorweg wordt geen grondwater
      onttrokken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.41
  - number: 9.41.2
    text: Graafwerkzaamheden hebben een diepte van niet meer dan 1,20 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.41
  - number: '9.42'
    text: |-
      Met het oog op het veilig en doelmatig gebruik van een hoofdspoorweg of bijzondere spoorweg wordt bij het
      verrichten van werkzaamheden een afstand aangehouden van 5 m tot de buitenkant van spanningvoerende delen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.42
  - number: 9.43.1
    text: |-
      Deze paragraaf is van toepassing op activiteiten in het beperkingengebied met betrekking tot een hoofdspoorweg of
      bijzondere spoorweg, anders dan activiteiten als bedoeld in de [paragrafen 9.2.1 tot en met 9.2.3][ref1], als het
      gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
        paragraaf: 9.2.1
        afdeling: '9.2'
  - number: 9.43.1.a
    text: het verrichten van werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.43
  - number: 9.43.1.b
    text: het storten van stoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.43
  - number: 9.43.1.c
    text: het opslaan van licht ontvlambare stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.43
  - number: 9.43.2
    text: |-
      Het eerste lid geldt niet voor activiteiten die worden verricht door of namens de spoorwegbeheerder in het kader
      van het aanleggen, het wijzigen of het beheren van een hoofdspoorweg of bijzondere spoorweg of de regeling van het
