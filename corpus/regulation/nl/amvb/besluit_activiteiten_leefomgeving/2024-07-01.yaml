  - number: 4.213.2
    text: |-
      Het eerste lid is niet van toepassing als bij het maken en coaten van vormen en kernen in kleigebonden of chemisch
      gebonden zand voor het gieten van metalen de maatregel, bedoeld in [artikel 4.208, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.213
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.12'
  - number: 4.213.3
    text: |-
      Het eerste lid is niet van toepassing als bij het uitbreken en ontzanden van gietstukken de maatregelen, bedoeld in
      [artikel 4.208, vierde lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.213
