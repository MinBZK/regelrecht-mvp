    text: |-
      Deze paragraaf is van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het brengen
      van stoffen, water of warmte in de Noordzee, anders dan bedoeld in de [paragrafen 7.2.1][ref1], [7.2.5][ref2] en
      [7.2.6][ref3].


