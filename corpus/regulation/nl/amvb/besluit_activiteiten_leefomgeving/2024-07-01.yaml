        paragraaf: '4.34'
  - number: '4.466'
    text: |-
      Op basis van de som van de massaconcentratie van de vluchtige organische stoffen die worden gebruikt, wordt bepaald
      of wordt voldaan aan de emissiegrenswaarden, bedoeld in [tabel 4.465][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.466
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.467.1
    text: 'Er wordt een oplosmiddelenboekhouding bijgehouden waarmee:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
  - number: 4.467.1.a
    text: 'wordt aangetoond dat wordt voldaan aan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
  - number: 4.467.1.a.1°
    text: |-
      de emissiegrenswaarden, de diffuse emissiegrenswaarden of de totale emissiegrenswaarden, bedoeld in
      [artikel 4.447, eerste tot en met derde lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.467.1.a.2°
    text: |-
      als een reductieprogramma als bedoeld in [artikel 4.462][ref1] wordt toegepast: dat programma;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.467.1.b
    text: de mogelijkheden voor emissiebeperking in de toekomst worden gespecificeerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
  - number: 4.467.1.c
    text: informatie kan worden verstrekt over het verbruik en de emissie van oplosmiddelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
  - number: 4.467.2
    text: |-
      Een oplosmiddelenboekhouding omvat een periode van twaalf maanden en wordt uiterlijk dertien weken na afloop van
      die periode afgesloten, en voldoet aan de [artikelen 4.468 tot en met 4.471][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.467
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.468.1
    text: |-
      Om vast te stellen of aan een reductieprogramma wordt voldaan, wordt de totale input van organische oplosmiddelen
      per twaalf maanden in een installatie, verminderd met eventuele vluchtige organische stoffen die voor hergebruik
      worden teruggewonnen, berekend volgens de formule: *V* = *I*1 – *0*8.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.468
  - number: 4.468.2
    text: |-
      Voor het berekenen van de jaarlijkse referentie-emissie, bedoeld in [tabel 4.462][ref1], wordt de hoeveelheid vaste
      stof die in coatings wordt gebruikt bepaald volgens de formule, bedoeld in het eerste lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.468
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.468.3
    text: |-
      Onder vaste stof wordt in dit artikel verstaan: elk materiaal in coating, inkt, lak en kleefstof dat vast wordt als
      het water of de vluchtige organische stoffen zijn verdampt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.468
  - number: '4.469'
    text: |-
      Om vast te stellen of aan een totale emissiegrenswaarde wordt voldaan, wordt de totale emissie berekend volgens de
      formule: '*E* = *F* + *0*1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.469
  - number: 4.470.1
    text: |-
      Om vast te stellen of aan een diffuse emissiegrenswaarde wordt voldaan, wordt de diffuse emissie berekend volgens
      de formule: *F* = *I*1 – *0*1 – *05 –*0*6 – 0*7 – *0*8; of *F* – *0*2 + *0*3 + *0*4 + *0*9.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.470
  - number: 4.470.2
    text: |-
      De diffuse emissie wordt bepaald met een korte serie metingen, die niet hoeft worden herhaald zolang de
      oplosmiddeleninstallatie niet wordt gewijzigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.470
  - number: 4.470.3
    text: |-
      De diffuse emissie wordt uitgedrukt als een percentage van de oplosmiddeleninput, berekend volgens de formule: *I*
      = *I*1 + *I*2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.470
  - number: '4.471'
    text: |-
      Onder de symbolen die worden gebruikt in de [artikelen 4.468][ref1], [4.469][ref2] en [4.470][ref3] wordt verstaan:
      E: 'totale emissie; F: diffuse emissie; V: verbruik; I: input; I1: hoeveelheid organische oplosmiddelen die is'
      aangekocht al dan niet in mengsels, die in het proces worden ingevoerd tijdens de termijn waarover de massabalans
      wordt bepaald; I2: hoeveelheid oplosmiddelen die worden hergebruikt, waarbij teruggewonnen oplosmiddelen worden
      meegerekend als ze worden gebruikt om de activiteit te verrichten; O: output; O1: hoeveelheid vluchtige organische
      stoffen in de emissies via de schoorsteen; O2: diffuse emissie van vluchtige organische stoffen in water, rekening
      houdend met de afvalwaterzuivering bij het berekenen van O5; O3: diffuse emissie van vluchtige organische stoffen
      in elk product, die achterblijft als verontreiniging of als residu in de producten die bij de activiteit zijn
      gemaakt; O4: diffuse emissie van vluchtige organische stoffen in de lucht; O5: organische oplosmiddelen en
      organische verbindingen die door chemische of fysische reacties verloren gaan, met inbegrip van hoeveelheden
      organische oplosmiddelen die door verbranding, een andere zuivering van afgassen of door afvalwaterzuivering worden
      vernietigd of door adsorptie worden opgevangen, als die niet bij O6, O7 of O8 worden meegerekend; O6: organische
      oplosmiddelen in ingezamelde afvalstoffen; O7: organische oplosmiddelen al dan niet in mengsels als product met
      handelswaarde voor de verkoop, met uitzondering van oplosmiddelen die vallen onder O3; O8: hoeveelheid organische
      oplosmiddelen, met inbegrip van organische oplosmiddelen in mengsels, die voor hergebruik is teruggewonnen maar
      niet opnieuw bij de activiteit wordt gebruikt en die niet onder O7 valt; O9: hoeveelheid vluchtige organische
      stoffen, die op andere wijze dan bedoeld onder O1 tot en met O8 vrijkomt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.471
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
      - id: ref3
        bwb_id: BWBR0041330
