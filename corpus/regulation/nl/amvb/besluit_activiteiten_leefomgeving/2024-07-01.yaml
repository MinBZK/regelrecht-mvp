        artikel: '3'
  - number: 11.131.1.e.3°
    text: |-
      voordat tot aanleg van de houtopstand was overgegaan, aan Onze Minister voor Natuur en Stikstof kennis is gegeven
      van het tijdstip en de plaats van de aanleg en die Minister de ontvangst van de kennisgeving heeft bevestigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.e.4°
    text: |-
      de houtopstand blijkens de kennisgeving binnen een periode van 40 jaar na het op het formulier vermelde tijdstip
      van aanleg in zijn geheel zou worden geveld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2
    text: 'De gedragscode, bedoeld in het eerste lid, onder d, waarborgt dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2.a
    text: geen afbreuk wordt gedaan aan bijzondere natuurwaarden of landschappelijke waarden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2.b
    text: de te vellen houtopstanden geen deel uitmaken van een boskern;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2.c
    text: herbeplanting op een bosbouwkundig verantwoorde wijze plaatsvindt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2.d
    text: |-
      de grond waarop herbeplanting plaatsvindt ten minste dezelfde kwaliteit heeft als de grond waarop de gevelde
      houtopstand zich bevond; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.2.e
    text: |-
      de grond waarop de herbeplanting plaatsvindt ten minste een gelijke oppervlakte heeft als de grond waarop de
      gevelde houtopstand zich bevond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: '11.132'
    text: 'Het is verboden te handelen in strijd met:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.132
  - number: 11.132.a
    text: |-
      artikel 4, eerste lid, van verordening (EG) nr. 2173/2005 van de Raad van de Europese Unie van 20 december 2005
      inzake de opzet van een FLEGT-vergunningen-systeem voor de invoer van hout in de Europese Gemeenschap (PbEU 2005,
      L 347); en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.132
  - number: 11.132.b
    text: |-
      de artikelen 4 en 5 van verordening (EU) nr. 995/2010 tot vaststelling van de verplichtingen van marktdeelnemers
      die hout en houtproducten op de markt brengen (PbEU 2010, L 295).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.132
  - number: '11.133'
    text: |-
      Met een maatwerkvoorschrift kan alleen worden afgeweken van [artikel 11.132][ref1] als dit in overeenstemming is
      met de bij of krachtens de daar genoemde verordening (EG) nr. 2173/2005 of verordening (EU) nr. 995/2010 gestelde
      regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.133
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: '12.1'
    text: Dit hoofdstuk gaat over landinrichtingsactiviteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.1
  - number: '12.2'
    text: De regels in dit hoofdstuk zijn gesteld met het oog op een doelmatige uitvoering van een inrichtingsprogramma.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.2
  - number: '12.3'
    text: |-
      Voor een landinrichtingsactiviteit zijn gedeputeerde staten van de provincie waarbinnen de betrokken onroerende
      zaken geheel of in hoofdzaak liggen het bevoegd gezag dat een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.3
  - number: '12.4'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.4
  - number: 12.5.1
    text: |-
      Degene die een landinrichtingsactiviteit verricht en weet of redelijkerwijs kan vermoeden dat die activiteit
      nadelige gevolgen kan hebben voor het belang, bedoeld in [artikel 12.2][ref1], is vanaf het moment waarop het
      ontwerp van het inrichtingsprogramma ter inzage is gelegd, verplicht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel12
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.1'
  - number: 12.5.1.a
    text: alle maatregelen te nemen die redelijkerwijs van diegene kunnen worden gevraagd om die gevolgen te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.5
  - number: 12.5.1.b
    text: |-
      voor zover die gevolgen niet kunnen worden voorkomen: die gevolgen zoveel mogelijk te beperken of ongedaan te
      maken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.5
  - number: 12.5.1.c
    text: |-
      als die gevolgen onvoldoende kunnen worden beperkt: die activiteit achterwege te laten voor zover dat
      redelijkerwijs van diegene kan worden gevraagd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.5
  - number: 12.5.2
    text: |-
      Deze plicht houdt in ieder geval in dat de doelmatige uitvoering van een inrichtingsprogramma niet ernstig wordt
      belemmerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.5
  - number: 12.6.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld over de [artikelen 12.5][ref1] en [12.7][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel12
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.2'
  - number: 12.6.2
    text: |-
      Met een maatwerkvoorschrift kan worden afgeweken van [artikel 12.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel12
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.2'
  - number: '12.7'
    text: |-
      De waarde van de tot een herverkavelingsblok behorende onroerende zaken wordt na de bekendmaking van het
      inrichtingsprogramma niet veranderd. Dit geldt niet voor het veranderen van de waarde als gevolg van een
      landinrichtingsactiviteit die nodig is voor een normale bedrijfsvoering.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel12.7
  - number: '13.1'
    text: 'Dit hoofdstuk gaat over:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.1
  - number: 13.1.a
    text: rijksmonumentenactiviteiten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.1
  - number: 13.1.b
    text: andere activiteiten die een rijksmonument of een voorbeschermd rijksmonument betreffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.1
  - number: 13.1.c
    text: archeologische toevalsvondsten in de exclusieve economische zone, buiten de aansluitende zone.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.1
  - number: '13.2'
    text: De regels in dit hoofdstuk zijn gesteld met het oog op het behoud van cultureel erfgoed.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.2
  - number: '13.3'
    text: |-
      Tenzij in de [artikelen 13.4][ref1] of [13.5][ref2] anders is bepaald, is voor een rijksmonumentenactiviteit of een
      andere activiteit die een rijksmonument of een voorbeschermd rijksmonument betreft het college van burgemeester en
      wethouders het bevoegd gezag dat een maatwerkvoorschrift kan stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: '13.4'
    text: |-
      Voor een rijksmonumentenactiviteit of een andere activiteit die een rijksmonument of een voorbeschermd
      rijksmonument betreft die geheel of in hoofdzaak wordt verricht in de territoriale zee die buiten een gemeente
      ligt, is Onze Minister van Infrastructuur en Waterstaat het bevoegd gezag dat een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.4
  - number: '13.5'
    text: |-
      Voor een rijksmonumentenactiviteit of een andere activiteit die een rijksmonument of een voorbeschermd
      rijksmonument betreft, die wordt verricht op dezelfde locatie als een activiteit als bedoeld in
      [afdeling 3.3][ref1] waarvoor een door gedeputeerde staten verleende omgevingsvergunning geldt, zijn gedeputeerde
      staten het bevoegd gezag dat een maatwerkvoorschrift kan stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: '13.6'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.6
  - number: '13.7'
    text: |-
      Degene die een rijksmonumentenactiviteit of een andere activiteit die een rijksmonument of een voorbeschermd
      rijksmonument betreft, verricht en weet of redelijkerwijs kan vermoeden dat die activiteit kan leiden tot het
      beschadigen of vernielen van een rijksmonument of een voorbeschermd rijksmonument, is verplicht alle maatregelen te
      nemen die redelijkerwijs van diegene kunnen worden gevraagd om deze beschadiging of vernieling te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.7
  - number: 13.8.1
    text: 'Een maatwerkregel kan in het omgevingsplan worden gesteld:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.8
  - number: 13.8.1.a
    text: |-
      over [artikel 13.7][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.8.1.b
    text: |-
      als het gaat om inpandige wijzigingen als bedoeld in [artikel 13.11, eerste lid, onder b][ref1], in aanvulling
      op [artikel 13.7][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.8.2
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op het belang, bedoeld in [artikel 13.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.9.1
    text: |-
      Een maatwerkregel over inpandige wijzigingen als bedoeld in [artikel 13.11, eerste lid, onder b][ref1], kan alleen
      inhouden een verbod om die activiteit te verrichten zonder dit ten minste twee werkdagen voor het begin ervan aan
      het bevoegd gezag te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.9.2
    text: 'De maatwerkregel kan alleen inhouden dat die melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.b
    text: een aanduiding van het monument;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.c
    text: een aanduiding van de inpandige wijzigingen en waar die plaatsvinden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.d
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.e
    text: de verwachte datum van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: 13.9.2.f
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.9
  - number: '13.10'
    text: |-
      Een maatwerkvoorschrift kan over een andere activiteit die een rijksmonument of een voorbeschermd rijksmonument
      betreft worden gesteld over [artikel 13.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 13.11.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, van de wet][ref1], om zonder omgevingsvergunning een
      rijksmonumentenactiviteit te verrichten, geldt niet voor een rijksmonumentenactiviteit met betrekking tot een
      monument, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 13.11.1.a
    text: |-
      noodzakelijke reguliere werkzaamheden die zijn gericht op het behoud van de monumentale waarden, als detaillering,
      profilering, vormgeving, materiaalsoort en kleur niet worden gewijzigd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.1.b
    text: |-
      alleen inpandige wijzigingen van een onderdeel van het monument dat uit het oogpunt van monumentenzorg geen waarde
      heeft; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.1.c
    text: 'het binnen een monument dat als begraafplaats in gebruik is met inachtneming van de monumentale waarden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.1.c.1°
    text: plaatsen van grafmonumenten, met inbegrip van het tijdelijk verwijderen daarvan en het bijwerken van het opschrift;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.1.c.2°
    text: doen van begravingen of asbijzettingen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.1.c.3°
    text: ruimen van graven waarvan het grafmonument niet is beschermd als rijksmonument.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, van de wet][ref1], om zonder omgevingsvergunning een
      rijksmonumentenactiviteit te verrichten, geldt niet voor een rijksmonumentenactiviteit met betrekking tot een
      archeologisch monument, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 13.11.2.a
    text: een sondering of grondboring met een boordiameter van niet meer dan 10 cm; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: 13.11.2.b
    text: het dichten van een recent verstoringsgat van niet meer dan 1 m3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.11
  - number: '13.12'
    text: 'Het is verboden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.12
  - number: 13.12.a
    text: een rijksmonument of een voorbeschermd rijksmonument te beschadigen of te vernielen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.12
  - number: 13.12.b
    text: |-
      aan rijksmonumenten, voor zover het monumenten betreft, onderhoud te onthouden dat voor de instandhouding daarvan
      noodzakelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.12
  - number: '13.13'
    text: |-
      Bij een archeologische toevalsvondst als bedoeld in [artikel 13.1, onder c][ref1], gedaan bij het verrichten
      van een activiteit als bedoeld in [artikel 7.1, eerste lid][ref2], is [artikel 5.10 van de Erfgoedwet][ref3] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref3]: https://wetten.overheid.nl/BWBR0037521#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel13.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref3
        bwb_id: BWBR0037521
        artikel: '5'
  - number: '14.1'
    text: Dit hoofdstuk gaat over activiteiten die werelderfgoed betreffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.1
  - number: '14.2'
    text: |-
      De regels in dit hoofdstuk zijn gesteld met het oog op het behoud van de uitzonderlijke universele waarde van
      werelderfgoed.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.2
  - number: '14.3'
    text: |-
      Tenzij in de [artikelen 14.4][ref1] of [14.5][ref2] anders is bepaald, is voor een activiteit die werelderfgoed
      betreft het college van burgemeester en wethouders het bevoegd gezag dat een maatwerkvoorschrift kan stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '14'
        hoofdstuk: '14'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '14'
        hoofdstuk: '14'
  - number: '14.4'
    text: |-
      Voor een activiteit die werelderfgoed betreft die geheel of in hoofdzaak wordt verricht in de territoriale
      zee die buiten een gemeente ligt, is Onze Minister van Infrastructuur en Waterstaat het bevoegd gezag dat een
      maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.4
  - number: '14.5'
    text: |-
      Voor een activiteit die werelderfgoed betreft, die wordt verricht op dezelfde locatie als een activiteit als
      bedoeld in [afdeling 3.3][ref1] waarvoor een door gedeputeerde staten verleende omgevingsvergunning geldt, zijn
      gedeputeerde staten het bevoegd gezag dat een maatwerkvoorschrift kan stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: '14.6'
    text: |-
      Aan dit hoofdstuk wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.6
  - number: '14.7'
    text: |-
      Degene die een activiteit verricht die werelderfgoed betreft en weet of redelijkerwijs kan vermoeden dat die
      activiteit kan leiden tot het beschadigen of vernielen van werelderfgoed of een onderdeel daarvan, is, voor zover
      dit de uitzonderlijke universele waarde raakt, verplicht alle maatregelen te nemen die redelijkerwijs van diegene
      kunnen worden gevraagd om deze beschadiging of vernieling te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.7
  - number: 14.8.1
    text: |-
      Een maatwerkregel kan in het omgevingsplan worden gesteld over [artikel 14.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '14'
        hoofdstuk: '14'
  - number: 14.8.2
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op het belang, bedoeld in [artikel 14.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.8
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '14'
        hoofdstuk: '14'
  - number: 14.9.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld over [artikel 14.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '14'
        hoofdstuk: '14'
  - number: 14.9.2
    text: |-
      Een maatwerkvoorschrift kan worden gesteld met het oog op het belang, bedoeld in [artikel 14.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel14
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel14.9
    references:
      - id: ref1
