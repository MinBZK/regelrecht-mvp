  - number: '7.8'
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.8
  - number: 7.8.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.8
  - number: 7.8.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.8
  - number: 7.8.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.8
  - number: 7.8.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.8
  - number: '7.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in deze afdeling, worden die ondertekend
      en voorzien van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.9
  - number: 7.9.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.9
  - number: 7.9.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.9
  - number: 7.9.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.9
  - number: 7.9.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.9
  - number: 7.10.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in de
      [artikelen 7.8][ref1] en [7.9][ref2], wijzigen, worden de gewijzigde gegevens verstrekt aan het bevoegd gezag,
      bedoeld in deze afdeling.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.10.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.10
  - number: 7.11.1
    text: |-
      Op verzoek van het bevoegd gezag, bedoeld in [artikel 7.3][ref1], worden over lozingsactiviteiten als bedoeld
      in [artikel 7.1][ref2] de gegevens en bescheiden verstrekt die nodig zijn om te bezien of de algemene regels en
      maatwerkvoorschriften voor de activiteit toereikend zijn, gezien de ontwikkelingen van de technische mogelijkheden
      tot het beschermen van de chemische en ecologische kwaliteit van watersystemen en de ontwikkelingen met betrekking
      tot die kwaliteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.11.2
    text: |-
      Gegevens en bescheiden worden verstrekt voor zover degene die de activiteit verricht er redelijkerwijs de
      beschikking over kan krijgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.11
  - number: '7.12'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 7.3][ref1] of [7.4][ref2], en het Kustwachtcentrum worden onverwijld
      geïnformeerd over een ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: '7.13'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [artikel 7.3][ref1] of [7.4][ref2], en aan het Kustwachtcentrum:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.13.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.13
  - number: 7.13.b
    text: |-
      gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.13
  - number: 7.13.c
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '7.14'
    text: |-
      Met een maatwerkvoorschrift worden de [artikelen 7.12][ref1] en [7.13][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.15.1
    text: |-
      Met het oog op het belang van wijziging van een waterstaatswerk in beheer bij het Rijk worden bouwwerken, werken
      die geen bouwwerken zijn of andere objecten, waarvoor geen omgevingsvergunning voor een beperkingengebiedactiviteit
      met betrekking tot dat waterstaatswerk is vereist, verplaatst of verlegd als die een belemmering vormen voor de
      voorbereiding of uitvoering van de wijziging van dat waterstaatswerk door of namens de waterbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.15
  - number: 7.15.2
    text: |-
      Als, ondanks een redelijke poging daartoe, met de rechthebbende op het bouwwerk, het werk dat geen bouwwerk is of
      het andere object geen schriftelijke overeenstemming is bereikt over de termijn waarop dat bouwwerk, werk of object
      wordt verplaatst of verlegd, stelt het bevoegd gezag die termijn bij maatwerkvoorschrift vast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.15
  - number: 7.16.1
    text: 'Deze paragraaf is van toepassing op de volgende beperkingengebiedactiviteiten met betrekking tot de Noordzee:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.1.a
    text: het bouwen, in stand houden of slopen van bouwwerken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.1.b
    text: het aanleggen, plaatsen, in stand houden, veranderen of verwijderen van werken die geen bouwwerken zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.1.c
    text: het plaatsen, in stand houden of verwijderen van andere objecten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.2
    text: |-
      Deze paragraaf is ook van toepassing op lozingsactiviteiten op een oppervlaktewaterlichaam die bestaan uit het
      brengen van stoffen, water of warmte afkomstig van het bouwen, reinigen, conserveren of slopen van bouwwerken in
      de Noordzee.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.3
    text: 'Het eerste en tweede lid gelden niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.3.a
    text: |-
      een windpark als bedoeld in [artikel 7.33][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
  - number: 7.16.3.b
    text: |-
      een uitstroomvoorziening als bedoeld in de [artikelen 7.48, tweede lid][ref1], en [7.59, tweede lid][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.5
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.7
        afdeling: '7.2'
  - number: 7.16.3.c
    text: |-
      een installatie voor het kweken van consumptievis, het kweken of houden van ongewervelde waterdieren, het telen van
      waterplanten of het invangen van mosselzaad als bedoeld in [artikel 7.55][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.6
        afdeling: '7.2'
  - number: 7.16.3.d
    text: een mijnbouwinstallatie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.16.3.e
    text: |-
      een pijpleiding als bedoeld in de [artikelen 94][ref1] en [95 van het Mijnbouwbesluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0014394#Artikel94
      [ref2]: https://wetten.overheid.nl/BWBR0014394#Artikel95
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
    references:
      - id: ref1
        bwb_id: BWBR0014394
        artikel: '94'
      - id: ref2
        bwb_id: BWBR0014394
        artikel: '95'
  - number: 7.16.4
    text: |-
      Het eerste lid geldt ook niet voor het onderhouden of herstellen van een waterstaatswerk door of namens de
      waterbeheerder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.16
  - number: 7.17.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 7.16, eerste lid][ref2], die worden verricht in de Noordzee buiten de zone tussen de duinvoet
      en de laagwaterlijn, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.1
        afdeling: '7.2'
  - number: 7.17.1.a
    text: het aanleggen, plaatsen, in stand houden of veranderen van een bodemverharding;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.1.b
    text: |-
      het bouwen, aanleggen, plaatsen, in stand houden of veranderen van een kunstmatig eiland, een installatie of een
      inrichting als bedoeld in artikel 60 van het VN-Zeerechtverdrag;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.1.c
    text: het bouwen, aanleggen, plaatsen of in stand houden van een kabel of leiding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.1.d
    text: |-
      het bouwen of in stand houden van een bouwwerk, het aanleggen, plaatsen, in stand houden of veranderen van een werk
      dat geen bouwwerk is en het plaatsen of in stand houden van een ander object, anders dan bedoeld onder a tot en
      met c.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 7.16, eerste lid][ref2], die worden verricht in de zone tussen de duinvoet en de laagwaterlijn
      van de Noordzee, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.1
        afdeling: '7.2'
  - number: 7.17.2.a
    text: |-
      het in de periode van 1 oktober tot 1 april bouwen, aanleggen, plaatsen, in stand houden van een bouwbord of het
      plaatsen van materiaal en materieel om een werk te kunnen aanleggen, plaatsen of veranderen of onderhouden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.2.b
    text: het bouwen of in stand houden van een niet-permanent bouwwerk van 1 oktober tot 1 april;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.2.c
    text: het bouwen, aanleggen, plaatsen of in stand houden van een kabel of leiding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.17.2.d
    text: |-
      het bouwen of in stand houden van een bouwwerk, het aanleggen, plaatsen, in stand houden of veranderen van een werk
      dat geen bouwwerk is en het plaatsen of in stand houden van een ander object, anders dan bedoeld onder a tot en
      met c.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.17
  - number: 7.18.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 7.16, eerste lid][ref1], te verrichten zonder dit ten minste
      vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.1
        afdeling: '7.2'
  - number: 7.18.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.18
  - number: 7.18.2.a
    text: de oppervlakte van het bouwwerk, het werk dat geen bouwwerk is, of het andere object; en
