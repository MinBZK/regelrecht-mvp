    text: |-
      dat artikel van toepassing is geworden omdat de Seveso-inrichting in werking wordt gesteld of omdat de hoeveelheid
      gevaarlijke stoffen die aanwezig is, wijzigt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.26
  - number: 4.26.b
    text: |-
      de Seveso-inrichting voor inwerkingtreding van dit besluit een inrichting als bedoeld in het
      [Besluit risico’s zware ongevallen 2015][ref1] was.


      [ref1]: https://wetten.overheid.nl/BWBR0036791
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.26
    references:
      - id: ref1
        bwb_id: BWBR0036791
  - number: '4.27'
    text: |-
      Het veiligheidsrapport, bedoeld in [artikel 4.14, eerste lid][ref1], is opgesteld binnen twee jaar nadat artikel
      4.14 van toepassing is geworden op de Seveso-inrichting, tenzij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.27
    references:
      - id: ref1
