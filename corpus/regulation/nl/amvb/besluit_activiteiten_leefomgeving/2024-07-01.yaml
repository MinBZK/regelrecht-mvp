        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.19'
  - number: 4.306.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.306
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.306.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.306
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.307'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met olie en koelvloeistof wordt steen mechanisch
      bewerkt boven een aaneengesloten bodemvoorziening als een apparaat met een oliecircuit of koelvloeistofcircuit
      wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.307
  - number: '4.308'
    text: 'Met het oog op het beperken van de hoeveelheid afvalwater wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.308
  - number: 4.308.a
    text: droog gereinigd, tenzij dat redelijkerwijs niet mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.308
  - number: 4.308.b
    text: het water dat als koelmiddel, spoelmiddel of smeermiddel of tegen stuiven wordt gebruikt, opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.308
  - number: 4.309.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het mechanisch
      bewerken van steen anders dan natuursteen of beton geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.309
  - number: 4.309.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.309
  - number: 4.310.1
    text: Het afvalwater dat wordt geloosd in een vuilwaterriool, wordt door een bezinkvoorziening geleid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.310
  - number: 4.310.2
    text: Voor dat afvalwater is de emissiegrenswaarde voor onopgeloste stoffen 300 mg/l, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.310
  - number: 4.311.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.311
  - number: 4.311.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.311
  - number: 4.311.3
    text: Op het analyseren van een monster is voor onopgeloste stoffen NEN-EN 872 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.311
  - number: '4.312'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.312
  - number: 4.312.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.312
  - number: 4.312.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.312
  - number: 4.312.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.312
  - number: 4.313.1
    text: |-
      Met het oog op het beperken van emissies in de lucht en het voorkomen of beperken van geluidhinder wordt steen in
      een gesloten ruimte mechanisch bewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.2
    text: |-
      Het stralen van steen gebeurt in een gesloten ruimte of met gereedschap dat is uitgerust met een geïntegreerde
      stofafzuiginstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.3
    text: Het trommelen van steen gebeurt in een gesloten installatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.4
    text: Bij het bewerken van steen en gips worden natte werkmethoden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.5
    text: 'Onder natte werkmethoden wordt verstaan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.5.a
    text: |-
      mechanische bewerking van steen met waterkoeling waarbij de waterstraal of het watergordijn zo is gedimensioneerd
      dat geen zichtbare stofvorming optreedt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: 4.313.5.b
    text: mechanische ruimteafzuiging waarbij een geschikte waterwand wordt gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.313
  - number: '4.314'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.314
  - number: 4.315.1
    text: Voor de emissie in de lucht is de emissiegrenswaarde van totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.315
  - number: 4.315.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.315
  - number: 4.315.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de afgezogen emissies door een geschikte filtrerende afscheider
      worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.315
  - number: 4.316.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.316
  - number: 4.316.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.316
  - number: 4.317.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.317
  - number: 4.317.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.315, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.317
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.19'
  - number: 4.318.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van
      bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.318
  - number: 4.318.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.318
  - number: 4.318.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.318
  - number: 4.318.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.316][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.318
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.19'
  - number: '4.319'
    text: Met het oog op het beschermen van de gezondheid worden emissies in de lucht bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.319
  - number: '4.320'
    text: |-
      Deze paragraaf is van toepassing op het mechanisch bewerken van rubber, kunststof, papier, karton, textiel, bont,
      leer, kurk, hout of houtachtig materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.320
  - number: 4.321.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.320][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.321
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: 4.321.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.321
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.322'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.320][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.322
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: 4.322.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.322
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.322.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.322
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.323'
    text: |-
      Met het oog op het beperken van de hoeveelheid afvalwater bij het mechanisch bewerken van de materialen, bedoeld in
      [artikel 4.320][ref1], wordt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.323
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: 4.323.a
    text: droog gereinigd, tenzij dat redelijkerwijs niet mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.323
  - number: 4.323.b
    text: water dat als koelmiddel, spoelmiddel of smeermiddel wordt gebruikt, opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.323
  - number: 4.324.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van mechanisch bewerken
      van de materialen, bedoeld in [artikel 4.320][ref1], geloosd in een vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.324
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: 4.324.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.324
  - number: '4.325'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.325
  - number: 4.325.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.325
  - number: 4.325.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.325
  - number: 4.326.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.326
  - number: 4.326.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.326
  - number: 4.326.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.326
  - number: '4.327'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.327
  - number: 4.327.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.327
  - number: 4.327.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.327
  - number: 4.327.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.327
  - number: '4.328'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met olie en koelvloeistof worden de materialen,
      bedoeld in [artikel 4.320][ref1], mechanisch bewerkt boven een aaneengesloten bodemvoorziening als een apparaat met
      een oliecircuit of koelvloeistofcircuit wordt gebruikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.328
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: '4.329'
    text: |-
      Met het oog op het beperken van emissies in de lucht en het voorkomen of beperken van geluidhinder worden de
      materialen, bedoeld in [artikel 4.320][ref1], in een gesloten ruimte mechanisch bewerkt.


