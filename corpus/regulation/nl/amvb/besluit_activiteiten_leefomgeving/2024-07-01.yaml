        paragraaf: '4.34'
  - number: 4.463.a
    text: 'illustratiediepdruk: 20%; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.463
  - number: 4.463.b
    text: 'bandlakken: 15%.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.463
  - number: '4.464'
    text: |-
      De vermenigvuldigingsfactor, bedoeld in [tabel 4.462][ref1], kan worden aangepast voor een individuele
      oplosmiddeleninstallatie bij een aangetoonde stijging van het rendement van een oplosmiddeleninstallatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.464
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.34'
  - number: 4.465.1
    text: |-
      Stoffen of mengsels die op grond van de CLP-verordening door hun gehalte aan vluchtige organische stoffen als
      kankerverwekkend, mutageen of giftig voor de voortplanting zijn ingedeeld en de gevarenaanduiding H340, H350,
      H350i, H360D of H360F moeten hebben, worden, voor zover mogelijk, binnen zo kort mogelijke tijd vervangen door
      minder schadelijke stoffen of mengsels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.2
    text: 'De emissiegrenswaarden voor gevaarlijke stoffen zijn de waarden, bedoeld in tabel 4.465, voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.2.a
    text: |-
      vluchtige organische stoffen die als kankerverwekkend, mutageen of giftig voor de voortplanting zijn ingedeeld en
      de gevarenaanduiding H340, H350, H350i, H360D of H360F moeten hebben; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.2.b
    text: gehalogeneerde vluchtige organische stoffen die de gevarenaanduiding H341 of H351 moeten hebben.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.3
    text: |-
      Onder gevaarlijke stoffen als bedoeld in het tweede lid wordt verstaan: gevaarlijke stoffen als bedoeld in artikel
      3, onder 18, van de richtlijn industriële emissies.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
  - number: 4.465.4
    text: |-
      Een oplosmiddeleninstallatie waarin meerdere activiteiten als bedoeld in [tabel 4.438a][ref1] of [4.438b][ref2]
      worden verricht die elk de ondergrenzen, vermeld in die tabellen, overschrijdt, voldoet:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.465
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
