  - number: 4.1310.2
    text: 'Op het verrichten van een periodieke meting of parallelmeting zijn de volgende normen van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.a
    text: 'voor zuurstof: NEN-EN 14789;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.b
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.c
    text: 'voor stikstofoxiden: NEN-EN 14792;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.d
    text: 'voor zwaveldioxide: NEN-EN 14791;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.e
    text: 'voor onverbrande koolwaterstoffen: NEN-EN 12619; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.2.f
    text: 'voor ammoniak: NEN-EN-ISO 21877.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.3
    text: 'Op het verrichten van een continue meting zijn de volgende normen van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.3.a
    text: 'voor totaal stof: NEN-EN 13284-2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1310.3.b
    text: 'voor de kwaliteitsborging: NEN-EN 14181 en NVN-CEN TS 17198.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1310
  - number: 4.1311.1
    text: |-
      Er wordt periodiek of continu gemeten of aan de emissiegrenswaarden voor stikstofoxiden, zwaveldioxide, onverbrande
      koolwaterstoffen, ammoniak en totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.2
    text: |-
      De emissieconcentratie van stikstofoxiden, zwaveldioxide, onverbrande koolwaterstoffen en totaal stof van een
      stookinstallatie:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.2.a
    text: wordt continu gemeten als emissiereductietechnieken worden toegepast; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.2.b
    text: |-
      wordt periodiek gemeten als een logboek wordt bijgehouden waaruit blijkt dat de emissiereductietechnieken continu
      in bedrijf zijn en de emissiegrenswaarden die van toepassing zijn niet worden overschreden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.3
    text: |-
      De emissieconcentraties van stoffen waarvoor emissiegrenswaarden zijn vastgesteld, worden voor een vervangende
      stookinstallatie als bedoeld in [artikel 4.1309][ref1] binnen vier weken na de inbedrijfstelling van die
      vervangende installatie periodiek gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1311.4
    text: 'Het eerste tot en met het derde lid zijn niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.4.a
    text: |-
      op het meten van totaal stof als een maatregel als bedoeld in [artikel 4.1303, tweede en derde lid][ref1], wordt
      getroffen;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1311.4.b
    text: |-
      op het meten van zwaveldioxide als aan de betreffende emissiegrenswaarde wordt voldaan door brandstof te stoken met
      een bekend zwavelgehalte bij een stookinstallatie die niet is uitgerust met apparatuur voor het verminderen van de
      emissie van zwaveldioxide; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
  - number: 4.1311.4.c
    text: |-
      op het meten van stikstofoxiden bij de verbranding van rie-biomassa of pellets gemaakt uit rie-biomassa in een
      ketel met een nominaal thermisch ingangsvermogen van minder dan 1 MW als er een meetrapport van de leverancier
      beschikbaar is waaruit blijkt dat met de ketel aan de emissiegrenswaarde voor stikstofoxiden, bedoeld in
      [artikel 4.1303][ref1], wordt voldaan, en in de ketel de rie-biomassa wordt gestookt waarop dat rapport betrekking
      heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1311
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1312.1
    text: |-
      Een meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit geldt
      niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.2
    text: |-
      Het resultaat van de meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de deelmetingen,
      verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de emissiegrenswaarde,
      bedoeld in tabel 4.1312.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.3
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van minder dan 1 MW is voor totaal stof de
      meetonzekerheid niet meer dan 40% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.4
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van de individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.5
    text: 'Een meting wordt verricht door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.5.a
    text: |-
      een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die volgens [artikel 4.1310][ref1]
      van toepassing is op de stof die wordt gemeten; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1312.5.b
    text: |-
      een onderneming met een certificaat voor de Deelregeling voor stookinstallaties, onderdeel van de
      Certificatieregeling voor het kwaliteitsmanagementsysteem ten behoeve van het verrichten van onderhoud en inspectie
      aan technische installaties, van de stichting SCIOS, afgegeven door een certificatie-instantie met een accreditatie
      volgens NEN-EN-ISO/IEC 17021-1 voor die Deelregeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.6
    text: 'Het vijfde lid, aanhef en onder b, is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.6.a
    text: de meting van ammoniak; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1312.6.b
    text: de meting van totaal stof bij stookinstallaties met een nominaal thermisch ingangsvermogen van 1 MW of meer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1312
  - number: 4.1313.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste twee weken voordat een meting wordt verricht,
      geïnformeerd over de datum en het tijdstip van die meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1313
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1313.2
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de meting zou worden verricht, geïnformeerd over het niet
      doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1313
  - number: 4.1314.1
    text: 'Bij een stookinstallatie wordt gemeten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.1.a
    text: binnen vier weken nadat een emissiegrenswaarde van toepassing is geworden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.1.b
    text: voorafgaand aan het van toepassing worden van een emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.2
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 20 MW wordt vervolgens elk jaar
      periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.3
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW en ten hoogste 20 MW wordt
      vervolgens elke drie jaar periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.4
    text: |-
      Bij een gasturbine, een gasmotor of een dieselmotor met een nominaal thermisch ingangsvermogen van minder dan 1 MW
      wordt vervolgens elke vier jaar periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: 4.1314.5
    text: |-
      Het tweede tot en met vierde lid is niet van toepassing op een stookinstallatie op een offshore
      oliewinningsplatform of gaswinningsplatform. Bij een gasturbine, gasmotor of dieselmotor op een offshore
      oliewinningsplatform of gaswinningsplatform wordt vervolgens elke vier jaar periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1314
  - number: '4.1315'
    text: |-
      Als geen van de gevalideerde meetresultaten, bedoeld in [artikel 4.1312][ref1], hoger is dan de desbetreffende
      emissiegrenswaarde, wordt aan die emissiegrenswaarde voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1315
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1316.1
    text: |-
      Metingen zijn representatief voor normale bedrijfsvoering als het brandstofmengsel wordt gebruikt dat de hoogste
      emissie zal opleveren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1316
  - number: 4.1316.2
    text: |-
      Een meting bij een ketel wordt verricht bij een belasting van meer dan 60%. Een meting bij een dieselmotor, een
      gasmotor of een gasturbine wordt verricht bij de hoogste belasting, waarbij deze continu kan worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1316
  - number: 4.1316.3
    text: |-
      Een meting bij een gasturbine, met een ketel die daarbij hoort, wordt verricht bij een bijstook van ten hoogste 10%
      in de ketel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1316
  - number: 4.1317.1
    text: Geautomatiseerde meetsystemen worden ten minste eenmaal per jaar met parallelmetingen gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1317
  - number: 4.1317.2
    text: |-
      Een parallelmeting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de
      norm die volgens [artikel 4.1310][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1317
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1318.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt geïnformeerd over de resultaten van de controle, bedoeld
      in [artikel 4.1317][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1318
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1318.2
    text: |-
      Het bevoegd gezag wordt ten minste twee weken voordat een parallelmeting wordt verricht, geïnformeerd over de datum
      en het tijdstip van die meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1318
  - number: 4.1318.3
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de parallelmeting zou worden verricht, geïnformeerd over het niet
      doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1318
  - number: 4.1319.1
    text: Het resultaat van de continue meting zijn de gevalideerde daggemiddelden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1319
  - number: 4.1319.2
    text: |-
      Het gevalideerde daggemiddelde is het daggemiddelde, verminderd met de aangetoonde meetonzekerheid die niet meer is
      dan het percentage van de emissiegrenswaarde, bedoeld in tabel 4.1319.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1319
  - number: 4.1319.3
    text: |-
      De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van de individuele metingen.
            Tabel 4.1319 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Onverbrande koolwaterstoffen


                    20


                    Ammoniak


                    40
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1319
  - number: 4.1320.1
    text: |-
      Als bij een continue meting geen van de gevalideerde daggemiddelden hoger is dan de emissiegrenswaarden, wordt aan
      de emissiegrenswaarde voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1320
  - number: 4.1320.2
    text: 'Voor de toepassing van het eerste lid worden bij een continue meting niet meegerekend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1320
  - number: 4.1320.2.a
    text: meetuitkomsten, verkregen tijdens periodes van opstarten en stilleggen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1320
  - number: 4.1320.2.b
    text: meetuitkomsten, verkregen tijdens storingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1320
  - number: 4.1321.1
    text: |-
      De continue metingen van een dag worden als ongeldig beschouwd als in een dag meer dan drie uurgemiddelden ongeldig
      zijn door storing of onderhoud van het continu werkende meetsysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1321
  - number: 4.1321.2
    text: |-
      Als per jaar de metingen van meer dan tien dagen ongeldig zijn, worden passende maatregelen getroffen om de
      betrouwbaarheid van het continu werkende meetsysteem te verbeteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1321
  - number: 4.1322.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht zijn bij gelijktijdig gebruik van verschillende
      soorten brandstof in een stookinstallatie de emissiegrenswaarden voor stikstofoxiden, zwaveldioxide en totaal stof
      de gewogen gemiddelden van de emissiegrenswaarden die voor elk van de brandstoffen afzonderlijk van toepassing
      zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1322
  - number: 4.1322.2
    text: |-
      Een gewogen gemiddelde wordt per tijdseenheid berekend naar het aandeel van elk van de brandstoffen in de
      energetische inhoud van de toegevoerde brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1322
  - number: 4.1323.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht kan een stookinstallatie die als gevolg van een
      storing niet aan de emissiegrenswaarden kan voldoen uiterlijk 120 uren na het optreden van de storing in bedrijf
      blijven, met een maximum van 120 uren per kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.2
    text: 'Het eerste lid is niet van toepassing als het gaat om een stookinstallatie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.2.a
    text: op een offshore oliewinningsplatform of gaswinningsplatform;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.2.b
    text: waarvan de storing redelijkerwijs niet binnen 120 uur kan worden hersteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.2.c
    text: waarvan de storing binnen de termijn blijft die door het Staatstoezicht op de mijnen is gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.3
    text: |-
      Tijdens een storing die samenhangt met de gestookte brandstof kan een vervangende brandstof worden gestookt en zijn
      de emissiegrenswaarden niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: 4.1323.4
    text: |-
      Bij een storing in de meetapparatuur worden geen wijzigingen in het gebruik van de stookinstallatie aangebracht die
      een significante toename van de emissie met zich mee kunnen brengen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1323
  - number: '4.1324'
    text: |-
      Het Staatstoezicht op de mijnen wordt ten hoogste 120 uur na een storing bij een stookinstallatie als bedoeld in
      [artikel 4.1323, tweede lid][ref1], schriftelijk geïnformeerd over de reden van de storing en van het niet tijdige
      herstel.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1324
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: '4.1325'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt zo spoedig mogelijk geïnformeerd als niet aan de
      emissiegrenswaarden wordt voldaan, over de oorzaak waarom daaraan niet wordt voldaan, en de maatregelen die worden
      getroffen om zo spoedig mogelijk weer aan de emissiegrenswaarden te voldoen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1325
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1326.1
    text: |-
      Met het oog op het beperken van emissies in de lucht, het veilig functioneren van de stookinstallatie en het zuinig
      gebruik van energie wordt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.1.a
    text: de afstelling van de verbranding gekeurd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.1.b
    text: het systeem voor de toevoer van brandstof en verbrandingslucht gekeurd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.1.c
    text: de afvoer van verbrandingsgassen gekeurd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.1.d
    text: |-
      voor stookinstallaties met een nominaal thermisch ingangsvermogen van ten minste 1 MW het gehalte koolmonoxide,
      gemeten voor de afstelling van de verbranding, uitgedrukt in milligram per normaal kubieke meter, bij een
      zuurstofpercentage als bedoeld in [artikel 4.1300, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1326.2
    text: |-
      De meting van koolmonoxide, bedoeld in het eerste lid, onder d, geldt voor een stookinstallatie die in bedrijf is
      genomen voor 20 december 2018 vanaf:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.2.a
    text: 1 januari 2024, als deze een nominaal thermisch ingangsvermogen heeft van meer dan 5 MW; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.2.b
    text: 1 januari 2029, als deze een nominaal thermisch ingangsvermogen heeft van ten hoogste 5 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.3
    text: |-
      Aan het eerste lid, onder d, wordt, voor een stookinstallatie die niet meer dan 500 uur per jaar in bedrijf is,
      in ieder geval voldaan, als een meetrapport van de fabrikant beschikbaar is van een koolmonoxide-meting die is
      verricht aan de stookinstallatie of een stookinstallatie van hetzelfde merk en type, overeenkomstig de eisen,
      bedoeld in het eerste lid, onder d.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.4
    text: Een stookinstallatie wordt gekeurd binnen zes weken nadat deze in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.5
    text: Een niet-gasgestookte stookinstallatie wordt ten minste eenmaal per twee jaar gekeurd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.6
    text: Een gasgestookte stookinstallatie wordt ten minste eenmaal per vier jaar gekeurd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1326.7
    text: |-
      De keuring wordt verricht door een onderneming met een certificaat voor de Deelregeling voor stookinstallaties,
      onderdeel van de Certificatieregeling voor het kwaliteitsmanagement ten behoeve van het uitvoeren van onderhoud en
      inspectie aan technische installaties, van de stichting SCIOS, afgegeven door een certificatie-instantie met een
      accreditatie volgens NEN-EN-ISO/IEC 17021-1 voor die Deelregeling.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1326
  - number: 4.1327.1
    text: |-
      Van de keuring, bedoeld in [artikel 4.1326][ref1], wordt een verslag gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1327.2
    text: 'Het verslag voor stookinstallaties met een nominaal thermisch ingangsvermogen van ten minste 1 MW omvat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.a
    text: de naam en het adres van de gebruiker;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.b
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie van de stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.c
    text: een unieke identificatie van de stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.d
    text: gegevens over het nominaal thermisch ingangsvermogen in megawatt van de stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.e
    text: |-
      gegevens over het type stookinstallatie, onderverdeeld naar gasmotor, dieselmotor, dual-fuelmotor, gasturbine,
      ketel, fornuis, droger, luchtverhitter of andere stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.f
    text: |-
      gegevens over het type gebruikte brandstoffen en het aandeel ervan, onderverdeeld naar vaste rie-biomassa, pellets
      gemaakt uit rie-biomassa, andere vaste brandstof, gasolie, dieselolie, huisbrandolie, biodiesel, andere vloeibare
      brandstoffen, aardgas, propaangas, butaangas, vergistingsgas en andere gasvormige brandstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.g
    text: de datum waarop de stookinstallatie in bedrijf is genomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.h
    text: |-
      het verwachte aantal jaarlijkse bedrijfsuren van de stookinstallatie en de gemiddelde belasting tijdens het
      gebruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.i
    text: de 4-cijferige NACE-code van de bedrijfstak waarvan de stookinstallatie deel uitmaakt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.j
    text: |-
      de datum en meetresultaten van de laatst verrichte emissiemetingen van koolmonoxide en zuurstof en de
      emissieconcentratie van deze stoffen die tijdens de keuring is gemeten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: 4.1327.2.k
    text: |-
      een verklaring dat de stookinstallatie niet meer dan 500 uur per jaar in bedrijf is, als het gaat om een
      stookinstallatie als bedoeld in [artikel 4.1299, tweede lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1327.2.l
    text: |-
      wijzigingen aan de stookinstallatie of in de bedrijfsvoering die hebben geleid tot een verandering van de
      emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1327
  - number: '4.1328'
    text: |-
      Met het oog op het beperken van emissies in de lucht, het waarborgen van de veiligheid en het zuinig gebruik van
      energie wordt de stookinstallatie binnen twee weken na de keuring onderhouden, als uit de keuring, bedoeld in
      [artikel 4.1327][ref1], blijkt dat de stookinstallatie onderhoud nodig heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1328
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1329.1
    text: |-
      Als een stookinstallatie bij de keuring of na het onderhoud, bedoeld in [artikel 4.1328][ref1], voldoet aan de
      eisen voor veilig functioneren, optimale verbranding en energiezuinigheid, wordt deze afgemeld in het afmeldsysteem
      van de Stichting Scios.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1329
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1329.2
    text: |-
      De afmelding bevat de gegevens, bedoeld in [artikel 4.1327, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1329
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: '4.1330'
    text: 'De volgende gegevens worden ten minste zes jaar bij de stookinstallatie bewaard:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
  - number: 4.1330.a
    text: |-
      de registratie van het aantal draaiuren, bedoeld in [artikel 4.1299, derde lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1330.b
    text: |-
      de resultaten van de laatst verrichte metingen en andere gegevens die nodig zijn om te kunnen beoordelen of wordt
      voldaan aan de emissiegrenswaarden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
  - number: 4.1330.c
    text: een overzicht van de soort en de hoeveelheid in de installatie gebruikte brandstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
  - number: 4.1330.d
    text: een overzicht van eventuele storingen of uitvallen van aanvullende emissiebeperkende apparatuur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
  - number: 4.1330.e
    text: een overzicht van de gevallen van niet-voldoen aan de emissiegrenswaarden en de getroffen maatregelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
  - number: 4.1330.f
    text: |-
      het verslag van de keuring, bedoeld in [artikel 4.1327][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1330.g
    text: |-
      een bewijs van uitvoering van het onderhoud met daarop de datum van het onderhoud, bedoeld in
      [artikel 4.1328][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1330
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: '4.1331'
    text: |-
      Voor de emissie in de lucht van een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste
      1 MW die niet meer dan 500 uur per jaar in bedrijf is en die wordt gestookt op een vaste brandstof, is de
      emissiegrenswaarde voor totaal stof 200 mg/Nm3, als de stookinstallatie voor 20 december 2018 in bedrijf is
      genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1331
  - number: 4.1332.1
    text: |-
      Voor de emissie in de lucht van een ketel met een nominaal thermisch ingangsvermogen van ten minste 1 MW die wordt
      gestookt op vergistingsgas is de emissiegrenswaarde voor zwaveldioxide 200 mg/Nm3, als de ketel voor 20 december
      2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.2
    text: |-
      Voor de emissie in de lucht van een ketel met een nominaal thermisch ingangsvermogen van ten minste 5 MW die wordt
      gestookt op vergistingsgas is vanaf 1 januari 2025 de emissiegrenswaarde voor zwaveldioxide 170 mg/Nm3, als de
      ketel voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.3
    text: |-
      Voor de emissie in de lucht van een ketel met een nominaal thermisch ingangsvermogen van minder dan 1 MW
      die voor 1 januari 2013 is geplaatst of in bedrijf is genomen zijn de emissiegrenswaarden de waarden die
      volgens het [Besluit typekeuring verwarmingstoestellen luchtverontreiniging stikstofoxiden][ref1] golden of de
      emissiegrenswaarden die bij maatwerkvoorschrift zijn gesteld, tot het tijdstip waarop:


      [ref1]: https://wetten.overheid.nl/BWBR0007465
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
    references:
      - id: ref1
        bwb_id: BWBR0007465
  - number: 4.1332.3.a
    text: de branders zijn vervangen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.3.b
    text: wijzigingen zijn aangebracht die met nieuwbouw van de ketel overeenkomen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.3.c
    text: |-
      een wijziging wordt doorgevoerd, die leidt tot een toename van emissies van de stoffen, genoemd in het eerste lid,
      met meer dan 10%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.4
    text: |-
      Voor de emissie in de lucht van een ketel gestookt op rie-biomassa of pellets gemaakt uit rie-biomassa die in
      bedrijf is genomen tussen 1 januari 2013 en 1 januari 2015, is de emissiegrenswaarde voor totaal stof:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.4.a
    text: 75 mg/Nm3 voor ketels met een nominaal thermisch ingangsvermogen van ten minste 0,5 MW en minder dan 1 MW; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.4.b
    text: 150 mg/Nm3 voor ketels met een nominaal thermisch ingangsvermogen van minder dan 0,5 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.5
    text: 'De emissiegrenswaarden in tabel 4.1332 zijn van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.5.a
    text: op ketels als bedoeld in het derde en vierde lid vanaf 1 januari 2027; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332.5.b
    text: |-
      op overige ketels gestookt op rie-biomassa of pellets gemaakt uit rie-biomassa vanaf 0,5 MW die voor de
      inwerkingtreding van dit besluit in bedrijf zijn genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332
  - number: 4.1332a
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van minder dan 1 MW hoeft niet periodiek of
      continu te worden gemeten op totaal stof, als de stookinstallatie voor de inwerkingtreding van dit besluit in
      bedrijf is genomen en een meetrapport van de leverancier beschikbaar is, waaruit blijkt dat met een filter aan de
      emissiegrenswaarden, bedoeld in [artikel 4.1303][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1332a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: '4.1333'
    text: |-
      Voor de emissie in de lucht van een gasturbine is de emissiegrenswaarde voor stikstofoxiden 75 mg/Nm3 voor een
      gasturbine op een offshore oliewinningsplatform of gaswinningsplatform, als de gasturbine voor 1 april 2010 in
      bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1333
  - number: 4.1334.1
    text: |-
      Voor de emissie in de lucht van een dieselmotor met een nominaal thermisch ingangsvermogen van meer dan 5 MW is
      tot 1 januari 2025 de emissiegrenswaarde voor totaal stof 20 mg/Nm3, als de dieselmotor voor 20 december 2018 in
      bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1334
  - number: 4.1334.2
    text: |-
      Voor de emissie in de lucht van een dieselmotor met een nominaal thermisch ingangsvermogen van meer dan 5 MW en
      ten hoogste 20 MW is vanaf 1 januari 2025 de emissiegrenswaarde voor totaal stof 20 mg/Nm3, als de dieselmotor voor
      20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1334
  - number: 4.1335.1
    text: |-
      Voor de emissie in de lucht van een gasmotor met een nominaal thermisch ingangsvermogen van minder dan 2,5 MW is
      tot 1 januari 2030 de emissiegrenswaarde voor stikstofoxiden 115 mg/Nm3, als de gasmotor voor 20 december 2018 in
      bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1335
  - number: 4.1335.2
    text: |-
      Voor de emissie in de lucht van een gasmotor die wordt gestookt op vergistingsgas is de emissiegrenswaarde voor
      zwaveldioxide 65 mg/Nm3, als de gasmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1335
  - number: 4.1335.3
    text: |-
      Voor de emissie in de lucht van een gasmotor met een nominaal thermisch ingangsvermogen van meer dan 5 MW die
      wordt gestookt op vergistingsgas is vanaf 1 januari 2025 de emissiegrenswaarde voor zwaveldioxide 60 mg/Nm3, als de
      gasmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1335
  - number: 4.1335.4
    text: |-
      Voor de emissie in de lucht van een gasmotor met een nominaal thermisch ingangsvermogen van niet meer dan 5 MW die
      wordt gestookt op vergistingsgas is vanaf 1 januari 2030 de emissiegrenswaarde voor zwaveldioxide 60 mg/Nm3, als de
      gasmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1335
  - number: 4.1336.1
    text: |-
      Voor de emissie in de lucht van een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 5 MW,
      anders dan een ketel, zuigermotor, gasturbine of installatie voor de regeneratie van glycol, zijn tot 1 januari
      2025 de emissiegrenswaarden, bedoeld in [artikel 4.1308][ref1], niet van toepassing, als de andere stookinstallatie
      voor 20 december 2018 in bedrijf is genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1336
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1336.2
    text: |-
      Voor de emissie in de lucht van een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW
      en ten hoogste 5 MW, anders dan een ketel, zuigermotor, gasturbine of installatie voor de regeneratie van glycol,
      zijn tot 1 januari 2030 de emissiegrenswaarden, bedoeld in [artikel 4.1308][ref1], niet van toepassing, als de
      andere stookinstallatie voor 20 december 2018 in bedrijf is genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1336
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1336.3
    text: |-
      Op een stookinstallatie gestookt op vergistingsgas die voor 20 december 2018 in bedrijf is genomen is de
      emissiegrenswaarde voor zwaveldioxide:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1336
  - number: 4.1336.3.a
    text: 170 mg/Nm3 voor een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 5 MW; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1336
  - number: 4.1336.3.b
    text: |-
      200 mg/Nm3 voor een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW of ten hoogste
      5 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1336
  - number: 4.1337.1
    text: |-
      Een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 5 MW, anders dan een gasturbine,
      gasmotor of dieselmotor, hoeft tot 1 januari 2025 niet periodiek te worden gemeten, als de stookinstallatie voor
      20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1337
  - number: 4.1337.2
    text: |-
      Een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW en ten hoogste 5 MW, anders dan
      een gasturbine, gasmotor of dieselmotor, hoeft tot 2030 niet periodiek te worden gemeten, als de stookinstallatie
      voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1337
  - number: 4.1337.3
    text: |-
      Bij een gasturbine, gasmotor of dieselmotor met een nominaal thermisch ingangsvermogen van meer dan 5 MW kan tot
      1 januari 2025 elke vier jaar periodiek worden gemeten, als de stookinstallatie voor 20 december 2018 in bedrijf
      is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1337
  - number: 4.1337.4
    text: |-
      Bij een gasturbine, gasmotor of dieselmotor met een nominaal thermisch ingangsvermogen van ten minste 1 MW en
      ten hoogste 5 MW kan tot 1 januari 2030 elke vier jaar periodiek worden gemeten, als de stookinstallatie voor
      20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1337
  - number: 4.1337.5
    text: |-
      Het eerste tot en met vierde lid zijn niet van toepassing op een stookinstallatie die voor 20 december 2018 in
      bedrijf is genomen en die ligt op een offshore oliewinningsplatform of gaswinningsplatform.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1337
  - number: 4.1338.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een stookinstallatie met een nominaal thermisch
      ingangsvermogen van ten minste 1 MW, met uitzondering van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.a
    text: |-
      stookinstallaties waarop [paragraaf 4.3][ref1], [4.4][ref2], [4.7][ref3] of [4.126][ref4] van toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.4'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.7'
      - id: ref4
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1338.1.b
    text: |-
      stookinstallaties waar de gasvormige producten van het stookproces worden gebruikt voor het direct verwarmen,
      drogen of anderzijds behandelen van voorwerpen of materialen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.c
    text: |-
      stookinstallaties waar de gasvormige producten van het stookproces worden gebruikt voor het direct verwarmen met
      gas van binnenruimten om de omstandigheden op de arbeidsplaats te verbeteren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.d
    text: |-
      technische voorzieningen voor de zuivering van afgassen door verbranding die niet als autonome stookinstallatie
      worden geëxploiteerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.e
    text: technische voorzieningen die bij de voortstuwing van een voertuig, schip of vliegtuig worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.f
    text: het regenereren van katalysatoren voor het katalytisch kraakproces;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.g
    text: het omzetten van zwavelwaterstof in zwavel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.h
    text: in de chemische industrie gebruikte reactoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.i
    text: cokesovens;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.j
    text: windverhitters van hoogovens;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.k
    text: crematoria;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.l
    text: |-
      stookinstallaties die raffinaderijbrandstof eventueel gemengd met andere brandstof gebruiken voor het opwekken van
      energie binnen olieraffinaderijen en gasraffinaderijen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.m
    text: terugwinningsinstallaties in installaties voor de productie van pulp; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.1.n
    text: |-
      stookinstallaties die volgens een eerder verleende omgevingsvergunning worden gebruikt voor het onderzoeken,
      beproeven of demonstreren van experimentele verbrandingstechnieken of van technieken om de emissie van
      zwaveldioxide, stikstofoxiden of totaal stof te verminderen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.2
    text: |-
      Voor de toepassing van deze paragraaf worden twee of meer stookinstallaties met een nominaal thermisch
      ingangsvermogen van ten minste 1 MW als één stookinstallatie aangemerkt en worden de nominale thermische
      ingangsvermogens opgeteld als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.2.a
    text: de afgassen van die stookinstallaties via één schoorsteen worden afgevoerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.2.b
    text: |-
      het bevoegd gezag bij maatwerkvoorschrift heeft vastgesteld dat de afgassen van die stookinstallatie op technisch
      en economisch aanvaardbare wijze via een gemeenschappelijke schoorsteen kunnen worden afgevoerd en het bevoegd
      gezag in dat maatwerkvoorschrift heeft vastgesteld welke stookinstallaties deel uitmaken van het samenstel van
      stookinstallaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: 4.1338.3
    text: |-
      In deze paragraaf wordt onder ketel verstaan: stookinstallatie waarbij de opgewekte warmte wordt overgedragen aan
      water, stoom of een combinatie daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1338
  - number: '4.1339'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1338][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1339
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1339.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1], voor zover wordt gestookt met vloeibare brandstof; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1339
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.1339.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1], voor zover wordt gestookt met vloeibare
      brandstof.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1339
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.1340'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift, gesteld na 1 januari 2024, worden de emissiegrenswaarden in deze
      paragraaf niet versoepeld voor stookinstallaties waarop voor die datum een emissiegrenswaarde van toepassing was.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1340
  - number: '4.1341'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstof wordt een stookinstallatie
      die daarmee wordt gestookt, gevuld en geleegd boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1341
  - number: '4.1342'
    text: |-
      Met het oog op het beperken van emissies in de lucht wordt de periode van het opstarten of stilleggen van een
      stookinstallatie zo kort mogelijk gehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1342
  - number: 4.1343.1
    text: |-
      De emissiegrenswaarden, bedoeld in de [artikelen 4.1346 tot en met 4.1350][ref1], gelden niet voor een
      stookinstallatie die ten hoogste 500 uur per jaar in bedrijf is, met uitzondering van een dieselmotor die
      wordt gebruikt voor het opwekken van elektriciteit als het openbare net beschikbaar is en geen geplande
      bedrijfsnoodzakelijke test wordt verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1343
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1343.2
    text: |-
      Voor het bepalen van het aantal uren dat een stookinstallatie per jaar in bedrijf is wordt het aantal uren dat een
      stookinstallatie in bedrijf is:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1343
  - number: 4.1343.2.a
    text: maandelijks geregistreerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1343
  - number: 4.1343.2.b
    text: |-
      halfjaarlijks geregistreerd, als de stookinstallatie ligt op een offshore oliewinningsplatform of
      gaswinningsplatform.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1343
  - number: 4.1344.1
    text: |-
      Ten minste vier weken voordat gebruik wordt gemaakt van de uitzondering, bedoeld in [artikel 4.1343][ref1], wordt
      een verklaring verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2], dat de stookinstallatie ten
      hoogste 500 uur per jaar in bedrijf zal zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1344
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1344.2
    text: |-
      Als een verklaring is verstrekt en het aantal bedrijfsuren in een kalenderjaar de grens van 500 uur overschrijdt,
      wordt het bevoegd gezag hierover geïnformeerd en komt de verklaring te vervallen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1344
  - number: 4.1345.1
    text: |-
      De emissies van stikstofoxiden, zwaveldioxide en totaal stof worden omgerekend naar een volumegehalte aan zuurstof
      van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1345
  - number: 4.1345.1.a
    text: 15% in afgas, als het gaat om een dieselmotor, een gasturbine of een gasmotor;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1345
  - number: 4.1345.1.b
    text: 6% in afgas, als het gaat om een stookinstallatie voor vaste brandstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1345
  - number: 4.1345.1.c
    text: 3% in afgas, als het gaat om een andere stookinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1345
  - number: 4.1345.2
    text: De emissies van stikstofoxiden worden berekend als stikstofdioxide.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1345
  - number: '4.1346'
    text: |-
      Voor de emissie in de lucht van een gasturbine zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.1346.
          Tabel 4.1346 Emissiegrenswaarden gasturbine


