  - number: '6.51'
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam worden bij het kweken van
      consumptievis, het kweken of houden van ongewervelde waterdieren of het telen van waterplanten geen stoffen aan het
      oppervlaktewaterlichaam toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.51
  - number: '6.52'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 6.49, tweede lid][ref1], is [paragraaf 5.3.1][ref2]
      over PRTR van overeenkomstige toepassing, als het gaat om het exploiteren van een PRTR-installatie voor intensieve
      aquacultuur met een productiecapaciteit van 1.000 ton vis of schelpdieren per jaar of meer.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
