            value: $is_aangewezen_in_hoofdstuk_3
  - number: 4.2.1
    text: Deze paragraaf is van toepassing op het exploiteren van een Seveso-inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.2
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: is_seveso_inrichting
            type: boolean
            required: true
            description: Of de inrichting een Seveso-inrichting is
            source: {}
        output:
          - name: paragraaf_4_2_van_toepassing
            type: boolean
            description: Of paragraaf 4.2 (Seveso-inrichtingen) van toepassing is
        actions:
          - output: paragraaf_4_2_van_toepassing
            value: $is_seveso_inrichting
  - number: 4.2.2
    text: |-
      In deze paragraaf wordt onder gevaarlijke stof verstaan: gevaarlijke stof als bedoeld in artikel 3, tiende lid, van
      de Seveso-richtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.2
  - number: 4.3.1
    text: |-
      In aanvulling op [artikel 23.2 van de wet][ref1] geldt een wijziging van de bijlagen I tot en met IV bij de Seveso-
      richtlijn voor de toepassing van deze paragraaf met ingang van de dag waarop aan die wijziging uitvoering moet zijn
      gegeven, tenzij bij ministerieel besluit, dat in de Staatscourant wordt bekendgemaakt, een ander tijdstip wordt
      vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel23
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '23'
  - number: 4.3.2
    text: |-
      Als in deze paragraaf wordt verwezen naar een bijlage bij de Seveso-richtlijn, zijn voor de toepassing van die
      bijlage de definities, bedoeld in artikel 3 van die richtlijn, van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.3
  - number: 4.4.1
    text: |-
      De regels in deze paragraaf die zijn gesteld met het oog op de bescherming van de veiligheid en gezondheid van de
      in de Seveso-inrichting werkzame werknemers, zijn van overeenkomstige toepassing op:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.4
  - number: 4.4.1.a
    text: de werkgever;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.4
  - number: 4.4.1.b
    text: de werkgever die zelf arbeid verricht in de Seveso-inrichting en de zelfstandige; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.4
  - number: 4.4.1.c
    text: degene die de controle heeft over de Seveso-inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.4
  - number: 4.4.2
    text: |-
      Om naleving van die regels te waarborgen, werken de in het eerste lid genoemde personen samen met degene die de
      activiteit verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.4
  - number: 4.5.1
    text: |-
      Binnen een jaar nadat deze paragraaf van toepassing is geworden op een Seveso-inrichting, worden de volgende
      gegevens en bescheiden verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.5.1.a
    text: |-
      de naam en functie van de met de leiding van de Seveso-inrichting belaste persoon, als dat een ander is dan degene
      die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.1.b
    text: |-
      de gegevens die nodig zijn om de gevaarlijke stoffen en de categorie van gevaarlijke stoffen te identificeren die
      in de Seveso-inrichting aanwezig zijn of kunnen zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.1.c
    text: |-
      een lijst met de hoeveelheden, aard en fysische vormen van de gevaarlijke stoffen die aanwezig zijn of kunnen zijn
      in de Seveso-inrichting;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.1.d
    text: de activiteiten die in de Seveso-inrichting worden verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.1.e
    text: |-
      informatie over de directe omgeving van de Seveso-inrichting en de factoren die een zwaar ongeval kunnen
      veroorzaken of de gevolgen ervan ernstiger kunnen maken, met gegevens over inrichtingen als bedoeld in artikel 9,
      eerste lid, van de Seveso-richtlijn, milieubelastende activiteiten waarop deze paragraaf niet van toepassing is en
      gebieden en ontwikkelingen die de bron kunnen zijn van of het risico of de gevolgen van een zwaar ongeval kunnen
      vergroten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.1.f
    text: |-
      de gegevens, bedoeld in [artikel 4.16, eerste lid, onder a en b][ref1], als de Seveso-inrichting een
      hogedrempelinrichting is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.5.2
    text: |-
      Het eerste lid is niet van toepassing als de gegevens en bescheiden al zijn verstrekt bij een aanvraag om een
      omgevingsvergunning voor een milieubelastende activiteit en deze niet zijn gewijzigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.3
    text: De lijst, bedoeld in het eerste lid, onder c, kan door een ieder worden geraadpleegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.4
    text: |-
      Voor de aard en fysische vormen van de gevaarlijke stoffen op de lijst, bedoeld in het eerste lid, onder c, kan de
      gevaarscategorie respectievelijk de chemische naam en het CAS-nummer worden vermeld als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.4.a
    text: uit die gegevens de fysisch-chemische eigenschappen en gevaareigenschappen kenbaar zijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.5.4.b
    text: kan worden bepaald om welke gevaarlijke stof of categorie, bedoeld in bijlage I bij de Seveso-richtlijn, het gaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.5
  - number: 4.6.1
    text: |-
      Ruim voor een wijziging als bedoeld onder a tot en met f worden aan het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref1], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.6.1.a
    text: |-
      een significante wijziging van de hoeveelheid, aard of fysische vorm van een gevaarlijke stof die in de Seveso-
      inrichting aanwezig is of kan zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.1.b
    text: een significante wijziging van een proces waarbij een gevaarlijke stof wordt gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.1.c
    text: de sluiting of de ontmanteling van de Seveso-inrichting;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.1.d
    text: een wijziging die significante gevolgen kan hebben voor de gevaren van zware ongevallen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.1.e
    text: een wijziging van de naam, de handelsnaam of het adres van degene die de activiteit verricht; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.1.f
    text: |-
      een wijziging van de naam of functie van de met de leiding van de Seveso-inrichting belaste persoon, als dat een
      ander is dan degene die de activiteit verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.6.2
    text: |-
      Het eerste lid is niet van toepassing als de gegevens en bescheiden al zijn verstrekt bij een aanvraag om een
      omgevingsvergunning voor een milieubelastende activiteit en deze niet zijn gewijzigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.6
  - number: 4.7.1
    text: |-
      Als een zwaar ongeval heeft plaatsgevonden, worden zo spoedig mogelijk aan de toezichthouder, bedoeld in
      [artikel 1, derde lid, onder d, van de Arbeidsomstandighedenwet][ref1], gegevens en bescheiden verstrekt over:


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 4.7.1.a
    text: datum, tijd, plaats en omstandigheden van het zware ongeval;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.1.b
    text: de gevaarlijke stoffen die het betreft en de hoeveelheid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.1.c
    text: de gevolgen voor de werknemers, die zich op korte en lange termijn kunnen voordoen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.1.d
    text: |-
      het aantal gewonde werknemers, dat voor ten minste 24 uur in een ziekenhuis is opgenomen, en het aantal overleden
      werknemers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.1.e
    text: |-
      de maatregelen ter bescherming van de werknemers, die zijn getroffen of worden getroffen om herhaling te voorkomen;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.1.f
    text: de materiële schade in de Seveso-inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: 4.7.2
    text: |-
      Gegevens en bescheiden uit nader onderzoek die afwijken van eerder verstrekte gegevens en bescheiden, worden
      verstrekt aan de toezichthouder, bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.7
  - number: '4.8'
    text: Een maatwerkregel of maatwerkvoorschrift over deze paragraaf kan alleen aanvullende maatregelen bevatten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.8
  - number: 4.9.1
    text: |-
      Alle maatregelen worden getroffen die nodig zijn om zware ongevallen te voorkomen en de gevolgen daarvan voor de
      gezondheid en het milieu te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.9
  - number: 4.9.2
    text: Op elk moment kan worden aangetoond dat aan het eerste lid wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.9
  - number: 4.9.3
    text: |-
      Het is verboden een Seveso-inrichting of een gedeelte daarvan te exploiteren of in werking te hebben als de
      maatregelen, bedoeld in het eerste lid, niet zijn getroffen of duidelijk onvoldoende zijn uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.9
  - number: 4.10.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan is preventiebeleid
      opgesteld dat borg staat voor een hoog beschermingsniveau van de gezondheid en het milieu en evenredig is aan de
      gevaren van zware ongevallen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.2
    text: 'Het preventiebeleid bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.2.a
    text: de algemene doelen van en beginselen voor het handelen van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.2.b
    text: de rol en de verantwoordelijkheid van het management van de Seveso-inrichting; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.2.c
    text: |-
      de plicht om de beheersing van gevaren van zware ongevallen continu te verbeteren en hoge beschermingsniveaus te
      waarborgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.3
    text: 'Het tweede lid, onder a, houdt in ieder geval in dat zijn beschreven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.3.a
    text: in hoofdlijnen de aard en de omvang van de risico’s van zware ongevallen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.3.b
    text: de beginselen die ten grondslag liggen aan het veiligheidsbeheerssysteem en de samenhang met dat systeem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.3.c
    text: de criteria die worden toegepast bij de vaststelling van de risico’s van zware ongevallen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.10.3.d
    text: |-
      de beginselen die ten grondslag liggen aan de maatregelen die zijn getroffen om zware ongevallen te voorkomen en de
      gevolgen daarvan te beperken en de samenhang tussen die maatregelen en de risico’s van zware ongevallen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.10
  - number: 4.11.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan wordt het preventiebeleid
      uitgevoerd met passende middelen, structuren en een veiligheidsbeheerssysteem dat voldoet aan alle punten van
      bijlage III bij de Seveso-richtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.11.2
    text: |-
      De passende middelen, structuren en het veiligheidsbeheerssysteem zijn evenredig aan de gevaren van zware
      ongevallen, de complexiteit van de organisatie en de activiteiten die in de Seveso-inrichting worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.11.3
    text: |-
      De procedures voor de systematische identificatie van de gevaren van zware ongevallen, bedoeld in bijlage III,
      onder b, onder ii, bij de Seveso-richtlijn, gaan in ieder geval over:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.11.3.a
    text: |-
      het verrichten van systematisch onderzoek naar de risico’s van zware ongevallen van een Seveso-installatie tijdens
      het ontwerpen, het bouwen, het gebruiken, het onderhouden en het wijzigen van die installatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.11.3.b
    text: |-
      de criteria voor het bepalen van de methode van het systematisch onderzoek die is afgestemd op de fases, bedoeld
      onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.11.3.c
    text: |-
      de methode voor de beoordeling van de risico’s van zware ongevallen die geschikt is om de maatregelen te bepalen
      die worden getroffen om zware ongevallen te voorkomen en de gevolgen daarvan te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.11
  - number: 4.12.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan worden het
      preventiebeleid en het veiligheidsbeheerssysteem in ieder geval bijgewerkt bij een wijziging als bedoeld in
      [artikel 4.6, eerste lid, onder a, b, c of d][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.12.2
    text: Het preventiebeleid wordt ten minste elke vijf jaar beoordeeld en zo nodig bijgewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.12
  - number: 4.13.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan worden voor Seveso-
      inrichtingen die op grond van [artikel 8.38 van het Besluit kwaliteit leefomgeving][ref1] in de omgevingsvergunning
      of door Onze Minister van Sociale Zaken en Werkgelegenheid zijn aangewezen als inrichting als bedoeld in
      artikel 9, eerste lid, van de Seveso-richtlijn, gegevens uitgewisseld die nodig zijn om in het preventiebeleid,
      veiligheidsbeheerssysteem, veiligheidsrapport en intern noodplan rekening te houden met de aard en omvang van het
      risico van een zwaar ongeval.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.13
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 4.13.2
    text: 'Degenen die de Seveso-inrichtingen, bedoeld in het eerste lid, exploiteren, werken samen bij het geven van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.13
  - number: 4.13.2.a
    text: |-
      voorlichting aan het publiek en de nabijgelegen bedrijven die niet onder het toepassingsbereik van deze paragraaf
      vallen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.13
  - number: 4.13.2.b
    text: |-
      gegevens en bescheiden voor het opstellen van het rampbestrijdingsplan, bedoeld in
      [artikel 6.1.1 van het Besluit veiligheidsregio’s][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0027844#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.13
    references:
      - id: ref1
        bwb_id: BWBR0027844
        artikel: '6'
  - number: 4.14.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan is voor een
      hogedrempelinrichting een veiligheidsrapport opgesteld met actuele gegevens over de veiligheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.2
    text: |-
      Het veiligheidsrapport bevat de namen van de organisaties die betrokken zijn geweest bij het opstellen van
      het veiligheidsrapport en bevat in ieder geval de gegevens en bescheiden, bedoeld in bijlage II bij de Seveso-
      richtlijn, waarmee wordt aangetoond dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.2.a
    text: |-
      preventiebeleid als bedoeld in [artikel 4.10][ref1] en een veiligheidsbeheersysteem als bedoeld in
      [artikel 4.11, eerste lid][ref2], zijn ingevoerd;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.14.2.b
    text: |-
      de gevaren van zware ongevallen en scenario’s voor mogelijke zware ongevallen zijn geïdentificeerd en de
      maatregelen zijn getroffen die nodig zijn om die zware ongevallen te voorkomen en de gevolgen daarvan voor de
      gezondheid en het milieu te beperken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.2.c
    text: |-
      het ontwerp, de constructie, de exploitatie en het onderhoud van de Seveso-installaties die in verband staan met de
      gevaren van een zwaar ongeval binnen de Seveso-inrichting, voldoende veilig en betrouwbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.3
    text: 'Het veiligheidsrapport bevat ook:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.3.a
    text: |-
      een schatting van de kans op en de omvang van de gevolgen van een zwaar ongeval dat door een Seveso-inrichting als
      bedoeld in [artikel 4.13, eerste lid][ref1], wordt veroorzaakt;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.14.3.b
    text: |-
      een schatting van de kans op en de omvang van de gevolgen van een aardbeving, overstroming of andere natuurlijke
      oorzaak als bedoeld in bijlage II, onder 4, onder iii, bij de Seveso-richtlijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.3.c
    text: een beschrijving van de maatregelen die zijn getroffen om de gevolgen, bedoeld onder a en b, te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.14.4
    text: |-
      Bij de beschrijving van de installatie, bedoeld in bijlage II, onder 3, bij de Seveso-richtlijn, wordt een
      beschrijving gegeven van de processen die in de Seveso-inrichting plaatsvinden, het verloop daarvan en de
      hoeveelheden, eigenschappen en gedragingen van de gevaarlijke stoffen die in de Seveso-inrichting aanwezig zijn
      onder de omstandigheden die in de Seveso-inrichting gelden en bij een voorzienbaar ongeval.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.14
  - number: 4.15.1
    text: |-
      De beschrijving van de scenario’s voor mogelijke zware ongevallen, bedoeld in bijlage II, onder 4, onder a, bij
      de Seveso-richtlijn, gaat ten minste over de onderdelen van de Seveso-installaties die de grootste risico’s op
      een zwaar ongeval opleveren. De selectie van deze Seveso-installaties vindt plaats volgens een methode die in het
      veiligheidsrapport is beschreven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.2
    text: |-
      Bij de beschrijving, bedoeld in het eerste lid, komen de voorvallen terug die deze scenario’s op gang kunnen
      brengen, waaronder corrosie, erosie, externe belasting, impact, overdruk of onderdruk, lage of hoge temperatuur,
      trillingen en menselijke fouten tijdens gebruik, wijziging of onderhoud.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.3
    text: |-
      Voor elk scenario wordt kwalitatief of met risicoberekeningen aangegeven wat de waarschijnlijkheid en het effect is
      en welke maatregelen zijn getroffen om te voorkomen dat het scenario zich voordoet en voor elk scenario wordt een
      samenhangend inzicht geboden in:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.3.a
    text: de resterende kans dat een zwaar ongeval plaatsvindt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.3.b
    text: de ernst van de gevolgen van een zwaar ongeval; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.3.c
    text: |-
      de maatregelen die technisch mogelijk zijn om de kans op en de gevolgen van een zwaar ongeval te verkleinen tot een
      daarbij aangegeven niveau.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.15.4
    text: |-
      Uit de scenario’s blijkt dat de risico’s van zware ongevallen worden beheerst met de technische en organisatorische
      maatregelen die zijn getroffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.15
  - number: 4.16.1
    text: 'Het veiligheidsrapport bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.1.a
    text: |-
      de berekende afstand in meters tot waar het plaatsgebonden risico ten hoogste 1 op de 100.000 en 1 op de 1.000.000
      per jaar is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.1.b
    text: |-
      de berekende afstand in meters voor het brandaandachtsgebied, explosieaandachtsgebied en gifwolkaandachtsgebied,
      bedoeld in [artikel 5.12 van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.16.1.c
    text: |-
      een schatting van de kans dat een zwaar ongeval belangrijke ongewenste gevolgen heeft voor de kwaliteit van een
      oppervlaktewaterlichaam of vuilwaterriool en een schatting van de omvang van die gevolgen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.1.d
    text: een beschrijving van de maatregelen die zijn getroffen om de gevolgen, bedoeld onder c, te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.1.e
    text: |-
      een beschrijving van de zones die door een zwaar ongeval kunnen worden getroffen, als zij van belang zijn voor de
      veiligheid voor de omgeving; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.1.f
    text: |-
      het aantal personen buiten de Seveso-inrichting dat ten hoogste wordt blootgesteld aan het risico van een zwaar
      ongeval.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: 4.16.2
    text: |-
      Op het berekenen van de afstanden voor het plaatsgebonden risico, het brandaandachtsgebied, het
      explosieaandachtsgebied en het gifwolkaandachtsgebied zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.16
  - number: '4.17'
    text: 'Het veiligheidsrapport bevat een beschrijving van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
  - number: 4.17.a
    text: 'de scenario’s voor een mogelijk zwaar ongeval die bepalend zijn voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
  - number: 4.17.a.1°
    text: |-
      het rampbestrijdingsplan, bedoeld in [artikel 6.1.1 van het Besluit veiligheidsregio’s][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0027844#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0027844
        artikel: '6'
  - number: 4.17.a.2°
    text: |-
      de omvang en de uitrusting van de bedrijfsbrandweer, bedoeld in
      [artikel 7.2, eerste lid, onder d, van het Besluit veiligheidsregio’s][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0027844#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0027844
        artikel: '7'
  - number: 4.17.b
    text: de organisatie van de bedrijfsbrandweer die nodig is, waaronder de omvang van het personeel en materieel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
  - number: 4.17.c
    text: |-
      de zones die door een zwaar ongeval kunnen worden getroffen, als zij van belang zijn voor de voorbereiding van de
      rampenbestrijding; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
  - number: 4.17.d
    text: |-
      overige gegevens die nodig zijn met het oog op de voorbereiding van de rampenbestrijding, het opstellen van een
      rampbestrijdingsplan als bedoeld in [artikel 6.1.1 van het Besluit veiligheidsregio’s][ref1] en het aanwijzen van
      een locatie waarop een of meer milieubelastende activiteiten worden verricht als bedrijfsbrandweerplichtig, bedoeld
      in [artikel 31 van de Wet veiligheidsregio’s][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0027844#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0027466#Artikel31
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0027844
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0027466
        artikel: '31'
  - number: '4.18'
    text: 'Het veiligheidsrapport bevat een beschrijving van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.18
  - number: 4.18.a
    text: |-
      het aantal personen dat ten hoogste in de Seveso-inrichting aanwezig is, het aantal personen dat binnen de Seveso-
      inrichting wordt blootgesteld aan het risico van een zwaar ongeval en een indicatie van de verdeling van het aantal
      personen over die Seveso-inrichting;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.18
  - number: 4.18.b
    text: |-
      zones die door een zwaar ongeval kunnen worden getroffen, als zij van belang zijn voor de veiligheid en gezondheid
      van de werknemers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.18
  - number: 4.18.c
    text: de scenario’s per Seveso-installatie voor een mogelijk zwaar ongeval die bepalend zijn voor het intern noodplan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.18
  - number: 4.18.d
    text: de gevolgen die de beschrijving van de beschermingsmiddelen en interventiemiddelen heeft voor het intern noodplan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.18
  - number: '4.19'
    text: 'Het veiligheidsrapport wordt bezien en zo nodig bijgewerkt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.19
  - number: 4.19.a
    text: ten minste elke vijf jaar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.19
  - number: 4.19.b
    text: na een zwaar ongeval in de Seveso-inrichting;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.19
  - number: 4.19.c
    text: om rekening te houden met nieuwe feiten of nieuwe technische kennis over veiligheid; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.19
  - number: 4.19.d
    text: |-
      bij een wijziging als bedoeld in [artikel 4.6, eerste lid, onder a, b, c of d][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: '4.20'
    text: |-
      Een opgesteld of bijgewerkt veiligheidsrapport of deel daarvan wordt onverwijld verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.21'
    text: |-
      Het preventiebeleid, het veiligheidsrapport en het veiligheidsdocument en gezondheidsdocument, bedoeld in
      [artikel 2.42, tweede lid, van het Arbeidsomstandighedenbesluit][ref1], kunnen worden samengevoegd in één document.


      [ref1]: https://wetten.overheid.nl/BWBR0008498#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.21
    references:
      - id: ref1
        bwb_id: BWBR0008498
        artikel: '2'
  - number: 4.22.1
    text: |-
      Met het oog op het beperken van de gevolgen van zware ongevallen is voor een hogedrempelinrichting een intern
      noodplan opgesteld en ingevoerd om:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.1.a
    text: zware ongevallen in te dammen en te beheersen en de gevolgen ervan zoveel mogelijk te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.1.b
    text: de maatregelen die nodig zijn uit te voeren tegen de gevolgen van zware ongevallen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.1.c
    text: aan een ieder relevante gegevens en bescheiden te verstrekken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.2
    text: Het intern noodplan bevat de gegevens en bescheiden, bedoeld in bijlage IV bij de Seveso-richtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.3
    text: Het intern noodplan wordt ten minste elke drie jaar beoordeeld en beproefd en zo nodig bijgewerkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.22.4
    text: |-
      Als het intern noodplan wordt bijgewerkt, wordt rekening gehouden met de werkmethoden en productiemethoden
      die in de Seveso-inrichting worden toegepast, de veranderingen van technische en organisatorische aard bij de
      hulpverleningsorganisaties van de overheid en veranderingen in het veiligheidsinzicht die voor de risico’s van een
      zwaar ongeval belangrijke gevolgen kunnen hebben.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.22
  - number: 4.23.1
    text: |-
      Als een ondernemingsraad of een personeelsvertegenwoordiging ontbreekt, worden belanghebbende werknemers die
      werkzaam zijn in de Seveso-inrichting geraadpleegd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.1.a
    text: |-
      voordat het veiligheidsrapport of een gewijzigd deel daarvan aan het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref1], wordt verstrekt; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.23.1.b
    text: bij het opstellen van het intern noodplan of een gewijzigd deel daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.2
    text: |-
      Over het intern noodplan of een gewijzigd deel daarvan worden ook geraadpleegd de werknemers van andere werkgevers
      die op basis van een langlopende overeenkomst tot aanneming van werk in de Seveso-inrichting werkzaam zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.3
    text: 'Op verzoek wordt inzage gegeven in het veiligheidsrapport en het intern noodplan aan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.3.a
    text: de werknemers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.3.b
    text: |-
      de bedrijfshulpverleners, bedoeld in [artikel 15, eerste lid, van de Arbeidsomstandighedenwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '15'
  - number: 4.23.3.c
    text: |-
      de externe hulpverleningsorganisaties, bedoeld in
      [artikel 3, eerste lid, onder e, van de Arbeidsomstandighedenwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '3'
  - number: 4.23.3.d
    text: |-
      de deskundige werknemers en andere deskundige personen, bedoeld in
      [artikel 13, tweede lid, van de Arbeidsomstandighedenwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel13
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '13'
  - number: 4.23.3.e
    text: |-
      de deskundige personen, bedoeld in [artikel 14, eerste lid, van de Arbeidsomstandighedenwet][ref1] of een
      arbodienst als bedoeld in [artikel 14a, eerste lid, van die wet][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0010346#Artikel14a
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '14'
      - id: ref2
        bwb_id: BWBR0010346
        artikel: 14a
  - number: 4.23.3.f
    text: de zelfstandige en de werkgever die zelf arbeid verricht in de Seveso-inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.23.4
    text: |-
      Het eerste lid, aanhef en onder a, en het derde lid, zijn alleen van toepassing voor de onderdelen 1, 2, onder b
      en d, 3, 4, en 5 van bijlage II bij de Seveso-richtlijn, die verband houden met de bescherming van de veiligheid en
      gezondheid van de in de Seveso-inrichting werkzame werknemers.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.23
  - number: 4.24.1
    text: |-
      Met het oog op het voorkomen van zware ongevallen en het beperken van de gevolgen ervan wordt voor een
      hogedrempelinrichting een actuele lijst bijgehouden van de aanwezige gevaarlijke stoffen en stoffen die op basis
      van aard of hoeveelheid een risico vormen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.2
    text: De lijst bevat gegevens over de aard, fysische vorm en hoeveelheid van de stoffen, bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3
    text: |-
      Voor de hulpverleningsdiensten van de overheid zijn per stof, bedoeld in het eerste lid, onverwijld toegankelijk de
      volgende gegevens:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3.a
    text: de chemische stofnaam of handelsnaam;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3.b
    text: de hoeveelheid die ten hoogste aanwezig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3.c
    text: het CAS-nummer of het veiligheidsinformatieblad;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3.d
    text: het UN-nummer; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.3.e
    text: het gevaarsidentificatienummer, bedoeld in hoofdstuk 3.2 van bijlage A bij de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.24.4
    text: |-
      Als de gegevens, bedoeld in het derde lid, onder c, d of e, niet bestaan, zijn, naast de gegevens, bedoeld in het
      derde lid, onder a en b, gegevens beschikbaar over het gevaar voor een explosie, een brand en een toxische wolk.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.24
  - number: 4.25.1
    text: |-
      Als gegevens als bedoeld in [artikel 19.3, eerste lid, laatste zin, van de Wet milieubeheer][ref1] worden
      aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.25
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
  - number: 4.25.1.a
    text: |-
      de lijst, bedoeld in [artikel 4.5, eerste lid, onder c][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.2'
  - number: 4.25.1.b
    text: |-
      de lijst, bedoeld in [artikel 4.24, eerste lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
