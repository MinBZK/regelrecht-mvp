  - number: 7.61h.3.c
    text: 'voor chemisch zuurstofverbruik: NEN-ISO 15705.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61h
  - number: 7.61i.1
    text: |-
      Het is verboden de volgende activiteiten te verrichten zonder dit ten minste vier weken voor het begin ervan te
      melden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.1.a
    text: |-
      het lozen van afvalwater afkomstig van graven in bodem met een kwaliteit onder of gelijk aan de interventiewaarde
      bodemkwaliteit of boven de interventiewaarde bodemkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.1.b
    text: het lozen van afvalwater afkomstig van het saneren van de bodem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.1.c
    text: het lozen van afvalwater afkomstig van een grondwatersanering.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.2.a
    text: de resultaten van de beschikbare voorafgaande bodemonderzoeken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.2.b
    text: de locaties van de lozingspunten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.2.c
    text: het maximale lozingsdebiet in kubieke meters per uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61i.3
    text: |-
      Het eerste lid is niet van toepassing op het lozen van afvalwater afkomstig van graven in bodem met een kwaliteit
      onder of gelijk aan de interventiewaarde bodemkwaliteit of boven de interventiewaarde bodemkwaliteit, als de lozing
      minder dan 48 uur duurt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61i
  - number: 7.61j.1
    text: |-
      Ten minste vier weken voor het begin van de activiteit, bedoeld in [artikel 7.61i][ref1], worden aan het bevoegd
      gezag, bedoeld in [artikel 7.3][ref2], gegevens en bescheiden verstrekt over de verwachte datum van het begin van
      de activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61j
    references:
