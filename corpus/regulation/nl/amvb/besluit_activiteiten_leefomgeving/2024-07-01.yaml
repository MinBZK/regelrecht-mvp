        paragraaf: '4.25'
  - number: 4.384.2
    text: |-
      Het eerste lid is niet van toepassing als bij het wegen en mengen van rubbercompounds de maatregel, bedoeld in
      [artikel 4.382, derde lid][ref1], wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
