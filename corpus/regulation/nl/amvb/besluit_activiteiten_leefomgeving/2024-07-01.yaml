                    60 dB(A)
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121a
  - number: 4.1121b
    text: |-
      Als binnen 300 m vanaf het hart van het verplaatsbare mijnbouwwerk een geluidgevoelig gebouw ligt, wordt het geluid
      continu gemonitord en geregistreerd. De monitoring gebeurt zodanig dat een indicatie wordt verkregen van het geluid
      op de gevel van het meest met geluid belaste geluidgevoelige gebouw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1121b
  - number: '4.1122'
    text: |-
      Met het oog op het voorkomen van emissies van koolwaterstoffen in de lucht wordt een mijnbouwfakkel gebruikt met
      een rendement van ten minste 99%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1122
  - number: 4.1123.1
    text: 'Met het oog op het doelmatig beheer van afvalwater wordt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1123
  - number: 4.1123.1.a
    text: afvalwater afkomstig van een verplaatsbaar mijnbouwwerk op land niet geloosd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1123
  - number: 4.1123.1.b
    text: |-
      afstromend hemelwater afkomstig van een vloeistofdichte bodemvoorziening of een aaneengesloten bodemvoorziening op
      land geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1123
  - number: 4.1123.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afstromend hemelwater geloosd in een vuilwaterriool of via
      die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1123
  - number: '4.1124'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater en het beperken van verontreiniging van een
      oppervlaktewaterlichaam wordt afstromend hemelwater dat wordt geloosd in het vuilwaterriool voor vermenging met
      ander afvalwater geleid door een slibvangput en olieafscheider volgens NEN-EN 858-1 en NEN-EN 858-2.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1124
  - number: 4.1125.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1125
  - number: 4.1125.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1125
  - number: 4.1125.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1125
  - number: '4.1126'
    text: 'Met het oog op het voorkomen van geurhinder op land worden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126
  - number: 4.1126.a
    text: stoffen die buiten het terrein geurhinder veroorzaken niet gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126
  - number: 4.1126.b
    text: |-
      als dat redelijkerwijs mogelijk is, flensverbindingen in leidingen waardoor gassen of vloeistoffen die geurhinder
      kunnen veroorzaken worden getransporteerd niet gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126
  - number: 4.1126a
    text: |-
      De waarden voor geluidgevoelige ruimten binnen geluidgevoelige gebouwen, bedoeld in [tabel 4.1121a][ref1], gelden
      niet als het geluidgevoelige gebouw geheel of gedeeltelijk ligt op een op het tijdstip van inwerkingtreding van dit
      besluit aanwezig industrieterrein als bedoeld in [artikel 1 van de Wet geluidhinder][ref2], totdat voor dat terrein
      een van de volgende besluiten in werking is getreden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0003227#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.109'
      - id: ref2
        bwb_id: BWBR0003227
        artikel: '1'
  - number: 4.1126a.a
    text: |-
      bij omgevingsplan geluidproductieplafonds als omgevingswaarden zijn vastgesteld op grond van
      [artikel 2.11a van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 4.1126a.b
    text: |-
      bij besluit geluidproductieplafonds als omgevingswaarden zijn vastgesteld op grond van
      [artikel 2.12a, eerste lid, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 4.1126a.c
    text: |-
      bij omgevingsplan is bepaald dat een activiteit als bedoeld in
      [artikel 5.78b van het Besluit kwaliteit leefomgeving][ref1] niet wordt verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1126a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.1127'
    text: Deze paragraaf is van toepassing op het lozen van koelwater met een warmtevracht van 50 MW of minder.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1127
  - number: 4.1128.1
    text: |-
      Het is verboden het afvalwater, bedoeld in [artikel 4.1127][ref1], te lozen op een oppervlaktewaterlichaam zonder
      dit ten minste vier weken voor het begin ervan te melden, als een koelwatercirculatiesysteem met een waterverbruik
      van meer dan 25.000 m3/jaar of een koelwaterdoorstroomsysteem wordt gebruikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.110'
  - number: 4.1128.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.2.a
    text: de locaties van de lozingspunten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.2.b
    text: 'voor het lozen van koelwater afkomstig van een koelwatercirculatiesysteem waaraan chloorbleekloog is toegevoegd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.2.b.1°
    text: de resultaten van een immissietoets van het chloorbleekloog, uitgevoerd volgens het Handboek Immissietoets; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.2.b.2°
    text: het maximale lozingsdebiet; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.2.c
    text: |-
      voor het lozen van koelwater afkomstig van een koelwaterdoorstroomsysteem: de maximale warmtevracht van het
      koelwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
  - number: 4.1128.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1128
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1129.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen koelwater afkomstig van een
      koelwatercirculatiesysteem met een waterverbruik van meer dan 25.000 m3/jaar of van een koelwaterdoorstroomsysteem
      geloosd op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1129
  - number: 4.1129.2
    text: |-
      Het te lozen koelwater afkomstig van een koelwatercirculatiesysteem met een waterverbruik van minder dan 25.000 m3/
      jaar wordt geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1129
  - number: 4.1129.3
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen koelwater, bedoeld in het eerste lid, geloosd op een
      oppervlaktewaterlichaam of via die andere route, of wordt het te lozen koelwater, bedoeld in het tweede lid,
      geloosd in een vuilwaterriool of via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1129
  - number: 4.1130.1
    text: |-
      Met het oog op het beperken van verontreiniging van een oppervlaktewaterlichaam wordt bij het gebruik van
      koelwaterdoorstroomsysteem alleen chloorbleekloog aan het koelwater toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1130
  - number: 4.1130.2
    text: 'Voor het koelwater dat wordt geloosd op een oppervlaktewaterlichaam is de emissiegrenswaarde voor chloor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1130
  - number: 4.1130.2.a
    text: |-
      als een automatisch doseersysteem aanwezig is dat niet meer dan 20% van de tijd chloorbleekloog doseert, 0,5 mg/l
      vrij beschikbaar chloor, gemeten in een steekmonster; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1130
  - number: 4.1130.2.b
    text: in andere gevallen, 0,2 mg/l vrij beschikbaar chloor, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1130
  - number: 4.1131.1
    text: |-
      Met het oog op het beperken van verontreiniging van een oppervlaktewaterlichaam, wordt bij het gebruik van een
      koelwatercirculatiesysteem alleen chloorbleekloog aan het koelwater, bedoeld in [artikel 4.1129, eerste lid][ref1],
      toegevoegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1131
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.110'
  - number: 4.1131.2
    text: 'Voor dat koelwater is de emissiegrenswaarde voor chloor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1131
  - number: 4.1131.2.a
    text: |-
      bij een periodieke dosering van chloorbleekloog, een half uur na dosering, 2 mg/l vrij beschikbaar chloor en twee
      uur na sondering 0,5 mg/l vrij beschikbaar chloor, gemeten in een steekmonster; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1131
  - number: 4.1131.2.b
    text: bij een continue dosering van chloorbleekloog, 0,5 mg/l vrij beschikbaar chloor, gemeten in een steekmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1131
  - number: 4.1132.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1132
  - number: 4.1132.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1132
  - number: 4.1132.3
    text: Op het bepalen van de temperatuur van het water is NEN 6414 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1132
  - number: 4.1132.4
    text: |-
      Op het analyseren van een monster is voor vrij beschikbaar chloor NEN-EN-ISO 7393-1, NEN-EN-ISO 7393-2 of NEN-EN-
      ISO 7393-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1132
  - number: '4.1133'
    text: 'De warmtevracht van koelwater wordt berekend als het product van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1133
  - number: 4.1133.a
    text: het lozingsdebiet van koelwater in kubieke meters per seconde;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1133
  - number: 4.1133.b
    text: |-
      het verschil tussen de temperatuur van het koelwater dat geloosd gaat worden en de temperatuur van het
      oppervlaktewaterlichaam waarop wordt geloosd in °C; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1133
  - number: 4.1133.c
    text: de warmtecapaciteit van koelwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1133
  - number: '4.1134'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1134
  - number: 4.1134.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1134
  - number: 4.1134.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1134
  - number: 4.1134.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1134
  - number: '4.1135'
    text: Deze paragraaf is van toepassing op het aanleggen en gebruiken van een gesloten bodemenergiesysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1135
  - number: 4.1136.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1135][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1136
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.111'
  - number: 4.1136.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1136
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1137'
    text: |-
      Ten minste vier weken voor het begin van de activiteit worden de volgende gegevens en bescheiden verstrekt aan het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1137.a
    text: |-
      een plattegrondtekening en situatietekening met daarop de ligging van de lussen van het gesloten
      bodemenergiesysteem, het middelpunt van het systeem en de einddiepte waarop het systeem zal worden aangelegd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1137.b
    text: |-
      de coördinaten van het middelpunt van het gesloten bodemenergiesysteem en de einddiepte van het systeem in meters
      onder het maaiveld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1137.c
    text: |-
      gegevens waaruit blijkt dat het gebruiken van het gesloten bodemenergiesysteem niet leidt tot negatieve
      interferentie met bodemenergiesystemen in de omgeving waarvoor een melding is gedaan of een omgevingsvergunning
      is verleend;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1137.d
    text: |-
      een verklaring van degene die het gesloten bodemenergiesysteem installeert over het energierendement, uitgedrukt
      als de SPF, dat het systeem zal behalen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1137.e
    text: |-
      informatie over het bodemzijdig vermogen van het gesloten bodemenergiesysteem en de omvang van de behoefte aan
      warmte en koude waarin het systeem zal voorzien; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1137.f
    text: |-
      de naam en het adres van degene die het gesloten bodemenergiesysteem zal ontwerpen en installeren en van degene die
      de boringen zal verrichten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1137
  - number: 4.1138.1
    text: 'Van de volgende gegevens wordt een registratie bijgehouden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138
  - number: 4.1138.1.a
    text: |-
      de hoeveelheden warmte en koude die vanaf de datum waarop het gesloten bodemenergiesysteem in gebruik werd genomen
      aan de bodem zijn toegevoegd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138
  - number: 4.1138.1.b
    text: het jaarlijks energierendement; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138
  - number: 4.1138.1.c
    text: |-
      de gemiddelde temperatuur per maand van de circulatievloeistof in de leiding waarin de circulatievloeistof wordt
      teruggeleid naar de bodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138
  - number: 4.1138.2
    text: |-
      Dit artikel is niet van toepassing op een gesloten bodemenergiesysteem dat alleen wordt
      gebruikt ten behoeve van een woonfunctie niet gelegen in een woongebouw als bedoeld in
      [bijlage I bij het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 4.1138a
    text: |-
      Jaarlijks voor 1 april worden de gegevens, bedoeld in [artikel 4.1138][ref1], verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1138a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.111'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.1139'
    text: |-
      Met het oog op het doelmatig functioneren van bodemenergiesystemen wordt negatieve interferentie voorkomen tussen
      het gesloten bodemenergiesysteem dat wordt aangelegd en de bodemenergiesystemen in de omgeving waarvoor een melding
      is gedaan of een omgevingsvergunning is verleend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1139
  - number: 4.1140.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen spoelwater afkomstig van het aanleggen van
      een gesloten bodemenergiesysteem geloosd in een vuilwaterriool of op of in de bodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1140
  - number: 4.1140.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool, op of in de bodem
      of via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1140
  - number: '4.1141'
    text: |-
      De temperatuur van de circulatievloeistof in de leiding waarin de circulatievloeistof wordt teruggeleid naar de
      bodem, is ten minste –3 °C en ten hoogste 30 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1141
  - number: '4.1142'
    text: |-
      Een gesloten bodemenergiesysteem wordt ontworpen, aangelegd, onderhouden, gerepareerd en buiten gebruik gesteld
      door een onderneming met een erkenning bodemkwaliteit voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1142
  - number: 4.1142.a
    text: BRL SIKB 11000, voor het ondergrondse deel van het systeem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1142
  - number: 4.1142.b
    text: BRL KvINL 6000-21/00, voor het bovengrondse deel van het systeem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1142
  - number: 4.1142.c
    text: BRL SIKB 2100, voor mechanisch boren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1142
  - number: 4.1143.1
    text: |-
      Met het oog op het doelmatig gebruik van bodemenergie is het gesloten bodemenergiesysteem zo geïnstalleerd dat het
      is afgestemd op de aard en de omvang van de behoefte aan warmte of koude waarin het systeem voorziet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1143
  - number: 4.1143.2
    text: Een gesloten bodemenergiesysteem levert het energierendement dat bij een doelmatig gebruik kan worden behaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1143
  - number: 4.1143.3
    text: |-
      In elke periode van vijf jaar vanaf de dag waarop het gesloten bodemenergiesysteem in gebruik is genomen, is er
      een moment waarop de totale hoeveelheid warmte in megawattuur die aan de bodem is toegevoegd niet groter is dan de
      totale hoeveelheid koude in megawattuur die aan de bodem is toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1143
  - number: 4.1143.4
    text: |-
      Dit artikel is niet van toepassing op een gesloten bodemenergiesysteem dat alleen wordt
      gebruikt ten behoeve van een woonfunctie niet gelegen in een woongebouw als bedoeld in
      [bijlage I bij het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1143
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: '4.1144'
    text: |-
      Het energierendement, uitgedrukt als SPF, wordt berekend volgens de formule: waarbij wordt verstaan onder: Qw:
      de hoeveelheid warmte per jaar in megawattuur die door het gesloten bodemenergiesysteem wordt geleverd; Qk: de
      hoeveelheid koude per jaar in megawattuur die door het systeem wordt geleverd; E: de hoeveelheid elektriciteit
      per jaar in megawattuur die door het systeem wordt verbruikt; G: de hoeveelheid gas per jaar in megawattuur die
      door het systeem wordt verbruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1144
  - number: '4.1145'
    text: |-
      De hoeveelheden warmte en koude die aan de bodem worden toegevoegd, worden gemeten met momentane metingen met een
      meetonnauwkeurigheid van ten hoogste 5% die ten minste eenmaal per vijftien minuten worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1145
  - number: '4.1146'
    text: |-
      Ten minste vier weken voor het beëindigen van de activiteit, bedoeld in [artikel 4.1135][ref1], worden de volgende
      gegevens verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1146
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.111'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1146.a
    text: gegevens over de manier waarop het gesloten bodemenergiesysteem buiten gebruik wordt gesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1146
  - number: 4.1146.b
    text: de naam en het adres van degene die de werkzaamheden gaat verrichten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1146
  - number: 4.1147.1
    text: |-
      Met het oog op het voorkomen van verontreiniging en vermenging van grondwater uit verschillende watervoerende lagen
      wordt zo spoedig mogelijk na het beëindigen van het gebruik van het besloten bodemenergiesysteem:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1147
  - number: 4.1147.1.a
    text: de circulatievloeistof uit de buizen verwijderd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1147
  - number: 4.1147.1.b
    text: het systeem zo opgevuld dat de waterscheidende lagen in stand blijven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1147
  - number: 4.1147.2
    text: Het ondergrondse deel van het systeem wordt niet verwijderd voor zover het dieper dan 10 m onder het maaiveld ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1147
  - number: 4.1147a
    text: |-
      De [artikelen 4.1136 tot en met 4.1145][ref1] zijn niet van toepassing op een gesloten bodemenergiesysteem dat is
      aangelegd voor 1 juli 2013.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1147a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.111'
  - number: '4.1148'
    text: Deze paragraaf is van toepassing op het aanleggen en gebruiken van een open bodemenergiesysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1148
  - number: '4.1149'
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1148][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden, als de activiteit niet meer als vergunningplichtig is aangewezen
      in de omgevingsverordening, bedoeld in [artikel 2.16][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1149
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.112'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.5'
  - number: '4.1150'
    text: 'Van de volgende gegevens wordt een registratie bijgehouden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1150
  - number: 4.1150.a
    text: |-
      de hoeveelheden warmte en koude die vanaf de datum waarop het open bodemenergiesysteem in gebruik is genomen aan de
      bodem zijn toegevoegd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1150
  - number: 4.1150.b
    text: het jaarlijks energierendement; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1150
  - number: 4.1150.c
    text: de gemiddelde temperatuur per maand van het grondwater dat door het systeem in de bodem wordt teruggeleid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1150
  - number: 4.1150a
    text: |-
      Jaarlijks voor 1 april worden de gegevens en bescheiden, bedoeld in [artikel 4.1150][ref1], verstrekt aan het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1150a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.112'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.1151'
    text: |-
      Met het oog op het doelmatig functioneren van bodemenergiesystemen wordt negatieve interferentie voorkomen tussen
      het open bodemenergiesysteem dat wordt aangelegd en de bodemenergiesystemen in de omgeving waarvoor een melding is
      gedaan of een omgevingsvergunning is verleend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1151
  - number: '4.1152'
    text: |-
      De temperatuur van het grondwater dat door een open bodemenergiesysteem in de bodem wordt teruggeleid is ten
      hoogste 25 °C.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1152
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: temperatuur_grondwater_celsius
            type: number
            required: true
            description: Temperatuur van het grondwater dat in de bodem wordt teruggeleid in graden Celsius
            source: {}
        output:
          - name: voldoet_max_temperatuur_grondwater
            type: boolean
            description: Of de temperatuur van het teruggeleide grondwater ten hoogste 25 graden Celsius is
        actions:
          - output: voldoet_max_temperatuur_grondwater
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $temperatuur_grondwater_celsius
              value: 25
  - number: '4.1153'
    text: |-
      Een open bodemenergiesysteem wordt ontworpen, aangelegd, onderhouden, gerepareerd en buiten gebruik gesteld door
      een onderneming met een erkenning bodemkwaliteit voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1153
  - number: 4.1153.a
    text: BRL SIKB 11000, voor het ondergrondse deel van het systeem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1153
  - number: 4.1153.b
    text: BRL KvINL 6000-21/00, voor het bovengrondse deel van het systeem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1153
  - number: 4.1153.c
    text: BRL SIKB 2100, voor mechanisch boren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1153
  - number: 4.1154.1
    text: |-
      Met het oog op het doelmatig gebruik van bodemenergie is het open bodemenergiesysteem zo geïnstalleerd dat het is
      afgestemd op de aard en de omvang van de behoefte aan warmte of koude waarin het systeem voorziet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1154
  - number: 4.1154.2
    text: Een open bodemenergiesysteem levert het energierendement dat bij een doelmatig gebruik kan worden behaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1154
  - number: 4.1154.3
    text: |-
      In elke periode van vijf jaar vanaf de dag waarop het systeem in gebruik is genomen, is er een moment waarop de
      totale hoeveelheid warmte in megawattuur die aan de bodem is toegevoegd niet groter is dan de totale hoeveelheid
      koude in megawattuur die aan de bodem is toegevoegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1154
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: totale_warmte_mwh
            type: number
            required: true
            description: Totale hoeveelheid warmte in MWh die aan de bodem is toegevoegd in de vijfjaarsperiode
            source: {}
          - name: totale_koude_mwh
            type: number
            required: true
            description: Totale hoeveelheid koude in MWh die aan de bodem is toegevoegd in de vijfjaarsperiode
            source: {}
        output:
          - name: voldoet_energiebalans
            type: boolean
            description: Of de warmte niet groter is dan de koude in de vijfjaarsperiode
        actions:
          - output: voldoet_energiebalans
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totale_warmte_mwh
              value: $totale_koude_mwh
  - number: '4.1155'
    text: |-
      Het energierendement, uitgedrukt als SPF, wordt berekend volgens de formule: waarbij wordt verstaan onder: Qw: de
      hoeveelheid warmte per jaar in megawattuur die door het open bodemenergiesysteem wordt geleverd; Qk: de hoeveelheid
      koude per jaar in megawattuur die door het systeem wordt geleverd; E: de hoeveelheid elektriciteit per jaar in
      megawattuur die door het systeem wordt verbruikt; G: de hoeveelheid gas per jaar in megawattuur die door het
      systeem wordt verbruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1155
  - number: '4.1156'
    text: |-
      De hoeveelheden warmte en koude die aan de bodem worden toegevoegd, worden gemeten met momentane metingen met een
      meetonnauwkeurigheid van ten hoogste 5%, die ten minste eenmaal per vijftien minuten worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1156
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: meetonnauwkeurigheid_procent
            type: number
            required: true
            description: Meetonnauwkeurigheid van de metingen in procenten
            source: {}
          - name: meetinterval_minuten
            type: number
            required: true
            description: Interval tussen metingen in minuten
            source: {}
        output:
          - name: voldoet_meetvereisten_bodemenergie
            type: boolean
            description: Of de metingen voldoen aan de nauwkeurigheids- en frequentie-eisen
        actions:
          - output: voldoet_meetvereisten_bodemenergie
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $meetonnauwkeurigheid_procent
                  value: 5
                - operation: LESS_THAN_OR_EQUAL
                  subject: $meetinterval_minuten
                  value: 15
  - number: 4.1157.1
    text: |-
      Met het oog op het voorkomen van vermenging van grondwater uit verschillende watervoerende lagen, wordt zo spoedig
      mogelijk na het beëindigen van het gebruik van een open bodemenergiesysteem, het systeem zo opgevuld dat de
      waterscheidende lagen in stand blijven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1157
  - number: 4.1157.2
    text: Het ondergrondse deel van het systeem wordt niet verwijderd voor zover het dieper dan 10 m onder het maaiveld ligt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1157
  - number: 4.1157a
    text: |-
      De [artikelen 4.1149 tot en met 4.1156][ref1] zijn niet van toepassing op een open bodemenergiesysteem waarvoor een
      vergunning is verleend en waarbij de aanvraag van die vergunning is gedaan voor 1 juli 2013.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1157a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.112'
  - number: '4.1158'
    text: |-
      Deze paragraaf is van toepassing op het houden van militaire oefeningen door de Nederlandse of een
      bondgenootschappelijke krijgsmacht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1158
  - number: 4.1159.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1158][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.113'
  - number: 4.1159.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
  - number: 4.1159.2.a
    text: een aanduiding van de locatie waarop de activiteit zal worden verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
  - number: 4.1159.2.b
    text: de naam van de beheerder van het terrein; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
  - number: 4.1159.2.c
    text: 'als de activiteit wordt verricht op een terrein zonder militair object: de standaard oefenkaart van het terrein.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
  - number: 4.1159.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
  - number: 4.1159.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1159
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1160.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt geen oefenmunitie die projectielen veroorzaakt, gebruikt met
      een maximale dracht van meer dan 180 m, gebaseerd op de combinatie van wapen en munitie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1160
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: maximale_dracht_m
            type: number
            required: true
            description: Maximale dracht van de oefenmunitie in meters
            source: {}
        output:
          - name: oefenmunitie_toegestaan
            type: boolean
            description: Of de oefenmunitie gebruikt mag worden (dracht niet meer dan 180 m)
        actions:
          - output: oefenmunitie_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $maximale_dracht_m
              value: 180
  - number: 4.1160.2
    text: |-
      Oefenmunitie die projectielen veroorzaakt wordt niet gebruikt als derden zonder beschermingsmiddelen binnen een
      cirkel met een straal van 180 m aanwezig zijn, gemeten vanuit iedere individuele schutter die deelneemt aan de
      oefening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1160
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_tot_derden_m
            type: number
            required: true
            description: Afstand in meters van de schutter tot derden zonder beschermingsmiddelen
            source: {}
        output:
          - name: voldoet_veiligheidsafstand_oefenmunitie
            type: boolean
            description: Of er geen derden zonder beschermingsmiddelen binnen 180 m zijn
        actions:
          - output: voldoet_veiligheidsafstand_oefenmunitie
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $afstand_tot_derden_m
              value: 180
  - number: '4.1161'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt oefenmunitie die geen projectielen veroorzaakt niet gebruikt
      binnen een afstand van 100 m ten opzichte van personen die niet aan de oefening deelnemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1161
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_tot_niet_deelnemers_m
            type: number
            required: true
            description: Afstand in meters tot personen die niet aan de oefening deelnemen
            source: {}
        output:
          - name: voldoet_afstand_niet_projectiel_munitie
            type: boolean
            description: Of de afstand tot niet-deelnemers ten minste 100 m bedraagt
        actions:
          - output: voldoet_afstand_niet_projectiel_munitie
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $afstand_tot_niet_deelnemers_m
              value: 100
  - number: '4.1162'
    text: 'Met het oog op het waarborgen van de veiligheid worden explosieve ladingen niet ontstoken als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1162
  - number: 4.1162.a
    text: personen die niet aan de oefening deelnemen zich binnen een straal van 180 m bevinden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1162
  - number: 4.1162.b
    text: de hoeveelheid springstof meer is dan 50 g NEM.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1162
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: hoeveelheid_springstof_g_nem
            type: number
            required: true
            description: Hoeveelheid springstof in gram NEM
            source: {}
        output:
          - name: explosieve_lading_toegestaan
            type: boolean
            description: Of de hoeveelheid springstof niet meer dan 50 g NEM bedraagt
        actions:
          - output: explosieve_lading_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $hoeveelheid_springstof_g_nem
              value: 50
  - number: 4.1163.1
    text: |-
      Met het oog op het waarborgen van de veiligheid worden gevaarlijke stoffen of voorwerpen van ADR-klasse 1.3 en
      1.4 opgeslagen volgens de voorschriften 18301 tot en met 18308 van MP-40-21, en wordt een onveilige zone van 25
      m aangehouden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1163
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_onveilige_zone_m
            type: number
            required: true
            description: Afstand van de onveilige zone rond de opslag in meters
            source: {}
        output:
          - name: voldoet_onveilige_zone_opslag
            type: boolean
            description: Of de onveilige zone van ten minste 25 m wordt aangehouden
        actions:
          - output: voldoet_onveilige_zone_opslag
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $afstand_onveilige_zone_m
              value: 25
  - number: 4.1163.2
    text: |-
      Op militaire objecten zonder permanente voorzieningen voor de opslag van gevaarlijke stoffen van ADR-klasse 1.3
      wordt niet meer dan 50 kg NEM van deze gevaarlijke stoffen of voorwerpen opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1163
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: hoeveelheid_nem_kg
            type: number
            required: true
            description: Hoeveelheid gevaarlijke stoffen van ADR-klasse 1.3 in kg NEM
            source: {}
        output:
          - name: voldoet_opslaglimiet_militair
            type: boolean
            description: Of de hoeveelheid opgeslagen gevaarlijke stoffen niet meer dan 50 kg NEM bedraagt
        actions:
          - output: voldoet_opslaglimiet_militair
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $hoeveelheid_nem_kg
              value: 50
  - number: 4.1164.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of een oppervlaktewaterlichaam vindt het tanken van
      voertuigen, vaartuigen of werktuigen met vloeibare brandstoffen buiten een vloeistofdichte bodemvoorziening plaats
      boven een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1164
  - number: 4.1164.2
    text: Als een lekbak technisch niet mogelijk is, worden absorptiemiddelen gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1164
  - number: 4.1164.3
    text: Het vulpistool van een mobiele installatie voor het tanken wordt tijdens het tanken niet vastgezet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1164
  - number: 4.1165.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of een oppervlaktewaterlichaam vindt het onderhouden
      of repareren van onderdelen van gemotoriseerde voertuigen, vaartuigen of werktuigen, die olie of koelvloeistof
      bevatten, buiten een daarvoor ingerichte voorziening plaats boven een lekbak.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1165
  - number: 4.1165.2
    text: Als een lekbak technisch niet mogelijk is, worden absorptiemiddelen gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1165
  - number: '4.1166'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem op een militair object of terrein zonder
      permanente bodembeschermende voorzieningen voor het opslaan van gevaarlijke stoffen als bedoeld in
      [artikel 3.27, eerste lid, onder a, b of c][ref1], in verpakking of gevaarlijke afvalstoffen in verpakking worden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1166
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.9
        afdeling: '3.2'
  - number: 4.1166.a
    text: |-
      hoeveelheden van meer dan 50 l vloeibare gevaarlijke stoffen en gevaarlijke afvalstoffen in verpakking opgeslagen
      boven een opvangsysteem dat ten minste de hoeveelheid van de grootste verpakking vermeerderd met 10% van de overige
      opgeslagen hoeveelheid kan bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1166
  - number: 4.1166.b
    text: |-
      hoeveelheden van minder dan 50 l vloeibare gevaarlijke stoffen en gevaarlijke afvalstoffen in verpakking opgeslagen
      op een absorptiedoek, tenzij de vloeibare gevaarlijke stoffen of gevaarlijke afvalstoffen zijn verpakt in
      dubbelwandige verpakkingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1166
  - number: 4.1167.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden in een mobiel brandstofdepot, dat voor meer
      dan zeven dagen wordt opgesteld, de brandstofcontainers, tankwagens, pompen en leidingen boven een vloeistofdichte
      bodemvoorziening geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1167
  - number: 4.1167.2
    text: |-
      In een mobiel brandstofdepot dat voor minder dan zeven dagen wordt opgesteld, worden de brandstofcontainers,
      tankwagens, pompen en leidingen boven een aaneengesloten bodemvoorziening geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1167
  - number: 4.1167.3
    text: |-
      Bij het gebruik van brandstofzakken in een mobiel brandstofdepot worden deze geplaatst in een omwalling met een
      folie dat voldoende sterk en voor brandstof ondoorlaatbaar is en worden de pompen en leidingen boven een lekbak
      geplaatst.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1167
  - number: 4.1167.4
    text: Met brandstof verontreinigd hemelwater uit de bodembeschermende voorzieningen wordt niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1167
  - number: '4.1168'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden gemotoriseerde voertuigen niet gewassen buiten
      een daarvoor ingerichte voorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1168
  - number: 4.1169.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater en het voorkomen van verontreiniging van de bodem of een
      oppervlaktewaterlichaam wordt proceswater van een mobiele drinkwaterinstallatie geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1169
  - number: 4.1169.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1169
  - number: '4.1170'
    text: |-
      Deze paragraaf is van toepassing op het opslaan en bewerken van ontplofbare stoffen of voorwerpen van ADR-klasse 1
      door de Nederlandse of een bondgenootschappelijke krijgsmacht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1170
  - number: 4.1171.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1170][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.114'
  - number: 4.1171.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
  - number: 4.1171.2.a
    text: een aanduiding van de locatie waarop de activiteit zal worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
  - number: 4.1171.2.b
    text: het type ontplofbare stoffen of voorwerpen en de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
  - number: 4.1171.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
  - number: 4.1171.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1171
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1172'
    text: |-
      Met het oog op het waarborgen van de veiligheid is bij het opslaan en bewerken van ontplofbare stoffen van ADR-
      klasse 1.1 of 1.2 of meer dan 50 kg NEM van ADR-klasse 1.3:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.a
    text: |-
      het gebied met externe veiligheidsrisico’s vanwege die activiteit niet groter dan het gebied met externe
      veiligheidsrisico’s dat volgt uit de munitie-QRA;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.b
    text: de hoeveelheid ontplofbare stoffen per voorziening niet meer dan de hoeveelheid die is gebruikt in de munitie-QRA;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.c
    text: |-
      de bouwkundige staat van de voorziening waarin ontplofbare stoffen worden opgeslagen of bewerkt ten minste gelijk
      aan de staat waarvan is uitgegaan in de munitie-QRA;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.d
    text: op elk moment duidelijk welke hoeveelheid NEM per ADR-klasse is toegestaan in de voorziening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.e
    text: |-
      bij het gezamenlijk opslaan van ontplofbare stoffen van ADR-klasse 1.1, 1.2 of 1.3, de totale hoeveelheid
      opgeslagen NEM niet meer dan de toegestane hoeveelheid voor de ADR-klasse met de meest dominante effecten,
      vastgesteld in de munitie-QRA; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: 4.1172.f
    text: |-
      bij het gezamenlijk opslaan van ontplofbare stoffen van de ADR-klassen 1.2 en 1.3, de totale hoeveelheid opgeslagen
      NEM niet meer dan de toegestane hoeveelheid NEM voor ontplofbare stoffen van ADR-klasse 1.1, als de gezamenlijke
      opslag van ontplofbare stoffen van de ADR-klassen 1.2 en 1.3 kan reageren als die van ADR-klasse 1.1.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1172
  - number: '4.1173'
    text: 'Met het oog op het waarborgen van de veiligheid voldoet het:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1173
  - number: 4.1173.a
    text: |-
      opslaan van ontplofbare stoffen of voorwerpen aan de voorschriften 4101, 6101, 6103, 6105, eerste zin, 6107, 6151,
      eerste en tweede lid, 6152, eerste tot en met derde lid, 6153, 6158 tot en met 6161, 6301, 6302 en 6911 van MP-
      40-21;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1173
  - number: 4.1173.b
    text: |-
      voorhanden hebben van ontplofbare stoffen of voorwerpen op een opstelplaats aan de voorschriften 16103 tot en met
      16107 van MP-40-21;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1173
  - number: 4.1173.c
    text: |-
      onderhoud aan of modificatie van ontplofbare stoffen of voorwerpen aan de voorschriften 4101, 6101, 6103, 6105,
      eerste zin, 6107, 6151, derde lid, 6152, eerste tot en met derde lid, 6153, 6158 tot en met 6161, 6301, 6302 en
      12102 van MP-40-21; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1173
  - number: 4.1173.d
    text: |-
      incidenteel onderhoud aan of modificatie van ontplofbare stoffen of voorwerpen aan de voorschriften 13403 en 13405
      van MP-40-21.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1173
  - number: '4.1174'
    text: 'Met het oog op het waarborgen van de veiligheid:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1174
  - number: 4.1174.a
    text: |-
      voldoet het opslaan van stoffen van ADR-klasse 1.3, in een hoeveelheid van ten hoogste 50 kg NEM, en stoffen van
      ADR-klasse 1.4, 1.5 of 1.6, aan de voorschriften 9201 tot en met 9208 en 11301 tot en met 11303 van MP-40-21;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1174
  - number: 4.1174.b
    text: |-
      worden vuurwerk en pyrotechnische artikelen voor theatergebruik, in een hoeveelheid van ten hoogste 25 kg,
      opgeslagen in een brandveiligheidsopslagkast die voldoet aan PGS 32; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1174
  - number: 4.1174.c
    text: |-
      worden noodsignalen van ADR-klasse 1.3, in een hoeveelheid van ten hoogste 50 kg, opgeslagen in een
      brandcompartiment of in een brandveiligheidsopslagkast die voldoet aan PGS 32.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1174
  - number: '4.1175'
    text: Deze paragraaf is van toepassing op het exploiteren van een militaire schietbaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1175
  - number: 4.1176.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1175][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.115'
  - number: 4.1176.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
  - number: 4.1176.2.a
    text: een aanduiding van de locatie waarop de activiteit zal worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
  - number: 4.1176.2.b
    text: |-
      informatie over de fysieke begrenzing van de locatie waarop de activiteit zal worden verricht en een aanduiding van
      het type schietbaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
  - number: 4.1176.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
  - number: 4.1176.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1176
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.1177'
    text: |-
      Met het oog op het waarborgen van de veiligheid voldoet een schietbaan die ligt in een gebouw zonder open zijden
      en met een gesloten afdekking aan de voorschriften 2.6.1.20, 2.6.1.30, 2.6.3.10, 2.6.3.20, 2.6.4.10 en 2.6.4.30 van
      MP40-30.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1177
  - number: 4.1178.1
    text: |-
      Met het oog op het waarborgen van de veiligheid voldoet een schietbaan die ligt in de buitenlucht of in een gebouw
      zonder gesloten afdekking of met een open zijde aan de paragrafen 2.1.1 tot en met 2.1.5, 2.2.1 tot en met 2.2.5,
      2.3.1 tot en met 2.3.5, 2.4.1 tot en met 2.4.4 en 2.5.1 tot en met 2.5.3 van MP40-30.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.2
    text: |-
      Als het gebied waarin munitie afkomstig uit vuurwapens of wapenplatforms kan neerkomen tijdens het schieten buiten
      de afgebakende omgrenzing van het militaire object ligt, wordt tijdens het schieten:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.2.a
    text: dat gebied voldoende afgeschermd met waarschuwingsmiddelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.2.b
    text: dat gebied voortdurend in de gaten gehouden met een radar en door waarnemers; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.2.c
    text: het schieten ten minste eenmaal per uur bekend gemaakt op het marifoonnieuws.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.3
    text: |-
      Voorafgaand aan het schieten in het gebied, bedoeld in het tweede lid, worden de mogelijke gebruikers van dat
      gebied tijdig gewaarschuwd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: 4.1178.4
    text: |-
      Het schieten in het gebied, bedoeld in het tweede lid, wordt onverwijld stilgelegd als personen binnen dat gebied
      dreigen te komen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1178
  - number: '4.1179'
    text: |-
      Met het oog op het waarborgen van de veiligheid voldoet een baan voor het werpen met handgranaten aan de paragrafen
      3.1.1 tot en met 3.1.5 en aan de voorschriften 3.1.6.100 en 3.1.7.20 van MP40-30.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1179
  - number: 4.1180.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met kogelresten, kruit en patroonhulzen wordt op
      een schietbaan die ligt in een gebouw zonder open zijden en met een gesloten afdekking de bodem of vloer tussen de
      standplaats van de schutter en de kogelvanger uitgevoerd overeenkomstig de voorschriften 2.6.2.20 en 2.6.2.40 van
      MP40-30.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1180
  - number: 4.1180.2
    text: Een kogelvanger is opgesteld boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1180
  - number: '4.1181'
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem met kogelresten is op een schietbaan die ligt in de
      buitenlucht of in een gebouw zonder gesloten afdekking of met een open zijde, de kogelvanger opgesteld boven een
      aaneengesloten bodemvoorziening, tenzij de kogelvanger een overkapping tegen inregenen heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1181
  - number: 4.1182.1
    text: Deze paragraaf is van toepassing op het op of in de bodem brengen van meststoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.2
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.2.a
    text: |-
      het op of in de bodem brengen van zuiveringsslib, bedoeld in [paragraaf 4.117][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.117'
  - number: 4.1182.2.b
    text: |-
      het vernietigen van de zode van gras, bedoeld in [paragraaf 4.118][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.118'
  - number: 4.1182.2.c
    text: 'het op of in de bodem brengen in een tuin bij een particulier huishouden of een volkstuin van alleen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.2.c.1°
    text: meststoffen anders dan dierlijke meststoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.2.c.2°
    text: dierlijke meststoffen anders dan drijfmest als de hoeveelheid per tuin of volkstuin per jaar ten hoogste 160 l is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.3
    text: 'In deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.3.a
    text: '*bufferstrook:* strook grond langs een oppervlaktewaterlichaam;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: 4.1182.3.b
    text: |-
      *fosfaat:* fosfaat als bedoeld in [artikel 1, eerste lid, onder k, van de Meststoffenwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0004054#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
    references:
      - id: ref1
        bwb_id: BWBR0004054
        artikel: '1'
  - number: 4.1182.3.c
    text: |-
      *perceel:* aaneengesloten, door wegen, waterwegen, sloten, houtopstanden, muren, wallen of anderszins topografisch
      begrensde oppervlakte grond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1182
  - number: '4.1183'
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem worden alleen meststoffen op of in de bodem gebracht
      die op grond van [hoofdstuk III van het Uitvoeringsbesluit Meststoffenwet][ref1] mogen worden verhandeld.


      [ref1]: https://wetten.overheid.nl/BWBR0019031#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1183
    references:
      - id: ref1
        bwb_id: BWBR0019031
        hoofdstuk: III
  - number: 4.1184.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of van een oppervlaktewaterlichaam worden dierlijke
      meststoffen, herwonnen fosfaten en stikstofkunstmest niet op of in de bodem gebracht als de bovenste laag van de
      bodem geheel of gedeeltelijk is bevroren of geheel of gedeeltelijk is bedekt met sneeuw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1184
  - number: 4.1184.2
    text: |-
      Het eerste lid is niet van toepassing op het brengen van stikstofkunstmest op kleigronden waarop graan wordt
      geteeld, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1184
  - number: 4.1184.2.a
    text: de maximumtemperatuur op de dag waarop de stikstofkunstmest op of in de bodem wordt gebracht 5 °C of meer is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1184
  - number: 4.1184.2.b
    text: wordt verwacht dat de minimumtemperatuur tijdens het volgende etmaal 0 °C of meer is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1184
  - number: 4.1184.3
    text: |-
      Het eerste lid is niet van toepassing op het brengen van vaste mest op grasland als voor de gronden beheer
      gericht op het in stand houden van natuurwaarden voor gebieden als bedoeld in [artikel 2.44 van de wet][ref1]
      is vastgesteld, ter uitvoering van een voorwaarde die is verbonden aan een verleende subsidie op grond van de
      [Kaderwet EZK- en LNV-subsidies][ref2] of Onze Minister van Landbouw, Natuur en Voedselkwaliteit met dat beheer
      heeft ingestemd, en aan het beheer beperkingen zijn verbonden over de hoeveelheid meststoffen, uitgedrukt in
      kilogram stikstof en fosfaat, die op of in de bodem worden gebracht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0007919
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1184
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0007919
  - number: '4.1185'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden dierlijke meststoffen, herwonnen fosfaten,
      compost, overige organische meststoffen en stikstofkunstmest niet op of in de bodem gebracht als de bovenste
      bodemlaag met water is verzadigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1185
  - number: '4.1186'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden van 1 september tot en met 31 januari
      dierlijke meststoffen, herwonnen fosfaten, compost, overige organische meststoffen en stikstofkunstmest niet op of
      in de bodem gebracht als de bodem tegelijkertijd wordt bevloeid of beregend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1186
  - number: 4.1187.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt vaste mest van 1 september tot en met
      31 januari niet op of in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2
    text: 'Het eerste lid is niet van toepassing op het brengen van vaste mest op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.a
    text: 'grasland dat ligt op kleigronden of veengronden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.a.1°
    text: in de periode van 1 september tot en met 15 september; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.a.2°
    text: |-
      in de periode van 1 december tot en met 31 januari als het gaat om vaste mest waarin zichtbaar een substantiële
      hoeveelheid stro aanwezig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.b
    text: bouwland dat ligt op kleigronden of veengronden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.c
    text: |-
      bouwland dat ligt op zandgronden of lössgronden, als op die gronden bomen worden geteeld en het op of in de bodem
      brengen plaatsvindt voorafgaand aan de aanplant van de bomen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.2.d
    text: |-
      grasland en bouwland dat ligt op zandgronden of lössgronden, in de periode van 1 januari tot en met 31 januari als
      het gaat om vaste mest waarin zichtbaar een substantiële hoeveelheid stro aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
  - number: 4.1187.3
    text: |-
      Extreme weersomstandigheden in combinatie met een landbouwkundige noodzaak zijn bijzondere omstandigheden als
      bedoeld in [artikel 19.0 van de wet][ref1]. Het bevoegd gezag, bedoeld in [artikel 2.8][ref2], kan voor het
      op of in de bodem brengen van vaste mest bij besluit als bedoeld in artikel 19.0 van de wet bepalen dat zich een
      bijzondere omstandigheid voordoet. Het besluit kan inhouden dat de periode om vaste mest op of in de bodem te
      brengen wordt gewijzigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1187
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1188.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt drijfmest van 1 augustus tot en met 15 maart
      niet op of in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2
    text: 'Het eerste lid is niet van toepassing op het brengen van drijfmest op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.a
    text: grasland, in de periode van 16 februari tot en met 15 maart en in de periode van 1 augustus tot en met 31 augustus;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.b
    text: 'bouwland, in de periode van 1 augustus tot en met 15 september als hierop:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.b.1°
    text: uiterlijk op 15 september winterkoolzaad voor zaadwinning in het volgende kalenderjaar wordt gezaaid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.b.2°
    text: |-
      uiterlijk op 15 september een groenbemester wordt ingezaaid of geplant die niet eerder dan acht weken na de datum
      van inzaaien of planten wordt vernietigd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.b.3°
    text: in het aansluitende najaar bloembollen worden geplant; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.2.b.c
    text: |-
      bouwland, in de periode van 16 februari tot en met 15 maart, als hierop in hetzelfde kalenderjaar een bij
      ministeriële regeling als vroege teelt aangewezen gewas wordt ingezaaid, geplant of gepoot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
  - number: 4.1188.3
    text: |-
      Extreme weersomstandigheden in combinatie met een landbouwkundige noodzaak zijn bijzondere omstandigheden als
      bedoeld in [artikel 19.0 van de wet][ref1]. Het bevoegd gezag, bedoeld in [artikel 2.8][ref2], kan voor het
      op of in de bodem brengen van drijfmest bij besluit als bedoeld in artikel 19.0 van de wet bepalen dat zich een
      bijzondere omstandigheid voordoet. Het besluit kan inhouden dat de periode om drijfmest op of in de bodem te
      brengen wordt gewijzigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1188a
    text: |-
      Jaarlijks worden uiterlijk de dag voorafgaand aan het gebruik van drijfmest in de periode van 16 februari tot en
      met 15 maart aan het bevoegd gezag, bedoeld in [artikel 2.8][ref1], de volgende gegevens en bescheiden verstrekt
      als in dat kalenderjaar een bij ministeriële regeling als vroege teelt aangewezen gewas wordt ingezaaid, geplant
      of gepoot:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1188a.a
    text: de begrenzing van de locatie waarop het gewas wordt ingezaaid, geplant of gepoot; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188a
  - number: 4.1188a.b
    text: welk gewas wordt ingezaaid, geplant of gepoot.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188a
  - number: 4.1188b.1
    text: |-
      De gegevens en bescheiden worden verstrekt met gebruikmaking van een elektronische voorziening en een elektronisch
      formulier die door Onze Minister van Landbouw, Natuur en Voedselkwaliteit beschikbaar worden gesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188b
  - number: 4.1188b.2
    text: Gegevens en bescheiden die zijn verstrekt via het elektronisch formulier gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1188b
  - number: 4.1189.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt van 16 september tot en met 31 januari geen
      stikstofkunstmest op of in de bodem van bouwland of grasland gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2
    text: 'Het eerste lid is niet van toepassing op bouwland waarop:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2.a
    text: vollegrondsgroente wordt geteeld;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2.b
    text: alleen fruit wordt geteeld en waarop ureum wordt gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2.c
    text: alleen fruit wordt geteeld, in de periode van 16 september tot en met 15 oktober;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2.d
    text: |-
      voor een tweede of latere zaadoogst in het volgende kalenderjaar winterkoolzaad of de graszaadgewassen
      rietzwenkgras, roodzwenkgras of veldbeemdgras worden geteeld, in de periode van 16 september tot en met 15 oktober;
      of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: 4.1189.2.e
    text: hyacinten of tulpen worden geteeld, in de periode van 16 januari tot en met 31 januari.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1189
  - number: '4.1190'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden dierlijke meststoffen, herwonnen fosfaten,
      compost, overige organische meststoffen en stikstofkunstmest niet op of in de bodem gebracht op gronden met een
      hellingspercentage van ten minste 7% als deze zijn aangetast door de versnelde afvoer van bodemmateriaal door
      afstromend water en daarbij geulen van meer dan 30 cm diepte zijn ontstaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1190
  - number: 4.1191.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden dierlijke meststoffen, herwonnen fosfaten,
      compost, overige organische meststoffen en stikstofkunstmest niet op of in de bodem gebracht op niet-beteelde
      gronden met een hellingspercentage van ten minste 7%.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: 4.1191.2
    text: |-
      Het eerste lid is niet van toepassing op het brengen van dierlijke meststoffen op niet-beteelde gronden met een
      hellingspercentage tussen de 7% en 18%, als deze gronden uiterlijk acht dagen na het op of in de bodem brengen
      hiervan zijn ingezaaid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: 4.1191.2.a
    text: met een ander gewas dan mais, aardappelen of bieten; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: 4.1191.2.b
    text: 'met mais, aardappelen of bieten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: 4.1191.2.b.1°
    text: |-
      op gronden met een aaneengesloten lengte van ten hoogste 300 m die aan beide einden over de volle breedte door een
      duidelijk waarneembare kavelgrens zijn afgebakend; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: 4.1191.2.b.2°
    text: |-
      op gronden die over de volle breedte worden begrensd door gronden die zijn beteeld met een ander gewas dan mais,
      aardappelen of bieten over een aaneengesloten lengte van ten minste 100 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1191
  - number: '4.1192'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden op bouwland met een hellingspercentage
      van ten minste 18% geen dierlijke meststoffen, herwonnen fosfaten, compost, overige organische meststoffen of
      stikstofkunstmest gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1192
  - number: 4.1193.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem wordt aansluitend op de teelt van mais op zandgronden
      of lössgronden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.1.a
    text: |-
      uiterlijk op 1 oktober gras, winterrogge, bladkool, bladrammenas, wintertarwe, wintergerst, triticale of Japanse
      haver geteeld; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.1.b
    text: |-
      uiterlijk op 31 oktober spelt, triticale, wintergerst, winterrogge of wintertarwe als hoofdteelt in het volgende
      jaar geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.2
    text: |-
      Het eerste lid, onder a, is niet van toepassing als uiterlijk op 31 oktober spelt, triticale, wintergerst,
      winterrogge of wintertarwe wordt geteeld:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.2.a
    text: |-
      aansluitend op de teelt van mais dat biologisch is geteeld overeenkomstig de voorschriften die zijn gesteld bij of
      krachtens de bio-verordening; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.2.b
    text: aansluitend op de teelt van mais, niet zijnde snijmais.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: 4.1193.3
    text: |-
      Het gewas dat aansluitend op mais wordt geteeld, wordt niet voor 1 februari van het volgende kalenderjaar
      vernietigd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1193
  - number: '4.1194'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 2.8][ref1], wordt uiterlijk op 1 oktober geïnformeerd als een gewas als
      bedoeld in [artikel 4.1193, eerste lid, onder b, of tweede lid][ref2], wordt geteeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1194
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.116'
  - number: 4.1194a.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem worden dierlijke meststoffen, herwonnen fosfaten,
      compost, overige organische meststoffen en stikstofkunstmest uitsluitend op of in de bodem gebracht als op
      landbouwgrond op zandgronden of lössgronden per aaneengesloten periode van vier kalenderjaren, gerekend vanaf
      1 januari 2023, ten minste in één kalenderjaar en uiterlijk in het vierde kalenderjaar, op de desbetreffende grond
      één van de bij ministeriële regeling als rustgewas aangewezen gewassen wordt geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1194a
  - number: 4.1194a.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1194a
  - number: 4.1194a.2.a
    text: voor de teelt van gewassen die meer dan vier jaar onafgebroken op een perceel staan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1194a
  - number: 4.1194a.2.b
    text: voor de teelt van gewassen overeenkomstig de voorschriften die zijn gesteld bij of krachtens de bio-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1194a
  - number: 4.1195.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem worden op natuurgronden alleen dierlijke meststoffen
      en compost op of in de bodem gebracht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1195
  - number: 4.1195.2
    text: Het totaal van de gebruikte hoeveelheid dierlijke meststoffen en compost bedraagt ten hoogste 20 kg/ha/j fosfaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1195
  - number: 4.1195.3
    text: |-
      Als het gaat om grasland, is het totaal van de gebruikte hoeveelheid dierlijke meststoffen en compost niet groter
      is dan 70 kg/ha/j fosfaat en 170 kg/ha/j stikstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1195
  - number: 4.1195.4
    text: |-
      Bij het bepalen van de gebruikte hoeveelheid compost wordt 50% van de hoeveelheid fosfaat in compost met een
      maximum van 3,5 kg fosfaat per 1.000 kg droge stof niet in aanmerking genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1195
  - number: 4.1196.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem is [artikel 4.1195, tweede en derde lid][ref1],
      niet van toepassing op het brengen van dierlijke meststoffen of compost op gronden waarvoor beheer gericht
      op het in stand houden van natuurwaarden voor gebieden als bedoeld in [artikel 2.44 van de wet][ref2] is
      vastgesteld, ter uitvoering van een voorwaarde die is verbonden aan een verleende subsidie op grond van de
      [Kaderwet EZK- en LNV-subsidies][ref3] of Onze Minister van Landbouw, Natuur en Voedselkwaliteit met dat
      beheer heeft ingestemd, en aan het beheer beperkingen zijn verbonden over de te gebruiken hoeveelheid dierlijke
      meststoffen of compost, uitgedrukt in kilogram stikstof en fosfaat per hectare per jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0007919
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1196
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.116'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0007919
  - number: 4.1196.2
    text: |-
      Op overeenkomsten over aan het beheer van natuurgronden verbonden beperkingen voor de hoeveelheid op of in de bodem
      te brengen dierlijke meststoffen die zijn gesloten voor 1 januari 2020 en die na die datum niet zijn gewijzigd of
      verlengd, blijven die beperkingen voor de toepassing van dit artikel gelden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1196
  - number: 4.1197.1
    text: |-
      Met het oog op het beperken van verontreiniging van de bodem worden op overige gronden alleen de volgende
      meststoffen op of in de bodem gebracht:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.1.a
    text: dierlijke meststoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.1.b
    text: herwonnen fosfaten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.1.c
    text: compost;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.1.d
    text: overige organische meststoffen die alleen zijn geproduceerd uit materialen van plantaardige herkomst; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.1.e
    text: anorganische meststoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.2
    text: Het totaal van de hoeveelheid meststoffen, bedoeld in het eerste lid, bedraagt ten hoogste 20 kg/ha/j fosfaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.3
    text: |-
      Als het gaat om grasland, is het totaal van de hoeveelheid meststoffen die op of in de bodem wordt gebracht, niet
      groter dan 90 kg/ha/j fosfaat en 170 kg/ha/j stikstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.4
    text: |-
      Als het gaat om bouwland, is het totaal van de hoeveelheid meststoffen die op of in de bodem wordt gebracht niet
      groter dan 60 kg/ha/j fosfaat en 170 kg/ha/j stikstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1197.5
    text: |-
      Bij het bepalen van de gebruikte hoeveelheid compost wordt 50% van de hoeveelheid fosfaat in compost met een
      maximum van 3,5 kg fosfaat per 1.000 kg droge stof niet in aanmerking genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1197
  - number: 4.1198.1
    text: Met een maatwerkregel of maatwerkvoorschrift worden de gebruiksnormen in deze paragraaf niet versoepeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1198
  - number: 4.1198.2
    text: |-
      [Artikel 4.1199c][ref1] wordt tot en met 31 december 2025 niet met een maatwerkregel of maatwerkvoorschrift
      versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1198
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.116'
  - number: 4.1199.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht wordt bij het op of in de bodem brengen van dierlijke
      meststoffen voldaan aan het BBT-document emissiearm aanwenden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2
    text: 'Het eerste lid is niet van toepassing bij het op of in de bodem brengen van drijfmest om winderosie te voorkomen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.a
    text: als de drijfmest afkomstig is van runderen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.b
    text: bij bouwland dat ligt op zandgronden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.c
    text: in de periode van 1 maart tot en met 31 mei; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.d
    text: 'als in de bodem een gewas is ingezaaid, geplant of gepoot:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.d.1°
    text: |-
      in het veenkoloniaal gebied in de provincie Drenthe, de provincie Groningen ten zuiden van het Eemskanaal, de
      provincie Overijssel ten noorden van de lijn Zwolle-Ommen-Nijverdal-Almelo-Albergen-Tubbergen en de provincie
      Friesland ten oosten van de lijn Elsloo-Oosterwolde-Haulerwijk; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.2.d.2°
    text: op Texel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199.3
    text: |-
      Het eerste lid is niet van toepassing op het brengen van vaste mest op gronden waar het hellingspercentage minder
      dan 7% is en waarop gras wordt geteeld of waarop alleen fruit wordt geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199
  - number: 4.1199c.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam worden op
      landbouwgrond gelegen in een bufferstrook geen meststoffen op of in de bodem gebracht. De breedte van de
      bufferstrook voldoet aan tabel 4.1199c.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
  - number: 4.1199c.2
    text: |-
      De breedte van de bufferstrook wordt vanaf de insteek van het oppervlaktewaterlichaam en over de grond gemeten. In
      afwijking hiervan wordt:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
  - number: 4.1199c.2.a
    text: |-
      bij een oppervlaktewaterlichaam met een flauw talud dat over de grond gemeten vanaf de waterlijn tot aan de insteek
      ten minste 200 cm breed is en dat een helling heeft die niet steiler is dan 1:3 de bufferstrook gemeten vanaf
      100 cm vanaf de waterlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
  - number: 4.1199c.2.b
    text: bij een oppervlaktewaterlichaam zonder talud de bufferstrook gemeten vanaf de waterlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
  - number: 4.1199c.3
    text: |-
      In afwijking van het eerste lid is de breedte van de bufferstrook gelijk aan de breedte van de teeltvrije zone,
      bedoeld in [artikel 4.723i][ref1], als die teeltvrije zone breder is dan de in dit artikel voorgeschreven breedte
      van de bufferstrook.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.64'
  - number: 4.1199c.4
    text: |-
      In dit artikel wordt onder landbouwgrond verstaan: grond die de landbouwer, bedoeld in
      [artikel 1, eerste lid, onder gg, van de Meststoffenwet][ref1], in eigendom, in pacht of in gebruik heeft en voor
      het beheer waarvan hij rechtstreeks verantwoordelijk is.


      [ref1]: https://wetten.overheid.nl/BWBR0004054#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1199c
    references:
      - id: ref1
        bwb_id: BWBR0004054
        artikel: '1'
  - number: 4.1199c.5
    text: |-
      Voor de toepassing van dit artikel wordt in uiterwaarden en buitendijkse gebieden onder oppervlaktewaterlichaam
      verstaan: beddingen waarin op het moment van het op of in de bodem brengen van meststoffen aan het aardoppervlak en
      de openlucht grenzend water voorkomt.
