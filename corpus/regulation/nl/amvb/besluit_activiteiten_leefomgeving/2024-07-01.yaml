        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: 9.38.a
    text: |-
      het bouwen van bouwwerken, het aanleggen, plaatsen en veranderen van werken die geen bouwwerken zijn en het
      plaatsen van andere objecten, waarbij de opzet van het perron of station wezenlijk verandert; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.38
  - number: 9.38.b
    text: het verrichten van werkzaamheden waarbij de opzet van het perron of station wezenlijk verandert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.38
  - number: 9.39.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 9.37][ref1] te verrichten zonder dit ten minste vier weken
      en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
  - number: 9.39.2
    text: Een melding bevat een situatietekening met een schaal van ten minste 1:1.000, waarop de activiteit is aangegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.39
  - number: 9.39.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.39
  - number: 9.39.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [artikel 9.38][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.3
        afdeling: '9.2'
