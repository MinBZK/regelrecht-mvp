    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.134
  - number: 3.134.1.e
    text: het maken van producten van kunststof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.134
