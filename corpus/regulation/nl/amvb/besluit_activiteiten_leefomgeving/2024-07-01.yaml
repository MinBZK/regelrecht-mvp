  - number: 4.200.2
    text: |-
      Het eerste lid is niet van toepassing bij het aanbrengen van anorganische deklagen als een maatregel als bedoeld in
      [artikel 4.195, derde lid][ref1], wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
