      van de bodem, wordt een verkennend bodemonderzoek verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7b
  - number: 5.7b.2
    text: Een verkennend bodemonderzoek voldoet aan NEN 5740.
