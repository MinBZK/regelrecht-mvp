        afdeling: '5.4'
  - number: '4.206'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met aluminium, lood, zink, tin, koper, nikkel,
      oplosmiddelen en harsen gebeurt het smeltproces en gietproces boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.206
  - number: '4.207'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.207
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 4.208.1
    text: |-
      Voor de emissie in de lucht bij het maken en coaten van vormen en kernen in kleigebonden of chemisch zand voor het
      gieten van metalen, bij de koude regeneratie van zand voor het gieten van metalen en bij het uitbreken en ontzanden
      van gietstukken is de emissiegrenswaarde van totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: 4.208.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: 4.208.3
    text: |-
      Aan het eerste lid wordt bij het maken en coaten van vormen en kernen in kleigebonden of chemisch zand voor het
      gieten van metalen en bij de koude regeneratie van zand voor het gieten van metalen in ieder geval voldaan als de
      emissies door een geschikte filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: 4.208.4
    text: 'Aan het eerste lid wordt bij het uitbreken en ontzanden van gietstukken in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: 4.208.4.a
    text: de emissies door een geschikte filtrerende afscheider worden gevoerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: 4.208.4.b
    text: gietstukken worden uitgebroken en ontzand in een gesloten ruimte met gesloten deuren en ramen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.208
  - number: '4.209'
    text: |-
      Met het oog op het voorkomen of het beperken van de emissie van dioxinen en polycyclische aromatische
      koolwaterstoffen in de lucht worden bij het smelten van metalen alleen de volgende metalen gesmolten:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.209
  - number: 4.209.a
    text: metaal dat voldoet aan de technische standaarden voor reguliere toepassing van het metaal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.209
  - number: 4.209.b
    text: metaal waarvan de soort legering en de verhouding van metalen in de legering bekend is en kan worden aangetoond;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.209
  - number: 4.209.c
    text: |-
      metaal dat zichtbaar vrij is van olie, olie-emulsies, smeermiddelen of vet, met uitzondering van hoeveelheden die
      geen druppelvorming tot gevolg hebben; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.209
  - number: 4.209.d
    text: |-
      metaal dat geen eigenschappen bezit van bijlage III bij de kaderrichtlijn afvalstoffen, waarbij de eigenschappen
      van het metaal zelf of metalen in de legering zelf niet relevant zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.209
  - number: 4.210.1
    text: |-
      Voor de emissie in de lucht bij het smelten van metalen is de emissiegrenswaarde van lood en loodverbindingen,
      berekend als lood, 0,5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.2
    text: |-
      Het eerste lid is niet van toepassing als de emissie van lood en loodverbindingen, berekend als lood, niet meer is
      dan 1,25 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.3
    text: 'Aan het eerste lid wordt in ieder geval voldaan als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.3.a
    text: |-
      bij het smelten van koper en koperlegeringen, aluminium en aluminiumlegeringen, zink en zinklegeringen en tin en
      tinlegeringen, de legering minder dan 2% lood bevat;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.3.b
    text: |-
      bij het smelten van koper en koperlegeringen, aluminium en aluminiumlegeringen, zink en zinklegeringen en tin en
      tinlegeringen, de legering minder dan 5% lood bevat en de smeltoven minder dan 200 uur per jaar in bedrijf is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.3.c
    text: |-
      bij het smelten van koper en koperlegeringen, aluminium en aluminiumlegeringen, zink en zinklegeringen en tin en
      tinlegeringen, de legering minder dan 10% lood bevat en de smeltoven minder dan 100 uur per jaar in bedrijf is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.210.3.d
    text: de emissies door een geschikte filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.210
  - number: 4.211.1
    text: |-
      Voor de emissie in de lucht bij het maken van croningkernen en coldboxkernen voor het gieten van metalen zijn de
      emissiegrenswaarden de waarden, bedoeld in tabel 4.211, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.211
  - number: 4.211.2
    text: Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 4.211, niet overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.211
  - number: 4.211.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de emissies door een geschikte gaswasser worden gevoerd.
            Tabel 4.211 Emissiegrenswaarden


                    *Stoffen of stofklasse*


                    *Emissiegrenswaarde in mg/Nm3*


                    *Ondergrens in kg/jaar*


                    Totaal stof


                    20


                    100


                    Aminen


                    5


                    50
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.211
  - number: 4.212.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in de [artikelen 4.208][ref1] en [4.210][ref2] en
      [tabel 4.211][ref3], is NEN-EN 15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.212
