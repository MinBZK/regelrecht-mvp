        artikel: '68'
  - number: 18.11.2.h
    text: |-
      als bestuurder van een voertuig dat is bedoeld voor het vervoer van personen tegen betaling of als controleur van
      vervoerbewijzen in dat voertuig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.11
  - number: 18.12.1
    text: |-
      Voor de emissie in de lucht van kooldioxide door woon-werkmobiliteit en zakelijke mobiliteit is de
      emissiegrenswaarde in kalenderjaargemiddelde waaraan met ingang van 1 januari 2050 wordt voldaan: 0 g per
      reizigerskilometer.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.12
    machine_readable:
      definitions:
        emissiegrenswaarde_co2_g_per_km: 0
        ingangsdatum: '2050-01-01'
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: peildatum
            type: date
            required: true
            description: De datum waarop wordt getoetst
        input:
          - name: co2_emissie_g_per_km
            type: number
            required: true
            description: De emissie van kooldioxide in kalenderjaargemiddelde in gram per reizigerskilometer
            source: {}
        output:
          - name: norm_van_kracht
            type: boolean
            description: Of de emissiegrenswaarde van kracht is (na 1 januari 2050)
          - name: voldoet_aan_emissiegrenswaarde
            type: boolean
            description: Of aan de emissiegrenswaarde wordt voldaan
        actions:
          - output: norm_van_kracht
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $peildatum
              value: $ingangsdatum
          - output: voldoet_aan_emissiegrenswaarde
            value:
              operation: IF
              cases:
                - when:
                    operation: NOT
                    value: $norm_van_kracht
                  then: true
              default:
                operation: LESS_THAN_OR_EQUAL
                subject: $co2_emissie_g_per_km
                value: $emissiegrenswaarde_co2_g_per_km
  - number: '18.13'
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee [artikel 18.12][ref1] wordt versoepeld, wordt alleen gesteld over
      de emissiegrenswaarde, bedoeld in artikel 18.12, tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.2
        afdeling: '18.1'
  - number: 18.14.1
    text: |-
      De emissie in de lucht van kooldioxide door woon-werkmobiliteit of zakelijke mobiliteit in kalenderjaargemiddelde
      per reizigerskilometer wordt berekend door de emissie in de lucht van kooldioxide door woon-werkmobiliteit of
      zakelijke mobiliteit in het kalenderjaar te delen door het aantal reizigerskilometers voor woon-werkmobiliteit
      respectievelijk zakelijke mobiliteit in het kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.14
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        input:
          - name: totale_co2_emissie_gram
            type: number
            required: true
            description: Totale CO2-emissie door woon-werkmobiliteit of zakelijke mobiliteit in het kalenderjaar in gram
            source: {}
          - name: totale_reizigerskilometers
            type: number
            required: true
            description: >-
              Totaal aantal reizigerskilometers voor
              woon-werkmobiliteit resp. zakelijke
              mobiliteit in het kalenderjaar
            source: {}
        output:
          - name: co2_emissie_per_km
            type: number
            description: De emissie van kooldioxide in kalenderjaargemiddelde in gram per reizigerskilometer
        actions:
          - output: co2_emissie_per_km
            value:
              operation: DIVIDE
              values:
                - $totale_co2_emissie_gram
                - $totale_reizigerskilometers
  - number: 18.14.2
    text: |-
      De emissie in de lucht van kooldioxide door woon-werkmobiliteit of zakelijke mobiliteit, bedoeld in het eerste
      lid, wordt berekend door voor elke reismodaliteit het aantal in het kalenderjaar gereisde kilometers voor
      woon-werkmobiliteit respectievelijk zakelijke mobiliteit te vermenigvuldigen met de bij ministeriële regeling
      vastgestelde emissiefactor voor die reismodaliteit en de uitkomsten bij elkaar op te tellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.14
  - number: 18.15.1
    text: |-
      Jaarlijks worden uiterlijk op 30 juni de volgende gegevens over het aan die datum voorafgaande kalenderjaar
      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
    machine_readable:
      definitions:
        deadline_dag: 30
        deadline_maand: 6
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: rapportagejaar
            type: number
            required: true
            description: Het kalenderjaar waarover gegevens worden verstrekt
        input:
          - name: datum_verstrekking
            type: date
            required: true
            description: Datum waarop de gegevens zijn verstrekt aan het bevoegd gezag
            source: {}
        output:
          - name: tijdig_verstrekt
            type: boolean
            description: Of de gegevens tijdig zijn verstrekt (uiterlijk 30 juni van het volgende kalenderjaar)
        actions:
          - output: tijdig_verstrekt
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_verstrekking
              value: $rapportagejaar
  - number: 18.15.1.a
    text: het aantal werknemers op 1 januari van dat kalenderjaar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.b
    text: 'de gebruikte reismodaliteiten, waarbij in ieder geval onderscheid wordt gemaakt tussen het laten reizen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.b.1°
    text: met openbaar vervoer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.b.2°
    text: per fiets of te voet;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.15
  - number: 18.15.1.b.3°
    text: per bromfiets; en
