  - number: '4.182'
    text: Met het oog op het beschermen van het milieu worden geen perfluoroctaansulfonaten en kwik gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.182
  - number: '4.183'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met emaille worden anorganische deklagen op metalen
      aangebracht boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.183
  - number: 4.184.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met chroomzuur en zwavelzuur worden conversielagen op
      metalen aangebracht boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.184
  - number: 4.184.2
    text: |-
      Een dompelbad dat zich automatisch vult, heeft een automatisch afslagmechanisme dat afslaat als het dompelbad vol
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.184
  - number: 4.185.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met zwavelzuur en chroom worden metaallagen op
      metalen aangebracht boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.185
  - number: 4.185.2
    text: |-
      Een dompelbad dat zich automatisch vult, heeft een automatisch afslagmechanisme dat afslaat als het dompelbad vol
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.185
  - number: 4.186.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden metaallagen thermisch op metalen aangebracht
      boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.186
  - number: 4.186.2
    text: |-
      Een dompelbad dat zich automatisch vult, heeft een automatisch afslagmechanisme dat afslaat als het dompelbad vol
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.186
  - number: 4.187.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam en de doelmatige
      werking van de voorzieningen voor het beheer van afvalwater:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.187
  - number: 4.187.1.a
    text: is er een werkinstructie over het voorkomen van verontreiniging van afvalwater opgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.187
  - number: 4.187.1.b
    text: zijn voorzieningen aanwezig die zijn afgestemd op de werkzaamheden die worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.187
  - number: 4.187.2
    text: |-
      In de werkinstructie is in ieder geval beschreven welke werkwijze wordt gevolgd en welke maatregelen worden
      getroffen om het lozen van stoffen te beperken, waaronder de manier waarop de oversleep wordt beperkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.187
  - number: 4.188.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het aanbrengen van
      lagen op metalen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.188
  - number: 4.188.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.188
  - number: 4.189.1
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, zijn de emissiegrenswaarden de waarden, bedoeld in
      tabel 4.189, gemeten in een steekmonster of in een etmaalmonster.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.189
  - number: 4.189.2
    text: |-
      De som van de vrachten, bedoeld in tabel 4.189, is de som van de vrachten van de metalen chroom, koper, nikkel,
      lood, zink, tin en zilver in het afvalwater, gemeten na het aanbrengen van lagen op metalen, maar voordat het
      afvalwater een zuiveringsstap heeft doorlopen.
