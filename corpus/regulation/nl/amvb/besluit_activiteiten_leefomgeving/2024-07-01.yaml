        artikel: 25d
  - number: 4.1222a.1
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen, wordt na het tijdelijk uitnemen van grond, die grond op of nabij het ontgravingsprofiel
      teruggebracht in de bodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1222a
  - number: 4.1222a.2
    text: |-
      Grond wordt na het tijdelijk uitnemen niet teruggebracht in de bodem als de grond een bewerking heeft ondergaan
      anders dan het uitzeven van bodemvreemd materiaal.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1222a
  - number: 4.1223.1
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem en het doelmatig
      beheer van afvalstoffen wordt grond die bij het graven is vrijgekomen niet langer dan acht weken na beëindiging van
      het graven in de directe nabijheid van de ontgravingslocatie opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1223
  - number: 4.1223.2
    text: |-
      Gescheiden partijen grond als bedoeld in [artikel 4.1222][ref1] worden gescheiden opgeslagen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
