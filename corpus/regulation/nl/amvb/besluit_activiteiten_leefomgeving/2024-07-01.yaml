  - number: 4.834.1
    text: |-
      [Artikel 4.822][ref1] is niet van toepassing op een huisvestingssysteem, met inbegrip van een aanvullende techniek,
      voor kippen, vleeskalkoenen en vleeseenden dat deel uitmaakt van een dierenverblijf:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
  - number: 4.834.1.a
    text: dat is opgericht voor 1 juli 2015;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
  - number: 4.834.1.b
    text: 'dat is opgericht op of na 1 juli 2015, en:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
  - number: 4.834.1.b.1°
    text: |-
      waarvoor uiterlijk op 30 juni 2015 een omgevingsvergunning onherroepelijk is en dat is opgericht voor 1 oktober
      2016; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
  - number: 4.834.1.b.2°
    text: |-
      waarvoor uiterlijk op 30 juni 2015 een aanvraag om een omgevingsvergunning is ingediend die voldoet aan
      de indieningsvereisten, bedoeld in [hoofdstuk 2 van de Regeling omgevingsrecht][ref1], zoals die tot de
      inwerkingtreding van dit besluit luidde, waarbij de omgevingsvergunning op 30 juni 2015 niet onherroepelijk is en
      waarbij het dierenverblijf is opgericht binnen 15 maanden nadat de omgevingsvergunning onherroepelijk is geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0027471#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.834
    references:
