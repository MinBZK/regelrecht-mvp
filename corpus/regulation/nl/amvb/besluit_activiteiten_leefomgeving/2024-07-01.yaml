        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.7'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.13.3
    text: |-
      Met een maatwerkvoorschrift of een vergunningvoorschrift kan voor een periode van ten hoogste negen maanden ook
      worden afgeweken van [artikel 2.11, tweede lid, onder a, b en c, en derde lid, onder a en b][ref1], voor het testen
      of gebruiken van een nieuwe techniek die, als zij commercieel zou worden ontwikkeld:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
    references:
