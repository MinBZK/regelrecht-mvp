        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: 11.126.1
    text: |-
      Het is verboden een houtopstand geheel of gedeeltelijk te vellen zonder dit ten minste vier weken maar niet eerder
      dan een jaar voor het begin daarvan te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.126
  - number: 11.126.2
    text: Dit artikel is niet van toepassing op het periodiek vellen van griend- of hakhout.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.126
  - number: 11.127.1
    text: |-
      Als de minister het bevoegd gezag is waaraan een melding voor het geheel of gedeeltelijk vellen van een
      houtopstand, bedoeld in [artikel 11.126][ref1], wordt gedaan, worden uiterlijk gelijktijdig met de melding de
      volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.127.1.a
    text: de startdatum van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.b
    text: een toelichting waarom het vellen van de houtopstand nodig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.c
    text: de oppervlakte van de te kappen houtopstand in vierkante meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.d
    text: 'een specificatie van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.d.1°
    text: het aantal te kappen bomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.d.2°
    text: de soortaanduiding van de bomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.d.3°
    text: de leeftijd van de bomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.e
    text: 'als sprake is van rijbeplanting: de onderlinge plantafstand in de rij in meters;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f
    text: |-
      een plan hoe aan de plicht tot herbeplanting, bedoeld in [artikel 11.129][ref1], wordt voldaan met ten minste de
      volgende gegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.127.1.f.1°
    text: de oppervlakte van de herbeplante houtopstand in m2;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f.2°
    text: 'een specificatie van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f.2°.i
    text: het aantal herbeplante bomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f.2°.ii
    text: de soortaanduiding van de herbeplante bomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f.2°.iii
    text: de kwaliteit van de herbeplante bomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.f.3°
    text: een toelichting over geplande uitvoering van de herbeplanting; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: 11.127.1.g
    text: |-
      als herbeplanting op andere grond dan de grond, bedoeld in [artikel 11.129, eerste lid][ref1], gewenst is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.127.1.g.1°
    text: |-
      een afschrift van een gesteld maatwerkvoorschrift als bedoeld in [artikel 11.130][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.127.1.g.2°
    text: |-
      een afschrift van een aanvraag om een maatwerkvoorschrift als bedoeld in [artikel 11.130][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.127.2
    text: |-
      Ten minste vier weken voor de gegevens en bescheiden, bedoeld in het eerste lid, wijzigen, worden de gewijzigde
      gegevens en bescheiden verstrekt aan het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.127
  - number: '11.128'
    text: 'Een maatwerkvoorschrift verbiedt het vellen van een houtopstand:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.128
  - number: 11.128.a
    text: alleen als dat nodig is voor de bescherming van bijzondere natuurwaarden of landschappelijke waarden; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.128
  - number: 11.128.b
    text: telkens voor ten hoogste vijf jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.128
  - number: 11.129.1
    text: |-
      Als een houtopstand geheel of gedeeltelijk is geveld, met uitzondering van het periodiek vellen van griend-
      of hakhout, of als een houtopstand op een andere manier teniet is gegaan, wordt zorg gedragen voor het op
      bosbouwkundig verantwoorde wijze herbeplanten van dezelfde grond binnen drie jaar na het vellen of tenietgaan van
      de houtopstand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.129
  - number: 11.129.2
    text: Binnen drie jaar na de herbeplanting wordt de beplanting die niet is aangeslagen vervangen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.129
  - number: 11.129.3
    text: |-
      Degene die de eigendom overdraagt van grond waarvoor een plicht tot herbeplanting geldt, of een beperkt recht op
      die grond vestigt of overdraagt, stelt de verkrijger op de hoogte van de plicht tot herbeplanting en neemt die
      plicht uitdrukkelijk op in de akte van levering.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.129
  - number: '11.130'
    text: |-
      Het met een maatwerkvoorschrift toestaan van herbeplanting op andere grond dan de grond, bedoeld in
      [artikel 11.129, eerste lid][ref1], kan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.130.a
    text: |-
      als gedeputeerde staten bevoegd zijn: alleen als de herbeplanting voldoet aan bij omgevingsverordening gestelde
      eisen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b
    text: 'als Onze Minister voor Natuur en Stikstof bevoegd is: alleen als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b.1°
    text: |-
      de grond die de eigenaar wil beplanten in hetzelfde gebied ligt als dat waar de gevelde houtopstand zich bevond,
      waarbij wordt aangesloten bij de voor de toepassing van deze bepaling bij ministeriële regeling vastgestelde
      gebiedsindeling;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b.2°
    text: |-
      de grond die de eigenaar wil beplanten niet van mindere kwaliteit is dan die waarop de gevelde houtopstand zich
      bevond;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b.3°
    text: |-
      de grond die de eigenaar wil beplanten ten minste een gelijke oppervlakte heeft als die waarop de gevelde
      houtopstand zich bevond;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b.4°
    text: de gevelde houtopstand geen deel uitmaakte van een boskern; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.130.b.5°
    text: de belangen van de landbouw en de bosbouw niet worden geschaad.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.130
  - number: 11.131.1
    text: |-
      De [artikelen 11.126][ref1] en [11.129][ref2] zijn niet van toepassing op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.2
        afdeling: '11.3'
  - number: 11.131.1.a
    text: 'het vellen van houtopstanden ter uitvoering van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.a.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.a.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.b
    text: 'het vellen van houtopstanden ter uitvoering van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.b.1°
    text: |-
      een maatwerkvoorschrift of een maatwerkregel die de verplichting bevat de preventieve of herstelmaatregelen te
      treffen die nodig zijn voor het bereiken van de instandhoudingsdoelstellingen voor een Natura 2000-gebied;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.b.2°
    text: |-
      een maatwerkvoorschrift verbonden aan een omgevingsvergunning voor een Natura 2000-activiteit of een
      omgevingsvergunning voor een flora- en fauna-activiteit; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
  - number: 11.131.1.b.3°
    text: |-
      regels gesteld in een ministeriële regeling of omgevingsverordening als bedoeld in de [artikelen 11.19][ref1],
      [11.20][ref2], [11.42][ref3], [11.43][ref4], [11.50][ref5], [11.51][ref6], [11.56][ref7] en [11.57][ref8];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref6]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref7]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref8]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.131
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
