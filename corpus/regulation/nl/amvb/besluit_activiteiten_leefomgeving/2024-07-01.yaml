        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.44.2
    text: 'Het verbod geldt niet voor:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
  - number: 9.44.2.a
    text: |-
      hijswerkzaamheden bij een spoorweg in een tunnel tot een hoogte die gelijk is aan de kortste afstand tot de
      buitenwand van de tunnel;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
  - number: 9.44.2.b
    text: |-
      graafwerkzaamheden bij een spoorweg in een tunnel tot een diepte die gelijk is aan de helft van de kortste afstand
