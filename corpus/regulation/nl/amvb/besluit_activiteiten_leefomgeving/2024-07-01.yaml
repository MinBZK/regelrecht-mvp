    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.68
  - number: 4.69.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.3
    text: Op het ontsluiten van de stoffen is NEN-EN-ISO 15587-1 of NEN-EN-ISO 15587-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.a
    text: 'voor onopgeloste stoffen: NEN-EN 872;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.b
    text: 'voor kwik: NEN-EN-ISO 12846, NEN-EN-ISO 17294-2 of NEN-EN-ISO 17852;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.c
    text: |-
      voor cadmium, thallium, lood, chroom, koper, nikkel, zink, antimoon, kobalt, mangaan, vanadium en tin: NEN-EN-ISO
      17294-2 of NEN-EN-ISO 11885;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.d
    text: 'voor arseen: NEN-EN-ISO 17294-2 of NEN-EN-ISO 11969;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.e
    text: 'voor de zuurgraad: NEN-EN-ISO 10523; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.4.f
    text: 'voor dioxinen en furanen: NEN-ISO 18073.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.5
    text: 'Voor de som van dioxinen en furanen worden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.5.a
    text: de waterfase en de zwevende stof op dioxinen en furanen geanalyseerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.69.5.b
    text: |-
      voordat ze worden opgeteld, de massaconcentraties van de dibenzo-p-dioxinen en dibenzofuranen, bedoeld in tabel
      4.69, vermenigvuldigd met de toxische equivalentiefactor, bedoeld in die tabel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.69
  - number: 4.70.1
    text: 'Het afvalwater afkomstig van het reinigen van afgassen wordt op de volgende manier bemonsterd:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.1.a
    text: continu, om de zuurgraad, de temperatuur en het debiet te meten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.1.b
    text: |-
      door dagelijkse steekproeven of metingen van een met het debiet evenredige representatieve steekproef over een
      periode van 24 uur, om de totale hoeveelheid onopgeloste stoffen te meten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.1.c
    text: |-
      door maandelijkse metingen van een met het debiet evenredige representatieve steekproef over een periode van
      24 uur, om totaal organisch koolstof, kwik, cadmium, thallium, arseen, lood, chroom, koper, nikkel, zink, antimoon,
      kobalt, mangaan, vanadium en tin te meten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.1.d
    text: |-
      door driemaandelijkse metingen tijdens de eerste twaalf maanden dat een afvalverbrandingsinstallatie of
      afvalmeeverbrandingsinstallatie in bedrijf is, en daarna door zesmaandelijkse metingen, om dioxinen en furanen
      te meten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.2
    text: Een monster wordt genomen op het punt waar het afvalwater wordt geloosd op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: 4.70.3
    text: |-
      Als het afvalwater afkomstig van het reinigen van afgassen samen met ander afvalwater wordt gezuiverd, wordt
      bepaald welk aandeel van de stoffen, de zuurgraad en de warmte in het uiteindelijk geloosde afvalwater afkomstig
      is van het afvalwater afkomstig van het reinigen van afgassen, door ook te bemonsteren op de verschillende
      afvalwaterstromen voordat ze uitmonden op de afvalwaterzuiveringsinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.70
  - number: '4.71'
    text: Op de bekwaamheid van een laboratorium is NEN-EN-ISO/IEC 17025 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.71
  - number: '4.72'
    text: |-
      Met het oog op het beschermen van de gezondheid en het milieu worden afgassen op een gecontroleerde wijze afgevoerd
      door een schoorsteen waarvan de hoogte op berekeningen is gebaseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.72
  - number: 4.73.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden, afhankelijk van de periodegemiddelden in een periodieke
      meting of continue meting de waarden, bedoeld in tabel 4.73, voor een:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.1.a
    text: afvalverbrandingsinstallatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.1.b
    text: 'afvalmeeverbrandingsinstallatie als daarin:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.1.b.1°
    text: meer dan 40% van de vrijkomende warmte afkomstig is van gevaarlijke afvalstoffen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.1.b.2°
    text: onbehandelde of ongesorteerde huishoudelijke afvalstoffen of bedrijfsafvalstoffen worden verbrand.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.2
    text: |-
      Als een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie een totaal nominaal thermisch
      ingangsvermogen heeft van minder dan 20 MW, is de emissiegrenswaarde in een maandgemiddelde voor stikstofoxiden
      niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.3
    text: |-
      Voor het berekenen van de emissies van de stoffen, bedoeld in tabel 4.73, wordt de massaconcentratie omgerekend
      naar een zuurstofgehalte van 11% in afgas, met uitzondering van de emissies van de verbranding van afgewerkte olie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.73
  - number: 4.73.4
    text: |-
      Voor het berekenen van de emissies van de verbranding van afgewerkte olie wordt de massaconcentratie omgerekend
      naar een zuurstofgehalte van 3% in afgas.
