  - number: 2.7.a
    text: waaraan een melding wordt gedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.7
  - number: 2.7.b
    text: dat een maatwerkvoorschrift kan stellen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.7
  - number: 2.7.c
    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.7
  - number: '2.8'
    text: |-
      Voor het op of in de bodem brengen van meststoffen, bedoeld in [paragraaf 3.2.20][ref1], is Onze Minister van
      Landbouw, Natuur en Voedselkwaliteit het bevoegd gezag:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.8
    references:
