      beperkingengebiedactiviteit met betrekking tot een waterstaatswerk te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 6.27, eerste lid][ref2], die worden verricht in een beperkingengebied met betrekking tot een
      oppervlaktewaterlichaam in beheer bij het Rijk, voor zover het gaat om het aanleggen of in stand houden van een
      terreinophoging met een volume van meer dan 50 m3 per kadastraal perceel.


