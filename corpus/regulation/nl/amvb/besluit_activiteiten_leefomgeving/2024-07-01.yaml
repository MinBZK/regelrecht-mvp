                  35


                  15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1348
  - number: '4.1349'
    text: |-
      Voor de emissie in de lucht van een stookinstallatie, anders dan een gasturbine of zuigermotor, zijn de
      emissiegrenswaarden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349
  - number: 4.1349.a
    text: voor stikstofoxiden, zwaveldioxide en totaal stof de waarden, bedoeld in tabel 4.1349; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349
  - number: 4.1349.b
    text: |-
      voor ammoniak, voor zover een ketel in gebruik is genomen na de inwerkingtreding van dit besluit en wordt gestookt
      op rie-biomassa of pellets gemaakt uit rie-biomassa:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349
  - number: 4.1349.b.1°
    text: 5 mg/Nm3 bij toepassing van selectieve katalytische reductie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349
  - number: 4.1349.b.2°
    text: 10 mg/Nm3 bij toepassing van selectieve niet-katalytische reductie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349
  - number: 4.1349a
    text: |-
      Een maatwerkregel of maatwerkvoorschrift waarmee de emissiegrenswaarde voor ammoniak, bedoeld in
      [artikel 4.1349, eerste lid, onder b][ref1], wordt verhoogd, bevat bij toepassing van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1349a.a
    text: selectieve katalytische reductie een emissiegrenswaarde van niet meer dan 10 mg/Nm3; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349a
  - number: 4.1349a.b
    text: selectieve niet-katalytische reductie een emissiegrenswaarde van niet meer dan 20 mg/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1349a
  - number: '4.1350'
    text: |-
      Voor de emissie in de lucht van een ketel die ten hoogste 500 uur per jaar in bedrijf is die wordt gestookt op een
      vaste brandstof is de emissiegrenswaarde voor totaal stof 100 mg/Nm3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1350
  - number: '4.1351'
    text: |-
      Voor een stookinstallatie die ten hoogste zes maanden een stookinstallatie vervangt die buiten bedrijf is gesteld
      in verband met onderhoud, reparatie of definitieve vervanging en is afgekoppeld van de brandstoftoevoer of van het
      stoomnet of elektriciteitsnet waaraan zij levert, zijn de emissiegrenswaarden de waarden voor de stookinstallatie
      die buiten bedrijf is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1351
  - number: 4.1352.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, bedoeld in de [artikelen 4.1346 tot en met 4.1350][ref1] en
      [4.1370 tot en met 4.1374][ref2], is NEN-EN 15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1352.2
    text: 'Op het verrichten van een periodieke meting of parallelmeting zijn de volgende normen van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.2.a
    text: 'voor zuurstof: NEN-EN 14789;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.2.b
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.2.c
    text: 'voor stikstofoxiden: NEN-EN 14792;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.2.d
    text: 'voor zwaveldioxide: NEN-EN 14791; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.2.e
    text: 'voor ammoniak: NEN-EN-ISO 21877.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.3
    text: 'Op het verrichten van een continue meting zijn de volgende normen van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.3.a
    text: 'voor totaal stof: NEN-EN 13284-2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1352.3.b
    text: 'voor de kwaliteitsborging: NEN-EN 14181 en NVN-CEN TS 17198.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1352
  - number: 4.1353.1
    text: |-
      Er wordt periodiek of continu gemeten of aan de emissiegrenswaarden van stikstofoxiden, zwaveldioxide en totaal
      stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1353
  - number: 4.1353.2
    text: |-
      De emissieconcentratie van stikstofoxiden, zwaveldioxide, ammoniak en totaal stof van een stookinstallatie wordt
      continu gemeten als emissiereductietechnieken worden toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1353
  - number: 4.1353.3
    text: |-
      In afwijking van het tweede lid kan periodiek worden gemeten als een logboek wordt bijgehouden waaruit blijkt dat
      de emissiereductietechnieken continu in bedrijf zijn en de emissiegrenswaarden die van toepassing zijn niet worden
      overschreden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1353
  - number: 4.1353.4
    text: |-
      De emissieconcentraties van stoffen waarvoor emissiegrenswaarden zijn vastgesteld, worden voor een vervangende
      stookinstallatie als bedoeld in [artikel 4.1351][ref1] binnen vier weken na de inbedrijfstelling van die
      vervangende installatie periodiek gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1353
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1353.5
    text: |-
      De meting van zwaveldioxide is niet verplicht als aan de emissiegrenswaarden wordt voldaan door brandstof te stoken
      met een bekend zwavelgehalte bij een stookinstallatie die niet is uitgerust met apparatuur voor het verminderen van
      de emissie van zwaveldioxide.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1353
  - number: 4.1354.1
    text: |-
      Een periodieke meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur.
      Dit geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1354
  - number: 4.1354.2
    text: |-
      Het resultaat van de periodieke meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in tabel 4.1354.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1354
  - number: 4.1354.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van de individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1354
  - number: 4.1354.4
    text: |-
      Een periodieke meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor
      de norm die volgens [artikel 4.1352][ref1] van toepassing is op de stof die wordt gemeten.
            Tabel 4.1354 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Ammoniak


                    40


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1354
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1355.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste twee weken voordat een periodieke meting wordt
      verricht, geïnformeerd over de datum en het tijdstip van die meting.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1355.2
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de periodieke meting zou worden verricht, geïnformeerd over het
      niet doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1355
  - number: 4.1356.1
    text: 'Bij een stookinstallatie wordt periodiek gemeten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: 4.1356.1.a
    text: binnen vier weken nadat een emissiegrenswaarde van toepassing is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: 4.1356.1.b
    text: voorafgaand aan het van toepassing worden van een emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: 4.1356.2
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 20 MW wordt elk jaar periodiek
      gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: 4.1356.3
    text: |-
      Bij een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW en ten hoogste 20 MW wordt
      elke drie jaar periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: 4.1356.4
    text: |-
      Het tweede en derde lid zijn niet van toepassing op een stookinstallatie op een offshore oliewinningsplatform
      of gaswinningsplatform. Bij een gasturbine, gasmotor of dieselmotor op een offshore oliewinningsplatform of
      gaswinningsplatform wordt elke vier jaar periodiek gemeten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1356
  - number: '4.1357'
    text: |-
      Als geen van de gevalideerde meetresultaten, bedoeld in [artikel 4.1354][ref1], hoger is dan de desbetreffende
      emissiegrenswaarde, wordt aan die emissiegrenswaarde voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1357
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1358.1
    text: |-
      Periodieke metingen zijn representatief voor normale bedrijfsvoering als het brandstofmengsel wordt gebruikt dat de
      hoogste emissie zal opleveren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1358
  - number: 4.1358.2
    text: |-
      Een periodieke meting bij een ketel wordt verricht bij een belasting van meer dan 60%. Een eenmalige meting bij
      een dieselmotor, een gasmotor of een gasturbine wordt verricht bij de hoogste belasting waarbij deze continu kan
      worden gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1358
  - number: 4.1358.3
    text: |-
      Een periodieke meting bij een gasturbine, met een ketel die daarbij hoort, wordt verricht bij een bijstook van ten
      hoogste 10% in de ketel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1358
  - number: 4.1359.1
    text: Geautomatiseerde meetsystemen worden ten minste eenmaal per jaar met parallelmetingen gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1359
  - number: 4.1359.2
    text: |-
      Een parallelmeting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de
      norm die volgens [artikel 4.1352][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1359
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1360.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt geïnformeerd over de resultaten van de controle, bedoeld
      in [artikel 4.1359][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1360
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1360.2
    text: |-
      Het bevoegd gezag wordt ten minste twee weken voordat een parallelmeting wordt verricht, geïnformeerd over de datum
      en het tijdstip van die meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1360
  - number: 4.1360.3
    text: |-
      Het bevoegd gezag wordt uiterlijk op de datum dat de parallelmeting zou worden verricht, geïnformeerd over het niet
      doorgaan daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1360
  - number: 4.1361.1
    text: Het resultaat van de continue meting zijn de gevalideerde daggemiddelden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1361
  - number: 4.1361.2
    text: |-
      Het gevalideerde daggemiddelde is het daggemiddelde verminderd met de aangetoonde meetonzekerheid. De aangetoonde
      meetonzekerheid is niet meer dan het percentage van de emissiegrenswaarde, bedoeld in tabel 4.1361.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1361
  - number: 4.1361.3
    text: |-
      De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van de individuele metingen.
            Tabel 4.1361 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Ammoniak


                    40
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1361
  - number: 4.1362.1
    text: |-
      Als bij een continue meting geen van de gevalideerde daggemiddelden hoger is dan de emissiegrenswaarden, wordt aan
      de emissiegrenswaarde voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1362
  - number: 4.1362.2
    text: 'Voor de toepassing van het eerste lid worden bij een continue meting niet meegerekend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1362
  - number: 4.1362.2.a
    text: meetuitkomsten die zijn verkregen tijdens periodes van opstarten en stilleggen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1362
  - number: 4.1362.2.b
    text: meetuitkomsten die zijn verkregen tijdens storingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1362
  - number: 4.1363.1
    text: |-
      De metingen van een dag worden als ongeldig beschouwd als in een dag meer dan drie uurgemiddelden ongeldig zijn
      door storing of onderhoud van het continu werkende meetsysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1363
  - number: 4.1363.2
    text: |-
      Als per jaar de metingen van meer dan tien dagen ongeldig zijn, worden passende maatregelen getroffen om de
      betrouwbaarheid van het continu werkende meetsysteem te verbeteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1363
  - number: 4.1364.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht zijn bij gelijktijdig gebruik van verschillende
      soorten brandstof in een stookinstallatie de emissiegrenswaarden voor stikstofoxiden, zwaveldioxide en totaal stof
      de gewogen gemiddelden van de emissiegrenswaarden voor elk van de brandstoffen afzonderlijk van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1364
  - number: 4.1364.2
    text: |-
      Een gewogen gemiddelde wordt per tijdseenheid berekend naar het aandeel van elk van de brandstoffen in de
      energetische inhoud van de toegevoerde brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1364
  - number: 4.1365.1
    text: |-
      Met het oog op het beperken van verontreiniging van de lucht kan een stookinstallatie die als gevolg van een
      storing niet aan de emissiegrenswaarden kan voldoen uiterlijk 120 uren na het optreden van de storing in bedrijf
      blijven, met een maximum van 120 uren per kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.2
    text: 'Het eerste lid is niet van toepassing als het gaat om een stookinstallatie:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.2.a
    text: op een offshore oliewinningsplatform of gaswinningsplatform;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.2.b
    text: waarvan de storing redelijkerwijs niet binnen 120 uren kan worden hersteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.2.c
    text: waarvan de storing binnen de termijn blijft die is gesteld door het Staatstoezicht op de mijnen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.3
    text: |-
      Tijdens een storing die samenhangt met de brandstof die wordt gestookt kan een vervangende brandstof worden
      gestookt en zijn geen emissiegrenswaarden van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: 4.1365.4
    text: |-
      Bij een storing in de meetapparatuur worden geen wijzigingen in het gebruik van de stookinstallatie aangebracht die
      een significante toename van de emissie met zich mee kunnen brengen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1365
  - number: '4.1366'
    text: |-
      Het Staatstoezicht op de mijnen wordt ten hoogste 120 uur na een storing bij een stookinstallatie als bedoeld in
      [artikel 4.1365, tweede lid][ref1], schriftelijk geïnformeerd over de reden van de storing en van het niet-tijdige
      herstel.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1366
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: '4.1367'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt zo spoedig mogelijk geïnformeerd als niet aan de
      emissiegrenswaarden wordt voldaan, over de oorzaak dat niet wordt voldaan, en de maatregelen die worden getroffen
      om zo spoedig mogelijk weer aan de emissiegrenswaarden te voldoen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1367
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.1368'
    text: 'De volgende gegevens worden ten minste zes jaar bij de stookinstallatie bewaard:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
  - number: 4.1368.a
    text: |-
      de registratie van het aantal draaiuren, bedoeld in [artikel 4.1343, tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.127'
  - number: 4.1368.b
    text: |-
      de resultaten van de laatst verrichte metingen en andere gegevens die nodig zijn om te kunnen beoordelen of wordt
      voldaan aan de emissiegrenswaarden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
  - number: 4.1368.c
    text: een overzicht van de soort en de hoeveelheid in de installatie gebruikte brandstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
  - number: 4.1368.d
    text: een overzicht van eventuele storingen of uitvallen van aanvullende emissiebeperkende apparatuur; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
  - number: 4.1368.e
    text: een overzicht van de gevallen van niet-voldoen aan de emissiegrenswaarden en de getroffen maatregelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1368
  - number: 4.1369.1
    text: |-
      Als een stookinstallatie voor 20 december 2018 in bedrijf is genomen, zijn de emissiegrenswaarden, bedoeld in deze
      paragraaf, van toepassing vanaf:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1369
  - number: 4.1369.1.a
    text: |-
      1 januari 2030, voor een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW en ten
      hoogste 5 MW; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1369
  - number: 4.1369.1.b
    text: 1 januari 2025, voor een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 5 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1369
  - number: 4.1369.2
    text: Het eerste lid is niet van toepassing op glycolfornuizen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1369
  - number: 4.1370.1
    text: |-
      Voor de emissie in de lucht van een gasturbine die wordt gestookt op cokesovengas is de emissiegrenswaarde voor
      zwaveldioxide 130 mg/Nm3, als de gasturbine voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1370
  - number: 4.1370.2
    text: |-
      Voor de emissie in de lucht van een gasturbine die wordt gestookt op hoogovengas is de emissiegrenswaarde voor
      zwaveldioxide 65 mg/Nm3, als de gasturbine voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1370
  - number: 4.1370.3
    text: |-
      Voor de emissie in de lucht van een gasturbine die wordt gestookt op vloeibare brandstof is de emissiegrenswaarde
      voor totaal stof 20 mg/Nm3, als de gasturbine voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1370
  - number: '4.1371'
    text: |-
      Voor de emissie in de lucht van een dieselmotor met een nominaal thermisch ingangsvermogen van ten hoogste 20 MW is
      de emissiegrenswaarde voor totaal stof 20 mg/Nm3, als de dieselmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1371
  - number: 4.1372.1
    text: |-
      Voor de emissie in de lucht van een gasmotor die wordt gestookt op cokesovengas is de emissiegrenswaarde voor
      zwaveldioxide 130 mg/Nm3, als de gasmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1372
  - number: 4.1372.2
    text: |-
      Voor de emissie in de lucht van een gasmotor die wordt gestookt op hoogovengas is de emissiegrenswaarde voor
      zwaveldioxide 65 mg/Nm3, als de gasmotor voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1372
  - number: '4.1373'
    text: |-
      Voor de emissie in de lucht van een stookinstallatie met een nominaal thermisch ingangsvermogen van ten hoogste 5
      MW, anders dan een gasturbine of zuigermotor die wordt gestookt op gasvormige brandstof anders dan cokesovengas,
      is de emissiegrenswaarde voor zwaveldioxide 200 mg/Nm3, als de stookinstallatie voor 20 december 2018 in bedrijf
      is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1373
  - number: '4.1374'
    text: |-
      Voor de emissie in de lucht van een ketel die ten hoogste 500 uur per jaar in bedrijf is met een nominaal thermisch
      ingangsvermogen van ten minste 1 MW die wordt gestookt op een vaste brandstof is de emissiegrenswaarde voor totaal
      stof 200 mg/Nm3, als de ketel voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1374
  - number: 4.1374a
    text: |-
      Voor een stookinstallatie, anders dan een gasturbine of zuigermotor, die wordt gestookt op rie-biomassa en
      die voor de inwerkingtreding van dit besluit in bedrijf was, zijn de emissiegrenswaarden voor de emissies van
      stikstofoxiden, zwaveldioxide en totaal stof de waarden, bedoeld in tabel 4.1374a.
          Tabel 4.1374a Overgangsrecht emissiegrenswaarden rie-biomassa gestookte installatie


                  *Brandstof/nominaal thermisch ingangsvermogen*


                  *Stikstofoxiden in mg/Nm3*


                  *Zwaveldioxide in mg/Nm3*


                  *Totaal stof in mg/Nm3*


                  Rie-biomassa of pellets gemaakt uit rie-biomassa


                  145


                  200


                  5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1374a
  - number: 4.1375.1
    text: |-
      Een stookinstallatie met een nominaal thermisch ingangsvermogen van meer dan 5 MW, anders dan een gasturbine,
      gasmotor of dieselmotor, hoeft tot 1 januari 2025 niet periodiek te worden gemeten, als de stookinstallatie voor
      20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1375
  - number: 4.1375.2
    text: |-
      Een stookinstallatie met een nominaal thermisch ingangsvermogen van ten minste 1 MW en ten hoogste 5 MW, anders dan
      een gasturbine, gasmotor of dieselmotor, hoeft tot 2030 niet periodiek te worden gemeten, als de stookinstallatie
      voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1375
  - number: 4.1375.3
    text: |-
      Bij een gasturbine, gasmotor of dieselmotor met een nominaal thermisch ingangsvermogen van meer dan 5 MW kan tot
      1 januari 2025 elke vier jaar periodiek worden gemeten, als de stookinstallatie voor 20 december 2018 in bedrijf
      is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1375
  - number: 4.1375.4
    text: |-
      Bij een gasturbine, gasmotor of dieselmotor met een nominaal thermisch ingangsvermogen van ten minste 1 MW en
      ten hoogste 5 MW kan tot 1 januari 2030 elke vier jaar periodiek worden gemeten, als de stookinstallatie voor
      20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1375
  - number: 4.1375.5
    text: |-
      Het eerste tot en met vierde lid zijn niet van toepassing op een stookinstallatie op een offshore
      oliewinningsplatform of gaswinningsplatform die voor 20 december 2018 in bedrijf is genomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1375
  - number: '5.1'
    text: |-
      Dit hoofdstuk is alleen van toepassing voor zover dat in [hoofdstuk 3][ref1], [4][ref2], [6][ref3] of [7][ref4]
      is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk6
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '4'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '6'
      - id: ref4
        bwb_id: BWBR0041330
        hoofdstuk: '7'
  - number: 5.2.1
    text: |-
      Ten minste vier weken voor het begin van een activiteit als bedoeld in [hoofdstuk 3][ref1] of [4][ref2] wordt
      een plattegrond van de locatie waarop is aangegeven waar bodembedreigende stoffen worden gebruikt, gemaakt of
      uitgestoten verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.2
    machine_readable:
      definitions:
        meldingstermijn_weken: 4
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: startdatum_activiteit
            type: date
            required: true
            description: Geplande startdatum van de activiteit
        input:
          - name: datum_verstrekking_plattegrond
            type: date
            required: true
            description: Datum waarop de plattegrond is verstrekt aan het bevoegd gezag
            source: {}
        output:
          - name: uiterste_datum_verstrekking
            type: date
            description: Uiterste datum waarop de plattegrond moet zijn verstrekt (vier weken voor start)
          - name: tijdig_verstrekt
            type: boolean
            description: Of de plattegrond tijdig (ten minste vier weken voor start) is verstrekt
        actions:
          - output: uiterste_datum_verstrekking
            value:
              operation: SUBTRACT
              values:
                - $startdatum_activiteit
                - $meldingstermijn_weken
          - output: tijdig_verstrekt
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_verstrekking_plattegrond
              value: $uiterste_datum_verstrekking
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '4'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.2.2
    text: |-
      Ten hoogste vier weken na een wijziging van die locatie, wordt een plattegrond waarop die gewijzigde locatie is
      aangegeven verstrekt aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.2.3
    text: |-
      Dit artikel is niet van toepassing voor zover het gaat om het exploiteren van een ippc-installatie die in
      [hoofdstuk 3][ref1] als vergunningplichtig is aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 5.3.1
    text: |-
      Bij het beëindigen van een activiteit als bedoeld in [hoofdstuk 3][ref1] of [4][ref2] wordt een bodemonderzoek
      verricht om de kwaliteit van de bodem vast te stellen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 5.3.2
    text: |-
      Het bodemonderzoek gaat over de bodembedreigende stoffen die zijn gebruikt, gemaakt of uitgestoten op het gedeelte
      van de locatie waarop de activiteit is verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.3
  - number: 5.3.3
    text: |-
      Het bodemonderzoek voldoet aan NEN 5725 en NEN 5740, voor zover de activiteit plaatsvindt op de landbodem, of aan
      NEN 5717 en NEN 5720, voor zover de activiteit plaatsvindt in een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.3
  - number: 5.3.4
    text: |-
      Het veldwerk wordt verricht door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 2000 of een
      certificatie-instantie of inspectie-instantie met een erkenning bodemkwaliteit voor AS SIKB 2000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.3
  - number: '5.4'
    text: 'Het rapport van het bodemonderzoek bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.a
    text: de naam en het adres van degene die het onderzoek heeft verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.b
    text: de wijze waarop het onderzoek is verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.c
    text: de aard en de mate van de aangetroffen verontreinigde stoffen en de herkomst daarvan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.d
    text: informatie over het huidige en eerdere gebruik van het terrein;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.e
    text: |-
      bestaande informatie over bodemmetingen en grondwatermetingen die de toestand van de bodem en het grondwater
      weergeven op het tijdstip van opstelling van het rapport, of anders nieuwe bodemmetingen en grondwatermetingen
      voor het constateren van eventuele verontreiniging van de bodem door de bodemverontreinigende stoffen die bij de
      activiteit zijn gebruikt, gemaakt of vrijgekomen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: 5.4.f
    text: |-
      als de kwaliteit van de bodem wordt hersteld: de wijze waarop en de mate waarin dit gebeurt volgens artikel 5.4,
      eerste lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.4
  - number: '5.5'
    text: |-
      Ten hoogste zes maanden na het beëindigen van de activiteit wordt een rapport van het bodemonderzoek verstrekt aan
      het bevoegd gezag, bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.5
    machine_readable:
      definitions:
        rapportagetermijn_maanden: 6
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: einddatum_activiteit
            type: date
            required: true
            description: Datum waarop de activiteit is beëindigd
        input:
          - name: datum_verstrekking_rapport
            type: date
            required: true
            description: Datum waarop het rapport van het bodemonderzoek is verstrekt
            source: {}
        output:
          - name: uiterste_datum_rapport
            type: date
            description: Uiterste datum waarop het rapport moet zijn verstrekt (zes maanden na beëindiging)
          - name: tijdig_verstrekt
            type: boolean
            description: Of het rapport tijdig (ten hoogste zes maanden na beëindiging) is verstrekt
        actions:
          - output: uiterste_datum_rapport
            value:
              operation: ADD
              values:
                - $einddatum_activiteit
                - $rapportagetermijn_maanden
          - output: tijdig_verstrekt
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_verstrekking_rapport
              value: $uiterste_datum_rapport
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.6.1
    text: |-
      Als de bodem is verontreinigd, wordt uiterlijk zes maanden na het toezenden van het rapport van het bodemonderzoek
      bij het beëindigen van de activiteit de bodemkwaliteit hersteld tot:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
    machine_readable:
      definitions:
        hersteltermijn_maanden: 6
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: datum_toezending_rapport
            type: date
            required: true
            description: Datum waarop het rapport van het bodemonderzoek is toegezonden
        input:
          - name: bodem_verontreinigd
            type: boolean
            required: true
            description: Of de bodem is verontreinigd
            source: {}
          - name: datum_herstel_afgerond
            type: date
            required: true
            description: Datum waarop het bodemkwaliteitsherstel is afgerond
            source: {}
        output:
          - name: uiterste_datum_herstel
            type: date
            description: Uiterste datum waarop het herstel moet zijn afgerond (zes maanden na toezending rapport)
          - name: herstelplicht_van_toepassing
            type: boolean
            description: Of de herstelplicht van toepassing is
          - name: tijdig_hersteld
            type: boolean
            description: Of het herstel tijdig is afgerond
        actions:
          - output: uiterste_datum_herstel
            value:
              operation: ADD
              values:
                - $datum_toezending_rapport
                - $hersteltermijn_maanden
          - output: herstelplicht_van_toepassing
            value: $bodem_verontreinigd
          - output: tijdig_hersteld
            value:
              operation: IF
              cases:
                - when:
                    operation: NOT
                    value: $bodem_verontreinigd
                  then: true
              default:
                operation: LESS_THAN_OR_EQUAL
                subject: $datum_herstel_afgerond
                value: $uiterste_datum_herstel
  - number: 5.6.1.a
    text: 'de bodemkwaliteit en grondwaterkwaliteit, die is vastgesteld voor het begin van de activiteit:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.1.a.1°
    text: 'voor zover een activiteit plaatsvindt op de landbodem: in een rapport volgens NEN 5740; of'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.1.a.2°
    text: 'voor zover een activiteit plaatsvindt in een oppervlaktewaterlichaam: in een rapport volgens NEN 5720;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.1.b
    text: |-
      de bodemkwaliteit van de locatie waarop de activiteit is verricht, zoals die is vastgelegd op een
      bodemkwaliteitskaart als bedoeld in [artikel 25c, derde lid, van het Besluit bodemkwaliteit][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25c
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25c
  - number: 5.6.1.c
    text: |-
      de volgende kwaliteitsklasse, bedoeld in [artikel 25d van het Besluit bodemkwaliteit][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 5.6.1.c.1°
    text: 'voor zover een activiteit plaatsvindt op de landbodem: de kwaliteitsklasse landbouw/natuur; of'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.1.c.2°
    text: 'voor zover een activiteit plaatsvindt in een oppervlaktewaterlichaam: de kwaliteitsklasse niet verontreinigd.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.2
    text: Het herstel wordt verricht door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.6.3
    text: Het herstel wordt milieukundig begeleid door een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 6000.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.6
  - number: 5.7.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste vijf dagen voor het begin van de
      herstelwerkzaamheden geïnformeerd over de begindatum.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7
    machine_readable:
      definitions:
        meldingstermijn_dagen_vooraf: 5
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: begindatum_herstel
            type: date
            required: true
            description: Geplande begindatum van de herstelwerkzaamheden
        input:
          - name: datum_informering
            type: date
            required: true
            description: Datum waarop het bevoegd gezag is geïnformeerd over de begindatum
            source: {}
        output:
          - name: uiterste_datum_informering
            type: date
            description: Uiterste datum waarop het bevoegd gezag moet zijn geïnformeerd (vijf dagen voor begin)
          - name: tijdig_geinformeerd
            type: boolean
            description: Of het bevoegd gezag tijdig (ten minste vijf dagen voor begin) is geïnformeerd
        actions:
          - output: uiterste_datum_informering
            value:
              operation: SUBTRACT
              values:
                - $begindatum_herstel
                - $meldingstermijn_dagen_vooraf
          - output: tijdig_geinformeerd
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_informering
              value: $uiterste_datum_informering
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.7.2
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten hoogste vijf dagen na beëindiging van de
      herstelwerkzaamheden geïnformeerd over de einddatum.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7
    machine_readable:
      definitions:
        meldingstermijn_dagen_achteraf: 5
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: einddatum_herstel
            type: date
            required: true
            description: Einddatum van de herstelwerkzaamheden
        input:
          - name: datum_informering
            type: date
            required: true
            description: Datum waarop het bevoegd gezag is geïnformeerd over de einddatum
            source: {}
        output:
          - name: uiterste_datum_informering
            type: date
            description: Uiterste datum waarop het bevoegd gezag moet zijn geïnformeerd (vijf dagen na beëindiging)
          - name: tijdig_geinformeerd
            type: boolean
            description: Of het bevoegd gezag tijdig (ten hoogste vijf dagen na beëindiging) is geïnformeerd
        actions:
          - output: uiterste_datum_informering
            value:
              operation: ADD
              values:
                - $einddatum_herstel
                - $meldingstermijn_dagen_achteraf
          - output: tijdig_geinformeerd
            value:
              operation: LESS_THAN_OR_EQUAL
