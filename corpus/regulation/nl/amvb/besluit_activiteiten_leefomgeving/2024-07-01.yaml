  - number: 4.962.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het vulpunt van een ondergrondse opslagtank
      waarin vloeibare brandstoffen voor het tanken van vaartuigen of drijvende werktuigen vanaf de wal worden
      opgeslagen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
      wordt verricht, ten minste 20 m; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 4.962.1.b
    text: |-
      tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, ten minste de afstand, bedoeld
      onder a, als een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1] niet de activiteit, bedoeld in
      [artikel 4.958][ref2], omvat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
        afdeling: '3.3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.96'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_vulpunt_tot_locatiegrens_m
            type: number
            required: true
            description: Afstand vanaf het vulpunt tot de begrenzing van de locatie in meters
            source: {}
        output:
          - name: voldoet_afstand_brandstofopslag_vulpunt
