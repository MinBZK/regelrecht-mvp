    text: |-
      als het gaat om het opslaan van gevaarlijke stoffen van ADR-klasse 9, zonder bijkomend gevaar als bedoeld in de
      ADR, of producten voor persoonlijke verzorging; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
  - number: 4.1013.1.b
    text: |-
      als niet meer wordt opgeslagen dan de hoeveelheden, bedoeld in tabel 4.1013, met inachtneming van het tweede tot en
      met vierde lid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
  - number: 4.1013.2
    text: 'Als boven de ruimte voor verkoop aan particulieren:'
