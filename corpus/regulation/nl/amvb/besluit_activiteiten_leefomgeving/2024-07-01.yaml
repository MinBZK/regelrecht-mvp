  - number: '18.9'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in deze afdeling, worden die ondertekend
      en voorzien van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.9
  - number: 18.9.a
    text: de naam, het e-mailadres en het telefoonnummer van de contactpersoon van de onderneming of rechtspersoon;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.9
  - number: 18.9.b
    text: |-
      het adres van de vestiging van de onderneming of rechtspersoon of, als sprake is van meerdere vestigingen, het
      adres van de hoofdvestiging of hoofdnederzetting van de onderneming of rechtspersoon;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.9
  - number: 18.9.c
    text: het nummer van de inschrijving van de onderneming of rechtspersoon in het handelsregister; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.9
  - number: 18.9.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.9
  - number: 18.10.1
    text: |-
      Voordat de naam, het adres of het nummer, bedoeld in [artikel 18.9][ref1] wijzigt, worden de gewijzigde gegevens
      verstrekt aan het bevoegd gezag, bedoeld in deze afdeling.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.10
