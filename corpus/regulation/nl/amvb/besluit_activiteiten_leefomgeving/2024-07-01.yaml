  - number: 9.47.1
    text: Deze afdeling is van toepassing op activiteiten in het beperkingengebied met betrekking tot een lokale spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.47
  - number: 9.47.2
    text: |-
      Het eerste lid geldt niet voor activiteiten die worden verricht door of namens de spoorwegbeheerder in het kader
      van het aanleggen, het wijzigen of het beheren van een lokale spoorweg of de regeling van het verkeer over die
      spoorweg.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.47
  - number: '9.48'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een lokale spoorweg te verrichten, geldt voor de activiteiten,
      bedoeld in [artikel 9.47][ref2], voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel9
