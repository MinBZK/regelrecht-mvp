    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c.6°
    text: afvalwater afkomstig van een calamiteitenoefening; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.1.c.7°
    text: afvalwater afkomstig van graven of saneringen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.55
  - number: 6.55.2
    text: |-
      Het verbod, bedoeld in het eerste lid, aanhef en onder a, geldt niet voor het lozen van stoffen of water afkomstig
      van het onderhouden, repareren of schoonmaken van vaartuigen of drijvende werktuigen en het behandelen van de
      scheepshuid van vaartuigen of drijvende werktuigen, bedoeld in [artikel 3.145][ref1].


