  - number: 5.10.1
    text: Het PRTR-verslag bevat de gegevens, bedoeld in artikel 5, eerste en tweede lid, van de PRTR-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.10
  - number: 5.10.2
    text: |-
      Het PRTR-verslag bevat ook gegevens over de stoffen, bedoeld in [bijlage V][ref1], als een of meer van de
      emissiegrenswaarden die daarbij zijn genoemd, worden overschreden. De artikelen 5, tweede tot en met vijfde lid, en
      9, eerste en tweede lid, van de PRTR-verordening zijn van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.10
    references:
