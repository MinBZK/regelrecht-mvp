        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.7'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.12.3
    text: |-
      Een maatwerkregel kan worden gesteld met het oog op de belangen, bedoeld in [artikel 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 2.12.4
    text: |-
      Een maatwerkregel wordt voor milieubelastende activiteiten gesteld in het omgevingsplan of in de
      omgevingsverordening en voor lozingsactiviteiten op een oppervlaktewaterlichaam en lozingsactiviteiten op een
      zuiveringtechnisch werk in de waterschapsverordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.12
  - number: 2.13.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in [hoofdstuk 3][ref2] worden verbonden,
      over [artikel 2.11][ref3], [afdeling 2.7][ref4] en de [hoofdstukken 3 tot en met 5][ref5], met uitzondering van
      bepalingen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.13
    references:
