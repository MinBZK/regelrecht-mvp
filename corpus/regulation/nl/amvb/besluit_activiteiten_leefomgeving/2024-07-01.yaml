        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.22.1.b
    text: |-
      het handelen volgens een faunabeheerplan, waarover regels zijn gesteld in [paragraaf 11.2.6][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
  - number: 11.22.1.c
    text: |-
      de uitoefening van de jacht, waarover regels zijn gesteld in [paragraaf 11.2.7][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.22.1.d
    text: |-
      het gebruik en het onder zich hebben van middelen of installaties en het toepassen van methodes om dieren te vangen
      of te doden, waaronder het verrichten van een jachtgeweeractiviteit en een valkeniersactiviteit, en het verhandelen
      en het binnen of buiten het grondgebied van Nederland brengen van middelen of installaties om dieren te vangen of
      te doden, waarover regels zijn gesteld in [paragraaf 11.2.8][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.22.1.e
    text: |-
      het verhandelen, het om een andere reden dan verkoop onder zich hebben en het binnen of buiten het
      grondgebied van Nederland brengen van dieren, planten of producten daarvan, waarover regels zijn gesteld in
      [paragraaf 11.2.9][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.9
        afdeling: '11.2'
  - number: 11.22.1.f
    text: |-
      activiteiten die de introductie of verspreiding van invasieve uitheemse soorten tot gevolg hebben of kunnen hebben,
      waarover regels zijn gesteld in [paragraaf 11.2.10][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.10
        afdeling: '11.2'
  - number: 11.22.1.g
    text: |-
      het vangen, doden en verwerken van walvissen, waarover regels zijn gesteld in [paragraaf 11.2.11][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.22
    references:
