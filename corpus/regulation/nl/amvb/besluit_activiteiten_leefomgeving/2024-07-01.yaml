  - number: 4.1016.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1015][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
