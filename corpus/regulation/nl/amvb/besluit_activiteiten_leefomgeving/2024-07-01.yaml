  - number: 4.76.1
    text: |-
      De emissiegrenswaarden voor totaal stof, gasvormige en vluchtige organische stoffen, uitgedrukt in totaal
      organische koolstof, zwaveldioxide, stikstofoxiden, koolmonoxide, zoutzuur en waterstoffluoride bij een
      afvalmeeverbrandingsinstallatie worden berekend volgens de formule: waarbij wordt verstaan onder: V: volume van
      het afgas als gevolg van de verbranding van alleen afvalstoffen, bepaald op basis van de afvalstof of categorie
      van afvalstoffen die is gespecificeerd in de omgevingsvergunning met de laagste gemiddelde netto calorische waarde
      en omgerekend naar de emissieconcentratie bij een genormaliseerd zuurstofgehalte volgens de formule, bedoeld in
      [artikel 4.75][ref1]. Als de warmte die vrijkomt bij de verbranding van gevaarlijke afvalstoffen minder dan 10%
      is van de totale warmte die in de afvalmeeverbrandingsinstallatie vrijkomt, wordt V berekend op basis van een
      hoeveelheid afvalstoffen die bij verbranding, bij de totale hoeveelheid vrijkomende warmte, 10% van de vrijkomende
      warmte zou opleveren. C: emissiegrenswaarde, bedoeld in [tabel 4.73][ref2], voor een stof in milligram per normaal
      kubieke meter. Als in de tabel voor een stof meerdere emissiegrenswaarden zijn opgenomen, heeft C betrekking op de
      daggemiddelde waarde. De C-waarde wordt omgerekend naar het zuurstofgehalte van de afvalmeeverbrandingsinstallatie.
      V: volume van het afgas als gevolg van het proces dat gebeurt in de afvalverbrandingsinstallatie van de verbranding
      van brandstoffen die niet zijn aan te merken als afvalstoffen, bepaald bij een zuurstofgehalte als bedoeld in
      [artikel 4.75][ref3]. Als geen regels gelden voor het volume van het afgas van de afvalmeeverbrandingsinstallatie,
      wordt het werkelijke zuurstofgehalte in het afgas gebruikt, zonder verdunning door toevoeging van lucht die
      voor het verbrandingsproces niet nodig is. C: emissiegrenswaarde die voor deze stof zou gelden op grond van
      [paragraaf 4.3][ref4], [4.126][ref5] of [4.127][ref6] als in deze stookinstallaties andere brandstoffen dan
      afvalstoffen zouden worden gestookt. Als in genoemde paragrafen geen emissiegrenswaarde is gesteld voor zoutzuur of
      waterstoffluoride, wordt hiervoor 30 respectievelijk 10 mg/Nm3 gebruikt. C: totale emissiegrenswaarde, bepaald bij
      een zuurstofgehalte dat is vastgesteld volgens [artikel 4.75][ref7].


