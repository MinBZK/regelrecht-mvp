      die geen bouwwerken zijn en het plaatsen of in stand houden van andere objecten, die kleiner zijn dan 1 m3;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.19
  - number: 6.19.4.c
