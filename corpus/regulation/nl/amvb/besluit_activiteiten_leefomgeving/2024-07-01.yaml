  - number: 3.103.1
    text: |-
      Als milieubelastende activiteiten als bedoeld in [artikel 2.1][ref1] worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.103
    references:
