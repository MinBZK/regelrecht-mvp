        afdeling: '9.1'
  - number: 9.33.1.a
    text: de verwachte datum en het verwachte tijdstip van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.33
  - number: 9.33.1.b
    text: de verwachte duur ervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.33
  - number: 9.33.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [artikel 9.30][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.33
    references:
      - id: ref1
