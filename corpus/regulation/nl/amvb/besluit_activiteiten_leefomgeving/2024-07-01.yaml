  - number: '5.8'
    text: Het is verboden te handelen in strijd met artikel 5 van de PRTR-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.8
  - number: 5.9.1
    text: |-
      Als degene die de activiteit verricht rapportageplichtig is, wordt het PRTR-verslag uiterlijk op 31 maart van het
      kalenderjaar volgend op het kalenderjaar waarover een PRTR-verslag moet worden opgesteld, ingediend bij het bevoegd
      gezag, bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.9
    machine_readable:
      definitions:
        deadline_dag: 31
        deadline_maand: 3
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: rapportagejaar
            type: number
            required: true
            description: Het kalenderjaar waarover het PRTR-verslag moet worden opgesteld
        input:
          - name: is_rapportageplichtig
            type: boolean
            required: true
            description: Of degene die de activiteit verricht rapportageplichtig is
            source: {}
          - name: datum_indiening
            type: date
            required: true
            description: Datum waarop het PRTR-verslag is ingediend bij het bevoegd gezag
            source: {}
        output:
          - name: rapportageplicht_van_toepassing
            type: boolean
            description: Of de rapportageplicht van toepassing is
          - name: tijdig_ingediend
            type: boolean
            description: Of het PRTR-verslag tijdig is ingediend (uiterlijk 31 maart van het volgende kalenderjaar)
        actions:
          - output: rapportageplicht_van_toepassing
            value: $is_rapportageplichtig
          - output: tijdig_ingediend
            value:
              operation: IF
              cases:
                - when:
                    operation: NOT
                    value: $is_rapportageplichtig
                  then: true
              default:
                operation: LESS_THAN_OR_EQUAL
                subject: $datum_indiening
                value: $rapportagejaar
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.9.2
    text: |-
      Bij het overschrijden van de capaciteitsdrempel voor het overbrengen van ongevaarlijk afval of de
      capaciteitsdrempel voor het overbrengen van gevaarlijk afval, bedoeld in artikel 5, eerste lid, onder b, van de
      PRTR-verordening, is de rapportageplicht zowel op het overbrengen van ongevaarlijk afval als op het overbrengen van
      gevaarlijk afval van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.9
  - number: 5.9.3
    text: |-
