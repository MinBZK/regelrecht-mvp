  - number: 6.21.2.a
    text: |-
      als de activiteit als vergunningplichtig is aangewezen in [artikel 6.17][ref1] of [6.18][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.21
    references:
