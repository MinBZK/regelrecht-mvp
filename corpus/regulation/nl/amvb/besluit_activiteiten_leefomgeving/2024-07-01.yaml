        hoofdstuk: '2'
        afdeling: '2.7'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 2.12.2
    text: |-
      Met een maatwerkregel kan worden afgeweken van [afdeling 2.7][ref1] en de [hoofdstukken 3 tot en met 5][ref2],
      tenzij anders is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.12
    references:
