  - number: 4.791f.1
    text: |-
      Voor het vaststellen van de hoeveelheid totaal stikstof in drainwater worden aan de hand van de gewassen die worden
      geteeld, de teeltoppervlakte en de teeltperiode per gewas gemeten:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.1.a
    text: |-
      de hoeveelheid drainwater die wordt geloosd in kubieke meters, waarbij de afwijking van het instrument dat voor de
      meting wordt gebruikt ten hoogste 10% is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.1.b
    text: het gehalte aan nitraatstikstof en ammoniumstikstof in het geloosde drainwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.2
    text: 'De hoeveelheid en het gehalte worden gemeten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.2.a
    text: |-
      per periode van vier weken, beginnend op de eerste dag van de eerste week voor de parameter, bedoeld in het eerste
      lid, onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.2.b
    text: |-
      ten minste eenmaal per acht weken en ten minste eenmaal in de weken 49 tot 52 voor de parameters, bedoeld in het
      eerste lid, onder b.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791f.3
    text: De resultaten van de metingen worden ten minste vijf jaar bewaard.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791f
  - number: 4.791fa
    text: |-
      Jaarlijks wordt uiterlijk op 30 april aan het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], een rapportage
      verstrekt met de volgende gegevens over het aan die datum voorafgaande kalenderjaar:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791fa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.791fa.a
    text: |-
      de parameters, bedoeld in [artikel 4.791f, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791fa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
  - number: 4.791fa.b
    text: |-
      de hoeveelheid totaal stikstof, bedoeld in [artikel 4.791e][ref1], over het aan die datum voorafgaande
      kalenderjaar, vastgesteld aan de hand van de gegevens, bedoeld in [artikel 4.791f, eerste lid, onder a en b][ref2];
      en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791fa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
  - number: 4.791fa.c
    text: |-
      de hoeveelheid totaal stikstof over het aan die datum voorafgaande kalenderjaar, berekend aan de hand van de
      gegevens, bedoeld in [artikel 4.791f, eerste lid, onder a en b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791fa
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
  - number: 4.791g
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791g
  - number: 4.791g.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791g
  - number: 4.791g.b
    text: of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of schoonwaterriool; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791g
  - number: 4.791g.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791g
  - number: 4.791ga.1
    text: |-
      [Artikel 4.791b][ref1] is niet van toepassing op het lozen van drainwater of spoelwater op een
      oppervlaktewaterlichaam dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die
      activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding
      van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791ga
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.76'
  - number: 4.791ga.2
    text: 'Het eerste lid is van toepassing tot het tijdstip dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791ga
  - number: 4.791ga.2.a
    text: |-
      na de inwerkingtreding van dit besluit volledig op het vuilwaterriool kan worden geloosd waarop tot de
      inwerkingtreding van dit besluit gedeeltelijk werd geloosd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791ga
  - number: 4.791ga.2.b
    text: na de inwerkingtreding van dit besluit op een afstand van 40 m of minder op een vuilwaterriool kan worden geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791ga
  - number: 4.791ga.3
    text: Het eerste en tweede lid zijn vanaf 1 januari 2027 niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791ga
  - number: 4.791h
    text: 'Deze paragraaf is van toepassing op het lozen van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791h
  - number: 4.791h.a
    text: |-
      drainagewater afkomstig van het telen van gewassen in een kas op materiaal dat in verbinding staat met de
      ondergrond; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791h
  - number: 4.791h.b
    text: |-
      spoelwater met gewasbeschermingsmiddelen van filters van een waterdoseringsinstallatie bij het telen van gewassen
      in een kas op materiaal dat in verbinding staat met de ondergrond.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791h
  - number: 4.791i.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.791h][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791i
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.77'
  - number: 4.791i.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791i
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.791j.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen drainagewater of spoelwater geloosd in een
      vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791j
  - number: 4.791j.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791j
  - number: 4.791k.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt drainagewater of spoelwater, dat gewasbeschermingsmiddelen
      bevat, voor het lozen door een zuiveringsvoorziening geleid die ten minste 95% van de werkzame stoffen die bestaan
      uit organische verbindingen afkomstig van de gewasbeschermingsmiddelen uit het water verwijdert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791k
  - number: 4.791k.2
    text: |-
      Het eerste lid is niet van toepassing als het drainagewater of het spoelwater na het lozen wordt geleid door een
      zuiveringsvoorziening of een zuiveringtechnisch werk waarmee ten minste 95% van de werkzame stoffen die bestaan uit
      organische verbindingen afkomstig van de gewasbeschermingsmiddelen uit het water wordt verwijderd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791k
  - number: 4.791k.3
    text: |-
      Het zuiveringsrendement van de zuiveringsvoorziening wordt bepaald volgens het Meetprotocol voor het testen van het
      zuiveringsrendement van zuiveringsinstallaties glastuinbouw.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791k
  - number: 4.791l.1
    text: 'Met het oog op het doelmatig beheer van afvalwater bij het lozen van drainagewater:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.1.a
    text: wordt een hemelwateropvangvoorziening van ten minste 500 m3/ha teeltoppervlakte gebruikt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.1.b
    text: wordt water gebruikt met een natriumgehalte dat niet hoger is dan dat van hemelwater.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.2
    text: Drainagewater wordt gerecirculeerd met een recirculatiesysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.3
    text: |-
      De hoeveelheid toegediende totaal stikstof is afgestemd op de behoefte van het gewas en is niet meer dan de
      gebruiksnorm voor totaal stikstof in kilogram per hectare teeltoppervlakte per kalenderjaar, genoemd in tabel
      4.791la, per categorie gewas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.4
    text: |-
      De hoeveelheid toegediende totaal fosfor is afgestemd op de behoefte van het gewas en is niet meer dan de
      gebruiksnorm voor totaal fosfor in kilogram per hectare teeltoppervlakte per kalenderjaar, bedoeld in tabel
      4.791lb, per categorie gewas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.5
    text: |-
      Bij het doorspoelen van de bodem bij een volgteelt van bladgroentegewassen wordt niet meer water gebruikt dan 3.000
      m3/ha gestoomde bodem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.791l
  - number: 4.791l.6
    text: |-
      Het eerste en tweede lid zijn niet van toepassing als in een kas de totale teeltoppervlakte voor het telen van
      gewassen op materiaal dat in verbinding staat met de ondergrond kleiner is dan 2.500 m2.
