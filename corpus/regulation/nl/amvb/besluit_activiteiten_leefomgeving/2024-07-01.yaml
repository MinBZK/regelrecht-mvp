      het eerste lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.963
  - number: 4.963.2.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.963
  - number: 4.963.2.a.1°
    text: de geringe omvang van de locatie;
