  - number: 4.472b.1
    text: |-
      Als een gelijkwaardige maatregel betrekking heeft op maatregelen als bedoeld in [artikel 4.473][ref1], is:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
