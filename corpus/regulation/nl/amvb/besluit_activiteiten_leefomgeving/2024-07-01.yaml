        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.31.1
    text: |-
      Een maatwerkvoorschrift kan worden gesteld, of een vergunningvoorschrift als bedoeld in
      [artikel 4.5 van de wet][ref1] kan aan een omgevingsvergunning als bedoeld in deze afdeling worden
      verbonden, over de [artikelen 11.27][ref2], [11.34][ref3] en [11.35][ref4] en de [paragrafen 11.2.6][ref5] en
      [11.2.8 tot en met 11.2.10][ref6].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
