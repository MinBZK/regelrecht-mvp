  - number: 4.198.3
    text: |-
      Aan het eerste lid wordt voor totaal stof en zinkchloride in ieder geval voldaan als de emissies door een geschikte
      filtrerende afscheider worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.198
  - number: 4.198.4
    text: |-
      Aan het eerste lid wordt voor chloorverbindingen, berekend als waterstofchloride, anders dan zinkchloride, in ieder
      geval voldaan als de emissies door een geschikte gaswasser worden gevoerd.
