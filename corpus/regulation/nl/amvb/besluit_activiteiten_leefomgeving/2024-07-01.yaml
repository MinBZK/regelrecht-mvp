    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472b
  - number: 4.472c.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het vulpunt, de bovengrondse vloeistofvoerende
      leiding en de aansluitpunten van die leiding en pomp, de bovengrondse opslagtank en de tankzuil tot de begrenzing
      van de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1], wordt verricht ten minste de afstand, bedoeld
      in tabel 4.472c.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.472c.2
    text: |-
      De afstand geldt tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en
      kwetsbare locaties die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit zijn toegelaten, als inachtneming van de afstand, bedoeld in het eerste lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.472c
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: doorzet_m3_per_jaar
            type: number
            required: true
            description: Jaarlijkse doorzet LPG in kubieke meters
            source: {}
          - name: afstand_vulpunt_m
            type: number
            required: true
            description: Afstand vanaf het vulpunt tot de begrenzing van de locatie in meters
            source: {}
          - name: afstand_leiding_m
            type: number
            required: true
            description: Afstand vanaf de bovengrondse vloeistofvoerende leiding tot de begrenzing in meters
            source: {}
          - name: afstand_opslagtank_m
            type: number
            required: true
            description: Afstand vanaf de bovengrondse opslagtank tot de begrenzing in meters
            source: {}
          - name: afstand_tankzuil_m
            type: number
            required: true
            description: Afstand vanaf de tankzuil tot de begrenzing in meters
            source: {}
        output:
          - name: min_afstand_vulpunt_m
            type: number
            description: Minimaal vereiste afstand vanaf het vulpunt in meters
          - name: min_afstand_leiding_m
            type: number
            description: Minimaal vereiste afstand vanaf de leiding in meters
          - name: min_afstand_opslagtank_m
            type: number
            description: Minimaal vereiste afstand vanaf de opslagtank in meters
          - name: min_afstand_tankzuil_m
            type: number
            description: Minimaal vereiste afstand vanaf de tankzuil in meters
          - name: voldoet_afstanden_lpg
            type: boolean
            description: Of aan alle minimale afstanden wordt voldaan
        actions:
          - output: min_afstand_vulpunt_m
            value:
              operation: IF
              cases:
                - when:
                    operation: LESS_THAN
                    subject: $doorzet_m3_per_jaar
                    value: 500
                  then: 25
                - when:
                    operation: LESS_THAN
                    subject: $doorzet_m3_per_jaar
                    value: 1000
                  then: 35
              default: 40
          - output: min_afstand_leiding_m
            value: 25
          - output: min_afstand_opslagtank_m
            value: 120
          - output: min_afstand_tankzuil_m
            value: 15
          - output: voldoet_afstanden_lpg
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $afstand_vulpunt_m
                  value: $min_afstand_vulpunt_m
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $afstand_leiding_m
                  value: $min_afstand_leiding_m
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $afstand_opslagtank_m
                  value: $min_afstand_opslagtank_m
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $afstand_tankzuil_m
                  value: $min_afstand_tankzuil_m
