        hoofdstuk: '15'
        paragraaf: 15.2.2
        afdeling: '15.2'
  - number: 15.34.1
    text: |-
      Met het oog op het waarborgen van de waterkwaliteit in een gevuld badwaterbassin worden maatregelen getroffen om te
      voldoen aan de kwaliteitseisen, bedoeld in tabel 15.34.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.34
  - number: 15.34.2
    text: |-
      Voor de waterbehandeling wordt gebruik gemaakt van een helofytenfilter, zijnde een veld van planten waarmee water
      wordt gefilterd.
            Tabel 15.34 Kwaliteitseisen


                    *Parameter of parametergroep*


                    *Kwaliteitseis*


                    Doorzicht


                    ≥ 1,8 m


                    Zuurgraad


                    6,0 ≤ pH ≤ 8,5


                    Zuurstofverzadiging


                    80% ≤ zuurstofverzadiging ≤ 120%


                    Ammonium


                    ≤ 0,3 mg/l in badwaterbassin
                    ≤ 0,1 mg/l in water dat na een biologische behandeling direct wordt gebruikt om een badwaterbassin
      mee te vullen


                    Fytoplankton


                    ≤ 1 mm3/l
                    ≤ 100 μg/l


                    Geleidbaarheid


                    200 ≤ μS/cm ≤ 1000 bij 25°C


                    Hardheid totaal


                    ≥ 1,0 mmol/l


                    Nitraat


                    ≤ 30 mg/l


                    Totaal fosfor


                    ≤ 0,02 mg/l


                    Waterstofcarbonaat


                    ≥ 2 mmol/l


                    Escherichia coli


                    ≤ 100 kolonievormende eenheden/100 ml


                    Intestinale enterococcen


                    ≤ 50 kolonievormende eenheden/100 ml


                    Legionella


                    < 100 kolonievormende eenheden/l


                    Pseudomonas aeruginosa


                    ≤ 10 kolonievormende eenheden/100 ml
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.34
  - number: '15.35'
    text: |-
