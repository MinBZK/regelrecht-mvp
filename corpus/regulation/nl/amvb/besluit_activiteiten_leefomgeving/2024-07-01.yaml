        afdeling: '3.1'
  - number: 6.56.1
    text: |-
      Ten minste 48 uur voor het lozen van afvalwater afkomstig van een calamiteitenoefening worden aan het bevoegd
      gezag, bedoeld in [artikel 6.3][ref1], de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        afdeling: '6.1'
  - number: 6.56.1.a
    text: gegevens waaruit blijkt of er bij de oefening blusschuim wordt gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56
  - number: 6.56.1.b
    text: 'als er bij de oefening blusschuim wordt gebruikt: welke stoffen dat blusschuim bevat.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56
  - number: 6.56.2
    text: |-
      Dit artikel is niet van toepassing op het lozen van afvalwater afkomstig van een permanente voorziening voor het
      oefenen van brandbestrijdingstechnieken, bedoeld in [artikel 3.259][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.7.10
        afdeling: '3.7'
  - number: 6.56a.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 6.56b][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
        hoofdstuk: '6'
        paragraaf: 6.2.7
        afdeling: '6.2'
  - number: 6.56a.2
    text: 'De melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56a
  - number: 6.56a.2.a
    text: een aanduiding van het soort goederen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56a
  - number: 6.56a.2.b
    text: de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56a
  - number: 6.56a.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56a
  - number: 6.56b
    text: |-
      In afwijking van [artikel 4.1058, eerste lid][ref1], kan het te lozen afvalwater afkomstig van het opslaan van
      uitlogende goederen, ingedeeld in [bijlage IVA][ref2], deel B, ook worden geloosd in een oppervlaktewaterlichaam,
      als de afstand tot een vuilwaterriool of zuiveringtechnisch werk meer dan 40 m is, gerekend vanaf de kadastrale
      grens van het perceel waar het afvalwater vrijkomt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel6.56b
    references:
      - id: ref1
