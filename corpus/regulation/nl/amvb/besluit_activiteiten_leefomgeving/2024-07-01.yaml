  - number: '4.248'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.246][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.248
