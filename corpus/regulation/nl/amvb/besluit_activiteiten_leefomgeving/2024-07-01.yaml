        paragraaf: '4.4'
  - number: 4.75.2
    text: |-
      Voor het berekenen van de emissies van de stoffen, bedoeld in tabel 4.75, wordt de massaconcentratie omgerekend tot
      een zuurstofgehalte van 6% in afgas, met uitzondering van de emissies in de lucht veroorzaakt door het stoken van
      vloeibare of gasvormige brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.75
  - number: 4.75.3
    text: |-
      Voor het berekenen van de emissies in de lucht veroorzaakt door het stoken van vloeibare of gasvormige brandstoffen
      wordt de massaconcentratie omgerekend tot een zuurstofgehalte van 3% in afgas.
