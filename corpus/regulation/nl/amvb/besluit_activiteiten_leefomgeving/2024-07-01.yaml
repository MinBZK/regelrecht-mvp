        paragraaf: '4.7'
  - number: 4.1292.2.b
    text: technische voorzieningen die bij de voortstuwing van een voertuig, schip of vliegtuig worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.2.c
    text: in de chemische industrie gebruikte reactoren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.2.d
    text: windverhitters van hoogovens; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.2.e
    text: terugwinningsinstallaties in installaties voor de productie van pulp.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.3
    text: |-
      Voor de toepassing van deze paragraaf worden twee of meer stookinstallaties met een nominaal thermisch
      ingangsvermogen van ten minste 1 MW als één stookinstallatie aangemerkt en worden de nominale thermische
      ingangsvermogens opgeteld als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.3.a
    text: de afgassen van die stookinstallaties via één schoorsteen worden afgevoerd; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.3.b
    text: |-
      het bevoegd gezag bij maatwerkvoorschrift heeft vastgesteld dat de afgassen van die stookinstallatie op technisch
      en economisch aanvaardbare wijze via een gemeenschappelijke schoorsteen kunnen worden afgevoerd en het bevoegd
      gezag in dat maatwerkvoorschrift heeft vastgesteld welke stookinstallaties deel uitmaken van het samenstel van
      stookinstallaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1292.4
    text: |-
      In deze paragraaf wordt onder ketel verstaan: stookinstallatie waarbij de opgewekte warmte wordt overgedragen aan
      water, stoom of een combinatie daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1292
  - number: 4.1293.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.1292][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1293.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1293.2.a
    text: gegevens over het nominaal thermisch ingangsvermogen in megawatt van de stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1293.2.b
    text: |-
      gegevens over het type stookinstallatie, onderverdeeld naar gasmotor, dieselmotor, dual-fuelmotor, gasturbine,
      ketel, fornuis, droger, luchtverhitter of andere stookinstallatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1293.2.c
    text: |-
      gegevens over het type gebruikte brandstoffen, onderverdeeld naar vaste rie-biomassa, andere vaste brandstof,
      gasolie, andere vloeibare brandstoffen dan gasolie, aardgas, vergistingsgas en andere gasvormige brandstoffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1293.2.d
    text: |-
      een verklaring dat de stookinstallatie ten hoogste 500 uur per jaar in bedrijf zal zijn, als het gaat om een
      stookinstallatie als bedoeld in [artikel 4.1299, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1293.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1293.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.1293.5
    text: |-
      Het tweede lid, onder d, en derde lid zijn niet van toepassing op een stookinstallatie met een nominaal thermisch
      ingangsvermogen van minder dan 1 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1293
  - number: 4.1294.1
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt ten minste vier weken voor het begin van de activiteit
      geïnformeerd over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1294
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.1294.1.a
    text: de 4-cijferige NACE-code van de bedrijfstak waarvan de stookinstallatie deel uitmaakt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1294
  - number: 4.1294.1.b
    text: |-
      het verwachte aantal jaarlijkse bedrijfsuren van de stookinstallatie en de gemiddelde belasting tijdens het
      gebruik; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1294
  - number: 4.1294.1.c
    text: |-
      het aandeel van de gebruikte brandstoffen, onderverdeeld naar vaste rie-biomassa, andere vaste brandstof, gasolie,
      andere vloeibare brandstoffen dan gasolie, aardgas, vergistingsgas en andere gasvormige brandstoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1294
  - number: 4.1294.2
    text: |-
      Het eerste lid is niet van toepassing op een stookinstallatie met een nominaal thermisch ingangsvermogen van minder
      dan 1 MW.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1294
  - number: '4.1295'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.1292][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1295
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.126'
  - number: 4.1295.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1], voor zover wordt gestookt met vloeibare brandstof; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1295
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.1295.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1], voor zover wordt gestookt met vloeibare
      brandstof.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1295
    references:
