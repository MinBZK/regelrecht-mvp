  - number: 4.1012.2.b
    text: minder dan 400 kg in totaal van gewasbeschermingsmiddelen en biociden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1012
  - number: 4.1012.2.c
    text: gasflessen met blusgassen voor direct gebruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1012
  - number: 4.1012.2.d
    text: gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of hoger; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1012
  - number: 4.1012.2.e
    text: |-
      viskeuze vloeistoffen die volgens paragraaf 2.2.3.1.5.1 van de ADR niet zijn onderworpen aan de voorschriften van
      de ADR.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1012
  - number: 4.1013.1
    text: |-
      [Artikel 4.1012, eerste lid][ref1], is niet van toepassing op een ruimte voor verkoop aan particulieren:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1013
    references:
