        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.0
        afdeling: '3.2'
  - number: 5.15b.4
    text: Op het onderzoek zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15b
  - number: 5.15c.1
    text: |-
      De gegevens en bescheiden, bedoeld in de [artikelen 5.15a][ref1] en [5.15b][ref2], worden verstrekt met
      gebruikmaking van een elektronische voorziening en een elektronisch formulier die door Onze Minister voor Klimaat
      en Energie beschikbaar worden gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
  - number: 5.15c.2
    text: Gegevens en bescheiden die zijn verstrekt via het elektronisch formulier gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15c
  - number: 5.15d
    text: |-
      Als voor de inwerkingtreding van dit besluit gegevens en bescheiden zijn verstrekt of hadden moeten worden verstrekt
      als bedoeld in [artikel 2.15, tweede, negende of tiende lid, van het Activiteitenbesluit milieubeheer][ref1],
      blijft artikel 2.15 van dat besluit, zoals dat luidde voor de inwerkingtreding van dit besluit voor zover gericht
      op de verplichtingen als bedoeld in artikel 2.15, tweede, negende of tiende lid, en de regels die bij of krachtens
      dat artikel in samenhang met [artikel 1.7, eerste lid, van het Activiteitenbesluit milieubeheer][ref2], zijn
      gesteld, tot 1 december 2027 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0022762#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0022762#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.15d
    references:
      - id: ref1
        bwb_id: BWBR0022762
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0022762
        artikel: '1'
  - number: 5.16.1
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift wordt [artikel 5.15][ref1] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
  - number: 5.16.2
    text: |-
      Een maatwerkvoorschrift over [artikel 5.15][ref1] kan het toestaan van een gefaseerde uitvoering van de
      maatregelen, bedoeld in artikel 5.15, eerste lid, inhouden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1
        afdeling: '5.4'
  - number: 5.16a.1
    text: |-
      Deze paragraaf is van toepassing op het exploiteren van een rekencentrum of datacentrum, bedoeld in
      [artikel 3.235, eerste lid][ref1], voor zover het gaat om een rekencentrum of datacentrum met een geïnstalleerd IT-
      vermogen, zijnde het vermogen van de geïnstalleerde informatietechnologie in de ruimten en van de apparatuur die
      hoofdzakelijk of alleen dienen voor gegevensgerelateerde functies, met inbegrip van de noodzakelijke bijbehorende
      apparatuur, van ten minste 500 kW.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.7.3
        afdeling: '3.7'
  - number: 5.16a.2
    text: |-
      Deze paragraaf is niet van toepassing als de activiteit, bedoeld in het eerste lid, geheel wordt verricht voor het
      uitoefenen van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16a
  - number: 5.16a.2.a
    text: defensietaken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16a
  - number: 5.16a.2.b
    text: |-
      taken voor rampenbestrijding als bedoeld in [artikel 1 van de Wet veiligheidsregio’s][ref1] of crisisbeheersing
      als bedoeld in dat artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16a
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '1'
  - number: 5.16b.1
    text: |-
      Uiterlijk op 15 juli 2024 en daarna jaarlijks uiterlijk op 15 mei worden door degene die de activiteit verricht
      gegevens over de energie-efficiëntie van de activiteit openbaar gemaakt via een elektronische voorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2
    text: |-
      Degene die de activiteit verricht, voldoet aan de verplichting van het eerste lid door de volgende gegevens over de
      activiteit over het voorafgaande kalenderjaar te verzamelen en openbaar te maken:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.a
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.b
    text: |-
      de naam van het rekencentrum of datacentrum en het adres, of de kadastrale aanduiding of coördinaten van de locatie
      waarop de activiteit wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.c
    text: de datum waarop de activiteit is gestart;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.d
    text: het geïnstalleerde vermogen in kilowatt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.e
    text: de vloeroppervlakte van het rekencentrum of datacentrum in vierkante meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f
    text: 'gegevens over het rekencentrum of datacentrum en de energieprestaties, waaronder in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f.1°
    text: het energiegebruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f.2°
    text: het waterverbruik in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f.3°
    text: het restwarmtegebruik;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f.4°
    text: de temperatuurinstelpunten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.f.5°
    text: het gebruik van hernieuwbare energie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.g
    text: de hoeveelheid in het rekencentrum of datacentrum opgeslagen en verwerkte data;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.h
    text: het jaarlijks inkomende en uitgaande dataverkeer; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.2.i
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16b.3
    text: |-
      Voor zover er sprake is van gegevens waarvan de geheimhouding op grond van
      [artikel 5.1, eerste lid, onderdeel c, van de Wet open overheid][ref1] gerechtvaardigd is, zijn deze gegevens
      uitgezonderd van de verplichting, bedoeld in het eerste en tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 5.16b.4
    text: |-
      Op het verzamelen en openbaar maken van de gegevens zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16b
  - number: 5.16c.1
    text: |-
      De gegevens, bedoeld in [artikel 5.16b][ref1], worden openbaar gemaakt met gebruikmaking van een elektronische
      voorziening en een elektronisch formulier die door Onze Minister voor Klimaat en Energie beschikbaar worden
      gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16c
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.1a
        afdeling: '5.4'
  - number: 5.16c.2
    text: Gegevens die openbaar zijn gemaakt via de elektronische voorziening gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.16c
  - number: 5.17a
    text: |-
      Deze paragraaf is alleen van toepassing voor zover in [hoofdstuk 4][ref1] met het oog op het voorkomen van
      verontreiniging van de bodem is bepaald dat een bodembeschermende voorziening wordt toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.17a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 5.18.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem heeft een lekbak waarboven of waarop vloeibare
      bodembedreigende stoffen in verpakking of in een opslagtank worden opgeslagen, een opvangcapaciteit van ten minste
      110% van de inhoud van de grootste verpakkingseenheid of opslagtank, waarbij de opvangcapaciteit ten minste 10% is
      van de inhoud van alle opgeslagen stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.18
  - number: 5.18.2
    text: Er wordt voorkomen dat water in een lekbak blijft staan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.18
  - number: 5.18a
    text: |-
      Met het oog op de doelmatige werking van de voorzieningen voor het beheer van afvalwater is een lekbak niet
      aangesloten op het vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.18a
  - number: 5.19.1
    text: |-
      Een vloeistofdichte bodemvoorziening en het vloeistofdichte deel van het vuilwaterriool worden zo spoedig mogelijk
      na aanleg en vervolgens ten minste eenmaal per zes jaar beoordeeld en goedgekeurd door een inspectie-instantie met
      een erkenning bodemkwaliteit voor AS SIKB 6700.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.19
  - number: 5.19.2
    text: |-
      Als een vloeistofdichte bodemvoorziening en het vloeistofdichte deel van het vuilwaterriool zijn aangelegd door
      een onderneming met een erkenning bodemkwaliteit voor BRL SIKB 7700, worden deze uiterlijk zes jaar na aanleg en
      vervolgens ten minste eenmaal per zes jaar beoordeeld en goedgekeurd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.19
  - number: 5.19.3
    text: |-
      Als het beoordelen van het vuilwaterriool volgens AS SIKB 6700 redelijkerwijs niet mogelijk is, kan, in afwijking
      van het eerste en tweede lid, het ondergrondse vloeistofdichte deel van het vuilwaterriool dat is aangelegd
      voor inwerkingtreding van dit besluit worden beoordeeld volgens het CUR rapport 2001-3 Beheer bedrijfsriolering
      bodembescherming.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.19
  - number: 5.19.4
    text: |-
      Een vloeistofdichte bodemvoorziening en het vloeistofdichte deel van het vuilwaterriool worden jaarlijks
      gecontroleerd volgens bijlage 6 bij AS SIKB 6700.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.19
  - number: 5.19.5
    text: |-
      Als een vloeistofdichte bodemvoorziening of het vloeistofdichte deel van het vuilwaterriool is gerepareerd, wordt
      na reparatie het gerepareerde deel opnieuw beoordeeld en goedgekeurd door een instantie als bedoeld in het eerste
      lid, tenzij de reparatie wordt verricht door een onderneming met een certificaat voor BRL SIKB 7700 verstrekt door
      een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor die BRL.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.19
  - number: '5.20'
    text: |-
      Er wordt een logboek bijgehouden waarin voor bodembeschermende voorzieningen gegevens worden vastgelegd over
      controles, beoordelingen, onderhoud en reparaties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.20
  - number: '5.22'
    text: |-
      Tot drie jaar na de inwerkingtreding van dit besluit is [artikel 5.19, eerste en tweede lid][ref1], niet van
      toepassing op het vloeistofdichte deel van het vuilwaterriool dat is aangelegd voor de inwerkingtreding van dit
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 5.22a.1
    text: |-
      Een zeer zorgwekkende stof is een stof die voldoet aan een of meer van de criteria of voorwaarden, bedoeld in
      artikel 57 van de reach-verordening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2
    text: 'Een stof is in ieder geval een zeer zorgwekkende stof als die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a
    text: 'voorkomt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.1°
    text: |-
      in bijlage VI bij de CLP-verordening en in die bijlage is ingedeeld als carcinogeen, mutageen of reprotoxisch,
      categorie 1a of 1b;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.2°
    text: op de kandidatenlijst, bedoeld in artikel 59 van de reach-verordening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.3°
    text: |-
      in bijlage XVII bij de reach-verordening ten aanzien van chemische stoffen waarvoor een restrictie geldt vanwege
      het voldoen aan de criteria van artikel 57 van die verordening;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.4°
    text: in bijlage I, II of III bij de verordening persistente organische verontreinigende stoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.5°
    text: op de lijst van stoffen voor prioritaire actie die is vastgesteld op grond van artikel 6 van het Ospar-verdrag; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.a.6°
    text: |-
      in bijlage X bij de kaderrichtlijn water, voor zover een stof in die bijlage is aangewezen als prioritaire
      gevaarlijke stof; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.b
    text: |-
      voldoet aan de vastgestelde wetenschappelijke criteria voor het bepalen van hormoonontregelende eigenschappen,
      bedoeld in:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.b.1°
    text: |-
      artikel 5, derde lid, van de [Verordening (EU) nr. 528/2012](32012R0528) van het Europees Parlement en de Raad
      van 22 mei 2012 betreffende het op de markt aanbieden en het gebruik van biociden (PbEU 2012, L167) vastgesteld
      in Gedelegeerde [Verordening 2017/2100](32100R2017) van de commissie van 4 september 2017 tot vaststelling van
      wetenschappelijke criteria voor het identificeren van hormoonontregelende eigenschappen overeenkomstig [Verordening
      (EU) nr. 528/2012](32012R0528) van het Europees Parlement en de Raad (PbEU 2017, L 301); of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: 5.22a.2.b.2°
    text: |-
      bijlage II, paragraaf 3.6.5, bij de [Verordening (EG) 1107/2009](32009R1107) van het Europees Parlement en de Raad
      van 21 oktober 2009 betreffende het op de markt brengen van gewasbeschermingsmiddelen en tot intrekking van de
      [Richtlijnen 79/117/EEG](31979L0117) en [91/414/EEG](31991L0414) van de Raad (PbEU 2009, L 309).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.22a
  - number: '5.23'
    text: |-
      Het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], wordt elke vijf jaar geïnformeerd over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.23
    machine_readable:
      definitions:
        rapportage_interval_jaren: 5
      execution:
        produces:
          legal_character: INFORMATIEF
        parameters:
          - name: datum_laatste_rapportage
            type: date
            required: true
            description: Datum van de laatste rapportage over zeer zorgwekkende stoffen
        input:
          - name: huidige_datum
            type: date
            required: true
            description: De huidige datum
            source: {}
        output:
          - name: volgende_rapportagedatum
            type: date
            description: Uiterste datum voor de volgende rapportage (vijf jaar na de laatste)
          - name: rapportage_vereist
            type: boolean
            description: Of een nieuwe rapportage vereist is
        actions:
          - output: volgende_rapportagedatum
            value:
              operation: ADD
              values:
                - $datum_laatste_rapportage
                - $rapportage_interval_jaren
          - output: rapportage_vereist
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $huidige_datum
              value: $volgende_rapportagedatum
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 5.23.a
    text: de mate waarin zeer zorgwekkende stoffen in de lucht of het water worden geëmitteerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.23
  - number: 5.23.b
    text: de mogelijkheden om de emissies van zeer zorgwekkende stoffen in de lucht of het water te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.23
  - number: 5.24.1
    text: Er worden vermijdings- en reductieprogramma’s opgesteld voor zeer zorgwekkende stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.2
    text: 'Deze programma’s bevatten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.2.a
    text: een overzicht van mogelijkheden om het gebruik van zeer zorgwekkende stoffen te vermijden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.2.b
    text: |-
      als gebruik niet te vermijden is: een overzicht van mogelijkheden en technieken om emissies in de lucht of het
      water te voorkomen en te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.2.c
    text: informatie over de bedrijfszekerheid en de kosten van de technieken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.2.d
    text: informatie over afwenteleffecten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.3
    text: |-
      Bij het overzicht van de technieken wordt informatie opgenomen over het rendement en de validatie van de
      technieken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.24.4
    text: |-
      Op het bepalen van de kosten en het rendement van de technieken, bedoeld in het derde lid, zijn de bij ministeriële
      regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.24
  - number: 5.25.1
    text: |-
      Met het oog op het beschermen van de gezondheid en het milieu overschrijdt de concentratie van zeer zorgwekkende
      stoffen op leefniveau als gevolg van emissies door de activiteit, waarbij rekening wordt gehouden met de
      achtergrondwaarden, niet de grenswaarden, bedoeld in [bijlage VIa][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.25.2
    text: Het eerste lid is niet van toepassing binnen de begrenzing van de locatie waarop de activiteit wordt verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.25
  - number: 5.25.3
    text: |-
      Het eerste lid is niet van toepassing op het exploiteren van een mijnbouwwerk, bedoeld in [artikel 3.320][ref1],
      voor zover het gaat om een mijnbouwinstallatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.10.1
        afdeling: '3.10'
  - number: '5.26'
    text: Op een berekening is standaardrekenmethode 3 Nieuw Nationaal Model van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.26
  - number: '5.27'
    text: 'Deze paragraaf is niet van toepassing op emissies in de lucht:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.27
  - number: 5.27.a
    text: |-
      vanuit een ippc-installatie voor zover daarvoor een document met de conclusies over beste beschikbare technieken
      is vastgesteld in overeenstemming met artikel 13, vijfde en zevende lid, van de richtlijn industriële emissies, dat
      een conclusie bevat over die emissies;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.27
  - number: 5.27.b
    text: |-
      voor zover daarvoor op grond van [hoofdstuk 4][ref1] emissiegrenswaarden gelden; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
  - number: 5.27.c
    text: |-
      door het exploiteren van een mijnbouwwerk, bedoeld in [artikel 3.320][ref1], voor zover het gaat om een
      mijnbouwinstallatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.10.1
        afdeling: '3.10'
  - number: '5.28'
    text: |-
      [Bijlage III][ref1] bevat de onderverdeling van stoffen in de stofklassen ERS, MVP1, MVP2, gA, gO, totaal stof, sO
      en sA.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.28
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.29.1
    text: |-
      In deze paragraaf wordt onder emissierelevante parameter verstaan: een meetbare of berekenbare grootheid die in
      relatie staat met de emissies die worden beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.29
  - number: 5.29.2
    text: |-
      Onder een emissierelevante parameter categorie A wordt verstaan: een parameter die, zo nodig na kalibratie, een
      kwantitatief beeld geeft van de emissie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.29
  - number: 5.29.3
    text: |-
      Onder een emissierelevante parameter categorie B wordt verstaan: een parameter die een kwalitatief beeld geeft van
      de emissie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.29
  - number: 5.30.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden vanuit alle puntbronnen per stof of stofklasse de waarden,
      bedoeld in tabel 5.30, gemeten in een eenmalige, periodieke of continue meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.30
    machine_readable:
      definitions:
        egw_zwaveldioxide_mg_nm3: 50
        egw_stikstofoxide_mg_nm3: 100
        egw_waterstofchloride_mg_nm3: 2
        egw_waterstoffluoride_mg_nm3: 1
        egw_ammoniak_mg_nm3: 5
        egw_ers_ng_teq_nm3: 0.05
        egw_mvp1_mg_nm3: 0.05
        egw_mvp2_mg_nm3: 1
        egw_totaal_stof_mg_nm3: 5
        egw_so_mg_nm3: 50
        egw_go_mg_nm3: 50
      execution:
        produces:
          legal_character: TOETS
        input:
          - name: stofklasse
            type: string
            required: true
            description: De stof of stofklasse waarvoor de emissie wordt getoetst (bijv. zwaveldioxide, stikstofoxide)
            source: {}
          - name: gemeten_concentratie
            type: number
            required: true
            description: De gemeten concentratie van de stof in de emissie (in mg/Nm3 of ng TEQ/Nm3)
            source: {}
        output:
          - name: emissiegrenswaarde
            type: number
            description: De toepasselijke emissiegrenswaarde voor de opgegeven stof of stofklasse
          - name: voldoet_aan_emissiegrenswaarde
            type: boolean
            description: Of de gemeten concentratie de emissiegrenswaarde niet overschrijdt
        actions:
          - output: emissiegrenswaarde
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: zwaveldioxide
                  then: $egw_zwaveldioxide_mg_nm3
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: stikstofoxide
                  then: $egw_stikstofoxide_mg_nm3
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: waterstofchloride
                  then: $egw_waterstofchloride_mg_nm3
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: waterstoffluoride
                  then: $egw_waterstoffluoride_mg_nm3
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: ammoniak
                  then: $egw_ammoniak_mg_nm3
                - when:
                    operation: EQUALS
                    subject: $stofklasse
                    value: totaal_stof
                  then: $egw_totaal_stof_mg_nm3
              default: 0
          - output: voldoet_aan_emissiegrenswaarde
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $gemeten_concentratie
              value: $emissiegrenswaarde
  - number: 5.30.2
    text: |-
      Het eerste lid is niet van toepassing als de emissie de ondergrens, bedoeld in tabel 5.30, niet overschrijdt.
