    text: dat beslist op een aanvraag om toestemming om een gelijkwaardige maatregel te treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.9
  - number: '2.10'
    text: |-
      Aan de [afdelingen 2.6][ref1] en [2.7][ref2] en de [hoofdstukken 3 tot en met 5][ref3] wordt voldaan door degene
      die de activiteit verricht. Diegene draagt zorg voor de naleving van de regels over de activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.6'
      - id: ref2
