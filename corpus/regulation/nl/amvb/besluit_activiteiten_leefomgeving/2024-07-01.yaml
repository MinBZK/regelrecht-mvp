                    0,8


                    Chroom


                    100


                    Kobalt


                    9


                    Koper


                    36


                    Kwik


                    0,3


                    Lood


                    85


                    Molybdeen


                    3


                    Nikkel


                    35


                    Zink


                    140


                    Polycyclische aromatische koolwaterstoffen


                    10
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.709
  - number: '4.710'
    text: |-
      Deze paragraaf is van toepassing op het aanmaken en via vaste leidingen transporteren van
      gewasbeschermingsmiddelen, biociden of bladmeststoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.710
  - number: 4.711.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.710][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.711
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.62'
  - number: 4.711.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.711
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.712'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.710][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.712
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.62'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.713'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de fysieke leefomgeving wordt een gebruikte verpakking van
      gewasbeschermingsmiddelen of biociden na het legen onverwijld en grondig gereinigd, zodat niet meer dan 0,01% van
      het oorspronkelijk in de ongeopende verpakking aanwezige middel resteert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.713
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: restpercentage_middel
            type: number
            required: true
            description: Percentage van het oorspronkelijke middel dat nog resteert na reiniging
            source: {}
        output:
          - name: voldoet_reiniging_verpakking
            type: boolean
            description: Of niet meer dan 0,01% van het middel resteert na reiniging
        actions:
          - output: voldoet_reiniging_verpakking
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $restpercentage_middel
              value: 0.01
  - number: '4.714'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden gewasbeschermingsmiddelen, biociden of
      bladmeststoffen aangemaakt boven een aaneengesloten bodemvoorziening en zijn de vaste leidingen voor het transport
      ervan bovengronds gelegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.714
  - number: '4.715'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van het aanmaken van
      gewasbeschermingsmiddelen, biociden of bladmeststoffen of het reinigen van verpakkingen opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.715
  - number: '4.716'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van het aanmaken van
      gewasbeschermingsmiddelen, biociden of bladmeststoffen of het reinigen van verpakkingen niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.716
  - number: '4.717'
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam wordt bij het aanmaken van
      gewasbeschermingsmiddelen, biociden of bladmeststoffen voldoende afstand gehouden tot een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.717
  - number: '4.718'
    text: Deze paragraaf is van toepassing op het aanmaken van gewasbeschermingsmiddelen of meststoffen op landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.718
  - number: '4.720'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de fysieke leefomgeving wordt een gebruikte verpakking van
      gewasbeschermingsmiddelen na het legen onverwijld en grondig gereinigd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.720
  - number: 4.720.a
    text: zodat niet meer dan 0,01% van het oorspronkelijk in de ongeopende verpakking aanwezige middel resteert; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.720
  - number: 4.720.b
    text: waarbij het afvalwater opnieuw wordt gebruikt voor het aanmaken van dezelfde gewasbeschermingsmiddelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.720
  - number: '4.721'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van het aanmaken van
      gewasbeschermingsmiddelen of bladmeststoffen of het reinigen van verpakkingen opnieuw gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.721
  - number: '4.722'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van het aanmaken van
      gewasbeschermingsmiddelen of bladmeststoffen of het reinigen van verpakkingen niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.722
  - number: '4.723'
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam wordt bij het aanmaken van
      gewasbeschermingsmiddelen of bladmeststoffen voldoende afstand gehouden tot een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723
  - number: 4.723a.1
    text: |-
      Deze paragraaf is van toepassing op het gebruiken van gewasbeschermingsmiddelen of meststoffen op braakliggende
      landbouwgronden of bij het telen van gewassen in de openlucht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.2
    text: |-
      Voor de toepassing van deze paragraaf wordt in uiterwaarden en buitendijkse gebieden onder oppervlaktewaterlichaam
      verstaan: beddingen waarin op het moment van het lozen aan het aardoppervlak en de openlucht grenzend water
      voorkomt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3
    text: 'In deze paragraaf wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.a
    text: |-
      *windhaag*: barrière van bomen of struiken bedoeld om het verwaaien van spuitvloeistof bij het gebruik van
      gewasbeschermingsmiddelen of bladmeststoffen buiten de locatie waarop de activiteit wordt verricht te beperken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.b
    text: |-
      *emissiescherm*: aaneengesloten voorziening voor het beperken van de drift van gewasbeschermingsmiddelen of
      meststoffen naar een oppervlaktewaterlichaam die:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.b.1°
    text: aan de grond is verankerd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.b.2°
    text: zo is geplaatst dat geen afdruipende spuitvloeistoffen in een oppervlaktewaterlichaam kunnen komen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.b.3°
    text: is vervaardigd van niet-doorlaatbaar materiaal of van gaas met een windreductie van ten minste 50%; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.b.4°
    text: |-
      ten minste van gelijke hoogte is als die van het te bespuiten gewas en als die van de hoogste in gebruik zijnde
      spuitdop; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723a.3.c
    text: |-
      *teeltvrije zone:* strook tussen de insteek van een oppervlaktewaterlichaam en het te telen gewas waarop, met
      uitzondering van grasland, geen gewas of niet hetzelfde gewas als op de rest van het perceel wordt geteeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723a
  - number: 4.723b.1
    text: |-
      Het is verboden stoffen afkomstig van de activiteit, bedoeld in [artikel 4.723a][ref1], te lozen op een
      oppervlaktewaterlichaam, zonder dit ten minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.64'
  - number: 4.723b.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.723c.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam en het beschermen
      van de gezondheid wordt bij het gebruiken van gewasbeschermingsmiddelen op de locatie waarop de activiteit
      wordt verricht een techniek toegepast die een driftreductie bereikt van ten minste 75% ten opzichte van een
      referentietechniek als bedoeld in tabel 4.723c.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723c
  - number: 4.723c.2
    text: |-
      De driftreductie van de techniek wordt getest. Op het testen hiervan is het Meetprotocol voor het vaststellen van
      de driftreductie van neerwaartse en op- en zijwaartse spuittechnieken van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723c
  - number: 4.723c.3
    text: |-
      Het eerste lid is niet van toepassing op een met de hand gedragen spuit.
            Tabel 4.723c Referentietechnieken


                    *Gewassen*


                    *Referentietechniek*


                    Veldgewassen


                    – Traditionele veldspuit met neerwaarts spuitende doppen volgens BCPC-klassegrens fijn of midden of
      vergelijkbare spuitdoppen met eenzelfde druppelgroottespectrum
                    – Spuitdoppen ten hoogste 50 cm boven het te bespuiten oppervlak
                    – Afstand tussen de spuitdoppen op spuitboom 50 cm
                    – Spuitdruk 3 bar
                    – Rijsnelheid 6,5 km/u
                    – Spuitvolume 300 l/ha


                    Fruit


                    – Munckhof dwarsstroomspuit met zijwaarts spuitende Albuz ATR lila spuitdoppen
                    – Luchtondersteuning in lage stand in de kale boom situatie en vollucht luchtondersteuning in
      volbladsituatie
                    – Spuitdruk 7 bar
                    – Rijsnelheid 6,7 km/u
                    – Spuitvolume 200 l/ha


                    Boomkwekerijgewassen (op- en zijwaartse bespuiting)


                    – Axiaalspuit met zij- en opwaarts spuitende TeeJet TXB8003 werveldoppen
                    – Vollucht luchtondersteuning
                    – Spuitdruk 8 bar
                    – Rijsnelheid 4 km/u
                    – Spuitvolume 400 – 450 l/ha


                    Onkruid bij boom- en fruitteelt


                    – Onkruidspuit met een spuitboom met neerwaarts spuitende doppen TeeJet XR11004
                    – Spuitdoppen ten hoogste 30 cm boven de grond
                    – Afstand tussen de spuitdoppen op spuitboom van 30 cm
                    – Spuitdruk 2 bar
                    – Rijsnelheid 5 km/u
                    – Spuitvolume 450 l/ha
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723c
  - number: 4.723d.1
    text: |-
      Met het oog op het voorkomen of beperken van verontreiniging van een oppervlaktewaterlichaam wordt bij het
      gebruiken van gewasbeschermingsmiddelen langs een oppervlaktewaterlichaam een teeltvrije zone aangehouden waarbij
      wordt voldaan aan tabel 4.723d.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723d
  - number: 4.723d.2
    text: |-
      De teeltvrije zone wordt gemeten vanaf de insteek van een oppervlaktewaterlichaam en strekt zich uit tot het hart
      van de buitenste planten van de te telen gewassen, met uitzondering van de teelt van grasland.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723d
  - number: 4.723d.3
    text: |-
      In afwijking van het eerste lid hoeft geen teeltvrije zone te worden aangehouden langs een oppervlaktewaterlichaam
      als wordt voldaan aan tabel 4.723da.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.723d
  - number: 4.723d.4
    text: |-
      In afwijking van het eerste lid wordt langs een oppervlaktewaterlichaam als bedoeld in [bijlage 1 bij het
      Uitvoeringsbesluit Meststoffenwet](onbekend) een teeltvrije zone van ten minste 500 cm aangehouden.
