  - number: 4.824.1
    text: |-
      Als een maatwerkvoorschrift is gesteld voor een overig huisvestingssysteem waarbij het bevoegd gezag, bedoeld in
      [afdeling 2.2][ref1], een andere emissiefactor voor ammoniak, geur of PM heeft vastgesteld dan de bij ministeriële
      regeling vastgestelde emissiefactor, worden de emissies binnen twee jaar na het in gebruik nemen van dat
      huisvestingssysteem gemeten volgens de bij ministeriële regeling gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.824
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: 4.824.2
    text: |-
      Als een maatwerkvoorschrift is gesteld voor een niet in de ministeriële regeling opgenomen aanvullende techniek
      waarbij het bevoegd gezag, bedoeld in [afdeling 2.2][ref1], een reductiepercentage voor de reductie van ammoniak,
      geur of PM heeft vastgesteld, worden de emissies binnen twee jaar na het in gebruik nemen van die aanvullende
      techniek gemeten volgens de bij ministeriële regeling gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.824
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.825'
    text: |-
      Uiterlijk twee jaar na de ingebruikname van het huisvestingssysteem in een dierenverblijf of de aanvullende
      techniek wordt het rapport van de metingen, bedoeld in [artikel 4.824][ref1], verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
