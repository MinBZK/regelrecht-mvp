  - number: 3.200.4.b
    text: voor educatieve doeleinden; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.200
  - number: 3.200.4.c
    text: bij onderzoeksinstellingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.200
