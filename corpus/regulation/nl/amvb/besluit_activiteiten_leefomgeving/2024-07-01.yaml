  - number: 6.55.4
    text: |-
      Het verbod, bedoeld in het eerste lid, aanhef en onder c, geldt niet voor het lozen op een oppervlaktewaterlichaam
      van stoffen, water of warmte afkomstig van een milieubelastende activiteit als bedoeld in [artikel 3.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
