        paragraaf: '4.12'
  - number: 4.214.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.210, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.214
    references:
