        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.118'
  - number: 4.1217.2
    text: |-
      De hoeveelheid organische stikstof in de bodem wordt vastgesteld met een representatief grondmonster, dat wordt
      geanalyseerd door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor een methode die geschikt
      is voor de vaststelling daarvan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1217
