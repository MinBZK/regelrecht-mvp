        paragraaf: '4.2'
  - number: '4.26'
    text: |-
      Het preventiebeleid, bedoeld in [artikel 4.10][ref1], is opgesteld binnen een jaar nadat artikel 4.10 van
      toepassing is geworden op de Seveso-inrichting, tenzij:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.26
