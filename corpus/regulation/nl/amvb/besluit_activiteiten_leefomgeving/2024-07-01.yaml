    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.484
  - number: 4.484.2.c
    text: de bedrijfsvoering ernstig belemmert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.484
  - number: 4.484.2.d
    text: ertoe leidt dat niet kan worden voldaan aan de interne afstanden die zijn vastgelegd in PGS 25.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.484
  - number: 4.484.3
    text: |-
      Het tweede lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties:
