        paragraaf: 7.2.7
        afdeling: '7.2'
  - number: 7.61e.2
    text: De melding bevat de maximale teeltoppervlakte.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61e
  - number: 7.61e.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61e
  - number: 7.61f
    text: |-
      In afwijking van [artikel 4.795, eerste lid][ref1], kan het te lozen afvalwater afkomstig van het telen of kweken
      van gewassen in een gebouw, anders dan een kas, ook worden geloosd in een oppervlaktewaterlichaam, als de afstand
      tot een vuilwaterriool of zuiveringtechnisch werk meer dan 40 m is, gerekend vanaf de kadastrale grens van het
      perceel waar het afvalwater vrijkomt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61f
    references:
      - id: ref1
