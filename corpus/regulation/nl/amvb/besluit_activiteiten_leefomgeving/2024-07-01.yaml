  - number: 4.962.2
    text: |-
      Het eerste lid, aanhef en onder b, is van overeenkomstige toepassing als inachtneming van de afstand, bedoeld in
      het eerste lid, aanhef en onder a:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.c
    text: de bedrijfsvoering ernstig belemmert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.2.d
    text: ertoe leidt dat niet kan worden voldaan aan de interne afstanden die zijn vastgelegd in PGS 28.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.3
    text: |-
      Het eerste lid, aanhef en onder b, en tweede lid zijn niet van toepassing op kwetsbare gebouwen en kwetsbare
      locaties:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
  - number: 4.962.3.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.962.3.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.962.4
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het eerste lid, aanhef en onder b, en tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.962
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.963.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het vulpunt van een ondergrondse opslagtank
      waarin organische oplosmiddelen worden opgeslagen en de opstelplaats van de tankwagens voor het vullen en legen van
      de opslagtank:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.963
  - number: 4.963.1.a
    text: |-
      tot de begrenzing van de locatie waarop een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11][ref1]
