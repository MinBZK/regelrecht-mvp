      Als milieubelastende activiteit als bedoeld in [artikel 2.1][ref1] wordt aangewezen het omzetten van elektrische
      energie in elektromagnetische stralingsenergie, als het elektrisch vermogen groter is dan 4 kW.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
        hoofdstuk: '2'
        afdeling: '2.1'

