  - number: 4.92.3.a
    text: afvalstoffen thermisch worden behandeld, zijn de ovens niet meer dan 60 uur per kalenderjaar in werking; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.3.b
    text: |-
      afvalstoffen niet thermisch worden behandeld, zijn de ovens niet meer dan 120 uur per kalenderjaar in werking,
      verminderd met het aantal uur in het kalenderjaar dat de verbrandingsstraten onder de omstandigheid, bedoeld onder
      a, in werking zijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.4
    text: 'Bij een omstandigheid als bedoeld in het tweede of derde lid:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
  - number: 4.92.4.a
    text: |-
      zijn de [artikelen 4.73][ref1], [4.75][ref2], [4.76][ref3] en [4.77][ref4], met uitzondering van de in die
      artikelen opgenomen emissiegrenswaarden voor koolmonoxide en gasvormige en vluchtige organische stoffen, in de
      periode dat die omstandigheid zich voordoet, niet van toepassing; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.92
    references:
