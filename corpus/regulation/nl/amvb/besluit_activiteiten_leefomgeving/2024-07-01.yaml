    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.30
  - number: 5.31.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, ingedeeld in de stofklassen, bedoeld in [tabel 5.30][ref1],
      is NEN-EN 15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.4
        afdeling: '5.4'
  - number: 5.31.2
    text: 'Op het verrichten van een eenmalige, periodieke of parallelmeting zijn van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.a
    text: 'voor stikstofoxiden: NEN-EN 14792;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.b
    text: 'voor zwaveldioxide: NEN-EN 14791;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.c
    text: 'voor onverbrande koolwaterstoffen: NEN-EN 12619;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.d
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.e
    text: 'voor zuurstof: NEN-EN 14789;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.f
    text: 'voor chroom VI-verbindingen: NEN-ISO 16740;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.g
    text: 'voor zware metalen: NEN-EN 14385;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.h
    text: 'voor zoutzuur: NEN-EN 1911;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.i
    text: 'voor waterstoffluoride: NEN-ISO 15713;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.j
    text: 'voor ammoniak: NEN 2826;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.k
    text: 'voor individuele gasvormige organische componenten: NPR-CEN/TS 13649;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.l
    text: 'voor dioxinen en furanen: NEN-EN 1948-1, NEN-EN 1948-2 en NEN-EN 1948-3; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.2.m
    text: 'voor kwik: NEN-EN 13211.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.3
    text: 'Op het verrichten van een continue meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.3.a
    text: 'voor stikstofoxiden: NEN-ISO 10849;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.3.b
    text: 'voor totaal stof: NEN-EN 13284-2; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.31.3.c
    text: 'voor de kwaliteitsborging: NEN-EN 14181.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.31
  - number: 5.32.1
    text: |-
      De emissiegrenswaarden, bedoeld in [artikel 5.30, eerste lid][ref1], worden gecontroleerd volgens het
      controleregime, bedoeld in tabel 5.32.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.4
        afdeling: '5.4'
  - number: 5.32.2
    text: De controle van emissies wordt gebaseerd op de grootte van de storingsfactor, bedoeld in tabel 5.32.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.3
    text: |-
      De storingsfactor wordt berekend door de helft van de storingsemissie te delen door de ondergrens, uitgedrukt in
      kilogram per jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.4
    text: |-
      De storingsemissie is de toename van de vracht van de emissie, uitgedrukt in gram per uur, bij het falen van een
      reinigingstechniek of procesgeïntegreerde maatregel, en wordt berekend als het verschil tussen de ongereinigde
      massastroom en de massastroom, berekend uit het debiet, vermenigvuldigd met de geldende emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.5
    text: In afwijking van het tweede lid is controleregime 4 van toepassing op stoffen in stofklasse ERS.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.6
    text: 'Bij een emissierelevante parameter wordt aangetoond:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.6.a
    text: welke emissierelevante parameters de emissies van een specifieke component controleren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: 5.32.6.b
    text: binnen welke grenzen de emissierelevante parameters voldoen aan de emissiegrenswaarden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.32
  - number: '5.33'
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 5.31][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.33
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.4
        afdeling: '5.4'
  - number: '5.34'
    text: 'De emissies van verbrandingsprocessen worden omgerekend naar afgas met een volumegehalte aan zuurstof van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.34
  - number: 5.34.a
    text: 6% bij een stookinstallatie met vaste brandstof; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.34
  - number: 5.34.b
    text: 3% bij een stookinstallatie met een gasvormige of vloeibare brandstof.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.34
  - number: 5.35.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste vijftien minuten en ten hoogste een half uur. Dit
      geldt niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.35
  - number: 5.35.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van
      de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het percentage van de
      emissiegrenswaarde, bedoeld in [tabel 5.36][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.35
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.4
        afdeling: '5.4'
  - number: 5.35.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.35
  - number: 5.36.1
    text: 'Een continue meting bestaat uit:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.36
  - number: 5.36.1.a
    text: een rechtstreekse continue meting van de concentratie in het afgas; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.36
  - number: 5.36.1.b
    text: een continue meting van de parameters van de voor de installatie vastgestelde uitworpkarakteristiek.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.36
  - number: 5.36.2
    text: |-
      Het resultaat van de continue meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      halfuursgemiddelden of etmaalgemiddelden, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan het
      percentage van de emissiegrenswaarde, bedoeld in tabel 5.36.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.36
  - number: 5.36.3
    text: |-
      De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
            Tabel 5.36 Meetonzekerheid


                    *Stof*


                    *Percentage meetonzekerheid*


                    Zwaveldioxide


                    20


                    Stikstofoxide


                    20


                    Totaal stof


                    30


                    Debiet


                    20


                    Overig


                    40
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.36
  - number: 5.37.1
    text: Het resultaat van de individuele meting overschrijdt de emissiegrenswaarde niet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.37
  - number: 5.37.2
    text: |-
      De daggemiddelde waarde van de emissieconcentratie, bepaald op basis van het resultaat van continue metingen, is
      niet meer dan de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.37
  - number: 5.37.3
    text: |-
      De halfuurgemiddelde waarden, als resultaat van continue metingen, zijn niet meer dan het dubbele van de
      emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.37
  - number: 5.38.1
    text: De resultaten van emissiemetingen of controles van emissierelevante parameters worden vastgelegd in een rapport.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.38
  - number: 5.38.2
    text: 'De resultaten van emissiemetingen worden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.38
  - number: 5.38.2.a
    text: |-
      gerapporteerd bij condities van de lucht bij een temperatuur van 273 K, 101,3 kPa en betrokken op droge lucht voor
      temperatuur en druk, en bij droog afgas; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.38
  - number: 5.38.2.b
    text: gecorrigeerd voor de meetonzekerheid.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.38
  - number: 5.38b.1
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit zijn de emissiegrenswaarden voor stikstofoxide,
      waterstofchloride, waterstoffluoride en ammoniak en voor de stofklassen ERS, S en sA.3, bedoeld in
      [artikel 5.30][ref1], niet van toepassing op emissies naar de lucht, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals die werd verricht voor de inwerkingtreding van dit besluit. Tot de eerstgenoemde
      datum gelden in dat geval de emissiegrenswaarden voor stikstofoxide, waterstofchloride, waterstoffluoride, ammoniak
      en voor de stofklassen ERS, S en sA.3 zoals opgenomen in tabel 5.38b.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.38b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.4.4
        afdeling: '5.4'
  - number: 5.38b.2
    text: |-
      Tot vier jaar na de inwerkingtreding van dit besluit is de emissiegrenswaarde in mg/Nm3 voor stofklasse
      gO.2, bedoeld in [artikel 5.30][ref1], niet van toepassing op de emissie naar de lucht van stoffen die tot de
      inwerkingtreding van dit besluit onder stofklasse gO.3 vielen, mits die activiteit naar aard en omvang niet
      verschilt van de activiteit zoals die werd verricht voor de inwerkingtreding van dit besluit. Tot de eerstgenoemde
      datum geldt in dat geval voor deze stoffen een emissiegrenswaarde van 100 mg/Nm3 bij een ondergrens van 250 kg/
      jaar.
