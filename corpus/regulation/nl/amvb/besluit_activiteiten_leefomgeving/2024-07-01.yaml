  - number: '4.1222'
    text: |-
      Met het oog op het beschermen van de gezondheid, het beschermen van de kwaliteit van de bodem
      en het doelmatig beheer van afvalstoffen worden bij het graven, terugplaatsen of afvoeren van
      grond, partijen grond van verschillende kwaliteitsklassen, waarin de partijen op grond van
      [artikel 25d van het Besluit bodemkwaliteit][ref1] zijn ingedeeld, gescheiden gehouden.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.1222
    references:
