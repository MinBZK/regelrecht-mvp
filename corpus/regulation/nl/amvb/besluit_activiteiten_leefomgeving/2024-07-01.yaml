        bwb_id: BWBR0041330
        hoofdstuk: '3'
        paragraaf: 3.3.10
        afdeling: '3.3'
  - number: 3.184.4
    text: |-
      Onder de aanwijzing valt ook niet het verwerken van bedrijfsafvalstoffen en gevaarlijke afvalstoffen als dat alleen
      bestaat uit:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.4.a
    text: |-
      het mengen, opbulken, opslaan, scheiden, herverpakken of verdichten van bedrijfsafvalstoffen of gevaarlijke
      afvalstoffen voorafgaand aan inzameling of afgifte;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.4.b
    text: |-
      het mobiel breken van bouwafval en sloopafval, bedoeld in
      [afdeling 7.2 van het Besluit bouwwerken leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Afdeling7.2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
    references:
      - id: ref1
        bwb_id: BWBR0041297
        afdeling: '7.2'
  - number: 3.184.4.c
    text: het lozen van afvalwater op een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.5
    text: |-
      Onder de aanwijzing valt ook niet het verwerken van huishoudelijke afvalstoffen die nog niet zijn ingezameld of
      afgegeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.185.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning
      een milieubelastende activiteit te verrichten, geldt voor de milieubelastende activiteit, bedoeld in
      [artikel 3.184][ref2], voor zover het gaat om het opslaan, herverpakken of opbulken van bedrijfsafvalstoffen of
      gevaarlijke afvalstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.11
        afdeling: '3.5'
  - number: 3.185.2
    text: |-
      Het verbod geldt ook voor andere milieubelastende activiteiten met deze afvalstoffen die worden verricht op
      dezelfde locatie als dat opslaan, herverpakken of opbulken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3
    text: 'Het verbod geldt niet voor het opslaan van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.a
    text: |-
      afvalstoffen van gezondheidszorg bij mens of dier en gebruikte hygiënische producten, met uitzondering
      van infectieuze afvalstoffen, lichaamsdelen of organen, en afvalstoffen van cytotoxische of cytostatische
      geneesmiddelen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.b
    text: niet meer dan 10.000 ton banden van voertuigen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.c
    text: metaal voor zover de opslagcapaciteit ten hoogste 50.000 ton is en het niet gaat om gevaarlijke afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.d
    text: |-
      niet meer dan 100 m3 afgedankte elektrische of elektronische apparatuur die afkomstig is van particuliere
      huishoudens of die naar aard en hoeveelheid met die van particuliere huishoudens vergelijkbaar is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.e
    text: niet meer dan 5 m3 draagbare batterijen of accu’s;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.f
    text: niet meer dan 5 m3 spaarlampen of gasontladingslampen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.g
    text: niet meer dan 5 m3 inktcassettes of tonercassettes;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.h
    text: |-
      siervoorwerpen of gebruiksvoorwerpen op een locatie waarop het hergebruik van deze voorwerpen wordt voorbereid als
      de opslagoppervlakte ten hoogste 1.000 m2 is en het gaat om gevaarlijke afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.i
    text: |-
      siervoorwerpen, gebruiksvoorwerpen of tweedehands bouwmaterialen als de opslagoppervlakte ten hoogste 6.000 m2 is
      en het gaat om bedrijfsafvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
  - number: 3.185.3.j
    text: |-
      lege ongereinigde verpakkingen die gevaarlijke afvalstoffen zijn of niet meer dan 45 m3 lege
      ongereinigde verpakkingen die bedrijfsafvalstoffen zijn, op een locatie waarop olie, vet, verf,
      lijm, kit, hars, gewasbeschermingsmiddelen, biociden of gevaarlijke stoffen als bedoeld in
      [artikel 3.27, eerste lid, onder a, b of c][ref1], in verpakking worden opgeslagen om te worden verkocht of
      geleverd aan afnemers en voor zover de lege ongereinigde verpakkingen zijn ingenomen van die afnemers;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.185
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.2.9
        afdeling: '3.2'
