    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
  - number: 9.44.2.c
    text: |-
      andere werkzaamheden boven tunnels of onder bruggen, die de constructieve veiligheid van de tunnel of brug niet
      aantasten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
  - number: 9.44.2.d
    text: het verrichten van metingen en inspecties.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.44
  - number: 9.45.1
    text: |-
      Het is verboden een activiteit als bedoeld in [artikel 9.44, tweede lid][ref1], te verrichten zonder dit ten minste
      vier weken en ten hoogste een jaar voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.45
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
        hoofdstuk: '9'
        paragraaf: 9.2.4
        afdeling: '9.2'
  - number: 9.45.2
    text: Een melding bevat de locatie van de activiteit in x-, y- en z-coördinaten op de basisbeheerkaart.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.45
  - number: 9.45.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.45
  - number: '9.46'
    text: |-
      Ten minste vier weken en ten hoogste acht weken voor het begin van een activiteit als bedoeld in
      [artikel 9.44, tweede lid][ref1], worden de volgende gegevens en bescheiden verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 9.1][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel9.46
    references:
      - id: ref1
        bwb_id: BWBR0041330
