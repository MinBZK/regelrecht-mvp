  - number: '4.964'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.962, tweede lid][ref1], of
      [4.963, tweede lid][ref2], gaat gelden, wordt het bevoegd gezag, bedoeld in [afdeling 2.2][ref3], daarover
