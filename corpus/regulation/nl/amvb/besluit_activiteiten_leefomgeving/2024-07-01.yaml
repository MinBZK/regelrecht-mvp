  - number: 5.7f.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7f
  - number: 5.7g.1
    text: |-
      Met het oog op het doelmatig gebruik van energie wordt een kosten-batenanalyse uitgevoerd als een stookinstallatie
      met een totaal nominaal thermisch ingangsvermogen van meer dan 20 MW:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7g.1.a
    text: |-
      wordt opgericht, om de kosten en baten te berekenen van de werking van die stookinstallatie als een hoogrenderende
      warmtekrachtkoppelingsinstallatie als bedoeld in artikel 2, onder 34, van de richtlijn energie-efficiëntie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7g.1.b
    text: |-
      ingrijpend wordt gerenoveerd als bedoeld in artikel 2, onder 44, van de richtlijn energie-efficiëntie,
      om de kosten en baten te berekenen van het ombouwen van die stookinstallatie tot een hoogrenderende
      warmtekrachtkoppelingsinstallatie als bedoeld in artikel 2, onder 34, van de richtlijn energie-efficiëntie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7g.2
    text: |-
      Als de stookinstallatie, bedoeld in het eerste lid, restwarmte op een bruikbare temperatuur genereert, worden ook
      de kosten en baten berekend van:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7g.2.a
    text: |-
      het gebruik van restwarmte om te voldoen aan een economisch aantoonbare vraag naar warmte als bedoeld in artikel 2,
      onder 31, van de richtlijn energie-efficiëntie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7g.2.b
    text: de aansluiting van die stookinstallatie op een warmtenet of een koudenet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7g
  - number: 5.7h
    text: |-
      Met het oog op het doelmatig gebruik van energie wordt een kosten-batenanalyse uitgevoerd om de kosten en baten te
      berekenen van het gebruik van restwarmte van stookinstallaties in de nabijheid van een warmtenet of een koudenet,
      als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7h
  - number: 5.7h.a
    text: |-
      een warmtenet of een koudenet wordt opgericht of ingrijpend wordt gerenoveerd als bedoeld in artikel 2, onder 44,
      van de richtlijn energie-efficiëntie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7h
  - number: 5.7h.b
    text: |-
      een stookinstallatie met een totaal nominaal thermisch ingangsvermogen van meer dan 20 MW in een warmtenet of
      een koudenet wordt opgericht of ingrijpend wordt gerenoveerd als bedoeld in artikel 2, onder 44, van de richtlijn
      energie-efficiëntie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7h
  - number: 5.7i.1
    text: |-
      De kosten-batenanalyse wordt uitgevoerd volgens de beginselen, bedoeld in deel 2 van bijlage IX bij de richtlijn
      energie-efficiëntie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7i
  - number: 5.7i.2
    text: Op het berekenen van de kosten en baten zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel5.7i
  - number: 5.7j.1
    text: |-
