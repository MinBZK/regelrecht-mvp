    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.355][ref1], voldaan aan PGS 26, als voor de verbrandingsmotor of het voertuig, vaartuig of werktuig CNG
      of LNG wordt gebruikt als brandstof.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.359
    references:
