        bwb_id: BWBR0041330
        hoofdstuk: '7'
        paragraaf: 7.2.3
        afdeling: '7.2'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: rotordiameter_m
            type: number
            required: true
            description: De rotordiameter van de windturbine in meters
            source: {}
          - name: is_windpark_noordzee
            type: boolean
            required: true
            description: Of de windturbine deel uitmaakt van een windpark in de Noordzee (paragraaf 7.2.3)
            source: {}
        output:
          - name: is_milieubelastende_activiteit_windturbine
            type: boolean
            description: Of het opwekken van elektriciteit met de windturbine een aangewezen milieubelastende activiteit is
        actions:
          - output: is_milieubelastende_activiteit_windturbine
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN
                  subject: $rotordiameter_m
                  value: 2
                - operation: NOT
                  value: $is_windpark_noordzee
  - number: '3.13'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning
      een milieubelastende activiteit te verrichten, geldt voor de milieubelastende activiteit, bedoeld in
