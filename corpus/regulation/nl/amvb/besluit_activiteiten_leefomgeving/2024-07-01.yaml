      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '15'
        afdeling: '15.3'
  - number: 15.7.2
    text: |-
      Met een maatwerkvoorschrift kan worden afgeweken van de [afdelingen 15.2][ref1] en [15.3][ref2], tenzij anders
      is bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk15
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel15.7
    references:
