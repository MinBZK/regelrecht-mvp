        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.7
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
