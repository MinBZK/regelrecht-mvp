                    5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.228
  - number: 4.229.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen en de stoffen, ingedeeld in de stofklassen, bedoeld in
      [tabel 4.228][ref1], is NEN-EN 15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
