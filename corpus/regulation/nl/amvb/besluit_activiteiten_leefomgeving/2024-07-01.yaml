  - number: 4.75.1
    text: |-
      Voor de emissie in de lucht zijn de emissiegrenswaarden bij een andere afvalmeeverbrandingsinstallatie dan die,
      bedoeld in [artikel 4.73][ref1], de waarden, bedoeld in tabel 4.75, gemeten in een continue of periodieke meting.


