  - number: '4.851'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt gebruikt substraatmateriaal opgeslagen op een
      aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.851
  - number: 4.852.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater afkomstig van het opslaan van gebruikt substraatmateriaal,
      worden vrijkomende vloeistoffen gelijkmatig verspreid over landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.852
  - number: 4.852.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden of
      geloosd via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.852
  - number: '4.853'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt afvalwater afkomstig van de bodembeschermende voorziening
      voor de opslag van gebruikt substraatmateriaal geloosd op of in de bodem of op een oppervlaktewaterlichaam als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.853
  - number: 4.853.a
    text: het niet in contact is geweest met het substraatmateriaal; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.853
  - number: 4.853.b
    text: het niet is vermengd met daaruit vloeiende vloeistoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.853
  - number: '4.854'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.854
  - number: 4.854.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.854
  - number: 4.854.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.854
  - number: 4.854.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.854
  - number: '4.855'
    text: Deze paragraaf is van toepassing op het opslaan van drijfmest, digestaat of dunne fractie in een mestbassin.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.855
  - number: 4.856.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.855][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.86'
  - number: 4.856.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
  - number: 4.856.2.a
    text: het volume en de oppervlakte van het mestbassin; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
  - number: 4.856.2.b
    text: |-
      het totaal volume of de totale oppervlakte van de mestbassins op de locatie als het gezamenlijke volume meer is dan
      2.500 m3 of de gezamenlijke oppervlakte ten minste 350 m2 is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
  - number: 4.856.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
  - number: 4.856.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.856
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.858.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem is een mestbassin lekdicht en zijn aan de buitenzijde
      van het mestbassin bij de aansluitpunten van de vulleidingen, aftapleidingen en roerleidingen voorzieningen
      getroffen om lekkage te beperken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858
  - number: 4.858.2
    text: |-
      Van een mestbassin dat geheel of gedeeltelijk boven het maaiveld ligt en is uitgevoerd met een binnenafdichting
      van folie is de draagconstructie bestand tegen krachten die ontstaan bij het opslaan van drijfmest, digestaat of
      dunne fractie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858
  - number: 4.858.3
    text: |-
      Folie dat voor een mestbassin wordt gebruikt, is voor gebruik bij het opslaan van drijfmest, digestaat of dunne
      fractie gecertificeerd door een certificatie-instantie met een accreditatie volgens NEN-EN-ISO/IEC 17065 voor BRL-
      K519, BRL-K537, BRL-K538, BRL-K546 of BRL 1149.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858
  - number: 4.858a
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam is een mestbassin dat is
      uitgevoerd als een met folie beklede grondput of een mestzak, waar bij lekkage drijfmest, digestaat of dunne
      fractie in het oppervlaktewaterlichaam terecht zou kunnen komen, volledig omringd door een dijklichaam:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858a
  - number: 4.858a.a
    text: waarvan het binnendijkse volume ten minste gelijk is aan de maximale inhoud van het mestbassin of de mestzak; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858a
  - number: 4.858a.b
    text: dat is bestand tegen krachten die ontstaan bij het opslaan van drijfmest, digestaat of dunne fractie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.858a
  - number: '4.859'
    text: |-
      Met het oog op het beperken van emissies van ammoniak in de lucht is een mestbassin volledig afgedekt, met
      uitzondering van de ontluchtingsopeningen voor het voorkomen van het ophopen van gas.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.859
  - number: 4.859a
    text: |-
      [Artikel 4.858a][ref1] is tot 1 januari 2031 niet van toepassing op een mestzak die voor inwerkingtreding van dit
      besluit al werd gebruikt en waarvan de locatie niet wijzigt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.859a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.86'
  - number: 4.860.1
    text: Deze paragraaf is van toepassing op het behandelen van dierlijke meststoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.860
  - number: 4.860.2
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.860
  - number: 4.860.2.a
    text: |-
      het behandelen van dierlijke meststoffen als onderdeel van een huisvestingssysteem waarvoor bij ministeriële
      regeling een emissiefactor voor ammoniak is vastgesteld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.860
  - number: 4.860.2.b
    text: het vergisten, drogen, indampen, verbranden en composteren van dierlijke meststoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.860
  - number: 4.861.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.860][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.87'
  - number: 4.861.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
  - number: 4.861.2.a
    text: de gebruikte behandelingstechniek; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
  - number: 4.861.2.b
    text: de hoeveelheid dierlijke meststoffen in kubieke meters per jaar die ten hoogste wordt behandeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
  - number: 4.861.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
  - number: 4.861.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.861
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.863'
    text: |-
      Met het oog op het beperken van geurhinder gebeurt het hygiëniseren van dierlijke meststoffen in een gesloten
      ruimte of een gesloten systeem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.863
  - number: 4.864.1
    text: Deze paragraaf is van toepassing op het vergisten van dierlijke meststoffen in een vergistingstank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864.2
    text: 'Deze paragraaf is ook van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864.2.a
    text: een na-opslag van digestaat zolang dat biologisch actief is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864.2.b
    text: een gaszak of opslagtank voor de opslag van vergistingsgas;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864.2.c
    text: een gedeelte voor de bewerking van vergistingsgas; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864.2.d
    text: een voorziening voor het biologisch behandelen van dierlijke meststoffen voor of na het vergisten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864
  - number: 4.864a.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.864][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.88'
  - number: 4.864a.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.a
    text: de maximale verwerkingscapaciteit van dierlijke meststoffen in kubieke meters per jaar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.b
    text: de maximale opslagcapaciteit van het vergistingsgas in kubieke meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.c
    text: 'de coördinaten van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.c.1°
    text: het middelpunt van een gaszak waarin vergistingsgas wordt opgeslagen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.c.2°
    text: het aftappunt van een opslagtank waarin vloeibaar gemaakt vergistingsgas wordt opgeslagen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.d
    text: de methode van bewerking en de bestemming van het vergistingsgas; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.2.e
    text: de methode van stabilisatie van het digestaat.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
  - number: 4.864a.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.864a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.865'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.864][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.865
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.88'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.866.1
    text: |-
      Met het oog op het waarborgen van de veiligheid is de afstand vanaf het middelpunt van een gaszak
      waarin vergistingsgas wordt opgeslagen tot de begrenzing van de locatie waarop de activiteit, bedoeld in
      [hoofdstuk 3][ref1], wordt verricht, ten minste 50 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.866.2
    text: |-
      De afstand vanaf het aftappunt van een opslagtank waarin vloeibaar gemaakt vergistingsgas wordt opgeslagen tot de
      begrenzing van de locatie waarop de activiteit, bedoeld in [hoofdstuk 3][ref1], wordt verricht, is ten minste 50 m.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.866.3
    text: |-
      De afstand geldt tot beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en
      kwetsbare locaties die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit zijn toegelaten, als inachtneming van de afstand, bedoeld in het eerste en tweede lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.3.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.4
    text: |-
      Het derde lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
  - number: 4.866.4.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.866.4.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.866.5
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.866
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.867'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.866, derde lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.867
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.88'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.868'
    text: |-
      Met het oog op het waarborgen van de veiligheid is overnachting door derden en recreatief verblijf niet toegestaan
      binnen 50 m vanaf een gaszak of een opslagtank waarin vergistingsgas wordt opgeslagen of het aftappunt van een
      opslagtank waarin vloeibaar gemaakt vergistingsgas wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.868
  - number: '4.869'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt kooldioxide die vrijkomt bij het bewerken van vergistingsgas
      bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.869
  - number: 4.870.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt een gaszak voor vergistingsgas eenmaal per twaalf maanden
      visueel geïnspecteerd op tekenen van verwering of slijtage.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.870
  - number: 4.870.2
    text: Op een vast opgestelde opslagtank voor vloeibaar gemaakt vergistingsgas is PGS 33-1 van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.870
  - number: 4.870.3
    text: Bij het legen van de opslagtank is PGS 33-1 van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.870
  - number: 4.871.1
    text: 'Met het oog op het waarborgen van de veiligheid en het voorkomen van emissies in de lucht:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.871
  - number: 4.871.1.a
    text: is een mestvergistingsinstallatie gasdicht en beveiligd tegen overdruk; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.871
  - number: 4.871.1.b
    text: voldoet een mestvergistingsinstallatie aan de NTA 9766 en is een verklaring beschikbaar waaruit dit blijkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.871
  - number: 4.871.2
    text: |-
      De verklaring heeft een geldigheid van ten hoogste vijftien jaar. Kort voor het verlopen van de geldigheid wordt
      een mestvergistingsinstallatie opnieuw beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.871
  - number: '4.872'
    text: 'Met het oog op het waarborgen van de veiligheid en het voorkomen van emissies in de lucht:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.872
  - number: 4.872.a
    text: 'wordt digestaat dat nog biologisch actief is:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.872
  - number: 4.872.a.1°
    text: niet getransporteerd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.872
  - number: 4.872.a.2°
    text: buiten de vergistingstank niet gemengd met vaste mest of drijfmest; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.872
  - number: 4.872.b
    text: |-
      wordt het overgebleven digestaat gestabiliseerd zodra een vergistingstank of na-opslag buiten bedrijf wordt gesteld
      en niet meer gasdicht is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.872
  - number: '4.873'
    text: |-
      Met het oog op het waarborgen van de veiligheid en het voorkomen van emissies in de lucht wordt bij vergistingsgas
      uit een mestvergistingsinstallatie dat de locatie via een leiding verlaat die installatie zo afgesteld dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.873
  - number: 4.873.a
    text: bij een plotselinge drukval in de leiding de levering van vergistingsgas onverwijld wordt stopgezet; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.873
  - number: 4.873.b
    text: na stopzetting van de levering deze pas weer wordt hervat als het probleem is opgelost.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.873
  - number: 4.874.1
    text: |-
      Met het oog op het waarborgen van de veiligheid en het voorkomen van emissies in de lucht wordt het vergistingsgas
      uit een mestvergistingsinstallatie bij ingebruikname bemonsterd, waarbij het gehalte aan waterstofsulfide wordt
      geanalyseerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.874
  - number: 4.874.2
    text: |-
      Als vergistingsgas via een leiding naar een andere locatie wordt getransporteerd, wordt bij het punt waarop het
      gas in de leiding wordt gebracht ook het gehalte aan ammoniak geanalyseerd en het dauwpunt bij een druk van 8 bar
      bepaald.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.874
  - number: 4.875.1
    text: |-
      Bij het verlaten van een mestvergistingsinstallatie is de grenswaarde voor het gehalte waterstofsulfide in
      vergistingsgas 430 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.875
  - number: 4.875.2
    text: 'Als vergistingsgas via een leiding naar een andere locatie wordt getransporteerd, is:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.875
  - number: 4.875.2.a
    text: de grenswaarde voor het gehalte ammoniak in het vergistingsgas 15 mg/Nm3, gemeten in een eenmalige meting; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.875
  - number: 4.875.2.b
    text: het dauwpunt niet meer dan -3 °C bij een druk van 8 bar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.875
  - number: 4.876.1
    text: Een mestvergistingsinstallatie heeft een elektronisch monitoringssysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.876
  - number: 4.876.2
    text: |-
      Als de resultaten van de monitoring hiertoe aanleiding geven, worden maatregelen getroffen om de werking van een
      mestvergistingsinstallatie te waarborgen en onveilige situaties of emissies van vergistingsgas te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.876
  - number: '4.877'
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem bevinden de vergistingstank en de na-opslag van
      digestaat of het gedeelte voor de bewerking van vergistingsgas zich boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.877
  - number: '4.878'
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het afvalwater afkomstig van het bewerken van
      vergistingsgas niet geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.878
  - number: 4.878a
    text: |-
      De [artikelen 4.866, eerste en tweede lid][ref1], en [4.867][ref2] zijn niet van toepassing op het vergisten
      van dierlijke meststoffen in een installatie dat voor de inwerkingtreding van dit besluit al rechtmatig werd
      verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de
      inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.878a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.88'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.88'
  - number: 4.879.1
    text: |-
      Deze paragraaf is van toepassing op het composteren en opslaan van groenafval met een volume van 3 m3 tot en met
      600 m3.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.879
  - number: 4.879.2
    text: |-
      Deze paragraaf is niet van toepassing op groenafval dat een gevaarlijke afvalstof of gebruikt substraatmateriaal
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.879
  - number: 4.880.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.879][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.89'
  - number: 4.880.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
  - number: 4.880.2.a
    text: het maximale volume van de opslag of het composteren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
  - number: 4.880.2.b
    text: de lozingsroutes.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
  - number: 4.880.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
  - number: 4.880.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.880
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.881'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.879][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.881
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.89'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.882.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem wordt niet-houtachtig groenafval, dat meer dan
      veertien dagen wordt opgeslagen, op een aaneengesloten bodemvoorziening opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.882
  - number: 4.882.2
    text: |-
      Als de opslag van groenafval op een locatie niet meer dan zes maanden duurt en tegen inregenen is beschermd, is een
      absorberende laag die voorkomt dat vloeistoffen in de bodem treden voldoende.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.882
  - number: '4.883'
    text: |-
      Met het oog op het beperken van uitspoeling van vermestende stoffen naar de bodem wordt een composteringshoop in de
      periode van 1 november tot 1 maart tegen inregenen beschermd. Een composteringshoop wordt regelmatig omgezet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.883
  - number: 4.884.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater worden vrijkomende vloeistoffen afkomstig van het composteren
      geloosd op of in de bodem of in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.884
  - number: 4.884.2
    text: |-
      Als een maatwerkvoorschrift is gesteld waarin een andere lozingsroute is toegestaan, wordt het te lozen afvalwater
      geloosd in de bodem, in een vuilwaterriool of via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.884
  - number: 4.885.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater worden vrijkomende vloeistoffen afkomstig van het opslaan van
      groenafval gelijkmatig verspreid over landbouwgronden of geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.885
  - number: 4.885.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater gelijkmatig verspreid over landbouwgronden,
      geloosd in een vuilwaterriool of via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.885
  - number: '4.886'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.886
  - number: 4.886.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.886
  - number: 4.886.b
    text: of die punten zijn aangesloten op het eigen vuilwaterriool of schoonwaterriool; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.886
  - number: 4.886.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.886
  - number: 4.887.1
    text: Deze paragraaf is van toepassing op het reinigen van voertuigen of werktuigen voor agrarische activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.887
  - number: 4.887.2
    text: Deze paragraaf is niet van toepassing op het reinigen van veewagens.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.887
  - number: 4.888.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.887][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.90'
  - number: 4.888.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
  - number: 4.888.2.a
    text: gegevens of bescheiden waaruit blijkt welke handelingen met gewasbeschermingsmiddelen worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
  - number: 4.888.2.b
    text: de lozingsroute.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
  - number: 4.888.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
  - number: 4.888.4
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.888
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.889'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.887][ref1], wordt voldaan aan de regels over
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.889
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.90'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.890.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden voertuigen en werktuigen na het gebruik van
      gewasbeschermingsmiddelen, gereinigd op een wasplaats die een aaneengesloten bodemvoorziening heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.890
  - number: 4.890.2
    text: |-
      Het eerste lid is niet van toepassing als het reinigen gebeurt op landbouwgronden waar de gewasbeschermingsmiddelen
      zijn gebruikt of als het reinigen incidenteel gebeurt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.890
  - number: '4.891'
    text: |-
      Met het oog op het voorkomen van verontreiniging van een oppervlaktewaterlichaam is er geen directe afvoer voor
      afvalwater en hemelwater van de wasplaats naar een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.891
  - number: 4.892.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het afvalwater afkomstig van het uitwendig reinigen van
      voertuigen of werktuigen na het gebruik van gewasbeschermingsmiddelen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.892
  - number: 4.892.1.a
    text: |-
      bij het reinigen op de landbouwgronden waar de gewasbeschermingsmiddelen zijn gebruikt, geloosd op die
      landbouwgronden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.892
  - number: 4.892.1.b
    text: als het reinigen incidenteel gebeurt, geloosd op onverharde bodem; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.892
  - number: 4.892.1.c
    text: opgevangen en gezuiverd, zodat geen afvalwater wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.892
  - number: 4.892.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater, bedoeld in het eerste lid, aanhef en onder a en
      b, geloosd op de landbouwgronden waar de gewasbeschermingsmiddelen zijn gebruikt of op onverharde bodem of geloosd
      via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.892
  - number: 4.893.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het afvalwater afkomstig van het inwendig reinigen van
      voertuigen of werktuigen na het gebruik van gewasbeschermingsmiddelen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.893
  - number: 4.893.1.a
    text: gelijkmatig verspreid over landbouwgronden waar de gewasbeschermingsmiddelen zijn gebruikt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.893
  - number: 4.893.1.b
    text: opgevangen en gezuiverd, zodat geen afvalwater wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.893
  - number: 4.893.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater, bedoeld in het eerste lid, aanhef en onder a,
      gelijkmatig verspreid op de landbouwgronden waar de gewasbeschermingsmiddelen zijn gebruikt of geloosd via die
      andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.893
  - number: 4.894.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het afvalwater afkomstig van het reinigen van voertuigen
      of werktuigen die niet voor gewasbeschermingsmiddelen zijn gebruikt, geloosd op onverharde bodem of in een
      vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.894
  - number: 4.894.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd op onverharde bodem of geloosd in een
      vuilwaterriool of via die andere route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.894
  - number: '4.895'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.895
  - number: 4.895.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.895
  - number: 4.895.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.895
  - number: 4.895.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.895
  - number: '4.896'
    text: Deze paragraaf is van toepassing op het opslaan van propaan of propeen in een opslagtank.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.896
  - number: 4.897.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.896][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.897
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.91'
  - number: 4.897.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.897
  - number: 4.897.2.a
    text: |-
      de coördinaten van de opslagtank, het vulpunt van de opslagtank, de bovengrondse vloeistofvoerende leiding,
      de aansluitpunten van die leiding en pomp en de opstelplaats van de tankwagens voor het vullen en legen van de
