        hoofdstuk: '3'
        paragraaf: 3.6.8
        afdeling: '3.6'
  - number: 3.184.3.h
    text: |-
      het verwerken van dierlijke bijproducten, anders dan het verwerken door composteren of vergisten en de aan dat
      composteren of vergisten voorafgaande activiteiten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.i
    text: het zuiveren van afvalwater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
  - number: 3.184.3.j
    text: |-
      het opslaan, mengen en opbulken van ingenomen huishoudelijke afvalstoffen als het innemen hoort bij geleverde
      diensten en de afvalstoffen die worden gemengd behoren tot dezelfde categorie van afvalstoffen, bedoeld in
      [bijlage II][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.184
    references:
      - id: ref1
