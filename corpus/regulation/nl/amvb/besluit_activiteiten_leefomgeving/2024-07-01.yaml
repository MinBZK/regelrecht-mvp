        artikel: '4'
  - number: 4.494.1.b
    text: het verboden de maatregel te treffen zonder dit ten minste vier weken van tevoren te melden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.494
  - number: 4.494.2
    text: 'Een melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.494
  - number: 4.494.2.a
    text: een beschrijving van de maatregel die zal worden getroffen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.494
  - number: 4.494.2.b
    text: |-
      gegevens waaruit blijkt dat met de gelijkwaardige maatregel ten minste hetzelfde resultaat wordt bereikt als met de
      voorgeschreven maatregel is beoogd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.494
  - number: '4.495'
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt bij het verrichten van de activiteit, bedoeld in
      [artikel 4.491][ref1], met uitzondering van het tanken van gasolie, diesel of huisbrandolie met een vlampunt van
      55 °C of hoger, voldaan aan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.495
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.39'
  - number: 4.495.a
    text: PGS 28 als vanuit een ondergrondse opslagtank wordt getankt; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.495
  - number: 4.495.b
    text: PGS 30 als vanuit een bovengrondse opslagtank wordt getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.495
  - number: 4.496.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen of ureum wordt getankt
      boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.496
  - number: 4.496.2
    text: De tankzuil en het vulpistool bevinden zich boven een aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.496
  - number: 4.496.3
    text: Er wordt getankt door of onder direct toezicht van personeel.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.496
  - number: 4.497.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen of ureum wordt bij het
      tanken met een elektrische pomp gebruik gemaakt van een vulpistool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.497
  - number: 4.497.2
    text: 'Het vulpistool heeft een automatisch afslagmechanisme dat afslaat als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.497
  - number: 4.497.2.a
    text: de brandstoftank vol is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.497
  - number: 4.497.2.b
    text: het vulpistool valt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.497
  - number: 4.498.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van een aaneengesloten
      bodemvoorziening bij het tanken van vloeibare brandstoffen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.498
  - number: 4.498.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.498
  - number: '4.499'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.499
  - number: 4.499.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.499
  - number: 4.499.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.499
  - number: 4.500.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.500
