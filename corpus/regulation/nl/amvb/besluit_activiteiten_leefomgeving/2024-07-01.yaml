      onder of gelijk aan de interventiewaarde bodemkwaliteit of boven de interventiewaarde bodemkwaliteit dat wordt
      geloosd op een oppervlaktewaterlichaam zijn de emissiegrenswaarden de waarden, bedoeld in tabel 6.56hd, gemeten in
      een steekmonster.
