  - number: 4.337.1
    text: |-
      Het is verboden een milieubelastende activiteit als bedoeld in [artikel 4.336][ref1] te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.337
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.337.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.337
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.338'
    text: |-
      Bij het verrichten van een activiteit als bedoeld in [artikel 4.336][ref1] wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.338
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.338.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.338
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.338.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.338
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: '4.339'
    text: Met het oog op het beschermen van het milieu worden geen perfluoroctaansulfonaten gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.339
  - number: 4.340.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem worden bodembedreigende stoffen verwerkt boven een
      aaneengesloten bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.340
  - number: 4.340.2
    text: |-
      Een dompelbad dat zich automatisch vult, heeft een automatisch afslagmechanisme dat afslaat als het dompelbad vol
      is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.340
  - number: 4.341.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het reinigen, lijmen
      of coaten, bedoeld in [artikel 4.336][ref1], geloosd in een vuilwaterriool.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.341
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.341.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.341
  - number: '4.342'
    text: |-
      Voor het afvalwater afkomstig van het reinigen van metalen, dat wordt geloosd in een vuilwaterriool, is de
      emissiegrenswaarde voor olie 20 mg/l, gemeten in een steekmonster, of dat afvalwater wordt voor vermenging met
      ander afvalwater geleid door een slibvangput en olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.342
  - number: 4.342.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.342
  - number: 4.342.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.342
  - number: '4.343'
    text: |-
      Voor het afvalwater afkomstig van het verwijderen van verflagen van hout dat wordt geloosd in een vuilwaterriool,
      zijn de emissiegrenswaarden de waarden, bedoeld in tabel 4.343, gemeten in een steekmonster of in een
      etmaalmonster.
          Tabel 4.343 Emissiegrenswaarden


                  *Stof*


                  *Emissiegrenswaarden in mg/l, gemeten in een steekmonster*


                  *Emissiegrenswaarden in mg/l, gemeten in een etmaalmonster*


                  Lood


                  6


                  2


                  Zink


                  6


                  2


                  Adsorbeerbare organisch gebonden halogenen


                  3


                  1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.343
  - number: 4.344.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: 4.344.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: 4.344.3
    text: 'Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: 4.344.3.a
    text: 'voor adsorbeerbare organisch gebonden halogenen: NEN-EN-ISO 9562;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: 4.344.3.b
    text: |-
      voor lood en zink: NEN 6966, NEN-EN-ISO 17294-2, NEN-EN-ISO 11885 of NEN 6965, waarbij de elementen worden
      ontsloten volgens NEN-EN-ISO 15587-1 of NEN-EN-ISO 15587-2; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: 4.344.3.c
    text: 'voor olie: NEN-EN-ISO 9377-2.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.344
  - number: '4.345'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.345
  - number: 4.345.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.345
  - number: 4.345.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.345
  - number: 4.345.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.345
  - number: '4.346'
    text: Met het oog op het voorkomen of beperken van diffuse emissies in de lucht wordt de lucht afgezogen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.346
  - number: 4.347.1
    text: |-
      Met het oog op het beperken van emissies in de lucht en het voorkomen of het tot een aanvaardbaar niveau beperken
      van geurhinder worden dampen en gassen die vrijkomen aan de bron afgezogen bij:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.1.a
    text: |-
      het reinigen, lijmen of coaten van voorwerpen door het vernevelen van vluchtige organische stoffen met een
      nevelspuit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.1.b
    text: het coaten van voorwerpen door het opbrengen van poeder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.1.c
    text: |-
      het reinigen, lijmen of coaten van voorwerpen met vluchtige organische stoffen door dompeling in open of
      halfgesloten baden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.1.d
    text: het lijmen of coaten van voorwerpen met producten die vluchtige organische stoffen bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.1.e
    text: |-
      het aansluitend aan het reinigen, lijmen of coaten, bedoeld onder a tot en met d, drogen of uitharden van
      oppervlakken met vluchtige organische stoffen behandelde materialen of het moffelen van materialen met een
      poedercoating.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.2
    text: Het eerste lid, onder c, is niet van toepassing op hoogkokende stoffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.347.3
    text: Emissies in de lucht worden bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.347
  - number: 4.348.1
    text: Voor de emissie in de lucht is de emissiegrenswaarde voor totaal stof 5 mg/Nm3, gemeten in een eenmalige meting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.348
  - number: 4.348.2
    text: Het eerste lid is niet van toepassing als de emissie van totaal stof niet meer is dan 100 kg/jaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.348
  - number: 4.348.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan als de afgezogen emissies door een geschikte filtrerende afscheider
      worden gevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.348
  - number: 4.349.1
    text: Op het verrichten van emissiemetingen van totaal stof is NEN-EN 15259 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.349
  - number: 4.349.2
    text: Op het verrichten van een eenmalige meting is voor totaal stof NEN-EN 13284-1 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.349
  - number: 4.350.1
    text: Er wordt gemeten of aan de emissiegrenswaarde voor totaal stof wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.350
  - number: 4.350.2
    text: |-
      Het eerste lid is niet van toepassing als de maatregel, bedoeld in [artikel 4.348, derde lid][ref1], wordt
      getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.350
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.351.1
    text: |-
      Een eenmalige meting bestaat uit drie deelmetingen van ten minste 15 minuten en ten hoogste een half uur. Dit geldt
      niet als een langere bemonsteringstijd voortvloeit uit de meetmethode of de representatieve wijze van bemonsteren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.351
  - number: 4.351.2
    text: |-
      Het resultaat van de eenmalige meting zijn de gevalideerde meetresultaten. Dat zijn de meetresultaten van de
      deelmetingen, verminderd met de aangetoonde meetonzekerheid, die niet meer is dan 30% van de emissiegrenswaarde.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.351
  - number: 4.351.3
    text: De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.351
  - number: 4.351.4
    text: |-
      De meting wordt verricht door een laboratorium met een accreditatie volgens NEN-EN-ISO/IEC 17025 voor de norm die
      volgens [artikel 4.349][ref1] van toepassing is op de stof die wordt gemeten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.351
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.352.1
    text: |-
      Met het oog op het beperken van emissies in de lucht worden bij het reinigen, lijmen of coaten waarbij aan
      organische oplosmiddelen ten minste 1.000 kg/jaar wordt gebruikt, oplosmiddelarme producten en applicatiemethoden
      toegepast.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.2
    text: 'Aan het eerste lid wordt in ieder geval voldaan als producten, met uitzondering van planten of delen van planten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.2.a
    text: een gehalte vluchtige organische stof van ten hoogste 150 g/l voor gebruiksklare producten hebben;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.2.b
    text: |-
      voldoen aan de eisen die in het [Besluit organische oplosmiddelen in verven en vernissen milieubeheer][ref1] aan
      het maximale gehalte vluchtige organische stof zijn gesteld; of


      [ref1]: https://wetten.overheid.nl/BWBR0027674
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
    references:
      - id: ref1
        bwb_id: BWBR0027674
  - number: 4.352.2.c
    text: een gehalte vluchtige organische stof van ten hoogste 30 volumeprocent in reinigingsmiddelen hebben.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.3
    text: |-
      Aan het eerste lid wordt bij het coaten van planten of delen van planten in ieder geval voldaan als een
      dompelmethode wordt gebruikt met:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.3.a
    text: een volledig watergedragen verfbad bij droogbloemen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.352.3.b
    text: |-
      een watergedragen verfbad met ten hoogste 15 volumeprocent vluchtige organische stoffen die bestaan uit vloeibare
      kleurstoffen en, voor zover nodig, uitvloeimiddelen, bevochtigingsmiddelen of anti-schuimmiddelen bij snijbloemen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.352
  - number: 4.353.1
    text: |-
      Met het oog op het beperken van emissies in de lucht worden bij het reinigen waarbij aan organische oplosmiddelen
      ten minste 1.000 kg/jaar wordt gebruikt de volgende maatregelen getroffen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: 4.353.1.a
    text: droog reinigen als dit mogelijk is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: 4.353.1.b
    text: reiniging met waterige middelen als droog reinigen technisch niet mogelijk is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: 4.353.1.c
    text: |-
      reiniging met organische oplosmiddelen in een procesbad dat is uitgevoerd in een gesloten systeem als reiniging met
      waterige middelen technisch niet mogelijk is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: 4.353.1.d
    text: |-
      reiniging met hoogkokende niet-gehalogeneerde oplosmiddelen als reiniging in een gesloten systeem technisch niet
      mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: 4.353.2
    text: |-
      In een gesloten systeem wordt de inneemzone en uitneemzone ten minste een minuut gesloten gehouden na beëindiging
      van het gebruik van de pompinstallatie of persluchtinstallatie.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.353
  - number: '4.354'
    text: Met het oog op het beschermen van de gezondheid worden de afgezogen emissies bovendaks en omhoog gericht afgevoerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.354
  - number: 4.355.1
    text: |-
      Deze paragraaf is van toepassing op het onderhouden en repareren van verbrandingsmotoren of gemotoriseerde
      voertuigen, vliegtuigen, vaartuigen of werktuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
  - number: 4.355.2
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
  - number: 4.355.2.a
    text: |-
      het lassen van metalen, bedoeld in [paragraaf 4.16][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.16'
  - number: 4.355.2.b
    text: |-
      het solderen van metalen, bedoeld in [paragraaf 4.17][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.17'
  - number: 4.355.2.c
    text: |-
      het mechanisch en thermisch bewerken, bedoeld in [paragraaf 4.18][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.18'
  - number: 4.355.2.d
    text: |-
      het mechanisch bewerken van diverse materialen, bedoeld in [paragraaf 4.20][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.20'
  - number: 4.355.2.e
    text: |-
      het reinigen, lijmen en coaten van diverse materialen, bedoeld in [paragraaf 4.21][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.355.2.f
    text: |-
      het schoonmaken van pleziervaartuigen, bedoeld in [paragraaf 4.24][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.24'
  - number: 4.355.2.g
    text: |-
      het verwerken van polyesterhars, bedoeld in [paragraaf 4.27][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.27'
  - number: 4.355.2.h
    text: |-
      een wasstraat of wasplaats, bedoeld in [paragraaf 4.44][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.44'
  - number: 4.355.2.i
    text: |-
      het verwijderen van graffiti, bedoeld in [paragraaf 4.45][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.355
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.45'
  - number: 4.355.2.j
    text: |-
      het reinigen van voertuigen of werktuigen voor agrarische activiteiten, bedoeld in [paragraaf 4.90][ref1].


