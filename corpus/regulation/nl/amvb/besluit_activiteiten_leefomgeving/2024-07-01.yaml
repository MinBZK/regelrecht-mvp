  - number: 4.1306.1
    text: |-
      Als een maatwerkregel of maatwerkvoorschrift is gesteld voor 1 januari 2022 voor een dieselmotor met een nominaal
      thermisch ingangsvermogen van minder dan 600 kW op een offshore oliewinningsplatform of gaswinningsplatform
      waarmee de emissiegrenswaarde voor stikstofoxiden is verhoogd tot meer dan 150 mg/Nm3, wordt elke 5 jaar een
      haalbaarheidsstudie over de vermindering van de emissies van stikstofoxiden verstrekt aan het bevoegd gezag,
      bedoeld in [afdeling 2.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
