        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.11'
  - number: 4.200.3
    text: |-
      Het eerste lid is niet van toepassing bij het aanbrengen van conversielagen op metalen als de maatregelen, bedoeld
      in [artikel 4.196, derde en vierde lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.200
    references:
      - id: ref1
