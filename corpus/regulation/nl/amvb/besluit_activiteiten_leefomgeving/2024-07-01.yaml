      of telen functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.221
  - number: 3.221.3
    text: 'Onder de aanwijzing vallen niet de activiteiten, bedoeld in het eerste lid, als die alleen worden verricht:'
