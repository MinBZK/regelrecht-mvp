              vloeibaar_bestaand_residuen,
              vloeibaar_50_100mw,
              vloeibaar_overig,
              gas_turbine_steg, gas_motor,
              gas_bestaand_turbine_steg,
              gas_ander_aardgas,
              gas_ander_bestaand,
              gas_ander_overig
