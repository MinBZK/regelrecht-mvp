        afdeling: '2.2'
  - number: '4.526'
    text: |-
      Met het oog op het waarborgen van de veiligheid is overnachting door derden en recreatief verblijf niet toegestaan
      binnen 20 m vanaf het vulpunt van een bunkerstation en de zijden van een bunkerstation, als in het bunkerstation
      brandstoffen van ADR-klasse 3, met uitzondering van gasolie, diesel of huisbrandolie met een vlampunt van 55 °C of
      hoger, worden opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.526
  - number: '4.527'
    text: |-
      Met het oog op het waarborgen van de veiligheid en het voorkomen van verontreiniging van een
      oppervlaktewaterlichaam zijn de artikelen 21, 46 en 47 van [bijlage 3.8 bij de Binnenvaartregeling][ref1] van
      overeenkomstige toepassing op een bunkerstation waarop [artikel 6 van het Binnenvaartbesluit][ref2] niet van
      toepassing is.


      [ref1]: https://wetten.overheid.nl/BWBR0025958
      [ref2]: https://wetten.overheid.nl/BWBR0025631#Artikel6
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.527
    references:
      - id: ref1
        bwb_id: BWBR0025958
      - id: ref2
        bwb_id: BWBR0025631
        artikel: '6'
  - number: 4.528.1
    text: |-
      [Artikel 4.524, eerste, tweede en derde lid][ref1], is niet van toepassing op bunkerstations die zijn geïnstalleerd
      voor 1 januari 2011.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.528
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.41'
  - number: 4.528.2
    text: |-
      De [artikelen 4.524, eerste en tweede lid][ref1], en [4.525][ref2] zijn niet van toepassing op het opslaan van
      vloeibare brandstoffen in een bunkerstation dat voor de inwerkingtreding van dit besluit al rechtmatig werd
      verricht, mits die activiteit naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de
      inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.528
    references:
