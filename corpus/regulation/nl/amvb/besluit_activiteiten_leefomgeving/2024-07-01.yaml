        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.21'
  - number: 4.563.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.462][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.563
    references:
