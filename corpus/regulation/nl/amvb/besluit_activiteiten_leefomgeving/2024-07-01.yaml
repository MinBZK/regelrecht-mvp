  - number: 7.47.1.a
    text: het zich bevinden in dat beperkingengebied; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
  - number: 7.47.1.b
    text: |-
      het aanwezig hebben van een object, anders dan voor het verrichten van een milieubelastende activiteit met
      betrekking tot een mijnbouwwerk als bedoeld in [artikel 3.320][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.10.1
        afdeling: '3.10'
  - number: 7.47.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, van de wet][ref1], om zonder omgevingsvergunning een
      beperkingengebiedactiviteit met betrekking tot een andere installatie dan een mijnbouwinstallatie te verrichten,
      geldt voor de activiteiten, bedoeld in [artikel 7.46][ref2], die worden verricht in het beperkingengebied met
      betrekking tot die installatie, voor zover het gaat om het zich bevinden in dat beperkingengebied.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.47
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
