        hoofdstuk: '2'
        afdeling: '2.1'
  - number: 3.111.1.a
    text: |-
      het exploiteren van een ippc-installatie voor het maken van keramische producten door verhitting, bedoeld in
      categorie 3.5 van bijlage I bij de richtlijn industriële emissies;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.111
  - number: 3.111.1.b
    text: |-
      het maken van producten van glas, met een oven met een nominaal thermisch ingangsvermogen van meer dan 100 kW of
      een aansluitwaarde van meer dan 100 kW;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel3.111
