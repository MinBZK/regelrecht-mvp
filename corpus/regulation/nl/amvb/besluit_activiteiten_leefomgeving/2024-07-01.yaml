  - number: '4.826'
    text: 'Met het oog op het beperken van emissies in de lucht bij gebruik van een luchtwassysteem is:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.826
  - number: 4.826.a
    text: |-
      de capaciteit ten minste gelijk aan de totale maximale ventilatiebehoefte van het aantal en de categorie
      landbouwhuisdieren die worden gehouden in een huisvestingssysteem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.826
  - number: 4.826.b
    text: 'voor een evenredige verdeling van de stallucht door het luchtwassysteem:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.826
  - number: 4.826.b.1°
    text: |-
      de doorstroomoppervlakte van het luchtkanaal ten minste 1 cm2/m3 lucht bij de maximale capaciteit van het
      luchtwassysteem; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.826
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: doorstroomoppervlakte_cm2_per_m3
            type: number
            required: true
            description: Doorstroomoppervlakte van het luchtkanaal in cm2/m3 lucht
            source: {}
        output:
          - name: voldoet_doorstroomoppervlakte
            type: boolean
            description: Of de doorstroomoppervlakte ten minste 1 cm2/m3 lucht bedraagt
        actions:
          - output: voldoet_doorstroomoppervlakte
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $doorstroomoppervlakte_cm2_per_m3
              value: 1
  - number: 4.826.b.2°
    text: |-
      de afstand tussen de ventilatoren die de lucht uit het huisvestingssysteem zuigen en de eerste reinigingsstap ten
      minste 3 m en, als de ventilatoren na het filterpakket zijn geplaatst, de afstand tussen de laatste reinigingsstap
      en de ventilatoren ten minste 1 m.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.826
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: afstand_ventilator_eerste_stap_m
            type: number
            required: true
            description: Afstand in meters tussen de ventilatoren en de eerste reinigingsstap
            source: {}
          - name: ventilatoren_na_filter
            type: boolean
            required: true
            description: Of de ventilatoren na het filterpakket zijn geplaatst
            source: {}
          - name: afstand_laatste_stap_ventilator_m
            type: number
            required: false
            description: Afstand in meters tussen de laatste reinigingsstap en de ventilatoren (indien na filter)
            source: {}
        output:
          - name: voldoet_afstand_luchtwasser
            type: boolean
            description: Of de afstanden bij het luchtwassysteem voldoen
        actions:
          - output: voldoet_afstand_luchtwasser
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $ventilatoren_na_filter
                    value: true
                  then:
                    operation: AND
                    conditions:
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $afstand_ventilator_eerste_stap_m
                        value: 3
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $afstand_laatste_stap_ventilator_m
                        value: 1
              default:
                operation: GREATER_THAN_OR_EQUAL
                subject: $afstand_ventilator_eerste_stap_m
                value: 3
  - number: 4.827.1
    text: 'Met het oog op het beperken van emissies in de lucht bij gebruik van een luchtwassysteem:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.827
  - number: 4.827.1.a
    text: is er een werkinstructie beschikbaar; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.827
  - number: 4.827.1.b
    text: |-
      wordt het luchtwassysteem ten minste eenmaal per twaalf maanden door een ter zake deskundige onderhouden en
      gecontroleerd op de deugdelijkheid van het functioneren hiervan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.827
  - number: 4.827.2
    text: |-
      In de werkinstructie is in ieder geval beschreven welke werkwijze wordt gevolgd bij de controles en schoonmaak van
      het luchtwassysteem en welke maatregelen als bedoeld in [artikel 4.829, tweede lid][ref1], worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.827
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.82'
  - number: 4.828.1
    text: |-
      Als landbouwhuisdieren worden gehouden in een huisvestingssysteem met een luchtwassysteem is een door de
      leverancier van het luchtwassysteem afgegeven opleveringsverklaring beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2
    text: 'De opleveringsverklaring bevat in ieder geval de volgende gegevens:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.a
    text: |-
      per luchtwassysteem: het aantal landbouwhuisdieren per diercategorie dat kan worden gehouden en de maximale
      ventilatiebehoefte van die landbouwhuisdieren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.b
    text: de maximale capaciteit van het luchtwassysteem in kubieke meters per uur;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.c
    text: de aanstroomoppervlakte van het filterpakket waardoor lucht stroomt in vierkante meters;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.d
    text: de afmetingen, het volume en de samenstelling van het filterpakket;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.e
    text: de afmetingen van de drukkamer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.f
    text: de drukval over het filterpakket in Pascal;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.g
    text: het zuurverbruik in liters per dag als er een chemische wasstap is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.h
    text: het elektriciteitsverbruik van de waswaterpomp in kilowatt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.i
    text: het spuiwaterdebiet in liters per uur en de spuifrequentie; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.2.j
    text: het waswaterdebiet in liters per uur.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.828.3
    text: De parameters van het luchtwassysteem blijven binnen de bandbreedtes van de opleveringsverklaring.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.828
  - number: 4.829.1
    text: |-
      Het luchtwassysteem heeft een elektronisch monitoringssysteem waarmee de volgende parameters elk uur worden
      geregistreerd:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.1.a
    text: de pH van het waswater;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.1.b
    text: de geleidbaarheid van het waswater in milliSiemens per centimeter;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.1.c
    text: de totale spuiwaterproductie in kubieke meters vanaf het in werking stellen van het luchtwassysteem;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.1.d
    text: de drukval over het filterpakket in Pascal; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.1.e
    text: |-
      het totale elektriciteitsverbruik van de waswaterpomp in kilowatt vanaf het in werking stellen van het
      luchtwassysteem.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.2
    text: |-
      Als uit de monitoring blijkt dat de parameters buiten de bandbreedtes van de opleveringsverklaring of de
      systeembeschrijving vallen, worden maatregelen getroffen om de werking van het luchtwassysteem te waarborgen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.3
    text: |-
      Het waswater heeft een laagdebietalarmering die zo spoedig mogelijk in werking treedt als het debiet van het
      waswater te laag is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.829.4
    text: De parameters worden geregistreerd volgens de bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.829
  - number: 4.830.1
    text: Bij de spuiwaterproductie is per spuiwaterstroom een geschikte debietmeter in de spuileiding aanwezig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.830
  - number: 4.830.2
    text: |-
      De sensoren voor het meten van de pH en het meten van de geleidbaarheid van het waswater worden ten minste eenmaal
      per zes maanden gekalibreerd door een ter zake deskundige.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.830
  - number: 4.831.1
    text: |-
      [Artikel 4.818][ref1] is niet van toepassing op een huisvestingssysteem, met inbegrip van een
      aanvullende techniek, voor melkkoeien van twee jaar en ouder en kalfkoeien van twee jaar en
      ouder dat deel uitmaakt van een dierenverblijf dat voor 1 juli 2015 is opgericht en voldoet aan
      __REF001___________________________________________________________________________________________________________
