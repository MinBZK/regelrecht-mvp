    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.267
  - number: '4.268'
    text: |-
      Aan [artikel 4.267, eerste lid][ref1], wordt voor totaal stof in ieder geval voldaan als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.268
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.16'
  - number: 4.268.a
    text: 'per jaar niet meer dan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.268
  - number: 4.268.a.1°
    text: 6.500 kg lastoevoegmateriaal en laselektroden wordt gebruikt bij laswerkzaamheden van klasse III; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.268
  - number: 4.268.a.2°
    text: |-
      200 kg lastoevoegmateriaal en laselektroden wordt gebruikt bij laswerkzaamheden van klasse V, VI en VII, waarbij
      roestvast staal wordt gelast met beklede elektroden of met MAG gevulde draad, of andere materialen worden gelast
      met gelegeerde elektrode of met gelegeerde gevulde draad; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.268
  - number: 4.268.b
    text: 'bij laswerkzaamheden van klasse III tot en met VII:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.268
  - number: 4.268.b.1°
    text: de afgezogen lucht wordt gerecirculeerd; of
