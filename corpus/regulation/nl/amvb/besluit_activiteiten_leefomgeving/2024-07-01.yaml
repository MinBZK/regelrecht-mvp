    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.656
  - number: 4.657.1
    text: |-
      Op het verrichten van emissiemetingen van de stoffen, ingedeeld in de stofklassen, bedoeld in [tabel 4.656][ref1],
      is NEN-EN 15259 van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.55'
  - number: 4.657.2
    text: 'Op het verrichten van een eenmalige meting is van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.a
    text: 'voor onverbrande koolwaterstoffen: NEN-EN 12619;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.b
    text: 'voor totaal stof: NEN-EN 13284-1;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.c
    text: 'voor zware metalen: NEN-EN 14385;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.d
    text: 'voor zoutzuur: NEN-EN 1911;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.e
    text: 'voor waterstoffluoride: NEN-ISO 15713;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.f
    text: 'voor ammoniak: NEN 2826;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.g
    text: 'voor individuele gasvormige organische componenten: NPR-CEN/TS 13649;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.h
    text: 'voor vocht: NEN-EN 14790; en'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.657.2.i
    text: 'voor debiet: NEN-EN-ISO 16911-1.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.657
  - number: 4.658.1
    text: |-
      Er wordt gemeten of aan de emissiegrenswaarden, bedoeld in [tabel 4.656][ref1], wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.658
    references:
