        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
      - id: ref4
        bwb_id: BWBR0041330
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.31.3
    text: |-
      Een maatwerkvoorschrift wordt niet gesteld als over dat onderwerp een voorschrift aan een omgevingsvergunning als
      bedoeld in deze afdeling kan worden verbonden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.31
  - number: 11.31.4
    text: |-
      Op het stellen van een maatwerkvoorschrift over een flora- en fauna-activiteit zijn de beoordelingsregels en de
      bepalingen over vergunningvoorschriften in [paragraaf 8.6.2 van het Besluit kwaliteit leefomgeving][ref1] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Paragraaf8.6.2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.31
    references:
      - id: ref1
        bwb_id: BWBR0041313
        paragraaf: 8.6.2
  - number: '11.32'
    text: |-
      Als gegevens en bescheiden worden verstrekt aan het bevoegd gezag, bedoeld in [artikel 11.24][ref1] of
      [11.25][ref2], worden die ondertekend en voorzien van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.32.a
    text: de aanduiding van de activiteit;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.32
  - number: 11.32.b
    text: de naam en het adres van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.32
  - number: 11.32.c
    text: het adres, of de kadastrale aanduiding of coördinaten van de locatie waarop de activiteit wordt verricht; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.32
  - number: 11.32.d
    text: de dagtekening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.32
  - number: 11.33.1
    text: |-
      Voordat de naam of het adres, of de kadastrale aanduiding of coördinaten van de locatie, bedoeld in
      [artikel 11.32][ref1], wijzigen, worden de daardoor gewijzigde gegevens verstrekt aan het bevoegd gezag, bedoeld
      in [artikel 11.24][ref2] of [11.25][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.33
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.33.2
    text: |-
      Ten minste vier weken voordat de activiteit door een ander zal gaan worden verricht, worden de daardoor gewijzigde
      gegevens verstrekt aan het bevoegd gezag, bedoeld in [artikel 11.24][ref1] of [11.25][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.33
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: '11.34'
    text: |-
      Het bevoegd gezag, bedoeld in [artikel 11.24][ref1] of [11.25][ref2], wordt onverwijld geïnformeerd over een
      ongewoon voorval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: '11.35'
    text: |-
      Zodra de volgende gegevens en bescheiden bekend zijn, worden ze verstrekt aan het bevoegd gezag, bedoeld in
      [artikel 11.24][ref1] of [11.25][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.35
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.35.a
    text: |-
      informatie over de oorzaken van het ongewoon voorval en de omstandigheden waaronder het ongewoon voorval zich heeft
      voorgedaan;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.35
  - number: 11.35.b
    text: |-
      gegevens die nodig zijn om de aard en de ernst van de gevolgen voor de fysieke leefomgeving te kunnen inschatten;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.35
  - number: 11.35.c
    text: |-
      informatie over de maatregelen die zijn getroffen of worden overwogen om de nadelige gevolgen van het ongewoon
      voorval te voorkomen als bedoeld in [artikel 19.1, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.35
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '11.36'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift worden de [artikelen 11.34][ref1] en [11.35][ref2] niet versoepeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.36
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.37.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.37.1.a
    text: |-
      het opzettelijk doden of opzettelijk vangen van van nature in Nederland in het wild levende vogels van soorten als
      bedoeld in artikel 1 van de vogelrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.1.b
    text: |-
      het opzettelijk vernielen of opzettelijk beschadigen van nesten, rustplaatsen en eieren van vogels als bedoeld
      onder a, of het opzettelijk wegnemen van nesten van die vogels;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.1.c
    text: het rapen en onder zich hebben van eieren van vogels als bedoeld onder a; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.1.d
    text: het opzettelijk storen van vogels als bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.2
    text: 'Het verbod geldt niet, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.2.a
    text: |-
      het verrichten van die activiteit op grond van een andere wet is toegestaan en is voldaan aan de artikelen 9,
      eerste en tweede lid, en 13 van de vogelrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.2.b
    text: 'de activiteit uitvoering geeft aan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.2.b.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.2.b.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.37.3
    text: |-
      Het verbod op het opzettelijk storen van vogels, bedoeld in het eerste lid, onder d, geldt niet, als het storen
      niet van wezenlijke invloed is op de staat van instandhouding van de vogelsoort.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.37
  - number: 11.38.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor het verkopen, vervoeren voor verkoop,
      onder zich hebben voor verkoop of aanbieden voor verkoop van dode of levende vogels van soorten als bedoeld in
      artikel 1 van de vogelrichtlijn, gemakkelijk herkenbare delen van die vogels of uit die vogels verkregen producten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.38.2
    text: |-
      Het verbod geldt niet voor vogels van soorten, genoemd in bijlage III, deel A, bij de vogelrichtlijn, die
      aantoonbaar in overeenstemming met de regels van dit hoofdstuk zijn gedood, gevangen of verkregen en op delen of
      producten van die vogels.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.38
  - number: 11.39.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor het om een andere reden dan
      verkoop onder zich hebben of vervoeren van dode of levende vogels van soorten als bedoeld in artikel 1 van de
      vogelrichtlijn, gemakkelijk herkenbare delen van die vogels of uit die vogels verkregen producten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.39.2
    text: 'Het verbod geldt niet, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.39.2.a
    text: |-
      de vogels, delen of producten aantoonbaar in overeenstemming met de regels van dit hoofdstuk zijn gedood, gevangen,
      of verkregen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.39.2.b
    text: |-
      het verrichten van de activiteit op grond van een andere wet is toegestaan en is voldaan aan de artikelen 9, eerste
      en tweede lid, en 13 van de vogelrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.39.2.c
    text: 'de activiteit deel uitmaakt van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.39.2.c.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.39.2.c.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.39
  - number: 11.40.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.40.1.a
    text: |-
      het vangen of doden van van nature in Nederland in het wild levende vogels van soorten als bedoeld in artikel 1 van
      de vogelrichtlijn met:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.1.a.1°
    text: middelen die worden genoemd in bijlage IV, onder a, bij die richtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.1.a.2°
    text: middelen, installaties of methoden voor het massaal of niet-selectief vangen of doden van vogels; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.1.a.3°
    text: middelen, installaties of methoden waardoor een soort plaatselijk kan verdwijnen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.1.b
    text: |-
      het achtervolgen van vogels van deze soorten met behulp van vervoermiddelen die worden genoemd in bijlage IV,
      onder b, bij de vogelrichtlijn, op de daar beschreven wijze.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.2
    text: |-
      Tot de middelen, installaties of methoden, bedoeld in het eerste lid, onder a, onder 2° en 3°, worden in ieder
      geval gerekend:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.2.a
    text: eendenkooien die worden gebruikt anders dan voor de uitoefening van de jacht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.2.b
    text: bal-chatri;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.2.c
    text: |-
      het doden met middelen die krachtens de [Wet gewasbeschermingsmiddelen en biociden][ref1] zijn toegelaten of
      vrijgesteld;


      [ref1]: https://wetten.overheid.nl/BWBR0021670
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
    references:
      - id: ref1
        bwb_id: BWBR0021670
  - number: 11.40.2.d
    text: het vangen of doden met een middel waarmee elektronisch versterkte lokgeluiden kunnen worden gemaakt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.40.2.e
    text: het vangen of doden met een geweer dat is voorzien van een geluiddemper.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.40
  - number: 11.41.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt niet voor een flora- en fauna-activiteit
      als bedoeld in [artikel 11.37][ref2] of [11.39][ref3] in gevallen aangewezen in een programma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.41.2
    text: 'Het programma:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: 11.41.2.a
    text: |-
      heeft geheel of ook betrekking op de inrichting, het beheer of het gebruik van een Natura 2000-gebied en bevat
      maatregelen om de instandhoudingsdoelstellingen voor dat gebied te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: 11.41.2.b
    text: 'heeft tot doel, ook met het oog op een evenwichtige en duurzame economische ontwikkeling:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: 11.41.2.b.1°
    text: |-
      de belasting van natuurwaarden van Natura 2000-gebieden door bepaalde schadelijke factoren te verminderen en de
      instandhoudingsdoelstellingen te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: 11.41.2.b.2°
    text: |-
      het beheer, de bescherming, het behoud of het herstel van de van nature in Nederland in het wild voorkomende
      soorten dieren of planten of de in Nederland voorkomende natuurlijke habitats of habitats van soorten of het
      verbeteren van de staat van instandhouding van die soorten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: 11.41.2.c
    text: |-
      wordt vastgesteld door of gezamenlijk met het bestuursorgaan dat, als geen toepassing wordt gegeven aan het eerste
      lid, bevoegd is te beslissen op aanvragen om omgevingsvergunningen voor de betrokken flora- en fauna-activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.41
  - number: '11.42'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt in gevallen aangewezen in een
      omgevingsverordening niet voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.42
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.42.a
    text: |-
      een flora- en fauna-activiteit als bedoeld in de [artikelen 11.37, eerste lid][ref1], en
      [11.39, eerste lid][ref2], met betrekking tot vogels van bij de omgevingsverordening aangewezen soorten, of hun
      nesten, rustplaatsen of eieren; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
