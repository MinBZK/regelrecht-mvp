        afdeling: '11.2'
  - number: 11.43.1.b
    text: |-
      de flora- en fauna-activiteit wordt verricht door een grondgebruiker om schadeveroorzakende vogels van de volgende
      soorten te bestrijden:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.1.b.1°
    text: de Canadese gans (Branta Canadensis en Branta hutchinsii hutchinsii);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.1.b.2°
    text: de houtduif (Columba palumbus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.1.b.3°
    text: de kauw (Corvus monedula); of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.1.b.4°
    text: de zwarte kraai (Corvus corone corone).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt in bij ministeriële regeling aangewezen
      gevallen niet voor een flora- en fauna-activiteit als bedoeld in [artikel 11.38, eerste lid][ref2], met betrekking
      tot:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.43.2.a
    text: dode of levende vogels van bij die regeling aangewezen soorten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.2.b
    text: gemakkelijk herkenbare delen van deze vogels; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.43.2.c
    text: uit deze vogels verkregen producten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.43
  - number: 11.44.1
    text: |-
      Een flora- en fauna-activiteit wordt in een programma, een omgevingsverordening of een ministeriële regeling op
      grond van [artikel 11.41][ref1], [11.42][ref2] of [11.43][ref3] alleen als vergunningvrij geval aangewezen als de
      activiteit voldoet aan [artikel 8.74j, eerste lid, van het Besluit kwaliteit leefomgeving][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.44.2
    text: |-
      Het bestrijden door de grondgebruiker van schadeveroorzakende vogels wordt alleen als vergunningvrij geval
      aangewezen in een omgevingsverordening of een ministeriële regeling op grond van [artikel 11.42][ref1] of
      [11.43][ref2] en alleen als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.44.2.a
    text: |-
      het bestrijden voldoet aan [artikel 8.74j, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.44.2.b
    text: |-
      het bestrijden gebeurt op door de grondgebruiker gebruikte gronden, of in of aan door hem gebruikte opstallen, om
      schade die in het lopende of daarop volgende jaar dreigt op te treden op die gronden, in of aan die opstallen of in
      het omringende gebied te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.c
    text: |-
      deze schade wordt veroorzaakt door vogels van in de omgevingsverordening of ministeriële regeling genoemde soorten
      en is aan te merken als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.c.1°
    text: belangrijke schade aan gewassen, vee, bossen, visserij, of wateren; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.c.2°
    text: schade aan flora of fauna; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.d
    text: |-
      voor zover het [artikel 11.42][ref1] betreft, de in de omgevingsverordening genoemde vogelsoorten:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.44.2.d.1°
    text: niet in hun voortbestaan worden bedreigd en niet het gevaar lopen in hun voortbestaan te worden bedreigd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.d.2°
    text: in de provincie schade veroorzaken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.2.d.3°
    text: |-
      niet overeenkomen met de in [artikel 11.43, eerste lid, onder b][ref1], genoemde soorten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.44.3
    text: |-
      Het bestrijden door gemeenten van overlast veroorzakende vogels wordt alleen als vergunningvrij geval aangewezen in
      een omgevingsverordening op grond van [artikel 11.42][ref1] en alleen als het bestrijden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.44.3.a
    text: |-
      voldoet aan [artikel 8.74j, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.44.3.b
    text: plaatsvindt binnen een in het omgevingsplan of de omgevingsverordening begrensde bebouwingscontour;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.3.c
    text: plaatsvindt in het belang van de volksgezondheid, de openbare veiligheid of de veiligheid van het luchtverkeer; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.3.d
    text: 'betrekking heeft op in de omgevingsverordening genoemde vogelsoorten die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.3.d.1°
    text: niet in hun voortbestaan worden bedreigd en niet het gevaar lopen in hun voortbestaan te worden bedreigd; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.3.d.2°
    text: in de provincie overlast veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.4
    text: |-
      In een programma, een omgevingsverordening of een ministeriële regeling waarin vergunningvrije gevallen worden
      aangewezen die betrekking hebben op het vangen of doden van vogels wordt in ieder geval bepaald:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.4.a
    text: |-
      welke van de middelen, installaties of methoden, bedoeld in de [artikelen 8.74p][ref1] en
      [8.74q van het Besluit kwaliteit leefomgeving][ref2], voor het vangen of doden zijn toegestaan, waarbij alleen
      middelen, installaties en methoden worden toegestaan die nadelige gevolgen voor het welzijn van dieren voorkomen
      of, als dat niet mogelijk is, zoveel mogelijk beperken, waarbij het doden van dieren zoveel mogelijk wordt
      vermeden;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.44.4.b
    text: voor welke tijd en plaats de aanwijzing geldt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.4.c
    text: |-
      voor welke soorten vogels, of voor de nesten, rustplaatsen of eieren van welke soorten vogels, de aanwijzing geldt;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.4.d
    text: op welke wijze het risico voor het behoud van de vogelstand wordt beperkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.5
    text: |-
      Een aanwijzing van vergunningvrije gevallen als bedoeld in het tweede lid geldt ook voor het bestrijden van
      schadeveroorzakende dieren door de persoon of wildbeheereenheid die daarvoor een door de grondgebruiker verleende
      schriftelijke en gedagtekende toestemming heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.44.6
    text: De beperking van de omvang van populaties van in het wild levende dieren wordt niet als vergunningvrij aangewezen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.44
  - number: 11.45.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt in bij ministeriële regeling aangewezen
      gevallen niet voor flora- en fauna-activiteiten als bedoeld in de [artikelen 11.37, eerste lid][ref2], en
      [11.39, eerste lid][ref3], die in een bij die regeling aangewezen gedragscode worden beschreven en die:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.45.1.a
    text: aantoonbaar worden uitgevoerd in overeenstemming met de gedragscode; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.1.b
    text: 'plaatsvinden in het kader van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.1.b.1°
    text: |-
      het bestendig beheren of onderhouden van vaarwegen, watergangen, waterkeringen, waterstaatswerken, oevers,
      luchthavens, wegen, spoorwegen of bermen, of in het kader van natuurbeheer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.1.b.2°
    text: een bestendig beheer of onderhoud in de landbouw of de bosbouw,
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.1.b.3°
    text: een bestendig gebruik; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.1.b.4°
    text: ruimtelijke ontwikkeling of inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.2
    text: 'Een gedragscode wordt bij ministeriële regeling alleen aangewezen, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.2.a
    text: |-
      de daarin beschreven activiteiten voldoen aan
      [artikel 8.74j, eerste lid, onder b, van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.45.2.b
    text: |-
      daarin een wijze van verrichten van activiteiten is beschreven, waarmee naar het oordeel van Onze Minister voor
      Natuur en Stikstof afdoende is gewaarborgd dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.2.b.1°
    text: |-
      geen benutting of economisch gewin plaatsvindt van van nature in Nederland in het wild levende vogels van soorten
      als bedoeld in artikel 1 van de vogelrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.2.b.2°
    text: de activiteiten met betrekking tot die vogels zorgvuldig worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3
    text: 'Activiteiten worden in ieder geval zorgvuldig verricht als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3.a
    text: daarvan geen wezenlijke invloed uitgaat op de soorten waartoe de vogels behoren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3.b
    text: 'in redelijkheid alles wordt gedaan of nagelaten om te voorkomen of zoveel mogelijk te beperken dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3.b.1°
    text: de vogels worden gedood;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3.b.2°
    text: nesten van de vogels worden vernield, beschadigd of weggenomen, of rustplaatsen van vogels worden vernield; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.45.3.b.3°
    text: eieren van de vogels worden vernield.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.45
  - number: 11.46.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.46.1.a
    text: |-
      het in hun natuurlijk verspreidingsgebied opzettelijk doden of opzettelijk vangen van in het wild levende dieren
      van soorten, genoemd in bijlage IV, onder a, bij de habitatrichtlijn, bijlage II bij het verdrag van Bern of
      bijlage I bij het verdrag van Bonn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.1.b
    text: het opzettelijk verstoren van dieren als bedoeld onder a;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.1.c
    text: het in de natuur opzettelijk vernielen of rapen van eieren van dieren als bedoeld onder a;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.1.d
    text: het beschadigen of vernielen van de voortplantingsplaatsen of rustplaatsen van dieren als bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.1.e
    text: |-
      het opzettelijk plukken en verzamelen, afsnijden, ontwortelen of vernielen van planten van soorten, genoemd
      in bijlage IV, onder b, bij de habitatrichtlijn of bijlage I bij het verdrag van Bern, in hun natuurlijke
      verspreidingsgebied.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.2
    text: 'Het verbod geldt niet als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.2.a
    text: |-
      het verrichten van de activiteit op grond van een andere wet is toegestaan en is voldaan aan artikel 16, eerste
      lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.2.b
    text: 'de activiteit uitvoering geeft aan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.2.b.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.2.b.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.46.3
    text: |-
      Onder de soorten, bedoeld in het eerste lid, onder a, worden niet begrepen de soorten, bedoeld in artikel 1 van
      de vogelrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.46
  - number: 11.47.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.47.1.a
    text: |-
      het verkopen, vervoeren voor verkoop, verhandelen, ruilen of te koop of te ruil aanbieden van dieren of planten van
      soorten, genoemd in bijlage IV bij de habitatrichtlijn, bijlage I of II bij het verdrag van Bern of bijlage I bij
      het verdrag van Bonn, met uitzondering van de soorten, bedoeld in artikel 1 van de vogelrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.1.b
    text: |-
      het voor het om een andere reden dan verkoop onder zich hebben of vervoeren van dieren of planten als bedoeld
      onder a.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2
    text: 'Het verbod geldt niet als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.a
    text: de dieren en planten aantoonbaar zijn gefokt of gekweekt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.b
    text: |-
      het verrichten van de activiteit op grond van een andere wet is toegestaan en is voldaan aan artikel 16, eerste
      lid, van de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.c
    text: 'de activiteit deel uitmaakt van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.c.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.c.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: 11.47.2.d
    text: |-
      de dieren of planten uiterlijk op 10 juni 1994 aantoonbaar in overeenstemming met de op dat moment geldende
      regelgeving aan de natuur waren onttrokken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.47
  - number: '11.48'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor het vangen of doden van dieren,
      genoemd in bijlage IV, onder a, bij de habitatrichtlijn, of bijlage II bij het verdrag van Bern, en het aan de
      natuur onttrekken van dieren van soorten, genoemd in bijlage V, onder a, bij de habitatrichtlijn, of bijlage III
      bij het verdrag van Bern, met uitzondering van de soorten, bedoeld in artikel 1 van de vogelrichtlijn, door
      het gebruik van niet-selectieve middelen die de plaatselijke verdwijning of ernstige verstoring van de rust van
      populaties van soorten tot gevolg kunnen hebben, waartoe in ieder geval behoren:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.48
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.48.a
    text: de middelen, genoemd in bijlage VI, onder a, bij de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.48
  - number: 11.48.b
    text: de vervoermiddelen, genoemd in bijlage VI, onder b, bij de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.48
  - number: 11.49.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt niet voor een flora- en fauna-activiteit
      als bedoeld in de [artikelen 11.46, eerste lid][ref2], en [11.47, eerste lid][ref3], in gevallen aangewezen in
      een programma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.49.2
    text: 'Het programma:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: 11.49.2.a
    text: |-
      heeft geheel of ook betrekking op de inrichting, het beheer of het gebruik van een Natura 2000-gebied en bevat
      maatregelen om de instandhoudingsdoelstellingen voor dat gebied te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: 11.49.2.b
    text: 'heeft tot doel, ook met het oog op een evenwichtige en duurzame economische ontwikkeling:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: 11.49.2.b.1°
    text: |-
      de belasting van natuurwaarden van Natura 2000-gebieden door bepaalde schadelijke factoren te verminderen en de
      instandhoudingsdoelstellingen te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: 11.49.2.b.2°
    text: |-
      het beheer, de bescherming, het behoud of het herstel van de van nature in Nederland in het wild voorkomende
      soorten dieren of planten of de in Nederland voorkomende natuurlijke habitats of habitats van soorten of het
      verbeteren van de staat van instandhouding van die soorten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: 11.49.2.c
    text: |-
      wordt vastgesteld door of gezamenlijk met het bestuursorgaan dat, als geen toepassing wordt gegeven aan het eerste
      lid, bevoegd is te beslissen op aanvragen om omgevingsvergunningen voor de betrokken flora- en fauna-activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.49
  - number: '11.50'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt niet voor een flora- en fauna-activiteit in
      gevallen aangewezen in een omgevingsverordening:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.50.a
    text: |-
      als bedoeld in de [artikelen 11.46, eerste lid][ref1], en [11.47, eerste lid, aanhef en onder b][ref2], voor
      dieren of planten van bij de omgevingsverordening aangewezen soorten, of met betrekking tot voortplantingsplaatsen,
      rustplaatsen of eieren van dieren van bij de omgevingsverordening aangewezen soorten; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.50.b
    text: |-
      als bedoeld in [artikel 11.48][ref1], met betrekking tot bij de omgevingsverordening aangewezen middelen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.51.1
    text: |-
      Vergunningvrije gevallen als bedoeld in [artikel 11.50][ref1] worden aangewezen in een ministeriële regeling als
      Onze Minister voor Natuur en Stikstof bevoegd gezag is als bedoeld in [artikel 11.25, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.51.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt niet voor een in een ministeriële regeling
      aangewezen flora- en fauna-activiteit als bedoeld in [artikel 11.47, eerste lid, aanhef en onder a][ref2],
      met betrekking tot dieren of planten van bij de ministeriële regeling aangewezen soorten, of met betrekking tot
      voortplantingsplaatsen, rustplaatsen of eieren van dieren van bij de ministeriële regeling aangewezen soorten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.51
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.52.1
    text: |-
      Een flora- en fauna-activiteit wordt in een programma, een omgevingsverordening of een ministeriële regeling op
      grond van [artikel 11.49][ref1], [11.50][ref2] of [11.51][ref3] alleen als vergunningvrij geval aangewezen als de
      activiteit voldoet aan [artikel 8.74k, eerste lid, van het Besluit kwaliteit leefomgeving][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.52.2
    text: |-
      Het bestrijden door de grondgebruiker van schadeveroorzakende dieren wordt alleen als vergunningvrij geval
      aangewezen in een omgevingsverordening op grond van [artikel 11.50][ref1] en alleen als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.52.2.a
    text: |-
      het bestrijden voldoet aan [artikel 8.74k, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.52.2.b
    text: |-
      het bestrijden gebeurt op door de grondgebruiker gebruikte gronden, of in of aan door hem gebruikte opstallen, om
      schade die in het lopende of daarop volgende jaar dreigt op te treden in of aan die opstallen of in het omringende
      gebied te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.c
    text: >-
      deze schade wordt veroorzaakt door dieren van in
      de omgevingsverordening genoemde soorten en is
      aan te merken als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.c.1°
    text: schade aan de wilde flora of fauna, of natuurlijke habitats; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.c.2°
    text: ernstige schade aan met name gewassen, veehouderijen, bossen, visgronden, wateren of andere vormen van eigendom; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.d
    text: 'de in de omgevingsverordening genoemde diersoorten:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.d.1°
    text: niet in hun voortbestaan worden bedreigd of dat gevaar lopen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.2.d.2°
    text: in de provincie schade veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.3
    text: |-
      Het bestrijden door gemeenten van overlast veroorzakende dieren wordt alleen als vergunningvrij geval aangewezen in
      een omgevingsverordening op grond van [artikel 11.50][ref1] en alleen als het bestrijden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.52.3.a
    text: |-
      voldoet aan [artikel 8.74k, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.52.3.b
    text: plaatsvindt binnen een in het omgevingsplan of de omgevingsverordening begrensde bebouwingscontour;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.3.c
    text: |-
      plaatsvindt in het belang van de volksgezondheid, de openbare veiligheid of om andere dwingende redenen van groot
      openbaar belang; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.3.d
    text: 'betrekking heeft op in de omgevingsverordening genoemde diersoorten die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.3.d.1°
    text: niet in hun voortbestaan worden bedreigd of dat gevaar lopen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.3.d.2°
    text: in de provincie overlast veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.4
    text: |-
      In een programma, een omgevingsverordening of een ministeriële regeling waarin vergunningvrije gevallen worden
      aangewezen die betrekking hebben op het vangen of doden van dieren, wordt in ieder geval bepaald welke middelen
      voor het vangen of doden zijn toegestaan en worden alleen middelen toegestaan die nadelige gevolgen voor het
      welzijn van dieren voorkomen of, als dat niet mogelijk is, zoveel mogelijk beperken, waarbij het doden van dieren
      zoveel mogelijk wordt vermeden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.5
    text: |-
      Een aanwijzing van vergunningvrije gevallen als bedoeld in het tweede lid geldt ook voor het bestrijden van
      schadeveroorzakende dieren door de persoon of wildbeheereenheid die daarvoor een door de grondgebruiker verleende
      schriftelijke en gedagtekende toestemming heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.52.6
    text: De beperking van de omvang van populaties van in het wild levende dieren wordt niet als vergunningvrij aangewezen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.52
  - number: 11.53.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt in bij ministeriële regeling aangewezen
      gevallen niet voor flora- en fauna-activiteiten als bedoeld in de [artikelen 11.46, eerste lid][ref2], en
      [11.47, eerste lid, aanhef en onder b][ref3], die in een bij die regeling aangewezen gedragscode worden beschreven
      en die:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.53.1.a
    text: aantoonbaar worden uitgevoerd in overeenstemming met die gedragscode; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.1.b
    text: 'plaatsvinden in het kader van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.1.b.1°
    text: |-
      het bestendig beheren of onderhouden van vaarwegen, watergangen, waterkeringen, waterstaatswerken, oevers,
      luchthavens, wegen, spoorwegen of bermen, of in het kader van natuurbeheer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.1.b.2°
    text: een bestendig beheer of onderhoud in de landbouw of de bosbouw;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.1.b.3°
    text: een bestendig gebruik; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.1.b.4°
    text: ruimtelijke ontwikkeling of inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.2
    text: 'Een gedragscode wordt bij ministeriële regeling alleen aangewezen, als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.2.a
    text: |-
      de daarin beschreven activiteiten voldoen aan
      [artikel 8.74k, eerste lid, onder b, van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.53.2.b
    text: |-
      daarin een wijze van verrichten van activiteiten is beschreven, waarmee naar het oordeel van Onze Minister voor
      Natuur en Stikstof afdoende is gewaarborgd dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.2.b.1°
    text: |-
      geen benutting of economisch gewin plaatsvindt van dieren van soorten, genoemd in bijlage IV, onder a, bij de
      habitatrichtlijn, bijlage II bij het verdrag van Bern of bijlage I bij het verdrag van Bonn, met uitzondering van
      de soorten, bedoeld in artikel 1 van de vogelrichtlijn, en van planten van soorten, genoemd in bijlage IV, onder b,
      bij de habitatrichtlijn of bijlage I bij het verdrag van Bern; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.2.b.2°
    text: de activiteiten met betrekking tot die dieren en planten zorgvuldig worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3
    text: 'Activiteiten worden in ieder geval zorgvuldig verricht als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.a
    text: daarvan geen wezenlijke invloed uitgaat op de soorten waartoe de dieren of de planten behoren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.b
    text: 'in redelijkheid alles wordt gedaan of nagelaten om te voorkomen of zoveel mogelijk te beperken dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.b.1°
    text: de dieren worden gedood;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.b.2°
    text: voortplantingsplaatsen of rustplaatsen van de dieren worden beschadigd of vernield;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.b.3°
    text: eieren van de dieren worden vernield; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.53.3.b.4°
    text: de planten worden geplukt, afgesneden, ontworteld of vernield.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.53
  - number: 11.54.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.54.1.a
    text: |-
      het opzettelijk doden of vangen van in het wild levende zoogdieren, amfibieën, reptielen, vissen, dagvlinders,
      libellen en kevers van de soorten, genoemd in [bijlage IX][ref1], onder A;


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.54.1.b
    text: |-
      het opzettelijk beschadigen of vernielen van de vaste voortplantingsplaatsen, rustplaatsen of eieren van dieren als
      bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.54.1.c
    text: |-
      het opzettelijk in hun natuurlijke verspreidingsgebied plukken en verzamelen, afsnijden, ontwortelen of vernielen
      van vaatplanten van de soorten, genoemd in [bijlage IX][ref1], onder B.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.54.2
    text: 'Het verbod geldt niet als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.54.2.a
    text: |-
      het gaat om het doden of vangen van de bosmuis, de huisspitsmuis en de veldmuis, of om het beschadigen of vernielen
      van hun vaste voortplantingsplaatsen of rustplaatsen, voor zover deze dieren zich in of op gebouwen of daarbij
      behorende erven of roerende zaken bevinden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.54.2.b
    text: |-
      het verrichten van de activiteit op grond van een andere wet is toegestaan en is voldaan aan de eisen die zijn
      opgenomen [artikel 8.74l van het Besluit kwaliteit leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.54.2.c
    text: 'de activiteit deel uitmaakt van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.54.2.c.1°
    text: |-
      een instandhoudingsmaatregel als bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste
      lid, eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.54.2.c.2°
    text: een passende maatregel als bedoeld in artikel 6, tweede lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.54
  - number: 11.55.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt niet voor een flora- en fauna-activiteit
      als bedoeld in [artikel 11.54][ref2] in gevallen aangewezen in een programma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.55.2
    text: 'Het programma:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: 11.55.2.a
    text: |-
      heeft geheel of ook betrekking op de inrichting, het beheer of het gebruik van een Natura 2000-gebied en bevat
      maatregelen om de instandhoudingsdoelstellingen voor dat gebied te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: 11.55.2.b
    text: 'heeft tot doel, ook met het oog op een evenwichtige en duurzame economische ontwikkeling:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: 11.55.2.b.1°
    text: |-
      de belasting van natuurwaarden van Natura 2000-gebieden door bepaalde schadelijke factoren te verminderen en de
      instandhoudingsdoelstellingen te bereiken; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: 11.55.2.b.2°
    text: |-
      het beheer, de bescherming, het behoud of het herstel van de van nature in Nederland in het wild voorkomende
      soorten dieren of planten of de in Nederland voorkomende natuurlijke habitats of habitats van soorten of het
      verbeteren van de staat van instandhouding van die soorten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: 11.55.2.c
    text: |-
      wordt vastgesteld door of gezamenlijk met het bestuursorgaan dat, als geen toepassing wordt gegeven aan het eerste
      lid, bevoegd is te beslissen op aanvragen om omgevingsvergunningen voor de betrokken flora- en fauna-activiteiten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.55
  - number: '11.56'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt in in een omgevingsverordening aangewezen
      gevallen niet voor een flora- en fauna-activiteit als bedoeld in [artikel 11.54][ref2] met betrekking tot dieren
      of planten van bij de omgevingsverordening aangewezen soorten, of met betrekking tot voortplantingsplaatsen of
      rustplaatsen van dieren van bij de omgevingsverordening aangewezen soorten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.56
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: '11.57'
    text: |-
      Vergunningvrije gevallen als bedoeld in [artikel 11.56][ref1] worden aangewezen in een ministeriële regeling, als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.57
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.57.a
    text: |-
      Onze Minister voor Natuur en Stikstof bevoegd gezag als bedoeld in [artikel 11.25, eerste lid][ref1], is; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.57
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.57.b
    text: |-
      de flora- en fauna-activiteit wordt verricht door een grondgebruiker voor het bestrijden van schadeveroorzakende
      dieren van de volgende soorten:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.57
  - number: 11.57.b.1°
    text: het konijn (Oryctolagus cuniculus); of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.57
  - number: 11.57.b.2°
    text: de vos (Vulpes vulpes).
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.57
  - number: 11.58.1
    text: |-
      Een flora- en fauna-activiteit wordt in een programma, een omgevingsverordening of een ministeriële regeling op
      grond van [artikel 11.55][ref1], [11.56][ref2], of [11.57][ref3] alleen als vergunningvrij geval aangewezen als de
      activiteit voldoet aan [artikel 8.74l, eerste lid, onder a, b en c, van het Besluit kwaliteit leefomgeving][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.58.2
    text: |-
      Het bestrijden door de grondgebruiker van schadeveroorzakende dieren wordt alleen als vergunningvrij geval
      aangewezen in een omgevingsverordening of een ministeriële regeling op grond van de [artikelen 11.56][ref1] en
      [11.57][ref2] en alleen als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.58.2.a
    text: |-
      het bestrijden voldoet aan [artikel 8.74l, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.58.2.b
    text: |-
      het bestrijden gebeurt op door de grondgebruiker gebruikte gronden of in of aan door hem gebruikte opstallen, om
      schade die in het lopende of daarop volgende jaar dreigt op te treden op deze gronden, in of aan deze opstallen, of
      in het omringende gebied te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.2.c
    text: |-
      deze schade wordt veroorzaakt door dieren van in de omgevingsverordening of ministeriële regeling genoemde soorten
      en behoort tot in de omgevingsverordening of ministeriële regeling omschreven categorieën van schade; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.2.d
    text: |-
      voor zover het [artikel 11.56][ref1] betreft, de in de omgevingsverordening genoemde diersoorten:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.58.2.d.1°
    text: niet in hun voortbestaan worden bedreigd of dat gevaar lopen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.2.d.2°
    text: in de provincie schade veroorzaken; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.2.d.3°
    text: |-
      niet overeenkomen met de in [artikel 11.57, onder b][ref1], genoemde soorten.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.58.3
    text: |-
      Het bestrijden door gemeenten van overlast veroorzakende dieren wordt alleen als vergunningvrij geval aangewezen in
      een omgevingsverordening op grond van [artikel 11.56][ref1] en alleen als het bestrijden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.58.3.a
    text: |-
      voldoet aan [artikel 8.74l, eerste lid, onder a en c, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.58.3.b
    text: plaatsvindt binnen een in het omgevingsplan of de omgevingsverordening begrensde bebouwingscontour;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.3.c
    text: |-
      plaatsvindt in het belang van de volksgezondheid of de openbare veiligheid, of om een bij de omgevingsverordening
      omschreven ander algemeen belang; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.3.d
    text: 'betrekking heeft op in de omgevingsverordening genoemde diersoorten die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.3.d.1°
    text: niet in hun voortbestaan worden bedreigd of dat gevaar lopen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.3.d.2°
    text: in de provincie overlast veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.4
    text: |-
      In een programma, een omgevingsverordening of een ministeriële regeling waarin vergunningvrije gevallen worden
      aangewezen die betrekking hebben op het doden of vangen van dieren, wordt in ieder geval bepaald welke middelen
      daarvoor zijn toegestaan, waarbij alleen middelen worden toegestaan die nadelige gevolgen voor het welzijn van
      dieren voorkomen of, als dat niet mogelijk is, zoveel mogelijk beperken, waarbij het doden van dieren zoveel
      mogelijk wordt vermeden.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.5
    text: |-
      In een programma, een omgevingsverordening of een ministeriële regeling waarin vergunningvrije gevallen worden
      aangewezen die betrekking hebben op het doden of vangen van wilde zwijnen, reeën, damherten of edelherten wordt
      bepaald:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.5.a
    text: dat dit niet door middel van drijven plaatsvindt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.5.b
    text: |-
      of en onder welke voorwaarden een methode is toegestaan, waarbij één persoon wilde zwijnen opzettelijk verontrust
      met het oogmerk deze dieren binnen het schootsveld van één geweerdrager te drijven, opdat deze de dieren kan doden,
      en waarbij geen hond wordt ingezet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.6
    text: |-
      Een aanwijzing als bedoeld in het tweede lid geldt ook voor het bestrijden van schadeveroorzakende dieren door
      de persoon of wildbeheereenheid die daarvoor een door de grondgebruiker verleende schriftelijke en gedagtekende
      toestemming heeft.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.58.7
    text: |-
      De beperking van de omvang van populaties van in het wild levende dieren wordt niet aangewezen als vergunningvrij
      geval.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.58
  - number: 11.59.1
    text: |-
      Het verbod, bedoeld in [artikel 11.54][ref1], geldt niet voor bij ministeriële regeling aangewezen gevallen van
      activiteiten die in een bij die regeling aangewezen gedragscode worden beschreven en die:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.59.1.a
    text: aantoonbaar worden uitgevoerd in overeenstemming met die gedragscode; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.1.b
    text: 'plaatsvinden in het kader van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.1.b.1°
    text: |-
      het bestendig beheren of onderhouden van vaarwegen, watergangen, waterkeringen, waterstaatswerken, oevers,
      luchthavens, wegen, spoorwegen of bermen, of in het kader van natuurbeheer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.1.b.2°
    text: een bestendig beheer of onderhoud in de landbouw of de bosbouw;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.1.b.3°
    text: een bestendig gebruik; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.1.b.4°
    text: ruimtelijke ontwikkeling of inrichting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.2
    text: 'Een gedragscode wordt bij ministeriële regeling alleen aangewezen als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.2.a
    text: |-
      de daarin beschreven activiteiten voldoen aan
      [artikel 8.74l, eerste lid, onder b, van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 11.59.2.b
    text: |-
      een wijze van verrichten van activiteiten is beschreven, waarmee naar het oordeel van Onze Minister voor Natuur en
      Stikstof afdoende is gewaarborgd dat:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.2.b.1°
    text: |-
      geen benutting of economisch gewin van dieren en planten van de soorten, genoemd in [bijlage IX][ref1], die zich
      bevinden in hun natuurlijke verspreidingsgebied plaatsvindt; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.59.2.b.2°
    text: de activiteiten met betrekking tot die dieren en planten zorgvuldig worden verricht.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3
    text: 'Activiteiten worden in ieder geval zorgvuldig verricht als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3.a
    text: |-
      daarvan geen wezenlijke invloed uitgaat op de soorten, genoemd in [bijlage IX][ref1], die zich bevinden in hun
      natuurlijke verspreidingsgebied, waartoe de dieren of planten behoren; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.59.3.b
    text: 'in redelijkheid alles wordt gedaan of gelaten om te voorkomen of zoveel mogelijk te beperken dat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3.b.1°
    text: die dieren worden gedood;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3.b.2°
    text: voortplantingsplaatsen of rustplaatsen van die dieren worden beschadigd of vernield;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3.b.3°
    text: eieren van die dieren worden vernield; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: 11.59.3.b.4°
    text: die planten worden geplukt, afgesneden, ontworteld of vernield.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.59
  - number: '11.60'
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor het bijvoeren van in het wild levende
      edelherten, damherten, reeën, wilde zwijnen, fazanten, wilde eenden, houtduiven, hazen of konijnen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.60
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.61.1
    text: |-
      Het verbod, bedoeld in [artikel 5.1, tweede lid, aanhef en onder g, van de wet][ref1], om zonder
      omgevingsvergunning een flora- en fauna-activiteit te verrichten, geldt voor het uitzetten van dieren of eieren
      van dieren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.61.2
    text: |-
      Het verbod geldt niet voor het uitzetten van vis als bedoeld in
      [artikel 1, tweede lid, van de Visserijwet 1963][ref1] of voor het uitzetten van eieren van deze vis.


      [ref1]: https://wetten.overheid.nl/BWBR0002416#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
    references:
      - id: ref1
        bwb_id: BWBR0002416
        artikel: '1'
  - number: 11.61.3
    text: |-
      Het verbod geldt niet in bij omgevingsverordening aangewezen gevallen voor dieren of eieren van dieren van daarbij
      aangewezen soorten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
  - number: 11.61.4
    text: 'Vergunningvrije gevallen als bedoeld in het derde lid worden aangewezen bij ministeriële regeling:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
  - number: 11.61.4.a
    text: |-
      als Onze Minister voor Natuur en Stikstof bevoegd gezag als bedoeld in [artikel 11.25, eerste lid][ref1], is; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.61.4.b
    text: als het gaat om een herintroductie van soorten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
  - number: 11.61.5
    text: |-
      Een flora- en fauna-activiteit wordt op grond van het derde of vierde lid alleen als vergunningvrij geval
      aangewezen, als is voldaan aan [artikel 8.74n, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], voor
      zover het het uitzetten van dieren of eieren van dieren betreft, en aan artikel 8.74n, tweede lid, van het Besluit
      kwaliteit leefomgeving, voor zover het een herintroductie van soorten betreft.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.61
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: '11.62'
    text: |-
      De verboden, bedoeld in de [artikelen 11.37, eerste lid, onder a en d][ref1],
      [11.46, eerste lid, onder a en b][ref2], en [11.54, eerste lid][ref3], gelden niet voor het bij de uitoefening
      van de jacht vangen, doden of verontrusten en met het oog daarop opsporen van wild in het jachtveld van een
      jachthouder, uitgevoerd in overeenstemming met [artikel 11.64, eerste lid][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.62
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.63.1
    text: |-
      Het beperken van de omvang van populaties van in het wild levende dieren, het bestrijden van schadeveroorzakende
      dieren door grondgebruikers en de uitoefening van de jacht worden uitgevoerd volgens het faunabeheerplan dat voor
      het betrokken gebied door de faunabeheereenheid is vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.2
    text: 'Het eerste lid is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.2.a
    text: het beperken van de omvang van populaties van exoten of verwilderde dieren; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.2.b
    text: het bestrijden van schadeveroorzakende exoten of verwilderde dieren.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.3
    text: 'Met een maatwerkregel of een maatwerkvoorschrift wordt alleen van het eerste lid afgeweken als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.3.a
    text: |-
      sprake is van een omgevingsvergunning voor een flora- en fauna-activiteit die wordt verleend aan een
      faunabeheereenheid, een wildbeheereenheid of anderen voor het beperken van de omvang van een populatie van dieren;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.63.3.b
    text: |-
      door de specifieke kenmerken van de betrokken diersoort of de aard of omvang van te verrichten activiteiten de
      noodzaak voor een faunabeheerplan voor die activiteiten ontbreekt, of sprake is van een opdracht van gedeputeerde
      staten om de omvang van de populatie terug te brengen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.63
  - number: 11.64.1
    text: |-
      De verboden, bedoeld in de [artikelen 11.37, eerste lid, onder a en d][ref1],
      [11.46, eerste lid, onder a en b][ref2], en [11.54, eerste lid][ref3], gelden niet bij de uitoefening van de jacht
      door:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: 11.64.1.a
    text: de jachthouder;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.b
    text: degenen die in het gezelschap van de jachthouder zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.c
    text: 'de jachtopzichter van de jachthouder die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.c.1°
    text: beschikt over een door de jachthouder gegeven schriftelijke en gedagtekende toestemming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.c.2°
    text: zorg draagt voor de bescherming van de jachtbelangen van de jachthouder; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.c.3°
    text: |-
      ook als buitengewoon opsporingsambtenaar is belast met de opsporing van de in
      [artikel 1a van de Wet op de economische delicten][ref1] strafbaar gestelde feiten die betrekking hebben op
      de daar genoemde bepalingen van de [Omgevingswet][ref2] en van de overige in de akte of aanwijzing, bedoeld in
      [artikel 142, tweede lid, van het Wetboek van Strafvordering][ref3], aangeduide strafbare feiten; of


      [ref1]: https://wetten.overheid.nl/BWBR0002063#Artikel1a
      [ref2]: https://wetten.overheid.nl/BWBR0037885
      [ref3]: https://wetten.overheid.nl/BWBR0001903#Artikel142
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
    references:
      - id: ref1
        bwb_id: BWBR0002063
        artikel: 1a
      - id: ref2
        bwb_id: BWBR0037885
      - id: ref3
        bwb_id: BWBR0001903
        artikel: '142'
  - number: 11.64.1.d
    text: |-
      een ander die beschikt over een daartoe door de jachthouder gegeven schriftelijke en gedagtekende toestemming, in
      het geval dat de jachthouder:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.d.1°
    text: |-
      een natuurlijke persoon is aan wie een omgevingsvergunning voor een jachtgeweeractiviteit of een
      valkeniersactiviteit is verleend die op het tijdstip van ondertekening van de toestemming geldig is;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.d.2°
    text: een rechtspersoonlijkheid bezittende organisatie van samenwerkende jachthouders is; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.1.d.3°
    text: |-
      een bij ministeriële regeling aangewezen rechtspersoonlijkheid bezittende organisatie is, die naar het oordeel
      van Onze Minister voor Natuur en Stikstof, gelet op haar doelstelling en gelet op de kennis en kunde waarover de
      organisatie beschikt, een duurzaam beheer van populaties in het wild levende dieren in voldoende mate verzekert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.2
    text: >-
      De door de jachthouder gegeven schriftelijke en
      gedagtekende toestemming, bedoeld in het eerste
      lid, onder c en d:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.2.a
    text: |-
      is voorzien van een aantekening van de korpschef waaruit blijkt dat het jachtveld waarop de jacht wordt
      uitgeoefend, voldoet aan [artikel 11.76][ref1], voor zover bij de uitoefening van de jacht gebruik wordt gemaakt
      van een geweer;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.64.2.b
    text: is voorzien van de namen, voornamen en geboortedata van degenen aan wie de toestemming wordt verleend; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.2.c
    text: |-
      heeft een geldigheidsduur die uiterlijk verstrijkt op 31 maart volgend op de datum van ondertekening van de
      toestemming.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.3
    text: |-
      Voor een aan een jachtopzichter gegeven toestemming als bedoeld in het eerste lid, onder c, geldt niet het vereiste
      dat die is voorzien van een aantekening van de korpschef.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.4
    text: |-
      Voor een aan een ander dan de jachtopzichter gegeven toestemming als bedoeld in het eerste lid, onder d, geldt niet
      het vereiste dat diens personalia worden vermeld, als:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.4.a
    text: die ander de jacht uitoefent in het gezelschap van degene aan wie de jachthouder toestemming heeft verleend;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.4.b
    text: de jachthouder de uitoefening van de jacht door derden in die toestemming uitdrukkelijk heeft toegestaan; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: 11.64.4.c
    text: |-
      aan die ander een omgevingsvergunning voor een jachtgeweeractiviteit of een valkeniersactiviteit is verleend die op
      het tijdstip van uitoefening van de jacht geldig is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.64
  - number: '11.65'
    text: |-
      De jachthouder doet datgene wat een goed jachthouder betaamt om een redelijke stand van het in zijn jachtveld
      aanwezige wild als bedoeld in [artikel 8.3, vierde lid, van de wet][ref1] te handhaven, of, bij het ontbreken
      daarvan, te bereiken, en om schade door dat wild te voorkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.65
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
  - number: 11.66.1
    text: 'De jacht wordt niet uitgeoefend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.a
    text: voor zonsopgang en na zonsondergang;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.b
    text: op zondagen, de nieuwjaarsdag, de tweede paasdag, de Hemelvaartsdag, de tweede pinksterdag en de beide kerstdagen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.c
    text: op begraafplaatsen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.d
    text: vanaf of vanuit een voertuig;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.e
    text: vanaf of vanuit een vaartuig;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.f
    text: vanuit een luchtvaartuig; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.1.g
    text: als de grond met sneeuw is bedekt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2
    text: 'De jacht wordt niet uitgeoefend op wild:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2.a
    text: als dat zich als gevolg van hoge waterstand ophoudt op hoog gelegen gedeelten van het terrein;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2.b
    text: voor zover dat zich bevindt in of in de nabijheid van wakken of bijten in het ijs;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2.c
    text: voor zover dat als gevolg van onvoldoende bevedering niet in staat is te vliegen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2.d
    text: dat als gevolg van weersomstandigheden in uitgeputte toestand verkeert; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.66.2.e
    text: binnen een straal van 200 m rond plaatsen waar voer of aas is of wordt verstrekt om dat wild te lokken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.66
  - number: 11.67.1
    text: |-
      In afwijking van [artikel 11.66, eerste lid, aanhef en onder a][ref1], mag de jacht op de wilde eend ook
      gedurende een half uur voor zonsopkomst en een half uur na zonsondergang worden uitgeoefend.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.67.2
    text: |-
      In afwijking van [artikel 11.66, eerste lid, aanhef en onder e][ref1], mag de jacht ook worden uitgeoefend vanaf
      of vanuit een vaartuig dat vaart met een snelheid van ten hoogste 5 km/u.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.67.3
    text: |-
      In afwijking van [artikel 11.66, eerste lid, aanhef en onder g][ref1], mag de jacht ook als de grond met sneeuw
      is bedekt worden uitgeoefend op:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.67.3.a
    text: wilde eenden of houtduiven; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
  - number: 11.67.3.b
    text: konijnen, hazen of fazanten, als deze dieren anders worden bejaagd dan voor de voet.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
  - number: 11.67.4
    text: |-
      In afwijking van [artikel 11.66, tweede lid, aanhef en onder e][ref1], mag de jacht ook worden uitgeoefend binnen
      een straal van 200 m rond plaatsen waar voer of aas is of wordt verstrekt om wild te lokken, als gebruik wordt
      gemaakt van een eendenkooi.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.67
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: '11.68'
    text: |-
      De jacht op een wildsoort wordt alleen uitgeoefend als de jacht op die wildsoort bij ministeriële regeling is
      geopend.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.68
  - number: '11.69'
    text: |-
      Met een maatwerkregel kan de jacht op wildsoorten alleen worden gesloten, in de gehele provincie of een gedeelte
      daarvan, zolang bijzondere weersomstandigheden dat noodzakelijk maken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.69
  - number: '11.70'
    text: |-
      Bij het aangaan van een huurovereenkomst als bedoeld in [artikel 8.3, eerste lid, onder d, van de wet][ref1]
      mag worden bedongen dat, als een onroerende zaak waarop de overeenkomst betrekking heeft wordt opgenomen in een
      herverkavelingsakte als bedoeld in [artikel 16.136, eerste lid, van de wet][ref2], en deze akte voor het einde van
      de duur van de overeenkomst in de openbare registers is ingeschreven, de huurovereenkomst, voor zover het die zaak
      betreft, eindigt met ingang van de datum waarop deze akte is ingeschreven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.70
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.71.1
    text: 'Bij de uitoefening van de jacht worden geen andere middelen gebruikt dan:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.a
    text: geweren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.b
    text: honden, met uitzondering van lange honden;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.c
    text: aantoonbaar gefokte haviken (Accipiter gentilis) of slechtvalken (Falco peregrinus);
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.d
    text: eendenkooien;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.e
    text: lokeenden of lokduiven, die niet blind of verminkt zijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.f
    text: fretten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.g
    text: buidels; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.1.h
    text: schermen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.2
    text: |-
      De jacht wordt niet uitgeoefend als zich in het veld andere middelen bevinden die geschikt zijn voor het vangen of
      doden van dieren dan de in het eerste lid genoemde middelen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.3
    text: |-
      Degene die zich in het veld bevindt met voor de jacht toegestane middelen of met andere middelen waarmee kan worden
      gejaagd, wordt geacht zich daarmee bij de uitoefening van de jacht in het veld te bevinden, tenzij het tegendeel
      blijkt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
  - number: 11.71.4
    text: |-
      De jacht wordt niet uitgeoefend met het geweer binnen de in het omgevingsplan aangewezen bebouwingscontour jacht,
      bedoeld in [artikel 5.165a van het Besluit kwaliteit leefomgeving][ref1], of op terreinen die onmiddellijk aan die
      bebouwingscontour grenzen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.71
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 11.72.1
    text: |-
      Het is verboden zich buiten gebouwen te bevinden met een of meer van de volgende middelen of met materialen waarmee
      die middelen direct kunnen worden gemaakt, als moet worden aangenomen dat die middelen of materialen zullen worden
      gebruikt voor het doden of vangen van dieren:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.a
    text: hagelpatronen die metallisch lood bevatten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.b
    text: 'klemmen, met uitzondering van klemmen die:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.b.1°
    text: alleen geschikt en bestemd zijn voor het vangen en doden van mollen, zwarte ratten, bruine ratten of huismuizen; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.b.2°
    text: |-
      worden gebruikt bij het voorkomen van schade aan waterstaatswerken, veroorzaakt door muskus- en beverratten, door
      personen die in dienst zijn of handelen in opdracht van een waterschap en die aantoonbaar de nodige kennis en
      vaardigheden bezitten om deze taak doeltreffend uit te voeren;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.c
    text: vallen, met uitzondering van kastvallen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.d
    text: strikken;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.e
    text: |-
      vangkooien, met uitzondering van vangkooien geschikt en bestemd voor het vangen van verwilderde katten en
      verwilderde duiven binnen de bebouwde kom;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.f
    text: lijm;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.g
    text: netten, geschikt en bestemd om te worden gebruikt voor het vangen van vogels; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.1.h
    text: rodenators.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.2
    text: |-
      Het is verboden zich in een veld te bevinden met een dier dat hem toebehoort of onder zijn toezicht staat en dat in
      het veld dieren opspoort, doodt, verwondt, vangt of bemachtigt, tenzij het betreft:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.2.a
    text: |-
      de uitoefening van de jacht met dieren als bedoeld in [artikel 11.71, eerste lid][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.72.2.b
    text: |-
      het vangen of doden van dieren overeenkomstig een omgevingsvergunning voor een flora- en fauna-activiteit of
      overeenkomstig de omgevingsverordening of ministeriële regeling waarbij op grond van dit hoofdstuk vergunningvrije
      gevallen zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: 11.72.3
    text: |-
      Als met een maatwerkvoorschrift of maatwerkregel wordt afgeweken van het eerste lid, wordt rekening gehouden met
      het voorkomen van onnodig lijden bij het te doden of te vangen dier.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.72
  - number: '11.73'
    text: |-
      Het is verboden netten, in banen, aan het stuk of in bepaalde vorm, vervaardigd van garens van synthetische of van
      kunstmatige vezels met een totale dikte van minder dan 150 deniers (16,2 mg/m) en waarvan de maaswijdte, gemeten
      over het garen, van knoop tot knoop, kleiner is dan 35 mm, te vervoeren, te verkopen, te koop aan te bieden, te
      kopen of onder zich te hebben.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.73
  - number: '11.74'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift kan alleen worden afgeweken van [artikel 11.73][ref1], als dit in
      overeenstemming is met de bij of krachtens de benelux-overeenkomst over jacht en vogelbescherming gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.74
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.75.1
    text: |-
      Een geweer wordt ter uitvoering van de [wet][ref1] alleen gebruikt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 11.75.1.a
    text: de uitoefening van de jacht;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.1.b
    text: |-
      het verrichten van een flora- en fauna-activiteit die betrekking heeft op het doden van dieren in overeenstemming
      met de daarvoor verleende omgevingsvergunning of in overeenstemming met de omgevingsverordening of ministeriële
      regeling waarbij op grond van dit hoofdstuk vergunningvrije gevallen zijn aangewezen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.1.c
    text: |-
      het bestrijden van exoten of verwilderde dieren, als dat in opdracht van Onze Minister voor Natuur en Stikstof of
      van gedeputeerde staten gebeurt, of als de betrokken diersoorten zijn aangewezen bij ministeriële regeling;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.1.d
    text: het bestrijden van de zwarte rat, de bruine rat of de huismuis;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.1.e
    text: het schieten van kleiduiven; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.1.f
    text: jachthondenproeven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
  - number: 11.75.2
    text: |-
      Het verbod, bedoeld in [artikel 5.1, eerste lid, onder f, van de wet][ref1], om zonder omgevingsvergunning
      een jachtgeweeractiviteit te verrichten, geldt niet in bij omgevingsverordening aangewezen gevallen. Bij
      de aanwijzing wordt rekening gehouden met de belangen van de natuurbescherming, het waarborgen van de
      veiligheid, het beschermen van de gezondheid en het beschermen van het milieu. Vergunningvrije gevallen worden
      aangewezen bij ministeriële regeling als Onze Minister voor Natuur en Stikstof bevoegd gezag is als bedoeld in
      [artikel 11.25, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.75
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.1
        afdeling: '11.2'
  - number: 11.76.1
    text: |-
      Een geweer wordt ter uitvoering van de [wet][ref1] alleen gebruikt op een jachtveld met:


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 11.76.1.a
    text: |-
      een aaneengesloten oppervlakte van ten minste 40 ha, per jachthouder die in zijn hoedanigheid als jachthouder is
      gerechtigd tot het uitoefenen van de jacht in dat jachtveld; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.1.b
    text: afmetingen waarbinnen een cirkel met een straal van ten minste 150 m kan worden beschreven.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.2
    text: |-
      Als het ook anderen dan de jachthouder of de jachtopzichter, bedoeld in
      [artikel 11.64, eerste lid, onder d][ref1], is toegestaan om in het jachtveld de jacht uit te oefenen, wordt
      de aaneengesloten oppervlakte van het jachtveld vermeerderd met 40 ha per ander aan wie het is toegestaan in dat
      jachtveld de jacht uit te oefenen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.7
        afdeling: '11.2'
  - number: 11.76.3
    text: 'Bij het berekenen van de oppervlakte van het jachtveld worden niet meegerekend:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.3.a
    text: |-
      gronden die liggen op een afstand van meer dan 350 m van het middelpunt van een cirkel met een straal van 150 m die
      het dichtst bij die gronden in het jachtveld kan worden beschreven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.3.b
    text: |-
      andere gronden dan die, bedoeld onder a, die van het middelpunt, bedoeld onder a, uit in rechte lijn slechts
      bereikbaar zijn over grond die tot een ander jachtveld behoort;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.3.c
    text: openbare, verharde verkeerswegen, met uitzondering van grindwegen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.3.d
    text: begraafplaatsen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.3.e
    text: |-
      de in een omgevingsplan aangewezen bebouwingscontour jacht, bedoeld in
      [artikel 5.165a, van het Besluit kwaliteit leefomgeving][ref1], en onmiddellijk aan die bebouwingscontour
      grenzende terreinen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 11.76.4
    text: |-
      Als afzonderlijke jachtvelden worden beschouwd, ook als zij grenzen aan gronden waarop het aan dezelfde persoon of
      personen is toegestaan de jacht uit te oefenen:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.4.a
    text: gronden als bedoeld in het derde lid, onder a of b;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.4.b
    text: delen van gronden waarbij de verbinding tussen deze delen op enig punt smaller is dan 50 m; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
  - number: 11.76.4.c
    text: |-
      delen van gronden die van elkaar worden gescheiden door een autosnelweg als bedoeld in
      [artikel 1, onder c, van het Reglement verkeersregels en verkeerstekens 1990][ref1] of door een water, breder dan
      10 m, als de jachthouder niet is gerechtigd daarop de jacht uit te oefenen.


      [ref1]: https://wetten.overheid.nl/BWBR0004825#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.76
    references:
      - id: ref1
        bwb_id: BWBR0004825
        artikel: '1'
  - number: '11.77'
    text: |-
      Met een maatwerkregel of maatwerkvoorschrift wordt niet afgeweken van [artikel 11.76][ref1] als het geweer wordt
      gebruikt bij de uitoefening van de jacht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.77
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.78.1
    text: |-
      Een geweer wordt ter uitvoering van de [wet][ref1] alleen gebruikt als de burgerrechtelijke aansprakelijkheid
      voor de schade waartoe het gebruik van het geweer leidt, is gedekt door een verzekering, die is gesloten met een
      financiële onderneming die ingevolge [artikel 2.48 van de Wet op het financieel toezicht][ref2] in Nederland het
      bedrijf van schadeverzekeraar met beperkte risico-omvang mag uitoefenen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0020368#Artikel2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0020368
        artikel: '2'
  - number: 11.78.2
    text: De verzekering geeft dekking van 1 april tot 1 april van het jaar daaropvolgend en geldt voor geheel Nederland.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.3
    text: De verzekering dekt de aansprakelijkheid voor een bedrag van ten minste € 1.000.000 per gebeurtenis.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4
    text: |-
      De polis, bedoeld in [artikel 932 van Boek 7 van het Burgerlijk Wetboek][ref1], van de verzekering bevat in ieder
      geval de volgende gegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0005290#Artikel932
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
    references:
      - id: ref1
        bwb_id: BWBR0005290
        artikel: '932'
  - number: 11.78.4.a
    text: de naam en het adres van de verzekeraar;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.b
    text: de naam en het adres van de verzekeringnemer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.c
    text: het polisnummer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.d
    text: de dagtekening en het jaar van de ingang en van het einde van de dekking;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.e
    text: de aanduiding van de personen die als verzekerden worden aangemerkt;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.f
    text: het gebied waarin de verzekering van kracht is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.4.g
    text: het verzekerde bedrag.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.78.5
    text: |-
      De houder van een omgevingsvergunning voor een jachtgeweeractiviteit informeert de korpschef onverwijld over een
      wijziging van deze gegevens van de polis.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.78
  - number: 11.79.1
    text: |-
      Een geweer en munitie worden ter uitvoering van de [wet][ref1] alleen gebruikt als is voldaan aan de eisen, bedoeld
      in dit artikel en in de [artikelen 11.80][ref2] en [11.81][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.79.2
    text: |-
      Een geweer heeft een gladde loop met een kaliber van ten minste 24 en ten hoogste 12 of een getrokken loop met een
      nominaal kaliber van ten minste .22 inch of 5,58 mm.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.3
    text: Een enkelloops hagelgeweer heeft een magazijn dat ten hoogste twee patronen kan bevatten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.4
    text: |-
      Een kogelgeweer heeft een magazijn dat ten hoogste twee patronen kan bevatten, tenzij het is voorzien van een
      grendelinrichting waarmee het wapen handmatig schot voor schot wordt geladen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.5
    text: |-
      Een geweer is niet voorzien van een geluiddemper, een kunstmatige lichtbron, een voorziening om de prooi te
      verlichten, een vizier met beeldomzetter, een elektronische beeldversterker of enig ander instrument om in de nacht
      te schieten.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.6
    text: |-
      De munitie die wordt gebruikt in een geweer bestaat uit hagelkorrels met een doorsnede van 3,5 mm of minder of uit
      kogelpatronen, mits:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.6.a
    text: de hagelkorrels geen metallisch lood bevatten; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.79.6.b
    text: |-
      de kogelpatronen geen militaire kogelpatronen zijn, met inbegrip van fosfor- of lichtspoorpatronen, kogelpatronen
      met volmantel of kogels die niet vervormen bij het treffen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.79
  - number: 11.80.1
    text: 'Voor dieren van de volgende soorten voldoen de te gebruiken geweren en munitie ook aan de volgende eisen:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.80
  - number: 11.80.1.a
    text: |-
      reeën: geweren met ten minste een getrokken loop en kogelpatronen voor getrokken loop waarvan de trefenergie ten
      minste 980 J op 100 m afstand van de loopmond bedraagt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.80
  - number: 11.80.1.b
    text: |-
      edelherten, damherten en wilde zwijnen: geweren met ten minste een getrokken loop en kogelpatronen van een kaliber
      van ten minste 6,5 mm voor getrokken loop waarvan de trefenergie ten minste 2.200 J op 100 m afstand van de
      loopmond bedraagt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.80
  - number: 11.80.2
    text: Voor konijnen en houtduiven te gebruiken kogelpatronen hebben een kaliber van .22 inch of 5,58 mm.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.80
  - number: 11.80.3
    text: Voor hazen, fazanten en wilde eenden worden alleen hagelpatronen gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.80
  - number: '11.81'
    text: |-
      In afwijking van de [artikelen 11.79][ref1] en [11.80][ref2] kan voor het voorkomen van schade aan
      waterstaatswerken, bestrijding van muskus- en beverratten plaatsvinden met gebruikmaking van het luchtdrukgeweer
      door personen die in dienst zijn of handelen in opdracht van een waterschap en die aantoonbaar de nodige kennis en
      vaardigheden bezitten om deze taak doeltreffend uit te voeren.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.81
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: '11.82'
    text: |-
      Als met een maatwerkregel of maatwerkvoorschrift wordt afgeweken van de regels over de te gebruiken munitie
      in [artikel 11.79, zesde lid][ref1], of [11.80][ref2], wordt rekening gehouden met de belangen van de
      natuurbescherming, het waarborgen van de veiligheid, het beschermen van de gezondheid en het beschermen van het
      milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.82
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.83.1
    text: 'Het geweer wordt niet gebruikt:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
  - number: 11.83.1.a
    text: voor zonsopgang en na zonsondergang;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
  - number: 11.83.1.b
    text: |-
      binnen de in een omgevingsplan aangewezen bebouwingscontour jacht, bedoeld in
      [artikel 5.165a van het Besluit kwaliteit leefomgeving][ref1], of op terreinen die onmiddellijk aan die
      bebouwingscontour grenzen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 11.83.1.c
    text: |-
      binnen de afpalingskring van een eendenkooi als bedoeld in [artikel 11.86, vierde lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.8
        afdeling: '11.2'
  - number: 11.83.1.d
    text: vanaf of vanuit een rijdend voertuig; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
  - number: 11.83.1.e
    text: vanuit een luchtvaartuig.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
  - number: 11.83.2
    text: |-
      In afwijking van het eerste lid, aanhef en onder a, mag het geweer bij de uitoefening van de jacht op wilde eenden
      ook worden gebruikt gedurende een half uur voor zonsopkomst en een half uur na zonsondergang.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.83
  - number: 11.84.1
    text: |-
      Een geweer of een gedeelte van een geweer wordt niet in het veld gedragen als de drager geen houder van een
      omgevingsvergunning voor een jachtgeweeractiviteit is, tenzij de drager om een andere reden het recht heeft daar
      een geweer te gebruiken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.84
  - number: 11.84.2
    text: |-
      De houder van een omgevingsvergunning voor een jachtgeweeractiviteit draagt geen geweer op gronden waarop hij niet
      het recht heeft een geweer te gebruiken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.84
  - number: '11.85'
    text: |-
      Vogels worden voor het vangen of doden van dieren ter uitvoering van de [wet][ref1] alleen gebruikt voor:


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.85
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 11.85.a
    text: de uitoefening van de jacht, in overeenstemming met de over de uitoefening van de jacht gestelde regels;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.85
  - number: 11.85.b
    text: |-
      het verrichten van een flora- en fauna-activiteit die betrekking heeft op het doden van dieren in overeenstemming
      met de daarvoor verleende omgevingsvergunning of in overeenstemming met de omgevingsverordening of ministeriële
      regeling waarbij op grond van dit hoofdstuk vergunningvrije gevallen zijn aangewezen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.85
  - number: 11.85.c
    text: |-
      het bestrijden van verwilderde dieren of exoten, als dat in opdracht van Onze Minister voor Natuur en Stikstof of
      van gedeputeerde staten gebeurt, of als de betrokken diersoorten zijn aangewezen bij ministeriële regeling; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.85
  - number: 11.85.d
    text: |-
      het bestrijden van de zwarte rat, de bruine rat of de huismuis, voor zover dat gebeurt met aantoonbaar gefokte
      haviken of slechtvalken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.85
  - number: 11.86.1
    text: |-
      Eendenkooien worden alleen gebruikt als daartoe met goed gevolg een door Onze Minister voor Natuur en Stikstof
      erkend examen is afgelegd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.2
    text: 'Een eendenkooi voldoet aan de volgende voorwaarden:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.2.a
    text: |-
      er is een open wateroppervlakte aanwezig van ten minste 200 m2, waarin een cirkel met een straal van ten minste
      7,50 m kan worden beschreven;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.2.b
    text: het water is ten minste 50 cm diep;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.2.c
    text: rondom het water ligt een rand van bos of struweel; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.2.d
    text: |-
      in open verbinding met het water is ten minste één vangpijp aanwezig die onmiddellijk als vangmiddel kan worden
      gebruikt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.3
    text: Met een eendenkooi gevangen dieren worden onverwijld na het vangen in vrijheid gesteld of gedood.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.4
    text: |-
      De eigenaar van een eendenkooi gebruikt voor de afpaling van de eendenkooi palen die zijn voorzien van het
      opschrift «Eendenkooi van x, met recht van afpaling op y m, gerekend uit het midden der kooi», waarbij wordt
      ingevuld voor:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.4.a
    text: 'x: de naam van de eigenaar van de eendenkooi;'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.4.b
    text: 'y: het aantal meters waarop het afpalingsrecht betrekking heeft.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
  - number: 11.86.5
    text: |-
      Het eerste lid is niet van toepassing als de gebruiker van de eendenkooi vanwege het met gunstig gevolg behalen van
      een krachtens de [Jachtwet][ref1] erkend jachtexamen:


      [ref1]: https://wetten.overheid.nl/BWBR0002155
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
    references:
      - id: ref1
        bwb_id: BWBR0002155
  - number: 11.86.5.a
    text: |-
      in de periode van 1 januari 1977 tot en met 31 maart 2002 een jachtakte als bedoeld in de [Jachtwet][ref1] is
      uitgereikt; of


      [ref1]: https://wetten.overheid.nl/BWBR0002155
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
    references:
      - id: ref1
        bwb_id: BWBR0002155
  - number: 11.86.5.b
    text: |-
      in de periode van 1 april 2002 tot en met 30 september 2004 een jachtakte als bedoeld in de
      [Flora- en faunawet][ref1] is uitgereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0009640
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.86
    references:
      - id: ref1
        bwb_id: BWBR0009640
  - number: 11.87.1
    text: |-
      Een examen voor jachtgeweeractiviteiten komt alleen in aanmerking voor een erkenning als bedoeld in
      [artikel 3.71 van het Besluit kwaliteit leefomgeving][ref1], als het een theoretisch gedeelte en een praktisch
      gedeelte bevat die voldoen aan de eisen in het tweede en derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 11.87.2
    text: 'Het theoretisch gedeelte van het examen voor een jachtgeweeractiviteit bevat een toetsing op kennis van:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.a
    text: |-
      het wild en dieren van andere soorten die schade kunnen veroorzaken aan gewassen, vee, bossen, bedrijfsmatige
      visserij en wateren en van hierop gelijkende diersoorten;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.b
    text: de leefomgeving van het wild en andere diersoorten, bedoeld in dit lid;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.c
    text: het beheer van het wild;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.d
    text: het beheer van het edelhert, de ree, het damhert en het wilde zwijn;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.e
    text: de belangrijkste wettelijke voorschriften op het terrein van de jacht en de natuurbescherming;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.f
    text: de belangrijkste wettelijke voorschriften over het voorhanden hebben van geweren en munitie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.g
    text: |-
      landbouw-, tuinbouw- en bosbouwgewassen die gevoelig zijn voor schade aangericht door wild en andere diersoorten,
      bedoeld in dit lid, en de perioden gedurende het jaar waarin deze schade zich kan voordoen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.h
    text: |-
      de maatregelen die kunnen worden getroffen om schade aan landbouw-, tuinbouw- en bosbouwgewassen aangericht door
      wild en andere dieren, bedoeld in dit lid, te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.i
    text: het geweer, de daarbij gebruikte munitie en het gebruik van het geweer;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
  - number: 11.87.2.j
    text: |-
      de middelen, bedoeld in de [artikelen 11.44, vierde lid][ref1], [11.52, vierde lid][ref2],
      [11.58, vierde lid][ref3], en [11.71, eerste lid, onder b tot en met h][ref4], van dit besluit en de
      [artikelen 8.74p][ref5], [8.74q][ref6] en [8.74r van het Besluit kwaliteit leefomgeving][ref7], en het gebruik van
      deze middelen;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel11.87
    references:
      - id: ref1
        bwb_id: BWBR0041330
