        hoofdstuk: '3'
  - number: 4.542.2
    text: |-
      De afstand geldt tot kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties die op grond van een omgevingsplan
      of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit zijn toegelaten, als inachtneming van de
      afstand, bedoeld in het eerste lid:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.a
    text: 'niet mogelijk is door:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.a.1°
    text: de geringe omvang van de locatie;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.a.2°
    text: de bouwwerken die aanwezig zijn op die locatie; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.a.3°
    text: andere fysieke belemmeringen;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.b
    text: nadelige invloed heeft op de veiligheid en gezondheid van werknemers of bezoekers; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.2.c
    text: de bedrijfsvoering ernstig belemmert.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.3
    text: 'Het tweede lid is niet van toepassing op kwetsbare gebouwen en kwetsbare locaties:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
  - number: 4.542.3.a
    text: |-
      die een functionele binding hebben met de activiteit, bedoeld in [hoofdstuk 3][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 4.542.3.b
    text: |-
      binnen een risicogebied externe veiligheid als bedoeld in
      [artikel 5.16, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.542.4
    text: |-
      [Artikel 5.9 van het Besluit kwaliteit leefomgeving][ref1] is van overeenkomstige toepassing op de afstand, bedoeld
      in het tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.542
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: '4.543'
    text: |-
      Ten minste vier weken voordat de afstand, bedoeld in [artikel 4.542, tweede lid][ref1], gaat gelden, wordt het
      bevoegd gezag, bedoeld in [afdeling 2.2][ref2], daarover geïnformeerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.543
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.43'
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '2'
        afdeling: '2.2'
  - number: '4.544'
    text: |-
      Met het oog op het waarborgen van de veiligheid is overnachting door derden en recreatief verblijf niet toegestaan
      binnen 20 m vanaf de tankzuil waarmee brandstoffen van ADR-klasse 3, met uitzondering van gasolie, diesel of
      huisbrandolie met een vlampunt van 55 °C of hoger, worden getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.544
  - number: 4.545.1
    text: |-
      Met het oog op het waarborgen van de veiligheid heeft een tankzuil met een elektrische pomp een aanschakelaar en
      uitschakelaar.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.545
  - number: 4.545.2
    text: |-
      De artikelen 21, 46 en 47 van [bijlage 3.8 bij de Binnenvaartregeling][ref1] zijn van overeenkomstige toepassing op
      het tanken met een tankzuil die zich op het land bevindt.


      [ref1]: https://wetten.overheid.nl/BWBR0025958
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.545
    references:
      - id: ref1
        bwb_id: BWBR0025958
  - number: 4.546.1
    text: |-
      Met het oog op het waarborgen van de veiligheid wordt een schip dat gevaarlijke stoffen als
      bedoeld in [artikel 1 van de Wet vervoer gevaarlijke stoffen][ref1] vervoert en de tekens,
      bedoeld in [artikel 3.14, tweede of derde lid, van het Binnenvaartpolitiereglement][ref2] of
      [Rijnvaartpolitiereglement 1995][ref3], voert niet getankt met vloeibare brandstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0007606#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0003628#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0006923#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.546
    references:
      - id: ref1
        bwb_id: BWBR0007606
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0003628
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0006923
        artikel: '3'
  - number: 4.546.2
    text: |-
      Een schip dat gasvormige gevaarlijke stoffen als bedoeld in [artikel 1 van de Wet vervoer gevaarlijke stoffen][ref1]
      vervoert en de tekens, bedoeld in [artikel 3.14, eerste lid, van het Binnenvaartpolitiereglement][ref2] of het
      [Rijnvaartpolitiereglement 1995][ref3] voert, wordt niet getankt met vloeibare brandstoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0007606#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0003628#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0006923
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.546
    references:
      - id: ref1
        bwb_id: BWBR0007606
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0003628
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0006923
  - number: 4.546.3
    text: |-
      Een schip dat gevaarlijke stoffen als bedoeld in [artikel 1 van de Wet vervoer gevaarlijke stoffen][ref1]
      vervoert en de tekens, bedoeld in [artikel 3.14, eerste lid, van het Binnenvaartpolitiereglement][ref2] of
      het [Rijnvaartpolitiereglement 1995][ref3] voert, wordt vanaf een bunkerstation niet getankt met vloeibare
      brandstoffen, als vanaf dat bunkerstation benzine wordt getankt.


      [ref1]: https://wetten.overheid.nl/BWBR0007606#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0003628#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0006923
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.546
    references:
      - id: ref1
        bwb_id: BWBR0007606
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0003628
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0006923
  - number: 4.547.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met vloeibare brandstoffen of ureum bevindt een
      tankzuil op land zich boven een vloeistofdichte bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.547
  - number: 4.547.2
    text: De vloeistofdichte bodemvoorziening bevindt zich 1 m rondom de tankzuil en tussen de tankzuil en de kade.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.547
  - number: 4.547.3
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.547
  - number: 4.547.4
    text: |-
      Het derde lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarde voor olie, bedoeld in
      [artikel 4.550][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.547
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.43'
  - number: 4.547.5
    text: Er wordt door of onder direct toezicht van personeel getankt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.547
  - number: 4.548.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem of een oppervlaktewaterlichaam met vloeibare
      brandstoffen of ureum wordt bij het tanken met een elektrische pomp gebruik gemaakt van een vulpistool of een slang
      die is aangekoppeld via een vaste aansluiting.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.548
  - number: 4.548.2
    text: 'Het vulpistool heeft een automatisch afslagmechanisme dat afslaat als:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.548
  - number: 4.548.2.a
    text: de brandstoftank vol is; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.548
  - number: 4.548.2.b
    text: het vulpistool valt.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.548
  - number: 4.548.3
    text: |-
      De slang die is aangekoppeld via een vaste aansluiting heeft een automatisch afslagmechanisme dat afslaat als de
      brandstoftank vol is.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.548
  - number: 4.549.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van een vloeistofdichte
      bodemvoorziening geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.549
  - number: 4.549.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.549
  - number: '4.550'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of wordt dat afvalwater voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.550
  - number: 4.550.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.550
  - number: 4.550.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.550
  - number: 4.551.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.551
  - number: 4.551.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.551
  - number: 4.551.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.551
  - number: '4.552'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.552
  - number: 4.552.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.552
  - number: 4.552.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.552
  - number: 4.552.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.552
  - number: 4.553.1
    text: |-
      [Artikel 4.542, eerste en tweede lid][ref1], is niet van toepassing op tankzuilen die zijn geïnstalleerd voor
      1 januari 2011.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.553
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.43'
  - number: 4.553.2
    text: |-
      De [artikelen 4.542, eerste lid][ref1], en [4.543][ref2] zijn niet van toepassing op het tanken van vaartuigen of
      drijvende werktuigen dat voor de inwerkingtreding van dit besluit al rechtmatig werd verricht, mits die activiteit
      naar aard en omvang niet verschilt van de activiteit zoals deze werd verricht voor de inwerkingtreding van dit
      besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.553
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.43'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.43'
  - number: 4.554.1
    text: Deze paragraaf is van toepassing op het wassen van gemotoriseerde voertuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.554
  - number: 4.554.2
    text: |-
      Deze paragraaf is niet van toepassing op het reinigen van voertuigen of werktuigen voor agrarische activiteiten,
      bedoeld in [paragraaf 4.90][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.554
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '4'
        paragraaf: '4.90'
  - number: 4.555.1
    text: |-
      Het is verboden de milieubelastende activiteit, bedoeld in [artikel 4.554][ref1], te verrichten zonder dit ten
      minste vier weken voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.555
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.44'
  - number: 4.555.2
    text: |-
      Dit artikel is niet van toepassing als de activiteit als vergunningplichtig is aangewezen in [hoofdstuk 3][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.555
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: '4.556'
    text: |-
      Bij het verrichten van de activiteit, bedoeld in [artikel 4.554][ref1], wordt voldaan aan de regels over:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.556
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.44'
  - number: 4.556.a
    text: |-
      het eindonderzoek bodem, bedoeld in [paragraaf 5.2.1][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.556
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.2.1
        afdeling: '5.2'
  - number: 4.556.b
    text: |-
      bodembeschermende voorzieningen, bedoeld in [paragraaf 5.4.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.556
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '5'
        paragraaf: 5.4.2
        afdeling: '5.4'
  - number: 4.557.1
    text: |-
      Met het oog op het voorkomen van verontreiniging van de bodem met oliën, vetten en koelvloeistof wordt gewassen
      boven een vloeistofdichte bodemvoorziening.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.557
  - number: 4.557.2
    text: |-
      Het deel van het vuilwaterriool dat op een vloeistofdichte bodemvoorziening is aangesloten, is vloeistofdicht vanaf
      de aansluiting tot aan de slibvangput en olieafscheider.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.557
  - number: 4.557.3
    text: |-
      Het tweede lid is niet van toepassing als wordt voldaan aan de emissiegrenswaarde voor olie, bedoeld in
      [artikel 4.559][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.557
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.44'
  - number: 4.558.1
    text: |-
      Met het oog op het doelmatig beheer van afvalwater wordt het te lozen afvalwater afkomstig van het wassen van
      gemotoriseerde voertuigen geloosd in een vuilwaterriool.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.558
  - number: 4.558.2
    text: |-
      Als een maatwerkvoorschrift is gesteld of een voorschrift aan een omgevingsvergunning is verbonden waarin een
      andere lozingsroute is toegestaan, wordt het te lozen afvalwater geloosd in een vuilwaterriool of via die andere
      route.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.558
  - number: '4.559'
    text: |-
      Voor het afvalwater dat wordt geloosd in een vuilwaterriool, is de emissiegrenswaarde voor olie 20 mg/l, gemeten
      in een steekmonster, of dat afvalwater wordt voor vermenging met ander afvalwater geleid door een slibvangput en
      olieafscheider:
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.559
  - number: 4.559.a
    text: volgens NEN-EN 858-1 en NEN-EN 858-2; of
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.559
  - number: 4.559.b
    text: die zijn geplaatst voor 2 november 2010 en zijn afgestemd op de hoeveelheid afvalwater die wordt geloosd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.559
  - number: 4.560.1
    text: Op het bemonsteren van afvalwater is NEN 6600-1 van toepassing, en een monster is niet gefiltreerd.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.560
  - number: 4.560.2
    text: Op het conserveren van een monster is NEN-EN-ISO 5667-3 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.560
  - number: 4.560.3
    text: |-
      Bij het analyseren van een monster worden onopgeloste stoffen meegenomen, en op het analyseren is voor olie NEN-EN-
      ISO 9377-2 van toepassing.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.560
  - number: '4.561'
    text: 'Er is een tekening beschikbaar waarop is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.561
  - number: 4.561.a
    text: op welke punten welk afvalwater wordt geloosd;
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.561
  - number: 4.561.b
    text: |-
      of de punten waarop afvalwater wordt geloosd zijn aangesloten op het eigen vuilwaterriool of een schoonwaterriool;
      en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.561
  - number: 4.561.c
    text: op welke lozingsroutes het eigen vuilwaterriool en een schoonwaterriool uitkomen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.561
  - number: 4.562.1
    text: Deze paragraaf is van toepassing op het verwijderen van graffiti.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.562
  - number: 4.562.2
    text: |-
      Deze paragraaf is niet van toepassing op het reinigen, lijmen en coaten van diverse materialen, bedoeld in
      [paragraaf 4.21][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.562
    references:
