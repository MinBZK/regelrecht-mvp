        artikel: '1'
      - id: ref3
        bwb_id: BWBR0021777
        artikel: '1'
      - id: ref4
        bwb_id: BWBR0021777
        artikel: '1'
      - id: ref5
        bwb_id: BWBR0021777
        artikel: '5'
      - id: ref6
        bwb_id: BWBR0021777
        artikel: '6'
      - id: ref7
        bwb_id: BWBR0005290
        artikel: '690'
      - id: ref8
        bwb_id: BWBR0005290
        artikel: '691'
      - id: ref9
        bwb_id: BWBR0041330
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.2
        afdeling: '18.1'
      - id: ref10
        bwb_id: BWBR0041330
        artikel: '18'
        hoofdstuk: '18'
        paragraaf: 18.1.2
        afdeling: '18.1'
  - number: '18.2'
    text: |-
      Deze afdeling gaat over milieubelastende activiteiten die zijn aangewezen in [paragraaf 18.1.2][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk18
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '18'
        paragraaf: 18.1.2
        afdeling: '18.1'
  - number: '18.3'
    text: |-
      De regels in deze afdeling zijn gesteld met het oog op het beperken van emissies in de lucht van kooldioxide die
      ontstaan door verbranding van brandstof in de motor van voertuigen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.3
  - number: 18.4.1
    text: |-
      Voor een milieubelastende activiteit is het college van burgemeester en wethouders van de gemeente waarbinnen
      degene die de milieubelastende activiteit verricht, is gevestigd, het bevoegd gezag dat een maatwerkvoorschrift
      kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.4
  - number: 18.4.2
    text: |-
      Als degene die de milieubelastende activiteit verricht meerdere vestigingen heeft, is het college van burgemeester
      en wethouders van de gemeente waarbinnen de hoofdvestiging of hoofdnederzetting is gevestigd, het bevoegd gezag dat
      een maatwerkvoorschrift kan stellen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.4
  - number: 18.5.1
    text: |-
      Het bevoegd gezag, bedoeld in deze afdeling, dat zijn bevoegdheid met toepassing van
      [artikel 4.13a van de wet][ref1] overdraagt, geeft tegelijk met of zo spoedig mogelijk na de bekendmaking van het
      delegatiebesluit kennis van dat besluit op de in [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 18.5.2
    text: Het eerste lid is van overeenkomstige toepassing als het delegatiebesluit wordt ingetrokken.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.5
  - number: '18.6'
    text: |-
      Aan deze afdeling wordt voldaan door degene die de activiteit verricht. Diegene draagt zorg voor de naleving van de
      regels over de activiteit.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel18.6
  - number: 18.7.1
    text: |-
      Een maatwerkregel kan worden gesteld over [artikel 18.12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel18
