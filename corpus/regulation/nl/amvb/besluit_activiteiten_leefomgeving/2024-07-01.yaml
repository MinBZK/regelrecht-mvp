  - number: 4.88.1
    text: |-
      Het resultaat van de continue meting en periodieke meting zijn de gevalideerde meetresultaten. Dat zijn de
      meetresultaten van de halfuurgemiddelden of de deelmetingen, verminderd met de aangetoonde meetonzekerheid, die
      niet meer is dan het percentage van de emissiegrenswaarde of niet meer is dan het aantal milligram per normaal
      kubieke meter, bedoeld in tabel 4.88.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.88
  - number: 4.88.2
    text: |-
      De gevalideerde halfuurgemiddelden en daggemiddelden worden bij continue metingen en periodieke
      metingen vastgesteld op grond van de valide gemeten halfuurgemiddelden, verminderd met de waarde van het
      95%-betrouwbaarheidsinterval.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel4.88
  - number: 4.88.3
    text: |-
      De meetonzekerheid wordt bepaald op basis van het 95%-betrouwbaarheidsinterval van individuele metingen.
