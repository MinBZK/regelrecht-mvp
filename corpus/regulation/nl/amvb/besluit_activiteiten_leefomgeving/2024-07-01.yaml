  - number: 7.60.3
    text: |-
      Het verbod, bedoeld in het eerste lid, aanhef en onder b, geldt niet voor baggerwerkzaamheden en het toepassen van
      baggerspecie, bedoeld in [artikel 1 van het Besluit bodemkwaliteit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
  - number: 7.60.4
    text: |-
      Het verbod, bedoeld in het eerste lid, aanhef en onder c, geldt niet voor het lozen van stoffen, water of warmte op
      een oppervlaktewaterlichaam afkomstig van een milieubelastende activiteit als bedoeld in [artikel 3.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.60
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.1'
  - number: 7.61.1
    text: |-
      Ten minste 48 uur voor het lozen van afvalwater afkomstig van een calamiteitenoefening worden aan het bevoegd
      gezag, bedoeld in [artikel 7.3][ref1], de volgende gegevens en bescheiden verstrekt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.1'
  - number: 7.61.1.a
    text: gegevens waaruit blijkt of er bij de oefening blusschuim wordt gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61
  - number: 7.61.1.b
    text: 'als er bij de oefening blusschuim wordt gebruikt: welke stoffen dat blusschuim bevat.'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61
  - number: 7.61.2
    text: |-
      Dit artikel is niet van toepassing op het lozen van afvalwater afkomstig van een permanente voorziening voor het
      oefenen van brandbestrijdingstechnieken, bedoeld in [artikel 3.259][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.7.10
        afdeling: '3.7'
  - number: 7.61a.1
    text: |-
      Het is verboden de activiteit, bedoeld in [artikel 7.61b][ref1], te verrichten zonder dit ten minste vier weken
      voor het begin ervan te melden.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.2.7
        afdeling: '7.2'
  - number: 7.61a.2
    text: 'De melding bevat:'
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61a
  - number: 7.61a.2.a
    text: een aanduiding van het soort goederen; en
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61a
  - number: 7.61a.2.b
    text: de hoeveelheid die ten hoogste wordt opgeslagen.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61a
  - number: 7.61a.3
    text: |-
      Ten minste vier weken voordat de activiteit op een andere manier wordt verricht dan overeenkomstig die gegevens,
      wordt een melding gedaan.
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61a
  - number: 7.61b
    text: |-
      In afwijking van [artikel 4.1058, eerste lid][ref1], kan het te lozen afvalwater afkomstig van het opslaan van
      uitlogende goederen, ingedeeld in [bijlage IVA][ref2], deel B, ook worden geloosd in de Noordzee, als de afstand
      tot een vuilwaterriool of zuiveringtechnisch werk meer dan 40 m is, gerekend vanaf de kadastrale grens van het
      perceel waar het afvalwater vrijkomt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041330/2024-07-01#Artikel7.61b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: '4.104'
      - id: ref2
        bwb_id: BWBR0041330
  - number: 7.61c
    text: |-
      Voor het afvalwater, bedoeld in [artikel 7.61b][ref1], dat wordt geloosd in de Noordzee, zijn de
      emissiegrenswaarden de waarden, bedoeld in tabel 7.61c, gemeten in een steekmonster.
