  - number: 3.52.2
    text: |-
      In afwijking van het eerste lid, onder a, onder 3o, wordt het besluit, als sprake is van een projectbesluit of
      een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit van provinciaal of nationaal belang, genomen
      door het bevoegd gezag voor dat besluit of, als dat een andere minister is, Onze Minister van Infrastructuur en
      Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.52
  - number: 3.52.3
    text: |-
      In afwijking van het eerste lid, onder a, b en c, en het tweede lid, wordt het besluit over een geluidgevoelig
      gebouw dat gelegen is buiten het grondgebied van de gemeente, het waterschap of de provincie waar de geluidbron
      gelegen is, genomen door het college van burgemeester en wethouders van de gemeente waar het gebouw gelegen is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.52
  - number: 3.53.1
    text: |-
      Tot het treffen van geluidwerende maatregelen wordt besloten als het geluid in een geluidgevoelige ruimte hoger is
      dan de grenswaarde, bedoeld in tabel 3.53.
            Tabel 3.53: Grenswaarde in geluidgevoelige ruimten (binnenwaarde)


