      [ref7]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref8]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.85
