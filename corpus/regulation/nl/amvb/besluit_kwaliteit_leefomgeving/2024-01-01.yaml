        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 9.3a.1
    text: |-
      Als met toepassing van [artikel 5.53, derde of vierde lid, van de wet][ref1] regels in een waterschapsverordening
      als bedoeld in [artikel 6.1][ref2] buiten toepassing worden gelaten, worden de eisen, bedoeld in de artikelen 10 en
      11, derde lid, aanhef en onder g, van de kaderrichtlijn water, in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.3a
