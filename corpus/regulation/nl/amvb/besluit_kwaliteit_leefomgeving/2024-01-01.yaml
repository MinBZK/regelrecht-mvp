        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78l.5
    text: |-
      In afwijking van het vierde lid kan aan het tweede lid worden voldaan door toepassing te geven aan
      [artikel 5.78n][ref1] of [5.78o][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78l
