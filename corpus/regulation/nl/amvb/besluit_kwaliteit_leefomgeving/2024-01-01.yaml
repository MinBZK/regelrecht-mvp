        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 5.149.2
    text: |-
      De bepalingen in de [paragrafen 5.1.7.2][ref1], [5.1.7.3][ref2] en [5.1.7.4][ref3] zijn niet van toepassing voor
      zover activiteiten zijn toegestaan op grond van een in werking getreden projectbesluit of omgevingsvergunning
      voor een buitenplanse omgevingsplanactiviteit, dat is vastgesteld respectievelijk die is verleend door een
      bestuursorgaan van het Rijk.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.149
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 5.149.3
    text: |-
      De bepalingen in [paragraaf 5.1.7.7][ref1] zijn niet van toepassing voor zover activiteiten zijn toegestaan op
      grond van een omgevingsvergunning voor een bouwactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.149
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 5.150.1
    text: |-
      Militaire terreinen en terreinen met een militair object zijn de locaties, genoemd in [bijlage XIV][ref1], onder A,
      waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.150
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.150.2
    text: |-
      Onveilige gebieden bij militaire schietbanen zijn de locaties, genoemd in [bijlage XIV][ref1], onder B, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.150
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.150.3
    text: |-
      Gebieden waar bouwwerken een militaire zend- en ontvangstinstallatie kunnen verstoren zijn de locaties, genoemd in
      [bijlage XIV][ref1], onder C, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.150
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.150.4
    text: |-
      Gebieden waar zich een militaire laagvliegroute voor jacht- en transportvliegtuigen bevindt, zijn de locaties,
      genoemd in [bijlage XIV][ref1], onder D, waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.150
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.150.5
    text: |-
      Gebieden waar bouwwerken het radarbeeld kunnen verstoren, zijn de locaties binnen een straal van 75 km rondom
      de radarstations, genoemd in [bijlage XIV][ref1], onder E, waarvan de geometrische begrenzing bij ministeriële
      regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.150
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: '5.151'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een militair terrein of een terrein met een militair object, laat
      het omgevingsplan geen activiteiten toe die het gebruik van dat terrein of object kunnen belemmeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.151
  - number: '5.152'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een onveilig gebied bij een militaire schietbaan, laat het
      omgevingsplan geen activiteiten toe die het gebruik van dat gebied als oefen- en schietgebied kunnen belemmeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.152
  - number: '5.153'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een gebied waar bouwwerken een militaire zend- en
      ontvangstinstallatie kunnen verstoren, laat het omgevingsplan het bouwen van bouwwerken met een hoogte van meer dan
      22 m vanaf het maaiveld niet toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.153
  - number: '5.154'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een gebied waar zich een laagvliegroute voor jacht- en
      transportvliegtuigen bevindt, laat het omgevingsplan het bouwen van bouwwerken met een hoogte van meer dan 40 m
      vanaf het maaiveld niet toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.154
  - number: 5.155.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op gebieden waar bouwwerken het radarbeeld kunnen verstoren, laat
      het omgevingsplan niet toe dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.155
  - number: 5.155.1.a
    text: |-
      binnen een straal van 15 km vanaf de radar bouwwerken worden gebouwd die de maximale hoogte van bouwwerken, bedoeld
      in de tabel in [bijlage XIV][ref1], onder E, overschrijden; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.155
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.155.1.b
    text: |-
      binnen een straal van 15 tot 75 km vanaf de radar windturbines worden gebouwd met een tiphoogte die de maximale
      hoogte van windturbines, bedoeld in de tabel in [bijlage XIV][ref1], onder E, overschrijdt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.155
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.155.2
    text: |-
      Als op een locatie meerdere gebieden als bedoeld in het eerste lid, aanhef en onder b, elkaar overlappen en sprake
      is van verschillende maximale hoogtes, is de laagste hoogte bepalend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.155
  - number: 5.155.3
    text: |-
      In een omgevingsplan kan worden bepaald dat het is verboden zonder omgevingsvergunning bouwwerken of windturbines
      te bouwen die hoger zijn dan de maximale hoogte, bedoeld in het eerste lid, als regels worden gesteld die ertoe
      strekken dat de omgevingsvergunning alleen wordt verleend als die bouwwerken respectievelijk windturbines geen
      onaanvaardbare gevolgen hebben voor het radarbeeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.155
  - number: 5.156.1
    text: |-
      Locaties voor grootschalige elektriciteitsopwekking met een of meer elektriciteitsproductie-installaties met een
      gezamenlijk vermogen van ten minste 500 MW en de daarmee verbonden werken en infrastructuur, met uitzondering van
      kernenergiecentrales en elektriciteitsproductie-installaties die elektriciteit opwekken door windenergie, zijn
      de locaties, genoemd in [bijlage XV][ref1], onder A, waarvan de geometrische begrenzing bij ministeriële regeling
      is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.156
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.156.2
    text: |-
      Locaties voor een kernenergiecentrale zijn de locaties, genoemd in [bijlage XV][ref1], onder B, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.156
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.156.3
    text: |-
      Locaties voor een hoogspanningsverbinding met een spanning van ten minste 220 kV zijn de tracés tussen de locaties,
      genoemd in [bijlage XV][ref1], onder C, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd
      en de tracés tussen een locatie voor grootschalige elektriciteitsopwekking en het hoogspanningsnet met een spanning
      van ten minste 220 kV.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.156
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: '5.157'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een locatie voor grootschalige elektriciteitsopwekking, laat het
      omgevingsplan grootschalige elektriciteitsopwekking toe, voorziet het omgevingsplan in voldoende ruimte daarvoor en
      bevat het omgevingsplan geen regels die het gebruik van de installaties voor grootschalige elektriciteitsopwekking
      beperken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.157
  - number: '5.158'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een locatie voor een kernenergiecentrale en het gebied binnen een
      straal van één km rondom die locatie, laat het omgevingsplan niet toe:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.158
  - number: 5.158.a
    text: |-
      het bouwen van gebouwen met een woonfunctie, wanneer als gevolg daarvan het aantal inwoners in het gebied meer dan
      5.000 zal bedragen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.158
  - number: 5.158.b
    text: |-
      het bouwen of de realisatie van andere kwetsbare of zeer kwetsbare gebouwen of kwetsbare locaties, met uitzondering
      van een kernenergiecentrale op de locatie en kwetsbare of zeer kwetsbare gebouwen of kwetsbare locaties die naar
      het oordeel van het bevoegd gezag noodzakelijk zijn voor het gebied of voor een binnen het gebied toegelaten
      activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.158
  - number: 5.159.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op een locatie voor een hoogspanningsverbinding met een spanning van
      ten minste 220 kV, bevat het omgevingsplan het tracé van die hoogspanningsverbinding en laat het omgevingsplan het
      gebruik als hoogspanningsverbinding en de daarmee verbonden schakel- en transformatorstations en andere voor die
      hoogspanningsverbinding noodzakelijke hulpmiddelen toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.2
    text: Een omgevingsplan wijst geen ander tracé voor hoogspanningsverbindingen met een spanning van ten minste 220 kV aan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.3
    text: |-
      In afwijking van het tweede lid kan het omgevingsplan een ander tracé voor de hoogspanningsverbinding aanwijzen,
      mits:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.3.a
    text: de hoogspanningsverbinding als zodanig in het omgevingsplan wordt gehandhaafd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.3.b
    text: het gewijzigde tracé aansluit op het tracé voor de hoogspanningsverbinding in de naastliggende gemeenten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.3.c
    text: |-
      de wijziging geen nadelige gevolgen heeft voor de beheerder van het landelijk hoogspanningsnet die onevenredig zijn
      in verhouding tot het belang dat met de wijziging van het tracé wordt gediend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: 5.159.4
    text: Het eerste lid is van overeenkomstige toepassing op het gewijzigde tracé.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.159
  - number: '5.160'
    text: |-
      Een rijkswater, uitgezonderd de Noordzee, de Waddenzee, de Westerschelde en het IJsselmeer, dat een vaarweg is,
      heeft aan weerszijden van die vaarweg een vrijwaringsgebied met een breedte die afhankelijk is van de afmetingen
      van het scheepvaartverkeer op de vaarweg, maar die ten hoogste 50 m bedraagt en waarvan de geometrische begrenzing
      bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.160
  - number: '5.161'
    text: |-
      Voor zover een omgevingsplan van toepassing is op een rijkswater als bedoeld in [artikel 5.160][ref1] dat een
      vaarweg is of een vrijwaringsgebied als bedoeld in dat artikel, wordt in het omgevingsplan rekening gehouden met
      het belang van het voorkomen van belemmeringen voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 5.161.a
    text: de vlotte en veilige doorvaart van de scheepvaart in de breedte, hoogte en diepte;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
  - number: 5.161.b
    text: de zichtlijnen van de bemanning en de op het schip aanwezige navigatieapparatuur voor de scheepvaart;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
  - number: 5.161.c
    text: het contact van de scheepvaart met bedienings- en begeleidingsobjecten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
  - number: 5.161.d
    text: de toegankelijkheid van de vaarweg voor hulpdiensten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
  - number: 5.161.e
    text: het uitvoeren van beheer en onderhoud van de vaarweg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161
  - number: 5.161a.1
    text: |-
      Gebieden waar bouwwerken communicatie-, navigatie- en radarapparatuur buiten Schiphol of overige burgerluchthavens
      van nationale en regionale betekenis kunnen verstoren, zijn de locaties, genoemd in bijlage XVa, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161a
  - number: 5.161a.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op een gebied als bedoeld in het eerste lid, laat het omgevingsplan
      geen bouwwerken toe die de maximaal toelaatbare hoogte voor bouwwerken, bedoeld in bijlage XVa, overschrijden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161a
  - number: 5.161a.3
    text: |-
      Voor zover een omgevingsplan van toepassing is op een gebied als bedoeld in het eerste lid, laat het omgevingsplan
      geen windturbines toe met een tiphoogte die de maximaal toelaatbare hoogte voor bouwwerken en windturbines, bedoeld
      in bijlage XVa, overschrijdt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161a
  - number: 5.161a.4
    text: |-
      In een omgevingsplan kan worden bepaald dat het is verboden zonder omgevingsvergunning bouwwerken of windturbines
      te bouwen die hoger zijn dan de maximale hoogte, bedoeld in het tweede respectievelijk derde lid, als regels worden
      gesteld die ertoe strekken dat de omgevingsvergunning alleen wordt verleend als die bouwwerken respectievelijk
      windturbines geen onaanvaardbare gevolgen hebben voor de apparatuur, bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161a
  - number: 5.161a.5
    text: |-
      De [artikelen 5.150, vijfde lid][ref1], en [5.155][ref2] zijn van overeenkomstige toepassing op de locatie rondom
      radarstations, genoemd in [bijlage XIV][ref3], onder F.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
  - number: 5.161b
    text: |-
      Voor zover een omgevingsplan voorziet in nieuwe ontwikkelingen die de landelijke fiets- en wandelroutes, genoemd in
      [bijlage XVI][ref1], kunnen doorsnijden, wordt het belang van de instandhouding van deze fiets- en wandelroutes bij
      het omgevingsplan betrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161b
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.161ba.1
    text: Deze paragraaf is van toepassing op hyperscale datacentra.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161ba
  - number: 5.161ba.2
    text: |-
      Onder een hyperscale datacentrum wordt verstaan het exploiteren van een rekencentrum of datacentrum, als
      bedoeld in [artikel 3.235 van het Besluit activiteiten leefomgeving][ref1], voor zover het gaat om een bebouwd
      vloeroppervlakte van meer dan 10 ha en een elektrisch aansluitvermogen van 70 MW of meer.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161ba
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.161ba.3
    text: |-
      Een hyperscale datacentrum omvat ook andere activiteiten die worden verricht op dezelfde locatie en die het
      hyperscale datacentrum functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161ba
  - number: 5.161bb
    text: |-
      Het uitsluitingsgebied hyperscale datacentra, zijnde het gebied waar geen hyperscale datacentra zijn toegelaten, is
      het grondgebied van Nederland met uitzondering van enkele locaties gelegen in de gemeenten Het Hogeland en Hollands
      Kroon, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161bb
  - number: 5.161bc
    text: |-
      Voor zover een omgevingsplan van toepassing is op het uitsluitingsgebied hyperscale datacentra, bedoeld in
      [artikel 5.161bb][ref1], laat het omgevingsplan geen hyperscale datacentrum toe.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161bc
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 5.161c.1
    text: |-
      Een omgevingsplan dat bouwactiviteiten toelaat waarvoor op grond van [artikel 13.11, eerste lid, van de wet][ref1]
      kosten moeten worden verhaald, kan regels over te realiseren categorieën woningen bevatten, voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 5.161c.1.a
    text: |-
      sociale huurwoningen, zijnde huurwoningen met een aanvangshuurprijs onder de grens, bedoeld in
      [artikel 13, eerste lid, onder a, van de Wet op de huurtoeslag][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0008659#Artikel13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
    references:
      - id: ref1
        bwb_id: BWBR0008659
        artikel: '13'
  - number: 5.161c.1.b
    text: |-
      sociale koopwoningen, zijnde koopwoningen met een koopprijs vrij op naam van ten hoogste de kostengrens, bedoeld in
      de Voorwaarden en Normen Nationale Hypotheekgarantie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.1.c
    text: |-
      geliberaliseerde woningen voor middenhuur, zijnde huurwoningen met een aanvangshuurprijs van ten minste het bedrag,
      bedoeld in [artikel 13, eerste lid, onder a, van de Wet op de huurtoeslag][ref1], en ten hoogste een in het
      omgevingsplan bepaalde, jaarlijks te indexeren aanvangshuurprijs; en


      [ref1]: https://wetten.overheid.nl/BWBR0008659#Artikel13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
    references:
      - id: ref1
        bwb_id: BWBR0008659
        artikel: '13'
  - number: 5.161c.1.d
    text: woningen die alleen mogen worden gebouwd in particulier opdrachtgeverschap.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.2
    text: |-
      Een omgevingsplan dat regels als bedoeld in het eerste lid, aanhef en onder a, b, of c, bevat, bepaalt dat het
      gebruik van bedoelde woningen als sociale huurwoningen, sociale koopwoningen respectievelijk geliberaliseerde
      woningen voor middenhuur in stand blijft voor een in het omgevingsplan omschreven doelgroep gedurende een in het
      omgevingsplan bepaalde termijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.3
    text: 'De termijn, bedoeld in het tweede lid, bedraagt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.3.a
    text: 'voor sociale huurwoningen: ten minste tien jaar na ingebruikname;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.3.b
    text: 'voor sociale koopwoningen: ten minste een jaar en ten hoogste tien jaar na ingebruikname; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.3.c
    text: 'voor geliberaliseerde woningen voor middenhuur: ten minste tien jaar na ingebruikname.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.4
    text: |-
      Een omgevingsplan dat regels als bedoeld in het eerste lid, aanhef en onder d, bevat, verzekert dat
      bouwactiviteiten als bedoeld in [artikel 13.11, eerste lid, van de wet][ref1] op percelen voor particulier
      opdrachtgeverschap worden verricht door een burger of een groep van burgers, georganiseerd als rechtspersoon zonder
      winstoogmerk of krachtens een overeenkomst, die:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 5.161c.4.a
    text: ten minste een zakelijk recht op het gebruik van de grond verkrijgt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: 5.161c.4.b
    text: |-
      volledige zeggenschap heeft en verantwoordelijkheid draagt over het gebruik van de grond en over het ontwerp en de
      bouw van de woning.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.161c
  - number: '5.162'
    text: |-
      Voor zover een omgevingsplan voorziet in nieuwe ontwikkelingen met gevolgen voor de inrichting van de
      openbare buitenruimte, wordt in het omgevingsplan rekening gehouden met het belang van het bevorderen van de
      toegankelijkheid van die openbare buitenruimte voor personen met een functiebeperking.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.162
  - number: '5.163'
    text: |-
      In een omgevingsplan dat van toepassing is op de hoofdspoorweginfrastructuur of op een weg in beheer bij het
      Rijk worden geen regels gesteld die het gebruik, de instandhouding, de verbetering of de vernieuwing van die
      infrastructuur belemmeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.163
  - number: 5.164.1
    text: |-
      Dit artikel is van toepassing op lokale spoorwegen binnen de op grond van
      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] aangewezen gebieden.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.164
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 5.164.2
    text: |-
      In het omgevingsplan wordt de geometrische begrenzing vastgelegd van het beperkingengebied waarbinnen de
      vergunningplicht voor een beperkingengebiedactiviteit geldt volgens de aanwijzing van dit gebied op grond van
      [artikel 12 van de Wet lokaal spoor][ref1] door het dagelijks bestuur van het openbaar lichaam, bedoeld in
      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0034363#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.164
    references:
      - id: ref1
        bwb_id: BWBR0034363
        artikel: '12'
      - id: ref2
        bwb_id: BWBR0011470
        artikel: '20'
  - number: '5.165'
    text: |-
      Als industrieel afvalwater dat niet afkomstig is van een milieubelastende activiteit die in
      [hoofdstuk 3 van het Besluit activiteiten leefomgeving][ref1] is aangewezen, wordt geloosd op het openbaar
      vuilwaterriool, laat een omgevingsplan die lozing alleen toe, als wordt voldaan aan de eisen van bijlage I,
      afdeling C, bij de richtlijn stedelijk afvalwater.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.165
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 5.165a
    text: |-
      In een omgevingsplan wordt voor de toepassing van de [artikelen 11.71, vierde lid][ref1], en
      [11.76, derde lid, aanhef en onder a, van het Besluit activiteiten leefomgeving][ref2] een bebouwingscontour
      jacht aangewezen aansluitend aan stedelijk gebied en aansluitend aan lintbebouwing langs wegen, waterwegen of
      waterkeringen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.165a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 5.165b
    text: |-
      In een omgevingsplan wordt voor de toepassing van
      [artikel 11.111, tweede lid, aanhef en onder a, van het Besluit activiteiten leefomgeving][ref1] een
      bebouwingscontour houtkap aangewezen aansluitend aan stedelijk gebied.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.165b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: '5.166'
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijkrelaties, in voorkomend geval in overeenstemming met
      Onze Minister die het aangaat, kan op verzoek van het college van burgemeester en wethouders ontheffing
      verlenen van de regels in de [paragrafen 5.1.3.2][ref1], [5.1.3.3][ref2], [5.1.3.4][ref3], [5.1.3.5][ref4],
      [5.1.5.2][ref5], [5.1.5.3][ref6], met uitzondering van de [artikelen 5.129d, eerste lid, onder a en g][ref7], en
      [5.129e, eerste en tweede lid][ref8], [5.1.6.2][ref9], [5.1.6.3][ref10], [5.1.6.4][ref11], [5.1.6.5][ref12] en
      [5.1.7][ref13] en [artikel 5.163][ref14].


