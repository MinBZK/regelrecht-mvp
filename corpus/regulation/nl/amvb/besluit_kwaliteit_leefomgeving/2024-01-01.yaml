    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.36.a
    text: |-
      op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van inwerkingtreding van die
      bepalingen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.36
  - number: 5.36.b
    text: |-
      zijn toegestaan op grond van een in werking getreden projectbesluit of omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, dat is vastgesteld respectievelijk die is verleend door een bestuursorgaan van het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.36
  - number: 5.37.1
    text: |-
      In een omgevingsplan wordt rekening gehouden met de gevolgen voor het beheer van watersystemen. Daarbij worden,
      voor een duiding van die gevolgen, de opvattingen van het bestuursorgaan dat is belast met het beheer van die
      watersystemen betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.37
  - number: 5.37.2
    text: |-
      Het eerste lid laat onverlet de in [paragraaf 5.1.3][ref1] gestelde specifieke regels over onderdelen van
      watersystemen in het omgevingsplan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.38.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op een primaire waterkering, wordt bij het toelaten van activiteiten
      gewaarborgd dat er geen belemmeringen ontstaan voor de instandhouding, het onderhoud of de versterking van de
      primaire waterkering.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.38
  - number: 5.38.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op een krachtens [artikel 2.20, eerste lid, van de wet][ref1] of
      bij omgevingsverordening of waterschapsverordening aangewezen gebied grenzend aan een primaire waterkering waar ter
      bescherming van de primaire waterkering regels gelden over activiteiten die gevolgen hebben of kunnen hebben voor
      die primaire waterkering, is het eerste lid van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.38.3
    text: |-
      Voor zover de primaire waterkering een zandige primaire waterkering binnen het kustfundament, bedoeld in
      [artikel 5.39][ref1], is, wordt bij het toelaten van activiteiten ook gewaarborgd dat het zandvolume binnen de
      primaire waterkering en het gebied, bedoeld in het tweede lid, duurzaam behouden blijft.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.38
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: '5.39'
    text: |-
      Het kustfundament is de locatie die is weergegeven op de kaarten in [bijlage XI][ref1] en waarvan de geometrische
      begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.40.1
    text: 'Een omgevingsplan laat geen bouwactiviteiten toe, voor zover het omgevingsplan van toepassing is op een locatie:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_binnen_kustfundament
            type: boolean
            required: true
            description: Of de locatie binnen het kustfundament is gelegen
            source: {}
          - name: locatie_buiten_stedelijk_gebied
            type: boolean
            required: true
            description: Of de locatie buiten stedelijk gebied is gelegen
            source: {}
        output:
          - name: bouwactiviteiten_niet_toegestaan
            type: boolean
            description: Of het omgevingsplan geen bouwactiviteiten mag toelaten op de locatie
        actions:
          - output: bouwactiviteiten_niet_toegestaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $locatie_binnen_kustfundament
                  value: true
                - operation: EQUALS
                  subject: $locatie_buiten_stedelijk_gebied
                  value: true
  - number: 5.40.1.a
    text: binnen het kustfundament; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.1.b
    text: gelegen buiten stedelijk gebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2
    text: 'Het eerste lid is niet van toepassing op bouwactiviteiten die betrekking hebben op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.a
    text: bouwwerken voor tijdelijke of seizoensgebonden activiteiten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.b
    text: |-
      een eenmalige uitbreiding van de grondoppervlakte van een bestaand bouwwerk met ten hoogste 10%, gerekend vanaf
      30 december 2011;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: uitbreiding_percentage
            type: number
            required: true
            description: Het percentage uitbreiding van de grondoppervlakte ten opzichte van het bestaande bouwwerk
            source: {}
          - name: is_eenmalige_uitbreiding
            type: boolean
            required: true
            description: Of het gaat om een eenmalige uitbreiding (geen eerdere uitbreiding sinds 30 december 2011)
            source: {}
        output:
          - name: uitbreiding_kustfundament_toegestaan
            type: boolean
            description: Of de uitbreiding van het bouwwerk binnen het kustfundament is toegestaan
        actions:
          - output: uitbreiding_kustfundament_toegestaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_eenmalige_uitbreiding
                  value: true
                - operation: LESS_THAN_OR_EQUAL
                  subject: $uitbreiding_percentage
                  value: 10
  - number: 5.40.2.c
    text: |-
      bouwwerken van openbaar belang die niet in het stedelijk gebied kunnen worden geplaatst, waarbij als bouwwerk van
      openbaar belang in ieder geval worden aangemerkt bouwwerken voor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.c.1°
    text: telecommunicatievoorzieningen en hulpverleningsdiensten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.c.2°
    text: |-
      opsporing, winning, opslag en transport van olie, gas en water, transport van elektriciteit en kleinschalige
      opwekking van elektriciteit met een windturbine; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.c.3°
    text: waterbeheer en natuurbeheer;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.d
    text: bouwwerken die bijdragen aan de versterking van het zandige deel van het kustfundament; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.2.e
    text: |-
      bouwwerken voor recreatief nachtverblijf of gebouwen ten behoeve van recreatief dagverblijf waar dranken worden
      geschonken, eten en drinkwaren voor consumptie worden bereid of verstrekt, of waar recreatieve activiteiten
      plaatsvinden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
  - number: 5.40.3
    text: |-
      Het eerste lid is niet van toepassing voor zover op grond van [artikel 7.2][ref1] bij omgevingsverordening van de
      provincie Fryslân voor de Friese Waddeneilanden regels zijn gesteld over omgevingsplannen die afwijken van dat lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.40
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        afdeling: 7.1a
  - number: 5.41.1
    text: |-
      Het rivierbed van de grote rivieren is de locatie in de rivieren die zijn weergegeven op de kaart in
      [bijlage XII][ref1], die wordt begrensd door de buitenkruinlijn van de primaire waterkering of de lijn van de
      hoogwaterkerende gronden bij die rivieren en waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.41
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.41.2
    text: |-
      Het stroomvoerend deel van het rivierbed van de grote rivieren is het deel van het rivierbed, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.41
  - number: 5.41.3
    text: |-
      Het bergend deel van het rivierbed van de grote rivieren is het deel van het rivierbed, waarvan de geometrische
      begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.41
  - number: 5.42.1
    text: |-
      De reserveringsgebieden voor de lange termijn voor de Rijntakken zijn de locaties, bestaande uit het retentiegebied
      in de Rijnstrangen, de hoogwatergeul bij Deventer, de dijkteruglegging Brakel, de dijkteruglegging Oosterhout, de
      dijkteruglegging Loenen en de hoogwatergeul Varik-Heesselt, waarvan de geometrische begrenzing bij ministeriële
      regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.42
  - number: 5.42.2
    text: |-
      De reserveringsgebieden voor de lange termijn voor de Maas zijn de locaties, bestaande uit de dijkverlegging
      Bokhoven, de dijkverlegging Kraaijenbergse Plassen, het retentiegebied Kraaijenbergse Plassen-west, het
      retentiegebied Keent Zuid bij Reek, de retentiegebieden dijkverlegging Overasselt, de dijkverlegging Alem, de
      dijkverlegging Moordhuizen, de dijkverleggingen Hedel en de dijkverleggingen Noorzijde Bergsche Maas, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.42
  - number: '5.43'
    text: |-
      Voor zover een omgevingsplan van toepassing is op het rivierbed van de grote rivieren, wordt bij het toelaten van
      activiteiten gewaarborgd dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.43
  - number: 5.43.a
    text: sprake is van een veilig en doelmatig gebruik van de rivier;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.43
  - number: 5.43.b
    text: feitelijke belemmeringen voor de vergroting van de afvoercapaciteit van de rivier worden voorkomen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.43
  - number: 5.43.c
    text: |-
      een waterstandverhoging of afname van het bergend vermogen van de rivier wordt voorkomen of zoveel mogelijk wordt
      beperkt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.43
  - number: '5.44'
    text: |-
      Voor zover een omgevingsplan van toepassing is op het rivierbed van de grote rivieren, kan het omgevingsplan in
      ieder geval de volgende activiteiten toelaten:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.44
  - number: 5.44.a
    text: |-
      activiteiten waarvoor geen omgevingsvergunning voor een beperkingengebiedactiviteit voor een waterstaatswerk in
      beheer bij het Rijk is vereist;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.44
  - number: 5.44.b
    text: activiteiten voor rivierbeheer en -verruiming;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.44
  - number: 5.44.c
    text: tijdelijke activiteiten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.44
  - number: 5.44.d
    text: activiteiten van rivierkundig ondergeschikt belang.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.44
  - number: 5.45.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het bergend deel van het rivierbed van de grote rivieren, kan het
      omgevingsplan, naast de activiteiten, bedoeld in [artikel 5.44][ref1], ook andere activiteiten toelaten, mits een
      afname van het bergend vermogen van de rivier als gevolg van die activiteiten wordt gecompenseerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.45
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.45.2
    text: Het omgevingsplan bevat in dat geval de maatregelen die de afname van het bergend vermogen compenseren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.45
  - number: 5.46.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het stroomvoerend deel van het rivierbed van de grote rivieren,
      kan het omgevingsplan, naast de activiteiten, bedoeld in [artikel 5.44][ref1], alleen de volgende activiteiten
      toelaten, mits een waterstandsverhoging van de rivier als gevolg van die activiteiten wordt gecompenseerd:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 5.46.1.a
    text: de aanleg of wijziging van waterstaatkundige kunstwerken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.b
    text: de aanleg van voorzieningen voor een betere en veilige afwikkeling van de beroeps- of recreatievaart;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.c
    text: de bouw van waterkrachtcentrales;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.d
    text: |-
      de vestiging of uitbreiding van overslagbedrijven of het realiseren van overslagfaciliteiten, als die activiteit is
      gekoppeld aan het vervoer over de rivier;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.e
    text: |-
      de aanleg of wijziging van scheepswerven voor beroeps- of pleziervaartuigen en specifiek daaraan verbonden
      activiteiten als bedoeld in [artikel 3.144 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.46.1.f
    text: de aanleg, het beheer of de verbetering van natuur;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.g
    text: de verbetering van de waterkwaliteit;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.h
    text: de uitbreiding of wijziging van bestaande steenfabrieken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.i
    text: de aanleg van voorzieningen voor waterrecreatie of extensieve uiterwaardrecreatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.j
    text: de winning van oppervlaktedelfstoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.k
    text: de aanleg van voorzieningen van groot openbaar belang die niet buiten het rivierbed kunnen worden gerealiseerd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.l
    text: |-
      activiteiten met een zwaarwegend bedrijfseconomisch belang voor bestaande grondgebonden agrarische bedrijven die
      niet buiten het rivierbed kunnen worden verricht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.m
    text: een verandering van een gebruiksfunctie binnen de bestaande bebouwing;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.n
    text: |-
      activiteiten voor het behoud van cultureel erfgoed, in het bijzonder bekende of aantoonbaar te verwachten
      archeologische monumenten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.o
    text: activiteiten die per saldo meer ruimte voor de rivier opleveren op een rivierkundig bezien aanvaardbare locatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.p
    text: de aanleg van voorzieningen voor het agrarisch, landschappelijk of daarmee vergelijkbaar beheer van het rivierbed;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.q
    text: het behoud of herstel van landschappelijke elementen of cultureel erfgoed;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.r
    text: verduurzaming van de energievoorziening van bestaande voorzieningen in het rivierbed; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.1.s
    text: |-
      de aanleg van voorzieningen voor elektriciteitsopwekking door zonne- of windenergie die redelijkerwijs niet buiten
      het rivierbed kan worden gerealiseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: 5.46.2
    text: |-
      Een omgevingsplan dat activiteiten als bedoeld in het eerste lid toelaat, bevat de maatregelen die de gevolgen voor
      de waterstand compenseren of, wanneer onderdeel o van dat lid van toepassing is, die meer ruimte voor de rivier
      opleveren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.46
  - number: '5.47'
    text: |-
      Voor zover een omgevingsplan van toepassing is op de reserveringsgebieden voor de lange termijn voor de Rijntakken
      of de Maas, laat het omgevingsplan geen grootschalige of kapitaalintensieve ontwikkelingen toe die het treffen van
      rivierverruimende maatregelen kunnen belemmeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.47
  - number: '5.48'
    text: |-
      Het IJsselmeergebied is de locatie, bestaande uit de oppervlaktewaterlichamen, genoemd in
      [artikel 3.12, onder e][ref1], waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.48
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 5.49.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het IJsselmeergebied, laat het omgevingsplan geen landaanwinning
      en bouwactiviteiten toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_in_ijsselmeergebied
            type: boolean
            required: true
            description: Of de locatie in het IJsselmeergebied is gelegen
            source: {}
        output:
          - name: landaanwinning_en_bouw_verboden
            type: boolean
            description: Of landaanwinning en bouwactiviteiten verboden zijn
        actions:
          - output: landaanwinning_en_bouw_verboden
            value:
              operation: EQUALS
              subject: $locatie_in_ijsselmeergebied
              value: true
  - number: 5.49.2
    text: |-
      Het eerste lid is niet van toepassing op landaanwinning en bouwactiviteiten voor ontwikkelingen die zijn gericht op
      overstroombare natuur en daarvoor benodigde beschermende waterstaatkundige constructies, projecten in het kader van
      dijk- of kustversterking en projecten van nationaal belang voor windenergie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3
    text: |-
      Het eerste lid is ook niet van toepassing op landaanwinning en bouwactiviteiten met een totale oppervlakte per
      gemeente van ten hoogste:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gemeente
            type: string
            required: true
            description: De naam van de gemeente
            source: {}
          - name: totale_oppervlakte_ha
            type: number
            required: true
            description: De totale oppervlakte van landaanwinning en bouwactiviteiten in hectare
            source: {}
        output:
          - name: maximale_oppervlakte_ha
            type: number
            description: De maximaal toegestane oppervlakte in hectare voor de betreffende gemeente
          - name: oppervlakte_toegestaan
            type: boolean
            description: Of de totale oppervlakte binnen het maximum voor de gemeente valt
        actions:
          - output: maximale_oppervlakte_ha
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $gemeente
                    value: Amsterdam
                  then: 350
                - when:
                    operation: EQUALS
                    subject: $gemeente
                    value: Almere
                  then: 700
                - when:
                    operation: EQUALS
                    subject: $gemeente
                    value: Lelystad
                  then: 150
                - when:
                    operation: EQUALS
                    subject: $gemeente
                    value: Harderwijk
                  then: 35
                - when:
                    operation: EQUALS
                    subject: $gemeente
                    value: Fryske Marren
                  then: 17
                - when:
                    operation: IN
                    subject: $gemeente
                    values:
                      - Edam-Volendam
                      - Gooise Meren
                  then: 10
              default: 5
          - output: oppervlakte_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $totale_oppervlakte_ha
              value: $maximale_oppervlakte_ha
  - number: 5.49.3.a
    text: 350 ha voor de gemeente Amsterdam voor het project IJburg tweede fase;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.b
    text: '700 ha voor de gemeente Almere, waarvan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.b.1°
    text: ten hoogste 12 ha in het Gooimeer voor het project Hoogtij; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.b.2°
    text: de overige oppervlakte in het Markermeer voor het project Schaalsprong Almere;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.c
    text: 150 ha voor de gemeente Lelystad voor woonfuncties, daaraan gerelateerde activiteiten en een overslaghaven;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.d
    text: 35 ha voor de gemeente Harderwijk voor het project Waterfront Harderwijk;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.e
    text: '17 ha voor de gemeente Fryske Marren, waarvan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.e.1°
    text: ten hoogste 7 ha voor een tijdelijk werkeiland voor de winning van beton- en metselzand; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.e.2°
    text: |-
      ten hoogste 10 ha voor ontwikkeling van natuur of andere functies dan het ontwikkelen van natuur, als die andere
      functies aansluiten op bestaande bebouwing;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.f
    text: |-
      10 ha voor de gemeenten Edam-Volendam en Gooise Meren voor ontwikkeling van natuur of andere functies dan het
      ontwikkelen van natuur, als die andere functies aansluiten op bestaande bebouwing; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.3.g
    text: |-
      5 ha voor andere gemeenten dan die genoemd onder a tot en met f, voor ontwikkeling van natuur of andere functies
      dan het ontwikkelen van natuur, als die andere functies aansluiten op bestaande bebouwing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.49.4
    text: |-
      Bij de toepassing van het derde lid wordt het aantal hectares berekend ten opzichte van de toegestane mogelijkheden
      op grond van het op 22 december 2009 geldende bestemmingsplan, uitgaande van de op die datum geldende gemeentelijke
      indeling, of, voor gemeenten die na die datum zijn ingesteld, uitgaande van de op het tijdstip van inwerkingtreding
      van deze bepaling geldende gemeentelijke indeling.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.49
  - number: 5.50.1
    text: 'Dit artikel is van toepassing op het toelaten van de volgende activiteiten:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
  - number: 5.50.1.a
    text: |-
      de aanleg van een wegtunnelbuis met een tunnelbuislengte als bedoeld in
      [bijlage I bij het Besluit bouwwerken leefomgeving][ref1] van ten minste 100 m;


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 5.50.1.b
    text: een wijziging van een wegtunnelbuis waarbij de tunnelbuislengte met ten minste 100 m toeneemt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
  - number: 5.50.1.c
    text: de aanleg van een autoweg of een autosnelweg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: activiteit_type
            type: string
            required: true
            description: >-
              Type activiteit: aanleg_wegtunnelbuis,
              wijziging_wegtunnelbuis, aanleg_autoweg_autosnelweg
            source: {}
          - name: tunnelbuislengte_m
            type: number
            required: false
            description: De tunnelbuislengte in meters (bij aanleg) of de toename in meters (bij wijziging)
            source: {}
        output:
          - name: artikel_5_50_van_toepassing
            type: boolean
            description: Of artikel 5.50 van toepassing is op de activiteit
        actions:
          - output: artikel_5_50_van_toepassing
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $activiteit_type
                    value: aanleg_wegtunnelbuis
                  then:
                    operation: GREATER_THAN_OR_EQUAL
                    subject: $tunnelbuislengte_m
                    value: 100
                - when:
                    operation: EQUALS
                    subject: $activiteit_type
                    value: wijziging_wegtunnelbuis
                  then:
                    operation: GREATER_THAN_OR_EQUAL
                    subject: $tunnelbuislengte_m
                    value: 100
                - when:
                    operation: EQUALS
                    subject: $activiteit_type
                    value: aanleg_autoweg_autosnelweg
                  then: true
              default: false
  - number: 5.50.2
    text: |-
      Als de activiteiten leiden tot een verhoging van de concentratie in de buitenlucht van stikstofdioxide of PM,
      worden in een omgevingsplan de volgende omgevingswaarden in acht genomen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: leidt_tot_verhoging_concentratie
            type: boolean
            required: true
            description: Of de activiteiten leiden tot een verhoging van de concentratie stikstofdioxide of PM
            source: {}
          - name: voldoet_aan_omgevingswaarde_no2
            type: boolean
            required: true
            description: Of wordt voldaan aan de omgevingswaarde voor stikstofdioxide (art. 2.4 lid 1 onder b)
            source: {}
          - name: voldoet_aan_omgevingswaarden_pm
            type: boolean
            required: true
            description: Of wordt voldaan aan de omgevingswaarden voor PM (art. 2.5 lid 1)
            source: {}
        output:
          - name: luchtkwaliteit_omgevingswaarden_in_acht_genomen
            type: boolean
            description: Of de omgevingswaarden voor luchtkwaliteit in acht zijn genomen
        actions:
          - output: luchtkwaliteit_omgevingswaarden_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $leidt_tot_verhoging_concentratie
                    value: true
                  then:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $voldoet_aan_omgevingswaarde_no2
                        value: true
                      - operation: EQUALS
                        subject: $voldoet_aan_omgevingswaarden_pm
                        value: true
              default: true
  - number: 5.50.2.a
    text: |-
      de omgevingswaarde voor stikstofdioxide, bedoeld in [artikel 2.4, eerste lid, onder b][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 5.50.2.b
    text: |-
      de omgevingswaarden voor PM, bedoeld in [artikel 2.5, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 5.50.3
    text: |-
      Op het berekenen van de concentratie van stikstofdioxide of van PM zijn de bij ministeriële regeling gestelde
      regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.50
  - number: 5.51.1
    text: 'Dit artikel is van toepassing op het toelaten van de volgende activiteiten:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.1.a
    text: |-
      de aanleg of wijziging van wegen, vaarwegen en spoorwegen, niet zijnde een activiteit als bedoeld in
      [artikel 5.50, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.51.1.b
    text: activiteiten die een toename van de verkeersintensiteit veroorzaken op wegen, vaarwegen en spoorwegen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.1.c
    text: |-
      milieubelastende activiteiten waarover in het [Besluit activiteiten leefomgeving][ref1] regels zijn gesteld met het
      oog op het beperken van verontreiniging van de lucht.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.51.2
    text: |-
      De aandachtsgebieden voor zowel stikstofdioxide als fijnstof zijn de volgende agglomeraties en gemeenten waarvan de
      locatie bij ministeriële regeling is aangewezen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.a
    text: Amsterdam/Haarlem;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.b
    text: Arnhem;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.c
    text: Eindhoven;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.d
    text: Etten-Leur;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.e
    text: ‘s-Gravenhage/Leiden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.f
    text: Rotterdam/Dordrecht; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.2.g
    text: Utrecht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3
    text: 'De aandachtsgebieden voor fijnstof zijn de volgende gemeenten:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.a
    text: Asten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.b
    text: Barneveld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.c
    text: Bernheze;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.d
    text: Ede;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.e
    text: Leudal;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.f
    text: Nederweert;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.g
    text: Scherpenzeel; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.3.h
    text: Venray.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.4
    text: |-
      Als de activiteiten leiden tot een verhoging van de concentratie in de buitenlucht van een van de volgende stoffen
      in een daarbij aangegeven aandachtsgebied, worden in een omgevingsplan de daarbij aangegeven omgevingswaarden in
      acht genomen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.4.a
    text: 'in een aandachtsgebied voor zowel stikstofdioxide als fijnstof:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: 5.51.4.a.1°
    text: |-
      de omgevingswaarde voor stikstofdioxide, bedoeld in [artikel 2.4, eerste lid, onder b][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 5.51.4.a.2°
    text: |-
      de omgevingswaarden voor PM, bedoeld in [artikel 2.5, eerste lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 5.51.4.b
    text: |-
      in een aandachtsgebied voor fijnstof: de omgevingswaarden voor PM, bedoeld in [artikel 2.5, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 5.51.5
    text: |-
      Op het berekenen van de concentratie van stikstofdioxide of van PM zijn de bij ministeriële regeling gestelde
      regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.51
  - number: '5.52'
    text: |-
      De [artikelen 5.50][ref1] en [5.51][ref2] zijn niet van toepassing voor zover het gaat om de verhoging van de
      concentratie in de buitenlucht van stikstofdioxide of van PM op:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.52.a
    text: een locatie waartoe het publiek geen toegang heeft en waar geen vaste bewoning is; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.52
  - number: 5.52.b
    text: de rijbaan van wegen en de middenberm van wegen, tenzij voetgangers normaliter toegang tot de middenberm hebben.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.52
  - number: 5.53.1
    text: |-
      De [artikelen 5.50][ref1] en [5.51][ref2] zijn niet van toepassing voor zover het toelaten van activiteiten
      leidt tot een verhoging van de kalenderjaargemiddelde concentratie in de buitenlucht van zowel stikstofdioxide
      als PM van 1,2 μg/m3 of minder, tenzij het gaat om het exploiteren van een veehouderij, bedoeld in
      [artikel 3.200 van het Besluit activiteiten leefomgeving][ref3]:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.53.1.a
    text: waarvan de emissie van PM vanuit de dierenverblijven meer bedraagt dan 800 kg per jaar; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b
    text: |-
      op een locatie in de volgende gemeenten en waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.1°
    text: Asten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.2°
    text: Barneveld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.3°
    text: Deurne;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.4°
    text: Ede;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.5°
    text: Nederweert;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.6°
    text: Renswoude; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.1.b.7°
    text: Scherpenzeel.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.2
    text: |-
      Bij het bepalen van de verhoging wordt opgeteld de verhoging veroorzaakt door een toename van de
      verkeersintensiteit op wegen, vaarwegen en spoorwegen van en naar de locatie waar de activiteit wordt verricht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.3
    text: |-
      Als sprake is van meerdere activiteiten, wordt de verhoging veroorzaakt door die activiteiten opgeteld, voor zover
      de verwachte datum van het begin van de activiteiten ligt in een periode van vijf jaar na vaststelling van het
      omgevingsplan, voor zover het gaat om een verhoging veroorzaakt door een toename van de verkeersintensiteit als
      gevolg van het toelaten van activiteiten die:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.3.a
    text: gebruikmaken of zullen maken van dezelfde ontsluitingsweg; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: 5.53.3.b
    text: |-
      aan elkaar grenzen, zullen grenzen of in elkaars directe nabijheid zijn gelegen, tot een afstand van ten hoogste
      1.000 m, waarbij activiteiten die niet meer bijdragen aan de concentratie dan 0,1 μg/m3 buiten beschouwing blijven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.53
  - number: '5.54'
    text: |-
      Het toelaten van activiteiten leidt in ieder geval tot een verhoging van de kalenderjaargemiddelde concentratie
      van stikstofdioxide en PM van 1,2 μg/m3 of minder als bedoeld in [artikel 5.53][ref1] voor zover het gaat om een
