    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87.2
    text: 'Bij de toepassing van het eerste lid bepaalt het omgevingsplan dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87.2.a
    text: continue trillingen voldoen aan de in het omgevingsplan opgenomen waarden voor die trillingen, bedoeld onder A; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87.2.b
    text: |-
      als niet wordt voldaan aan een waarde als bedoeld onder a: continue trillingen voldoen aan de in het omgevingsplan
      opgenomen waarden onder A en A.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87.3
    text: |-
      In afwijking van het eerste lid kan het omgevingsplan een hogere waarde bevatten als op het tijdstip van
      inwerkingtreding van dit besluit op grond van het omgevingsplan, een omgevingsvergunning of een maatwerkvoorschrift
      voor een activiteit een hogere waarde gold. De waarde is niet hoger dan de grenswaarde, zijnde de waarde die op
      grond van de omgevingsvergunning of het maatwerkvoorschrift was toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87.4
    text: |-
      Op het bepalen van de trillingen waarvoor het omgevingsplan een waarde als bedoeld in het eerste lid of in
      afwijking daarvan een hogere of lagere waarde bevat, zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87
  - number: 5.87a.1
    text: |-
      Een omgevingsplan bevat voor de toelaatbare herhaald voorkomende trillingen door een activiteit in
      trillinggevoelige ruimten als waarden de standaardwaarden, bedoeld in tabel 5.87a.
            Tabel 5.87a Standaardwaarden toelaatbare herhaald voorkomende trillingen in trillinggevoelige ruimten


                    *07.00 – 23.00 uur*


                    *23.00 – 07.00 uur*


                    A trillingssterkte V


                    0,2


                    0,2


                    A trillingssterkte V


                    0,8


                    0,4


                    A trillingssterkte V


                    0,1


                    0,1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.87a.2
    text: 'Bij de toepassing van het eerste lid bepaalt het omgevingsplan dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.87a.2.a
    text: |-
      herhaald voorkomende trillingen voldoen aan de in het omgevingsplan opgenomen waarden voor die trillingen, bedoeld
      onder A; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.87a.2.b
    text: |-
      als niet wordt voldaan aan een waarde als bedoeld onder a: herhaald voorkomende trillingen voldoen aan de in het
      omgevingsplan opgenomen waarden onder A en A.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.87a.3
    text: |-
      In afwijking van het eerste lid kan het omgevingsplan een hogere waarde bevatten als op het tijdstip van
      inwerkingtreding van dit besluit op grond van het omgevingsplan, een omgevingsvergunning of een maatwerkvoorschrift
      voor een activiteit een hogere waarde gold. De waarde is niet hoger dan de grenswaarde, zijnde de waarde die op
      grond van de omgevingsvergunning of het maatwerkvoorschrift was toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.87a.4
    text: |-
      Op het bepalen van de trillingen waarvoor het omgevingsplan een waarde als bedoeld in het eerste lid of in
      afwijking daarvan een hogere of lagere waarde bevat, zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.87a
  - number: 5.88.1
    text: |-
      In afwijking van de [artikelen 5.87, eerste en derde lid][ref1], en [5.87a, eerste en derde lid][ref2], kan een
      omgevingsplan hogere of lagere waarden bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.88
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.88.2
    text: 'Een omgevingsplan bevat op grond van het eerste lid alleen hogere waarden als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.88
  - number: 5.88.2.a
    text: het gaat om een activiteit die wordt verricht op een in het omgevingsplan aangewezen bedrijventerrein; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.88
  - number: 5.88.2.b
    text: |-
      die waarden niet hoger zijn dan de grenswaarde, zijnde de waarden, bedoeld in de tabellen 5.87 en 5.87a,
      vermenigvuldigd met de factor 1,8.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.88
  - number: '5.89'
    text: |-
      Als zwaarwegende economische belangen of zwaarwegende andere maatschappelijke belangen dit rechtvaardigen, kan een
      omgevingsplan hogere waarden bevatten dan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89
  - number: 5.89.a
    text: |-
      de standaardwaarden, bedoeld in [artikel 5.87, eerste lid][ref1], of [5.87a, eerste lid][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89.b
    text: |-
      de grenswaarde, bedoeld in [artikel 5.87, derde lid][ref1], of [5.87a, derde lid][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89.c
    text: |-
      de grenswaarde, bedoeld in [artikel 5.88, tweede lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89a.1
    text: 'Deze paragraaf is van toepassing op het toelaten van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89a
  - number: 5.89a.1.a
    text: |-
      een windturbine met een rotordiameter van 2 m of meer als bedoeld in
      [artikel 3.11 van het Besluit activiteiten leefomgeving][ref1], die slagschaduw veroorzaakt in verblijfsruimten van
      een slagschaduwgevoelig gebouw, dat is toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.89a.1.b
    text: |-
      een slagschaduwgevoelig gebouw waarin slagschaduw wordt veroorzaakt door een windturbine als bedoeld
      onder a, die is toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89a
  - number: 5.89a.2
    text: |-
      In afwijking van het eerste lid is deze paragraaf, met uitzondering van [artikel 5.89c][ref1], niet van
      toepassing op slagschaduwgevoelige gebouwen die op grond van een omgevingsplan of een omgevingsvergunning voor een
      buitenplanse omgevingsplanactiviteit zijn toegelaten voor een duur van niet meer dan tien jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89aa.1
    text: |-
      In afwijking van [artikel 5.89a, eerste lid][ref1], is deze paragraaf niet van toepassing op het toelaten van een
      windpark met 3 of meer windturbines waarvoor:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89aa
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89aa.1.a
    text: |-
      uiterlijk op 30 juni 2021 een omgevingsvergunning is verleend als bedoeld in
      [artikel 2.1, eerste lid, onder e of i, van de Wet algemene bepalingen omgevingsrecht][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0024779#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89aa
    references:
      - id: ref1
        bwb_id: BWBR0024779
        artikel: '2'
  - number: 5.89aa.1.b
    text: |-
      een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit in het windpark voorziet
      op grond van een besluit dat op 30 juni 2021 was vastgesteld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89aa
  - number: 5.89aa.1.c
    text: |-
      sinds 30 juni 2021 geen wijziging van kracht is geworden in de omgevingsvergunning, bedoeld onder a, of, voor zover
      dat op het windpark betrekking had, het besluit, bedoeld onder b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89aa
  - number: 5.89aa.2
    text: |-
      Het eerste lid geldt niet vanaf het tijdstip waarop met betrekking tot de windturbine of het windpark waarvan de
      windturbine deel uitmaakt, een wijziging van de omgevingsvergunning voor een milieubelastende activiteit van kracht
      wordt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89aa
  - number: 5.89b.1
    text: 'Een slagschaduwgevoelig gebouw is een gebouw of een gedeelte van een gebouw met een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89b.1.a
    text: woonfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89b.1.b
    text: onderwijsfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89b.1.c
    text: gezondheidszorgfunctie met bedgebied en nevengebruiksfuncties daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89b.1.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied en nevengebruiksfuncties daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89b.2
    text: |-
      Onder een slagschaduwgevoelig gebouw wordt ook verstaan een slagschaduwgevoelig gebouw dat nog niet aanwezig is,
      maar op grond van het omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit mag
      worden gebouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89b
  - number: 5.89c.1
    text: |-
      In een omgevingsplan wordt rekening gehouden met de slagschaduw door windturbines in verblijfsruimten van
      slagschaduwgevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89c
  - number: 5.89c.2
    text: |-
      Een omgevingsplan voorziet erin dat de slagschaduw door een windturbine in verblijfsruimten van
      slagschaduwgevoelige gebouwen aanvaardbaar is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89c
  - number: 5.89d
    text: |-
      Als een omgevingsplan regels bevat over de slagschaduw door een windturbine, bepaalt het omgevingsplan dat die
      regels niet van toepassing zijn op de slagschaduw in verblijfsruimten van een slagschaduwgevoelig gebouw dat een
      functionele binding heeft met die windturbine.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89d
  - number: 5.89e
    text: 'Als een omgevingsplan regels bevat over de slagschaduw door een windturbine bij een activiteit:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89e
  - number: 5.89e.a
    text: |-
      in de agrarische sector als bedoeld in [artikel 3.200][ref1], [3.205][ref2], [3.208][ref3], [3.211][ref4],
      [3.215][ref5], [3.218][ref6], [3.221][ref7] of [3.225 van het Besluit activiteiten leefomgeving][ref8]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref6]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref7]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref8]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89e
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref6
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref7
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref8
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.89e.b
    text: verricht op een bedrijventerrein,
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89e
  - number: 5.89f.1
    text: |-
      Aan [artikel 5.89c, tweede lid][ref1], wordt in ieder geval voldaan als een omgevingsplan dat een windturbine
      toelaat, bepaalt dat in verblijfsruimten van een slagschaduwgevoelig gebouw dat op een afstand van minder dan
      twaalf maal de rotordiameter van de windturbine is gelegen ten hoogste gemiddeld zeventien dagen per jaar gedurende
      niet meer dan twintig minuten per dag slagschaduw door de windturbine kan optreden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89f
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89f.2
    text: 'De afstand wordt gemeten van een punt op ashoogte van de windturbine:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89f
  - number: 5.89f.2.a
    text: tot de gevel van een slagschaduwgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89f
  - number: 5.89f.2.b
    text: tot de begrenzing van een locatie voor het plaatsen van een woonschip of woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89f
  - number: 5.89fa
    text: |-
      [Artikel 5.89f][ref1] is niet van toepassing op het toelaten van een windpark met 3 of meer windturbines.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89fa
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89g.1
    text: 'Deze subparagraaf is van toepassing op een bodemgevoelig gebouw, zijnde:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89g
  - number: 5.89g.1.a
    text: |-
      een gebouw of een gedeelte van een gebouw dat de bodem raakt, voor zover aannemelijk is dat personen meer dan twee
      uur per dag aaneengesloten aanwezig zullen zijn; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89g
  - number: 5.89g.1.b
    text: een woonschip of woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89g
  - number: 5.89g.2
    text: |-
      Een bijbehorend bouwwerk als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref1] van ten hoogste
      50 m2 wordt niet beschouwd als een bodemgevoelig gebouw.


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89g
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 5.89h
    text: 'Als bodemgevoelige locaties worden in ieder geval beschouwd:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89h
  - number: 5.89h.a
    text: |-
      de locatie waarop een bodemgevoelig gebouw is toegelaten op grond van een omgevingsplan of een omgevingsvergunning
      voor een omgevingsplanactiviteit;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89h
  - number: 5.89h.b
    text: |-
      een onmiddellijk aan een gebouw als bedoeld onder a grenzende aaneengesloten tuin of een daaraan grenzend
      aaneengesloten terrein; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89h
  - number: 5.89h.c
    text: |-
      een onmiddellijk aan een op grond van een omgevingsplan of een omgevingsvergunning voor een omgevingsplanactiviteit
      toegelaten woonschip of woonwagen grenzende tuin of grenzend terrein.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89h
  - number: 5.89i.1
    text: |-
      Een omgevingsplan bevat waarden voor de toelaatbare kwaliteit van de bodem voor het bouwen van een bodemgevoelig
      gebouw op een bodemgevoelige locatie voor de in bijlage XIIIa aangewezen stoffen die de gezondheid bedreigen,
      uitgedrukt in milligram per kilo droge stof uit de bodem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89i
  - number: 5.89i.2
    text: |-
      Een omgevingsplan kan per gebied of per gebruiksfunctie verschillende waarden voor de toelaatbare kwaliteit van
      bodemgevoelige locaties bevatten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89i
  - number: 5.89j.1
    text: |-
      Bij het vaststellen van de waarden, bedoeld in [artikel 5.89i][ref1], wordt rekening gehouden met de
      interventiewaarden bodemkwaliteit, bedoeld in [bijlage IIA bij het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041330
  - number: 5.89j.2
    text: |-
      Een omgevingsplan kan hogere waarden bevatten dan de waarden, bedoeld in
      [bijlage IIA bij het Besluit activiteiten leefomgeving][ref1]. Een hogere waarde dan de interventiewaarde is een
      berekende concentratie die overeenkomt met:


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.89j.2.a
    text: |-
      het levenslang gemiddelde blootstellingsniveau van het maximaal toelaatbaar risico humaan, bedoeld in bijlage Vb
      bij dit besluit, uitgedrukt in microgram per kilogram lichaamsgewicht per dag; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
  - number: 5.89j.2.b
    text: |-
      het blootstellingsniveau van de concentraties in lucht of onaanvaardbare hinder door geuroverlast, bedoeld in
      bijlage XIIIb bij dit besluit, uitgedrukt in microgram stof per kubieke meter.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
  - number: 5.89j.3
    text: De grenswaarde, bedoeld in het tweede lid, wordt berekend per locatie en voor de meest gevoelige gebruiksfunctie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
  - number: 5.89j.4
    text: Op het berekenen van de grenswaarde zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89j
  - number: 5.89k
    text: |-
      Een omgevingsplan bepaalt dat het bouwen van een bodemgevoelig gebouw op een bodemgevoelige locatie bij
      overschrijding van een waarde als bedoeld in [artikel 5.89i, eerste lid][ref1], alleen is toegelaten als de in het
      omgevingsplan voorgeschreven sanerende of andere beschermende maatregelen worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89k
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89ka.1
    text: |-
      Als in een omgevingsplan is bepaald dat het is verboden om zonder omgevingsvergunning een bouwwerk te
      bouwen, worden in het omgevingsplan regels gesteld die ertoe strekken dat de omgevingsvergunning voor
      een bodemgevoelig gebouw op een bodemgevoelige locatie bij overschrijding van een waarde als bedoeld in
      [artikel 5.89i, eerste lid][ref1], alleen wordt verleend als aannemelijk is dat de in het omgevingsplan
      voorgeschreven sanerende of andere beschermende maatregelen worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89ka
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89ka.2
    text: |-
      Het omgevingsplan bepaalt dat bij een aanvraag om een omgevingsvergunning als bedoeld in het eerste lid, de
      volgende gegevens en bescheiden worden verstrekt:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89ka
  - number: 5.89ka.2.a
    text: |-
      de onderzoeken, bedoeld in [paragraaf 5.2.2 van het Besluit activiteiten leefomgeving][ref1], tenzij het gaat
      om een locatie die is aangewezen in het omgevingsplan waar een overschrijding van een waarde als bedoeld in
      [artikel 5.89i, eerste lid][ref2], redelijkerwijs is uit te sluiten; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf5.2.2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89ka
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 5.2.2
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89ka.2.b
    text: |-
      als de waarde, bedoeld in [artikel 5.89i, eerste lid][ref1], wordt overschreden: gegevens en bescheiden die
      aannemelijk maken dat een sanerende of andere beschermende maatregel wordt getroffen, tenzij het gaat om een
      locatie die is aangewezen in het omgevingsplan waar een overschrijding van een waarde als bedoeld in artikel 5.89i
      redelijkerwijs is uit te sluiten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89ka
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89l.1
    text: |-
      Een omgevingsplan bepaalt dat het verboden is een bodemgevoelig gebouw te bouwen op een bodemgevoelige locatie
      zonder dit ten minste vier weken voor het begin ervan te melden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89l.2
    text: 'Een melding wordt ondertekend en bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89l.2.a
    text: |-
      de onderzoeken, bedoeld in [paragraaf 5.2.2 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf5.2.2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 5.2.2
  - number: 5.89l.2.b
    text: de naam en het adres van degene die de bouwactiviteit verricht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89l.2.c
    text: het adres waarop de bouwactiviteit wordt verricht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89l.2.d
    text: de dagtekening; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89l.2.e
    text: |-
      bij overschrijding van een waarde als bedoeld in [artikel 5.89i, eerste lid][ref1]: gegevens en bescheiden die
      aannemelijk maken dat een sanerende of andere beschermende maatregel wordt getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89l.3
    text: |-
      Het tweede lid, onder a en e, is niet van toepassing op locaties die zijn aangewezen in het omgevingsplan waar een
      overschrijding van een waarde als bedoeld in [artikel 5.89i, eerste lid][ref1], redelijkerwijs is uit te sluiten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89l.4
    text: |-
      Dit artikel is niet van toepassing als voor de bouwactiviteit op grond van het omgevingsplan een
      omgevingsvergunning is vereist.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89l
  - number: 5.89m
    text: |-
      Een omgevingsplan bepaalt dat bij overschrijding van een waarde als bedoeld in [artikel 5.89i, eerste lid][ref1],
      een bodemgevoelig gebouw, of een gedeelte daarvan, op een bodemgevoelige locatie alleen in gebruik wordt genomen
      na de bouwactiviteit nadat het college van burgemeester en wethouders is geïnformeerd over de wijze waarop de
      sanerende of andere beschermende maatregelen, bedoeld in [artikel 5.89k][ref2], zijn getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89m
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.89n
    text: |-
      Een omgevingsplan bepaalt dat de volgende maatregelen in stand moeten worden gehouden, moeten worden onderhouden,
      of moeten worden vervangen, met daarbij op welke wijze en binnen welke termijn:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89n
  - number: 5.89n.a
    text: |-
      een afdeklaag als bedoeld in [artikel 4.1241 van het Besluit activiteiten leefomgeving][ref1] die is
      aangebracht tijdens de sanering van de bodem door middel van een afdeklaag, die heeft plaatsgevonden op grond
      van artikel 4.1241 van het Besluit activiteiten leefomgeving, het omgevingsplan, een omgevingsvergunning of een
      maatwerkvoorschrift; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89n
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.89n.b
    text: |-
      tijdelijke beschermingsmaatregelen die de bron van verontreiniging niet wegnemen maar die blootstelling aan de
      verontreiniging voorkomen, in verband met een toevalsvondst als bedoeld in [artikel 19.9a van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89n
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 5.89o.1
    text: |-
      In een omgevingsplan kunnen een of meer bodembeheergebieden worden aangewezen voor het met een maatwerkregel of
      maatwerkvoorschrift afwijken van de kwaliteitseisen voor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89o
  - number: 5.89o.1.a
    text: |-
      het toepassen van grond of baggerspecie op of in de landbodem, bedoeld in [artikel 4.1273][ref1], [4.1275][ref2],
      [4.1277][ref3] of [4.1279 van het Besluit activiteiten leefomgeving][ref4]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.89o.1.b
    text: |-
      het op of in de landbodem in een bij ministeriële regeling aangewezen toepassingsgebied toepassen van mijnsteen of
      vermengde mijnsteen, bedoeld in [artikel 4.1289][ref1] of [4.1291 van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.89o.2
    text: |-
      Bodembeheergebieden worden aangewezen met het oog op het bevorderen dat grond of baggerspecie, in een geval als
      bedoeld in het eerste lid, onder a, of mijnsteen of vermengde mijnsteen, in een geval als bedoeld in het eerste
      lid, onder b, die binnen het aangewezen gebied zijn ontgraven, binnen dat gebied weer zo kunnen worden toegepast
      dat op de schaal van het gebied een goed resultaat wordt behaald uit een oogpunt van het zuinig gebruik van
      grondstoffen en het doelmatig beheer van afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89o
  - number: 5.89o.3
    text: In het omgevingsplan wordt de geometrische begrenzing van het aangewezen bodembeheergebied vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89o
  - number: 5.89p.1
    text: 'In een omgevingsplan wordt de landbodem in bodemfunctieklassen ingedeeld voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89p
  - number: 5.89p.1.a
    text: |-
      het toepassen van grond of baggerspecie, bedoeld in
      [artikel 4.1265 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89p
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.89p.1.b
    text: |-
      het in het bij ministeriële regeling aangewezen toepassingsgebied toepassen van mijnsteen of vermengde mijnsteen,
      bedoeld in [artikel 4.1281 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89p
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.89p.2
    text: |-
      Bij de indeling in bodemfunctieklassen wordt rekening gehouden met de functie die in het omgevingsplan aan de
      locatie is toegedeeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89p
  - number: 5.89p.3
    text: |-
      De landbodem kan worden ingedeeld in de bodemfunctieklassen landbouw/natuur, wonen en industrie, bedoeld in
      [artikel 25d, vierde lid, onder a, van het Besluit bodemkwaliteit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.89p
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 5.90.1
    text: |-
      [Paragraaf 5.1.4.6][ref1] is van toepassing op het toelaten:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.90
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.90.1.a
    text: |-
      op een locatie van een activiteit, anders dan het wonen, die geur veroorzaakt op een geurgevoelig gebouw, dat is
      toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit;
      of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.90
  - number: 5.90.1.b
    text: |-
      van een geurgevoelig gebouw waarop geur wordt veroorzaakt door een activiteit, anders dan het wonen, die op
      een locatie is toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.90
  - number: 5.90.2
    text: |-
      In afwijking van het eerste lid is [paragraaf 5.1.4.6][ref1], met uitzondering van [artikel 5.92][ref2], niet van
      toepassing als het gaat om de geur door een activiteit op een geurgevoelig gebouw dat is toegelaten voor een duur
      van minder dan tien jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.90
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.91.1
    text: 'Een geurgevoelig gebouw is in ieder geval een gebouw of een gedeelte van een gebouw met een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.1.a
    text: woonfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.1.b
    text: onderwijsfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.1.c
    text: gezondheidszorgfunctie met bedgebied en nevengebruiksfuncties daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.1.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied en nevengebruiksfuncties daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2
    text: |-
      Het eerste lid geldt niet voor een gedeelte van een gebouw als bedoeld in dat lid als het omgevingsplan in dat
      gedeelte niet toelaat een:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.a
    text: woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.b
    text: onderwijsfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.c
    text: gezondheidszorgfunctie met bedgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.e
    text: bijeenkomstfunctie die een nevengebruiksfunctie is van een woonfunctie; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.2.f
    text: bijeenkomstfunctie die een nevengebruiksfunctie is van een gezondheidszorgfunctie met bedgebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.3
    text: |-
      Onder een geurgevoelig gebouw wordt ook verstaan een gebouw dat nog niet aanwezig is, maar op grond van een
      omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit mag worden gebouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.4
    text: |-
      Het omgevingsplan kan andere geurgevoelige gebouwen of gedeelten van gebouwen aanwijzen, mits er hoofdzakelijk
      sprake is van verblijf van mensen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
  - number: 5.91.5
    text: |-
      In het omgevingsplan kan [paragraaf 5.1.4.6][ref1] overeenkomstig worden toegepast op locaties waarbij
      hoofdzakelijk sprake is van verblijf van mensen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.91
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.92.1
    text: In een omgevingsplan wordt rekening gehouden met de geur door activiteiten op geurgevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.92
  - number: 5.92.2
    text: Een omgevingsplan voorziet erin dat de geur door een activiteit op geurgevoelige gebouwen aanvaardbaar is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.92
  - number: 5.93.1
    text: 'Een omgevingsplan bepaalt dat de waarden voor de geur door een activiteit op een geurgevoelig gebouw gelden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
  - number: 5.93.1.a
    text: op de gevel, als het gaat om een geurgevoelig gebouw;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
  - number: 5.93.1.b
    text: op de locatie waar een gevel mag komen, als het gaat om een nieuw te bouwen geurgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
  - number: 5.93.1.c
    text: |-
      in afwijking van de onderdelen a en b, als het gaat om een woonschip of woonwagen, op de begrenzing van de locatie
      voor het plaatsen van dat woonschip of die woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
  - number: 5.93.2
    text: |-
      Een omgevingsplan kan, in afwijking van wat op grond van het eerste lid in het omgevingsplan is opgenomen, bepalen
      dat de waarden voor de geur door een activiteit op geurgevoelige gebouwen gelden op een locatie die dichter bij
      de activiteit is gelegen dan de gevel, bedoeld in het eerste lid, onder a, de locatie, bedoeld in het eerste lid,
      onder b, of de begrenzing, bedoeld in het eerste lid, onder c.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
  - number: 5.93.3
    text: |-
      Een omgevingsplan dat door toepassing van [artikel 5.91, vijfde lid][ref1], waarden bevat voor de geur door een
      activiteit op een locatie, bepaalt dat die waarden gelden op de grens van de locatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.93
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.94.1
    text: |-
      Afstanden die in een omgevingsplan in acht moeten worden genomen of die een omgevingsplan bevat vanwege de geur
      door een activiteit op geurgevoelige gebouwen gelden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.94
  - number: 5.94.1.a
    text: tot de gevel, als het gaat om een geurgevoelig gebouw;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.94
  - number: 5.94.1.b
    text: tot de locatie waar een gevel mag komen, als het gaat om een nieuw te bouwen geurgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.94
  - number: 5.94.1.c
    text: |-
      in afwijking van de onderdelen a en b, als het gaat om een woonschip of woonwagen, tot de begrenzing van de locatie
      voor het plaatsen van dat woonschip of die woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.94
  - number: 5.94.2
    text: |-
      Afstanden die in een omgevingsplan door toepassing van [artikel 5.91, vijfde lid][ref1], in acht moeten worden
      genomen of die een omgevingsplan door toepassing van artikel 5.91, vijfde lid, bevat vanwege de geur door een
      activiteit op een locatie, gelden tot de grens van de locatie.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.94
    references:
