  - number: 8.74s
    text: |-
      Aan een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in
      [artikel 11.54 van het Besluit activiteiten leefomgeving][ref1] die betrekking heeft op het doden of vangen van
      wilde zwijnen, reeën, damherten of edelherten worden voorschriften verbonden die bepalen:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74s
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74s.a
    text: dat dit niet door middel van drijven plaatsvindt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74s
  - number: 8.74s.b
    text: |-
      of en zo ja, onder welke voorwaarden een methode is toegestaan waarbij een persoon wilde zwijnen opzettelijk
      verontrust met het oogmerk deze dieren binnen het schootsveld van één geweerdrager te drijven, opdat deze de dieren
      kan doden, en waarbij geen hond wordt ingezet.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74s
  - number: 8.74t.1
    text: 'Een omgevingsvergunning voor een jachtgeweeractiviteit wordt alleen verleend als de aanvrager:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.1.a
    text: |-
      met goed gevolg een examen voor een jachtgeweeractiviteit heeft afgelegd dat is erkend door Onze Minister voor
      Natuur en Stikstof of dat is erkend door de bevoegde autoriteit van een andere staat en door Onze Minister voor
      Natuur en Stikstof als gelijkwaardig aan door hem erkende examens is aangemerkt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.1.b
    text: de leeftijd van achttien jaar heeft bereikt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.1.c
    text: |-
      jachthouder is van een jachtveld dat voldoet aan de daaraan gestelde eisen, bedoeld in
      [artikel 11.76 van het Besluit activiteiten leefomgeving][ref1], en lid is van de wildbeheereenheid waarbinnen
      zijn jachtveld ligt, of toestemming heeft van een jachthouder met dat lidmaatschap tot uitoefening van de jacht in
      zijn jachtveld;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74t.1.d
    text: |-
      een geldig bewijs van de verzekering, bedoeld in [artikel 11.78 van het Besluit activiteiten leefomgeving][ref1],
      heeft overgelegd;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74t.1.e
    text: |-
      heeft meegewerkt aan een door Onze Minister van Justitie en Veiligheid op grond van
      [artikel 6a, eerste lid, onder b, van de Wet wapens en munitie][ref1] aangewezen onderzoek; en


      [ref1]: https://wetten.overheid.nl/BWBR0008804#Artikel6a
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0008804
        artikel: 6a
  - number: 8.74t.1.f
    text: |-
      in persoon aanwezig is geweest bij de controle door de korpschef van de op het adres van de aanvrager getroffen
      voorzieningen voor de opslag van wapens en munitie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.2
    text: |-
      Een omgevingsvergunning voor een jachtgeweeractiviteit wordt, ondanks voldoening aan de eisen, bedoeld in het
      eerste lid, geweigerd, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.2.a
    text: |-
      er grond is om aan te nemen dat de aanvrager van de bevoegdheid een geweer en munitie voorhanden te hebben, van
      de bevoegdheid om de jacht uit te oefenen of van de hem toekomende bevoegdheden in het kader van het beheren van
      populaties van in het wild levende dieren of het bestrijden van schadeveroorzakende dieren misbruik zal maken, of
      zodanig gebruik zal maken dat hij een gevaar voor zichzelf, de openbare orde of de veiligheid kan gaan vormen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.2.b
    text: |-
      er grond is om aan te nemen dat de aanvrager nalatig zal zijn te doen wat een goed jager betaamt bij de uitoefening
      van de jacht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.2.c
    text: |-
      aan de aanvrager de bevoegdheid om de jacht uit te oefenen is ontzegd bij een rechterlijke uitspraak die voor
      tenuitvoerlegging vatbaar is geworden, en de tijd waarvoor die bevoegdheid is ontzegd nog niet is verstreken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.2.d
    text: |-
      de aanvrager in de twee jaar voorafgaand aan de aanvraag om een omgevingsvergunning voor een jachtgeweeractiviteit
      is veroordeeld voor een strafbaar feit wegens overtreding van het bepaalde bij of krachtens de [wet][ref1]
      of wegens gedragingen als bedoeld in [artikel 2.1][ref2], [2.2][ref3], [2.3][ref4], [2.5][ref5],
      [2.6][ref6], [2.7][ref7], [2.8][ref8], [2.9][ref9], [2.10][ref10], [2.13][ref11], [2.14][ref12] of
      [2.15 van de Wet dieren][ref13], tegen hem daarvoor een strafbeschikking is uitgevaardigd of als hem wegens
      overtreding van het bepaalde bij of krachtens die artikelen van de [Wet dieren][ref14] een bestuurlijke boete als
      bedoeld in [artikel 8.7 van die wet][ref15] is opgelegd; of


