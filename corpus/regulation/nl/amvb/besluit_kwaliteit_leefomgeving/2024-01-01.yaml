    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: AFWIJZING
        parameters:
          - name: leidt_tot_niet_toegelaten_situatie
            type: boolean
            required: true
            description: >-
              Of de activiteit zou leiden tot een situatie die niet
              is toegelaten op grond van regels of instructies
            source: {}
          - name: betreft_voorbeschermingsregel
            type: boolean
            required: true
            description: Of de activiteit betrekking heeft op een voorbeschermingsregel in het omgevingsplan
            source: {}
          - name: belemmert_projectbesluit
            type: boolean
