      waterschapsverordening als bedoeld in [artikel 6.2, tweede lid][ref2], of in een omgevingsverordening
      als bedoeld in [artikel 7.12, tweede lid][ref3], buiten toepassing worden gelaten, is
      [artikel 8.84, tweede, derde, vierde, vijfde en zesde lid][ref4], van overeenkomstige toepassing.


