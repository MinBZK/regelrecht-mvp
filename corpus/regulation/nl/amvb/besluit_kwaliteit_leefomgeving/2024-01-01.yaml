  - number: 2.0.1
    text: |-
      Als bij omgevingsplan of omgevingsverordening op grond van [artikel 2.11][ref1] respectievelijk
      [2.12 van de wet][ref2] omgevingswaarden worden vastgesteld, berusten deze op onderzoek verricht door een
      onafhankelijke deskundige.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0
    references:
