  - number: '8.0'
    text: |-
      Deze afdeling is van toepassing op omgevingsplanactiviteiten die niet vergunningvrij zijn op grond van
      [artikel 2.29 van het Besluit bouwwerken leefomgeving][ref1] en is opgenomen met het oog op de doelen van de
      [wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
  - number: 8.0a.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een omgevingsplanactiviteit, wordt, als het
      gaat om een activiteit waarvoor in het omgevingsplan is bepaald dat het is verboden deze zonder omgevingsvergunning
      te verrichten, de omgevingsvergunning verleend als de activiteit niet in strijd is met de regels die in het
      omgevingsplan zijn gesteld over het verlenen van de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0a
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: is_omgevingsplanactiviteit
            type: boolean
            required: true
            description: Of de aanvraag betrekking heeft op een omgevingsplanactiviteit
            source: {}
          - name: omgevingsplan_verbod_zonder_vergunning
            type: boolean
            required: true
            description: Of in het omgevingsplan is bepaald dat de activiteit verboden is zonder omgevingsvergunning
            source: {}
          - name: activiteit_in_strijd_met_regels
            type: boolean
            required: true
            description: Of de activiteit in strijd is met de regels in het omgevingsplan over verlening
            source: {}
        output:
          - name: omgevingsvergunning_verleend
            type: boolean
            description: Of de omgevingsvergunning wordt verleend
        actions:
          - output: omgevingsvergunning_verleend
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_omgevingsplanactiviteit
                  value: true
                - operation: EQUALS
                  subject: $omgevingsplan_verbod_zonder_vergunning
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $activiteit_in_strijd_met_regels
                    value: true
  - number: 8.0a.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een buitenplanse omgevingsplanactiviteit,
      wordt de omgevingsvergunning alleen verleend met het oog op een evenwichtige toedeling van functies aan locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0a
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: is_buitenplanse_omgevingsplanactiviteit
            type: boolean
            required: true
            description: Of de aanvraag betrekking heeft op een buitenplanse omgevingsplanactiviteit
            source: {}
          - name: evenwichtige_toedeling_functies
            type: boolean
            required: true
            description: Of er sprake is van een evenwichtige toedeling van functies aan locaties
            source: {}
        output:
          - name: buitenplanse_vergunning_verleend
            type: boolean
            description: Of de omgevingsvergunning voor de buitenplanse activiteit wordt verleend
        actions:
          - output: buitenplanse_vergunning_verleend
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_buitenplanse_omgevingsplanactiviteit
                  value: true
                - operation: EQUALS
                  subject: $evenwichtige_toedeling_functies
                  value: true
  - number: 8.0b.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een buitenplanse omgevingsplanactiviteit,
      anders dan een omgevingsplanactiviteit van provinciaal of nationaal belang, zijn op de beoordeling van de aanvraag
      van overeenkomstige toepassing:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0b
  - number: 8.0b.1.a
    text: |-
      de regels van [hoofdstuk 5][ref1];


