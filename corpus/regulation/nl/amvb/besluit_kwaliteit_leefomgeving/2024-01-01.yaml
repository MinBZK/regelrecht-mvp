      in een omgevingsplan een grenswaarde voor het plaatsgebonden risico in acht wordt genomen van ten hoogste 1 op de
      100.000 per jaar voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en kwetsbare en beperkt kwetsbare
