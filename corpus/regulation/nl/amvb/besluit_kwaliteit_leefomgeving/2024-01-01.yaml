    text: |-
      op het moment van verlening van de omgevingsvergunning, bedoeld in de aanhef, niet aanwezig waren en voor de
      inwerkingtreding van dit besluit zijn gebouwd; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.103
  - number: 5.103.b
    text: in de omgevingsvergunning, bedoeld in de aanhef, niet als geurgevoelig werden beschouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.103
  - number: '5.104'
    text: |-
      Voor de toepassing van deze subparagraaf wordt verstaan onder: - *houden van landbouwhuisdieren:* exploiteren van
      een veehouderij, bedoeld in [artikel 3.200 van het Besluit activiteiten leefomgeving][ref1];
        - *landbouwhuisdieren met geuremissiefactor:* landbouwhuisdieren waarvoor bij ministeriële regeling een
      emissiefactor voor geur is vastgesteld en die vallen binnen een van de volgende diercategorieën: a. varkens,
      kippen, schapen of geiten; b. als deze worden gehouden voor de vleesproductie: 1°. rundvee tot 24 maanden; 2°.
      kalkoenen; 3°. eenden; of 4°. parelhoenders;
        - *landbouwhuisdieren zonder geuremissiefactor:* landbouwhuisdieren waarvoor bij ministeriële regeling geen
      emissiefactor voor geur is vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.104
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
