  - number: 9.1.3
    text: |-
      In afwijking van het eerste lid is [paragraaf 5.1.3.2][ref1] niet van toepassing op een projectbesluit dat wordt
      vastgesteld voor de aanleg, verlegging of versterking van een primaire waterkering.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.1
    references:
