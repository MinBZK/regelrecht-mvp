    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78m
  - number: 5.78m.3
    text: |-
      Als toepassing is gegeven aan [artikel 3.27, tweede lid][ref1], geldt voor het geluid door de gemeenteweg en de
      lokale spoorweg gezamenlijk de standaardwaarde voor gemeentewegen, bedoeld in [tabel 3.34][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
