      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref9]: https://wetten.overheid.nl/BWBR0003245#Artikel8
