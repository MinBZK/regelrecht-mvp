        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 8.15.1
    text: 'Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.15
  - number: 8.15.1.a
    text: |-
      het opslaan van ontplofbare stoffen van ADR-klasse 1, bedoeld in
      [artikel 3.34 van het Besluit activiteiten leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.15
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.15.1.b
    text: |-
      het exploiteren van een ippc-installatie voor het maken van explosieven, bedoeld in de
      [artikelen 3.72, eerste lid, onder f][ref1], en [3.73, eerste lid, van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.15
    references:
