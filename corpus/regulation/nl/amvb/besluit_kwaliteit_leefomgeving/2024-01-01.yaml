  - number: 2.17.1
    text: |-
      Op het voldoen aan de omgevingswaarden, bedoeld in de [artikelen 2.10, eerste lid][ref1], [2.11, eerste lid][ref2],
      [2.13, eerste lid][ref3], [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5], kan in een regionaal
      waterprogramma, als het gaat om regionale wateren, of in het nationale waterprogramma, als het gaat om
      rijkswateren, alleen een uitzondering worden gemaakt voor zover dat is toegestaan volgens de kaderrichtlijn water
      of de richtlijn prioritaire stoffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
