      college van gedeputeerde staten met de wijziging heeft ingestemd, kan Onze Minister voor Natuur en Stikstof
      het programma stikstofreductie en natuurverbetering wijzigen, door daarin voor elke voor stikstof gevoelige
      habitat in de betrokken Natura 2000-gebieden en voor de betrokken provincie in ieder geval de maatregelen te
      beschrijven die nodig zijn om tijdig te voldoen aan de omgevingswaarden voor stikstofdepositie, bedoeld in
      [artikel 2.15a, eerste lid, van de wet][ref2], en aan de tussentijdse doelstellingen om tijdig te voldoen aan die
      omgevingswaarden, bedoeld in [artikel 4.27, tweede lid, onder a][ref3].


