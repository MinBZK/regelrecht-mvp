  - number: 5.97.1
    text: |-
      Een omgevingsplan dat regels bevat op grond van [subparagraaf 5.1.4.6.2][ref1], [5.1.4.6.3][ref2] of
      [5.1.4.6.4][ref3], wijst een of meer bebouwingscontouren geur aan. In het omgevingsplan wordt de geometrische
      begrenzing van een bebouwingscontour geur vastgelegd.


