  - number: 5.100.1
    text: |-
      Een omgevingsplan dat het exploiteren van een zuiveringtechnisch werk toelaat, bevat als waarde voor de toelaatbare
      geur door die activiteit op een geurgevoelig gebouw de grenswaarde, bedoeld in tabel 5.100.1.
            Tabel 5.100.1 Grenswaarde toelaatbare geur ouE/m3 als 98-percentiel door een zuiveringtechnisch werk op een
      geurgevoelig gebouw


                    *Activiteit*


                    *Geurgevoelig gebouw*


                    *Grenswaarde*


                    Het exploiteren van een zuiveringtechnisch werk


                    Gelegen binnen de bebouwingscontour geur, anders dan op een industrieterrein waarvoor
      geluidproductieplafonds als omgevingswaarden zijn vastgesteld of een bedrijventerrein


                    0,5 ou/m3


                    Gelegen:
                    – op een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden zijn vastgesteld;
                    – een bedrijventerrein; of
                    – buiten de bebouwingscontour geur


                    1 ou/m3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.100
  - number: 5.100.2
    text: |-
      Als het gaat om geur door het exploiteren van een zuiveringtechnisch werk dat is opgericht voor 1 februari 1996
      en waarvoor op 1 februari 1996 een vergunning op grond van [artikel 8.1 van de Wet milieubeheer][ref1] in werking
      en onherroepelijk was, kan een omgevingsplan een waarde bevatten die hoger is dan de grenswaarde, bedoeld in het
      eerste lid, mits die waarde niet hoger is dan de grenswaarde, bedoeld in tabel 5.100.2.
            Tabel 5.100.2 Grenswaarde toelaatbare geur ouE/m3 als 98-percentiel door een zuiveringtechnisch werk
      opgericht voor 1 februari 1996 op een geurgevoelig gebouw


                    *Activiteit*


                    *Geurgevoelig gebouw*


                    *Grenswaarde*


                    Het exploiteren van een zuiveringtechnisch werk, opgericht voor 1 februari 1996


                    Gelegen binnen de bebouwingscontour geur, anders dan op een industrieterrein waarvoor
      geluidproductieplafonds als omgevingswaarden zijn vastgesteld of een bedrijventerrein


                    1,5 ou/m3


                    Gelegen:
                    – op een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden zijn vastgesteld;
                    – op een bedrijventerrein; of
                    – buiten de bebouwingscontour geur


                    3,5 ou/m3


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.100
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '8'
  - number: 5.100.3
    text: |-
      Op het berekenen van de geur waarvoor een omgevingsplan een waarde als bedoeld in het eerste lid of in afwijking
      daarvan een hogere of lagere waarde bevat, zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.100
  - number: '5.101'
    text: |-
      Een omgevingsplan kan, gelet op de aard of locatie van de activiteit of cumulatie, een waarde bevatten die lager is
      dan de grenswaarde, bedoeld in [artikel 5.100, eerste of tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.101
    references:
