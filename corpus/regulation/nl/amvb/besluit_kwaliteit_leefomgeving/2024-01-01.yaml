  - number: 12.32.2
    text: |-
      [Artikel 12.26][ref1] is van overeenkomstige toepassing op een projectbesluit dat wordt vastgesteld door het
      dagelijks bestuur van een waterschap of gedeputeerde staten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.32
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.3'
  - number: 12.33.1
    text: |-
      Dit artikel is van toepassing op een omgevingsvergunning voor een milieubelastende activiteit als bedoeld in
      [artikel 8.6, eerste lid, onder e of f, van het Omgevingsbesluit][ref1] die:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
  - number: 12.33.1.a
    text: |-
      op het tijdstip van inwerkingtreding van de [wet][ref1] onherroepelijk is; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 12.33.1.b
    text: |-
      voor het tijdstip van inwerkingtreding van de [wet][ref1] is aangevraagd en daarna onherroepelijk wordt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 12.33.2
    text: |-
      Het bevoegd gezag wijzigt binnen twee jaar na het hierna in onderdeel a respectievelijk b genoemde tijdstip de
      voorschriften van een omgevingsvergunning als bedoeld in het eerste lid door aan die vergunning het voorschrift te
      verbinden dat degene die de activiteit verricht financiële zekerheid stelt:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: type_vergunning
            type: string
            required: true
            description: >-
              Type vergunning: onherroepelijk_bij_inwerkingtreding
              of aangevraagd_voor_inwerkingtreding
            source: {}
          - name: datum_inwerkingtreding_wet
            type: date
            required: true
            description: Datum van inwerkingtreding van de Omgevingswet
            source: {}
          - name: datum_onherroepelijk_worden
            type: date
            required: false
            description: >-
              Datum waarop de vergunning onherroepelijk is geworden
              (alleen bij type aangevraagd_voor_inwerkingtreding)
            source: {}
        output:
          - name: uiterste_datum_wijziging_voorschriften
            type: date
            description: Uiterste datum waarop het bevoegd gezag de voorschriften moet wijzigen
        actions:
          - output: uiterste_datum_wijziging_voorschriften
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $type_vergunning
                    value: onherroepelijk_bij_inwerkingtreding
                  then:
                    operation: DATE_ADD
                    date: $datum_inwerkingtreding_wet
                    years: 2
                - when:
                    operation: EQUALS
                    subject: $type_vergunning
                    value: aangevraagd_voor_inwerkingtreding
                  then:
                    operation: DATE_ADD
                    date: $datum_onherroepelijk_worden
                    years: 2
              default:
                operation: DATE_ADD
                date: $datum_inwerkingtreding_wet
                years: 2
  - number: 12.33.2.a
    text: |-
      bij een omgevingsvergunning als bedoeld in het eerste lid, aanhef en onder a: het tijdstip van inwerkingtreding van
      de [wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 12.33.2.b
    text: |-
      bij een omgevingsvergunning als bedoeld in het eerste lid, aanhef en onder b: het tijdstip van het onherroepelijk
      worden van de vergunning.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.33
  - number: '13.1'
    text: |-
      Dit besluit treedt in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de verschillende
      artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel13.1
  - number: '13.2'
    text: 'Dit besluit wordt aangehaald als: Besluit kwaliteit leefomgeving.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel13.2
