        afdeling: '5.1'
  - number: 5.111.a
    text: 'een geurgevoelig gebouw met een woonfunctie dat op of na 19 maart 2000 is gebouwd:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
  - number: 5.111.a.1°
    text: op een locatie die op dat tijdstip werd gebruikt voor het houden van landbouwhuisdieren in dierenverblijven;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
  - number: 5.111.a.2°
    text: in samenhang met het geheel of gedeeltelijk buiten werking stellen van de dierenverblijven; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
  - number: 5.111.a.3°
    text: in samenhang met de sloop van dierenverblijven of bedrijfsgebouwen voor functioneel ondersteunende activiteiten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
  - number: 5.111.b
    text: |-
      een geurgevoelig gebouw dat voor 19 maart 2000 al aanwezig was op een locatie waar een geurgevoelig gebouw als
      bedoeld onder a is gebouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
  - number: 5.112.1
    text: |-
      In een omgevingsplan dat het houden van landbouwhuisdieren zonder geuremissiefactor toelaat, wordt tot een
      geurgevoelig gebouw ten minste de afstand, bedoeld in tabel 5.112.1, in acht genomen.
            Tabel 5.112.1 Afstand tot een geurgevoelig gebouw bij geur door het houden van landbouwhuisdieren zonder
      geuremissiefactor


                    *Geurgevoelig gebouw*


                    *Afstand*


                    Gelegen binnen de bebouwingscontour geur


                    100 m


                    Gelegen buiten de bebouwingscontour geur


                    50 m
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.112
  - number: 5.112.2
    text: |-
      In het omgevingsplan kan een afstand worden aangehouden die kleiner is dan de afstand, bedoeld in het eerste lid,
      mits die afstand niet kleiner is dan de ondergrens voor de afstand, bedoeld in tabel 5.112.2.
            Tabel 5.112.2 Ondergrens afwijkende afstand tot een geurgevoelig gebouw bij geur door het houden van
      landbouwhuisdieren zonder geuremissiefactor


