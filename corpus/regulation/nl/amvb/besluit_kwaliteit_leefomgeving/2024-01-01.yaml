    text: grondwaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.3
    text: 'Een regionaal waterprogramma bevat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.3.a
    text: maatregelen als bedoeld in artikel 11 van de kaderrichtlijn water;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.3.b
    text: |-
      maatregelen als bedoeld in de artikelen 4, vijfde lid, en 6, eerste lid, van de grondwaterrichtlijn, in samenhang
      met artikel 11, van de kaderrichtlijn water;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.3.c
    text: doelstellingen en maatregelen als bedoeld in artikel 7 van de richtlijn overstromingsrisico’s; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.3.d
    text: |-
      maatregelen als bedoeld in de artikelen 8, vierde lid, en 13, achtste lid, onder a, van de drinkwaterrichtlijn,
      voor zover dit geen maatregelen zijn als bedoeld onder a of b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.4
    text: |-
      De onderdelen van een regionaal waterprogramma die uitvoering geven aan de kaderrichtlijn water en de richtlijn
      overstromingsrisico’s vormen afzonderlijke delen van dat programma. Hieronder vallen in ieder geval de maatregelen,
      bedoeld in het derde lid, onder a tot en met c.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4a
    text: |-
      Als in een regionaal waterprogramma voor een op grond van [artikel 4.4, tweede lid, onder a][ref1], aangewezen
      kunstmatig of sterk veranderd krw-oppervlaktewaterlichaam, een goed ecologisch potentieel als bedoeld in
      [artikel 2.12, eerste lid][ref2], wordt vastgesteld, gebeurt dat, gegeven de fysische omstandigheden die
      voortvloeien uit de kunstmatige of sterk veranderde kenmerken van het krw-oppervlaktewaterlichaam:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4a
    references:
      - id: ref1
        bwb_id: BWBR0041313
