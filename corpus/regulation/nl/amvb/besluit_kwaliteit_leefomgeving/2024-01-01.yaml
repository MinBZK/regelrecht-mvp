preamble:
  text: |-
    Wij Willem-Alexander, bij de gratie Gods, Koning der Nederlanden, Prins van Oranje-Nassau, enz. enz. enz.

    Op de voordracht van Onze Minister van Infrastructuur en Milieu van 30 juni 2017, nr. IenM/BSK-2017/167239,
    Hoofddirectie Bestuurlijke en Juridische Zaken, gedaan mede namens Onze Minister van Binnenlandse Zaken en
    Koninkrijksrelaties, Onze Minister van Economische Zaken en Onze Minister van Onderwijs, Cultuur en Wetenschap;

    Gelet op het biodiversiteitsverdrag, het Europees landschapsverdrag, de grondwaterrichtlijn, de habitatrichtlijn,
    de kaderrichtlijn afvalstoffen, de kaderrichtlijn mariene strategie, de kaderrichtlijn maritieme ruimtelijke
    planning, de kaderrichtlijn water, het Londen-protocol, de monitoringsmechanisme-verordening, de nec-richtlijn,
    het Ospar-verdrag, het PRTR-Protocol, de PRTR-verordening, de richtlijn gevaarlijke stoffen in de lucht,
    de richtlijn industriële emissies, de richtlijn luchtkwaliteit, de richtlijn omgevingslawaai, de richtlijn
    overstromingsrisico’s, de richtlijn prioritaire stoffen, de richtlijn stedelijk afvalwater, de richtlijn storten
    afvalstoffen, de richtlijn toegang tot milieu-informatie, de richtlijn winningsafval, de Seveso-richtlijn, het
    verdrag van Aarhus, het verdrag van Granada, het verdrag van Valletta, het VN-gehandicaptenverdrag, het VN-
    Zeerechtverdrag, de vogelrichtlijn, het werelderfgoedverdrag, de zwemwaterrichtlijn, en de artikelen 1.5, tweede
    lid, 2.11, tweede lid, 2.12, tweede lid, 2.15, eerste lid, aanhef en onder a, b, en c, 2.24, eerste lid, 2.26,
    eerste lid en derde lid, aanhef en onder a tot en met h, 2.27, aanhef en onder a tot en met d en onder e, onder 1°,
    2.28, aanhef en onder a, b, c, e en f, 2.30, aanhef en onder a, b en c, 2.31, eerste en tweede lid, 2.32, tweede
    lid, 2.39, vierde lid, 2.41, tweede lid, 2.42, eerste en tweede lid, 3.10, tweede lid, aanhef en onder b, 5.18,
    eerste lid, 5.22, 5.23, 5.24, eerste tot en met vierde lid, 5.26, eerste lid, 5.27, 5.28, 5.31, eerste lid, 5.34,
    eerste en tweede lid, 5.38, derde lid, 5.40, eerste lid, aanhef en onder a, en tweede lid, aanhef en onder a, 5.42,
    eerste en derde lid, 16.88, eerste lid, 19.14, eerste lid, 20.1, derde lid, 20.2, eerste en derde lid, 20.6, eerste
    lid, onder a, onder 1° en 2°, en onder b, 20.7, aanhef en onder a tot en met d, 20.10, eerste lid, aanhef en onder
    a, 20.11, aanhef en onder a tot en met c, 20.14, derde lid, aanhef en onder b, 20.16, eerste lid, en 20.17, eerste
    lid, aanhef en onder a en c, van de Omgevingswet en de artikelen 8.48, derde lid, en 17.5a, tweede lid, van de
    Wet milieubeheer;

    De Afdeling advisering van de Raad van State gehoord (advies van 22 december 2017, nr. W14.17.0199/IV);

    Gezien het nader rapport van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties van 29 juni 2018,
    nr. 2018-0000524061, gedaan mede namens Onze Minister van Economische Zaken en Klimaat, Onze Minister van
    Infrastructuur en Waterstaat, Onze Minister van Landbouw, Natuur en Voedselkwaliteit en Onze Minister van
    Onderwijs, Cultuur en Wetenschap;

    Hebben goedgevonden en verstaan:
