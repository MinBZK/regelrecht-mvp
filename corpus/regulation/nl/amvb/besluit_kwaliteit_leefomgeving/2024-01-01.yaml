  - number: '5.128'
    text: |-
      De bepalingen in de [paragrafen 5.1.5.2][ref1] en [5.1.5.3][ref2] zijn niet van toepassing voor zover activiteiten:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
