  - number: 4.4.1
    text: |-
      In een regionaal waterprogramma wordt in ieder geval vastgelegd de maatschappelijke functie drinkwateronttrekking
      voor regionale wateren die worden gebruikt voor de onttrekking van voor menselijke consumptie bestemd water en
      van waaruit dagelijks meer dan 10 m3 water wordt onttrokken, of van waaruit water wordt onttrokken voor meer dan
      50 personen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.2
    text: 'Een regionaal waterprogramma bevat de aanwijzing van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.2.a
    text: |-
      krw-oppervlaktewaterlichamen die niet in beheer zijn bij het Rijk, waarbij kunstmatige of sterk veranderde krw-
      oppervlaktewaterlichamen worden aangewezen in overeenstemming met artikel 4, derde lid, van de kaderrichtlijn
      water;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.2.b
    text: grondwaterlichamen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.4
  - number: 4.4.2.c
    text: 'waterwinlocaties gelegen in een:'
