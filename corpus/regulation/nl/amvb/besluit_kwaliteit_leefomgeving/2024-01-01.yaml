        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.35'
    text: |-
      Bij het toelaten van de uitbreiding of aanleg van een autoweg, autosnelweg of
      hoofdspoorweg worden de gevolgen van het exploiteren van een Seveso-inrichting, bedoeld in
      [artikel 3.51, eerste lid, van het Besluit activiteiten leefomgeving][ref1], voor de veiligheid van weggebruikers
      en passagiers betrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.35
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: '5.36'
    text: |-
      De bepalingen in de [paragrafen 5.1.3.2][ref1], [5.1.3.3][ref2], [5.1.3.4][ref3] en [5.1.3.5][ref4] zijn niet van
      toepassing voor zover activiteiten:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
