        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0041313
      - id: ref5
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 11.2.b.1°
    text: de bedrijfsnaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
  - number: 11.2.b.2°
    text: de naam en het adres van degene die de activiteit of het deel van de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
  - number: 11.2.b.3°
    text: |-
      de datum waarop de omgevingsvergunning voor de activiteit is verleend of laatstelijk is gewijzigd of voor de
      activiteit een melding is gedaan, voor zover de omgevingsvergunning of de melding betrekking heeft op externe
      veiligheidsrisico’s;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
  - number: 11.2.b.4°
    text: de aard van het risico;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
  - number: 11.2.b.5°
    text: |-
      de chemische naam en het CAS-nummer en voor zover bekend het UN-nummer van de voor het risico maatgevende stof of
      de naam van de voor het risico maatgevende categorie van stoffen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
  - number: 11.2.b.6°
    text: |-
      de gegevens, bedoeld onder 4° en 5°, van zowel de voor het toxisch risico maatgevende stof als de voor het risico
      van brand of explosie maatgevende stof;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
