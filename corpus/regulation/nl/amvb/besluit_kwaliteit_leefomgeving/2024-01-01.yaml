      overeenkomstig wordt toegepast op grond van [artikel 8.0b, aanhef en eerste lid, onder a][ref2],
      [8.0c, aanhef en eerste lid, onder a][ref3], of [8.0d, aanhef en eerste lid, onder a][ref4]:


