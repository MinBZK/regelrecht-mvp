  - number: 7.12.5.a.3°
    text: |-
      nieuwe duurzame activiteiten, voor zover het gaat om de achteruitgang van een zeer goede toestand van een krw-
      oppervlaktewaterlichaam naar een goede toestand;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.5.b
    text: aan de voorwaarden van artikel 4, zevende, achtste en negende lid, van de kaderrichtlijn water is voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.5.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het nationale waterprogramma, als het gaat om rijkswateren,
      of in het regionale waterprogramma, als het gaat om regionale wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.13.1
    text: |-
      Bij omgevingsverordening kunnen voor regionale wateren nadere regels worden gesteld over de rangorde, bedoeld in
      [artikel 3.14, vierde en vijfde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.13
    references:
