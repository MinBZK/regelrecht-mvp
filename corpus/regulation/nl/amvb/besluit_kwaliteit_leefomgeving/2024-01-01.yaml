        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.33.2
    text: |-
      Het eerste lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die een functionele binding hebben met een activiteit als bedoeld in [artikel 5.31][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.33
