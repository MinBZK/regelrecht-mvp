        artikel: '2'
  - number: 8.97a.1.c
    text: |-
      een instructie als bedoeld in [artikel 2.33][ref1] of [2.34 van de wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.97a.2
    text: 'Het bevoegd gezag trekt de omgevingsvergunning in als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97a.2.a
    text: |-
      de regel of instructie, bedoeld in het eerste lid, van toepassing is op activiteiten die op grond van die
      omgevingsvergunning rechtmatig worden verricht of zijn toegestaan op het tijdstip waarop de regel of instructie van
      kracht wordt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97a.2.b
    text: 'de activiteit redelijkerwijs niet kan worden toegelaten door:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97a.2.b.1°
    text: een wijziging van de aan de omgevingsvergunning verbonden voorschriften;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97a.2.b.2°
    text: een wijziging van het omgevingsplan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97a.2.b.3°
    text: |-
      een ontheffing als bedoeld in [artikel 2.32 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.97a.3
    text: |-
