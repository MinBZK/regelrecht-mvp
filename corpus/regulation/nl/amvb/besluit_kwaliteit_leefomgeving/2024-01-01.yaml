    text: 'de hoogste van de volgende drie waarden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.50
  - number: 3.50.1.b.1°
    text: het geluid op het geluidgevoelige gebouw in de situatie dat er geluidbeperkende maatregelen zijn getroffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.50
  - number: 3.50.1.b.2°
    text: het geluid op het geluidgevoelige gebouw bij volledige benutting van geluidproductieplafonds; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.50
  - number: 3.50.1.b.3°
    text: |-
      de standaardwaarde, bedoeld in [tabel 3.34][ref1].


