        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.32.a
    text: |-
      de locatie die wordt begrensd door de afstand bepaald in overeenstemming met de NATO Guidelines for the Storage of
      Military Ammunition and Explosives (AASTP-1); en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.32
  - number: 5.32.b
    text: |-
      de locaties, genoemd in [bijlage X][ref1], waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.32
    references:
      - id: ref1
        bwb_id: BWBR0041313
