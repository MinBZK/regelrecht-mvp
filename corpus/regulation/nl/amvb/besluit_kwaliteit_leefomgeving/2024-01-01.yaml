                    *Gebouw in het geluidaandachtsgebied van gemeentewegen, waterschapswegen, provinciale wegen, lokale
      spoorwegen of industrieterreinen*


                    *Binnenwaarde in L*


                    Geluidgevoelig gebouw waarvoor de bouwvergunning is afgegeven voor 1 januari 1982 waarvoor
      [paragraaf 12.1.6][ref1] wordt of is uitgevoerd


                    41


                    of


                    Geluidgevoelig gebouw waarvoor de bouwvergunning is afgegeven voor 1 januari 1982 en dat ligt langs
      een weg die in gebruik is genomen voor 1 januari 1982 of langs een spoorweg die in gebruik is genomen voor 1 juli
      1987


                    geluidgevoelig gebouw dat eerder op grond van de [Wet geluidhinder][ref2] vanwege het geluid door
      wegen of spoorwegen op kosten van het Rijk is gesaneerd


                    of


                    woning als bedoeld in [artikel 111b, eerste lid, aanhef en onder a, van de Wet geluidhinder][ref3],
      en ander geluidsgevoelig gebouw als bedoeld in [artikel 2.5, aanhef en onder b, van het Besluit geluidhinder][ref4],
      zoals die artikelen luidden voor inwerkingtreding van dit besluit


                    Geluidgevoelig gebouw dat door wijziging van de gebruiksfunctie geluidgevoelig is geworden en
      waarvoor [artikel 5.23a, aanhef en onder b, van het Besluit bouwwerken leefomgeving][ref5] is toegepast


                    Ander geluidgevoelig gebouw


                    36


