          - name: vergunning_geweigerd
            type: boolean
            description: Of de omgevingsvergunning wordt geweigerd
        actions:
          - output: vergunning_geweigerd
            value:
              operation: OR
              conditions:
                - operation: EQUALS
                  subject: $leidt_tot_niet_toegelaten_situatie
                  value: true
                - operation: EQUALS
                  subject: $betreft_voorbeschermingsregel
                  value: true
                - operation: EQUALS
                  subject: $belemmert_projectbesluit
                  value: true
  - number: 8.0b.2.a
    text: |-
      de omgevingsplanactiviteit zou leiden tot een situatie die niet is toegelaten op grond van een regel of instructie
      als bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0b
  - number: 8.0b.2.b
    text: de omgevingsplanactiviteit betrekking heeft op een voorbeschermingsregel in het omgevingsplan; of
