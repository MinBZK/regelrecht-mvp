  - number: 4.7.1
    text: |-
      Een overstromingsrisicobeheerplan voldoet aan artikel 7 van de richtlijn overstromingsrisico’s en bevat de
      doelstellingen en maatregelen als bedoeld in dat artikel voor het Nederlandse deel van de stroomgebiedsdistricten
      Rijn, Maas, Schelde en Eems.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.7
  - number: 4.7.2
    text: Het plan heeft geen betrekking op overstromingen vanuit rioolstelsels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.7
  - number: 4.8.1
    text: |-
      Het programma van maatregelen mariene strategie dat voor de Nederlandse mariene wateren wordt vastgesteld, voldoet
      aan de artikelen 13, eerste tot en met vierde lid, zevende en achtste lid, en 14 van de kaderrichtlijn mariene
      strategie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.8
  - number: 4.8.2
    text: |-
      Het programma bevat de maatregelen om de goede milieutoestand, bedoeld in [artikel 3.1, aanhef en onder b][ref1],
      te bereiken.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.1'
  - number: 4.9.1
    text: |-
      Het maritiem ruimtelijk plan ziet op de Nederlandse mariene wateren, met uitzondering van de kustwateren, bedoeld
      in artikel 2, onder 7, van de kaderrichtlijn water, of delen daarvan, die gemeentelijk of provinciaal zijn
      ingedeeld en waarvan in het maritiem ruimtelijk plan is vermeld dat het plan niet op die wateren ziet.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.2
    text: |-
      Het maritiem ruimtelijk plan beoogt in overeenstemming met artikel 5 van de kaderrichtlijn maritieme ruimtelijke
      planning bij te dragen aan de in dat artikel bedoelde doelstellingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.3
    text: |-
      In het maritiem ruimtelijk plan wordt de ruimtelijke en temporele verdeling van bestaande en toekomstige
      activiteiten en maatschappelijke functies in de Nederlandse mariene wateren geïdentificeerd, waarbij onverminderd
      artikel 2, derde lid, van de kaderrichtlijn maritieme ruimtelijke planning de relevante wisselwerkingen van
      activiteiten en maatschappelijke functies in aanmerking worden genomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4
    text: |-
      Het maritiem ruimtelijk plan bevat een weergave van de procedurele stappen die zijn of worden genomen om aan de
      doelstellingen, bedoeld in artikel 5 van de kaderrichtlijn maritieme ruimtelijke planning, bij te dragen, waarbij
      rekening wordt gehouden met relevante activiteiten in en maatschappelijke functies van de mariene wateren. Daarvoor
      bevat het maritiem ruimtelijk plan in ieder geval een beschrijving van de wijze waarop in het kader van maritieme
      ruimtelijke planning:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a
    text: 'rekening is gehouden met:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a.1°
    text: de bijzonderheden van de mariene regio waarvan de Noordzee deel uitmaakt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a.2°
    text: |-
      de relevante bestaande en toekomstige activiteiten en maatschappelijke functies en het effect daarvan op het
      milieu;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a.3°
    text: de natuurlijke rijkdommen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a.4°
    text: de wisselwerking tussen land en zee; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.a.5°
    text: de ecologische, economische, sociale en veiligheidsaspecten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.b
    text: ernaar wordt gestreefd de samenhang tussen maritieme ruimtelijke planning en andere planprocessen te bevorderen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.c
    text: |-
      in overeenstemming met artikel 10 van de kaderrichtlijn maritieme ruimtelijke planning het gebruik van de beste
      beschikbare gegevens, en de uitwisseling van informatie, is georganiseerd, en hoe daarbij gebruik is gemaakt van de
      relevante instrumenten en hulpmiddelen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.9.4.d
    text: |-
      in overeenstemming met de artikelen 11 en 12 van de kaderrichtlijn maritieme ruimtelijke planning de
      grensoverschrijdende samenwerking heeft plaatsgevonden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.9
  - number: 4.10.1
    text: |-
