  - number: 8.104.1.e
    text: |-
      de houder in het bezit is van een magazijn voor een vuurwapen als bedoeld in artikel 10, eerste lid, van
      Richtlijn (EU) 2017/853 van het Europees parlement en de Raad van de Europese Unie van 17 mei 2017 tot
      wijziging van [Richtlijn 91/477/EEG](31991L0477) van de Raad inzake de controle op de verwerving en het
      voorhanden hebben van wapens (PbEU 2017, L 137/22), zonder hiervoor een verlof of ontheffing op grond van de
      [Wet wapens en munitie][ref1] te hebben.


      [ref1]: https://wetten.overheid.nl/BWBR0008804
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
    references:
      - id: ref1
        bwb_id: BWBR0008804
  - number: 8.104.2
    text: |-
      Het eerste lid, aanhef en onder a, is van overeenkomstige toepassing op een omgevingsvergunning voor een
      valkeniersactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.3
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een jachtgeweeractiviteit of een valkeniersactiviteit kan die
      omgevingsvergunning intrekken, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.3.a
    text: er grond is om aan te nemen dat de houder van zijn bevoegdheid om de jacht uit te oefenen misbruik maakt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.3.b
    text: de houder nalatig is te doen wat een goed jager betaamt bij de uitoefening van de jacht; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.3.c
    text: |-
      er grond is om aan te nemen dat de houder van zijn bevoegdheden in het kader van beheren van populaties van in het
      wild levende dieren en het bestrijden van schadeveroorzakende dieren misbruik maakt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 9.1.1
    text: |-
      [Afdeling 5.1][ref1], met uitzondering van [paragraaf 5.1.5.4][ref2], en [artikel 5.165][ref3] zijn van
      overeenkomstige toepassing op een projectbesluit dat wordt vastgesteld door het dagelijks bestuur van een
      waterschap of gedeputeerde staten.


