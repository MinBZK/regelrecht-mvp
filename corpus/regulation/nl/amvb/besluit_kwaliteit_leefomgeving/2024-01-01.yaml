            source: {}
        output:
          - name: afdeling_5_1_van_overeenkomstige_toepassing
            type: boolean
            description: Of afdeling 5.1 van overeenkomstige toepassing is op de omgevingsverordening
        actions:
          - output: afdeling_5_1_van_overeenkomstige_toepassing
            value:
              operation: EQUALS
              subject: $is_omgevingsverordening_met_regels_art_4_2_lid_2
              value: true
  - number: 7.1a.1
    text: |-
      Het kustfundament is de locatie, bedoeld in [artikel 5.39][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 7.1a.2
    text: |-
      Bij omgevingsverordening worden in het belang van de bescherming en instandhouding van de
      kernkwaliteiten van het kustfundament regels gesteld over regels in omgevingsplannen als bedoeld in
      [artikel 4.2, eerste lid, van de wet][ref1], voor zover het gaat om gebouwen en bouwwerken als bedoeld in
      [artikel 5.40, tweede lid, onder e][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 7.1a.3
    text: 'Tot de kernkwaliteiten van het kustfundament behoren:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.a
    text: vrij zicht en grootschaligheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.b
    text: de natuurlijke dynamiek van de kust;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.c
    text: robuuste waterstaat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.d
    text: het contrast tussen compacte bebouwingskernen en uitgestrekte onbebouwde gebieden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.e
    text: het contrast tussen kustfundament en achterland;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.f
    text: kustgebonden cultureel erfgoed in duingebied en achterland;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.g
    text: specifieke kenmerken van kustplaatsen in relatie tot het achterland; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: 7.1a.3.h
    text: specifieke gebruikskwaliteiten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1a
  - number: '7.2'
    text: |-
      Bij omgevingsverordening kan de provincie Fryslân voor de Friese Waddeneilanden regels stellen over
      omgevingsplannen die afwijken van [artikel 5.40, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 7.3.1
    text: |-
      Droogmakerij de Beemster is de locatie bekend als de polder De Beemster, gelegen op het grondgebied van de
      provincie Noord-Holland, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.3
  - number: 7.3.2
    text: |-
      Stelling van Amsterdam is de locatie bekend als de vroegere verdedigingslinie rondom Amsterdam, gelegen op het
      grondgebied van de provincies Noord-Holland en Utrecht, waarvan de geometrische begrenzing bij ministeriële
      regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.3
  - number: 7.3.3
    text: |-
      Nieuwe Hollandse Waterlinie is de locatie bekend als de vroegere verdedigingslinie Nieuwe Hollandse Waterlinie, die
      van Muiden naar Woudrichem loopt en eindigt bij Werkendam en die is gelegen op het grondgebied van de provincies
      Noord-Holland, Utrecht, Gelderland, Zuid-Holland en Noord-Brabant, waarvan de geometrische begrenzing bij
      ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.3
  - number: 7.3.4
    text: |-
      Romeinse Limes is de locatie bekend als een serie van archeologische monumenten van de vroegere Romeinse
      rijksgrens, die van Katwijk aan Zee tot de grens met Duitsland loopt over het grondgebied van de provincies Zuid-
      Holland, Utrecht en Gelderland, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.3
  - number: 7.3.5
    text: |-
      Koloniën van Weldadigheid is de locatie bekend als een serie van agrarische koloniën gesticht door de Maatschappij
      van Weldadigheid, gelegen op het grondgebied van de provincies Drenthe, Overijssel en Fryslân, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.3
  - number: 7.4.1
    text: |-
      Kernkwaliteiten van de werelderfgoederen en erfgoederen op de Voorlopige Lijst werelderfgoed, bedoeld in
      [artikel 7.3][ref1], zijn de in het belang van het behoud van de uitzonderlijke universele waarde van werelderfgoed
      in [bijlage XVII][ref2] in hoofdlijnen beschreven essentiële kenmerken van het aanwezige landschap en cultureel
      erfgoed.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.2'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 7.4.2
    text: Bij omgevingsverordening worden de kernkwaliteiten nader uitgewerkt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
  - number: 7.4.3
    text: |-
      Bij omgevingsverordening worden in het belang van de instandhouding en versterking van de kernkwaliteiten van de
      werelderfgoederen en erfgoederen op de Voorlopige Lijst werelderfgoed regels gesteld over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
  - number: 7.4.3.a
    text: |-
      regels in omgevingsplannen als bedoeld in [artikel 4.2, eerste lid, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 7.4.3.b
    text: |-
      projectbesluiten als bedoeld in [artikel 2.23, eerste lid, aanhef en onder a, onder 4°, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.4.4
    text: De regels houden in ieder geval in dat geen activiteiten worden toegelaten die de kernkwaliteiten aantasten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.4
  - number: '7.5'
    text: |-
      De [artikelen 7.6 tot en met 7.8][ref1] zijn niet van toepassing op:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.5
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.3.1
        afdeling: '7.3'
  - number: 7.5.a
    text: |-
      de rijkswateren, genoemd in [bijlage II, onder 1, onder A, bij het Omgevingsbesluit][ref1], met uitzondering van de
      uiterwaarden van de tot de rijkswateren behorende rivieren en de Brabantse, Dordtsche en Sliedrechtse Biesbosch; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.5
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 7.5.b
    text: |-
      het Lauwersmeer, het Veerse meer, het Vuile Gat in het Haringvliet en de zeegeul naar het Haringvliet, genaamd
      het Slijkgat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.5
  - number: 7.6.1
    text: |-
      Bij omgevingsverordening worden de gebieden die het natuurnetwerk Nederland, bedoeld in
      [artikel 2.44, vierde lid, van de wet][ref1], vormen, aangewezen en wordt de geometrische begrenzing daarvan
      vastgelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.6.2
    text: |-
      De militaire terreinen OT De Haar, OT De Vlasakkers, OT Havelte West, OT Leusderheide, OT Marnewaard en OT
      Oirschotse Heide, genoemd in [bijlage XIV][ref1], onder A, waarvan de geometrische begrenzing bij ministeriële
      regeling is vastgelegd, maken geen deel uit van het natuurnetwerk Nederland.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.6
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 7.7.1
    text: |-
      Bij omgevingsverordening worden de wezenlijke kenmerken en waarden vastgesteld van de gebieden, bedoeld in
      [artikel 7.6, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.3.1
        afdeling: '7.3'
  - number: 7.7.2
    text: |-
      De wezenlijke kenmerken en waarden, waartoe ook potentiële natuurwaarden en de daarvoor vereiste bodem- en
      watercondities kunnen behoren, worden bepaald met inachtneming van in ieder geval de doelstellingen, bedoeld in
      [artikel 2.18, eerste lid, onder g, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.8.1
    text: |-
      Bij omgevingsverordening worden in het belang van de bescherming, instandhouding, verbetering en ontwikkeling van
      de wezenlijke kenmerken en waarden van het natuurnetwerk Nederland regels gesteld over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8
  - number: 7.8.1.a
    text: |-
      regels in omgevingsplannen als bedoeld in [artikel 4.2, eerste lid, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 7.8.1.b
    text: |-
      projectbesluiten als bedoeld in [artikel 2.23, eerste lid, aanhef en onder a, onder 4°, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.8.2
    text: |-
      De regels verzekeren in ieder geval dat de kwaliteit en oppervlakte van het natuurnetwerk Nederland niet
      achteruitgaan, dat de samenhang tussen de gebieden van het natuurnetwerk wordt behouden en dat, als binnen het
      natuurnetwerk activiteiten worden toegelaten die nadelige gevolgen kunnen hebben voor de wezenlijke kenmerken of
      waarden van het natuurnetwerk, deze gevolgen tijdig worden gecompenseerd, zodanig dat de kwaliteit, oppervlakte en
      samenhang van het natuurnetwerk behouden blijven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8
  - number: 7.8.3
    text: |-
      Over militaire terreinen en terreinen met een militair object als bedoeld in [artikel 5.150, eerste lid][ref1],
      binnen het natuurnetwerk Nederland worden bij omgevingsverordening alleen regels gesteld die verzekeren dat tijdige
      compensatie plaatsvindt van de nadelige gevolgen voor het natuurnetwerk door terreinverharding en bouwactiviteiten
      op die terreinen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
  - number: 7.8a.1
    text: |-
      Een omgevingsverordening die vergunningvrije Natura 2000-activiteiten aanwijst als
      bedoeld in [artikel 11.19 van het Besluit activiteiten leefomgeving][ref1], voldoet aan
      [artikel 11.21 van dat besluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 7.8a.2
    text: 'Een omgevingsverordening die vergunningvrije flora- en fauna-activiteiten aanwijst:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8a
  - number: 7.8a.2.a
    text: |-
      als bedoeld in [artikel 11.42 van het Besluit activiteiten leefomgeving][ref1] met
      betrekking tot vogels van soorten als bedoeld in artikel 1 van de vogelrichtlijn, voldoet aan
      [artikel 11.44, eerste lid, van dat besluit][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 7.8a.2.b
    text: |-
      als bedoeld in [artikel 11.50 van het Besluit activiteiten leefomgeving][ref1] met betrekking tot dieren of
      planten van soorten, genoemd in bijlage IV bij de habitatrichtlijn, bijlage I of II bij het verdrag van Bern of
      bijlage I bij het verdrag van Bonn, voldoet aan [artikel 11.52, eerste lid, van dat besluit][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 7.8a.2.c
    text: |-
      als bedoeld in [artikel 11.56 van het Besluit activiteiten leefomgeving][ref1] met betrekking
      tot dieren of planten van soorten, genoemd in [bijlage IX bij dat besluit][ref2], voldoet aan
      [artikel 11.58, eerste lid, van dat besluit][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.8a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
  - number: '7.9'
    text: |-
      Een omgevingsverordening bevat geen regels die het gebruik, de instandhouding, de verbetering of de vernieuwing van
      de hoofdspoorweginfrastructuur of een weg in beheer bij het Rijk belemmeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.9
  - number: 7.10.1
    text: |-
      Dit artikel is van toepassing op lokale spoorwegen buiten de op grond van
      [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] aangewezen gebieden.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.10
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 7.10.2
    text: |-
      In een omgevingsverordening wordt de geometrische begrenzing van de beperkingengebieden met betrekking tot lokale
      spoorwegen vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.10
  - number: 7.10a.1
    text: |-
      In een omgevingsverordening worden voor de vaststelling van geluidproductieplafonds als omgevingswaarden ten minste
      de provinciale wegen aangewezen met een verkeersintensiteit van meer dan 1.000 motorvoertuigen per etmaal gemiddeld
      over een kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.10a
  - number: 7.10a.2
    text: |-
      In een omgevingsverordening kunnen alleen lokale spoorwegen als bedoeld in
      [artikel 2.13a, eerste lid, onder b, van de wet][ref1] worden aangewezen voor zover die niet zijn verweven of
      gebundeld met delen van een weg.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.10a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 7.11.1
    text: 'Een omgevingsverordening bevat in ieder geval regels over:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.11
  - number: 7.11.1.a
    text: het voorkomen of beperken van geluidbelasting in bij de omgevingsverordening aangewezen gebieden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.11
  - number: 7.11.1.b
    text: |-
      het beschermen van de kwaliteit van het grondwater vanwege de waterwinning in bij de omgevingsverordening
      aangewezen gebieden, waaronder maatregelen als bedoeld in de artikelen 8, vierde lid, en 13, achtste lid,
      onder a, van de drinkwaterrichtlijn, voor die grondwaterlichamen waarvoor de maatschappelijke functie
      «drinkwateronttrekking» is vastgelegd in het regionale waterprogramma.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.11
  - number: 7.11.2
    text: |-
      Een omgevingsverordening bevat geen regels als bedoeld in het eerste lid, aanhef en onder a, over het voorkomen of
      beperken van geluidbelasting door het gebruik van ontplofbare stoffen en voorwerpen op een militaire schietbaan of
      een militair springterrein.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.11
  - number: 7.12.1
    text: |-
      Dit artikel is van toepassing op een omgevingsverordening die bepaalt dat het is verboden zonder
      omgevingsvergunning een activiteit te verrichten die gevolgen kan hebben voor een krw-oppervlaktewaterlichaam of
      een grondwaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.2
    text: |-
      De omgevingsverordening bepaalt dat het verlenen van de omgevingsvergunning er in ieder geval niet toe mag leiden
      dat, rekening houdend met de waterbeheerprogramma’s, de regionale waterprogramma’s, de stroomgebiedsbeheerplannen,
      de overstromingsrisicobeheerplannen en het nationale waterprogramma, die betrekking hebben op het betreffende krw-
      oppervlaktewaterlichaam of grondwaterlichaam:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.2.a
    text: |-
      niet wordt voldaan aan de omgevingswaarden, bedoeld in de [artikelen 2.10, eerste lid][ref1],
      [2.11, eerste lid][ref2], [2.13, eerste lid][ref3], [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5], in
      voorkomend geval in samenhang met de termijn, bedoeld in [artikel 2.18, eerste lid][ref6];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref6
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 7.12.2.b
    text: |-
      een goed ecologisch potentieel als bedoeld in [artikel 2.12, eerste lid][ref1], niet wordt bereikt, in voorkomend
      geval in samenhang met de termijn, bedoeld in [artikel 2.18, tweede lid][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 7.12.2.c
    text: |-
      een minder strenge doelstelling als bedoeld in [artikel 2.17, tweede lid, aanhef en onder d][ref1], niet wordt
      bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 7.12.3
    text: 'Het tweede lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.3.a
    text: |-
      voor zover het gaat om de omgevingswaarde, bedoeld in [artikel 2.10, eerste lid][ref1], als het niet voldoen aan
      die omgevingswaarde wordt veroorzaakt door een buiten Nederland gelegen verontreinigingsbron en toepassing is
      gegeven aan [artikel 2.17, derde lid][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 7.12.3.b
    text: |-
      als het niet voldoen aan een omgevingswaarde of het niet bereiken van een goed ecologisch potentieel of een minder
      strenge doelstelling het gevolg is van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.3.b.1°
    text: |-
      nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam of wijzigingen in de stand van
      een grondwaterlichaam; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.3.b.2°
    text: |-
      toepassing is gegeven aan [artikel 2.17, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 7.12.4
    text: |-
      De omgevingsverordening bepaalt dat het verlenen van de omgevingsvergunning er ook niet toe mag leiden
      dat de doelstelling van het voorkomen van achteruitgang van de chemische en ecologische toestand van krw-
      oppervlaktewaterlichamen en van de chemische toestand en kwantitatieve toestand van grondwaterlichamen, bedoeld in
      [artikel 4.15, eerste lid][ref1], niet wordt bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 7.12.5
    text: |-
      De omgevingsverordening bepaalt dat in afwijking van wat overeenkomstig het vierde lid in de omgevingsverordening
      is bepaald, een omgevingsvergunning kan worden verleend als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.5.a
    text: 'de aanvraag betrekking heeft op gevallen waarin het niet voorkomen van die achteruitgang het gevolg is van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.5.a.1°
    text: nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.12
  - number: 7.12.5.a.2°
    text: wijzigingen in de stand van grondwaterlichamen; of
