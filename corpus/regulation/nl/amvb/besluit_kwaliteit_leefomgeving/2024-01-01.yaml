    text: |-
      Voor de toepassing van het eerste lid wordt met een geluidgevoelig gebouw als bedoeld in
      [artikel 3.21, eerste lid, onder a][ref1], gelijkgesteld: elke 15 m geluidbelaste gevel van een geluidgevoelig
      gebouw als bedoeld in artikel 3.21, eerste lid, onder b, c, of d, per bouwlaag.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
