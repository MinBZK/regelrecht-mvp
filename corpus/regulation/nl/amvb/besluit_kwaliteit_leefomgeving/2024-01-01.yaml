        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '5.102'
    text: |-
      Een omgevingsplan kan, als zwaarwegende economische belangen of zwaarwegende andere maatschappelijke belangen dit
      rechtvaardigen, een waarde bevatten die hoger is dan de voor het zuiveringtechnische werk geldende grenswaarden,
      bedoeld in [artikel 5.100, eerste of tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.102
    references:
