        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 2.18.1.a
    text: de toestand van het krw-oppervlaktewaterlichaam of grondwaterlichaam niet achteruitgaat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.18
  - number: 2.18.1.b
    text: wordt voldaan aan de voorwaarden van artikel 4, vierde en achtste lid, van de kaderrichtlijn water; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.18
  - number: 2.18.1.c
    text: |-
      de motivering wordt opgenomen in het regionale waterprogramma, als het gaat om regionale wateren, of het nationale
      waterprogramma, als het gaat om rijkswateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.18
  - number: 2.18.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op het goede ecologische potentieel dat voor een kunstmatig of
      sterk veranderd krw-oppervlaktewaterlichaam is vastgesteld op grond van [artikel 2.12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.18
