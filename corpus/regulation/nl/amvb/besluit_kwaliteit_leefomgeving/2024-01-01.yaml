        bwb_id: BWBR0043247
        artikel: '3'
  - number: 12.7.2
    text: |-
      Totdat toepassing is gegeven aan [artikel 3.5, tweede lid, van de Aanvullingswet geluid Omgevingswet][ref1],
      is het geluidaandachtsgebied van een provinciale weg de geluidzone, bedoeld in
      [artikel 74 van de Wet geluidhinder][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0043247#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0003227#Artikel74
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.7
