      overeenstemming met bijlage III bij de grondwaterrichtlijn hebben bevestigd dat wordt voldaan aan de voorwaarden,
      bedoeld in artikel 4, tweede lid, aanhef en onder c, en vijfde lid, van die richtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.14
