        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        afdeling: 12.3a
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '15'
  - number: 12.26b
    text: |-
      De bestuursorganen die zijn belast met de uitvoering van het programma verzamelen gegevens over de voortgang en de
      gevolgen van dat programma.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26b
  - number: 12.26c
    text: |-
      Onze Minister voor Natuur en Stikstof stelt elk jaar een verslag op over de voortgang en de
      gevolgen van het programma legalisering projecten natuur op basis van de gegevens, bedoeld in
      [artikel 15.5, eerste lid, van het Omgevingsbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '15'
  - number: 12.26d
    text: |-
      Uiterlijk op het tijdstip bedoeld in [artikel 22.5, eerste lid, van de wet][ref1] geeft het bevoegd gezag
      uitvoering aan [artikel 5.161bc][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
