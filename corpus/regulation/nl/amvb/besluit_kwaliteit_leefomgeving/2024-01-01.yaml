        afdeling: '12.3'
  - number: 12.27c.1
    text: |-
      Dit artikel is van toepassing op een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit
      als de regels voor de locatie deel uitmaken van het tijdelijk deel van het omgevingsplan, bedoeld in
      [artikel 22.1, onder a, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.27c
    references:
