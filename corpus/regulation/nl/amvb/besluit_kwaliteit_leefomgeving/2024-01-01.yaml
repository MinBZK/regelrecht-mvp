    text: |-
      vergunningplichtige beperkingengebiedactiviteiten met betrekking tot een installatie,
      anders dan een mijnbouwinstallatie, in een waterstaatswerk als bedoeld in
      [hoofdstuk 7 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
    references:
