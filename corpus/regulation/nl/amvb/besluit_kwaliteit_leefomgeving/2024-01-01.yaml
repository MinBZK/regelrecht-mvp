  - number: 8.74a
    text: |-
      Deze paragraaf is van toepassing op vergunningplichtige Natura 2000-activiteiten en is opgenomen met het oog op
      de natuurbescherming.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74a
  - number: 8.74b.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een Natura 2000-
      activiteit, wordt de omgevingsvergunning alleen verleend als uit de passende beoordeling, bedoeld in
      [artikel 16.53c, eerste lid, van de wet][ref1], de zekerheid is verkregen dat het project de natuurlijke kenmerken
      van het gebied niet zal aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 8.74b.2
    text: |-
      In afwijking van het eerste lid kan, ondanks het feit dat uit de passende beoordeling de vereiste zekerheid niet is
      verkregen, de omgevingsvergunning worden verleend, als is voldaan aan de volgende voorwaarden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.2.a
    text: er zijn geen alternatieve oplossingen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.2.b
    text: |-
      het project is nodig om dwingende redenen van groot openbaar belang, met inbegrip van redenen van sociale of
      economische aard; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.2.c
    text: |-
      de nodige compenserende maatregelen worden getroffen om te waarborgen dat de algehele samenhang van Natura 2000
      bewaard blijft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.3
    text: |-
      Als het project significante gevolgen kan hebben voor een prioritair type natuurlijke habitat of een prioritaire
      soort in een Natura 2000-gebied, geldt, in afwijking van het tweede lid, onder b, de voorwaarde dat het project
      nodig is vanwege:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.3.a
    text: |-
      argumenten die verband houden met de gezondheid, de openbare veiligheid of met voor het milieu wezenlijke gunstige
      effecten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
  - number: 8.74b.3.b
    text: |-
      andere dwingende redenen van groot openbaar belang, als de procedure van
      [artikel 10.6d van het Omgevingsbesluit][ref1] is toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74b
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 8.74d.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een Natura 2000-activiteit waarop een
      gemeentelijk programma als bedoeld in [artikel 4.29][ref1] van toepassing is, wordt de omgevingsvergunning alleen
      verleend als de Natura 2000-activiteit voldoet aan de in het programma opgenomen bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74d
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.4.3
        afdeling: '4.4'
  - number: 8.74d.2
    text: 'Het eerste lid geldt niet voor een projectbesluit waarin is bepaald dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74d
  - number: 8.74d.2.a
    text: het projectbesluit geldt als een omgevingsvergunning voor een Natura 2000-activiteit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74d
  - number: 8.74d.2.b
    text: het eerste lid niet van toepassing is op dat projectbesluit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74d
  - number: 8.74g
    text: |-
      Aan een omgevingsvergunning die in overeenstemming met [artikel 8.74b, tweede lid][ref1], voor een Natura 2000-
      activiteit wordt verleend, wordt een voorschrift verbonden dat de plicht inhoudt om compenserende maatregelen als
      bedoeld in artikel 8.74b, tweede lid, onder c, te treffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74g
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.6.1
        afdeling: '8.6'
  - number: 8.74h
    text: |-
      Aan een omgevingsvergunning die in overeenstemming met [artikel 4.29][ref1] voor een Natura 2000-activiteit wordt
      verleend, worden de voorschriften en de beperkingen verbonden, die zijn vastgesteld in het gemeentelijke programma,
      bedoeld in artikel 4.29.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74h
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.4.3
        afdeling: '4.4'
  - number: 8.74i
    text: |-
      Deze paragraaf is van toepassing op flora- en fauna-activiteiten en is opgenomen met het oog op de
      natuurbescherming.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74i
  - number: 8.74j.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een flora- en fauna-activiteit als
      bedoeld in [artikel 11.37, eerste lid][ref1], [11.38, eerste lid][ref2], [11.39, eerste lid][ref3], of
      [11.40 van het Besluit activiteiten leefomgeving][ref4], wordt de omgevingsvergunning alleen verleend als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74j.1.a
    text: er geen andere bevredigende oplossing dan het verrichten van de activiteit bestaat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b
    text: 'de activiteit nodig is:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.1°
    text: in het belang van de volksgezondheid of de openbare veiligheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.2°
    text: in het belang van de veiligheid van het luchtverkeer;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.3°
    text: voor het voorkomen van belangrijke schade aan gewassen, vee, bossen, visserij of wateren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.4°
    text: ter bescherming van flora en fauna;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.5°
    text: voor onderzoek of onderwijs, het uitzetten of herinvoeren van soorten, of voor de daarmee samenhangende teelt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.b.6°
    text: |-
      om het vangen, het onder zich hebben of elke andere wijze van verstandig gebruik van bepaalde vogels in kleine
      hoeveelheden selectief en onder strikt gecontroleerde omstandigheden toe te staan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.1.c
    text: de activiteit niet leidt tot verslechtering van de staat van instandhouding van deze soort.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een flora- en fauna-activiteit als bedoeld
      in [artikel 11.37, eerste lid, van het Besluit activiteiten leefomgeving][ref1] tot beperking van de omvang van
      een populatie van vogels, worden bij de toepassing van het eerste lid, aanhef en onder b, alleen de belangen,
      bedoeld in dat onderdeel, onder 1° tot en met 4°, in aanmerking genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74j.3
    text: |-
      Een omgevingsvergunning als bedoeld in het tweede lid wordt alleen verleend aan een faunabeheereenheid, tenzij de
      noodzaak ontbreekt voor het verrichten van de activiteit door tussenkomst van een faunabeheereenheid. In dat geval
      kan de omgevingsvergunning ook worden verleend aan een wildbeheereenheid of aan anderen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
  - number: 8.74j.4
    text: |-
      Een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in
      [artikel 11.40, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref1] die betrekking heeft op het
      gebruik van motorboten op open zee wordt alleen verleend als is voldaan aan de voorwaarden, genoemd in bijlage IV,
      onder b, tweede gedachtestreepje, tweede zin, bij de vogelrichtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74j
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74k.1
    text: |-
      Voor zover een aanvraag een omgevingsvergunning betrekking heeft op een flora- en fauna-
      activiteit als bedoeld in [artikel 11.46, eerste lid][ref1], [11.47, eerste lid][ref2], of
      [11.48 van het Besluit activiteiten leefomgeving][ref3], wordt de omgevingsvergunning alleen verleend als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74k.1.a
    text: er geen andere bevredigende oplossing voor het verrichten van de activiteit bestaat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b
    text: 'de activiteit nodig is:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b.1°
    text: |-
      in het belang van de bescherming van de wilde flora of fauna, of in het belang van de instandhouding van de
      natuurlijke habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b.2°
    text: |-
      voor het voorkomen van ernstige schade aan met name gewassen, veehouderijen, bossen, visgronden, wateren of andere
      vormen van eigendom;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b.3°
    text: |-
      in het belang van de volksgezondheid, de openbare veiligheid of andere dwingende redenen van groot openbaar belang,
      met inbegrip van redenen van sociale of economische aard en met inbegrip van voor het milieu wezenlijke gunstige
      effecten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b.4°
    text: |-
      voor onderzoek en onderwijs, repopulatie of herintroductie van deze soorten, of voor de daarvoor benodigde kweek,
      met inbegrip van de kunstmatige vermeerdering van planten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.b.5°
    text: |-
      om het onder strikt gecontroleerde omstandigheden mogelijk te maken op selectieve wijze en binnen bepaalde grenzen
      een beperkt, bij de omgevingsvergunning vastgesteld aantal van bepaalde dieren van de aangewezen soort te vangen
      of onder zich te hebben, respectievelijk een beperkt bij de omgevingsvergunning vastgesteld aantal van bepaalde
      planten van de aangewezen soort te plukken of onder zich te hebben; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.1.c
    text: |-
      de activiteit geen afbreuk doet aan het streven de populaties van de betrokken soort in hun natuurlijke
      verspreidingsgebied in een gunstige staat van instandhouding te laten voortbestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
  - number: 8.74k.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een flora- en fauna-activiteit als bedoeld
      in [artikel 11.46, eerste lid, van het Besluit activiteiten leefomgeving][ref1] tot beperking van de omvang van
      een populatie van dieren van soorten als bedoeld in dat lid, worden bij de toepassing van het eerste lid, aanhef en
      onder b, alleen de belangen, bedoeld in dat onderdeel onder 1°, 2° en 3°, in aanmerking genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74k
    references:
