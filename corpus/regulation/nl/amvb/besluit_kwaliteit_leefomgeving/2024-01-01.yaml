      vergunningplichtige wateronttrekkingsactiviteiten als bedoeld in [hoofdstuk 6][ref1] of
      [afdeling 16.1 van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Afdeling16.1
