        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 4.2.2
    text: |-
      Als aannemelijk is dat niet wordt voldaan aan de omgevingswaarden, bedoeld in de [artikelen 2.3][ref1],
      [2.4][ref2], [2.5, eerste lid, en tweede lid, onder a en b][ref3], en [2.6][ref4], bevat een programma passende
      maatregelen, zodat binnen een zo kort mogelijke periode aan de omgevingswaarde wordt voldaan.


