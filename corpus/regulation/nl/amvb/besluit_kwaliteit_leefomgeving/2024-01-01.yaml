  - number: 5.128.a
    text: |-
      op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van inwerkingtreding van die
      bepalingen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.128
  - number: 5.128.b
    text: |-
      zijn toegestaan op grond van een in werking getreden projectbesluit of omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, dat is vastgesteld respectievelijk die is verleend door een bestuursorgaan van het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.128
  - number: '5.129'
    text: |-
      Een omgevingsplan laat geen activiteiten toe die een belemmering vormen voor het uitzicht op de vrije horizon vanaf
      de gemiddelde hoogwaterlijn met de blik op zee.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129
  - number: 5.129a.1
    text: |-
      De PKB-Waddenzee is de locatie die is weergegeven op de kaart in bijlage XIIIc, waarvan de geometrische begrenzing
      bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129a
  - number: 5.129a.2
    text: |-
      Het Waddengebied is de locatie die is weergegeven op de kaart in bijlage XIIIc, waarvan de geometrische begrenzing
      bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129a
  - number: 5.129b.1
    text: |-
      Als landschappelijke kernkwaliteiten van de PKB-Waddenzee worden aangemerkt de rust, weidsheid, open horizon en
      natuurlijkheid met inbegrip van de duisternis.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2
    text: 'Als kenmerkend cultureel erfgoed van de PKB-Waddenzee worden aangemerkt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.a
    text: |-
      historische scheepswrakken, verdronken en ondergeslibde nederzettingen en ontginningssporen, en andere in de PKB-
      Waddenzee aanwezige archeologische monumenten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.b
    text: zeedijken en daaraan verbonden historische sluizen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.c
    text: landaanwinningswerken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.d
    text: het systeem van stuifdijken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.e
    text: het systeem van historische vaar- en uitwateringsgeulen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.f
    text: kapen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129b.2.g
    text: het ensemble Afsluitdijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129b
  - number: 5.129c
    text: |-
      Voor zover een omgevingsplan van toepassing is op het Waddengebied, laat het omgevingsplan geen activiteiten toe
      die afzonderlijk of in combinatie met andere activiteiten significant nadelige gevolgen kunnen hebben voor de
      landschappelijke kernkwaliteiten van de PKB-Waddenzee of het cultureel erfgoed van de PKB-Waddenzee, tenzij:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129c
  - number: 5.129c.a
    text: er voor de activiteit geen reële alternatieven voorhanden zijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129c
  - number: 5.129c.b
    text: |-
      zwaarwegende redenen van groot openbaar belang, waaronder belangen van sociale of economische aard, belangen die
      verband houden met de bescherming van de gezondheid, de openbare veiligheid of bereikbaarheid, het toelaten van de
      activiteit rechtvaardigen of als sprake is van voor het milieu wezenlijk gunstige effecten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129c
  - number: 5.129c.c
    text: de nadelige gevolgen zoveel mogelijk worden beperkt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129c
  - number: 5.129d.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op de PKB-Waddenzee, laat het omgevingsplan de volgende activiteiten
      niet toe:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.a
    text: het bouwen van een windturbine;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.b
    text: 'de aanleg of zeewaartse uitbreiding van een haven of jachthaven, met uitzondering van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.b.1°
    text: |-
      een beperkte zeewaartse uitbreiding van een jachthaven op een Waddeneiland, als die uitbreiding noodzakelijk is
      voor de veiligheid of bereikbaarheid en er geen andere passende oplossing is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.b.2°
    text: een zeewaartse verlegging van de veerhaven in de gemeente Den Helder; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.b.3°
    text: |-
      een zeewaartse uitbreiding van de haven van de gemeente Harlingen, als een binnendijkse uitbreiding van die haven
      redelijkerwijs niet mogelijk is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.c
    text: de aanleg of zeewaartse uitbreiding van een bedrijventerrein;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d
    text: 'andere bouwactiviteiten, dan die, bedoeld onder a, b en c, met uitzondering van het bouwen van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.1°
    text: een bouwwerk dat noodzakelijk is voor de veiligheid van de scheepvaart;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.2°
    text: een bouwwerk voor alternatieve mosselzaadbronnen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.3°
    text: een bouwwerk voor een adequate afwatering van het vasteland;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.4°
    text: een wadwachtpost, als het gaat om een locatie die niet vanaf het vasteland of een Waddeneiland kan worden bewaakt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.5°
    text: |-
      een tijdelijk bouwwerk als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref1] voor
      wetenschappelijk onderzoek en monitoring;


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 5.129d.1.d.6°
    text: een bouwwerk voor activiteiten als bedoeld onder b, onder 1° tot en met 3°, en onder f, onder 1° en 2°; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.d.7°
    text: |-
      een bouwwerk dat een bestaand bouwwerk vervangt, voor zover het gaat om een bouwwerk van gelijke aard en omvang en
      gelijk karakter;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.e
    text: het inpolderen, bedijken of indijken van delen van de PKB-Waddenzee;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.f
    text: 'het winnen van mineralen door afbaggering van de zeebodem, met uitzondering van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.f.1°
    text: |-
      het winnen van vrijkomend zand bij onderhoud en de incidentele verdieping van vaargeulen en bij overeenkomstig dit
      artikel toegelaten bouwactiviteiten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.f.2°
    text: het winnen van schelpen beneden 5 m onder NAP; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.1.g
    text: het parkeren van een booreiland of andere offshore-installatie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129d.2
    text: |-
      Op het in het omgevingsplan toelaten van de activiteiten, bedoeld in het eerste lid, aanhef, onder b, onder
      1° tot en met 3°, onder d, onder 1° tot en met 6°, en onder f, onder 1° en 2°, is [artikel 5.129c][ref1] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.5
        afdeling: '5.1'
  - number: 5.129d.3
    text: |-
      Voor zover een omgevingsplan van toepassing is op een locatie direct grenzend aan de PKB-Waddenzee, is het eerste
      lid, aanhef en onder b en c, van overeenkomstige toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129d
  - number: 5.129e.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op de PKB-Waddenzee, het op grond van
      [artikel 2.44, eerste lid, van de wet][ref1] aangewezen Natura 2000-gebied Waddenzee, het werelderfgoed Waddenzee
      of de Waddeneilanden, laat het omgevingsplan geen mijnbouwwerk voor het opsporen of winnen van delfstoffen toe.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.129e.2
    text: |-
      Het eerste lid geldt niet voor het met een verplaatsbaar mijnbouwwerk aanleggen, aanpassen, testen, onderhouden,
      repareren en buiten gebruik stellen van een boorgat of stimuleren van een voorkomen via een boorgat, bedoeld in
      [artikel 4.1116 van het Besluit activiteiten leefomgeving][ref1], op een locatie waarop zich een mijnbouwwerk voor
      het opsporen of winnen van delfstoffen bevindt dat op het tijdstip van inwerkingtreding van dit besluit rechtmatig
      aanwezig was.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129e
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.129e.3
    text: |-
      Een omgevingsplan dat bouwwerken voor het opsporen of winnen van delfstoffen als bedoeld in
      [artikel 1, onder e en f, van de Mijnbouwwet][ref1] toelaat op het vasteland, voor zover dat is gelegen in het
      Waddengebied en niet is gelegen in de PKB-Waddenzee, de op grond van [artikel 2.44, eerste lid, van de wet][ref2]
      aangewezen Natura 2000-gebieden Waddenzee en Noordzeekustzone of het Werelderfgoed Waddenzee, bepaalt dat
      bouwwerken voor de opsporing en winning zo in het landschap worden ingepast dat die bouwwerken de openheid van het
      landschap niet aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129e
    references:
      - id: ref1
        bwb_id: BWBR0014168
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.129e.4
    text: |-
      Het derde lid geldt niet voor verplaatsbare mijnbouwwerken, voor zover het gaat om het aanleggen, aanpassen,
      onderhouden, repareren of buiten gebruik stellen van een boorgat op een locatie waarop zich een mijnbouwwerk voor
      het opsporen of winnen van delfstoffen bevindt dat op het tijdstip van inwerkingtreding van dit besluit rechtmatig
      aanwezig was.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129e
  - number: 5.129f.1
    text: 'Voor zover een omgevingsplan van toepassing is op het Waddengebied, laat het omgevingsplan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.1.a
    text: geen aanleg van een burgerluchthaven toe; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.1.b
    text: |-
      de uitbreiding van de luchthavens in de gemeenten Texel en Ameland alleen toe als dat noodzakelijk is voor de
      vliegveiligheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op het Waddengebied, met uitzondering van de PKB-Waddenzee, en
      bouwactiviteiten toelaat, bepaalt het omgevingsplan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.2.a
    text: |-
      voor bouwactiviteiten in stedelijk gebied dat de maximaal toelaatbare hoogte voor bouwwerken aansluit bij de hoogte
      van de bestaande bebouwing; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.2.b
    text: |-
      voor bouwactiviteiten buiten stedelijk gebied dat de maximaal toelaatbare hoogte voor bouwwerken en de aard en
      doeleinden van nieuwe bebouwing passen bij de aard van het omringende landschap.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129f.3
    text: |-
      In afwijking van het tweede lid, aanhef en onder a, bepaalt een omgevingsplan voor bouwactiviteiten in het
      stedelijk gebied van de gemeenten Den Helder, Harlingen en Delfzijl en de Eemshaven dat nieuwe bouwwerken worden
      ingepast in de stedenbouwkundige structuur van dat stedelijk gebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129f
  - number: 5.129g.1
    text: |-
      Dit artikel is van toepassing op een stedelijke ontwikkeling die bestaat uit de ontwikkeling of uitbreiding van een
      bedrijventerrein, een zeehaventerrein, een woningbouwlocatie, kantoren, een detailhandelvoorziening of een andere
      stedelijke voorziening en die voldoende substantieel is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.2
    text: |-
      Voor zover een omgevingsplan voorziet in een nieuwe stedelijke ontwikkeling, wordt met het oog op het belang van
      zorgvuldig ruimtegebruik en het tegengaan van leegstand in het omgevingsplan rekening gehouden met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.2.a
    text: de behoefte aan die stedelijke ontwikkeling; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.2.b
    text: |-
      als die stedelijke ontwikkeling is voorzien buiten het stedelijk gebied of buiten het stedelijk groen aan de rand
      van de bebouwing van stedelijk gebied: de mogelijkheden om binnen dat stedelijk gebied of binnen dat stedelijk
      groen aan de rand van de bebouwing van stedelijk gebied in die behoefte te voorzien.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.3
    text: |-
      Voor de toepassing van het tweede lid, onder b, wordt tot het stedelijk gebied niet gerekend een stedelijke
      ontwikkeling waarvoor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.3.a
    text: op grond van het omgevingsplan een omgevingsvergunning voor een omgevingsplanactiviteit is vereist; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.3.b
    text: nog geen toepassing is gegeven aan het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
  - number: 5.129g.4
    text: |-
      Als een omgevingsplan voorziet in de vestiging van een dienst als bedoeld in [artikel 1 van de Dienstenwet][ref1]
      en de beoordeling van de behoefte aan een stedelijke ontwikkeling betrekking heeft op de economische behoefte,
      de marktvraag of de mogelijke of actuele economische gevolgen van die vestiging, heeft die beoordeling alleen tot
      doel na te gaan of de vestiging van een dienst in overeenstemming is met een evenwichtige toedeling van functies
      aan locaties.


      [ref1]: https://wetten.overheid.nl/BWBR0026759#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.129g
    references:
      - id: ref1
        bwb_id: BWBR0026759
        artikel: '1'
  - number: 5.130.1
    text: |-
      In een omgevingsplan wordt rekening gehouden met het belang van het behoud van cultureel erfgoed, met inbegrip van
      bekende of aantoonbaar te verwachten archeologische monumenten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2
    text: |-
      Met het oog op het belang van het behoud van cultureel erfgoed worden in een omgevingsplan in ieder geval regels
      gesteld ter bescherming van daarvoor in aanmerking komend cultureel erfgoed, waarbij rekening wordt gehouden met de
      volgende beginselen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.a
    text: |-
      het voorkomen van ontsiering, beschadiging of sloop van op grond van het omgevingsplan beschermde monumenten en
      archeologische monumenten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.b
    text: |-
      het voorkomen van verplaatsing van op grond van het omgevingsplan beschermde monumenten of een deel daarvan, tenzij
      dit dringend is vereist voor het behoud van die monumenten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.c
    text: |-
      het bevorderen van het gebruik van monumenten, zo nodig door wijziging van die monumenten, rekening houdend met de
      monumentale waarden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.d
    text: 'het voorkomen van aantasting van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.d.1°
    text: |-
      de omgeving van rijksmonumenten, voorbeschermde rijksmonumenten en monumenten die op grond van het omgevingsplan
      zijn beschermd, voor zover die monumenten door die aantasting worden ontsierd of beschadigd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.d.2°
    text: |-
      het karakter van in het omgevingsplan beschermde stads- of dorpsgezichten of beschermde cultuurlandschappen door de
      sloop van bestaande gebouwen, de bouw van nieuwe gebouwen of andere belangrijke veranderingen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.2.e
    text: het conserveren en in stand houden van archeologische monumenten, bij voorkeur in situ.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.3
    text: 'In het belang van de archeologische monumentenzorg kunnen in een omgevingsplan ook:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.3.a
    text: |-
      regels worden gesteld over eisen aan onderzoek naar de archeologische waarde van een locatie of aan de wijze
      van het verrichten van opgravingen of archeologische begeleiding van andere activiteiten die tot bodemverstoring
      leiden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.3.b
    text: |-
      gevallen worden aangewezen waarin kan worden afgezien van onderzoek naar de archeologische waarde van een locatie
      of het opleggen van plichten met die strekking.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.4
    text: |-
      Als in een omgevingsplan regels worden gesteld over het verrichten van archeologisch onderzoek, bepaalt het
      omgevingsplan dat die regels niet van toepassing zijn op activiteiten met een oppervlakte van minder dan 100 m2.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: 5.130.5
    text: In afwijking van het vierde lid kan in een omgevingsplan een andere oppervlakte worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.130
  - number: '5.131'
    text: |-
      In een omgevingsplan wordt rekening gehouden met het belang van het behoud van de uitzonderlijke universele waarde
      van werelderfgoed.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.131
  - number: 5.132.1
    text: |-
      De bepalingen in de [paragrafen 5.1.6.2][ref1] en [5.1.6.3][ref2] zijn niet van toepassing voor zover activiteiten
      op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van inwerkingtreding van die
      bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.132
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
  - number: 5.132.2
    text: |-
      De bepalingen in de [paragrafen 5.1.6.2][ref1], [5.1.6.3][ref2], [5.1.6.4][ref3] en [5.1.6.5 ][ref4]zijn niet
      van toepassing voor zover activiteiten zijn toegestaan op grond van een in werking getreden projectbesluit of
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit, dat is vastgesteld respectievelijk die is
      verleend door een bestuursorgaan van het Rijk.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.132
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
  - number: 5.133.1
    text: |-
      Reserveringsgebieden voor de uitbreiding of aanleg van een autoweg, autosnelweg of hoofdspoorweg zijn de locaties,
      die bij ministeriële regeling zijn aangewezen en waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.133.2
    text: |-
      De breedte van een reserveringsgebied voor de uitbreiding van een autoweg of autosnelweg wordt gemeten vanaf de
      buitenste kantstreep en bedraagt ten hoogste:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.133.2.a
    text: 34 m aan weerszijden van de weg voor de mogelijke uitbreiding met één rijstrook per rijrichting;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.133.2.b
    text: 38 m aan weerszijden van de weg voor de mogelijke uitbreiding met twee rijstroken per rijrichting;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.133.2.c
    text: 41 m aan weerszijden van de weg voor de mogelijke uitbreiding met drie rijstroken per rijrichting; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.133.2.d
    text: 45 m aan weerszijden van de weg voor de mogelijke uitbreiding met vier rijstroken per rijrichting.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.133
  - number: 5.134.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op een reserveringsgebied voor de uitbreiding of aanleg van een
      autoweg, autosnelweg of hoofdspoorweg, laat het omgevingsplan geen bouwactiviteiten toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.134
  - number: 5.134.2
    text: |-
      Het eerste lid geldt niet voor een bouwactiviteit die betrekking heeft op een bouwwerk dat wordt toegelaten voor
      een periode van ten hoogste vijf jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.134
  - number: '5.135'
    text: |-
      Deze paragraaf is van toepassing op buisleidingen, anders dan buisleidingen voor het vervoer van stoffen in verband
      met het opsporen of winnen van delfstoffen, die deel uitmaken van een provinciegrensoverschrijdend netwerk van
      buisleidingen dat is bestemd of wordt gebruikt voor vervoer over lange afstand van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.135
  - number: 5.135.a
    text: |-
      aardgas, als de buisleiding een uitwendige diameter heeft van ten minste 45,7 cm en een druk van ten minste 4.000
      kPa; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.135
  - number: 5.135.b
    text: |-
      stoffen of producten als bedoeld in
      [artikel 3.101, eerste lid, onder b, c en d, van het Besluit activiteiten leefomgeving][ref1], als de buisleiding
      een diameter en druk heeft als bedoeld in die onderdelen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.135
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.136.1
    text: |-
      Reserveringsgebieden voor de aanleg van buisleidingen van nationaal belang zijn de locaties, die bij ministeriële
      regeling zijn aangewezen en waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd. De breedte
      van een reserveringsgebied bedraagt ten hoogste 70 m, tenzij het gaat om een reserveringsgebied dat een rijkswater
      kruist.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.136
  - number: 5.136.2
    text: |-
      Aan weerszijden van een reserveringsgebied ligt een zoekgebied voor de aanleg van buisleidingen van nationaal
      belang met een breedte van 250 m, gemeten vanaf de buitenste begrenzing van het reserveringsgebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.136
  - number: '5.137'
    text: |-
      In een omgevingsplan kan de ligging van een reserveringsgebied voor de aanleg van buisleidingen van nationaal
      belang nader worden uitgewerkt, mits het reserveringsgebied:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.137
  - number: 5.137.a
    text: |-
      blijft binnen het zoekgebied, bedoeld in [artikel 5.136, tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.137
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
  - number: 5.137.b
    text: |-
      aansluit op het reserveringsgebied voor de aanleg van buisleidingen van nationaal belang in de naastliggende
      gemeenten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.137
  - number: 5.137.c
    text: |-
      een breedte heeft die gelijk is aan de breedte die dat reserveringsgebied over het grootste deel van het gebied
      heeft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.137
  - number: 5.138.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op een reserveringsgebied voor de aanleg van buisleidingen van
      nationaal belang als bedoeld in [artikel 5.136, eerste lid][ref1], of een reserveringsgebied waarvan de ligging
      nader is uitgewerkt als bedoeld in [artikel 5.137][ref2], laat het omgevingsplan geen activiteiten toe die een
      belemmering kunnen vormen voor de aanleg van een buisleiding van nationaal belang.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
  - number: 5.138.2
    text: 'Als belemmeringen worden in ieder geval aangemerkt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.a
    text: |-
      bouwactiviteiten, met uitzondering van het bouwen van een bouwwerk dat noodzakelijk is voor de aanleg, het
      onderhoud of de instandhouding van de buisleiding van nationaal belang;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.b
    text: de aanleg van een verharde weg of een verhard pad of een spoorweg in de lengterichting van het reserveringsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.c
    text: de aanleg van een watergang in de lengterichting van het reserveringsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.d
    text: |-
      de aanleg van een waterkering of een daaraan grenzend gebied waar ter bescherming van de kering regels gelden over
      activiteiten die gevolgen hebben of kunnen hebben voor die kering in de lengterichting van het reserveringsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.e
    text: |-
      de aanleg van een buisleiding, anders dan een buisleiding van nationaal belang, of een ondergrondse
      hoogspanningsverbinding of een ondergronds leidingstelsel in de lengterichting van het reserveringsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.f
    text: het bebossen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.138.2.g
    text: het gebruik als stortplaats voor afvalstoffen of permanente opslag van grond of andere stoffen of zaken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.138
  - number: 5.139.1
    text: 'Een omgevingsplan laat de aanleg van een buisleiding van nationaal belang alleen toe:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.139
  - number: 5.139.1.a
    text: |-
      binnen een reserveringsgebied voor de aanleg van buisleidingen van nationaal belang als bedoeld in
      [artikel 5.136, eerste lid][ref1], of een reserveringsgebied waarvan de ligging nader is uitgewerkt als bedoeld in
      [artikel 5.137][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.139
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.6
        afdeling: '5.1'
  - number: 5.139.1.b
    text: |-
      op zodanige wijze dat de buisleiding zich ten minste 5 m vanaf de buitenste begrenzing van het reserveringsgebied
      bevindt, gemeten vanuit het hart van de buisleiding.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.139
  - number: 5.139.2
    text: |-
      Het eerste lid is niet van toepassing als het begin- of eindpunt van een buisleiding buiten een reserveringsgebied
      ligt en de buisleiding een zoveel mogelijk rechtstreekse verbinding legt tussen het reserveringsgebied en dat
      begin- of eindpunt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.139
  - number: 5.140.1
    text: |-
      Het aanleggebied voor Maasvlakte 2 is de locatie in de Noordzee direct ten westen van en aansluitend op de
      voormalige, op 20 november 2006 bestaande kust ter hoogte van het Rotterdamse havengebied, waarvan de geometrische
      begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.140
  - number: 5.140.2
    text: |-
      Het aanleggebied voor compensatie van open droog duin en natte duinvallei is de locatie, bekend als het
      Natura 2000-gebied Spanjaards Duin, gelegen langs de Delflandse kust ter hoogte van ‘s-Gravenzande, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.140
  - number: 5.140.3
    text: |-
      Het aanleggebied voor compensatie van zeenatuur is de locatie in de Voordelta, bestaande uit het ondiepe
      zeegedeelte van de Zeeuwse en Zuid-Hollandse Delta ter grootte van een gebied van circa 40.000 ha, waarvan de
      geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.140
  - number: 5.141.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het aanleggebied voor Maasvlakte 2, bevat het omgevingsplan
      voor een grondoppervlakte van ten hoogste 1.000 ha netto uitgeefbaar terrein de functie-aanduiding haven- en
      industrieterrein.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.141
  - number: 5.141.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op het aanleggebied voor Maasvlakte 2, laat het omgevingsplan
      voor locaties waarvoor dat omgevingsplan de functie-aanduiding haven- en industrieterrein bevat, geen andere
      activiteiten toe dan deep sea gebonden en direct daaraan gerelateerde activiteiten, tenzij sprake is van bijzondere
      omstandigheden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.141
  - number: 5.142.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het aanleggebied voor compensatie van open droog duin en natte
      duinvallei, laat het omgevingsplan geen activiteiten toe die een belemmering kunnen vormen voor de aanleg en
      ontwikkeling van 100 ha duin.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.142
  - number: 5.142.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op het aanleggebied voor compensatie van zeenatuur, laat het
      omgevingsplan geen activiteiten toe die een belemmering kunnen vormen voor de aanleg en ontwikkeling van 31.250
      ha zeenatuur.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.142
  - number: 5.143.1
    text: |-
      Het openbaar toegankelijke natuur- en recreatiegebied Midden-IJsselmonde is de locatie bekend als het Buijtenland
      van Rhoon, gelegen in de gemeente Albrandswaard, waarvan de geometrische begrenzing bij ministeriële regeling is
      vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.143
  - number: 5.143.2
    text: |-
      Het openbaar toegankelijke natuur- en recreatiegebied Schiebroekse en Zuidpolder is de locatie bekend als
      de Vlinderstrik, gelegen aan de noordzijde van de gemeente Rotterdam, waarvan de geometrische begrenzing bij
      ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.143
  - number: 5.143.3
    text: |-
      Het openbaar toegankelijke natuur- en recreatiegebied Schiezone is de locatie gelegen aan de noordzijde van de
      gemeente Rotterdam, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.143
  - number: 5.144.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het natuur- en recreatiegebied Midden-IJsselmonde, laat het
      omgevingsplan alleen toe:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.1.a
    text: hoogwaardige akkernatuur en openluchtrecreatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.1.b
    text: agrarische activiteiten, voor zover deze bijdragen aan hoogwaardige akkernatuur en openluchtrecreatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.1.c
    text: het behoud van aanwezige landschappelijke elementen en cultureel erfgoed; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.1.d
    text: leidingen voor telecommunicatie of het transport van gassen, vloeistoffen of elektriciteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.2
    text: |-
      In afwijking van het eerste lid kan een omgevingsplan ter plaatse van het natuur- en recreatiegebied Midden-
      IJsselmonde die activiteiten toelaten die voor 30 december 2011 op die locatie waren toegelaten, als op die datum:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.2.a
    text: al een of meer gebouwen op die locatie aanwezig waren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.2.b
    text: |-
      voor het bouwen van een gebouw op die locatie een omgevingsvergunning voor het bouwen van een bouwwerk was
      verleend; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: 5.144.2.c
    text: |-
      een aanvraag om een omgevingsvergunning als bedoeld onder b was ingediend en die omgevingsvergunning na die datum
      is verleend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.144
  - number: '5.145'
    text: |-
      Voor zover een omgevingsplan van toepassing is op het natuur- en recreatiegebied Schiebroekse en Zuidpolder, laat
      het omgevingsplan voor een totale grondoppervlakte van circa 100 ha natuur en recreatie toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.145
  - number: '5.146'
    text: |-
      Voor zover een omgevingsplan van toepassing is op het natuur- en recreatiegebied Schiezone, laat het omgevingsplan
      voor een totale grondoppervlakte van circa 50 ha natuur en recreatie toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.146
  - number: '5.147'
    text: |-
      Het reserveringsgebied parallelle Kaagbaan is de locatie in de gemeente Haarlemmermeer ten zuiden van de Kaagbaan
      en tegen Schiphol-Rijk aan, waarvan de geometrische begrenzing bij ministeriële regeling is vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.147
  - number: 5.148.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op het reserveringsgebied parallelle Kaagbaan, laat het
      omgevingsplan geen andere activiteiten toe dan de activiteiten die waren toegestaan voor 1 februari 2014.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.148
  - number: 5.148.2
    text: 'Het eerste lid is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.148
  - number: 5.148.2.a
    text: |-
      de aanleg van een weg volgens het tracé de Boerenlandvariant, bedoeld in de mededeling over de Overeenkomst
      voorwaarden aanleg Boerenlandvariant N201; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.148
  - number: 5.148.2.b
    text: tijdelijke activiteiten die worden toegelaten tot uiterlijk 1 januari 2024.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.148
  - number: 5.149.1
    text: |-
      De bepalingen in de [paragrafen 5.1.7.2][ref1], [5.1.7.3][ref2], met uitzondering van de [artikelen 5.157][ref3]
      en [5.159][ref4], [5.1.7.4][ref5], [5.1.7.5][ref6] , [5.1.7.6][ref7] en [5.1.7.7][ref8] zijn niet van toepassing
      voor zover activiteiten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit al rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van
      inwerkingtreding van die bepalingen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.149
    references:
      - id: ref1
        bwb_id: BWBR0041313
