  - number: 8.0d.2
    text: 'Een omgevingsvergunning als bedoeld in het eerste lid wordt geweigerd als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0d
  - number: 8.0d.2.a
    text: |-
      de omgevingsplanactiviteit zou leiden tot een situatie die niet is toegelaten op grond van een regel, artikel of
      instructie als bedoeld in het eerste lid; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0d
  - number: 8.0d.2.b
    text: |-
      de omgevingsplanactiviteit betrekking heeft op een voorbeschermingsregel in het omgevingsplan die is gesteld bij
      een voorbereidingsbesluit van een bestuursorgaan van het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0d
  - number: 8.0e
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een buitenplanse omgevingsplanactiviteit
      die betrekking heeft op een maatwerkregel in het omgevingsplan, wordt bij de beoordeling of wordt voldaan
      aan [artikel 8.0a, tweede lid][ref1], rekening gehouden met de regels die gelden voor het stellen van die
      maatwerkregel.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.0e
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.1.1
        afdeling: '8.1'
  - number: 8.1.1
    text: 'Deze afdeling is van toepassing op vergunningplichtige beperkingengebiedactiviteiten met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
  - number: 8.1.1.a
    text: |-
      een weg in beheer bij het Rijk als bedoeld in [hoofdstuk 8 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '8'
  - number: 8.1.1.b
    text: |-
      een spoorweg als bedoeld in [hoofdstuk 9 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk9
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '9'
  - number: 8.1.1.c
    text: |-
      een luchthaven als bedoeld in [hoofdstuk 10 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '10'
  - number: 8.1.1.d
    text: |-
      een mijnbouwinstallatie in een waterstaatswerk als bedoeld in de [paragrafen 6.2.7a][ref1] en
      [7.2.4 van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf6.2.7a
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Paragraaf7.2.4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 6.2.7a
      - id: ref2
        bwb_id: BWBR0041330
        paragraaf: 7.2.4
  - number: 8.1.2
    text: |-
      Deze afdeling is opgenomen met het oog op het behoeden van de staat en werking van infrastructuur voor nadelige
      gevolgen van activiteiten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.1
  - number: 8.2.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: type_infrastructuur
            type: string
            required: true
            description: >-
              Type infrastructuur: weg, spoorweg, luchthaven,
              mijnbouwinstallatie
            source: {}
          - name: activiteit_behoedzaam_voor_staat_en_werking
            type: boolean
            required: true
            description: Of de activiteit het belang van het behoeden van de staat en werking van het werk dient
            source: {}
        output:
          - name: beperkingengebied_vergunning_verleend
            type: boolean
            description: Of de omgevingsvergunning voor de beperkingengebiedactiviteit wordt verleend
        actions:
          - output: beperkingengebied_vergunning_verleend
            value:
              operation: AND
              conditions:
                - operation: IN
                  subject: $type_infrastructuur
                  values:
                    - weg
                    - spoorweg
                    - luchthaven
                    - mijnbouwinstallatie
                - operation: EQUALS
                  subject: $activiteit_behoedzaam_voor_staat_en_werking
                  value: true
  - number: 8.2.1.a
    text: een weg;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
  - number: 8.2.1.b
    text: een spoorweg;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
  - number: 8.2.1.c
    text: een luchthaven; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
  - number: 8.2.1.d
    text: een mijnbouwinstallatie in een waterstaatswerk;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
  - number: 8.2.2
    text: |-
      Tot het belang van het behoeden van de staat en werking van dat werk of object voor nadelige gevolgen van
      activiteiten behoort voor de werken en objecten, bedoeld in het eerste lid, onder a en b, ook het belang van
      verruiming of wijziging daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.2
  - number: '8.3'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3
  - number: 8.3.a
    text: |-
      een weg in beheer bij het Rijk, is op het verbinden van voorschriften aan de omgevingsvergunning
      [artikel 8.13 van het Besluit activiteiten leefomgeving][ref1] van overeenkomstige toepassing;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '8'
  - number: 8.3.b
    text: |-
      een spoorweg, is op het verbinden van voorschriften aan de omgevingsvergunning
      [artikel 9.16 van het Besluit activiteiten leefomgeving][ref1] van overeenkomstige toepassing; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel9
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '9'
  - number: 8.3.c
    text: |-
      een mijnbouwinstallatie in een waterstaatswerk, zijn op het verbinden van voorschriften aan de omgevingsvergunning
      de [artikelen 6.56f][ref1] en [7.47 van het Besluit activiteiten leefomgeving][ref2] van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: 8.3a
    text: |-
      Deze afdeling is van toepassing op vergunningplichtige bouwactiviteiten als bedoeld in de [artikelen 2.25][ref1]
      en [2.26 van het Besluit bouwwerken leefomgeving][ref2] en is opgenomen met het oog op het waarborgen van de
      veiligheid, het beschermen van de gezondheid en duurzaamheid en bruikbaarheid.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3a
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '2'
  - number: 8.3b.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een bouwactiviteit die het bouwen van een
      nieuw bouwwerk inhoudt, wordt de omgevingsvergunning alleen verleend als aannemelijk is dat wordt voldaan aan
      de regels van [hoofdstuk 4 van het Besluit bouwwerken leefomgeving][ref1] en de maatwerkregels die op grond van
      [artikel 4.7 van dat besluit][ref2] in het omgevingsplan zijn gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3b
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '4'
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: is_bouwactiviteit_nieuw_bouwwerk
            type: boolean
            required: true
            description: Of de aanvraag betrekking heeft op het bouwen van een nieuw bouwwerk
            source: {}
          - name: voldoet_aan_hoofdstuk_4_bbl
            type: boolean
            required: true
            description: Of aannemelijk is dat wordt voldaan aan de regels van hoofdstuk 4 Besluit bouwwerken leefomgeving
            source: {}
          - name: voldoet_aan_maatwerkregels
            type: boolean
            required: true
            description: Of aannemelijk is dat wordt voldaan aan de maatwerkregels op grond van artikel 4.7 Bbl
            source: {}
        output:
          - name: bouwvergunning_nieuw_bouwwerk_verleend
            type: boolean
            description: Of de omgevingsvergunning voor de bouwactiviteit wordt verleend
        actions:
          - output: bouwvergunning_nieuw_bouwwerk_verleend
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_bouwactiviteit_nieuw_bouwwerk
                    value: true
                  then:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $voldoet_aan_hoofdstuk_4_bbl
                        value: true
                      - operation: EQUALS
                        subject: $voldoet_aan_maatwerkregels
                        value: true
              default: true
  - number: 8.3b.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een bouwactiviteit die het verbouwen of het
      verplaatsen van een bestaand bouwwerk inhoudt, wordt de omgevingsvergunning alleen verleend als aannemelijk is dat
      wordt voldaan aan de regels van [hoofdstuk 5 van het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3b
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '5'
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: is_bouwactiviteit_verbouw_of_verplaats
            type: boolean
            required: true
            description: Of de aanvraag betrekking heeft op het verbouwen of verplaatsen van een bestaand bouwwerk
            source: {}
          - name: voldoet_aan_hoofdstuk_5_bbl
            type: boolean
            required: true
            description: Of aannemelijk is dat wordt voldaan aan de regels van hoofdstuk 5 Besluit bouwwerken leefomgeving
            source: {}
        output:
          - name: bouwvergunning_verbouw_verleend
            type: boolean
            description: Of de omgevingsvergunning voor de verbouw/verplaatsing wordt verleend
        actions:
          - output: bouwvergunning_verbouw_verleend
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $is_bouwactiviteit_verbouw_of_verplaats
                    value: true
                  then:
                    operation: EQUALS
                    subject: $voldoet_aan_hoofdstuk_5_bbl
                    value: true
              default: true
  - number: 8.3c.1
    text: |-
      Op verzoek van de aanvrager wordt aan de omgevingsvergunning voor een bouwactiviteit een voorschrift verbonden
      dat inhoudt dat bij ministeriële regeling aangewezen gegevens en bescheiden pas hoeven te worden verstrekt
      uiterlijk drie weken voor de start van de uitvoering van het onderdeel van de bouwactiviteit waarop die gegevens en
      bescheiden betrekking hebben.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3c
  - number: 8.3c.2
    text: |-
      Als de bouwactiviteit naar het oordeel van het bevoegd gezag daartoe aanleiding geeft, kan aan de
      omgevingsvergunning voor die activiteit een voorschrift worden verbonden dat inhoudt dat bij ministeriële regeling
      aangewezen gegevens en bescheiden pas hoeven te worden verstrekt uiterlijk drie weken voor de start van de
      uitvoering van het onderdeel van de bouwactiviteit waarop die gegevens en bescheiden betrekking hebben.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3c
  - number: 8.3d
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een bouwactiviteit, zijn op het verbinden
      van voorschriften aan de omgevingsvergunning de [artikelen 4.5][ref1], [4.6][ref2], [5.3a][ref3], [7.5][ref4] en
      [7.23 van het Besluit bouwwerken leefomgeving][ref5] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041297#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041297#Artikel7
      [ref5]: https://wetten.overheid.nl/BWBR0041297#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3d
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041297
        artikel: '5'
      - id: ref4
        bwb_id: BWBR0041297
        artikel: '7'
      - id: ref5
        bwb_id: BWBR0041297
        artikel: '7'
  - number: 8.3e
    text: |-
      Tenzij het gaat om een voorschrift als bedoeld in [artikel 8.3c][ref1] of om een voorschrift dat op grond van
      [artikel 8.3d][ref2] aan een omgevingsvergunning voor een bouwactiviteit kan worden verbonden, kunnen alleen
      voorschriften van administratieve aard aan de omgevingsvergunning worden verbonden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.3e
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.3.2
        afdeling: '8.3'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.3.2
        afdeling: '8.3'
  - number: '8.4'
    text: |-
      Deze afdeling is van toepassing op vergunningplichtige mijnbouwlocatieactiviteiten als bedoeld in de
      [paragrafen 6.2.5][ref1] en [7.2.9 van het Besluit activiteiten leefomgeving][ref2] en is opgenomen met het oog op
      het waarborgen van de veiligheid en een evenwichtige toedeling van functies aan locaties.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf6.2.5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Paragraaf7.2.9
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.4
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 6.2.5
      - id: ref2
        bwb_id: BWBR0041330
        paragraaf: 7.2.9
  - number: 8.5.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een
      mijnbouwlocatieactiviteit als bedoeld in de [artikelen 7.66, aanhef en onder a][ref1], en
      [7.67, aanhef en onder a, van het Besluit activiteiten leefomgeving][ref2], wordt de omgevingsvergunning alleen
      verleend als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: 8.5.1.a
    text: medegebruik van een bestaande mijnbouwinstallatie niet mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
  - number: 8.5.1.b
    text: zichthinder veroorzaakt door de nieuwe mijnbouwinstallatie wordt geminimaliseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: medegebruik_bestaande_installatie_mogelijk
            type: boolean
            required: true
            description: Of medegebruik van een bestaande mijnbouwinstallatie mogelijk is
            source: {}
          - name: zichthinder_geminimaliseerd
            type: boolean
            required: true
            description: Of zichthinder veroorzaakt door de nieuwe mijnbouwinstallatie wordt geminimaliseerd
            source: {}
        output:
          - name: mijnbouw_vergunning_verleend
            type: boolean
            description: Of de omgevingsvergunning voor de mijnbouwlocatieactiviteit wordt verleend
        actions:
          - output: mijnbouw_vergunning_verleend
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $medegebruik_bestaande_installatie_mogelijk
                    value: true
                - operation: EQUALS
                  subject: $zichthinder_geminimaliseerd
                  value: true
  - number: 8.5.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een
      mijnbouwlocatieactiviteit als bedoeld in de [artikelen 7.66, aanhef en onder a][ref1], en
      [7.67, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref2], wordt de omgevingsvergunning alleen
      verleend als de activiteit verenigbaar is met de belangen van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: 8.5.2.a
    text: |-
      de uitoefening van defensietaken en van het veilig kunnen verrichten van daarop betrekking hebbende activiteiten,
      voor zover het gaat om een bij ministeriële regeling aangewezen en geometrisch begrensd oefen- en schietgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
  - number: 8.5.2.b
    text: |-
      de scheepvaart en van de veiligheid van de scheepvaart, voor zover het gaat om een bij ministeriële regeling
      aangewezen en geometrisch begrensd drukbevaren deel van de zee; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
  - number: 8.5.2.c
    text: |-
      de belangen van de elektriciteitsopwekking met behulp van wind in een windpark en van de veiligheid van het
      windpark, voor zover het gaat om een gebied dat is aangewezen in een kavelbesluit of een voorbereidingsbesluit als
      bedoeld in [artikel 3, eerste lid][ref1], respectievelijk [9, eerste lid, van de Wet windenergie op zee][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0036752#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0036752#Artikel9
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
    references:
      - id: ref1
        bwb_id: BWBR0036752
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0036752
        artikel: '9'
  - number: 8.5.3
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een
      mijnbouwlocatieactiviteit als bedoeld in de [artikelen 7.66, aanhef en onder b][ref1], en
      [7.67, aanhef en onder c, van het Besluit activiteiten leefomgeving][ref2], wordt de omgevingsvergunning alleen
      verleend als de activiteit verenigbaar is met de belangen van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
