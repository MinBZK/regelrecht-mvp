  - number: 3.51.3
    text: |-
      Voor de toepassing van het eerste en tweede lid is [artikel 3.50, tweede lid][ref1], van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
