        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 5.78n.2
    text: |-
      Geluidbeperkende maatregelen als bedoeld in het eerste lid worden in aanmerking genomen als die financieel
      doelmatig zijn en daartegen geen overwegende bezwaren van stedenbouwkundige, verkeerskundige, vervoerskundige,
      landschappelijke of technische aard bestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78n
  - number: 5.78n.3
    text: |-
      Als toepassing is gegeven aan het [artikel 3.27, tweede lid][ref1], geldt voor het geluid door de gemeenteweg en de
      lokale spoorweg gezamenlijk de grenswaarde voor gemeentewegen, bedoeld in [tabel 3.35][ref2].


