  - number: 5.65.1
    text: 'Een omgevingsplan bevat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.1.a
    text: |-
      als waarden de standaardwaarden, bedoeld in tabel 5.65.1, voor het toelaatbare geluid door een activiteit op een
      geluidgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.1.b
    text: |-
      als waarden de grenswaarden, bedoeld in tabel 5.65.2, voor het toelaatbare geluid in geluidgevoelige ruimten binnen
      in- en aanpandige geluidgevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.2
    text: |-
      Als een omgevingsplan een activiteit toelaat op een in het omgevingsplan aangewezen bedrijventerrein, kan het
      omgevingsplan, in afwijking van het eerste lid, aanhef en onder a, voor het langtijdgemiddelde beoordelingsniveau
      L van geluid en het maximaal geluidniveau L door die activiteit op geluidgevoelige gebouwen op dat bedrijventerrein
      als waarden de standaardwaarden, bedoeld in tabel 5.65.1, verhoogd met 5 dB(A), bevatten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.3
    text: |-
      Als een omgevingsplan een activiteit toelaat in een in het omgevingsplan aangewezen agrarisch gebied kan het
      omgevingsplan, in afwijking van het eerste lid, aanhef en onder a, in samenhang met tabel 5.65.1, eerste rij,
      voor het langtijdgemiddelde beoordelingsniveau L van geluid door die activiteit op geluidgevoelige gebouwen binnen
      dat agrarische gebied als waarden de standaardwaarden, bedoeld in tabel 5.65.1, eerste rij, verlaagd met 5 dB(A),
      bevatten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.4
    text: |-
      Als het omgevingsplan een woonschip toelaat, kan het omgevingsplan, in afwijking van het eerste lid, aanhef en
      onder a, en het derde lid, voor het langtijdgemiddelde beoordelingsniveau L van geluid en het maximaal geluidniveau
      L door de activiteit op dat woonschip als waarden de standaardwaarde, bedoeld in tabel 5.65.1, verhoogd met
      5 dB(A), bevatten:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.4.1°
    text: als de locatie voor 1 juli 2012 voor een woonschip was bestemd; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.4.2°
    text: |-
      als de locatie voor 1 juli 2012 in een gemeentelijke verordening is aangewezen om door een drijvende woonfunctie te
      worden ingenomen en voor 1 juli 2022 voor een woonschip is bestemd, of als de aanwezigheid van een woonschip voor
      1 juli 2022 in het omgevingsplan is toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.65.5
    text: |-
      Op het bepalen van het geluid waarvoor een omgevingsplan een waarde als bedoeld in het eerste lid, aanhef en onder
      b, bevat, zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.65
  - number: 5.66.1
    text: |-
      Een omgevingsplan kan, gelet op de aard of locatie van de activiteit of cumulatie, andere waarden bevatten dan de
      standaardwaarden, bedoeld in [artikel 5.65, eerste lid, aanhef en onder a, tweede, derde, of vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.66.2
    text: 'Een omgevingsplan bevat op grond van het eerste lid alleen hogere waarden als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.2.a
    text: |-
      dat niet leidt tot een overschrijding van de grenswaarden, bedoeld in tabel 5.66, in geluidgevoelige ruimten binnen
      geluidgevoelige gebouwen, anders dan binnen in- en aanpandige geluidgevoelige gebouwen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.2.b
    text: |-
      op het tijdstip van inwerkingtreding van dit besluit op grond van het omgevingsplan, een omgevingsvergunning of
      een maatwerkvoorschrift voor een activiteit een hogere waarde gold en de waarde niet hoger is dan de grenswaarde,
      zijnde de waarde die op grond van het omgevingsplan, de omgevingsvergunning of het maatwerkvoorschrift was
      toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.3
    text: 'Het tweede lid, aanhef en onder a, is niet van toepassing op geluidgevoelige gebouwen als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.3.a
    text: |-
      zwaarwegende bezwaren van bouwkundige aard bestaan tegen het treffen van maatregelen aan de gevel die nodig zijn om
      voor dat gebouw te voldoen aan de grenswaarden, bedoeld in tabel 5.66, mits, als andere maatregelen mogelijk zijn
      om de geluidwering zoveel mogelijk te verbeteren, die andere maatregelen wel worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.3.b
    text: |-
      de eigenaar geen medewerking verleent aan het onderzoek naar het geluid in geluidgevoelige ruimten binnen zijn
      gebouw en naar de noodzakelijke geluidwerende maatregelen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.3.c
    text: de eigenaar geen medewerking verleent aan het treffen van geluidwerende maatregelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.4
    text: 'Voor de toepassing van het tweede lid blijven buiten beschouwing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.4.a
    text: |-
      geluid door de inzet van motorvoertuigen of helikopters voor spoedeisende medische hulpverlening,
      ongevallenbestrijding, brandbestrijding, gladheidbestrijding en het vrijmaken van de weg na een ongeval; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.4.b
    text: onversterkt menselijk stemgeluid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: 5.66.5
    text: |-
      Een omgevingsplan kan hogere waarden bevatten dan de grenswaarden, bedoeld in
      [artikel 5.65, eerste lid, aanhef en onder b][ref1], als op het tijdstip van inwerkingtreding van dit besluit op
      grond van het omgevingsplan, een omgevingsvergunning of een maatwerkvoorschrift voor een activiteit een hogere
      waarde gold. De waarde is niet hoger dan de grenswaarde, zijnde de waarde die op grond van het omgevingsplan, de
      omgevingsvergunning of het maatwerkvoorschrift was toegelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.66.6
    text: |-
      Op het berekenen van het geluid in geluidgevoelige ruimten binnen geluidgevoelige gebouwen zijn de bij ministeriële
      regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.66
  - number: '5.67'
    text: |-
      Een omgevingsplan kan, gelet op de aard of locatie van de activiteit, voor de periode van 07.00 tot 19.00 uur voor
      geluidgevoelige gebouwen of geluidgevoelige ruimten binnen in- of aanpandige geluidgevoelige gebouwen een maximaal
      geluidniveau L als gevolg van die activiteit bevatten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.67
  - number: '5.68'
    text: |-
      In afwijking van [artikel 5.65][ref1] kan een omgevingsplan bepalen dat de waarden die het omgevingsplan bevat,
      niet van toepassing zijn op bepaalde dagen of dagdelen in verband met de viering van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.68
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.68.a
    text: in het omgevingsplan aangewezen festiviteiten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.68
  - number: 5.68.b
    text: |-
      festiviteiten die plaatsvinden op de locatie waar de activiteit wordt verricht, gedurende ten hoogste twaalf
      etmalen per jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.68
  - number: '5.69'
    text: |-
      In afwijking van [artikel 5.60][ref1] kan een omgevingsplan bepalen dat de waarden voor het geluid door een
      activiteit op een geluidgevoelig gebouw gelden op een locatie die dichter bij de activiteit is gelegen dan:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.69
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.69.a
    text: |-
      de gevel, bedoeld in [artikel 5.60, onder a, onder 1°][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.69
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.69.b
    text: |-
      de locatie, bedoeld in [artikel 5.60, onder a, onder 2°][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.69
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.69.c
    text: |-
      de begrenzing, bedoeld in [artikel 5.60, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.69
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '5.70'
    text: |-
      In afwijking van [artikel 5.65][ref1] kan een omgevingsplan, gelet op de aard of locatie van de activiteit, geheel
      of gedeeltelijk geen waarden bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.70
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '5.71'
    text: |-
      Een omgevingsplan kan in plaats van de waarden, bedoeld in [artikel 5.65][ref1], andere regels bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.71
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.72.1
    text: |-
      Voor activiteiten bij of op een militair terrein of een terrein met een militair object als bedoeld in
      [artikel 5.150, eerste lid][ref1], kan een omgevingsplan bij toepassing van [artikel 5.66, eerste lid][ref2],
      alleen hogere waarden bevatten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.72
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.72.2
    text: |-
      Voor activiteiten bij of op een militair terrein of een terrein met een militair object als bedoeld in
      [artikel 5.150, eerste lid][ref1], zijn de [artikelen 5.67][ref2] en [5.69][ref3] niet van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.72
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.72.3
    text: |-
      Als een omgevingsplan naast of in plaats van de waarden regels bevat over geluid, zien die niet op activiteiten als
      bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.72
  - number: 5.72a.1
    text: |-
      Een omgevingsplan bepaalt dat een activiteit als bedoeld in [artikel 5.78b, eerste lid, onder b en c][ref1], niet
      wordt verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.72a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.72a.2
    text: |-
      Het eerste lid is niet van toepassing als een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit voor een activiteit, bedoeld in dat lid, waarborgt dat het langtijdgemiddelde
      beoordelingsniveau L van het geluid op een afstand van 50 m vanaf de begrenzing van de locatie waar de activiteit
      wordt verricht, niet meer bedraagt dan de standaardwaarden, bedoeld in [tabel 5.65.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.72a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.73.1
    text: |-
      Een omgevingsplan bepaalt dat de waarden die het omgevingsplan bevat voor geluid door een activiteit op
      geluidgevoelige gebouwen of in geluidgevoelige ruimten niet van toepassing zijn op:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.73
  - number: 5.73.1.a
    text: |-
      het geluid door de inzet van motorvoertuigen of helikopters voor spoedeisende medische hulpverlening,
      ongevallenbestrijding, brandbestrijding, gladheidbestrijding en het vrijmaken van de weg na een ongeval; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.73
  - number: 5.73.1.b
    text: onversterkt menselijk stemgeluid, tenzij het muziekgeluid is of daarmee is vermengd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.73
  - number: 5.73.2
    text: |-
      Als een omgevingsplan naast of in plaats van de waarden regels bevat over geluid, zien die niet op activiteiten als
      bedoeld in het eerste lid, onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.73
  - number: 5.74.1
    text: |-
      Een omgevingsplan dat het opwekken van elektriciteit met een windturbine of windpark toelaat, bevat als waarde de
      standaardwaarde 47 L en 41 L voor het toelaatbare geluid door de activiteit op een geluidgevoelig gebouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.74
  - number: 5.74.2
    text: |-
      In afwijking van het eerste lid kan het omgevingsplan hogere of lagere waarden bevatten. Een omgevingsplan kan
      alleen lagere waarden bevatten als dat gelet op cumulatie met het geluid van een andere windturbine of een ander
      windpark of gelet op de bijzondere aard van het gebied aangewezen is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.74
  - number: 5.74.3
    text: |-
      Een omgevingsplan bevat geen andere regels over geluid op een geluidgevoelig gebouw door het opwekken van
      elektriciteit met een windturbine of windpark dan de waarden die op grond van het eerste of tweede lid in het
      omgevingsplan zijn opgenomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.74
  - number: 5.75.1
    text: |-
      Aan [artikel 5.59, tweede lid][ref1], wordt voldaan door toepassing te geven aan [artikel 5.74, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.75
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.75.2
    text: |-
      In afwijking van het eerste lid kan aan [artikel 5.59, tweede lid][ref1], worden voldaan door toepassing te geven
      aan [artikel 5.74, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.75
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.75a.1
    text: |-
      De [artikelen 5.74][ref1] en [5.75][ref2] zijn niet van toepassing op het toelaten van een windpark met 3 of meer
      windturbines.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.75a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.75a.2
    text: |-
      Als een omgevingsplan voor het opwekken van elektriciteit met een windturbine of windpark waarden bevat voor het
      toelaatbare geluid door de activiteit op een geluidgevoelig gebouw, worden die waarden in ieder geval uitgedrukt in
      L en L.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.75a
  - number: 5.76.1
    text: |-
      Dit artikel is van toepassing op het geluid op een geluidgevoelig gebouw door het exploiteren van een in de
      buitenlucht of in een gebouw zonder gesloten afdekking of met een open zijde gelegen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.1.a
    text: civiele schietbaan waar met vuurwapens wordt geschoten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.1.b
    text: |-
      militaire schietbaan of militair springterrein op een militair terrein als bedoeld in [bijlage XIII][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.76.2
    text: |-
      Een omgevingsplan dat een activiteit als bedoeld in het eerste lid toelaat, bevat als waarde de standaardwaarde 50
      B voor het toelaatbare geluid door de activiteit op een geluidgevoelig gebouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.3
    text: 'In afwijking van het tweede lid kan een omgevingsplan voor het exploiteren van een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.3.a
    text: |-
      civiele schietbaan als bedoeld in het eerste lid, onder a, of combinatie van civiele schietbanen, een lagere of
      hogere waarde bevatten, mits die waarde niet hoger is dan 55 B; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.3.b
    text: |-
      voor militaire schietbanen of militaire springterreinen als bedoeld in het eerste lid, onder b, een hogere waarde
      bevatten, mits die hogere waarde niet hoger is dan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.3.b.1°
    text: |-
      60 B voor militaire schietbanen of militaire springterreinen waarop
      [artikel 3.335 van het Besluit activiteiten leefomgeving][ref1] van toepassing is; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.76.3.b.2°
    text: 55 B voor andere militaire schietbanen en militaire springterreinen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.76.4
    text: |-
      Een omgevingsplan bevat geen andere regels over geluid op een geluidgevoelig gebouw door een activiteit als bedoeld
      in het eerste lid dan de waarden die op grond van het tweede of derde lid in het omgevingsplan zijn opgenomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.76
  - number: 5.77.1
    text: |-
      Aan [artikel 5.59, tweede lid][ref1], wordt voldaan door toepassing te geven aan [artikel 5.76, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.77
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.77.2
    text: |-
      In afwijking van het eerste lid kan aan [artikel 5.59, tweede lid][ref1], worden voldaan door toepassing te geven
      aan [artikel 5.76, derde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.77
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78.1
    text: |-
      [Paragraaf 5.1.4.2a][ref1] is van toepassing op een geluidgevoelig gebouw dat is toegelaten op grond van
      een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit en dat geheel of
      gedeeltelijk ligt in een geluidaandachtsgebied van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78.1.a
    text: wegen, spoorwegen en industrieterreinen met geluidproductieplafonds;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
  - number: 5.78.1.b
    text: lokale spoorwegen zonder geluidproductieplafonds; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
  - number: 5.78.1.c
    text: |-
      verharde gemeentewegen en waterschapswegen zonder geluidproductieplafonds, niet zijnde een erf in de zin
      van het [Reglement verkeersregels en verkeerstekens 1990][ref1], met een verkeersintensiteit van meer dan
      1.000 motorvoertuigen per etmaal als kalenderjaargemiddelde.


      [ref1]: https://wetten.overheid.nl/BWBR0004825
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
    references:
      - id: ref1
        bwb_id: BWBR0004825
  - number: 5.78.2
    text: |-
      [Paragraaf 5.1.4.2a][ref1] is, met uitzondering van [artikel 5.78s, eerste en tweede lid][ref2], niet van
      toepassing op een geluidgevoelig gebouw dat op grond van een omgevingsplan of een omgevingsvergunning voor een
      buitenplanse omgevingsplanactiviteit is toegelaten voor een duur van niet meer dan tien jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78.3
    text: |-
      [Artikel 5.60][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78a.1
    text: |-
      Bij de toepassing van [paragraaf 5.1.4.2a][ref1] is het geluid:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78a.1.a
    text: |-
      bij wegen, spoorwegen en industrieterreinen met geluidproductieplafonds als omgevingswaarden: het geluid bij
      volledige benutting van de geluidproductieplafonds; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
  - number: 5.78a.1.b
    text: |-
      bij wegen en spoorwegen zonder geluidproductieplafonds als omgevingswaarden: het geluid in een voor het verkeer op
      die weg of spoorweg maatgevend jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
  - number: 5.78a.2
    text: |-
      Bij het bepalen van het geluid door wegen en spoorwegen zonder geluidproductieplafonds als omgevingswaarden wordt
      het geluid door alle tot die geluidbronsoort behorende wegen of spoorwegen betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
  - number: 5.78a.3
    text: |-
      Bij het bepalen van het geluid door een gemeenteweg en een lokale spoorweg waarvoor toepassing is gegeven aan
      [artikel 3.27, tweede lid][ref1], wordt het geluid door die gemeenteweg en die spoorweg gezamenlijk beschouwd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 5.78a.4
    text: Op het bepalen van het geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78a
  - number: 5.78b.1
    text: |-
      Activiteiten die in aanzienlijke mate geluid kunnen veroorzaken als bedoeld in [artikel 2.11a van de wet][ref1]
      zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.78b.1.a
    text: |-
      de activiteiten, bedoeld in [bijlage VIII bij het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 5.78b.1.b
    text: |-
      het gelijktijdig in gebruik hebben van een of meer elektromotoren of verbrandingsmotoren met een gezamenlijk
      geïnstalleerd motorisch vermogen van 15 MW of meer, waarbij bij het bepalen van het gezamenlijk vermogen buiten
      beschouwing blijven:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.1.b.1°
    text: elektromotoren en verbrandingsmotoren met een vermogen van 0,25 kW of minder;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.1.b.2°
    text: elektromotoren en verbrandingsmotoren die tijdelijk aanwezig zijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.1.b.3°
    text: |-
      elektromotoren die in een gebouw of een gedeelte van een gebouw met een woonfunctie voor dat gebouw worden
      gebruikt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.1.b.4°
    text: |-
      elektromotoren van bruggen, viaducten, verkeerstunnels en andere ondergronds gelegen bouwwerken voor vervoer van
      personen of goederen en beweegbare waterkeringen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.1.c
    text: |-
      het gebruiken van niet in een gesloten gebouw ondergebrachte transformatoren met een maximaal gelijktijdig in te
      schakelen elektrisch vermogen van 200 MVA of meer.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
  - number: 5.78b.2
    text: |-
      Het eerste lid is niet van toepassing op activiteiten waarvoor het omgevingsplan of een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit waarborgt dat het langtijdgemiddelde beoordelingsniveau L van het geluid
      op een afstand van 50 m vanaf de begrenzing van de locatie waar de activiteit wordt verricht, niet meer bedraagt
      dan de standaardwaarden, bedoeld in [tabel 5.65.1][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78b.3
    text: |-
      [Artikel 5.58][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78c.1
    text: |-
      Deze subparagraaf is van toepassing op het geluid door activiteiten op een industrieterrein, anders dan
      activiteiten als bedoeld in [subparagraaf 5.1.4.2.3][ref1], waarvoor op grond van [artikel 2.11a][ref2] of
      [2.12a van de wet][ref3] geluidproductieplafonds als omgevingswaarden zijn vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78c
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.78c.2
    text: |-
      Onder een industrieterrein wordt in deze subparagraaf ook verstaan een ander terrein waarvoor op grond van
      [artikel 2.11, eerste lid, van de wet][ref1] geluidproductieplafonds als omgevingswaarden zijn vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.78d
    text: |-
      Op de vaststelling van een geluidproductieplafond als omgevingswaarde voor een industrieterrein is
      [paragraaf 3.5.4][ref1] van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78d
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 5.78e
    text: |-
      De begrenzing van een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden zijn vastgesteld,
      wordt vastgelegd in het omgevingsplan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78e
  - number: 5.78f
    text: |-
      Een omgevingsplan bevat regels over activiteiten gericht op het voldoen aan de geluidproductieplafonds die als
      omgevingswaarden zijn vastgesteld voor een industrieterrein.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78f
  - number: 5.78g.1
    text: |-
      Een omgevingsplan bevat voor een activiteit bij of op een militair terrein of een terrein met een militair object
      als bedoeld in [artikel 5.150, eerste lid][ref1], geen waarden die lager zijn dan de standaardwaarden, bedoeld
      in [tabel 5.65.1][ref2], verhoogd met 5 dB, voor het toelaatbare geluid door de activiteit op een afstand van 50 m
      vanaf de begrenzing van de locatie waar de activiteit wordt verricht. [Artikel 5.58][ref3] is van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78g
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.7
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78g.2
    text: |-
      Als een omgevingsplan naast of in plaats van de waarden regels bevat over geluid, zien die niet op activiteiten als
      bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78g
  - number: 5.78h.1
    text: |-
      Als een omgevingsplan waarden bevat voor geluid door een activiteit, bepaalt het omgevingsplan dat deze niet van
      toepassing zijn op:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78h
  - number: 5.78h.1.a
    text: |-
      het geluid door de inzet van motorvoertuigen of helikopters voor spoedeisende medische hulpverlening,
      ongevallenbestrijding, brandbestrijding, gladheidbestrijding en het vrijmaken van de weg na een ongeval; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78h
  - number: 5.78h.1.b
    text: onversterkt menselijk stemgeluid, tenzij het muziekgeluid is of daarmee is vermengd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78h
  - number: 5.78h.2
    text: |-
      Als een omgevingsplan naast of in plaats van de waarden regels bevat over geluid, zien die niet op activiteiten als
      bedoeld in het eerste lid, onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78h
  - number: 5.78i.1
    text: 'Deze subparagraaf is van toepassing op het geluid door:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78i
  - number: 5.78i.1.a
    text: |-
      verharde gemeentewegen en waterschapswegen, niet zijnde een erf in de zin van het
      [Reglement verkeersregels en verkeerstekens 1990][ref1], met een verkeersintensiteit van meer dan
      1.000 motorvoertuigen per etmaal als kalenderjaargemiddelde; en


      [ref1]: https://wetten.overheid.nl/BWBR0004825
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78i
    references:
      - id: ref1
        bwb_id: BWBR0004825
  - number: 5.78i.1.b
    text: lokale spoorwegen die niet bij omgevingsverordening zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78i
  - number: 5.78i.2
    text: Deze subparagraaf is niet van toepassing op het geluid op een niet-geluidgevoelige gevel.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78i
  - number: 5.78j.1
    text: >-
      Voor de toepassing van deze subparagraaf wordt onder een
      wijziging van een gemeenteweg of waterschapsweg verstaan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.1.a
    text: het verplaatsen van een of meer rijstroken met meer dan 2 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.1.b
    text: het verhogen of verlagen van de rijstroken met meer dan 1 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.1.c
    text: een toename van het aantal rijstroken, niet zijnde voorsorteerstroken en in- en uitvoegstroken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.1.d
    text: het vervangen van een wegdek door een minder stil wegdek; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.1.e
    text: het verwijderen van geluidbeperkende maatregelen bestaande uit werken of bouwwerken langs de weg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2
    text: 'Voor de toepassing van deze subparagraaf wordt onder een wijziging van een lokale spoorweg verstaan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2.a
    text: het verplaatsen van een of meer sporen met meer dan 2 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2.b
    text: het verhogen of verlagen van een of meer sporen met meer dan 1 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2.c
    text: een toename van het aantal sporen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2.d
    text: het vervangen van een spoorconstructie door een minder stille spoorconstructie; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78j.2.e
    text: het verwijderen van geluidbeperkende maatregelen bestaande uit werken of bouwwerken langs de spoorweg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78j
  - number: 5.78k.1
    text: |-
      Voor de toepassing van deze subparagraaf wordt onder een wijziging van het gebruik van een lokale spoorweg verstaan
      een wijziging die leidt tot een toename van de geluidemissie met meer dan 1,5 dB door:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78k
  - number: 5.78k.1.a
    text: het verhogen van de maximumrijsnelheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78k
  - number: 5.78k.1.b
    text: het vervangen van spoormaterieel door minder stil spoormaterieel; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78k
  - number: 5.78k.1.c
    text: het verhogen van de treinintensiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78k
  - number: 5.78k.2
    text: |-
      De toename van de geluidemissie wordt bepaald door de situatie in een voor die spoorweg maatgevend jaar na de
      wijziging te vergelijken met de situatie in datzelfde jaar zonder die wijziging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78k
  - number: 5.78l.1
    text: In een omgevingsplan wordt rekening gehouden met het geluid door wegen en spoorwegen op geluidgevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78l
  - number: 5.78l.2
    text: |-
      Een omgevingsplan voorziet erin dat het geluid door de gemeenteweg, waterschapsweg of lokale spoorweg op
      geluidgevoelige gebouwen in een geluidaandachtsgebied aanvaardbaar is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78l
  - number: 5.78l.3
    text: |-
      Bij de toepassing van het eerste lid wordt in ieder geval voldaan aan [artikel 5.78p][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78l
    references:
