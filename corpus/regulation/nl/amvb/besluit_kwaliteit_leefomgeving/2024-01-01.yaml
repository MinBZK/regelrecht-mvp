  - number: 12.13h.1
    text: |-
      Een omgevingsplan dat een geluidgevoelig gebouw toelaat in het geluidaandachtsgebied van een hoofdspoorweg kan erin
      voorzien dat het geluid op dat gebouw hoger is dan de grenswaarde, bedoeld in [tabel 5.78u][ref1], als:


