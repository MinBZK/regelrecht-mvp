    text: een besluit over aanleg of reconstructie van een weg;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
  - number: 12.6.2.b
    text: recent genomen ruimtelijke besluiten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
  - number: 12.6.2.c
    text: |-
      de gegevens uit het eerste lid, waarbij het effect van een stil wegdek als dat is aangelegd zonder dat dit op grond
      van de [Wet geluidhinder][ref1] was vereist niet in aanmerking wordt genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
    references:
      - id: ref1
        bwb_id: BWBR0003227
  - number: 12.6.3
    text: |-
      Het tweede lid, onder b en c, wordt alleen toegepast als de gevolgen voor de fysieke leefomgeving aanvaardbaar
      worden geacht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
  - number: 12.6.4
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde is [artikel 3.34][ref1] niet van toepassing
      als na toepassing van het eerste of tweede lid door een bestuursorgaan van een provincie wijziging van een
      geluidproductieplafond langs een aansluitende of in de nabijheid liggende provinciale weg in dezelfde provincie
      plaatsvindt in overeenstemming met de geluidbrongegevens behorende bij de nieuwe geluidproductieplafonds.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
