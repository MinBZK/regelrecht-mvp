  - number: 8.12.4
    text: |-
      Het tweede lid is niet van toepassing op het plaatsgebonden risico van een activiteit in een risicogebied externe
      veiligheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.12
  - number: 8.12a
    text: |-
      [Artikel 8.12][ref1] is niet van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op
      een windpark met 3 of meer windturbines.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.12a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.13.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het exploiteren van een Seveso-
      inrichting, bedoeld in [artikel 3.51, eerste lid, van het Besluit activiteiten leefomgeving][ref1], wordt de
      omgevingsvergunning alleen verleend als voldoende afstand tot een Natura 2000-gebied in acht wordt genomen of
      andere passende maatregelen worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.13
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.13.2
    text: |-
      Bij de beoordeling van de aanvraag wordt vastgesteld of het risico op een zwaar ongeval of de gevolgen daarvan
      groter kunnen zijn door de geografische situatie of de ligging van die inrichting ten opzichte van andere Seveso-
      inrichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.13
  - number: 8.13.3
    text: |-
      Bij de beoordeling van de aanvraag worden in ieder geval de gevolgen betrokken voor de veiligheid van weggebruikers
      en passagiers die gebruikmaken van een autoweg, autosnelweg of hoofdspoorweg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.13
  - number: 8.14.1
    text: |-
      Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het
      opslaan, herverpakken of bewerken van vuurwerk en pyrotechnische artikelen voor theatergebruik, bedoeld in
      [artikel 3.31, eerste lid, van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.14
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.14.2
    text: |-
      De omgevingsvergunning wordt alleen verleend als geen beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en
      beperkt kwetsbare en kwetsbare locaties zijn toegelaten binnen een explosieaandachtsgebied vuurwerk als bedoeld
      in [artikel 5.23][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.14
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 8.14.3
    text: |-
      Het tweede lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die een functionele binding hebben met een activiteit als bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.14
  - number: 8.14.4
    text: |-
      Op de beoordeling van de aanvraag zijn de [artikelen 5.22][ref1], [5.24, derde lid][ref2], en [5.25][ref3] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.14
