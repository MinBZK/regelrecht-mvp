      moet worden gewijzigd die eerder verstrijkt dan de termijn van vijf jaar, bedoeld in dat lid, wordt binnen de in
      die regel of instructie gestelde termijn toepassing gegeven aan het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
  - number: 8.97b.1
    text: |-
