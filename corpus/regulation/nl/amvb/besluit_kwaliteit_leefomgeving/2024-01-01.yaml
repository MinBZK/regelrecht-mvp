  - number: 5.167.1
    text: |-
      Een ontheffing die is verleend voor een besluit tot vaststelling van een projectbesluit geldt als ontheffing voor
      een latere wijziging van een omgevingsplan, voor zover die wijziging toelaat wat op grond van het projectbesluit
      was toegestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.167
  - number: 5.167.2
    text: |-
      Een ontheffing die is verleend voor een besluit tot verlening van een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit geldt als ontheffing voor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.167
  - number: 5.167.2.a
    text: het in overeenstemming brengen van het omgevingsplan met die omgevingsvergunning; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.167
  - number: 5.167.2.b
    text: |-
      een latere wijziging van een omgevingsplan, voor zover die wijziging toelaat wat op grond van een wijziging van het
      omgevingsplan als bedoeld onder a was toegestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.167
  - number: '6.1'
    text: |-
      Voor zover in een waterschapsverordening regels worden gesteld over een lozingsactiviteit op een
      oppervlaktewaterlichaam in beheer bij het waterschap, worden in de waterschapsverordening de eisen, bedoeld in de
      artikelen 10 en 11, derde lid, aanhef en onder g, van de kaderrichtlijn water, in acht genomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.1
  - number: 6.2.1
    text: |-
      Dit artikel is van toepassing op een waterschapsverordening die bepaalt dat het is verboden zonder
      omgevingsvergunning een activiteit te verrichten die gevolgen kan hebben voor een krw-oppervlaktewaterlichaam of
      een grondwaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.2
    text: |-
      De waterschapsverordening bepaalt dat het verlenen van de omgevingsvergunning er in ieder geval niet toe mag leiden
      dat, rekening houdend met de waterbeheerprogramma’s, de regionale waterprogramma’s, de stroomgebiedsbeheerplannen,
      de overstromingsrisicobeheerplannen en het nationale waterprogramma, die betrekking hebben op het betreffende krw-
      oppervlaktewaterlichaam of grondwaterlichaam:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: voldoet_aan_omgevingswaarden
            type: boolean
            required: true
            description: Of na verlening wordt voldaan aan de omgevingswaarden (art. 2.10-2.15)
            source: {}
          - name: goed_ecologisch_potentieel_bereikt
            type: boolean
            required: true
            description: Of een goed ecologisch potentieel wordt bereikt (art. 2.12)
            source: {}
          - name: minder_strenge_doelstelling_bereikt
            type: boolean
            required: true
            description: Of een minder strenge doelstelling wordt bereikt (art. 2.17 lid 2 onder d)
            source: {}
        output:
          - name: vergunning_verlening_toegestaan
            type: boolean
            description: Of het verlenen van de omgevingsvergunning is toegestaan op grond van waterkwaliteitseisen
        actions:
          - output: vergunning_verlening_toegestaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $voldoet_aan_omgevingswaarden
                  value: true
                - operation: EQUALS
                  subject: $goed_ecologisch_potentieel_bereikt
                  value: true
                - operation: EQUALS
                  subject: $minder_strenge_doelstelling_bereikt
                  value: true
  - number: 6.2.2.a
    text: |-
      niet wordt voldaan aan de omgevingswaarden, bedoeld in de [artikelen 2.10, eerste lid][ref1],
      [2.11, eerste lid][ref2], [2.13, eerste lid][ref3], [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5], in
      voorkomend geval in samenhang met de termijn, bedoeld in [artikel 2.18, eerste lid][ref6];


