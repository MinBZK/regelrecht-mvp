  - number: 8.62a.1
    text: |-
      Deze paragraaf is van toepassing op een omgevingsvergunning voor een milieubelastende activiteit die betrekking
      heeft op het exploiteren van een ippc-installatie voor het storten van afvalstoffen of het exploiteren
      van een andere milieubelastende installatie voor het storten van bedrijfsafvalstoffen of gevaarlijke
      afvalstoffen op een stortplaats, bedoeld in de [artikelen 3.84, eerste lid, aanhef en onder a en b][ref1], en
      [3.85, eerste lid, van het Besluit activiteiten leefomgeving][ref2], en voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.62a.1.a
    text: op de stortplaats alleen baggerspecie wordt gestort; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.1.b
    text: de stortplaats niet is gelegen in een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.2
    text: 'Deze paragraaf is niet van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.2.a
    text: |-
      voorwerpen die afzonderlijk van of uit de waterbodem zijn verwijderd, voorwerpen die redelijkerwijs tijdens het
      baggeren uit de baggerspecie kunnen worden verwijderd en voorwerpen die na het baggeren uit de baggerspecie zijn
      verwijderd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.2.b
    text: waterbodem die is gewonnen met het oog op de toepassing als grondstof;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.2.c
    text: waterbodem die niet uit een oppervlaktewaterlichaam is genomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62a.2.d
    text: |-
      baggerspecie die is ontwaterd of gerijpt met het oog op de toepassing als grond, voor
      zover wordt voldaan aan de regels over het toepassen van grond of baggerspecie, bedoeld in
      [paragraaf 4.124 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.124
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: '4.124'
  - number: 8.62a.2.e
    text: |-
      stoffen en producten die zijn ontstaan door de behandeling of toepassing van baggerspecie, met uitzondering van het
      residu van die behandeling.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62a
  - number: 8.62b
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden over de vakbekwaamheid en de opleiding van degene die de
      stortplaats exploiteert en de op de stortplaats werkzame personen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62b
  - number: 8.62c.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de volgende maatregelen
      worden getroffen, als uit een berekening blijkt dat de standaardwaarde voor het grondwater, bedoeld in
      [bijlage XVIIIa][ref1], zal worden overschreden buiten het toelaatbaar beïnvloede gebied:


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.62c.1.a
    text: het aanbrengen van een organisch stofrijke minerale laag op de bodem of de taluds van de stortplaats; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.1.b
    text: |-
      het aanbrengen van een geohydrologisch isolatiesysteem waarmee wordt voorkomen dat het interventiepunt wordt
      bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de maatregelen, bedoeld in het eerste
      lid, voorkomen dat buiten het toelaatbaar beïnvloede gebied overschrijding plaatsvindt van de standaardwaarde voor
      het grondwater, bedoeld in [bijlage XVIIIa][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.62c.3
    text: |-
      Het toelaatbaar beïnvloede gebied is het gebied direct buiten de stortplaats, waarbinnen wordt nagegaan of het
      interventiepunt wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.4
    text: |-
      Aan een omgevingsvergunning kunnen in afwijking van het eerste en tweede lid voorschriften worden verbonden die
      inhouden dat andere maatregelen worden getroffen, als is aangetoond of voldoende aannemelijk is gemaakt dat deze
      maatregelen even duurzaam en gelijkwaardig zijn en binnen het toelaatbaar beïnvloede gebied het interventiepunt
      niet wordt bereikt en de standaardwaarde voor het grondwater buiten het toelaatbaar beïnvloede gebied niet wordt
      overschreden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.5
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.5.a
    text: het bepalen van het toelaatbare beïnvloede gebied, bedoeld in het derde lid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62c.5.b
    text: het bepalen of het interventiepunt binnen het toelaatbare beïnvloede gebied wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62c
  - number: 8.62d.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het aanbrengen en in werking stellen en
      houden van een geohydrologisch isolatiesysteem mogelijk moet blijven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62d
  - number: 8.62d.2
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62d
  - number: 8.62d.2.a
    text: |-
      als een geohydrologisch isolatiesysteem is aangebracht, dit systeem in goede staat van onderhoud wordt gehouden en
      zo nodig wordt hersteld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62d
  - number: 8.62d.2.b
    text: |-
      het met behulp van een geohydrologisch isolatiesysteem opgepompte water zo wordt opgevangen, verzameld en gezuiverd
      of afgevoerd dat geen gevaar bestaat voor verontreiniging van de bodem of het grondwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62d
  - number: 8.62e
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat na het beëindigen van de
      stortwerkzaamheden zo nodig een afdeklaag met een dikte van ten minste 1 m wordt aangebracht op de gestorte
      baggerspecie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62e
  - number: 8.62f.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden waarin is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.1.a
    text: het toegelaten herkomstgebied van de baggerspecie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.1.b
    text: de klasse, klassen of verontreinigingsgraad van de baggerspecie die op de stortplaats mag worden gestort;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.1.c
    text: |-
      de totale hoeveelheid baggerspecie die op de stortplaats mag worden gestort, uitgedrukt in tonnen droge stof en
      dichtheid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.1.d
    text: tot welke hoogte mag worden gestort.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden waarin is aangegeven onder welke bijzondere
      omstandigheden na mededeling aan het bevoegd gezag mag worden afgeweken van de voorschriften, bedoeld in het eerste
      lid, onder a en b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.3
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.3.a
    text: de hoeveelheid baggerspecie per oppervlakte-eenheid zo groot mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62f.3.b
    text: |-
      de minst verontreinigde baggerspecie zoveel mogelijk op de bodem en langs de taluds van de stortplaats wordt
      aangebracht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62f
  - number: 8.62g.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat een deugdelijk controlesysteem
      aanwezig is, waarmee het niveau en de kwaliteit van het grondwater en de hoeveelheid en de kwaliteit van het
      oppervlaktewater in de directe omgeving van de stortplaats kunnen worden onderzocht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
  - number: 8.62g.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat met het controlesysteem in ieder geval
      kan worden nagegaan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
  - number: 8.62g.2.a
    text: |-
      of en in welke mate verontreinigende stoffen zich verspreiden in het oppervlaktewater en het grondwater in de
      omgeving van de stortplaats; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
  - number: 8.62g.2.b
    text: of het interventiepunt zal worden bereikt of is bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
  - number: 8.62g.3
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat bij het ontwerp van het controlesysteem
      rekening wordt gehouden met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
  - number: 8.62g.3.a
    text: |-
      het ontwerp van het geohydrologisch isolatiesysteem, bedoeld in [artikel 8.62d][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62g.3.b
    text: |-
      de maatregelen tegen de overschrijding, bedoeld in [artikel 8.62c, eerste lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62g.3.c
    text: |-
      het toelaatbaar beïnvloede gebied, bedoeld in [artikel 8.62c, tweede, derde en vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62g
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62h.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.1.a
    text: |-
      een inventarisatie wordt uitgevoerd waarbij de ligging, de omvang en de kenmerken worden bepaald van het
      oppervlaktewater, dat in de potentiële invloedssfeer van de stortplaats is gelegen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.1.b
    text: |-
      parameters in het oppervlaktewater, bedoeld onder a, worden gemeten op de in de voorschriften aangegeven
      meetpunten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.2
    text: |-
      Vanwege de kenmerken van de stortplaats kan worden afgezien van het aan de omgevingsvergunning verbinden van
      voorschriften als bedoeld in het eerste lid, aanhef en onder b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.3.a
    text: |-
      de frequentie van de inventarisatie, bedoeld in het eerste lid, onder a, en de metingen, bedoeld in het eerste lid,
      onder b; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62h.3.b
    text: de vaststelling van de meetpunten, bedoeld in het eerste lid, onder b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62h
  - number: 8.62i.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het niveau van het grondwater binnen
      en in de directe omgeving van de stortplaats voor zover mogelijk wordt vastgesteld op de in de voorschriften
      aangegeven referentiepunten en controlemeetpunten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.2
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden waarin is aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.2.a
    text: welke parameters worden gemeten in het grondwater;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.2.b
    text: op welke diepten in de bodem de monsterneming op elk meetpunt plaatsvindt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.2.c
    text: |-
      dat de parameters, bedoeld onder a, voor zover mogelijk worden gemeten op de referentiepunten en de
      controlemeetpunten, bedoeld in het eerste lid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.2.d
    text: dat de metingen worden verricht in een vaste periode in het jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.3.a
    text: de frequentie van de vaststelling van het niveau van het grondwater, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.3.b
    text: de wijze waarop de referentiepunten en de controlemeetpunten, bedoeld in het eerste lid, worden bepaald; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62i.3.c
    text: de frequentie van de metingen, bedoeld in het tweede lid, onder c.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62i
  - number: 8.62j
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat geen baggerspecie wordt gestort
      voordat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62j
  - number: 8.62j.a
    text: |-
      het bevoegd gezag na inspectie van de stortplaats aan degene die de stortplaats exploiteert heeft meegedeeld
      dat is voldaan aan de voorschriften die op grond van de [artikelen 8.62c tot en met 8.62f][ref1] aan de
      omgevingsvergunning zijn verbonden;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62j
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62j.b
    text: |-
      de concentratie van elke parameter, bedoeld in [artikel 8.62i, tweede lid][ref1], is bepaald op ten minste drie in
      de voorschriften aangegeven meetpunten; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62j
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62j.c
    text: |-
      degene die de stortplaats exploiteert bewijs aan het bevoegd gezag heeft overgelegd dat op grond van
      [artikel 8.6 van het Omgevingsbesluit][ref1] financiële zekerheid is gesteld of een gelijkwaardige voorziening
      is getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62j
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
  - number: 8.62k
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat een urgentieplan op hoofdlijnen wordt
      opgesteld waarin wordt aangegeven welke maatregelen moeten worden getroffen als een interventiepunt wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62k
  - number: 8.62l.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden, die inhouden dat het interventiepunt is bereikt als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.1.a
    text: |-
      binnen het toelaatbaar beïnvloede gebied, bedoeld in [artikel 8.62c, derde lid][ref1], op een controlemeetpunt de
      concentratie van een of meer stoffen gelijk is aan of groter is dan de signaalwaarde voor die stof, vermeerderd met
      de standaardwaarde voor het grondwater, bedoeld in [bijlage XVIIIa][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 8.62l.1.b
    text: de overschrijding, bedoeld onder a, is bevestigd door een herhaalde meting; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.1.c
    text: |-
      onderzoek is verricht naar de oorzaak van de overschrijding, bedoeld onder a, of de voor het verrichten van het
      onderzoek in de omgevingsvergunning aangegeven termijn is verstreken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat in afwijking van de voorschriften,
      bedoeld in het eerste lid, het interventiepunt niet is bereikt als uit het onderzoek, bedoeld in het eerste lid,
      onder c, blijkt dat de overschrijding niet is veroorzaakt door de stortplaats.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.3
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden over de wijze waarop en de termijn waarbinnen de
      herhaalde meting, bedoeld in het eerste lid, onder b, en het onderzoek, bedoeld in het eerste lid, onder c, worden
      verricht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.4
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.4.a
    text: de vaststelling van de signaalwaarde, bedoeld in het eerste lid, onder a; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62l.4.b
    text: de herhaalde meting, bedoeld in het eerste lid, onder b.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62l
  - number: 8.62m
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat als een voor de stortplaats bepaald
      interventiepunt wordt bereikt:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
  - number: 8.62m.a
    text: dit onverwijld aan het bevoegd gezag wordt gemeld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
  - number: 8.62m.b
    text: |-
      een uitgewerkt urgentieplan wordt opgesteld op basis van het urgentieplan op hoofdlijnen, bedoeld in
      [artikel 8.62k][ref1], in overleg met het bevoegd gezag, binnen een in de omgevingsvergunning bepaalde periode,
      waarin in ieder geval wordt aangegeven:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62m.b.1°
    text: 'welke maatregelen binnen een daarbij aan te geven termijn worden getroffen om:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
  - number: 8.62m.b.1°.i
    text: |-
      te voorkomen dat de concentratie van de betrokken stoffen buiten het toelaatbaar beïnvloede gebied, bedoeld in
      [artikel 8.62c, derde lid][ref1], gelijk zal zijn aan of groter zal zijn dan de signaalwaarde voor die stof,
      vermeerderd met de standaardwaarde voor het grondwater, bedoeld in [bijlage XVIIIa][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 8.62m.b.1°.ii
    text: de situatie, bedoeld onder i, ongedaan te maken, als deze situatie zich al heeft voorgedaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
  - number: 8.62m.b.2°
    text: |-
      op welke wijze en binnen welke termijn wordt gecontroleerd of de maatregelen, bedoeld onder 1°, het beoogde effect
      hebben.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62m
  - number: 8.62n.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de uitkomsten van de metingen, bedoeld
      in de [artikelen 8.62h, eerste lid, onder b][ref1], en [8.62i, tweede lid][ref2], en de vaststelling, bedoeld in
      artikel 8.62i, eerste lid, worden bewaard.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.62n.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de volgende resultaten ten minste
      eenmaal per jaar aan het bevoegd gezag worden gezonden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.a
    text: de uitkomsten van de metingen, vaststellingen en controle, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.b
    text: |-
      de hoeveelheid baggerspecie die over het voorgaande jaar op de stortplaats is gestort, uitgedrukt in tonnen droge
      stof en dichtheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.c
    text: tot welke hoogte baggerspecie is gestort;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.d
    text: de met baggerspecie bedekte oppervlakte;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.e
    text: de toegepaste stortmethode;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.f
    text: het herkomstgebied van de gestorte baggerspecie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.g
    text: de klasse of verontreinigingsgraad van de gestorte baggerspecie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.h
    text: het consolidatiegedrag in de stortplaats; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62n.2.i
    text: de resterende stortcapaciteit op de stortplaats, uitgedrukt in tonnen droge stof en dichtheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62n
  - number: 8.62o
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat monsterneming, monstervoorbehandeling
      en analyse van de monsters van het grondwater en het oppervlaktewater plaatsvinden volgens de actuele stand van
      de techniek.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.62o
  - number: 8.63.1
    text: |-
      Deze paragraaf is van toepassing op milieubelastende activiteiten die betrekking hebben op het exploiteren
      van een andere milieubelastende installatie voor het storten of verzamelen van winningsafvalstoffen in
      een winningsafvalvoorziening, bedoeld in de [artikelen 3.84, eerste lid, aanhef en onder c][ref1], en
      [3.85, eerste lid, van het Besluit activiteiten leefomgeving][ref2], anders dan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.63.1.a
    text: |-
      de injectie van water en de herinjectie van opgepompt grondwater, bedoeld in artikel 11, derde lid, onder j, eerste
      en tweede gedachtestreepje, van de kaderrichtlijn water, als dat krachtens dat artikel is toegestaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.1.b
    text: |-
      het storten van niet-gevaarlijke, niet-inerte winningsafvalstoffen, tenzij die worden gestort in een
      winningsafvalvoorziening categorie A.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.2
    text: |-
      Tenzij de opslag plaatsvindt in een winningsafvalvoorziening categorie A of in een winningsafvalvoorziening
      voor in het winningsafvalbeheersplan, bedoeld in artikel 5 van de richtlijn winningsafval, als gevaarlijk afval
      aangemerkt afval, zijn de [artikelen 8.64 tot en met 8.70][ref1] van dit besluit en [paragraaf 8.2][ref2] en
      [titel 17.1A van de Wet milieubeheer][ref3] niet van toepassing op de opslag van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Paragraaf8.2
      [ref3]: https://wetten.overheid.nl/BWBR0003245
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0003245
        paragraaf: '8.2'
      - id: ref3
        bwb_id: BWBR0003245
  - number: 8.63.2.a
    text: niet-gevaarlijke, niet-inerte winningsafvalstoffen, gedurende een periode van ten hoogste een jaar;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.2.b
    text: niet-gevaarlijk afval afkomstig uit prospectie, gedurende een periode van ten hoogste drie jaar;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.2.c
    text: niet-verontreinigde grond;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.2.d
    text: afval uit de winning, behandeling en opslag van turf; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: 8.63.2.e
    text: inerte winningsafvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.63
  - number: '8.64'
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.64
  - number: 8.64.a
    text: |-
      het winningsafvalbeheersplan, bedoeld in artikel 5 van de richtlijn winningsafval, wordt gewijzigd bij ingrijpende
      wijzigingen in de structuur of de exploitatie van de winningsafvalvoorziening of in de gestorte afvalstoffen,
      waardoor naar het oordeel van het bevoegd gezag belangrijke negatieve gevolgen kunnen ontstaan voor de gezondheid
      of het milieu;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.64
  - number: 8.64.b
    text: het winningsafvalbeheersplan elke vijf jaar wordt herzien; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.64
  - number: 8.64.c
    text: een wijziging of herziening van het winningsafvalbeheersplan aan het bevoegd gezag wordt meegedeeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.64
  - number: '8.65'
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden over vakbekwaamheid en de opleiding van degene die de
      winningsafvalvoorziening exploiteert en de op de winningsafvalvoorziening werkzame personen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.65
  - number: 8.66.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.1.a
    text: |-
      de winningsafvalvoorziening in overeenstemming met het door het bevoegd gezag goedgekeurde ontwerp wordt aangelegd
      of gebouwd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.1.b
    text: |-
      na de oplevering van de winningsafvalvoorziening en voor de ingebruikneming daarvan aan het bevoegd gezag een
      rapportage wordt overgelegd, waarin zijn aangegeven:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.1.b.1°
    text: de wijze waarop de directievoering op de aanleg of bouw heeft plaatsgevonden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.1.b.2°
    text: |-
      de tijdens de werkzaamheden ten opzichte van het bestek doorgevoerde afwijkingen en de op die afwijkingen
      betrekking hebbende revisietekeningen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.1.b.3°
    text: |-
      de resultaten van een controle op de deugdelijkheid en fysische stabiliteit van de opgeleverde
      winningsafvalvoorziening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.2
    text: Het eerste lid is van overeenkomstige toepassing op veranderingen van de winningsafvalvoorziening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.66.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de controle, bedoeld in het eerste lid, aanhef en onder b, onder 3°.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.66
  - number: 8.67.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.1.a
    text: |-
      de winningsafvalvoorziening zo wordt beheerd en onderhouden dat de fysische stabiliteit is verzekerd en
      verontreiniging of besmetting van bodem, lucht, oppervlaktewaterlichamen of grondwater en schade aan het landschap
      zoveel mogelijk wordt voorkomen of tegengegaan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.1.b
    text: |-
      verontreinigd water of percolaat zo wordt opgevangen, verzameld en gezuiverd of afgevoerd dat geen gevaar bestaat
      voor verontreiniging van de bodem of het grondwater;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.1.c
    text: erosie door water of wind wordt tegengegaan, als dat technisch mogelijk en economisch haalbaar is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.1.d
    text: |-
      door periodieke controle van de winningsafvalvoorziening door op de winningsafvalvoorziening werkzame vakbekwame
      personen wordt verzekerd dat de voorziening voldoet aan de voorschriften die aan de omgevingsvergunning zijn
      verbonden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.1.e
    text: |-
      maatregelen worden getroffen wanneer de resultaten van de controle, bedoeld onder d, wijzen op instabiliteit of
      verontreiniging van het water of de bodem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.67.2
    text: |-
      Aan de omgevingsvergunning wordt het voorschrift verbonden dat de gegevens van de controle, bedoeld in het eerste
      lid, onder d, samen met de vergunningdocumentatie gedurende ten minste vijf jaar worden bewaard om een passende
      overdracht van informatie te verzekeren als de omgevingsvergunning zal gaan gelden voor een ander dan de aanvrager
      of de vergunninghouder.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.67
  - number: 8.68.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat degene die de winningsafvalvoorziening
      exploiteert ten minste eenmaal per jaar op basis van verzamelde gegevens een verslag toezendt aan het bevoegd
      gezag:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.68
  - number: 8.68.1.a
    text: om aan te tonen dat aan de voorschriften van de omgevingsvergunning wordt voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.68
  - number: 8.68.1.b
    text: om de kennis van het gedrag van de afvalstoffen en de winningsafvalvoorziening te vergroten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.68
  - number: 8.68.2
    text: |-
      Aan een omgevingsvergunning kan een voorschrift worden verbonden dat de plicht inhoudt dat degene die de
      winningsafvalvoorziening exploiteert, de gegevens, op basis waarvan het verslag is opgesteld, laat valideren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.68
  - number: 8.68.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de validatie, bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.68
  - number: 8.69.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.a
    text: >-
      in overeenstemming met de kaderrichtlijn water,
      verslechtering van de toestand van het water wordt
      voorkomen, door:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.a.1°
    text: |-
      evaluatie van de potentiële percolaatvorming, met inbegrip van de verontreinigde bestanddelen van het
      percolaat, vanuit de gestorte afvalstoffen zowel tijdens de bedrijfsuitoefening als na de sluiting van de
      winningsafvalvoorziening;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.a.2°
    text: de waterbalans van de winningsafvalvoorziening te bepalen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.a.3°
    text: |-
      te voorkomen of tegen te gaan dat percolaat wordt gegenereerd en oppervlaktewaterlichamen, het grondwater of de
      bodem door de afvalstoffen worden verontreinigd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.a.4°
    text: |-
      het verontreinigde water en percolaat van de winningsafvalvoorziening te verzamelen en te behandelen totdat wordt
      voldaan aan de van toepassing zijnde eisen voor lozing ervan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.b
    text: |-
      degene die de winningsafvalvoorziening exploiteert, de noodzakelijke maatregelen treft om stof- en gasemissies
      zoveel mogelijk te voorkomen of te beperken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.c
    text: |-
      degene die de winningsafvalvoorziening exploiteert, als winningsafvalstoffen worden teruggeplaatst in een
      uitgegraven ruimte die is ontstaan door boven- of ondergrondse winning en die na de sluiting mag volstromen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.c.1°
    text: |-
      de noodzakelijke maatregelen treft om verslechtering van de toestand van het water en bodemverontreiniging zoveel
      mogelijk te voorkomen of zoveel mogelijk te beperken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.1.c.2°
    text: |-
      het bevoegd gezag voorziet van de informatie die noodzakelijk is om te verzekeren dat wordt voldaan aan het
      [Besluit activiteiten leefomgeving][ref1] en de kaderrichtlijn water.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.69.2
    text: |-
      In afwijking van het eerste lid, onder a, onder 2° of 3°, kan toepassing daarvan achterwege blijven of kunnen
      andere voorschriften aan de omgevingsvergunning worden verbonden wanneer op basis van een beoordeling van de
      milieurisico’s en rekening houdend met de kaderrichtlijn water, wordt vastgesteld dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.2.a
    text: het verzamelen en behandelen van percolaat niet nodig is; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.2.b
    text: de winningsafvalvoorziening geen potentieel gevaar vormt voor oppervlaktewaterlichamen, de bodem of het grondwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: 8.69.3
    text: |-
      Aan een omgevingsvergunning voor het storten van winningsafvalstoffen in een ontvangend waterlichaam, dat niet is
      aangelegd voor de verwijdering van winningsafvalstoffen, wordt een voorschrift verbonden dat inhoudt dat degene die
      de winningsafvalvoorziening exploiteert, voldoet aan de toepasselijke bepalingen van de kaderrichtlijn water.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.69
  - number: '8.70'
    text: |-
      Aan een omgevingsvergunning voor een winningsafvalvoorziening categorie A worden voorschriften verbonden die
      inhouden dat degene die de winningsafvalvoorziening exploiteert:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70.a
    text: het preventiebeleid voor zware ongevallen als bedoeld in artikel 6 van de richtlijn winningsafval uitvoert;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70.b
    text: |-
      bij zware ongevallen en andere voorvallen in overeenstemming met het interne noodplan, bedoeld in artikel 6 van de
      richtlijn winningsafval, onverwijld maatregelen treft om nadelige gevolgen voor de gezondheid of het milieu, met
      inbegrip van grensoverschrijdende gevolgen, zoveel mogelijk te voorkomen of te beperken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70.c
    text: 'een veiligheidsmanager aanstelt, die verantwoordelijk is voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70.c.1°
    text: de invoering en werking van de veiligheidsbeheerssystemen, bedoeld in artikel 6 van de richtlijn winningsafval; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70.c.2°
    text: de uitvoering van en het periodieke toezicht op het preventiebeleid voor zware ongevallen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70
  - number: 8.70a
    text: |-
      Deze paragraaf is van toepassing op een omgevingsvergunning voor een milieubelastende activiteit die betrekking
      heeft op het op of in de bodem brengen van zuiveringsslib afkomstig van zuiveringsinstallaties voor huishoudelijk
      of stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70a
  - number: 8.70b
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat alleen zuiveringsslib op of in de
      bodem wordt gebracht dat op grond van [hoofdstuk III van het Uitvoeringsbesluit Meststoffenwet][ref1] mag worden
      verhandeld.


      [ref1]: https://wetten.overheid.nl/BWBR0019031#HoofdstukIII
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70b
    references:
      - id: ref1
        bwb_id: BWBR0019031
        hoofdstuk: III
  - number: 8.70c
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het brengen van zuiveringsslib op
      landbouwgronden alleen plaatsvindt, voor zover de waarden voor een of meer van de in de landbouwgronden aanwezige
      stoffen, bedoeld in tabel 8.70c, niet worden overschreden.
          Tabel 8.70c Grenswaarden


                  *Stof*


                  *Grenswaarde*


                  Cadmium


                  Ten hoogste 0,4 + 0,007 (L + 3H) mg/kg ds


                  Chroom


                  Ten hoogste 50 + 2 L mg/kg ds


                  Koper


                  Ten hoogste 15 + 0,6 (L + H) mg/kg ds


                  Kwik


                  Ten hoogste 0,2 + 0,0017 (2 L + H) mg/kg ds


                  Nikkel


                  Ten hoogste 10 + L mg/kg ds


                  Lood


                  Ten hoogste 50 + L + H mg/kg ds


                  Zink


                  Ten hoogste 50 + 1,5 (2 L + H) mg/kg ds


                  Arseen


                  Ten hoogste 15 + 0,4 (L + H) mg/kg ds


         L = % lutum H = % organische stof
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70c
  - number: 8.70d
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het brengen van zuiveringsslib op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70d
  - number: 8.70d.a
    text: |-
      grasland of weidegronden als bedoeld in [bijlage I bij het Besluit activiteiten leefomgeving][ref1], niet
      plaatsvindt in de periode dat deze worden beweid;


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70d
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.70d.b
    text: bouwland met voedergewassen, niet plaatsvindt als er binnen drie weken wordt geoogst;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70d
  - number: 8.70d.c
    text: |-
      bouwland met groenteaanplant of fruitaanplant, anders dan fruitbomenaanplant, niet plaatsvindt in de groeiperiode
      van de groenten of het fruit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70d
  - number: 8.70d.d
    text: |-
      bouwland voor het telen van rauw te consumeren groenten of fruit, niet plaatsvindt minder dan tien maanden voor
      de oogst.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70d
  - number: 8.70e.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.a
    text: |-
      het zuiveringsslib op landbouwgronden wordt gebracht in hetzelfde kalenderjaar als het jaar waarin een gewas wordt
      geteeld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.b
    text: 'de hoeveelheid op landbouwgronden te brengen vloeibaar zuiveringsslib niet groter is dan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.b.1°
    text: twee ton droge stof per hectare per jaar op bouwland; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.b.2°
    text: één ton droge stof per hectare per jaar op grasland;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.c
    text: 'de hoeveelheid op landbouwgronden te brengen steekvast zuiveringsslib niet groter is dan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.c.1°
    text: vier ton droge stof per hectare per twee jaar op bouwland; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.c.2°
    text: twee ton droge stof per hectare per twee jaar op grasland; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.1.d
    text: het grondgebruik tijdens de perioden, bedoeld onder b en c, voor de betrokken hectares gelijk blijft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70e.2
    text: |-
      Voor de toepassing van het eerste lid, onder b en c, is de situatie op 15 mei van een kalenderjaar waarin
      zuiveringsslib wordt gebruikt, bepalend voor de vraag of sprake is van bouwland of grasland. Als niet op 15 mei
      maar in de loop van het kalenderjaar een gewas wordt geteeld, is voor de toepassing van het eerste lid, onder b en
      c, sprake van bouwland.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70e
  - number: 8.70f
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden over het op of in de bodem brengen van zuiveringsslib:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70f
  - number: 8.70f.a
    text: bij specifieke weers-, geologische en fysieke omstandigheden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70f
  - number: 8.70f.b
    text: bij het bevloeien of beregenen van de bodem; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70f
  - number: 8.70f.c
    text: gedurende bepaalde perioden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70f
  - number: 8.70g.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de bodem voordat het zuiveringsslib op
      of in de bodem wordt gebracht, wordt bemonsterd en geanalyseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70g
  - number: 8.70g.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat van de bemonstering en analyse een
      rapportage wordt opgesteld die ten minste tien jaar na de bemonstering wordt bewaard.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70g
  - number: 8.70g.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het verbinden van voorschriften aan een omgevingsvergunning
      over wijze en frequentie van de bemonstering en analyse, bedoeld in het eerste lid, en de rapportage, bedoeld in
      het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.70g
  - number: 8.71.1
    text: |-
      Aan een omgevingsvergunning worden, als het gaat om een activiteit waarop ook de in
      [artikel 16.5 van de Wet milieubeheer][ref1] vervatte verboden betrekking hebben, geen voorschriften verbonden
      die een emissiegrenswaarde voor de directe emissie van broeikasgassen inhouden, tenzij dat noodzakelijk is om te
      verzekeren dat geen significante milieuverontreiniging in de directe omgeving van de activiteit wordt veroorzaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.71
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '16'
  - number: 8.71.2
    text: |-
      Als aan de omgevingsvergunning voorschriften zijn verbonden als bedoeld in het eerste lid, vervallen die
      voorschriften.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.71
  - number: 8.72.1
    text: |-
      Aan een omgevingsvergunning worden, als het gaat om een activiteit als bedoeld in
      [artikel 15.51 van de Wet milieubeheer][ref1] geen voorschriften verbonden die een emissiegrenswaarde voor de
      directe emissie van kooldioxide inhouden, tenzij dat noodzakelijk is om te verzekeren dat geen significante
      milieuverontreiniging in de directe omgeving van de activiteit wordt veroorzaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.72
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '15'
  - number: 8.72.2
    text: |-
      Als aan een omgevingsvergunning voorschriften zijn verbonden als bedoeld in het eerste lid, vervallen die
      voorschriften.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.72
  - number: '8.73'
    text: |-
      Aan een omgevingsvergunning worden geen voorschriften verbonden die het naar of uit de provincie brengen van
      afvalstoffen beperken of uitsluiten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.73
  - number: '8.74'
    text: |-
      Op het verbinden van voorschriften aan een omgevingsvergunning zijn de [artikelen 2.23][ref1], [4.8][ref2],
      [4.31][ref3], [4.35][ref4], [4.37][ref5], [4.46][ref6], [4.56][ref7], [4.59][ref8], [4.65][ref9], [4.73a][ref10],
      [4.74][ref11], [4.96a][ref12], [4.106][ref13], [4.442][ref14], [4.451][ref15], [4.506][ref16], [4.609][ref17],
      [4.612][ref18], [4.1077][ref19], [4.1083][ref20], [4.1198][ref21], [4.1199][ref22], [4.1257a][ref23],
      [4.1265a][ref24], [4.1273][ref25], [4.1275][ref26], [4.1277][ref27], [4.1279][ref28], [4.1289][ref29],
      [4.1291][ref30], [4.1296][ref31], [4.1303a][ref32], [4.1340][ref33], [4.1349a][ref34], [5.7l][ref35], [5.14][ref36]
      en [5.16 van het Besluit activiteiten leefomgeving][ref37] van overeenkomstige toepassing.


