        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 5.78m.2
    text: |-
      Een omgevingsplan dat een wijziging van een gemeenteweg, waterschapsweg of lokale spoorweg of een wijziging van het
      gebruik van een lokale spoorweg toelaat, voorziet erin dat het geluid op geluidgevoelige gebouwen niet hoger is dan
      de hoogste van de volgende twee waarden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78m
  - number: 5.78m.2.a
    text: |-
      de standaardwaarde, bedoeld in [tabel 3.34][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78m
    references:
