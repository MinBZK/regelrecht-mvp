        hoofdstuk: '6'
      - id: ref3
        bwb_id: BWBR0041330
        hoofdstuk: '7'
  - number: 8.83.1.d
    text: |-
      vergunningplichtige lozingsactiviteiten op een zuiveringtechnisch werk als bedoeld in
      [hoofdstuk 3 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 8.83.1.e
    text: |-
      stortingsactiviteiten op zee die niet zijn aangewezen als vergunningvrije activiteiten in
      [paragraaf 7.2.8 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf7.2.8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
    references:
      - id: ref1
