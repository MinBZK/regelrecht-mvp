    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8
  - number: 2.8a.1
    machine_readable:
      definitions:
        # Reductiepercentages ten opzichte van 2005 (resultaatsverplichtingen)
        reductie_so2_2020: 0.28
        reductie_so2_2030: 0.53
        reductie_nox_2020: 0.45
        reductie_nox_2030: 0.61
        reductie_vos_2020: 0.08
        reductie_vos_2030: 0.15
        reductie_ammoniak_2020: 0.13
        reductie_ammoniak_2030: 0.21
        reductie_pm25_2020: 0.37
        reductie_pm25_2030: 0.45
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: stof
            type: string
            required: true
            description: De stof waarvan de emissie wordt getoetst (so2, nox, vos, ammoniak, pm25)
          - name: peiljaar
            type: number
            required: true
            description: Het jaar waarvoor de emissie wordt getoetst
        input:
          - name: emissie_referentiejaar_2005
            type: number
            description: Totale jaarlijkse antropogene emissie in referentiejaar 2005
            source: {}
          - name: emissie_peiljaar
            type: number
            description: Totale jaarlijkse antropogene emissie in het peiljaar
            source: {}
        output:
          - name: vereist_reductiepercentage
            type: number
            description: Het vereiste reductiepercentage ten opzichte van 2005
          - name: gerealiseerd_reductiepercentage
            type: number
            description: Het gerealiseerde reductiepercentage ten opzichte van 2005
          - name: voldoet_emissie_reductie
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarde voor emissiereductie
        actions:
          - output: vereist_reductiepercentage
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $stof
                    value: so2
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $peiljaar
                          value: 2030
                        then: $reductie_so2_2020
                    default: $reductie_so2_2030
                - when:
                    operation: EQUALS
                    subject: $stof
                    value: nox
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $peiljaar
                          value: 2030
                        then: $reductie_nox_2020
                    default: $reductie_nox_2030
                - when:
                    operation: EQUALS
                    subject: $stof
                    value: vos
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $peiljaar
                          value: 2030
                        then: $reductie_vos_2020
                    default: $reductie_vos_2030
                - when:
                    operation: EQUALS
                    subject: $stof
                    value: ammoniak
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $peiljaar
                          value: 2030
                        then: $reductie_ammoniak_2020
                    default: $reductie_ammoniak_2030
                - when:
                    operation: EQUALS
                    subject: $stof
                    value: pm25
                  then:
                    operation: IF
                    cases:
                      - when:
                          operation: LESS_THAN
                          subject: $peiljaar
                          value: 2030
                        then: $reductie_pm25_2020
                    default: $reductie_pm25_2030
              default: 0
          - output: gerealiseerd_reductiepercentage
            value:
              operation: DIVIDE
              values:
                - operation: SUBTRACT
                  values:
                    - $emissie_referentiejaar_2005
                    - $emissie_peiljaar
                - $emissie_referentiejaar_2005
          - output: voldoet_emissie_reductie
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $gerealiseerd_reductiepercentage
              value: $vereist_reductiepercentage
    text: |-
      Voor de totale jaarlijkse antropogene emissies van in Nederland gelegen bronnen van de volgende stoffen geldt het
      daarbij aangegeven reductiepercentage ten opzichte van 2005, waaraan wordt voldaan met ingang van 1 januari van het
      daarbij aangegeven jaar:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.a
    text: 'voor zwaveldioxide:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.a.1°
    text: 28%, in 2020; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.a.2°
    text: 53%, in 2030;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.b
    text: 'voor stikstofoxiden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.b.1°
    text: 45%, in 2020; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.b.2°
    text: 61%, in 2030;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.c
    text: 'voor vluchtige organische stoffen, met uitzondering van methaan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.c.1°
    text: 8%, in 2020; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.c.2°
    text: 15%, in 2030;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.d
    text: 'voor ammoniak:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.d.1°
    text: 13%, in 2020; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.d.2°
    text: 21%, in 2030; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.e
    text: 'voor PM:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.e.1°
    text: 37%, in 2020; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.1.e.2°
    text: 45%, in 2030.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.2
    text: |-
      Voor de toepassing van dit artikel wordt verstaan onder zwaveldioxide: alle zwavelverbindingen, uitgedrukt als
      zwaveldioxide, waaronder zwaveltrioxide, zwavelzuur en gereduceerde zwavelverbindingen zoals zwavelwaterstof,
      mercaptanen en dimethylsulfiden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8a.3
    text: |-
      De omgevingswaarden voor zwaveldioxide, stikstofoxiden, vluchtige organische stoffen, met uitzondering van methaan,
      ammoniak en PM zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8a
  - number: 2.8b.1
    text: |-
      Op het voldoen aan de omgevingswaarden, bedoeld in [artikel 2.8a][ref1], kan alleen een uitzondering worden gemaakt
      voor zover dat is toegestaan volgens de nec-richtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 2.8b.2
    text: 'Het eerste lid geldt als niet aan een omgevingswaarde kan worden voldaan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.2.a
    text: |-
      door een uitzonderlijk koude winter of een uitzonderlijk droge zomer: dan wordt geacht aan de omgevingswaarde te
      zijn voldaan als het gemiddelde van de jaarlijkse emissies voor het lopende, het voorgaande en het komende jaar
      voldoet aan de omgevingswaarde; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.2.b
    text: |-
      door een plotselinge en uitzonderlijke onderbreking of capaciteitsverlies in het stroom- of warmtevoorzienings-
      of productiesysteem die redelijkerwijs niet kon worden voorspeld: dan wordt geacht aan de omgevingswaarde te zijn
      voldaan gedurende ten hoogste drie jaar, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.2.b.1°
    text: |-
      alle redelijke inspanningen, met inbegrip van het treffen van nieuwe maatregelen en het uitvoeren van nieuw beleid,
      zijn geleverd om aan de omgevingswaarde te voldoen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.2.b.2°
    text: |-
      die inspanningen worden voortgezet om de periode waarin niet aan de omgevingswaarde wordt voldaan zo kort mogelijk
      te houden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.2.b.3°
    text: |-
      het treffen van maatregelen en het uitvoeren van beleid in aanvulling op de maatregelen en het beleid, bedoeld
      onder 1°, zou leiden tot onevenredig hoge kosten, een aanzienlijk risico zou inhouden voor de nationale
      energiezekerheid of een aanzienlijk deel van de bevolking zou blootstellen aan een substantieel risico van
      energiearmoede.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
  - number: 2.8b.3
    text: |-
      Als het gaat om de omgevingswaarde, bedoeld in [artikel 2.8a, eerste lid, onder e, onder 2°][ref1], geldt het
      eerste lid ook niet als, na alle kosteneffectieve maatregelen te hebben getroffen, niet aan de omgevingswaarde kan
      worden voldaan. Dan wordt geacht aan de omgevingswaarde te zijn voldaan gedurende ten hoogste vijf jaar, als voor
      elk jaar daarvan het niet voldoen wordt gecompenseerd met een gelijkwaardige emissiereductie van een andere stof
      waarvoor een omgevingswaarde als bedoeld in artikel 2.8a geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.8b
