        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 7.13.2
    text: |-
      Bij omgevingsverordening kan de rangorde, bedoeld in [artikel 3.14, vierde en vijfde lid][ref1], van
      overeenkomstige toepassing worden verklaard op het beschikbare grondwater.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.13
    references:
