  - number: 2.14.1.a
    text: |-
      wordt voldaan aan de voorwaarden, bedoeld in bijlage V, punt 2.3.2, bij de kaderrichtlijn water, en de eisen,
      bedoeld in [bijlage IV][ref1], tabellen A en B; of


