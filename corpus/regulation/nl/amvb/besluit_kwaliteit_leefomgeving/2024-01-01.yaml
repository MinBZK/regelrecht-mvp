  - number: 2.9.3
    text: |-
      Bij omgevingsverordening kan voor de waterkwaliteit van een krw-oppervlaktewaterlichaam of grondwaterlichaam een
      aanvullende omgevingswaarde of afwijkende omgevingswaarde die strenger is dan de omgevingswaarden, bedoeld in het
      eerste en tweede lid, worden vastgesteld. Bij de vaststelling daarvan worden de economische effecten betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.9
  - number: 2.10.1
    text: |-
      Een krw-oppervlaktewaterlichaam verkeert in een goede chemische toestand. Van een goede chemische toestand is
      sprake als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
  - number: 2.10.1.a
    text: |-
      wordt voldaan aan de eisen, bedoeld in [bijlage III][ref1], waarbij voor de stoffen, genoemd in de kolommen 10 en
      11 van die bijlage, wordt voldaan aan de omgevingswaarden met ingang van de datum, genoemd in die kolommen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.10.1.b
    text: |-
      de concentratie van de prioritaire stoffen die de neiging hebben te accumuleren in sediment of in biota, niet
      significant zijn toegenomen op de in [bijlage III][ref1] genoemde data.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.10.2
    text: |-
      Elk van de eisen, bedoeld in het eerste lid, onder a, en de eis, bedoeld in het eerste lid, onder b, is
      afzonderlijk een omgevingswaarde.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
  - number: 2.10.3
    text: |-
      In een geval als bedoeld in artikel 3, lid 8ter, van de richtlijn prioritaire stoffen geldt in afwijking
      van het eerste lid, aanhef en onder a, in plaats van de datum 22 december 2021, genoemd in kolom 10 van
      [bijlage III][ref1], de datum 22 december 2027, genoemd in kolom 11 van [bijlage III][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
      - id: ref2
        bwb_id: BWBR0041313
  - number: 2.10.4
    text: |-
      De omgevingswaarden zijn andere verplichtingen als bedoeld in
      [artikel 2.10, eerste lid, aanhef en onder a, van de wet][ref1], zoals omschreven in artikel 4, eerste lid, aanhef
      en onder a, onder ii en iii, van de kaderrichtlijn water.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.10
    references:
