        paragraaf: 11.1.1
        afdeling: '11.1'
  - number: 11.2.a
    text: |-
      de locatie waar een activiteit als bedoeld in [artikel 5.23][ref1], [5.28][ref2] of [5.32][ref3] of
      [bijlage VII][ref4] wordt verricht of waar een activiteit wordt verricht waarvoor een vergunning is verleend op
      grond van [artikel 15, aanhef en onder b, van de Kernenergiewet][ref5];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313
      [ref5]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
