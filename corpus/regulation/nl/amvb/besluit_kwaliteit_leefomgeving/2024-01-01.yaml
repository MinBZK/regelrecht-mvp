  - number: '5.117'
    text: |-
      Als zwaarwegende economische belangen of zwaarwegende andere maatschappelijke belangen dit rechtvaardigen, kan in
      afwijking van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.117
