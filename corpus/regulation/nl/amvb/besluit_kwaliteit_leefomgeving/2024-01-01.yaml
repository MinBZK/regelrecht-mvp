                    *Ondergrens afstand*


                    Gelegen binnen de bebouwingscontour geur


                    50 m


                    Gelegen buiten de bebouwingscontour geur


                    25 m
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.112
  - number: 5.112.3
    text: |-
      Als sprake is van een geurgevoelig gebouw dat heeft opgehouden een functionele binding te hebben met een
      dierenverblijf in de directe omgeving daarvan, kan in het omgevingsplan een afstand worden aangehouden die kleiner
      is dan de ondergrens voor de afstand, bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.112
  - number: '5.115'
    text: |-
      In afwijking van [artikel 5.112][ref1] wordt in een omgevingsplan dat het houden van landbouwhuisdieren zonder
      geuremissiefactor toelaat, ten minste de afstand, bedoeld in tabel 5.115, in acht genomen tot de volgende
      geurgevoelige gebouwen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.115
