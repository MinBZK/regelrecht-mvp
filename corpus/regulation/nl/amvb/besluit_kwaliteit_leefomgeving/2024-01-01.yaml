  - number: 2.0a
    text: |-
      Voor de veiligheid van primaire waterkeringen gelden de omgevingswaarden, bedoeld in [artikel 2.0c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.1.1
        afdeling: '2.1'
  - number: 2.0b
    text: |-
      De omgevingswaarden voor de veiligheid van primaire waterkeringen gelden voor een dijktraject als bedoeld in
      [bijlage II][ref1], onder A, waarvan de locatie bij ministeriële regeling is begrensd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0b
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0c.1
    text: |-
      Voor dijktrajecten als bedoeld in [bijlage II][ref1], onder A, geldt de ten hoogste toelaatbare kans per jaar op
      verlies van waterkerend vermogen waardoor het door het dijktraject beschermde gebied overstroomt op een zodanige
      wijze en in zodanige mate dat dit leidt tot dodelijke slachtoffers of substantiële economische schade, bedoeld in
      bijlage II, onder B, kolom 1.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0c.2
    text: |-
      In afwijking van het eerste lid geldt voor de dijktrajecten 201, 204a, 204b, 205, 206, 208 tot en met 212, 214
      tot en met 219 en 222 tot en met 227 de ten hoogste toelaatbare kans per jaar op verlies van waterkerend vermogen
      waardoor de hydraulische belasting op een achterliggend dijktraject substantieel wordt verhoogd, bedoeld in
      [bijlage II][ref1], onder B, kolom 2.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0c.3
    text: |-
      In afwijking van het eerste lid geldt voor dijktraject 16-5 de ten hoogste toelaatbare kans op verlies van
      waterkerend vermogen waardoor het door het dijktraject beschermde gebied overstroomt op zodanige wijze en in
      zodanige mate dat dit leidt tot dodelijke slachtoffers of substantiële economische schade per keer dat het
      een hydraulische belasting ondervindt door het overstromen van het gebied dat door een voorliggend dijktraject
      beschermd is, bedoeld in [bijlage II][ref1], onder B, kolom 3.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0c.4
    text: |-
      Voor de dijktrajecten 25-3, 27-3, 27-4, 31-3, 33-1, 34-3, 34-4 en 34-5 geldt ook de ten hoogste toelaatbare kans
      op verlies van waterkerend vermogen waardoor het door het dijktraject beschermde gebied overstroomt op een zodanige
      wijze en in zodanige mate dat dit leidt tot dodelijke slachtoffers of substantiële economische schade per keer
      dat een toename van hydraulische belasting optreedt door een maatregel gericht op het vergroten van de afvoer- of
      bergingscapaciteit van een watersysteem, bedoeld in [bijlage II][ref1], onder B, kolom 4.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0c.5
    text: |-
      Voor de dijktrajecten 208 tot en met 210 en 225 geldt ook de ten hoogste toelaatbare kans op niet-sluiten van de
      stormvloedkering per keer dat het noodzakelijk is die te sluiten, bedoeld in [bijlage II][ref1], onder B, kolom 5.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 2.0d.1
    text: Aan de omgevingswaarden voor de veiligheid van primaire waterkeringen wordt voldaan met ingang van 1 januari 2050.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0d
    machine_readable:
      definitions:
        deadline_waterkeringen: '2050-01-01'
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: peildatum
            type: date
            required: true
            description: De datum waarop wordt getoetst of aan de omgevingswaarden moet worden voldaan
        input:
          - name: voldoet_aan_omgevingswaarde_waterkering
            type: boolean
            description: Of de primaire waterkering voldoet aan de omgevingswaarde
            source: {}
        output:
          - name: verplichting_van_kracht
            type: boolean
            description: Of de verplichting om aan de omgevingswaarden te voldoen van kracht is (na 1 januari 2050)
          - name: voldoet_waterveiligheid
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarden voor waterveiligheid, rekening houdend met de deadline
        actions:
          - output: verplichting_van_kracht
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $peildatum
              value: $deadline_waterkeringen
          - output: voldoet_waterveiligheid
            value:
              operation: OR
              conditions:
                - operation: NOT
                  value: $verplichting_van_kracht
                - $voldoet_aan_omgevingswaarde_waterkering
  - number: 2.0d.2
    text: De omgevingswaarden voor de veiligheid van primaire waterkeringen zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0d
  - number: 2.0e.1
    text: |-
      Op het voldoen aan de omgevingswaarden voor de veiligheid van primaire waterkeringen, voor zover die niet in beheer
      zijn bij het Rijk, kan in het waterbeheerprogramma een uitzondering worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
  - number: 2.0e.2
    text: 'Het eerste lid geldt voor gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
  - number: 2.0e.2.a
    text: |-
      de maatregelen om te voldoen aan de omgevingswaarde staan geprogrammeerd op het onderdeel van het
      deltaprogramma, bedoeld in [artikel 4.9 van de Waterwet][ref1], dat de maatregelen bevat die Onze
      Minister van Infrastructuur en Waterstaat of waterschappen moeten treffen om een reden als bedoeld in
      [artikel 7.24, eerste lid, onder a, b of c, van die wet][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0025458#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0025458#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
    references:
      - id: ref1
        bwb_id: BWBR0025458
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0025458
        artikel: '7'
  - number: 2.0e.2.b
    text: het voldoen aan de omgevingswaarde onevenredig kostbaar is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
  - number: 2.0e.2.c
    text: |-
      door omstandigheden buiten de invloedssfeer van het algemeen bestuur van het waterschap de resultaten van de
      beoordeling van de veiligheid van de primaire waterkering zo wijzigen dat niet wordt of kan worden voldaan aan de
      omgevingswaarde; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
  - number: 2.0e.2.d
    text: |-
      ondanks de verrichte handelingen daartoe niet binnen een passende termijn is of kan worden voldaan aan de
      omgevingswaarde door de doorlooptijd van het treffen van maatregelen om te voldoen aan de omgevingswaarde.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0e
  - number: 2.0f.1
    text: |-
      Op het voldoen aan de omgevingswaarden voor de veiligheid van primaire waterkeringen kan in het nationale
      waterprogramma, als het gaat om een primaire waterkering in beheer bij het Rijk, een uitzondering worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0f
  - number: 2.0f.2
    text: |-
      Het eerste lid geldt voor gevallen als bedoeld in [artikel 2.0e, tweede lid, onder b, c en d][ref1], waarbij in
      onderdeel c in plaats van «het algemeen bestuur van het waterschap» wordt gelezen «Onze Minister van Infrastructuur
      en Waterstaat».


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0f
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.1.1
        afdeling: '2.1'
  - number: 2.0g
    text: |-
      Voor de veiligheid van andere dan primaire waterkeringen, als het gaat om waterkeringen die in beheer zijn bij
      het Rijk, genoemd in [bijlage II][ref1], onder 2, onder B, bij het Omgevingsbesluit, gelden de omgevingswaarden,
      bedoeld in [artikel 2.0i][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0g
    references:
      - id: ref1
        bwb_id: BWBR0041313
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.1.2
        afdeling: '2.1'
  - number: 2.0h
    text: |-
      De omgevingswaarden voor de veiligheid van andere dan primaire waterkeringen, voor zover die in beheer zijn bij het
      Rijk, gelden voor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0h
  - number: 2.0h.a
    text: dijktrajecten als bedoeld in bijlage IIa, onder A, waarvan de locaties bij ministeriële regeling zijn begrensd; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0h
  - number: 2.0h.b
    text: waterkerende kunstwerken in ingegraven delen van waterkeringen als bedoeld in bijlage IIa, onder A.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0h
  - number: 2.0i.1
    text: |-
      Voor dijktrajecten als bedoeld in bijlage IIa, onder A, geldt de gemiddelde overschrijdingskans per jaar van de
      hoogste hoogwaterstand waarop het dijktraject moet zijn berekend, bedoeld in bijlage IIa, onder B.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0i
  - number: 2.0i.2
    text: |-
      Voor waterkerende kunstwerken in ingegraven delen van waterkeringen als bedoeld in bijlage IIa, onder A, geldt de
      gemiddelde overschrijdingskans per jaar van de hoogste hoogwaterstand waarop het kunstwerk moet zijn berekend van
      1:100.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0i
  - number: 2.0j.1
    text: Aan de omgevingswaarden wordt voldaan met ingang van 1 januari 2032.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0j
  - number: 2.0j.2
    text: |-
      De omgevingswaarden voor de veiligheid van andere dan primaire waterkeringen, voor zover die in beheer zijn bij het
      Rijk, zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0j
  - number: 2.0k.1
    text: |-
      Op het voldoen aan de omgevingswaarden voor de veiligheid van andere dan primaire waterkeringen, voor zover die in
      beheer zijn bij het Rijk, kan in het nationale waterprogramma een uitzondering worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0k
  - number: 2.0k.2
    text: |-
      Het eerste lid geldt voor gevallen als bedoeld in [artikel 2.0e, tweede lid, onder b, c en d][ref1], waarbij in
      onderdeel c in plaats van «het algemeen bestuur van het waterschap» wordt gelezen «Onze Minister van Infrastructuur
      en Waterstaat».


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.0k
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.1.1
        afdeling: '2.1'
  - number: '2.1'
    text: |-
      Voor de kwaliteit van de buitenlucht gelden de omgevingswaarden, bedoeld in de
      [artikelen 2.3 tot en met 2.8a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 2.1a.1
    text: |-
      De omgevingswaarden, bedoeld in de [artikelen 2.3 tot en met 2.8][ref1], gelden bij 293 K en 101,3 kPa voor
      zwaveldioxide, stikstofdioxide, stikstofoxiden, benzeen, koolmonoxide en ozon en bij heersende temperatuur en druk
      voor PM en PM.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.1a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 2.1a.2
    text: |-
      Bij omgevingsplan of omgevingsverordening kan voor de kwaliteit van de buitenlucht een aanvullende omgevingswaarde
      of een afwijkende omgevingswaarde die strenger is dan de omgevingswaarden, bedoeld in het eerste lid, worden
      vastgesteld. Bij de vaststelling daarvan worden de economische effecten betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.1a
  - number: '2.2'
    text: |-
      De omgevingswaarden voor de kwaliteit van de buitenlucht, bedoeld in de [artikelen 2.3 tot en met 2.7][ref1], zijn
      niet van toepassing op een arbeidsplaats als bedoeld in artikel 2 van [Richtlijn 89/654/EEG](31989L0654) van de
      Raad van 30 november 1989 betreffende minimumvoorschriften inzake veiligheid en gezondheid voor arbeidsplaatsen
      (PbEG 1989, L 393) waartoe het publiek gewoonlijk geen toegang heeft.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 2.3.1
    text: 'Voor zwaveldioxide gelden de volgende ten hoogste toelaatbare concentraties:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_id
            type: string
            required: true
            description: Identificatie van de meetlocatie
        input:
          - name: so2_uurgemiddelde
            type: number
            description: Gemeten uurgemiddelde concentratie zwaveldioxide in µg/m³
            source: {}
          - name: so2_24uurgemiddelde
            type: number
            description: Gemeten 24-uurgemiddelde concentratie zwaveldioxide in µg/m³
            source: {}
          - name: so2_jaargemiddelde
            type: number
            description: Kalenderjaargemiddelde concentratie zwaveldioxide in µg/m³
            source: {}
          - name: so2_wintergemiddelde
            type: number
            description: Winterhalfjaargemiddelde concentratie zwaveldioxide in µg/m³ (1 okt - 31 mrt)
            source: {}
          - name: aantal_overschrijdingen_uur_so2
            type: number
            description: Aantal keren dat het uurgemiddelde van 350 µg/m³ is overschreden in het kalenderjaar
            source: {}
          - name: aantal_overschrijdingen_24uur_so2
            type: number
            description: Aantal keren dat het 24-uurgemiddelde van 125 µg/m³ is overschreden in het kalenderjaar
            source: {}
        output:
          - name: voldoet_uurgemiddelde_so2
            type: boolean
            description: >-
              Of wordt voldaan aan de omgevingswaarde voor het uurgemiddelde
              (max 350 µg/m³, max 24 overschrijdingen)
          - name: voldoet_24uurgemiddelde_so2
            type: boolean
            description: >-
              Of wordt voldaan aan de omgevingswaarde voor het
              24-uurgemiddelde (max 125 µg/m³, max 3 overschrijdingen)
          - name: voldoet_jaargemiddelde_so2
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarde voor het kalenderjaargemiddelde (max 20 µg/m³)
          - name: voldoet_wintergemiddelde_so2
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarde voor het winterhalfjaargemiddelde (max 20 µg/m³)
          - name: voldoet_omgevingswaarde_so2
            type: boolean
            description: Of wordt voldaan aan alle omgevingswaarden voor zwaveldioxide
        actions:
          - output: voldoet_uurgemiddelde_so2
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $so2_uurgemiddelde
                  value: 350
                - operation: LESS_THAN_OR_EQUAL
                  subject: $aantal_overschrijdingen_uur_so2
                  value: 24
          - output: voldoet_24uurgemiddelde_so2
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $so2_24uurgemiddelde
                  value: 125
                - operation: LESS_THAN_OR_EQUAL
                  subject: $aantal_overschrijdingen_24uur_so2
                  value: 3
          - output: voldoet_jaargemiddelde_so2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $so2_jaargemiddelde
              value: 20
          - output: voldoet_wintergemiddelde_so2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $so2_wintergemiddelde
              value: 20
          - output: voldoet_omgevingswaarde_so2
            value:
              operation: AND
              conditions:
                - $voldoet_uurgemiddelde_so2
                - $voldoet_24uurgemiddelde_so2
                - $voldoet_jaargemiddelde_so2
                - $voldoet_wintergemiddelde_so2
  - number: 2.3.1.a
    text: 350 μg/m3 als uurgemiddelde, dat ten hoogste 24 maal per kalenderjaar wordt overschreden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.1.b
    text: 125 μg/m3 als 24-uurgemiddelde, dat ten hoogste drie maal per kalenderjaar wordt overschreden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.1.c
    text: 20 μg/m3 als kalenderjaargemiddelde; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.1.d
    text: 20 μg/m3 als winterhalfjaargemiddelde, over de periode van 1 oktober tot en met 31 maart.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.2
    text: De omgevingswaarden voor zwaveldioxide zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3
    text: |-
      De omgevingswaarden, bedoeld in het eerste lid, aanhef en onder c en d, gelden op locaties met een oppervlakte van
      ten minste 1.000 km2 die zijn gelegen op een afstand van ten minste:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3.a
    text: 20 km van een bij ministeriële regeling aangewezen agglomeratie; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3.b
    text: '5 km van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3.b.1°
    text: een andere locatie met bebouwing;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3.b.2°
    text: een ippc-installatie of een andere milieubelastende installatie; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.3.3.b.3°
    text: een autosnelweg of autoweg waarvan per dag meer dan 50.000 motorvoertuigen gebruik maken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.3
  - number: 2.4.1
    text: 'Voor stikstofdioxide gelden de volgende ten hoogste toelaatbare concentraties:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.4
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_id
            type: string
            required: true
            description: Identificatie van de meetlocatie
        input:
          - name: no2_uurgemiddelde
            type: number
            description: Gemeten uurgemiddelde concentratie stikstofdioxide in µg/m³
            source: {}
          - name: no2_jaargemiddelde
            type: number
            description: Kalenderjaargemiddelde concentratie stikstofdioxide in µg/m³
            source: {}
          - name: aantal_overschrijdingen_uur_no2
            type: number
            description: Aantal keren dat het uurgemiddelde van 200 µg/m³ is overschreden in het kalenderjaar
            source: {}
        output:
          - name: voldoet_uurgemiddelde_no2
            type: boolean
            description: >-
              Of wordt voldaan aan de omgevingswaarde voor het uurgemiddelde
              (max 200 µg/m³, max 18 overschrijdingen)
          - name: voldoet_jaargemiddelde_no2
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarde voor het kalenderjaargemiddelde (max 40 µg/m³)
          - name: voldoet_omgevingswaarde_no2
            type: boolean
            description: Of wordt voldaan aan alle omgevingswaarden voor stikstofdioxide
        actions:
          - output: voldoet_uurgemiddelde_no2
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $no2_uurgemiddelde
                  value: 200
                - operation: LESS_THAN_OR_EQUAL
                  subject: $aantal_overschrijdingen_uur_no2
                  value: 18
          - output: voldoet_jaargemiddelde_no2
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $no2_jaargemiddelde
              value: 40
          - output: voldoet_omgevingswaarde_no2
            value:
              operation: AND
              conditions:
                - $voldoet_uurgemiddelde_no2
                - $voldoet_jaargemiddelde_no2
  - number: 2.4.1.a
    text: 200 μg/m3 uurgemiddelde, dat ten hoogste achttien maal per kalenderjaar wordt overschreden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.4
  - number: 2.4.1.b
    text: 40 μg/m3 als kalenderjaargemiddelde.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.4
  - number: 2.4.2
    text: Voor stikstofoxiden geldt een ten hoogste toelaatbare concentratie van 30 μg/m3 als kalenderjaargemiddelde.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.4
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_id
            type: string
            required: true
            description: Identificatie van de meetlocatie (locatie als bedoeld in artikel 2.3 lid 3)
        input:
          - name: nox_jaargemiddelde
            type: number
            description: Kalenderjaargemiddelde concentratie stikstofoxiden in µg/m³
            source: {}
        output:
          - name: voldoet_omgevingswaarde_nox
            type: boolean
            description: Of wordt voldaan aan de omgevingswaarde voor stikstofoxiden (max 30 µg/m³ jaargemiddelde)
        actions:
          - output: voldoet_omgevingswaarde_nox
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $nox_jaargemiddelde
              value: 30
  - number: 2.4.3
    text: De omgevingswaarden voor stikstofdioxide en stikstofoxiden zijn resultaatsverplichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.4
  - number: 2.4.4
    text: |-
      De omgevingswaarde voor stikstofoxiden, bedoeld in het tweede lid, geldt op locaties als bedoeld in
      [artikel 2.3, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
