  - number: 5.78n.1
    text: |-
      Een omgevingsplan dat de aanleg of een wijziging van een gemeenteweg, waterschapsweg of lokale spoorweg
      toelaat of dat regels bevat over een wijziging van het gebruik van een lokale spoorweg, kan erin voorzien
      dat het geluid op geluidgevoelige gebouwen hoger wordt dan de hoogste van de twee waarden, bedoeld in
      [artikel 5.78m, tweede lid][ref1], als:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78n
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78n.1.a
    text: geen geluidbeperkende maatregelen kunnen worden getroffen om aan de hoogste van de twee waarden te voldoen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78n
  - number: 5.78n.1.b
    text: |-
      de overschrijding van de hoogste van de twee waarden door het treffen van geluidbeperkende maatregelen zoveel
      mogelijk wordt beperkt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78n
  - number: 5.78n.1.c
    text: |-
      het geluid op geluidgevoelige gebouwen niet hoger is dan de grenswaarde, bedoeld in [tabel 3.35][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78n
    references:
