        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '5.103'
    text: |-
      Een omgevingsplan dat het exploiteren van een zuiveringtechnisch werk toelaat, bepaalt dat de waarden die op
      grond van de [artikelen 5.100, eerste en tweede lid][ref1], [5.101][ref2] en [5.102][ref3] in het omgevingsplan
      zijn opgenomen en de afstanden of andere regels die, in voorkomend geval, in aanvulling op die waarden in het
      omgevingsplan zijn opgenomen voor de geur door die activiteit, niet van toepassing zijn op de geur door het
      exploiteren van een zuiveringtechnisch werk waarvoor tot 1 januari 2011 een omgevingsvergunning op grond van
      [artikel 2.1, eerste lid, aanhef en onder e, van de Wet algemene bepalingen omgevingsrecht][ref4] in werking en
      onherroepelijk was op geurgevoelige gebouwen die:


