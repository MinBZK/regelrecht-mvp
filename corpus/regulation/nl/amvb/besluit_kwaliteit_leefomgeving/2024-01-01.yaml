  - number: 12.6.1
    text: |-
      In afwijking van de [artikelen 3.34 tot en met 3.40][ref1] is een geluidproductieplafond als bedoeld in
      [artikel 3.5 van de Aanvullingswet geluid Omgevingswet][ref2] de door provinciale staten berekende historische
      geluidproductie, die betrekking heeft op het kalenderjaar waarin het [Aanvullingsbesluit geluid Omgevingswet][ref3]
      in werking treedt, een kalenderjaar dat ten hoogste vijf jaar voor dat tijdstip ligt of op een middeling van
      meerdere van die kalenderjaren, op de daarvoor door hen aangegeven geluidreferentiepunten, verhoogd met 1,5 dB.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0043247#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0044679
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
    references:
      - id: ref1
