        hoofdstuk: '5'
        paragraaf: 5.1.3
        afdeling: '5.1'
  - number: 9.2.1
    text: |-
      Er wordt geen projectbesluit door een van Onze Ministers vastgesteld voor het uitvoeren van een project dat
      de kernkwaliteiten van de werelderfgoederen en erfgoederen op de Voorlopige Lijst werelderfgoed, bedoeld in
      [artikel 7.4, eerste lid][ref1], aantast.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.2'
  - number: 9.2.2
    text: |-
      In een projectbesluit dat door een van Onze Ministers wordt vastgesteld wordt rekening gehouden met de nader
      uitgewerkte kernkwaliteiten, bedoeld in [artikel 7.4, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.2
    references:
