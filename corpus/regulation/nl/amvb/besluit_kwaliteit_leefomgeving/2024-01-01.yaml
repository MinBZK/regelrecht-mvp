  - number: 5.97.2
    text: Een omgevingsplan als bedoeld in het eerste lid wijst een bebouwingscontour geur aan rond stedelijk gebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.97
  - number: 5.97.3
    text: |-
      In afwijking van het tweede lid kan stedelijk groen aan de rand van de bebouwing van stedelijk gebied of
      lintbebouwing langs wegen, waterwegen of waterkeringen binnen de bebouwingscontour worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.97
  - number: '5.98'
    text: |-
      Deze subparagraaf is van toepassing op de geur op een geurgevoelig gebouw door het exploiteren van een
      zuiveringtechnisch werk, bedoeld in [artikel 3.173 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.98
