        afdeling: '4.2'
      - id: ref10
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 11.33.1
    text: |-
      De bestuursorganen die op grond van de [artikelen 4.2, eerste lid, onder a][ref1], en
      [4.4, eerste lid, onder a, van het Omgevingsbesluit][ref2] bevoegd zijn een omgevingsvergunning voor een
      lozingsactiviteit op een oppervlaktewaterlichaam te verlenen, zijn belast met de uitvoering van de monitoring
      volgens het monitoringsprogramma voor krw-oppervlaktewaterlichamen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.33
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.33.2
    text: |-
      Gedeputeerde staten zijn belast met de uitvoering van de monitoring volgens het monitoringsprogramma voor
      grondwaterlichamen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.33
  - number: '11.34'
    text: |-
      Het college van burgemeester en wethouders, het dagelijks bestuur van een waterschap, gedeputeerde staten, Onze
      Minister voor Natuur en Stikstof en Onze Minister van Infrastructuur en Waterstaat verzamelen als gegevens de
      beschermde gebieden, bedoeld in bijlage IV bij de kaderrichtlijn water, voor zover die beschermde gebieden bij hen
      in beheer zijn. Voor beschermde gebieden die zijn aangewezen voor de onttrekking van voor menselijke consumptie
      bestemd water vindt de gegevensverzameling mede plaats overeenkomstig de artikelen 8, tweede lid, en 13, achtste
      lid, van de drinkwaterrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.34
  - number: '11.35'
    text: |-
      Het dagelijks bestuur van een waterschap, gedeputeerde staten en Onze Minister van Infrastructuur en Waterstaat
      verzamelen de benodigde gegevens voor het opstellen van stroomgebiedsbeheerplannen, bedoeld in [artikel 4.6][ref1],
      voor de watersystemen die bij hen in beheer zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.1
        afdeling: '4.2'
  - number: 11.36.1
    text: |-
      Het gemeentebestuur verzamelt de benodigde gegevens voor de analyses en beoordeling, bedoeld in artikel 5 van de
      kaderrichtlijn water, voor zover het gaat om de inzameling en het transport van stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.36
  - number: 11.36.2
    text: |-
      Het dagelijks bestuur van een waterschap, gedeputeerde staten en Onze Minister van Infrastructuur en Waterstaat
      verzamelen de benodigde gegevens voor de analyses en beoordeling, bedoeld in artikel 5 van de kaderrichtlijn water,
      voor de watersystemen die bij hen in beheer zijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.36
  - number: 11.36.3
    text: |-
      De bestuursorganen, bedoeld in het eerste lid, verrichten de analyses en beoordeling, bedoeld in artikel 5 van de
      kaderrichtlijn water, voor hun aandeel.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.36
  - number: '11.37'
    text: |-
      Het dagelijks bestuur van een waterschap, gedeputeerde staten en Onze Minister van Infrastructuur
      en Waterstaat verzamelen gegevens over de voortgang van de uitvoering van de maatregelen, bedoeld in
      de [artikelen 4.3, eerste lid, aanhef en onder a][ref1], [4.4, derde lid, aanhef en onder a][ref2],
      [4.10, derde lid, aanhef en onder a][ref3], en [6.1][ref4], voor de watersystemen die bij hen in beheer zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.1
        afdeling: '4.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.1
        afdeling: '4.2'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.1
        afdeling: '4.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '6'
        hoofdstuk: '6'
  - number: 11.38.1
    text: Door monitoring wordt bewaakt de milieutoestand van de Nederlandse mariene wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.38
  - number: 11.38.2
    text: Monitoring vindt plaats door metingen, bemonsteringen, tellen of het op andere wijze verzamelen van gegevens.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.38
  - number: 11.38.3
    text: |-
      Ter voorbereiding van het programma van maatregelen mariene strategie en ter uitvoering van het eerste en tweede
      lid stelt Onze Minister van Infrastructuur en Waterstaat, in overeenstemming met Onze Minister voor Natuur en
      Stikstof, het monitoringsprogramma, bedoeld in artikel 11, eerste en tweede lid, van de kaderrichtlijn mariene
      strategie, vast.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.38
  - number: 11.38.4
    text: |-
      Onze Minister van Infrastructuur en Waterstaat, in overeenstemming met Onze Minister voor Natuur en Stikstof, is
      belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.38
  - number: '11.39'
    text: |-
      Het bevoegd gezag dat de zorg heeft voor een zuiveringtechnisch werk verzamelt gegevens over de stand van zaken van
      de inzameling, het transport en de behandeling van stedelijk afvalwater en de afvoer van slib.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.39
  - number: 11.40.1
    text: |-
      Er zijn een of meer registers van de beschermde gebieden, bedoeld in [artikel 11.34][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.40
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.40.2
    text: |-
      Het register wordt of de registers worden beheerd door Onze Minister van Infrastructuur en Waterstaat in
      overeenstemming met artikel 6 van de kaderrichtlijn water.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.40
  - number: 11.40.3
    text: Het register wordt voortdurend geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.40
  - number: '11.41'
    text: |-
      Het dagelijks bestuur van een waterschap, gedeputeerde staten en Onze Minister van Infrastructuur en Waterstaat
      stellen een verslag op over de resultaten van de monitoring van de andere parameters voor waterkwaliteit, bedoeld
      in [artikel 11.27][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.41
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: '11.42'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt een verslag op over de stand van zaken van de
      inzameling, het transport en de behandeling van stedelijk afvalwater en de afvoer van slib, bedoeld in
      [artikel 11.39][ref1], die door het bevoegd gezag dat de zorg heeft voor een zuiveringtechnisch werk op grond van
      [artikel 10.35, eerste lid, van het Omgevingsbesluit][ref2] zijn verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.42
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.43.1
    text: |-
      De monitoring voor de omgevingswaarde voor zwemlocaties, bedoeld in [artikel 2.19][ref1], vindt plaats door het
      bemonsteren, meten, berekenen en analyseren van de percentielwaarden intestinale enterokokken en escherichia coli
      volgens bij ministeriële regeling gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.3
        afdeling: '2.2'
  - number: 11.43.2
    text: |-
      De beheerder van het oppervlaktewaterlichaam waarin de zwemlocatie is gelegen, is belast met de uitvoering van
      de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.43
  - number: 11.44.1
    text: 'In een zwemlocatie worden door monitoring bewaakt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.1.a
    text: de mogelijke overmatige groei van cyanobacteriën;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.1.b
    text: de neiging tot overmatige groei van macroalgen of marien fytoplankton; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.1.c
    text: zwemwaterverontreinigingen door teerachtige residuen, glas, plastic, rubber of ander afval.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.2
    text: |-
      Monitoring van de mogelijke overmatige groei van cyanobacteriën vindt plaats in overeenstemming met het
      Blauwalgenprotocol.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.3
    text: |-
      Monitoring van zwemwaterverontreinigingen als bedoeld in het eerste lid, aanhef en onder c, vindt plaats door
      visuele inspectie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.44.4
    text: |-
      De beheerder van het oppervlaktewaterlichaam waarin de zwemlocatie is gelegen, is belast met de uitvoering van
      de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.44
  - number: 11.45.1
    text: |-
      Monitoring voor geluidproductieplafonds als omgevingswaarden vindt plaats door het geluid op geluidreferentiepunten
      te berekenen volgens bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.2
    text: |-
      Voor de beoordeling of aan de voor een weg of spoorweg geldende geluidproductieplafonds als omgevingswaarden
      wordt voldaan, wordt een geluidbeperkende maatregel bestaande uit een werk of bouwwerk alleen betrokken als deze
      onderdeel is van de geluidbrongegevens behorende bij het geluidproductieplafond en aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.3
    text: |-
      Voor de beoordeling of aan de voor een industrieterrein geldende geluidproductieplafonds als omgevingswaarden wordt
      voldaan, wordt een werk of bouwwerk alleen betrokken als dat aanwezig is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.4
    text: 'De volgende bestuursorganen of instanties zijn belast met de uitvoering van de monitoring:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.4.a
    text: het college van burgemeester en wethouders voor industrieterreinen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.4.b
    text: gedeputeerde staten voor bij omgevingsverordening aangewezen wegen, lokale spoorwegen en industrieterreinen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.4.c
    text: Onze Minister van Infrastructuur en Waterstaat voor bij ministeriële regeling aangewezen wegen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
  - number: 11.45.4.d
    text: |-
      de beheerder, bedoeld in [artikel 1, eerste lid, van de Spoorwegwet][ref1], voor bij ministeriële regeling
      aangewezen hoofdspoorwegen.


      [ref1]: https://wetten.overheid.nl/BWBR0015007#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.45
    references:
      - id: ref1
        bwb_id: BWBR0015007
        artikel: '1'
  - number: 11.47.1
    text: |-
      Door monitoring wordt bewaakt het verschil tussen de geluidemissie in L en de basisgeluidemissie van gemeentewegen,
      waterschapswegen en lokale spoorwegen, voor zover deze niet bij omgevingsverordening zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.2
    text: 'Het verschil tussen de geluidemissie en de basisgeluidemissie wordt berekend voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.2.a
    text: wegen met een verkeersintensiteit van 4.500 of meer motorvoertuigen per etmaal; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verkeersintensiteit_mvt_per_etmaal
            type: number
            required: true
            description: Verkeersintensiteit in motorvoertuigen per etmaal
            source: {}
        output:
          - name: berekening_geluidemissie_verplicht
            type: boolean
            description: Of het verschil tussen geluidemissie en basisgeluidemissie moet worden berekend (niet geschat)
        actions:
          - output: berekening_geluidemissie_verplicht
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $verkeersintensiteit_mvt_per_etmaal
              value: 4500
  - number: 11.47.2.b
    text: lokale spoorwegen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.3
    text: |-
      Het verschil tussen de geluidemissie en de basisgeluidemissie wordt berekend of geschat voor wegen met een
      verkeersintensiteit van minder dan 4.500 motorvoertuigen per etmaal.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.4
    text: 'De volgende bestuursorganen zijn belast met de uitvoering van de monitoring:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.4.a
    text: |-
      het college van burgemeester en wethouders voor gemeentewegen en lokale spoorwegen, voor zover deze niet bij
      omgevingsverordening zijn aangewezen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.4.b
    text: het dagelijks bestuur van het waterschap voor waterschapswegen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: 11.47.5
    text: |-
      Op het berekenen van de geluidemissie en het schatten van het verschil tussen de geluidemissie en de
      basisgeluidemissie zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.47
  - number: '11.48'
    text: |-
      Voor de uitvoering van de monitoring verzamelen het college van burgemeester en wethouders en het dagelijks bestuur
      van een waterschap in ieder geval geluidbrongegevens en daarop betrekking hebbende gegevens.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.48
  - number: 11.49.1
    text: 'Gedeputeerde staten houden bij:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.49
  - number: 11.49.1.a
    text: |-
      op welke wegen of delen van wegen, niet zijnde wegen in beheer bij het Rijk, naar verwachting in het daaropvolgende
      kalenderjaar meer dan drie miljoen maal een voertuig zal passeren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.49
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verwacht_aantal_voertuigpassages_per_jaar
            type: number
            required: true
            description: Verwacht aantal voertuigpassages per jaar
            source: {}
          - name: weg_in_beheer_bij_rijk
            type: boolean
            required: true
            description: Of de weg in beheer is bij het Rijk
            source: {}
        output:
          - name: belangrijke_weg_omgevingslawaai
            type: boolean
            description: Of de weg kwalificeert als belangrijke weg voor omgevingslawaai
        actions:
          - output: belangrijke_weg_omgevingslawaai
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $weg_in_beheer_bij_rijk
                    value: true
                - operation: GREATER_THAN
                  subject: $verwacht_aantal_voertuigpassages_per_jaar
                  value: 3000000
  - number: 11.49.1.b
    text: |-
      op welke spoorwegen of delen van spoorwegen, niet zijnde hoofdspoorwegen of spoorwegen die zijn gelegen in een bij
      ministeriële regeling aangewezen agglomeratie, naar verwachting in het daaropvolgende kalenderjaar meer dan 30.000
      maal een trein zal passeren; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.49
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verwacht_aantal_treinpassages_per_jaar
            type: number
            required: true
            description: Verwacht aantal treinpassages per jaar
            source: {}
          - name: is_hoofdspoorweg
            type: boolean
            required: true
            description: Of het een hoofdspoorweg betreft
            source: {}
          - name: gelegen_in_aangewezen_agglomeratie
            type: boolean
            required: true
            description: Of de spoorweg is gelegen in een bij ministeriele regeling aangewezen agglomeratie
            source: {}
        output:
          - name: belangrijke_spoorweg_omgevingslawaai
            type: boolean
            description: Of de spoorweg kwalificeert als belangrijke spoorweg voor omgevingslawaai
        actions:
          - output: belangrijke_spoorweg_omgevingslawaai
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $is_hoofdspoorweg
                    value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $gelegen_in_aangewezen_agglomeratie
                    value: true
                - operation: GREATER_THAN
                  subject: $verwacht_aantal_treinpassages_per_jaar
                  value: 30000
  - number: 11.49.1.c
    text: |-
      op welke burgerluchthavens van regionale betekenis naar verwachting in het daaropvolgende kalenderjaar meer dan
      50.000 vliegtuigbewegingen zullen plaatsvinden, oefenvluchten met lichte vliegtuigen niet meegerekend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.49
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verwacht_aantal_vliegtuigbewegingen_per_jaar
            type: number
            required: true
            description: Verwacht aantal vliegtuigbewegingen per jaar (exclusief oefenvluchten met lichte vliegtuigen)
            source: {}
        output:
          - name: belangrijke_burgerluchthaven_omgevingslawaai
            type: boolean
            description: >-
              Of de burgerluchthaven van regionale betekenis
              kwalificeert als belangrijke luchthaven voor
              omgevingslawaai
        actions:
          - output: belangrijke_burgerluchthaven_omgevingslawaai
            value:
              operation: GREATER_THAN
              subject: $verwacht_aantal_vliegtuigbewegingen_per_jaar
              value: 50000
  - number: 11.49.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat houdt bij op welke overige burgerluchthavens van nationale betekenis
      naar verwachting in het daaropvolgende kalenderjaar meer dan 50.000 vliegtuigbewegingen zullen plaatsvinden,
      oefenvluchten met lichte vliegtuigen niet meegerekend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.49
  - number: 11.50.1
    text: |-
      Het college van burgemeester en wethouders van een gemeente die behoort tot een bij ministeriële regeling
      aangewezen agglomeratie verzamelt gegevens over de geluidbelasting in L en in L door:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.1.a
    text: |-
      wegen en spoorwegen als bedoeld in [artikel 3.6, eerste lid, onder a en b, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 11.50.1.b
    text: |-
      luchthavens als bedoeld in [artikel 3.6, eerste lid, onder c, van de wet][ref1], voor zover de geluidbelasting
      binnen de gemeente meer is dan 55 L of 50 L; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 11.50.1.c
    text: |-
      een activiteit of een samenstel van activiteiten als bedoeld in
      [artikel 3.6, eerste lid, onder d, van de wet][ref1], voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 11.50.1.c.1°
    text: |-
      activiteiten die worden verricht op een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden zijn
      vastgesteld, voor zover het geluid door dat industrieterrein meer is dan 55 L of 50 L;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.1.c.2°
    text: |-
      activiteiten in een gebied waarvoor in het omgevingsplan voor het langtijdgemiddelde
      beoordelingsniveau L van geluid een hogere waarde is vastgesteld dan de standaardwaarden, bedoeld in
      [artikel 5.65, eerste lid, aanhef en onder a, tweede, derde, of vierde lid][ref1], voor zover de geluidbelasting
      door die activiteiten op omliggende geluidgevoelige gebouwen meer kan zijn dan 55 L of 50 L; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 11.50.1.c.3°
    text: |-
      activiteiten buiten een gebied als bedoeld onder 2° voor zover de ten hoogste toegelaten geluidbelasting door die
      activiteiten meer is dan 55 L of 50 L.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.2
    text: |-
      Gedeputeerde staten verzamelen gegevens over de geluidbelasting in L en in L door de belangrijke
      wegen, belangrijke spoorwegen en belangrijke burgerluchthavens van regionale betekenis die op grond van
      [artikel 10.40, tweede lid, onder a, van het Omgevingsbesluit][ref1] zijn gepubliceerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.50.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat verzamelt gegevens over de geluidbelasting in L en in L door
      de wegen en spoorwegen, bedoeld in [artikel 3.9, eerste lid, onder b, onder 1° en 2°, van de wet][ref1],
      de luchthaven Schiphol, bedoeld in artikel 3.9, eerste lid, onder b, onder 3°, van de
      wet, en de belangrijke overige burgerluchthavens van nationale betekenis die op grond van
      [artikel 10.40, tweede lid, onder b, van het Omgevingsbesluit][ref2] zijn gepubliceerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.50.4
    text: 'De gegevensverzameling vindt plaats door berekening van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.4.a
    text: |-
      de geluidbelasting in L en in L door de geluidbronnen, bedoeld in het eerste tot en met derde lid, in het
      kalenderjaar voorafgaand aan dat van de vaststelling van een geluidbelastingkaart; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.4.b
    text: |-
      het aantal geluidgevoelige gebouwen en bewoners van woningen dat aan bij ministeriële regeling vastgestelde waarden
      van de geluidbelasting in L en in L wordt blootgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.50.5
    text: |-
      Op het berekenen van de geluidbelasting in L en in L zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.50
  - number: 11.51.1
    text: Er is een landelijk geluidregister.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.51
  - number: 11.51.2
    text: Het geluidregister wordt beheerd door Onze Minister van Infrastructuur en Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.51
  - number: 11.51.3
    text: Het geluidregister is voor een ieder langs elektronische weg toegankelijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.51
  - number: 11.52.1
    text: 'Het geluidregister bevat in ieder geval de volgende gegevens:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a
    text: 'voor het geluid door wegen, spoorwegen en industrieterreinen met geluidproductieplafonds als omgevingswaarden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.1°
    text: de waarde van het geluidproductieplafond;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.2°
    text: een aanduiding van het besluit waarmee het geluidproductieplafond is vastgesteld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.3°
    text: de ligging van het geluidreferentiepunt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.4°
    text: de geluidbrongegevens;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.5°
    text: het geluidaandachtsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.a.6°
    text: |-
      het geluid op een geluidreferentiepunt, bedoeld in [artikel 11.45, eerste lid][ref1], over elk kalenderjaar;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 11.52.1.a.7°
    text: voor wegen en spoorwegen, het kalenderjaar waar de geluidbrongegevens betrekking op hebben;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.b
    text: 'voor het geluid door wegen en spoorwegen met een basisgeluidemissie:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.b.1°
    text: de waarde van de basisgeluidemissie per weg, spoorweg of gedeelte daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.b.2°
    text: de geluidbrongegevens;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.b.3°
    text: het geluidaandachtsgebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.b.4°
    text: |-
      het verschil tussen de geluidemissie in L en de basisgeluidemissie, bedoeld in [artikel 11.47][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 11.52.1.b.5°
    text: het kalenderjaar waar de geluidbrongegevens betrekking op hebben;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.c
    text: |-
      voor het geluid door luchtvaart: de 48 L geluidcontour, de 20 Kosteneenheden geluidcontour en de binnen die
      contouren gelegen 1 L geluidcontouren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.d
    text: 'voor het geluid door een windturbine of een windpark op een industrieterrein: de geluidbrongegevens; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.e
    text: |-
      voor het geluid door een civiele buitenschietbaan, een militaire buitenschietbaan of een militair springterrein op
      een industrieterrein:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.e.1°
    text: het gebied waarbinnen dat geluid hoger is dan 50 B; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.1.e.2°
    text: de binnen die contouren gelegen 1 B-geluidcontouren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.52.2
    text: |-
      De gegevens, bedoeld in het eerste lid, onder a, onder 4°, zijn niet herleidbaar tot
      activiteiten als het gaat om informatie die is aangemerkt als staatsgeheim als bedoeld in het
      [Besluit Voorschrift Informatiebeveiliging Rijksdienst Bijzondere Informatie 2013 (VIRBI 2013)][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0033507
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
    references:
      - id: ref1
        bwb_id: BWBR0033507
  - number: 11.52.3
    text: |-
      De gegevens, bedoeld in het eerste lid, worden na ontvangst door Onze Minister van Infrastructuur en Waterstaat
      onverwijld in het geluidregister opgenomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.52
  - number: 11.53.1
    text: |-
      Het college van burgemeester en wethouders van een gemeente die behoort tot een bij ministeriële
      regeling aangewezen agglomeratie stelt geluidbelastingkaarten vast voor de geluidbronnen, bedoeld in
      [artikel 11.50, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 11.53.2
    text: |-
      Gedeputeerde staten stellen geluidbelastingkaarten vast voor de geluidbronnen, bedoeld in
      [artikel 11.50, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 11.53.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt geluidbelastingkaarten vast voor de geluidbronnen, bedoeld in
      [artikel 11.50, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: '11.54'
    text: |-
      Geluidbelastingkaarten verbeelden in ieder geval de gegevens, bedoeld in [artikel 11.50, vierde lid][ref1], en
      stille gebieden als bedoeld in de [artikelen 4.23, tweede lid][ref2], en [4.24, tweede lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.54
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.3'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.3'
  - number: '11.55'
    text: |-
      Voor de toepassing van [paragraaf 11.2.6][ref1] wordt verstaan onder: - *bevoegd gezag:* bestuursorgaan als bedoeld
      in [artikel 11.56][ref2];
        - *activiteit:* activiteit als bedoeld in bijlage I bij de PRTR-verordening.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.55
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
  - number: '11.56'
    text: |-
      Als instantie als bedoeld in artikel 2, onder 2, van de PRTR-verordening wordt aangewezen het bestuursorgaan dat
      bevoegd is te beslissen op de aanvraag om een omgevingsvergunning voor een milieubelastende activiteit als bedoeld
      in bijlage I bij die verordening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.56
  - number: 11.57.1
    text: |-
      Het bevoegd gezag beoordeelt de kwaliteit van het PRTR-verslag uiterlijk op 30 juni van het kalenderjaar volgend op
      het verslagjaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verslagjaar
            type: number
            required: true
            description: Het verslagjaar van het PRTR-verslag
            source: {}
        output:
          - name: uiterste_beoordelingsdatum_prtr
            type: date
            description: Uiterste datum waarop het bevoegd gezag de kwaliteit van het PRTR-verslag moet beoordelen
        actions:
          - output: uiterste_beoordelingsdatum_prtr
            value:
              operation: DATE
              year:
                operation: ADD
                values:
                  - $verslagjaar
                  - 1
              month: 6
              day: 30
  - number: 11.57.2
    text: |-
      Het bevoegd gezag kan uiterlijk op de datum, bedoeld in het eerste lid, verklaren dat het PRTR-verslag niet voldoet
      aan [artikel 5.10][ref1], [5.12][ref2] of [5.13 van het Besluit activiteiten leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '5'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '5'
  - number: 11.57.3
    text: Het bevoegd gezag kan de afgifte van de verklaring voor ten hoogste drie maanden uitstellen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
  - number: 11.57.4
    text: |-
      Het bevoegd gezag kan na de datum, bedoeld in het eerste lid, of, als toepassing is gegeven aan het derde lid,
      na de datum die met toepassing daarvan is vastgesteld, alsnog verklaren dat het PRTR-verslag niet voldoet aan de
      eisen, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
  - number: 11.57.4.a
    text: het verslag onjuiste of onvolledige gegevens bevat; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
  - number: 11.57.4.b
    text: het verslag op een andere manier onjuist is en degene die het verslag heeft ingediend dat weet of behoort te weten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
  - number: 11.57.5
    text: De bevoegdheid, bedoeld in het vierde lid, vervalt vijf jaar na afloop van het verslagjaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.57
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verslagjaar
            type: number
            required: true
            description: Het verslagjaar waarover het PRTR-verslag gaat
            source: {}
        output:
          - name: vervaldatum_bevoegdheid_verklaring
            type: date
            description: Datum waarop de bevoegdheid tot het alsnog afgeven van een verklaring vervalt
        actions:
          - output: vervaldatum_bevoegdheid_verklaring
            value:
              operation: DATE
              year:
                operation: ADD
                values:
                  - $verslagjaar
                  - 6
              month: 1
              day: 1
  - number: '11.58'
    text: |-
      Als niet tijdig een PRTR-verslag is ingediend, kan het bevoegd gezag uiterlijk op 30 september van het kalenderjaar
      volgend op het verslagjaar verklaren dat geen PRTR-verslag is ingediend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.58
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: verslagjaar
            type: number
            required: true
            description: Het verslagjaar waarover geen PRTR-verslag is ingediend
            source: {}
        output:
          - name: uiterste_datum_verklaring_geen_prtr
            type: date
            description: Uiterste datum waarop het bevoegd gezag kan verklaren dat geen PRTR-verslag is ingediend
        actions:
          - output: uiterste_datum_verklaring_geen_prtr
            value:
              operation: DATE
              year:
                operation: ADD
                values:
                  - $verslagjaar
                  - 1
              month: 9
              day: 30
  - number: '11.59'
    text: |-
      Een verklaring als bedoeld in [artikel 11.57, tweede of vierde lid][ref1], of [11.58][ref2] treedt in werking
      met ingang van de dag waarop vier weken zijn verstreken sinds de dag waarop die verklaring is bekendgemaakt. Als
      gedurende die termijn bij de bevoegde rechter een verzoek om voorlopige voorziening is gedaan, treedt de verklaring
      niet in werking voordat op dat verzoek is beslist.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.59
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.6
        afdeling: '11.2'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: datum_bekendmaking_verklaring
            type: date
            required: true
            description: Datum waarop de verklaring is bekendgemaakt
            source: {}
          - name: verzoek_voorlopige_voorziening_ingediend
            type: boolean
            required: true
            description: Of gedurende de vier weken termijn een verzoek om voorlopige voorziening is ingediend
            source: {}
          - name: datum_beslissing_voorlopige_voorziening
            type: date
            required: false
            description: Datum waarop op het verzoek om voorlopige voorziening is beslist
            source: {}
        output:
          - name: datum_inwerkingtreding_verklaring
            type: date
            description: Datum waarop de verklaring in werking treedt
        actions:
          - output: datum_inwerkingtreding_verklaring
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $verzoek_voorlopige_voorziening_ingediend
                    value: true
                  then: $datum_beslissing_voorlopige_voorziening
              default:
                operation: DATE_ADD
                date: $datum_bekendmaking_verklaring
                weeks: 4
  - number: 11.60.1
    text: |-
      Het bevoegd gezag kan, op verzoek van degene die de activiteit verricht of ambtshalve, beslissen dat bepaalde
      in een PRTR-verslag opgenomen gegevens niet aan Onze Minister van Infrastructuur en Waterstaat worden verstrekt.
      [Artikel 5.1 van de Wet open overheid][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.60
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 11.60.2
    text: |-
      Een ambtshalve besluit als bedoeld in het eerste lid wordt uiterlijk op 30 september van het kalenderjaar volgend
      op het verslagjaar genomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.60
  - number: 11.60.3
    text: |-
      Een besluit als bedoeld in het eerste lid treedt in werking met ingang van de dag waarop vier weken zijn verstreken
      sinds de dag waarop het besluit is bekendgemaakt. Als gedurende die termijn bij de bevoegde rechter een verzoek om
      voorlopige voorziening is gedaan, treedt het besluit niet in werking voordat op dat verzoek is beslist.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.60
  - number: '11.61'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat verzamelt gegevens over emissies van verontreinigende stoffen uit
      diffuse bronnen als bedoeld in artikel 2, aanhef en onder 9, van het PRTR-protocol, voor zover het opnemen van die
      gegevens in het PRTR uitvoerbaar is. De gegevens omvatten ook informatie over de methode die is toegepast om de
      gegevens te verzamelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.61
  - number: 11.62.1
    text: Er is een PRTR dat gegevens bevat over de uitstoot en overbrenging van verontreinigende stoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.62
  - number: 11.62.2
    text: |-
      Het PRTR wordt beheerd door Onze Minister van Infrastructuur en Waterstaat in overeenstemming met artikel 5 van het
      PRTR-protocol.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.62
  - number: 11.62.3
    text: Het PRTR is voor een ieder langs elektronische weg toegankelijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.62
  - number: 11.63.1
    text: 'Het PRTR bevat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
  - number: 11.63.1.a
    text: |-
      de in overeenstemming met [artikel 10.44 van het Omgevingsbesluit][ref1] aan Onze Minister van Infrastructuur en
      Waterstaat verstrekte gegevens en gemelde verklaringen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.63.1.b
    text: |-
      de in overeenstemming met artikel 11.61 verzamelde gegevens over emissies van verontreinigende stoffen vanuit
      diffuse bronnen, voor zover die gegevens een voldoende mate van ruimtelijke detaillering bezitten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
  - number: 11.63.2
    text: |-
      Als in het PRTR gegevens over emissies van verontreinigende stoffen vanuit diffuse bronnen worden opgenomen, wordt
      ook de methode aangegeven waarmee die gegevens zijn verzameld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
  - number: 11.63.3
    text: |-
      Als het bevoegd gezag in het PRTR-verslag opgenomen gegevens met toepassing van
      [artikel 10.45 van het Omgevingsbesluit][ref1] niet aan Onze Minister van Infrastructuur en Waterstaat heeft
      verstrekt, bevat het PRTR:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.63.3.a
    text: het type informatie dat geheim is gehouden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
  - number: 11.63.3.b
    text: |-
      in een geval als bedoeld in [artikel 10.45, derde lid, van het Omgevingsbesluit][ref1]: de naam van de groep
      verontreinigende stoffen waartoe de geheimgehouden verontreinigende stof behoort;


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.63.3.c
    text: |-
      de uitzonderingsgrond uit [artikel 5.1 van de Wet open overheid][ref1] op grond waarvan tot geheimhouding is
      besloten; en


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 11.63.3.d
    text: de samenvatting van de motivering van de beslissing waarbij tot geheimhouding is besloten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.63
  - number: '11.64'
    text: |-
      Het college van burgemeester en wethouders en, voor zover een rijksmonument of een voorbeschermd rijksmonument
      is gelegen buiten het provinciaal en gemeentelijk ingedeeld gebied, Onze Minister van Onderwijs, Cultuur en
      Wetenschap, verzamelen de volgende gegevens over omgevingsvergunningen voor een rijksmonumentenactiviteit:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.64
  - number: 11.64.a
    text: de datum van de omgevingsvergunning;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.64
  - number: 11.64.b
    text: het kenmerk van de omgevingsvergunning;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.64
  - number: 11.64.c
    text: |-
      de locatie van het rijksmonument of voorbeschermd rijksmonument waarop de omgevingsvergunning betrekking heeft en
      de relevante kadastrale gegevens van die locatie; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.64
  - number: 11.64.d
    text: de aard van de activiteit waarvoor de omgevingsvergunning is verleend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.64
  - number: 11.65.1
    text: Er zijn registers over omgevingsvergunningen voor een rijksmonumentenactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.65
  - number: 11.65.2
    text: |-
      Een register als bedoeld in het eerste lid wordt beheerd door het college van burgemeester en wethouders of, als
      een rijksmonument of een voorbeschermd rijksmonument is gelegen buiten het provinciaal en gemeentelijk ingedeeld
      gebied, door Onze Minister van Onderwijs, Cultuur en Wetenschap.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.65
  - number: 11.65.3
    text: De registers zijn openbaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.65
  - number: 11.65.4
    text: |-
      De registers bevatten in ieder geval de gegevens, bedoeld in [artikel 11.64][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.65
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
  - number: 11.65.5
    text: |-
      De gegevens, bedoeld in [artikel 11.64][ref1], worden in het register opgenomen binnen een week na de dag waarop de
      omgevingsvergunning is verleend.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.65
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.3.1
        afdeling: '11.3'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: datum_verlening_omgevingsvergunning
            type: date
            required: true
            description: Datum waarop de omgevingsvergunning is verleend
            source: {}
        output:
          - name: uiterste_datum_opname_register
            type: date
            description: Uiterste datum waarop de gegevens in het register moeten worden opgenomen
        actions:
          - output: uiterste_datum_opname_register
            value:
              operation: DATE_ADD
              date: $datum_verlening_omgevingsvergunning
              weeks: 1
  - number: 11.66.1
    text: |-
      Door monitoring worden bewaakt de emissies van de broeikasgassen, bedoeld in bijlage V, deel 2, bij de verordening
      governance van de energie-unie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.66
  - number: 11.66.2
    text: |-
      Monitoring vindt plaats door het voor die broeikasgassen opstellen van de broeikasgasinventarissen, bedoeld in
      artikel 26 van de verordening governance van de energie-unie, en het nationale inventarisatiesysteem, bedoeld in
      artikel 37 van die verordening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.66
  - number: 11.66.3
    text: Onze Minister voor Klimaat en Energie is belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.66
  - number: 11.67.1
    text: 'Door monitoring worden bewaakt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.1.a
    text: 'de staat van instandhouding van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.1.a.1°
    text: |-
      de vogelsoorten, genoemd in bijlage I bij de vogelrichtlijn, en de niet in die bijlage genoemde, geregeld in
      Nederland voorkomende trekvogelsoorten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.1.a.2°
    text: de natuurlijke habitats en de habitats van soorten, genoemd in de bijlagen I en II bij de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.1.a.3°
    text: de dier- en plantensoorten, genoemd in de bijlagen IV en V bij de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.1.b
    text: |-
      de voortgang van de inspanningen voor het bereiken van de doelstellingen uit de vogelrichtlijn en de
      habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.2
    text: |-
      Onze Minister voor Natuur en Stikstof is belast met de uitvoering van de monitoring van de staat van instandhouding
      van de habitats en soorten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.67.3
    text: |-
      Onze Minister voor Natuur en Stikstof en gedeputeerde staten gezamenlijk zijn belast met de monitoring van de
      voortgang van de inspanningen voor het bereiken van de doelstellingen uit de vogelrichtlijn en de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.67
  - number: 11.68.1
    text: |-
      Monitoring voor de omgevingswaarden voor stikstofdepositie, bedoeld in
      [artikel 2.15a, eerste lid, van de wet][ref1], vindt plaats door metingen, berekeningen of het op andere wijze
      verzamelen van gegevens.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.68
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 11.68.2
    text: Onze Minister voor Natuur en Stikstof is belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.68
  - number: 11.69.1
    text: |-
      De bestuursorganen die zijn belast met de uitvoering van de maatregelen, opgenomen in het programma
      stikstofreductie en natuurverbetering, verzamelen gegevens over de voortgang en de gevolgen van die maatregelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69
  - number: 11.69.2
    text: |-
      De bestuursorganen die verantwoordelijk zijn voor de vaststelling van het beheerplan, bedoeld in de
      [artikelen 3.8, derde lid][ref1], en [3.9, derde lid, van de wet][ref2], verzamelen gegevens over de ontwikkeling
      van de staat van instandhouding van de voor stikstof gevoelige habitats in Natura 2000-gebieden in relatie tot de
      instandhoudingsdoelstellingen voor die gebieden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 11.69a
    text: |-
      Onze Minister voor Natuur en Stikstof verzamelt gegevens, ook op basis van de gegevens, bedoeld in
      [artikel 10.36da van het Omgevingsbesluit][ref1], over de mate waarin wordt voldaan aan de tussentijdse
      doelstellingen, bedoeld in [artikel 4.27, tweede lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69a
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.4.2
        afdeling: '4.4'
  - number: 11.69b
    text: |-
      Gedeputeerde staten verzamelen voor elke voor stikstof gevoelige habitat in de Natura 2000-gebieden in de betrokken
      provincie in ieder geval de volgende gegevens voor de gebiedsgerichte uitwerking van de landelijke omgevingswaarde
      en het programma stikstofreductie en natuurverbetering:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.a
    text: 'voor zover het programma niet meer actueel is:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.a.1°
    text: |-
      de omvang van de stikstofdepositie en de bronnen daarvan, onderscheiden naar de belangrijkste sectoren en naar de
      afkomst van binnen en buiten de provincie, en de mate waarin de kritische depositiewaarde wordt overschreden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.a.2°
    text: |-
      de verwachte autonome ontwikkeling van de stikstofemissie door bronnen binnen en buiten de betrokken Natura 2000-
      gebieden en de gevolgen daarvan voor de omvang van stikstofdepositie in de voor stikstof gevoelige habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.b
    text: |-
      de binnen en buiten de betrokken Natura 2000-gebieden in de provincie getroffen of te treffen maatregelen die
      bijdragen aan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.b.1°
    text: |-
      het verminderen van de stikstofdepositie met het oog op het tijdig voldoen aan de omgevingswaarden voor
      stikstofdepositie, bedoeld in [artikel 2.15a, eerste lid, van de wet][ref1] en aan de tussentijdse doelstellingen
      om tijdig te voldoen aan die omgevingswaarden, bedoeld in [artikel 4.27, tweede lid, onder a][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.4.2
        afdeling: '4.4'
  - number: 11.69b.b.2°
    text: het bereiken van de instandhoudingsdoelstellingen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.c
    text: |-
      de verwachte sociaal-economische effecten en de weging van de haalbaarheid en doelmatigheid en doeltreffendheid van
      de maatregelen, bedoeld onder b; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69b.d
    text: |-
      de verwachte gevolgen van de maatregelen, bedoeld onder b, voor de omvang van de stikstofdepositie respectievelijk
      het bereiken van de instandhoudingsdoelstellingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69b
  - number: 11.69c
    text: 'Onze Minister voor Natuur en Stikstof stelt de volgende verslagen op met de volgende frequentie:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: type_verslag
            type: string
            required: true
            description: >-
              Type verslag: monitoring_omgevingswaarden (jaarlijks),
              tussentijdse_doelstellingen (jaarlijks),
              voortgang_maatregelen (tweejaarlijks),
              staat_instandhouding (zesjaarlijks)
            source: {}
          - name: datum_vorig_verslag
            type: date
            required: true
            description: Datum van het vorige verslag
            source: {}
        output:
          - name: uiterste_datum_volgend_verslag
            type: date
            description: Uiterste datum waarop het volgende verslag moet worden opgesteld
        actions:
          - output: uiterste_datum_volgend_verslag
            value:
              operation: IF
              cases:
                - when:
                    operation: OR
                    conditions:
                      - operation: EQUALS
                        subject: $type_verslag
                        value: monitoring_omgevingswaarden
                      - operation: EQUALS
                        subject: $type_verslag
                        value: tussentijdse_doelstellingen
                  then:
                    operation: DATE_ADD
                    date: $datum_vorig_verslag
                    years: 1
                - when:
                    operation: EQUALS
                    subject: $type_verslag
                    value: voortgang_maatregelen
                  then:
                    operation: DATE_ADD
                    date: $datum_vorig_verslag
                    years: 2
                - when:
                    operation: EQUALS
                    subject: $type_verslag
                    value: staat_instandhouding
                  then:
                    operation: DATE_ADD
                    date: $datum_vorig_verslag
                    years: 6
              default:
                operation: DATE_ADD
                date: $datum_vorig_verslag
                years: 1
  - number: 11.69c.a
    text: 'elk jaar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
  - number: 11.69c.a.1°
    text: |-
      een verslag over de resultaten van de monitoring voor de omgevingswaarden voor stikstofdepositie, bedoeld in
      [artikel 11.68][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.5'
  - number: 11.69c.a.2°
    text: |-
      een verslag over de mate waarin wordt voldaan aan de tussentijdse doelstellingen om tijdig aan die omgevingswaarden
      te voldoen, bedoeld in [artikel 4.27, tweede lid, onder a][ref1], op basis van de gegevens, bedoeld in
      [artikel 11.69a][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.4.2
        afdeling: '4.4'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.5'
  - number: 11.69c.b
    text: |-
      elke twee jaar: een verslag over de voortgang en de gevolgen van de maatregelen, opgenomen
      in het programma stikstofreductie en natuurverbetering op basis van de gegevens, bedoeld in
      [artikel 10.36da, eerste lid, van het Omgevingsbesluit][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: 11.69c.c
    text: |-
      elke zes jaar: een verslag over de ontwikkeling van de staat van instandhouding van de voor stikstof gevoelige
      habitats in Natura 2000-gebieden in relatie tot de instandhoudingsdoelstellingen voor die gebieden op basis van de
      gegevens, bedoeld in [artikel 10.36da, tweede lid, van het Omgevingsbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.69c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: '11.73'
    text: |-
      De korpschef verzamelt de gegevens die de polis van de verzekering, bedoeld in
      [artikel 11.78 van het Besluit activiteiten leefomgeving][ref1], bevat.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.73
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: '12.1'
    text: |-
      Voor de toepassing van deze paragraaf wordt verstaan onder: - *aanwezig industrieterrein:*
      op het tijdstip van inwerkingtreding van dit besluit aanwezig industrieterrein als bedoeld in
      [artikel 1 van de Wet geluidhinder][ref1], totdat rondom dat industrieterrein met toepassing van
      [artikel 12.2][ref2] geluidproductieplafonds als omgevingswaarden zijn vastgesteld of in het omgevingsplan is
      bepaald dat een activiteit als bedoeld in [artikel 5.78b][ref3] niet wordt verricht;
        - *grenswaarde Wet geluidhinder:* a. hogere waarde als bedoeld in
      [artikel IX van het Aanvullingsbesluit geluid Omgevingswet][ref4]; en b. grenswaarde van 50 dB(A) etmaalwaarde op
      elk punt van de buitengrens van een geluidaandachtsgebied als bedoeld in [artikel 12.7, derde lid][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0003227#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0044679#ArtikelIX
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.1
    references:
      - id: ref1
        bwb_id: BWBR0003227
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0044679
        artikel: IX
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.4
        afdeling: '12.1'
  - number: 12.2.1
    text: |-
      In afwijking van de [artikelen 3.34][ref1], [3.35][ref2] en
      [3.37 tot en met 3.40][ref3] wordt een geluidproductieplafond als bedoeld in
      [artikel 3.6, tweede en derde lid, van de Aanvullingswet geluid Omgevingswet][ref4] als omgevingswaarde
      vastgesteld op grond van de geluidproductie op het industrieterrein die is toegestaan bij maximale benutting van de
      grenswaarden [Wet geluidhinder][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0043247#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref4
        bwb_id: BWBR0043247
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0003227
  - number: 12.2.2
    text: 'Bij het bepalen van de in het eerste lid bedoelde geluidproductie:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
  - number: 12.2.2.a
    text: |-
      worden geluidregels die deel uitmaken van de regels van het omgevingsplan voor dat industrieterrein in acht
      genomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
  - number: 12.2.2.b
    text: 'wordt rekening gehouden met een voor dat industrieterrein vastgesteld:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
  - number: 12.2.2.b.1°
    text: |-
      zonebeheerplan als bedoeld in [artikel 164 van de Wet geluidhinder][ref1] zoals dat gold op het tijdstip van
      inwerkingtreding van de [Aanvullingswet geluid Omgevingswet][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0003227#Artikel164
      [ref2]: https://wetten.overheid.nl/BWBR0043247
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
        artikel: '164'
      - id: ref2
        bwb_id: BWBR0043247
  - number: 12.2.2.b.2°
    text: |-
      programma als bedoeld in [artikel 3.6, vijfde lid, van de Aanvullingswet geluid Omgevingswet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0043247#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0043247
        artikel: '3'
  - number: 12.2.2.c
    text: |-
      worden omgevingsvergunningen voor een milieubelastende activiteit als bedoeld in
      [artikel 5.1, tweede lid, aanhef en onder b, van de wet][ref1] en de daaraan verbonden voorschriften in acht
      genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 12.2.3
    text: |-
      Als door toepassing van het tweede lid, onder a of c, het geluid op een referentiepunt hoger wordt dan
      het in het eerste lid bedoelde geluid bij maximale benutting van de grenswaarden [Wet geluidhinder][ref1],
      wordt het geluidproductieplafond vastgesteld volgens het eerste lid en wordt voor dat geluidproductieplafond
      [artikel 3.46, tweede lid][ref2], toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0003227
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 12.2.4
    text: |-
      Een met toepassing van het eerste lid bepaald geluidproductieplafond als omgevingswaarde wordt bij de vaststelling
      daarvan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
  - number: 12.2.4.a
    text: |-
      verlaagd met het geluid door spoorvoertuigen op spoorwegemplacementen als bedoeld in
      [artikel 3.24, tweede lid, onder a][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.1
        afdeling: '3.5'
  - number: 12.2.4.b
    text: |-
      verhoogd met het geluid door afgemeerde vaartuigen of drijvende werktuigen, als dat geluid niet eerder is betrokken
      bij het vaststellen van de grenswaarden [Wet geluidhinder][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
  - number: 12.2a.1
    text: |-
      [Artikel 5.78f][ref1] is niet van toepassing als de geluidproductieplafonds als omgevingswaarden zijn vastgesteld
      met toepassing van [artikel 12.2][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
  - number: 12.2a.2
    text: |-
      Uiterlijk op het tijdstip, bedoeld in [artikel 22.6, derde lid, van de wet][ref1], geeft het bevoegd gezag alsnog
      uitvoering aan [artikel 5.78f][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.2a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 12.3.1
    text: |-
      Als bij het vaststellen van een grenswaarde [Wet geluidhinder][ref1] een aftrek is toegepast als bedoeld in
      [artikel 2.3, tweede lid, van het Reken- en meetvoorschrift geluid 2012][ref2], wordt bij het toepassen van
      [artikel 12.2, eerste lid][ref3], die grenswaarde verhoogd met de waarde van de aftrek.


      [ref1]: https://wetten.overheid.nl/BWBR0003227
      [ref2]: https://wetten.overheid.nl/BWBR0031722#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.3
    references:
      - id: ref1
        bwb_id: BWBR0003227
      - id: ref2
        bwb_id: BWBR0031722
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
  - number: 12.3.2
    text: |-
      Als bij het toepassen van [artikel 12.2, eerste lid][ref1], bij een aanwezig industrieterrein een aftrek is
      toegepast als bedoeld in [artikel 2.3, tweede lid, van het Reken- en meetvoorschrift geluid 2012][ref2], wordt het
      met toepassing van artikel 12.2 bepaalde geluidproductieplafond als omgevingswaarde voor dat industrieterrein bij
      de vaststelling daarvan met diezelfde aftrek verlaagd.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0031722#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.3
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
      - id: ref2
        bwb_id: BWBR0031722
        artikel: '2'
  - number: 12.4.1
    text: |-
      Als op het tijdstip van de toepassing van [artikel 12.2, eerste lid][ref1], voor een aanwezig industrieterrein
      een geluidreductieplan gold als bedoeld in [artikel 67 van de Wet geluidhinder][ref2], wordt bij de vaststelling
      van het op grond van artikel 12.2, eerste lid, bepaalde geluidproductieplafond als omgevingswaarde bepaald dat
      gedurende de in dat geluidreductieplan genoemde termijn niet aan dat geluidproductieplafond hoeft te worden
      voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0003227#Artikel67
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.4
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
        hoofdstuk: '12'
        paragraaf: 12.1.1
        afdeling: '12.1'
      - id: ref2
        bwb_id: BWBR0003227
        artikel: '67'
  - number: 12.4.2
    text: |-
      Als [artikel 12.3, tweede lid][ref1], is toegepast hoeft, in afwijking van [artikel 3.44][ref2], gedurende
      een periode van ten hoogste vijf jaar niet aan dat geluidproductieplafond te worden voldaan, waarbij het
      geluidproductieplafond mag worden overschreden met ten hoogste de waarde van de aftrek.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
