        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.95.1
    text: |-
      Als een omgevingsplan waarden of afstanden bevat voor geur door een activiteit, bepaalt het omgevingsplan dat die
      waarden of afstanden niet van toepassing zijn op de geur door die activiteit op een geurgevoelig gebouw dat een
      functionele binding heeft met die activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.95
  - number: 5.95.2
    text: |-
      De afstanden, bedoeld in de [subparagrafen 5.1.4.6.3][ref1] en [5.1.4.6.4][ref2], zijn niet van toepassing als het
      geurgevoelige gebouw een functionele binding heeft met de activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.95
