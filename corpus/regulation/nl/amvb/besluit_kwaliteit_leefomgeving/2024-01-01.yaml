  - number: 12.5.2
    text: Op het bepalen van het geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.5
  - number: 12.5a
    text: |-
      Totdat uitvoering is gegeven aan [artikel 12.5][ref1] voor een hoofdspoorweg, geldt
      [artikel 5.55, tweede lid, onder e][ref2], niet voor het toelaten van een geluidgevoelig gebouw waarop geluid wordt
      veroorzaakt door spoorvoertuigen op spoorwegemplacementen die onderdeel zijn van die hoofdspoorweg.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.5a
