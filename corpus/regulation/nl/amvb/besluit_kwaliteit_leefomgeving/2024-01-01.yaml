    text: de kwaliteit van een aquatisch of terrestrisch ecosysteem;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
  - number: 4.17.1.b
    text: de gezondheid; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
  - number: 4.17.1.c
    text: het rechtmatig gebruik, feitelijk of potentieel, van het watermilieu.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
  - number: 4.17.2
    text: |-
      Een significante en aanhoudend stijgende trend levert een significant schaderisico op, als het beginpunt voor een
      trendomkering wordt of dreigt te worden overschreden en de vereiste maatregelen, bedoeld in artikel 5, tweede lid,
      van de grondwaterrichtlijn, niet worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
  - number: 4.17.3
    text: |-
      Het beginpunt voor de trendomkering bedraagt 75% van de concentraties, bedoeld in [bijlage IV][ref1], tabellen A
      en B.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
