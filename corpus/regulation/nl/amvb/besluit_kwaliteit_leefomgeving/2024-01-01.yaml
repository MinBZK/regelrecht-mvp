    text: in samenhang met de sloop van dierenverblijven of bedrijfsgebouwen voor functioneel ondersteunende activiteiten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.115
  - number: 5.115.b
    text: |-
      een geurgevoelig gebouw dat voor 19 maart 2000 al aanwezig was op een locatie waar een geurgevoelig gebouw als
      bedoeld onder a is gebouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.115
  - number: 5.116.1
    text: |-
      Onverminderd de [artikelen 5.109 tot en met 5.115][ref1] wordt in een omgevingsplan dat het houden van
      landbouwhuisdieren toelaat, tot een geurgevoelig gebouw ten minste de afstand, bedoeld in tabel 5.116, in acht
