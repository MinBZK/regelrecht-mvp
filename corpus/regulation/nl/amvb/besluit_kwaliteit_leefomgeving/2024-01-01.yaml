  - number: 2.11.1
    text: |-
      Een krw-oppervlaktewaterlichaam verkeert in een goede ecologische toestand. Van een goede ecologische toestand is
      sprake als het krw-oppervlaktewaterlichaam:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.11
  - number: 2.11.1.a
    text: |-
      voor de kwaliteitselementen die voor dat type natuurlijk krw-oppervlaktewaterlichaam zijn uitgewerkt, voldoet aan
      de definities van de goede ecologische toestand voor dat type, bedoeld in bijlage V, paragraaf 1.2, tabellen 1.2.1
      tot en met 1.2.4, bij de kaderrichtlijn water, uitgewerkt in het Stowa-rapport voor natuurlijke watertypen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.11
  - number: 2.11.1.b
    text: |-
      voor het kwaliteitselement specifiek verontreinigende stoffen geen hogere concentratie van een in bijlage IIIa
      vermelde stof bevat dan de waarde die daarin voor die stof is vermeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.11
  - number: 2.11.2
    text: |-
      De omgevingswaarde is een andere verplichting als bedoeld in
      [artikel 2.10, eerste lid, aanhef en onder a, van de wet][ref1], zoals omschreven in artikel 4, eerste lid, onder
      a, onder ii, van de kaderrichtlijn water.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.11
