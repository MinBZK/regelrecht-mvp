  - number: 4.2.3
    text: 'Een programma gericht op het voldoen aan de volgende omgevingswaarden bevat de daarbij bedoelde maatregelen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.2
  - number: 4.2.3.a
    text: |-
      als het gaat om de omgevingswaarde voor PM, bedoeld in [artikel 2.5, tweede lid, aanhef en onder c][ref1]: alle
      nodige maatregelen die geen onevenredige kosten meebrengen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.2
    references:
