  - number: 4.16.1
    text: |-
      Op het bereiken van de doelstellingen, bedoeld in [artikel 4.15, eerste lid][ref1], kan alleen een uitzondering
      worden gemaakt in de gevallen, bedoeld in het tweede en derde lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 4.16.2
    text: 'Het eerste lid geldt voor een tijdelijke achteruitgang in gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.2.a
    text: |-
      de achteruitgang het resultaat is van omstandigheden die zich door een natuurlijke oorzaak of overmacht voordoen
      en die uitzonderlijk zijn of niet redelijkerwijs waren te voorzien, met name extreme overstromingen en lange
      droogteperioden, of het gevolg zijn van omstandigheden die zijn veroorzaakt door redelijkerwijs niet te voorziene
      ongevallen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.2.b
    text: aan de voorwaarden van artikel 4, zesde, achtste en negende lid, van de kaderrichtlijn water wordt voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.2.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het eerstvolgende nationale waterprogramma, als het gaat om
      rijkswateren, of in het eerstvolgende regionale waterprogramma, als het gaat om regionale wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3
    text: 'Het eerste lid geldt ook voor gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.a
    text: 'het niet voorkomen van die achteruitgang het gevolg is van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.a.1°
    text: nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.a.2°
    text: wijzigingen in de stand van grondwaterlichamen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.a.3°
    text: |-
      het niet voorkomen van achteruitgang van een zeer goede toestand van een krw-oppervlaktewaterlichaam naar een goede
      toestand het gevolg is van nieuwe duurzame activiteiten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.b
    text: aan de voorwaarden van artikel 4, zevende, achtste en negende lid, van de kaderrichtlijn water is voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.16.3.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het nationale waterprogramma, als het gaat om rijkswateren,
      of in het regionale waterprogramma, als het gaat om regionale wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.16
  - number: 4.17.1
    text: |-
      Met de uitvoering van een regionaal waterprogramma wordt bereikt dat in elk van de op grond van
      [artikel 4.4, tweede lid, aanhef en onder b][ref1], aangewezen grondwaterlichamen geen significante en aanhoudend
      stijgende trends als bedoeld in artikel 2, onder 3, van de grondwaterrichtlijn plaatsvinden in de concentraties van
      krw-verontreinigende stoffen, groepen krw-verontreinigende stoffen of indicatoren van krw-verontreiniging, die een
      significant schaderisico opleveren voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.1
        afdeling: '4.2'
