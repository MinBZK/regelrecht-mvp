        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0041313
      - id: ref5
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 11.2.b
    text: |-
      als het gaat om een activiteit als bedoeld in [artikel 5.23][ref1], [5.28][ref2] of [5.32][ref3] of
      [bijlage VII][ref4], onder A, B, D, onder 1, of onder E, of waarvoor een vergunning is verleend op grond van
      [artikel 15, aanhef en onder b, van de Kernenergiewet][ref5], voor zover van toepassing:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313
      [ref5]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
