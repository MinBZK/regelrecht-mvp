    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.2
    text: |-
      De toename van het geluid wordt bepaald door de situatie in een voor die weg of spoorweg maatgevend jaar na de
      wijziging te vergelijken met de situatie in datzelfde jaar zonder die wijziging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.3
    text: 'Een omgevingsplan kan erin voorzien dat het geluid met meer dan 1,5 dB toeneemt als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.3.a
    text: geen geluidbeperkende maatregelen kunnen worden getroffen om die toename te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.3.b
    text: de toename van het geluid door het treffen van geluidbeperkende maatregelen zoveel mogelijk wordt beperkt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.3.c
    text: |-
      het geluid op geluidgevoelige gebouwen niet hoger is dan de grenswaarde, bedoeld in [artikel 3.35][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 5.78af.4
    text: |-
      Geluidbeperkende maatregelen als bedoeld in het derde lid worden in aanmerking genomen als die financieel
      doelmatig zijn en daartegen geen overwegende bezwaren van stedenbouwkundige, verkeerskundige, vervoerskundige,
      landschappelijke of technische aard bestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78af.5
    text: |-
      Bij de toepassing van het derde lid wordt de aanvaardbaarheid van het gecumuleerde geluid op het geluidgevoelige
      gebouw beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78af
  - number: 5.78ag
    text: |-
      Bij de toepassing van [artikel 5.78af][ref1] kan een omgevingsplan meer geluid dan de grenswaarden, bedoeld in
      [tabel 3.35][ref2], toelaten als zwaarwegende economische belangen of zwaarwegende andere maatschappelijke belangen
      dit rechtvaardigen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ag
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 5.78ah.1
    text: |-
      Deze subparagraaf is van toepassing op wijzigingen in het geluidaandachtsgebied van een weg, spoorweg en
      industrieterrein die gevolgen hebben voor de geluidoverdracht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ah
  - number: 5.78ah.2
    text: Deze subparagraaf is niet van toepassing op het geluid op een niet-geluidgevoelige gevel.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ah
  - number: 5.78ai
    text: |-
      In een omgevingsplan dat een wijziging in de geluidoverdracht in een geluidaandachtsgebied toelaat, wordt voor
      geluidgevoelige gebouwen die als gevolg van die wijziging een significante toename van geluid ondervinden bepaald
      of:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ai
  - number: 5.78ai.a
    text: |-
      geluidbeperkende maatregelen worden getroffen om de toename van het geluid te voorkomen of zoveel mogelijk te
      beperken; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ai
  - number: 5.78ai.b
    text: |-
      geluidwerende maatregelen worden getroffen om te voldoen aan de grenswaarde, bedoeld in [tabel 3.53][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78ai
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.5
        afdeling: '3.5'
  - number: 5.79.1
    text: 'Deze paragraaf is van toepassing op het toelaten:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.1.a
    text: |-
      op een locatie van een activiteit, anders dan het wonen, die trillingen in een frequentie van 1 tot 80 Hz
      veroorzaakt in een trillinggevoelige ruimte van een trillinggevoelig gebouw, dat is toegelaten op grond van een
      omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.1.b
    text: |-
      een trillinggevoelig gebouw waarop trillingen in een frequentie van 1 tot 80 Hz worden veroorzaakt door een
      activiteit, anders dan het wonen, die op een locatie is toegelaten op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.2
    text: 'In afwijking van het eerste lid is deze paragraaf:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.2.a
    text: |-
      niet van toepassing op een trillinggevoelige ruimte in een trillinggevoelig gebouw dat geheel of gedeeltelijk is
      gelegen op een industrieterrein waarvoor geluidproductieplafonds als omgevingswaarden zijn vastgesteld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.2.b
    text: |-
      met uitzondering van de [artikelen 5.82][ref1] en [5.83][ref2] niet van toepassing op een trillinggevoelig gebouw
      dat op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit is
      toegelaten voor een duur van niet meer dan tien jaar;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.79.2.c
    text: |-
      met uitzondering van de [artikelen 5.82 tot en met 5.85][ref1] niet van toepassing op:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.79.2.c.1°
    text: activiteiten die in hoofdzaak in de openbare buitenruimte worden verricht; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.2.c.2°
    text: evenementen die niet plaatsvinden op een locatie voor evenementen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.79.2.d
    text: niet van toepassing op verkeer op wegen, vaarwegen en spoorwegen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.79
  - number: 5.80.1
    text: 'Een trillinggevoelig gebouw is een gebouw of een gedeelte van een gebouw met een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.1.a
    text: woonfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.1.b
    text: onderwijsfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.1.c
    text: gezondheidszorgfuncties met bedgebied en nevengebruiksfuncties daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.1.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied en nevengebruiksfuncties daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.2
    text: |-
      Het eerste lid geldt niet voor een gedeelte van een gebouw als het omgevingsplan in dat gedeelte geen
      trillinggevoelige ruimten toelaat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: 5.80.3
    text: In afwijking van het eerste lid, aanhef en onder a, zijn woonschepen en woonwagens geen trillinggevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.80
  - number: '5.81'
    text: 'Een trillinggevoelige ruimte is een verblijfsruimte of verblijfsgebied van een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.81
  - number: 5.81.a
    text: woonfunctie of bijeenkomstfunctie die een nevengebruiksfunctie is van die woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.81
  - number: 5.81.b
    text: onderwijsfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.81
  - number: 5.81.c
    text: |-
      gezondheidszorgfunctie met bedgebied of bijeenkomstfunctie die een nevengebruiksfunctie is van die
      gezondheidszorgfunctie; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.81
  - number: 5.81.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.81
  - number: '5.82'
    text: 'Voor de toepassing van deze paragraaf wordt als één activiteit beschouwd:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.82
  - number: 5.82.a
    text: |-
      een activiteit als bedoeld in de [afdelingen 3.3 tot en met 3.11 van het Besluit activiteiten leefomgeving][ref1];
      of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Afdeling3.10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.82
    references:
      - id: ref1
        bwb_id: BWBR0041330
        afdeling: '3.10'
  - number: 5.82.b
    text: |-
      als het gaat om andere activiteiten dan bedoeld onder a, meerdere activiteiten die worden verricht op dezelfde
      locatie en die:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.82
  - number: 5.82.b.1°
    text: rechtstreeks met elkaar samenhangen en met elkaar in technisch verband staan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.82
  - number: 5.82.b.2°
    text: elkaar functioneel ondersteunen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.82
  - number: 5.83.1
    text: |-
      In een omgevingsplan wordt rekening gehouden met trillingen door activiteiten in trillinggevoelige ruimten van
      trillinggevoelige gebouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.83
  - number: 5.83.2
    text: |-
      Een omgevingsplan voorziet erin dat trillingen door een activiteit in trillinggevoelige ruimten van
      trillinggevoelige gebouwen aanvaardbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.83
  - number: '5.84'
    text: |-
      Als een omgevingsplan waarden bevat voor trillingen door een activiteit, bepaalt het omgevingsplan dat die waarden
      niet van toepassing zijn op trillingen door die activiteit in trillinggevoelige ruimten van een trillinggevoelig
      gebouw dat een functionele binding heeft met die activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.84
  - number: '5.85'
    text: 'Als een omgevingsplan waarden bevat voor trillingen door een activiteit:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.85
  - number: 5.85.a
    text: |-
      in de agrarische sector als bedoeld in [artikel 3.200][ref1], [3.205][ref2], [3.208][ref3], [3.211][ref4],
      [3.215][ref5], [3.218][ref6], [3.221][ref7] of [3.225 van het Besluit activiteiten leefomgeving][ref8];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
