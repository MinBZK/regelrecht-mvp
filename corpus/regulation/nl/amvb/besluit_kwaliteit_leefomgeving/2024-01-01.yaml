  - number: 3.52.1.d
    text: |-
      Onze Minister van Infrastructuur en Waterstaat, als bij de vaststelling van een geluidproductieplafond door
      een bestuursorgaan van het Rijk toepassing is gegeven aan [artikel 3.35][ref1], [3.36][ref2], [3.37][ref3] of
      [3.41][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel3
