        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
  - number: 8.5.5
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een
      mijnbouwlocatieactiviteit als bedoeld in de [artikelen 6.45, aanhef en onder b][ref1], en
      [6.46, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref2], is het derde lid, aanhef en onder a,
      van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.5
    references:
