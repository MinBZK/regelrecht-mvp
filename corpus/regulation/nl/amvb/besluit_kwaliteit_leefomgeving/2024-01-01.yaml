        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.26.2
    text: |-
      [Artikel 5.27][ref1] is ook van toepassing op het toelaten van een activiteit als bedoeld in het eerste lid, onder
      a.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.26
