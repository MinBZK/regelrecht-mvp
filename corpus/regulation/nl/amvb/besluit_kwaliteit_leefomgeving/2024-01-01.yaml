    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.5
  - number: '4.6'
    text: 'Een stroomgebiedsbeheerplan bevat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.6
