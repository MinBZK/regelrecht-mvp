        artikel: '3'
      - id: ref2
        bwb_id: BWBR0003227
        artikel: '74'
  - number: 12.7.3
    text: |-
      Totdat toepassing is gegeven aan [artikel 3.6, tweede lid, van de Aanvullingswet geluid Omgevingswet][ref1],
      is het geluidaandachtsgebied van een industrieterrein de krachtens [artikel 40 van de Wet geluidhinder][ref2]
      vastgestelde geluidzone.


      [ref1]: https://wetten.overheid.nl/BWBR0043247#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0003227#Artikel40
