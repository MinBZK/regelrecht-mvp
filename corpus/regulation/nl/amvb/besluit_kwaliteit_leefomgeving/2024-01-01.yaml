  - number: 8.83.2
    text: |-
      Deze afdeling is opgenomen met het oog op het waarborgen van de veiligheid, het beschermen van de gezondheid en het
      milieu, het beheer van watersystemen en het duurzaam veiligstellen van de openbare drinkwatervoorziening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
  - number: 8.84.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een wateractiviteit als bedoeld in
      [artikel 8.83, eerste lid][ref1], wordt de omgevingsvergunning alleen verleend als de activiteit verenigbaar is met
      het belang van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.9.1
        afdeling: '8.9'
  - number: 8.84.1.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.1.c
    text: het vervullen van maatschappelijke functies door watersystemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.2
    text: |-
      Bij de beoordeling van de aanvraag wordt rekening gehouden met de waterbeheerprogramma’s, regionale
      waterprogramma’s, stroomgebiedsbeheerplannen, overstromingsrisicobeheerplannen en het nationale waterprogramma, die
      betrekking hebben op het betreffende krw-oppervlaktewaterlichaam of grondwaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.3
    text: 'Het verlenen van de omgevingsvergunning mag er in ieder geval niet toe leiden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.3.a
    text: |-
      niet wordt voldaan aan de omgevingswaarden, bedoeld in de [artikelen 2.10, eerste lid][ref1],
      [2.11, eerste lid][ref2], [2.13, eerste lid][ref3], [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5], in
      voorkomend geval in samenhang met de termijn, bedoeld in [artikel 2.18, eerste lid][ref6];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
