        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.15.2
    text: |-
      De omgevingsvergunning wordt alleen verleend als binnen civiele explosieaandachtsgebieden A, B en C als bedoeld in
      [artikel 5.28][ref1] geen activiteiten of werken als bedoeld in [artikel 5.29, eerste lid][ref2], zijn toegelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.15
