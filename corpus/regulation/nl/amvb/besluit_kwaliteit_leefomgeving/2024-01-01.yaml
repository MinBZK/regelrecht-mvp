        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.78m.1
    text: |-
      Een omgevingsplan dat de aanleg van een gemeenteweg, waterschapsweg of lokale spoorweg toelaat, voorziet erin dat
      het geluid op geluidgevoelige gebouwen niet hoger is dan de standaardwaarde, bedoeld in [tabel 3.34][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.78m
