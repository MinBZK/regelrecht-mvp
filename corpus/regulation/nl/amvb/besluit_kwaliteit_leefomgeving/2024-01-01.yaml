        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 4.2.3.b
    text: 'als het gaat om de omgevingswaarden voor ozon:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.2
  - number: 4.2.3.b.1°
    text: |-
      bedoeld in [artikel 2.7, eerste lid, aanhef en onder a en c][ref1]: alle nodige maatregelen die geen onevenredige
      kosten meebrengen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.2
    references:
