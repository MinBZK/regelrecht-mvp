  - number: 10.1.1
    text: |-
      Bepalingen in deze afdeling die gaan over landbouwgronden, zijn van overeenkomstige toepassing op gronden waarop
      onmiddellijk enige vorm van landbouw kan worden uitgeoefend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.1
  - number: 10.1.2
    text: |-
      Bepalingen in deze afdeling die gaan over bos, zijn van overeenkomstige toepassing op heidevelden,
      hoogveenterreinen, zandverstuivingen, duinterreinen, kwelders, schorren, gorzen, slikken, riet- en ruiglanden en
      laagveenmoerassen, voor zover het geen gronden zijn waarop enige vorm van landbouw wordt of onmiddellijk kan worden
      uitgeoefend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.1
  - number: 10.2.1
    text: |-
      Gedeputeerde staten stellen per herverkavelingsblok de agrarische verkeerswaarde van gronden vast op basis van het
      prijsniveau van de landbouwgronden die in het jaar voorafgaand aan de terinzagelegging van het ontwerpruilbesluit
      in het herverkavelingsblok zijn verkocht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.2
  - number: 10.2.2
    text: |-
      Als in een herverkavelingsblok in het jaar voorafgaand aan de terinzagelegging van het ontwerpruilbesluit geen
      verkopen van landbouwgronden hebben plaatsgevonden, stellen gedeputeerde staten de agrarische verkeerswaarde vast
      op basis van de prijs waarvoor in dat jaar vergelijkbare gronden buiten het herverkavelingsblok zijn verkocht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.2
  - number: 10.2.3
    text: |-
      Als in een herverkavelingsblok in het jaar voorafgaand aan de terinzagelegging van het ontwerpruilbesluit
      onvoldoende verkopen van landbouwgronden hebben plaatsgevonden, stellen gedeputeerde staten de agrarische
      verkeerswaarde vast op basis van de prijs waarvoor in dat jaar binnen het herverkavelingsblok gronden zijn verkocht
      en de prijs waarvoor vergelijkbare gronden buiten het herverkavelingsblok zijn verkocht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.2
  - number: '10.3'
    text: |-
      In een ruilbesluit wordt bij toedeling van een naastgelegen perceel de grens van een perceel waarop een gebouw
      staat niet aangepast als dat voor de eigenaar of gebruiker van het gebouw zou leiden tot een onevenredige beperking
      van het gebruik van het gebouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.3
  - number: 10.4.1
    text: 'In een ruilbesluit zijn tegen een nihil inbreng uitruilbaar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.1.a
    text: een waterloop met een bovenbreedte van ten minste 5 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.1.b
    text: een plas met een oppervlakte van ten minste 25 m2; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.1.c
    text: een lijnvormig landschapselement bestaande uit een houtopstand met een gemiddelde breedte van ten minste 5 m.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.2
    text: 'In een ruilbesluit zijn als aangrenzende gronden uitruilbaar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.2.a
    text: een waterloop met een gemiddelde bovenbreedte van minder dan 5 m;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.2.b
    text: een plas met een oppervlakte van minder dan 25 m2; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.2.c
    text: een lijnvormig landschapselement bestaande uit een houtopstand met een gemiddelde breedte van minder dan 5 m.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: 10.4.3
    text: |-
      In een ruilbesluit kan voor het gehele herverkavelingsblok voor waterlopen, plassen of lijnvormige
      landschapselementen een andere breedte of oppervlakte worden aangehouden dan de breedten en oppervlakten, bedoeld
      in het eerste en tweede lid, als dat vanwege de specifieke kenmerken van dat herverkavelingsblok nodig is voor een
      doelmatige herverkaveling.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.4
  - number: '10.5'
    text: |-
      In een ruilbesluit is een openbare weg als bedoeld in [artikel 4 van de Wegenwet][ref1] en een weg die anderszins
      een openbaar karakter heeft in zijn geheel uitruilbaar tegen een nihil inbreng.


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.5
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '4'
  - number: '10.6'
    text: |-
      In een ruilbesluit is een openbare weg als bedoeld in [artikel 4 van de Wegenwet][ref1] uitruilbaar als die weg
      volgens het inrichtingsbesluit aan het openbaar verkeer wordt onttrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.6
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '4'
  - number: '10.7'
    text: |-
      In een ruilbesluit is een waterloop met een openbaar gebruik uitruilbaar als dat openbaar gebruik volgens het
      inrichtingsbesluit vervalt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.7
  - number: 10.8.1
    text: |-
      In een ruilbesluit zijn uitruilbaar gronden die in een gebied liggen waarvoor op grond van
      [artikel 2 van de Kaderwet EZK- en LNV-subsidies][ref1] of een provinciale verordening subsidie is of kan worden
      verstrekt voor natuurbeheer of agrarisch natuurbeheer.


      [ref1]: https://wetten.overheid.nl/BWBR0007919#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
    references:
      - id: ref1
        bwb_id: BWBR0007919
        artikel: '2'
  - number: 10.8.2
    text: |-
      Als geen subsidie voor natuurbeheer of agrarisch natuurbeheer is verstrekt, wordt in het ruilbesluit de volgende
      rangorde in acht genomen voor het ruilen van de betrokken gronden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
  - number: 10.8.2.a
    text: |-
      ruil met landbouwgronden die zijn verworven voor de veiligstelling, aanleg of ontwikkeling van bos of waarvoor de
      eigenaar of pachter bereid is om een aanvraag in te dienen voor subsidie als bedoeld in het eerste lid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
  - number: 10.8.2.b
    text: ruil met de overige landbouwgronden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
  - number: 10.8.3
    text: |-
      Als subsidie voor natuurbeheer is verstrekt, worden in het ruilbesluit de betrokken gronden geruild met
      landbouwgronden die zijn verworven voor de veiligstelling, aanleg of ontwikkeling van bos of met landbouwgronden
      waarvoor aan de eigenaar of pachter subsidie voor natuurbeheer is verstrekt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
  - number: 10.8.4
    text: |-
      Als subsidie voor agrarisch natuurbeheer is verstrekt, worden in het ruilbesluit de betrokken gronden geruild met
      landbouwgronden waarvoor aan de eigenaar of pachter subsidie voor agrarisch natuurbeheer is verstrekt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
  - number: 10.8.5
    text: |-
      Als subsidie voor natuurbeheer is verstrekt en een publiekrechtelijke rechtspersoon voor de betrokken gronden
      in een overeenkomst tot veiligstelling, aanleg of ontwikkeling van bos een verplichting als bedoeld in
      [artikel 252 van boek 6 van het Burgerlijk Wetboek][ref1] heeft bedongen en die gronden zijn gelegen op een
      locatie waaraan in het omgevingsplan niet een functie voor natuur of bos is toegedeeld of volgens een ontwerp
      daarvan niet een dergelijke functie zal worden toegedeeld, worden die gronden, in afwijking van het derde lid,
      geruild met gronden waarvoor ook een dergelijke verplichting is bedongen of met gronden die zijn gelegen op een
      locatie waaraan in het omgevingsplan een functie voor natuur of bos is toegedeeld of volgens een ontwerp daarvan
      een dergelijke functie zal worden toegedeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0005289#Artikel252
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.8
    references:
      - id: ref1
        bwb_id: BWBR0005289
        artikel: '252'
  - number: '10.9'
    text: 'In een ruilbesluit zijn niet uitruilbaar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.9
  - number: 10.9.a
    text: |-
      gronden waar voorafgaand aan een activiteit een bodemonderzoek als bedoeld in de
      [artikelen 5.7b tot en met 5.7e van het Besluit activiteiten leefomgeving][ref1] wordt verricht dat nog niet is
      afgerond; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
  - number: 10.9.b
    text: |-
      gronden met een kwaliteit boven de interventiewaarde bodemkwaliteit, bedoeld in
      [bijlage IIA bij het Besluit activiteiten leefomgeving][ref1], als de locatie niet is gesaneerd volgens
      de [Wet bodembescherming][ref2], het [Besluit activiteiten leefomgeving][ref3], het omgevingsplan, een
      maatwerkvoorschrift of een omgevingsvergunning.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
      [ref2]: https://wetten.overheid.nl/BWBR0003994
      [ref3]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
      - id: ref2
        bwb_id: BWBR0003994
      - id: ref3
        bwb_id: BWBR0041330
  - number: '10.10'
    text: 'In een ruilbesluit zijn niet uitruilbaar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.a
    text: gronden met een uitzonderlijk slechte cultuurtoestand;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.b
    text: gronden met een zeer oneffen maaiveld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.c
    text: |-
      heidevelden, hoogveenterreinen, zandverstuivingen, duinterreinen, kwelders, schorren, gorzen, slikken, riet- en
      ruiglanden en laagveenmoerassen, die niet als cultuurgrond in gebruik zijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.d
    text: te diep ontgronde percelen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.e
    text: gronden waarop sport- of recreatieterreinen liggen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.f
    text: gronden waarop spoorwegen liggen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.g
    text: |-
      de volgende gronden waarvoor op grond van [afdeling 11.3 van het Besluit activiteiten leefomgeving][ref1] een
      herbeplantingsplicht geldt:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Afdeling11.3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
    references:
      - id: ref1
        bwb_id: BWBR0041330
        afdeling: '11.3'
  - number: 10.10.g.1°
    text: gronden met een houtopstand groter dan 10 are; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.g.2°
    text: gronden waarop een houtopstand groter dan 10 are heeft gestaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.10.h
    text: boomgaarden en andere gronden met meerjarige gewassen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.10
  - number: 10.11.1
    text: |-
      In een ruilbesluit worden de rechten op kavels zodanig aan rechthebbenden toegewezen dat een doelmatig gebruik van
      de kavels wordt bevorderd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: 10.11.2
    text: 'Bij de toewijzing wordt de volgende rangorde in acht genomen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: 10.11.2.a
    text: toewijzing gericht op een zo groot mogelijke concentratie van kavels bij de landbouwbedrijfskavel;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: 10.11.2.b
    text: toewijzing gericht op een zo groot mogelijke concentratie van kavels bij de huiskavel;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: 10.11.2.c
    text: toewijzing gericht op een zo gering mogelijke afstand tussen de bedrijfsgebouwen en de kavels; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: 10.11.2.d
    text: toewijzing gericht op een zo gering mogelijke afstand tussen het woonhuis en de kavels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.11
  - number: '10.12'
    text: |-
      In een ruilbesluit worden kavels die ten dienste staan van één gebruiker niet samengevoegd als die samenvoeging
      voor een betrokken eigenaar zou leiden tot een onevenredige versnippering van zijn eigendom.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.12
  - number: '10.13'
    text: |-
      In een ruilbesluit wordt bij toewijzing van het recht op een huis- of landbouwbedrijfskavel de grens van de kavel
      niet aangepast als dat voor de eigenaar of gebruiker zou leiden tot een onevenredige beperking van het gebruik van
      het gebouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.13
  - number: '10.14'
    text: |-
      In een ruilbesluit wordt aangegeven met welk percentage op grond van [artikel 12.29 van de wet][ref1] de totale
      oppervlakte van alle in het herverkavelingsblok opgenomen gronden is verminderd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.15.1
    text: |-
      In een ruilbesluit worden erfdienstbaarheden gehandhaafd of gevestigd als niet door herverkaveling of uitvoering
      van werkzaamheden kan worden tegemoetgekomen aan de behoefte waarin deze rechten voorzien.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.15
  - number: 10.15.2
    text: |-
      In een ruilbesluit worden zakelijke rechten als bedoeld in
      [artikel 150, eerste lid, van de Overgangswet nieuw Burgerlijk Wetboek][ref1] gehandhaafd voor zover het belang
      van de landinrichting zich hiertegen niet verzet.


      [ref1]: https://wetten.overheid.nl/BWBR0002565#Artikel150
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.15
    references:
      - id: ref1
        bwb_id: BWBR0002565
        artikel: '150'
  - number: 10.16.1
    text: |-
      In een ruilbesluit wordt in de bepalingen over de ingebruikneming van de kavels, bedoeld in
      [artikel 12.24, eerste lid, onder f, van de wet][ref1], rekening gehouden met het belang van een doelmatige
      uitvoering van werkzaamheden en een doelmatig gebruik van de kavels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.16.2
    text: |-
      Als een ruilbesluit voorziet in tijdelijke ingebruikneming van een kavel, wordt bepaald dat die kavel in gebruik
      wordt genomen door de eigenaar aan wie het recht op de kavel is toegewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.16
  - number: 10.16.3
    text: |-
      In afwijking van het tweede lid bepaalt een ruilbesluit dat een kavel tijdelijk in gebruik wordt genomen door een
      andere eigenaar dan de eigenaar aan wie het recht op de kavel is toegewezen, als dat nodig is:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.16
  - number: 10.16.3.a
    text: voor een evenwichtige verdeling van de tijdelijke gebruiksmogelijkheden binnen het herverkavelingsblok; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.16
  - number: 10.16.3.b
    text: om onevenredig nadeel voor die andere eigenaar te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.16
  - number: '10.17'
    text: |-
      Een besluit geldelijke regelingen bevat alle aan de betrokken eigenaren toe te rekenen kosten en toe te kennen
      vergoedingen, waaronder kosten en vergoedingen die zijn overeengekomen met eigenaren van gronden die buiten het
      herverkavelingsblok liggen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.17
  - number: 10.18.1
    text: |-
      In een besluit geldelijke regelingen wordt bij de schatting, bedoeld in
      [artikel 12.38, eerste lid, van de wet][ref1], de toestand van de gronden en de overige onroerende zaken
      vastgelegd aan de hand van een of meer van de factoren, bedoeld in het tweede lid, onder a en b, en een of meer van
      de factoren, bedoeld in het tweede lid, onder c tot en met g.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.18.2
    text: 'De factoren zijn:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.a
    text: de ontsluiting van huiskavels, landbouwbedrijfskavels of veldkavels;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.b
    text: de waterhuishoudkundige toestand van kavels;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.c
    text: de kavelconcentratie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.d
    text: de afstand van de veldkavels tot de landbouwbedrijfskavel;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.e
    text: het aantal kavels per bedrijf;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.f
    text: de grootte van de kavels; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.18.2.g
    text: de vorm van de kavels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.18
  - number: 10.19.1
    text: 'In een besluit geldelijke regelingen kunnen verrekenposten worden opgenomen tussen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.1.a
    text: de bij het ruilbesluit betrokken eigenaren onderling; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.1.b
    text: |-
      de gezamenlijke eigenaren in het herverkavelingsblok en de individuele eigenaar die is betrokken bij een
      ruilbesluit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2
    text: 'Verrekenposten zijn in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2.a
    text: de aanwezigheid van opstallen, opstanden en obstakels, waaronder bunkers, hoogspanningsmasten, kabels en leidingen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2.b
    text: de waarde van gebouwen, werken, beplantingen en houtopstanden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2.c
    text: |-
      de algehele vergoeding in geld voor de inbreng van gronden voor de korting, bedoeld in
      [artikel 12.29, aanhef en onder c of d, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.19.2.d
    text: de algehele vergoeding in geld voor de inbreng van kavels met een te kleine oppervlakte;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2.e
    text: |-
      de regeling en de opheffing van de beperkte rechten, het recht van huur en de lasten, bedoeld in
      [artikel 12.35, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.19.2.f
    text: |-
      de afkoop van ruilverkavelings-, herinrichtings-, reconstructie- en landinrichtingsrenten, bedoeld in
      [artikel 12.35, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.19.2.g
    text: |-
      de vestiging van beperkte rechten, bedoeld in [artikel 12.35, tweede lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '12'
  - number: 10.19.2.h
    text: andere dan agrarische waarden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.19.2.i
    text: |-
      het verhaal van kosten in verband met gronden die niet op grond van
      [artikel 25d van het Besluit bodemkwaliteit][ref1] zijn ingedeeld in de kwaliteitsklasse landbouw/natuur; en


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel25d
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: 25d
  - number: 10.19.2.j
    text: |-
      schadevergoeding wanneer bij de uitvoering van werkzaamheden geen vervangende gronden tijdelijk in gebruik kunnen
      worden gegeven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.19
  - number: 10.20.1
    text: |-
      In een besluit geldelijke regelingen wordt bij de verrekenposten die betrekking hebben op een in de openbare
      registers ingeschreven recht en de waardering van de factoren, bedoeld in [artikel 10.18][ref1], uitgegaan van de
      situatie op het in het [artikel 16.125, tweede lid, van de wet][ref2] eerstbedoelde tijdstip.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.20
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.1.3
        afdeling: '10.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.20.2
    text: |-
      In een besluit geldelijke regelingen wordt bij de waardering van verrekenposten die verband houden met de
      cultuurtoestand van de bodem uitgegaan van de situatie op het tijdstip van de kavelovergang.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.20
  - number: 10.20.3
    text: |-
      In een besluit geldelijke regelingen wordt bij de waardering van de overige verrekenposten, voor zover de
      hoogte van de verrekenpost niet is overeengekomen, uitgegaan van de situatie bij de terinzagelegging van het
      ontwerpruilbesluit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.20
  - number: '10.21'
    text: |-
      In een besluit geldelijke regelingen worden de factoren, bedoeld in [artikel 10.18][ref1], gewaardeerd om de
      bijdrage van een eigenaar in de kosten, bedoeld in [artikel 13.9, vierde lid, van de wet][ref2], te berekenen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.1.3
        afdeling: '10.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 10.22.1
    text: |-
      In een besluit geldelijke regelingen worden de verrekenposten gewaardeerd op basis van de waarde in het
      maatschappelijk verkeer.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.22
  - number: 10.22.2
    text: |-
      Een verrekenpost die het gevolg is van de overgang van een zaak of een recht naar een andere eigenaar wordt voor de
      inbrengende eigenaar en de eigenaar die de zaak of het recht krijgt toegewezen, op dezelfde waarde geschat, tenzij
      een andere waardering noodzakelijk is vanwege de bijzondere omstandigheden van het geval.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.22
  - number: 10.23.1
    text: Een besluit geldelijke regelingen bevat per eigenaar de in rekening te brengen kosten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.23
  - number: 10.23.2
    text: 'Deze kosten bestaan uit de som van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.23
  - number: 10.23.2.a
    text: het saldo van de verrekenposten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.23
  - number: 10.23.2.b
    text: |-
      het totaal van de geldbedragen, die aan hem worden toegerekend aan de hand van de factoren, bedoeld in
      [artikel 10.18][ref1], vermenigvuldigd met de uitkomst van de deling van het totaal van aan de eigenaren toe te
      rekenen kosten door het totaal van alle geldbedragen die zijn vastgesteld aan de hand van die factoren.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.23
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.1.3
        afdeling: '10.1'
  - number: 10.23.3
    text: |-
      Als de waardeverandering door de factoren, bedoeld in [artikel 10.18][ref1], met een puntensysteem is bepaald,
      wordt in het besluit geldelijke regelingen voor de toepassing van het tweede lid, onder b, de waarde van een punt
      omgerekend in een geldbedrag door het totaal van de aan de eigenaren toe te rekenen kosten te delen door het totaal
      van de aan de eigenaren toegerekende punten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.23
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.1.3
        afdeling: '10.1'
  - number: 10.24.1
    text: |-
      Een plan als bedoeld in artikel 6, derde lid, van de habitatrichtlijn wordt alleen vastgesteld, als uit de passende
      beoordeling, bedoeld in [artikel 16.53c, eerste lid, van de wet][ref1], de zekerheid is verkregen dat het plan de
      natuurlijke kenmerken van het Natura 2000-gebied niet zal aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.24.2
    text: |-
      In afwijking van het eerste lid kan, als uit de passende beoordeling de vereiste zekerheid niet is verkregen, het
      plan toch worden vastgesteld, als is voldaan aan de volgende voorwaarden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.2.a
    text: er zijn geen alternatieve oplossingen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.2.b
    text: |-
      het plan is nodig om dwingende redenen van groot openbaar belang, met inbegrip van redenen van sociale of
      economische aard; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.2.c
    text: |-
      het plan bevat de nodige compenserende maatregelen om te waarborgen dat de algehele samenhang van Natura 2000
      bewaard blijft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.3
    text: |-
      In afwijking van het tweede lid, aanhef en onder b, geldt, als het plan significante gevolgen kan hebben voor een
      prioritair type natuurlijke habitat of een prioritaire soort in een Natura 2000-gebied, de voorwaarde dat het plan
      nodig is vanwege:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.3.a
    text: |-
      argumenten die verband houden met de menselijke gezondheid, met de openbare veiligheid of met voor het milieu
      wezenlijke gunstige effecten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
  - number: 10.24.3.b
    text: |-
      andere dwingende redenen van groot openbaar belang, als de procedure van
      [artikel 10.6d van het Omgevingsbesluit][ref1] is toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel10.24
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: '11.1'
    text: 'De volgende bestuursorganen verzamelen gegevens over externe veiligheidsrisico’s:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
  - number: 11.1.a
    text: |-
      het bevoegd gezag dat beslist op een aanvraag om een omgevingsvergunning of waaraan een melding als bedoeld in het
      [Besluit activiteiten leefomgeving][ref1] wordt gedaan, als het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 11.1.a.1°
    text: |-
      een activiteit als bedoeld in [bijlage VII][ref1], onder A, onder B, onder D, onder 1, en onder E, onder 1 tot en
      met 10 en onder 12 en 13;


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 11.1.a.2°
    text: |-
      het opslaan, herverpakken of bewerken van vuurwerk of pyrotechnische artikelen voor theatergebruik, bedoeld in
      [artikel 3.31, eerste lid, van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 11.1.a.3°
    text: |-
      het opslaan van ontplofbare stoffen van ADR-klasse 1, bedoeld in
      [artikel 3.34 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 11.1.b
    text: |-
      Onze Minister van Economische Zaken en Klimaat, als het gaat om het aanleggen en het exploiteren van een
      mijnbouwwerk, bedoeld in [artikel 3.320 van het Besluit activiteiten leefomgeving][ref1], voor zover het
      gaat om het winnen, opslaan, bewerken of gereedmaken voor transport van gevaarlijke stoffen als bedoeld in
      [bijlage VII][ref2], onder E, onder 11.1, of het aanleggen of aanpassen van een boorgat met een verplaatsbaar
      mijnbouwwerk, bedoeld in bijlage VII, onder E, onder 11.2;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 11.1.c
    text: 'Onze Minister van Infrastructuur en Waterstaat, als het gaat om:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
  - number: 11.1.c.1°
    text: het basisnet;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
  - number: 11.1.c.2°
    text: |-
      het exploiteren van een buisleiding, bedoeld in
      [artikel 3.101, eerste lid, onder a tot en met d, van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 11.1.c.3°
    text: |-
      het opslaan en bewerken van stoffen en voorwerpen van ADR-klasse 1.1 of 1.2 of meer dan 50 kg NEM in stoffen
      of voorwerpen van ADR-klasse 1.3, door de Nederlandse of een bondgenootschappelijke krijgsmacht, bedoeld in
      [artikel 3.332 van het Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 11.1.d
    text: |-
      de Autoriteit Nucleaire Veiligheid en Stralingsbescherming, als het gaat om het exploiteren van een inrichting
      waarvoor een vergunning is verleend op grond van [artikel 15, aanhef en onder b, van de Kernenergiewet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 11.1.e
    text: |-
      de gemeenteraad of het bevoegd gezag dat beslist op een aanvraag om een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit, als het gaat om externe veiligheidsrisico’s van een activiteit als bedoeld in de
      [artikelen 5.23][ref1], [5.28][ref2] en [5.32][ref3] en [bijlage VII][ref4] voor beperkt kwetsbare, kwetsbare en
      zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref4
        bwb_id: BWBR0041313
  - number: 11.1.f
    text: |-
      het college van burgemeester en wethouders, het dagelijks bestuur van het waterschap en gedeputeerde staten,
      als het gaat om het vervoer van gevaarlijke stoffen over wegen in beheer bij de gemeente, het waterschap,
      respectievelijk de provincie, die niet behoren tot het basisnet en als het plaatsgebonden risico op de as van de
      weg hoger is dan 1 op de 1.000.000 per jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.1
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: weg_behoort_tot_basisnet
            type: boolean
            required: true
            description: Of de weg behoort tot het basisnet
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico op de as van de weg (als breuk, bijv. 0.000001)
            source: {}
        output:
          - name: verplichting_gegevensverzameling_externe_veiligheid
            type: boolean
            description: Of het bestuursorgaan verplicht is gegevens te verzamelen over externe veiligheidsrisico's
        actions:
          - output: verplichting_gegevensverzameling_externe_veiligheid
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $weg_behoort_tot_basisnet
                    value: true
                - operation: GREATER_THAN
                  subject: $plaatsgebonden_risico_per_jaar
                  value: 0.000001
  - number: '11.2'
    text: |-
      De bestuursorganen, bedoeld in [artikel 11.1][ref1], verzamelen de volgende gegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.2
    references:
