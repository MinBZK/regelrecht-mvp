        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 8.15.3
    text: |-
      Op de beoordeling van de aanvraag zijn de [artikelen 5.29, tweede en derde lid][ref1], en [5.30][ref2] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.15
