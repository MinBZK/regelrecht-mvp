  - number: 8.74t.3
    text: |-
      Voor de berekening van de periode van acht jaar, bedoeld in het tweede lid, onder e, telt de periode waarin een
      onvoorwaardelijke vrijheidsstraf is ondergaan, niet mee.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74t.4
    text: |-
      Een omgevingsvergunning voor een jachtgeweeractiviteit wordt in afwijking van het eerste lid, aanhef en onder a,
      niet geweigerd als de aanvrager niet met gunstig gevolg een examen voor een jachtgeweeractiviteit heeft afgelegd,
      als hem vanwege het met gunstig gevolg behalen van een krachtens de [Jachtwet][ref1] erkend jachtexamen:


      [ref1]: https://wetten.overheid.nl/BWBR0002155
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0002155
  - number: 8.74t.4.a
    text: |-
      in de periode van 1 januari 1977 tot en met 31 maart 2002 een jachtakte als bedoeld in de [Jachtwet][ref1] is
      uitgereikt; of


      [ref1]: https://wetten.overheid.nl/BWBR0002155
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0002155
  - number: 8.74t.4.b
    text: |-
      in de periode van 1 april 2002 tot en met 30 september 2004 een jachtakte als bedoeld in de
      [Flora- en faunawet][ref1] is uitgereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0009640
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
    references:
      - id: ref1
        bwb_id: BWBR0009640
  - number: 8.74t.5
    text: |-
      Het eerste lid, aanhef en onder e en f, is niet van toepassing als de aanvrager een nog geldende
      omgevingsvergunning voor een jachtgeweeractiviteit heeft, tenzij de toepassing van die onderdelen naar het oordeel
      van de korpschef noodzakelijk is voor de beoordeling of sprake is van een situatie als bedoeld in het tweede lid,
      onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74t
  - number: 8.74u
    text: |-
      [Artikel 8.74t, eerste lid, aanhef en onder c][ref1], geldt niet als de aanvrager van een omgevingsvergunning
      voor een jachtgeweeractiviteit:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74u
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        afdeling: 8.6a
  - number: 8.74u.a
    text: geen woonplaats in Nederland heeft; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74u
  - number: 8.74u.b
    text: |-
      genoegzaam aantoont dat hij is gerechtigd de jacht uit te oefenen in het land waarin hij zijn woon- of
      verblijfplaats heeft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74u
  - number: 8.74v
    text: |-
      Als toepassing wordt gegeven aan [artikel 8.74u][ref1], wordt aan een omgevingsvergunning voor een
      jachtgeweeractiviteit het voorschrift verbonden dat de houder zich bij het gebruik van het geweer bevindt
      in gezelschap van een in Nederland woonachtige houder van een geldige omgevingsvergunning voor een
      jachtgeweeractiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74v
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        afdeling: 8.6a
  - number: 8.74w.1
    text: 'Een omgevingsvergunning voor een valkeniersactiviteit wordt alleen verleend als de aanvrager:'
