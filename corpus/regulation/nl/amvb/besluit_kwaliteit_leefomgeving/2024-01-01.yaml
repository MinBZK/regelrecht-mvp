        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.2'
  - number: 9.3.1
    text: |-
      Er wordt geen projectbesluit door een van Onze Ministers vastgesteld voor het uitvoeren van een project binnen
      het natuurnetwerk Nederland dat nadelige gevolgen kan hebben voor de wezenlijke kenmerken en waarden van het
      natuurnetwerk, bedoeld in [artikel 7.7, eerste lid][ref1], tenzij verzekerd is dat deze gevolgen tijdig worden
      gecompenseerd, zodanig dat de kwaliteit, oppervlakte en samenhang van het natuurnetwerk behouden blijven.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.3
    references:
