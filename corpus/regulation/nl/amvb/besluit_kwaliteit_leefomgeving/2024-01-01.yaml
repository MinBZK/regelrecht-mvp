  - number: ‘11.7’
    text: |-
      Het college van burgemeester en wethouders, het dagelijks bestuur van het waterschap en gedeputeerde staten
      verzamelen gegevens over externe veiligheidsrisico’s van het vervoer van gevaarlijke stoffen als bedoeld in
      [artikel 1 van de Wet vervoer gevaarlijke stoffen][ref1], over wegen in beheer bij de gemeente, het waterschap
      respectievelijk de provincie, als het gaat om wegen die niet behoren tot het basisnet en als het plaatsgebonden
      risico op de as van de weg hoger is dan 1 op de 1.000.000 per jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0007606#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0007606
        artikel: ‘1’
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: weg_behoort_tot_basisnet
            type: boolean
            required: true
            description: Of de weg behoort tot het basisnet
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico op de as van de weg (als breuk, bijv. 0.000001)
            source: {}
        output:
          - name: verplichting_gegevensverzameling_vervoer_gevaarlijke_stoffen
            type: boolean
            description: >-
              Of het bestuursorgaan verplicht is gegevens te
              verzamelen over externe veiligheidsrisico’s van vervoer
              gevaarlijke stoffen
        actions:
          - output: verplichting_gegevensverzameling_vervoer_gevaarlijke_stoffen
            value:
              operation: AND
              conditions:
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $weg_behoort_tot_basisnet
                    value: true
                - operation: GREATER_THAN
                  subject: $plaatsgebonden_risico_per_jaar
                  value: 0.000001
