        afdeling: '2.2'
  - number: 2.19.1
    text: |-
      Een zwemlocatie voldoet in ieder geval aan de klasse aanvaardbaar, bedoeld in bijlage II, onder 2, bij de
      zwemwaterrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.19
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: zwemlocatie_id
            type: string
            required: true
            description: Identificatie van de zwemlocatie
        input:
          - name: zwemwaterklasse
            type: string
            description: >-
              Classificatie van de zwemlocatie volgens bijlage II bij de
              zwemwaterrichtlijn (uitstekend, goed, aanvaardbaar, slecht)
            source: {}
        output:
          - name: voldoet_zwemwaterkwaliteit
            type: boolean
            description: Of de zwemlocatie voldoet aan de omgevingswaarde (ten minste klasse aanvaardbaar)
        actions:
          - output: voldoet_zwemwaterkwaliteit
            value:
              operation: IN
              subject: $zwemwaterklasse
              values:
                - uitstekend
                - goed
                - aanvaardbaar
  - number: 2.19.2
    text: De omgevingswaarde, bedoeld in het eerste lid, is een resultaatsverplichting.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.19
  - number: 2.19.3
    text: |-
      Bij omgevingsverordening kan voor de kwaliteit van een zwemlocatie een aanvullende omgevingswaarde of een
      afwijkende omgevingswaarde die strenger is dan de omgevingswaarde, bedoeld in het eerste lid, worden vastgesteld.
      Bij de vaststelling daarvan worden de economische effecten betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.19
  - number: '2.20'
    text: |-
      In afwijking van [artikel 2.19, eerste lid][ref1], en in overeenstemming met artikel 5, vierde lid, van de
      zwemwaterrichtlijn mag een zwemlocatie zich tijdelijk in de klasse slecht bevinden als aan het begin van het
      badseizoen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.20
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.3
        afdeling: '2.2'
  - number: 2.20.a
    text: |-
      gedeputeerde staten passende zwemwaterbeheersmaatregelen treffen, waaronder het geven van een negatief zwemadvies
      of het instellen van een zwemverbod, om de blootstelling van zwemmers aan zwemwaterverontreiniging te voorkomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.20
  - number: 2.20.b
    text: |-
      de beheerder van het oppervlaktewaterlichaam de oorzaken van zwemwaterverontreiniging waardoor de klasse
      aanvaardbaar niet is bereikt, identificeert en passende maatregelen treft om verontreiniging te voorkomen of te
      beperken of de oorzaken weg te nemen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.20
  - number: 2.20.c
    text: |-
      gedeputeerde staten het publiek voorlichten in overeenstemming met
      [artikel 10.39, derde lid, van het Omgevingsbesluit][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.20
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
  - number: '3.1'
    text: |-
      Ter voorbereiding van het programma van maatregelen mariene strategie stelt Onze Minister van Infrastructuur en
      Waterstaat, in overeenstemming met Onze Minister voor Natuur en Stikstof, voor de Nederlandse mariene wateren vast:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.1
  - number: 3.1.a
    text: de initiële beoordeling, bedoeld in artikel 8 van de kaderrichtlijn mariene strategie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.1
  - number: 3.1.b
    text: |-
      de omschrijving van de goede milieutoestand, bedoeld in artikel 9, eerste lid, in samenhang met artikel 3, vierde
      en vijfde lid, van de kaderrichtlijn mariene strategie; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.1
  - number: 3.1.c
    text: |-
      de milieudoelen en bijbehorende indicatoren, bedoeld in artikel 10, eerste lid, in samenhang met artikel 3, zevende
      lid, van de kaderrichtlijn mariene strategie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.1
  - number: '3.2'
    text: |-
      Gedeputeerde staten wijzen jaarlijks, in overeenstemming met de beheerders van de oppervlaktewaterlichamen, uit de
      locaties waar naar hun oordeel door een groot aantal personen wordt gezwommen de zwemlocaties aan. Zij betrekken
      bij het aanwijzen van zwemlocaties:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.2
  - number: 3.2.a
    text: de ontwikkelingen van het aantal personen dat op de locaties zwemt, de infrastructuur of faciliteiten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.2
  - number: 3.2.b
    text: de ter bevordering van het zwemmen getroffen maatregelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.2
  - number: 3.3.1
    text: |-
      Een locatie wordt niet meer als zwemlocatie aangewezen als deze zwemlocatie zich gedurende vijf opeenvolgende jaren
      in de klasse slecht, bedoeld in bijlage II, onder 1, bij de zwemwaterrichtlijn, bevond.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.3
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: zwemlocatie_id
            type: string
            required: true
            description: Identificatie van de zwemlocatie
        input:
          - name: aantal_opeenvolgende_jaren_slecht
            type: number
            description: Aantal opeenvolgende jaren dat de zwemlocatie in de klasse slecht is ingedeeld
            source: {}
        output:
          - name: moet_aanwijzing_worden_ingetrokken
            type: boolean
            description: Of de locatie niet meer als zwemlocatie mag worden aangewezen (vijf opeenvolgende jaren slecht)
        actions:
          - output: moet_aanwijzing_worden_ingetrokken
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $aantal_opeenvolgende_jaren_slecht
              value: 5
  - number: 3.3.2
    text: |-
      Als een locatie niet meer als zwemlocatie wordt aangewezen op grond van het eerste lid, geven gedeputeerde staten
      een negatief zwemadvies of stellen zij een zwemverbod in.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.3
  - number: '3.4'
    text: Gedeputeerde staten stellen per zwemlocatie het begin en het einde van het badseizoen vast.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.4
  - number: 3.5.1
    text: |-
      Gedeputeerde staten dragen er zorg voor dat jaarlijks een onderzoek naar de veiligheid van de zwemlocatie wordt
      verricht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.5
  - number: 3.5.2
    text: |-
      Op grond van de resultaten van het onderzoek treffen zowel de beheerder van het oppervlaktewaterlichaam als
      gedeputeerde staten maatregelen om de veiligheid van de zwemlocaties te waarborgen of te verbeteren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.5
  - number: 3.6.1
    text: |-
      De beheerder van het oppervlaktewaterlichaam draagt er zorg voor dat voor een zwemlocatie een zwemwaterprofiel
      wordt opgesteld als bedoeld in artikel 6 van de zwemwaterrichtlijn in overeenstemming met bijlage III bij die
      richtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.6
  - number: 3.6.2
    text: Een zwemwaterprofiel kan betrekking hebben op één zwemlocatie of op meerdere aangrenzende zwemlocaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.6
  - number: 3.6.3
    text: |-
      Op basis van het zwemwaterprofiel draagt de beheerder van het oppervlaktewaterlichaam er zorg voor dat er
      maatregelen worden getroffen om te voldoen aan de omgevingswaarde, bedoeld in [artikel 2.19][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.6
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.3
        afdeling: '2.2'
  - number: 3.6.4
    text: |-
      Zowel de beheerder van het oppervlaktewaterlichaam als gedeputeerde staten dragen er zorg voor dat realistische en
      evenredige maatregelen worden getroffen voor het behoud of het verbeteren van de kwaliteit van de zwemlocatie en om
      het aantal als uitstekend of goed ingedeelde zwemlocaties te laten toenemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.6
  - number: 3.7.1
    text: |-
      Als zich een overmatige groei van cyanobacteriën voordoet en gedeputeerde staten een gezondheidsrisico vaststellen
      of vermoeden, dragen gedeputeerde staten en de beheerder van het oppervlaktewaterlichaam er elk zorg voor
      dat onverwijld passende zwemwaterbeheersmaatregelen worden getroffen ter voorkoming van blootstelling aan
      zwemwaterverontreiniging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.7
  - number: 3.7.2
    text: |-
      Als zich een overmatige groei van macroalgen of marien fytoplankton voordoet en gedeputeerde staten
      een gezondheidsrisico vaststellen of vermoeden, dragen gedeputeerde staten en de beheerder van het
      oppervlaktewaterlichaam er elk zorg voor dat passende zwemwaterbeheersmaatregelen worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.7
  - number: '3.8'
    text: |-
      Als de beheerder van het oppervlaktewaterlichaam naar aanleiding van de monitoring, bedoeld in
      [artikel 11.44, derde lid][ref1], een zwemwaterverontreiniging door teerachtige residuen, glas, plastic, rubber
      of ander afval vaststelt, dragen zowel de beheerder van het oppervlaktewaterlichaam als gedeputeerde staten er zorg
      voor dat passende zwemwaterbeheersmaatregelen worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.4
        afdeling: '11.2'
  - number: '3.9'
    text: |-
      De beheerder van het oppervlaktewaterlichaam treft als dit nodig is tijdig passende zwemwaterbeheersmaatregelen als
      hij op de hoogte is van onverwachte situaties die negatieve gevolgen hebben of redelijkerwijs kunnen hebben voor de
      kwaliteit van de zwemlocatie en de gezondheid van zwemmers.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.9
  - number: '3.10'
    text: |-
      De [artikelen 3.7 tot en met 3.9][ref1] gelden alleen gedurende het badseizoen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.2'
  - number: '3.11'
    text: |-
      De beheerder van het oppervlaktewaterlichaam stelt in overeenstemming met bijlage II bij de zwemwaterrichtlijn
      procedures vast voor de voorspelling en aanpak van een kortstondige zwemwaterverontreiniging, zijnde een
      microbiologische besmetting als bedoeld in bijlage I, kolom A, bij de zwemwaterrichtlijn met duidelijk aantoonbare
      oorzaken waarvan normaliter niet wordt verwacht dat zij de zwemwaterkwaliteit langer zal aantasten dan 72 uur vanaf
      het begin van de aantasting.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.11
  - number: '3.12'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt in ieder geval peilbesluiten als bedoeld in
      [artikel 2.41, tweede lid, van de wet][ref1] vast voor de volgende oppervlaktewaterlichamen, grondwaterlichamen of
      onderdelen daarvan:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.12.a
    text: Noordzeekanaal, Afgesloten IJ en Amsterdam-Rijnkanaal;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
  - number: 3.12.b
    text: Grevelingenmeer;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
  - number: 3.12.c
    text: Veerse Meer;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
  - number: 3.12.d
    text: |-
      Volkerak-Zoommeer, Bathse Spuikanaal en Schelde-Rijnverbinding tussen het Volkerak-Zoommeer en de Kreekraksluizen;
      en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
  - number: 3.12.e
    text: |-
      IJsselmeer, Ketelmeer, Vossemeer, Zwarte Meer, Markermeer, IJmeer, Buiten-IJ, Gooimeer, Eemmeer, Wolderwijd,
      Nijkerkernauw, Nuldernauw, Veluwemeer en Drontermeer.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.12
  - number: '3.13'
    text: |-
      Van de verplichting tot vaststelling van een legger, bedoeld in [artikel 2.39, eerste lid, van de wet][ref1], zijn
      de volgende waterstaatswerken of delen daarvan vrijgesteld:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.13.a
    text: |-
      de oppervlaktewaterlichamen Noordzee, Waddenzee, Eems-Dollard, Westerschelde en IJsselmeer, met inbegrip van het
      Zwarte Meer en het Ketelmeer; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.13
  - number: 3.13.b
    text: |-
      de locaties binnen de oppervlaktewaterlichamen in beheer bij het Rijk die niet op grond van
      [artikel 2.21, eerste lid, van de wet][ref1] zijn aangewezen als beperkingengebied met betrekking tot een
      waterstaatswerk in beheer bij het Rijk.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.14.1
    text: |-
      Bij waterschaarste of dreigende waterschaarste wordt, gelet op de verdeling van het beschikbare water over de
      maatschappelijke en ecologische behoeften, bij het beheer van watersystemen de volgende rangorde van behoeften in
      acht genomen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.1.a
    text: het waarborgen van de veiligheid tegen overstroming en het voorkomen van onomkeerbare schade;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.1.b
    text: nutsvoorzieningen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.1.c
    text: kleinschalig hoogwaardig gebruik; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.1.d
    text: overige behoeften.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.2
    text: 'Bij de behoeften, bedoeld in het eerste lid, aanhef en onder a, komt achtereenvolgens prioriteit toe aan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.2.a
    text: de stabiliteit van waterkeringen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.2.b
    text: het voorkomen van klink en zettingen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.2.c
    text: natuur, voor zover het gaat om het voorkomen van onomkeerbare schade.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.3
    text: 'Bij de behoeften, bedoeld in het eerste lid, aanhef en onder b, komt achtereenvolgens prioriteit toe aan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.3.a
    text: de drinkwatervoorziening, voor zover het gaat om het waarborgen van de leveringszekerheid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.3.b
    text: de energievoorziening, voor zover het gaat om het waarborgen van de leveringszekerheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.4
    text: |-
      Bij de behoeften, bedoeld in het eerste lid, aanhef en onder c, komt, gelet op het zo veel mogelijk beperken van de
      maatschappelijke en economische gevolgen, prioriteit toe aan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.4.a
    text: de tijdelijke beregening van kapitaalintensieve gewassen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.4.b
    text: het verwerken van industrieel proceswater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5
    text: |-
      Bij de overige behoeften, bedoeld in het eerste lid, aanhef en onder d, komt, gelet op het zo veel mogelijk
      beperken van de maatschappelijke en economische gevolgen, prioriteit toe aan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.a
    text: scheepvaart;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.b
    text: landbouw;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.c
    text: natuur, voor zover het niet gaat om het voorkomen van onomkeerbare schade;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.d
    text: industrie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.e
    text: waterrecreatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.f
    text: binnenvisserij;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.g
    text: de drinkwatervoorziening, anders dan de drinkwatervoorziening, bedoeld in het derde lid, aanhef en onder a;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.h
    text: de energievoorziening, anders dan de energievoorziening, bedoeld in het derde lid, aanhef en onder b; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: 3.14.5.i
    text: overige belangen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.14
  - number: '3.15'
    text: |-
      Het door de beheerder vast te stellen calamiteitenplan, bedoeld in [artikel 19.14 van de wet][ref1], bevat in ieder
      geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 3.15.a
    text: |-
      een overzicht van de soorten calamiteiten die zich in de watersystemen of onderdelen daarvan kunnen voordoen,
      waaronder een inventarisatie van de daarmee gepaard gaande risico’s;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.b
    text: |-
      een overzicht van te treffen maatregelen, met inbegrip van de maatregelen die voortkomen uit de voor die
      watersystemen geldende overstromingsrisicobeheerplannen, en het beschikbare materieel, benodigd om de verschillende
      calamiteiten het hoofd te bieden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.c
    text: een overzicht van de diensten, instanties en organisaties, die bij gevaar kunnen worden ingeschakeld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.d
    text: |-
      een beschrijving van het moment en de wijze waarop burgemeesters van de gemeenten en voorzitters van de
      veiligheidsregio’s waarbinnen de watersystemen of onderdelen daarvan liggen door de beheerder worden geïnformeerd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.e
    text: een schema van de calamiteitenorganisatie van de beheerder;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.f
    text: een meld- en alarmeringsprocedure; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15.g
    text: een overzicht waaruit blijkt hoe de beheerder de kwaliteit van de calamiteitenorganisatie waarborgt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15
  - number: 3.15a.1
    text: |-
      Het bestuursorgaan waaraan op grond van [artikel 2.17][ref1], [2.18][ref2] of [2.19 van de wet][ref3] het
      beheer of de bescherming van de kwaliteit van het desbetreffende grond- of oppervlaktewaterlichaam is toegedeeld
      voert de risicobeoordeling en het risicobeheer uit van onttrekkingsgebieden voor waterwinlocaties, bedoeld in
      de artikelen 7, eerste lid, aanhef en onder a, 8, eerste, tweede en vierde lid, en 13, achtste lid, onder a,
      van de drinkwaterrichtlijn, voor die grond- of oppervlaktewaterlichamen waarvoor de maatschappelijke functie
      «drinkwateronttrekking» is vastgelegd in een regionaal waterprogramma of het nationale waterprogramma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.15a.2
    text: |-
      De risicobeoordeling en het risicobeheer, bedoeld in het eerste lid, worden voor de eerste maal uiterlijk
      op 12 juli 2027 uitgevoerd en vervolgens elke zes jaar geactualiseerd, of tussentijds als wijzigingen in de
      omstandigheden daartoe aanleiding geven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15a
  - number: 3.15a.3
    text: Als dat noodzakelijk is in het belang van de gezondheid worden zo nodig eerder maatregelen getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15a
  - number: 3.15b.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties
      voeren de risicobeoordeling uit van huishoudelijke leidingnetten, bedoeld in de artikelen 7, eerste lid, aanhef en
      onder c, en zesde lid en 10, eerste lid, van de drinkwaterrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15b
  - number: 3.15b.2
    text: |-
      De risicobeoordeling van de huishoudelijke leidingnetten wordt voor de eerste keer uiterlijk op 12 januari 2029
      uitgevoerd. De risicobeoordeling wordt om de zes jaar herzien, en waar nodig geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15b
  - number: 3.15b.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties
      dragen zorg voor het treffen van maatregelen om de met het huishoudelijke leidingnet samenhangende risico’s te
      beperken als bedoeld in artikel 10, tweede en derde lid, van de drinkwaterrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15b
  - number: 3.15b.4
    text: Als dat noodzakelijk is in het belang van de gezondheid worden zo nodig eerder maatregelen getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.15b
  - number: '3.16'
    text: |-
      Het gemeentebestuur draagt er zorg voor dat een openbaar vuilwaterriool zo wordt ontworpen, gebouwd en onderhouden
      dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.16
  - number: 3.16.a
    text: het zoveel mogelijk is berekend op de eigenschappen, samenstelling en hoeveelheid van het afvalwater;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.16
  - number: 3.16.b
    text: lekkage zoveel mogelijk wordt voorkomen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.16
  - number: 3.16.c
    text: het aantal overstortingen zo beperkt is als voor een doelmatig beheer van afvalwater mogelijk is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.16
  - number: 3.17.1
    text: |-
      Bij het ontwerpen en bouwen van een zuiveringtechnisch werk door het waterschapsbestuur of het gemeentebestuur
      wordt voldaan aan de eisen, bedoeld in artikel 10 van de richtlijn stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.17
  - number: 3.17.2
    text: |-
      Als het waterschapsbestuur een andere rechtspersoon heeft belast met de exploitatie van een zuiveringtechnisch
      werk en onderdeel van die exploitatie het ontwerpen of bouwen van het zuiveringtechnisch werk is, draagt het
      waterschapsbestuur er zorg voor dat die rechtspersoon bij het ontwerpen of bouwen voldoet aan de eisen, bedoeld in
      artikel 10 van de richtlijn stedelijk afvalwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.17
  - number: 3.18.1
    text: Deze afdeling is van toepassing op het geluid door wegen, spoorwegen en industrieterreinen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.2
    text: 'Bij de toepassing van deze afdeling worden geluidgevoelige gebouwen in aanmerking genomen die:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.2.a
    text: |-
      zijn toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.2.b
    text: geheel of gedeeltelijk in een geluidaandachtsgebied liggen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.3
    text: 'In afwijking van het eerste lid is deze afdeling niet van toepassing op het geluid:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.3.a
    text: op een geluidgevoelig gebouw dat op een industrieterrein ligt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.3.b
    text: op een niet-geluidgevoelige gevel.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: 3.18.4
    text: |-
      In afwijking van het tweede lid wordt een geluidgevoelig gebouw dat op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit is toegelaten voor een duur van niet meer dan
      tien jaar niet in aanmerking genomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.18
  - number: '3.19'
    text: |-
      Voor de toepassing van deze afdeling wordt onder woonschip verstaan: drijvend bouwwerk met een woonfunctie op een
      locatie die in het omgevingsplan is aangewezen als een ligplaats voor een woonschip.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.19
  - number: 3.20.1
    text: |-
      Een geluidaandachtsgebied is een locatie langs een weg of spoorweg of rond een industrieterrein waarbinnen het
      geluid hoger kan zijn dan de standaardwaarde in L, bedoeld in [tabel 3.34][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.20
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.20.2
    text: Op het bepalen van het geluidaandachtsgebied zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.20
  - number: 3.21.1
    text: 'Een geluidgevoelig gebouw is een gebouw of een gedeelte van een gebouw met een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.1.a
    text: woonfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.1.b
    text: onderwijsfunctie en nevengebruiksfuncties daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.1.c
    text: gezondheidszorgfunctie met bedgebied en nevengebruiksfuncties daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.1.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied en nevengebruiksfuncties daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.2
    text: |-
      Het eerste lid geldt niet voor een gedeelte van een gebouw als het omgevingsplan in dat gedeelte van het gebouw
      geen geluidgevoelige ruimten toelaat, tenzij het gebouw een woonschip of woonwagen is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.21.3
    text: |-
      Onder een geluidgevoelig gebouw wordt ook verstaan een geluidgevoelig gebouw dat nog niet aanwezig is, maar op
      grond van het omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit mag worden
      gebouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.21
  - number: 3.22.1
    text: 'Een geluidgevoelige ruimte is een verblijfsruimte of verblijfsgebied van een:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: 3.22.1.a
    text: woonfunctie of bijeenkomstfunctie die een nevengebruiksfunctie is van die woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: 3.22.1.b
    text: onderwijsfunctie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: 3.22.1.c
    text: |-
      gezondheidszorgfunctie met bedgebied of bijeenkomstfunctie die een nevengebruiksfunctie is van die
      gezondheidszorgfunctie; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: 3.22.1.d
    text: bijeenkomstfunctie voor kinderopvang met bedgebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: 3.22.2
    text: |-
      In afwijking van het eerste lid, aanhef en onder a, worden ruimten in woonschepen en woonwagens niet als
      geluidgevoelig beschouwd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.22
  - number: '3.23'
    text: 'Standaardwaarden en grenswaarden voor geluid gelden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.23.a
    text: 'op een geluidgevoelig gebouw, anders dan een woonschip of woonwagen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.23.a.1°
    text: op de gevel, als het gaat om een geluidgevoelig gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.23.a.2°
    text: op de locatie waar een gevel mag komen, als het gaat om een nieuw te bouwen geluidgevoelig gebouw;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.23.b
    text: |-
      op de begrenzing van de locatie voor het plaatsen van een woonschip of woonwagen, als het gaat om een woonschip of
      woonwagen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.23.c
    text: in de geluidgevoelige ruimte, als het gaat om een geluidgevoelige ruimte.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.23
  - number: 3.24.1
    text: |-
      Bij het bepalen van het geluid door een weg of spoorweg wordt voor de geluideigenschappen van een wegdek of een
      spoorconstructie uitgegaan van de geluideigenschappen zoals die gemiddeld zijn gedurende de technische levensduur
      van dat wegdek of die spoorconstructie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.2
    text: 'Bij het bepalen van het geluid door een spoorweg wordt het geluid door spoorvoertuigen op spoorwegemplacementen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.2.a
    text: betrokken bij een hoofdspoorweg of een bij omgevingsverordening aangewezen lokale spoorweg; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.2.b
    text: niet betrokken bij een lokale spoorweg, tenzij die bij omgevingsverordening is aangewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.3
    text: |-
      Bij het bepalen van het geluid door een weg of spoorweg wordt het geluid door alle tot die geluidbronsoort
      behorende wegen of spoorwegen betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.4
    text: |-
      Bij het bepalen van het geluid op een geluidreferentiepunt van een weg of spoorweg wordt een werk of bouwwerk
      betrokken als dit onderdeel is van de geluidbrongegevens behorende bij het geluidproductieplafond.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.24.5
    text: Op het bepalen van het geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.24
  - number: 3.25.1
    text: 'Als een geluidgevoelig gebouw ligt in het geluidaandachtsgebied van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.1.a
    text: |-
      één industrieterrein, wordt het geluid door dat industrieterrein betrokken bij het bepalen van het geluid op dat
      gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.1.b
    text: |-
      meerdere industrieterreinen, wordt het geluid door die industrieterreinen betrokken bij het bepalen van het geluid
      op dat gebouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.2
    text: 'Bij het bepalen van het geluid op een geluidreferentiepunt van een industrieterrein worden betrokken:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.2.a
    text: het geluid door alleen dat industrieterrein;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.2.b
    text: werken of bouwwerken als deze onderdeel zijn van de geluidbrongegevens behorende bij het geluidproductieplafond; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.2.c
    text: |-
      het geluid door activiteiten, anders dan het wonen, die op het industrieterrein worden verricht en die zijn
      toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.3
    text: 'Bij het bepalen van het geluid door een industrieterrein wordt buiten beschouwing gelaten het geluid door:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.3.a
    text: windturbines, windparken, civiele buitenschietbanen, militaire buitenschietbanen en militaire springterreinen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.3.b
    text: |-
      activiteiten waarvoor het omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit
      waarborgt dat het langtijdgemiddelde beoordelingsniveau L van het geluid op een afstand van 30 m vanaf de
      begrenzing van de locatie waar de activiteit wordt verricht, niet meer bedraagt dan de standaardwaarden, bedoeld in
      [tabel 5.65.1][ref1], verminderd met 5 dB;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 3.25.3.c
    text: het TT Circuit Assen en het Circuit Park Zandvoort gedurende ten hoogste 12 dagen per kalenderjaar;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.3.d
    text: |-
      spoorvoertuigen op spoorwegemplacementen die onderdeel zijn van een hoofdspoorweg of een bij omgevingsverordening
      aangewezen lokale spoorweg; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.3.e
    text: verkeer op wegen, vaarwegen en spoorwegen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: 3.25.4
    text: Op het bepalen van het geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.25
  - number: '3.26'
    text: 'Deze paragraaf is van toepassing op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.26
  - number: 3.26.a
    text: |-
      verharde gemeentewegen en waterschapswegen, niet zijnde een erf in de zin van het
      [Reglement verkeersregels en verkeerstekens 1990][ref1], met een verkeersintensiteit van meer dan
      1.000 motorvoertuigen per etmaal als kalenderjaargemiddelde; en


      [ref1]: https://wetten.overheid.nl/BWBR0004825
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.26
    references:
      - id: ref1
        bwb_id: BWBR0004825
  - number: 3.26.b
    text: lokale spoorwegen die niet bij omgevingsverordening zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.26
  - number: 3.27.1
    text: 'De basisgeluidemissie van een gemeenteweg, waterschapsweg of lokale spoorweg is:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.1.a
    text: |-
      de geluidemissie in L van die weg of spoorweg in het eerste jaar waarvoor die geluidemissie op grond van
      [artikel 11.46][ref1] wordt bepaald, voor een op het tijdstip van inwerkingtreding van dit besluit bestaande weg
      of spoorweg; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 3.27.1.b
    text: de geluidemissie in L die ten grondslag ligt aan het besluit tot aanleg of wijziging van die weg of spoorweg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.2
    text: |-
      Als een lokale spoorweg grotendeels is verweven of gebundeld met een gemeenteweg, kan de basisgeluidemissie van die
      gemeenteweg worden gebaseerd op het geluid door die gemeenteweg en die lokale spoorweg gezamenlijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.3
    text: |-
      De basisgeluidemissie van een rijksweg of provinciale weg waarvoor geluidproductieplafonds als omgevingswaarden
      zijn vastgesteld en waarvan het beheer wordt overgedragen aan een gemeente of een waterschap en van een
      hoofdspoorweg die na het tijdstip van inwerkingtreding van dit besluit bij koninklijk besluit wordt aangewezen als
      lokale spoorweg is de geluidemissie op grond van de geluidbrongegevens, behorende bij het op het tijdstip van de
      overdracht of de aanwijzing geldende geluidproductieplafond.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.4
    text: |-
      De basisgeluidemissie van een lokale spoorweg waarvoor geluidproductieplafonds als omgevingswaarden zijn
      vastgesteld, en waarvoor die geluidproductieplafonds komen te vervallen, is de geluidemissie op grond van de
      geluidbrongegevens, behorende bij het op het tijdstip van de intrekking geldende geluidproductieplafond.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.5
    text: |-
      Op het bepalen van de geluidemissie van een gemeenteweg, waterschapsweg of lokale spoorweg zijn de bij ministeriële
      regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.6
    text: |-
      Als basisgeluidemissie van een gemeenteweg, een lokale spoorweg die niet bij omgevingsverordening is aangewezen
      respectievelijk een waterschapsweg kan worden gehanteerd:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.6.a
    text: een lagere waarde dan de geluidemissie, bedoeld in het eerste lid, onder a of b;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.27.6.b
    text: |-
      de geluidemissie die ten grondslag ligt aan de afweging, bedoeld in [artikel 3.28][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 3.27.6.c
    text: een waarde die volgt uit wijziging van de regels, bedoeld in het vijfde lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.27
  - number: 3.28.1
    text: |-
      Als het college van burgemeester en wethouders of het dagelijks bestuur van een waterschap naar aanleiding
      van de monitoring, bedoeld in [artikel 11.47][ref1], vaststelt dat de basisgeluidemissie met meer dan 1,5 dB
      is overschreden, beziet het college respectievelijk het dagelijks bestuur voor een geluidgevoelig gebouw
      waarop het geluid meer dan 1,5 dB hoger is dan in de situatie waarop de basisgeluidemissie betrekking heeft of
      geluidbeperkende maatregelen of geluidwerende maatregelen worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
  - number: 3.28.2
    text: |-
      Als het college respectievelijk het dagelijks bestuur naar aanleiding van de monitoring vaststelt dat voor het
      in het eerste lid bedoelde geluidgevoelige gebouw sprake is van een overschrijding van de grenswaarde, bedoeld
      in [tabel 3.35][ref1], en die overschrijding niet ongedaan wordt gemaakt met het treffen van de in het eerste lid
      bedoelde geluidbeperkende maatregelen, bepaalt het college respectievelijk het dagelijks bestuur met toepassing van
      [paragraaf 3.5.5][ref2] bij besluit of en zo ja, welke geluidwerende maatregelen aan dat gebouw worden getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        hoofdstuk: '3'
        paragraaf: 3.5.5
        afdeling: '3.5'
  - number: 3.29.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat draagt er zorg voor dat bij het aanleggen van bij ministeriële
      regeling aangewezen rijkswegen of het vervangen van het wegdek van die wegen een wegdek van zeer open asfaltbeton
      of een akoestisch ten minste gelijkwaardig wegdek wordt toegepast, tenzij overwegende bezwaren van technische aard
      zich hiertegen verzetten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.29
  - number: 3.29.2
    text: |-
      De beheerder, bedoeld in [artikel 1, eerste lid, van de Spoorwegwet][ref1], draagt er zorg voor dat voor bij
      ministeriële regeling aangewezen hoofdspoorwegen:


      [ref1]: https://wetten.overheid.nl/BWBR0015007#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.29
    references:
      - id: ref1
        bwb_id: BWBR0015007
        artikel: '1'
  - number: 3.29.2.a
    text: |-
      bij het aanleggen of het vervangen van een spoorconstructie van die hoofdspoorwegen een constructie van langgelast
      spoor in een ballastbed op betonnen dwarsliggers op een zandlichaam of een akoestisch ten minste gelijkwaardige
      constructie wordt toegepast, tenzij overwegende bezwaren van technische aard zich hiertegen verzetten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.29
  - number: 3.29.2.b
    text: |-
      de bogen en wissels op een spoorwegemplacement, die naar het oordeel van Onze Minister van Infrastructuur en
      Waterstaat relevant zijn voor het geluid op geluidgevoelige gebouwen, een werkend spoorstaafconditioneringssysteem
      hebben of dat hiervoor een akoestisch ten minste gelijkwaardige techniek wordt toegepast.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.29
  - number: '3.30'
    text: |-
      [Paragraaf 3.5.4][ref1] is van toepassing op de vaststelling van geluidproductieplafonds als omgevingswaarden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: '3.31'
    text: 'Bij de vaststelling van een geluidproductieplafond als omgevingswaarde worden bepaald:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.31
  - number: 3.31.a
    text: de geluidreferentiepunten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.31
  - number: 3.31.b
    text: de geluidbrongegevens; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.31
  - number: 3.31.c
    text: het geluidaandachtsgebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.31
  - number: 3.32.1
    text: 'Voor een weg of spoorweg liggen de geluidreferentiepunten op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.32
  - number: 3.32.1.a
    text: |-
      een afstand van ten hoogste 60 m vanaf het midden van de dichtstbijzijnde rijstrook of het dichtstbijzijnde spoor,
      aan weerszijden van de weg of spoorweg;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.32
  - number: 3.32.1.b
    text: een onderlinge afstand van ten hoogste 120 m; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.32
  - number: 3.32.1.c
    text: een afstand van 4 m boven het maaiveld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.32
  - number: 3.32.2
    text: |-
      Als langs de weg of spoorweg een bij de weg of spoorweg behorend bouwwerk of werk ligt dat is opgenomen in de
      geluidbrongegevens, kunnen geluidreferentiepunten op een afstand liggen die groter is dan de afstand, bedoeld in
      het eerste lid, onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.32
  - number: 3.33.1
    text: 'Voor een industrieterrein liggen de geluidreferentiepunten op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.33
  - number: 3.33.1.a
    text: |-
      een afstand van 0,5 x √ S vanaf de in het omgevingsplan vastgelegde begrenzing van het industrieterrein, waarbij S
      de oppervlakte van het industrieterrein is, en waarbij de afstand ten minste 50 m en ten hoogste 500 m is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.33
  - number: 3.33.1.b
    text: een onderlinge afstand van ten hoogste de met toepassing van onderdeel a bepaalde afstand; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.33
  - number: 3.33.1.c
    text: een afstand van 4 m boven het maaiveld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.33
  - number: 3.33.2
    text: |-
      Als dat noodzakelijk is voor het beperken van het geluid op geluidgevoelige gebouwen, kunnen geluidreferentiepunten
      worden toegevoegd op een afstand vanaf de begrenzing van het industrieterrein die niet groter is dan de met
      toepassing van het eerste lid, onder a, bepaalde afstand. Het eerste lid, onder b en c, is niet van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.33
  - number: 3.34.1
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde is het geluid op een geluidgevoelig gebouw
      niet hoger dan de hoogste van de volgende twee waarden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
    machine_readable:
      definitions:
        # Tabel 3.34: Standaardwaarde geluid op geluidgevoelig gebouw per geluidbronsoort (in Lden dB)
        standaardwaarde_provinciale_wegen: 50
        standaardwaarde_rijkswegen: 50
        standaardwaarde_gemeentewegen: 53
        standaardwaarde_waterschapswegen: 53
        standaardwaarde_lokale_spoorwegen: 55
        standaardwaarde_hoofdspoorwegen: 55
        standaardwaarde_industrieterreinen_lden: 50
        standaardwaarde_industrieterreinen_lnight: 40
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: geluidbronsoort
            type: string
            required: true
            description: >-
              Type geluidbron (provinciale_wegen, rijkswegen,
              gemeentewegen, waterschapswegen, lokale_spoorwegen,
              hoofdspoorwegen, industrieterreinen)
        input:
          - name: geluid_op_gebouw
            type: number
            description: Gemeten of berekend geluid op het geluidgevoelige gebouw in Lden dB
            source: {}
          - name: geluid_bij_benutting_bestaand_plafond
            type: number
            description: Geluid bij volledige benutting van het bestaande geluidproductieplafond in Lden dB
            source: {}
        output:
          - name: standaardwaarde
            type: number
            description: De standaardwaarde voor de betreffende geluidbronsoort in Lden dB
          - name: maximaal_toelaatbaar_geluid
            type: number
            description: De hoogste van de standaardwaarde en het geluid bij benutting bestaand plafond
          - name: voldoet_standaardwaarde_geluid
            type: boolean
            description: Of het geluid op het gebouw niet hoger is dan het maximaal toelaatbare geluid
        actions:
          - output: standaardwaarde
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - provinciale_wegen
                      - rijkswegen
                  then: $standaardwaarde_rijkswegen
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - gemeentewegen
                      - waterschapswegen
                  then: $standaardwaarde_gemeentewegen
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - lokale_spoorwegen
                      - hoofdspoorwegen
                  then: $standaardwaarde_hoofdspoorwegen
                - when:
                    operation: EQUALS
                    subject: $geluidbronsoort
                    value: industrieterreinen
                  then: $standaardwaarde_industrieterreinen_lden
              default: 0
          - output: maximaal_toelaatbaar_geluid
            value:
              operation: MAX
              values:
                - $standaardwaarde
                - $geluid_bij_benutting_bestaand_plafond
          - output: voldoet_standaardwaarde_geluid
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $geluid_op_gebouw
              value: $maximaal_toelaatbaar_geluid
  - number: 3.34.1.a
    text: de standaardwaarde, bedoeld in tabel 3.34; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.1.b
    text: |-
      het geluid bij volledige benutting van het geluidproductieplafond dat gold op het tijdstip van de vaststelling van
      het in de aanhef bedoelde geluidproductieplafond.
                Tabel 3.34: Standaardwaarde geluid op een geluidgevoelig gebouw per geluidbronsoort


                        *Geluidbronsoort*


                        *Standaardwaarde*


                        Provinciale wegen
                        Rijkswegen


                        50 L


                        Gemeentewegen
                        Waterschapswegen


                        53 L


                        Lokale spoorwegen
                        Hoofdspoorwegen


                        55 L


                        Industrieterreinen


                        50 L


                        40 L
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.2
    text: |-
      Voor een onderwijsfunctie en een bijeenkomstfunctie voor kinderopvang met bedgebied en nevengebruiksfuncties van
      beide, waarvan het gebruik in de nachtperiode in het omgevingsplan is uitgesloten:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.2.a
    text: gelden de waarden in L niet; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.2.b
    text: 'wordt in tabel 3.34 gelezen voor «L»: «L».'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.3
    text: |-
      Voor een geluidgevoelig gebouw als bedoeld in [artikel 3.21, eerste lid, onder b of d][ref1], waarvan het gebruik
      in de avondperiode en de nachtperiode in het omgevingsplan is uitgesloten:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.1
        afdeling: '3.5'
  - number: 3.34.3.a
    text: gelden de waarden in L niet; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.34.3.b
    text: 'wordt in tabel 3.34 gelezen voor «L»: L».'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.34
  - number: 3.35.1
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde kan de hoogste van de twee waarden, bedoeld
      in [artikel 3.34, eerste lid][ref1], worden overschreden als:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
    machine_readable:
      definitions:
        # Tabel 3.35: Grenswaarde geluid op geluidgevoelig gebouw per geluidbronsoort (in Lden dB)
        grenswaarde_provinciale_wegen: 65
        grenswaarde_rijkswegen: 65
        grenswaarde_gemeentewegen: 70
        grenswaarde_waterschapswegen: 70
        grenswaarde_lokale_spoorwegen: 70
        grenswaarde_hoofdspoorwegen: 70
        grenswaarde_industrieterreinen_lden: 60
        grenswaarde_industrieterreinen_lnight: 50
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: geluidbronsoort
            type: string
            required: true
            description: >-
              Type geluidbron (provinciale_wegen, rijkswegen,
              gemeentewegen, waterschapswegen, lokale_spoorwegen,
              hoofdspoorwegen, industrieterreinen)
        input:
          - name: geluid_op_gebouw
            type: number
            description: Gemeten of berekend geluid op het geluidgevoelige gebouw in Lden dB
            source: {}
          - name: geen_maatregelen_mogelijk
            type: boolean
            description: Of er geen geluidbeperkende maatregelen kunnen worden getroffen
            source: {}
          - name: maatregelen_zoveel_mogelijk_beperkt
            type: boolean
            description: Of de overschrijding door maatregelen zoveel mogelijk is beperkt
            source: {}
        output:
          - name: grenswaarde
            type: number
            description: De grenswaarde voor de betreffende geluidbronsoort in Lden dB
          - name: voldoet_grenswaarde_geluid
            type: boolean
            description: Of het geluid op het gebouw niet hoger is dan de grenswaarde
          - name: overschrijding_standaardwaarde_toegestaan
            type: boolean
            description: Of overschrijding van de standaardwaarde is toegestaan (alle voorwaarden voldaan)
        actions:
          - output: grenswaarde
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - provinciale_wegen
                      - rijkswegen
                  then: $grenswaarde_rijkswegen
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - gemeentewegen
                      - waterschapswegen
                  then: $grenswaarde_gemeentewegen
                - when:
                    operation: IN
                    subject: $geluidbronsoort
                    values:
                      - lokale_spoorwegen
                      - hoofdspoorwegen
                  then: $grenswaarde_hoofdspoorwegen
                - when:
                    operation: EQUALS
                    subject: $geluidbronsoort
                    value: industrieterreinen
                  then: $grenswaarde_industrieterreinen_lden
              default: 0
          - output: voldoet_grenswaarde_geluid
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $geluid_op_gebouw
              value: $grenswaarde
          - output: overschrijding_standaardwaarde_toegestaan
            value:
              operation: AND
              conditions:
                - $geen_maatregelen_mogelijk
                - $maatregelen_zoveel_mogelijk_beperkt
                - $voldoet_grenswaarde_geluid
  - number: 3.35.1.a
    text: geen geluidbeperkende maatregelen kunnen worden getroffen om aan de hoogste van de twee waarden te voldoen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.1.b
    text: de overschrijding door het treffen van geluidbeperkende maatregelen zoveel mogelijk wordt beperkt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.1.c
    text: |-
      het geluid op geluidgevoelige gebouwen niet hoger is dan de grenswaarde, bedoeld in tabel 3.35.
                Tabel 3.35: Grenswaarde geluid op een geluidgevoelig gebouw per geluidbronsoort


                        *Geluidbronsoort*


                        *Grenswaarde*


                        Provinciale wegen
                        Rijkswegen


                        65 L


                        Gemeentewegen
                        Waterschapswegen


                        70 L


                        Lokale spoorwegen
                        Hoofdspoorwegen


                        70 L


                        Industrieterreinen


                        60 L


                        50 L
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.2
    text: |-
      Geluidbeperkende maatregelen worden in aanmerking genomen als die financieel doelmatig zijn en daartegen geen
      overwegende bezwaren van stedenbouwkundige, verkeerskundige, vervoerskundige, landschappelijke of technische aard
      bestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.3
    text: |-
      Op het bepalen van de financiële doelmatigheid van geluidbeperkende maatregelen voor rijkswegen en hoofdspoorwegen
      is [paragraaf 3.5.4.4][ref1] van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.35.4
    text: |-
      In afwijking van het eerste lid, onder b, kunnen geluidbeperkende maatregelen worden getroffen die de
      overschrijding in mindere mate beperken maar die leiden tot minder gecumuleerd geluid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.5
    text: Geluidbeperkende maatregelen worden bij voorkeur aan de bron getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
  - number: 3.35.6
    text: |-
      [Artikel 3.34, tweede en derde lid][ref1], is van overeenkomstige toepassing, met dien verstande dat voor
      «tabel 3.34» wordt gelezen: tabel 3.35.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: '3.36'
    text: |-
      Voor een provinciale weg die binnen een krachtens de [Wegenverkeerswet 1994](onbekend) vastgestelde bebouwde
      kom ligt, kan bij de vaststelling van een geluidproductieplafond als omgevingswaarde de grenswaarde, bedoeld in
      [tabel 3.35][ref1], met ten hoogste 5 dB worden overschreden, als die overschrijding redelijkerwijs niet is te
      voorkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.36
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.37.1
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde kan de grenswaarde, bedoeld in tabel 3.35,
      of de waarde die volgt uit toepassing van [artikel 3.36][ref1], worden overschreden als geen geluidbeperkende
      maatregelen als bedoeld in [artikel 3.35, tweede lid][ref2], kunnen worden getroffen om aan de waarde te voldoen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.37.2
    text: 'Overschrijding van een in het eerste lid bedoelde waarde is alleen toegestaan als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.2.a
    text: geen andere maatregelen dan bedoeld in het eerste lid kunnen worden getroffen om aan de waarde te voldoen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.2.b
    text: geen wijziging van het omgevingsplan mogelijk is om het geluidgevoelige gebouw niet meer toe te laten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.2.c
    text: |-
      geen overeenkomst kan worden bereikt met de eigenaar van het geluidgevoelige gebouw over het treffen van
      bouwkundige maatregelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.3
    text: 'Als een in het eerste lid bedoelde waarde wordt overschreden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.3.a
    text: wordt de overschrijding door het treffen van geluidbeperkende maatregelen zoveel mogelijk beperkt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.3.b
    text: |-
      voldoen rijkswegen of hoofdspoorwegen aan de akoestische kwaliteit, bedoeld in [artikel 3.29][ref1], als deze
      rijkswegen of hoofdspoorwegen het geluid veroorzaken.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.3
        afdeling: '3.5'
  - number: 3.37.4
    text: |-
      De maatregelen, bedoeld in het tweede en derde lid, worden in aanmerking genomen als deze in redelijkheid niet
      te kostbaar zijn en daartegen geen zwaarwegende bezwaren van stedenbouwkundige, verkeerskundige, vervoerskundige,
      landschappelijke of technische aard bestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
  - number: 3.37.5
    text: |-
      Op een geluidgevoelig gebouw dat is toegelaten met toepassing van [artikel 5.78w][ref1] en waarop de
      grenswaarde met ten hoogste 5 dB wordt overschreden, zijn het tweede lid, het derde lid, onder b, en het
      vierde lid, niet van toepassing en is op de geluidbeperkende maatregelen als bedoeld in het derde lid, onder a,
      [artikel 3.35, tweede lid][ref2], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.38.1
    text: |-
      Bij de toepassing van de [artikelen 3.35][ref1], [3.36][ref2] en [3.37][ref3] wordt de aanvaardbaarheid van het
      gecumuleerde geluid beoordeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.38.2
    text: |-
      Het gecumuleerde geluid is het geluid door geluidbronsoorten en andere activiteiten tegelijk, opgeteld met
      correctie voor de verschillen in hinderlijkheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.38.3
    text: 'Bij het bepalen van het gecumuleerde geluid wordt in ieder geval betrokken:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.38.3.a
    text: |-
      voor een geluidgevoelig gebouw in een geluidaandachtsgebied van een weg, spoorweg of industrieterrein: het geluid
      door die geluidbronsoort;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.38.3.b
    text: |-
      voor een geluidgevoelig gebouw binnen de 48 L geluidcontour of, voor zover de geldende geluidcontouren in
      Kosteneenheden zijn uitgedrukt, binnen de 20 Kosteneenheden geluidcontour van een luchthaven waarvoor op grond van
      de [Wet luchtvaart][ref1] een luchthavenindelingbesluit, een luchthavenbesluit of een besluit beperkingengebied
      buitenlandse luchthaven is vereist: het geluid door luchtvaart;


      [ref1]: https://wetten.overheid.nl/BWBR0005555
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
    references:
      - id: ref1
        bwb_id: BWBR0005555
  - number: 3.38.3.c
    text: |-
      voor een geluidgevoelig gebouw waarop het geluid door een windturbine of een windpark op een industrieterrein hoger
      is dan 43 L: het geluid door die windturbine of dat windpark; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.38.3.d
    text: |-
      voor een geluidgevoelig gebouw waarop het geluid door een civiele buitenschietbaan, een militaire buitenschietbaan
      of een militair springterrein op een industrieterrein hoger is dan 50 B: het geluid door die buitenschietbaan of
      dat springterrein.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.38.4
    text: Op het bepalen van het gecumuleerde geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.38
  - number: 3.39.1
    text: |-
      Bij de toepassing van de [artikelen 3.35][ref1], [3.36][ref2] en [3.37][ref3] wordt het gezamenlijke geluid op de
      gevel van geluidgevoelige gebouwen bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.39.2
    text: |-
      Het gezamenlijke geluid is het geluid door geluidbronsoorten en andere activiteiten tegelijk, energetisch opgeteld
      zonder correctie voor de verschillen in hinderlijkheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.39
  - number: 3.39.3
    text: |-
      [Artikel 3.38, derde lid][ref1], is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.39.4
    text: Op het bepalen van het gezamenlijke geluid zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.39
  - number: '3.40'
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde voor een industrieterrein waarop
      defensietaken worden uitgeoefend, wordt gewaarborgd dat geen belemmeringen ontstaan voor de uitoefening van die
      taken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.40
  - number: '3.41'
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde kan worden bepaald dat geluidbeperkende
      of geluidwerende maatregelen worden getroffen als bij het toelaten van een geluidgevoelig gebouw in een
      geluidaandachtsgebied gebruik is gemaakt van een gegeven als bedoeld in [artikel 11.52, eerste lid][ref1],
      waarvan na het toelaten is gebleken dat dit onjuist is. [Artikel 3.35, tweede lid][ref2], is van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.41
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.5
        afdeling: '11.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: '3.42'
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde is [artikel 3.34][ref1] niet van toepassing
      als het geluidproductieplafond:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.42
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.42.a
    text: |-
      wordt verlaagd in overeenstemming met de vermindering van het geluid door een geluidbeperkende maatregel die wordt
      toegevoegd aan de geluidbrongegevens;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.42
  - number: 3.42.b
    text: |-
      wordt vastgesteld in verband met wijziging van de bij ministeriële regeling gestelde regels voor het bepalen van
      het geluid; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.42
  - number: 3.42.c
    text: |-
      wordt vastgesteld om een geluidreferentiepunt te verplaatsen naar een locatie die voldoet aan [artikel 3.32][ref1]
      of [3.33, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.42
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: '3.43'
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde is [artikel 3.34][ref1] niet van
      toepassing:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.43.a
    text: |-
      bij de overdracht van een provinciale weg aan het Rijk of de overdracht van een rijksweg aan een provincie,
      als het geluidproductieplafond wordt vastgesteld in overeenstemming met de geluidbrongegevens behorende bij het
      geluidproductieplafond dat gold tot het tijdstip van de overdracht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
  - number: 3.43.b
    text: |-
      bij de aanwijzing van een lokale spoorweg, die bij omgevingsverordening is aangewezen, als hoofdspoorweg, als
      het geluidproductieplafond wordt vastgesteld in overeenstemming met de geluidbrongegevens behorende bij het
      geluidproductieplafond dat gold tot tijdstip van de aanwijzing;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
  - number: 3.43.c
    text: |-
      bij de aanwijzing van een hoofdspoorweg als lokale spoorweg, als die spoorweg bij omgevingsverordening wordt
      aangewezen en het geluidproductieplafond wordt vastgesteld in overeenstemming met de geluidbrongegevens behorende
      bij het geluidproductieplafond dat gold tot het tijdstip van de aanwijzing;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
  - number: 3.43.d
    text: |-
      bij de overdracht van een gemeenteweg of waterschapweg aan een provincie of het Rijk, als het
      geluidproductieplafond wordt vastgesteld in overeenstemming met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
  - number: 3.43.d.1°
    text: |-
      de geluidbrongegevens behorende bij de basisgeluidemissie, bedoeld in [artikel 3.27, eerste lid, onder a][ref1],
      en wordt verhoogd met ten hoogste 1,5 dB; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 3.43.d.2°
    text: |-
      de geluidbrongegevens behorende bij de basisgeluidemissie, bedoeld in [artikel 3.27, eerste lid, onder b][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 3.43.e
    text: |-
      bij de aanwijzing van een lokale spoorweg, waarvoor geen geluidproductieplafonds golden, op grond van
      [artikel 2.13a, eerste lid, aanhef en onder b, van de wet][ref1] of bij de aanwijzing van een lokale spoorweg,
      waarvoor geen geluidproductieplafonds golden, als hoofdspoorweg, als het geluidproductieplafond wordt vastgesteld
      in overeenstemming met:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.43.e.1°
    text: |-
      de geluidbrongegevens behorende bij de basisgeluidemissie, bedoeld in [artikel 3.27, eerste lid, onder a][ref1],
      en wordt verhoogd met ten hoogste 1,5 dB; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 3.43.e.2°
    text: |-
      de geluidbrongegevens behorende bij de basisgeluidemissie, bedoeld in [artikel 3.27, eerste lid, onder b][ref1];
      of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.2
        afdeling: '3.5'
  - number: 3.43.f
    text: |-
      als na een overdracht of een aanwijzing als bedoeld in de onderdelen a tot en met e wijziging van een
      geluidproductieplafond langs een aansluitende of in de nabijheid liggende weg of spoorweg plaatsvindt in
      overeenstemming met de geluidbrongegevens behorende bij de geldende geluidproductieplafonds.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.43
  - number: '3.44'
    text: Een geluidproductieplafond als omgevingswaarde is een resultaatsverplichting.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.44
  - number: 3.45.1
    text: |-
      In plaats van te voldoen aan de plicht tot vaststelling van een programma, bedoeld in
      [artikel 3.10, eerste lid, van de wet][ref1], treffen de volgende bestuursorganen of instanties maatregelen,
      gericht op het voldoen aan een geluidproductieplafond als omgevingswaarde:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 3.45.1.a
    text: 'voor bij omgevingsverordening aangewezen wegen: gedeputeerde staten;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
  - number: 3.45.1.b
    text: |-
      voor bij omgevingsverordening aangewezen lokale spoorwegen: de op grond van
      [artikel 18, eerste lid, van de Wet lokaal spoor][ref1] aangewezen beheerder;


      [ref1]: https://wetten.overheid.nl/BWBR0034363#Artikel18
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
    references:
      - id: ref1
        bwb_id: BWBR0034363
        artikel: '18'
  - number: 3.45.1.c
    text: 'voor bij ministeriële regeling aangewezen wegen: Onze Minister van Infrastructuur en Waterstaat; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
  - number: 3.45.1.d
    text: |-
      voor bij ministeriële regeling aangewezen hoofdspoorwegen: de beheerder, bedoeld in
      [artikel 1, eerste lid, van de Spoorwegwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0015007#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
    references:
      - id: ref1
        bwb_id: BWBR0015007
        artikel: '1'
  - number: 3.45.2
    text: |-
      Voor een industrieterrein geeft het college van burgemeester en wethouders, of, als toepassing is gegeven aan
      [artikel 2.12a van de wet][ref1], geven gedeputeerde staten uitvoering aan [artikel 3.10 van de wet][ref2] door:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 3.45.2.a
    text: maatregelen te treffen, gericht op het voldoen aan een geluidproductieplafond als omgevingswaarde; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
  - number: 3.45.2.b
    text: |-
      te voldoen aan de plicht, bedoeld in [artikel 3.10, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.45
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 3.46.1
    text: |-
      Bij de vaststelling van een geluidproductieplafond als omgevingswaarde kan worden bepaald dat aan het
      geluidproductieplafond wordt voldaan op het tijdstip dat een wijziging van de weg, de spoorweg of het
      industrieterrein of een maatregel aan of bij de weg, de spoorweg of het industrieterrein is gerealiseerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.46
  - number: 3.46.2
    text: |-
      Als sprake is van bijzondere omstandigheden kan bij de vaststelling van een geluidproductieplafond
      als omgevingswaarde worden bepaald dat gedurende een termijn van ten hoogste vijf jaar niet aan dat
      geluidproductieplafond hoeft te worden voldaan. Daarbij kan worden bepaald:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.46
  - number: 3.46.2.a
    text: in welke mate en hoe lang het geluidproductieplafond mag worden overschreden; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.46
  - number: 3.46.2.b
    text: dat geluidbeperkende of geluidwerende maatregelen worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.46
  - number: 3.46.3
    text: |-
      [Paragraaf 3.5.4.2][ref1] is niet van toepassing als bij de vaststelling van een geluidproductieplafond alleen het
      in het eerste lid bedoelde tijdstip of de in het tweede lid bedoelde termijn wordt bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.46
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: '3.47'
    text: Deze paragraaf is van toepassing op het treffen van geluidbeperkende maatregelen bij rijkswegen en hoofdspoorwegen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.47
  - number: '3.48'
    text: |-
      Voor de toepassing van deze paragraaf wordt verstaan onder: - *geluidgevoelig cluster:* een of meer bijeengelegen
      geluidgevoelige gebouwen die een significante vermindering van het geluid door een weg of spoorweg ondervinden door
      een aaneengesloten geluidbeperkende maatregel;
        - *geluidreductie:* geluidreductie als bedoeld in [artikel 3.50][ref1];
        - *maatregelpunt:* rekeneenheid waarin de kosten voor het treffen van de geluidbeperkende maatregel zijn
      uitgedrukt, bepaald volgens de bij ministeriële regeling gestelde regels;
        - *reductiepunt:* rekeneenheid voor de beoordeling van de financiële doelmatigheid van geluidbeperkende maatregelen
      voor een geluidgevoelig cluster;
        - *situatie zonder maatregelen:* situatie waarin: a. een weg of spoorweg voldoet aan de eisen van
      [artikel 3.29][ref2]; en b. geen geluidbeperkende maatregelen, waarvoor maatregelpunten gelden, zijn getroffen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.48
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.3
        afdeling: '3.5'
  - number: 3.49.1
    text: 'Een geluidbeperkende maatregel is financieel doelmatig als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.1.a
    text: |-
      het aantal maatregelpunten lager is dan het aantal reductiepunten voor het geluidgevoelige cluster waarvoor de
      maatregel is bedoeld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.1.b
    text: de maatregel leidt tot een significante afname van het geluid op het geluidgevoelige cluster.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.2
    text: |-
      In afwijking van het eerste lid is een geluidbeperkende maatregel bestaande uit een werk of bouwwerk alleen
      financieel doelmatig als deze, al dan niet in combinatie met maatregelen aan de bron, leidt tot een afname van het
      geluid op ten minste één geluidgevoelig gebouw met ten minste 5 dB.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.3
    text: 'In afwijking van het eerste lid is een geluidbeperkende maatregel niet financieel doelmatig als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.3.a
    text: deze de grootste geluidreductie oplevert voor het geluidgevoelige cluster;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.3.b
    text: |-
      het aantal maatregelpunten voor de maatregel hoger is dan het aantal maatregelpunten voor een andere
      geluidbeperkende maatregel die een gelijke of nagenoeg gelijke geluidreductie voor het geluidgevoelige cluster
      oplevert; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.3.c
    text: |-
      de extra maatregelpunten in vergelijking met de andere geluidbeperkende maatregel niet in redelijke verhouding
      staan tot de extra geluidreductie die door de maatregel wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.4
    text: |-
      In afwijking van het eerste lid is een geluidbeperkende maatregel bestaande uit een werk of bouwwerk niet
      financieel doelmatig als met de maatregel een bestaande geluidbeperkende maatregel bestaande uit een werk of
      bouwwerk wordt vervangen die:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.4.a
    text: niet ouder is dan tien jaar;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.4.b
    text: niet hoger kan worden gemaakt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.4.c
    text: een geluidreductie oplevert die nagenoeg gelijk is aan die van het nieuwe werk of bouwwerk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.49.5
    text: |-
      In afwijking van het eerste tot en met het vierde lid wordt de financiële doelmatigheid van een bij ministeriële
      regeling aangewezen geluidbeperkende maatregel bepaald door de werkelijke kosten van aanleg en onderhoud van die
      maatregel af te wegen tegen de geluidreductie die door de maatregel wordt bereikt, het aantal geluidgevoelige
      gebouwen waar de maatregel voor is bedoeld en de daaruit voortvloeiende waarde van het geluid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.49
  - number: 3.50.1
    text: 'Geluidreductie is het verschil tussen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.50
  - number: 3.50.1.a
    text: |-
      het geluid op het geluidgevoelige gebouw als bedoeld in [artikel 3.21, eerste lid, onder a][ref1], in de situatie
      zonder maatregelen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
