      het luchtvaartterrein Geilenkirchen, totdat een besluit beperkingengebied buitenlandse luchthaven op grond van de
      [Wet luchtvaart][ref1] is vastgesteld en in werking getreden.


      [ref1]: https://wetten.overheid.nl/BWBR0005555
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.24
    references:
      - id: ref1
        bwb_id: BWBR0005555
  - number: 12.25.1
    text: |-
      Geluidzones voor militaire luchtvaartterreinen zijn de locaties die zijn aangewezen en geometrisch begrensd in
      [artikel 2.1, vierde lid, van de Regeling algemene regels ruimtelijke ordening][ref1], zoals dat luidde voor de
      inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0031018#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.25
    references:
      - id: ref1
        bwb_id: BWBR0031018
        artikel: '2'
  - number: 12.25.2
    text: |-
      Obstakelbeheergebieden voor militaire luchtvaartterreinen zijn de locaties die zijn aangewezen en geometrisch
      begrensd in [artikel 2.1, vijfde lid, van de Regeling algemene regels ruimtelijke ordening][ref1], zoals dat luidde
      voor de inwerkingtreding van dit besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0031018#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.25
    references:
      - id: ref1
        bwb_id: BWBR0031018
        artikel: '2'
  - number: 12.26.1
    text: |-
      Voor zover een omgevingsplan van toepassing is op een geluidzone voor een militair luchtvaartterrein, worden de op
      grond van de [Luchtvaartwet][ref1] en de [Wet geluidhinder][ref2] vastgestelde geluidzones in acht genomen.


      [ref1]: https://wetten.overheid.nl/BWBR0002267
      [ref2]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26
    references:
      - id: ref1
        bwb_id: BWBR0002267
      - id: ref2
        bwb_id: BWBR0003227
  - number: 12.26.2
    text: |-
      Voor zover een omgevingsplan van toepassing is op een obstakelbeheergebied voor een militair luchtvaartterrein,
      is de maximaal toelaatbare hoogte van objecten in, op of boven de grond in dat gebied in overeenstemming met
      [artikel 16 van het Besluit militaire luchthavens][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0025302#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26
    references:
      - id: ref1
        bwb_id: BWBR0025302
        artikel: '16'
  - number: 12.26.3
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties, in overeenstemming met Onze Minister van Defensie,
      kan op verzoek van het college van burgemeester en wethouders ontheffing verlenen van de regels in het eerste en
      tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26
  - number: 12.26a
    text: |-
      Het in [artikel 22.21, tweede lid, van de wet][ref1] bedoelde programma voor het legaliseren
      van activiteiten met een geringe stikstofdepositie die voldeden aan de voorwaarden van
      [artikel 19kh, zevende lid, van de Natuurbeschermingswet 1998][ref2] zoals dat luidde tot 1 januari 2017 of
      [artikel 2.12 van het Besluit natuurbescherming][ref3] zoals dat luidde op 28 mei 2019, bevat een beschrijving van:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0009641#Artikel19kh
      [ref3]: https://wetten.overheid.nl/BWBR0038662#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
      - id: ref2
        bwb_id: BWBR0009641
        artikel: 19kh
      - id: ref3
        bwb_id: BWBR0038662
        artikel: '2'
  - number: 12.26a.a
    text: |-
      de totale stikstofdepositie door die activiteiten op elke hectare van de voor stikstof gevoelige habitats in Natura
      2000-gebieden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26a
  - number: 12.26a.b
    text: |-
      de getroffen of te treffen maatregelen om de gevolgen van de onder a bedoelde stikstofdepositie ongedaan te maken,
      te beperken of te compenseren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26a
  - number: 12.26a.c
    text: |-
      de gevolgen van de onder b bedoelde maatregelen voor de omvang van de stikstofdepositie op elke hectare van de voor
      stikstof gevoelige habitats in Natura 2000-gebieden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26a
  - number: 12.26a.d
    text: |-
      de wijze waarop invulling wordt gegeven aan de eisen die in [artikel 12.26b][ref1] worden gesteld aan het
      verzamelen van gegevens en de eisen die in [artikel 15.5 van het Omgevingsbesluit][ref2] worden gesteld aan het
      verstrekken van gegevens.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel15
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.26a
    references:
