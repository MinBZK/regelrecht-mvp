  - number: 5.34.1.a
    text: |-
      die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van inwerkingtreding van die bepaling;
      en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.34
