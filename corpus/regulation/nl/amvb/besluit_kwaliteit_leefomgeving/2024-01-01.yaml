        bwb_id: BWBR0041313
        hoofdstuk: '5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.1.1
        afdeling: '8.1'
  - number: 8.97c.2
    text: 'Het bevoegd gezag trekt de omgevingsvergunning in als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.97c.2.a
    text: |-
      de regel of instructie, bedoeld in het eerste lid, van toepassing is op activiteiten die op grond van die
      omgevingsvergunning rechtmatig worden verricht of zijn toegestaan op het tijdstip waarop de regel of instructie van
      kracht wordt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.97c.2.b
    text: 'de activiteit redelijkerwijs niet kan worden toegelaten door:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.97c.2.b.1°
    text: een wijziging van de aan de omgevingsvergunning verbonden voorschriften;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.97c.2.b.2°
    text: een wijziging van het omgevingsplan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.97c.2.b.3°
    text: |-
      een ontheffing als bedoeld in [artikel 2.32 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.97c.3
    text: |-
      Als in de regel of de instructie, bedoeld in het eerste lid, een termijn is gesteld waarbinnen een omgevingsplan
      moet worden gewijzigd die eerder verstrijkt dan de termijn van vijf jaar, bedoeld in dat lid, wordt binnen de in
      die regel of instructie gestelde termijn toepassing gegeven aan het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97c
  - number: 8.98.1
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een milieubelastende activiteit, een lozingsactiviteit op
      een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk beziet binnen vier jaar
      na de bekendmaking van nieuwe of herziene BBT-conclusies over de hoofdactiviteit van de ippc-installatie of
      de aan de omgevingsvergunning verbonden voorschriften voldoen aan die nieuwe BBT-conclusies, aan overige BBT-
      conclusies en aan informatiedocumenten als bedoeld in [bijlage XVIII][ref1], onder A, die sinds de verlening van de
      omgevingsvergunning of de laatste toetsing zijn vastgesteld of herzien.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.98
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.98.2
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een milieubelastende activiteit, een lozingsactiviteit op een
      oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk beziet binnen een jaar nadat het
      afvalbeheerplan, bedoeld in [artikel 10.3 van de Wet milieubeheer][ref1], is gaan gelden of de omgevingsvergunning
      voldoet aan de minimale hoogwaardigheid van verwerking van afzonderlijke afvalstoffen of categorieën afvalstoffen
      zoals beschreven in het afvalbeheerplan.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.98
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '10'
  - number: 8.99.1
    text: |-
      Het bevoegd gezag wijzigt de aan de omgevingsvergunning voor een stortingsactiviteit op zee, een milieubelastende
      activiteit, een lozingsactiviteit op een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch
      werk verbonden voorschriften als door toepassing van [artikel 5.38, eerste lid, van de wet][ref1] blijkt dat de
      milieuverontreiniging die de activiteit veroorzaakt:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 8.99.1.a
    text: door de ontwikkeling van de technische mogelijkheden tot bescherming van het milieu verder kan worden ingeperkt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.1.b
    text: door de ontwikkeling van de kwaliteit van het milieu verder moet worden ingeperkt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.2
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een milieubelastende activiteit of lozingsactiviteit
      op een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk wijzigt de aan de
      omgevingsvergunning verbonden voorschriften, als dit noodzakelijk is gelet op het resultaat van de toetsing,
      bedoeld in:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.2.a
    text: |-
      [artikel 8.98, eerste lid][ref1]: binnen vier jaar na de bekendmaking van nieuwe of herziene BBT-conclusies over de
      hoofdactiviteit van de ippc-installatie; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.10.2
        afdeling: '8.10'
  - number: 8.99.2.b
    text: |-
      [artikel 8.98, tweede lid][ref1]: binnen een jaar nadat het afvalbeheerplan, bedoeld in
      [artikel 10.3 van de Wet milieubeheer][ref2], is gaan gelden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.10.2
        afdeling: '8.10'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '10'
  - number: 8.99.3
    text: 'Van ontwikkelingen als bedoeld in het eerste lid is in ieder geval sprake als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.3.a
    text: |-
      geen BBT-conclusies van toepassing zijn, maar belangrijke veranderingen in de beste beschikbare technieken een
      aanzienlijke beperking van de emissies mogelijk maken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.3.b
    text: |-
      de door de activiteit veroorzaakte milieuverontreiniging zodanig is dat de emissiegrenswaarden die in de aan de
      omgevingsvergunning verbonden voorschriften zijn opgenomen, moeten worden gewijzigd of dat in die voorschriften
      nieuwe emissiegrenswaarden moeten worden opgenomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.3.c
    text: de noodzaak om ongevallen te voorkomen de toepassing van andere technieken vereist; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
  - number: 8.99.3.d
    text: |-
      op grond van [artikel 8.30][ref1] aan een nieuwe of herziene omgevingswaarde als bedoeld in
      [artikel 2.15, eerste lid, onder a tot en met c, van de wet][ref2] moet worden voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.99.4
    text: |-
      Als met toepassing van [artikel 8.28][ref1] minder strenge emissiegrenswaarden zijn vastgesteld, wordt bij de
      toepassing van het eerste en tweede lid opnieuw getoetst of aan de voorwaarden van dat artikel wordt voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.99.5
    text: |-
      Bij toepassing van het eerste en tweede lid, aanhef en onder a, verbindt het bevoegd gezag zo nodig voorschriften
      aan de omgevingsvergunning die strekken tot toepassing van andere technieken dan die waarover krachtens
      [artikel 16.55, tweede lid, van de wet][ref1] in of bij de aanvraag om de omgevingsvergunning gegevens of
      bescheiden zijn verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.99
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: '8.100'
    text: |-
      Het bevoegd gezag trekt de omgevingsvergunning voor een milieubelastende activiteit, een lozingsactiviteit op een
      oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk in als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.100
  - number: 8.100.a
    text: |-
      door toepassing van [artikel 8.99, tweede lid][ref1], redelijkerwijs niet kan worden bereikt dat de in aanmerking
      komende beste beschikbare technieken worden toegepast; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.100
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.10.2
        afdeling: '8.10'
  - number: 8.100.b
    text: |-
      het gaat om een stortplaats als bedoeld in [artikel 8.47 van de Wet milieubeheer][ref1] of een afvalvoorziening als
      bedoeld in [artikel 1.1 van die wet][ref2] en de stortplaats respectievelijk afvalvoorziening op grond van artikel
      8.47 van die wet voor gesloten is verklaard.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.100
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '1'
  - number: '8.101'
    text: |-
      Het bevoegd gezag kan de voorschriften van een omgevingsvergunning voor een milieubelastende activiteit, een
      lozingsactiviteit op een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk in ieder
      geval wijzigen in verband met het treffen van passende preventieve maatregelen ter bescherming van de gezondheid
      als bedoeld in [artikel 4.22, tweede lid, onder b, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.101
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 8.102.1
    text: |-
      Het bevoegd gezag kan een omgevingsvergunning voor een milieubelastende activiteit, een lozingsactiviteit op een
      oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk in ieder geval intrekken in verband
      met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.102
  - number: 8.102.1.a
    text: een doelmatig beheer van afvalstoffen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.102
  - number: 8.102.1.b
    text: |-
      het niet treffen van passende preventieve maatregelen ter bescherming van de gezondheid als bedoeld in
      [artikel 4.22, tweede lid, onder b, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.102
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 8.102.2
    text: |-
      Het bevoegd gezag geeft alleen toepassing aan de intrekkingsbevoegdheid als niet kan worden volstaan met wijziging
      van de voorschriften van de omgevingsvergunning.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.102
  - number: 8.103.1
    text: |-
      Het bevoegd gezag trekt een omgevingsvergunning voor een Natura 2000-activiteit in ieder geval in of wijzigt een
      omgevingsvergunning voor een Natura 2000-activiteit in ieder geval, als dat nodig is ter uitvoering van artikel 6,
      tweede lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.103
  - number: 8.103.2
    text: |-
      Het bevoegd gezag kan een omgevingsvergunning voor een flora- en fauna-activiteit, een jachtgeweeractiviteit of
      een valkeniersactiviteit intrekken, als de houder van de omgevingsvergunning, nadat die is verleend, onherroepelijk
      is veroordeeld:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.103
  - number: 8.103.2.a
    text: |-
      voor een overtreding van een in de
      [paragrafen 11.2.2 tot en met 11.2.10 van het Besluit activiteiten leefomgeving][ref1] gestelde regel of een
      daarover gesteld maatwerkvoorschrift of een daarover gestelde maatwerkregel, of als daarvoor tegen hem daarvoor een
      strafbeschikking is uitgevaardigd;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf11.2.10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.103
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 11.2.10
  - number: 8.103.2.b
    text: |-
      wegens handelen in strijd met een andere omgevingsvergunning voor een flora- en fauna-activiteit, een
      jachtgeweeractiviteit of een valkeniersactiviteit; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.103
  - number: 8.103.2.c
    text: |-
      wegens gedragingen als bedoeld in [artikel 2.1][ref1], [2.2][ref2], [2.3][ref3], [2.5][ref4],
      [2.6][ref5], [2.7][ref6], [2.8][ref7], [2.9][ref8], [2.10][ref9], [2.13][ref10], [2.14][ref11] of
      [2.15 van de Wet dieren][ref12], als daarvoor tegen hem een strafbeschikking is uitgevaardigd of als hem wegens
      overtreding van het bepaalde bij of krachtens die artikelen van de [Wet dieren][ref13] een bestuurlijke boete als
      bedoeld in [artikel 8.7 van die wet][ref14] is opgelegd.


