        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 2.18.1
    text: |-
      De termijn waarop aan een omgevingswaarde moet worden voldaan, kan, voor zover dat is toegestaan volgens
      de kaderrichtlijn water, voor de omgevingswaarden, bedoeld in de [artikelen 2.10, eerste lid][ref1],
      [2.11, eerste lid][ref2], [2.13, eerste lid][ref3], [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5], worden
      verlengd als:


