  - number: 3.51.1
    text: |-
      Het aantal reductiepunten voor een geluidgevoelig cluster is de som van de reductiepunten voor alle geluidgevoelige
      gebouwen als bedoeld in [artikel 3.21, eerste lid, onder a][ref1], in dat geluidgevoelige cluster.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
