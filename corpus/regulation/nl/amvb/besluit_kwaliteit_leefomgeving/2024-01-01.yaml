        parameters:
          - name: artikel_12_3_tweede_lid_toegepast
            type: boolean
            required: true
            description: Of artikel 12.3, tweede lid, is toegepast
            source: {}
          - name: datum_vaststelling_geluidproductieplafond
            type: date
            required: true
            description: Datum van vaststelling van het geluidproductieplafond
            source: {}
          - name: waarde_aftrek_db
            type: number
            required: true
            description: Waarde van de aftrek in dB
            source: {}
        output:
          - name: einddatum_overgangsperiode
            type: date
            description: Einddatum van de periode waarin niet aan het geluidproductieplafond hoeft te worden voldaan
          - name: maximale_overschrijding_db
            type: number
            description: Maximale toegestane overschrijding van het geluidproductieplafond in dB
        actions:
          - output: einddatum_overgangsperiode
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $artikel_12_3_tweede_lid_toegepast
                    value: true
                  then:
                    operation: DATE_ADD
                    date: $datum_vaststelling_geluidproductieplafond
                    years: 5
              default: $datum_vaststelling_geluidproductieplafond
          - output: maximale_overschrijding_db
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $artikel_12_3_tweede_lid_toegepast
                    value: true
                  then: $waarde_aftrek_db
              default: 0
  - number: 12.5.1
    text: |-
      In afwijking van de [artikelen 3.34][ref1], [3.35][ref2] en [3.37 tot en met 3.40][ref3]
      wijzigt Onze Minister van Infrastructuur en Waterstaat een op grond van
      [artikel 3.2, eerste lid, van de Aanvullingswet geluid Omgevingswet][ref4] herberekend geluidproductieplafond voor
      een hoofdspoorweg met het bij omgevingsvergunning toegestane geluid door spoorvoertuigen op spoorwegemplacementen
      die onderdeel zijn van de hoofdspoorweg.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
