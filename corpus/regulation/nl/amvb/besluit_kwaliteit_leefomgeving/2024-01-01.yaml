        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        paragraaf: 7.3.1
        afdeling: '7.3'
  - number: 9.3.2
    text: |-
      Voor gebieden binnen het natuurnetwerk Nederland die bestaan uit militaire terreinen of terreinen met een militair
      object als bedoeld in [artikel 5.150, eerste lid][ref1], is het eerste lid alleen van toepassing voor zover een
      projectbesluit betrekking heeft op terreinverharding en bouwactiviteiten op die terreinen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel9.3
