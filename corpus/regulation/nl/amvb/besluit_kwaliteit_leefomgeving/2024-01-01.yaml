    text: |-
      In afwijking van [artikel 5.107][ref1] geldt de afstand, bedoeld in het eerste lid, vanaf de gevel van een
      dierenverblijf.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.116
