      de noodzaak ontbreekt voor het verrichten van de activiteiten door tussenkomst van een faunabeheereenheid. In dat
      geval kan de omgevingsvergunning ook worden verleend aan een wildbeheereenheid of aan anderen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74l
  - number: 8.74m
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een flora- en fauna-activiteit als bedoeld
      in [artikel 11.60 van het Besluit activiteiten leefomgeving][ref1], wordt de omgevingsvergunning alleen verleend:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74m
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74m.a
    text: bij bijzondere weersomstandigheden; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74m
  - number: 8.74m.b
    text: bij een tijdelijk natuurlijk voedseltekort waardoor het welzijn van de dieren in het geding is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74m
  - number: 8.74n.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een flora- en fauna-activiteit als bedoeld
      in [artikel 11.61, eerste lid, van het Besluit activiteiten leefomgeving][ref1], wordt de omgevingsvergunning
      alleen verleend als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74n.1.a
    text: |-
      is voldaan aan [artikel 8.74l, eerste lid, onder a en b][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.6.2
        afdeling: '8.6'
  - number: 8.74n.1.b
    text: |-
      het uitzetten van de dieren of eieren van dieren geen afbreuk doet aan het streven de inheemse flora en fauna in
      het natuurlijke verspreidingsgebied in een gunstige staat van instandhouding te laten voortbestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2
    text: |-
      Als het gaat om herintroductie van soorten, wordt de omgevingsvergunning alleen verleend als is voldaan aan het
      eerste lid, onder a en b, en:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.a
    text: |-
      het uitzetten van de dieren of eieren van dieren bijdraagt aan de instandhouding van een bedreigde soort, aan het
      functioneren van het ecosysteem of aan de compleetheid van het ecosysteem;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.b
    text: |-
      de kans op spontane vestiging of herstel van de bedreigde soort of van het ecosysteem binnen 20 jaar is uitgesloten
      of, als dat niet is uitgesloten, er dringende ecologische redenen zijn om de spontane vestiging van de soort of het
      herstel niet af te wachten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.c
    text: het verspreidingsgebied van de betrokken soort van oorsprong ook Nederland of delen van Nederland omvatte;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.d
    text: er voldoende kans is op het ontstaan van een duurzame populatie van de betrokken soort;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.e
    text: monitoring van de effecten van de herintroductie is verzekerd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74n.2.f
    text: |-
      de belangen van maatschappelijk draagvlak voor natuurbescherming, van natuureducatie en van verwerving van kennis
      van natuur zijn meegewogen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74n
  - number: 8.74o.1
    text: |-
      Aan een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in [artikel 11.37, eerste lid][ref1],
      [11.38, eerste lid][ref2], [11.39, eerste lid][ref3], of [11.40 van het Besluit activiteiten leefomgeving][ref4]
      worden voorschriften verbonden, die inhouden:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74o.1.a
    text: de middelen, installaties of methoden voor het vangen of doden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
  - number: 8.74o.1.b
    text: de tijd en locatie waarvoor de omgevingsvergunning geldt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
  - number: 8.74o.1.c
    text: de soorten van vogels, of hun nesten, rustplaatsen of eieren, waarvoor de omgevingsvergunning geldt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
  - number: 8.74o.1.d
    text: de wijze waarop het risico voor het behoud van de vogelstand wordt beperkt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
  - number: 8.74o.2
    text: |-
      Als de omgevingsvergunning wordt verleend vanwege een belang als bedoeld in
      [artikel 8.74j, eerste lid, onder b, onder 3°][ref1], worden alleen middelen voorgeschreven die nadelige gevolgen
      voor het welzijn van vogels voorkomen of, als dat niet mogelijk is, zoveel mogelijk beperken.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74o
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.6.2
        afdeling: '8.6'
  - number: 8.74p.1
    text: |-
      De in een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in
      [artikel 11.37, eerste lid][ref1], [11.38, eerste lid][ref2], [11.39, eerste lid][ref3], of
      [11.40 van het Besluit activiteiten leefomgeving][ref4] voorgeschreven middelen kunnen alleen zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74p.1.a
    text: geweren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.b
    text: honden, met uitzondering van lange honden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.c
    text: aantoonbaar gefokte haviken (Accipiter gentilis), slechtvalken (Falco peregrinus) en woestijnbuizerds;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.d
    text: kastvallen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.e
    text: vangkooien;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.f
    text: vangnetten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.g
    text: eendenkooien;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.h
    text: bal-chatri; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.1.i
    text: slag-, snij- of steekwapens.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.2
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het gebruik van een woestijnbuizerd wordt als voorschrift
      verbonden dat degene die de woestijnbuizerd gebruikt beschikt over een omgevingsvergunning voor een
      valkeniersactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.3
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het gebruik van een bal-chatri wordt als voorschrift verbonden
      dat hierbij:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.3.a
    text: geen gebruik wordt gemaakt van levende lokdieren;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.3.b
    text: op voorhand wordt gewaarborgd dat de bal-chatri onder permanent direct toezicht staat van een deskundige; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.3.c
    text: gevangen dieren niet onnodig lang vastzitten en niet onnodig worden verwond.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.4
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het gebruik van slag-, snij- of steekwapens wordt als
      voorschrift verbonden dat het gebruik van deze middelen alleen is toegestaan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.4.a
    text: voor het doden van in nood verkerende, gewonde vogels;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.4.b
    text: |-
      door personen die aantoonbaar de nodige kennis en vaardigheden bezitten om deze activiteit humaan en doeltreffend
      te verrichten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74p.4.c
    text: |-
      als er redelijkerwijs geen alternatief middel voorhanden is met minder mogelijke nadelige gevolgen voor het welzijn
      van het dier.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74p
  - number: 8.74q.1
    text: |-
      De in een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in [artikel 11.37, eerste lid][ref1],
      [11.38, eerste lid][ref2], [11.39, eerste lid][ref3], of [11.40 van het Besluit activiteiten leefomgeving][ref4]
      voorgeschreven methoden of installaties voor het vangen of doden van vogels kunnen alleen zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74q.1.a
    text: |-
      het doden met gebruikmaking van middelen die krachtens de [Wet gewasbeschermingsmiddelen en biociden][ref1] zijn
      toegelaten of vrijgesteld, met inbegrip van het gebruik maken van alle middelen of installaties die noodzakelijk
      zijn om die middelen toe te passen;


      [ref1]: https://wetten.overheid.nl/BWBR0021670
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
    references:
      - id: ref1
        bwb_id: BWBR0021670
  - number: 8.74q.1.b
    text: |-
      het vangen door middel van bijeendrijven, waaronder in ieder geval wordt begrepen het gebruik van de vangkraal in
      combinatie met een middel als bedoeld onder a;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.c
    text: het vangen of doden met gebruikmaking van lokvogels;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.d
    text: het vangen of doden met gebruikmaking van een middel waarmee lokgeluiden kunnen worden gemaakt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e
    text: |-
      het doden met gebruikmaking van een geweer, waarbij op grond van een maatwerkvoorschrift of maatwerkregel
      wordt gehandeld in afwijking van de in de [artikelen 11.76][ref1], [11.79][ref2], [11.80][ref3] en
      [11.83 van het Besluit activiteiten leefomgeving][ref4] gestelde eisen met betrekking tot:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74q.1.e.1°
    text: de omvang van het jachtveld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.2°
    text: |-
      het gebruik van middelen op, aan of bij het geweer, zoals een geluiddemper, een kunstmatige lichtbron, een
      voorziening om de prooi te verlichten, een vizier met beeldomzetter, een elektronische beeldversterker of een ander
      instrument om in de nacht te schieten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.3°
    text: de munitie; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.4°
    text: 'het gebruik van het geweer:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.4°.i
    text: voor zonsopgang of na zonsondergang;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.4°.ii
    text: |-
      binnen de in een omgevingsplan aangewezen bebouwingscontour jacht, bedoeld in [artikel 5.165a][ref1], of terreinen
      die onmiddellijk aan de bebouwingscontour grenzen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        afdeling: '5.2'
  - number: 8.74q.1.e.4°.iii
    text: binnen de afpalingskring van een eendenkooi;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.4°.iv
    text: vanaf of vanuit een rijdend voertuig; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.e.4°.v
    text: vanuit een luchtvaartuig;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.f
    text: het doden door middel van cervicale dislocatie; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.1.g
    text: het vangen of doden met gebruikmaking van lokvoer.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2
    text: |-
      Een vergunningvoorschrift dat betrekking heeft op het vangen of doden met gebruikmaking van lokvogels, kan alleen
      betrekking hebben op levende lokvogels, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2.a
    text: |-
      het eksters, kauwen, zwarte kraaien, ganzen, eenden of spreeuwen betreft die worden gebruikt voor het vangen van
      eksters, kauwen, zwarte kraaien, ganzen, eenden of spreeuwen met vangkooien, kastvallen of vangnetten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2.b
    text: de vogels zijn gefokt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2.c
    text: |-
      de vangkooien en kastvallen zodanig zijn vervaardigd dat in de kooi of val geen lichamelijk contact mogelijk is
      tussen de lokvogel en het te vangen dier;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2.d
    text: de vogels niet verminkt of blind zijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.2.e
    text: de vogels beschikken over voldoende voedsel, water, lucht, beschutting en bewegingsruimte.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.3
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het gebruik van de methode van cervicale dislocatie wordt als
      voorschrift verbonden dat het gebruik van deze methode alleen is toegestaan:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.3.a
    text: voor het doden van in nood verkerende, gewonde vogels van een omvang kleiner dan of gelijk aan eenden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.3.b
    text: |-
      door personen die aantoonbaar de nodige kennis en vaardigheden bezitten om deze activiteit humaan en doeltreffend
      te verrichten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74q.3.c
    text: |-
      als er redelijkerwijs geen alternatief middel voorhanden is met minder mogelijke nadelige gevolgen voor het welzijn
      van het dier.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74q
  - number: 8.74r.1
    text: |-
      Aan een omgevingsvergunning voor een flora- en fauna-activiteit als bedoeld in [artikel 11.46, eerste lid][ref1],
      [11.48][ref2] of [11.54 van het Besluit activiteiten leefomgeving][ref3] worden voorschriften verbonden over de te
      gebruiken middelen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74r
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.74r.2
    text: |-
      Als de omgevingsvergunning wordt verleend vanwege een belang als bedoeld in
      [artikel 8.74k, eerste lid, onder b, onder 2°][ref1], of [8.74l, eerste lid, onder b, onder 2°][ref2], worden
      alleen middelen voorgeschreven die nadelige gevolgen voor het welzijn van dieren voorkomen of, als dat niet
      mogelijk is, zoveel mogelijk beperken.


