    text: |-
      [Artikel 5.33, eerste lid][ref1], is niet van toepassing op activiteiten of werken in een militair
      explosieaandachtsgebied A, B en C voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.34
    references:
