  - number: 8.104.1
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een jachtgeweeractiviteit trekt die omgevingsvergunning in
      ieder geval in, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.1.a
    text: |-
      de bij aan aanvraag om die omgevingsvergunning verstrekte gegevens zodanig onjuist of onvolledig blijken, dat, als
      de juiste gegevens waren verstrekt, de vergunning zou zijn geweigerd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.1.b
    text: |-
      blijkt dat de burgerrechtelijke aansprakelijkheid, bedoeld in
      [artikel 11.78 van het Besluit activiteiten leefomgeving][ref1], niet langer met inachtneming van het bepaalde bij
      of krachtens dat artikel en artikel 11.78, tweede tot en met zevende lid, van dat besluit is gedekt;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 8.104.1.c
    text: |-
      de houder misbruik heeft gemaakt van wapens of munitie of van de bevoegdheid om wapens of munitie voorhanden te
      hebben, of als er andere aanwijzingen zijn dat aan hem het voorhanden hebben van wapens of munitie niet langer kan
      worden toevertrouwd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.104
  - number: 8.104.1.d
    text: |-
      na de verlening van de omgevingsvergunning voor een jachtgeweeractiviteit de houder onherroepelijk is veroordeeld
      wegens het plegen van een misdrijf als omschreven in de [artikelen 92][ref1], [95][ref2], [95a][ref3],
      [108 tot en met 110][ref4], [115 tot en met 117][ref5], [121][ref6], [121a][ref7], [123 tot en met 124a][ref8],
      [131][ref9], [140 tot en met 141a][ref10], [142][ref11], [157][ref12], [164][ref13], [166][ref14], [168][ref15],
      [170][ref16], [179][ref17], [180][ref18], [242 tot en met 247][ref19], [248f][ref20], [249][ref21], [250][ref22],
      [273f][ref23], [274][ref24], [279][ref25], [281 tot en met 282b][ref26], [284 tot en met 285b][ref27],
