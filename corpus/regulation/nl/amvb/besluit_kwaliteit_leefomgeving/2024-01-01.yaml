      - id: ref3
        bwb_id: BWBR0044679
  - number: 12.6.2
    text: |-
      In afwijking van het eerste lid en in afwijking van [paragraaf 3.5.4.2][ref1] kan het geluidproductieplafond,
      bedoeld in [artikel 3.5 van de Aanvullingswet geluid Omgevingswet][ref2], worden vastgesteld op grond van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0043247#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.6
    references:
