        bwb_id: BWBR0037521
        artikel: '5'
  - number: '8.82'
    text: |-
      Aan een omgevingsvergunning voor een rijksmonumentenactiviteit die een gedeeltelijke of volledige
      verplaatsing inhoudt van een monument dat een bouwwerk is, worden voorschriften verbonden over het treffen van
      voorzorgsmaatregelen voor het demonteren, het overbrengen en de herbouw van dat bouwwerk op de nieuwe locatie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.82
  - number: 8.83.1
    text: 'Deze afdeling is van toepassing op de volgende wateractiviteiten:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
  - number: 8.83.1.a
    text: |-
      vergunningplichtige beperkingengebiedactiviteiten met betrekking tot een waterstaatswerk als bedoeld in de
      [hoofdstukken 6][ref1] en [7 van het Besluit activiteiten leefomgeving][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.83
    references:
