  - number: 8.74w.3
    text: |-
      Voor de berekening van de periode van acht jaar, bedoeld in het tweede lid, onder e, telt de periode waarin een
      onvoorwaardelijke vrijheidsstraf is ondergaan, niet mee.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.4
    text: |-
      Een omgevingsvergunning voor een valkeniersactiviteit wordt in afwijking van het eerste lid, aanhef en onder a,
      niet geweigerd als aan de aanvrager vanwege het met gunstig gevolg behalen van een krachtens de Vogelwet 1936
      erkend jachtexamen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.4.a
    text: |-
      in de periode van 1 januari 1977 tot en met 31 maart 2002 een vergunning als bedoeld in de Vogelwet 1936 is
      uitgereikt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.4.b
    text: |-
      in de periode van 1 april 2002 tot en met 30 september 2004 een vergunning als bedoeld in de
      [Flora- en faunawet][ref1] is uitgereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0009640
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
    references:
      - id: ref1
        bwb_id: BWBR0009640
  - number: 8.74x
    text: |-
      Als de aanvrager van een omgevingsvergunning voor een valkeniersactiviteit geen woonplaats in Nederland heeft,
      wordt een omgevingsvergunning voor een valkeniersactiviteit alleen verleend als de aanvrager genoegzaam aantoont
      dat hij gerechtigd is de jacht uit te oefenen in het land waarin hij zijn woon- of verblijfplaats heeft.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74x
  - number: 8.74y
    text: |-
      Als toepassing wordt gegeven aan [artikel 8.74x][ref1], wordt aan een omgevingsvergunning voor een
      valkeniersactiviteit het voorschrift verbonden dat de houder zich bij het gebruik van de jachtvogel
      bevindt in gezelschap van een in Nederland woonachtige houder van een geldige omgevingsvergunning voor een
      valkeniersactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74y
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        afdeling: 8.6b
  - number: '8.75'
    text: |-
      Deze afdeling is van toepassing op ontgrondingsactiviteiten die niet zijn aangewezen
      als vergunningvrije activiteiten in [paragraaf 6.2.2][ref1] of [7.2.2][ref2] of
      [afdeling 16.2 van het Besluit activiteiten leefomgeving][ref3] en is opgenomen met het oog op de doelen van de
      [wet][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf6.2.2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Paragraaf7.2.2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Afdeling16.2
      [ref4]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.75
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 6.2.2
      - id: ref2
        bwb_id: BWBR0041330
        paragraaf: 7.2.2
      - id: ref3
        bwb_id: BWBR0041330
        afdeling: '16.2'
      - id: ref4
        bwb_id: BWBR0037885
  - number: 8.76.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een ontgrondingsactiviteit, wordt de
      omgevingsvergunning alleen verleend als de activiteit verenigbaar is met de doelen van [de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 8.76.2
    text: 'De omgevingsvergunning wordt in ieder geval geweigerd als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.76.2.a
    text: niet aannemelijk is dat de ontgronding, zowel tijdens de uitvoering als daarna, veilig en stabiel is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.76.2.b
    text: onvoldoende verzekerd is dat het gebied na afloop van het ontgronden goed ingericht en beheerd zal worden; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.76.2.c
    text: |-
      de inrichting van de locatie niet aansluit bij de functie die in het omgevingsplan aan de locatie is toegedeeld of
      een functie die mogelijk wordt gemaakt door een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.76.3
    text: |-
      Bij de beoordeling van de aanvraag worden in ieder geval de gevolgen van de ontgronding voor watersystemen
      betrokken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.76.4
    text: |-
      Als voor een samenstel van activiteiten waarvoor een omgevingsvergunning voor een ontgrondingsactiviteit is
      vereist, ook een omgevingsvergunning voor een andere activiteit is vereist, maken de gronden voor verlening of
      weigering van de omgevingsvergunning voor die andere activiteit geen deel uit van de gronden voor verlening of
      weigering van de omgevingsvergunning voor de ontgrondingsactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.76
  - number: 8.77.1
    text: 'Aan een omgevingsvergunning kunnen voorschriften worden verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.77
  - number: 8.77.1.a
    text: |-
      voor de uitvoering van de ontgronding een werkplan wordt overgelegd en dat voor het werkplan toestemming nodig is
      van een bij het voorschrift aangewezen bestuursorgaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.77
  - number: 8.77.1.b
    text: |-
      op een daarbij omschreven wijze wordt aangegeven of aan de voorschriften wordt voldaan en dat de daarbij verkregen
      gegevens ter beschikking worden gesteld van het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.77
  - number: 8.77.2
    text: Aan een omgevingsvergunning kunnen voorschriften worden verbonden met het oog op de paleontologie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.77
  - number: 8.77.3
    text: |-
      [Artikel 8.81][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.77
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.8.2
        afdeling: '8.8'
  - number: '8.78'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een ontgrondingsactiviteit in een
      oppervlaktewaterlichaam in beheer bij het Rijk zijn op het verbinden van voorschriften aan de omgevingsvergunning
      de [artikelen 6.14][ref1] en [7.14 van het Besluit activiteiten leefomgeving][ref2] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.78
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: '8.79'
    text: |-
      Deze afdeling heeft betrekking op rijksmonumentenactiviteiten die niet zijn aangewezen als vergunningvrije
      activiteiten in [hoofdstuk 13 van het Besluit activiteiten leefomgeving][ref1] en is opgenomen met het oog op het
      behoud van cultureel erfgoed.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk13
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.79
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '13'
  - number: 8.80.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een rijksmonumentenactiviteit, wordt de
      omgevingsvergunning alleen verleend als de activiteit in overeenstemming is met het belang van de monumentenzorg.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: 8.80.2
    text: 'Bij de beslissing op de aanvraag wordt rekening gehouden met de volgende beginselen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: 8.80.2.a
    text: het voorkomen van ontsiering, beschadiging of sloop van monumenten en archeologische monumenten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: 8.80.2.b
    text: |-
      het voorkomen van verplaatsing van monumenten of een deel daarvan, tenzij dit dringend is vereist voor het behoud
      van die monumenten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: 8.80.2.c
    text: |-
      het bevorderen van het gebruik van monumenten, zo nodig door wijziging van die monumenten, rekening houdend met de
      monumentale waarden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: 8.80.2.d
    text: het conserveren en in stand houden van archeologische monumenten, bij voorkeur in situ.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.80
  - number: '8.81'
    text: |-
      Aan een omgevingsvergunning voor een rijksmonumentenactiviteit die betrekking heeft op een archeologisch monument
      kunnen in het belang van de archeologische monumentenzorg in ieder geval voorschriften worden verbonden, die
      inhouden een plicht tot:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.81
  - number: 8.81.a
    text: het treffen van technische maatregelen waardoor archeologische monumenten in situ kunnen worden behouden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.81
  - number: 8.81.b
    text: |-
      het verrichten van opgravingen als bedoeld in [artikel 1.1 van de Erfgoedwet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.81
    references:
      - id: ref1
        bwb_id: BWBR0037521
        artikel: '1'
  - number: 8.81.c
    text: |-
      het laten begeleiden van een activiteit die tot bodemverstoring leidt door een deskundige op het terrein van de
      archeologische monumentenzorg die voldoet aan bij die voorschriften te stellen kwalificaties; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.81
  - number: 8.81.d
    text: |-
      het verrichten van een opgraving of een archeologische begeleiding op een bepaalde wijze, als die wijze in
      overeenstemming is met [artikel 5.4, eerste en tweede lid, van de Erfgoedwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037521#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.81
    references:
