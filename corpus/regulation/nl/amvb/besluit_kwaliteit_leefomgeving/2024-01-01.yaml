  - number: 2.17.2
    text: 'Het eerste lid geldt voor gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.2.a
    text: de toestand van het krw-oppervlaktewaterlichaam of grondwaterlichaam niet verder achteruitgaat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.2.b
    text: |-
      het voldoen aan de omgevingswaarde als gevolg van aantasting door menselijke activiteiten of vanwege zijn
      natuurlijke gesteldheid niet haalbaar of onevenredig kostbaar is;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.2.c
    text: wordt voldaan aan de voorwaarden van artikel 4, vijfde, achtste en negende lid, van de kaderrichtlijn water; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.2.d
    text: |-
      een minder strenge doelstelling en de motivering daarvan voor het waterlichaam wordt opgenomen in het regionale
      waterprogramma, als het gaat om regionale wateren, of het nationale waterprogramma, als gaat om rijkswateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.3
    text: 'Het eerste lid geldt ook voor gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.3.a
    text: het niet voldoen aan de omgevingswaarde wordt veroorzaakt door een buiten Nederland gelegen verontreinigingsbron;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.3.b
    text: het voldoen aan de omgevingswaarde als gevolg van de grensoverschrijdende krw-verontreiniging niet mogelijk is; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.3.c
    text: |-
      wordt voldaan aan de voorwaarden van artikel 6, eerste lid, aanhef en onder c, en tweede lid, van de richtlijn
      prioritaire stoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.4
    text: 'Het eerste lid geldt ook voor gevallen waarin:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.4.a
    text: |-
      het niet voldoen het gevolg is van nieuwe veranderingen van de fysische kenmerken van een krw-
      oppervlaktewaterlichaam of wijzigingen in de toestand van een grondwaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.4.b
    text: wordt voldaan aan de voorwaarden van artikel 4, zevende, achtste en negende lid, van de kaderrichtlijn water; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.4.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het regionale waterprogramma, als het gaat om regionale
      wateren, of het nationale waterprogramma, als gaat om rijkswateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
  - number: 2.17.5
    text: |-
      Het eerste tot en met het vierde lid is van overeenkomstige toepassing op het goede ecologische potentieel dat voor
      een kunstmatig of sterk veranderd krw-oppervlaktewaterlichaam is vastgesteld op grond van [artikel 2.12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel2.17
