        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '6'
  - number: '8.6'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een mijnbouwlocatieactiviteit in een
      oppervlaktewaterlichaam in beheer bij het Rijk, zijn op het verbinden van voorschriften aan de omgevingsvergunning
      de [artikelen 6.56f][ref1] en [7.47 van het Besluit activiteiten leefomgeving][ref2] van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.6
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: '8.7'
    text: |-
      Deze afdeling is van toepassing op vergunningplichtige milieubelastende activiteiten als bedoeld in
      [hoofdstuk 3 van het Besluit activiteiten leefomgeving][ref1] en is opgenomen met het oog op het waarborgen van de
      veiligheid en het beschermen van de gezondheid en het milieu.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.7
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 8.9.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een milieubelastende activiteit, wordt de
      omgevingsvergunning alleen verleend als wordt voldaan aan de volgende criteria:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: milieuverontreiniging_voorkomen_of_beperkt
            type: boolean
            required: true
            description: Of milieuverontreiniging geintegreerd wordt voorkomen of beperkt
            source: {}
          - name: emissies_voorkomen_of_beperkt
            type: boolean
            required: true
            description: Of emissies in lucht, water en bodem worden voorkomen of beperkt
            source: {}
          - name: preventieve_maatregelen_getroffen
            type: boolean
            required: true
            description: Of alle passende preventieve maatregelen tegen milieuverontreiniging worden getroffen
            source: {}
          - name: beste_beschikbare_technieken_toegepast
            type: boolean
            required: true
            description: Of de beste beschikbare technieken worden toegepast
            source: {}
          - name: geen_significante_milieuverontreiniging
            type: boolean
            required: true
            description: Of er geen significante milieuverontreiniging wordt veroorzaakt
            source: {}
          - name: energie_doelmatig_gebruikt
            type: boolean
            required: true
            description: Of energie doelmatig wordt gebruikt
            source: {}
          - name: maatregelen_ongevallen_getroffen
            type: boolean
            required: true
            description: Of nodige maatregelen worden getroffen om ongevallen te voorkomen en gevolgen te beperken
            source: {}
          - name: maatregelen_beeindiging_getroffen
            type: boolean
            required: true
            description: Of bij beeindiging maatregelen worden getroffen om risico van milieuverontreiniging te voorkomen
            source: {}
        output:
          - name: milieuvergunning_criteria_voldaan
            type: boolean
            description: >-
              Of aan alle criteria voor verlening van de
              omgevingsvergunning voor milieubelastende activiteiten
              wordt voldaan
        actions:
          - output: milieuvergunning_criteria_voldaan
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $milieuverontreiniging_voorkomen_of_beperkt
                  value: true
                - operation: EQUALS
                  subject: $emissies_voorkomen_of_beperkt
                  value: true
                - operation: EQUALS
                  subject: $preventieve_maatregelen_getroffen
                  value: true
                - operation: EQUALS
                  subject: $beste_beschikbare_technieken_toegepast
                  value: true
                - operation: EQUALS
                  subject: $geen_significante_milieuverontreiniging
                  value: true
                - operation: EQUALS
                  subject: $energie_doelmatig_gebruikt
                  value: true
                - operation: EQUALS
                  subject: $maatregelen_ongevallen_getroffen
                  value: true
                - operation: EQUALS
                  subject: $maatregelen_beeindiging_getroffen
                  value: true
  - number: 8.9.1.a
    text: milieuverontreiniging door de activiteit wordt geïntegreerd voorkomen of, wanneer dit niet mogelijk is, beperkt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.b
    text: |-
      emissies in de lucht, het water en de bodem en het ontstaan van afval door de activiteit worden voorkomen of,
      wanneer dat niet mogelijk is, beperkt om een hoog niveau van bescherming van het milieu in zijn geheel te bereiken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.c
    text: alle passende preventieve maatregelen tegen milieuverontreiniging worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.d
    text: de voor de activiteit in aanmerking komende beste beschikbare technieken worden toegepast;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.e
    text: er wordt geen significante milieuverontreiniging veroorzaakt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.f
    text: energie wordt doelmatig gebruikt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.g
    text: de nodige maatregelen worden getroffen om ongevallen te voorkomen en de gevolgen van ongevallen te beperken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.1.h
    text: |-
      bij de definitieve beëindiging van de activiteit worden de nodige maatregelen getroffen om elk risico van
      milieuverontreiniging door de activiteit voor het terrein waarop de activiteit werd verricht, te voorkomen of te
      beperken, als dat nodig is om dat terrein weer geschikt te maken voor toekomstig gebruik.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.2
    text: |-
      Bij de beoordeling van de aanvraag wordt rekening gehouden met de [artikelen 10.14][ref1] en
      [10.29a van de Wet milieubeheer][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '10'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '10'
  - number: 8.9.3
    text: |-
      Bij de beoordeling of de milieubelastende activiteit voldoet aan het criterium, bedoeld in het eerste lid,
      aanhef en onder e, wordt bij het bepalen of sprake is van significante milieuverontreiniging in ieder geval
      rekening gehouden met het omgevingsplan, omgevingsvergunningen voor buitenplanse omgevingsplanactiviteiten, de
      waterschapsverordening en de omgevingsverordening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
  - number: 8.9.4
    text: |-
      Bij de beoordeling of de milieubelastende activiteit voldoet aan de criteria, bedoeld in het eerste lid, aanhef en
      onder a tot en met e, wordt ook rekening gehouden met de informatiedocumenten, bedoeld in [bijlage XVIII][ref1],
      onder B.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.9
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.10.1
    text: |-
      Bij de beoordeling of de milieubelastende activiteit voldoet aan het criterium, bedoeld in
      [artikel 8.9, eerste lid, aanhef en onder d][ref1], wordt bij het bepalen van de beste beschikbare technieken
      rekening gehouden met de BBT-conclusies en informatiedocumenten, bedoeld in [bijlage XVIII][ref2], onder A.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 8.10.2
    text: |-
      Als op een milieubelastende activiteit geen BBT-conclusies van toepassing zijn of als de van toepassing zijnde BBT-
      conclusies niet alle mogelijke milieugevolgen van de activiteit behandelen, wordt bij het bepalen van de beste
      beschikbare technieken in ieder geval rekening gehouden met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.a
    text: de toepassing van technieken die weinig afvalstoffen veroorzaken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.b
    text: |-
      de toepassing van stoffen die minder gevaarlijk zijn dan stoffen of mengsels als bedoeld in artikel 3 van de CLP-
      verordening;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.c
    text: |-
      de ontwikkeling van technieken voor de terugwinning en het opnieuw gebruiken van de uitgestoten en gebruikte
      stoffen en van afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.d
    text: vergelijkbare processen, apparaten of wijzen van bedrijfsvoering die met succes in de praktijk zijn beproefd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.e
    text: de vooruitgang van de techniek en de ontwikkeling van de wetenschappelijke kennis;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.f
    text: de aard, de gevolgen en de omvang van de emissies;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.g
    text: de verwachte datum en het verwachte tijdstip waarop met de activiteit wordt begonnen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.h
    text: de tijd die nodig is om een betere techniek te gaan toepassen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.i
    text: het verbruik en de aard van de grondstoffen, met inbegrip van water, en de energie-efficiëntie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.j
    text: |-
      de noodzaak de nadelige gevolgen van de emissies en de risico’s voor het milieu te voorkomen of tot een minimum
      te beperken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.k
    text: de noodzaak ongevallen te voorkomen en de gevolgen daarvan voor het milieu te beperken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
  - number: 8.10.2.l
    text: |-
      de informatiedocumenten, bedoeld in [bijlage XVIII][ref1], onder A.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.10a.1
    text: |-
      Bij de beoordeling of de milieubelastende activiteit voldoet aan het criterium, bedoeld in
      [artikel 8.9, eerste lid, aanhef en onder g][ref1], wordt bij het bepalen van de nodige maatregelen om ongevallen
      te voorkomen en de gevolgen van ongevallen te beperken in ieder geval rekening gehouden met:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.10a.1.a
    text: |-
      voor zover het gaat om de risico’s van branden, rampen en crises als bedoeld in
      [artikel 10, onder a en b, van de Wet veiligheidsregio’s][ref1], het belang van:


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '10'
  - number: 8.10a.1.a.1°
    text: het voorkomen, beperken en bestrijden van die branden, rampen en crises;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
  - number: 8.10a.1.a.2°
    text: de mogelijkheden voor personen om zich daarbij in veiligheid te brengen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
  - number: 8.10a.1.a.3°
    text: |-
      de geneeskundige hulpverlening aan personen, bedoeld in [artikel 1 van die wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '1'
  - number: 8.10a.1.b
    text: |-
      de standaardwaarde voor het plaatsgebonden risico van de activiteit van 1 op de 1.000.000 per jaar voor beperkt
      kwetsbare gebouwen en beperkt kwetsbare locaties; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
  - number: 8.10a.1.c
    text: |-
      de kans op het overlijden van een groep van tien of meer personen per jaar als rechtstreeks gevolg van een
      ongewoon voorval veroorzaakt door de activiteit voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen
      en beperkt kwetsbare en kwetsbare locaties binnen een brandaandachtsgebied, een explosieaandachtsgebied en een
      gifwolkaandachtsgebied, voor zover dat gebied niet is gelegen binnen een risicogebied externe veiligheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
  - number: 8.10a.2
    text: |-
      Op de beoordeling, bedoeld in het eerste lid, onder b, is [artikel 5.11, derde tot en met vijfde lid][ref1], van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 8.10a.3
    text: |-
      Op de beoordeling, bedoeld in het eerste lid, onder c, zijn de [artikelen 5.12][ref1] en [5.13][ref2] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 8.10a.4
    text: |-
      Het eerste lid, aanhef en onder b en c, is niet van toepassing voor zover een aanvraag om een omgevingsvergunning
      betrekking heeft op een activiteit als bedoeld in [artikel 8.14, eerste lid][ref1], [8.15, eerste lid][ref2], of
      [8.16, eerste lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.11.1
    text: |-
      Bij de toepassing van [paragraaf 8.5.1][ref1] worden locaties en gebouwen in de nabijheid van de milieubelastende
      activiteit in aanmerking genomen die in overeenstemming zijn met het omgevingsplan, omgevingsvergunningen voor
      buitenplanse omgevingsplanactiviteiten en de omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.11.2
    text: |-
      Voor zover een omgevingsverordening regels bevat over het verlenen of weigeren van een omgevingsvergunning
      voor een milieubelastende activiteit als bedoeld in [artikel 5.19, eerste lid, van de wet][ref1], wordt de
      omgevingsvergunning alleen verleend als die in overeenstemming is met die regels.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 8.12.1
    text: |-
      Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op
      milieubelastende activiteiten als bedoeld in [bijlage VII][ref1], onder B en E.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.12
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.12.2
    text: |-
      De omgevingsvergunning wordt alleen verleend als een grenswaarde voor het plaatsgebonden risico van de activiteit
      in acht wordt genomen van ten hoogste 1 op de 1.000.000 per jaar voor kwetsbare en zeer kwetsbare gebouwen en
      kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.12
    machine_readable:
      execution:
        produces:
          legal_character: BESCHIKKING
          decision_type: TOEKENNING
        parameters:
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico van de activiteit per jaar
            source: {}
        output:
          - name: grenswaarde_vergunning_in_acht_genomen
            type: boolean
            description: Of de grenswaarde voor het plaatsgebonden risico bij vergunningverlening in acht is genomen
        actions:
          - output: grenswaarde_vergunning_in_acht_genomen
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $plaatsgebonden_risico_per_jaar
              value: 0.000001
  - number: 8.12.3
    text: |-
      Op de beoordeling van de aanvraag zijn de [artikelen 5.3 tot en met 5.6][ref1], [5.8 tot en met 5.10][ref2] en
      [5.11, tweede tot en met vijfde lid][ref3], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
