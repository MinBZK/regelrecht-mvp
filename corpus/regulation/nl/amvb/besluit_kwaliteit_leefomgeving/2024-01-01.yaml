        hoofdstuk: '7'
  - number: 8.83.1.c
    text: |-
      vergunningplichtige lozingsactiviteiten op een oppervlaktewaterlichaam als bedoeld in de [hoofdstukken 3][ref1],
      [6][ref2] en [7 van het Besluit activiteiten leefomgeving][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk6
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk7
