    text: |-
      Een regionaal waterprogramma bevat een overzicht van de toestandsklasse per stof en kwaliteitselement van elk krw-
      oppervlaktewaterlichaam en grondwaterlichaam, waarop het programma betrekking heeft, bepaald over de voorgaande
