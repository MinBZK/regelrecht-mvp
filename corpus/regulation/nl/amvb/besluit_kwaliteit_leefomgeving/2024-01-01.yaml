      dieren of planten van soorten, genoemd in [bijlage IX bij dat besluit][ref2], voldoet aan de artikelen 11.55,
      tweede lid, en [11.58, eerste lid, van dat besluit][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '11'
  - number: '4.31'
    text: |-
      In afwijking van [artikel 3.10, eerste lid, van de wet][ref1] stelt Onze Minister voor Natuur en Stikstof een
      programma vast als aannemelijk is dat niet wordt voldaan of niet zal worden voldaan aan een omgevingswaarde voor
      stikstofdepositie als bedoeld in [artikel 2.15a, eerste lid, van de wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: '5.1'
    text: |-
      Deze afdeling is van toepassing op het stellen van regels in het omgevingsplan als bedoeld in
      [artikel 4.2, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 5.1a
    text: |-
      Een omgevingsplan voldoet aan artikel 14, aanhef en onder 5, van Richtlijn nr. 2006/123/EG van het Europees
      Parlement en de Raad van de Europese Unie van 12 december 2006 betreffende de diensten op de interne markt (PbEU
      2006, L 376).
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.1a
  - number: 5.1b
    text: |-
      Voor de toepassing van deze afdeling wordt onder woonschip verstaan: drijvend bouwwerk met een woonfunctie op een
      locatie die in het omgevingsplan is aangewezen als een ligplaats voor een woonschip.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.1b
  - number: 5.2.1
    text: |-
      In een omgevingsplan wordt voor risico’s van branden, rampen en crises als bedoeld in
      [artikel 10, onder a en b, van de Wet veiligheidsregio’s][ref1], rekening gehouden met het belang van:


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '10'
  - number: 5.2.1.a
    text: het voorkomen, beperken en bestrijden daarvan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.2
  - number: 5.2.1.b
    text: de mogelijkheden voor personen om zich daarbij in veiligheid te brengen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.2
  - number: 5.2.1.c
    text: |-
      de geneeskundige hulpverlening, bedoeld in [artikel 1 van die wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '1'
  - number: 5.2.2
    text: |-
      Het eerste lid laat onverlet de in [paragrafen 5.1.2.2 tot en met 5.1.2.7][ref1] gestelde specifieke regels over
      het waarborgen van de veiligheid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.3.1
    text: |-
      De [paragrafen 5.1.2.2 tot en met 5.1.2.6][ref1] zijn van toepassing op het toelaten van beperkt kwetsbare,
      kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties in verband met het externe
      veiligheidsrisico van een activiteit als bedoeld in die paragrafen die op een locatie is toegelaten op grond van
      een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.3.2
    text: |-
      Beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties zijn de gebouwen
      en locaties, bedoeld in [bijlage VI][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.3.3
    text: |-
      Onder een beperkt kwetsbaar, kwetsbaar en zeer kwetsbaar gebouw en een beperkt kwetsbare en kwetsbare locatie wordt
      ook verstaan een gebouw en locatie als bedoeld in [bijlage VI][ref1] dat of die nog niet aanwezig is, maar op grond
      van het omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit is toegelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.3a.1
    text: |-
      [Artikel 5.2][ref1] is niet van toepassing voor zover activiteiten op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al rechtmatig op een locatie worden verricht of
      zijn toegestaan op het tijdstip van inwerkingtreding van die bepaling.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.3a.2
    text: |-
      De bepalingen in [paragraaf 5.1.2.2][ref1] zijn niet van toepassing op beperkt kwetsbare, kwetsbare en zeer
      kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties, voor zover die op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al rechtmatig op een locatie waren toegestaan en
      aanwezig waren op 1 april 2015, als het gaat om het risico op een ongewoon voorval veroorzaakt door een activiteit
      als bedoeld in [bijlage VII][ref2], onder C.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 5.3a.3
    text: |-
      Een locatie voor evenementen in de openlucht voor ten minste 5.000 personen voor zover die op grond van een
      omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al rechtmatig op een
      locatie is toegestaan op het tijdstip van inwerkingtreding van [paragraaf 5.1.2.2][ref1] en tot dat tijdstip werd
      aangemerkt als beperkt kwetsbaar object, wordt aangemerkt als beperkt kwetsbare locatie, als het gaat om het risico
      op een ongewoon voorval veroorzaakt door een activiteit die op dat tijdstip op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit rechtmatig op een locatie wordt verricht of is
      toegestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.3a.4
    text: |-
      Een gebouw met een gezondheidszorgfunctie zonder bedgebied dat op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al rechtmatig op een locatie is toegestaan op
      het tijdstip van inwerkingtreding van [paragraaf 5.1.2.2][ref1] en dat tot dat tijdstip werd aangemerkt als beperkt
      kwetsbaar object, wordt aangemerkt als beperkt kwetsbaar gebouw, als het gaat om het risico op een ongewoon voorval
      veroorzaakt door een activiteit die op dat tijdstip op grond van een omgevingsplan of een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit rechtmatig op een locatie wordt verricht of is toegestaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.3a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.4.1
    text: |-
      Deze paragraaf is ook van toepassing op het op een locatie toelaten van een milieubelastende activiteit als bedoeld
      in [bijlage VII][ref1] in verband met het externe veiligheidsrisico voor beperkt kwetsbare, kwetsbare en zeer
      kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die zijn toegelaten op grond van een omgevingsplan of
      een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.4
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.4.2
    text: |-
      De [artikelen 5.7, eerste lid][ref1], en [5.11, eerste lid][ref2], zijn van overeenkomstige toepassing op
      het toelaten van een risicoverhogend bouwwerk in de directe omgeving van een buisleiding als bedoeld in
      [artikel 3.101, eerste lid, onder a tot en met d, van het Besluit activiteiten leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.4
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.4a
    text: Deze paragraaf is niet van toepassing op het toelaten van een windpark met 3 of meer windturbines.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.4a
  - number: '5.5'
    text: |-
      De [artikelen 5.7][ref1] en [5.11, eerste en tweede lid][ref2], zijn niet van toepassing op het plaatsgebonden
      risico van een activiteit voor beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties
      waar een activiteit als bedoeld in [bijlage VII][ref3] wordt verricht of die een functionele binding hebben met een
      activiteit als bedoeld in die bijlage.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.5
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
  - number: '5.6'
    text: |-
      Het plaatsgebonden risico is de kans op het overlijden van een onbeschermd en continu aanwezig persoon buiten
      de begrenzing van de locatie waar een activiteit wordt verricht als rechtstreeks gevolg van een ongewoon voorval
      veroorzaakt door die activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.6
  - number: 5.7.1
    text: |-
      In een omgevingsplan wordt een grenswaarde voor het plaatsgebonden risico van een activiteit in acht genomen van
      ten hoogste 1 op de 1.000.000 per jaar voor kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.7
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gebouw_of_locatie_type
            type: string
            required: true
            description: >-
              Type gebouw of locatie: kwetsbaar_gebouw,
              zeer_kwetsbaar_gebouw, kwetsbare_locatie,
              beperkt_kwetsbaar_gebouw, beperkt_kwetsbare_locatie
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico van de activiteit per jaar (als kans, bijv. 0.000001 = 1 op 1.000.000)
            source: {}
        output:
          - name: grenswaarde_in_acht_genomen
            type: boolean
            description: Of de grenswaarde voor het plaatsgebonden risico in acht is genomen
        actions:
          - output: grenswaarde_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - kwetsbaar_gebouw
                      - zeer_kwetsbaar_gebouw
                      - kwetsbare_locatie
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.000001
              default: true
  - number: 5.7.2
    text: |-
      Het eerste lid is niet van toepassing op het toelaten van kwetsbare en zeer kwetsbare gebouwen en kwetsbare
      locaties in verband met het externe veiligheidsrisico van binnenwateren die behoren tot het basisnet, met
      uitzondering van zeevaartroutes, het Amsterdam-Rijnkanaal en het Lekkanaal.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.7
  - number: 5.7.3
    text: 'Het eerste lid is niet van toepassing op kwetsbare en zeer kwetsbare gebouwen op een locatie:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.7
  - number: 5.7.3.a
    text: die parallel aan een tunnel is gelegen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.7
  - number: 5.7.3.b
    text: |-
      boven een tunnel waardoor het vervoer van brandbare gassen in bulkhoeveelheden en ontplofbare stoffen niet is
      toegestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.7
  - number: 5.8.1
    text: |-
      [Aan artikel 5.7][ref1] wordt voldaan door inachtneming van de volgende afstanden voor de activiteiten, aangegeven
      in de daarbij aangegeven onderdelen van [bijlage VII][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 5.8.1.a
    text: 'de onderdelen A en B: de afstand, aangegeven bij die activiteit;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.1.b
    text: 'onderdeel C: de afstand tot de locaties die bij ministeriële regeling zijn aangewezen; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.1.c
    text: 'de onderdelen D en E: een berekende afstand.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.2
    text: |-
      In afwijking van het eerste lid, aanhef en onder a, kunnen de volgende afstanden in acht worden genomen voor de
      activiteiten aangegeven in de daarbij aangegeven onderdelen van [bijlage VII][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.8.2.a
    text: |-
      onderdeel A: de afstand waarvoor toestemming als bedoeld in [artikel 4.7 van de wet][ref1] is verleend, als de
      toestemming gaat om een gelijkwaardige maatregel die betrekking heeft op die afstand; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 5.8.2.b
    text: 'onderdeel B, onder 2 of 3: een berekende afstand.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.3
    text: |-
      Als de afstand, bedoeld in het eerste lid, onder b, alleen een deel van de breedte van de weg, de spoorweg of het
      binnenwater beslaat, laat het omgevingsplan boven de volle breedte geen kwetsbare en zeer kwetsbare gebouwen en
      kwetsbare locaties toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.4
    text: |-
      Als een weg of spoorweg die tot het basisnet behoort gedeeltelijk bestaat uit een tunnel waardoor het vervoer
      van brandbare gassen in bulkhoeveelheden en ontplofbare stoffen is toegestaan, laat het omgevingsplan boven dat
      gedeelte geen kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.8.5
    text: Op het berekenen van de afstand zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.8
  - number: 5.9.1
    text: |-
      De afstanden, bedoeld in [artikel 5.8][ref1], gelden:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.9.1.a
    text: 'voor zeer kwetsbare gebouwen en kwetsbare gebouwen, anders dan woonschepen of woonwagens: tot de gevel;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
  - number: 5.9.1.b
    text: 'voor nieuw te bouwen kwetsbare en zeer kwetsbare gebouwen: tot de locatie waar een gevel mag komen;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
  - number: 5.9.1.c
    text: 'voor kwetsbare locaties: tot de begrenzing van de locatie voor het verblijf van personen; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
  - number: 5.9.1.d
    text: |-
      voor woonschepen en woonwagens: tot de begrenzing van de locatie voor het plaatsen van dat woonschip of die
      woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
  - number: 5.9.2
    text: |-
      De afstanden gelden voor zeer kwetsbare gebouwen ook tot de begrenzing van de locatie voor het verblijf van
      personen buiten het gebouw, als het gaat om het risico op een ongewoon voorval veroorzaakt door een activiteit als
      bedoeld in [bijlage VII][ref1], onder A, onder 1a, B, C, D, onder 2, en E, onder 2 tot en met 13.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.9
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.10.1
    text: |-
      In afwijking van [artikel 5.7][ref1] kan in een omgevingsplan een grenswaarde voor het plaatsgebonden risico van
      een activiteit in acht worden genomen van ten hoogste 1 op de 100.000 per jaar:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gebouw_of_locatie_type
            type: string
            required: true
            description: >-
              Type gebouw of locatie: kwetsbaar_gebouw,
              kwetsbare_locatie
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico van de activiteit per jaar
            source: {}
          - name: datum_toelating_of_begin_activiteit
            type: date
            required: true
            description: Datum waarop het gebouw/locatie is toegelaten of de activiteit is begonnen
            source: {}
          - name: toetsdatum
            type: date
            required: true
            description: De datum waarop de toetsing plaatsvindt
            source: {}
          - name: na_periode_voldaan_aan_5_7
            type: boolean
            required: true
            description: Of na de periode van drie jaar wordt voldaan aan artikel 5.7
            source: {}
        output:
          - name: afwijkende_grenswaarde_toegestaan
            type: boolean
            description: Of de afwijkende grenswaarde van 1 op 100.000 per jaar mag worden toegepast
        actions:
          - output: afwijkende_grenswaarde_toegestaan
            value:
              operation: AND
              conditions:
                - operation: IN
                  subject: $gebouw_of_locatie_type
                  values:
                    - kwetsbaar_gebouw
                    - kwetsbare_locatie
                - operation: LESS_THAN_OR_EQUAL
                  subject: $plaatsgebonden_risico_per_jaar
                  value: 0.00001
                - operation: LESS_THAN_OR_EQUAL
                  subject: $toetsdatum
                  value:
                    operation: DATE_ADD
                    date: $datum_toelating_of_begin_activiteit
                    years: 3
                - operation: EQUALS
                  subject: $na_periode_voldaan_aan_5_7
                  value: true
  - number: 5.10.1.a
    text: voor kwetsbare gebouwen en kwetsbare locaties;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
  - number: 5.10.1.b
    text: 'gedurende een periode van ten hoogste drie jaar vanaf de datum:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
  - number: 5.10.1.b.1°
    text: waarop het gebouw of de locatie is toegelaten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
  - number: 5.10.1.b.2°
    text: van het begin van de activiteit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
  - number: 5.10.1.c
    text: |-
      als na die periode wordt voldaan aan [artikel 5.7][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.10.2
    text: |-
      Aan het eerste lid wordt voldaan door inachtneming van een berekende afstand. Op het berekenen van de afstand
      zijn de bij ministeriële regeling gestelde regels van toepassing. De afstand geldt tot de begrenzing, bedoeld in
      [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.10
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11.1
    text: |-
      In een omgevingsplan wordt rekening gehouden met een standaardwaarde voor het plaatsgebonden risico van een
      activiteit van 1 op de 1.000.000 per jaar voor beperkt kwetsbare gebouwen en beperkt kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gebouw_of_locatie_type
            type: string
            required: true
            description: >-
              Type gebouw of locatie: beperkt_kwetsbaar_gebouw,
              beperkt_kwetsbare_locatie
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico van de activiteit per jaar
            source: {}
        output:
          - name: standaardwaarde_in_acht_genomen
            type: boolean
            description: Of rekening is gehouden met de standaardwaarde voor het plaatsgebonden risico
        actions:
          - output: standaardwaarde_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - beperkt_kwetsbaar_gebouw
                      - beperkt_kwetsbare_locatie
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.000001
              default: true
  - number: 5.11.2
    text: |-
      In afwijking van het eerste lid wordt, als het gaat om het opwekken van elektriciteit met een windturbine met een
      rotordiameter van meer dan 2 m, bedoeld in [artikel 3.11 van het Besluit activiteiten leefomgeving][ref1], een
      grenswaarde voor het plaatsgebonden risico in acht genomen van ten hoogste 1 op de 100.000 per jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: is_windturbine_activiteit
            type: boolean
            required: true
            description: Of het gaat om het opwekken van elektriciteit met een windturbine
            source: {}
          - name: rotordiameter_m
            type: number
            required: true
            description: De rotordiameter van de windturbine in meters
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico per jaar
            source: {}
        output:
          - name: grenswaarde_windturbine_in_acht_genomen
            type: boolean
            description: Of de grenswaarde voor windturbines in acht is genomen
        actions:
          - output: grenswaarde_windturbine_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $is_windturbine_activiteit
                        value: true
                      - operation: GREATER_THAN
                        subject: $rotordiameter_m
                        value: 2
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.00001
              default: true
  - number: 5.11.3
    text: |-
      Aan het eerste lid wordt in ieder geval voldaan door inachtneming van de afstanden, bedoeld in [artikel 5.8][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11.4
    text: |-
      Aan het tweede lid wordt voldaan door inachtneming van een berekende afstand. Op het berekenen van de afstand zijn
      de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11
  - number: 5.11.5
    text: |-
      De afstanden gelden tot de begrenzing, bedoeld in [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11a.1
    text: |-
      [Artikel 5.11, eerste lid][ref1], is niet van toepassing op het toelaten van beperkt kwetsbare gebouwen en beperkt
      kwetsbare locaties in verband met het externe veiligheidsrisico van binnenwateren die behoren tot het basisnet, met
      uitzondering van zeevaartroutes, het Amsterdam-Rijnkanaal en het Lekkanaal.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11a.2
    text: |-
      [Artikel 5.11, eerste lid][ref1], is niet van toepassing op beperkt kwetsbare gebouwen en beperkt kwetsbare
      locaties op een locatie:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.11a.2.a
    text: die parallel aan een tunnel is gelegen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11a
  - number: 5.11a.2.b
    text: |-
      boven een tunnel waardoor het vervoer van brandbare gassen in bulkhoeveelheden en ontplofbare stoffen niet is
      toegestaan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11a
  - number: 5.11a.3
    text: |-
      Als een weg of spoorweg die tot het basisnet behoort gedeeltelijk bestaat uit een tunnel waardoor het vervoer van
      brandbare gassen in bulkhoeveelheden en ontplofbare stoffen is toegestaan, wordt in het omgevingsplan boven dat
      gedeelte rekening gehouden met een standaardwaarde voor het plaatsgebonden risico van de activiteit van 1 op de
      1.000.000 per jaar voor beperkt kwetsbare gebouwen en beperkt kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.11a
  - number: 5.12.1
    text: |-
      Een brandaandachtsgebied is de locatie begrensd door de afstand, waar als gevolg van een ongewoon voorval dat leidt
      tot een plasbrand of een fakkelbrand de warmtestraling ten hoogste 10 kW/m2 is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: warmtestraling_kw_per_m2
            type: number
            required: true
            description: De warmtestraling in kW/m2 als gevolg van een plasbrand of fakkelbrand
            source: {}
        output:
          - name: is_brandaandachtsgebied
            type: boolean
            description: Of de locatie binnen het brandaandachtsgebied valt
        actions:
          - output: is_brandaandachtsgebied
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $warmtestraling_kw_per_m2
              value: 10
  - number: 5.12.2
    text: |-
      Een explosieaandachtsgebied is de locatie begrensd door de afstand, waar als gevolg van een ongewoon voorval dat
      leidt tot:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
  - number: 5.12.2.a
    text: |-
      een kokende vloeistof-gasexpansie-explosie (Boiling Liquid Expanding Vapor Explosion, BLEVE) de warmtestraling ten
      hoogste 35 kW/m2 is; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: warmtestraling_bleve_kw_per_m2
            type: number
            required: true
            description: De warmtestraling in kW/m2 als gevolg van een BLEVE
            source: {}
        output:
          - name: is_explosieaandachtsgebied_bleve
            type: boolean
            description: Of de locatie binnen het explosieaandachtsgebied valt op basis van BLEVE-warmtestraling
        actions:
          - output: is_explosieaandachtsgebied_bleve
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $warmtestraling_bleve_kw_per_m2
              value: 35
  - number: 5.12.2.b
    text: een explosie, anders dan onder a, de overdruk ten hoogste 10 kPa is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: overdruk_kpa
            type: number
            required: true
            description: De overdruk in kPa als gevolg van een explosie (anders dan BLEVE)
            source: {}
        output:
          - name: is_explosieaandachtsgebied_overdruk
            type: boolean
            description: Of de locatie binnen het explosieaandachtsgebied valt op basis van overdruk
        actions:
          - output: is_explosieaandachtsgebied_overdruk
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $overdruk_kpa
              value: 10
  - number: 5.12.3
    text: |-
      Een gifwolkaandachtsgebied is de locatie begrensd door de afstand, waar als gevolg van een ongewoon voorval dat
      leidt tot een gifwolk, personen in een gebouw overlijden door blootstelling aan ten hoogste de bij ministeriële
      regeling vastgestelde concentratie van een gevaarlijke stof gedurende een daarbij aangegeven periode.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
  - number: 5.12.4
    text: |-
      In afwijking van het derde lid wordt een gifwolkaandachtsgebied voor de toepassing van deze paragraaf begrensd door
      een afstand van 1,5 km vanaf de locatie binnen de begrenzing van de activiteit, bepaald volgens bij ministeriële
      regeling gestelde regels, als de afstand, bedoeld in het derde lid, groter is dan 1,5 km.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.12
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: afstand_gifwolk_km
            type: number
            required: true
            description: De berekende afstand van het gifwolkaandachtsgebied in km
            source: {}
        output:
          - name: begrenzing_gifwolkaandachtsgebied_km
            type: number
            description: De effectieve begrenzing van het gifwolkaandachtsgebied in km
        actions:
          - output: begrenzing_gifwolkaandachtsgebied_km
            value:
              operation: MIN
              values:
                - $afstand_gifwolk_km
                - 1.5
  - number: 5.13.1
    text: |-
      De afstanden, bedoeld in [artikel 5.12][ref1], zijn voor de volgende activiteiten aangegeven in de daarbij
      aangegeven onderdelen van [bijlage VII][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 5.13.1.a
    text: |-
      de onderdelen A, onder 1a en 7, B, onder 2 en 5, C en E, onder 9, 10 en 13: de afstand, aangegeven bij die
      activiteit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
  - number: 5.13.1.b
    text: 'de onderdelen D, onder 2, en E, onder 2 tot en met 9, 11 en 12: een berekende afstand.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
  - number: 5.13.2
    text: |-
      In afwijking van het eerste lid, aanhef en onder a, wordt de afstand berekend, als het gaat om een activiteit als
      bedoeld in [bijlage VII][ref1], onder B, onder 2, en als voor die activiteit de afstand voor het plaatsgebonden
      risico, bedoeld in [artikel 5.8, tweede lid, onder b][ref2], wordt berekend.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
    references:
      - id: ref1
        bwb_id: BWBR0041313
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.13.3
    text: Op het berekenen van de afstand zijn de bij ministeriële regeling gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
  - number: 5.13.4
    text: |-
      Als het gaat om een activiteit als bedoeld in [bijlage VII][ref1], onder C, zijn brandaandachtsgebieden en
      explosieaandachtsgebieden de locaties die bij ministeriële regeling zijn aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.13
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.14.1
    text: 'Een brandvoorschriftengebied en een explosievoorschriftengebied zijn de locaties:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.1.a
    text: |-
      die in een omgevingsplan kunnen worden aangewezen als op die locaties een brandaandachtsgebied, respectievelijk een
      explosieaandachtsgebied is toegelaten; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.1.b
    text: |-
      waar voor een bouwwerk de eis van [artikel 4.90, eerste lid, van het Besluit bouwwerken leefomgeving][ref1] geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '4'
  - number: 5.14.2
    text: 'In een omgevingsplan wordt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.2.a
    text: een brandaandachtsgebied aangewezen als brandvoorschriftengebied; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.2.b
    text: een explosieaandachtsgebied aangewezen als explosievoorschriftengebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.3
    text: |-
      In afwijking van het tweede lid kan in een omgevingsplan worden afgezien van aanwijzing van een brand- of
      explosievoorschriftengebied of kan een kleiner brand- of explosievoorschriftengebied worden aangewezen. Dit geldt
      niet voor een locatie in een brand- of een explosieaandachtsgebied waar een zeer kwetsbaar gebouw is toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.4
    text: |-
      In een omgevingsplan wordt de geometrische begrenzing vastgelegd van een brandvoorschriftengebied en van een
      explosievoorschriftengebied.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
  - number: 5.14.5
    text: |-
      Het tweede lid, aanhef en onder a, derde en vierde lid zijn niet van toepassing als het gaat om een
      activiteit als bedoeld in [bijlage VII][ref1], onder C, waarvoor een locatie bij ministeriële regeling als
      brandvoorschriftengebied is aangewezen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.14
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.15.1
    text: |-
      In een omgevingsplan wordt voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en
      kwetsbare locaties binnen een brandaandachtsgebied, een explosieaandachtsgebied en een gifwolkaandachtsgebied
      rekening gehouden met de kans op het overlijden van een groep van tien of meer personen per jaar als rechtstreeks
      gevolg van een ongewoon voorval veroorzaakt door een activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15.2
    text: 'Aan het eerste lid wordt in ieder geval voldaan als een omgevingsplan binnen een aandachtsgebied:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15.2.a
    text: geen beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties toelaat; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15.2.b
    text: |-
      waar het omgevingsplan beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties toelaat, waarborgt:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15.2.b.1°
    text: dat maatregelen zijn getroffen ter bescherming van personen in die gebouwen en op die locaties; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15.2.b.2°
    text: |-
      dat het aantal doorgaans aanwezige personen of de tijd dat die aanwezig zijn in die gebouwen en op die locaties
      beperkt is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15
  - number: 5.15a
    text: |-
      [Artikel 5.15][ref1] is niet van toepassing:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.15a.a
    text: |-
      voor zover activiteiten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit al rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van
      inwerkingtreding van die bepaling; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15a
  - number: 5.15a.b
    text: |-
      op beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties voor zover
      die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie zijn toegestaan op het tijdstip van inwerkingtreding van die bepaling.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.15a
  - number: 5.16.1
    text: |-
      Een risicogebied externe veiligheid is de locatie die in een omgevingsplan kan worden aangewezen, als binnen het
      gebied activiteiten als bedoeld in [bijlage VII][ref1], onder E, onder 3 tot en met 5.2, 6 tot en met 9 en 11 tot
      en met 13, worden toegelaten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.16.2
    text: In een omgevingsplan wordt de geometrische begrenzing vastgelegd van een risicogebied externe veiligheid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.16
  - number: 5.16.3
    text: |-
      In een omgevingsplan wordt op de begrenzing van een risicogebied externe veiligheid een grenswaarde voor het
      plaatsgebonden risico in acht genomen van ten hoogste 1 op de 1.000.000 per jaar, met uitzondering van het risico
      van een activiteit als bedoeld in [bijlage VII][ref1], onder C, en onder D, onder 2.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico per jaar op de begrenzing van het risicogebied
            source: {}
          - name: activiteit_bijlage_vii_onderdeel
            type: string
            required: true
            description: >-
              Het onderdeel van bijlage VII waaronder de activiteit
              valt (bijv. C, D2, overig)
            source: {}
        output:
          - name: grenswaarde_risicogebied_in_acht_genomen
            type: boolean
            description: Of de grenswaarde op de begrenzing van het risicogebied in acht is genomen
        actions:
          - output: grenswaarde_risicogebied_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $activiteit_bijlage_vii_onderdeel
                    values:
                      - C
                      - D2
                  then: true
                - when:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.000001
                  then: true
              default: false
  - number: 5.16.4
    text: |-
      Aan het derde lid wordt voldaan door inachtneming van de afstanden, bedoeld in [artikel 5.8][ref1], op de
      begrenzing van een risicogebied externe veiligheid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.16.5
    text: |-
      De [artikelen 5.7][ref1] en [5.11][ref2] zijn niet van toepassing op het plaatsgebonden risico van een activiteit
      in een risicogebied externe veiligheid. [Artikel 5.15][ref3] is niet van toepassing op een brandaandachtsgebied,
      een explosieaandachtsgebied of een gifwolkaandachtsgebied voor zover dat ligt binnen een risicogebied externe
      veiligheid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.17'
    text: 'Voor zover een omgevingsplan van toepassing is op een risicogebied externe veiligheid:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.17
  - number: 5.17.a
    text: |-
      kunnen beperkt kwetsbare gebouwen en beperkt kwetsbare locaties worden toegelaten als die op grond van een
      omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al zijn toegestaan op het
      tijdstip van het aanwijzen van het gebied;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.17
  - number: 5.17.b
    text: |-
      kunnen beperkt kwetsbare of kwetsbare gebouwen en beperkt kwetsbare of kwetsbare locaties worden toegelaten die
      naar het oordeel van het bevoegd gezag noodzakelijk zijn voor het gebied of voor een binnen het gebied toegelaten
      activiteit; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.17
  - number: 5.17.c
    text: worden geen zeer kwetsbare gebouwen toegelaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.17
  - number: '5.18'
    text: |-
      Een belemmeringengebied buisleiding is de locatie aan weerszijden van een buisleiding als bedoeld in
      [artikel 3.101, eerste lid, onder a tot en met d, van het Besluit activiteiten leefomgeving][ref1], gemeten vanuit
      het hart van de buisleiding tot een afstand van:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.18.a
    text: 5 m; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.18
  - number: 5.18.b
    text: 4 m, als door de buisleiding aardgas wordt vervoerd, met een druk van 1.600 tot en met 4.000 kPa.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.18
    machine_readable:
      execution:
        produces:
          legal_character: WAARDEBEPALING
        parameters:
          - name: vervoert_aardgas
            type: boolean
            required: true
            description: Of door de buisleiding aardgas wordt vervoerd
            source: {}
          - name: druk_kpa
            type: number
            required: false
            description: De druk in de buisleiding in kPa
            source: {}
        output:
          - name: afstand_belemmeringengebied_m
            type: number
            description: De afstand van het belemmeringengebied buisleiding in meters, gemeten vanuit het hart
        actions:
          - output: afstand_belemmeringengebied_m
            value:
              operation: IF
              cases:
                - when:
                    operation: AND
                    conditions:
                      - operation: EQUALS
                        subject: $vervoert_aardgas
                        value: true
                      - operation: GREATER_THAN_OR_EQUAL
                        subject: $druk_kpa
                        value: 1600
                      - operation: LESS_THAN_OR_EQUAL
                        subject: $druk_kpa
                        value: 4000
                  then: 4
              default: 5
  - number: '5.19'
    text: 'Voor zover een omgevingsplan van toepassing is op een belemmeringengebied buisleiding:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.a
    text: 'laat het omgevingsplan niet toe:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.a.1°
    text: kwetsbare gebouwen, tenzij die een functionele binding hebben met die buisleiding; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.a.2°
    text: zeer kwetsbare gebouwen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.b
    text: |-
      wordt in het omgevingsplan gewaarborgd dat de veiligheid van de buisleiding niet wordt geschaad bij het toelaten
      van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.b.1°
    text: andere bouwwerken dan die, bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
  - number: 5.19.b.2°
    text: |-
      activiteiten die van invloed kunnen zijn op de integriteit en werking van
      de buisleiding, met uitzondering van graafwerkzaamheden als bedoeld in
      [artikel 1, eerste lid, van de Wet informatie-uitwisseling bovengrondse en ondergrondse netten][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0040728#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.19
    references:
      - id: ref1
        bwb_id: BWBR0040728
        artikel: '1'
  - number: '5.20'
    text: |-
      Deze paragraaf is ook van toepassing op het op een locatie toelaten van het opslaan,
      herverpakken of bewerken van vuurwerk of pyrotechnische artikelen voor theatergebruik, bedoeld in
      [artikel 3.30 van het Besluit activiteiten leefomgeving][ref1], in verband met het externe veiligheidsrisico
      voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties die zijn
      toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.21.1
    text: |-
      In een omgevingsplan wordt voor beperkt kwetsbare, kwetsbare en zeer kwetsbare
      gebouwen en beperkt kwetsbare en kwetsbare locaties de afstand, bedoeld in
      [artikel 4.1042, eerste lid, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref1] in acht genomen,
      voor zover de afstand, bedoeld in het eerste lid, aanhef en onder b, of tweede lid, van dat artikel geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.21.2
    text: |-
      Het eerste lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die een functionele binding hebben met een activiteit als bedoeld in [artikel 5.20][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.22.1
    text: |-
      De afstanden, bedoeld in [artikel 5.21, eerste lid][ref1], gelden:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.22.1.a
    text: |-
      voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen: tot de begrenzing van de locatie voor het verblijf
      van personen buiten het gebouw; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
  - number: 5.22.1.b
    text: 'voor beperkt kwetsbare en kwetsbare locaties: tot de begrenzing van de locatie voor het verblijf van personen.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
  - number: 5.22.2
    text: 'In afwijking van het eerste lid, aanhef en onder a, gelden de afstanden voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
  - number: 5.22.2.a
    text: |-
      beperkt kwetsbare en kwetsbare gebouwen gelegen op meer dan 10 m vanaf de begrenzing van de locatie voor het
      verblijf van personen buiten het gebouw: tot 10 m vanaf de locatie waar een gevel mag komen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
  - number: 5.22.2.b
    text: |-
      beperkt kwetsbare en kwetsbare gebouwen als het gaat om woonschepen of woonwagens: tot de begrenzing van de locatie
      voor het plaatsen van dat woonschip of die woonwagen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.22
  - number: '5.23'
    text: |-
      Explosieaandachtsgebieden vuurwerk om een activiteit als bedoeld in
      [artikel 3.31, eerste lid, van het Besluit activiteiten leefomgeving][ref1] zijn de locaties die worden begrensd
      door de afstanden, bedoeld in [bijlage VIII][ref2], onder A en B.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 5.24.1
    text: |-
      Een omgevingsplan laat binnen een explosieaandachtsgebied vuurwerk geen beperkt kwetsbare, kwetsbare en zeer
      kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties toe.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.24
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: locatie_in_explosieaandachtsgebied_vuurwerk
            type: boolean
            required: true
            description: Of de locatie zich binnen een explosieaandachtsgebied vuurwerk bevindt
            source: {}
          - name: gebouw_of_locatie_is_kwetsbaar
            type: boolean
            required: true
            description: Of het gaat om een beperkt kwetsbaar, kwetsbaar of zeer kwetsbaar gebouw of locatie
            source: {}
        output:
          - name: gebouw_of_locatie_toegestaan
            type: boolean
            description: Of het gebouw of de locatie is toegestaan binnen het explosieaandachtsgebied
        actions:
          - output: gebouw_of_locatie_toegestaan
            value:
              operation: NOT
              value:
                operation: AND
                conditions:
                  - operation: EQUALS
                    subject: $locatie_in_explosieaandachtsgebied_vuurwerk
                    value: true
                  - operation: EQUALS
                    subject: $gebouw_of_locatie_is_kwetsbaar
                    value: true
  - number: 5.24.2
    text: |-
      Het eerste lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt
      kwetsbare en kwetsbare locaties die een functionele binding hebben met een activiteit als bedoeld in
      [artikel 3.31, eerste lid, van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.24
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.24.3
    text: |-
      De afstanden, bedoeld in [artikel 5.23][ref1], gelden tot de begrenzing, bedoeld in [artikel 5.22][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.24
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.25.1
    text: |-
      In afwijking van [artikel 5.24, eerste lid][ref1], kan een omgevingsplan binnen een explosieaandachtsgebied beperkt
      kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties toelaten als:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.25.1.a
    text: |-
      de warmtestraling als gevolg van brand op de begrenzing van de locatie voor het verblijf van personen buiten het
      gebouw ten hoogste 10 kW/m2 is; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
  - number: 5.25.1.b
    text: |-
      de weerstand tegen branddoorslag en brandoverslag tussen de deuropening van een bewaarplaats of een
      bufferbewaarplaats voor vuurwerk of pyrotechnische artikelen en beperkt kwetsbare, kwetsbare en zeer kwetsbare
      gebouwen ten minste 60 minuten is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: warmtestraling_kw_per_m2
            type: number
            required: true
            description: De warmtestraling in kW/m2 op de begrenzing van de locatie voor verblijf van personen
            source: {}
          - name: weerstand_branddoorslag_minuten
            type: number
            required: true
            description: De weerstand tegen branddoorslag en brandoverslag in minuten
            source: {}
        output:
          - name: gebouwen_toegestaan_in_explosieaandachtsgebied
            type: boolean
            description: Of gebouwen binnen het explosieaandachtsgebied vuurwerk mogen worden toegelaten
        actions:
          - output: gebouwen_toegestaan_in_explosieaandachtsgebied
            value:
              operation: AND
              conditions:
                - operation: LESS_THAN_OR_EQUAL
                  subject: $warmtestraling_kw_per_m2
                  value: 10
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $weerstand_branddoorslag_minuten
                  value: 60
  - number: 5.25.2
    text: 'Het eerste lid is van toepassing voor zover het gaat om:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
  - number: 5.25.2.a
    text: het opslaan, herverpakken of bewerken van meer dan 10.000 kg vuurwerk van categorie F1, F2 of F3; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
  - number: 5.25.2.b
    text: |-
      het opslaan of bewerken van pyrotechnische artikelen voor theatergebruik al dan niet samen met vuurwerk van
      categorie F1, F2 of F3.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.25
  - number: 5.26.1
    text: |-
      De [artikelen 5.28 tot en met 5.30][ref1] zijn ook van toepassing op het op een locatie toelaten van de volgende
      activiteiten in verband met het externe veiligheidsrisico voor beperkt kwetsbare, kwetsbare en zeer kwetsbare
      gebouwen en beperkt kwetsbare en kwetsbare locaties die zijn toegelaten op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.26.1.a
    text: |-
      het opslaan van ontplofbare stoffen van ADR-klasse 1, bedoeld in
      [artikel 3.33 van het Besluit activiteiten leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.26
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 5.26.1.b
    text: |-
      het exploiteren van een ippc-installatie voor het maken van explosieven, bedoeld in de
      [artikelen 3.72, eerste lid, onder f][ref1], en [3.73, eerste lid, van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.26
    references:
