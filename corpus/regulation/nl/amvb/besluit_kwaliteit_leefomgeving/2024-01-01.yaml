  - number: 8.17.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een milieubelastende activiteit die leidt
      tot een verhoging van de concentratie in de buitenlucht van de volgende stoffen, wordt de omgevingsvergunning
      alleen verleend als de volgende omgevingswaarden in acht worden genomen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.1.a
    text: |-
      de omgevingswaarden voor zwaveldioxide, bedoeld in [artikel 2.3][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.b
    text: |-
      de omgevingswaarde voor stikstofdioxide, bedoeld in [artikel 2.4, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.c
    text: |-
      de omgevingswaarde voor stikstofoxiden, bedoeld in [artikel 2.4, tweede lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.d
    text: |-
      de omgevingswaarden voor PM, bedoeld in [artikel 2.5, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.e
    text: |-
      de omgevingswaarde voor PM, bedoeld in [artikel 2.5, tweede lid, onder a][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.f
    text: |-
      de omgevingswaarde voor benzeen, bedoeld in [artikel 2.6, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.g
    text: |-
      de omgevingswaarde voor lood, bedoeld in [artikel 2.6, tweede lid][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.1.h
    text: |-
      de omgevingswaarde voor koolmonoxide, bedoeld in [artikel 2.6, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 8.17.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.2.a
    text: |-
      voor zover de verhoging van de concentratie in de buitenlucht van de in dat lid bedoelde stoffen van toepassing
      is op:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.2.a.1°
    text: een locatie waartoe het publiek geen toegang heeft en waar geen vaste bewoning is; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.2.a.2°
    text: de rijbaan van wegen en de middenberm van wegen, tenzij voetgangers normaliter toegang tot de middenberm hebben; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.2.b
    text: |-
      als het verrichten van de activiteit leidt tot een verhoging van de kalenderjaargemiddelde concentratie van
      stikstofdioxide of PM van 1,2 μg/m3 of minder.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.3
    text: |-
      Het tweede lid, onder b, is niet van toepassing als het gaat om het exploiteren van een ippc-installatie voor het
      houden van pluimvee of varkens, bedoeld in [artikel 3.201 van het Besluit activiteiten leefomgeving][ref1], of het
      exploiteren van een andere milieubelastende installatie, bedoeld in [artikel 3.202 van dat besluit][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.17.3.1°
    text: waarvan de emissie van PM vanuit de dierenverblijven meer bedraagt dan 800 kg per jaar; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.3.2°
    text: |-
      op een locatie als bedoeld in [artikel 5.53, eerste lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 8.17.4
    text: |-
      Bij het bepalen van de verhoging van de concentratie in de buitenlucht wordt opgeteld de verhoging veroorzaakt door
      het gebruik van de wegen, vaarwegen en spoorwegen van en naar de locatie waar de activiteit wordt verricht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.17.5
    text: |-
      Op het berekenen van de concentratie van de stoffen, bedoeld in het eerste lid, zijn de bij ministeriële regeling
      gestelde regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.17
  - number: 8.18.1
    text: |-
      Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft
      op een milieubelastende activiteit, anders dan een activiteit als bedoeld in [artikel 5.74][ref1] of
      [5.76][ref2], die meer geluid kan veroorzaken op geluidgevoelige gebouwen dan de standaardwaarden, bedoeld in
      [artikel 5.65, eerste lid, aanhef en onder a, tweede, derde of vierde lid][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 8.18.2
    text: |-
      De omgevingsvergunning wordt alleen verleend als het geluid door die activiteit binnen geluidgevoelige ruimten van
      geluidgevoelige gebouwen de grenswaarden, bedoeld in [artikel 5.66, tweede lid][ref1], niet overschrijdt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 8.18.3
    text: 'Het tweede lid is niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.3.a
    text: |-
      de activiteit plaatsvindt, of het geluidgevoelige gebouw is gelegen, op een industrieterrein waarvoor
      geluidproductieplafonds als omgevingswaarden zijn vastgesteld; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.3.b
    text: |-
      het geluidgevoelige gebouw op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit is toegelaten voor een duur van niet meer dan tien jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.4
    text: |-
      Het tweede lid is ook niet van toepassing als op het tijdstip van inwerkingtreding van dit besluit op grond van
      het omgevingsplan, een omgevingsvergunning of een maatwerkvoorschrift voor een activiteit een hogere waarde gold
      dan de grenswaarden, bedoeld in [artikel 5.66, tweede lid][ref1]. De omgevingsvergunning wordt in dat geval alleen
      verleend als het geluid door de activiteit die hogere waarde niet overschrijdt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 8.18.5
    text: 'Het tweede lid is ook niet van toepassing als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.5.a
    text: |-
      zwaarwegende bezwaren van bouwkundige aard bestaan tegen het treffen van maatregelen aan de gevel die nodig zijn
      om voor dat gebouw te voldoen aan de grenswaarden, mits, als andere maatregelen mogelijk zijn om de geluidwering
      zoveel mogelijk te verbeteren, die andere maatregelen wel worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.5.b
    text: |-
      de eigenaar geen medewerking verleent aan het onderzoek naar het geluid in geluidgevoelige ruimten binnen zijn
      gebouw en naar de noodzakelijke geluidwerende maatregelen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.18.5.c
    text: de eigenaar geen medewerking verleent aan het treffen van geluidwerende maatregelen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.18
  - number: 8.19.1
    text: |-
      Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het gebruik
      door de Nederlandse of een bondgenootschappelijke krijgsmacht, van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
  - number: 8.19.1.a
    text: |-
      ontplofbare stoffen en voorwerpen die behoren tot ADR-klasse 1, op een schietbaan of een combinatie van schietbanen,
      bedoeld in [artikel 3.335, eerste lid, aanhef en onder a, van het Besluit activiteiten leefomgeving][ref1], als die
      schietbaan of combinatie van schietbanen ligt in de buitenlucht of in een gebouw zonder gesloten afdekking of met
      een open zijde; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.19.1.b
    text: |-
      ontplofbare stoffen en voorwerpen die behoren tot ADR-klasse 1, op een springterrein, bedoeld in
      [artikel 3.335, eerste lid, aanhef en onder c, van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.19.2
    text: |-
      De omgevingsvergunning wordt alleen verleend als het geluid door die activiteit op geluidgevoelige gebouwen niet
      hoger is dan 60 B.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
  - number: 8.19.3
    text: |-
      Het tweede lid is niet van toepassing als het geluidgevoelige gebouw op grond van een omgevingsplan of een
      omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit is toegelaten voor een duur van niet meer dan
      tien jaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
  - number: 8.19.4
    text: |-
      Op het berekenen van het geluid, bedoeld in het tweede lid, zijn de bij ministeriële regeling gestelde regels van
      toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.19
  - number: '8.20'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een milieubelastende activiteit die geluid,
      trillingen of geur veroorzaakt, worden bij de beoordeling van dat geluid, die trillingen of die geur buiten
      beschouwing gelaten het geluid, de trillingen of de geur op een geluidgevoelig, trillinggevoelig of geurgevoelig
      gebouw dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.20
  - number: 8.20.a
    text: |-
      functioneel verbonden is met de activiteit, maar daar op grond van het [Besluit activiteiten leefomgeving][ref1]
      geen deel van uitmaakt; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.20.b
    text: |-
      eerder functioneel verbonden was met de activiteit en waarvoor op grond van [artikel 5.62][ref1], [5.85][ref2]
      of [5.96, eerste of tweede lid][ref3], in het omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit is bepaald dat de waarden of afstanden, bedoeld in die artikelen, niet gelden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '8.21'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het exploiteren van een ippc-installatie
      voor het houden van pluimvee of varkens, bedoeld in [artikel 3.201 van het Besluit activiteiten leefomgeving][ref1],
      of het exploiteren van een andere milieubelastende installatie, bedoeld in [artikel 3.202 van dat besluit][ref2],
      voor zover die activiteit wordt verricht in een dierenverblijf, wordt bij de beoordeling van de aanvraag
      alleen rekening gehouden met de gevolgen van de emissie van ammoniak door dat dierenverblijf op voor verzuring
      gevoelige gebieden die gevoelig zijn voor de effecten van ammoniak als daarover regels als bedoeld in
      [artikel 5.19, eerste lid, van de wet][ref3] zijn gesteld in de omgevingsverordening.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 8.22.1
    text: |-
      Voor zover de aanvraag om een omgevingsvergunning betrekking heeft op een milieubelastende activiteit die
      gevolgen kan hebben voor watersystemen, en voor zover het gaat om het beschermen van het milieu, wordt de
      omgevingsvergunning alleen verleend als de activiteit verenigbaar is met het belang van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.22
  - number: 8.22.1.a
    text: het voorkomen en waar nodig beperken van overstromingen, wateroverlast en waterschaarste;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.22
  - number: 8.22.1.b
    text: het beschermen en verbeteren van de chemische en ecologische kwaliteit van watersystemen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.22
  - number: 8.22.1.c
    text: het vervullen van maatschappelijke functies door watersystemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.22
  - number: 8.22.2
    text: |-
      Bij de toepassing van het eerste lid wordt rekening gehouden met de waterbeheerprogramma’s, regionale
      waterprogramma’s, stroomgebiedsbeheerplannen, overstromingsrisicobeheerplannen en het nationale waterprogramma, die
      betrekking hebben op het betreffende krw-oppervlaktewaterlichaam of grondwaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.22
  - number: '8.23'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een milieubelastende activiteit waardoor
      afvalwater of andere afvalstoffen in een voorziening voor de inzameling en het transport van afvalwater worden
      gebracht, wordt de omgevingsvergunning alleen verleend als de milieubelastende activiteit verenigbaar is met het
      belang van het beschermen van de doelmatige werking van die voorziening en van het zuiveringtechnisch werk waarop
      vanuit die voorziening afvalwater wordt gebracht en als de verwerking van slib uit dat werk of uit een openbaar
      vuilwaterriool niet wordt belemmerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.23
  - number: '8.24'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het exploiteren van een ippc-installatie
      voor het stoken, bedoeld in [artikel 3.55 van het Besluit activiteiten leefomgeving,][ref1] met een nominaal
      elektrisch vermogen van 300 MW of meer, wordt de omgevingsvergunning alleen verleend als bij de beoordeling van
      de aanvraag wordt vastgesteld of het afvangen en comprimeren van kooldioxide en het transporteren daarvan naar een
      geschikte opslaglocatie in technisch en economisch opzicht haalbaar is.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.24
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: '8.25'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het exploiteren van een ippc-installatie
      voor het verwijderen of het nuttig toepassen van afvalstoffen in een afvalverbrandingsinstallatie of een
      afvalmeeverbrandingsinstallatie, bedoeld in [artikel 3.88 van het Besluit activiteiten leefomgeving][ref1], wordt
      de omgevingsvergunning alleen verleend als de afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie en
      de terreinen die daarbij horen zo zijn ontworpen dat het ongeoorloofd en per ongeluk vrijkomen van verontreinigende
      stoffen op of in de bodem en op een oppervlaktewaterlichaam wordt voorkomen.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.25
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.25a
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het exploiteren
      van een ippc-installatie of een andere milieubelastende installatie voor het storten
      van afvalstoffen, bedoeld in de [artikelen 3.84, eerste lid, onder a of b][ref1], en
      [3.85, eerste lid, van het Besluit activiteiten leefomgeving][ref2], voor zover alleen baggerspecie wordt gestort
      en de installatie niet is gelegen in een oppervlaktewaterlichaam, wordt de omgevingsvergunning alleen verleend als:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.25a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.25a.a
    text: de baggerspecie geen gevaarlijke afvalstof is; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.25a
  - number: 8.25a.b
    text: een geohydrologisch isolatiesysteem kan worden aangebracht.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.25a
  - number: 8.26.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die emissiegrenswaarden inhouden voor de stoffen,
      bedoeld in bijlage II bij de richtlijn industriële emissies, en voor andere stoffen die in significante
      hoeveelheden kunnen vrijkomen en die direct of door overdracht tussen het water, de bodem of de lucht
      milieuverontreiniging kunnen veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.26
  - number: 8.26.2
    text: |-
      Bij het vaststellen van de emissiegrenswaarden wordt uitgegaan van de emissies op het punt waar zij de bron, in
      voorkomend geval na reiniging, verlaten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.26
  - number: 8.26.3
    text: De emissiegrenswaarden worden vastgesteld zonder rekening te houden met een mogelijke voorafgaande verdunning.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.26
  - number: 8.26.4
    text: |-
      Bij het vaststellen van emissiegrenswaarden voor stoffen in afvalwater dat in een voorziening voor de inzameling en
      het transport van afvalwater wordt gebracht, kan rekening worden gehouden met het effect van een zuiveringtechnisch
      werk waarop die voorziening is aangesloten, als daarvan geen nadeliger gevolgen voor het milieu zijn te verwachten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.26
  - number: 8.26.5
    text: |-
      Het eerste lid is niet van toepassing voor zover in de motivering van de omgevingsvergunning wordt verwezen
      naar regels, opgenomen in het omgevingsplan, de waterschapsverordening, de omgevingsverordening of het
      [Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.26
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.27.1
    text: |-
      De emissiegrenswaarden, bedoeld in [artikel 8.26, eerste lid][ref1], waarborgen dat de emissies onder normale
      bedrijfsomstandigheden niet hoger zijn dan de met de beste beschikbare technieken geassocieerde emissieniveaus
      zoals bepaald in BBT-conclusies en worden uitgedrukt voor dezelfde of kortere periodes en voor dezelfde
      referentieomstandigheden als die van de met de beste beschikbare technieken geassocieerde emissieniveaus.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.27.2
    text: |-
      In afwijking van het eerste lid kunnen hogere emissiegrenswaarden worden vastgesteld of emissiegrenswaarden worden
      vastgesteld die worden uitgedrukt in andere perioden en referentieomstandigheden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.27
  - number: 8.27.3
    text: |-
      De met de beste beschikbare technieken geassocieerde emissieniveaus gaan over de bandbreedte van emissieniveaus
      verkregen in normale bedrijfsomstandigheden met gebruikmaking van een beste beschikbare techniek of een combinatie
      van beste beschikbare technieken als omschreven in de BBT-conclusies, uitgedrukt als een gemiddelde over een
      bepaalde periode, in specifieke referentieomstandigheden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.27
  - number: 8.27.4
    text: |-
      Als voorschriften aan de omgevingsvergunning worden verbonden op basis van een beste beschikbare techniek die niet
      in een van de BBT-conclusies staat beschreven als bedoeld in [artikel 8.10, tweede lid][ref1], zijn, het eerste en
      tweede lid en [artikel 8.26][ref2] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.27.5
    text: |-
      Als de BBT-conclusies, bedoeld in [artikel 8.10, tweede lid][ref1], geen met de beste beschikbare technieken
      geassocieerde emissieniveaus bevatten, wordt bij de toepassing van het vierde lid een niveau van milieubescherming
      bereikt dat gelijkwaardig is aan dat van de beste beschikbare technieken, als beschreven in de BBT-conclusies.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.28.1
    text: |-
      Aan een omgevingsvergunning kunnen voorschriften worden verbonden die inhouden dat, in afwijking van
      [artikel 8.27, eerste, tweede, vierde en vijfde lid][ref1], en onverminderd [artikel 8.30, derde lid][ref2],
      in specifieke gevallen minder strenge emissiegrenswaarden worden vastgesteld, als het halen van de met de beste
      beschikbare technieken geassocieerde emissieniveaus zou leiden tot buitensporig hogere kosten in verhouding tot de
      milieuvoordelen als gevolg van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.28.1.a
    text: de geografische ligging of de lokale milieuomstandigheden van de plaats waar de activiteit wordt verricht; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.28
  - number: 8.28.1.b
    text: de technische kenmerken van de activiteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.28
  - number: 8.28.2
    text: |-
      De beoordeling of sprake is van buitensporig hogere kosten in verhouding tot de milieuvoordelen vindt plaats
      volgens bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.28
  - number: 8.29.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden over:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.1.a
    text: |-
      het beschermen van de bodem en het grondwater en het regelmatig onderhouden van voorzieningen en het bewaken
      van maatregelen die worden getroffen ter voorkoming van emissies in de bodem en het grondwater, gebaseerd op een
      systematische evaluatie van het risico van milieuverontreiniging;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.1.b
    text: |-
      het voorkomen van het ontstaan van afvalstoffen en afvalwater of, als dat niet mogelijk is, een doelmatig beheer
      van afvalstoffen en de monitoring van afvalstoffen en afvalwater;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.1.c
    text: |-
      het voorkomen of zo veel mogelijk beperken van milieuverontreiniging die kan worden veroorzaakt door opstarten
      en stilleggen, lekken, storingen, korte stilleggingen, definitieve bedrijfsbeëindiging of andere bijzondere
      bedrijfsomstandigheden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.1.d
    text: het voorkomen of zo veel mogelijk beperken van grootschalige of grensoverschrijdende milieuverontreinigingen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.1.e
    text: het beoordelen van de naleving van de emissiegrenswaarden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
  - number: 8.29.2
    text: |-
      Het eerste lid is niet van toepassing voor zover in de motivering van de omgevingsvergunning wordt verwezen
      naar regels, opgenomen in het omgevingsplan, de waterschapsverordening, de omgevingsverordening of het
      [Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.29
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.30.1
    text: |-
      Aan een omgevingsvergunning kunnen voorschriften met strengere voorwaarden worden verbonden dan de voorwaarden die
      haalbaar zijn door gebruik te maken van de beste beschikbare technieken als beschreven in de BBT-conclusies.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.30
  - number: 8.30.2
    text: |-
      Bij de toepassing van het eerste lid is [artikel 8.10, tweede lid][ref1], van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.30.3
    text: |-
      Als voor het voldoen aan een omgevingswaarde als bedoeld in
      [artikel 2.15, eerste lid, aanhef en onder a tot en met c, van de wet][ref1] strengere voorwaarden moeten gelden
      dan die door toepassing van de beste beschikbare technieken haalbaar zijn, worden aan de omgevingsvergunning
      voorschriften met aanvullende voorwaarden verbonden, onverminderd andere maatregelen die kunnen worden getroffen om
      aan die omgevingswaarden te kunnen voldoen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.30
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.31.1
    text: |-
      Aan een omgevingsvergunning kunnen voorschriften worden verbonden die inhouden dat technische maatregelen worden
      getroffen of gelijkwaardige parameters worden bereikt, waarbij niet het gebruik van bepaalde technieken of
      technologieën wordt voorgeschreven.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
  - number: 8.31.2
    text: 'Bij de toepassing van het eerste lid:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
  - number: 8.31.2.a
    text: |-
      leiden de technische maatregelen of gelijkwaardige parameters tot een door toepassing van de [artikelen 8.26][ref1]
      en [8.27][ref2] gelijkwaardige bescherming van het milieu; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.31.2.b
    text: 'kunnen aan de omgevingsvergunning voorschriften worden verbonden, die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
  - number: 8.31.2.b.1°
    text: |-
      over de uitvoering van technische maatregelen waartoe die voorschriften verplichten, verslag wordt gedaan aan het
      bevoegd gezag; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
  - number: 8.31.2.b.2°
    text: |-
      daarbij aangegeven gegevens worden bijgehouden, verzameld of berekend ter bepaling van de mate waarin
      milieuverontreiniging wordt veroorzaakt, ter voorkoming of beperking waarvan die voorschriften zijn bedoeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
  - number: 8.31.3
    text: |-
      Als aan een omgevingsvergunning voorschriften worden verbonden als bedoeld in het tweede lid, aanhef en onder b,
      zijn de [artikelen 8.33, eerste lid, aanhef en onder b][ref1], en [8.34, eerste lid][ref2], van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.31
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.32.1
    text: 'Aan een omgevingsvergunning kunnen voorschriften worden verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.32.1.a
    text: |-
      andere gegevens worden bijgehouden, verzameld of berekend dan de gegevens, bedoeld in de
      [artikelen 8.29, eerste lid, aanhef en onder b][ref1], en [8.31][ref2], om de mate waarin de activiteit
      milieuverontreiniging veroorzaakt, te bepalen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.32.1.b
    text: |-
      onderzoek wordt verricht naar mogelijkheden tot verdergaande bescherming van het milieu dan waarin de andere aan de
      omgevingsvergunning verbonden voorschriften voorzien;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.32.1.c
    text: |-
      bijgehouden, verzamelde of berekende gegevens en onderzoeken worden geregistreerd, bewaard, gemeld of ter
      beschikking gesteld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.32.1.d
    text: aan eisen over vakbekwaamheid wordt voldaan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.32.1.e
    text: |-
      door de vergunninghouder schriftelijk aanwijzingen worden gegeven om handelen in strijd met de omgevingsvergunning,
      de daaraan verbonden voorschriften of de in het [Besluit activiteiten leefomgeving][ref1] opgenomen regels tegen te
      gaan, en toezicht wordt gehouden op het naleven van die aanwijzingen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.32.1.f
    text: |-
      een milieuzorgsysteem of elementen daarvan worden ingevoerd en nageleefd met het doel de algehele milieuprestaties
      te verbeteren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.32.2
    text: |-
      Het milieuzorgsysteem, bedoeld in het eerste lid, aanhef en onder f, is het gedeelte van het algemene beheersysteem
      dat de organisatiestructuur, planning, verantwoordelijkheden, praktijken, procedures, processen en middelen omvat
      die nodig zijn voor het ontwikkelen, uitvoeren, realiseren, toetsen en handhaven van de plannen en het beleid
      voor de milieuprestatie, zoals officieel vastgesteld door het hoogste leidinggevende niveau van de betrokken
      organisatie, met inbegrip van de naleving van de regelgeving over de fysieke leefomgeving en van een eventuele
      verbintenis tot voortdurende verbetering van de milieuprestaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.32
  - number: 8.33.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden, die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.1.a
    text: |-
      door passende eisen voor monitoring of op een andere wijze wordt vastgesteld of aan de voorschriften, bedoeld in
      de [artikelen 8.26 tot en met 8.31][ref1], wordt voldaan, met vermelding van de meetmethode, de frequentie en de
      procedure voor de beoordeling van de bij die bepaling verkregen gegevens; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.33.1.b
    text: |-
      de bij de bepaling, bedoeld onder a, verkregen gegevens aan het bevoegd gezag regelmatig en ten minste jaarlijks
      ter beschikking worden gesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.2
    text: |-
      De bepaling, bedoeld in het eerste lid, onder a, wordt gebaseerd op de relevante BBT-conclusies en
      informatiedocumenten, bedoeld in [bijlage XVIII][ref1], onder A.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.33.3
    text: |-
      Als aan een omgevingsvergunning voorschriften worden verbonden waarin emissiegrenswaarden als bedoeld in
      [artikel 8.27, tweede lid][ref1], zijn opgenomen, worden aan de omgevingsvergunning voorschriften verbonden die
      inhouden dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.33.3.a
    text: 'de resultaten van de monitoring:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.3.a.1°
    text: |-
      beschikbaar zijn voor dezelfde periode en referentieomstandigheden als voor de met de beste beschikbare technieken
      geassocieerde emissieniveaus;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.3.a.2°
    text: |-
      regelmatig of ten minste jaarlijks worden gemeld in een overzicht dat een vergelijking mogelijk maakt met de met de
      beste beschikbare technieken geassocieerde emissieniveaus; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.3.a.3°
    text: |-
      worden weergegeven in een overzicht dat een vergelijking mogelijk maakt met de met de beste beschikbare technieken
      geassocieerde emissieniveaus; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
  - number: 8.33.3.b
    text: |-
      ten minste jaarlijks de resultaten van de monitoring van de emissies worden beoordeeld, om na te gaan of de
      emissies in normale bedrijfsomstandigheden niet hoger zouden zijn dan de met de beste beschikbare technieken
      geassocieerde emissieniveaus, bedoeld in [artikel 8.27, derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.33.4
    text: |-
      Het eerste lid is niet van toepassing voor zover in de motivering van de omgevingsvergunning wordt verwezen
      naar regels, opgenomen in het omgevingsplan, de waterschapsverordening, de omgevingsverordening of het
      [Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.33
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 8.34.1
    text: |-
      In afwijking van [artikel 8.33, eerste lid, aanhef en onder b][ref1], worden aan een omgevingsvergunning geen
      voorschriften verbonden over het ter beschikking stellen van gegevens als die gegevens moeten worden opgenomen in
      een PRTR-verslag.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.34
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.34.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een activiteit als bedoeld in bijlage I
      bij de PRTR-verordening, kan aan de omgevingsvergunning een voorschrift worden verbonden dat de plicht inhoudt
      om over emissies in het PRTR-verslag gegevens van een lager aggregatieniveau te verstrekken dan op grond van
      [artikel 5.10, eerste lid, van het Besluit activiteiten leefomgeving][ref1] is vereist, als dat noodzakelijk is
      voor de kwaliteitsbeoordeling, bedoeld in artikel 9, tweede lid, van de PRTR-verordening.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.34
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
  - number: 8.34.3
    text: |-
      Aan een omgevingsvergunning voor een activiteit als bedoeld in bijlage I bij de PRTR-verordening kan een
      voorschrift worden verbonden dat de plicht inhoudt om gegevens over de onderwerpen geur of geluid in het PRTR-
      verslag op te nemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.34
  - number: '8.35'
    text: |-
      Aan een omgevingsvergunning kunnen voorschriften worden verbonden die inhouden dat daarbij aangewezen voorschriften
      gedurende een periode van ten hoogste negen maanden niet gelden voor het testen of gebruiken van een nieuwe
      techniek die, als zij commercieel zou worden ontwikkeld:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.35
  - number: 8.35.a
    text: een hoger of ten minste hetzelfde beschermingsniveau voor het milieu kan opleveren; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.35
  - number: 8.35.b
    text: grotere kostenbesparingen kan opleveren dan de voor de activiteit bestaande beste beschikbare technieken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.35
  - number: '8.36'
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het exploiteren van een ippc-installatie voor het verwijderen
      of het nuttig toepassen van afvalstoffen in een afvalverbrandingsinstallatie of afvalmeeverbrandingsinstallatie,
      bedoeld in [artikel 3.88 van het Besluit activiteiten leefomgeving][ref1], worden voorschriften verbonden over de
      temperatuur en het debiet van het geloosde afvalwater.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.36
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: '8.37'
    text: |-
      Als bij de beoordeling, bedoeld in [artikel 8.24][ref1], is vastgesteld dat het afvangen, comprimeren en
      transporteren van kooldioxide haalbaar is, wordt aan de omgevingsvergunning een voorschrift verbonden dat
      inhoudt dat op de locatie van de stookinstallatie een voor opslag geschikte opslaglocatie wordt vrijgemaakt of
      vrijgehouden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: '8.38'
    text: |-
      Als bij de beoordeling, bedoeld in [artikel 8.13, tweede lid][ref1], is vastgesteld dat het risico op een zwaar
      ongeval of de gevolgen daarvan groter kunnen zijn door de ligging van de Seveso-inrichting ten opzichte van
      andere Seveso-inrichtingen, wordt aan de omgevingsvergunning een voorschrift verbonden dat inhoudt dat de Seveso-
      inrichting is aangewezen als inrichting als bedoeld in artikel 9, eerste lid, van de Seveso-richtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.38
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: '8.39'
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het nuttig toepassen of verwijderen van afvalstoffen, bedoeld
      in [paragraaf 3.2.13][ref1], [3.2.14][ref2], [3.2.15][ref3], [3.2.17][ref4], [3.3.10][ref5], [3.3.11][ref6],
      [3.3.12][ref7] of [3.3.13][ref8] of [afdeling 3.5 van het Besluit activiteiten leefomgeving][ref9], worden
      voorschriften verbonden die inhouden dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.2.13
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.2.14
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.2.15
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.2.17
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.3.10
      [ref6]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.3.11
      [ref7]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.3.12
      [ref8]: https://wetten.overheid.nl/BWBR0041330#Paragraaf3.3.13
      [ref9]: https://wetten.overheid.nl/BWBR0041330#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: 3.2.13
      - id: ref2
        bwb_id: BWBR0041330
        paragraaf: 3.2.14
      - id: ref3
        bwb_id: BWBR0041330
        paragraaf: 3.2.15
      - id: ref4
        bwb_id: BWBR0041330
        paragraaf: 3.2.17
      - id: ref5
        bwb_id: BWBR0041330
        paragraaf: 3.3.10
      - id: ref6
        bwb_id: BWBR0041330
        paragraaf: 3.3.11
      - id: ref7
        bwb_id: BWBR0041330
        paragraaf: 3.3.12
      - id: ref8
        bwb_id: BWBR0041330
        paragraaf: 3.3.13
      - id: ref9
        bwb_id: BWBR0041330
        afdeling: '3.5'
  - number: 8.39.a
    text: 'registratie plaatsvindt van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.a.1°
    text: |-
      daarbij aangewezen afvalstoffen die nuttig worden toegepast of worden verwijderd: naar hoeveelheid, aard en
      oorsprong;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.a.2°
    text: |-
      stoffen die bij de nuttige toepassing of verwijdering van die afvalstoffen worden gebruikt of verbruikt: naar aard
      en hoeveelheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.a.3°
    text: |-
      stoffen, preparaten en andere producten, waaronder afvalstoffen, die bij de nuttige toepassing of verwijdering
      ontstaan: naar aard en hoeveelheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.a.4°
    text: de wijze waarop de afvalstoffen, bedoeld onder 3°, nuttig worden toegepast of worden verwijderd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.a.5°
    text: |-
      stoffen, preparaten en andere producten die in verband met de milieubelastende activiteit worden afgevoerd, als die
      bij de nuttige toepassing of verwijdering zijn ontstaan: naar aard en hoeveelheid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: 8.39.b
    text: de geregistreerde gegevens, bedoeld onder a, onder 5°, gedurende ten minste vijf jaar worden bewaard.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.39
  - number: '8.40'
    text: |-
      Aan een omgevingsvergunning voor een milieubelastende activiteit die geluid veroorzaakt in geluidgevoelige ruimten
      van in- of aanpandige geluidgevoelige gebouwen of op geluidgevoelige gebouwen, worden geen voorschriften verbonden
      die inhouden dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.40
  - number: 8.40.a
    text: waarden worden gesteld voor onversterkt menselijk stemgeluid; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.40
  - number: 8.40.b
    text: |-
      regels worden gesteld over de inzet van motorvoertuigen of helikopters voor spoedeisende medische hulpverlening,
      ongevallenbestrijding, brandbestrijding, gladheidbestrijding en het vrijmaken van de weg na een ongeval.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.40
  - number: '8.41'
    text: |-
      Als een omgevingsvergunning voor het opwekken van elektriciteit met een windturbine of windpark waarden bevat
      voor het toelaatbare geluid door de activiteit op een geluidgevoelig gebouw, worden die waarden in ieder geval
      uitgedrukt in L en L.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.41
  - number: 8.42.1
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het gebruik van ontplofbare stoffen en voorwerpen van ADR-klasse
      1 door de Nederlandse of een bondgenootschappelijke krijgsmacht op een schietbaan of combinatie van schietbanen,
      bedoeld in [artikel 3.335, eerste lid, aanhef en onder a, van het Besluit activiteiten leefomgeving][ref1], worden
      geen voorschriften verbonden die inhouden dat het geluid door die activiteit op geluidgevoelige gebouwen lager
      moet zijn dan 50 B als de schietbaan of combinatie van schietbanen ligt in de buitenlucht of in een gebouw zonder
      gesloten afdekking of met een open zijde.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.42.2
    text: |-
      Aan een omgevingsvergunning voor een milieubelastende activiteit die betrekking
      heeft op het gebruik van ontplofbare stoffen en voorwerpen van ADR-klasse 1 door de
      Nederlandse of een bondgenootschappelijke krijgsmacht op een springterrein, bedoeld in
      [artikel 3.335, eerste lid, aanhef en onder c, van het Besluit activiteiten leefomgeving][ref1], worden geen
      voorschriften verbonden die inhouden dat het geluid door die activiteit op geluidgevoelige gebouwen lager moet zijn
      dan 50 B.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.42
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: '8.43'
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het exploiteren van een militaire zeehaven,
      het exploiteren van een militaire luchthaven of het opslaan en bewerken of het gebruiken van
      ontplofbare stoffen of voorwerpen van ADR-klasse 1 door de Nederlandse of een bondgenootschappelijke
      krijgsmacht, bedoeld in de [artikelen 3.324][ref1], [3.327][ref2], [3.332][ref3] en
      [3.335, eerste lid, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref4], worden geen voorschriften
      verbonden die inhouden dat het geluid door die activiteit op geluidgevoelige gebouwen lager moet zijn dan de
      standaardwaarden, bedoeld in [artikel 5.65, eerste lid, aanhef en onder a, tweede, derde of vierde lid][ref5].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.43
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: '8.44'
    text: |-
      Deze paragraaf is van toepassing op een omgevingsvergunning die betrekking heeft op het exploiteren
      van een ippc-installatie voor het storten van afvalstoffen of het exploiteren van een andere
      milieubelastende installatie voor het storten van bedrijfsafvalstoffen of gevaarlijke afvalstoffen
      op een stortplaats, bedoeld in de [artikelen 3.84, eerste lid, aanhef en onder a en b][ref1], en
      [3.85, eerste lid, van het Besluit activiteiten leefomgeving][ref2], anders dan:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.44
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.44.a
    text: het exploiteren van een stortplaats waar alleen baggerspecie wordt gestort; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.44
  - number: 8.44.b
    text: 'het exploiteren van een stortplaats waar:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.44
  - number: 8.44.b.1°
    text: het storten van afvalstoffen is beëindigd voor 1 maart 1995; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.44
  - number: 8.44.b.2°
    text: |-
      op of na 1 maart 1995 alleen afvalstoffen worden gestort voor het aanbrengen van een bovenafdichting op die
      stortplaats en de gestorte hoeveelheid ten hoogste 0,3 m3 afvalstof per m2 stortoppervlakte bedraagt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.44
  - number: '8.46'
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden over de vakbekwaamheid en de opleiding van degene die de
      stortplaats exploiteert en de op de stortplaats werkzame personen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.46
  - number: 8.47.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het storten van afvalstoffen zo
      plaatsvindt dat de gestorte afvalstoffen na zetting van de bodem zich ten minste op de volgende afstand boven de te
      verwachten gemiddeld hoogste grondwaterstand bevinden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.1.a
    text: 0,7 m; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.1.b
    text: |-
      0,5 m, als een capillair onderbrekende laag van grind van ten minste 0,2 m wordt aangebracht als onderdeel van
      de onderafdichting.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.2
    text: |-
      Als het niet meer mogelijk is te voldoen aan de voorschriften, bedoeld in het eerste lid, kunnen, in afwijking
      van dat lid, voorschriften aan de omgevingsvergunning worden verbonden die inhouden dat civieltechnische of
      geohydrologische maatregelen worden getroffen, die voldoende waarborgen dat het grondwater niet in contact kan
      komen met de gestorte afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.3
    text: |-
      De gemiddeld hoogste grondwaterstand is de rekenkundig gemiddelde grondwaterstand over ten minste acht
      achtereenvolgende jaren van de drie hoogste grondwaterstanden per hydrologisch jaar van 1 april tot en met 31 maart
      van het daaropvolgende kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.4
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat op de plaats waar is of wordt gestort,
      een onderzoek wordt uitgevoerd naar de gevoeligheid van de bodem voor zettingen onder invloed van de stortplaats en
      de geohydrologische situatie.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.5
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.5.a
    text: de onderafdichting, bedoeld in het eerste lid, onder b;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.5.b
    text: het bepalen van de gemiddeld hoogste grondwaterstand, bedoeld in het eerste lid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.47.5.c
    text: de uitvoering van de onderzoeken, bedoeld in het vierde lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.47
  - number: 8.48.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat aan de onderkant van de gestorte
      afvalstoffen een onderafdichting aanwezig is, die tegengaat dat verontreinigende stoffen uit de gestorte
      afvalstoffen in de bodem komen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.48
  - number: 8.48.2
    text: |-
      Als een onderafdichting onvoldoende bijdraagt aan de noodzakelijke bescherming van de bodem omdat er door de
      stortplaatsspecifieke geohydrologische situatie geen sprake is van een voldoende geohydrologische barrière van
      ten minste 0,5 m, worden aan de omgevingsvergunning voorschriften verbonden die inhouden dat civieltechnische
      of geohydrologische maatregelen worden getroffen, die tegengaan dat verontreinigende stoffen uit de gestorte
      afvalstoffen in de bodem komen, die een adequaat beschermingsniveau waarborgen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.48
  - number: 8.48.3
    text: |-
      Als een onderafdichting niet meer kan worden aangebracht, worden aan de omgevingsvergunning voorschriften verbonden
      die inhouden dat de daarin aangegeven civieltechnische of geohydrologische maatregelen moeten worden getroffen, die
      tegengaan dat verontreinigende stoffen zich uit de gestorte afvalstoffen in de bodem verspreiden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.48
  - number: 8.48.4
    text: |-
      Als toepassing wordt gegeven aan het eerste, tweede of derde lid, worden aan de omgevingsvergunning voorschriften
      verbonden die inhouden dat zo spoedig als technisch mogelijk, maar uiterlijk na een in het voorschrift aangegeven
      periode van ten hoogste 30 jaar na het aanbrengen van de onderafdichting, bedoeld in het eerste lid, of het
      treffen van de maatregelen, bedoeld in het tweede of derde lid, aan de bovenkant van de gestorte afvalstoffen
      een bovenafdichting wordt aangebracht die een adequaat beschermingsniveau waarborgt en tegengaat dat water in de
      gestorte afvalstoffen infiltreert.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.48
  - number: 8.48.5
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de eisen die worden gesteld aan de onderafdichting, bedoeld in het eerste lid, de civieltechnische of
      geohydrologische maatregelen, bedoeld in het tweede en derde lid, en de bovenafdichting, bedoeld in het vierde lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.48
  - number: '8.49'
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat percolaat zo wordt opgevangen,
      verzameld en vervolgens gezuiverd of afgevoerd dat geen gevaar bestaat voor verontreiniging van de bodem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.49
  - number: '8.50'
    text: |-
      Als een omgevingsvergunning betrekking heeft op een stortplaats waar afvalstoffen in de diepe ondergrond worden
      gebracht, worden voorschriften aan de omgevingsvergunning verbonden die inhouden dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.50
  - number: 8.50.a
    text: |-
      voor zover van toepassing, de voorzieningen, bedoeld in bijlage A bij Beschikking 2003/33/EG van de Raad van de
      Europese Unie van 19 december 2002 tot vaststelling van criteria en procedures voor het aanvaarden van afvalstoffen
      op stortplaatsen, in overeenstemming met artikel 16 en bijlage II bij [Richtlijn 1999/31/EG](31999L0031)
      betreffende het storten van afvalstoffen (PbEG 2003, L 11), worden getroffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.50
  - number: 8.50.b
    text: |-
      de afvalstoffen in de diepe ondergrond worden gebracht in overeenstemming met bijlage A bij de beschikking, bedoeld
      onder a; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.50
  - number: 8.50.c
    text: |-
      ervoor wordt zorg gedragen dat op die stortplaats een rapport met een veiligheidsbeoordeling aanwezig is, die
      voldoet aan bijlage A, onder 2.5, bij de beschikking, bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.50
  - number: '8.51'
    text: |-
      Als een omgevingsvergunning als bedoeld in [artikel 3.40c][ref1] of
      [3.85 van het Besluit activiteiten leefomgeving][ref2] betrekking heeft op het terugplaatsen van
      winningsafvalstoffen in een bij bovengrondse of ondergrondse winning ontstane uitgegraven ruimte met het doel het
      terrein te herstellen en weer geschikt te maken voor toekomstig gebruik, worden in ieder geval voorschriften aan
      de omgevingsvergunning verbonden die inhouden dat degene die de winningsafvalstoffen terugplaatst, de passende
      maatregelen treft, bedoeld in artikel 10, eerste lid, van de richtlijn winningsafval.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.51
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.52.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.a
    text: |-
      voorzieningen worden getroffen die voorkomen dat asbesthoudende afvalstoffen met andere afvalstoffen vermengd
      kunnen raken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.b
    text: |-
      asbesthoudende afvalstoffen die niet deugdelijk zijn verpakt, aan het einde van iedere werkdag zo worden afgedekt
      dat geen verspreiding van vezels kan plaatsvinden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.c
    text: |-
      asbesthoudende afvalstoffen die niet zijn verpakt of afgedekt zo vochtig worden gehouden, dat geen verspreiding van
      vezels kan plaatsvinden;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.d
    text: |-
      het stortgebied van asbesthoudende afvalstoffen wordt afgedekt voorafgaand aan het betreden van die afvalstoffen
      met materieel;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.e
    text: |-
      op de stortplaats geen andere activiteiten dan stortactiviteiten worden verricht waardoor asbestvezels uit de
      gestorte afvalstoffen kunnen vrijkomen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.f
    text: |-
      ervoor zorg wordt gedragen dat op de stortplaats een overzicht aanwezig is van plaatsen waar asbesthoudende
      afvalstoffen zijn gestort en gegevens aanwezig zijn waaruit blijkt hoe die plaatsen worden afgeschermd ter
      voorkoming van menselijk contact met asbesthoudende afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.1.g
    text: |-
      als een verklaring als bedoeld in [artikel 8.47, derde lid, van de Wet milieubeheer][ref1] is afgegeven: het
      overzicht, bedoeld onder f, wordt overgelegd; en


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '8'
  - number: 8.52.1.h
    text: |-
      als het gaat om een omgevingsvergunning voor een stortplaats voor niet-gevaarlijke afvalstoffen: asbesthoudende
      afvalstoffen in een voor asbesthoudende afvalstoffen bestemd stortvak of deel daarvan met een bepaalde hoogte
      worden gestort.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
  - number: 8.52.2
    text: |-
      Het eerste lid geldt ook voor producten waarin asbest als bedoeld in
      [bijlage I bij het Besluit bouwwerken leefomgeving][ref1] is verwerkt en voor asbeststof.


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.52
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 8.53.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.1.a
    text: |-
      vanaf het tijdstip van opbouw van de stortplaats voorzieningen worden getroffen en toegepast om het uit de
      stortplaats vrijkomende stortgas op te vangen en te verwerken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.1.b
    text: het stortgas, bedoeld onder a, wordt benut of afgefakkeld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.1.c
    text: de samenstelling en de atmosferische druk van de gasuitstoot wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.2
    text: |-
      Als in de aanvraag is aangegeven dat het stortgas wordt afgefakkeld, worden aan de omgevingsvergunning
      voorschriften verbonden die inhouden dat de fakkelinstallatie voldoet aan de volgende eisen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.2.a
    text: de uittreedtemperatuur bedraagt ten minste 900°C;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.2.b
    text: de verblijftijd van de verbrandingsgassen in de fakkel bedraagt ten minste 0,3 seconden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.2.c
    text: de fakkel behoort tot het gesloten type.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.3
    text: |-
      Het tweede lid is niet van toepassing op een fakkelinstallatie die alleen in gebruik is tijdens onderhoudsbeurten
      en storingen van de voorzieningen, bedoeld in het eerste lid, onder a.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.4
    text: |-
      Het eerste tot en met derde lid is niet van toepassing als aan de hand van de samenstelling van de massa van het
      stortpakket genoegzaam kan worden aangetoond dat de voorzieningen, bedoeld in het eerste lid, onder a, onvoldoende
      doelmatig zijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: 8.53.5
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de inhoud, de frequentie en de locatie van de metingen, bedoeld in het eerste lid, onder c.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.53
  - number: '8.54'
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat het storten zo plaatsvindt dat de
      gestorte afvalstoffen en de voorzieningen die zijn getroffen op de stortplaats kunnen worden teruggenomen zonder
      ingrijpende aantasting van de bodem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.54
  - number: 8.55.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.1.a
    text: 'een deugdelijk controlesysteem aanwezig is, waarmee de staat van de bodem kan worden onderzocht, bestaande uit:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.1.a.1°
    text: beneden de gemiddeld laagste grondwaterstand gelegen, horizontaal aangebrachte drainagebuizen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.1.a.2°
    text: |-
      bovenstrooms van de stortplaats ten minste een in het grondwater aangebrachte grondwaterbemonsteringsbuis en
      benedenstrooms ten minste twee grondwaterbemonsteringsbuizen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.1.b
    text: |-
      de bemonstering en de vaststelling van de staat van de bodem voor elke drainagebuis of grondwaterbemonsteringsbuis
      afzonderlijk is uit te voeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat in de grondwaterbemonsteringsbuizen de
      grondwaterstand van de bodem op de locatie waar is of wordt gestort, wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.3
    text: |-
      In afwijking van het eerste lid worden, als de aanleg van voorzieningen als bedoeld in het eerste lid, aanhef en
      onder a, onder 1°, technisch niet mogelijk is, aan de omgevingsvergunning voorschriften verbonden, die inhouden dat
      een vergelijkbaar beschermingsniveau wordt verzekerd als die voorzieningen en dat een deugdelijk controlesysteem
      aanwezig is om de staat van de bodem te kunnen onderzoeken, bestaande uit:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.3.a
    text: |-
      benedenstrooms van de stortplaats een in het voorschrift aan te geven aantal van ten minste twee in het grondwater
      aangebrachte grondwaterbemonsteringsbuizen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.3.b
    text: bovenstrooms van de stortplaats ten minste een in het grondwater aangebrachte grondwaterbemonsteringsbuis.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.4
    text: |-
      De gemiddeld laagste grondwaterstand is de rekenkundig gemiddelde grondwaterstand over ten minste acht
      achtereenvolgende jaren van de drie laagste grondwaterstanden per hydrologisch jaar van 1 april tot en met 31 maart
      van het daaropvolgende kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.5
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.5.a
    text: het bepalen van de gemiddeld laagste grondwaterstand, bedoeld in het eerste lid; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.55.5.b
    text: de frequentie waarmee en de wijze waarop de grondwaterstand, bedoeld in het tweede lid, wordt gemeten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.55
  - number: 8.56.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de hoeveelheid en de samenstelling van
      een in de omgeving van de stortplaats aanwezig oppervlaktewaterlichaam wordt bepaald respectievelijk bemonsterd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.56
  - number: 8.56.2
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de frequentie en de wijze van bepalen en bemonsteren van de oppervlaktewaterlichamen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.56
  - number: 8.57.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.1.a
    text: |-
      een daarin aangegeven aantal malen per jaar wordt nagegaan of wordt voldaan aan de voorschriften die op grond van
      [artikel 8.47][ref1] aan de omgevingsvergunning zijn verbonden;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.57.1.b
    text: de bodembeschermende maatregelen die op de stortplaats zijn getroffen, worden geïnspecteerd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.1.c
    text: onderzoek wordt gedaan naar de staat van de bodem onder de stortplaats.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat de volgende resultaten ten minste
      eenmaal per jaar aan het bevoegd gezag worden gezonden:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.2.a
    text: de resultaten van de inspectie en het onderzoek, bedoeld in het eerste lid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.2.b
    text: |-
      de resultaten van het bepalen en het bemonsteren van de hoeveelheid respectievelijk de samenstelling van de in de
      omgeving van de stortplaats aanwezige oppervlaktewaterlichamen, bedoeld in [artikel 8.56][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.57.2.c
    text: |-
      de resultaten van de metingen van de samenstelling en de atmosferische druk van de gasuitstoot, bedoeld in
      [artikel 8.53][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.57.2.d
    text: |-
      de resultaten van de metingen van het niveau en de samenstelling van het grondwater, bedoeld in de
      [artikelen 8.47][ref1] en [8.55][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.57.3
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.3.a
    text: de inspectie van de bodembeschermende maatregelen, bedoeld in het eerste lid, onder b; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57.3.b
    text: het onderzoek naar de staat van de bodem onder de stortplaats, bedoeld in het eerste lid, onder c.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57
  - number: 8.57a.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat een urgentieplan op hoofdlijnen wordt
      opgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.2
    text: 'In het urgentieplan op hoofdlijnen wordt aangegeven:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.2.a
    text: in welke gevallen en op welke wijze een interventiepunt wordt bepaald;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.2.b
    text: op welke wijze wordt bepaald of een interventiepunt wordt bereikt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.2.c
    text: |-
      welke maatregelen moeten worden getroffen als het interventiepunt wordt bereikt, om verspreiding van de
      verontreinigende stoffen te voorkomen of de veroorzaakte bodemverontreiniging ongedaan te maken; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.2.d
    text: de termijn waarbinnen de maatregelen, bedoeld onder c, moeten worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.3
    text: Het interventiepunt is het punt waarbij een significante verslechtering van de grondwaterkwaliteit optreedt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57a.4
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over de maatregelen, bedoeld in het tweede lid, aanhef en onder c, voor zover dit geohydrologische maatregelen
      zijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57a
  - number: 8.57b.1
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat een voor de stortplaats bepaald
      interventiepunt is bereikt als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.1.a
    text: standaardwaarden worden overschreden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.1.b
    text: de overschrijding, bedoeld onder a, is bevestigd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.2
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat in afwijking van de voorschriften,
      bedoeld in het eerste lid, het interventiepunt niet is bereikt als uit de bevestiging, bedoeld in het eerste lid,
      onder b, is gebleken dat de overschrijding niet wordt veroorzaakt door de stortplaats.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.3
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat referentiemeetpunten en
      controlemeetpunten worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.4
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.4.a
    text: standaardwaarden als bedoeld in het eerste lid, onder a;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.4.b
    text: de bevestiging, bedoeld in het eerste lid, onder b; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: 8.57b.4.c
    text: het vaststellen van de referentiemeetpunten en controlemeetpunten, bedoeld in het derde lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.57b
  - number: '8.58'
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat als een voor de stortplaats bepaald
      interventiepunt wordt bereikt:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.58
  - number: 8.58.a
    text: de overschrijding onverwijld aan het bevoegd gezag wordt gemeld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.58
  - number: 8.58.b
    text: |-
      in overleg met het bevoegd gezag binnen een bepaalde periode een uitgewerkt urgentieplan wordt opgesteld op basis
      van het urgentieplan op hoofdlijnen, bedoeld in [artikel 8.57a, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.58
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.59.1
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.a
    text: |-
      voordat voor de eerste keer wordt gestort, daarna en onverwijld nadat een bovenafdichting als bedoeld in
      [artikel 8.48][ref1] is aangebracht:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.59.1.a.1°
    text: |-
      wordt nagegaan of wordt voldaan aan de voorschriften die op grond van [artikel 8.47][ref1] aan de
      omgevingsvergunning zijn verbonden;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.59.1.a.2°
    text: de bodembeschermende maatregelen die op de stortplaats zijn getroffen, worden geïnspecteerd en gekeurd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.a.3°
    text: de technische staat van die maatregelen wordt onderzocht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.a.4°
    text: het percolaat wordt geanalyseerd; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.a.5°
    text: onderzoek wordt gedaan naar de staat van de bodem onder de stortplaats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.b
    text: |-
      de resultaten van de keuring, het onderzoek en de analyse zo worden gepresenteerd dat duidelijk inzicht wordt
      gegeven in de beheersbaarheid van de situatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.c
    text: |-
      de resultaten van de keuring, het onderzoek en de analyse zo spoedig mogelijk aan het bevoegd gezag worden
      gezonden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.1.d
    text: de resultaten van de keuring, het onderzoek en de analyse gedurende ten minste vijf jaar worden bewaard.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.2
    text: |-
      Bij ministeriële regeling worden regels gesteld over het aan een omgevingsvergunning verbinden van voorschriften
      over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.2.a
    text: |-
      de wijze waarop en de frequentie waarmee de inspectie, de keuring, het onderzoek en de analyse, bedoeld in het
      eerste lid, onder a, onder 1° tot en met 4°, plaatsvinden; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59.2.b
    text: het onderzoek naar de staat van de bodem onder de stortplaats, bedoeld in het eerste lid, onder a, onder 5°.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59
  - number: 8.59a
    text: |-
      Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat monsterneming, monstervoorbehandeling
      en analyse van de monsters van het grondwater, het percolaat en het oppervlaktewater plaatsvinden volgens de
      actuele stand van de techniek.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.59a
  - number: '8.60'
    text: 'Aan een omgevingsvergunning worden voorschriften verbonden die inhouden dat:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.60
  - number: 8.60.a
    text: |-
      de bodembeschermende maatregelen die op de stortplaats zijn getroffen, in goede staat van onderhoud worden gehouden
      en zo nodig worden hersteld; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.60
  - number: 8.60.b
    text: |-
      als herstel niet mogelijk is, vervangende maatregelen worden getroffen, die tegengaan dat het grondwater met de
      gestorte afvalstoffen in contact komt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.60
  - number: '8.61'
    text: |-
      Aan een omgevingsvergunning kunnen, in afwijking van de [artikelen 8.46 tot en met 8.60][ref1], voorschriften met
      strengere voorwaarden worden verbonden dan bedoeld in die artikelen als:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.61
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
  - number: 8.61.a
    text: |-
      de stortplaats ligt in een grondwaterbeschermingsgebied als bedoeld in [artikel 7.11, eerste lid, onder b][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.61
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '7'
        hoofdstuk: '7'
        afdeling: '7.4'
  - number: 8.61.b
    text: |-
      de stortplaats ligt op een locatie met een diepe grondwaterstand, een hoge stroomsnelheid van het grondwater of een
      dik watervoerend pakket;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.61
  - number: 8.61.c
    text: |-
      de stortplaats ligt in een gebied dat met het oog op het beschermen van de gezondheid en het milieu, het beschermen
      van de bodem of ter voorkoming van ernstige nadelige gevolgen voor de gezondheid vanwege het gebruik van de bodem,
      in het omgevingsplan is aangewezen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.61
  - number: 8.61.d
    text: |-
      in verband met de aard van de afvalstoffen een bijzonder risico bestaat dat het storten van die stoffen nadelige
      gevolgen heeft voor de kwaliteit van de bodem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.61
  - number: '8.62'
    text: |-
      Aan een omgevingsvergunning die betrekking heeft op het exploiteren van een ippc-installatie
      voor het storten van afvalstoffen of het exploiteren van een andere milieubelastende
      installatie voor het storten van bedrijfsafvalstoffen of gevaarlijke afvalstoffen op een
      stortplaats, bedoeld in de [artikelen 3.84, eerste lid, aanhef en onder a en b][ref1], en
      [3.85, eerste lid, van het Besluit activiteiten leefomgeving][ref2], waar op of na 1 september 1996 afvalstoffen
      worden gestort, worden voorschriften verbonden die inhouden dat de voorschriften die op grond van de
      [artikelen 8.48, vierde lid][ref3], [8.49][ref4], [8.57 tot en met 8.57b][ref5], [8.59][ref6], [8.59a][ref7]
      en [8.60][ref8] aan de omgevingsvergunning zijn verbonden, nadat de omgevingsvergunning haar geldigheid heeft
      verloren, nog van kracht blijven totdat de stortplaats op grond van [artikel 8.47 van de Wet milieubeheer][ref9]
      gesloten is verklaard.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel8
