        afdeling: '2.2'
  - number: 8.84.4
    text: 'Het derde lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.4.a
    text: |-
      voor zover het gaat om de omgevingswaarde, bedoeld in [artikel 2.10, eerste lid][ref1], als het niet voldoen aan
      die omgevingswaarde wordt veroorzaakt door een buiten Nederland gelegen verontreinigingsbron en toepassing is
      gegeven aan [artikel 2.17, derde lid][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 8.84.4.b
    text: |-
      als het niet voldoen aan een omgevingswaarde of het niet bereiken van een goed ecologisch potentieel of een minder
      strenge doelstelling het gevolg is van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.4.b.1°
    text: |-
      nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam of wijzigingen in de stand van
      een grondwaterlichaam; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.4.b.2°
    text: |-
      toepassing is gegeven aan [artikel 2.17, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 8.84.5
    text: |-
      Het verlenen van de omgevingsvergunning mag er in ieder geval ook niet toe leiden dat de doelstelling van het
      voorkomen van de achteruitgang van de chemische en ecologische toestand van krw-oppervlaktewaterlichamen en van de
      chemische toestand en kwantitatieve toestand van grondwaterlichamen, bedoeld in [artikel 4.15, eerste lid][ref1],
      niet wordt bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 8.84.6
    text: 'In afwijking van het vijfde lid wordt een omgevingsvergunning verleend als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.a
    text: 'de aanvraag betrekking heeft op gevallen waarin het niet voorkomen van die achteruitgang het gevolg is van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.a.1°
    text: nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.a.2°
    text: wijzigingen in de stand van grondwaterlichamen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.a.3°
    text: |-
      nieuwe duurzame activiteiten, voor zover het gaat om de achteruitgang van een zeer goede toestand van een krw-
      oppervlaktewaterlichaam naar een goede toestand;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.b
    text: aan de voorwaarden van artikel 4, zevende, achtste en negende lid, van de kaderrichtlijn water is voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: 8.84.6.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het nationale waterprogramma, als het gaat om rijkswateren,
      of in het regionale waterprogramma, als het gaat om regionale wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
  - number: '8.85'
    text: |-
      Aan een omgevingsvergunning kunnen voorschriften worden verbonden over het na het beëindigen van de activiteit
      wegnemen, compenseren of beperken van door de activiteit of het beëindigen daarvan veroorzaakte nadelige gevolgen
      voor het watersysteem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.85
  - number: 8.86.1
    text: |-
      [Artikel 8.88][ref1] is ook opgenomen met het oog op het behoeden van de staat en werking van infrastructuur voor
      nadelige gevolgen van activiteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.86
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.9.2
        afdeling: '8.9'
  - number: 8.86.2
    text: |-
      [Artikel 8.90][ref1] is ook opgenomen met het oog op de doelen van [de wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.86
    references:
      - id: ref1
