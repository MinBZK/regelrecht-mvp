  - number: 4.1.b.1°
    text: |-
      de omgevingswaarden voor PM, bedoeld in [artikel 2.5, tweede lid, aanhef en onder b en c][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.1
    references:
