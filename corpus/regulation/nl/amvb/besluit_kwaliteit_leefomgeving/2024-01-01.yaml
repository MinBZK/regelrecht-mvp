        afdeling: '3.5'
  - number: 3.51.2
    text: |-
      Het aantal reductiepunten per geluidgevoelig gebouw als bedoeld in het eerste lid is het aantal, bedoeld in
      [bijlage Va][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
