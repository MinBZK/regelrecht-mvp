        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.9.2
        afdeling: '8.9'
      - id: ref2
        bwb_id: BWBR0037885
  - number: 8.86.3
    text: |-
      [Artikel 8.91][ref1] is ook opgenomen met het oog op het behoud van cultureel erfgoed.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.86
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.9.2
        afdeling: '8.9'
  - number: '8.87'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een stortingsactiviteit op zee, wordt de
      omgevingsvergunning alleen verleend als de activiteit in overeenstemming is met het Londen-protocol en het Ospar-
      verdrag.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.87
  - number: 8.88.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een lozingsactiviteit op een
      zuiveringtechnisch werk, wordt de omgevingsvergunning alleen verleend als de activiteit verenigbaar is met het
      belang van het beschermen van de doelmatige werking van het zuiveringtechnisch werk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.88
  - number: 8.88.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een lozingsactiviteit
      op een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk, zijn de
      [artikelen 8.9, eerste en tweede lid][ref1], [8.10][ref2] en [8.13, eerste lid][ref3], van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.88
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
  - number: 8.88.3
    text: |-
      Bij de beoordeling van de aanvraag in overeenstemming met
      [artikel 8.9, eerste lid, aanhef en onder a tot en met e][ref1], wordt ook rekening gehouden met de
      informatiedocumenten, bedoeld in [bijlage XVIII][ref2], onder B.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.88
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.1
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 8.89.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een wateronttrekkingsactiviteit, wordt de
      omgevingsvergunning alleen verleend als de activiteit verenigbaar is met de dragende functie van het watersysteem.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
  - number: 8.89.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het in de bodem brengen van water,
      ter aanvulling van het grondwater, in samenhang met de onttrekking van grondwater door een daarvoor bestemde
      voorziening, waarbij het in de bodem te brengen water afkomstig is uit een oppervlaktewaterlichaam, wordt de
      omgevingsvergunning alleen verleend als in het in de bodem te brengen water stoffen voorkomen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
  - number: 8.89.2.a
    text: |-
      in lagere concentraties dan in [bijlage XIX][ref1], onder A, voor die stoffen is aangegeven; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.89.2.b
    text: |-
      als bedoeld in [bijlage XIX][ref1], onder B, als die stoffen niet zijn aangegeven in die bijlage, onder A, en
      die stoffen in zulke geringe hoeveelheden en concentraties aanwezig zijn dat gevaar voor verslechtering van de
      kwaliteit van het grondwater is uitgesloten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 8.89.3
    text: |-
      In afwijking van het tweede lid, onder a, kan de omgevingsvergunning worden verleend en kan voor een of meer
      stoffen een hogere concentratie als bedoeld in dat onderdeel worden toegestaan voor een in de omgevingsvergunning
      aan te geven periode, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
  - number: 8.89.3.a
    text: |-
      de bodemgesteldheid of de bodemsoort zodanig is dat geen gevaar bestaat voor verontreiniging van het grondwater,
      als water in de bodem wordt gebracht waarin die stoffen voorkomen in hogere concentraties; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
  - number: 8.89.3.b
    text: |-
      aan de omgevingsvergunning voorschriften worden verbonden die het gevaar voor verontreiniging van het grondwater,
      dat ontstaat door het in de bodem brengen van water waarin die stoffen voorkomen in die hogere concentraties,
      opheffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.89
  - number: 8.90.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot een waterstaatswerk die plaatsvindt buiten het provinciaal en gemeentelijk ingedeelde gebied, kan de
      omgevingsvergunning worden geweigerd als de activiteit in strijd is met de doelen van de [wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.90
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 8.90.2
    text: |-
      Voor zover voor een samenstel van activiteiten waarvoor een omgevingsvergunning voor een
      beperkingengebiedactiviteit als bedoeld in het eerste lid is vereist, ook een omgevingsvergunning voor een
      andere activiteit dan een wateractiviteit is vereist, maken de gronden voor verlening of weigering van de
      omgevingsvergunning voor die andere activiteiten geen deel uit van de gronden voor verlening of weigering van de
      omgevingsvergunning voor de beperkingengebiedactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.90
  - number: 8.90.3
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit
      met betrekking tot een waterstaatswerk, voor zover het gaat om het bouwen, aanleggen, plaatsen,
      veranderen of in stand houden van een kunstmatig eiland, een installatie of een inrichting, bedoeld in
      [artikel 7.17, eerste lid, aanhef en onder b, van het Besluit activiteiten leefomgeving][ref1], in een gebied
      dat bij ministeriële regeling als drukbevaren deel van de zee is aangewezen en geometrisch begrensd, wordt de
      omgevingsvergunning alleen verleend als de activiteit verenigbaar is met het belang van de scheepvaart en van de
      veiligheid van de scheepvaart.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.90
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
  - number: '8.91'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot een waterstaatswerk die wordt verricht buiten het provinciaal en gemeentelijk ingedeelde gebied, is
      [artikel 8.81][ref1] van overeenkomstige toepassing op het verbinden van voorschriften aan de omgevingsvergunning.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.91
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.8.2
        afdeling: '8.8'
  - number: '8.92'
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een lozingsactiviteit op een
      oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk, worden aan die vergunning
      de voorschriften verbonden die noodzakelijk zijn ter verwezenlijking van de maatregelen die voor dat
      oppervlaktewaterlichaam of voor dat zuiveringtechnisch werk zijn opgenomen in een waterbeheerprogramma,
      een regionaal waterprogramma of het nationale waterprogramma, als toepassing wordt gegeven aan
      [artikel 4.5 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.92
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: '8.93'
    text: |-
      Op het verbinden van voorschriften aan een omgevingsvergunning voor een lozingsactiviteit op
      een oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk zijn de
      [artikelen 8.26 tot en met 8.35][ref1] van overeenkomstige toepassing, waarbij rekening wordt gehouden met de
      informatiedocumenten, bedoeld in [bijlage XVIII][ref2], onder C.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.93
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.5.2
        afdeling: '8.5'
      - id: ref2
        bwb_id: BWBR0041313
  - number: 8.94.1
    text: |-
      Aan een omgevingsvergunning voor een wateronttrekkingsactiviteit die betrekking heeft op het in de bodem brengen
      van water, ter aanvulling van het grondwater, in samenhang met het onttrekken van grondwater door een daarvoor
      bestemde voorziening, waarbij het in de bodem te brengen water afkomstig is uit een oppervlaktewaterlichaam, worden
      voorschriften verbonden over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.1.a
    text: de kwaliteit van het in de bodem te brengen water;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.1.b
    text: de beheersing van de hydrologische situatie;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.1.c
    text: de beëindiging van het in de bodem brengen van het water; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.1.d
    text: de controle van de kwaliteit van het grondwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.2
    text: |-
      Een voorschrift als bedoeld in het eerste lid, onder a, houdt in ieder geval in dat geen gevaar bestaat voor
      verontreiniging van het grondwater.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.3
    text: |-
      Een voorschrift als bedoeld in het eerste lid, onder b, houdt in ieder geval in dat verspreiding van het in de
      bodem te brengen water zo veel mogelijk wordt beheerst, om het in de bodem te brengen water grotendeels weer te
      onttrekken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: 8.94.4
    text: |-
      Een voorschrift als bedoeld in het eerste lid, onder c, houdt in ieder geval in dat een evaluatie van de gevolgen
      van het in de bodem brengen van water voor de kwaliteit van de bodem plaatsvindt, gevolgd door een planmatige
      aanpak van de beëindiging van de activiteit, bedoeld in het eerste lid, en van het opheffen van eventuele nadelige
      gevolgen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.94
  - number: '8.95'
    text: |-
      Aan een omgevingsvergunning voor een stortingsactiviteit op zee worden voorschriften verbonden in overeenstemming
      met het Londen-protocol en het Ospar-verdrag.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.95
  - number: 8.96.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een lozingsactiviteit op een
      oppervlaktewaterlichaam of een lozingsactiviteit op een zuiveringtechnisch werk, zijn op het verbinden van
      voorschriften aan de omgevingsvergunning de [artikelen 2.23][ref1], [4.65][ref2], [4.106][ref3], [4.609][ref4] en
      [4.612 van het Besluit activiteiten leefomgeving][ref5] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.96
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 8.96.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot een waterstaatswerk in beheer bij het Rijk, een lozingsactiviteit op een oppervlaktewaterlichaam
      in beheer bij het Rijk of een wateronttrekkingsactiviteit in een oppervlaktewaterlichaam in beheer bij
      het Rijk, zijn op het verbinden van voorschriften aan de omgevingsvergunning de [artikelen 6.14][ref1] en
      [7.14 van het Besluit activiteiten leefomgeving][ref2] van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.96
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '7'
  - number: 8.96.3
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot een installatie in de Noordzee of een stortingsactiviteit op zee, is op het verbinden van
      voorschriften aan de omgevingsvergunning [artikel 7.14 van het Besluit activiteiten leefomgeving][ref1] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel7
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.96
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '7'
  - number: 8.97.1
    text: |-
      Het bevoegd gezag kan de voorschriften van een omgevingsvergunning wijzigen of een omgevingsvergunning intrekken
      op de in dit hoofdstuk aangegeven gronden waarop de omgevingsvergunning voor die activiteit had kunnen worden
      geweigerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97
  - number: 8.97.2
    text: Het eerste lid is niet van toepassing op een omgevingsvergunning voor een bouwactiviteit.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97
  - number: 8.97.3
    text: |-
      Het bevoegd gezag geeft alleen toepassing aan de intrekkingsbevoegdheid, bedoeld in het eerste lid, als niet kan
      worden volstaan met wijziging van de aan de omgevingsvergunning verbonden voorschriften.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97
  - number: 8.97a.1
    text: |-
      Dit artikel is van toepassing als een omgevingsvergunning voor een voortdurende buitenplanse
      omgevingsplanactiviteit als bedoeld in [artikel 4.17 van de wet][ref1], anders dan een omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit van provinciaal of nationaal belang, vijf jaar onherroepelijk is en een
      omgevingsplan met die omgevingsvergunning niet in overeenstemming kan worden gebracht op grond van:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 8.97a.1.a
    text: |-
      een regel in [hoofdstuk 5][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
  - number: 8.97a.1.b
    text: |-
      een regel op grond van [artikel 2.22 van de wet][ref1] over het omgevingsplan; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.97a
    references:
