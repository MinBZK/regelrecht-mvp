  - number: 3.53.2
    text: |-
      Geluidwerende maatregelen leiden tot een karakteristieke geluidwering van de uitwendige scheidingsconstructie van
      een geluidgevoelige ruimte die ten minste 3 dB groter is dan het verschil tussen het gezamenlijke geluid en de
      grenswaarde, bedoeld in tabel 3.53.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.3
    text: |-
      Besloten kan worden geen geluidwerende maatregelen te treffen die voldoen aan het tweede lid als zwaarwegende
      bezwaren van bouwkundige aard bestaan tegen het treffen van die maatregelen, mits, als andere maatregelen mogelijk
      zijn om de geluidwering zoveel mogelijk te verbeteren, die andere maatregelen wel worden getroffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4
    text: 'Besloten kan worden geen of minder geluidwerende maatregelen te treffen als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4.a
    text: |-
      de eigenaar van het geluidgevoelige gebouw geen medewerking verleent aan het onderzoek naar het geluid in
      geluidgevoelige ruimten binnen zijn gebouw en naar de noodzakelijke geluidwerende maatregelen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4.b
    text: de eigenaar geen medewerking verleent aan het treffen van geluidwerende maatregelen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4.c
    text: |-
      het geluidgevoelige gebouw gebreken heeft die in de weg staan aan het treffen van de geluidwerende maatregelen en
      de eigenaar van het gebouw deze niet tijdig heeft hersteld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4.d
    text: |-
      aannemelijk is dat het geluidgevoelige gebouw binnen vijf jaar wordt onteigend of gesloopt of binnen vijf jaar het
      omgevingsplan wordt gewijzigd zodat op die locatie geen geluidgevoelig gebouw meer is toegelaten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.4.e
    text: |-
      het geluid door een geluidbronsoort waarvoor toepassing is gegeven aan [artikel 3.35][ref1], [3.36][ref2] of
      [3.37][ref3] ten minste 6 dB lager is dan het gezamenlijke geluid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 3.53.5
    text: 'Een gebrek als bedoeld in het vierde lid, onder c, is in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.5.a
    text: |-
      het niet voldoen aan de eisen van [hoofdstuk 3 van het Besluit bouwwerken leefomgeving][ref1], voor zover het gaat
      om geluidgevoelige ruimten of de bereikbaarheid daarvan;


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '3'
  - number: 3.53.5.b
    text: |-
      ontbrekende of buiten werking gestelde geluidwerende voorzieningen die eerder van overheidswege zijn aangebracht;
      of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: 3.53.5.c
    text: |-
      een zodanige mate van achterstallig onderhoud dat deze redelijkerwijs in de weg staat aan het treffen van de
      maatregelen, bedoeld in het tweede en derde lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.53
  - number: '3.54'
    text: |-
      Een besluit tot het treffen van geluidwerende maatregelen wordt in ieder geval gewijzigd in een besluit om geen
      geluidwerende maatregelen te treffen als de eigenaar van het geluidgevoelige gebouw:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.54
  - number: 3.54.a
    text: een door hem verleende toestemming tot het treffen van maatregelen intrekt; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.54
  - number: 3.54.b
    text: de voor het treffen van de maatregelen noodzakelijke medewerking niet verleent.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.54
  - number: '3.55'
    text: |-
      De ten hoogste toelaatbare concentraties van stoffen waarbij in ieder geval sprake is van onaanvaardbare risico’s
      voor de gezondheid, bedoeld in [artikel 19.9a van de wet][ref1], zijn de concentraties, bedoeld in bijlage Vb,
      waarbij de berekende concentratie overeenkomt met het levenslang gemiddelde blootstellingsniveau van het maximaal
      toelaatbaar risico humaan, uitgedrukt in microgram per kilogram lichaamsgewicht per dag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.55
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '3.56'
    text: |-
      Onverminderd de bij dit besluit voor taken en bevoegdheden op het gebied van de natuurbescherming en het beheer van
      natuurgebieden gestelde regels, houdt een bestuursorgaan bij de uitoefening daarvan rekening met de economische,
      sociale en culturele belangen, en met de regionale en lokale bijzonderheden.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.56
  - number: 3.57.1
    text: 'Het provinciebestuur draagt zorg voor het treffen van de maatregelen die nodig zijn voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.57
  - number: 3.57.1.a
    text: |-
      de bescherming, de instandhouding of het herstel van biotopen en leefgebieden in voldoende gevarieerdheid voor alle
      in Nederland van nature in het wild levende vogelsoorten en in het bijzonder de vogelsoorten, genoemd in bijlage I
      bij de vogelrichtlijn, en de niet in die bijlage genoemde, geregeld in Nederland voorkomende trekvogelsoorten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.57
  - number: 3.57.1.b
    text: |-
      het behoud of het herstel van een gunstige staat van instandhouding van de van nature in Nederland in het wild
      voorkomende dier- en plantensoorten, genoemd in de bijlagen II, IV en V bij de habitatrichtlijn, van de in
      Nederland voorkomende typen natuurlijke habitats, genoemd in bijlage I bij de habitatrichtlijn, en van de in
      Nederland voorkomende habitats van soorten, genoemd in de bijlagen II, IV en V bij de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.57
  - number: 3.57.1.c
    text: |-
      het behoud of het herstel van een gunstige staat van instandhouding van de met uitroeiing bedreigde of speciaal
      gevaar lopende van nature in Nederland in het wild voorkomende dier- en plantensoorten, genoemd in de rode lijsten,
      bedoeld in [artikel 2.19, vijfde lid, onder a, onder 3°, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.57
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.57.2
    text: |-
      De maatregelen, bedoeld in het eerste lid, zijn zodanig afgestemd op de maatregelen van de provinciebesturen van de
      andere provincies, dat tezamen met die maatregelen de doelstellingen voor geheel Nederland kunnen worden bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.57
  - number: 3.58.1
    text: |-
      Een besluit tot aanwijzing van een Natura 2000-gebied als bedoeld in [artikel 2.44, eerste lid, van de wet][ref1]
      bevat instandhoudingsdoelstellingen voor in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.58
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.58.1.a
    text: de leefgebieden voor vogelsoorten, voor zover nodig ter uitvoering van de vogelrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.58
  - number: 3.58.1.b
    text: de natuurlijke habitats en de habitats van soorten, voor zover nodig ter uitvoering van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.58
  - number: 3.58.2
    text: In het besluit wordt de geometrische begrenzing van het gebied vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.58
  - number: '3.59'
    text: |-
      Het provinciebestuur of, in de gevallen, bedoeld in [artikel 2.19, vierde lid, van de wet][ref1], Onze
      in [artikel 3.62][ref2] aangewezen Minister, draagt zorg voor het treffen van de voor het bereiken van de
      instandhoudingsdoelstellingen voor een Natura 2000-gebied of het onder zijn taak vallende gedeelte daarvan nodige:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.7.2
        afdeling: '3.7'
  - number: 3.59.a
    text: |-
      instandhoudingsmaatregelen, bedoeld in de artikelen 3, eerste lid en tweede lid, onder b, c en d, en 4, eerste lid,
      eerste zin, en tweede lid, van de vogelrichtlijn of artikel 6, eerste lid, van de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
  - number: 3.59.b
    text: 'passende maatregelen, bedoeld in artikel 6, tweede lid, van de habitatrichtlijn, waaronder:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
  - number: 3.59.b.1°
    text: |-
      het besluit om de toegang tot een Natura 2000-gebied op grond van [artikel 2.45, eerste lid, van de wet][ref1] te
      beperken of te verbieden;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.59.b.2°
    text: |-
      de feitelijke handelingen, bedoeld in [artikel 10.10b van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
  - number: 3.59.b.3°
    text: |-
      het in en rondom een Natura 2000-gebied aanbrengen van de nodige kentekenen die de aanwijzing als Natura 2000-
      gebied en de rechtsgevolgen daarvan kenbaar maken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.59
  - number: 3.60.1
    text: |-
      De toegang tot een Natura 2000-gebied wordt niet op grond van [artikel 2.45, eerste lid, van de wet][ref1] beperkt
      of verboden voor de eigenaar van een in het gebied gelegen onroerende zaak en voor degene die een zakelijk of
      persoonlijk gebruiksrecht heeft, voor zover door de beperking of het verbod de toegang tot de onroerende zaak
      ernstig zou worden belemmerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.60
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.60.2
    text: |-
      In een besluit om de toegang tot een Natura 2000-gebied te beperken of te verbieden wordt de geometrische
      begrenzing vastgelegd van het gebied waarvoor de beperking of het verbod geldt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.60
  - number: '3.61'
    text: |-
      Als een compenserende maatregel als bedoeld in [artikel 8.74b, tweede lid, onder c][ref1], of
      [10.24, tweede lid, onder c][ref2], voorziet in de ontwikkeling of verbetering van leefgebieden voor vogels,
      natuurlijke habitats of habitats voor soorten buiten een Natura 2000-gebied, zorgt Onze Minister voor Natuur en
      Stikstof ervoor dat deze leefgebieden of habitats een Natura 2000-gebied of een onderdeel van een Natura 2000-
      gebied worden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.61
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.6.1
        afdeling: '8.6'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: '3.62'
    text: |-
      De zorg voor het nemen van maatregelen voor Natura 2000-gebieden of gedeelten daarvan als bedoeld in
      [artikel 2.18, eerste lid, onder f, onder 2°, van de wet][ref1] berust bij:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.62.a
    text: |-
      Onze Minister van Infrastructuur en Waterstaat, voor een Natura 2000-gebied of gedeelte daarvan dat een
      oppervlaktewaterlichaam is dat is aangewezen in [bijlage II, onder 1, bij het Omgevingsbesluit][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 3.62.b
    text: |-
      Onze Minister van Defensie, voor een Natura 2000-gebied of gedeelte daarvan dat voor militaire doeleinden wordt
      gebruikt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
  - number: 3.62.c
    text: 'Onze Minister voor Natuur en Stikstof:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
  - number: 3.62.c.1°
    text: |-
      voor een Natura 2000-gebied of gedeelte daarvan dat wordt beheerd door een van Onze andere Ministers dan die,
      genoemd onder a en b; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
  - number: 3.62.c.2°
    text: |-
      als het gaat om de maatregelen, bedoeld in [artikel 2.45, eerste lid, van de wet][ref1], voor een Natura 2000-
      gebied of gedeelte daarvan dat wordt beheerd door een van Onze andere Ministers dan Onze Minister voor Natuur en
      Stikstof.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.62
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: '3.63'
    text: |-
      Een besluit tot aanwijzing van een bijzonder nationaal natuurgebied als bedoeld in
      [artikel 2.44, tweede lid, van de wet][ref1] wordt alleen genomen, als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.63.a
    text: het gebied is opgenomen op een lijst als bedoeld in artikel 4, eerste lid, van de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
  - number: 3.63.b
    text: het gebied onderwerp is van een procedure als bedoeld in artikel 5 van de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
  - number: 3.63.c
    text: |-
      in het gebied leefgebieden voor vogels, natuurlijke habitats of habitats van soorten worden ontwikkeld of verbeterd
      ter uitvoering van een compenserende maatregel als bedoeld in [artikel 8.74b, tweede lid, onder c][ref1], of
      [10.24, tweede lid, onder c][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
        hoofdstuk: '8'
        paragraaf: 8.6.1
        afdeling: '8.6'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '10'
        hoofdstuk: '10'
        afdeling: '10.2'
  - number: 3.63.d
    text: 'bescherming van het gebied nodig is voor:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
  - number: 3.63.d.1°
    text: |-
      de instandhouding of het herstel van biotopen en leefgebieden voor in Nederland natuurlijk in het wild levende
      vogelsoorten, genoemd in bijlage I bij de vogelrichtlijn, en niet in die bijlage genoemde, geregeld in Nederland
      voorkomende trekvogelsoorten; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
  - number: 3.63.d.2°
    text: |-
      het behoud of herstel van een gunstige staat van instandhouding van de natuurlijke habitats, de habitats van
      soorten of de soorten, genoemd in respectievelijk bijlage I, II, IV of V bij de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.63
  - number: 3.64.1
    text: |-
      Een besluit tot aanwijzing van een bijzonder nationaal natuurgebied als bedoeld in
      [artikel 2.44, tweede lid, van de wet][ref1] bevat instandhoudingsdoelstellingen voor in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.64
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.64.1.a
    text: de leefgebieden voor vogelsoorten, voor zover nodig ter uitvoering van de vogelrichtlijn; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.64
  - number: 3.64.1.b
    text: de natuurlijke habitats en de habitats van soorten, voor zover nodig ter uitvoering van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.64
  - number: 3.64.2
    text: In het besluit wordt de geometrische begrenzing van het gebied vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.64
  - number: 3.65.1
    text: |-
      Een besluit om de toegang tot een bijzonder nationaal natuurgebied op grond van
      [artikel 2.45, derde of vierde lid, van de wet][ref1] te beperken of te verbieden wordt genomen als dat nodig is
      voor het bereiken van de instandhoudingsdoelstellingen voor dat gebied.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.65
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 3.65.2
    text: |-
      De toegang wordt niet beperkt of verboden voor de eigenaar van een in het gebied gelegen onroerende zaak en voor
      degene die een zakelijk of persoonlijk gebruiksrecht heeft, voor zover door de beperking of het verbod de toegang
      tot de onroerende zaak ernstig zou worden belemmerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.65
  - number: 3.65.3
    text: |-
      In het besluit om de toegang te beperken of te verbieden wordt de geometrische begrenzing vastgelegd van het gebied
      waarvoor de beperking of het verbod geldt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.65
  - number: '3.66'
    text: |-
      Feitelijke handelingen als bedoeld in [artikel 10.10b van de wet][ref1] worden verricht als dat nodig is voor
      het bereiken van de instandhoudingsdoelstellingen voor een bijzonder nationaal natuurgebied, en omvatten zo nodig
      het aanbrengen in en rondom een bijzonder nationaal natuurgebied van de nodige kentekenen die de aanwijzing als
      bijzonder nationaal natuurgebied en de rechtsgevolgen daarvan kenbaar maken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel10
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.66
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '10'
  - number: 3.67.1
    text: |-
      Gedeputeerde staten dragen zorg voor het uitvoeren van uitroeiingsmaatregelen, beheersmaatregelen en
      herstelmaatregelen als bedoeld in de artikelen 17, 19 en 20 van de invasieve-exoten-basisverordening met betrekking
      tot de in bijlage VC genoemde soorten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2
    text: |-
      Bestrijding van uitheemse dieren, niet behorende tot de in bijlage VC genoemde soorten, en bestrijding van
      verwilderde dieren vindt alleen plaats als dat nodig is:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.a
    text: in het belang van de bescherming van de wilde flora en fauna en van de instandhouding van de natuurlijke habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.b
    text: |-
      voor het voorkomen van ernstige schade aan met name gewassen, veehouderijen, bossen, visgronden en wateren en
      andere vormen van eigendom;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.c
    text: |-
      in het belang van de volksgezondheid en de openbare veiligheid of om andere dwingende redenen van groot openbaar
      belang;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.d
    text: |-
      voor het voorkomen van schade of overlast, met inbegrip van schade aan sportvelden, schietterreinen,
      industrieterreinen, kazernes of begraafplaatsen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.e
    text: voor het voorkomen of bestrijden van onnodig lijden van zieke of gebrekkige dieren; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.67.2.f
    text: in het algemeen belang.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.67
  - number: 3.68.1
    text: 'Onze Minister voor Natuur en Stikstof kan een gebied als nationaal park aanwijzen, als:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.a
    text: 'het een aaneengesloten gebied met een oppervlakte van ten minste 1.000 ha betreft:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.a.1°
    text: waarin zich een of meer ecosystemen bevinden die niet wezenlijk zijn aangetast door menselijk gebruik;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.a.2°
    text: |-
      waarin zich dier- en plantensoorten, geomorfologische locaties en habitats bevinden die een bijzonder
      natuurwetenschappelijk, educatief en recreatief belang vertegenwoordigen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.a.3°
    text: dat een natuurlijk landschap van grote schoonheid omvat;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.b
    text: het behoud van de wezenlijke kenmerken van het gebied is verzekerd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.c
    text: |-
      het gebied is opengesteld voor bezoekers voor educatieve, culturele en recreatieve doeleinden, waarbij aan de
      openstelling voorwaarden en beperkingen kunnen worden verbonden met het oog op het behoud van de wezenlijke
      kenmerken van het gebied; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.1.d
    text: het gebied zich duidelijk onderscheidt van eerder aangewezen nationale parken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.68.2
    text: |-
      Aanwijzing gebeurt alleen op verzoek van gedeputeerde staten van de provincie of de provincies waarin het gebied
      ligt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.68
  - number: 3.69.1
    text: |-
      Onze Minister voor Natuur en Stikstof is de bevoegde instantie voor de uitvoering als de aanwijzing daarvan wordt
      vereist door een EU-verordening of -richtlijn over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.69
  - number: 3.69.1.a
    text: |-
      het verhandelen of om een andere reden dan verkoop onder zich hebben of het binnen of buiten het grondgebied van
      Nederland brengen van dieren, planten, hout of producten daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.69
  - number: 3.69.1.b
    text: |-
      de introductie of verspreiding van invasieve uitheemse soorten als bedoeld in
      [bijlage I bij het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.69
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 3.69.2
    text: |-
      Het eerste lid is alleen van toepassing als Onze Minister voor Natuur en Stikstof geen andere instantie als
      bevoegde instantie heeft aangewezen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.69
  - number: '3.70'
    text: 'Onze Minister voor Natuur en Stikstof verstrekt op aanvraag:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.70
  - number: 3.70.a
    text: |-
      voor planten van bij ministeriële regeling aangewezen soorten fytosanitaire certificaten in overeenstemming met
      artikel 17, tweede lid, van de cites-uitvoeringsverordening; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.70
  - number: 3.70.b
    text: etiketten als bedoeld in de artikelen 52, eerste lid, en 66, zesde lid, van de CITES-uitvoeringsverordening.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.70
  - number: 3.71.1
    text: |-
      Onze Minister voor Natuur en Stikstof erkent een examen voor een jachtgeweeractiviteit, een examen voor een
      valkeniersactiviteit en een examen voor het gebruik van een eendenkooi alleen als de examens voldoen aan de eisen
      in de [artikelen 11.87 tot en met 11.90 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.71
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 3.71.2
    text: |-
      Onze Minister voor Natuur en Stikstof wijst de examens aan die zijn erkend door de bevoegde autoriteit van een
      andere staat en die gelijkwaardig zijn aan een door hem erkend examen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.71
  - number: '3.72'
    text: |-
      Onze Minister voor Natuur en Stikstof erkent een organisatie die examens voor een jachtgeweeractiviteit, examens
      voor een valkeniersactiviteit of examens voor het gebruik van een eendenkooi afneemt alleen als de organisatie
      voldoet aan de eisen in [artikel 11.91 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.72
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: '3.73'
    text: |-
      In deze afdeling wordt verstaan onder: - *certificaat, certificatie-instelling en certificatieschema:*
      conformiteitsverklaring, conformiteitsbeoordelingsinstantie en conformiteitsbeoordelingsdocument als bedoeld in
      [artikel 3, eerste lid, van de Woningwet][ref1];
        - *certificaathouder:* certificaathouder als bedoeld in
      [artikel 6.44 van het Besluit bouwwerken leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.73
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 3.74.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties kan een certificatie-instelling op aanvraag
      aanwijzen voor het afgeven van certificaten voor een op grond van [artikel 3.75, eerste lid][ref1], aangewezen
      certificatieschema. De minister beslist binnen acht weken na ontvangst van een aanvraag.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.8'
  - number: 3.74.2
    text: 'Een certificatie-instelling wordt alleen aangewezen als deze:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.a
    text: is geaccrediteerd volgens NEN-EN-ISO/IEC 17065;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.b
    text: rechtspersoonlijkheid bezit;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.c
    text: onafhankelijk is van de door haar beoordeelde organisaties, processen, diensten of producten;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.d
    text: beschikt over voldoende kennis en deskundigheid en is toegerust om de taken naar behoren uit te oefenen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.e
    text: |-
      beschikt over een administratie waarin de gegevens over de uitoefening van haar taken op een systematische wijze
      worden vastgelegd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.f
    text: verzekerd is tegen wettelijke aansprakelijkheid voor risico’s die voortvloeien uit de uitoefening van haar taken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.g
    text: beschikt over een adequate klachtenregeling;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.h
    text: in staat is te beslissen op bezwaarschriften; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.2.i
    text: |-
      in staat is te voldoen aan rapportage- en informatieverplichtingen op grond van [artikel 11.26][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 3.74.3
    text: 'Een aanwijzing kan worden ingetrokken of geschorst als de certificatie-instelling:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.3.a
    text: daarom verzoekt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.3.b
    text: in surseance van betaling verkeert of failliet is verklaard; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.3.c
    text: |-
      niet voldoet aan de voorschriften die zijn verbonden aan de aanwijzing of aan de regels, gesteld in of krachtens
      deze afdeling.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.4
    text: |-
      Bij ministeriële regeling worden nadere regels gesteld over het indienen van een aanvraag en de gegevens die bij
      een aanvraag moeten worden verstrekt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.5
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld over de gronden waarop en de voorwaarden waaronder
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties een certificatie-instelling kan aanwijzen, de
      aanwijzing kan wijzigen, weigeren, schorsen of intrekken, de voorschriften die aan een aanwijzing kunnen worden
      verbonden en de termijn waarvoor een aanwijzing geldt of kan worden geschorst.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.74.6
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld over de vergoeding die door een certificatie-
      instelling in rekening kan worden gebracht voor de aanvraag van een certificaat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.74
  - number: 3.75.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties kan op aanvraag certificatieschema’s aanwijzen. De
      minister beslist binnen acht weken na ontvangst van de aanvraag.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2
    text: |-
      Een certificatieschema wordt slechts aangewezen als het door de nationale accreditatie-instantie, bedoeld in
      [artikel 2, eerste lid, van de Wet aanwijzing nationale accreditatie-instantie][ref1], is geëvalueerd en, voor
      zover van toepassing op de reikwijdte van het certificatieschema, het ter voorkoming van het vrijkomen van
      koolmonoxide in ieder geval eisen bevat over:


      [ref1]: https://wetten.overheid.nl/BWBR0026591#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
    references:
      - id: ref1
        bwb_id: BWBR0026591
        artikel: '2'
  - number: 3.75.2.a
    text: de reikwijdte van de werkzaamheden waarop het certificatieschema betrekking heeft;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2.b
    text: |-
      het op adequate wijze verrichten van werkzaamheden als bedoeld in
      [artikel 6.45, tweede lid, onder a tot en met c, van het Besluit bouwwerken leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 3.75.2.c
    text: het op adequate wijze controleren van een gasverbrandingsinstallatie voordat deze in bedrijf wordt gesteld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2.d
    text: |-
      de vakbekwaamheid van personen die werkzaamheden als bedoeld in
      [artikel 6.45, tweede lid, onder d, van het Besluit bouwwerken leefomgeving][ref1] verrichten, het actueel houden
      van het hiervoor benodigde kennisniveau en de wijze waarop dit kennisniveau wordt beoordeeld;


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 3.75.2.e
    text: |-
      het informeren van de certificatie-instelling over de inbedrijfstelling van gasverbrandingsinstallaties na
      afronding van werkzaamheden door de certificaathouder;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2.f
    text: |-
      de beschikbaarheid, het gebruik, het onderhoud en het beheer van meetinstrumenten en andere hulpmiddelen die bij de
      te verrichten werkzaamheden worden gebruikt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2.g
    text: |-
      het buiten bedrijf stellen van gasverbrandingsinstallaties als wordt vastgesteld dat bij het gebruik ervan
      koolmonoxide vrijkomt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.2.h
    text: de wijze waarop medewerkers zich bij klanten moeten legitimeren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.3
    text: |-
      Om in aanmerking te komen voor aanwijzing bevat een certificatieschema ook eisen over het toezicht door de
      certificatie-instelling op het handelen overeenkomstig de in het eerste lid bedoelde eisen. Het certificatieschema
      bevat daartoe in ieder geval eisen over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.3.a
    text: de wijze waarop certificatie-instellingen gegevens over en van certificaathouders verwerken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.3.b
    text: |-
      de wijze, frequentie en omvang van de steekproefsgewijs uitgevoerde controles door de certificatie-instelling op de
      werkzaamheden als bedoeld in [artikel 6.45, eerste lid, van het Besluit bouwwerken leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 3.75.3.c
    text: |-
      de wijze, frequentie en omvang van audits bij de certificaathouder door de certificatie-instelling ten behoeve van
      de toetsing van het administratieve kwaliteitssysteem;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.3.d
    text: de wijze waarop wordt omgegaan met niet-naleving van de eisen door certificaathouders; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.3.e
    text: |-
      het afwijzen van een aanvraag voor het verkrijgen van een certificaat of het schorsen of intrekken van een
      certificaat als de aanvrager van het certificaat respectievelijk certificaathouder in surseance van betaling
      verkeert of failliet is verklaard.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.4
    text: |-
      In het geval dat een certificatieschema alleen betrekking heeft op werkzaamheden aan rookgasafvoervoorzieningen of
      verbrandingsluchttoevoervoorzieningen zijn de eisen genoemd in het tweede lid, onder d en e, niet van toepassing en
      kan het schema, in afwijking van het tweede lid, onder c, de eis bevatten dat alleen de rookgasafvoervoorzieningen
      of de verbrandingsluchttoevoervoorzieningen en de aansluiting daarvan op de andere onderdelen van de
      gasverbrandingsinstallatie worden gecontroleerd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.5
    text: 'Bij ministeriële regeling kunnen nadere regels worden gesteld over:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.5.a
    text: de aanwijzing en inhoud van certificatieschema’s;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.5.b
    text: |-
      het indienen van een aanvraag voor een aanwijzing van een certificatieschema en de gegevens die bij een aanvraag
      dienen te worden verstrekt; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: 3.75.5.c
    text: |-
      de gronden waarop en de voorwaarden waaronder Onze van Binnenlandse Zaken en Koninkrijksrelaties een
      certificatieschema kan aanwijzen, de aanwijzing kan weigeren, wijzigen, schorsen of intrekken, de voorschriften die
      aan een aanwijzing kunnen worden verbonden en de termijn waarvoor een aanwijzing kan worden verleend of geschorst.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.75
  - number: '3.76'
    text: |-
      Deze afdeling is van toepassing op het toelaten van instrumenten voor kwaliteitsborging tot het stelsel van
      kwaliteitsborging voor het bouwen als bedoeld in [artikel 7ad, eerste lid, van de Woningwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel7ad
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.76
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 7ad
  - number: 3.77.1
    text: |-
      De toelatingsorganisatie beslist binnen acht weken na de datum van ontvangst van de aanvraag om toelating van een
      instrument voor kwaliteitsborging tot het stelsel van kwaliteitsborging voor het bouwen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.77
  - number: 3.77.2
    text: |-
      Een instrument voor kwaliteitsborging wordt alleen tot het stelsel van kwaliteitsborging voor het bouwen toegelaten
      als het voldoet aan de [artikelen 3.80 tot en met 3.87][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.77
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.9'
  - number: 3.77.3
    text: |-
      Op aanvraag van de instrumentaanbieder kan de toelating van een instrument voor kwaliteitsborging worden gewijzigd.
      De [artikelen 3.80 tot en met 3.87][ref1] zijn van overeenkomstige toepassing op de aanvraag tot wijziging van
      de toelating.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.77
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.9'
  - number: 3.78.1
    text: |-
      De instrumentaanbieder betaalt een vergoeding aan de toelatingsorganisatie voor de kosten die samenhangen
      met het behandelen van een aanvraag om toelating van een instrument voor kwaliteitsboring tot het stelsel
      van kwaliteitsborging voor het bouwen en het bijhouden van de gegevens in het register, bedoeld in
      [artikel 7ai, eerste lid, onder a tot en met c, van de Woningwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel7ai
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.78
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 7ai
  - number: 3.78.2
    text: |-
      De toelatingsorganisatie stelt jaarlijks tarieven vast, evenals de wijze van betaling daarvan, voor de vergoeding
      van de kosten, bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.78
  - number: 3.79.1
    text: |-
      Instrumentaanbieders dragen gezamenlijk voor een vierde deel bij aan de kosten van de toelatingsorganisatie,
      bedoeld in [artikel 7an, tweede lid, van de Woningwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel7an
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.79
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 7an
  - number: 3.79.2
    text: |-
      De toelatingsorganisatie stelt jaarlijks een tarief vast waarmee zij de individuele bijdrage van een
      instrumentaanbieder jaarlijks achteraf vaststelt op basis van de inzet van het instrument voor kwaliteitsborger
      geteld naar het aantal bouwprojecten en, in het geval van een woningbouwproject, geteld naar het aantal woningen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.79
  - number: 3.79.3
    text: |-
      Bij ministeriële regeling wordt een rekenmethodiek vastgesteld voor het bepalen van de individuele bijdrage,
      bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.79
  - number: 3.80.1
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de kwaliteitsborger voor het begin van de bouwwerkzaamheden
      een borgingsplan vaststelt dat is gebaseerd op een beoordeling van de bouwtechnische risico’s met het oog op het
      voldoen aan de regels, bedoeld in de [hoofdstukken 4][ref1] en [5 van het Besluit bouwwerken leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.80.2
    text: |-
      In het borgingsplan wordt vastgesteld welke maatregelen getroffen zijn om de in het eerste lid genoemde
      bouwtechnische risico’s te voorkomen of te beperken, op welke wijze het ontwerp van het bouwplan en
      de uitvoering van de bouwwerkzaamheden voldoen aan de regels, bedoeld in de [hoofdstukken 4][ref1] en
      [5 van het Besluit bouwwerken leefomgeving][ref2], en wordt vastgesteld op welke momenten de kwaliteitsborging
      wordt uitgevoerd.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.80.3
    text: 'Het borgingsplan beschrijft ten minste:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.a
    text: de totstandkoming ervan;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.b
    text: de aard en omvang van de uit te voeren kwaliteitsborging;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.c
    text: de voor de kwaliteitsborging eindverantwoordelijke personen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.d
    text: de wijze waarop de verschillende onderdelen van het bouwplan in samenhang worden beoordeeld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.e
    text: |-
      de wijze waarop integraal wordt beoordeeld of de bouwwerkzaamheden voldoen aan de regels, bedoeld in de
      [hoofdstukken 4][ref1] en [5 van het Besluit bouwwerken leefomgeving][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.80.3.f
    text: in welke gevallen en op welke momenten het borgingsplan wordt geactualiseerd;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.g
    text: |-
      welke normen of kwaliteitsverklaringen bouw als bedoeld in
      [artikel 2.14, tweede en derde lid, van het Besluit bouwwerken leefomgeving][ref1], dan wel gelijkwaardige
      maatregelen als bedoeld in [artikel 2.4 van het Besluit bouwwerken leefomgeving][ref2] bij de bouwwerkzaamheden
      worden toegepast;


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '2'
  - number: 3.80.3.h
    text: |-
      op welke specifieke bouwwerkzaamheden, rekening houdend met de bijzonder lokale omstandigheden, de beoordeling ten
      minste is gericht, en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.80.3.i
    text: bij welke bouwwerkzaamheden rekening wordt gehouden met andere kwaliteitsborgingssystemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.80
  - number: 3.81.1
    text: |-
      Een instrument voor kwaliteitsborging beschrijft dat de instrumentaanbieder geen toestemming verleent het
      instrument toe te passen, als de aanvrager failliet is of in surseance van betaling verkeert.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.81
  - number: 3.81.2
    text: 'Een instrument voor kwaliteitsborging beschrijft dat een verleende toestemming het instrument toe te passen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.81
  - number: 3.81.2.a
    text: wordt geschorst als de kwaliteitsborger in surseance van betaling verkeert;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.81
  - number: 3.81.2.b
    text: wordt ingetrokken als de kwaliteitsborger failliet wordt verklaard.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.81
  - number: 3.81.3
    text: |-
      Een instrument voor kwaliteitsborging beschrijft dat een toestemming om het instrument voor kwaliteitsborging toe
      te passen niet overdraagbaar is.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.81
  - number: '3.82'
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de kwaliteitsborging alleen uitgevoerd wordt door een
      kwaliteitsborger die niet organisatorisch, financieel of juridisch betrokken is bij het betreffende bouwproject,
      tenzij deze betrokkenheid alleen voortvloeit uit de overeenkomst tot het uitvoeren van de kwaliteitsborging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.82
  - number: 3.83.1
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de personen die de kwaliteitsborging uitvoeren, voldoen aan
      de in het instrument gestelde eisen aan het benodigde kennis- en opleidingsniveau en aan de genoten ervaring over:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.a
    text: |-
      het opstellen van risicobeoordelingen op het terrein van de regels, bedoeld in de [hoofdstukken 4][ref1] en
      [5 van het Besluit bouwwerken leefomgeving][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.83.1.b
    text: de algemene coördinatie bij de kwaliteitsborging;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.c
    text: constructieve veiligheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.d
    text: brandveiligheid;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.e
    text: bouwfysica;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.f
    text: installaties, en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.1.g
    text: controle op de bouw.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.2
    text: |-
      Het instrument voor kwaliteitsborging schrijft voor dat het kennis- en opleidingsniveau van degene die de
      kwaliteitsborging uitvoert, actueel gehouden wordt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.83.3
    text: Bij ministeriële regeling worden nadere regels gesteld over het bepaalde in het eerste en tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.83
  - number: 3.84.1
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor op welke wijze een kwaliteitsborger de eisen voor de toepassing
      ervan in zijn administratieve organisatie opneemt en ziet ten minste op:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
  - number: 3.84.1.a
    text: |-
      het vastleggen van de gegevens van de rechtspersoon of natuurlijk persoon die eindverantwoordelijk is voor de
      kwaliteitsborging;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
  - number: 3.84.1.b
    text: |-
      het vastleggen van de gegevens van de personen die de kwaliteitsborging feitelijk uitvoeren en de wijze waarop
      gewaarborgd wordt dat zij aan de krachtens [artikel 3.83][ref1] gestelde kennis-, opleidings- en ervaringseisen
      voldoen;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.9'
  - number: 3.84.1.c
    text: |-
      het vastleggen van de wijze waarop informatie over de kwaliteitsborging en de vermelding van de daarvoor
      verantwoordelijke personen actueel gehouden wordt;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
  - number: 3.84.1.d
    text: het bijhouden van een ordentelijke administratie van de gegevens en bescheiden over de kwaliteitsborging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
  - number: 3.84.2
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld over het bepaalde in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.84
  - number: 3.85.1
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de kwaliteitsborger ten minste de volgende gegevens
      verstrekt aan de instrumentaanbieder:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.85.1.a
    text: bedrijfsnaam en plaats van vestiging en het nummer van inschrijving van de kwaliteitsborger in het handelsregister;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.85.1.b
    text: |-
      gegevens waaruit blijkt dat de kwaliteitsborger voldoet aan de eisen, bedoeld in de
      [artikelen 3.80 tot en met 3.84][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.9'
  - number: 3.85.1.c
    text: gegevens over de bouwprojecten waarvoor de kwaliteitsborger het instrument toepast;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.85.1.d
    text: gegevens over de afronding van de kwaliteitsborging.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.85.2
    text: |-
      Het instrument voor kwaliteitsborging beschrijft op welke momenten de in het eerste lid bedoelde gegevens worden
      verstrekt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.85.3
    text: Bij ministeriële regeling worden nadere regels gesteld over het bepaalde in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.85
  - number: 3.86.1
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de kwaliteitsborger, voor zover van toepassing,
      zijn opdrachtgever en de andere bij de bouwwerkzaamheden betrokken partijen onverwijld informeert over
      bij de kwaliteitsborging geconstateerde afwijkingen van regels als bedoeld in de [hoofdstukken 4][ref1] en
      [5 van het Besluit bouwwerken leefomgeving][ref2], en dat hij ook het bevoegd gezag informeert als de afwijkingen
      het afgeven van een verklaring als bedoeld in het tweede lid in de weg staan.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.86.2
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat de kwaliteitsborger na de afronding van de
      bouwwerkzaamheden aan zijn opdrachtgever een verklaring afgeeft, waarin hij, voor zover van toepassing, verklaart
      dat:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
  - number: 3.86.2.a
    text: hij toestemming heeft van de instrumentaanbieder het instrument toe te passen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
  - number: 3.86.2.b
    text: hij de kwaliteitsborging heeft uitgevoerd volgens de in het instrument gestelde eisen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
  - number: 3.86.2.c
    text: |-
      er naar zijn oordeel een gerechtvaardigd vertrouwen is dat het resultaat van de bouwactiviteit voldoet aan de
      regels, bedoeld in de [hoofdstukken 4][ref1] en [5 van het Besluit bouwwerken leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
    references:
      - id: ref1
        bwb_id: BWBR0041297
        hoofdstuk: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '5'
  - number: 3.86.3
    text: |-
      Een instrument voor kwaliteitsborging schrijft voor dat een kopie van de verklaring, bedoeld in het tweede lid,
      wordt verstrekt aan de andere bij de bouwwerkzaamheden betrokken partijen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
  - number: 3.86.4
    text: Voor de verklaring, bedoeld in het tweede lid, wordt bij ministeriële regeling een formulier vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.86
  - number: 3.87.1
    text: 'Een instrument voor kwaliteitsborging beschrijft de werkwijze van de instrumentaanbieder over:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: 3.87.1.a
    text: periodieke onderzoeken naar de toepassing van het instrument volgens de in het instrument gestelde eisen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: 3.87.1.b
    text: |-
      de wijze waarop geschillen tussen de instrumentaanbieder en de kwaliteitsborger en tussen de kwaliteitsborger en
      zijn opdrachtgever worden behandeld;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: 3.87.1.c
    text: |-
      de behandeling van klachten over de toepassing van het instrument en het oplossen van fouten bij de toepassing
      ervan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: 3.87.2
    text: |-
      Het instrument voor kwaliteitsborging beschrijft in welke gevallen de kwaliteitsborger een waarschuwing wordt
      gegeven, de toestemming het instrument toe te passen wordt geschorst of ingetrokken, als uit de in het eerste
      lid bedoelde onderzoeken blijkt dat bij de kwaliteitsborging in strijd met de in het instrument gestelde eisen
      is gehandeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: 3.87.3
    text: Bij ministeriële regeling kunnen nadere regels worden gesteld over het bepaalde in het eerste en tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel3.87
  - number: '4.1'
    text: |-
      In afwijking van [artikel 3.10, eerste lid, van de wet][ref1] stellen de volgende bestuursorganen een programma
      vast als aannemelijk is dat niet wordt voldaan of niet zal worden voldaan aan de daarbij bedoelde omgevingswaarden:


