  - number: '5.107'
    text: |-
      Een afstand als bedoeld in deze subparagraaf geldt vanaf het emissiepunt, bedoeld in
      [artikel 4.806, tweede lid, van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.107
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.108.1
    text: |-
      Een concentratiegebied is in ieder geval gebied I en gebied II, bedoeld in [bijlage I bij de Meststoffenwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0004054
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.108
    references:
      - id: ref1
        bwb_id: BWBR0004054
  - number: 5.108.2
    text: |-
      Een omgevingsplan kan een concentratiegebied aanwijzen. In dat geval wordt de geometrische begrenzing van een
      concentratiegebied in het omgevingsplan vastgelegd.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.108
  - number: 5.109.1
    text: |-
      Een omgevingsplan dat het houden van landbouwhuisdieren met geuremissiefactor toelaat, bevat als waarde voor de
      toelaatbare geur door die activiteit op een geurgevoelig gebouw de standaardwaarde, bedoeld in tabel 5.109.1.
            Tabel 5.109.1 Standaardwaarde toelaatbare geur ouE/m3 als 98-percentiel door houden landbouwhuisdieren met
      geuremissiefactor op een geurgevoelig gebouw


                    *Geurgevoelig gebouw*


                    *Standaardwaarde*


                    Gelegen binnen de bebouwingscontour geur en buiten een concentratiegebied


                    2,0 ou/m3


                    Gelegen binnen de bebouwingscontour geur en binnen een concentratiegebied


                    3,0 ou/m3


                    Gelegen buiten de bebouwingscontour geur en buiten een concentratiegebied


                    8,0 ou/m3


                    Gelegen buiten de bebouwingscontour geur en binnen een concentratiegebied


                    14,0 ou/m3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109
  - number: 5.109.2
    text: |-
      Het omgevingsplan kan een lagere of hogere waarde bevatten dan de standaardwaarde, mits die waarde niet hoger is
      dan de grenswaarde, bedoeld in tabel 5.109.2.
            Tabel 5.109.2 Grenswaarde toelaatbare geur ouE/m3 als 98-percentiel door houden landbouwhuisdieren met
      geuremissiefactor op een geurgevoelig gebouw


                    *Geurgevoelig gebouw*


                    *Grenswaarde*


                    Gelegen binnen de bebouwingscontour geur en buiten een concentratiegebied


                    8,0 ou/m3


                    Gelegen binnen de bebouwingscontour geur en binnen een concentratiegebied


                    14,0 ou/m3


                    Gelegen buiten de bebouwingscontour geur en buiten een concentratiegebied


                    20,0 ou/m3


                    Gelegen buiten de bebouwingscontour geur en binnen een concentratiegebied


                    35,0 ou/m3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109
  - number: 5.109.3
    text: |-
      Als sprake is van een geurgevoelig gebouw dat heeft opgehouden een functionele binding te hebben met een
      dierenverblijf in de directe omgeving daarvan, kan het omgevingsplan een hogere waarde bevatten dan de grenswaarde,
      bedoeld in het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109
  - number: 5.109.4
    text: |-
      Op het berekenen van de geur waarvoor het omgevingsplan een waarde bevat als bedoeld in het eerste lid, of in
      afwijking daarvan een waarde die hoger of lager is dan die waarde, zijn de bij ministeriële regeling gestelde
      regels van toepassing.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109
  - number: 5.109a.1
    text: |-
      Als een omgevingsplan op grond van [artikel 5.109][ref1] voor een locatie een waarde bevat die lager is dan de
      waarde die gold onmiddellijk voorafgaand aan de wijziging van het omgevingsplan en de geur op die locatie op dat
      tijdstip rechtmatig meer bedraagt dan die lagere waarde, bepaalt het omgevingsplan dat die lagere waarde niet
      van toepassing is als op die locatie de geur op een geurgevoelig gebouw door het houden van landbouwhuisdieren
      met geuremissiefactor niet toeneemt en het aantal landbouwhuisdieren met geuremissiefactor per diercategorie niet
      toeneemt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.109a.2
    text: |-
      Het eerste lid geldt ook als het omgevingsplan voor een locatie op grond van [artikel 5.109][ref1] een waarde bevat
      die hoger is dan de waarde die gold onmiddellijk voorafgaand aan de wijziging van het omgevingsplan en de geur op
      die locatie op dat tijdstip rechtmatig meer bedraagt dan die hogere waarde.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.109a.3
    text: |-
      Voor gevallen als bedoeld in het eerste en tweede lid bepaalt het omgevingsplan dat uitbreiding van een
      dierenverblijf met landbouwhuisdieren met geuremissiefactor of van het aantal landbouwhuisdieren met
      geuremissiefactor alleen is toegestaan, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109a
  - number: 5.109a.3.a
    text: een geurbelastingreducerende maatregel wordt getroffen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109a
  - number: 5.109a.3.b
    text: |-
      de totale geur na uitbreiding niet meer bedraagt dan het gemiddelde van de in het omgevingsplan opgenomen waarde en
      de geur die de activiteit onmiddellijk voorafgaand aan het treffen van de maatregel rechtmatig mocht veroorzaken.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.109a
  - number: '5.110'
    text: |-
      De [artikelen 5.109, eerste en tweede lid][ref1], en [5.109a][ref2] zijn niet van toepassing als in een
      omgevingsplan dat het houden van landbouwhuisdieren met geuremissiefactor toelaat, voor een locatie ten minste de
      afstand, bedoeld in tabel 5.110, in acht wordt genomen tot de volgende geurgevoelige gebouwen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.110
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 5.110.a
    text: een geurgevoelig gebouw dat een functionele binding heeft met een dierenverblijf in de directe omgeving daarvan; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.110
  - number: 5.110.b
    text: |-
      een geurgevoelig gebouw dat op of na 19 maart 2000 heeft opgehouden een functionele binding te hebben met een
      dierenverblijf in de directe omgeving daarvan.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.110
  - number: '5.111'
    text: |-
      De [artikelen 5.109, eerste en tweede lid][ref1], en [5.109a][ref2] zijn niet van toepassing als in een
      omgevingsplan dat het houden van landbouwhuisdieren met geuremissiefactor toelaat, voor een locatie ten minste de
      afstand, bedoeld in tabel 5.111, in acht wordt genomen tot de volgende geurgevoelige gebouwen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.111
    references:
