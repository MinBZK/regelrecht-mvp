  - number: 8.74w.1.b
    text: de leeftijd van achttien jaar heeft bereikt.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.2
    text: |-
      Een omgevingsvergunning voor een valkeniersactiviteit wordt, ondanks voldoening aan de eisen, bedoeld in het eerste
      lid, geweigerd, als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.2.a
    text: |-
      er grond is om aan te nemen dat de aanvrager van de bevoegdheid een roofvogel voorhanden te hebben, van de
      bevoegdheid om de jacht uit te oefenen, of van de hem toekomende bevoegdheden in het kader van het beheren van
      populaties van in het wild levende dieren en het bestrijden van schade misbruik zal maken, of zodanig gebruik zal
      maken dat hij een gevaar voor zichzelf, de openbare orde of de veiligheid kan gaan vormen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.2.b
    text: |-
      er grond is om aan te nemen dat de aanvrager nalatig zal zijn te doen wat een goed jager betaamt bij de uitoefening
      van de jacht;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.2.c
    text: |-
      aan de aanvrager de bevoegdheid om de jacht uit te oefenen is ontzegd bij een rechterlijke uitspraak die voor
      tenuitvoerlegging vatbaar is geworden, en de tijd waarvoor die bevoegdheid is ontzegd nog niet is verstreken;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.74w
  - number: 8.74w.2.d
    text: |-
      de aanvrager in de twee jaar voorafgaand aan de aanvraag om een omgevingsvergunning voor een valkeniersactiviteit
      is veroordeeld voor een strafbaar feit wegens overtreding van het bepaalde bij of krachtens de [wet][ref1]
      of wegens gedragingen als bedoeld in [artikel 2.1][ref2], [2.2][ref3], [2.3][ref4], [2.5][ref5],
