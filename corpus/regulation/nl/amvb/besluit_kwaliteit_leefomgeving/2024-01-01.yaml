        artikel: '3'
        hoofdstuk: '3'
        paragraaf: 3.5.4
        afdeling: '3.5'
  - number: 12.7.1
    text: |-
      Als toepassing wordt gegeven aan [artikel 3.2, eerste lid, van de Aanvullingswet geluid Omgevingswet][ref1], wordt
      ook het geluidaandachtsgebied bepaald.


      [ref1]: https://wetten.overheid.nl/BWBR0043247#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.7
    references:
