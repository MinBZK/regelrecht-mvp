        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref6
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 8.84.3.b
    text: |-
      een goed ecologisch potentieel als bedoeld in [artikel 2.12, eerste lid][ref1], niet wordt bereikt, in voorkomend
      geval in samenhang met de termijn, bedoeld in [artikel 2.18, tweede lid][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 8.84.3.c
    text: |-
      een minder strenge doelstelling als bedoeld in [artikel 2.17, tweede lid, aanhef en onder d][ref1], niet wordt
      bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.84
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
