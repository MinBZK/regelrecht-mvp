  - number: 11.11.2
    text: |-
      Monitoring vindt plaats door met metingen, berekeningen en modellen de overstromingskans of de faalkans van een
      dijktraject in de actuele toestand te bepalen door te volgen procedures en te hanteren randvoorwaarden, volgens bij
      ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.11
  - number: 11.11.3
    text: |-
      Het dagelijks bestuur van het waterschap en Onze Minister van Infrastructuur en Waterstaat zijn belast met de
      uitvoering van de monitoring als het gaat om een dijktraject dat in beheer is bij het waterschap respectievelijk
      het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.11
  - number: '11.12'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat verzamelt gegevens over de mate waarin wordt voldaan aan de voor de
      grote rivieren opgestelde legger.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.12
  - number: '11.13'
    text: Onze Minister van Infrastructuur en Waterstaat verzamelt gegevens over de ligging van de kustlijn.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.13
  - number: 11.14.1
    text: |-
      Gedeputeerde staten verzamelen gegevens over overstromingsgevaar als bedoeld in artikel 6, derde en vierde lid, van
      de richtlijn overstromingsrisico’s.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.14
  - number: 11.14.2
    text: |-
      Gedeputeerde staten verzamelen gegevens over overstromingsrisico’s als bedoeld in artikel 6, vijfde lid, van de
      richtlijn overstromingsrisico’s.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.14
  - number: 11.14.3
    text: De gegevens gaan niet over overstromingen vanuit rioolstelsels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.14
  - number: 11.15.1
    text: |-
      Het dagelijks bestuur van het waterschap en Onze Minister van Infrastructuur en Waterstaat stellen elke twaalf jaar
      een verslag op over de algemene waterstaatkundige toestand van de primaire waterkeringen die in beheer zijn bij het
      waterschap respectievelijk het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.15
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: datum_vorig_verslag
            type: date
            required: true
            description: Datum van het vorige verslag over de waterstaatkundige toestand
            source: {}
        output:
          - name: uiterste_datum_volgend_verslag
            type: date
            description: Uiterste datum waarop het volgende verslag moet worden opgesteld
        actions:
          - output: uiterste_datum_volgend_verslag
            value:
              operation: DATE_ADD
              date: $datum_vorig_verslag
              years: 12
  - number: 11.15.2
    text: 'Het verslag bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.15
  - number: 11.15.2.a
    text: |-
      de resultaten van de monitoring voor de omgevingswaarden, bedoeld in [artikel 2.0c][ref1], en de andere parameters,
      bedoeld in [artikel 11.11, eerste lid][ref2]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.15
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.1.1
        afdeling: '2.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: 11.15.2.b
    text: |-
      in voorkomend geval, de vermelding dat sprake is van overschrijding van een andere parameter als bedoeld in
      [artikel 11.11, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.15
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: '11.16'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt elke twaalf jaar een verslag op over de gegevens, bedoeld
      in [artikel 11.12][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: datum_vorig_verslag_rivieren
            type: date
            required: true
            description: Datum van het vorige verslag over de legger grote rivieren
            source: {}
        output:
          - name: uiterste_datum_volgend_verslag_rivieren
            type: date
            description: Uiterste datum waarop het volgende verslag moet worden opgesteld
        actions:
          - output: uiterste_datum_volgend_verslag_rivieren
            value:
              operation: DATE_ADD
              date: $datum_vorig_verslag_rivieren
              years: 12
  - number: 11.17.1
    text: Gedeputeerde staten stellen een overstromingsgevaarkaart en een overstromingsrisicokaart vast.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.17
  - number: 11.17.2
    text: |-
      De overstromingsgevaarkaart verbeeldt de gegevens, bedoeld in [artikel 11.14, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: 11.17.3
    text: |-
      De overstromingsrisicokaart verbeeldt de gegevens, bedoeld in [artikel 11.14, tweede lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.17
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.1.2
        afdeling: '11.1'
  - number: 11.17.4
    text: De kaarten worden in ieder geval twee jaar voor de vaststelling van het overstromingsrisicobeheerplan vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.17
  - number: '11.18'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt kaarten van de kustlijn, bedoeld in
      [artikel 20.17, eerste lid, onder b, van de wet][ref1], vast, waarop die lijn is verbeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 11.19.1
    text: |-
      Monitoring voor de omgevingswaarden voor de kwaliteit van de buitenlucht, bedoeld in de
      [artikelen 2.3 tot en met 2.8][ref1], vindt plaats door metingen en berekeningen volgens bij ministeriële regeling
      gestelde regels.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.19
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.19.2
    text: |-
      In afwijking van het eerste lid vindt de monitoring voor de omgevingswaarden voor benzeen, bedoeld in
      [artikel 2.6, eerste lid][ref1], alleen plaats door berekeningen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.19
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.19.3
    text: Onze Minister van Infrastructuur en Waterstaat is belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.19
  - number: '11.20'
    text: |-
      De beoordeling of aan de omgevingswaarden voor de kwaliteit van de buitenlucht, bedoeld in de
      [artikelen 2.3 tot en met 2.7][ref1], wordt voldaan, vindt niet plaats op:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.20
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.20.a
    text: een locatie waartoe het publiek geen toegang heeft en waar geen vaste bewoning is; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.20
  - number: 11.20.b
    text: de rijbaan van wegen en de middenberm van wegen, tenzij voetgangers normaliter toegang tot de middenberm hebben.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.20
  - number: 11.21.1
    text: |-
      Monitoring voor de omgevingswaarden voor de kwaliteit van de buitenlucht, bedoeld in [artikel 2.8a][ref1], vindt
      plaats door het voor die stoffen opstellen van de nationale emissie-inventarissen en nationale emissieprognoses,
      bedoeld in artikel 8, eerste en tweede lid, van de nec-richtlijn, volgens de methode, bedoeld in artikel 9 van en
      bijlage V bij die richtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.21.2
    text: Onze Minister van Infrastructuur en Waterstaat is belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.3
    text: 'Voor de beoordeling of aan de omgevingswaarden wordt voldaan, blijven de volgende emissies buiten beschouwing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.3.a
    text: emissies van vliegtuigen, buiten de landings- en startcyclus;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.3.b
    text: emissies van de internationale zeevaart; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.3.c
    text: |-
      emissies van stikstofoxiden en vluchtige organische stoffen, met uitzondering van methaan, van activiteiten
      die vallen onder de categorieën 3B en 3D, bedoeld in de richtsnoeren behorende bij het Verdrag betreffende
      grensoverschrijdende luchtverontreiniging over lange afstand (Trb. 1983, 84).
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.4
    text: 'Voor de toepassing van dit artikel wordt verstaan onder:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.4.a
    text: |-
      *landings- en startcyclus:* de cyclus die het taxiën na landing en voor vertrek, starten, opstijgen, aanvliegen en
      landen en alle andere manoeuvres van het vliegtuig die plaatsvinden beneden een hoogte van 3.000 voet, omvat; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.21.4.b
    text: |-
      *internationale zeevaart:* reizen over zee en in de kustwateren door vaartuigen van alle vlaggen, uitgezonderd
      vissersvaartuigen, die vertrekken van het grondgebied van het ene land en aankomen op het grondgebied van een ander
      land.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.21
  - number: 11.22.1
    text: |-
      Het college van burgemeester en wethouders van een gemeente waarvan het grondgebied ligt in een aandachtsgebied,
      bedoeld in [artikel 5.51, tweede lid][ref1], en gedeputeerde staten van de provincie waarvan het grondgebied in dat
      gebied ligt, verzamelen gegevens over de verkeersintensiteit op wegen in beheer bij de gemeente respectievelijk de
      provincie voor de monitoring in die aandachtsgebieden van de concentraties van:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
  - number: 11.22.1.a
    text: |-
      stikstofdioxide, bedoeld in [artikel 2.4, eerste lid, aanhef en onder b][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.22.1.b
    text: |-
      PM, bedoeld in [artikel 2.5, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 11.22.2
    text: |-
      Het college van burgemeester en wethouders van een gemeente waarvan het grondgebied ligt in een aandachtsgebied,
      bedoeld in [artikel 5.51, derde lid][ref1], en gedeputeerde staten van de provincie waarvan het grondgebied
      in dat gebied ligt, verzamelen voor de monitoring in die aandachtsgebieden van de concentraties van PM,
      bedoeld in [artikel 2.5, eerste lid][ref2], gegevens over het exploiteren van een veehouderij, bedoeld in
      [artikel 3.200 van het Besluit activiteiten leefomgeving][ref3]:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.4
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 11.22.2.a
    text: waarvan de emissie van PM vanuit de dierenverblijven meer bedraagt dan 800 kg per jaar; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: emissie_pm_dierenverblijven_kg_per_jaar
            type: number
            required: true
            description: Emissie van PM vanuit de dierenverblijven in kg per jaar
            source: {}
        output:
          - name: verplichting_gegevensverzameling_veehouderij_criterium_a
            type: boolean
            description: Of de veehouderij onder de gegevensverzamelingsplicht valt (meer dan 800 kg PM per jaar)
        actions:
          - output: verplichting_gegevensverzameling_veehouderij_criterium_a
            value:
              operation: GREATER_THAN
              subject: $emissie_pm_dierenverblijven_kg_per_jaar
              value: 800
  - number: 11.22.2.b
    text: |-
      waarvan de emissie van PM vanuit de dierenverblijven meer bedraagt dan 500 kg per jaar, als uit de op basis van het
      derde lid verzamelde gegevens blijkt dat de achtergrondconcentratie van PM hoger is dan 27 μg/m3.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: emissie_pm_dierenverblijven_kg_per_jaar
            type: number
            required: true
            description: Emissie van PM vanuit de dierenverblijven in kg per jaar
            source: {}
          - name: achtergrondconcentratie_pm_ug_m3
            type: number
            required: true
            description: Achtergrondconcentratie van PM in microgram per kubieke meter
            source: {}
        output:
          - name: verplichting_gegevensverzameling_veehouderij_criterium_b
            type: boolean
            description: >-
              Of de veehouderij onder de gegevensverzamelingsplicht
              valt (meer dan 500 kg PM per jaar bij hoge
              achtergrondconcentratie)
        actions:
          - output: verplichting_gegevensverzameling_veehouderij_criterium_b
            value:
              operation: AND
              conditions:
                - operation: GREATER_THAN
                  subject: $emissie_pm_dierenverblijven_kg_per_jaar
                  value: 500
                - operation: GREATER_THAN
                  subject: $achtergrondconcentratie_pm_ug_m3
                  value: 27
  - number: 11.22.3
    text: 'Onze Minister van Infrastructuur en Waterstaat verzamelt de volgende gegevens:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.a
    text: |-
      de gemiddelde concentraties van zwaveldioxide, stikstofdioxide, PM, PM, benzeen, lood en koolmonoxide op een
      schaalniveau van 1 bij 1 km, met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.a.1°
    text: gegevens van het voorafgaande kalenderjaar; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.a.2°
    text: de verwachte concentraties voor de daaropvolgende kalenderjaren tot en met het jaar 2030;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.b
    text: |-
      de correcties voor dubbeltellingen van de lokale bijdragen van wegen in beheer bij het Rijk aan de gemiddelde
      concentraties van stikstofdioxide, PM en PM op een schaalniveau van 1 bij 1 km, met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.b.1°
    text: gegevens van het voorafgaande kalenderjaar; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.b.2°
    text: de verwachte correcties voor de daaropvolgende kalenderjaren tot en met het jaar 2030;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.c
    text: de meteorologische gegevens van het voorafgaande kalenderjaar en de tienjarige gemiddelde meteorologische gegevens;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.d
    text: gegevens over de terreinruwheid op een schaal van 1 bij 1 km; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.3.e
    text: het gebruik van wegen in beheer bij het Rijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.22.4
    text: |-
      In aanvulling op het eerste tot en met derde lid worden gegevens verzameld over de locaties van monitoringspunten
      waar de luchtkwaliteit wordt beoordeeld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.22
  - number: 11.23.1
    text: 'Door monitoring worden bewaakt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.a
    text: 'de jaargemiddelde concentraties in de buitenlucht van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.a.1°
    text: |-
      de chemische samenstellingen van PM, waaronder in ieder geval sulfaat, nitraat, natrium, kalium, ammonium,
      chloride, calcium, magnesium, elementair koolstof en organisch koolstof;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.a.2°
    text: vluchtige organische stoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.b
    text: 'de jaargemiddelde achtergrondconcentraties in de buitenlucht van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.b.1°
    text: arseen, cadmium, kwik, nikkel en benzo(a)pyreen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.b.2°
    text: |-
      andere relevante polycyclische aromatische koolwaterstoffen dan benzo(a)pyreen, waaronder in ieder geval
      benzo(a)antraceen, benzo(b)fluorantheen, benzo(j)fluorantheen, benzo(k)fluorantheen, indeen(1,2,3-cd)pyreen en
      dibenzo(a, h)antraceen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.c
    text: 'de jaargemiddelde depositie van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.c.1°
    text: arseen, cadmium, kwik, nikkel en benzo(a)pyreen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.c.2°
    text: de onder b, onder 2°, bedoelde andere polycyclische aromatische koolwaterstoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.d
    text: 'de totale jaarlijkse antropogene emissies van in Nederland gelegen bronnen van de volgende stoffen:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.d.1°
    text: cadmium, kwik en lood; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.d.2°
    text: |-
      persistente organische verontreinigende stoffen, zijnde polycyclische aromatische koolwaterstoffen, benzo(a)pyreen,
      benzo(b)fluorantheen, benzo(k)fluorantheen indeen(1,2,3-cd)pyreen, dioxine/furaan, polychloorbifenylen en
      hexachloorbenzeen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.1.e
    text: de negatieve effecten van de verontreiniging van de buitenlucht op ecosystemen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.2
    text: Monitoring vindt plaats door metingen en berekeningen volgens bij ministeriële regeling gestelde regels.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.23.3
    text: Onze Minister van Infrastructuur en Waterstaat is belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.23
  - number: 11.24.1
    text: Er is een landelijk register voor middelgrote stookinstallaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.24
  - number: 11.24.2
    text: Het register wordt beheerd door Onze Minister van Infrastructuur en Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.24
  - number: 11.24.3
    text: Het register is voor eenieder langs elektronische weg toegankelijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.24
  - number: 11.24.4
    text: |-
      Het register bevat in ieder geval de gegevens, bedoeld in
      [artikel 4.1327 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.24
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 11.24.5
    text: |-
      De gegevens worden in het register opgenomen vanaf de dag waarop een melding is ontvangen of een
      omgevingsvergunning is verleend.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.24
  - number: 11.25.1
    text: Er is een landelijk register op het gebied van certificering van werkzaamheden aan gasverbrandingsinstallaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.25
  - number: 11.25.2
    text: Het register wordt beheerd door Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.25
  - number: 11.25.3
    text: Het register is voor eenieder langs elektronische weg toegankelijk.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.25
  - number: 11.25.4
    text: |-
      Het register bevat gegevens over certificatie-instellingen en certificatieschema’s als bedoeld in
      [artikel 3.73, onder a][ref1], en de door de certificatie-instellingen verstrekte gegevens over certificaathouders
      als bedoeld in [artikel 6.44 van het Besluit bouwwerken leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.25
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.8'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 11.25.5
    text: Bij ministeriële regeling worden nadere regels gesteld over de gegevens die in het register worden opgenomen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.25
  - number: 11.26.1
    text: |-
      Als een certificatie-instelling als bedoeld in [artikel 3.73, onder a][ref1], in staat van faillissement komt
      te verkeren of surseance van betaling is verleend, informeert zij Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties onverwijld hierover.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.8'
  - number: 11.26.2
    text: |-
      De certificatie-instelling verstrekt gegevens over certificaathouders als bedoeld in
      [artikel 6.44 van het Besluit bouwwerken leefomgeving][ref1] aan de minister ten behoeve van het landelijk
      register, bedoeld in [artikel 11.25][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '6'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.2
        afdeling: '11.2'
  - number: 11.26.3
    text: |-
      De certificatie-instelling verstrekt op verzoek kosteloos aan de minister de voor de uitoefening van zijn taken
      benodigde inlichtingen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
  - number: 11.26.4
    text: |-
      De certificatie-instelling zendt de minister jaarlijks een verslag van de verrichte werkzaamheden, de
      rechtmatigheid en doeltreffendheid van die werkzaamheden in het afgelopen kalenderjaar en de signaleringen, bedoeld
      in [artikel 6.46 van het Besluit bouwwerken leefomgeving][ref1]. Bij ministeriële regeling kunnen nadere regels
      worden gesteld over dit verslag.


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel6
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '6'
  - number: 11.26.5
    text: |-
      De nationale accreditatie-instantie, bedoeld in
      [artikel 2, eerste lid, van de Wet aanwijzing nationale accreditatie-instantie][ref1], meldt aan de minister de
      intrekking of schorsing van een accreditatie van een certificatie-instelling.


      [ref1]: https://wetten.overheid.nl/BWBR0026591#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
    references:
      - id: ref1
        bwb_id: BWBR0026591
        artikel: '2'
  - number: 11.26.6
    text: |-
      Bij ministeriële regeling kunnen nadere regels worden gesteld over de uitwisseling van informatie tussen
      certificatie-instellingen onderling en over de uitwisseling van informatie tussen certificatie-instellingen en
      de minister.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.26
  - number: '11.27'
    text: 'Door monitoring worden bewaakt:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.a
    text: |-
      de toestand per kwaliteitselement van een kunstmatig of sterk veranderd krw-oppervlaktewaterlichaam, uitgewerkt
      voor het type krw-oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.b
    text: de stoffen op de aandachtstoffenlijst, bedoeld in artikel 8 ter, eerste lid, van de richtlijn prioritaire stoffen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.c
    text: |-
      de indicatoren die een mogelijke bedreiging vormen voor de kwaliteit van water uit krw-oppervlaktewaterlichamen
      of grondwaterlichamen dat wordt onttrokken voor de bereiding van voor menselijke consumptie bestemd water, en de
      parameters, stoffen en verontreinigende stoffen, bedoeld in de artikelen 8, tweede en vierde lid, en 13, achtste
      lid, van de drinkwaterrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.d
    text: de tendensen over de concentraties van stoffen in grondwaterlichamen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.e
    text: escherichia coli of andere indicatoren in schelpdierwater;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.f
    text: |-
      de concentraties van verontreinigende stoffen uit bestaande verontreinigingspluimen in een grondwaterlichaam
      waarvoor aanvullende trendbeoordelingen als bedoeld in artikel 5, vijfde lid, van de grondwaterrichtlijn nodig
      zijn; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27.g
    text: |-
      de parameters nodig voor monitoring voor nader onderzoek in gevallen als bedoeld in bijlage V, onder 1.3.3, bij de
      kaderrichtlijn water.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27
  - number: 11.27a.1
    text: |-
      Door monitoring wordt bewaakt de concentratie van lood in collectieve leidingnetten en woninginstallaties als
      bedoeld in [artikel 1, eerste lid, van de Drinkwaterwet][ref1] voor zover het gaat om:


      [ref1]: https://wetten.overheid.nl/BWBR0026338#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
    references:
      - id: ref1
        bwb_id: BWBR0026338
        artikel: '1'
  - number: 11.27a.1.1°
    text: |-
      woonfuncties voor gastouderopvang als bedoeld in [artikel 1.1, eerste lid, van de Wet kinderopvang][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0017017#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
    references:
      - id: ref1
        bwb_id: BWBR0017017
        artikel: '1'
  - number: 11.27a.1.2°
    text: bijeenkomstfuncties voor kinderopvang; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
  - number: 11.27a.1.3°
    text: onderwijsfuncties voor basisonderwijs.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
  - number: 11.27a.2
    text: |-
      Het eerste lid is van toepassing als uit de algemene analyse van de risicobeoordeling, bedoeld in
      [artikel 3.15b][ref1], specifieke risico’s voor de drinkwaterkwaliteit en de gezondheid van de mens van de
      parameter lood zijn vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.3'
  - number: 11.27a.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties
      stellen een monitoringsprogramma vast dat de methode van monitoring bevat.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
  - number: 11.27a.4
    text: |-
      Onze Minister van Infrastructuur en Waterstaat en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties zijn
      belast met de uitvoering van de monitoring.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.27a
  - number: 11.28.1
    text: Onze Minister van Infrastructuur en Waterstaat stelt een monitoringsprogramma kaderrichtlijn water vast.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
  - number: 11.28.2
    text: 'Het monitoringsprogramma bevat de methode van monitoring van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
  - number: 11.28.2.a
    text: |-
      de toestand van een waterlichaam per stof en kwaliteitselement voor de beoordeling van de omgevingswaarden,
      bedoeld in de [artikelen 2.10, eerste lid][ref1], [2.11, eerste lid][ref2], [2.13, eerste lid][ref3],
      [2.14, eerste lid][ref4], en [2.15, eerste lid][ref5]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 11.28.2.b
    text: |-
      de andere parameters, bedoeld in [artikel 11.27][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.28.3
    text: |-
      Voor de uitwerking van de methode van monitoring van de parameters, bedoeld in [artikel 11.27, onder f en g][ref1],
      wordt het monitoringsprogramma vastgesteld door:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.28.3.a
    text: |-
      voor krw-oppervlaktewaterlichamen: de bestuursorganen die op grond van de
      [artikelen 4.2, eerste lid, onder a][ref1], en [4.4, eerste lid, onder a, van het Omgevingsbesluit][ref2] bevoegd
      zijn een omgevingsvergunning voor een lozingsactiviteit op een oppervlaktewaterlichaam te verlenen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
  - number: 11.28.3.b
    text: 'voor grondwaterlichamen: gedeputeerde staten.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.28
  - number: 11.29.1
    text: |-
      Met het monitoringsprogramma wordt beoogd een samenhangend totaalbeeld te verkrijgen van de watertoestand binnen
      het Nederlandse deel van de stroomgebiedsdistricten Rijn, Maas, Schelde en Eems.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
  - number: 11.29.2
    text: 'In het monitoringsprogramma worden:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
  - number: 11.29.2.a
    text: de monitoringspunten aangewezen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
  - number: 11.29.2.b
    text: |-
      de indicatoren, bedoeld in [artikel 11.27, onder c en e][ref1], uitgewerkt, en de stoffen, bedoeld in
      artikel 11.27, onder d, aangeduid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
        hoofdstuk: '11'
        paragraaf: 11.2.3
        afdeling: '11.2'
  - number: 11.29.3
    text: 'Het monitoringsprogramma bevat de methode van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
  - number: 11.29.3.a
    text: |-
      de beoordeling of voor een kunstmatig of sterk veranderd krw-oppervlaktewaterlichaam wordt voldaan aan een goed
      ecologisch potentieel, bedoeld in [artikel 2.12, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 11.29.3.b
    text: |-
      de beoordeling of aan het einde van de programmaperiode de doelstelling van geen achteruitgang van de toestand van
      een waterlichaam, bedoeld in [artikel 4.15, eerste lid][ref1], gedurende de programmaperiode wordt bereikt;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 11.29.3.c
    text: |-
      de beoordeling of de doelstelling van ombuiging van significante en stijgende trends, bedoeld in
      [artikel 4.17, eerste lid][ref1], wordt bereikt;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 11.29.3.d
    text: |-
      de beoordeling of de doelstelling van geen bacteriële besmetting van schelpdierwater, bedoeld in
      [artikel 4.19][ref1], wordt bereikt; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 11.29.3.e
    text: |-
      de beoordeling of de doelstellingen van verbetering en de doelstelling van geen achteruitgang van de kwaliteit van
      waterlichamen met betrekking tot waterwinlocaties, bedoeld in [artikel 4.21][ref1], worden bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 11.29.4
    text: |-
      Het monitoringsprogramma wordt vastgesteld in overeenstemming met de kaderrichtlijn water, de grondwaterrichtlijn,
      de drinkwaterrichtlijn, de richtlijn prioritaire stoffen en [richtlijn 2009/90/EG](32009L0090) van de Commissie
      van de Europese Unie van 31 juli 2009 tot vaststelling van technische specificaties voor de chemische analyse en
      monitoring van de watertoestand krachtens [richtlijn 2000/60/EG](32000L0060) van het Europees Parlement en de Raad
      (PbEU 2009, L 201).
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.29
  - number: 11.30.1
    text: 'Het monitoringsprogramma bevat de methode van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.1.a
    text: vaststelling van de toestandsklasse waarin een waterlichaam zich bevindt, per stof en kwaliteitselement; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.1.b
    text: |-
      indeling van een krw-oppervlaktewaterlichaam of een grondwaterlichaam in een toestandsklasse, waarbij de indeling
      in een toestandsklasse overeenkomt met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.1.b.1°
    text: |-
      bij een krw-oppervlaktewaterlichaam: de laagste toestandsklasse waarin de chemische toestand, de ecologische
      toestand of het ecologische potentieel verkeert; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.1.b.2°
    text: |-
      bij een grondwaterlichaam: de laagste toestandsklasse waarin de kwantitatieve toestand of de chemische toestand
      verkeert.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2
    text: |-
      Het monitoringsprogramma voorziet bij de vaststelling en indeling, bedoeld in het eerste lid, in de volgende
      toestandsklassen:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.a
    text: 'voor een krw-oppervlaktewaterlichaam:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.a.1°
    text: 'voor de chemische toestand: een goede chemische toestand en geen goede chemische toestand;'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.a.2°
    text: |-
      voor de ecologische toestand: een zeer goede ecologische toestand, een goede ecologische toestand, een matige
      ecologische toestand, een ontoereikende ecologische toestand en een slechte ecologische toestand; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.a.3°
    text: |-
      voor het ecologische potentieel: een goed ecologisch potentieel, een matig ecologisch potentieel, een ontoereikend
      ecologisch potentieel en een slecht ecologisch potentieel; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.b
    text: 'voor een grondwaterlichaam:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.b.1°
    text: 'voor de kwantitatieve toestand: een goede kwantitatieve toestand en een ontoereikende kwantitatieve toestand; en'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: 11.30.2.b.2°
    text: 'voor de chemische toestand: een goede chemische toestand en een ontoereikende chemische toestand.'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.30
  - number: '11.31'
    text: |-
      Het monitoringsprogramma bevat eisen aan de verstrekking van de monitoringsresultaten en de beoordeling daarvan
      door het dagelijks bestuur van het waterschap en gedeputeerde staten aan Onze Minister van Infrastructuur en
      Waterstaat en aan de verstrekking van de monitoringsresultaten en overige informatie en gegevens als bedoeld in
      de artikelen 8, vijfde lid, en 13, achtste lid, van de drinkwaterrichtlijn door de genoemde bestuursorganen aan
      drinkwaterbedrijven als bedoeld in [artikel 1, eerste lid, van de Drinkwaterwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0026338#Artikel1
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.31
    references:
      - id: ref1
        bwb_id: BWBR0026338
        artikel: '1'
  - number: '11.32'
    text: |-
      Het monitoringsprogramma wordt getoetst en zo nodig bijgesteld als niet wordt voldaan aan een omgevingswaarde
      als bedoeld in [artikel 2.10, eerste lid][ref1], [2.11, eerste lid][ref2], [2.13, eerste lid][ref3],
      [2.14, eerste lid][ref4], of [2.15, eerste lid][ref5], of als een goed ecologisch potentieel als bedoeld in
      [artikel 2.12][ref6] of een doelstelling als bedoeld in [artikel 4.15, eerste lid][ref7], [4.17, eerste lid][ref8],
      [4.19][ref9] of [4.21][ref10] niet wordt bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref9]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref10]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel11.32
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
