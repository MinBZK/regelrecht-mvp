  - number: 6.2.3
    text: 'Het tweede lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.3.a
    text: |-
      voor zover het gaat om de omgevingswaarde, bedoeld in [artikel 2.10, eerste lid][ref1], als het niet voldoen aan
      die omgevingswaarde wordt veroorzaakt door een buiten Nederland gelegen verontreinigingsbron en toepassing is
      gegeven aan [artikel 2.17, derde lid][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 6.2.3.b
    text: |-
      als het niet voldoen aan een omgevingswaarde of het niet bereiken van een goed ecologisch potentieel of een minder
      strenge doelstelling het gevolg is van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.3.b.1°
    text: |-
      nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam of wijzigingen in de stand van
      een grondwaterlichaam; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.3.b.2°
    text: |-
      toepassing is gegeven aan [artikel 2.17, vierde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.2
        afdeling: '2.2'
  - number: 6.2.4
    text: |-
      De waterschapsverordening bepaalt dat het verlenen van de omgevingsvergunning er ook niet toe mag leiden
      dat de doelstelling van het voorkomen van achteruitgang van de chemische en ecologische toestand van krw-
      oppervlaktewaterlichamen en van de chemische toestand en kwantitatieve toestand van grondwaterlichamen, bedoeld in
      [artikel 4.15, eerste lid][ref1], niet wordt bereikt.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.2.2
        afdeling: '4.2'
  - number: 6.2.5
    text: |-
      De waterschapsverordening bepaalt dat het bevoegd gezag in afwijking van het vierde lid een omgevingsvergunning kan
      verlenen als:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.a
    text: 'de aanvraag betrekking heeft op:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.a.1°
    text: nieuwe veranderingen van de fysische kenmerken van een krw-oppervlaktewaterlichaam;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.a.2°
    text: wijzigingen in de stand van grondwaterlichamen; of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.a.3°
    text: |-
      nieuwe duurzame activiteiten van menselijke ontwikkeling, voor zover het gaat om de achteruitgang van een zeer
      goede toestand van een krw-oppervlaktewaterlichaam naar een goede toestand;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.b
    text: aan de voorwaarden van artikel 4, zevende, achtste en negende lid, van de kaderrichtlijn water is voldaan; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.2.5.c
    text: |-
      de motivering voor het waterlichaam wordt opgenomen in het nationale waterprogramma, als het gaat om rijkswateren,
      of in het regionale waterprogramma, als het gaat om regionale wateren.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.2
  - number: 6.3.1
    text: |-
      In een waterschapsverordening kunnen een of meer bodembeheergebieden worden aangewezen voor het met een
      maatwerkregel of maatwerkvoorschrift afwijken van de kwaliteitseisen voor:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.3
  - number: 6.3.1.a
    text: |-
      het toepassen van grond of baggerspecie in een oppervlaktewaterlichaam, bedoeld in [artikel 4.1273][ref1],
      [4.1275][ref2], [4.1277][ref3] of [4.1279 van het Besluit activiteiten leefomgeving][ref4]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 6.3.1.b
    text: |-
      het in een oppervlaktewaterlichaam in het bij ministeriële regeling aangewezen toepassingsgebied
      toepassen van mijnsteen of vermengde mijnsteen, bedoeld in [artikel 4.1289][ref1] of
      [4.1291 van het Besluit activiteiten leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 6.3.2
    text: |-
      Bodembeheergebieden worden aangewezen met het oog op het bevorderen dat grond of baggerspecie, in een geval als
      bedoeld in het eerste lid, onder a, of mijnsteen of vermengde mijnsteen, in een geval als bedoeld in het eerste
      lid, onder b, die binnen het aangewezen gebied zijn ontgraven, binnen dat gebied weer zo kunnen worden toegepast
      dat op de schaal van het gebied een goed resultaat wordt behaald uit een oogpunt van het zuinig gebruik van
      grondstoffen en het doelmatig beheer van afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.3
  - number: 6.3.3
    text: In de waterschapsverordening wordt de geometrische begrenzing van een aangewezen bodembeheergebied vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel6.3
  - number: '7.1'
    text: |-
      [Afdeling 5.1][ref1] is van overeenkomstige toepassing op een omgevingsverordening, voor zover die regels als
      bedoeld in [artikel 4.2, tweede lid, van de wet][ref2] bevat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Hoofdstuk5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel7.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
        hoofdstuk: '5'
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '4'
    machine_readable:
