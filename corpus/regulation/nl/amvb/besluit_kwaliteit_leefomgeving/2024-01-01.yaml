    text: |-
      Aan het eerste lid, onder b, wordt voldaan door inachtneming van een bepaalde afstand. Op het bepalen van de
      afstand zijn de bij ministeriële regeling gestelde regels van toepassing. De afstand geldt voor beperkt kwetsbare,
      kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties tot de begrenzing, bedoeld in
      [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.34
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
