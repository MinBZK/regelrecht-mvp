  - number: 12.27b.2
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een buitenplanse omgevingsplanactiviteit,
      anders dan een buitenplanse omgevingsplanactiviteit van nationaal belang, is [artikel 12.26][ref1] op de
      beoordeling van de aanvraag van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel12.27b
    references:
