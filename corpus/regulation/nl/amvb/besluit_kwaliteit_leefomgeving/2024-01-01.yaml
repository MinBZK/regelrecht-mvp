  - number: 5.27.1
    text: |-
      In een omgevingsplan worden voor beperkt kwetsbare, kwetsbare en zeer kwetsbare
      gebouwen en beperkt kwetsbare en kwetsbare locaties de afstanden, bedoeld in
      __REF000___________________________________________________________________________________________________________
      _______________, in acht genomen, voor zover de afstand, bedoeld in het eerste lid, aanhef en onder b, tweede lid,
      aanhef en onder b, of derde lid van dat artikel geldt.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 5.27.2
    text: |-
      De afstanden gelden tot de begrenzing, bedoeld in [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.28'
    text: |-
      Civiele explosieaandachtsgebieden A, B en C om de activiteiten, bedoeld in [artikel 5.26][ref1], zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.28.a
    text: 'de locaties die worden begrensd door:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.28
  - number: 5.28.a.1°
    text: |-
      voor zover het gaat om het opslaan in een bouwwerk met onderdelen die grenzen aan de buitenlucht van ten hoogste
      23 cm metselwerk of minder dan 20 cm beton: de afstanden voor de opslag van stoffen van de ADR-klassen, bedoeld in
      [bijlage IX][ref1], onder A tot en met C; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.28.a.2°
    text: |-
      voor zover het gaat om het opslaan op andere wijze: de afstand, bepaald in overeenstemming met de NATO Guidelines
      for the Storage of Military Ammunition and Explosives (AASTP-1); of
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.28
  - number: 5.28.b
    text: |-
      als het gaat om activiteiten op de locaties, genoemd in [bijlage IX][ref1], onder D, waarvan de geometrische
      begrenzing bij ministeriële regeling is vastgelegd: de gebieden, waarvan de geometrische begrenzing bij
      ministeriële regeling is vastgelegd, rondom die locaties.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 5.29.1
    text: 'Een omgevingsplan laat niet toe:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: civiel_explosieaandachtsgebied_type
            type: string
            required: true
            description: 'Type civiel explosieaandachtsgebied: A, B, C'
            source: {}
          - name: gebouw_of_locatie_type
            type: string
            required: true
            description: Type gebouw of locatie
            source: {}
          - name: heeft_functionele_binding
            type: boolean
            required: false
            description: Of het gebouw/locatie een functionele binding heeft met de explosieve activiteit
            source: {}
        output:
          - name: toelating_verboden
            type: boolean
            description: Of de toelating van het gebouw of de locatie verboden is
        actions:
          - output: toelating_verboden
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $civiel_explosieaandachtsgebied_type
                    value: A
                  then:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - beperkt_kwetsbaar_gebouw
                      - kwetsbaar_gebouw
                      - zeer_kwetsbaar_gebouw
                      - beperkt_kwetsbare_locatie
                      - kwetsbare_locatie
                - when:
                    operation: EQUALS
                    subject: $civiel_explosieaandachtsgebied_type
                    value: B
                  then:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - beperkt_kwetsbaar_gebouw
                      - kwetsbaar_gebouw
                      - zeer_kwetsbaar_gebouw
                      - beperkt_kwetsbare_locatie
                      - kwetsbare_locatie
              default: false
  - number: 5.29.1.a
    text: 'binnen een civiel explosieaandachtsgebied A:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.a.1°
    text: beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.a.2°
    text: beperkt kwetsbare en kwetsbare locaties;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.a.3°
    text: autowegen, autosnelwegen, spoorwegen, vaarwegen, of parkeerterreinen voor meer dan 10 motorvoertuigen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.a.4°
    text: agrarische activiteiten die een meer dan incidentele aanwezigheid van enkele personen vereisen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.b
    text: 'binnen een civiel explosieaandachtsgebied B:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.b.1°
    text: beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.b.2°
    text: beperkt kwetsbare en kwetsbare locaties; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.c
    text: |-
      binnen een civiel explosieaandachtsgebied C: gebouwen waarin doorgaans een groot aantal personen gedurende een
      groot gedeelte van de dag aanwezig is met:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.c.1°
    text: een vlies- of gordijngevel; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.1.c.2°
    text: grote glasoppervlakten.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
  - number: 5.29.2
    text: |-
      Het eerste lid is niet van toepassing op beperkt kwetsbare en kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die een functionele binding hebben met een activiteit als bedoeld in [artikel 5.26][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.29.3
    text: |-
      Het eerste lid geldt voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties tot de begrenzing, bedoeld in [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.30.1
    text: |-
      [Artikel 5.29, eerste lid][ref1], is niet van toepassing op activiteiten of werken in een civiel
      explosieaandachtsgebied A, B en C voor zover:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: 5.30.1.a
    text: |-
      die op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit al
      rechtmatig op een locatie worden verricht of zijn toegestaan op het tijdstip van inwerkingtreding van die bepaling;
      en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
  - number: 5.30.1.b
    text: 'in een omgevingsplan een grenswaarde voor het plaatsgebonden risico in acht wordt genomen van:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
  - number: 5.30.1.b.1°
    text: ten hoogste 1 op de 1.000.000 per jaar voor kwetsbare en zeer kwetsbare gebouwen en kwetsbare locaties; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
  - number: 5.30.1.b.2°
    text: ten hoogste 1 op de 100.000 per jaar voor beperkt kwetsbare gebouwen en beperkt kwetsbare locaties.
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
    machine_readable:
      execution:
        produces:
          legal_character: TOETS
        parameters:
          - name: gebouw_of_locatie_type
            type: string
            required: true
            description: >-
              Type gebouw of locatie: kwetsbaar_gebouw,
              zeer_kwetsbaar_gebouw, kwetsbare_locatie,
              beperkt_kwetsbaar_gebouw, beperkt_kwetsbare_locatie
            source: {}
          - name: plaatsgebonden_risico_per_jaar
            type: number
            required: true
            description: Het plaatsgebonden risico per jaar
            source: {}
        output:
          - name: grenswaarde_civiel_explosiegebied_in_acht_genomen
            type: boolean
            description: Of de grenswaarde voor het civiel explosieaandachtsgebied in acht is genomen
        actions:
          - output: grenswaarde_civiel_explosiegebied_in_acht_genomen
            value:
              operation: IF
              cases:
                - when:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - kwetsbaar_gebouw
                      - zeer_kwetsbaar_gebouw
                      - kwetsbare_locatie
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.000001
                - when:
                    operation: IN
                    subject: $gebouw_of_locatie_type
                    values:
                      - beperkt_kwetsbaar_gebouw
                      - beperkt_kwetsbare_locatie
                  then:
                    operation: LESS_THAN_OR_EQUAL
                    subject: $plaatsgebonden_risico_per_jaar
                    value: 0.00001
              default: false
  - number: 5.30.2
    text: |-
      Aan het eerste lid, onder b, wordt voldaan door inachtneming van een berekende afstand. Op het berekenen van de
      afstand zijn de bij ministeriële regeling gestelde regels van toepassing. De afstand geldt voor beperkt kwetsbare,
      kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare locaties tot de begrenzing, bedoeld in
      [artikel 5.9][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
  - number: '5.31'
    text: |-
      De [artikelen 5.32 tot en met 5.34][ref1] zijn van toepassing op het op een locatie toelaten van het opslaan
      en bewerken van stoffen en voorwerpen van ADR-klasse 1 door de Nederlandse of een bondgenootschappelijke
      krijgsmacht, bedoeld in [artikel 3.332 van het Besluit activiteiten leefomgeving][ref2], in verband met het externe
      veiligheidsrisico voor beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties die zijn toegelaten op grond van een omgevingsplan of een omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.31
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
        hoofdstuk: '5'
        paragraaf: 5.1.2
        afdeling: '5.1'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
  - number: '5.32'
    text: |-
      Militaire explosieaandachtsgebieden A, B en C om de activiteit, bedoeld in [artikel 5.31][ref1], zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel5.32
    references:
