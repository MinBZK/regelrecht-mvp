  - number: 8.16.1
    text: |-
      Dit artikel is van toepassing voor zover een aanvraag om een omgevingsvergunning betrekking heeft op het opslaan en
      bewerken van stoffen of voorwerpen van ADR-klasse 1 door de Nederlandse of een bondgenootschappelijke krijgsmacht,
      bedoeld in [artikel 3.332 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel8.16
    references:
