      ammoniak en PM, bedoeld in [artikel 2.8a][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
        hoofdstuk: '2'
        paragraaf: 2.2.1
        afdeling: '2.2'
  - number: 4.2.1
    text: |-
      Als aannemelijk is dat niet wordt voldaan aan de omgevingswaarden, bedoeld in
      de [artikelen 2.3 tot en met 2.7][ref1], bevat een programma als bedoeld in
      [artikel 3.10, eerste lid, van de wet][ref2] de gegevens, bedoeld in bijlage XV, deel A, bij de richtlijn
      luchtkwaliteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.2
    references:
