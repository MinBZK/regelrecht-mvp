  - number: 4.27.1
    text: |-
      Het programma stikstofreductie en natuurverbetering bevat voor de periode waarvoor het geldt voor de in het
      programma opgenomen Natura 2000-gebieden een beschrijving van:
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.a
    text: |-
      de omvang van de stikstofdepositie aan het begin van die periode, onderscheiden naar de bijdrage aan de depositie
      door de belangrijkste sectoren en onderscheiden naar depositie afkomstig uit buitenlandse en binnenlandse bronnen;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.b
    text: |-
      de mate waarin aan het begin van die periode de instandhoudingsdoelstellingen zijn bereikt voor in ieder geval de
      voor stikstof gevoelige habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.c
    text: |-
      de verwachte autonome ontwikkeling van de stikstofemissie door bronnen binnen en buiten de betrokken Natura 2000-
      gebieden en de gevolgen daarvan voor de omvang van de stikstofdepositie in de voor stikstof gevoelige habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.d
    text: 'de getroffen of te treffen maatregelen die bijdragen aan:'
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.d.1°
    text: vermindering van de stikstofdepositie op de voor stikstof gevoelige habitats; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.d.2°
    text: het bereiken van de instandhoudingsdoelstellingen voor in ieder geval de voor stikstof gevoelige habitats;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.e
    text: |-
      de verwachte sociaal-economische effecten en de weging van de haalbaarheid en betaalbaarheid van de maatregelen,
      bedoeld onder d;
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.f
    text: |-
      de verwachte gevolgen van de maatregelen, bedoeld onder d, op de omvang van de stikstofdepositie, respectievelijk
      het bereiken van de instandhoudingsdoelstellingen voor in ieder geval de voor stikstof gevoelige habitats; en
    url: https://wetten.overheid.nl/BWBR0041313/2024-01-01#Artikel4.27
  - number: 4.27.1.g
    text: |-
      de wijze waarop invulling wordt gegeven aan de in [artikel 11.69][ref1] gestelde eisen aan het verzamelen van
      gegevens en de in [artikel 10.36da van het Omgevingsbesluit][ref2] gestelde eisen aan het verstrekken van gegevens.


