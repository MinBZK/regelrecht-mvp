        artikel: '11'
  - number: 13.3a.2
    text: |-
      De bestuurlijke boete bedraagt ten hoogste 50% van het bedrag dat is vastgesteld voor de eerste categorie, bedoeld
      in [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.3a
    references:
      - id: ref1
        bwb_id: BWBR0001854
        artikel: '23'
  - number: 13.3a.3
    text: |-
      In afwijking van het tweede lid bedraagt de op grond van [7.6, tweede lid][ref1], vast te stellen
      bestuurlijke boete ten hoogste het bedrag dat is vastgesteld voor de eerste categorie, bedoeld in
      [artikel 23, vierde lid, van het Wetboek van Strafrecht][ref2], als ten tijde van het begaan van de overtreding
      nog geen vijf jaar zijn verstreken sinds een eerder aan de overtreder opgelegde bestuurlijke boete voor een
      overtreding, behorende tot eenzelfde categorie van gedragingen als bedoeld in het eerste lid, onherroepelijk is
      geworden.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel7
      [ref2]: https://wetten.overheid.nl/BWBR0001854#Artikel23
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.3a
    references:
