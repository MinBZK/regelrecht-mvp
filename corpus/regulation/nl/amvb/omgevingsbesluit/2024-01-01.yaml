        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.23.a
    text: |-
      het gaat om een aanvraag waarvoor gedeputeerde staten op grond van [artikel 4.16, eerste lid][ref1], bevoegd gezag
      zijn; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.23
    references:
