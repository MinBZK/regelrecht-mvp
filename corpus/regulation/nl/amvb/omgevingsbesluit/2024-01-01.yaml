      Het bevoegd gezag stelt het bestuur van de veiligheidsregio waarin de Seveso-inrichting geheel of gedeeltelijk is
      gelegen, tijdig in de gelegenheid om te onderzoeken of de onderdelen van het veiligheidsrapport die gaan over de
      bedrijfsbrandweer en de voorbereiding van de rampenbestrijding, voldoen aan de [artikelen 4.14][ref1], [4.15][ref2]
      en [4.17 van het Besluit activiteiten leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.18
