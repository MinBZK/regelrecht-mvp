  - number: 13.3.3
    text: |-
      Als in een projectbesluit uitdrukkelijk is bepaald dat het besluit geldt als een omgevingsvergunning
      als bedoeld in [artikel 5.52, tweede lid, onder a, van de wet][ref1] en daarbij op grond van
      [artikel 16.20, eerste lid, van de wet][ref2] geen instemming is vereist, berust de bestuursrechtelijke
      handhavingstaak voor de betrokken activiteit, voor zover het gaat om de naleving van de voorschriften van de
      omgevingsvergunning voor die activiteit, in de in het eerste lid, onder a, b en h, bedoelde gevallen ook bij het
      dagelijks bestuur van het waterschap, gedeputeerde staten, respectievelijk Onze Minister van Onderwijs, Cultuur
      en Wetenschap.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 13.3a0
    text: |-
      De bestuursrechtelijke handhavingstaak berust bij het gebruik van gewasbeschermingsmiddelen en biociden als
      bedoeld in [bijlage I bij het Besluit activiteiten leefomgeving][ref1] bij het verrichten van de milieubelastende
      activiteiten, bedoeld in de [artikelen 3.184][ref2], [3.200][ref3], [3.205][ref4], [3.208][ref5], [3.211][ref6],
      [3.215][ref7], [3.218][ref8] en [3.250 van dat besluit][ref9], ook bij Onze Minister van Infrastructuur en
      Waterstaat en bij Onze Minister van Landbouw, Natuur en Voedselkwaliteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
