        artikel: '18'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '18'
  - number: 13.5.1
    text: |-
      De bestuursorganen die zijn belast met de uitvoerings- en handhavingstaak stellen een uitvoerings- en
      handhavingsstrategie vast in een of meer documenten waarin gemotiveerd wordt aangegeven welke doelen worden gesteld
      voor de uitvoering en handhaving en welke werkzaamheden met het oog op die doelen zullen worden verricht.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.5
  - number: 13.5.2
    text: |-
      De bestuursorganen die deelnemen in een omgevingsdienst stellen gezamenlijk een uniforme uitvoerings- en
      handhavingsstrategie vast voor de werkzaamheden, bedoeld in [artikel 13.12, eerste lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.5
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.3
        afdeling: '13.2'
  - number: 13.5.3
    text: |-
      De handhavingsstrategie wordt zo nodig afgestemd met de instanties die zijn belast met de strafrechtelijke
      handhaving.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.5
  - number: 13.5.4
    text: |-
      De handhavingsstrategie wordt gebaseerd op een analyse van de problemen die zich kunnen voordoen bij de naleving
      van het bepaalde bij of krachtens de [wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 13.6.1
    text: 'De uitvoerings- en handhavingsstrategie biedt in ieder geval inzicht in:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
  - number: 13.6.1.a
    text: |-
      de prioriteitenstelling voor het verrichten van de werkzaamheden, bedoeld in [artikel 13.5, eerste lid][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
