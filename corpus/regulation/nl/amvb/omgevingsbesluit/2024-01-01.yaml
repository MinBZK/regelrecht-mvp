        artikel: 7ag
      - id: ref5
        bwb_id: BWBR0005181
        artikel: 7ai
  - number: 10.26d.a
    text: |-
      de datum van de beschikking tot toelating van het instrument, de bedrijfsnaam en de plaats van vestiging van de
      instrumentaanbieder, en het nummer van inschrijving van de instrumentaanbieder in het handelsregister;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26d
  - number: 10.26d.b
    text: |-
      de naam van het toegelaten instrument, met vermelding van de gevolgklassen en de type bouwwerken waarop het
      instrument is gericht;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26d
  - number: 10.26d.c
    text: |-
      de datum van de aan de instrumentaanbieder gegeven waarschuwing en de datum en de termijn van de schorsing of
      intrekking van de toelating van een instrument met vermelding van de reden voor de waarschuwing, schorsing of
      intrekking.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26d
  - number: 10.26e.1
    text: |-
      De toelatingsorganisatie neemt binnen twee werkdagen na ontvangst daarvan de gegevens,
      bedoeld in [artikel 7ah, eerste lid, van de Woningwet][ref1], op in het register, bedoeld in
      [artikel 7ai, eerste lid, van die wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel7ah
      [ref2]: https://wetten.overheid.nl/BWBR0005181#Artikel7ai
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 7ah
      - id: ref2
        bwb_id: BWBR0005181
        artikel: 7ai
  - number: 10.26e.2
    text: |-
      Bij het verstrekken van de gegevens, bedoeld in het eerste lid, aan de toelatingsorganisatie vermeldt de
      instrumentaanbieder:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.a
    text: |-
      de bedrijfsnaam en de plaats van vestiging van de kwaliteitsborger en het nummer van inschrijving van de
      kwaliteitsborger in het handelsregister;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.b
    text: vermelding van de gevolgklasse en de type bouwwerken waarop de toestemming is gericht;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.c
    text: 'voor zover van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.c.1°
    text: de reden voor de waarschuwing en de datum waarop de waarschuwing is gegeven;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.c.2°
    text: de reden voor de schorsing en de datum en de termijn van de schorsing; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: 10.26e.2.c.3°
    text: de reden voor de intrekking en de datum van de intrekking.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26e
  - number: '10.27'
    text: |-
      De bestuursorganen, bedoeld in [artikel 11.1 van het Besluit kwaliteit leefomgeving][ref1], verstrekken de
      gegevens over externe veiligheid, bedoeld in de [artikelen 11.2][ref2], [11.3][ref3], [11.4][ref4], [11.6][ref5]
      en [11.7 van dat besluit][ref6], aan Onze Minister van Infrastructuur en Waterstaat:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel11
