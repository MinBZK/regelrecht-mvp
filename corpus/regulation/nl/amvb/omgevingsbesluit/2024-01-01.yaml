      onderzoeken of de onderdelen van het veiligheidsrapport die gaan over de bescherming van de veiligheid en de
      gezondheid van de werknemers, de werkgever en zelfstandige voldoen aan de [artikelen 4.14][ref2], [4.15][ref3] en
      [4.18 van het Besluit activiteiten leefomgeving][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.18
