  - number: 13.3a.1
    text: |-
      Als regels als bedoeld in [artikel 18.15a, eerste lid, van de wet][ref1] bij overtreding waarvan Onze Minister
      voor Natuur en Stikstof een bestuurlijke boete kan opleggen worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.3a
