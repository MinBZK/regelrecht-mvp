  - number: 10.24.1.k
    text: |-
      een wateractiviteit anders dan bedoeld in de onderdelen f tot en met i, met uitzondering van een als
      wateractiviteit aan te merken beperkingengebiedactiviteit, als die betrekking heeft op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.24
