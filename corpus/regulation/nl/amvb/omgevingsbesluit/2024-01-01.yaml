  - number: 10.27.a
    text: |-
      als het gaat om een activiteit met externe veiligheidsrisico’s als bedoeld in de [artikelen 5.23][ref1],
      [5.26][ref2], [5.31 van dat besluit][ref3] of [bijlage VII, onder A, B, D, onder 1, en E, bij dat besluit][ref4],
      of waarvoor een vergunning is verleend op grond van [artikel 15, aanhef en onder b, van de Kernenergiewet][ref5],
      onverwijld na:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041313
      [ref5]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
      - id: ref2
