    De Afdeling advisering van de Raad van State gehoord (advies van 22 december 2017, nr. W14.17.0197/IV);

    Gezien het nader rapport van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties van 29 juni 2018,
    nr. 2018-0000524072, uitgebracht mede namens Onze Minister van Economische Zaken en Klimaat, Onze Minister
