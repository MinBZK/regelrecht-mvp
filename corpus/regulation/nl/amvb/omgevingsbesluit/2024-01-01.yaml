        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 10.42d
    text: |-
      Een PRTR-verslag wordt ingediend met gebruikmaking van een elektronisch formulier. Het formulier wordt door Onze
      Minister van Infrastructuur en Waterstaat beschikbaar gesteld op e-mjv.nl.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.42d
  - number: '10.43'
    text: |-
      Het bestuursorgaan, bedoeld in [artikel 11.56 van het Besluit kwaliteit leefomgeving][ref1], doet van het uitstel
      van de afgifte van de verklaring, bedoeld in [artikel 11.57, derde lid, van dat besluit][ref2], uiterlijk op
      30 juni van het kalenderjaar volgend op het verslagjaar, schriftelijk mededeling aan degene die de activiteit,
      bedoeld in bijlage I bij de PRTR-verordening, verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.43
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.44.1
    text: |-
      Het bestuursorgaan, bedoeld in [artikel 11.56 van het Besluit kwaliteit leefomgeving][ref1], verstrekt de
      gegevens, bedoeld in [artikel 5.10 van het Besluit activiteiten leefomgeving][ref2], na de kwaliteit daarvan
      te hebben beoordeeld, telkens uiterlijk op 30 september van het kalenderjaar volgend op het verslagjaar in
      elektronische vorm aan Onze Minister van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '5'
  - number: 10.44.2
    text: 'Het eerste lid is niet van toepassing:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.44
  - number: 10.44.2.a
    text: |-
      op gegevens waarover het bestuursorgaan op grond van
      [artikel 11.57, tweede lid, van het Besluit kwaliteit leefomgeving][ref1] heeft verklaard dat ze niet aan
      [artikel 5.10][ref2], [5.12][ref3] of [5.13 van het Besluit activiteiten leefomgeving][ref4] voldoen; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '5'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '5'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '5'
  - number: 10.44.2.b
    text: |-
      als het bestuursorgaan op grond van [artikel 11.58 van het Besluit kwaliteit leefomgeving][ref1] heeft verklaard
      dat geen PRTR-verslag is ingediend.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.44
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.44.3
    text: |-
      In de gevallen, bedoeld in het tweede lid, meldt het bestuursorgaan aan Onze Minister van Infrastructuur en
      Waterstaat dat een verklaring als bedoeld in het tweede lid, aanhef en onder a of onder b, is afgegeven, uiterlijk
      op 30 september van het kalenderjaar volgend op het verslagjaar of, als dat eerder is, zodra die verklaring in
      werking is getreden.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.44
  - number: 10.45.1
    text: |-
      Als het bestuursorgaan, bedoeld in [artikel 11.56 van het Besluit kwaliteit leefomgeving][ref1], op grond van
      [artikel 11.60, eerste lid, van dat besluit][ref2] heeft beslist bepaalde in het PRTR-verslag opgenomen gegevens
      niet aan Onze Minister van Infrastructuur en Waterstaat te verstrekken, deelt dat bestuursorgaan uiterlijk op
      30 september van het kalenderjaar volgend op het verslagjaar aan Onze Minister van Infrastructuur en Waterstaat
      mee:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.45.1.a
    text: welk type informatie geheim is gehouden; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
  - number: 10.45.1.b
    text: |-
      welke uitzonderingsgrond, bedoeld in [artikel 5.1 van de Wet open overheid][ref1], is toegepast.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: 10.45.2
    text: De mededeling bevat een samenvatting van de motivering van de beslissing.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
  - number: 10.45.3
    text: |-
      Als de mededeling betrekking heeft op het geheimhouden van de naam van een verontreinigende
      stof, wordt de naam aangegeven van de groep verontreinigende stoffen, bedoeld in
      [bijlage VI bij het Besluit activiteiten leefomgeving][ref1], waartoe de geheimgehouden verontreinigende stof
      behoort.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 10.45.4
    text: |-
      In afwijking van [artikel 10.44, eerste lid][ref1], worden gegevens waarvoor een verzoek als bedoeld in
      [artikel 11.60, eerste lid, van het Besluit kwaliteit leefomgeving][ref2] is afgewezen, niet eerder verstrekt dan
      nadat dat besluit in werking is getreden.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.45
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.6
        afdeling: '10.8'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: '10.46'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt de gegevens en verklaringen, bedoeld in
      [artikel 11.63 van het Besluit kwaliteit leefomgeving][ref1], uiterlijk op 31 maart van het
      tweede kalenderjaar volgend op het verslagjaar per verslagjaar beschikbaar via het PRTR, bedoeld in
      [bijlage I bij het Besluit kwaliteit leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.46
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
  - number: '10.48'
    text: |-
      Een instantie of een bestuursorgaan, aangewezen als siteholder in het managementplan, bedoeld in de Operational
      guidelines for the implementation of the World Heritage Convention, verstrekt aan Onze Minister van Onderwijs,
      Cultuur en Wetenschap op verzoek de gegevens die nodig zijn om te kunnen voldoen aan artikel 29 van het
      werelderfgoedverdrag.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.48
  - number: 10.49.1
    text: |-
      Als een instantie of een bestuursorgaan als bedoeld in [artikel 10.48][ref1] op de hoogte is van een voornemen om
      een activiteit te verrichten die de uitzonderlijke universele waarde van een werelderfgoed kan aantasten, stelt
      die instantie of dat bestuursorgaan Onze Minister van Onderwijs, Cultuur en Wetenschap daarvan zo spoedig mogelijk,
      maar in ieder geval voordat zich onomkeerbare gevolgen kunnen voordoen, op de hoogte.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.49
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.7
        afdeling: '10.8'
  - number: 10.49.2
    text: |-
      Het eerste lid is ook van toepassing op een ander bestuursorgaan dat is belast met de uitoefening van taken en
      bevoegdheden op grond van de [wet][ref1] als het werelderfgoed op zijn grondgebied ligt of als de uitoefening van
      een taak of bevoegdheid de uitzonderlijke universele waarde van een werelderfgoed kan aantasten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.49
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 10.49a
    text: |-
      Onze Minister voor Klimaat en Energie stelt de broeikasgasinventarissen, bedoeld in
      [artikel 11.66, tweede lid, van het Besluit kwaliteit leefomgeving][ref1], elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.49a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.49b
    text: |-
      Onze Minister voor Klimaat en Energie brengt berichten over maatregelen ter
      verduurzaming van het energiegebruik die via de elektronische voorziening, bedoeld
      in [artikel 5.15c, eerste lid, van het Besluit activiteiten leefomgeving][ref1] en
      [artikel 3.84a, tweede lid, van het Besluit bouwwerken leefomgeving][ref2], zijn ingediend, onverwijld binnen het
      bereik van het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.49b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '3'
  - number: 10.50.1
    text: |-
      Bij de totstandkoming van een geluidbelastingkaart als bedoeld in
      [artikel 20.17, eerste lid, onder a, van de wet][ref1] overlegt het bevoegd gezag met de bevoegde autoriteiten van
      de aangrenzende lidstaten, voor zover die kaart ook betrekking heeft op grensregio’s.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.50
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 10.50.2
    text: Het bevoegd gezag actualiseert een geluidbelastingkaart elke vijf jaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.50
  - number: 10.50.3
    text: Het bevoegd gezag stelt een geluidbelastingkaart elektronisch beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.50
  - number: 10.51.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat actualiseert kaarten van de kustlijn als bedoeld in
      [artikel 20.17, eerste lid, onder b, van de wet][ref1] uiterlijk 15 februari 2024 en daarna elke zes jaar.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.51
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 10.51.2
    text: Onze Minister van Infrastructuur en Waterstaat stelt kaarten van de kustlijn elektronisch beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.51
  - number: 10.52.1
    text: |-
      Bij de totstandkoming van overstromingsgevaarkaarten en overstromingsrisicokaarten als bedoeld in
      [artikel 20.17, eerste lid, onder c, van de wet][ref1] overleggen gedeputeerde staten met:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.52
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 10.52.1.a
    text: de bevoegde autoriteiten van andere staten in de stroomgebiedsdistricten Rijn, Maas, Schelde en Eems; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.52
  - number: 10.52.1.b
    text: |-
      het dagelijks bestuur van het waterschap en het college van burgemeester en wethouders als een
      stroomgebiedsdistrict of een gedeelte daarvan op het grondgebied van het waterschap of die gemeente ligt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.52
  - number: 10.52.2
    text: |-
      Gedeputeerde staten actualiseren de overstromingsgevaarkaarten en overstromingsrisicokaarten uiterlijk 22 december
      2025 en daarna elke zes jaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.52
  - number: 10.52.3
    text: |-
      Gedeputeerde staten stellen de overstromingsgevaarkaarten en overstromingsrisicokaarten, bedoeld in
      [artikel 11.17 van het Besluit kwaliteit leefomgeving][ref1], elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.52
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 11.1.1
    text: |-
      Het bevoegd gezag neemt het resultaat van de beoordeling of sprake is van aanzienlijke milieueffecten, bedoeld in
      [artikel 16.36, vijfde lid, van de wet][ref1], met de bijbehorende motivering op in het plan of programma en, voor
      zover hier sprake van is, in het ontwerp van het plan of programma.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.1.2
    text: |-
      [Artikel 16.36, derde lid, van de wet][ref1] is niet van toepassing op een plan of programma:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.1.2.a
    text: |-
      dat het kader vormt voor te nemen besluiten voor een project als bedoeld in
      [artikel 16.43, eerste lid, onder a, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.1.2.b
    text: |-
      dat het benodigde besluit is voor een project als bedoeld in [artikel 16.43, eerste lid, onder a, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.1.3
    text: |-
      Een beoordeling of sprake is van aanzienlijke milieueffecten van een plan of programma als bedoeld in
      [artikel 16.36, derde lid, van de wet][ref1] dat het gebruik bepaalt van kleine gebieden op lokaal niveau vindt
      alleen plaats als:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.1.3.a
    text: voor dat plan of programma een bestuursorgaan van een gemeente het bevoegd gezag is; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
  - number: 11.1.3.b
    text: de omvang van dat gebied in verhouding tot het totale grondgebied van de gemeente klein is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
  - number: 11.1.4
    text: |-
      Bij de beoordeling of sprake is van kleine wijzigingen van een plan of programma als bedoeld in
      [artikel 16.36, derde lid, van de wet][ref1], betrekt het bevoegd gezag de context van het plan of programma dat
      wordt gewijzigd en de mate van waarschijnlijkheid dat de wijzigingen aanzienlijke milieueffecten zullen hebben.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: '11.2'
    text: |-
      Uiterlijk op het moment van terinzagelegging van het milieueffectrapport stelt het bevoegd gezag de Commissie voor
      de milieueffectrapportage in de gelegenheid daarover te adviseren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.2
  - number: 11.3.1
    text: 'Het milieueffectrapport bevat in ieder geval de volgende informatie:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.a
    text: |-
      een beschrijving van de inhoud van het plan of programma en de redelijke alternatieven, de belangrijkste
      doelstellingen van het plan of programma en het verband met andere relevante plannen en programma’s;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.b
    text: |-
      de relevante aspecten van de bestaande staat of kwaliteit van het milieu en de mogelijke ontwikkeling daarvan als
      het plan of programma niet wordt uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.c
    text: de milieukenmerken van gebieden waarvoor de effecten van het plan of programma aanzienlijk kunnen zijn;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.d
    text: |-
      alle bestaande milieuproblemen die relevant zijn voor het plan of programma, in het bijzonder de problemen in
      gebieden waar het belang van het beschermen van het milieu een belangrijke rol speelt;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.e
    text: |-
      een beschrijving van de wijze waarop de doelstellingen ter bescherming van het milieu die zijn vastgesteld op
      internationaal, communautair of nationaal niveau en andere milieuoverwegingen zijn betrokken bij het plan of
      programma, voor zover zij relevant zijn voor het plan of programma;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.f
    text: |-
      een beschrijving van de mogelijk aanzienlijke milieueffecten van de uitvoering van het plan of programma en van de
      redelijke alternatieven, met inbegrip van een beoordeling van die milieueffecten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.g
    text: |-
      de voorgenomen maatregelen om de aanzienlijke nadelige milieueffecten van de uitvoering van het plan of programma
      te voorkomen, te beperken of zoveel mogelijk te compenseren;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.h
    text: |-
      een motivering van de selectie van de onderzochte alternatieven en een beschrijving van de wijze waarop de
      milieueffecten zijn vastgesteld en beoordeeld, met inbegrip van de moeilijkheden die bij het verzamelen van de
      vereiste informatie zijn ondervonden, zoals technische tekortkomingen of ontbrekende kennis;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.i
    text: een beschrijving van de voorgenomen monitoringsmaatregelen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.1.j
    text: een niet-technische samenvatting van de op grond van de onderdelen a tot en met i verstrekte informatie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.3.2
    text: |-
      Het milieueffectrapport bevat de informatie die redelijkerwijs mag worden vereist, ook gelet op de stand van kennis
      en beoordelingsmethoden en de inhoud van het plan of programma.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.3
  - number: 11.4.1
    text: |-
      In het plan of programma, waarvoor bij de voorbereiding een milieueffectrapport moet worden gemaakt, vermeldt het
      bevoegd gezag in ieder geval hoe rekening is gehouden met:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.1.a
    text: het milieueffectrapport; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.1.b
    text: het advies van de Commissie voor de milieueffectrapportage.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.2
    text: 'Daarnaast bevat het plan of programma in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.2.a
    text: een samenvatting van de milieuoverwegingen die zijn betrokken bij het vaststellen van het plan of programma;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.2.b
    text: |-
      een samenvatting van de redenen om te kiezen voor het vastgestelde plan of programma, waarbij in ieder geval de in
      het milieueffectrapport beschreven redelijke alternatieven worden betrokken; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.4.2.c
    text: de monitoringsmaatregelen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.4
  - number: 11.5.1
    text: |-
      Het bevoegd gezag monitort de aanzienlijke milieueffecten van de uitvoering van het plan of programma, waarvoor bij
      de voorbereiding een milieueffectrapport moet worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.5
  - number: 11.5.2
    text: Het bevoegd gezag kan hiervoor gebruik maken van bestaande monitoring.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.5
  - number: 11.5.3
    text: Het bevoegd gezag stelt de resultaten van de monitoring elektronisch beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.5
  - number: 11.5.4
    text: |-
      Het bevoegd gezag treft, als dat naar zijn oordeel nodig is, passende maatregelen om de onvoorziene nadelige
      milieueffecten zoveel mogelijk te beperken of ongedaan te maken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.5
  - number: 11.6.1
    text: |-
      [Bijlage V][ref1], kolom 2 in samenhang met kolom 1, bevat de projecten, bedoeld in
      [artikel 16.43, eerste lid, onder a, van de wet][ref2], die aanzienlijke milieueffecten kunnen hebben en waarvoor
      bij de voorbereiding van het besluit een milieueffectrapport moet worden gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0041278
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.6.2
    text: |-
      [Bijlage V][ref1], kolom 3 in samenhang met kolom 1, bevat de projecten, bedoeld in
      [artikel 16.43, eerste lid, onder b, van de wet][ref2], waarvoor moet worden beoordeeld of zij aanzienlijke
      milieueffecten kunnen hebben en, als dat het geval is, waarvoor bij de voorbereiding van het besluit een
      milieueffectrapport moet worden gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0041278
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.6.3
    text: |-
      Als benodigde besluiten als bedoeld in [artikel 16.43, eerste lid, van de wet][ref1], die betrekking hebben op de
      projecten, bedoeld in het eerste en tweede lid, worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.6.3.a
    text: |-
      een projectbesluit als bedoeld in [artikel 5.44 van de wet][ref1], met uitzondering van een projectbesluit dat
      wordt vastgesteld door het dagelijks bestuur van een waterschap;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.6.3.b
    text: |-
      het opnemen van regels in een omgevingsplan die zijn gericht op het uitvoeren van een project van publiek belang
      als bedoeld in [artikel 5.55 van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.6.3.c
    text: |-
      de besluiten, bedoeld in [bijlage V][ref1], kolom 4; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 11.6.3.d
    text: |-
      de besluiten, bedoeld in [artikel 11.8][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.6
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.7.1
    text: |-
      Voor gevallen die zowel in kolom 2 als in kolom 3 van [bijlage V][ref1] zijn aangegeven, wordt bij de voorbereiding
      van het besluit een milieueffectrapport gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 11.7.2
    text: |-
      Bij de vaststelling of sprake is van een project als bedoeld in [artikel 11.6, eerste of tweede lid][ref1], wordt
      het gehele project in beschouwing genomen, met inbegrip van de grensoverschrijdende onderdelen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.7.3
    text: |-
      Projecten als bedoeld in [bijlage V][ref1], kolom 2, in samenhang met kolom 1, die alleen of hoofdzakelijk
      dienen voor het ontwikkelen en beproeven van nieuwe methoden of producten en die niet langer dan twee jaar worden
      gebruikt, worden in afwijking van [artikel 11.6, eerste lid][ref2], aangemerkt als projecten als bedoeld in artikel
      11.6, tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041278
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.7.4
    text: |-
      Onder een wijziging of uitbreiding als bedoeld in [bijlage V][ref1], kolom 3, wordt ook verstaan:


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 11.7.4.a
    text: |-
      een wijziging die betrekking heeft op reconstructie of een andere verandering van aangelegde werken, ingerichte
      gebieden of bestaande installaties; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
  - number: 11.7.4.b
    text: |-
      een uitbreiding die betrekking heeft op het opnieuw in gebruik nemen van aangelegde werken, ingerichte gebieden of
      bestaande installaties.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.7
  - number: 11.8.1
    text: |-
      Als in [bijlage V][ref1], kolom 4, de omgevingsvergunning voor een milieubelastende activiteit is aangewezen,
      wordt ook de omgevingsvergunning voor een lozingsactiviteit van afvalwater op een oppervlaktewaterlichaam of een
      zuiveringtechnisch werk bedoeld voor zover in [hoofdstuk 3 van het Besluit activiteiten leefomgeving][ref2] is
      bepaald dat het is verboden om:


      [ref1]: https://wetten.overheid.nl/BWBR0041278
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
      - id: ref2
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 11.8.1.a
    text: zonder omgevingsvergunning die milieubelastende activiteit te verrichten; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.8
  - number: 11.8.1.b
    text: |-
      zonder omgevingsvergunning afvalwater afkomstig van die activiteit op een oppervlaktewaterlichaam of een
      zuiveringtechnisch werk te lozen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.8
  - number: 11.8.2
    text: |-
      Als geen sprake is van een besluit als bedoeld in [artikel 11.6, derde lid][ref1], kan het bevoegd gezag een ander
      besluit aanwijzen dat nodig is voor een project waarvoor moet worden beoordeeld of dat aanzienlijke milieueffecten
      kan hebben en, als dat het geval is, waarvoor bij de voorbereiding van dat besluit een milieueffectrapport moet
      worden gemaakt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.8.3
    text: |-
      Als voor een project een omgevingsvergunning voor een omgevingsplanactiviteit wordt aangevraagd,
      wordt die omgevingsvergunning voor een omgevingsplanactiviteit aangemerkt als het besluit, bedoeld in
      [artikel 16.43, eerste lid, van de wet][ref1], in plaats van het besluit tot vaststelling van een omgevingsplan,
      bedoeld in [bijlage V][ref2], kolom 4.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0041278
  - number: 11.9.1
    text: |-
      Bij een verzoek om ontheffing als bedoeld in [artikel 16.44, tweede lid, van de wet][ref1] verstrekt degene die
      voornemens is het project uit te voeren in ieder geval de volgende gegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.9.1.a
    text: een beschrijving van het voorgenomen project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
  - number: 11.9.1.b
    text: een beschrijving van de omstandigheden waaronder het project zal worden uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
  - number: 11.9.1.c
    text: de redenen voor het verzoek; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
  - number: 11.9.1.d
    text: een aanduiding van de mogelijk aanzienlijke milieueffecten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
  - number: 11.9.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat geeft op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde
      wijze kennis van:


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 11.9.2.a
    text: |-
      de ontheffing, bedoeld in [artikel 16.44, tweede lid, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.9.2.b
    text: |-
      indien van toepassing, de gegevens die zijn verzameld bij een andere vorm van beoordeling van de milieueffecten,
      bedoeld in [artikel 16.44, derde lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.10.1
    text: |-
      Bij een mededeling als bedoeld in [artikel 16.45, eerste lid, van de wet][ref1] verstrekt degene die voornemens is
      het project uit te voeren in ieder geval een beschrijving van:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.10.1.a
    text: 'het project, met in ieder geval een beschrijving van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.a.1°
    text: de fysieke kenmerken van het gehele project en, als dat van toepassing is, van de sloopactiviteiten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.a.2°
    text: |-
      de locatie van het project, met bijzondere aandacht voor de kwetsbaarheid van het milieu in de gebieden waarop het
      project van invloed kan zijn;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.b
    text: de mogelijk aanzienlijke milieueffecten van het project; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.c
    text: |-
      voor zover er informatie over deze effecten beschikbaar is: de mogelijk aanzienlijke milieueffecten van het project
      als gevolg van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.c.1°
    text: de verwachte residuen en emissies en de productie van afvalstoffen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.1.c.2°
    text: het gebruik van natuurlijke bronnen, waaronder bodem, land, water en biodiversiteit.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.2
    text: |-
      Bij het verstrekken van de informatie, bedoeld in het eerste lid, houdt degene die voornemens is het project uit
      te voeren rekening met de relevante criteria van bijlage III bij de mer-richtlijn en, voor zover relevant, met de
      beschikbare resultaten van andere relevante beoordelingen van de milieueffecten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.10.3
    text: |-
      Bij de mededeling kan een beschrijving worden verstrekt van de kenmerken van het voorgenomen project en van de
      voorgenomen maatregelen om mogelijk aanzienlijke milieueffecten te vermijden of te voorkomen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.10
  - number: 11.11.1
    text: |-
      Het bevoegd gezag neemt binnen zes weken na ontvangst van de mededeling de beslissing, bedoeld in
      [artikel 16.43, tweede lid, van de wet][ref1], op grond van de informatie, bedoeld in [artikel 11.10][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.11.2
    text: |-
      Het bevoegd gezag neemt het resultaat van de beoordeling of sprake is van aanzienlijke milieueffecten, bedoeld in
      [artikel 16.43, tweede lid, van de wet][ref1], met de bijbehorende motivering op in het besluit en, voor zover hier
      sprake van is, in het ontwerp van het besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.11.3
    text: 'In de motivering van de beslissing wordt in ieder geval verwezen naar:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
  - number: 11.11.3.a
    text: de relevante criteria van bijlage III bij de mer-richtlijn; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
  - number: 11.11.3.b
    text: 'als is beslist dat geen milieueffectrapport moet worden gemaakt:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
  - number: 11.11.3.b.1°
    text: |-
      de kenmerken en maatregelen, bedoeld in [artikel 11.10, derde lid][ref1], als degene die voornemens is het project
      uit te voeren deze heeft voorgesteld; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.11.3.b.2°
    text: het moment waarop die maatregelen moeten zijn uitgevoerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.11
  - number: 11.12.1
    text: |-
      Als het bevoegd gezag degene is die voornemens is het project uit te voeren waarvoor een milieueffectrapport moet
      worden gemaakt, zorgt het bevoegd gezag in ieder geval voor een passende scheiding tussen conflicterende functies
      bij de ambtelijke voorbereiding van het besluit.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.12
  - number: 11.12.2
    text: |-
      Het bevoegd gezag legt de wijze waarop het zorg draagt voor een passende scheiding vast in een beschrijving van de
      werkprocessen en procedures en draagt zorg voor de naleving daarvan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.12
  - number: 11.13.1
    text: |-
      Het bevoegd gezag brengt advies uit over de reikwijdte en het detailniveau, bedoeld in
      [artikel 16.46, eerste lid, van de wet][ref1], met inachtneming van de informatie die is verstrekt door degene die
      voornemens is het project uit te voeren, in het bijzonder over:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.13.1.a
    text: de specifieke kenmerken van het project, waaronder de locatie en de technische capaciteit; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.13
  - number: 11.13.1.b
    text: de te verwachten milieueffecten van het project.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.13
  - number: 11.13.2
    text: |-
      Binnen zes weken na ontvangst van het verzoek, bedoeld in [artikel 16.46, eerste lid, van de wet][ref1], brengt het
      bevoegd gezag advies uit. Het bevoegd gezag kan de termijn eenmaal met ten hoogste zes weken verlengen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: '11.14'
    text: |-
      Als toepassing wordt gegeven aan [artikel 16.47, eerste lid, van de wet][ref1], stelt het bevoegd gezag de
      Commissie voor de milieueffectrapportage uiterlijk op het moment van terinzagelegging van het milieueffectrapport
      in de gelegenheid daarover te adviseren.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: '11.15'
    text: |-
      Als voor een project een milieueffectrapport moet worden gemaakt en voor dat project een ontwerpbesluit ter inzage
      is gelegd waarvoor op grond van [artikel 16.53c van de wet][ref1] een passende beoordeling is gemaakt, wordt
      de passende beoordeling ook tegelijkertijd met het milieueffectrapport door het bevoegd gezag voor het besluit
      waarvoor het milieueffectrapport wordt gemaakt, ter inzage gelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.16.1
    text: 'Het milieueffectrapport bevat in ieder geval de volgende informatie:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.a
    text: een beschrijving van het project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.b
    text: |-
      een beschrijving van de redelijke alternatieven voor het project en de specifieke kenmerken ervan, met inbegrip van
      een vergelijking van de milieueffecten, en een motivering voor de gekozen optie in het licht van de milieueffecten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.c
    text: |-
      een beschrijving van de relevante aspecten van de bestaande staat of kwaliteit van het milieu en de mogelijke
      ontwikkelingen daarvan als het project niet wordt uitgevoerd voor zover natuurlijke veranderingen redelijkerwijs
      kunnen worden beoordeeld op basis van beschikbare milieu-informatie en wetenschappelijke kennis;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.d
    text: |-
      een beschrijving van de factoren bevolking, gezondheid, biodiversiteit, land, bodem, water, lucht, klimaat,
      materiële goederen, cultureel erfgoed en landschap, waarop het project aanzienlijke milieueffecten kan hebben, en
      de samenhang daartussen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.e
    text: een beschrijving van de mogelijk aanzienlijke milieueffecten van het project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.f
    text: |-
      een beschrijving van de methoden of bewijsstukken die zijn gebruikt voor de identificatie en de beoordeling van de
      aanzienlijke milieueffecten, met inbegrip van de moeilijkheden die bij het verzamelen van de vereiste informatie
      zijn ondervonden;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.g
    text: |-
      een beschrijving van de kenmerken van het project en de voorgenomen maatregelen om alle beschreven aanzienlijke
      nadelige milieueffecten te vermijden, te voorkomen, te beperken en, als dat mogelijk is, te compenseren en, voor
      zover van toepassing, van voorgestelde monitoringsmaatregelen en procedures voor monitoring;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.h
    text: |-
      een beschrijving van de verwachte aanzienlijke nadelige milieueffecten van het project die voortvloeien uit de
      kwetsbaarheid van het project voor risico’s op zware ongevallen of rampen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.i
    text: een niet-technische samenvatting van de op grond van de onderdelen a tot en met h verstrekte informatie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.1.j
    text: |-
      een referentielijst waarin de bronnen worden vermeld die zijn gebruikt voor de in het milieueffectrapport opgenomen
      beschrijvingen en beoordelingen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.2
    text: |-
      Bij de beschrijving, bedoeld in het eerste lid, onder g, wordt aangegeven in welke mate aanzienlijke nadelige
      milieueffecten worden vermeden, voorkomen, beperkt of gecompenseerd in zowel de bouwfase als de bedrijfsfase.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.3
    text: |-
      Voor zover van toepassing omvat de beschrijving, bedoeld in het eerste lid, onder h, de geplande maatregelen om de
      aanzienlijke nadelige milieueffecten van dergelijke gebeurtenissen te voorkomen of te beperken, en informatie over
      paraatheid en de voorgenomen reactie bij dergelijke noodsituaties.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: 11.16.4
    text: |-
      Wanneer een advies over de reikwijdte en het detailniveau, bedoeld in [artikel 16.46, eerste lid, van de wet][ref1],
      is uitgebracht, is het milieueffectrapport gebaseerd op dat advies. Het milieueffectrapport bevat de informatie
      die redelijkerwijs mag worden vereist om tot een gemotiveerde conclusie over de aanzienlijke milieueffecten van het
      project te komen, waarbij rekening wordt gehouden met de bestaande kennis en beoordelingsmethoden.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.16.5
    text: |-
      Om overlapping van milieueffectrapporten te voorkomen, wordt bij het maken van het milieueffectrapport rekening
      gehouden met de beschikbare resultaten die op grond van verordeningen, richtlijnen en besluiten als bedoeld in
      artikel 288 van het Verdrag betreffende de werking van de Europese Unie zijn verkregen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.16
  - number: '11.17'
    text: |-
      De beschrijving van het project, bedoeld in [artikel 11.16, eerste lid, onder a][ref1], bevat in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.17
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.17.a
    text: een beschrijving van de locatie van het project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.17
  - number: 11.17.b
    text: |-
      een beschrijving van de fysieke kenmerken van het gehele project en, als dat van toepassing is, van de
      sloopactiviteiten, en de eisen over landgebruik tijdens de bouw- en bedrijfsfase;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.17
  - number: 11.17.c
    text: |-
      een beschrijving van de belangrijkste kenmerken van de bedrijfsfase van het project, waaronder de
      productieprocessen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.17
  - number: 11.17.d
    text: |-
      een prognose van de soort en de hoeveelheid van de verwachte residuen en emissies en de hoeveelheden en soorten
      tijdens de bouw- en bedrijfsfase geproduceerde afvalstoffen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.17
  - number: 11.18.1
    text: |-
      De beschrijving van de mogelijk aanzienlijke milieueffecten van het project, bedoeld in
      [artikel 11.16, eerste lid, onder e][ref1], op de in artikel 11.16, eerste lid, onder d, bedoelde factoren, bevat
      in ieder geval een beschrijving van:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.18.1.a
    text: de realisatie en het bestaan van het project, en, als dat van toepassing is, van de sloopactiviteiten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.b
    text: |-
      het gebruik van natuurlijke bronnen, met name land, bodem, water en biodiversiteit, waarbij zoveel mogelijk
      rekening wordt gehouden met de duurzame beschikbaarheid van deze bronnen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.c
    text: |-
      de uitstoot van verontreinigende stoffen, geluidhinder, trillingen, licht, warmte, straling, het ontstaan van
      milieuhinder en het verwijderen en terugwinnen van afvalstoffen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.d
    text: de risico’s voor de gezondheid, het cultureel erfgoed of het milieu;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.e
    text: |-
      de cumulatie van effecten met andere bestaande of goedgekeurde projecten, waarbij rekening wordt gehouden met alle
      bestaande milieuproblemen van gebieden die vanuit milieuoogpunt van bijzonder belang zijn en waarop het project van
      invloed kan zijn, of met het gebruik van natuurlijke bronnen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.f
    text: het effect van het project op het klimaat en de kwetsbaarheid van het project voor klimaatverandering; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.1.g
    text: de gebruikte technologieën en stoffen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.2
    text: |-
      De beschrijving van de mogelijk aanzienlijke milieueffecten van het project heeft betrekking op de directe en, voor
      zover van toepassing, de indirecte, secundaire, cumulatieve en grensoverschrijdende effecten op korte, middellange
      en lange termijn, permanente en tijdelijke en positieve en negatieve effecten van het project.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.18.3
    text: |-
      De beschrijving van de mogelijk aanzienlijke milieueffecten van het project houdt rekening met de Europese of
      nationale doelstellingen over milieubescherming, die relevant zijn voor het project.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.18
  - number: 11.19.1
    text: |-
      In het besluit waarvoor bij de voorbereiding een milieueffectrapport moet worden gemaakt, vermeldt het bevoegd
      gezag in ieder geval hoe rekening is gehouden met:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.1.a
    text: het milieueffectrapport; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.1.b
    text: indien van toepassing, het advies van de Commissie voor de milieueffectrapportage.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.2
    text: 'Daarnaast bevat het besluit in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.2.a
    text: de gemotiveerde conclusie van het bevoegd gezag over de aanzienlijke milieueffecten van het project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.2.b
    text: alle aan het besluit verbonden voorschriften;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.2.c
    text: |-
      voor zover van toepassing, een beschrijving van alle kenmerken van het project en de voorgenomen maatregelen
      om aanzienlijke nadelige milieueffecten te vermijden, te voorkomen of te beperken en, als dat mogelijk is, te
      compenseren en op welk moment de maatregelen moeten zijn uitgevoerd; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.2.d
    text: |-
      in voorkomend geval, monitoringsmaatregelen en procedures voor de monitoring van die effecten waarvoor het
      bevoegd gezag monitoring noodzakelijk acht, waarbij het soort parameters dat wordt gemonitord en de looptijd van
      de monitoring evenredig moeten zijn aan de aard, de locatie en de omvang van het project en met het belang van
      de milieueffecten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.19.3
    text: |-
      Het bevoegd gezag kan bepalen dat degene die voornemens is het project uit te voeren bestaande monitoring gebruikt
      voor de monitoringsmaatregelen en de procedures voor de monitoring.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.19
  - number: 11.20.1
    text: |-
      Als op grond van [artikel 11.19, tweede lid, onder d][ref1], monitoring plaatsvindt, verstrekt degene die het
      project uitvoert de resultaten van de monitoring aan het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.20
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '11'
        hoofdstuk: '11'
        afdeling: '11.2'
  - number: 11.20.2
    text: Het bevoegd gezag stelt de resultaten van de monitoring elektronisch beschikbaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.20
  - number: 11.20.3
    text: |-
      Het bevoegd gezag treft, als dat naar zijn oordeel nodig is, passende maatregelen om de onvoorziene nadelige
      milieueffecten zoveel mogelijk te beperken of ongedaan te maken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.20
  - number: '11.21'
    text: |-
      Het bevoegd gezag voor het milieueffectrapport verstrekt aan Onze Minister van Infrastructuur en Waterstaat op
      verzoek de bij dat gezag beschikbare gegevens die nodig zijn om te kunnen voldoen aan artikel 12, tweede lid, van
      de mer-richtlijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.21
  - number: 11.22.1
    text: |-
      Als een plan of programma waarvoor een milieueffectrapport moet worden gemaakt mogelijk aanzienlijke
      grensoverschrijdende milieueffecten heeft, deelt het bevoegd gezag dit mee aan de bevoegde autoriteit van de staat
      die deze mogelijke effecten zal ondervinden. Tegelijk met die mededeling, of nadat die autoriteit hierom heeft
      verzocht, zendt het bevoegd gezag aan die autoriteit in ieder geval:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.22.1.a
    text: het ontwerp van het plan of programma;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.22.1.b
    text: |-
      het milieueffectrapport, voor zover dit niet is opgenomen in het ontwerp van het plan of programma, met inbegrip
      van informatie over de mogelijke grensoverschrijdende milieueffecten en een vertaling van de samenvatting van het
      milieueffectrapport in de taal van de andere staat;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.22.1.c
    text: informatie over de totstandkomingsprocedure van het plan of programma; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.22.1.d
    text: |-
      de termijn waarbinnen de bevoegde autoriteit van de andere staat kan aangeven of zij overleg wenst over de
      mogelijke grensoverschrijdende milieueffecten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.22.2
    text: |-
      Het bevoegd gezag doet de mededeling zo spoedig mogelijk en zendt de informatie in ieder geval voor de vaststelling
      van het plan of programma.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.22
  - number: 11.23.1
    text: |-
      Als de bevoegde autoriteit van de andere staat binnen de gestelde termijn heeft aangegeven dat zij overleg wenst,
      overlegt het bevoegd gezag met die autoriteit over de mogelijk aanzienlijke grensoverschrijdende milieueffecten
      van het plan of programma en de voorgenomen maatregelen om de nadelige effecten te voorkomen, te beperken of zoveel
      mogelijk te compenseren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.23
  - number: 11.23.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan contacten onderhouden met de bevoegde autoriteit van de andere
      staat als er geen contact is tussen het bevoegd gezag en die autoriteit of als het overleg niet tot het gewenste
      resultaat heeft geleid. Het bevoegd gezag zendt de benodigde informatie aan Onze Minister van Infrastructuur en
      Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.23
  - number: '11.24'
    text: |-
      Het betrokken publiek en de bevoegde instanties van de andere staat worden in de gelegenheid gesteld zienswijzen
      naar voren te brengen, met overeenkomstige toepassing van [afdeling 3.4 van de Algemene wet bestuursrecht][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.24
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: '11.25'
    text: |-
      Nadat het plan of programma is vastgesteld, verstrekt het bevoegd gezag dat plan of programma aan de bevoegde
      autoriteit van de andere staat, degenen die zienswijzen naar voren hebben gebracht en de bevoegde instanties van de
      andere staat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.25
  - number: 11.26.1
    text: |-
      Als de bevoegde autoriteit van een andere staat heeft meegedeeld dat een plan of programma mogelijk aanzienlijke
      grensoverschrijdende milieueffecten heeft in Nederland, geeft het betrokken bestuursorgaan binnen de door die
      autoriteit gestelde termijn aan of overleg is gewenst.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.26.2
    text: |-
      Als toepassing is gegeven aan het eerste lid, overlegt het betrokken bestuursorgaan met de bevoegde autoriteit
      over de mogelijk aanzienlijke milieueffecten van het plan of programma en de voorgenomen maatregelen om de nadelige
      effecten te voorkomen, te beperken of te compenseren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.26.3
    text: |-
      Als toepassing is gegeven aan het eerste lid, stelt het betrokken bestuursorgaan, in overeenstemming met de
      bevoegde autoriteit, het betrokken publiek en de bevoegde instanties in de gelegenheid zienswijzen naar voren te
      brengen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.26.4
    text: |-
      Als toepassing is gegeven aan het eerste lid, geeft het betrokken bestuursorgaan, in overeenstemming met de
      bevoegde autoriteit en met overeenkomstige toepassing van [artikel 3:42 van de Algemene wet bestuursrecht][ref1],
      kennis van:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 11.26.4.a
    text: het vastgestelde plan of programma;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.26.4.b
    text: |-
      een door de bevoegde autoriteit van de andere staat opgestelde samenvatting van de wijze waarop de
      milieuoverwegingen, de gehouden overleggen, de naar voren gebrachte zienswijzen en het milieueffectrapport zijn
      betrokken bij het vaststellen van het plan of programma; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.26.4.c
    text: de monitoringsmaatregelen waartoe de bevoegde autoriteit heeft besloten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.26
  - number: 11.27.1
    text: |-
      Als een project waarvoor een milieueffectrapport moet worden gemaakt mogelijk aanzienlijke grensoverschrijdende
      milieueffecten heeft, deelt het bevoegd gezag dit mee aan de bevoegde autoriteit van de andere staat die deze
      mogelijke effecten zal ondervinden. Tegelijk met deze mededeling, of zo spoedig mogelijk nadat die autoriteit
      hierom heeft verzocht, zendt het bevoegd gezag aan die autoriteit in ieder geval:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
  - number: 11.27.1.a
    text: |-
      informatie over het project, waaronder alle beschikbare informatie over de mogelijke grensoverschrijdende
      milieueffecten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
  - number: 11.27.1.b
    text: informatie over de aard en de totstandkoming van het te nemen besluit; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
  - number: 11.27.1.c
    text: |-
      informatie over de termijn waarbinnen de bevoegde autoriteit van de andere staat advies kan uitbrengen over het
      milieueffectrapport en zienswijzen naar voren kan brengen over het ontwerp van het besluit.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
  - number: 11.27.2
    text: |-
      Het bevoegd gezag zendt die informatie niet later dan het moment waarop derden op grond van
      [artikel 16.46][ref1] of [16.50 van de wet][ref2] worden betrokken bij het besluit, bedoeld in
      [artikel 16.43, eerste lid, van de wet][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.27.3
    text: |-
      Als sprake is van een projectbesluit, zendt het bevoegd gezag deze informatie niet later dan het moment van de
      kennisgeving van het voornemen om een verkenning uit te voeren naar een mogelijk bestaande of toekomstige opgave in
      de fysieke leefomgeving, bedoeld in [artikel 5.47 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.27
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.28.1
    text: |-
      Als de bevoegde autoriteit van de andere staat aangeeft deel te willen nemen aan de totstandkomingsprocedure van
      het besluit waarvoor een milieueffectrapport moet worden gemaakt, worden het betrokken publiek en de bevoegde
      instanties in de andere staat in ieder geval in de gelegenheid gesteld om:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
  - number: 11.28.1.a
    text: |-
      zienswijzen naar voren te brengen, met overeenkomstige toepassing van
      [afdeling 3.4 van de Algemene wet bestuursrecht][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 11.28.1.b
    text: |-
      als het om een projectprocedure gaat: mogelijke oplossingen aan te dragen voor de mogelijk bestaande of toekomstige
      opgave in de fysieke leefomgeving, met overeenkomstige toepassing van [artikel 5.47, derde lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 11.28.2
    text: |-
      De hiertoe aangewezen bevoegde instanties in de andere staat worden, voor zover van toepassing, in de
      gelegenheid gesteld om advies uit te brengen over de reikwijdte en het detailniveau van de informatie voor het
      milieueffectrapport, met overeenkomstige toepassing van [artikel 16.46 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.28.3
    text: |-
      Voor zover dit nog niet is gebeurd, zendt het bevoegd gezag de volgende informatie aan de bevoegde autoriteit en de
      bevoegde instanties van de andere staat:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
  - number: 11.28.3.a
    text: het ontwerp van het besluit, met inbegrip van het milieueffectrapport;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
  - number: 11.28.3.b
    text: de termijn waarbinnen zienswijzen naar voren kunnen worden gebracht en waarbinnen advies kan worden uitgebracht; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
  - number: 11.28.3.c
    text: een vertaling van de samenvatting van het milieueffectrapport in de taal van de andere staat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
  - number: 11.28.4
    text: |-
      De vertaling van de samenvatting van het milieueffectrapport wordt gemaakt door degene die op grond van
      [artikel 16.43, vijfde lid, van de wet][ref1] het milieueffectrapport maakt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.28
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.29.1
    text: |-
      Binnen een door de partijen afgesproken termijn overlegt het bevoegd gezag met de bevoegde autoriteit van de
      andere staat over de mogelijk aanzienlijke grensoverschrijdende milieueffecten van het project en de voorgenomen
      maatregelen om de nadelige effecten te vermijden, te voorkomen, te beperken en, als dat mogelijk is, te
      compenseren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.29
  - number: 11.29.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat kan contacten onderhouden met de bevoegde autoriteit van de andere
      staat als er geen contact is tussen het bevoegd gezag en die autoriteit of als het overleg niet tot het gewenste
      resultaat heeft geleid. Het bevoegd gezag zendt de benodigde informatie aan Onze Minister van Infrastructuur en
      Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.29
  - number: '11.30'
    text: |-
      Nadat het besluit is vastgesteld, verstrekt het bevoegd gezag dat besluit aan de bevoegde autoriteit, het betrokken
      publiek en de bevoegde instanties van de andere staat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.30
  - number: 11.31.1
    text: |-
      Als het bevoegd gezag voor de uitvoering van een project als bedoeld in
      [artikel 16.43, eerste lid van de wet][ref1], waarvoor bij de voorbereiding van het besluit een milieueffectrapport
      moet worden gemaakt, over nieuwe informatie beschikt over een mogelijk nadelig grensoverschrijdend milieueffect,
      die niet beschikbaar was op het moment dat het besluit werd genomen en die het besluit inhoudelijk zou kunnen
      hebben beïnvloed, deelt het bevoegd gezag deze nieuwe informatie mee aan de bevoegde autoriteit van de andere
      staat.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 11.31.2
    text: |-
      Als een van de staten hierom verzoekt, vindt overleg plaats over de vraag of het besluit naar aanleiding van die
      nieuwe informatie moet worden gewijzigd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.31
  - number: 11.31.3
    text: |-
      Als de staten hiertoe gezamenlijk besluiten, voert het bevoegd gezag een evaluatie uit van het mogelijk nadelige
      grensoverschrijdende milieueffect van de uitvoering van het project, waarvoor bij de voorbereiding van het besluit
      een milieueffectrapport moet worden gemaakt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.31
  - number: 11.32.1
    text: |-
      Als de bevoegde autoriteit van een andere staat heeft meegedeeld dat een project mogelijk aanzienlijke
      grensoverschrijdende milieueffecten heeft in Nederland, geeft het betrokken bestuursorgaan binnen de door die
      autoriteit gestelde termijn aan of deelname aan de procedure van de milieueffectrapportage gewenst is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: 11.32.2
    text: |-
      Als toepassing is gegeven aan het eerste lid, overlegt het betrokken bestuursorgaan met de bevoegde autoriteit over
      de mogelijk aanzienlijke milieueffecten van het project en de voorgenomen maatregelen om de nadelige effecten te
      voorkomen, te beperken of te mitigeren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: 11.32.3
    text: |-
      Als toepassing is gegeven aan het eerste lid, stelt het betrokken bestuursorgaan, in overeenstemming met de
      bevoegde autoriteit, het betrokken publiek en de bevoegde instanties in de gelegenheid zienswijzen naar voren te
      brengen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: 11.32.4
    text: |-
      Als toepassing is gegeven aan het eerste lid, geeft het betrokken bestuursorgaan, in overeenstemming met de
      bevoegde autoriteit en met overeenkomstige toepassing van [artikel 3:42 van de Algemene wet bestuursrecht][ref1],
      kennis van:


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 11.32.4.a
    text: het genomen besluit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: 11.32.4.b
    text: |-
      een door de bevoegde autoriteit opgestelde samenvatting van de wijze waarop de milieuoverwegingen, de gehouden
      overleggen, de naar voren gebrachte zienswijzen en het milieueffectrapport zijn betrokken bij het nemen van een
      besluit voor het project; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: 11.32.4.c
    text: de monitoringsmaatregelen waartoe de bevoegde autoriteit heeft besloten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel11.32
  - number: '12.1'
    text: |-
      De Commissie voor de milieueffectrapportage bestaat uit een voorzitter en ten hoogste veertien plaatsvervangend
      voorzitters.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.1
    machine_readable:
      execution:
        parameters:
          - name: aantal_plaatsvervangend_voorzitters
            type: number
            required: true
            description: Aantal plaatsvervangend voorzitters van de Commissie voor de milieueffectrapportage
            source: {}
        output:
          - name: samenstelling_toegestaan
            type: boolean
            description: Of het aantal plaatsvervangend voorzitters is toegestaan (ten hoogste veertien)
        actions:
          - output: samenstelling_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $aantal_plaatsvervangend_voorzitters
              value: 14
  - number: 12.2.1
    text: |-
      De Commissie voor de milieueffectrapportage heeft een secretaris en een bureau dat onder leiding staat van die
      secretaris.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.2
  - number: 12.2.2
    text: |-
      De secretaris van de Commissie voor de milieueffectrapportage wordt benoemd en ontslagen door de voorzitter van de
      commissie, na overleg met de plaatsvervangend voorzitters.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.2
  - number: '12.3'
    text: |-
      De Commissie voor de milieueffectrapportage brengt jaarlijks voor 1 april aan Onze Minister van Infrastructuur en
      Waterstaat verslag uit van haar werkzaamheden in het voorafgaande kalenderjaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.3
    machine_readable:
      execution:
        parameters:
          - name: datum_einde_verslagjaar
            type: date
            required: true
            description: 31 december van het verslagjaar (het kalenderjaar waarover verslag wordt uitgebracht)
            source: {}
        output:
          - name: uiterlijke_rapportagedatum
            type: date
            description: >-
              Uiterlijke datum waarop het jaarverslag moet
              worden uitgebracht (voor 1 april volgend jaar,
              dus 3 maanden na einde verslagjaar)
        actions:
          - output: uiterlijke_rapportagedatum
            value:
              operation: DATE_ADD
              date: $datum_einde_verslagjaar
              months: 3
  - number: 12.4.1
    text: |-
      Als de Commissie voor de milieueffectrapportage in de gelegenheid wordt gesteld te adviseren, stelt de voorzitter
      of een plaatsvervangend voorzitter daarvoor een werkgroep van deskundigen samen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.4
  - number: 12.4.2
    text: |-
      De secretaris van de Commissie voor de milieueffectrapportage deelt aan het bevoegd gezag en aan degene die het
      milieueffectrapport maakt of zou moeten maken mee uit welke deskundigen de werkgroep bestaat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.4
  - number: 12.4.3
    text: Een werkgroep staat onder voorzitterschap van de voorzitter of een plaatsvervangend voorzitter.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.4
  - number: 12.4.4
    text: De deskundigen in een werkgroep worden aangewezen door de voorzitter of een plaatsvervangend voorzitter.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.4
  - number: 12.4.5
    text: |-
      Als een deskundige niet meer voldoet aan [artikel 17.5, tweede lid, van de wet, ontheft][ref1] de voorzitter van
      de werkgroep hem van zijn deelname in de werkgroep. Als de voorzitter niet de voorzitter van de Commissie voor de
      milieueffectrapportage is, gebeurt dit na overleg met laatstgenoemde voorzitter.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel17
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '17'
  - number: 12.5.1
    text: |-
      De werkgroep, bedoeld in [artikel 12.4, eerste lid][ref1], adviseert aan het bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.5
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '12'
        hoofdstuk: '12'
        afdeling: '12.1'
  - number: 12.5.2
    text: |-
      De adviezen worden uitgebracht in overeenstemming met het gevoelen van de meerderheid van de deskundigen in de
      werkgroep.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.5
  - number: 12.5.3
    text: |-
      Op verzoek van de deskundigen die in de werkgroep een standpunt hebben verdedigd, dat afwijkt van het gevoelen van
      de meerderheid, wordt dat standpunt in het advies vermeld. Deze deskundigen kunnen over een zodanig standpunt een
      afzonderlijke nota bij het advies voegen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.5
  - number: '12.6'
    text: |-
      Er is een OCW-schadebeoordelingscommissie archeologische rijksmonumenten die tot taak
      heeft advies uit te brengen aan bestuursorganen over schadevergoeding als bedoeld in
      [artikel 4:126, eerste lid, van de Algemene wet bestuursrecht][ref1] in samenhang met
      [artikel 15.1, eerste lid, onder k, van de wet][ref2], voor zover de schade voortvloeit uit beslissingen op
      aanvragen om omgevingsvergunningen voor rijksmonumentenactiviteiten met betrekking tot een archeologisch monument.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.6
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
  - number: '12.7'
    text: De OCW-schadebeoordelingscommissie archeologische rijksmonumenten bestaat uit ten hoogste zeven leden.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.7
    machine_readable:
      execution:
        parameters:
          - name: aantal_leden
            type: number
            required: true
            description: Aantal leden van de OCW-schadebeoordelingscommissie archeologische rijksmonumenten
            source: {}
        output:
          - name: samenstelling_toegestaan
            type: boolean
            description: Of het aantal leden is toegestaan (ten hoogste zeven)
        actions:
          - output: samenstelling_toegestaan
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $aantal_leden
              value: 7
  - number: 12.8.1
    text: |-
      De wetenschappelijke autoriteit CITES bestaat uit ten minste vijf en ten hoogste negen leden, de voorzitter
      daaronder begrepen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.8
  - number: 12.8.2
    text: De leden bezitten ook deskundigheid op het gebied van natuurbescherming, welzijn van dieren en opvang van dieren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel12.8
  - number: 13.1.1
    text: |-
      De bestuursrechtelijke handhavingstaak, bedoeld in [artikel 18.1 van de wet][ref1], berust in de volgende gevallen
      niet bij het college van burgemeester en wethouders, maar bij het hierna genoemde bestuursorgaan:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
  - number: 13.1.1.a
    text: |-
      het dagelijks bestuur van het waterschap: bij een door hem vastgesteld peilbesluit als bedoeld in
      [artikel 2.41, eerste lid, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 13.1.1.b
    text: 'gedeputeerde staten:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
  - number: 13.1.1.b.1°
    text: |-
      bij een zwemverbod als bedoeld in [artikel 2.38 van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 13.1.1.b.2°
    text: |-
      bij een door hen ingestelde toegangsbeperking tot een Natura 2000-gebied of een bijzonder nationaal natuurgebied
      als bedoeld in [artikel 2.45 van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 13.1.1.b.3°
    text: |-
      bij een bij omgevingsverordening gestelde verplichting tot monitoring als bedoeld in
      [artikel 20.1 van de wet][ref1] of gegevensverzameling als bedoeld in [artikel 20.6 van de wet][ref2], voor zover
      niet gericht tot een bestuursorgaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 13.1.1.b.4°
    text: |-
      bij de verplichting tot het treffen van maatregelen, gericht op het
      voldoen aan een geluidproductieplafond als omgevingswaarde, bedoeld in
      [artikel 3.45, eerste lid, aanhef en onder a en b, van het Besluit kwaliteit leefomgeving][ref1], en, voor zover
      toepassing is gegeven aan [artikel 2.12a van de wet][ref2], artikel 3.45, tweede lid, aanhef onder a, van dat
      besluit;


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.1
