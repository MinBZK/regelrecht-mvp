        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.23.b
    text: |-
      de omgevingsplanactiviteit verband houdt met een voorschrift dat is of zal worden verbonden aan een
      omgevingsvergunning voor een milieubelastende activiteit als bedoeld in [artikel 4.16, eerste lid, onder b][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.23
    references:
