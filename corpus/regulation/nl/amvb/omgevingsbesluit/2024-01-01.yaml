    Wij Willem-Alexander, bij de gratie Gods, Koning der Nederlanden, Prins van Oranje-Nassau, enz. enz. enz.

    Op de voordracht van Onze Minister van Infrastructuur en Milieu van 30 juni 2017, nr. IenM/BSK-2017/167181,
    Hoofddirectie Bestuurlijke en Juridische Zaken, gedaan mede namens Onze Minister van Binnenlandse Zaken en
    Koninkrijksrelaties, Onze Minister van Economische Zaken en Onze Minister van Onderwijs, Cultuur en Wetenschap;

    Gelet op het Europees landschapsverdrag, de habitatrichtlijn, de grondwaterrichtlijn, de kaderrichtlijn
    afvalstoffen, de kaderrichtlijn mariene strategie, de kaderrichtlijn maritieme ruimtelijke planning, de
    kaderrichtlijn water, het Londen-protocol, de mer-richtlijn, het PRTR-protocol, de PRTR-verordening, de richtlijn
    havenontvangstvoorzieningen, de richtlijn industriële emissies, de richtlijn inspraak en toegang tot de rechter,
    de richtlijn luchtkwaliteit, de richtlijn omgevingslawaai, de richtlijn overstromingsrisico’s, de richtlijn
    stedelijk afvalwater, de richtlijn storten afvalstoffen, de richtlijn toegang tot milieu-informatie, de richtlijn
    winningsafval, het SEA-protocol, de Seveso-richtlijn, de smb-richtlijn, het verdrag van Aarhus, het verdrag
    van Espoo, het verdrag van Granada, het verdrag van Valletta, het VN-Zeerechtverdrag, de vogelrichtlijn, het
    werelderfgoedverdrag, de zwemwaterrichtlijn en de artikelen 2.20, eerste lid, 4.3, 5.7, tweede lid, 5.9, 5.10,
    5.11, 5.12, tweede en derde lid, 5.13, 5.16, tweede lid, 5.36, vijfde lid, 5.47, tweede en vijfde lid, 5.52, tweede
