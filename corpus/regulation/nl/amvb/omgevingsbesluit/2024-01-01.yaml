        artikel: '4'
      - id: ref5
        bwb_id: BWBR0041297
        artikel: '5'
      - id: ref6
        bwb_id: BWBR0041297
        artikel: '6'
      - id: ref7
        bwb_id: BWBR0041297
        artikel: '7'
  - number: 13.12.1.a
    text: |-
      het voorbereiden van beslissingen op aanvragen om omgevingsvergunningen en het voorbereiden van het toepassen van
      [paragraaf 5.1.5 van de wet][ref1], voor activiteiten die zijn aangewezen in [bijlage VI][ref2], categorie 1 tot en
      met 4, met uitzondering van omgevingsvergunningen voor buitenplanse omgevingsplanactiviteiten;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Paragraaf5.1.5
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        paragraaf: 5.1.5
      - id: ref2
        bwb_id: BWBR0041278
  - number: 13.12.1.b
    text: |-
      het beoordelen van meldingen als bedoeld in [artikel 4.4, eerste lid, van de wet][ref1], en het voorbereiden van
      beschikkingen op aanvragen om toestemming tot het treffen van een gelijkwaardige maatregel, voor activiteiten die
      zijn aangewezen in [bijlage VI][ref2], categorie 1 en 5;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041278
  - number: 13.12.1.c
    text: |-
      het voorbereiden van beschikkingen tot het stellen van maatwerkvoorschriften, voor activiteiten die zijn aangewezen
      in [bijlage VI][ref1], categorie 1 en 5;


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 13.12.1.d
    text: 'het houden van toezicht op de naleving van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
  - number: 13.12.1.d.1°
    text: |-
      de verboden, bedoeld in de [artikelen 5.1][ref1], [5.4][ref2], [5.5][ref3] en [5.6 van de wet][ref4], voor
      activiteiten die zijn aangewezen in [bijlage VI][ref5], categorie 1 tot en met 4; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref5]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
