        paragraaf: 4.1.3.3
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.26d
    text: |-
      De toelatingsorganisatie neemt binnen twee werkdagen na de datum waarop een beschikking als bedoeld in
      [artikel 7ad][ref1], [7ae][ref2], [7af][ref3] of [7ag van de Woningwet][ref4] is gegeven in het register, bedoeld
      in [artikel 7ai, eerste lid, van die wet][ref5] op:


      [ref1]: https://wetten.overheid.nl/BWBR0005181#Artikel7ad
      [ref2]: https://wetten.overheid.nl/BWBR0005181#Artikel7ae
      [ref3]: https://wetten.overheid.nl/BWBR0005181#Artikel7af
      [ref4]: https://wetten.overheid.nl/BWBR0005181#Artikel7ag
      [ref5]: https://wetten.overheid.nl/BWBR0005181#Artikel7ai
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26d
    references:
      - id: ref1
        bwb_id: BWBR0005181
        artikel: 7ad
      - id: ref2
