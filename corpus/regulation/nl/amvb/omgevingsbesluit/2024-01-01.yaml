  - number: 1.3.1
    text: |-
      Het verbod, bedoeld in [artikel 1.7a, eerste lid, van de wet][ref1], om een activiteit te verrichten of na te laten
      als door het verrichten of nalaten daarvan aanzienlijke nadelige gevolgen voor de fysieke leefomgeving ontstaan of
      dreigen te ontstaan, geldt voor de volgende activiteiten en nadelige gevolgen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel1
