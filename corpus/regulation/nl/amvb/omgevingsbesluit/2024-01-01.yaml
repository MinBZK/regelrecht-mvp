        afdeling: '4.1'
  - number: 4.21.1
    text: |-
      De gemeenteraad is adviseur voor een aanvraag om een omgevingsvergunning voor zover de aanvraag betrekking heeft op
      een door hem aangewezen geval van een buitenplanse omgevingsplanactiviteit waarvoor het college van burgemeester en
      wethouders bevoegd gezag is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.21
  - number: 4.21.2
    text: |-
      Als het college van burgemeester en wethouders geen bevoegd gezag is voor de aanvraag om een omgevingsvergunning
      voor een aangewezen geval als bedoeld in het eerste lid, maar de voorgenomen beslissing op de aanvraag instemming
      van het college behoeft, is de gemeenteraad adviseur voor het verzoek om instemming.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.21
  - number: 4.22.1
    text: |-
      De commissie, bedoeld in [artikel 17.9 van de wet][ref1], is adviseur voor een aanvraag om een omgevingsvergunning
      waarvoor het college van burgemeester en wethouders bevoegd gezag is voor zover de aanvraag betrekking heeft op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel17
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '17'
  - number: 4.22.1.a
    text: een rijksmonumentenactiviteit met betrekking tot een monument; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.22
  - number: 4.22.1.b
    text: |-
      een andere activiteit, als het gaat om een door de gemeenteraad aangewezen geval of als het college van
      burgemeester en wethouders daartoe aanleiding ziet.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.22
  - number: 4.22.2
    text: |-
      Als het college van burgemeester en wethouders geen bevoegd gezag is voor de aanvraag om een omgevingsvergunning
      voor een activiteit als bedoeld in het eerste lid, maar adviseur, is de commissie ook adviseur en richt het advies
      van de commissie zich tot het college in plaats van tot het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.22
  - number: '4.23'
    text: |-
      In afwijking van [artikel 4.20, tweede lid, aanhef en onder a][ref1], behoeft de voorgenomen beslissing op
      de aanvraag om een omgevingsvergunning voor een omgevingsplanactiviteit geen instemming van het college van
      burgemeester en wethouders als:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.23
    references:
