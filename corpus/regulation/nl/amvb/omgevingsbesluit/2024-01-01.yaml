  - number: 4.20.1
    text: |-
      Het college van burgemeester en wethouders is adviseur voor een aanvraag om een omgevingsvergunning voor zover de
      aanvraag betrekking heeft op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.1.a
    text: een bouwactiviteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.1.b
    text: een omgevingsplanactiviteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.1.c
    text: een rijksmonumentenactiviteit met betrekking tot een monument; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.1.d
    text: een milieubelastende activiteit.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.2
    text: |-
      De voorgenomen beslissing op de aanvraag behoeft ook instemming van het college van burgemeester en wethouders als
      het gaat om een aanvraag als bedoeld in:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.2.a
    text: |-
      het eerste lid, aanhef en onder b, voor zover het gaat om een omgevingsplanactiviteit anders dan een
      omgevingsplanactiviteit van provinciaal of nationaal belang; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
  - number: 4.20.2.b
    text: |-
      het eerste lid, aanhef en onder d, voor zover het gaat om een milieubelastende activiteit anders
      dan een milieubelastende activiteit als bedoeld in [artikel 4.6, eerste lid, onder c][ref1],
      [4.10, eerste lid, onder a][ref2], of [4.11, eerste lid, onder b][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.20
