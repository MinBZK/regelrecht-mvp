  - number: 3.1.1
    text: |-
      Rijkswateren zijn de watersystemen of onderdelen daarvan, bedoeld in [bijlage II][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.1
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 3.1.2
    text: |-
      Het beheer van de rijkswateren die op grond van het eerste lid zijn aangewezen, omvat ook het beheer van de daarin
      gelegen ondersteunende kunstwerken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.1
  - number: '3.2'
    text: |-
      De [artikelen 3.3 tot en met 3.6][ref1] zijn alleen van toepassing zolang een beperkingengebied niet bij
      ministeriële regeling is aangewezen en geometrisch begrensd.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.2
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.2'
    machine_readable:
      execution:
        parameters:
          - name: beperkingengebied_aangewezen_bij_ministeriele_regeling
            type: boolean
            required: true
            description: Of het beperkingengebied bij ministeriële regeling is aangewezen en geometrisch begrensd
            source: {}
        output:
          - name: artikelen_3_3_tot_3_6_van_toepassing
            type: boolean
            description: Of de artikelen 3.3 tot en met 3.6 van toepassing zijn
        actions:
          - output: artikelen_3_3_tot_3_6_van_toepassing
            value:
              operation: NOT
              value:
                operation: EQUALS
                subject: $beperkingengebied_aangewezen_bij_ministeriele_regeling
                value: true
  - number: '3.3'
    text: |-
      Het beperkingengebied met betrekking tot een weg in beheer bij het Rijk bestaat uit de weg en het daaromheen
      gelegen gebied, begrensd door een lijn liggend op een afstand van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
    machine_readable:
      execution:
        parameters:
          - name: weg_situatie
            type: string
            required: true
            description: >-
              De situatie van de weg: maaiveldniveau,
              naast_watergang, ingraving, ophoging,
              tunnel_of_aquaduct, brug_of_viaduct
            source: {}
          - name: hoogteverschil_m
            type: number
            required: false
            description: >-
              Het hoogteverschil in meters tussen de verharding
              en het maaiveld (alleen relevant bij ophoging,
              tunnel/aquaduct, brug/viaduct)
            source: {}
        output:
          - name: afstand_beperkingengebied_m
            type: number
            description: De afstand in meters van het beperkingengebied, gemeten vanaf het relevante referentiepunt
        actions:
          - output: afstand_beperkingengebied_m
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: maaiveldniveau
                  then: 10
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: naast_watergang
                  then: 1
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: ingraving
                  then: 5
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: ophoging
                  then:
                    operation: ADD
                    values:
                      - 10
                      - operation: MULTIPLY
                        values:
                          - 5
                          - $hoogteverschil_m
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: tunnel_of_aquaduct
                  then:
                    operation: ADD
                    values:
                      - 10
                      - operation: MULTIPLY
                        values:
                          - 4
                          - $hoogteverschil_m
                - when:
                    operation: EQUALS
                    subject: $weg_situatie
                    value: brug_of_viaduct
                  then:
                    operation: ADD
                    values:
                      - 10
                      - operation: MULTIPLY
                        values:
                          - 5
                          - $hoogteverschil_m
  - number: 3.3.a
    text: 'bij een weg op maaiveldniveau: 10 m, gemeten vanaf de kant van de verharding;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: 3.3.b
    text: |-
      bij een weg naast een watergang, die het water van de weg opvangt: 1 m vanaf de insteek van de watergang, gemeten
      vanaf de insteek die het meest verwijderd is van de weg;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: 3.3.c
    text: 'bij een weg in ingraving: 5 m, gemeten vanaf de insteek van de maaiveldverlaging;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: 3.3.d
    text: |-
      bij een weg in ophoging: 10 m, gemeten vanaf de kant van de verharding, vermeerderd met vijfmaal het hoogteverschil
      tussen de verharding en de insteek van de maaiveldverhoging;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: 3.3.e
    text: |-
      bij een weg in een tunnel of onder een aquaduct: 10 m, gemeten vanaf de rand van het kunstwerk, vermeerderd met
      viermaal het hoogteverschil tussen de verharding en het maaiveld; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: 3.3.f
    text: |-
      bij een weg op een brug of op een viaduct: 10 m, gemeten vanaf de rand van het kunstwerk, vermeerderd met vijfmaal
      het hoogteverschil tussen de verharding en het maaiveld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.3
  - number: '3.4'
    text: |-
      Het beperkingengebied met betrekking tot een waterstaatswerk in beheer bij het Rijk valt samen met het
      waterstaatswerk.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.4
  - number: 3.5.1
    text: |-
      Het beperkingengebied met betrekking tot hoofdspoorweginfrastructuur bestaat uit de hoofdspoorweg en het daaromheen
      gelegen gebied, begrensd door een lijn liggend op een afstand van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
    machine_readable:
      execution:
        parameters:
          - name: spoorweg_situatie
            type: string
            required: true
            description: >-
              De situatie van de hoofdspoorweg:
              maaiveldniveau, ingraving, ophoging, tunnel,
              brug_of_viaduct
            source: {}
        output:
          - name: afstand_beperkingengebied_m
            type: number
            description: De afstand in meters van het beperkingengebied, gemeten vanaf het relevante referentiepunt
        actions:
          - output: afstand_beperkingengebied_m
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $spoorweg_situatie
                    value: maaiveldniveau
                  then: 11
                - when:
                    operation: EQUALS
                    subject: $spoorweg_situatie
                    value: ingraving
                  then: 6
                - when:
                    operation: EQUALS
                    subject: $spoorweg_situatie
                    value: ophoging
                  then: 6
                - when:
                    operation: EQUALS
                    subject: $spoorweg_situatie
                    value: tunnel
                  then: 30
                - when:
                    operation: EQUALS
                    subject: $spoorweg_situatie
                    value: brug_of_viaduct
                  then: 30
  - number: 3.5.1.a
    text: |-
      bij een hoofdspoorweg op maaiveldniveau: 11 m, gemeten vanaf het hart van het buitenste spoor, zijnde een
      denkbeeldige lijn in de lengterichting van het spoor midden tussen beide spoorstaven;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
  - number: 3.5.1.b
    text: 'bij een hoofdspoorweg in ingraving: 6 m, gemeten uit de bovenzijde van de ingraving;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
  - number: 3.5.1.c
    text: 'bij een hoofdspoorweg in ophoging: 6 m, gemeten uit de teen van het talud;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
  - number: 3.5.1.d
    text: 'bij een hoofdspoorweg in een tunnel: 30 m, gemeten vanaf de buitenste wand van de tunnel; of'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
  - number: 3.5.1.e
    text: 'bij een hoofdspoorweg op een brug of op een viaduct: 30 m, gemeten vanaf de buitenste rand van de constructie.'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
  - number: 3.5.2
    text: |-
      Als een deel van de hoofdspoorweg alleen is bestemd voor goederenvervoer voor de lokale ontsluiting van
      haven- en industriegebieden, bestaat het beperkingengebied, in afwijking van het eerste lid, uit dat deel van
      de hoofdspoorweg en het daaromheen gelegen gebied, begrensd door een lijn liggend op een afstand van 3 m op
      maaiveldniveau, gemeten vanaf het hart van het buitenste spoor.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.5
    machine_readable:
      execution:
        parameters:
          - name: alleen_goederenvervoer_lokale_ontsluiting
            type: boolean
            required: true
            description: >-
              Of het deel van de hoofdspoorweg alleen is bestemd
              voor goederenvervoer voor de lokale ontsluiting van
              haven- en industriegebieden
            source: {}
        output:
          - name: afwijkende_afstand_van_toepassing
            type: boolean
            description: Of de afwijkende afstand van 3 m van toepassing is
          - name: afstand_beperkingengebied_m
            type: number
            description: De afwijkende afstand van het beperkingengebied in meters
        actions:
          - output: afwijkende_afstand_van_toepassing
            value:
              operation: EQUALS
              subject: $alleen_goederenvervoer_lokale_ontsluiting
              value: true
          - output: afstand_beperkingengebied_m
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $alleen_goederenvervoer_lokale_ontsluiting
                    value: true
                  then: 3
              default: 0
  - number: '3.6'
    text: |-
      Het beperkingengebied met betrekking tot installaties in een oppervlaktewaterlichaam anders dan
      mijnbouwinstallaties bestaat uit de installatie en het daaromheen gelegen gebied, begrensd door een lijn liggend op
      een afstand van 500 m van enig onderdeel van de installatie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel3.6
    machine_readable:
      execution:
        parameters:
          - name: is_installatie_in_oppervlaktewaterlichaam
            type: boolean
            required: true
            description: Of het gaat om een installatie in een oppervlaktewaterlichaam
            source: {}
          - name: is_mijnbouwinstallatie
            type: boolean
            required: true
            description: Of het gaat om een mijnbouwinstallatie
            source: {}
        output:
          - name: artikel_van_toepassing
            type: boolean
            description: >-
              Of dit artikel van toepassing is (installatie in
              oppervlaktewaterlichaam, niet zijnde
              mijnbouwinstallatie)
          - name: afstand_beperkingengebied_m
            type: number
            description: De afstand van het beperkingengebied in meters
        actions:
          - output: artikel_van_toepassing
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $is_installatie_in_oppervlaktewaterlichaam
                  value: true
                - operation: NOT
                  value:
                    operation: EQUALS
                    subject: $is_mijnbouwinstallatie
                    value: true
          - output: afstand_beperkingengebied_m
            value:
              operation: IF
              cases:
                - when:
                    operation: EQUALS
                    subject: $artikel_van_toepassing
                    value: true
                  then: 500
              default: 0
