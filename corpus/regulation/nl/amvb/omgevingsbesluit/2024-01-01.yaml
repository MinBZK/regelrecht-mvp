        artikel: '5'
      - id: ref5
        bwb_id: BWBR0041278
  - number: 13.12.1.d.2°
    text: |-
      de regels gesteld bij of krachtens de [wet][ref1] en de [Wet milieubeheer][ref2], over activiteiten die zijn
      aangewezen in [bijlage VI][ref3], categorie 1 tot en met 6 en 8;


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0003245
      [ref3]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0003245
      - id: ref3
        bwb_id: BWBR0041278
  - number: 13.12.1.e
    text: |-
      ketentoezicht op de regels over activiteiten die zijn aangewezen in [bijlage VI][ref1], categorie 7; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 13.12.1.f
    text: het voorbereiden van bestuurlijke sancties ter handhaving van de verboden en regels, bedoeld onder d en e.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
  - number: 13.12.2
    text: |-
      Tot de werkzaamheden, bedoeld in het eerste lid, onder a, behoort niet de toepassing van de
      [Wet bevordering integriteitsbeoordelingen door het openbaar bestuur][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0013798
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0013798
  - number: 13.12.3
    text: |-
      De werkzaamheden, bedoeld in het eerste lid, worden voor de activiteiten, bedoeld in
      [artikel 18.22, tweede lid, van de wet][ref1], alleen door de in [bijlage VII][ref2] aangewezen omgevingsdiensten
      uitgevoerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
      - id: ref2
        bwb_id: BWBR0041278
  - number: 13.12.4
    text: |-
      Een naamswijziging van een in [bijlage VII][ref1] aangewezen omgevingsdienst gaat voor de toepassing van dit
      besluit gelden nadat een daarover genomen besluit bekend is gemaakt in de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: '13.13'
    text: |-
      Aan de verplichting tot informatieverstrekking, bedoeld in [artikel 18.25, eerste lid, van de wet][ref1], is in
      ieder geval voldaan als Onze Minister van Infrastructuur en Waterstaat, Onze Minister van Justitie en Veiligheid
      en het algemeen bestuur van de omgevingsdiensten de gegevens die zij beheren in verband met het verrichten van de
      werkzaamheden, bedoeld in [artikel 13.12, eerste lid][ref2], via het beveiligde digitale systeem voor informatie-
      uitwisseling, Inspectieview Milieu, raadpleegbaar maken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.3
        afdeling: '13.2'
  - number: '13.14'
    text: |-
      Als andere bestuursorganen als bedoeld in [artikel 18.25, tweede lid, van de wet][ref1] worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '18'
  - number: 13.14.a
    text: Onze Minister van Economische Zaken en Klimaat;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.14
  - number: 13.14.b
    text: Onze Minister van Sociale Zaken en Werkgelegenheid;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.14
  - number: 13.14.c
    text: de korpschef; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.14
