      Onze Minister voor Natuur en Stikstof beslist op een enkel- of meervoudige aanvraag om een omgevingsvergunning als
      de aanvraag alleen betrekking heeft op een of meer van de volgende activiteiten:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.12
    machine_readable:
      execution:
        parameters:
          - name: aanvraag_alleen_genoemde_activiteiten
            type: boolean
            required: true
            description: Of de aanvraag alleen betrekking heeft op activiteiten genoemd in lid 1
            source: {}
          - name: activiteit_type
            type: string
            required: true
            description: Het type activiteit
            source: {}
        output:
          - name: minister_natuur_is_bevoegd_gezag
            type: boolean
            description: Of de Minister voor Natuur en Stikstof bevoegd gezag is op grond van artikel 4.12 lid 1
        actions:
          - output: minister_natuur_is_bevoegd_gezag
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $aanvraag_alleen_genoemde_activiteiten
                  value: true
                - operation: IN
                  subject: $activiteit_type
                  values:
                    - natura_2000_activiteit_nationaal_belang
                    - flora_fauna_activiteit_nationaal_belang
