      [artikel 4.4, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 13.6.2
    text: 'De handhavingsstrategie biedt ook inzicht in:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
  - number: 13.6.2.a
    text: |-
      de afspraken die door bestuursorganen onderling en met de instanties die zijn belast met de strafrechtelijke
      handhaving zijn gemaakt over samenwerking bij en afstemming van werkzaamheden;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
  - number: 13.6.2.b
    text: |-
      de wijze waarop toezicht op de naleving van het bepaalde bij of krachtens de [wet][ref1] wordt gehouden;


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 13.6.2.c
    text: |-
      de wijze waarop wordt gerapporteerd over bevindingen over de naleving van het bepaalde bij of krachtens de
      [wet][ref1] en eventueel daaraan verbonden consequenties;


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 13.6.2.d
    text: |-
      de wijze waarop bestuurlijke sancties en termijnen die bij het opleggen en ten uitvoer leggen daarvan worden
      gehanteerd en de strafrechtelijke handhaving onderling worden afgestemd; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
  - number: 13.6.2.e
    text: |-
      de wijze waarop wordt gehandeld na geconstateerde overtredingen die zijn begaan door of in naam van een
      bestuursorgaan of een andere tot de overheid behorende instantie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
  - number: 13.7.1
    text: |-
      Tot de wijze waarop toezicht op de naleving van het bepaalde bij of krachtens de [wet][ref1] wordt gehouden,
      bedoeld in [artikel 13.6, tweede lid, onder b][ref2], behoort in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.7.1.a
    text: |-
      de wijze waarop toezicht wordt voorbereid, uitgaande van een register waarin in ieder geval ippc-installaties zijn
      opgenomen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.b
    text: |-
      de frequentie waarmee routinematig toezicht wordt gehouden, waarbij die frequentie voor ippc-installaties,
      afhankelijk van de milieurisico’s, het nalevingsgedrag en de aanwezigheid van een gecertificeerd milieuzorgsysteem,
      ten minste is:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.b.1°
    text: eenmaal per drie jaar bij beperkte milieurisico’s; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.b.2°
    text: eenmaal per jaar bij grote milieurisico’s; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.c
    text: |-
      de termijn waarbinnen na het vaststellen van een ernstige klacht, ernstig ongewoon voorval of ernstige overtreding
      niet-routinematig toezicht wordt gehouden, waarbij die termijn voor ippc-installaties is:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.c.1°
    text: |-
      na het vaststellen van een ernstige klacht, ernstig ongewoon voorval of ernstige overtreding: zo spoedig mogelijk
      en in voorkomend geval voor de verlening of wijziging van een omgevingsvergunning; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.1.c.2°
    text: 'na het vaststellen van een ernstige overtreding: in ieder geval binnen zes maanden.'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.2
    text: |-
      Tot de wijze waarop wordt gerapporteerd over bevindingen over de naleving van het bepaalde bij of krachtens de
      [wet][ref1] en eventueel daaraan verbonden consequenties, bedoeld in [artikel 13.6, tweede lid, onder c][ref2],
      behoort in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.7.2.a
    text: |-
      de termijn waarbinnen een rapportage wordt gedeeld met betrokkenen, waarbij die termijn voor rapportage met
      betrekking tot ippc-installaties twee maanden is; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
  - number: 13.7.2.b
    text: |-
      de termijn waarbinnen en mate waarin een rapportage openbaar wordt gemaakt, waarbij
      die termijn voor rapportage met betrekking tot ippc-installaties vier maanden is en de
      [artikelen 19.3 tot en met 19.5 van de Wet milieubeheer][ref1] van overeenkomstige toepassing zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.7
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
  - number: 13.8.1
    text: |-
      De bestuursorganen, bedoeld in [artikel 13.5][ref1], werken jaarlijks de uitvoerings- en handhavingsstrategie uit
      in een uitvoeringsprogramma, waarin wordt aangegeven welke van de werkzaamheden, bedoeld in het eerste lid van dat
      artikel, het komende jaar zullen worden verricht. Daarbij houden ze rekening met de doelen, bedoeld in dat lid, en
      de prioriteitenstelling, bedoeld in [artikel 13.6, eerste lid, onder a][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.8.2
    text: |-
      Het uitvoeringsprogramma wordt zo nodig afgestemd met de instanties die zijn belast met de strafrechtelijke
      handhaving.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.8
  - number: 13.9.1
    text: |-
      De bestuursorganen, bedoeld in [artikel 13.5][ref1], richten hun organisatie zodanig in dat een goede uitvoering
      van de uitvoerings- en handhavingsstrategie en het uitvoeringsprogramma is gewaarborgd.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.9.2
    text: 'De bestuursorganen dragen er in ieder geval zorg voor dat:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
  - number: 13.9.2.a
    text: |-
      de personeelsformatie voor de uitvoering en handhaving en de bij de functies behorende taken, bevoegdheden en
      verantwoordelijkheden worden vastgelegd;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
  - number: 13.9.2.b
    text: |-
      een persoon die door hen is belast met het beoordelen van en beslissen op een aanvraag om een omgevingsvergunning,
      het beoordelen van en beslissen op een aanvraag om toestemming tot het treffen van een gelijkwaardige maatregel
      of het stellen van een maatwerkvoorschrift ten aanzien van een milieubelastende activiteit als bedoeld in
      [hoofdstuk 3 van het Besluit activiteiten leefomgeving][ref1], niet wordt belast met:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '3'
  - number: 13.9.2.b.1°
    text: |-
      het toezicht op de naleving van het bepaalde bij of krachtens de [wet][ref1] ten aanzien van dezelfde
      milieubelastende activiteit; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 13.9.2.b.2°
    text: |-
      het opleggen en ten uitvoer leggen van een bestuurlijke sanctie ten aanzien van dezelfde milieubelastende
      activiteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
  - number: 13.9.2.c
    text: |-
      een door hen met het toezicht op de naleving van het bepaalde bij of krachtens de [wet][ref1] belaste persoon niet
      voortdurend wordt belast met het toezicht op dezelfde milieubelastende activiteit; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 13.9.2.d
    text: de bereikbaarheid en beschikbaarheid van hun organisatie ook buiten kantooruren is gegarandeerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
  - number: 13.9.3
    text: |-
      De bestuursorganen dragen er ook zorg voor dat de werkprocessen, procedures en bijbehorende informatievoorziening
      voor de uitvoering en handhaving worden vastgelegd en dat werkzaamheden worden verricht volgens deze werkprocessen
      en procedures.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.9
  - number: '13.10'
    text: |-
      De bestuursorganen, bedoeld in [artikel 13.5][ref1], dragen er zorg voor dat:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.10.a
    text: |-
      de voor het bereiken van de doelen, bedoeld in het eerste lid van dat artikel, en voor het verrichten van de
      werkzaamheden, bedoeld in dat lid, benodigde en beschikbare financiële en personele middelen inzichtelijk worden
      gemaakt en in de begroting worden gewaarborgd; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.10
  - number: 13.10.b
    text: voor de uitvoering van het uitvoeringsprogramma voldoende financiële en personele middelen beschikbaar zijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.10
  - number: 13.11.1
    text: |-
      De bestuursorganen, bedoeld in [artikel 13.5][ref1], rapporteren jaarlijks over de mate waarin uitvoering van het
      uitvoeringsprogramma heeft plaatsgevonden en de mate waarin deze uitvoering heeft bijgedragen aan het bereiken van
      de doelen, bedoeld in het eerste lid van dat artikel.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.11
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.11.2
    text: |-
      Naar aanleiding van de in het eerste lid bedoelde rapportage wordt de uitvoerings- en handhavingsstrategie bezien
      en zo nodig aangepast.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.11
  - number: 13.12.1
    text: |-
      Het college van burgemeester en wethouders en gedeputeerde staten dragen er zorg voor dat in ieder geval de
      volgende werkzaamheden, voor zover tot hun taak behorend, en voor zover deze regels zijn gesteld met het oog
      op de belangen, bedoeld in [artikel 2.2][ref1] of [19.1b van het Besluit activiteiten leefomgeving][ref2], als
      het gaat om milieubelastende activiteiten, of [artikel 3.2][ref3], [4.2][ref4], [5.2][ref5], [6.2][ref6] of
      [7.2 van het Besluit bouwwerken leefomgeving][ref7], als het gaat om bouwactiviteiten of sloopactiviteiten, door
      een omgevingsdienst worden verricht:


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel19
      [ref3]: https://wetten.overheid.nl/BWBR0041297#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041297#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041297#Artikel5
      [ref6]: https://wetten.overheid.nl/BWBR0041297#Artikel6
      [ref7]: https://wetten.overheid.nl/BWBR0041297#Artikel7
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.12
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '19'
      - id: ref3
        bwb_id: BWBR0041297
        artikel: '3'
      - id: ref4
