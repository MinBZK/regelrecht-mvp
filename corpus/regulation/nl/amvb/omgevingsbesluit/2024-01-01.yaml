  - number: 4.16.1.c
    text: |-
      voor de milieubelastende activiteit, bedoeld onder b, een door gedeputeerde staten eerder verleende
      omgevingsvergunning geldt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
  - number: 4.16.2
    text: 'Het eerste lid is niet van toepassing als de aanvraag alleen of onder meer betrekking heeft op:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
  - number: 4.16.2.a
    text: een omgevingsplanactiviteit van nationaal belang;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
  - number: 4.16.2.b
    text: |-
      een milieubelastende activiteit als bedoeld in
      [artikel 3.321, eerste lid, van het Besluit activiteiten leefomgeving][ref1], tenzij het gaat om het aanleggen of
      het exploiteren van een mijnbouwwerk voor het opsporen of winnen van aardwarmte;


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 4.16.2.c
    text: een mijnbouwlocatieactiviteit; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
  - number: 4.16.2.d
    text: een beperkingengebiedactiviteit met betrekking tot een mijnbouwinstallatie in een waterstaatswerk.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.16
  - number: 4.17.1
    text: |-
      Het met toepassing van [artikel 5.16 van de wet][ref1] overdragen van de bevoegdheid om op een aanvraag om een
      omgevingsvergunning te beslissen of om [paragraaf 5.1.5 van de wet][ref2] voor een omgevingsvergunning toe te
      passen, kan zich alleen uitstrekken tot meer dan een aanvraag om een omgevingsvergunning of meer dan een al
      verleende omgevingsvergunning als de aanvragen of vergunningen betrekking hebben op:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Paragraaf5.1.5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0037885
        paragraaf: 5.1.5
  - number: 4.17.1.a
    text: activiteiten die worden verricht op hetzelfde bedrijventerrein; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.17
  - number: 4.17.1.b
    text: een in een ander opzicht samenhangend geheel van activiteiten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.17
  - number: 4.17.2
    text: |-
      Het bestuursorgaan dat zijn bevoegdheid met toepassing van [artikel 5.16 van de wet][ref1] overdraagt, geeft
      tegelijk met of zo spoedig mogelijk na de bekendmaking van het delegatiebesluit kennis van dat besluit op de
      in [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze en doet mededeling van dat besluit door toezending
      daarvan aan de aanvrager of de vergunninghouder.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 4.17.3
    text: Het tweede lid is van overeenkomstige toepassing als het delegatiebesluit wordt ingetrokken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.17
  - number: 4.18.1
    text: |-
      Deze afdeling is alleen van toepassing als het bestuursorgaan waaraan de bevoegdheid tot advies of instemming is
      toegekend, niet zelf bevoegd gezag is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.18
  - number: 4.18.2
    text: |-
      Een op grond van deze afdeling uitgebracht advies richt zich tot het bevoegd gezag en zijn te nemen beslissing op
      de aanvraag om een omgevingsvergunning of een maatwerkvoorschrift of het verzoek om instemming. In plaats daarvan
      kan het advies zich ook richten tot een bestuursorgaan dat zelf adviseur is voor zover dat in deze afdeling is
      bepaald.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.18
  - number: 4.18.3
    text: |-
      In deze afdeling wordt onder een aanvraag om een omgevingsvergunning of een maatwerkvoorschrift ook verstaan een
      aanvraag om wijziging van de voorschriften van een omgevingsvergunning of een maatwerkvoorschrift of om intrekking
      van een omgevingsvergunning of een maatwerkvoorschrift.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.18
  - number: 4.19.1
    text: |-
      Voor zover een aanvraag om een omgevingsvergunning betrekking heeft op een activiteit die op het grondgebied van
      meer dan een gemeente, waterschap of provincie plaatsvindt, zijn de in de [artikelen 4.20][ref1], [4.24][ref2] en
      [4.25][ref3] toegekende bevoegdheden tot advies van toepassing op het college van burgemeester en wethouders, het
      dagelijks bestuur van het waterschap en gedeputeerde staten van elke gemeente, elk waterschap en elke provincie
      waar de activiteit gedeeltelijk plaatsvindt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.19
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
      - id: ref2
