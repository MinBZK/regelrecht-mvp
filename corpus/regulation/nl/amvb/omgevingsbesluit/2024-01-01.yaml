        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.6.1.b
    text: |-
      de methode die wordt gebruikt om te bepalen of de doelen, bedoeld in [artikel 13.5, eerste lid][ref1], worden
      bereikt;


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
