            type: boolean
            description: Of het dagelijks bestuur van het waterschap bevoegd gezag is
        actions:
          - output: waterschap_is_bevoegd_gezag
            value:
              operation: AND
              conditions:
                - operation: EQUALS
                  subject: $aanvraag_alleen_wateractiviteiten
                  value: true
                - operation: IN
                  subject: $wateractiviteit_type
                  values:
                    - lozingsactiviteit_oppervlaktewaterlichaam_waterschap
                    - lozingsactiviteit_zuiveringtechnisch_werk
                    - waterschapsverordening_activiteit
