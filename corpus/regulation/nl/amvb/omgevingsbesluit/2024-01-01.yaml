      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.20.3
    text: Het toezichtplan wordt regelmatig bezien en zo nodig bijgewerkt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.20
  - number: 13.21.1
    text: |-
      Het bevoegd gezag, de toezichthouder, bedoeld in
      [artikel 1, derde lid, onder d, van de Arbeidsomstandighedenwet][ref1], en het bestuur van de veiligheidsregio
      werken gezamenlijk het toezichtplan uit in toezichtprogramma’s voor routinematig en niet-routinematig toezicht op
      een Seveso-inrichting.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.21.2
    text: |-
      Een toezichtprogramma vermeldt ten minste de frequentie waarmee routinematig toezicht wordt gehouden. De frequentie
      waarmee routinematig toezicht wordt gehouden, is:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
  - number: 13.21.2.a
    text: 'voor hogedrempelinrichtingen: ten minste eenmaal per jaar; en'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
  - number: 13.21.2.b
    text: 'voor Seveso-inrichtingen die geen hogedrempelinrichtingen zijn: ten minste eenmaal per drie jaar.'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
  - number: 13.21.3
    text: |-
      Het tweede lid, tweede zin, is niet van toepassing als een toezichtprogramma is vastgesteld op grond van een
      systematische evaluatie van de gevaren van zware ongevallen, die ten minste is gebaseerd op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
  - number: 13.21.3.a
    text: de mogelijke gevolgen voor de gezondheid en het milieu;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
  - number: 13.21.3.b
    text: |-
      gegevens over de naleving van [paragraaf 4.2 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: '4.2'
  - number: 13.21.3.c
    text: |-
      als dat passend is: bevindingen van het houden van toezicht op de naleving van andere wettelijke voorschriften dan
      die in [paragraaf 4.2 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.21
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: '4.2'
  - number: 13.22.1
    text: |-
      Het houden van toezicht wordt afgestemd op het soort Seveso-inrichting en is niet afhankelijk van de ontvangst van
      het veiligheidsrapport of van andere ingediende rapporten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2
    text: |-
      Met bezoeken ter plaatse, het controleren van interne maatregelen, systemen, rapporten, documenten en opvolging van
      bevindingen en een planmatig, systematisch, technisch, organisatorisch en bedrijfskundig onderzoek van de systemen
      die in de Seveso-inrichting worden gebruikt, wordt nagegaan of:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2.a
    text: 'degene die de Seveso-inrichting exploiteert kan aantonen dat:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2.a.1°
    text: passende maatregelen zijn getroffen om zware ongevallen te voorkomen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2.a.2°
    text: in passende middelen is voorzien om de gevolgen van zware ongevallen te beperken;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2.b
    text: het veiligheidsrapport en andere ingediende rapporten de situatie adequaat weergeven; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.22.2.c
    text: |-
      de [artikelen 4.5][ref1], [4.6][ref2], [4.10 tot en met 4.20][ref3], [4.22][ref4], [4.24][ref5] en
      [4.26 tot en met 4.28 van het Besluit activiteiten leefomgeving][ref6] worden nageleefd.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref6]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref5
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref6
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 13.22.3
    text: |-
      Als dat passend is, wordt het toezicht zoveel mogelijk gecombineerd met toezicht op andere wettelijke
      voorschriften.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.22
  - number: 13.23.1
    text: |-
      Binnen vier maanden na afronding van een bezoek, controle of onderzoek als bedoeld in
      [artikel 13.22, tweede lid][ref1], worden de bevindingen vastgelegd in een toezichtrapport en meegedeeld aan degene
      die de Seveso-inrichting exploiteert.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.3.2
        afdeling: '13.3'
  - number: 13.23.2
    text: |-
      Het bevoegd gezag, de toezichthouder, bedoeld in
      [artikel 1, derde lid, onder d, van de Arbeidsomstandighedenwet][ref1], en het bestuur van de veiligheidsregio zien
      er, voor zover het gaat om de uitoefening van hun bevoegdheden en het verrichten van hun werkzaamheden, op toe dat
      degene die de Seveso-inrichting exploiteert binnen een redelijke termijn na de mededeling, bedoeld in het eerste
      lid, de bevindingen opvolgt door de vereiste maatregelen te treffen.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.23.3
    text: |-
      Als een belangrijke overtreding van een bepaling in [paragraaf 4.2 van het Besluit activiteiten leefomgeving][ref1]
      is geconstateerd, vindt binnen zes maanden na die constatering aanvullend toezicht plaats.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.23
    references:
      - id: ref1
        bwb_id: BWBR0041330
        paragraaf: '4.2'
  - number: 13.24.1
    text: |-
      Het bevoegd gezag, de toezichthouder, bedoeld in
      [artikel 1, derde lid, onder d, van de Arbeidsomstandighedenwet][ref1], en het bestuur van de veiligheidsregio
      verschaffen aan een ieder de volgende gegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.24
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.24.1.a
    text: |-
      de datum waarop voor het laatst routinematig toezicht is gehouden of een verwijzing naar de plaats waar die
      informatie elektronisch kan worden geraadpleegd; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.24
  - number: 13.24.1.b
    text: |-
      inlichtingen over de wijze waarop op verzoek meer gedetailleerde gegevens over het toezicht en het toezichtplan
      kunnen worden verkregen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.24
  - number: 13.24.2
    text: |-
      Als gegevens als bedoeld in [artikel 19.3, eerste lid, laatste zin, van de Wet milieubeheer][ref1] worden
      aangewezen toezichtrapporten als bedoeld in [artikel 13.23, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.24
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.3.2
        afdeling: '13.3'
  - number: 13.24.3
    text: |-
      Als toepassing wordt gegeven aan de bevoegdheid, bedoeld in
      [artikel 19.3, eerste lid, eerste zin, van de Wet milieubeheer][ref1], wordt een aangepast toezichtrapport
      beschikbaar gesteld, dat ten minste algemene gegevens bevat over risico’s van zware ongevallen, de mogelijke
      gevolgen daarvan voor de gezondheid en het milieu en de bevindingen van het toezicht.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel19
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.24
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '19'
  - number: 13.25.1
    text: |-
      Deze afdeling is van toepassing op het opleggen en ten uitvoer leggen van een bestuurlijke sanctie
      vanwege enig handelen of nalaten in strijd met het bij of krachtens de [Arbeidsomstandighedenwet][ref1] in
      [paragraaf 4.2 van het Besluit activiteiten leefomgeving][ref2] bepaalde.


      [ref1]: https://wetten.overheid.nl/BWBR0010346
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.25
    references:
      - id: ref1
        bwb_id: BWBR0010346
      - id: ref2
        bwb_id: BWBR0041330
        paragraaf: '4.2'
  - number: 13.25.2
    text: |-
      Deze afdeling is ook van toepassing op de strafbaarstellingen voor handelen of nalaten in
      strijd met het bij of krachtens [artikel 48, zesde lid, van de Wet veiligheidsregio’s][ref1]
      en krachtens [artikel 6, eerste lid, tweede zin, van de Arbeidsomstandighedenwet][ref2] in
      [paragraaf 4.2 van het Besluit activiteiten leefomgeving][ref3] bepaalde.


      [ref1]: https://wetten.overheid.nl/BWBR0027466#Artikel48
      [ref2]: https://wetten.overheid.nl/BWBR0010346#Artikel6
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Paragraaf4.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.25
    references:
      - id: ref1
        bwb_id: BWBR0027466
        artikel: '48'
      - id: ref2
        bwb_id: BWBR0010346
        artikel: '6'
      - id: ref3
        bwb_id: BWBR0041330
        paragraaf: '4.2'
  - number: '13.26'
    text: |-
      Een daartoe door Onze Minister van Sociale Zaken en Werkgelegenheid aangewezen, onder hem ressorterende
      ambtenaar is bevoegd tot oplegging van een last onder bestuursdwang ter zake van de naleving van het krachtens
      [artikel 6, eerste lid, tweede zin, van de Arbeidsomstandighedenwet][ref1], in de [artikelen 4.4][ref2],
      [4.5, eerste en derde lid][ref3], [4.6, eerste lid][ref4], [4.7][ref5], [4.9 tot en met 4.15][ref6], [4.18][ref7],
      [4.19][ref8], [4.20][ref9], [4.22][ref10], [4.23][ref11], [4.24][ref12], [4.26][ref13], [4.27][ref14] en
      [4.28 van het Besluit activiteiten leefomgeving][ref15] bepaalde.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel6
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref5]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref6]: https://wetten.overheid.nl/BWBR0041330#Artikel4
