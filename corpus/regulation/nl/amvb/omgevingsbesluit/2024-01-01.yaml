    text: |-
      handelen in strijd met een voorwaarde of vereiste, verbonden aan een vergunning of certificaat op grond van
      artikel 11, derde lid, van de cites-basisverordening, voor zover de voorwaarde of het vereiste ziet op de
      administratie, de verstrekking van gegevens of het merken van dieren, planten of eieren; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.3a
