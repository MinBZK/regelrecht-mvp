    text: |-
      Het bevoegd gezag houdt bij het verbinden van een voorschrift aan de omgevingsvergunning over het stellen van
      financiële zekerheid en het wijzigen van een dergelijk voorschrift in een geval als bedoeld in [artikel 8.5][ref1]
      in ieder geval rekening met:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
  - number: 8.8.a
    text: de financiële draagkracht van degene die de activiteit verricht;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.b
    text: de aanwezigheid en aard van de stoffen die nadelige gevolgen voor de fysieke leefomgeving kunnen veroorzaken;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.c
    text: |-
      de ten hoogste verwachte schade die kan voortvloeien uit door de activiteit veroorzaakte nadelige gevolgen voor de
      fysieke leefomgeving;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.d
    text: |-
      de technische en bedrijfsorganisatorische veiligheidsmaatregelen die zijn getroffen ter voorkoming en beperking van
      schade als bedoeld onder c;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.e
    text: |-
      de verhouding tussen het risico op schade als bedoeld onder c van een bepaalde omvang en de daarmee gemoeide kosten
      van het stellen van financiële zekerheid;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.f
    text: de naleving van de aan de omgevingsvergunning verbonden voorschriften; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.8.g
    text: de verhouding tussen de criteria, bedoeld onder a tot en met f.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.8
  - number: 8.9.1
    text: |-
      Het bevoegd gezag stelt in het vergunningvoorschrift over financiële zekerheid de vorm vast waarin de financiële
      zekerheid wordt gesteld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.9
  - number: 8.9.2
    text: |-
      Het bevoegd gezag houdt bij het vaststellen van de vorm waarin de financiële zekerheid wordt gesteld, in ieder
      geval rekening met:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.9
  - number: 8.9.2.a
    text: |-
      de voorkeur van degene die de activiteit verricht voor een specifieke vorm van financiële zekerheid, als die vorm
      voldoende zekerheid biedt; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.9
  - number: 8.9.2.b
    text: de vraag of degene die de activiteit verricht een openbaar lichaam is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.9
  - number: 8.10.1
    text: |-
      Het bevoegd gezag stelt in het vergunningvoorschrift over financiële zekerheid vast voor welk bedrag de zekerheid
      wordt gesteld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
  - number: 8.10.2
    text: 'Het bedrag is:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
  - number: 8.10.2.a
    text: |-
      voor een geval als bedoeld in [artikel 8.5][ref1] niet hoger dan de kosten die noodzakelijk worden geacht voor het
      nakomen van verplichtingen die op grond van de omgevingsvergunning gelden of voor de dekking van aansprakelijkheid
      voor schade aan de fysieke leefomgeving als gevolg van die activiteit;


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
  - number: 8.10.2.b
    text: |-
      voor een geval als bedoeld in [artikel 8.6, onder a][ref1], ten hoogste € 2,27 per ton gestorte afvalstoffen;


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
    machine_readable:
      execution:
        parameters:
          - name: tonnage_gestorte_afvalstoffen
            type: number
            required: true
            description: Aantal ton gestorte afvalstoffen
            source: {}
        output:
          - name: maximaal_bedrag_zekerheid
            type: number
            description: Maximaal bedrag financiële zekerheid in euro voor storten afvalstoffen (art 8.6 onder a)
        actions:
          - output: maximaal_bedrag_zekerheid
            value:
              operation: MULTIPLY
              values:
                - $tonnage_gestorte_afvalstoffen
                - 2.27
  - number: 8.10.2.c
    text: |-
      voor een geval als bedoeld in [artikel 8.6, onder b][ref1], ten hoogste € 1,– per ton droge stof gestorte
      afvalstoffen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
    machine_readable:
      execution:
        parameters:
          - name: tonnage_droge_stof
            type: number
            required: true
            description: Aantal ton droge stof gestorte afvalstoffen
            source: {}
        output:
          - name: maximaal_bedrag_zekerheid
            type: number
            description: Maximaal bedrag financiële zekerheid in euro voor storten baggerspecie (art 8.6 onder b)
        actions:
          - output: maximaal_bedrag_zekerheid
            value:
              operation: MULTIPLY
              values:
                - $tonnage_droge_stof
                - 1.0
  - number: 8.10.2.d
    text: |-
      voor een geval als bedoeld in [artikel 8.6, onder d][ref1], ten minste € 5.000.000,– per vergunningplichtige
      activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
    machine_readable:
      execution:
        parameters:
          - name: voorgesteld_bedrag_zekerheid
            type: number
            required: true
            description: Het voorgestelde bedrag financiële zekerheid in euro per vergunningplichtige activiteit
            source: {}
        output:
          - name: voldoet_aan_minimum
            type: boolean
            description: Of het bedrag voldoet aan het minimum van 5.000.000 euro (art 8.6 onder d)
        actions:
          - output: voldoet_aan_minimum
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $voorgesteld_bedrag_zekerheid
              value: 5000000
  - number: 8.10.3
    text: |-
      Voor een geval als bedoeld in [artikel 8.6, onder c][ref1], is de berekening gebaseerd op de criteria die zijn
      opgenomen in Beschikking nr. 2009/335/EG van de Commissie van 20 april 2009 inzake technische richtsnoeren voor het
      stellen van de financiële zekerheid overeenkomstig [Richtlijn 2006/21/EG](32006L0021) van het Europees Parlement en
      de Raad betreffende het beheer van afval van winningsindustrieën (PbEG 2009, L 101).


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
  - number: 8.10a
    text: |-
      Onverminderd de [artikelen 8.9][ref1] en [8.10, tweede lid, onder a][ref2], kan voor een geval
      als bedoeld in [artikel 8.6, eerste lid, onder e][ref3], als de in dat onderdeel bedoelde
      milieubelastende activiteit ook omvat het aanleggen en het exploiteren van een mijnbouwwerk, bedoeld in
      [artikel 3.320 van het Besluit activiteiten leefomgeving][ref4], voor zover het daarbij gaat om een mijnbouwwerk
      voor het opslaan van stoffen, bij het vaststellen van de vorm, respectievelijk hoogte, van financiële zekerheid
      rekening worden gehouden met de vorm, respectievelijk hoogte, waarin sprake is van:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel8
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel8
      [ref4]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
      - id: ref3
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.3'
      - id: ref4
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 8.10a.a
    text: |-
      een financiële zekerheid op grond van het recht, bedoeld in [artikel 3, vierde lid, van de Mijnbouwwet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0014168
        artikel: '3'
  - number: 8.10a.b
    text: |-
      de financiële zekerheid, bedoeld in [paragraaf 5.2.4 van de Mijnbouwwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0014168#Paragraaf5.2.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.10a
    references:
      - id: ref1
        bwb_id: BWBR0014168
        paragraaf: 5.2.4
  - number: 8.11.1
    text: |-
      Het bevoegd gezag stelt in het vergunningvoorschrift over financiële zekerheid vast hoe lang de financiële
      zekerheid in stand wordt gehouden.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
  - number: 8.11.2
    text: |-
      De financiële zekerheid voor het storten van afvalstoffen op een stortplaats, met uitzondering van een stortplaats
      waar alleen baggerspecie wordt gestort, wordt in stand gehouden tot de stortplaats is gekeurd als bedoeld in
      [artikel 8.59, onder b, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
  - number: 8.11.3
    text: |-
      De financiële zekerheid voor het storten van baggerspecie op een stortplaats waar alleen baggerspecie wordt
      gestort, wordt in stand gehouden tot zo nodig een geohydrologisch isolatiesysteem of een afdeklaag op de gestorte
      baggerspecie is aangebracht.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
  - number: 8.11.4
    text: |-
      De financiële zekerheid voor het storten of verzamelen van winningsafvalstoffen in een winningsafvalvoorziening
      wordt in stand gehouden tot:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
  - number: 8.11.4.a
    text: |-
      de vergunning niet meer geldt, voor zover de financiële zekerheid ziet op het nakomen van de voorschriften die
      op grond van [paragraaf 8.5.2.6 van het Besluit kwaliteit leefomgeving][ref1] aan de omgevingsvergunning zijn
      verbonden; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Paragraaf8.5.2.6
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0041313
        paragraaf: 8.5.2.6
  - number: 8.11.4.b
    text: |-
      de maatregelen, bedoeld in de [artikelen 8.49][ref1] en [8.50 van de Wet milieubeheer][ref2], zijn uitgevoerd.


      [ref1]: https://wetten.overheid.nl/BWBR0003245#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0003245#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.11
    references:
      - id: ref1
        bwb_id: BWBR0003245
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0003245
        artikel: '8'
  - number: '8.12'
    text: |-
      Het bevoegd gezag bepaalt in het vergunningvoorschrift over financiële zekerheid dat, binnen een door het bevoegd
      gezag te bepalen redelijke termijn nadat dat voorschrift aan de vergunning is verbonden, bewijs wordt verstrekt dat
      financiële zekerheid is gesteld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.12
  - number: '8.13'
    text: |-
      Bouwactiviteiten waarvan kosten worden verhaald als bedoeld in
      [artikel 13.11, eerste lid, aanhef, van de wet][ref1], zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.13.a
    text: de bouw van een of meer gebouwen met een woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
  - number: 8.13.b
    text: de bouw van een of meer hoofdgebouwen anders dan gebouwen met een woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
  - number: 8.13.c
    text: |-
      de uitbreiding van een gebouw met ten minste 1.000 m2 bruto-vloeroppervlakte of met een of meer gebouwen met een
      woonfunctie;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
    machine_readable:
      execution:
        parameters:
          - name: uitbreiding_bvo_m2
            type: number
            required: true
            description: Bruto-vloeroppervlakte van de uitbreiding in m2
            source: {}
          - name: bevat_woonfunctie
            type: boolean
            required: true
            description: Of de uitbreiding een of meer gebouwen met een woonfunctie bevat
            source: {}
        output:
          - name: kostenverhaal_van_toepassing
            type: boolean
            description: Of de bouwactiviteit onder kostenverhaal valt (art 8.13 onder c)
        actions:
          - output: kostenverhaal_van_toepassing
            value:
              operation: OR
              conditions:
                - operation: GREATER_THAN_OR_EQUAL
                  subject: $uitbreiding_bvo_m2
                  value: 1000
                - operation: EQUALS
                  subject: $bevat_woonfunctie
                  value: true
  - number: 8.13.d
    text: de bouw van een gebouw dat geen hoofdgebouw als bedoeld onder b is, met ten minste 1.000 m2 bruto-vloeroppervlakte;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
    machine_readable:
      execution:
        parameters:
          - name: bvo_gebouw_m2
            type: number
            required: true
            description: Bruto-vloeroppervlakte van het gebouw in m2
            source: {}
        output:
          - name: kostenverhaal_van_toepassing
            type: boolean
            description: Of de bouw onder kostenverhaal valt (art 8.13 onder d)
        actions:
          - output: kostenverhaal_van_toepassing
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $bvo_gebouw_m2
              value: 1000
  - number: 8.13.e
    text: |-
      de verbouwing van een of meer aaneengesloten gebouwen met andere gebruiksfuncties dan een woonfunctie tot gebouwen
      met een woonfunctie, mits het ten minste tien woonfuncties betreft; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
    machine_readable:
      execution:
        parameters:
          - name: aantal_woonfuncties
            type: number
            required: true
            description: Aantal woonfuncties na verbouwing
            source: {}
        output:
          - name: kostenverhaal_van_toepassing
            type: boolean
            description: Of de verbouwing onder kostenverhaal valt (art 8.13 onder e)
        actions:
          - output: kostenverhaal_van_toepassing
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $aantal_woonfuncties
              value: 10
  - number: 8.13.f
    text: |-
      de verbouwing van een of meer aaneengesloten gebouwen met andere gebruiksfuncties dan een kantoorfunctie, een
      winkelfunctie of een bijeenkomstfunctie voor het verstrekken van consumpties voor het gebruik ter plaatse tot
      gebouwen met een of meer van deze gebruiksfuncties, mits de cumulatieve bruto-vloeroppervlakte van de nieuwe
      gebruiksfuncties ten minste 1.500 m2 bedraagt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.13
    machine_readable:
      execution:
        parameters:
          - name: cumulatieve_bvo_nieuwe_functies_m2
            type: number
            required: true
            description: Cumulatieve bruto-vloeroppervlakte van de nieuwe gebruiksfuncties in m2
            source: {}
        output:
          - name: kostenverhaal_van_toepassing
            type: boolean
            description: Of de verbouwing onder kostenverhaal valt (art 8.13 onder f)
        actions:
          - output: kostenverhaal_van_toepassing
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $cumulatieve_bvo_nieuwe_functies_m2
              value: 1500
  - number: '8.14'
    text: 'Het bevoegd gezag kan beslissen kosten niet te verhalen als:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.14
  - number: 8.14.a
    text: |-
      het totaal van de verschuldigde geldsommen dat op grond van [artikel 13.18 van de wet][ref1] kan worden verhaald,
      minder bedraagt dan € 10.000,–;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.14
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
    machine_readable:
      execution:
        parameters:
          - name: totaal_verschuldigde_geldsommen
            type: number
            required: true
            description: Totaal van de verschuldigde geldsommen dat kan worden verhaald in euro
            source: {}
        output:
          - name: kosten_niet_verhalen
            type: boolean
            description: Of het bevoegd gezag kan beslissen kosten niet te verhalen (totaal < 10.000 euro)
        actions:
          - output: kosten_niet_verhalen
            value:
              operation: LESS_THAN
              subject: $totaal_verschuldigde_geldsommen
              value: 10000
  - number: 8.14.b
    text: |-
      er geen verhaalbare kosten als bedoeld in de onderdelen A5 tot en met A9 van [bijlage IV][ref1] zijn; of


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.14
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 8.14.c
    text: |-
      de verhaalbare kosten alleen de aansluiting van een locatie op de openbare ruimte of de aansluiting op
      nutsvoorzieningen betreffen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.14
  - number: '8.15'
    text: |-
      De kostensoorten, bedoeld in [artikel 13.11, eerste lid, aanhef, van de wet][ref1], zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.15.a
    text: |-
      voor kostenverhaalsgebieden waarvoor geen tijdvak als bedoeld in [artikel 13.15, eerste lid, van de wet][ref1] is
      opgenomen: de in tabel A van [bijlage IV][ref2] aangegeven kostensoorten; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0041278
  - number: 8.15.b
    text: |-
      voor kostenverhaalsgebieden waarvoor wel een tijdvak als bedoeld in [artikel 13.15, eerste lid, van de wet][ref1]
      is opgenomen: de in de tabellen A en B van [bijlage IV][ref2] aangegeven kostensoorten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0041278
  - number: '8.16'
    text: |-
      Bij de raming van de opbrengsten, bedoeld in [artikel 13.17 van de wet][ref1], wordt uitgegaan
      van de opbrengst van de gronden op een datum in het jaar waarin de beschikking, bedoeld in
      [artikel 13.18, eerste lid, van de wet][ref2], zal worden gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.17.1
    text: |-
      De raming van de inbrengwaarde, bedoeld in [artikel 13.17 van de wet][ref1], wordt vastgesteld:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.17.1.a
    text: |-
      met overeenkomstige toepassing van de [artikelen 15.21 tot en met 15.24 van de wet][ref1], met dien
      verstande dat voor gronden die zijn onteigend of waarvoor een onteigeningsbeschikking is gegeven of die op
      onteigeningsbasis zijn of worden verworven, de inbrengwaarde gelijk is aan de schadeloosstelling op basis van
      [paragraaf 15.3.1 van de wet][ref2]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Paragraaf15.3.1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
      - id: ref2
        bwb_id: BWBR0037885
        paragraaf: 15.3.1
  - number: 8.17.1.b
    text: |-
      overeenkomstig de waarde die bij beschikking op grond van
      [artikel 22, eerste lid, van de Wet waardering onroerende zaken][ref1] is vastgesteld voor het kalenderjaar waarin
      de raming wordt vastgesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0007119#Artikel22
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0007119
        artikel: '22'
  - number: 8.17.2
    text: 'Tot de inbrengwaarde worden gerekend:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
  - number: 8.17.2.a
    text: |-
      de waarde van de grond en de te slopen opstallen in de toestand voorafgaand aan het vaststellen van het
      omgevingsplan of het projectbesluit of het verlenen van de omgevingsvergunning voor een buitenplanse
      omgevingsplanactiviteit; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
  - number: 8.17.2.b
    text: |-
      de in [bijlage IV][ref1], onder B2, B3 en B4, genoemde kosten, inclusief de kosten die voorafgaand aan het
      vaststellen van het omgevingsplan of het projectbesluit of het verlenen van de omgevingsvergunning voor
      een buitenplanse omgevingsplanactiviteit zijn gemaakt en die direct verband houden met de te verrichten
      bouwactiviteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.17
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: 8.18.1
    text: |-
      De raming van de waardevermeerdering, bedoeld in [artikel 13.17 van de wet][ref1], wordt vastgesteld door de
      geraamde opbrengst van de locatie waar de activiteit wordt verricht te verminderen met de geraamde inbrengwaarde
      van die locatie.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
    machine_readable:
      execution:
        parameters:
          - name: geraamde_opbrengst
            type: number
            required: true
            description: Geraamde opbrengst van de locatie in euro
            source: {}
          - name: geraamde_inbrengwaarde
            type: number
            required: true
            description: Geraamde inbrengwaarde van de locatie in euro
            source: {}
        output:
          - name: waardevermeerdering
            type: number
            description: Geraamde waardevermeerdering van de locatie in euro
        actions:
          - output: waardevermeerdering
            value:
              operation: SUBTRACT
              values:
                - $geraamde_opbrengst
                - $geraamde_inbrengwaarde
  - number: 8.18.2
    text: |-
      Op de ramingen van de opbrengst en de inbrengwaarde zijn de [artikelen 8.16][ref1] en [8.17][ref2] van
      overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.18
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.4'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.4'
  - number: '8.19'
    text: |-
      Een eindafrekening op verzoek als bedoeld in [artikel 13.20, vierde lid, van de wet][ref1] vindt plaats op basis
      van de op het moment van de aanvraag om de eindafrekening:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.19
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.19.a
    text: gemaakte kosten; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.19
  - number: 8.19.b
    text: geraamde nog niet-gemaakte kosten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.19
  - number: '8.20'
    text: |-
      De activiteiten waarover in een overeenkomst bepalingen over financiële bijdragen kunnen worden opgenomen, bedoeld
      in [artikel 13.22, eerste lid, van de wet][ref1], zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.20.a
    text: |-
      de activiteiten, bedoeld in [artikel 8.13][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '8'
        hoofdstuk: '8'
        afdeling: '8.4'
  - number: 8.20.b
    text: |-
      de bouw van een bouwwerk geen gebouw zijnde als bedoeld in [bijlage I bij het Besluit bouwwerken leefomgeving][ref1]
      voor:


      [ref1]: https://wetten.overheid.nl/BWBR0041297
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
    references:
      - id: ref1
        bwb_id: BWBR0041297
  - number: 8.20.b.1°
    text: land- of tuinbouw, voor zover de oppervlakte ten minste 100 m2 bedraagt;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.b.2°
    text: |-
      opwekking of winning, omzetting of transport van energie of van gasvormige, vloeibare of vaste stoffen als
      energiedrager;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.b.3°
    text: infrastructuur, voor zover het gaat om wegen, vaarwegen, spoorwegen of telecommunicatie-infrastructuur;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.b.4°
    text: handelsreclame; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.b.5°
    text: recreatie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.c
    text: |-
      andere activiteiten met het oog op het gebruik op grond van een nieuw toegedeelde functie, voor zover het gaat om
      het gebruik van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.c.1°
    text: |-
      een of meer bestaande gebouwen, niet zijnde recreatiewoningen, mits de bruto-vloeroppervlakte van het nieuw
      toegelaten gebruik ten minste 1.500 m2 bedraagt;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.c.2°
    text: gronden, mits de grondoppervlakte van het nieuw toegelaten gebruik ten minste 1.000 m2 bedraagt; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.20.c.3°
    text: een of meer bestaande recreatiewoningen voor permanente bewoning.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.20
  - number: 8.21.1
    text: |-
      Als categorieën ontwikkelingen ter verbetering van de kwaliteit van de fysieke leefomgeving waarvoor, als wordt
      voldaan aan de criteria van [artikel 13.23, eerste lid, onder a en b, van de wet][ref1], in een omgevingsplan
      kan worden bepaald dat een financiële bijdrage wordt verhaald op degene die een activiteit als bedoeld in
      [artikel 13.11 van de wet][ref2] verricht, worden aangewezen:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.21.1.a
    text: |-
      wijziging van de inrichting van het landelijk gebied ter verbetering van landschappelijke waarden door middel van
      het treffen van maatregelen in de fysieke leefomgeving, waaronder in ieder geval worden begrepen het verwijderen
      van vrijkomende agrarische bebouwing en het herstellen of aanvullen van landschappelijke elementen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.1.b
    text: |-
      aanleg of wijziging van gebieden als bedoeld in [artikel 2.44 van de wet][ref1] of gebieden die in het
      omgevingsplan ter bescherming van de natuur zijn aangewezen en herstel, op basis van een omgevingsvisie of
      programma, van dier- en plantensoorten die van nature in Nederland in het wild voorkomen door middel van het
      treffen van maatregelen in de fysieke leefomgeving, waaronder in ieder geval worden begrepen maatregelen in de
      fysieke leefomgeving:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 8.21.1.b.1°
    text: ter vermindering van de stikstofdepositie; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.1.b.2°
    text: ter bescherming en verbetering van de chemische en ecologische kwaliteit van watersystemen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.1.c
    text: aanleg van infrastructuur voor verkeers- en openbaar vervoersnetwerken van gemeentelijk of regionaal belang;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.1.d
    text: |-
      aanleg van recreatievoorzieningen die behoren tot de gemeentelijke of regionale groenstructuur, waaronder in ieder
      geval worden begrepen parken en recreatiegebieden;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.1.e
    text: |-
      ontwikkelingen gericht op het bereiken van een naar prijsklasse evenwichtige samenstelling van de woningvoorraad
      in de gemeente of regio door middel van het realiseren van sociale huur- of koopwoningen als bedoeld in
      [artikel 5.161c, eerste lid, onder a en b, van het Besluit kwaliteit leefomgeving][ref1] buiten het gebied waar
      de activiteit, bedoeld in [artikel 13.11 van de wet][ref2], plaatsvindt, voor zover in dat gebied met het oog op
      die evenwichtige samenstelling onvoldoende sociale huur- of koopwoningen worden gerealiseerd en het op een andere
      locatie realiseren van die woningen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.21.1.e.1°
    text: |-
      in het omgevingsplan is toegelaten of voorgeschreven op grond van regels als bedoeld in
      [artikel 5.161c, eerste lid, onder a of b, van dat besluit][ref1] of in een programma is opgenomen; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 8.21.1.e.2°
    text: |-
      tot gevolg heeft dat de kosten, bedoeld in [artikel 13.11 van de wet][ref1], op grond van het eerste lid van dat
      artikel niet volledig kunnen worden verhaald of dat een tekort op de gemeentelijke exploitatie van de benodigde
      gronden ontstaat; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.21.1.f
    text: |-
      stedelijke herstructurering ter verbetering van het woon- en leefklimaat in verouderde wijken of gebieden met
      leegstandsproblemen door middel van het treffen van maatregelen in de fysieke leefomgeving, waaronder in ieder
      geval worden begrepen het slopen van woningen en het aanleggen of wijzigen van wegen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
  - number: 8.21.2
    text: |-
      Onder de aanwijzing valt niet de aanleg van voorzieningen of het treffen van maatregelen in de fysieke leefomgeving
      waarvoor kosten worden gemaakt die op grond van [artikel 13.11, eerste lid, van de wet][ref1] geheel of
      gedeeltelijk moeten worden verhaald op degene die de betrokken activiteit verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.22.1
    text: |-
      Als op grond van [artikel 13.23, eerste lid, van de wet][ref1] in een omgevingsplan wordt bepaald dat voor
      ontwikkelingen ter verbetering van de kwaliteit van de fysieke leefomgeving een financiële bijdrage wordt
      verhaald, worden in het omgevingsplan ook regels gesteld over de eindafrekening van de financiële bijdragen die met
      toepassing van [artikel 13.24 van de wet][ref2] worden verhaald. Daarbij wordt in ieder geval bepaald binnen welke
      termijn de eindafrekening plaatsvindt.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.22.2
    text: |-
      Als bij de eindafrekening blijkt dat de voor de ontwikkeling benodigde financiële bijdrage lager is dan de op
      grond van de beschikking, bedoeld in [artikel 13.24 van de wet][ref1], betaalde geldsom, betaalt het college van
      burgemeester en wethouders het verschil terug met rente.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: '9.1'
    text: |-
      Als gevallen waarin schade wordt geacht niet uit te gaan boven het normale maatschappelijke risico als bedoeld
      in [artikel 15.7, vierde lid, van de wet][ref1], worden aangewezen omgevingsplanactiviteiten met betrekking tot
      bouwwerken als bedoeld in [artikel 2.29, onder a tot en met r, van het Besluit bouwwerken leefomgeving][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
      - id: ref2
        bwb_id: BWBR0041297
        artikel: '2'
  - number: 9.2.1
    text: |-
      Het bestuursorgaan dat zijn bevoegdheid met toepassing van [artikel 15.8, derde lid, van de wet][ref1] overdraagt,
      geeft tegelijk met of zo spoedig mogelijk na de bekendmaking van het delegatiebesluit kennis van dat besluit op
      de in [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze en doet mededeling van dat besluit door toezending
      daarvan aan de aanvrager.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 9.2.2
    text: Het eerste lid is van overeenkomstige toepassing als het delegatiebesluit wordt ingetrokken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.2
  - number: '9.3'
    text: |-
      Voor de schade aangericht door dieren van de volgende soorten verlenen gedeputeerde staten een tegemoetkoming in
      schade als bedoeld in [artikel 15.53, eerste lid, van de wet][ref1]:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '15'
  - number: 9.3.a
    text: soorten als bedoeld in artikel 1 van de vogelrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.3
  - number: 9.3.b
    text: |-
      soorten, genoemd in bijlage IV, onder a, bij de habitatrichtlijn, bijlage II bij het verdrag van Bern of bijlage I
      bij het verdrag van Bonn; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.3
  - number: 9.3.c
    text: |-
      soorten, genoemd in [bijlage IX, onder A, bij het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel9.3
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: '10.1'
    text: |-
      Het bevoegde bestuursorgaan voert voorafgaand aan het nemen van een voorbereidingsbesluit op grond van
      [artikel 4.16, eerste of tweede lid, van de wet][ref1] overleg met het college van burgemeester en wethouders of
      de gemeenteraad.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 10.2.1
    text: |-
      Bij de kennisgeving van het voornemen om een omgevingsplan vast te stellen, bedoeld in
      [artikel 16.29 van de wet][ref1], wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties en
      bestuursorganen bij de voorbereiding worden betrokken.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.2.2
    text: |-
      Bij het vaststellen van een omgevingsplan wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties en
      bestuursorganen bij de voorbereiding zijn betrokken en wat de resultaten daarvan zijn. Daarbij wordt aangegeven op
      welke wijze invulling is gegeven aan het toepasselijke decentrale participatiebeleid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.2
  - number: 10.3.1
    text: |-
      De gemeenteraad of het college van burgemeester en wethouders zenden een besluit tot vaststelling
      van een omgevingsplan onverwijld aan gedeputeerde staten als sprake is van een geval als bedoeld in
      [artikel 16.21, eerste lid, onder a of b, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.3.2
    text: |-
      Gedeputeerde staten voeren voorafgaand aan het nemen van een besluit als bedoeld in
      [artikel 16.21 van de wet][ref1] overleg met het college van burgemeester en wethouders of de gemeenteraad.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.3a
    text: |-
      Bij het vaststellen van een waterschapsverordening wordt aangegeven hoe burgers, bedrijven, maatschappelijke
      organisaties en bestuursorganen bij de voorbereiding zijn betrokken en wat de resultaten daarvan zijn. Daarbij
      wordt aangegeven op welke wijze invulling is gegeven aan het toepasselijke decentrale participatiebeleid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3a
  - number: 10.3b
    text: |-
      Bij het vaststellen van een omgevingsverordening wordt aangegeven hoe burgers, bedrijven, maatschappelijke
      organisaties en bestuursorganen bij de voorbereiding zijn betrokken en wat de resultaten daarvan zijn. Daarbij
      wordt aangegeven op welke wijze invulling is gegeven aan het toepasselijke decentrale participatiebeleid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3b
  - number: 10.3c.1
    text: |-
      Bij de voorbereiding van een omgevingsplan, een waterschapsverordening en een omgevingsverordening waarop
      [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] van toepassing is, wordt van het ontwerp mededeling gedaan
      in het gemeenteblad, het waterschapsblad respectievelijk het provinciaal blad.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3c
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 10.3c.2
    text: |-
      Het eerste lid is niet van toepassing als het ontwerp van het omgevingsplan, de waterschapsverordening en de
      omgevingsverordening voor de inwerkingtreding van dit besluit ter inzage is gelegd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.3c
  - number: '10.4'
    text: |-
      Een zwemwaterprofiel als bedoeld in [artikel 3.6 van het Besluit kwaliteit leefomgeving][ref1] wordt regelmatig
      beoordeeld en geactualiseerd in overeenstemming met bijlage III bij de zwemwaterrichtlijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.4
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: '10.5'
    text: |-
      Als de aanwijzing van zwemlocaties, bedoeld in [artikel 3.2 van het Besluit kwaliteit leefomgeving][ref1],
      betrekking heeft op grensvormende of grensoverschrijdende wateren, overleggen gedeputeerde staten met de voor die
      wateren bevoegde Duitse of Belgische autoriteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.5
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: '10.6'
    text: |-
      Het bevoegde bestuursorgaan voert voorafgaand aan het geven van een instructie op grond van [artikel 2.33][ref1],
      [2.34][ref2] of [19.16, eerste en vierde lid, van de wet][ref3] overleg met het bestuursorgaan waaraan de
      instructie wordt gegeven.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '19'
  - number: 10.6a
    text: |-
      Van een instructie van een bestuursorgaan van een provincie of het Rijk op grond van [artikel 2.33][ref1] of
      [2.34 van de wet][ref2] wordt tegelijk met of zo spoedig mogelijk na de bekendmaking mededeling gedaan in het
      provinciaal blad respectievelijk de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.6b
    text: 'Onze Minister voor Natuur en Stikstof draagt zorg voor bekendmaking in de Staatscourant van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6b
  - number: 10.6b.a
    text: |-
      een kwantificering van instandhoudingsdoelstellingen als bedoeld in
      [artikel 2.19, vierde lid, onder a, onder 2°, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.6b.b
    text: |-
      rode lijsten met bedreigde of speciaal gevaar lopende dier- en plantensoorten als bedoeld in
      [artikel 2.19, vierde lid, onder a, onder 3°, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.6c.1
    text: |-
      Onze Minister voor Natuur en Stikstof draagt zorg voor de actualisatie van de besluiten tot aanwijzing van een
      Natura 2000-gebied, bedoeld in [artikel 2.44, eerste lid, van de wet][ref1], en van de besluiten tot aanwijzing
      van een bijzonder nationaal natuurgebied, bedoeld in artikel 2.44, tweede lid, van de wet.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6c
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.6c.2
    text: |-
      Bij de actualisatie wordt rekening gehouden met de inzichten die voortkomen uit de monitoring, bedoeld in
      [artikel 11.67 van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6c
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.6d
    text: |-
      De opvatting van de Europese Commissie, bedoeld in artikel 6, vierde lid, van de habitatrichtlijn, over het
      aanvoeren van andere dwingende redenen van groot openbaar belang dan argumenten die verband houden met de
      menselijke gezondheid, de openbare veiligheid of voor het milieu wezenlijk gunstige effecten, als sprake is van een
      Natura 2000-gebied met een prioritair type natuurlijke habitat of een prioritaire soort, wordt door Onze Minister
      voor Natuur en Stikstof gevraagd, op verzoek van het bevoegd gezag voor een omgevingsvergunning voor een Natura
      2000-activiteit of voor de vaststelling van een plan als bedoeld in artikel 6, derde lid, van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6d
  - number: 10.6e
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is van toepassing op de voorbereiding van
      een besluit tot vaststelling van een geluidproductieplafond als omgevingswaarde als bedoeld in de
      [artikelen 2.12a, eerste lid][ref2], [2.13a, eerste lid][ref3], en [2.15, tweede lid, van de wet][ref4],
      tenzij bij die vaststelling uitsluitend [artikel 3.41][ref5], [3.42][ref6], [3.43][ref7] of
      [3.46, tweede lid, van het Besluit kwaliteit leefomgeving wordt toegepast][ref8].


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref6]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref7]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref8]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.6e
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref4
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref6
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref7
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref8
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.7.1
    text: |-
      Bij het vaststellen van een omgevingsvisie wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties
      en bestuursorganen bij de voorbereiding zijn betrokken en wat de resultaten daarvan zijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.7
  - number: 10.7.2
    text: |-
      Als een omgevingsvisie wordt vastgesteld door de gemeenteraad of provinciale staten, wordt daarbij aangegeven op
      welke wijze invulling is gegeven aan het toepasselijke decentrale participatiebeleid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.7
  - number: 10.7a.1
    text: |-
      Bij de voorbereiding van een gemeentelijke, provinciale of nationale omgevingsvisie waarop
      [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] van toepassing is, wordt van het ontwerp mededeling gedaan
      in het gemeenteblad, het provinciaal blad respectievelijk de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.7a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 10.7a.2
    text: |-
      [Artikel 140 van de Gemeentewet][ref1], [artikel 137 van de Provinciewet][ref2] en
      [artikel 10a van de Bekendmakingswet][ref3] zijn van overeenkomstige toepassing op een gemeentelijke, provinciale
      respectievelijk nationale omgevingsvisie.


      [ref1]: https://wetten.overheid.nl/BWBR0005416#Artikel140
      [ref2]: https://wetten.overheid.nl/BWBR0005645#Artikel137
      [ref3]: https://wetten.overheid.nl/BWBR0004287#Artikel10a
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.7a
    references:
      - id: ref1
        bwb_id: BWBR0005416
        artikel: '140'
      - id: ref2
        bwb_id: BWBR0005645
        artikel: '137'
      - id: ref3
        bwb_id: BWBR0004287
        artikel: 10a
  - number: 10.8.1
    text: |-
      Bij het vaststellen van een programma wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties en
      bestuursorganen bij de voorbereiding zijn betrokken en wat de resultaten daarvan zijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.8
  - number: 10.8.2
    text: |-
      Als een programma wordt vastgesteld door het college van burgemeester en wethouders, het algemeen bestuur van
      het waterschap of gedeputeerde staten, wordt daarbij aangegeven op welke wijze invulling is gegeven aan het
      toepasselijke decentrale participatiebeleid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.8
  - number: '10.9'
    text: |-
      Het college van burgemeester en wethouders of de gemeenteraad, het dagelijks bestuur of het algemeen bestuur
      van een waterschap en gedeputeerde staten of provinciale staten verstrekken aan Onze Minister die het aangaat de
      benodigde gegevens over:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
  - number: 10.9.a
    text: |-
      een programma als bedoeld in [artikel 3.10, eerste lid, van de wet][ref1] voor zover dat is gericht op het voldoen
      aan een omgevingswaarde voor de kwaliteit van de buitenlucht;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.9.b
    text: |-
      een stroomgebiedsbeheerplan als bedoeld in [artikel 3.9, tweede lid, onder a, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.9.c
    text: |-
      een overstromingsrisicobeheerplan als bedoeld in [artikel 3.9, tweede lid, onder b, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.9.d
    text: |-
      een programma van maatregelen mariene strategie als bedoeld in [artikel 3.9, tweede lid, onder c, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.9.e
    text: |-
      een maritiem ruimtelijk plan als bedoeld in [artikel 3.9, tweede lid, onder d, van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.9.f
    text: |-
      een actieplan geluid als bedoeld in de [artikelen 3.6, eerste lid][ref1], [3.8, eerste lid][ref2], en
      [3.9, eerste lid, van de wet][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.9
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '3'
  - number: '10.10'
    text: |-
      Bij de totstandkoming van een programma als bedoeld in [artikel 3.10, eerste lid, van de wet][ref1], voor zover
      dat is gericht op het voldoen aan een omgevingswaarde voor de kwaliteit van de buitenlucht, overlegt het college
      van burgemeester en wethouders of het op grond van [artikel 4.1 van het Besluit kwaliteit leefomgeving][ref2]
      aangewezen bestuursorgaan met de bevoegde autoriteiten van andere staten als het niet voldoen aan die
      omgevingswaarde wordt veroorzaakt door grensoverschrijdende emissies.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.10
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
  - number: 10.10a
    text: 'Het nationale nec-programma wordt geactualiseerd:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.10a
  - number: 10.10a.a
    text: elke vier jaar; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.10a
  - number: 10.10a.b
    text: |-
      binnen achttien maanden na de indiening van de nationale emissie-inventarissen en nationale emissieprognoses,
      bedoeld in [artikel 11.21, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], als blijkt dat de
      emissiereductieverbintenissen en de verplichting om maatregelen te treffen, bedoeld in artikel 4 van die richtlijn,
      niet worden nagekomen, of als het gevaar bestaat dat dit het geval zal zijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.10a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.11.1
    text: |-
      Bij de totstandkoming van stroomgebiedsbeheerplannen en overstromingsrisicobeheerplannen als bedoeld in
      [artikel 3.9, tweede lid, onder a en b, van de wet][ref1] voor de stroomgebiedsdistricten Rijn, Maas, Schelde
      en Eems voor zover die betrekking hebben of ook betrekking hebben op het Nederlandse grondgebied, overlegt Onze
      Minister van Infrastructuur en Waterstaat met:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.11
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.11.1.a
    text: de bevoegde autoriteiten van andere staten in die stroomgebiedsdistricten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.11
  - number: 10.11.1.b
    text: |-
      het dagelijks bestuur van het waterschap of gedeputeerde staten als een stroomgebiedsdistrict of een gedeelte
      daarvan op het grondgebied van dat waterschap of die provincie ligt; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.11
  - number: 10.11.1.c
    text: vertegenwoordigers van gemeenten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.11
  - number: 10.11.2
    text: Een stroomgebiedsbeheerplan en een overstromingsrisicobeheerplan worden elke zes jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.11
  - number: 10.12.1
    text: |-
      Bij de totstandkoming van een programma van maatregelen mariene strategie als bedoeld in
      [artikel 3.9, tweede lid, onder c, van de wet][ref1] overlegt Onze Minister van Infrastructuur en Waterstaat met de
      bevoegde autoriteiten van andere staten van dezelfde mariene subregio.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.12.2
    text: Het programma van maatregelen mariene strategie wordt elke zes jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.12
  - number: 10.12.3
    text: |-
      Het programma van maatregelen mariene strategie is operationeel uiterlijk een jaar na de actualisatie, bedoeld in
      het tweede lid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.12
  - number: 10.13.1
    text: |-
      Bij de totstandkoming van de initiële beoordeling, de omschrijving van de goede milieutoestand en de milieudoelen,
      bedoeld in [artikel 3.1 van het Besluit kwaliteit leefomgeving][ref1], overlegt Onze Minister van Infrastructuur en
      Waterstaat met de bevoegde autoriteiten van andere staten van dezelfde mariene subregio.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.13
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.13.2
    text: |-
      De initiële beoordeling, de omschrijving van de goede milieutoestand en de milieudoelen worden elke zes jaar
      geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.13
  - number: 10.14.1
    text: |-
      Bij de totstandkoming van het monitoringsprogramma, bedoeld in
      [artikel 11.38, derde lid, van het Besluit kwaliteit leefomgeving][ref1], overlegt Onze Minister van
      Infrastructuur en Waterstaat met de bevoegde autoriteiten van andere staten van dezelfde mariene subregio.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.14
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.14.2
    text: Het monitoringsprogramma wordt elke zes jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.14
  - number: 10.15.1
    text: |-
      Bij de totstandkoming van een maritiem ruimtelijk plan als bedoeld in
      [artikel 3.9, tweede lid, onder d, van de wet][ref1] overlegt Onze Minister van Infrastructuur en Waterstaat met de
      bevoegde autoriteiten van andere staten die aan de Nederlandse mariene wateren grenzen, onder meer over het gebruik
      van de best beschikbare gegevens en de uitwisseling van informatie.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.15
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.15.2
    text: Een maritiem ruimtelijk plan wordt elke tien jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.15
  - number: 10.16.1
    text: |-
      Bij de totstandkoming van het nationale waterprogramma, bedoeld in
      [artikel 3.9, tweede lid, onder e, van de wet][ref1], overlegt Onze Minister van Infrastructuur en Waterstaat met:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.16.1.a
    text: de bevoegde autoriteiten van andere staten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
  - number: 10.16.1.b
    text: |-
      het dagelijks bestuur van het waterschap of gedeputeerde staten als de rijkswateren of een gedeelte daarvan op het
      grondgebied van dat waterschap of die provincie liggen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
  - number: 10.16.1.c
    text: vertegenwoordigers van gemeenten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
  - number: 10.16.2
    text: |-
      Een waterbeheerprogramma als bedoeld in [artikel 3.7 van de wet][ref1], een regionaal waterprogramma als bedoeld in
      [artikel 3.8, tweede lid, van de wet][ref2] en het nationale waterprogramma worden elke zes jaar geactualiseerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.16.3
    text: |-
      Maatregelen als bedoeld in artikel 11 van de kaderrichtlijn water, die op grond
      van [artikel 4.3, eerste lid, onder a][ref1], [4.4, derde lid, onder a][ref2], of
      [4.10, derde lid, onder a, van het Besluit kwaliteit leefomgeving][ref3] zijn opgenomen in een
      waterbeheerprogramma, een regionaal waterprogramma of het nationale waterprogramma, zijn operationeel uiterlijk
      drie jaar na de actualisatie, bedoeld in het tweede lid.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.16
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '4'
  - number: 10.17.1
    text: |-
      Bij de totstandkoming van een actieplan als bedoeld in de [artikelen 3.6, eerste lid][ref1],
      [3.8, eerste lid][ref2], en [3.9, eerste lid, van de wet][ref3] overlegt het bevoegd gezag met de bevoegde
      autoriteiten van de aangrenzende staten voor zover het actieplan ook betrekking heeft op een grensregio.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.17
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.17.2
    text: Een actieplan wordt elke vijf jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.17
  - number: 10.18.1
    text: |-
      Een beheerplan voor een Natura 2000-gebied als bedoeld in de [artikelen 3.8, derde lid][ref1], en
      [3.9, derde lid, van de wet][ref2] wordt elke zes jaar geactualiseerd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.18.2
    text: |-
      Het eerste beheerplan Natura 2000 wordt vastgesteld uiterlijk drie jaar na dagtekening van het besluit tot
      aanwijzing van een gebied als Natura 2000-gebied, bedoeld in [artikel 2.44, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.18
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: '10.19'
    text: Het programma stikstofreductie en natuurverbetering wordt ten minste elke zes jaar geactualiseerd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.19
    machine_readable:
      execution:
        parameters:
          - name: datum_laatste_actualisatie
            type: date
            required: true
            description: Datum van de laatste actualisatie van het programma stikstofreductie en natuurverbetering
            source: {}
        output:
          - name: uiterlijke_datum_volgende_actualisatie
            type: date
            description: Uiterlijke datum waarop de volgende actualisatie moet plaatsvinden
        actions:
          - output: uiterlijke_datum_volgende_actualisatie
            value:
              operation: DATE_ADD
              date: $datum_laatste_actualisatie
              years: 6
  - number: 10.19a.1
    text: |-
      Als uit de monitoring, bedoeld in [artikel 11.68 van het Besluit kwaliteit leefomgeving][ref1], of uit de
      gegevensverzameling, bedoeld in [artikel 11.69a van dat besluit][ref2], blijkt dat ondanks alle maatregelen die
      al zijn getroffen een instandhoudingsdoelstelling voor een voor stikstof gevoelige habitat in een Natura 2000-
      gebied niet kan worden bereikt of alleen met een onevenredige inspanning kan worden bereikt als gevolg van
      stikstofdepositie die wordt veroorzaakt door bronnen in andere lidstaten van de Europese Unie, overlegt Onze
      Minister voor Natuur en Stikstof met de lidstaten waaruit de stikstof overwegend afkomstig is, over maatregelen in
      die lidstaten om de emissie te verminderen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.19a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.19a.2
    text: |-
      Als vermindering van de emissie redelijkerwijs niet mogelijk is, overlegt Onze Minister voor Natuur en Stikstof met
      de Europese Commissie over de toepassing van de vogelrichtlijn en de habitatrichtlijn voor dit Natura 2000-gebied
      en de betrokken habitat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.19a
  - number: 10.19b
    text: |-
      Voor het elektronisch indienen van een aanvraag om een maatwerkvoorschrift over [artikel 11.96][ref1] of
      [11.108 van het Besluit activiteiten leefomgeving][ref2] wordt gebruikgemaakt van het elektronische formulier dat
      door Onze Minister voor Natuur en Stikstof beschikbaar is gesteld op mijn.rvo.nl.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.19b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 10.20.1
    text: |-
      Het bevoegd gezag geeft op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde wijze kennis van:


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.20
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 10.20.1.a
    text: |-
      meldingen als bedoeld in de [hoofdstukken 2 tot en met 5 van het Besluit activiteiten leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
  - number: 10.20.1.b
    text: |-
      meldingen als bedoeld in [artikel 7.33 van het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel7
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.20
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '7'
  - number: 10.20.2
    text: |-
      Het bevoegd gezag geeft kennis van maatwerkvoorschriften als bedoeld in de
      [hoofdstukken 2 tot en met 5 van het Besluit activiteiten leefomgeving][ref1] op de in
      [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Hoofdstuk2
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.20
    references:
      - id: ref1
        bwb_id: BWBR0041330
        hoofdstuk: '2'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: '10.21'
    text: |-
      Voor alle wateractiviteiten wordt de omgevingsvergunning los aangevraagd van de omgevingsvergunning voor andere
      activiteiten als bedoeld in de [artikelen 5.1][ref1] en [5.4 van de wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 10.21a
    text: |-
      Voor de volgende activiteiten die de natuur betreffen wordt de omgevingsvergunning los aangevraagd van de
      omgevingsvergunning voor andere activiteiten als bedoeld in de [artikelen 5.1][ref1] en [5.4 van de wet][ref2]:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 10.21a.a
    text: een jachtgeweeractiviteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21a
  - number: 10.21a.b
    text: een valkeniersactiviteit; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21a
  - number: 10.21a.c
    text: |-
      een flora- en fauna-activiteit van nationaal belang als bedoeld in [artikel 4.12, derde lid, onder c][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21a
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 10.21b.1
    text: |-
      De aanvraag om een omgevingsvergunning voor een jachtgeweeractiviteit wordt door de aanvrager in persoon ingediend,
      onder overlegging van een geldig identiteitsbewijs.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21b
  - number: 10.21b.2
    text: |-
      Het eerste lid en [artikel 16.78a, eerste lid, van de wet][ref1] zijn niet van toepassing op een
      aanvrager die een aanvraag indient om een omgevingsvergunning voor een jachtgeweeractiviteit als bedoeld in
      [artikel 10.23, vijfde lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.6.1
        afdeling: '10.6'
  - number: 10.21c
    text: |-
      Voor het elektronisch indienen van een aanvraag om een omgevingsvergunning voor een valkeniersactiviteit wordt
      gebruikgemaakt van het elektronische formulier dat door Onze Minister voor Natuur en Stikstof beschikbaar is
      gesteld op mijn.rvo.nl.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21c
  - number: 10.21d
    text: |-
      Voor het elektronisch indienen van een aanvraag om een omgevingsvergunning voor een flora- en fauna-activiteit
      van nationaal belang als bedoeld in [artikel 4.12, derde lid, onder c][ref1], wordt gebruikgemaakt van het
      elektronische formulier dat door Onze Minister voor Natuur en Stikstof beschikbaar is gesteld op mijn.rvo.nl.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.21d
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 10.22.1
    text: |-
      Het bevoegd gezag verstrekt aan een bevoegde autoriteit van een andere staat een afschrift van de aanvraag om een
      omgevingsvergunning voor een milieubelastende activiteit met de daarbij behorende gegevens als:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
  - number: 10.22.1.a
    text: die activiteit aanzienlijke nadelige gevolgen voor het milieu in die staat kan veroorzaken; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
  - number: 10.22.1.b
    text: die staat vanwege mogelijke aanzienlijke nadelige gevolgen voor het milieu daarom verzoekt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
  - number: 10.22.2
    text: 'Het afschrift en de daarbij behorende gegevens worden verstrekt op het moment waarop op grond van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
  - number: 10.22.2.a
    text: |-
      [artikel 16.57 van de wet][ref1] kennis wordt gegeven van de aanvraag; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 10.22.2.b
    text: |-
      [artikel 3:11, eerste lid, van de Algemene wet bestuursrecht][ref1] het ontwerpbesluit met de daarbij behorende
      stukken ter inzage wordt gelegd.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
    references:
      - id: ref1
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 10.22.3
    text: |-
      Als de aanvraag om een omgevingsvergunning betrekking heeft op een winningsafvalvoorziening categorie A
      als bedoeld in [bijlage I bij het Besluit kwaliteit leefomgeving][ref1], die aanzienlijke nadelige gevolgen
      voor het milieu kan hebben in een andere staat, en over het op die aanvraag te nemen besluit overleg
      plaatsvindt met bestuursorganen in die andere staat, wordt dit overleg vermeld in de kennisgeving, bedoeld in
      [artikel 3:12 van de Algemene wet bestuursrecht][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
    references:
      - id: ref1
        bwb_id: BWBR0041313
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 10.22.4
    text: |-
      Als de aanvraag betrekking heeft op het produceren en leveren van teruggewonnen water, bedoeld in
      [artikel 19.1c van het Besluit activiteiten leefomgeving][ref1], wordt informatie uitgewisseld als bedoeld in de
      artikelen 6, vierde lid, en 8, eerste lid, van de verordening hergebruik stedelijk afvalwater.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel19
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '19'
  - number: 10.22.5
    text: |-
      Nadat het besluit is vastgesteld, verstrekt het bevoegd gezag dat besluit aan de bevoegde autoriteit, het betrokken
      publiek en de bevoegde instanties van die andere staat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22
  - number: 10.22a.1
    text: |-
      Het bevoegd gezag verstrekt binnen een week na de dag waarop een omgevingsvergunning voor een
      rijksmonumentenactiviteit is verleend een afschrift van de vergunning aan het college van burgemeester en
      wethouders en aan Onze Minister van Onderwijs, Cultuur en Wetenschap.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22a
  - number: 10.22a.2
    text: |-
      Het bevoegd gezag verstrekt binnen een week na de dag waarop een omgevingsvergunning voor
      een omgevingsplanactiviteit in een rijksbeschermd stads- of dorpsgezicht als bedoeld in
      [artikel 2.34, vierde lid, van de wet][ref1] is verleend die van invloed is op het karakter van dat stads- of
      dorpsgezicht, een afschrift van de vergunning aan Onze Minister van Onderwijs, Cultuur en Wetenschap.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.22a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.23.1
    text: |-
      In een omgevingsvergunning voor een bouwactiviteit die betrekking heeft op een tijdelijk bouwwerk wordt bepaald dat
      de vergunninghouder na het verstrijken van een bij de omgevingsvergunning gestelde termijn van ten hoogste vijftien
      jaar, verplicht is de voor de verlening van de omgevingsvergunning bestaande toestand te hebben hersteld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.2
    text: |-
      Als de in de omgevingsvergunning voor een bouwactiviteit bepaalde termijn korter is dan vijftien jaar, kan die
      termijn worden verlengd tot ten hoogste vijftien jaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.3
    text: 'In een omgevingsvergunning voor een jachtgeweeractiviteit wordt bepaald dat die geldt:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.3.a
    text: |-
      voor een daarbij gestelde termijn van ten hoogste een jaar, binnen een periode die loopt van 1 april tot 1 april
      van het daaropvolgende jaar; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.3.b
    text: |-
      als dat eerder is, tot het tijdstip waarop een rechterlijke uitspraak ten uitvoer kan worden gelegd waarbij de
      bevoegdheid tot het gebruik van een geweer ter uitvoering van de [wet][ref1] is ontzegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 10.23.4
    text: 'In een omgevingsvergunning voor een valkeniersactiviteit wordt bepaald dat die geldt:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.4.a
    text: |-
      voor een daarbij gestelde termijn van ten hoogste vijf jaar, binnen een periode die loopt van 1 april tot 1 april
      van het vijfde daaropvolgende jaar; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
  - number: 10.23.4.b
    text: |-
      als dat eerder is, tot het tijdstip waarop een rechterlijke uitspraak ten uitvoer kan worden gelegd waarbij de
      bevoegdheid tot het gebruik van een roofvogel ter uitvoering van de [wet][ref1] is ontzegd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 10.23.5
    text: |-
      Als toepassing wordt gegeven aan [artikel 8.74u][ref1] of [8.74x van het Besluit kwaliteit leefomgeving][ref2] en
      een omgevingsvergunning aan niet in Nederland woonachtige personen wordt verleend, wordt in de omgevingsvergunning
      voor een jachtgeweeractiviteit en in de omgevingsvergunning voor een valkeniersactiviteit bepaald dat die geldt
      voor een daarbij gestelde termijn van ten hoogste zes opeenvolgende in de vergunning vermelde dagen.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.23
