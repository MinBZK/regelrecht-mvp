  - number: 4.25.2
    text: |-
      Gedeputeerde staten zijn ook adviseur voor een aanvraag om een omgevingsvergunning voor zover de aanvraag
      betrekking heeft op een of meer activiteiten als bedoeld in [artikel 4.6, tweede lid][ref1], maar zij op grond van
      [artikel 4.15, eerste, tweede, derde of vierde lid][ref2], niet bevoegd zijn op die aanvraag te beslissen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.25.3
    text: |-
      De voorgenomen beslissing op de aanvraag behoeft ook instemming van gedeputeerde staten als het gaat om een
      aanvraag als bedoeld in het eerste lid, aanhef en onder a, b, c, onder 1°, d, e, f of g, of tweede lid, met
      uitzondering van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
  - number: 4.25.3.a
    text: |-
      een aanvraag als bedoeld in het eerste lid, aanhef en onder f, als de activiteit betrekking heeft op een
      provinciaal monument of een voorbeschermd provinciaal monument; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
  - number: 4.25.3.b
    text: 'een aanvraag als bedoeld in het eerste lid, aanhef en onder g, als de voorgenomen beslissing strekt tot:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
  - number: 4.25.3.b.1°
    text: het weigeren van de vergunning; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
  - number: 4.25.3.b.2°
    text: het verlenen van de vergunning en de activiteit betrekking heeft op een provinciaal monument.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.25
  - number: 4.26.1
    text: |-
      Als op grond van [artikel 20, derde lid, van de Wet personenvervoer 2000][ref1] een gebied is aangewezen, is
      het dagelijks bestuur van het openbaar lichaam, bedoeld in dat artikellid, adviseur voor een aanvraag om een
      omgevingsvergunning voor zover de aanvraag betrekking heeft op een beperkingengebiedactiviteit met betrekking tot
      een lokale spoorweg in dat gebied.


      [ref1]: https://wetten.overheid.nl/BWBR0011470#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.26
    references:
      - id: ref1
        bwb_id: BWBR0011470
        artikel: '20'
  - number: 4.26.2
    text: De voorgenomen beslissing op de aanvraag behoeft ook instemming van het dagelijks bestuur van het openbaar lichaam.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.26
  - number: 4.27.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties is adviseur voor een aanvraag om een
      omgevingsvergunning voor zover de aanvraag betrekking heeft op een bouwactiviteit en het voornemen
      bestaat om bij de beslissing op de aanvraag in een voorschrift van de omgevingsvergunning op grond
      van [artikel 4.5 van het Besluit bouwwerken leefomgeving][ref1] af te wijken van een regel uit
      [hoofdstuk 4 van dat besluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.27
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '4'
  - number: 4.27.2
    text: |-
      De voorgenomen beslissing op de aanvraag behoeft ook instemming van Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.27
  - number: 4.27.3
    text: |-
      Het eerste en tweede lid zijn van overeenkomstige toepassing op een aanvraag om een maatwerkvoorschrift om af te
      wijken van een regel als bedoeld in het eerste lid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.27
  - number: 4.27.4
    text: |-
      Het eerste, tweede en derde lid zijn van niet toepassing op het met een vergunningvoorschrift of
      maatwerkvoorschrift afwijken van [artikel 4.103 van het Besluit bouwwerken leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041297#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.27
    references:
      - id: ref1
        bwb_id: BWBR0041297
        artikel: '4'
  - number: 4.28.1
    text: |-
      Onze Minister van Defensie is adviseur voor een aanvraag om een omgevingsvergunning voor zover de aanvraag
      betrekking heeft op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.28
  - number: 4.28.1.a
    text: een beperkingengebiedactiviteit met betrekking tot een militaire luchthaven; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.28
  - number: 4.28.1.b
    text: |-
      een omgevingsplanactiviteit in een radarverstoringsgebied als bedoeld in
      [artikel 5.155, derde lid, van het Besluit kwaliteit leefomgeving][ref1] als het gaat om mogelijke gevolgen voor
      het militaire radarbeeld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.28
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.28.2
    text: |-
      De voorgenomen beslissing op de aanvraag, bedoeld in het eerste lid, aanhef en onder a, behoeft ook instemming van
      Onze Minister van Defensie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.28
  - number: 4.29.1
    text: |-
      Onze Minister van Economische Zaken en Klimaat is adviseur voor een aanvraag om een omgevingsvergunning
      voor zover de aanvraag betrekking heeft op een milieubelastende activiteit als bedoeld in
      [artikel 3.321, eerste lid, van het Besluit activiteiten leefomgeving][ref1], voor zover het gaat om het aanleggen
      of het exploiteren van een mijnbouwwerk voor het opsporen of winnen van aardwarmte.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.29
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 4.29.2
    text: |-
      Onze Minister van Economische Zaken en Klimaat is ook adviseur voor een aanvraag om een omgevingsvergunning voor
      zover de aanvraag betrekking heeft op een of meer activiteiten als bedoeld in [artikel 4.10, tweede lid][ref1],
      maar hij op grond van [artikel 4.15, vierde lid][ref2], niet bevoegd is op die aanvraag te beslissen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.29
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.29.3
    text: |-
      De voorgenomen beslissing op de aanvraag, bedoeld in het eerste of tweede lid, behoeft ook instemming van Onze
      Minister van Economische Zaken en Klimaat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.29
  - number: 4.30.1
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is adviseur voor een aanvraag om een omgevingsvergunning voor zover
      de aanvraag betrekking heeft op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.a
    text: |-
      een wateractiviteit die betrekking heeft op een watersysteem of onderdeel daarvan als bedoeld in
      [artikel 3.1][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '3'
        hoofdstuk: '3'
        afdeling: '3.1'
  - number: 4.30.1.b
    text: 'een ontgrondingsactiviteit in:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.b.1°
    text: het winterbed van een tot de rijkswateren behorende rivier; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.b.2°
    text: een rijkswater, anders dan in het winterbed van een rivier, waarbij minder dan 100.000 m3 in situ wordt ontgraven;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.c
    text: |-
      een beperkingengebiedactiviteit met betrekking tot een weg in beheer bij het Rijk, de luchthaven Schiphol, een
      overige burgerluchthaven van nationale betekenis, een burgerluchthaven van regionale betekenis, een hoofdspoorweg
      of een bijzondere spoorweg;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.d
    text: |-
      een activiteit anders dan bedoeld in [artikel 4.11, eerste lid, onder a tot en met c][ref1], of in
      [artikel 4.10, eerste lid][ref2], [4.12][ref3] of [4.13][ref4], die geheel of in hoofdzaak plaatsvindt in:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref4]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref3
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref4
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.30.1.d.1°
    text: de territoriale zee voor zover gelegen buiten het provinciaal en gemeentelijk ingedeelde gebied; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.d.2°
    text: de exclusieve economische zone;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30.1.e
    text: |-
      een omgevingsplanactiviteit in een radarverstoringsgebied als bedoeld in
      [artikel 5.155, eerste lid, van het Besluit kwaliteit leefomgeving][ref1] als het gaat om mogelijke gevolgen voor
      het civiele radarbeeld; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.30.1.f
    text: |-
      een omgevingsplanactiviteit in een gebied als bedoeld in
      [artikel 5.161a, eerste lid, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 4.30.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is ook adviseur voor een aanvraag om een omgevingsvergunning voor
      zover de aanvraag betrekking heeft op een of meer activiteiten als bedoeld in [artikel 4.11, tweede lid][ref1],
      maar hij op grond van [artikel 4.15, vierde lid][ref2], niet bevoegd is op die aanvraag te beslissen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.30.3
    text: |-
      De voorgenomen beslissing op de aanvraag, bedoeld in het eerste lid, aanhef en onder a, b, c of d, of tweede
      lid, behoeft ook instemming van Onze Minister van Infrastructuur en Waterstaat, met uitzondering van een aanvraag
      als bedoeld in het eerste lid, aanhef en onder c, die betrekking heeft op een beperkingengebiedactiviteit met
      betrekking tot een burgerluchthaven van regionale betekenis, als de voorgenomen beslissing strekt tot het weigeren
      van de vergunning.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30
  - number: 4.30a.1
    text: |-
      Onze Minister van Landbouw, Natuur en Voedselkwaliteit is adviseur voor een aanvraag om een
      omgevingsvergunning voor zover de aanvraag betrekking heeft op een milieubelastende activiteit als bedoeld in
      [artikel 3.48b van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30a
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
  - number: 4.30a.2
    text: |-
      De voorgenomen beslissing op de aanvraag behoeft ook instemming van Onze Minister van Landbouw, Natuur en
      Voedselkwaliteit.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.30a
  - number: 4.31.1
    text: |-
      Onze Minister voor Natuur en Stikstof is adviseur voor een aanvraag om een omgevingsvergunning voor zover de
      aanvraag betrekking heeft op een Natura 2000-activiteit van nationaal belang of een flora- en fauna-activiteit van
      nationaal belang als bedoeld in [artikel 4.12, tweede en derde lid][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.31
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 4.31.2
    text: De voorgenomen beslissing op de aanvraag behoeft ook instemming van Onze Minister voor Natuur en Stikstof.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.31
  - number: 4.32.1
    text: |-
      Onze Minister van Onderwijs, Cultuur en Wetenschap is adviseur voor een aanvraag om een omgevingsvergunning voor
      zover de aanvraag betrekking heeft op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.a
    text: een rijksmonumentenactiviteit met betrekking tot een archeologisch monument; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b
    text: 'een rijksmonumentenactiviteit met betrekking tot een monument, in de volgende gevallen:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b.1°
    text: |-
      het slopen van het monument, als het gaat om het geheel afbreken van het monument of het gedeeltelijk afbreken
      daarvan als die gedeeltelijke afbraak van ingrijpende aard is voor de monumentale waarden van het monument;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b.2°
    text: |-
      het ingrijpend wijzigen van het monument of een belangrijk deel daarvan, als de gevolgen voor de monumentale
      waarden van het monument vergelijkbaar zijn met de gevolgen van het slopen van het monument, bedoeld onder 1°;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b.3°
    text: |-
      het reconstrueren van het monument of een belangrijk deel daarvan, waarbij de staat van het monument wordt
      teruggebracht naar een eerdere staat of een veronderstelde eerdere staat van het monument;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b.4°
    text: |-
      het wijzigen van het monument of een belangrijk deel daarvan voor een gebruiksverandering van het monument, als dat
      ingrijpende gevolgen heeft voor de monumentale waarden; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.1.b.5°
    text: het verplaatsen van het monument of een belangrijk deel daarvan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: 4.32.2
    text: |-
      De voorgenomen beslissing op de aanvraag, bedoeld in het eerste lid, aanhef en onder a, behoeft ook instemming van
      Onze Minister van Onderwijs, Cultuur en Wetenschap.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.32
  - number: '4.33'
    text: |-
      Het bestuur van de veiligheidsregio op het grondgebied waarvan een milieubelastende activiteit geheel of in
      hoofdzaak plaatsvindt, is adviseur voor een aanvraag om een omgevingsvergunning voor zover de aanvraag betrekking
      heeft op een milieubelastende activiteit als bedoeld in [bijlage III][ref1], onder 1.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.33
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: '4.34'
    text: |-
      De inspecteur-generaal leefomgeving en transport is adviseur voor een aanvraag om een omgevingsvergunning voor
      zover de aanvraag betrekking heeft op een milieubelastende activiteit als bedoeld in [bijlage III][ref1], onder 2.


      [ref1]: https://wetten.overheid.nl/BWBR0041278
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.34
    references:
      - id: ref1
        bwb_id: BWBR0041278
  - number: '4.35'
    text: |-
      Het bestuursorgaan dat zorg draagt voor het beheer van een zuiveringtechnisch werk of een oppervlaktewaterlichaam
      waarop afvalwater vanuit een voorziening voor de inzameling en het transport van afvalwater wordt gebracht,
      is adviseur voor een aanvraag om een omgevingsvergunning voor zover de aanvraag betrekking heeft op een
      omgevingsvergunning voor een milieubelastende activiteit die betrekking heeft op het brengen van afvalwater of
      andere afvalstoffen in een dergelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.35
  - number: '4.36'
    text: |-
      Het bestuursorgaan dat zijn bevoegdheid om op een aanvraag om een omgevingsvergunning te beslissen met toepassing
      van [artikel 5.16 van de wet][ref1] heeft overgedragen, is adviseur voor die aanvraag voor zover die betrekking
      heeft op de activiteit of activiteiten die bepalend zijn geweest voor de aanwijzing van dat bestuursorgaan als
      bevoegd gezag.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: '4.37'
    text: |-
      Het op grond van de [artikelen 4.20 tot en met 4.32][ref1] aangewezen bestuursorgaan kan gevallen aanwijzen waarin
      instemming niet is vereist.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.37
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.38.1
    text: |-
      Instemming wordt alleen verleend of onthouden op dezelfde gronden als de gronden voor het verlenen of weigeren van
      de omgevingsvergunning voor de activiteit, tenzij het tweede, derde of vierde lid van toepassing is. Daarbij geldt
      een ontheffing als bedoeld in [artikel 2.32 van de wet][ref1] die is verleend voor een voorgenomen beslissing tot
      verlening van een omgevingsvergunning als ontheffing voor het verlenen van instemming.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.38
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 4.38.2
    text: |-
      Als de aanvraag om een omgevingsvergunning betrekking heeft op een omgevingsplanactiviteit als bedoeld in
      [artikel 4.25, eerste lid, onder g][ref1], kan instemming alleen worden onthouden als de voorgenomen beslissing
      op de aanvraag in strijd is met een door een bestuursorgaan van de provincie in een openbaar document aangegeven
      provinciaal belang en het provinciebestuur dat belang niet met inzet van andere aan hem toekomende bevoegdheden
      kan beschermen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.38
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.38.3
    text: |-
      Als de aanvraag om een omgevingsvergunning betrekking heeft op een bouwactiviteit als bedoeld in
      [artikel 4.27, eerste lid][ref1], of als het gaat om een aanvraag om een maatwerkvoorschrift als bedoeld in artikel
      4.27, derde lid, kan instemming alleen worden onthouden als geen sprake is van een bijzonder geval dat het afwijken
      van de regel uit [hoofdstuk 4 van het Besluit bouwwerken leefomgeving][ref2] rechtvaardigt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041297#Hoofdstuk4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.38
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
      - id: ref2
        bwb_id: BWBR0041297
        hoofdstuk: '4'
  - number: 4.38.4
    text: |-
      Als de aanvraag om een omgevingsvergunning betrekking heeft op een beperkingengebiedactiviteit met betrekking
      tot een burgerluchthaven van regionale betekenis als bedoeld in [artikel 4.30, eerste lid, onder c][ref1], kan
      instemming alleen worden onthouden in het belang van het veilig gebruik van het luchtruim.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.38
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 5.1.1
    text: |-
      Als Onze Minister die het aangaat, in overeenstemming met Onze Minister van Binnenlandse Zaken en
      Koninkrijksrelaties, zijn bevoegdheid met toepassing van [artikel 5.44b van de wet][ref1] overdraagt, geeft hij
      tegelijk met of zo spoedig mogelijk na de bekendmaking van het delegatiebesluit kennis van dat besluit op de in
      [artikel 12 van de Bekendmakingswet][ref2] bepaalde wijze en doet hij mededeling van dat besluit door toezending
      daarvan aan de initiatiefnemer.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 5.1.2
    text: Het eerste lid is van overeenkomstige toepassing als het delegatiebesluit wordt ingetrokken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.1
  - number: 5.2.1
    text: |-
      Het voornemen om een verkenning uit te voeren naar een mogelijk bestaande of toekomstige opgave in de fysieke
      leefomgeving bevat in ieder geval:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
  - number: 5.2.1.a
    text: een beschrijving van die opgave;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
  - number: 5.2.1.b
    text: een beschrijving van de wijze waarop de verkenning zal worden uitgevoerd;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
  - number: 5.2.1.c
    text: de termijn waarbinnen de verkenning zal worden uitgevoerd; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
  - number: 5.2.1.d
    text: een vermelding van het bevoegd gezag.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
  - number: 5.2.2
    text: |-
      Het bevoegd gezag geeft kennis van het voornemen op de in [artikel 12 van de Bekendmakingswet][ref1] bepaalde
      wijze.


      [ref1]: https://wetten.overheid.nl/BWBR0004287#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.2
    references:
      - id: ref1
        bwb_id: BWBR0004287
        artikel: '12'
  - number: 5.3.1
    text: |-
      In de kennisgeving van de wijze waarop burgers, bedrijven, maatschappelijke organisaties en bestuursorganen zullen
      worden betrokken, bedoeld in [artikel 5.47, vierde lid, van de wet][ref1], wordt in ieder geval aangegeven:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 5.3.1.a
    text: wie worden betrokken;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.1.b
    text: waarover zij worden betrokken;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.1.c
    text: wanneer zij worden betrokken;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.1.d
    text: wat de rol is van het bevoegd gezag en de initiatiefnemer bij het betrekken van deze partijen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.1.e
    text: waar aanvullende informatie beschikbaar is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.2
    text: |-
      De kennisgeving vindt plaats op een door het bevoegd gezag te bepalen geschikte wijze, waardoor het voor de te
      verkennen opgave in de fysieke leefomgeving relevante publiek zo goed mogelijk wordt bereikt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
  - number: 5.3.3
    text: |-
      Het bevoegd gezag draagt er zorg voor dat de benodigde informatie voor het betrekken van burgers,
      bedrijven, maatschappelijke organisaties en bestuursorganen op een toegankelijke wijze beschikbaar is.
      [Artikel 5.1 van de Wet open overheid][ref1] is van overeenkomstige toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0045754#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.3
    references:
      - id: ref1
        bwb_id: BWBR0045754
        artikel: '5'
  - number: '5.4'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat neemt in overeenstemming met Onze Minister van Binnenlandse Zaken
      en Koninkrijksrelaties ter voorbereiding van een projectbesluit voor werken met een nationaal belang in ieder geval
      een voorkeursbeslissing als de mogelijk bestaande of toekomstige opgave in de fysieke leefomgeving die is opgenomen
      in het voornemen of de daarin genoemde mogelijke oplossing voor die opgave, geheel of gedeeltelijk ziet op:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.4
  - number: 5.4.a
    text: de aanleg van een autoweg of autosnelweg, spoorweg of vaarweg;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.4
  - number: 5.4.b
    text: |-
      de uitbreiding van een weg met meer dan twee rijstroken, als het uit te breiden weggedeelte twee knooppunten of
      aansluitingen met elkaar verbindt; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.4
  - number: 5.4.c
    text: |-
      de uitbreiding van een spoorweg met meer dan twee sporen, als het uit te breiden spoorweggedeelte twee
      aansluitingen met elkaar verbindt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.4
  - number: 5.5.1
    text: Een voorkeursbeslissing vermeldt in ieder geval welke oplossing de voorkeur van het bevoegd gezag heeft.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.5
  - number: 5.5.2
    text: |-
      In een voorkeursbeslissing wordt aangegeven hoe burgers, bedrijven, maatschappelijke organisaties en
      bestuursorganen zijn betrokken en wat de resultaten zijn van de uitgevoerde verkenning, waarbij in ieder geval
      wordt ingegaan op de door derden voorgedragen mogelijke oplossingen en de daarover door deskundigen uitgebrachte
      adviezen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.5
  - number: 5.5a.1
    text: |-
      Bij de voorbereiding van een projectbesluit van een bestuursorgaan van een waterschap, een provincie of het Rijk
      waarop [afdeling 3.4 van de Algemene wet bestuursrecht][ref1] van toepassing is, wordt van het ontwerp mededeling
      gedaan in het waterschapsblad, het provinciaal blad respectievelijk de Staatscourant.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.5a
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 5.5a.2
    text: |-
      Het eerste lid is niet van toepassing als het ontwerp van een projectbesluit voor de inwerkingtreding van dit
      besluit ter inzage is gelegd.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.5a
  - number: '5.6'
    text: |-
      Onverminderd [artikel 5.51 van de wet][ref1] bevat een projectbesluit in ieder geval:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.6
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 5.6.a
    text: een beschrijving van het project;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.6
  - number: 5.6.b
    text: |-
      de voor de fysieke leefomgeving relevante permanente of tijdelijke maatregelen en voorzieningen om het project te
      realiseren; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.6
  - number: 5.6.c
    text: |-
      de maatregelen die zijn gericht op het ongedaan maken, beperken of compenseren van de nadelige gevolgen van het
      project of van het in werking hebben of in stand houden daarvan voor de fysieke leefomgeving.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.6
  - number: 5.7.1
    text: 'In een projectbesluit kan worden bepaald dat het projectbesluit geldt als:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
  - number: 5.7.1.a
    text: |-
      een besluit tot vaststelling van een geluidproductieplafond als omgevingswaarde als bedoeld in
      [artikel 2.12a, eerste lid][ref1], [2.13a, eerste lid][ref2], of [2.15, tweede lid, van de wet][ref3];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.7.1.b
    text: |-
      een maatwerkvoorschrift op grond van regels als bedoeld in [artikel 4.3 van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 5.7.1.c
    text: |-
      een verkeersbesluit als bedoeld in [artikel 15 van de Wegenverkeerswet 1994][ref1] voor zover het gaat om de
      uitvoering van het projectbesluit; en


      [ref1]: https://wetten.overheid.nl/BWBR0006622#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0006622
        artikel: '15'
  - number: 5.7.1.d
    text: |-
      een onttrekking van een weg aan de openbaarheid als bedoeld in
      [artikel 7, aanhef en onder II, van de Wegenwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel7
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '7'
  - number: 5.7.2
    text: |-
      Als het projectbesluit geldt als een besluit tot vaststelling van een geluidproductieplafond als
      omgevingswaarde als bedoeld in [artikel 2.12a, eerste lid][ref1], [2.13a, eerste lid][ref2], of
      [2.15, tweede lid, van de wet][ref3], is [afdeling 3.5 van het Besluit kwaliteit leefomgeving][ref4] van
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref4
        bwb_id: BWBR0041313
        afdeling: '3.5'
  - number: 5.7.3
    text: |-
      Als het projectbesluit geldt als een maatwerkvoorschrift, is [paragraaf 4.3.2 van de wet][ref1] van overeenkomstige
      toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Paragraaf4.3.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0037885
        paragraaf: 4.3.2
  - number: 5.7.4
    text: |-
      Als het projectbesluit geldt als een verkeersbesluit, zijn de [artikelen 16, eerste lid][ref1], en
      [152 van de Wegenverkeerswet 1994][ref2] en de [artikelen 12 tot en met 15][ref3], [18][ref4] en
      [21 van het Besluit administratieve bepalingen inzake het wegverkeer][ref5] van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0006622#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0006622#Artikel152
      [ref3]: https://wetten.overheid.nl/BWBR0004826#Artikel12
      [ref4]: https://wetten.overheid.nl/BWBR0004826#Artikel18
      [ref5]: https://wetten.overheid.nl/BWBR0004826#Artikel21
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0006622
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0006622
        artikel: '152'
      - id: ref3
        bwb_id: BWBR0004826
        artikel: '12'
      - id: ref4
        bwb_id: BWBR0004826
        artikel: '18'
      - id: ref5
        bwb_id: BWBR0004826
        artikel: '21'
  - number: 5.7.5
    text: |-
      Als het projectbesluit geldt als een onttrekking van een weg aan de openbaarheid, zijn de
      [artikelen 4 tot en met 7 van de Wegenwet][ref1] van toepassing.


      [ref1]: https://wetten.overheid.nl/BWBR0001948#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7
    references:
      - id: ref1
        bwb_id: BWBR0001948
        artikel: '4'
  - number: 5.7a
    text: |-
      Onverminderd [artikel 5.54 van de wet][ref1] wordt aan [artikel 5.7, eerste lid, onder a][ref2], in ieder geval
      toepassing gegeven als een projectbesluit:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '5'
        hoofdstuk: '5'
        afdeling: '5.3'
  - number: 5.7a.a
    text: |-
      een activiteit toelaat op een industrieterrein waarvoor op grond van [artikel 2.12a van de wet][ref1]
      geluidproductieplafonds als omgevingswaarden zijn vastgesteld en door het geluid door die activiteit niet aan die
      plafonds kan worden voldaan;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.7a.b
    text: |-
      ziet op de aanleg van een weg of spoorweg waarvoor op grond van [artikel 2.13a][ref1] of
      [2.15, tweede lid, van de wet][ref2] geluidproductieplafonds als omgevingswaarden worden vastgesteld; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.7a.c
    text: |-
      ziet op een wijziging van een weg of spoorweg waarvoor op grond van [artikel 2.13a][ref1] of
      [2.15, tweede lid, van de wet][ref2] geluidproductieplafonds als omgevingswaarden zijn vastgesteld en na die
      wijziging niet aan die plafonds kan worden voldaan.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 5.7b
    text: |-
      [Artikel 4.31][ref1] is niet van overeenkomstige toepassing op een ontwerp van een
      projectbesluit en een voorgenomen projectbesluit voor een project als bedoeld in
      [artikel 5.46, eerste lid, aanhef en onder a tot en met e, van de wet][ref2], voor zover daarin wordt bepaald dat
      het geldt als een omgevingsvergunning voor een Natura 2000-activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.7b
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 5.8.1
    text: |-
      Het bestuursorgaan dat op grond van de [wet][ref1], de [Wegenverkeerswet 1994](onbekend) of de [Wegenwet][ref2]
      bevoegd zou zijn om de besluiten, bedoeld in [artikel 5.7, eerste lid][ref3], te nemen, is adviseur voor dat
      onderdeel van het projectbesluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
      [ref2]: https://wetten.overheid.nl/BWBR0001948
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
      - id: ref2
        bwb_id: BWBR0001948
      - id: ref3
        bwb_id: BWBR0041278
        artikel: '5'
        hoofdstuk: '5'
        afdeling: '5.3'
  - number: 5.8.2
    text: |-
      Het in het eerste lid bedoelde onderdeel van het projectbesluit behoeft ook instemming van het adviserende
      bestuursorgaan, waarbij geen instemming is vereist als:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.8
  - number: 5.8.2.a
    text: |-
      het projectbesluit wordt vastgesteld door Onze Minister die het aangaat als bedoeld in
      [artikel 5.44 van de wet][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.8
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '5'
  - number: 5.8.2.b
    text: |-
      het projectbesluit wordt vastgesteld door gedeputeerde staten en het projectbesluit geldt als besluit waarvoor een
      ander bestuursorgaan, met uitzondering van een bestuursorgaan van het Rijk, het adviserende bestuursorgaan is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.8
  - number: 5.8.3
    text: |-
      Instemming wordt alleen onthouden op dezelfde gronden als die, waarop een aanvraag om een besluit kan worden
      afgewezen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel5.8
  - number: 6.1.1
    text: Een faunabeheereenheid heeft de rechtsvorm van een vereniging met volledige rechtsbevoegdheid of een stichting.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.1
  - number: 6.1.2
    text: 'In het bestuur van een faunabeheereenheid zijn in ieder geval vertegenwoordigd:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.1
  - number: 6.1.2.a
    text: de jachthouders uit het werkgebied van de faunabeheereenheid; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.1
  - number: 6.1.2.b
    text: |-
      maatschappelijke organisaties die het doel behartigen van een duurzaam beheer van populaties van in het wild
      levende dieren in de regio waartoe het werkgebied van de faunabeheereenheid behoort.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.1
  - number: 6.1.3
    text: |-
      Vertegenwoordigers van andere dan de in het tweede lid bedoelde maatschappelijke organisaties en wetenschappers
      op het gebied van faunabeheer kunnen op uitnodiging van het bestuur van de faunabeheereenheid deelnemen aan de
      vergaderingen van het bestuur en het bestuur adviseren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.1
  - number: 6.2.1
    text: |-
      Een faunabeheerplan bevat in ieder geval passende en doeltreffende maatregelen voor het voorkomen en het bestrijden
      van schade aangericht door in het wild levende dieren.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.2
  - number: 6.2.2
    text: |-
      Een faunabeheerplan wordt onderbouwd door trendtellingen van de populaties van in het wild levende dieren in het
      gebied waarop het faunabeheerplan van toepassing is om een planmatige en doelmatige aanpak van het faunabeheer
      te bewerkstelligen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.2
  - number: 6.2.3
    text: |-
      Een faunabeheerplan heeft geen betrekking op het beheren van populaties van exoten als bedoeld in
      [bijlage I bij het Besluit activiteiten leefomgeving][ref1] of verwilderde dieren en op het bestrijden van
      schadeveroorzakende exoten of verwilderde dieren.


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.2
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 6.2.4
    text: |-
      Voor diersoorten die bij ministeriële regeling zijn aangewezen vanwege de omvang van hun leefgebieden stellen
      faunabeheereenheden met een binnen een leefgebied vallend werkgebied gezamenlijk het faunabeheerplan vast.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.2
  - number: 6.3.1
    text: |-
      De faunabeheereenheid hoort de binnen haar werkgebied werkzame wildbeheereenheden over het ontwerp van het
      faunabeheerplan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.3
  - number: 6.3.2
    text: |-
      De faunabeheereenheid maakt het faunabeheerplan openbaar, zodra dit door het bevoegd gezag op grond van
      [artikel 8.1, tweede of vijfde lid, van de wet][ref1] is goedgekeurd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
  - number: 6.3.3
    text: |-
      De faunabeheereenheid brengt jaarlijks verslag uit van de uitvoering van het faunabeheerplan aan het bevoegd gezag
      voor de goedkeuring van het faunabeheerplan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.3
  - number: 6.3.4
    text: |-
      Houders van een omgevingsvergunning voor een jachtgeweeractiviteit verstrekken aan de faunabeheereenheid gegevens
      over de aantallen dieren, onderscheiden naar soort, die zij binnen het werkgebied van de faunabeheereenheid hebben
      gedood.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.3
  - number: 6.3.5
    text: |-
      De faunabeheereenheden maken een overzicht van de door houders van een omgevingsvergunning voor een
      jachtgeweeractiviteit verstrekte gegevens en de gegevens uit het jaarlijkse verslag betrekking hebbend op hun
      totale werkgebied, openbaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.3
  - number: '6.4'
    text: |-
      Onze Minister voor Natuur en Stikstof beslist over de goedkeuring van een faunabeheerplan en is
      bevoegd tot het stellen van de nadere regels over faunabeheereenheden en faunabeheerplannen, bedoeld
      in [artikel 8.1, derde lid, van de wet][ref1], en regels over wildbeheereenheden als bedoeld in
      [artikel 8.2, vijfde lid, van de wet][ref2] als deze betrekking hebben op terreinen waar de Kroondrager gerechtigd
      is tot het uitoefenen van de jacht.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel6.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '8'
  - number: 7.1.1
    text: 'Een voorkeursrechtbeschikking bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.a
    text: |-
      de kadastrale aanduidingen van de onroerende zaak of zaken waarop het voorkeursrecht wordt gevestigd en de naam van
      de gemeente of gemeenten waar die onroerende zaak of zaken zijn gelegen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.b
    text: de kadastrale grootte van elk van de in de beschikking opgenomen percelen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.c
    text: 'als een gedeelte van een perceel in de beschikking wordt opgenomen: de grootte van dat gedeelte;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.d
    text: |-
      de namen van de eigenaren van en de beperkt gerechtigden op de in de beschikking opgenomen onroerende zaak of zaken
      volgens de basisregistratie kadaster;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.e
    text: de grondslag op basis waarvan het besluit is genomen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.f
    text: de eerst mogelijke vervaldatum van het voorkeursrecht;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.g
    text: |-
      voor zover van toepassing: de grondslag op basis waarvan eerder een voorkeursrecht is gevestigd op de onroerende
      zaak of zaken en het tijdstip waarop dat voorkeursrecht is vervallen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.h
    text: 'een grondtekening waarop is weergegeven of vermeld:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.h.1°
    text: |-
      de ligging van de percelen of gedeelten van percelen die tot de onroerende zaak of zaken behoren en de kadastrale
      nummers van die percelen op een goed afleesbare en op de tekening vermelde schaalgrootte;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.h.2°
    text: elke onroerende zaak waarop een voorkeursrecht wordt gevestigd;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.h.3°
    text: de aansluiting van de onroerende zaak of zaken op het daaromheen gelegen gebied; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.1.h.4°
    text: een noordpijl en de naam van de gemeente of gemeenten.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.2
    text: 'Een voorkeursrechtbeschikking die betrekking heeft op een provinciaal of nationaal voorkeursrecht, vermeldt ook:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.2.a
    text: of op de onroerende zaak of zaken al een voorkeursrecht is gevestigd door een ander bestuursorgaan; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.2.b
    text: 'als op de onroerende zaak of zaken al een voorkeursrecht is gevestigd door een ander bestuursorgaan:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.2.b.1°
    text: het rechtsgevolg van de voorkeursrechtbeschikking voor het al eerder gevestigde voorkeursrecht;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
  - number: 7.1.2.b.2°
    text: |-
      als al een uitnodiging tot onderhandeling is gedaan als bedoeld in [artikel 9.12, vierde lid, van de wet][ref1]:
      het rechtsgevolg van de voorkeursrechtbeschikking voor die uitnodiging.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: 7.2.1
    text: |-
      Een besluit tot intrekking van een voorkeursrecht als bedoeld in [artikel 9.5, eerste lid, van de wet][ref1] bevat
      de kadastrale aanduidingen van de onroerende zaak of zaken waarop de intrekking betrekking heeft en de naam van de
      gemeente of gemeenten waar die onroerende zaak of zaken zijn gelegen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: 7.2.2
    text: |-
      Het eerste lid is van overeenkomstige toepassing op een mededeling als bedoeld in
      [artikel 9.5, derde lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: '7.3'
    text: |-
      Schriftelijke mededelingen aan of van de vervreemder op grond van de [artikelen 9.12, eerste lid][ref1],
      [9.13][ref2] en [9.16, eerste lid, van de wet][ref3] worden gedaan bij aangetekende brief.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel9
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.3
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '9'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '9'
  - number: 7.4.1
    text: 'Het bevoegd gezag zendt aan de vervreemder een afschrift van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.4
  - number: 7.4.1.a
    text: |-
      een verzoek aan de rechtbank als bedoeld in [artikel 9.16, eerste lid, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: 7.4.1.b
    text: |-
      een schriftelijke intrekking van een verzoek als bedoeld in
      [artikel 9.17, eerste lid, onder b, en tweede lid, onder b, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: 7.4.2
    text: |-
      De vervreemder zendt aan het bevoegd gezag een afschrift van een verzoek als bedoeld in
      [artikel 9.18, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel9
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.4
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '9'
  - number: '7.5'
    text: 'Een onteigeningsbeschikking bevat in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.a
    text: |-
      de kadastrale aanduidingen van de te onteigenen onroerende zaak of zaken en de naam van de gemeente of gemeenten
      waar die onroerende zaak of zaken zijn gelegen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.b
    text: de kadastrale grootte van elk van de in de beschikking opgenomen percelen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.c
    text: 'als een gedeelte van een perceel in de beschikking wordt opgenomen: de grootte van dat gedeelte;'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.d
    text: |-
      de namen van de eigenaren van en de beperkt gerechtigden op de te onteigenen onroerende zaak of zaken volgens de
      basisregistratie kadaster;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.e
    text: |-
      een beschrijving van de beoogde vorm van ontwikkeling, gebruik of beheer van de fysieke leefomgeving waarvoor de
      onteigening nodig is; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: 7.5.f
    text: de naam van de onteigenaar.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.5
  - number: '7.6'
    text: 'Het ontwerp van de onteigeningsbeschikking wordt ter inzage gelegd met:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.a
    text: 'een grondtekening waarop is weergegeven of vermeld:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.a.1°
    text: |-
      de ligging van de percelen of gedeelten van percelen die tot de te onteigenen onroerende zaak of zaken behoren en
      de kadastrale nummers van die percelen op een goed afleesbare en op de tekening vermelde schaalgrootte;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.a.2°
    text: elke te onteigenen onroerende zaak;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.a.3°
    text: de aansluiting van de te onteigenen onroerende zaak of zaken op het daaromheen gelegen gebied; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.a.4°
    text: een noordpijl en de naam van de gemeente of gemeenten; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: 7.6.b
    text: |-
      het ter inzage gelegde ontwerp van het omgevingsplan of het projectbesluit, het vastgestelde omgevingsplan
      of projectbesluit, de aanvraag om een omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit of
      de verleende omgevingsvergunning voor een buitenplanse omgevingsplanactiviteit waarmee de beoogde vorm van
      ontwikkeling, gebruik of beheer van de fysieke leefomgeving mogelijk wordt gemaakt, met daarop ook een projectie
      van de grondtekening, bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel7.6
  - number: '8.1'
    text: |-
      De gevallen van verontreiniging, aantasting, verstoring of beschadiging, bedoeld in
      [artikel 13.3a, eerste lid, van de wet][ref1], waarin de voor rekening van de daarin bedoelde rechtspersonen
      komende kosten kunnen worden verhaald, zijn:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
  - number: 8.1.a
    text: de verontreiniging of aantasting van de bodem; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.1
  - number: 8.1.b
    text: de verontreiniging of aantasting van de bodem of oever van een oppervlaktewaterlichaam.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.1
  - number: 8.1a
    text: |-
      Gevallen als bedoeld in [artikel 13.3d van de wet][ref1] zijn de gevallen waarin schadevergoeding als gevolg
      van een besluit of een regel als bedoeld in [artikel 15.1, eerste lid, onder a, e, i of k, van de wet][ref2] is
      betaald, voor zover dat besluit of die regel betrekking heeft op waterbeheer.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.1a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '15'
  - number: 8.2.1
    text: |-
      Als minder dan 10.000 m3 vaste stoffen in situ wordt ontgraven, is geen heffing als bedoeld in
      [artikel 13.4a, eerste lid, van de wet][ref1], verschuldigd.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '13'
    machine_readable:
      execution:
        parameters:
          - name: volume_ontgraven_m3
            type: number
            required: true
            description: Volume vaste stoffen dat in situ wordt ontgraven in m3
            source: {}
        output:
          - name: heffing_verschuldigd
            type: boolean
            description: Of de ontgrondingenheffing verschuldigd is
        actions:
          - output: heffing_verschuldigd
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $volume_ontgraven_m3
              value: 10000
  - number: 8.2.2
    text: Als het bedrag van de ontgrondingenheffing lager is dan € 250,–, vindt geen teruggave van de heffing plaats.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.2
    machine_readable:
      execution:
        parameters:
          - name: bedrag_ontgrondingenheffing
            type: number
            required: true
            description: Het bedrag van de ontgrondingenheffing in euro
            source: {}
        output:
          - name: teruggave_mogelijk
            type: boolean
            description: Of teruggave van de heffing plaatsvindt
        actions:
          - output: teruggave_mogelijk
            value:
              operation: GREATER_THAN_OR_EQUAL
              subject: $bedrag_ontgrondingenheffing
              value: 250
  - number: 8.2.3
    text: De ontgrondingenheffing wordt geheven bij wijze van aanslag.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.2
  - number: '8.3'
    text: |-
