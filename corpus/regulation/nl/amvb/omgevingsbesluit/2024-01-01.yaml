        afdeling: '4.2'
      - id: ref3
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        afdeling: '4.2'
  - number: 4.19.2
    text: |-
      In een geval als bedoeld in het eerste lid zijn de in de [artikelen 4.20][ref1], [4.24][ref2] en [4.25][ref3]
      toegekende bevoegdheden tot instemming alleen van toepassing op het college, het dagelijks bestuur of gedeputeerde
      staten van de gemeente, het waterschap of de provincie waar de activiteit in hoofdzaak plaatsvindt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel4.19
    references:
