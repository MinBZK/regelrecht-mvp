        artikel: '23'
  - number: '13.4'
    text: |-
      Deze afdeling is van toepassing op het verrichten van werkzaamheden voor de uitoefening van bevoegdheden door het
      bevoegd gezag in het kader van de uitvoeringstaak, bedoeld in [artikel 18.18, tweede lid, van de wet][ref1], en de
      handhavingstaak, bedoeld in [artikel 18.1 van de wet][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel18
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel18
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.4
    references:
