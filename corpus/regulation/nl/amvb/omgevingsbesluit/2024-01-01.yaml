    text: een Seveso-inrichting.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.24
  - number: 10.24.2
    text: |-
      Dit artikel is niet van toepassing op een activiteit als bedoeld in het eerste lid, onder a, als die
      activiteit alleen wordt verricht voor archeologisch vooronderzoek voor zover dit bestaat uit booronderzoek,
      proefputtenonderzoek, proefsleuvenonderzoek, of, bij cultureel erfgoed onder water, het nemen van materiaalmonsters
      of het meenemen van een archeologische vondst als bedoeld in de [Erfgoedwet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037521
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.24
    references:
      - id: ref1
        bwb_id: BWBR0037521
  - number: 10.24.3
    text: |-
      Dit artikel is niet van toepassing op een activiteit als bedoeld in het eerste lid, onder d, als die activiteit
      alleen of voornamelijk wordt uitgevoerd voor onderzoek, ontwikkeling en het testen van nieuwe methoden of producten
      gedurende minder dan twee jaar, tenzij aannemelijk is dat de activiteit significante nadelige gevolgen heeft voor
      de gezondheid of het milieu.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.24
  - number: 10.24.4
    text: |-
      Dit artikel is niet van toepassing op een wijziging van een omgevingsvergunning als bedoeld in het eerste lid,
      onder b tot en met f, en k, onder 1°, als die wijziging naar het oordeel van het bevoegd gezag geen significante
      nadelige gevolgen heeft voor de gezondheid of het milieu.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.24
  - number: 10.25.1
    text: |-
      In een geval als bedoeld in [artikel 16.7, eerste lid, onder a, van de wet][ref1] is coördinerend bestuursorgaan
      als bedoeld in [artikel 3:21, eerste lid, van de Algemene wet bestuursrecht][ref2] het bestuursorgaan dat
      bevoegd is te beslissen op de aanvraag om een omgevingsvergunning of wijziging van de voorschriften van een
      omgevingsvergunning voor de andere activiteit of activiteiten dan wateractiviteiten.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: 10.25.2
    text: |-
      In de gevallen, bedoeld in [artikel 16.7, eerste lid, onder b, van de wet][ref1], is coördinerend bestuursorgaan
      als bedoeld in [artikel 3:21, eerste lid, van de Algemene wet bestuursrecht][ref2] het bestuursorgaan dat
      bevoegd is te beslissen op de aanvraag om een omgevingsvergunning of wijziging van de voorschriften van een
      omgevingsvergunning voor de milieubelastende activiteit, respectievelijk dat bevoegd is die voorschriften
      ambtshalve te wijzigen.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.25
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0005537
        artikel: '3'
  - number: '10.26'
    text: |-
      [Afdeling 3.4 van de Algemene wet bestuursrecht][ref1] is niet van toepassing op de voorbereiding van een besluit
      tot gehele of gedeeltelijke intrekking van een gedoogplichtbeschikking.


      [ref1]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26
    references:
      - id: ref1
        bwb_id: BWBR0005537
        afdeling: '3.4'
  - number: 10.26a
    text: |-
      Met toepassing van [artikel 28, eerste lid, laatste zinsnede, van de Dienstenwet][ref1] is
      [paragraaf 4.1.3.3 van de Algemene wet bestuursrecht][ref2] niet van toepassing op de beslissing
      op een aanvraag om aanwijzing als certificatie-instelling en de beslissing op een aanvraag om
      aanwijzing van een certificatieschema als bedoeld in de [artikelen 3.74, eerste lid][ref3], en
      [3.75, eerste lid, van het Besluit kwaliteit leefomgeving][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0026759#Artikel28
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Paragraaf4.1.3.3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26a
    references:
      - id: ref1
        bwb_id: BWBR0026759
        artikel: '28'
      - id: ref2
        bwb_id: BWBR0005537
        paragraaf: 4.1.3.3
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.26b.1
    text: |-
      De aanvrager verstrekt bij de aanvraag om toelating van een instrument voor kwaliteitsborging tot het stelsel van
      kwaliteitsborging voor het bouwen als bedoeld in [artikel 3.76 van het Besluit kwaliteit leefomgeving][ref1] de bij
      ministeriële regeling aangewezen gegevens en bescheiden.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.26b.2
    text: |-
      De in het eerste lid bedoelde gegevens en bescheiden hoeven niet te worden verstrekt voor zover de
      toelatingsorganisatie al over die gegevens of bescheiden beschikt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26b
  - number: 10.26c
    text: |-
      Met toepassing van [artikel 28, eerste lid, laatste zinsnede, van de Dienstenwet][ref1] is
      [paragraaf 4.1.3.3 van de Algemene wet bestuursrecht][ref2] niet van toepassing op de beslissing op de aanvraag
      om toelating van een instrument voor kwaliteitsborging tot het stelsel van kwaliteitsborging voor het bouwen als
      bedoeld in [artikel 3.76 van het Besluit kwaliteit leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0026759#Artikel28
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Paragraaf4.1.3.3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.26c
    references:
