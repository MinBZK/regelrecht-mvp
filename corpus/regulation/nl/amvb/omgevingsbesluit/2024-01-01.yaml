        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.2.2
        afdeling: '13.2'
  - number: 13.6.1.c
    text: |-
      de criteria die worden gebruikt bij het beoordelen van en beslissen op aanvragen om omgevingsvergunningen en het
      beoordelen van meldingen als bedoeld in [artikel 4.4, eerste lid, van de wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.6
    references:
      - id: ref1
