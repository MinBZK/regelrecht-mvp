  - number: 8.4.2.d
    text: het personeel dat de onderzoeken verricht of begeleidt; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel8.4
  - number: 8.4.2.e
    text: het beschikbaar stellen van de resultaten van de onderzoeken aan het publiek.
