        artikel: '5'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '5'
      - id: ref4
        bwb_id: BWBR0041313
      - id: ref5
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 10.27.a.1°
    text: |-
      de inwerkingtreding van een besluit tot verlening, wijziging of intrekking van een omgevingsvergunning of een
      vergunning als bedoeld in [artikel 15, aanhef en onder b, van de Kernenergiewet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0002402#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0002402
        artikel: '15'
  - number: 10.27.a.2°
    text: |-
      de ontvangst van een melding op grond van het [Besluit activiteiten leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 10.27.a.3°
    text: |-
      de ontvangst van de informatie inhoudende dat niet binnen de begrenzing van de locatie waar de activiteit wordt
      verricht aan de in het [Besluit activiteiten leefomgeving][ref1] voor die activiteit bepaalde afstand is voldaan;
      of


      [ref1]: https://wetten.overheid.nl/BWBR0041330
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
  - number: 10.27.a.4°
    text: |-
      een uitspraak van de Afdeling bestuursrechtspraak van de Raad van State of een uitspraak van de Voorzitter van die
      Afdeling over een besluit als bedoeld onder 1° of een melding als bedoeld onder 2°; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
  - number: 10.27.b
    text: |-
      voor locaties van beperkt kwetsbare, kwetsbare en zeer kwetsbare gebouwen en beperkt kwetsbare en kwetsbare
      locaties als bedoeld in [bijlage VI bij het Besluit kwaliteit leefomgeving][ref1] onverwijld na:


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 10.27.b.1°
    text: de inwerkingtreding van een besluit tot vaststelling van een omgevingsplan;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
  - number: 10.27.b.2°
    text: de inwerkingtreding van een besluit tot verlening, wijziging of intrekking van een omgevingsvergunning; of
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
  - number: 10.27.b.3°
    text: |-
      een uitspraak van de Afdeling bestuursrechtspraak van de Raad van State of een uitspraak van de Voorzitter van die
      Afdeling, over een besluit als bedoeld onder 1° of 2°.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27
  - number: 10.27a
    text: |-
      Als een activiteit al rechtmatig wordt verricht op het tijdstip van inwerkingtreding van [artikel 10.27][ref1], dan
      geldt de verplichting om gegevens te verstrekken, bedoeld in de aanhef van dat artikel, met ingang van 1 januari
      2025. De gegevens worden onverwijld verstrekt.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.27a
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.1
        afdeling: '10.8'
  - number: '10.28'
    text: |-
      Wanneer het bevoegd gezag beschikt over gegevens als bedoeld in
      [artikel 4.5, eerste lid, onder e, van het Besluit activiteiten leefomgeving][ref1], die niet zijn verstrekt door
      degene die de Seveso-inrichting exploiteert, worden die gegevens beschikbaar gesteld aan degene die de Seveso-
      inrichting exploiteert voor zover dit nodig is voor de toepassing van [artikel 4.13 van dat besluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.28
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 10.28a
    text: |-
      Het dagelijks bestuur van het waterschap verstrekt voor elke primaire waterkering waarover
      het het beheer heeft een verslag over de algemene waterstaatkundige toestand als bedoeld in
      [artikel 11.15 van het Besluit kwaliteit leefomgeving][ref1], aan Onze Minister van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.28a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.29.1
    text: |-
      Het college van burgemeester en wethouders van een gemeente, waarvan het grondgebied ligt in een aandachtsgebied
      dat is aangewezen in [artikel 5.51, tweede of derde lid, van het Besluit kwaliteit leefomgeving][ref1], en
      gedeputeerde staten van de provincie waarvan het grondgebied in dat gebied ligt, verstrekken de gegevens, bedoeld
      in [artikel 11.22, eerste en tweede lid, van dat besluit][ref2], jaarlijks uiterlijk op 31 mei aan Onze Minister
      van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.29.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt jaarlijks uiterlijk op 31 maart de gegevens, bedoeld in
      [artikel 11.22, derde lid, van het Besluit kwaliteit leefomgeving][ref1], elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.29.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt jaarlijks uiterlijk op 31 december een verslag van de
      resultaten van de monitoring van de omgevingswaarden voor de kwaliteit van de buitenlucht, bedoeld in de
      [artikelen 2.3 tot en met 2.8a van het Besluit kwaliteit leefomgeving][ref1], elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.29
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
  - number: '10.30'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt de nationale emissie-inventarissen en nationale
      emissieprognoses, bedoeld in [artikel 11.21, eerste lid, van het Besluit kwaliteit leefomgeving][ref1],
      elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.30
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: '10.31'
    text: |-
      De commissaris van de Koning maakt een besluit met regels over het gebruik van installaties of brandstoffen en over
      andere verontreinigende activiteiten als bedoeld in [artikel 19.12, eerste of derde lid, van de wet][ref1], via de
      media en langs elektronische weg bekend. Van het besluit wordt vervolgens zo spoedig mogelijk mededeling gedaan in
      het provinciaal blad, onder vermelding van het tijdstip van inwerkingtreding van het besluit.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel19
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.31
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '19'
  - number: '10.32'
    text: |-
      Een monitoringsprogramma als bedoeld in [artikel 11.28 van het Besluit kwaliteit leefomgeving][ref1] wordt
      elektronisch beschikbaar gesteld.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.32
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: '10.33'
    text: |-
      Het dagelijks bestuur van het waterschap en gedeputeerde staten verstrekken de door hen
      verzamelde gegevens die nodig zijn voor het opstellen van stroomgebiedsbeheerplannen, bedoeld in
      [artikel 11.35 van het Besluit kwaliteit leefomgeving][ref1], elektronisch aan Onze Minister van Infrastructuur en
      Waterstaat, uiterlijk op de volgende tijdstippen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.33
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.33.a
    text: 22 juni 2026 en 22 juni 2027; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.33
  - number: 10.33.b
    text: om de zes jaar na de tijdstippen, bedoeld onder a.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.33
  - number: 10.33a
    text: |-
      Het gemeentebestuur, het dagelijks bestuur van het waterschap en gedeputeerde staten verstrekken uiterlijk
      op 22 juni 2025 en vervolgens om de zes jaar de resultaten van de analyses en beoordeling, bedoeld in
      [artikel 11.36 van het Besluit kwaliteit leefomgeving][ref1], elektronisch aan Onze Minister van Infrastructuur
      en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.33a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.33b
    text: |-
      Het dagelijks bestuur van het waterschap en gedeputeerde staten verstrekken uiterlijk op 22 juni 2024 en
      vervolgens om de zes jaar de gegevens over de voortgang van de uitvoering van de maatregelen, bedoeld in
      [artikel 11.37 van het Besluit kwaliteit leefomgeving][ref1], elektronisch aan Onze Minister van Infrastructuur
      en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.33b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: '10.34'
    text: |-
      Het college van burgemeester en wethouders, het dagelijks bestuur van het waterschap, gedeputeerde staten en Onze
      Minister voor Natuur en Stikstof verstrekken zo spoedig mogelijk na gegevensverzameling, de als gegevens verzamelde
      beschermde gebieden, bedoeld in [artikel 11.34 van het Besluit kwaliteit leefomgeving][ref1], aan Onze Minister
      van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.34
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.35.1
    text: |-
      Het bevoegd gezag dat de zorg heeft voor een zuiveringtechnisch werk verstrekt de gegevens over de stand van zaken
      van de inzameling, het transport en de behandeling van stedelijk afvalwater en de afvoer van slib, bedoeld in
      [artikel 11.39 van het Besluit kwaliteit leefomgeving][ref1], vier maanden na ontvangst van een verzoek daartoe
      aan Onze Minister van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
    machine_readable:
      execution:
        parameters:
          - name: datum_verzoek_ontvangen
            type: date
            required: true
            description: Datum waarop het verzoek om gegevens is ontvangen
            source: {}
        output:
          - name: uiterlijke_leveringsdatum
            type: date
            description: Uiterlijke datum waarop de gegevens moeten worden verstrekt (vier maanden na ontvangst verzoek)
        actions:
          - output: uiterlijke_leveringsdatum
            value:
              operation: DATE_ADD
              date: $datum_verzoek_ontvangen
              months: 4
  - number: 10.35.2
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt elke twee jaar het verslag van de gegevens over de stand van
      zaken van de inzameling, het transport en de behandeling van stedelijk afvalwater en de afvoer van slib, bedoeld in
      [artikel 11.42 van het Besluit kwaliteit leefomgeving][ref1], elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.35
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: '10.36'
    text: |-
      Het dagelijks bestuur van het waterschap, gedeputeerde staten en Onze Minister van Infrastructuur en Waterstaat
      stellen aan het eind van de looptijd van een waterbeheerprogramma als bedoeld in [artikel 3.7 van de wet][ref1],
      een regionaal waterprogramma als bedoeld in [artikel 3.8, tweede lid, van de wet][ref2] respectievelijk
      het nationale waterprogramma, bedoeld in [artikel 3.9, tweede lid, onder e, van de wet][ref3], elektronisch
      beschikbaar:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0037885#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0037885
        artikel: '3'
  - number: 10.36.a
    text: |-
      een verslag over de resultaten van de monitoring voor de omgevingswaarden voor waterkwaliteit,
      bedoeld in de [artikelen 2.10][ref1], [2.11][ref2], [2.13][ref3], [2.14][ref4] en
      [2.15 van het Besluit kwaliteit leefomgeving][ref5]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref4]: https://wetten.overheid.nl/BWBR0041313#Artikel2
      [ref5]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '2'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '2'
      - id: ref4
        bwb_id: BWBR0041313
        artikel: '2'
      - id: ref5
        bwb_id: BWBR0041313
        artikel: '2'
  - number: 10.36.b
    text: |-
      een verslag als bedoeld in [artikel 11.41 van het Besluit kwaliteit leefomgeving][ref1] over de resultaten van de
      monitoring van de andere parameters, bedoeld in [artikel 11.27 van dat besluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36aa
    text: |-
      Gedeputeerde staten verstrekken aan Onze Minister van Infrastructuur en Waterstaat de gegevens waarover zij
      beschikken die nodig zijn om te voldoen aan artikel 11, eerste lid, van de verordening hergebruik stedelijk
      afvalwater.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36aa
  - number: 10.36a.1
    text: 'Gedeputeerde staten verstrekken aan Onze Minister voor Natuur en Stikstof gegevens over:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.1.a
    text: |-
      door gedeputeerde staten of provinciale staten genomen besluiten of getroffen maatregelen ter uitvoering van de
      vogelrichtlijn en van de habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.1.b
    text: 'de staat van instandhouding van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.1.b.1°
    text: |-
      de vogelsoorten, genoemd in bijlage I bij de vogelrichtlijn, en de niet in die bijlage genoemde geregeld in
      Nederland voorkomende vogelsoorten; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.1.b.2°
    text: |-
      de natuurlijke habitats, de habitats van soorten en de dier- en plantensoorten, genoemd in de bijlagen I, II, IV en
      V bij de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.2
    text: 'De gegevens worden verstrekt ten behoeve van:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.2.a
    text: |-
      de toepassing van artikel 4, eerste lid, van de vogelrichtlijn en artikel 4, eerste lid, in samenhang met
      artikel 11 van de habitatrichtlijn;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.2.b
    text: |-
      de verslaglegging, bedoeld in artikel 9, derde lid, van de vogelrichtlijn en artikel 16, tweede lid, van de
      habitatrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.2.c
    text: de verslaglegging, bedoeld in artikel 12 van de vogelrichtlijn en artikel 17 van de habitatrichtlijn.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36a.3
    text: |-
      Onze Minister voor Natuur en Stikstof verstrekt de gegevens, bedoeld in het eerste lid, en de gegevens, bedoeld in
      de artikelen 7, vierde lid, laatste zin, en 10, tweede lid, van de vogelrichtlijn, aan de Europese Commissie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36a
  - number: 10.36b.1
    text: |-
      Het bevoegd gezag voor een omgevingsvergunning voor een Natura 2000-activiteit of voor de
      vaststelling van een plan als bedoeld in artikel 6, derde lid, van de habitatrichtlijn meldt gegevens
      over de compenserende maatregelen, bedoeld in [artikel 8.74b, tweede lid, onder c][ref1], of
      [10.24, tweede lid, van het Besluit kwaliteit leefomgeving][ref2], aan Onze Minister voor Natuur en Stikstof.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel8
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36b
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '8'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '10'
  - number: 10.36b.2
    text: Onze Minister voor Natuur en Stikstof verstrekt de gegevens aan de Europese Commissie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36b
  - number: 10.36c.1
    text: |-
      Gedeputeerde staten verstrekken aan Onze Minister voor Natuur en Stikstof uiterlijk op 1 juni
      2025, en daarna steeds na zes jaar, gegevens over de uitvoering van de maatregelen voor de
      preventie en beheersing van de introductie en verspreiding van invasieve exoten van de in
      [bijlage VC bij het Besluit kwaliteit leefomgeving][ref1] genoemde soorten.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 10.36c.2
    text: 'De door gedeputeerde staten verstrekte gegeven hebben betrekking op:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
  - number: 10.36c.2.a
    text: |-
      de aard en de doeltreffendheid van de getroffen maatregelen en de gevolgen van deze maatregelen voor niet-
      doelsoorten;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
  - number: 10.36c.2.b
    text: |-
      de maatregelen die zijn getroffen om het publiek te informeren over de aanwezigheid van invasieve uitheemse soorten
      en over acties die burgers verzocht worden te ondernemen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
  - number: 10.36c.2.c
    text: 'als deze gegevens aanwezig zijn: de kostprijs van de onder a en b bedoelde maatregelen.'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
  - number: 10.36c.3
    text: Onze Minister voor Natuur en Stikstof verstrekt de gegevens aan de Europese Commissie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36c
  - number: 10.36d.1
    text: |-
      Gedeputeerde staten verstrekken aan Onze Minister voor Natuur en Stikstof gegevens over de voortgang van de
      totstandkoming en instandhouding van het natuurnetwerk Nederland.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36d
  - number: 10.36d.2
    text: |-
      Onze Minister voor Natuur en Stikstof informeert op basis van de gegevens van gedeputeerde staten de beide Kamers
      der Staten-Generaal over de voortgang van de totstandkoming en instandhouding van het natuurnetwerk Nederland.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36d
  - number: 10.36da.1
    text: |-
      De bestuursorganen die zijn belast met de uitvoering van de maatregelen, opgenomen in
      het programma stikstofreductie en natuurverbetering, verstrekken de gegevens, bedoeld in
      [artikel 11.69, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], elke twee jaar aan Onze Minister voor
      Natuur en Stikstof.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36da
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36da.2
    text: |-
      De bestuursorganen die verantwoordelijk zijn voor de vaststelling van het beheerplan, bedoeld in de
      [artikelen 3.8, derde lid][ref1], en [3.9, derde lid, van de wet][ref2], verstrekken de gegevens, bedoeld in
      [artikel 11.69, tweede lid, van het Besluit kwaliteit leefomgeving][ref3], elke zes jaar aan Onze Minister voor
      Natuur en Stikstof.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0037885#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36da
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0037885
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36db
    text: |-
      Uiterlijk op een bij koninklijk besluit te bepalen tijdstip en vervolgens steeds zo spoedig mogelijk na een daartoe
      strekkend verzoek van Onze Minister voor Natuur en Stikstof verstrekken gedeputeerde staten de gegevens, bedoeld in
      [artikel 11.69b van het Besluit kwaliteit leefomgeving][ref1], aan die Minister.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36db
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36dc
    text: |-
      Onze Minister voor Natuur en Stikstof verstrekt aan de beide Kamers der Staten-Generaal de volgende verslagen met
      de volgende frequentie:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
  - number: 10.36dc.a
    text: 'elk jaar:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
  - number: 10.36dc.a.1°
    text: |-
      het verslag over de resultaten van de monitoring voor de omgevingswaarden voor stikstofdepositie, bedoeld in
      [artikel 11.68 van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36dc.a.2°
    text: |-
      het verslag over de mate waarin wordt voldaan aan de tussentijdse doelstellingen om tijdig aan die omgevingswaarden
      te voldoen, bedoeld in [artikel 11.69c, onder a, onder 2°, van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36dc.b
    text: |-
      elke twee jaar: het verslag over de voortgang en de gevolgen van de maatregelen,
      opgenomen in het programma stikstofreductie en natuurverbetering, bedoeld in
      [artikel 11.69c, onder b, van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36dc.c
    text: |-
      elke zes jaar: het verslag over de ontwikkeling van de staat van instandhouding van de voor stikstof gevoelige
      habitats in Natura 2000-gebieden in relatie tot de instandhoudingsdoelstellingen voor die gebieden, bedoeld in
      [artikel 11.69c, onder c, van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36dc
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.36e
    text: |-
      De korpschef verstrekt op verzoek gegevens uit de gegevensverzameling, bedoeld in
      [artikel 11.73 van het Besluit kwaliteit leefomgeving][ref1], over de nakoming van een verzekering als bedoeld in
      [artikel 11.78 van het Besluit activiteiten leefomgeving][ref2], aan:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36e
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 10.36e.a
    text: Onze Minister voor Natuur en Stikstof en Onze Minister van Justitie en Veiligheid;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36e
  - number: 10.36e.b
    text: |-
      de personen belast met de opsporing van strafbaar gestelde feiten wegens handelen in strijd met het bepaalde bij of
      krachtens de [wet][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36e
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 10.36e.c
    text: |-
      hen die aannemelijk maken dat zij zijn betrokken bij schade die grond kan opleveren voor toepassing van
      [artikel 8.4 van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel8
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.36e
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '8'
  - number: '10.37'
    text: |-
      Het dagelijks bestuur of het algemeen bestuur van een waterschap verstrekt jaarlijks uiterlijk op 31 oktober
      over elke zwemlocatie waarover het het beheer heeft in ieder geval de volgende gegevens aan Onze Minister van
      Infrastructuur en Waterstaat:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.37
    machine_readable:
      execution:
        parameters:
          - name: datum_levering
            type: date
            required: true
            description: Datum waarop de zwemlocatiegegevens worden verstrekt
            source: {}
          - name: uiterlijke_leveringsdatum
            type: date
            required: true
            description: 31 oktober van het betreffende jaar
            source: {}
        output:
          - name: tijdig_geleverd
            type: boolean
            description: Of de gegevens uiterlijk op 31 oktober zijn verstrekt
        actions:
          - output: tijdig_geleverd
            value:
              operation: LESS_THAN_OR_EQUAL
              subject: $datum_levering
              value: $uiterlijke_leveringsdatum
  - number: 10.37.a
    text: |-
      het verslag van de resultaten van de monitoring voor de omgevingswaarde voor een zwemlocatie, bedoeld in
      [artikel 2.19 van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
  - number: 10.37.b
    text: |-
      de uitkomst van de beoordeling van de resultaten van de monitoring voor de omgevingswaarde voor een zwemlocatie,
      bedoeld in [artikel 2.19 van het Besluit kwaliteit leefomgeving][ref1], uitgevoerd in overeenstemming met de bij
      ministeriële regeling gestelde regels; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
  - number: 10.37.c
    text: |-
      een beschrijving van de belangrijkste getroffen beheersmaatregelen, bedoeld in de
      [artikelen 3.7 tot en met 3.9 van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.37
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: '10.38'
    text: |-
      Onze Minister van Infrastructuur en Waterstaat stelt een verslag van de resultaten van de monitoring van de
      omgevingswaarde voor zwemlocaties, bedoeld in [artikel 2.19 van het Besluit kwaliteit leefomgeving][ref1],
      elektronisch beschikbaar.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.38
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '2'
  - number: 10.39.1
    text: 'Gedeputeerde staten lichten het publiek gedurende het badseizoen voor over:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.1.a
    text: |-
      de indeling van de zwemlocaties in klassen, bedoeld in bijlage II bij de zwemwaterrichtlijn, de ingestelde
      negatieve zwemadviezen en opgelegde zwemverboden;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.1.b
    text: 'de risico’s voor de gezondheid en de veiligheid van zwemmers:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.1.b.1°
    text: |-
      als zich een overmatige groei van cyanobacteriën of een neiging tot overmatige groei van macroalgen of marien
      fytoplankton voordoet en gedeputeerde staten een gezondheidsrisico vaststellen of vermoeden als bedoeld in
      [artikel 3.7 van het Besluit kwaliteit leefomgeving][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.39.1.b.2°
    text: |-
      als sprake is van een zwemwaterverontreiniging als bedoeld in
      [artikel 11.44, eerste lid, aanhef en onder c, van het Besluit kwaliteit leefomgeving][ref1]; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 10.39.1.b.3°
    text: |-
      als sprake is van onverwachte situaties die negatieve gevolgen hebben of redelijkerwijs kunnen hebben op de
      kwaliteit van de zwemlocatie en op de gezondheid van zwemmers;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.1.c
    text: |-
      de getroffen zwemwaterbeheersmaatregelen, bedoeld in [artikel 3.8 van het Besluit kwaliteit leefomgeving][ref1],
      als dat naar hun oordeel nodig is; en


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.39.1.d
    text: |-
      de uitkomsten van het onderzoek, bedoeld in [artikel 3.5 van het Besluit kwaliteit leefomgeving][ref1], als de
      uitkomsten niet leiden tot een negatief zwemadvies of een zwemverbod.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 10.39.2
    text: |-
      Gedeputeerde staten geven in de nabijheid van een zwemlocatie op passende wijze voorlichting, via de media en langs
      elektronische weg, zodra de informatie beschikbaar is.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.3
    text: |-
      In de gevallen, bedoeld in het eerste lid, aanhef en onder a tot en met c, bestaat de voorlichting in ieder geval
      uit:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.3.a
    text: |-
      het plaatsen van een bord in de nabijheid van de zwemlocatie op een zichtbare en gemakkelijk toegankelijke plaats
      met de informatie, bedoeld in artikel 12, eerste lid, van de zwemwaterrichtlijn; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39.3.b
    text: |-
      het verspreiden van de informatie, bedoeld in artikel 12, tweede lid, van de zwemwaterrichtlijn via internet, zo
      nodig ook in andere talen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39
  - number: 10.39a.1
    text: |-
      Degene die op een industrieterrein een activiteit anders dan het wonen verricht, verstrekt op verzoek van de
      gemeenteraad, of provinciale staten als [artikel 2.12a, eerste lid, van de wet][ref1] wordt toegepast, gegevens
      over het geluid door die activiteit voor de vaststelling van een geluidproductieplafond als omgevingswaarde voor
      het industrieterrein.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39a
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '2'
  - number: 10.39a.2
    text: 'Het eerste lid geldt niet voor:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39a
  - number: 10.39a.2.a
    text: |-
      informatie die is aangemerkt als staatsgeheim als bedoeld in het
      [Besluit Voorschrift Informatiebeveiliging Rijksdienst Bijzondere Informatie 2013 (VIRBI 2013][ref1]); en


      [ref1]: https://wetten.overheid.nl/BWBR0033507
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39a
    references:
      - id: ref1
        bwb_id: BWBR0033507
  - number: 10.39a.2.b
    text: |-
      informatie over het geluid door een activiteit waarvoor het omgevingsplan of een omgevingsvergunning voor een
      buitenplanse omgevingsplanactiviteit waarborgt dat het langtijdgemiddelde beoordelingsniveau L van het geluid op
      een afstand van 30 m van de begrenzing van de locatie waar de activiteit wordt verricht, niet meer bedraagt dan de
      standaardwaarden, bedoeld in [tabel 5.65.1 van het Besluit kwaliteit leefomgeving][ref1], verminderd met 5 dB.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39a
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '5'
  - number: 10.39b
    text: |-
      Als dat nodig is om aan de verplichting van een bestuursorgaan tot gegevensverstrekking, bedoeld in
      [artikel 10.42a, eerste lid, aanhef en onder f of g][ref1], te voldoen, verstrekt degene die een activiteit als
      bedoeld in die onderdelen verricht, op verzoek van dat bestuursorgaan gegevens over het geluid door die activiteit.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39b
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.5
        afdeling: '10.8'
  - number: 10.39c
    text: |-
      Als dat nodig is om aan de verplichting tot gegevensverstrekking, bedoeld in
      [artikel 10.42a, eerste lid, aanhef en onder e][ref1], te voldoen, verstrekt degene die een luchthaven exploiteert,
      op verzoek van gedeputeerde staten, Onze Minister van Defensie of Onze Minister van Infrastructuur en Waterstaat
      gegevens over het geluid door die luchthaven.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.39c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.5
        afdeling: '10.8'
  - number: 10.40.1
    text: |-
      Gedeputeerde staten verstrekken elke vijf jaar uiterlijk op 31 maart de gegevens, bedoeld in
      [artikel 11.49, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], aan Onze Minister van Infrastructuur
      en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel10.40
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
