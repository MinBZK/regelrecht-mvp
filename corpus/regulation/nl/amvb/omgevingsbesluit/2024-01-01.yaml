  - number: 14.1.1
    text: 'Via de landelijke voorziening kan worden ingediend of gedaan:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.1.a
    text: een aanvraag om een omgevingsvergunning;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.1.b
    text: een aanvraag om een maatwerkvoorschrift;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.1.c
    text: een aanvraag om toestemming tot het treffen van een gelijkwaardige maatregel; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.1.d
    text: |-
      een melding als bedoeld in [artikel 4.4, eerste lid, van de wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 14.1.2
    text: |-
      Via de landelijke voorziening kan worden voldaan aan een andere informatieverplichting dan een melding, tenzij bij
      wettelijk voorschrift een andere wijze is aangewezen waarop aan de informatieverplichting wordt voldaan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.3
    text: 'Dit artikel is niet van toepassing op een aanvraag, een melding of informatie:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.3.a
    text: |-
      die is aangemerkt als staatsgeheim als bedoeld in het
      [Besluit Voorschrift Informatiebeveiliging Rijksdienst Bijzondere Informatie 2013][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0033507
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
    references:
      - id: ref1
        bwb_id: BWBR0033507
  - number: 14.1.3.b
    text: 'met betrekking tot:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.3.b.1°
    text: een jachtgeweeractiviteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.3.b.2°
    text: een valkeniersactiviteit;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
  - number: 14.1.3.b.3°
    text: |-
      een flora- en fauna-activiteit van nationaal belang als bedoeld in [artikel 4.12, derde lid, onder c][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '4'
        hoofdstuk: '4'
        paragraaf: 4.1.3
        afdeling: '4.1'
  - number: 14.1.3.b.4°
    text: |-
      een activiteit met betrekking tot dieren, planten of producten daarvan als bedoeld in
      [artikel 11.96 van het Besluit activiteiten leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 14.1.3.b.5°
    text: |-
      een activiteit met betrekking tot de introductie of verspreiding van invasieve uitheemse soorten als bedoeld in
      [artikel 11.108 van het Besluit activiteiten leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.1
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '11'
  - number: 14.2.1
    text: |-
      Als via de landelijke voorziening een aanvraag om een omgevingsvergunning, een maatwerkvoorschrift of
      toestemming tot het treffen van een gelijkwaardige maatregel wordt ingediend, een melding als bedoeld in
      [artikel 4.4, eerste lid, van de wet][ref1] wordt gedaan of aan een informatieverplichting anders dan een melding
      wordt voldaan:


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '4'
  - number: 14.2.1.a
    text: |-
      wordt gebruikgemaakt van het elektronische formulier dat op de datum van indiening beschikbaar is in de landelijke
      voorziening; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
  - number: 14.2.1.b
    text: |-
      worden de daarbij te verstrekken gegevens en bescheiden ook via de landelijke voorziening verstrekt, tenzij het
      bevoegd gezag instemt met een andere wijze van verstrekken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
  - number: 14.2.2
    text: 'In afwijking van het eerste lid worden niet via de landelijke voorziening verstrekt:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
  - number: 14.2.2.a
    text: |-
      bijzondere categorieën van persoonsgegevens of persoonsgegevens van strafrechtelijke aard als bedoeld in
      [paragraaf 3.1][ref1] respectievelijk [3.2 van de Uitvoeringswet Algemene verordening gegevensbescherming][ref2];
      en


      [ref1]: https://wetten.overheid.nl/BWBR0040940#Paragraaf3.1
      [ref2]: https://wetten.overheid.nl/BWBR0040940#Paragraaf3.2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
    references:
      - id: ref1
        bwb_id: BWBR0040940
        paragraaf: '3.1'
      - id: ref2
        bwb_id: BWBR0040940
        paragraaf: '3.2'
  - number: 14.2.2.b
    text: |-
      informatie die is aangemerkt als staatsgeheim als bedoeld in het
      [Besluit Voorschrift Informatiebeveiliging Rijksdienst Bijzondere Informatie 2013][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0033507
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
    references:
      - id: ref1
        bwb_id: BWBR0033507
  - number: 14.2.3
    text: |-
      Het bevoegd gezag stelt aan Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties de informatie beschikbaar
      die nodig is om het elektronische formulier te kunnen samenstellen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.2
  - number: 14.3.1
    text: Een aanvraag of melding die is ingediend of gedaan via de landelijke voorziening geldt als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.3
  - number: 14.3.2
    text: Gegevens en bescheiden die zijn verstrekt via de landelijke voorziening gelden als ondertekend.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.3
  - number: 14.4.1
    text: |-
      De Dienst, bedoeld in [artikel 2 van de Organisatiewet Kadaster][ref1], stelt voor ontsluiting via de landelijke
      voorziening beschikbaar:


      [ref1]: https://wetten.overheid.nl/BWBR0006463#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.4
    references:
      - id: ref1
        bwb_id: BWBR0006463
        artikel: '2'
  - number: 14.4.1.a
    text: |-
      de inhoud van de bij ministeriële regeling aangewezen omgevingsdocumenten, in een zodanige vorm dat de informatie
      in samenhang per geometrisch begrensd object raadpleegbaar is;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.4
  - number: 14.4.1.b
    text: informatie over de status van de omgevingsdocumenten, bedoeld onder a; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.4
  - number: 14.4.1.c
    text: |-
      informatie uit documenten die zijn opgenomen in de landelijke voorziening, bedoeld in
      [artikel 1.2.1, tweede lid, van het Besluit ruimtelijke ordening][ref1], in een zodanige vorm dat deze begrijpelijk
      en in combinatie met de informatie, bedoeld onder a, raadpleegbaar is.


      [ref1]: https://wetten.overheid.nl/BWBR0023798#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.4
    references:
      - id: ref1
        bwb_id: BWBR0023798
        artikel: '1'
  - number: 14.4.2
    text: De Dienst draagt zorg voor het beheer van de ingevolge het eerste lid beschikbaar gestelde informatie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.4
  - number: '14.5'
    text: |-
      Aan de Dienst, bedoeld in [artikel 2 van de Organisatiewet Kadaster][ref1], worden de in [bijlage VIII][ref2]
      genoemde gegevens over de besluiten en andere rechtsfiguren, bedoeld in [artikel 14.4, eerste lid, onder a][ref3],
      verstrekt door:


      [ref1]: https://wetten.overheid.nl/BWBR0006463#Artikel2
      [ref2]: https://wetten.overheid.nl/BWBR0041278
      [ref3]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0006463
        artikel: '2'
      - id: ref2
        bwb_id: BWBR0041278
      - id: ref3
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        afdeling: '14.2'
  - number: 14.5.a
    text: |-
      het college van burgemeester en wethouders, voor zover het gaat om een besluit dat of een andere rechtsfiguur die
      op grond van de [wet][ref1] is vastgesteld door een bestuursorgaan van de gemeente;


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.5.b
    text: |-
      het dagelijks bestuur van een waterschap, voor zover het gaat om een besluit dat of een andere rechtsfiguur die op
      grond van de [wet][ref1] is vastgesteld door een bestuursorgaan van het waterschap;


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.5.c
    text: |-
      gedeputeerde staten, voor zover het gaat om een besluit dat of een andere rechtsfiguur die op grond van de
      [wet][ref1] is vastgesteld door een bestuursorgaan van de provincie; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.5.d
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties of Onze Minister die het aangaat, voor zover het gaat
      om een besluit dat of een andere rechtsfiguur die op grond van de [wet][ref1] is vastgesteld door of op voordracht
      van Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties respectievelijk Onze Minister die het aangaat.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.5a
    text: |-
      De landelijke voorziening voorziet in het elektronisch kunnen uitwisselen van gegevens bij het voorbereiden van een
      beslissing op een aanvraag en het beoordelen van een melding of gegevens en bescheiden om te voldoen aan een andere
      informatieverplichting dan een melding op grond van de [wet][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5a
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.5b
    text: |-
      De landelijke voorziening voorziet in het elektronisch doorzenden van een melding of gegevens en bescheiden
      om te voldoen aan een andere informatieverplichting dan een melding op grond van de wet naar Onze Minister
      van Infrastructuur en Waterstaat voor het uitoefenen van de bestuursrechtelijke handhavingstaak, bedoeld in
      [artikel 13.1, aanhef en onder b, onder 5°][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.5b
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: '14.6'
    text: |-
      In deze afdeling wordt verstaan onder: - *bericht:* elektronisch bericht als bedoeld in
      [artikel 14.1, eerste en tweede lid][ref1];
        - *bezoeker:* degene die de landelijke voorziening bezoekt, maar niet inlogt;
        - *DSO-LV-id:* unieke aanduiding van een geauthentiseerde persoon, die alleen binnen de landelijke voorziening
      wordt gebruikt;
        - *eHerkenning pseudoniem:* pseudoniem dat door eHerkenning wordt verstrekt om een persoon die namens een niet-
      natuurlijke persoon handelt te identificeren;
        - *gebruiker:* degene die inlogt in de landelijke voorziening;
        - *identificatienummer van de organisatie:* nummer waarmee een niet-natuurlijke persoon kan worden geïdentificeerd,
      zoals het Rechtspersonen Samenwerkingsverbanden Informatie Nummer, het nummer van de inschrijving in het
      handelsregister of het Organisatie-identificatienummer;
        - *initiatiefnemer:* degene die een aanvraag heeft ingediend, een melding heeft gedaan of gegevens en bescheiden
      heeft verstrekt om te voldoen aan een andere informatieverplichting dan een melding.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.6
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        afdeling: '14.1'
  - number: 14.7.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties brengt een ingediend bericht onverwijld binnen het
      bereik van het bevoegd gezag en stelt het bevoegd gezag hiervan onverwijld op de hoogte.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7
  - number: 14.7.2
    text: |-
      Een ingediend bericht wordt ten hoogste een jaar in de landelijke voorziening bewaard. Deze termijn kan op verzoek
      van het bevoegd gezag met een jaar worden verlengd als dat noodzakelijk is voor de behandeling van het bericht.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7
  - number: 14.7.3
    text: |-
      Een nog niet ingediend formulier en daarbij behorende gegevens en bescheiden worden ten hoogste een jaar in de
      landelijke voorziening bewaard, gerekend vanaf het tijdstip van de laatste mutatie.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7
  - number: 14.7a.1
    text: |-
      Een bestuursorgaan dat is betrokken bij het voorbereiden van een beslissing op een aanvraag of het beoordelen van
      een melding of gegevens en bescheiden om te voldoen aan een andere informatieverplichting dan een melding op grond
      van de [wet][ref1] kan via de landelijke voorziening gegevens uitwisselen met andere betrokken bestuursorganen
      en adviseurs.


      [ref1]: https://wetten.overheid.nl/BWBR0037885
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7a
    references:
      - id: ref1
        bwb_id: BWBR0037885
  - number: 14.7a.2
    text: |-
      De gegevens worden ten hoogste een jaar in de landelijke voorziening bewaard. Deze termijn kan op verzoek van het
      bestuursorgaan dat het initiatief heeft genomen tot het uitwisselen van gegevens met een jaar worden verlengd als
      dat noodzakelijk is voor de behandeling van de aanvraag of de beoordeling van de melding of gegevens en bescheiden.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7a
  - number: 14.7b.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijkrelaties brengt een ingediend bericht
      over een milieubelastende activiteit als bedoeld in [artikel 3.48m][ref1], [3.48o][ref2] of
      [3.48r van het Besluit activiteiten leefomgeving][ref3] onverwijld binnen het bereik van Onze Minister van
      Infrastructuur en Waterstaat voor het uitoefenen van de bestuursrechtelijke handhavingstaak, bedoeld in
      [artikel 13.1, aanhef en onder b, onder 5°][ref4].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel3
      [ref4]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7b
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '3'
      - id: ref4
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        afdeling: '13.1'
  - number: 14.7b.2
    text: Een ingediend bericht wordt ten hoogste een jaar in de landelijke voorziening bewaard.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.7b
  - number: 14.8.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties is verwerkingsverantwoordelijke voor de verwerking van
      persoonsgegevens in de landelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.8
  - number: 14.8.2
    text: |-
      Het bevoegd gezag is verwerkingsverantwoordelijke voor de verwerking van persoonsgegevens in een bericht, vanaf het
      moment dat het dit heeft opgehaald uit de landelijke voorziening.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.8
  - number: 14.8.3
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is verwerkingsverantwoordelijke voor de verwerking van
      persoonsgegevens in een bericht als bedoeld in [artikel 14.7b, eerste lid][ref1], vanaf het moment dat hij dit
      heeft opgehaald uit de landelijke voorziening.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.2
        afdeling: '14.3'
  - number: 14.8.4
    text: |-
      In afwijking van het eerste lid zijn, als sprake is van het uitwisselen van gegevens als bedoeld in
      [artikel 14.7a][ref1], Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties en het bestuursorgaan dat
      het initiatief heeft genomen tot het uitwisselen van gegevens gezamenlijke verwerkingsverantwoordelijken voor de
      verwerking van persoonsgegevens.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.8
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.2
        afdeling: '14.3'
  - number: 14.9.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties verwerkt voor het verlenen van toegang tot de
      landelijke voorziening de volgende persoonsgegevens:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.a
    text: 'over gebruikers:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.a.1°
    text: |-
      gegevens om de gebruiker te identificeren, waaronder het burgerservicenummer, het eHerkenning pseudoniem in
      combinatie met het identificatienummer van de organisatie of het uniek identificerend nummer bij authenticatie
      buiten Nederland maar binnen de Europese Unie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.a.2°
    text: profielgegevens, waaronder de naam, het e-mailadres, het telefoonnummer, de functie en voorkeursinstellingen; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.b
    text: 'over medewerkers van bestuursorganen en adviseurs:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.b.1°
    text: |-
      gegevens om de medewerker te identificeren, waaronder het eHerkenning pseudoniem en het identificatienummer van de
      organisatie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.1.b.2°
    text: |-
      profielgegevens, waaronder de naam, het e-mailadres, het telefoonnummer, de functie, contactgegevens van het
      bevoegd gezag en voorkeursinstellingen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.9.2
    text: |-
      De persoonsgegevens worden ten hoogste achttien maanden na het opheffen van het account in de landelijke
      voorziening bewaard.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.9
  - number: 14.10.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties verwerkt voor het doorgeleiden van berichten naar het
      bevoegd gezag de volgende persoonsgegevens:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.1.a
    text: 'over gebruikers:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.1.a.1°
    text: |-
      gegevens om te communiceren met de gebruiker, waaronder de naam, de organisatienaam, het adres, het e-mailadres en
      het telefoonnummer;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.1.a.2°
    text: |-
      gegevens om de gebruiker te identificeren, waaronder het burgerservicenummer of het identificatienummer van de
      organisatie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.1.a.3°
    text: |-
      gegevens om het bericht te kunnen beoordelen volgens de daarvoor geldende regels, waaronder gegevens over de
      activiteit, gegevens over de locatie waar de activiteit wordt verricht, de vermogensrechtelijke status in relatie
      tot die locatie en financiële gegevens; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.1.b
    text: |-
      over derden die direct zijn betrokken bij de activiteit waarop het bericht betrekking heeft: gegevens om het
      bericht te kunnen beoordelen volgens de daarvoor geldende regels, waaronder de naam, het adres, het telefoonnummer,
      de functie en een bewijs van vakbekwaamheid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
  - number: 14.10.2
    text: |-
      Voor de persoonsgegevens gelden de in [artikel 14.7, tweede en derde lid][ref1], genoemde bewaartermijnen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.2
        afdeling: '14.3'
  - number: 14.10a.1
    text: |-
      Bij het voorbereiden van beslissingen op aanvragen en het beoordelen van meldingen of gegevens en bescheiden om te
      voldoen aan andere informatieverplichtingen dan meldingen worden de volgende persoonsgegevens verwerkt:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.1.a
    text: 'over initiatiefnemers:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.1.a.1°
    text: |-
      gegevens om te communiceren met de initiatiefnemer, waaronder de naam, de organisatienaam, het adres, het e-
      mailadres en het telefoonnummer;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.1.a.2°
    text: |-
      gegevens om de initiatiefnemer te identificeren, waaronder het burgerservicenummer of het identificatienummer van
      de organisatie; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.1.a.3°
    text: |-
      gegevens om de aanvraag, melding of gegevens en bescheiden te kunnen beoordelen volgens de daarvoor geldende
      regels, waaronder gegevens over de activiteit, gegevens over de locatie waar de activiteit wordt verricht, de
      vermogensrechtelijke status in relatie tot die locatie en financiële gegevens; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.1.b
    text: |-
      over derden die direct zijn betrokken bij de activiteit waarop de aanvraag of melding betrekking heeft of waarop
      de gegevens en bescheiden betrekking hebben: gegevens om de aanvraag, melding of gegevens en bescheiden te kunnen
      beoordelen volgens de daarvoor geldende regels, waaronder de naam, het adres, het telefoonnummer, de functie en een
      bewijs van vakbekwaamheid.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
  - number: 14.10a.2
    text: |-
      Voor de persoonsgegevens gelden de in [artikel 14.7a, tweede lid][ref1], genoemde bewaartermijnen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10a
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.2
        afdeling: '14.3'
  - number: 14.10b
    text: |-
      Het bestuursorgaan dat het initiatief heeft genomen tot het uitwisselen van gegevens, bedoeld in
      [artikel 14.8, vierde lid][ref1], kan de persoonsgegevens, bedoeld in [artikel 14.10a, eerste lid][ref2],
      verstrekken aan de volgende bestuursorganen of adviseurs voor zover dat noodzakelijk is voor een goede vervulling
      van een wettelijke taak:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10b
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.3
        afdeling: '14.3'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.3
        afdeling: '14.3'
  - number: 14.10b.a
    text: |-
      een ander bestuursorgaan vanwege de betrokkenheid van dat bestuursorgaan bij de voorbereiding van een besluit
      als bedoeld in [artikel 16.7 van de wet][ref1], waarop [afdeling 3.5 van de Algemene wet bestuursrecht][ref2] van
      toepassing is;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
      [ref2]: https://wetten.overheid.nl/BWBR0005537#Afdeling3.5
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
      - id: ref2
        bwb_id: BWBR0005537
        afdeling: '3.5'
  - number: 14.10b.b
    text: |-
      een bestuursorgaan of andere instantie als bedoeld in [artikel 16.15 van de wet][ref1] vanwege de bevoegdheid tot
      advies van dat bestuursorgaan of die instantie;


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 14.10b.c
    text: |-
      een bestuursorgaan als bedoeld in [artikel 16.16 van de wet][ref1] vanwege de bevoegdheid tot instemming van dat
      bestuursorgaan; en


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel16
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10b
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '16'
  - number: 14.10b.d
    text: een adviseur, anders dan bedoeld onder b.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10b
  - number: 14.10c.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties verwerkt voor het doorzenden van berichten over
      meldingen en gegevens en bescheiden als bedoeld in [artikel 14.5b][ref1] naar Onze Minister van Infrastructuur en
      Waterstaat de volgende persoonsgegevens:


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        afdeling: 14.2a
  - number: 14.10c.1.a
    text: |-
      over gebruikers: gegevens om te kunnen communiceren, waaronder de naam, de organisatienaam, het adres, het e-
      mailadres en het telefoonnummer;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10c
  - number: 14.10c.1.b
    text: |-
      over initiatiefnemers, opdrachtgevers en uitvoerders: gegevens voor het uitoefenen van de bestuursrechtelijke
      handhavingstaak, waaronder gegevens over de activiteit, de locatie waar de activiteit wordt verricht, de
      herkomstlocatie en toepassingslocatie, de naam, de organisatienaam en het adres; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10c
  - number: 14.10c.1.c
    text: |-
      over derden: gegevens om de milieuverklaring bodemkwaliteit, bedoeld in
      [artikel 1, vierde lid, van het Besluit bodemkwaliteit][ref1], te kunnen verifiëren, waaronder de organisatienaam.


      [ref1]: https://wetten.overheid.nl/BWBR0022929#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10c
    references:
      - id: ref1
        bwb_id: BWBR0022929
        artikel: '1'
  - number: 14.10c.2
    text: |-
      Voor de persoonsgegevens geldt de in [artikel 14.7b, tweede lid][ref1], genoemde bewaartermijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.10c
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.2
        afdeling: '14.3'
  - number: 14.11.1
    text: |-
      Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties verwerkt voor de inrichting, instandhouding, werking en
      beveiliging van de landelijke voorziening de volgende persoonsgegevens:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.11
  - number: 14.11.1.a
    text: |-
      over bezoekers, gebruikers en medewerkers van bestuursorganen en adviseurs: gegevens die relevant zijn voor
      de adequate werking van de landelijke voorziening en gegevens in technische logbestanden voor onderzoek naar
      systeemtechnische fouten, waaronder gegevens over de herkomst en kenmerken van het netwerkverkeer, de kenmerken van
      de gebruikte software en hardware, het IP-adres en sessiegegevens;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.11
  - number: 14.11.1.b
    text: |-
      over gebruikers en medewerkers van bestuursorganen en adviseurs: gegevens in auditlogbestanden voor
      incidentoplossing, onderzoek naar oneigenlijk gebruik en bewijsvoering in juridische geschillen of procedures,
      waaronder het DSO-LV-id, de gebeurtenis, de datum en het tijdstip van de gebeurtenis en het IP-adres; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.11
  - number: 14.11.1.c
    text: |-
      over gebruikers, initiatiefnemers en derden die direct zijn betrokken bij de activiteit waarop een
      bericht betrekking heeft: gegevens in auditlogbestanden voor incidentoplossing, onderzoek naar oneigenlijk
      gebruik en bewijsvoering in juridische geschillen of procedures, bestaande uit de gegevens, bedoeld in de
      [artikelen 14.10, eerste lid][ref1], en [14.10a, eerste lid][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel14
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel14
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.11
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.3
        afdeling: '14.3'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '14'
        hoofdstuk: '14'
        paragraaf: 14.3.3
        afdeling: '14.3'
  - number: 14.11.2
    text: |-
      De persoonsgegevens en technische logbestanden, bedoeld in het eerste lid, onder a, worden ten hoogste achttien
      maanden in de landelijke voorziening bewaard, waarbij de sessiegegevens alleen worden bewaard tot het moment waarop
      de sessie wordt beëindigd. De auditlogbestanden, bedoeld in het eerste lid, onder b en c, worden ten hoogste vijf
      jaar in de landelijke voorziening bewaard.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.11
  - number: '14.12'
    text: |-
      De Dienst, bedoeld in [artikel 2 van de Organisatiewet Kadaster][ref1], draagt zorg voor de inrichting,
      instandhouding, werking en beveiliging van:


      [ref1]: https://wetten.overheid.nl/BWBR0006463#Artikel2
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.12
    references:
      - id: ref1
        bwb_id: BWBR0006463
        artikel: '2'
  - number: 14.12.a
    text: |-
      het deel van de landelijke voorziening dat dient voor de ontsluiting van informatie, bedoeld in
      [artikel 20.21, eerste lid, onder a, van de wet][ref1];


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel20
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.12
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '20'
  - number: 14.12.b
    text: een stelselcatalogus; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.12
  - number: 14.12.c
    text: |-
      koppelvlakken voor het beschikbaar stellen van gegevens aan, en hergebruik van gegevens uit de landelijke
      voorziening.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel14.12
  - number: 15.1.1
    text: |-
      De [artikelen 3.21, eerste en tweede lid][ref1], [3.23][ref2] en [3.24 van het Besluit kwaliteit leefomgeving][ref3]
      zijn van toepassing op deze paragraaf.


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 15.1.2
    text: |-
      In deze paragraaf wordt onder geluidgevoelig gebouw, geluidaandachtsgebied, gemeenteweg, provinciale weg en
      waterschapsweg verstaan wat in [bijlage I bij het Besluit kwaliteit leefomgeving][ref1] onder die begrippen wordt
      verstaan.


      [ref1]: https://wetten.overheid.nl/BWBR0041313
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.1
    references:
      - id: ref1
        bwb_id: BWBR0041313
  - number: 15.2.1
    text: |-
      Voor de toepassing van [paragraaf 12.1.6 van het Besluit kwaliteit leefomgeving][ref1] stellen onderstaande
      bestuursorganen uiterlijk op een bij koninklijk besluit te bepalen tijdstip een lijst samen van geluidgevoelige
      gebouwen:


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Paragraaf12.1.6
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        paragraaf: 12.1.6
  - number: 15.2.1.a
    text: |-
      het college van burgemeester en wethouders: voor gemeentewegen en voor lokale spoorwegen die niet bij
      omgevingsverordening zijn aangewezen;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.1.b
    text: 'het dagelijks bestuur van een waterschap: voor waterschapswegen; en'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.1.c
    text: >-
      gedeputeerde staten: voor provinciale wegen en voor lokale
      spoorwegen die bij omgevingsverordening zijn aangewezen.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.2
    text: |-
      Op de lijst wordt vermeld een op het tijdstip van inwerkingtreding van dit besluit aanwezig geluidgevoelig gebouw
      dat ligt in het geluidaandachtsgebied van:
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.2.a
    text: |-
      een provinciale weg die binnen een krachtens de [Wegenverkeerswet 1994](onbekend) vastgestelde bebouwde kom ligt,
      waarvan het geluid, bij volledige benutting van de geluidproductieplafonds zoals die zijn vastgesteld op grond
      van [artikel 12.6, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], meer dan 5 dB hoger is dan de
      grenswaarde, bedoeld in [tabel 3.35 van dat besluit][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 15.2.2.b
    text: |-
      een provinciale weg die buiten die bebouwde kom ligt, waarvan het geluid, bij volledige
      benutting van de geluidproductieplafonds zoals die zijn vastgesteld op grond van
      [artikel 12.6, eerste lid, van het Besluit kwaliteit leefomgeving][ref1], hoger is dan de grenswaarde, bedoeld in
      [tabel 3.35 van dat besluit][ref2];


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 15.2.2.c
    text: |-
      een lokale spoorweg die bij omgevingsverordening is aangewezen, waarvan het geluid, bij
      volledige benutting van de geluidproductieplafonds, hoger is dan de grenswaarde, bedoeld in
      [tabel 3.35 van het Besluit kwaliteit leefomgeving][ref1]; of


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 15.2.2.d
    text: |-
      een gemeenteweg, waterschapsweg of lokale spoorweg die niet bij omgevingsverordening is aangewezen, waarvan het
      geluid in het jaar, bedoeld in [artikel 11.46, derde lid, van het Besluit kwaliteit leefomgeving][ref1] hoger is
      dan de grenswaarde, bedoeld in [tabel 3.35 van dat besluit][ref2].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel11
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel3
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '11'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '3'
  - number: 15.2.3
    text: 'Op de lijst wordt niet vermeld een geluidgevoelig gebouw:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.3.a
    text: |-
      waarop met toepassing van de [Interimwet stad-en-milieubenadering][ref1] een hogere geluidbelasting dan de maximale
      waarde op grond van de [Wet geluidhinder][ref2] is toegestaan;


      [ref1]: https://wetten.overheid.nl/BWBR0019466
      [ref2]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0019466
      - id: ref2
        bwb_id: BWBR0003227
  - number: 15.2.3.b
    text: |-
      waarbij toepassing is gegeven aan [artikel 83, vierde, vijfde, zesde of zevende lid, van de Wet geluidhinder][ref1],
      zoals deze artikelen luidden voor het tijdstip van inwerkingtreding van dit besluit;


      [ref1]: https://wetten.overheid.nl/BWBR0003227#Artikel83
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
        artikel: '83'
  - number: 15.2.3.c
    text: |-
      dat eerder op grond van de [Wet geluidhinder][ref1] vanwege het geluid op kosten van het Rijk is gesaneerd en
      is vermeld op een uiterlijk een jaar na het tijdstip van inwerkingtreding van dit besluit door Onze Minister
      van Infrastructuur en Waterstaat te publiceren lijst, met uitzondering van gebouwen die zijn gesaneerd door een
      verkeersmaatregel waarmee een snelheid van 30 km/u is ingesteld en waarvoor geen rijksbijdrage voor geluidwerende
      maatregelen is ontvangen; of


      [ref1]: https://wetten.overheid.nl/BWBR0003227
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
  - number: 15.2.3.d
    text: |-
      dat alleen aan de voorwaarden van het tweede lid voldoet voor een bouwkundige constructie die op grond van
      [artikel 1b, vierde lid, van de Wet geluidhinder][ref1] niet als gevel werd beschouwd.


      [ref1]: https://wetten.overheid.nl/BWBR0003227#Artikel1b
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
    references:
      - id: ref1
        bwb_id: BWBR0003227
        artikel: 1b
  - number: 15.2.4
    text: 'De lijst bevat voor elk geluidgevoelig gebouw in ieder geval:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.4.a
    text: de in de Basisregistratie adressen en gebouwen opgenomen identificatienummers; en
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.2.4.b
    text: het in het tweede lid bedoelde geluid op het gebouw.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.2
  - number: 15.3.1
    text: |-
      Voorafgaand aan de samenstelling van de lijst, bedoeld in [artikel 15.2][ref1], publiceren het college van
      burgemeester en wethouders, het dagelijks bestuur van een waterschap en gedeputeerde staten een ontwerp van de
      lijst en stellen zij Onze Minister van Infrastructuur en Waterstaat in de gelegenheid een zienswijze naar voren
      te brengen.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.3
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: '15.1'
  - number: 15.3.2
    text: |-
      Bij de publicatie van het ontwerp van de lijst wordt aangegeven hoe burgers, bedrijven en maatschappelijke
      organisaties bij de samenstelling van de lijst zijn betrokken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.3
  - number: 15.3.3
    text: |-
      Het college van burgemeester en wethouders, het dagelijks bestuur van een waterschap en gedeputeerde staten zenden
      een afschrift van de lijst voor het in [artikel 15.2, eerste lid][ref1], bedoelde tijdstip op elektronische wijze
      aan Onze Minister van Infrastructuur en Waterstaat.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel15
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.3
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '15'
        hoofdstuk: '15'
        paragraaf: '15.1'
  - number: 15.4.1
    text: |-
      In afwijking van [artikel 10.42a, eerste lid, aanhef en onder a en b][ref1], verstrekt het bestuursorgaan
      dat bevoegd is geluidproductieplafonds vast te stellen de in die onderdelen bedoelde gegevens met
      betrekking tot geluidproductieplafonds langs wegen en spoorwegen die zijn herberekend op grond van
      [artikel 3.2 van de Aanvullingswet geluid Omgevingswet][ref2], met uitzondering van het gegeven, bedoeld in
      [artikel 11.52, eerste lid, onder a, onder 7°, van het Besluit kwaliteit leefomgeving][ref3], binnen vier weken na
      die herberekening.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0043247#Artikel3
      [ref3]: https://wetten.overheid.nl/BWBR0041313#Artikel11
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.4
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.5
        afdeling: '10.8'
      - id: ref2
        bwb_id: BWBR0043247
        artikel: '3'
      - id: ref3
        bwb_id: BWBR0041313
        artikel: '11'
  - number: 15.4.2
    text: |-
      In afwijking van [artikel 10.42a, eerste lid, aanhef en onder f][ref1], verstrekken gedeputeerde staten, Onze
      Minister van Defensie en Onze Minister van Infrastructuur en Waterstaat de in dat onderdeel bedoelde gegevens
      met betrekking tot op het tijdstip van inwerkingtreding van het [Aanvullingsbesluit geluid Omgevingswet][ref2]
      geldende besluit over het toegelaten geluid van een luchthaven waarvoor op grond van de [Wet luchtvaart][ref3]
      een luchthavenindelingbesluit, een luchthavenbesluit of een besluit beperkingengebied buitenlandse luchthaven is
      vereist, binnen een bij koninklijk besluit te bepalen termijn.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0044679
      [ref3]: https://wetten.overheid.nl/BWBR0005555
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.4
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.5
        afdeling: '10.8'
      - id: ref2
        bwb_id: BWBR0044679
      - id: ref3
        bwb_id: BWBR0005555
  - number: 15.4.3
    text: |-
      In afwijking van [artikel 10.42a, eerste lid, aanhef en onder g en h][ref1], verstrekt het college van burgemeester
      en wethouders, de gemeenteraad, gedeputeerde staten, Onze Minister voor Infrastructuur en Waterstaat, Onze Minister
      voor Klimaat en Energie en Onze Minister van Binnenlandse Zaken en Koninkrijksrelaties binnen een bij koninklijk
      besluit te bepalen termijn de in die onderdelen bedoelde gegevens met betrekking tot activiteiten die op het
      tijdstip van inwerkingtreding van het [Aanvullingsbesluit geluid Omgevingswet][ref2] rechtmatig worden verricht.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel10
      [ref2]: https://wetten.overheid.nl/BWBR0044679
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.4
    references:
      - id: ref1
        bwb_id: BWBR0041278
        artikel: '10'
        hoofdstuk: '10'
        paragraaf: 10.8.5
        afdeling: '10.8'
      - id: ref2
        bwb_id: BWBR0044679
  - number: 15.5.1
    text: |-
      De bestuursorganen die zijn belast met de uitvoering van het in [artikel 22.21, tweede lid, van de wet][ref1]
      bedoelde programma voor het legaliseren van projecten met een geringe stikstofdepositie, verstrekken de gegevens,
      bedoeld in [artikel 12.26b van het Besluit kwaliteit leefomgeving][ref2], elk jaar aan Onze Minister voor Natuur
      en Stikstof.


      [ref1]: https://wetten.overheid.nl/BWBR0037885#Artikel22
      [ref2]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.5
    references:
      - id: ref1
        bwb_id: BWBR0037885
        artikel: '22'
      - id: ref2
        bwb_id: BWBR0041313
        artikel: '12'
  - number: 15.5.2
    text: |-
      Onze Minister voor Natuur en Stikstof verstrekt elk jaar aan de beide Kamers der Staten-
      Generaal het verslag over de voortgang en de gevolgen van het programma, bedoeld in
      [artikel 12.26c van het Besluit kwaliteit leefomgeving][ref1].


      [ref1]: https://wetten.overheid.nl/BWBR0041313#Artikel12
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel15.5
    references:
      - id: ref1
        bwb_id: BWBR0041313
        artikel: '12'
  - number: '16.1'
    text: |-
      De artikelen van dit besluit treden in werking op een bij koninklijk besluit te bepalen tijdstip, dat voor de
      verschillende artikelen of onderdelen daarvan verschillend kan worden vastgesteld.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel16.1
  - number: '16.2'
    text: 'Dit besluit wordt aangehaald als: Omgevingsbesluit.'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel16.2
    machine_readable:
      execution:
        parameters: []
        output:
          - name: citeertitel
            type: string
            description: De officiële citeertitel van dit besluit
        actions:
          - output: citeertitel
            value: Omgevingsbesluit
