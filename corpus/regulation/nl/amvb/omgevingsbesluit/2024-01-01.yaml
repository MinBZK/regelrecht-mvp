  - number: 13.27.1
    text: |-
      Als overtreding waarvoor een bestuurlijke boete kan worden opgelegd, wordt aangemerkt het handelen of nalaten
      door de werkgever, bedoeld in [artikel 1, eerste of tweede lid, van de Arbeidsomstandighedenwet][ref1], of de
      werkzame zelfstandige of werkgever die de arbeid zelf verricht, in strijd met de in [artikel 13.26][ref2] genoemde
      artikelen, met uitzondering van [artikel 4.9, derde lid, van het Besluit activiteiten leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.27
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.4.2
        afdeling: '13.4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 13.27.2
    text: |-
      Als ernstige overtreding als bedoeld in [artikel 34, zesde en negende lid, van de Arbeidsomstandighedenwet][ref1]
      wordt aangemerkt een overtreding waardoor de werkgever, bedoeld in
      [artikel 1, eerste of tweede lid, van die wet][ref2], of de werkzame zelfstandige of werkgever die de arbeid zelf
      verricht, weet of redelijkerwijs moet weten dat levensgevaar of ernstige schade aan de gezondheid van een of meer
      werknemers of van de werkzame zelfstandige of werkgever die de arbeid verricht, ontstaat of is te verwachten.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel34
      [ref2]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.27
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '34'
      - id: ref2
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.27.3
    text: |-
      Als soortgelijke verplichtingen en verboden als bedoeld in
      [artikel 34, vijfde en zevende lid, van de Arbeidsomstandighedenwet][ref1] worden aangewezen verplichtingen en
      verboden die voortvloeien uit het in de in [artikel 13.26][ref2] genoemde artikelen bepaalde, voor zover het
      boetenormbedrag voor de bestuurlijke boete op overtreding van die verplichting of dat verbod op grond van de
      beleidsregels, bedoeld in artikel 34, tiende lid, van die wet, hoger is dan € 12.500,–.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel34
      [ref2]: https://wetten.overheid.nl/BWBR0041278#Artikel13
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.27
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '34'
      - id: ref2
        bwb_id: BWBR0041278
        artikel: '13'
        hoofdstuk: '13'
        paragraaf: 13.4.2
        afdeling: '13.4'
  - number: 13.27.4
    text: |-
      Een overtreding van [artikel 4.9, eerste lid][ref1], of [4.11 van het Besluit activiteiten leefomgeving][ref2]
      wordt aangemerkt als een soortgelijke overtreding als het boetenormbedrag op deze overtreding op grond van de
      beleidsregels, bedoeld in [artikel 34, tiende lid, van de Arbeidsomstandighedenwet][ref3], is ingedeeld in dezelfde
      boetecategorie als het boetenormbedrag van de eerdere overtreding.


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0010346#Artikel34
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.27
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0010346
        artikel: '34'
  - number: 13.28.1
    text: |-
      Na een herhaling van een overtreding of een soortgelijke overtreding kan een waarschuwing als
      bedoeld in [artikel 28a, eerste lid, van de Arbeidsomstandighedenwet][ref1] worden gegeven. Als
      opnieuw dezelfde of een soortgelijke overtreding is geconstateerd, kan de werkgever, bedoeld in
      [artikel 1, eerste of tweede lid, van de Arbeidsomstandighedenwet][ref2], of de werkzame zelfstandige of werkgever
      die de arbeid zelf verricht, een bevel worden opgelegd door de daartoe aangewezen ambtenaar dat de door hem
      aangewezen werkzaamheden voor een daarbij aangegeven periode van ten hoogste drie maanden worden stilgelegd of niet
      mogen aanvangen.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel28a
      [ref2]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.28
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: 28a
      - id: ref2
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.28.2
    text: |-
      Als de aard van de overtreding of de soortgelijke overtreding, de met de overtreding of soortgelijke overtreding
      samenhangende omstandigheden of de gevolgen van een stillegging van de werkzaamheden daartoe aanleiding geven, kan
      worden afgezien van het geven van een waarschuwing en het opleggen van een bevel.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.28
  - number: 13.28.3
    text: |-
      Van een soortgelijke overtreding als bedoeld in het eerste en tweede lid is sprake als het gaat om
      een overtreding van de in [artikel 13.26][ref1] genoemde artikelen, voor zover het boetenormbedrag
      voor de bestuurlijke boete op deze overtreding op grond van de beleidsregels, bedoeld in
      [artikel 34, tiende lid, van de Arbeidsomstandighedenwet][ref2], hoger is dan € 50.000,–.


      [ref1]: https://wetten.overheid.nl/BWBR0041278#Artikel13
