        artikel: '4'
  - number: 13.18.4
    text: |-
      Het bevoegd gezag stelt het bevoegd gezag voor een omgevingsvergunning voor een lozingsactiviteit
      op een oppervlaktewaterlichaam en een lozingsactiviteit op een zuiveringtechnisch werk tijdig
      in de gelegenheid om te onderzoeken of de onderdelen van het veiligheidsrapport die gaan over
      mogelijke waterverontreiniging of een mogelijke belemmering voor de doelmatige werking van het
      zuiveringtechnisch werk bij een zwaar ongeval voldoen aan de [artikelen 4.14][ref1], [4.15][ref2] en
      [4.16, eerste lid, onder c en d, van het Besluit activiteiten leefomgeving][ref3].


      [ref1]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref2]: https://wetten.overheid.nl/BWBR0041330#Artikel4
      [ref3]: https://wetten.overheid.nl/BWBR0041330#Artikel4
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.18
    references:
      - id: ref1
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref2
        bwb_id: BWBR0041330
        artikel: '4'
      - id: ref3
        bwb_id: BWBR0041330
        artikel: '4'
  - number: 13.19.1
    text: |-
      Het bevoegd gezag stelt degene die de Seveso-inrichting exploiteert binnen een redelijke termijn, maar uiterlijk
      binnen zes maanden na ontvangst van het veiligheidsrapport, in kennis van de conclusies van het onderzoek daarvan.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.19
  - number: 13.19.2
    text: |-
      Als het bevoegd gezag van oordeel is dat het veiligheidsrapport onvolledig is, wordt degene die de Seveso-
      inrichting exploiteert binnen acht weken na ontvangst van het veiligheidsrapport verzocht om aanvullende gegevens
      en bescheiden te verstrekken binnen een bij het verzoek te stellen termijn van ten hoogste zes weken.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.19
  - number: 13.19.3
    text: |-
      De termijn, bedoeld in het eerste lid, wordt opgeschort met ingang van de dag dat het verzoek, bedoeld in het
      tweede lid, is gedaan tot de dag waarop de aanvullende gegevens en bescheiden zijn verstrekt.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.19
  - number: 13.20.1
    text: |-
      Het bevoegd gezag, de toezichthouder, bedoeld in
      [artikel 1, derde lid, onder d, van de Arbeidsomstandighedenwet][ref1], en het bestuur van de veiligheidsregio
      zorgen gezamenlijk voor het vaststellen, bezien en bijwerken van een toezichtsysteem en een toezichtplan.


      [ref1]: https://wetten.overheid.nl/BWBR0010346#Artikel1
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.20
    references:
      - id: ref1
        bwb_id: BWBR0010346
        artikel: '1'
  - number: 13.20.2
    text: 'Het toezichtplan bevat ten minste:'
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.20
  - number: 13.20.2.a
    text: een algemene beoordeling van de relevante veiligheidskwesties;
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.20
  - number: 13.20.2.b
    text: het gebied dat het toezichtplan bestrijkt;
