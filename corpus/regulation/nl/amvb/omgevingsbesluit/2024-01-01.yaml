  - number: 13.15a
    text: |-
      Onze Minister van Infrastructuur en Waterstaat is verwerkingsverantwoordelijke voor de verwerking van
      persoonsgegevens in Inspectieview Milieu.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.15a
  - number: 13.15b
    text: |-
      Onze Minister van Infrastructuur en Waterstaat zorgt ervoor dat in Inspectieview Milieu geen gegevens worden
      bewaard.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.15b
  - number: 13.15c
    text: |-
      De jaarlijkse beheerkosten van Inspectieview Milieu komen, voor zover ze niet worden gedekt door de jaarlijkse
      bijdragen van aangesloten bestuursorganen en instanties, voor rekening van Onze Minister van Infrastructuur en
      Waterstaat.
    url: https://wetten.overheid.nl/BWBR0041278/2024-01-01#Artikel13.15c
