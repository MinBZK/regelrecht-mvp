[package]
name = "regelrecht-corpus"
version = "0.1.0"
edition = "2021"
authors = ["MinBZK <noreply@minbzk.nl>"]
description = "RegelRecht corpus client - Git integration for the regelrecht-corpus repository"
license = "MIT"
repository = "https://github.com/MinBZK/regelrecht-mvp"
homepage = "https://github.com/MinBZK/regelrecht-mvp"
keywords = ["law", "legal", "corpus", "dutch", "regelrecht"]
categories = ["development-tools"]

[dependencies]
tokio = { version = "1", features = ["process", "fs"] }
tracing = "0.1"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_yaml_ng = "0.10"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"], optional = true }
walkdir = "2"

[features]
default = ["github"]
github = ["dep:reqwest"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "fs"] }
tempfile = "3"
regelrecht-engine = { path = "../engine" }

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
