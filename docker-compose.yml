---
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: regelrecht
      POSTGRES_PASSWORD: regelrecht_dev
      POSTGRES_DB: regelrecht_pipeline
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Enrich workers — each harvest creates two enrich jobs (one per provider).
  # Both workers share the same image; the provider per job is determined by
  # the payload. LLM_PROVIDER sets the default for jobs without a provider field.
  #
  # A single worker instance handles both providers (provider is per-job),
  # but you can also run separate instances for independent scaling.
  enrich-worker:
    build:
      context: .
      dockerfile: packages/pipeline/Dockerfile.enrich-worker
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://regelrecht:regelrecht_dev@postgres:5432/regelrecht_pipeline
      LLM_PROVIDER: opencode
      OPENCODE_MODEL: vlam/ubiops-deployment/bzk-dig-mistralmedium-flexibel//chat-model
      # NOTE: opencode.json contains the VLAM demo API URL. For production,
      # override VLAM_BASE_URL or replace the config in the deployment.
      # VLAM_BASE_URL: https://api.vlam.ai/v2.1/projects/prod/openai-compatible/v1
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - corpus-repo:/home/worker/corpus

volumes:
  pgdata:
  corpus-repo:
